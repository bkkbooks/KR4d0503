front:
  text: 金華黄先生文集卷苐二初藁二五言律詩臨川危素編次番昜劉耳校正
  hash: sha256:374847dbb8de59ded489bb38c81e20275a6e9f290494848692d66b15a25df3e6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0503_SBCK_002-1a}
body:
  text: 寄方韶父先生牢落江南賦知音寄渺茫鹿麋行䖏有芝草萝中香遥興滄浪濶悲歌白􅄠長平生今古淚滴破緑蘿裳雨二首兀坐九十日雨聲殊未休花時翻益睡茅屋不禁愁生事吾何望春寒晚故㽞江波青滿眼萬里付䨥鷗泥潦今如此出門知路難蓬蒿春自長桃李夢曾看未覺龍公倦誰憐燕子寒青燈耿䔥瑟千載入憂端雪急雪下不止􅃋風終夜鳴飢􅆉應蚤蟄老鴈故南征生理真何計沉吟獨此情山中􅀊酒熟不飲竟湏傾送友人郷路三百里獨歸衣正單􅈵風紫洲水斜月白沙灘燈火期方逺關山􅀊欲闌􅀝門應望汝莫澷駐征鞍寄友人憐君山水意局促守柴扉故國悲秋草􅈵風滿􅄄衣滄洲斜日晚白社㡬人歸􅄫寞分遥念天寒木葉稀秋懐五首天末雲猶玄山中􅀊欲徂周流吾道在嘆息古人無野鵲疑秋樹新駒怯暝途蒼茫念同志微薄忝為儒對酒髙天豁豋樓落日曛亂蟬悲暮葉老雁赴長雲落魄稽中散栖遅鄭廣文身名竟如此碌碌汝何云稍稍秋河落姢姢宿露微天清江不息野迥樹相依回首狂歌數經心昨夣非流螢無思極巧入絳惟飛仰古嗟無及關情極可哀禰生才見忌賈傅直為災丗肯憐樗櫟吾曾悔草莱小詩聊􅃧爾何乃併生猜風雨仍揺落江山且滯㽞懶􅀙生事拙閒惜壮心休弱􅟵縈欹石空槎卧洑流興懐到微物丗故􅇵悠悠柴荆赤日薄烏帽柴荆無㝎棲可䏻詩似錦乍取醉如泥薄業慙漁艇深衣逐馬蹄蕭條江海興芳草故萋萋慿軒信有儒冠誤慿軒意欲迷山􅀷風雨惡天濶羽毛低他日開炎瘴連城送鼓鼙荷鋤吾媿爾未敢歎塗泥風雨風雨忽如此􅐬門方晝眠故應為計拙可復要人憐燈火􅆧村路桒麻杜曲田悠悠今視昔把卷一􅃼然抱琴三尺枯桐樹相随年嵗深此行端有意何䖏託知音隐隐青山夜寥􅋁太古心空携水仙曲更向海中岑山中懐友七首大府趨羣彦􅁱才復壮齡波瀾開白晝羽翼動青􅁳弱質悲殊調眀時敢獨醒未妨茅屋底􅄫寞抱遺經望逺空山裏天寒夕夢􅀌林昬行魍魉江晚變蘼蕪風雨憐同病塵沙感壮圖向来懐古意逥首未䏻無踈放誰容我交逰重得君論文輕咳唾問俗到耕耘一咲䏻青眼相思有白雲春風動閭巷遂徃􅓽紛紛何事虗齋裏猶分苜蓿盤髙林容偃蹇衆翼避扶摶黑夜文星動青天劍氣寒終南山正好那得悔儒冠自是麒麟種卑栖㝎㡬年故廬南雪下短褐北風前􅀊暮山林瘦天髙雨露偏肯同兒女輩俛仰事春妍卓犖恒山秀相逢㡬抱琴五年風雨別四海弟兄心雪外梅花逺山中桂樹深㝎知􅄞􅅩夜髙興滿雲林洛社推年少清􅫉照士林春風何䖏客芳草獨行深遺墨收秦刻新吟學椘音别離無一字目斷白雲岑悼䨥林栗上人飛錫徧諸方栖身復故郷年随䨥樹老人與一琴亡暗草迷春塔凝塵鎻夜堂瀟䔥今日雨誰炷影前香社日重過方子踐東風吹客衣長憶見君時一别驚雲散重来與燕期春􅀷今雨夕花老玄年枝莫待空山裏青燈有􅀁思聞子踐臥病吾子仍多病何人共觧顏水聲和藥臼春色􅐬松関積雨連三月懐人隔萬山同逰况零落浩蕩可􅇷攀和吴賛府齋居十詠焦桐憐爾抱奇質無香亦自焚材髙初偶得音古竟誰聞天海空遺操氷霜見裂紋中㕑方煮鶴終得舎夫君蠧簡六籍􅁅寒乆名山餘舊藏漆痕微有字芸草􅄫無香後死嗟猶及斯文豈􅃍亾丗方珎貝葉掩􅃃一淒􅋽破硯巨􅒄何年鑿磨穿偶至今線紋虗緑􅃳雨氣失玄隂瓦礫看無異塵埃積轉􅀷眀光㡬携入往事復何心殘􅀞勝境不可得微綃餘舊圖丹青初彷彿塵土半模糊蛺蝶飛疑去波濤拆漸無良工今豈有為爾一長吁舊劍憶啓蛟龍匣提携徑岀門紅塵走馬䖏白日報人恩􅀊月銅花澁雲烟斗氣昬淒􅈵中夜舞囬首暗銷魂塵鏡古鏡色如墨千年獨此畱玉臺􅆉網暗珠匣􅁟華浮莫咲塵埃滿曽令􅀑魅愁􅋥龍驚已化雲雨夣悠悠癈檠不觧照珠翠早同文字􅉀何言中路牽無復向人眀雨宿髙齋夣秋吟癈館情相看㡬今夕及此慨平生敗裘襲爾亦已乆霜風兩䄂穿甘􅀙稚子咲未受故人憐雅製餘前古深期在暮年素􅁝今化盡念汝獨依然斷碑零落秋風臥何年癈廟碑圖經愁莫載􅂄舊說頻移野燒龜趺失荒苔鳥跡疑遥知千載後拂拭轉堪悲臥鐘龍簴乆摧折沉埋柰爾何畊民誰睥䁛野衲自摩挲雅奏多年歇銘文㡬字訛斜陽荆􅁄裏長伴舊銅駝呉賛府挽詩三首鶴去愁滄海鴻飛困朔風􅁳􅁳方獨徃巳已竟長終莫挂還郷劒真随厭丗弓向来曽慟哭不是為途竆百代龍川子風流見外孫餘生唯白㡌舊業自青門浩蕩期千載蒼茫哭九原仙華雲縹􅄅愁􅅸刻舟痕懐古餘哀思憐君尚典刑清談無俗子白髪死遺經客社􅂽春汐郷山隕夜星夕陽隣舍􅅇淒切可堪聴過謝臯羽墓識子今無日風流可復㝷山林餘椘製弟子觧閩音滄海它年夣青天後夜心平生匣中劍零落遂如今元日即事回首人頻異興懐誰與同塵埃欺白苧􅀊月入青銅雨急蒼茫外春生浩蕩中長憐故園樹一一受東風八詠樓懐古􅂽碑在豋樓晚望賖秋隂垂野薄江􅀔抱城斜天地悲㳺子氷霜感嵗華紅塵吹裋褐歸興及清笳眀月樓遺堞何年有飛甍壓上頭鼓鼙分大幕香火望靈湫曲岸舟如失遥沙樹欲浮豋臨且吾􅁟未敢恨淹畱溪南即事莾莾長川玄行行薄莫時山光連睥睨寒色入旌旗夕鳥歸飛急風㠶􅊇上遲丗情關物理俛仰􅀉長思􅍭香道中殘日亭猶逺䡖風帽易斜稻畦低沒鶴草徑曲行蛇經丗知無筞謀生㑹有涯殷勤理黄菊畱眼待秋花懐楊仲􅊼離別驚如雨蹉跎媿後塵秪今才有􅁆多爾術䏻神玉涶春風濕􅃄霄碧樹新􅍝慙推吏事吾敢望平津八詠樓遇方子踐風雨三年别豋臨一咲同緑莎垂古井碧瓦暎踈桐丗故違髙枕吾生劇轉蓬相逢感疇昔出䖏愧匆匆杭州寄子踐尊酒何人共春光著䖏同乾坤容野馬􅀊月失飛鴻俗眼䏻無白風花故自紅向来常䖏士早已負諸公次韻荅子踐不謂飛霞珮珊然􅄫寞濱相看今雨夕漸近長年人往事驚如夢何峯擬􅁲隣平生千里駕還往得辭頻劉聲之爐亭夜話儒冠寜誤我壮志自多違昭代尊經術先生尚布衣清言今夕共大隐昔人稀預恐蒼山麓無􅀙􅀱少微雨三首湖濶雲如積天空雨正豪風飈兼晝夜井邑帶波濤茅屋垂垂破漁舟故故髙何妨張仲蔚環陼自蓬蒿穉子吾憐汝泥行玄不難凭欄真自咲髙枕敢求安天地三辰遠江湖五月寒好􅀅遮日手却把釣魚竿田父愁何訴龍公怒未休千畦沉翠羽百水散黄流小市猶長􅐬􅀌城併欲浮誰􅑞􅀘天漏此事恐悠悠金􅁜客舎澷書不擬夫容佩終然挂􅄫􅋁百年多事始千里一身遥巢燕驚華屋韝鷹望赤霄蒼蒼叢桂樹愁􅅸小山招陪仇仁父先生豋石頭城談咲逢諸老豋臨失故亭薄逰成汗澷髙歩􅁴竛竮峽水通吴白淮山入椘青平生一杯酒及此慰飄零春日郊行􅇎興三首忽忽時頻異垂垂花正繁豋臨聊極目出䖏可忘言風急江光亂春濃野色昬􅃇逰嗟契濶覧物思空存五畝清江曲為農計未踈那無經丗筞宜付絶交書野笛吹頻歇漁舟玄若虗卜居䏻有待天地夲吾廬高興真誰共佳晨秪屢經天清風細細花逺樹􅁳􅁳勝事今非昔狂歌醉欲醒終南飛鳥外一􅄠向来青次韻荅友人十載論友地才皆苐一豪江湖嗟契濶風雨夣䔥騷趨走知無力標題敢自髙期君飬翎羽一撃可徒勞九日豋石頭城背郭􅅝塵逺髙秋川嶽清幽懐初曠蕩陳迩故縦横遥望龍盤􅃇長憐蟻穴争紺園随䖏關粉堞向来傾彂草窺眢井看碑驗故塋門􅄏蒼耳路亭愛翠微名逺樹淮南出滄江鳥外眀人􅃄川浩渺風物􅀊峥嶸吹㡌仍佳莭傳觴但老兵愚生􅇎蛙黽浪走媿璜珩玄玄檣帆盡䔥蕭蘆葦鳴豋髙未成賦覧古獨含情政復哀王粲何堪厭禰衡敝廬滄海曲目斷白雲生􅀉李生有維仙李􅀌標見碧梧髙門畱雨露短褐混泥塗姿悍寜為小機深㦯􅀋愚洗心湏貝葉㳺藝及樗蒲政爾難蔵頴幡然獨抱竽􅀙容觀近效僶俛事羣趨稍癈琴心曲䏻操牘背書誰􅀅窮罔象莫使避􅃢瑚它日逢何暮清談動至晡酔醒勞問我喜怒得令渠契濶江湖迥飄零􅀊月徂青雲悲捷徑白日仰亨衢秋社枌榆外南包橘柚初飛騰如借順䏻勿咲蟾蜍七言律詩送孫君文判官丈歸桐廬咲語匆匆似夢中衣裳俄復判西風殘蟬落日那堪别瘦馬長途喜未窮􅀊事已空南畝稼歸期應老故山桐興来尚有平生棹載酒何時覔釣翁感舊華屋山丘不可期峴山依舊緑叅差空懐下榻延徐孺無復乗舟訪戴逵日暮更聞隣舎笛􅀊寒頼有角弓詩舊逰􅄫寞成今古冷石秋花䖏䖏悲鳳凰山蒼海桒田事渺茫行逢遺老色淒􅈵為言故􅀦逰麋鹿澷􅃌空山􅃅鳳凰春盡緑莎迷輦道雨多蒼薺上宫墻遥知汴水東流畔更有平蕪與夕陽􅄏元宮誰使蔵舟一夕移紅樓翠幙未全非曾聞帝子乗鸞去疑有仙人跨鶴歸􅃄徑月眀瑶草歇石壇露冷碧桃稀赤欄橋畔多時立閑看楊花作雪飛早起漠漠晴􅉉散薄雲獨搔短􅄠立清晨春風入樹無行迹暁月窺簾欲近人旋􅁴新吟随夢􅄰不知清霧濕衣巾何人正􅂿長安陌想見看花拂面塵九日獨立慿髙彂興新霜清露白復佳辰緑尊照眼不觧醉黄花滿頭應咲人檮邉老僧幽期失巖南故人新句頻秋天此日併囬首鴻鴈寄書愁未囙次韻山南先生遣興二首稍􅁴春風入剪裁更無魂夢到塵埃苔枝自送黄昬影寳篆頻消白晝􅁅丗態漸􅀿随日別老懷可復向人􅄏擁爐坐聴蕭蕭雪載酒携琴也莫来蒲團兀坐乆忘機何暇重尋是與非老鴈長雲天渺渺晚花寒蝶思依依起看丹􅍳春無恙欲試青鞋雪未晞鵬鷃逍遥端可耳玉堂何必媿柴扉􅀉仇仁父先生一官十載尚沉淪門巷蕭蕭白屋貧自有陶公為社友􅀙呼杜老作詩人兒􅈠故復䡖前輩儁歩誰當出後塵招隐詩成無䖏􅀉莫雲凝碧坐愁神􅀉十八丈判官金牓淒􅈵四十年風流文采故依然香山老玄誰同社栗里歸来尚有田懐古坐看西日落得春寜問北枝偏清泉白石多深趣千載心期入近篇寄仲山異縣關心翔鴈飛酒燈棋雨計頻違寄書全􅁴􅄞康􅂴入夢多疑李白非黄葉閉門方􅄫􅄫碧雲逥首故依依相􅀙賴有梅花約試蹋春風走翠微􅀉友人繫舟一别雲水鄉暮川葭菼方蒼蒼漳濱臥病它年憶渭北題詩春日長蕪菁作花己爛熳楊栁飛絮苦顛狂聞道茯苓暖堪斸遅子青鞋經澗崗夏日澷書枕上初殘栢子香鳥聲簾外已斜陽碧山過雨晴逾好緑樹無風晚自􅈵芳􅀊背人成荏苒好詩和夣落蒼茫求羊何不来三徑門掩残書滿石牀逢葉伯機水烟沙雨送歸航楓葉蘆花巳十霜瑶曲天風春夢遠墨池秋草故㳺􅂽碧峯又是新逥䧹白石依然舊化羊一咲相逢却成别暮雲千里思􅃼茫宿賈氏山房暝色蒼茫赴逺岑獨􅇷燈火下荒潯寒沙細水通幽徑􅁱竹高楠走翠隂草草悲歡中夜語悠悠醉醒百年心石烟霜月寒無􅄰坐聴踈鍾出二林送友人之亰偶縁送逺接清逰􅃄雨東城晚樹幽離别自應多感慨咲談未害各風流百年芳草頻頻合萬事􅀌雲故故浮太華黄河入囬首春風愁􅅸李膺舟荅友人芝掌峯前一杯酒別離歳晚逓相望野梅如雪遥入眼曉鴈連天寒呌霜􅐬門窮巷燈火冷囬首蒼山雲樹長㡬時抱被却同宿愧爾詩筒逺送􅀅憶友人無復髙談慰索居壮心零落竟何如人間澷有金臺夢身後誰傳玉枕書半畝蒼苔埋璧地一聲白雪斷絃初芙蓉峯下聞吹笛淚滴春天草木踈􅂘李無逸青春未受二毛侵談咲俄聞變古今千日却醒徒有望九原莫作竟何心平生欠荷劉伶鍤此夜誰彈子敬琴水樂亭西烟草碧舊㳺囬首重沾􅁭過烏傷墓丹青像設始何年翁仲遺􅇕自古􅀓時有北人来下馬不知秦樹㡬啼䳌牧童晝卧看碑路野衲春耕祭墓田囬首長安西日外茂􅁜松栢正蒼烟􅇎興三首昔􅀙六客堂前客共買何山渡口船杉松夹道得古寺風雨澷山連杜䳌憶别老僧如昨日待分幽事及它年春江正緑不能玄勝踐䔥條秪自憐㡬囬擬作送春詩出戸春風玄不知葉底􅀌花猶入眼竹根稚筍欲過眉又抛書卷都如夣間看香烟偶似癡寄語平生張仲蔚一􅂬相屬竟何期劉生玄滌相如器朱子新裁賈誼書百代風流今視昔十年懐抱我憐渠故應曽對談諧樂也復䏻容禮泫踈風雨蕭蕭守環堵秪今可望故人車􅀉陳君采江淹文采碧雲消潘岳才華玉樹凋後爾千年開楗鑰森然作者見風標棋花夕日輝相並金櫃名山路未遥䞉欲傾心􅁆還往髙期無使竞蕭條次韻荅吴正傳諸老凋零半九原後来英發見蒼然髙標寜復居人下緩歩猶湏出我前天馬爲誰生月窟仙禽有日到芝田論心待取同傾盖可使空逥雪夜船􅀉葉審言千里相思黄葉初喜傅消息慰離居姓名澷入山公啓懐袖元無賈誼書已分耕耘供賦龡胡令汲引到樵漁臨􅄮躑躅頻回首風雨蕭蕭鴈正踈獨立􅁆盡飛花一愴然壮心迢逓夕雲邉十年人事空流水二月風光已杜䳌過眼青春寧復得汚人黄􅁟絶堪憐故園尚有平生約可使蒼苔到石田即事南陌東阡草色齊愔愔門巷客来稀受風燕子輕相逐著雨楊花濕更飛緑樹無言春又盡紅塵如霧手頻揮浮生莾莾吾何計獨立看雲竟落暉山中夜歸澷山松葉行徑迷獨穿犖确幽歩遲驚風低艸山乕過寒月挂樹天星垂泉鳴􅂽䖏夜牢落露洗青林光陸􅄐茅簷抱膝者誰子歌闋飯牛聲正悲旅夜􅊗􅊗飛螢度眼眀獨搘髙枕􅁆殘更薄㳺已􅌒新彈鋏舊業猶餘未棄檠一雨送晴初月色百􅆉専夜故秋聲情知三􅁲非年少已􅁴人間有後生三月三日西湖舟中黄塵烏帽媿平生對客猶稱舊姓名此事正堪三太息秪今忍負四難并放舟乍落空濛境送酒元無窈窕聲金谷蘭亭嗟已矣不妨時暫濯吾纓金􅁜天津橋五雲零落渺天涯陳跡蒼茫日自斜畫角巳吹邉塞曲紅藍新長内園花可憐遺老埋黄壌曽􅀝春風望翠華好在北山猨与鶴依然同住舊烟霞送人歸豫章已􅁴棲遅􅂴曵裾可能為我強躊躇一帆秋色紅塵外千里江関白鴈初建業水清誰共飲潯陽潮断㝎無書黄金未盡朱顔在莫種桃華學隱居􅂘陳茂卿多病文園鬢未霜可人風味故難􅁯豈期夜壑舟無㝎竟使春天草不芳賣薬㡬時来海上遺文湏我訪㐮陽誰憐後􅂮仍漂泊雲白山青自故郷宣城客中偶書眼看春霄擁勝流漂零回首媿沙漚黄塵烏帽知誰為白飯青芻復此㽞未必􅄞康䏻作吏何妨李廣不封侯敬亭雲鳥知無恙欵段惟湏逐㑓逰梳頭淂白􅄠偶逐飛雲別礀岡觧纓聊爾濯滄浪􅁭懷巳久無山水容鬢誰令有雪霜未必冄砂真却老可湏白首更爲􅀰前脩未逺斯文在努力無愁􅄮路長送韶父先生逰亰口不到南徐三十春好将夣寐弔遺民也知往事如流水秪想重来是後身棹響關河風色莫雲離野服髩毛新舊㳺偶失扶桒路煩向滄江一問津山南先生挽詩仰驚喬嶽失嶙峋千載風流可復聞鼎有丹砂䡖縣令嚢無薏苡詫将軍苧􅂁􅀊月􅀌青簡石室文章閟白雲淚盡侯芭悲獨立短衣髙馬秪紛紛喜方韶父先生至兼懐山南先生夢覺秋宵失薜蘿尚煩青簡慰蹉跎山中舊別期猶在嵗晚相逢感易多華表神僊成􅄫寞靈光風雨見嵳峩百年珎重斯文寄趼足脩程可柰何韶父先生有詩復次韻以和兩翁故復可憐人傾盖長安四十春華屋山丘如隔日夜床風雨淂彌旬書籖藥褁仍仍在橘刺藤梢一一新澷寫餘哀􅀉􅄀漠大􅂽誰見下麒麟寄張如心謬羡侏儒抱一囊舊㳺搔首獨淒􅈵連天㫁䧹初沉日匝地寒花欲有霜聞道為郎湏白􅄠未殊髙枕待黄􅆝紅顏好在張公子坐聴松風春晝長送王傅朋静江教授丞相威名震百蠻蕭條異代淂吾賢䆠㳺忽過三湘去家學􅀿令四海􅀓北望犬牙連上􅀦夜占鶉尾􅀡中天炎風􅃋雪皆王土未覺青春雨露偏碧蓮􅄘下駐飛􅆖風土遙知久自諳㑹有新書裨禹貢坐聞舊俗化周南深篁盡日迷山􅄦毒草無時起瘴嵐珎重斯文強飡飯􅓽誇丹荔与黄甘送楊州傅學正全淮控制列城遥尚想青春虎豹驕一日江山走珠玉萬家燈火沸笙簫喜逢才俊豋文署好頌升平荅聖朝芍薬瓊花児女事可縁風月逗華鑣余山春雲牢落鴈無聲沙岸叅差石有稜䨥屐澷窮芳艸徑一龕長愧白頭僧晴濤閃閃翻孤日山木昏昏􅐈翠藤後夜清風滿遥念夢逰空􅃌上方燈龍潭山二月清江照眼眀避風舟楫滿迥汀斷雲抉雨時時黒宻葉蔵花􅀣􅀣青習􅀮未成陶令賦行謌聊共屈原醒碧潭光景無消息坐看魚児點翠蓱遣興青雲如夢慨平生白􅄠驚春忽􅁆莖漸􅁴交㳺随日別強顔色逐人行百年松檟誰䏻去五􅅕煙霞故可耕􅄭念掃除渾欲盡少㳺何得尚相䡖次韻方子踐觀潮潮生潮落有時休朝暮呉児㡬白頭􅀍髮祗􅑞迎駭浪側身寜觧障奔流江吹碧瓦人聲暁雲閃朱旗海氣秋後夜月明天在水有誰䏻此試登樓次韻子踐秋社歸巖南乆悟清都是夢中未嫌短􅄄任飄蓬時情冉冉心如醉世議紛紛耳欲聾㑹種枌榆依漢社共談禾稼續􅃎風蹉跎偶􅀒平生約已復人間􅀊一終予與劉君師魯為文字交十有四年而固未甞相識也兹過武林偶遂良覿有喜而賦邂逅神交十載餘青楓落月幾愁予何言此日同傾盖勝讀平生未見書天上玉堂容可到山中金匱得長虚故多餘事宜啇略可待秋風怨索居杭州􅀉里中一二同志故山有路去無􅀙燈火関心夢不通浪赱紅塵真自咲舊㳺白社竟誰同􅅐中好貯千巖秀眼底徐觀萬馬空風雨未休鴻鴈㫁此懐􅄅渺故難窮同儒上人謁黄尊師于龍翔上方脩撰鄧公適至􅂺成小詩用紀盛集坐陪三老盡文雄政爾衣冠不苟同談咲流傳成故事􅀞圖想像見髙風丹崖方與霞標峻碧海誰能鐵䋄空􅍝託下陳虛自詫飛􅀭無力思何窮客樓雨中江城飄泊動經年盡日髙樓閱過船睡起小窓􅀄聴雨岸旁垂柳巳生煙㘴抛􅀊月今如此毎望雲山欲泫然尚喜㳺􅀙得諸彦時將樂事􅀉新篇次韻荅蔣春卿不謂紅塵拂面時軒然談咲一舒眉晴風石鼎浮花乳夜雨春盤冷碧絲握手􅃍成三􅀫戀論心那􅁴十年遅酒船魚綱歸無計未必山前白鷺知送楊山長歸錢塘百里郷心海鴈飛三年宦况野鷗知兒童早已占歸信弟子應䏻頌去思茅屋􅂽田春草草杏花深巷雨絲絲人生適意須行樂駟馬髙車恐未遅章徳懋同登車蓋山城南日日望蘇灣碧樹童童蓋一山何意兹辰成邂逅與君携手共躋攀鉤衣亂石通髙歩着面和風啓醉顔尚愛碑銘多楷則俗書且勿闘妖􅈺重逰毗山十載重来思惘然勝逰邂逅一開顏髙林有色煙雲净曲徑無香草樹閑漫遣金樽催白日絶憐紅粉涴青山南朝舊迹今誰記膓㫁風流不可攀湖山遇葉士心囙􅀉郭祥卿架閣謝公城下蹋春暉最憶東園夜不歸落月清樽波㶑㶑髙花銀燭霧霏霏未愁強醉羅衣濕政恐重来燕麥稀大地風濤竟誰料九霄一鵠看橫飛大卿牟公挽詩靈光一夕失崔嵬多士相逢淚雨摧夹道共看丹旐去遺民猶憶繡衣来䔥蕭悲吹蘋花冷􅄅渺郷山杜宇哀哭盡貞元舊朝士臨􅄮無語重徘􅆦後生無復望儀刑青史徒煩列姓名窮有遺文成鉅冢死無新爵上銘旌􅀲田方任蓬蒿没玉樹偏依雨露生舊笏滿床知未墜翰林風月向来清次韻牟主簿南湖客中遥望仙橈度碧湖翩然髙興不枝梧也知白髮行相待無柰青山不受呼過眼光風殊獵獵霑衣多露巳􅂗塗相逢􅄑及南枝好一笑聊須引百壷次韻姚子敬教授筠庵别業故園煙樹􅄅江關長愧求閑未得閑客路獨愁黄葉下髙人正在白雲間卜隣儻遂容依止載酒終期共往還未害看山仍拄笏一竿付我釣滄灣次韻别程晋輔教授落拓江湖乆不歸相逢還及試春衣忽聞煙際蘭橈動誰共花前玉斚飛青眼故多知己在黒頭未覺壮心違赤霄孔翠吾何望喔喔隣雞爾自肥花信已覺㝷芳去較遅千林紅􅂵想紛披幾經夜雨䏻無恙試問春風竟不知斜日逰蜂應有夢野亭立馬巳多時殷勤却是江南客曽擘氷霜􅀉一枝草意澹煙斜照舊離離􅄍漫芳心欲向誰可是忘憂䏻自得若教􅃌佞定無􅀻東風江上何人識南􅀦春来有夢知㽞􅂑青青承雨露未應紅􅂵浪相疑五言絶句山中偶題古苔隠石色寒花眀藥叢有時白磵雨終日青松風夜坐涼風動千里􅀌坐思滄洲白露洗明月青天此夜秋七言絶句寒食舟中東風溪水碧漣漣溪上青蘿獨繫舡正是落花寒食夜水煙沙月又啼䳌哭御史王公有人新自甬東来別後音書第一囬欲問布帆無恙否豈知塵世隔蓬莱􅀍髪胡為竟渡河由来魑魅喜人過不須待聴山陽笛一曲箜篌哀思多早􅀊棲身擬鳯池桑田為海巳多時路人方為乗騘止流水生涯􅃍可悲玉堂政要謫仙人何意先成采石墳人物渺然時事異漫令平地有青雲金阜原頭草未生兒郎俄巳去􅀐鯨黄泉㑹有相逢䖏轉見人間子毋情掉頭東下苦匆匆徑挟羣仙入貝宫眼底􅃢瑚髙百尺釣竿吹折一􅁝風膠液中流事可歎海雲飛雨失青天陸郎地下驚相見應許来遅二十年􅀌児思父母憐兒忍見銘旌獨返時畢竟江魚與螻蟻世間何物最堪悲楚客猶疑刻劍痕秋風已到孟甞門殘潮落月天涯夜剪紙誰招萬里魂天呉罔象政縦横誰認鼇山頂上行海氣昏昏風雨惡夢中無路弔先生金􅁜客中送友人歸里青陽河畔杜䳌啼歸路如弦定不迷應到故山叢桂裏咲人􅀐馬學聴雞有感橘柚青黄照眼垂秋風籬落自紛披頗聞玉食登蠻果不獨涪州有荔支漢空需才㧞隠淪鼔刀屠狗正求伸可憐風雪南山下未有它年射虎人葉審言張子良同逰北山智者寺旣歸復與子良至赤松由小桃源登煉丹山謁二皇君祠囬􅀫寳積觀天風吹我度峥嶸春著千巒滃滃青􅂵陌紅塵寕有此十年空􅀒比山靈芙蓉峯下南朝寺水秀山眀兩絶竒更向水窮山盡䖏一菴髙貯碧雲師却問仙山去幾程白雲如簇近相迎直湏不脫登山屐行盡松聲與水聲山中今是太平民尚與人間隔幾塵流水桃花三百曲莫教重誤武􅁜人偶看飛花逐水紅不知身過􅅍雲東囬頭旋覺峯巒别惟有青天面面同䨇鶴冲天􅀊月多至今香火壓嵯峨劉郎不是無兄弟柰此丹雞白犬何㘴愛春泉響翠微玉花吹濕薜蘿衣何人為擘氷壷破共看青天白練飛削立城心䨇白塔㡬疑日月費撑支一朝頓在闌干底始悟􅀙来見䖏卑遥憶仙華鶴髮翁清泉白石滿竒􅅐若為此日干峯頂更試平生九節笻一􅀫山中竟莫㽞可䏻長伴赤松逰殷勤好去張公子休愛人間萬户侯避暑圗一丘一壑古遺民十里清風不属人閑對青山揮白扇世間何物是紅塵圍棊圗有客看棋洞口歸天荒地老巳多時人言此客殊癡絶􅀞裏看棋我更癡陶學士驛舎圗一咲相逢亦偶然浪􅀅㤙怨向人傳無端更􅀍丹青汚狼藉春風數百年次韻章兄雨中書懐卧聴風水共喧喧起視青空白雨懸秪謂桒田可無恙不知江􅀔欲吞天茫茫平陸一尺水瑟瑟􅈵飈五月秋莫為天公無皂白誤将隂雨怨鳴鳩故山囬首杜䳌啼客舎誰憐􅀉一炊頼有四門章愽士不縁風雨廢談詩春盡餘寒去却囬江天五月未聞雷南風秪在浮雲外弹折朱弦喚不来草長故山懐獨往苔生今雨歎離居誰䏻共飲桃源酒一醉千年不願餘偈二首乆謂聲聞難作佛今知龍女觧成男分眀信有旁人分五十三身第一叅息心無想成無記有見還同有相存不盡普賢殊勝行随方願唘一城門金華黄先生文集卷第二
