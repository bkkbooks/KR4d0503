front:
  text: 金華黃先生文集卷第二十五續藁二十二日損齊續藁卷苐二十二門人編次
  hash: sha256:79885028dc04bd681716ac9b641925362e19a1203930e377562dcc0d51a53216
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0503_SBCK_025-1a}
body:
  text: 神道碑廣東道都轉運鹽使贈推誠守忠全節功臣資德大夫河南江北等處行中書省右丞上護軍追封髙昌郡公諡忠愍合刺普華公神道碑今天子至正九年春三月日詔以工部尚書偰哲䔍為參知政事行省江浙其祖考髙昌忠愍公之墓實在所治境內偰哲䔍將奉加贈進封制書展告于墓次中書宰臣因奏請賜以神通之碑用廣孝而勸忠制可其奏事下翰林命臣溍為之銘别勑中政院使臣朵爾直班禮部尚書臣泰不花書篆以賜焉臣溍謹按公諱合刺普華偉吾爾人其先曰暾欲谷助唐平安祿山之亂以功拜太傅封忠武王傳數世至公髙祖諱克直普爾曽祖諱嶽弼並襲本國相答刺罕號阿大都督兼遼主所授太師丞相總管內外藏事祖諱亞思弼有子二人長仳俚伽普華次即公之考諱嶽璘帖穆而仳俚伽普華既嗣相位復立竒功讒人間之無以自白乃歸命于我太祖皇帝以嶽璘帖穆而充秃魯花秃魯花者譯言質子也上察其材具周通而識量宏逹俾傳皇弟斡真那顔統治中原朝夕左右勸以孝悌不殺上聞而嘉之賜金虎符授河南等處軍民都逹魯花赤太宗皇帝以為大斷事官出鎮順天尋俾還治河南卒於官贈宣力保德功臣亞中大夫同知山東東西道宣慰使司事輕車都尉追封髙昌郡侯諡莊簡公幼警敏有大志奉母奧敦夫人居益都李璮起兵益都據濟南以叛干戈搶攘之際母子莫能相保公晝夜號泣馳走訪問期必見毋從父撒吉思行省山東公從之平賊乃得母所在迎侍以歸人謂孝感所致行省知公純篤可用薦于世祖皇帝得備宿衛奉上旨立二鐡冶于益都四腳山遂賜金符為其都提舉尋以讓其弟久之上命丞相伯顔總兵伐宋擇可主餉餽者擢公行都漕運使公調度有方師賴以濟宋人既奉版圖入職方公恐上下狃於宴安乃條上守成之䇿曰存國體曰厲士節曰㝎官程曰厚民生曰昭舊族曰拊新民上多采納焉江南漕秫米二十萬石由䢴溝逹大河覆溺者十之一出納之量復有小大之殊折閲頗多悉責償于舟人公抗言此非舟人之罪雖沒入其家資所償能幾請獨當其責時相惡其不附己黜為海寧路稍遷江西道宣慰使改廣東道都轉運鹽使兼領諸蕃市舶姦民以私販梗鹽法往往挾兵刃以自衛因而搆亂有陳良臣者衆至萬人公奉省擊與招討使答失蠻討之殱其凶渠而諭脅從者使復業既而有歐南喜者復嘯聚其黨至十萬人僣稱名號僞署官職攻陷城池戕殺吏民公列上攻取之方略奉省檄與都元都課兒伯海牙分兵扼其要害賊平公之功居多因請革鹽法之不便者并劾按察使脫歡姦利事罷之㑹朝廷有事占城屬公出護餉道行次惠之博羅值劇賊歐鍾橫截石灣據其厄塞勢猖獗甚公慨然語其衆曰餽餫重事苟有退縮必誤軍需即身先士卒力戰矢盡而馬𬒳數創猶徒步搏賊格殺數十人竟以衆寡不敵見執賊欲生之使為主帥公罵曰吾天子貴臣出將使指寧能徒汝蠻賊反耶賊知不可屈公遂遇害時年三十有九至元二十一年二月十九日也是夕公見夢於夫人希台特勒氏曰吾死矣明日而訃至幕僚劉閏張德亦夢公衣金甲指金榜城門曰吾今治此須若等為功曹兩人俄暴卒官兵逐捕群寇若見公乘騅督戰惠人咸共驚異作堂於公死所像而祠之其後偰哲䔍僉廣東憲司事廣人見之如公存焉共請為公立祠偰哲篤弗能止又不欲以役事煩其人乃捐俸資建祠宇仍買田以給之仁宗皇帝追念公死於國事始以延祐五年冬十一月贈公通議大夫户部尚書上輕車都尉追封髙昌郡侯皇上以為情文未稱既以元統二年冬十月賜號守忠全節功臣諡曰忠愍復以至正九年春正月加贈推誠守忠全節功臣資德大夫河南江北等處行中書省右丞上護軍追封髙昌郡公其得請樹碑則夏四月十一日也公墓在溧陽州永成鄉沙溪之原葬於重紀至元之元年冬十二月日蓋改卜于兹十有五年矣夫人希台特勒氏盛年婺矛牙居以死自誓封髙昌郡太夫人年七十有二乃卒子男二人長偰攴質以先世居偰輦傑河因以偰為氏十歲刲臂肉愈母疾人謂忠貞孝萃于一門繪為三節圗以傳其守廣德有異政治他郡如在廣德歷同知廣西宣慰司事副都元帥卒官正議大夫吉安路逹魯花赤兼管內勸農事贈宣惠安逺功臣禮部尚書上輕車都尉追封雲中郡侯諡忠襄階如故次越倫質早卒以子貴贈承事郎山東東西道宣慰使司都事孫男六人偰玉立延祐五年進士正議大夫僉福建閩海道肅政廉訪司事偰直堅泰㝎元年進士從仕郎淮安路清河縣逹魯花赤偰哲篤延祐二年進士中奉大夫江浙等處行中書省參知政事偰朝吾至治元年進士奉議大夫同知循州事偰列箎至順元年進士儒林郎潮州路潮陽縣逹魯花赤皆偰文質子善著泰㝎四年進士承務郎鞏昌等處都總帥府經歷越倫質子也女四人曽孫男二十三人偰玉立之子偰烈圖用忠襄廕為承事郎紹興路上虞縣逹魯花赤偰哲篤之子偰百遼遜至正五年進士由應奉翰林文字承事郎同知制誥兼國史院編修官遷宣政院斷事官經歷偰理台國子生今為將仕郎豐足倉使偰帖該鄉貢進士今為翰林國史院譯史偰德其今上潜邸速古兒赤偰吉思偰賚偰弼並國學生善著之子正宗至正五年進士將仕郎江浙等處行中書省照磨阿兒思蘭至正八年進士將仕郎湖廣等處行中書省理問所知事餘皆未仕女人玄孫男四人女三人蓋自仁宗皇帝肇建科目以取士公六孫而六舉擢第者各一人惟偰哲篤最先逹暨皇上復行貢舉法于既廢之後公曽孫擢苐者又三人名鄉書者一人登學館者四人謂天可必乎則積善者不能皆食其報謂天不可必乎則公家餘慶所鍾彰彰如是昔人謂天人之相與當侯其㝎而觀之自公殁逮今逾六十年天之㝎也久矣而况承休襲美世有其人克膺上眷弗替益隆澤流後裔詎有既耶臣溍辱與偰哲篤有同年之雅頗獲聞其家世之詳顧以鄙陋衰朽無能發揚公之英光偉烈以稱塞明詔之萬一稽首獻攴惶悸無地銘曰猗公之先肇自有唐以功錫爵有家髙昌蟬聮奕葉相其國主逮公顯考歸我聖祖出傳宗王統治兵民導之不殺守位以仁公生名閥夙有大志禔身以學敦行孝弟移孝為忠事我世皇溫恭匪懈出入踐􅏡靈旗南指貔貅百萬飛芻挽粟公多益辦士歡為騰賈勇直前俘厥寶玉鐃歌凱旋四方既平守成不易囊封亟上敷陳至計皇華遣使鹽策是司海瀕遐逺人利其私嘯姦聚凶循習其舊公振厥武殄彼二寇島夷弗率王師有征糗粻在道輟公以行群蠻跳邉猝與公遇天竭馬蹶公奮不顧見危授命不有厥躬生氣凛然萬夫之雄以死勤事禮有常祀追逺弗忘由今天子日照月臨天子聖明公多子孫式克欽承際時丕平以文易武保其遺祉列于位序公死不殁神遊無方歸形此有封若堂史臣奉詔屬辭比事揭為臣軌昭示來世資善大夫河西隴北道肅政廉訪使凱烈公神道碑至正十年四月癸卯知經筵事資政院使臣朵爾直班侍上于興聖殿東便殿以經筵舊臣故河西隴北道肅政廉訪使拔實神道之碑未建奏請勑翰林侍講學士臣溍為之銘上既允所請則諭旨於翰林知經筵宫以命臣溍臣溍謹按史臣危素所述行狀公諱拔實字彥卿系出蒙古凱烈氏髙祖寧國孝勇公諱某事太祖皇帝以智謀材武克有伐功世備宿衛至公之考雲國宣䝘公諱某受知于世祖皇帝歷事成宗武宗仁宗三朝尤𬒳寵遇終于某年公年十有一以近臣子入侍仁宗特受承直郎長秋寺丞秩滿以奉議大夫居舊職小吏以公年少事有不關白而擅行者公立黜之由是人知所嚴憚文宗時拜監察御史進階亞中大夫首劾中書平章政事明理董阿不可共政及其子閭閭不可入察一日之間傳上旨慰諭者三而公守正不移時方議冊皇后公言陛下已詔天下讓位于大兄今立后是與詔自相違也上嘉其直賜金織文幣以旌之后聞之亦有金幣之賜遷同知隆禧總管府事太師太平王枋國公奉旨出使回既復命遂移疾不出屏居三歲若將終身焉今天子即位乃起公為中大夫僉燕南河北道肅政廉訪司事建白行大禘罷逰畋置諌官開言路擇守令嚴考核慎選授下逹魯花赤抑吏貟舉孝廉蒙古色目進士當明一經章蒙古婚姻之俗探馬赤軍弓矢行軍則佩之事畢則納于公庫倭人未服不宜使至中國凡十數事皆當世切務後多見於施行召為刑部貟外郎宗王晃火帖木而之子以疑似獲罪獄將上公不署其牘遷嘉議大夫徽政院斷事官上春狩于栁林公奉皇太后旨設御宴明日賜太師秦王宴太師顧公者三公皆不應是日公又言于怯薜官法禮曰今東作方興而畋獵不息公為國重臣何不進諌法禮入奏上即日還宫太師聞車駕巳還大驚問諸左右知自公發之出公為同知廣西兩江道宣慰使司事副都元帥公以病不時到官遂中以法病卧維楊作憎蚊賦以寓意焉更化之後上既總攬權綱徴用儒雅擢公翰林直學士知制誥同修國史兼經筵官公承詔譯唐楊相如君臣政要論書成賜賚甚渥尋又俾為之序以進嘉奬尤至上嘗坐宣攴閣閲宋徽宗畫侍臣共稱其神妙公前奏曰徽宗溺於小技而不恤大事以失其國父子並為羈虜其遺迹雖存何足貴乎上默然亟命藏畫上因覽故西臺御史中丞張公養浩經筵遺㫖之書有太空之塵之語問何謂太空之塵公對曰其意謂桀紂窮土木之工極一巳之欲又為酒池肉林以盡娛樂其所興建者巳為太空之塵矣而惡名布在簡冊不可泯滅永為人君之鍳也上歎賞不巳命內官賜以御膳他日有所顧問亦必直言無隱久之拜吏部尚書先是吏部月選凡遇美闕輒有逹官貴人以手簡為之干請公命自尚書至于主事所出手簡悉卑于火惟驗在選之人政事美惡為優劣而擬注之衆咸恱服佐吏隱其名闕以為市不曽千餘公盡究得之其弊乃絶除中奉中夫大宗正府也可扎魯火赤宗王丑漢怙勢殺人公欲上其罪狀以申典憲而有力庇之者遂移疾去久之出為浙東海右道肅政廉訪使所部貪官汚吏或自引去或相率禱于神明幸公不至而公亦改命為大都路都總管府逹魯花赤輦轂之下素不易治公號令明肅豪右震礱而細民無愁歎之聲上臨御日久望治愈切慮吏姦有所未革民瘼有所未蘇遣使宣撫四方於是公與江浙行中書省參知政事秦公從德𬒳命往湖南廣西至湖南劾奏憲副劉某寶慶有獄纍年不决得其冤狀訖平反之至廣西民相率訴違制多取職田者動以千數劾奏司憲者人帥閫誘逹刺罕軍冒支錢糧不可勝計歷陳其弊而禁止之象州民獠雜處而村落間有能教子讀書者則為賦詩以勉勵之方𣣔大有建明俄丁內艱而還上最諸道能舉使職者公在優等特授集賢侍讀學士通奉大夫以憂制不拜改參議中書省事須免喪而就職卒辭服闋拜集賢學士資善大夫出為燕南河北道肅政廉訪使名其堂曰獨清仍作記以見其志以有所劾奏不行移河西隴北道肅政廉訪使到官未幾遽以疾不起公生於至大元年二月某甲子卒于至正十年正月戊午得年四十有三壬午返柩至大興以二月某甲子葬于苑平縣池水里雙隄之原公天性頴敏博學善為文章尤工於蒃隸真草喜蓄書世方尚浮屠家公讀唐史至䔥瑀傳書其後以貶責之愛賔客篤故舊酬酢欵洽必盡其歡至於居官涖政截然不可犯雖有強禦亦無所顧望終以此不克大行其志而天下之公論莫不歸焉天子聖明褒表而寵綏之則亦不可謂不遇矣序而銘諸使百世之下知國有直臣豈非勸忠之道哉公先娶阿尓刺氏封范陽郡夫人繼娶塔塔而氏又娶劉氏子男一人博羅貼睦尓范陽郡夫人出好學而尚志人稱其有父風女二人劉氏出也銘曰惟凱烈氏故多顯人五世而昌國有直臣公繇庶官蚤登臺府有非其類耻與為伍上方遜位議冊中宫名之未正公弗苟同人所難言事且不測言契上衷大旌其直赫赫師尹秉國之成色斯舉矣三年不鳴謳歌所歸今聖有作公乃為起爰輒爰度敷陳政理識還慮深時雖勿作或施於今越在宫僚不忘獻納寅緣貴近微言諌獵上亟為止大臣弗知徐詢其故出公所為麾之則去劾官南服寵辱不驚白駒空谷化弦易張遂子以環紬書石室掌制金鑾入侍談經從容諷議君仁臣直斯為盛際公領銓曹私謁不行公治詔獄務持其平出將使指布宣上德摧姦擊強見謂稱職瀛洲地禁退食委蛇廉車再駕風紀是司人皆傒公峻躋政路云胡不淑罹此大故丹旌搖搖靈輀既東恤典之優其終也豐儒臣奉詔揚詩墓隧彰君之仁以勸有位湖廣等處行中書省平章政事贈推恩效力㝎逺功臣光祿大夫大司徒柱國追封齊國公諡武宣劉公神道碑昔在丗祖皇帝有名將曰劉公賜號霸都霸都者言其勇敢無敵也公在羣從中次居苐二自朝廷搢紳之士下至閭巷庸夫孺子共稱之曰劉二霸都云公既佐行省宰臣取宋而㝎天下于一坐鎮湖廣者二十年以大德九年二月十九日薨于位子脫歡實丗其官公殁四十有四年是為今天子至正八年脫歡之殁亦十有三年矣監察御史忽都不花公之適孫脫歡之嗣子念祖父為國世臣巳疏封錫諡而墓隧之石未有刻辭乃上其功狀于中書以聞夏四月五日上御興聖便殿詔使臣溍勒銘公碑而脫歡之碑則別一敕前翰林學士承㫖歐陽玄為之銘臣溍謹按公諱國傑字國寶系出女真烏古倫氏逮入皇朝始以劉為姓譯語謂女真曰拙而赤台故言氏族者謂公為拙而赤台人其先居女真之泰州普一縣有世襲為千户者于公為大父譜牒弗具歷官行事莫得而詳父諱德寧國𥘉侍宗王斡真為內府必闍赤青齊王分地得承制封拜命副合刺溫管領益都路軍氏公事因家焉用公貴贈中奉大夫浙東道宣慰使都元帥護軍追封臨淄郡公母奧里氏追封臨淄郡夫人公起家從攻漣海為軍馬隊長至元六年國兵伐宋以益都新軍千户從攻襄樊分屯萬勝堡宋人祠間以萬有五千人來搗其虛堡中兵可戰者不過數百既成列公首出迎敵衆乘之以進斬首四千餘級奉行中書省檄攝萬户提軍二千略荆南歸峽諸州轉戰千餘里還與宋人戰樊城下纍以功賞銀至二百五十兩命攻樊之外郛曰東土城者公竪雲梯先登中火炮傷左股裹瘡力戰破之九年冬樞密院以聞特降金符授武略將軍襄陽援絶宋將張順張貴潜運𫀆甲以往順戰死貴獨入城所乘輪船結筏相連如城堡運機其中一夕順流而出公與諸將邀擊生得之襄樊夾漢水為城植柱中流聮以鐵絙十年春正月公與諸將以戈夾船欣流而上拔柱斷絙遂毁樊城南面木柵堰其壕塹而圍之城上矢石如雨公身𬒳數瘡日暮引退詰旦領鋭卒坎墉以登樊城既破襄陽亦降奉旨入覲遷武德將軍管軍總管賞銀百兩及錦衣弓矢鞍勒十一年秋九月太師淮忠武王伯顔為左丞相行中書省事㑹師襄陽分三道並進丞相由中道次郢州宋人築黃家涴堡以扼其衝乃俾公以三百人往奪其堡遂過郢而南宋守將趙攴義來襲其後公從丞相還斬攴義及其麾下五百人行省以聞賜金虎符轉武莭將軍進拔沙陽新城既渡江公先以戰艦五十攻陽羅堡大軍繼至攻之三晝夜其大將夏貴敗走以功賞銀百五十兩十二年春二月師次丁家洲宋都督賈似道遣其前鋒孫虎臣來逆戰公以選鋒當其前與諸將合擊之虎臣大敗十三萬人一時俱潰追奔逐北直抵蕪湖以功除益都新軍萬户仍賞銀千兩夏四月太保河南武㝎王阿术以行省平章政事别攻揚州詔公以五千人立柵揚子橋斷其餉道宋兵數萬暮夜奄至我師有備莫能入黎明開門縱擊殺獲之餘自相蹂踐而死者無數溝港為之不流以功升懷逺大將軍始賜霸都之號仍降詔奬諭焉楊州食盡主帥李庭芝挾其將姜才棄城去平章俾公分道追襲至泰州斬步卒千餘人奉旨入覲賞銀千兩及錦衣弓矢鞍鞠十三年冬十有二月詔公以元佩虎符及所管軍二萬付其子坐鎮所分城邑而别降大虎符除公僉四川行樞密院事選兩淮新附軍西征未行十四年以北鄙繹騷授鎮國上將軍漢軍都元帥佩以虎符銀印統侍衛諸軍往撫㝎尋召還賜宴命坐上親解所服御衣以衣之仍賜玉帶弓矢鞍勒鈔五千緍十五年復召至上都俾與指揮使賈某領三衛親軍一萬人北征陛辭上諭之曰朕不識賈指揮何如人邉事一付於汝對曰陛下託臣以腹心敢不盡忠竭力事若有成功歸於衆或有不虞臣自當之上壯其言大喜公因奏將佐而下設有違誤奏而後行恐失事機上曰山南安知山北事不用命者先斬後聞由是人莫敢不用命㑹天大雪人馬俱苦寒且乏食以戰車相環穴地而處撫其士卒無失所者十六年夏四月至和林叛王脫脫木犯邉公曰彼全軍而來巢穴必虛乃出其不意襲擊之俘其生口畜牧萬計脫脫木以騎兵來追至謙河溺死者過半十七年朝廷以别列迷失同知樞密院事與公同領邉事脫脫木及其黨失列乞撒里蠻等復擁兵而至公與别列迷失追擊之至唐五路北抵金山則其衆已潰散别列迷失慮有伏兵倍道南還公以孤軍殿後糧道不繼殺羸馬以食將士全軍還至和林有旨留軍五千付公鎮守脫脫木最號強盛以兵屢動而弗戢士馬離散衆皆怨忿且苦其酷虐失列乞撒里蠻等因拉殺之而率衆來歸公勞徠綏集而周其乏絶所全活數萬人十八年加輔國上將軍十九年秋七月奉旨將所部軍三千還京師父老遮馬而泣願留母行公曰此君命也再三諭遣之皆哭而去既入對上諭以日本之役師出無功將校已加黜責今命汝為征東行省左丞得專征伐對曰軍行進退事在主帥非偏禆之責乞復其職付臣調遣上從之二十年春正月建省于揚州方練士卒以俟大舉冬十月建寧新附人黃華反衆至十萬乃輟公俾與諸將往討平之福建行省左丞忽刺出引兵來㑹于梧桐川欲盡勦其餘黨公曰反者獨黃華數人悉巳伏誅餘皆脅從之衆宜諭以禍福使悔過自新限外不服誅之未晚衆稱善乃遣招諭之無不出降又聞指揮使八忽䚟統蒙古軍一萬駐于仙霞嶺所至輒殺虜平民亟移文止之人乃自安二十一年冬征東行省罷除僉㳂江行樞密院事二十二年夏改僉四川行樞密院事未行留僉江淮行樞密院事冬十月復立征東行省公仍為左丞赴闕奏事言臣今為省臣請上所佩虎符上以公方總東兵仍令佩之占城之役將卒潰散朝廷將正其罪公力請使從東征責以自效甫至揚州而征東行省復罷二十三年拜湖廣行中書省左丞湖南有大盜慿險負固日久公下車之始一鼓而殄之二十四年春皇子鎮南王征交址公𬒳㫖給其資糧器械民不擾而事集秋九月從王進兵至其境上而還公所紘湖南廣西與廣東壤地相接廣東群獠率依山林而居其奠謂之大獠亦有部伍約束僞署稱號有總管總轄提督書司之類人習戰鬪又善設伏衝突出沒無時公甫至靜江而廣東有警乃率精兵舟行千五百里抵肇慶之四㑹使覘賊形勢則鄧大獠三千人居前劉大獠千五百人居後相距三十里以為掎角官軍不滿千人公乘其無備以輕兵倍道而進兵之所向先其易而後其難不再宿盡拔兩寨殺獲之餘脫去者無幾械首賊至肇慶斬之同惡皆杖死改資德大夫行尚書省左丞時鎮南王深入交趾聲問不通二十五年夏四月命公統諸翼兵萬人迓之至靜江聞王班師乃身詣思明州而散遣部伍各歸其營公還未幾衡永寶慶武岡群盜並起聚於四望山公率四路官兵民義捕首賊斬于軍前餘黨多奔竄而去乃度要害之地得間田三萬餘畒創立三屯衡曰清化永曰烏符武岡曰白倉各置軍五百人給以牛具種子教之耕作而以農隙閲習武藝向之奔竄者稍出而自歸有家則令復業無恆産則分隸諸屯歲得穀三萬餘石倉廩實而盜賊化為良民父老為立石志其事曰三屯記凶徒掠子女姦吏殘民事覺取其尤無良者杖殺之境內肅然既而盜賊起有旨俾公以蒙古漢軍三千㑹江西行樞密院討之公擊破蕭大獠三千人于桂陽之陽山遂至賀之懷集攻拔徭人諸寨二十六年春駐兵廣東行院違期不至公獨出兵擊破閻大獠於廣之清逺曽大獠廖大獠衆萬餘人巳降復叛乃回軍擊之三月至懷集生擒蕭大獠擊破嚴大獠五千人夏五月曽大獠復以五千人據德慶之金林山公直趍其處分兵斷其徑路賊不敢出乃伐山通道盡殱其衆退屯封之開建還次賀州士卒冒炎瘴疾疫大作公親臨視救療不憚其勤以道州南北之衝便于控制乃移駐焉俄報獠兵二千來犯州境公掩其不備殺戮過半捕斬陳大獠等十八人梟其首于州市郴之興寧桃寮赤水山最為險絶宋人嘗置飛龍軍以鎮之軍廢巳久賊衆千餘聚其處二十七年春公直搗其巢穴俘斬不可數計土人為之向導者皆論死尋移軍郴之桂東聞獠兵圍吉之龍泉禾源寨下令征之獠屬皆謂彼自有任其責者况兵家利鈍事難遙度乎公曰誅㬥救亂期以安靜四海安可妄計彼我利鈍而縱敵生患乎乃偃旗息鼓以輕騎夜發越翌日至其處賊衆甚盛見公兵少又無旗鼓忽不以為意兵既交公以以十騎陷陳衆乘之賊大敗俘斬五百餘人下令以賊所掠子女歸其父兄皆舉首加額曰寨中𬒳圍久暮夜不審官軍所從來疑為神兵豈知是湖廣劉左丞軍馬乎焚香羅拜而去鐘大獠聚其衆一萬於南安十八來深山公約郡守將分軍為二道乘大霧深入賊所置營壘彌滿山谷不意官軍猝至殺獲之餘悉自相蹂踐而死甫回軍桂東而獠兵犯衝之酃縣民廬官𪠘焚蕩無遺兼程赴之而賊巳遁去遣人迹之乃在龍泉大井山遂分軍馬三道公出中道度雞冠山石路峻絶步牽馬冒雨而進殺賊衆無得脫者三月還鎮道州凡行省所統四道及兩江八畨溪洞蠻夷長官皆來禀命焉秋八月全永二州有劇盜勢張甚某州逹魯花赤秃魯戰死公提兵直抵永之東安前所招降賊酋服公威信咸願從軍公撫而用之擒首賊斬于市升本省右丞還治省事廣東群獠乘間而出犯廣西湖南公復往道州要束木為平章恣為貪暴怒公不附巳其意巨測公謂掾屬許燕臣曰方今權臣擅命包藏禍心樹立私黨同惡相濟儻有使命安知其真僞敢不就死乎燕臣曰昔唐之叛臣矯詔賜顔真卿死真卿察其為詐而呵叱之今萬一不幸有此公豈無一言而束手就縳乎因勸公自陳于臺府以逹上聽姦計訖不得行二十八年要束木伏誅拜公湖廣行樞密院副使公還視事而盜起廣東乃復往道州要束木之黨八八為道州路總管敗政虐民贓汚狼籍公劾治其罪死於獄中士庶莫不稱快先是公之軍功要束木皆抑而不逹二十九年春知樞密院暗伯等始以上聞且言公嘗出私財以犒軍奉旨賜玉帶一銀伍伯兩三十年秋七月入朝上諭旨于中書樞密謂湖廣咽喉重地他人無足倚仗者其令劉二霸都常坐鎮之拜榮祿大夫湖廣安南等處行中書省平章政事統蒙古漢軍溪洞土兵十萬南征交祉仍别鑄行中書省印令佩之以行公奏乞以親王一人同領軍務上曰蛇一首兩尾則能行兩首一尾則左右前却將在軍中專制其事可也公力以為請乃命宗王亦吉列歹董其師公奏頃年兩征交祉以總兵官各持己見是以無功上特為降詔宣諭凡號令進退賞罰一决於公宗王受成而已三十一年春正月建省于靜江詔賜錦衣一襲二月諸軍畢集部署已㝎聞國有大故事遂中止還軍武昌夏四月成宗皇帝嗣位立行樞密院于衡州復以公為樞密副使秋七月盜起江西犯潭之攸縣公親引兵擊走之而殺為賊向導者辰州古之黔中溪洞群蠻狑狫猫徭種類不一喜則人怒則獸叛服無常國朝𥘉㝎江南又巴諸洞向進益等來欵附皆授以虎符充溪洞安撫使其後進益兄弟自相魚肉安㝎諸洞又竊出攻澧州麻寮等寨泊崖洞田萬頃楠木洞孟再師侵辰州詔合湖廣四川兩省兵力以討之萬頃出降乃致之闕下詔釋其罪升泊崖寨為施溶州以萬頃為知州事久之復叛去行院調兵進討萬頃以三千人來拒戰官軍為其邀截十亡三四辰溪縣逹魯花赤嗒刺赤死之行院宣登極赦書招諭萬頃再師及其黨桑水溪魯萬丑皆不應樞密院官迭出涖師又以監察御史督之訖無成功賊勢猖獗愈甚朝廷以為非公莫能㝎能亂乃以其事諉焉九月公至辰州萬丑據㑹溪之上流水陸並下官軍以為水湍駃不能為力千户崔忠信百户馬孫兒死之行次木溪萬丑復以千餘人來拒敵公親率大軍遡流而上萬丑復以二千人繼至公命以步兵夾舟師衝擊之百户李旺率敢死士陷陳身中十二箭戰益力諸軍繼之賊勢披靡追至石農次其地極峻險賊衆雖有降者而首賊竟不出公駐獨木橋命伐山通道以便進兵冬十一月行省平章政事哈刺哈孫答刺罕奉旨來濟師于是㑹諸將各陳攻取之榮咸謂萬頃以施溶為腹心石農次三羊峰為左右臂先斷其臂而搗其腹心可也公從之既破石農次遂下施溶州尋進攻諸寨賊衆以萬計地方千里公不憚險逺與軍士緣崖攀木魚貫而上又用以蠻攻蠻之策檄召又巴懷德府安㝎上溪等州土官懷之以恩而震之以威大獲其用萬頃等力屈就擒斬于軍門餘黨悉平父老為立石志其事曰平蠻記元貞元年春正月詔併行院合于行省即軍中拜榮祿大夫湖廣行中書省平章政事公已師出半年幸已告成東作方殷宜縱民歸耕以厚根本乃班師宋末溪洞邉界居民得選其強壯自備兵仗以屯守防遏澧州曰隘丁辰州曰寨兵公悉復之又以茶陵桂陽柳衡道州地連江西蠻獠數為民患士卒疲于奔命乃列置㳂邉戍柵三十有八南北幾三千里守備既嚴賊不能越夏六月召見賜玉帶錦衣及弓矢鞍勒倍還其犒軍之費為鈔四萬緡將校轉官有差𥘉左江土官黃聖許內附賜以金符授上思州知州而聖許雄據一方僞立號名結連交址以為外援聚衆二萬劫掠溪洞山寨九十有二聲言將取雍州朝廷嘗命公與樞密副使程鵬飛統兵二萬討之而鵬飛自言不勝其任至是公獨率大軍深入賊境聖許徑健趫捷善用標鎗藥弩負險拒戰交趾援兵亦在焉公身先士卒與之共舊無不一當百蠻兵挫衄聖許走保象山象山綿亘數十里南與交址接竹樹蒙密多巨象惡獸公度其形便列柵而圍之聖許妻子及其黨多就擒獨聖許逃入交址公飛三書于交址為之開陳禍福詞嚴義正纍數千言交址得書惶歡請命而聖許竟莫知所終夏四月師還公奏請以聖許所遺田土令鄰境慶逺無生業撞入屯田其中上從之冬入朝賜衣帽弓刀鞍勒禮遇益厚大德元年還治省事五年夏再入朝前荆湖占城行省左丞劉深等合五省軍二萬征八百媳婦道出八畨八畨古之羅氏鬼國人性剽悍地多良馬蠻酋蛇莭水西上官阿那之妻也有權略詳蠻咸聽其命水東雍真葛蠻土官宋隆濟怒徵其丁夫馬匹遂紏蛇莭舉兵反攻圍貴州官軍為其所邀截十喪八九烏撒烏蒙東川芒部望風皆叛踰年兵連不解冬十一月上親命公與侍衛親軍都指揮使也先忽都統軍二萬往討之仍降詔宣諭一切事冝並從劉二霸都區處十二月至嶽州六年春正月至沅州二月與四川宣慰使汪惟勤㑹于播州遣使招諭不應俄以兵十萬奄至公率諸將分道急擊之所向輒克遂長驅入賊境有㫖以時暑方熾糧運未集姑息兵以俟再舉公還駐兵思播二州冬十月以蒙古漢軍三萬思播土軍一萬分道並進賊兵驍鋭官軍小不利公命軍士各執木盾加釘其上待陳既合棄之而僞遁賊馬疾馳勢不能中止遇釘皆蹶縱兵乘之賊衆大潰蛇蓈遁去公明于斥候軍行遇林木蒙密必連發三矢伏兵以公知其點計皆莫敢動前後四十餘戰諸蠻氣沮乃多出降七年春二月公追及蛇莭于何加寨窮蹙就擒公復趍水東擒隆濟等十餘人悉斬之西南夷乃皆率服秋九月入覲奉旨出征官吏及蠻夷入貢者並許預宴於殿庭特賜公玉帶錦衣弓刀鞍勒鈔二萬五千緡仍賜還賞軍銀一千九百兩鈔一萬五千緡時方遷除天下行省官獨公依前湖廣行省平章政事仍陟其階光祿大夫將校進官有差公丰姿魁偉器度宏廓沈厚寡言喜怒不形于色膽略過人精於騎射而讀書手不釋卷推見古今敗得失輕財好士知人善任使由是人樂為用至于縱橫制變神機明决雖古良將殆無以過也以屢犯煙瘴遘疾久而增劇本省平章政事卜憐吉䚟暨僚佐來問所欲言公曰交址不庭吾屬之耻儻不不即死誓殄兹醜虜廓清海表歸報天子他無足言也語畢而逝享年七十有二以某年某月某日葬于某州某縣某原贈推忠效力㝎逺功臣光祿大夫大司徒柱國追封齊國公諡武宣娶古氏從封齊國夫人子男二人長脫歡榮祿大夫四川等處行中書省平章政事後公三十一年薨贈協忠勤力威逺功臣湖廣等處行中書省平章政事柱國階如故追封齊國公諡武桓次脫出資善大夫遙授湖廣等處行中書省左丞八畨順元宣慰使都元帥孫男一人忽都不花今為大夫嶺南廣西道肅政廉訪副使女二人明安倫適平陽萬户分鎮武昌鄭濤封某郡夫人完者台適中書左丞相太平封雍國夫人曽孫男幾人伯顔帖木兒安童𥘉世祖皇帝命公以元佩虎符及所管軍付其子乃令猶子漢臣權領其軍至伯顔帖木兒乃以適孫正襲為武德將軍益都新軍萬户分鎮某所女幾人臣溍竊惟世祖皇帝撫運膺期統一宇內嘉與群臣保其盈成然以備豫不虞國之善政遐陬裔壤民夷雜處非勳民威望之素著不足以弘逺略而弭姦萌故公自飛渡長江之後國家有事于四方固未嘗不在其中獨坐鎮于湖廣為最久使人安于田里以無負乎朝廷委任之意臣溍既承詔叙次公之行能勞烈至于湖廣之事雖微必書所以彰先帝知人之明且以見公之盡瘁事國能以功名終也銘曰聖作物覩四方攸同百川於海靡不朝宗孰云江漢南國之紀誕啓睿圖于彊于理中權之重上相是臨前茅後徑材武如林填然鼓之萬馬齊作允毅劉公百鷙一鶚鉤援臨衝貫勇先登降臣按甲獻其名城靈旗所指勢猶破竹捉鞭宵濟若踐平陸舳艫千里建瓴而東摧堅擊強蹶其前鋒臨流不渡分兵拒戰有截淮浦扼其後援奏凱而歸薄言告成俘厥寶玉陳于大庭第功行封勞還飲至式均其逸保夫祿位公獨賢勞經營四方以佐天子內修外攘晚由樞廷峻躋政路出殿南服資其卧護愚民無知弄兵跳梁山猺洞獠出沒不常亦有大酋久效官使朋梟友獍相挻而起公不遑處肅將明威搜原剔藪獮取無遺思患預防開屯列柵無使窺覦或伺吾隙蠢彼南交昏迷不恭公弗少延卒此伐功逮今聖時梯航稽首餘烈在人徐觀身後公則逺矣有子有孫有蔚其材易武以文請命外朝問銘太史大書焯實匪曰虛美朝列大夫僉通政院事贈榮祿大夫河南江北等處行中書省平章政事柱國追封魯國公札刺爾公神道碑今上皇帝至正元年詔贈故朝列大夫僉通政院事别里哥帖穆爾為資善大夫河南江北等處行中書省右丞上護軍追封魯郡公八年加贈榮祿大夫河南江北等處行中書省平章政事柱國追封魯國公嗣子資政院使臣朵爾直班與大司徒臣雅普化同侍上于經筵十年四月十九日上復用臣雅普化奏命翰林侍講學士臣溍銘其神道之碑别敕治書侍御史臣期頥篆其額以賜臣朵爾直班使書而刻焉臣溍謹按史臣危素所述公行狀公諱别里哥帖穆爾系出扎刺爾氏六世祖諱孔溫窟窪事太祖皇帝從征泰疇蔑里期奈蠻諸部奈蠻已降而復畔往討之太祖馬􅉵遂以巳所乘馬奉太祖步戰而死贈推忠效節保大佐運功臣太師開府儀同三司上柱國追封魯國王諡忠宣妣闊䕫追封魯國王夫人五世祖諱木華黎從太祖皇帝滅克烈王可罕太祖既踐天位以為左萬户從破金入燕專征遼東西諸郡詔授太師國王都行省承制行事建牙于燕以經略中原趙魏齊魯晉秦之地悉平贈躰仁開國輔世佐命功臣太師開府儀同三司上柱國追封魯國王諡忠武妣普合倫追封魯國王夫人髙祖諱孛魯嗣國王奉太祖皇帝命帥師取西夏銀肅二州走武仙于河北降李全于山東贈純誠開濟保德輔運功臣太師開府儀同三司上柱國追封魯國王諡忠㝎妣奔只海追封魯國王夫人曽祖諱速渾察嗣國王從太宗皇帝攻鳯翔破金兵于河南攻宋棗陽入郢州贈宣忠同德翊運守正功臣太師開府儀同三司上柱國追封魯國王諡忠烈妣氏秃木忽都追封魯國王夫人祖諱乃燕性謙和而好學以賢能稱憲宗皇帝擇忠烈王諸子中可襲爵者深屬意焉力辭曰臣兄忽怵池長上曰朕固知之恐其柔弱不勝重任爾叩頭涕泣卒請以王爵歸其兄而代之理軍國庶務忽林池嗣為國王事無巨細必咨而後行居誨群從子姪曰昔我先太師國王躬擐甲胄出入矢石之間四十餘年乃集大功賞延後裔恩至渥也爾曹慎勿驕逸以墮前人之令名其敬戒之哉𥘉世祖皇帝在潜邸與之論事敷陳大義多所開悟援引典故尤習上海以為可大用因稱之曰薛禪者華言大賢也竟未及用而卒甚悲悼焉今贈中奉大夫遼陽等處行中書省參知政事護軍追封魯郡公妣兀魯氏鎖台追封魯郡夫人考諱碩德丗祖皇帝踐阼之𥘉自遼西召入宿衛與語大恱顧謂近臣曰碩德通敏如此乃燕有子矣命典朝儀宗藩戚里爭頌弗决者必使决之咸服其公正上嘗問右丞相魯國忠憲王曰卿族中可繼卿者為誰對曰性行純雅智辨明正無踰碩德上深然之㑹始建通政院耶命以嘉議大夫同知院事考地里之逺近以立傳置差民力之髙下以賦財用一日所奏數事無不聽納因言遼陽女真之東斡拙吉烈滅二族之人數入寇內地冝遣親臣設驛以通之上難其人僉言碩德元勳世胄識慮深長可使也上恐其憚于行召問之對曰先臣當國家肇造之𥘉不避鋒刃萬死一生以身徇國陛下不以臣年少愚戅俾效驅䇿臣請行上喜賜御宴對衣以遣之女真舊土有水逹旦萬户府兵民乏食廷議賑以衣糧有司廢格不下群訴于前亟令追所侵匿以給之人賴以全者甚衆東征元帥府道路險阻崖石錯立盛夏水活乃可行舟冬則以犬駕杷行冰上地無禾􅎟以魚代食乃為相山川形勢除道以通往來人以為便斡拙吉烈滅僻居海島不知禮義而鎮守之者撫御乖方因以致寇乃檄諸萬户列壁近地據其要衝使諭之曰朝廷為汝等逺人不霑教化自作弗靖故遣使來切責有司而存恤汝等令安其生業苟能改過遷善則為聖世之良民否則盡誅無赦由是脅從者皆降遁于島中者則遣招之第戮其渠魁餘無所問宋之朝士有以使事留京師而不肯易其衣冠者坐徙開元適與之遇為言于上得自便後更見識擢為文學侍從之臣還朝上勞之曰碩德不血一刃而使一方遂安不負朕所委任矣賜王頂笠連珠束帶且曰他日思所以處卿也扈駕親征乃顔戰屢捷所俘獲輒以賜之宗王居西域者有異謀上聞之召問曰卿東行甫還得無勞乎然非卿孰可為朕使西方者對曰臣不朕幸以勳閥之裔為國世臣邉陲重事故當任責賴陛下威靈東土之民今己馴化願備一介之使宣布德意于西人上尤喜賜宴加幣以餞如東使時西域知其世家子又聞其賢迎勞甚恭乃諭密旨為道太祖聖訓及前賢之嘉言詳明激切發于至誠咸歎服曰真天使也既還中道屬疾有旨趣之入見問以西事奏對甚悉上顧左右曰汝輩苟出使當以顧德為法特賜珠只孫衣以旌之疾竟不起今贈推忠宣惠寧逺功臣中奉大夫遼陽等處行中書省參知政事護軍追封魯郡公諡忠敏加贈資善大夫嶺北等處行中書省右丞上護軍功號封諡如故先是嘗獲玉璽其文曰受命于天既壽永昌蓋歷代所寶傳國璽也疾亟未及上獻夫人甕吉刺氏脫脫真因御史中丞崔公或以進于徽仁𥙿聖皇后既而成宗皇帝入繼大統以為茲實受命之符厚賚焉今追封魯郡夫人公蚤孤太夫人教以國書有微過必責之輒欣然而改刻意于學孜孜不倦甫成童太夫人有疾衣不解帶者旬月藥必親嘗成宗遣尚醫視之或言昔人有刲股療親疾者公聞之則退詣私室刲肉七臠以和藥疾遂愈公丰姿凝粹而器量宏逹嘗燕客僮滌玉杯誤墮地而碎坐客驚視而公神色自若衆莫不歎服逮事仁宗皇帝眷遇尤渥擢居通政俾世父官上嘗問周文王父母及其所以興侍臣未有對者公言之甚詳上為之俯聽賜以巵酒奬諭之曰卿蒙古人中儒者也公于先世所分食邑平其徭役而恤其貧乏在官恆以律身報國為務論議可否不避嫌疑居五年而終于位公生于至元二十三年月日薨于延祐四年閏月日享年三十有二訃聞上當寧而歎曰天胡奪豫良臣之遽也命􅉠以鈔萬五千貫仍降璽書存護其家公先塋在興和遼陽道逺弗克以昭穆序葬遂以其年三月日奉柩葬檀州仁豐鄉潮水西吳嘉㑹配阿兒刺氏伯篤都弥實追封魯郡夫人加封魯國夫人子男一人朵爾直班也公殁時方在襁褓中既長力學自立由尚衣奉御授工部郎中遷太府少監擢監察御史入奎章閣歷供奉承制侍書學士遂為翰林學士遷大宗正府也可札魯忽赤出為江北淮東道肅政廉訪使江南行御史臺治書侍御史江西行中書省左丞入為資正院使拜中書省參知政事進右丞遷御史中丞改江南行御史臺御史中丞拜遼陽行中書省平章政事以太常禮儀院使召遷中政院使今為榮祿大夫資政院使提調宣文閣知經筵事兼虎符海西遼東道哈思罕等處打捕鷹房怯憐口萬户府逹魯花赤提調拱衛司事女二人長適遜都氏實理由𥙿宗皇帝位下怯薛官為資善大夫同知徽政院事其先曰赤老溫與忠武王同事太祖號四傑者也次適于弥氏勃羅帖穆爾朝散大夫同僉太常禮儀院事孫男三人鐵古思帖穆爾篤堅帖穆爾渾都普化臣溍竊觀自昔受命之君必有不世出之臣任股肱心膂之寄以弼成大業故其子孫能與太平守文之王共天下之福惟札刺爾氏有大功于帝室世享王封大參始敦行禮讓而不敢先其兄右轄辨章之世其官又止于一命由其有而不居故其積也愈厚餘慶所鍾在于後人是故資正公以清忠粹德昭受上知致位一品疏恩三世兹又賜以碑號昭示罔極幽光潜德暗然日章久欎必發理之常也臣溍鄙陋荒落不能敷揚聖意褒大遺烈承詔書辭無任戰栗銘曰天啓興運篤生元臣勳在盟府慶流後昆于穆魯公逺有系序四世五王逮公大父遺榮弗居以奉其兄不世其爵世其忠貞傳子及孫乃躋膴仕守夫一官再世不徙公少恱學以至孝稱淵乎雅度喜愠不形材諝則多小試輒效人方傒公謀謨廊廟嗇不使年遽以考終委祉後賢大亢其宗寵靈所加禭以衮職刻密為章告于玄宅有開其先自王而公有復其始復兹故封申錫頌辭用垂不朽河山之誓相為永久金華黃先生文集第二十五卷終
