body:
  text: 序臨川危素編次番昜劉耳校正教苑清規後序天台教苑清規舊嘗刻置上天竺山之白雲堂後燬弗存今圎覺住山慶公懼久將廢墜乃取故所藏本重加詮次正其舛訛輔其闕軼而參考乎禪律之異同捐巳槖復刻焉昔者竊聞之儒以禮立仁義離禮于仁義不可言儒佛以律持定慧離律于定慧不可言佛故雖佛以一切種智攝三界必先用戒菩薩以六波羅密化四生不能捨律蓋自中土有佛法以來僧多居於律寺至百丈始别立禪居此清規之所由作也且古今殊時人情亦異帝王制禮不能無所損益佛氏之為法其何獨不然律儀如聖人之有經禮雖非後世所便習而未嘗不傳于今清規如先儒之有家禮雖皆一時所訂定而未嘗不本于古百丈創為清規以輔律而行天台大師兼善毗尼其後人亦因叢林之日用而折中之以匡持其教今所謂教苑清規也歷歲滋久諸方所守百丈遺法巳互有不同山家冝有不能與之盡合者若夫通其變而以時措之其致一也慶公方究心淨業而能垂意于威儀節文之細如此內外交相飬之功可謂兩盡之矣非來者所冝取法歟是用不揆其凡陋而為之序系諸篇末云爾圭上人詩集序豫識圭師于南湖時師方以苐一座尸教事學徒常數十百人豫間從旁聽其談性具之旨娓娓千萬言珠貫而縷解固已心竊異之而未知其兼善乎丗諦文字也它日師示豫以所為詩如干篇且徴豫序其首豫為之玩諷纍日其風容色澤恬緩而豐暢眀金綷羽出媚林谷非若夫空株敗枿歘生之芝瞥過人目而已蓋師之先君子曰碧峯李君當宋之季嘗鼓其辭鋒三簉于春官而伯氏文叟亦用文墨角逐踵武取鄉薦膏潤所𬒳華葉沃如也豈師之去父兄雖既久而習氣有未忘耶豫聞衡台之書冨埒册府業之者必章剖句析以極其趣又必括之於一心導之于萬行以要其歸非有強力敏智沒世不能卒其學自夫殊宗異派不得以兼通而奚暇搖豪擲簡放浪乎水情雲態間哉寓無礙辨于世諦語言師之為能則多矣雖然夫工射者之控弦注羽未始不志乎巴蛇九日而穿楊貫蝨要亦同盡其彀是故解牛之為技飬生之為道一也師之為詩技歟道歟豫不得而辨也而安能序作者之意乎姑置豫言篇端覽之者無規規焉于詩乎求之可也會上人詩集序為浮屠學至言語道斷而止于詩何取乎然在其教中一切法皆佛法世諦文字固與實相不相違背也是以昔之髙人上士逰戲乎山光水影之間以陶寫其性靈者比比有之而於今為尤盛就豫所識而言若元菴會上人又其卓然者矣始豫侍坐于南陽仇先生而語為詩先生稱今之詩僧必曰元菴後十數歲與上人相見鳯凰山下獲觀吳興趙公所書上人詩如千首豫嘗評其人峭然獨立如霜松雪柏而其發於清辭秀句如青田露寒白鶴一鳴也今年秋客南屏乃得因蜀郡虞公所序上人詩集如千卷而觀其平生所存之槩益知上人之呻吟嘯呼以簸弄萬物于煙雲寂寥之鄉者直其寓耳上人契心印于佛心慧禪師而薾然退處下列衣壞食色瓦鐵廽睨夫猊床白拂髙談人天之表有不以屑其意者其度越流輩獨詩云乎哉顧豫適逰乎方之內於上人之道未能盡大觀而無憾也凡古今為詩之變虞公既備論之是用推本其所以為詩者在此而不在彼後之續髙僧集者或有考焉覺隱文集序覺隱道原師逰學于永康胡先生而得法于徑山佛鑑和尚凡所撰著志在乎衛道而未嘗徒作自其同袍至于章甫逢掖之士莫不有味其言髙君士眀始以其文與天隱至公之牧潛藁笑隱欣公之蒲室藁會稡成編號三隱集刻而傳之木巖植公以為序牧潛蒲室者皆當世文章巨工而覺隱未之有序爰屬豫題辭其篇端夫三隱之文鼎立天壤間非可優劣豫何人敢以鄙陋之言自附于大人君子之末乎然竊觀師之論文命意必欲其合乎道遣辭必欲其順乎理故其比事連類託物引喻娓娓千百言咸有輔于世教而于儒釋氏同異之辨尤致意焉蓋世出丗間為法不同為教亦異而于此乎于彼乎受其教者均是人也萬人一心萬心一理則道豈有二哉譬如人有所適飛橈鼓楫無慕乎車之安駢衡方軌無羡乎舟之利所趨之途不能不異所造之地則同因其所造之地同而疑其所橾之器可以互用遂指虞姁工倕之所作為車奚仲吉光之所造為舟則過矣非逹人大觀孰能會其異而要其同乎天隱嘗謂三學浮屠各私其教為兒戲之爭市井之閧笑隱亦謂禪者之説與止觀同今之縱傲自得者漫不知為何事而曰吾祖云吾祖云是猶同中之異耳儒釋氏之徒各私其教縱傲自得者抑又異中之異也師獨汲汲焉務挈而合之以求夫異中之同其為衛道之功不既大乎師置身寂寥枯稿之鄉而其才思飈馳水涌外發難遏所為歌詩率皆清麗峻拔可喜覽者多愛其辭之工而未必識其意之所寓今不暇論姑序其有關于教道者俟世之善知識詳焉師名本誠道原字也族某氏嘉興人紀夢詩序自先王夢祲之法不傳後世史家所記夢之竒驗可徴不誣者固多而人莫不有夢不必皆可驗於事也重紀至元之元年春豫忝以非材備貟國子學官其年秋挍文上亰夜夢觀新進士上謝恩表褎然出班前立者諸生遜都思其氏拜术其名眀善其字者也子既竣事而歸則聞眀善已預在亰薦名既以上于春官而科舉事遽廢豫頗疑夢之不足徴眀善退自有司歸就弟子列尋以憂去服闋而來私試數占首選時豫猶居國學其夢如𥘉私試之法以入學之先後貢十人而止眀善適在十人之外方待年而未及釋褐豫益疑夢之不足徴及豫請外南還而中書用臺臣之請計奏被上旨復以科舉取天下士豫亦復夢如𥘉至正改紀之年也是歲眀善果再薦于亰師二年春以正奏名入對大廷遂為進士苐一豫夢于是始驗其兆見于科舉將廢之𥘉其應在于科舉復興之後天者素定久矣夫豈人力也哉蓋古者卜以三兆筮以三易必參之以三夢夏曰致殷曰觭周曰咸陟其術皆亡粗可考者獨周有占夢之官所掌六夢一曰正二曰噩三曰思四曰窹五曰喜六曰懼而六夢之占有二其善而吉則以獻而歸美于上其惡而凶則贈送而去之豫向之所夢以為噩歟則眀善族系之貴學殖之冨溷以一第不足驚愕也以為思歟則六館之士數百人豫所思者不止明善也以為寤歟則眀善之氏名非豫覺時所嘗道也以為喜與懼歟則豫于眀善未嘗喜其得而懼其失也無所感動而自夢殆正夢歟兆見于科舉之將廢而夢固不惡應在于科舉之復興則夢可謂吉矣時之文人才士內交于眀善者聞豫言往往為詩以紀之好事因會稡成卷求豫志于卷首以實其説豫聞詩言牧人之夢其占以魚為豐年旐旟為人衆釋之者謂此即所獻之吉夢也矧今聖神在上文運方新其事有大于牧人之所夢者顧豫疏賤不得如古之牧人獻其吉夢而歸美焉若夫諸公嗟嘆之不足而永歌之則小雅詩人之意也雖然廢興得失之故固出于天者之素定苟未能修其在人而徒欲取必于在天可乎孟子曰命也有性焉此豫與眀善之所夙講不敢以瀆告之也贈余生詩序昔西山蔡氏善言地理先師朱子深有取焉而朱子之門不必人人皆西山也蓋地理術者之事以儒者而兼通其説特博聞多學之一端耳曷嘗以是為學者所急乎後生小子群居終日視記誦詞章為不足為而獨以不知地理為耻探竒勦説慿虛造言人自為家務以取勝俗習所尚相師成風抑又西山時所未有也觀其論辨馳騁出人意表誠若可喜是以孝子慈孫甘受其欺而曽不悟反疑術者未覩此祕往往委已以聽焉甚者變置百年之丘壟使先世體魄不得寧于地下有人心者所不忍言豫之病此久矣故先人之葬凡擇地一付之術者士友或來咎豫不學地理而輕信人言且為圗説以見告其圗則一岡一阜悉加以醜穢之名其説則旁引曲譬抑楊開闔詭怪莫測每更端必助以嗟哉悲夫可為太息流涕等語大抵皆埸屋中譁世之浮詞豫固已厭其強聒逮今十有五年其説訖無所驗而術者之言可徴不誣豫于是益信地理果非學者所急欲擇地但當擇術者而已蘭溪余生今之所謂術者而樂交于吾徒持所得贈言若干篇求豫為之序豫方懼書生以遊談亂其術余生乃不自以其術為可恃欲藉諸公之餘論以收名定價于一時豈亦未能免俗乎余生誠能益進于其術而無速于自售俟有如西山者出徐起而就正焉彼沾沾動其喙者將自息矣余生之術不患其不行也鄙野之言不足序作者之意同志之士倘有槩于心乎平宋録序平宋録者紀淮安忠武王平宋之功也王廟在杭城燬于災監察御史言王宣勞戮力弼成正統功莫大焉宜令有司復其祠宇仰副國家崇報之意御史臺上于中書省以聞已𬒳旨可其奏而江浙行中書省亦以為言乃命中順大夫本投下諸色總管府逹魯花赤普化乘傳而南與行省官同涖其役廟之告成也行省既請胙王以大國錫銘于石章且俾儒司刻平宋録于杭學以侈其傳按録之舊文與敕賜王廟碑開國元勳佐命大臣碑皇朝經世大典所序五戰間有不能盡同二碑大典皆史家承䛇撰著今悉取正焉它書有可證據則增入有當參訂則附注餘無所考者並存其舊以俟史官之裁擇王世胄之懿官伐之隆德器之宏勳烈之茂則有制詞及碑文在謹以冠豫篇端兹不敢贅述也李節婦詩序節婦馮氏名易安大名南樂人山東東西道提刑按察使開之孫湖州録事汝弼之子武寧縣尹李君如忠之繼室也李氏故為金之宦家今占籍東平汶上髙祖曰仲略山東路按察使曽祖曰景雲御史中丞祖曰先永昌令父曰定國朝至元間從下江南因寄居于越君𥘉娶探馬赤氏有子曰某生十年而探馬赤氏卒録事君時仕越之管庫以節婦歸焉僅再期君遽以疾卒大德某年四月某甲子也君垂歿時語節婦曰吾已矣爾其奈何節婦引刀斷髮誓靡它方是時節婦年二十有七其子二人任甫一歲伏方娠後兩月始生汶上之族及探馬赤氏之家聞君死多留資合內外屬南來悉取其所蓄聚而携其子任以去節婦一聽其所為弗與較四壁蕭然室惟兩柩而已閭巷之人莫不哀之節婦有姨母事山隂尉李君良佐賴其力奉柩葬城東北蕺山下録事君念無以資衣食將嫁之節婦瓜其面流血以死自誓録事君知不可奪為飬女求贅壻以周給之蓋其嫠居者十有九年二子既克有成立乃以泰定元年春遷李君暨探馬赤氏之柩返葬汶上先塋之次中書平章政事王公實為之銘于是南北聲問阻絶巳久宗􅊚里黨意其必巳更適人或疑為死矣聞其來皆大驚太息至泣下節婦俾任留奉丘隴而與伏來越上以存江南之祀一時名人多為賦詩屬豫以序豫惟方今德教流洽俗化淳美女婦能以義自守而見褒表者無地無之其遭值變故始也能居人之所不堪終也能伸已之所欲為若馮氏者幾何人哉庸直書其事于卷首俾覽者知其賢與它見褒表者固不侔也贊美之辭則篇什存焉義烏志序義烏自秦為縣歷漢唐訖五季見于前史與它圗記者或總序一州一郡或略舉一事一物其詳靡得而周知宋元豐舊志出于縣令校書郎鄭安平而所紀下及南渡以後非必其本書咸淳續志出于溍之族曽祖漕貢進士應和手藁具在而别本互有異同蓋方纂輯而未經裁定亦非其成書矧自國朝統一函夏縣地入於職方巳七十有八年官府之建置人材之登用風俗之趍嚮戶口之名數貢賦之品目悉無所登載可不謂闕典歟為政者迫于簿書期會米鹽碎務未遑有所咨訪也今縣大夫操約馭詳而事無不理爰以暇目詢山川形勢地之所生語言土俗博古久逺之事得元豐咸淳二書屬溍重加詮次以傳溍衰朽荒踈無能為役乃俾王生禕朱生濂合二書而參之郡乘刪其繁冗訂其舛誤法當輔書則引類相從而增入之附以辨證釐為七卷仍以圗冠于卷首溍既辱視其成因為之序會兩生並赴秋闈遂俾傅生藻相與校正歸于執事者而刻焉見大夫逹魯花赤儒林郎亦璘真畏兀而人尹承直郎周思泰許州襄城人貢侍郎文集序延祐𥘉元故內翰貢文靖公較藝江浙鄉闈溍以非才誤蒙薦送忝綴末科公既入居文學侍從之列而溍隨牒逺方浮湛州縣晚乃登畿將以門生禮見則公捐館舍已久猶幸與公仲子侍郎公託契家之好而締文字交侍郎由供奉翰林外輔而復以元官召纍升次對溍適自退休備貟勸講同官為寮日相欵洽屬有史事罔敢不親其職業辰入酉出無須臾間于侍郎之髙文大册長篇短章雖時獲窺豹一斑嘗鼎一臠終未能盡大觀而無憾也溍以老得謝歸卧林麓侍郎方峻躋臺省出駕使車相望日益以逺諸生有辱侍郎謂之進而旅于門下之士者彚次其文集為若干卷持以示溍始遂其快覩而厭飫其雋永之味焉昔之論文者蓋曰文之體有二有山林草野之文有朝廷臺閣之文夫立言者或據理或指事或緣情無非發于本實有是實斯有是文其所處之地不同則其為言不得不異烏有一定之體乎侍郎蚤從文靖公至亰師而與英俊並遊于成均逮釋褐授官而踐敡中外在朝廷臺閣之日常多故其藴蓄之素施于䛇令則務深醇謹重以導宣德意而孚衆聽施于史傳則務詳贍精核以推敘功伐而尊國藝施于論奏則務坦易質直以别白是非邪正利病得失而不過為矯激他歌詩雜著贊頌碑銘記序之屬非有其實不苟飾空言以曲徇時人之求至于宦轍所經名區勝地大山長溪穹林邃壑風嵐泉石幽遐竒絶之槩有以動其逸興而形于賦詠與畸人靜者互為倡答率皆清虛蕳逺可喜亦非窮鄉下土草野寒生危苦之詞可同日語也蓋其為文𥘉不膠于一定之體安知其孰為臺閣孰為山林也耶東坡先生曰吾文如萬斛泉源不擇地皆可出在平地雖一日千里無難及與石山曲折隨物賦形不可知也所可知者常行于所當行常止于不可不止如是而已欲知侍郎之文請以先生之言觀之至正十又五年秋八月甲子黃溍序族譜圗序古者圗譜有局掌於史官局廢而士大夫家自為譜言氏族者或謂黃氏嬴姓陸終氏之後或謂黃氏出于帝髙陽者自柏翳賜姓嬴而其後有江黃諸國為楚所滅子孫之仕楚者有黃歇出于金天氏者自臺駘封汾川而其後有沈姒蓐黃諸國為晉所滅子孫之仕晉者有黃淵皆以國為氏或又謂嬴之得姓始于柏翳祖臯陶而本金天可盡據乎漢尚書令香太尉瓊父子江夏人唐之江夏暨會稽零陵巴西東郡江陵洛陽晉安八郡各有黃氏而今也同望江夏何以别乎官失其守而譜學墜絶乃欲旁引曲證而推及于千載之上固難矣惟婺之黃氏由金華徙越之剡洪之分寧豐城信之弋陽江陵之監利為五大族而溍之九丗祖八世祖仍居婺之浦江舊譜以為自分寧來歸而郡志所載黃氏墓在浦江者見于開元十道圗則浦江之有黃氏已久似未可以舊譜為信要之其言必有所本無從考質也七世祖始徙義烏族日蕃衍系序之承傳支屬之分異斯可得而詳焉六世祖隱居弗仕用薦者當授官未命而沒五世祖亦隱弗仕逮我髙祖乃以子貴纍膺贈典其以進士登于科者我曽祖一人而已先祖先考在異時俱嘗輔官而不及祿溍際今盛世叨備官使而獲推恩于二代顧以鄙劣無似弗克負荷駸尋暮景懼一旦殞滅以為大憾安可無使後人知夫源流之自而思亢其宗乎昔太史公庭堅自序本出于金華而其譜止及于分寧七世以上皆略弗著蓋慎之也庸敢竊取斯義斷自九世祖而下丘隴之尚完祭享之不廢者為之圗若譜逺不可知疑不能眀者悉闕焉凡為圗譜之法親者冝詳疏者冝略為子孫者各詳其親則其所略者自可互見今不以親疏為間而有所或遺者恐諸房子孫不必人人能有其圗譜而于所親各致其詳也來者當思輔其所未備而無厭其傷于繁哉後序溍作族譜既闕其所疑與其所不知舊譜所無者亦不敢妄有增加然尚有當考訂者我七世祖妣宗氏觀文殿學士忠蕳公澤之女弟忠蕳之子直祕閣頴志其墓孫男五人其二人曰公顯公煥今見于譜者孫男七人惟上三人與志合其下有無咎少亮潛之楊祖而無公顯公煥志乃當時所作必無謬誤非名之更易則譜之脫遺也浦江之花橋有黃將軍廟在我九世祖墓之旁將軍名仁環鄉先生倪朴為立傳載其捍衛鄉井之功甚悉子孫至今不絶同里細人之家皆黃姓而散處于邑中者多士族疑上世必同所自出歲久而失其世次譜所以不及也義烏之蘆寨有紹熙四年進士名耕字子野仕至郡通守按登科記於我曽祖為諸父行不知何以亦不入于譜也抑嘗觀太史公庭堅自序其先金華人七世以上失其譜而豐城譜乃于其七世之上又遡求得其四世且謂其先由秀而婺由婺而洪越之新昌有庭堅同年進士某推序昭穆知為兄弟而進士之從曽孫禮部尚書度乃謂黃氏居江浙者大抵出于建之浦城其先由建而婺由婺而越二説尤異併識于此以待咨訪焉説唐生字説東陽唐生名圭而其為字者不與名配求豫有以易之豫既字之曰公謹甫且告之曰玉之為物也至貴為器也不一而莫重于圭是以古之用于朝聘者執之如不克焉謹之至也夫蔽眀而有璪充耳而有瑱佩而有珩璜琚瑀起量也而有駔琮發兵也而有牙璋固皆服用之所貴若其為國之重器則有圭焉九寸而為桓七寸而為信為躬者天子之命諸侯之守也命尊而守嚴能勿謹乎傳曰玉不琢不成器生蓋幾于成矣故豫獨告之以其持之而無失墜焉者曰謹而已嗚呼其懋敬之李生字説中山李生弘道之字曰仲能為之説以繹其義者三人矣而未足以厭其欲復來徴豫言夫冠而字古也冠禮廢不舉而字之配名者不廢今也在禮始冠三加皆有祝字之辭一而巳一字而三説焉今之又今也雖然生之名若字得無取諸吾聖人所謂人能弘道者哉舜何人豫何人禹稷顔回同道人也道也果且有古今乎哉道未始與世推移而人不必皆聖智皆賢有德患夫有能有不能耳生其勉之姑以名字自守而行乎吾聖人之言無務以多聞為也鄭生字説若昔所記聖人心學之要不曰中乎堯之一言至約也舜益以三言則巳詳焉孔子贊易復因三百八十四爻以眀夫用其中者至矣盡矣蔑以加矣廣信鄭生元吉之字曰得中蓋有取于離之六二生之父若師剖析爻象為之訓辭諄諄數百言冨矣哉而生不以為足將求豫申言之嗚呼道可受而不可傳如以言則生所聞于父師皆針石也默識而自得焉雖三聖人之言猶筌罤也無易由言無曰苟矣豫竊用以自警髙山仰止景行行止生其勉之蒲察仲敏字説仲敏名志學徴豫序其為字者序曰昔者孔子與顔淵言仁顔淵曰回雖不敏請事斯語矣與曽子言孝曽子曰參不敏何足以知之而孔子之自道則曰我非生而知之者好古敏以求之者也賢者不自以為敏故如恐弗及聖人固無事於敏猶勉焉孳孳由是觀之進學之功孰先于敏乎六經之言學始于説命説之言曰務時敏為學之貴乎敏自古而然矣雖然學以為政也孔子蓋曰人道敏政地道敏樹則敏者又所以從政歟仲敏之講學有年矣可以出而從政矣豫既知其敏于學抑有望其敏于政序其字因以朂之啓謝鄉試主司徐照磨啓三月十三日蒙恩賜同進士出身者祗命以還撫躬無措載循忝胃亶有寅緣竊以詩詠思皇侈成周之多士史稱間出彰大漢之異材垂照來今蔚為盛際然必鄉書上獻乃登天府之名計吏與偕方署太常之籍凡皆重乎其始進是故擇焉而愈精昔在熙朝率由兹道矧右文而興治若先烈以敷猷搜曠典于三紀之餘徠羣英于千里之外戔戔束帛殆幾跫然而有聞于干纓冠孰甘瞪若以自後棘連闈而並樹𫀆何白以太紛惟薦送之定貟實抑損于舊制加以文非故習蕩無矩度之可稽業有專攻競出管窺之餘見飾辨麗者或乖雅馴之體獵幽眇者或昧精祲之原乃欲定去取于一日之間而使論安危于九重之上其所繫者大矣豈不確乎難哉自非精鑒裁以持衡攬英雄而入彀妍蚩並照細大不遺則何以闢賢路之𥘉程承天光之下燭肆時盛舉屬我宗工冝搜傑異之材佇副詳延之意如溍者器資窳陋術業踈蕪簉迹英躔猥玷譽髦之造睎光華旦謬充跅弛之求敢期小技之曲迂亦借大方之品目忘其瑕垢不俟三獻而遽收出諸泥塗輒與十朋而前列辱采甄之及此顧庸謭其奚堪粵陪方物之陳荐入春官之考綸言俯被雍容衢室之諏櫝奏森羅煥爛上方之札盍少禆于末議庶無負于殊知夫何鼓巳至于再三威實臨于咫尺厪終條對靡中題評挾以先登徒愧大宫之士存而勿去偶同矍圃之賔叨綴第以為榮省流恩之有自兹蓋某官先生導揚德意砥礪文風假華衮之寵褒曲乘薦藉致黈旒之過聽獲預井容溍敢不勉企前修益圗後效鞭駑附驥豈十駕之難追磨鈍為銛尚一割之可用上酬亨遇次答隆私激烈情深鋪棻語淺賀周縣丞啓䇿名昕陛贊邑海壖榮命載行輿言胥慶惟古有詳延之禮肆時多間出之材于皇昌辰聿新曠典文場初啓類霑優渥之恩英彀重張果極俊髦之選科目見謂得士州縣豈徒勞人蓋將任以事功必先飬其譽望某官卓乎懿行允矣令儀獨抱遺經詞章固為餘技究觀當世設施匪事空言粵䇿俊于鄉闈逮旅陳于方物褒然髙舉藉甚能稱可緣再鼓而少衰仍與十朋而前列用膺妙柬式副旁求日􅉴彤庭既親承于大對天臨黼座宜密近于清光侈是際逢胡然引却姑一登于選部不再轉而為丞庶出緒餘稍蘇疲瘵佇聽疇庸之美亟觀圗任之新某猥以陳人覿兹盛事雲霄直上詎為儒者之榮膏澤下流尚慰斯人之望聊攄悃愊少助欣愈通李州判啓晉登上第臨佐偏州偶緣臭味之同遂託雲仍之雅輒慿書問庸俟車音共惟某官流慶仙源飛英學海故家舊物陋𣏌宋之莫徴大册髙文卑眺董之所對科目之士于斯為盛州縣之職夫豈徒勞佇展材猷力禆治化風行草偃里無弭筆之民川泳雲飛座有彈冠之客載新觀聽允賴作成屬當視籕之期敢後典籖之詗溍衰遲漫迹惕息素餐忝冒謂何久自慙于掦粃瞻承伊邇幸毋爽于及瓜拱俟晤言悉攄下悃公文陳乞依舊致仕咨文伏念溍誤玷科名叨塵官使幸獲逃于瘝曠每思戒于滿盈所以不待引年自請納祿一歸田里五閲星霜夫何姓名猶存乎齒録之餘造化曲盡乎陶鈞之妙遂令朽質仍預清流起從外監之散貟入就禁林之儤直北扉視草東觀紬書扈蹕上亰談經內府躐躋勸講之職參陪侍從之班庸謭奚堪僥逾特甚方陳免牘俄俾賜環專使在門大君有命靡得以循墻而避是用不俟駕而行揣微分以淩競感深衷而激烈趑趄故步黽勉汗顔孰知既去而復來寧非以退而為進不圗控籲曷逭譏評而况蒲栁易零桑榆巳迫隕越是懼輔報無由敢祈叩于洪鈞碩保全于末路尚惟矜察轉以上聞代浙東憲使請立耶律文正公書院公牒竊謂人能弘道學必有師仰惟碩德之間生實繼先儒之正統流風未逺世澤猶存不有專祠曷彰遺烈伏見故昭文館大學士兼國子祭酒贈資德大夫河南江北等處行中書省右丞上護軍追封漆水郡公諡文正耶律公前代賢王之貴胄本朝上相之諸孫負深沉不器之資懷耿介拔俗之志爰親師而取友用修巳而治人粵若世祖之時咸宗許氏之學克嗣其業允屬于公卓居輩行之先式膺付託之重一貫忠恕之妙獨傳于曽參三千弟子之徒同師于有若凡升堂而入室必蹈矩而循規一從國學之建官三為祭酒以設教啓前賢之藴奧示後學之楷模青青子忴覩時髦之傑出戔戔束帛承天寵之褒嘉逮請老而懸車復興歎于當守特馳乘傳加錫上樽髙朗令終既疏封而告第華皓一節已定諡而易名孰知鄉國之舊居尚缺禮祠之精舍當職久司風紀博采輿言謂後人苟獲瞻其儀刑雖異世亦將知所觀感冝立書院而修其祀事仍置山長以領其生貟庶幾人材之作興可備國家之任使誠非小補是用申明金華黃先生文集卷苐十九
