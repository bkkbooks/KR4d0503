body:
  text: 記臨川危素編次番昜劉耳校正寳林蕐嚴教寺記越之飛来山寳林寺華嚴䟽主清􅈵􅀦師受度之􅀁也世祖皇帝旣取宋遣大浮圗亢公號亢鐵觜者訪求江南化靈僧遺跡􅀁在首至兹山則斥為禪居巳乆佛照大師文萃時方出世南塔以華嚴之學開導其徒亢公一見深敬服之亟拜牀下曁還朝以名聞有㫖召赴闕稱疾弗行乃命復寳林故額定為華嚴教寺授以師號錫以金襴法衣俾為住持至元二十一年冬十月也佛照仰聆帝制入踐祖庭掌握圎宗垂芳七葉今住持大同謂寺之廢興略見扵舊記而􅀁書或止扵一時之事莫詳其㳂革之顛末或有當屢書而未及書者爰伐石屬溍備記之按郡志飛来山在府東南二里􅀁一名􅀛山一名怪山東晉僧曇彦與許詢造塔其上宋僧恵基以皮道輿􅀁施宅建寺其旁梁岳陽王􅊫帥越因見彦而自悟爲詢後身遂増廣其故宇爲母寳林夫人祈福號寶林寺唐光宅中更名光宅開元間仍名寳林中廢扵㑹昌而重興扵乾符以應天爲額宋乾徳􅀄僧皓仁即故址創新塔九層八面其髙二百三十尺塔附於寺同號應天熈寧末俱以災燬郡守程師孟爲恢廓其規制而一新之侈扵前者三倍且奏請以禪僧居焉賜名寳林十方禪寺其後改崇寕萬夀而又更崇寕爲天寕改報恩廣孝而又更廣孝爲光孝紹興中寺毀于災乆而復完乾道末加以塗塈藻繪而其華好爲東南列刹之冠然自是登載扵文字間者希闊􅄫􅋁其盛衰莫可考巳佛照之来教席旣正道價益隆嚮慕而至者樂以田歸之復舊増新􅀠於本郡及慶元嘉興諸荘者緫為田五千餘畒土木之功窮壯極麗山川改觀人天具瞻春期夏講學徒鱗集山有石井下與海通水有神鰻隨潮隱見教禪易置靈應乆虚至是井之涸者復潮鰻之隠者復見豈偶然㦲佛照遷杭之慧因而佛衍大師法昌以至元三十年來􅀘其䖏架傑屋於法堂之北以間計者九大徳元年佛惠大師元啓􅁇之塔尋復以災毀役殷費鉅未易􅃱力乃先營庫堂及護伽藍神之祠至大四年佛日大師時遇又􅁇之復慶元荘已得而随失之田三千餘畒闢丈室構鐘樓植牌軒繚以脩垣限其内外立荘舎置船坊百廢具舉駙馬都尉瀋陽王函經一大藏以施焉惟雲堂巳蕳材而未克僝工泰定二年慈眀普慧大師廣宣来主是山塔頼以新而雲堂亦成王公克敬于公九思前後為郡交相其役同郡僧本立佐其費尤厚燈油有局則􅂄舊僧徳馨􅂢田五十畒創為之元統元年􅁇宣者志學又治經藏作庫㕔重紀至元之四年秋大同以佛照之孫佛日之子嗣領教事飾佛菩薩像葺羅漢堂設無盡燈覩西廡之腐敗摧剥悉撤去而更為列屋環扵雲堂之後標其外曰南齋掲其中曰草堂每一室為一齋皆有扁牓来學之衆雷動雲合不减佛照時刻華嚴行願䟽金剛助顯録使因䟽以通經修首楞嚴期使由觧而起行以古今名賢或詠歌其登臨之勝或紀述其興作之勤聚而刻之曰寳林編以僃山中故事焉溍竊惟寳林之易教為禪􅆘千二百甲子而江南之版圗歸于職方金輪御宇表章教乘佛照一旦光膺上眷丕闡先猷教基以之而永存宗風以之而大振盖有數焉非人力之􅀁能及也昔佛照問道扵月堂瓊公告以此事自有時是雖語佛道之長逺世間盛衰得失之故何莫非時之􅀁為㢤􅇷叙廢興以記千載難逢之㑹其辭之繁而不殺有不暇計者矣􅀦師道在遺書行在别傳佛照設利􅀁蔵亦自有銘此不著佛衍佛惠皆出旨授佛日則帝師􅀁􅂌云若夫山與寺之􅀁以名舊記多本扵越絶呉越春秋而又参以傳聞之異辭今無􅀁􅀙質姑俟續郡志者訂定焉龍興祥符戒壇寺記杭州龍興祥符戒壇寺梁大同間郡人鮑侃捨宅以建也􅀄名發心至唐而更其號曰衆善曰中興曰龍興宋制諸州咸立大中祥符寺而兹寺例賜新額寺盖律刹故有戒壇今遂合而稱之曰龍興祥符戒壇寺云按圗志寺基廣袤九里有竒其子院有千佛諸天二閣而戒壇有院又有鐡塔及大小石塔錢王九百九十眼井實靈芝大智律師受經之地觀眉山蘇公南豐曽公上元􅀁題紗籠銀葉錦帳紅雲之句其規模之宏廓盛麗可知也建炎南渡金人擁重兵薄城下城䧟寺毀而地入扵官因斥為御前軍器􅀁民居往往錯峙其間惟存西南一隅以為寺􅀦朝至元十三年宋社既墟寺亦鞠為荆􅁄瓦礫之塲二十一年中菴吉公令其徒請于郡府願入錢僦地仍置僧坊以續其香火使勿絶事下有司覆驗得鐡塔一石塔二古井九與圗志合知為寺之舊址無疑乃給劵書悉以其地五十九畒九分歸于本寺二十五年江淮福建釋教都緫統􅀁被上旨凡故􅀁有寺而今弗存者俾復為寺於是祥符始得蠲其􅀊􅀁入錢而以地為寺之永業時吉公方主朋慶法席而敬堂恭公乆居眀慶歴典要職譽望素孚於人爰舉以為住持二十八年也恭公旣涖事即扣巳槖得錢數十萬緡召匠蕳材百堵皆作未㡬而佛殿觀音閣方丈之室演法集僧之堂棲鐘之樓門廡倉庫齋庖湢室靡不畢備為屋緫若干區穹簷廣霤傑棟脩杗藻繪髹􅊮照映城郭遂為一郡之大招提慮無以給其食則置田若干畒於吴中為役至殷為費至鉅皆恭公身任之名雖因舊以為新實則創造也大徳四年工吿訖事有以恭公之名聞于上者欽承􅌖􅈲加護有嚴而帝師亦􅂌以智光普􅁴之號至治元年恭公告􅄫勲公嗣再傳而為秀公秀公視恭公為曽大父以重紀至元之四年来􅀘其故䖏恒自以弗克􅀒荷為懼􅂢衣盂之資作輪藏覆以大厦而函經以實之設十八大阿漢及律宗諸祖之像嚴奉如法且作别院于城西以祠恭公謂恭公起廢之功乆未有述乃伐石来徴文以為記夫宇宙間事成壊有時其􅀁由廢興則存乎人耳祥符之為寺千有餘􅀊而廢又百有餘􅀊而聖人御世佛日再中恭公之生人與時會用能以廢為興熾然建立如此秀公夙承嘱累而不忘纂修其􅀁巳成彌縫其􅀁未及恭公可謂􅀎得人矣寺之大􅂄舊亦恭公弟子而僧衆得度扵恭公秀公者十數它日恢弘祖道扶植教基固當代不乏人也報㤙萬􅀊教寺興造記華嚴䟽主􅀦師安住於清􅈵聖境叩妙徳以凝神覿徧吉而覃思窮探祕蔵敷暢圎乘由賢首上遡龍樹馬鳴以逹于大雄氏聲教􅀁暨自北而南三吴法㑹之盛以平江之報㤙萬􅀊教寺為苐一刹考諸郡志則錢氏闢通玄之遺址掲支硎之故額已不啻四百餘年逮入􅀦朝其規制日益侈大盖清􅈵後世爲圭峯宻又世爲晉水源又七世爲佛日崧而兹山之爲賢首教寺則始扵佛日是爲開山之初祖凡五世至今住持廣宣祗承祖訓普接群機談塵一揮學徒雲合闡􅀭之暇視其簷霤摧毀階戺圯夷像䫉欹傾金碧䵝昧懼因循滋乆而葺治之不時亟叩巳槖爲之倡以来衆施於是豪宗貴族至于士庻之家相與輸財薦貨而壯者効其力巧者獻其技蕳材運甓扶土設色百廢聿興而内外爲之一新􅂌以田五百八十畒有竒而華薌糜粥􅂼茹湯茗之須靡不畢具三門前峙髙伉顯敞人天八部出入無礙樓閣之開不勞彈指也兩廡旁列深靚廻􅃨五百應真涌現其間聲聞之身衣不弊垢也殿以妥睟容堂以演真詮而棲净衆種種荘嚴絢耀􅂠好菩提之座無異扵忉利天也倉􅅒之充盈齋庖之豐足猶以衆香􅀦土世尊􅀁食之餘施作佛事於娑婆世界也謂世間之相成壊靡常扶植教基是在来者假兹貞石謁辭圗堅夫靈心絶待非有方􅀁有漏之因去聖尚遥丹青土木何􅀜扵一大事乎然而法藉人宣人必依䖏欲因䖏而知其人故不壊外縁能因人而知其法故悉成妙境即事皆理無䖏非真實相宛然非成非壊世俗文筆固不足恃以爲永乆也描􅀞虚空徒勞藻繢而已廣宣字無言族某郡某氏其来涖法席以至正二年夏六月被璽書加護則某年某月云虎丘雲巖禪寺興造記自佛學行于中土法幢􅀁建必天下之名山莫不侈爲寳構華居以宅夫形勝盖以表靈山之未散作大衆之依怙俾来者覩相而生信也丹青土木之事雖若渉扵有為而事之與理不相留礙推理而適扵事清净覺地即大伽藍混事而歸於理積土聚沙皆巳成佛一切世間成住壊空之相固未有出扵心境之外者苟非乘方便力逰戯如幻安能具大莊嚴為無上之勝因也㢤呉郡西北有山曰虎丘或謂之海湧山有大招提曰雲巖寺山之􅀁以名寺之􅀁由立悉見于圗誌山則呉王遺蛻之􅀁託秦皇轍迹之􅀁届劒池及試劒石在焉寺則晉王氏昆弟司徒珣司空珉􅀁施之别業生公講經䖏􅀧頭石千人座在焉宋至道中始以寺為禪刹皇祐􅀄又更為十方住持紹興間長老大比丘隆公以圎悟嫡子坐鎮兹山法席鼎盛東南大叢林號稱五山十刹者虎丘實居其一大慧以法門兄弟相依最乆繙經有室容聲儼然􅁇以雪庭瞎堂松源咲翁諸􅀫徳唱道其中而宗風愈振纂承基緒代不乏人而支傾植仆曰不暇給際今昌辰尊崇像教猶或失扵因循未克大起其廢重紀至元之四年今住山眀公嗣領寺事始増飾佛菩薩阿羅漢執金剛神更造文殊普賢觀世音三大士繕治舎利之塔經律論之藏範羑銅為巨鐘視棟宇之摧堕蠧敝者㦯因㦯革百役並舉大佛殿千佛閣三大士殿藏院僧堂庫司三門兩廡古木寒泉劒池􅂠雨諸亭則完其舊祖塔衆寮倉􅁃庖湢宴休之平逺堂逰眺之小吴軒山之前為重門則改建使一新環寺為渠六千餘尺堙於客土水遏弗行則䟽瀹之凡其費一出扵經用之羡財而集衆施以助其不給方謀伐石築隄属于城闉以復唐刺史白公故迹未及庀工而眀公遷主本郡之承天􅀎仁禪寺爰序其成績来取文以記焉眀公材周而智圎觀一切法皆佛法未甞扵一法中妄計無為有為而生欣厭故其經度􅃌授乆而弗􅈈閱七年如一日宜有以潰于成而不愆于素也前作後述是在来者可無以告之使勿墜其已成之業而益廣其􅀁欲為之志乎記為興造而作山川風物之羙著于前賢紀詠者此不􅃨出焉平江承天能仁寺記平江承天能仁禪寺在府署北之甘節坊梁天監初衛尉卿陸公僧瓉捨宅以建也􅀄賜名重玄陳隋之際燬至唐而復廣徳􅀄加號廣徳重玄􅇜廢扵㑹昌末重興未㡬而又燬至後唐而復宋咸平間更一新之大中祥符初始賜額曰承天宣和中乃改其額曰䏻仁南渡後燬于建炎末而復興扵紹興間淳熈􅀄始定為禪居皇朝因之而悉蠲其租賦差役曰承天能仁者並存其故額也先是甞於大界相之内析其地為寳幢永安龍華廣福四院乆之復歸于一尋又别立圎通禪院扵其後而分立寳幢永安兩教院扵其前凡建置㳂革與廢興之故可見者如此其易律為禪也妙菴宗公為開山苐一祖􅁇之者有若無門覺菴諸公皆以名徳為世師表法㑹甚盛珍樓寳閣紺殿緇廬雄据乎萬井中而隠然為一大叢林五山十刹殆無以尚也仍紀至元之元年冬十有二月寺厄于災惟無量夀佛銅像及盤溝祠靈祐廟獨存佛身丈有六尺􅀖人􅀁共瞻依盤溝靈異之蹟尤著靈祐則衛尉之女不嫁而精於梵行以經營寺事而祀為護伽藍神以祈禱有應而賜廟額累封慧慈靈感􅂋佑善利夫人者也烈㷔熾然而不與刼􅁅俱化人知為重興之兆矣頋法席乆虚越三􅀊莫有任起廢之責者行宣政院詢子僉言俾廬山開先南楚􅀃主之其至以四年冬十有二月僅以衣祴坐具一布嚢自随聞其風者輸財薦貨川赴山積召匠蕳材首建大殿殿楹之髙百三十尺其大圍十有五尺厚棟脩杗曲欒方楶咸與楹稱楹之表上至屋極又若干脩去其崇若干尺廣加其脩若干尺像設繪事種種荘嚴搏土設色皆出􅀦工之手殿之後有萬佛閣其楹加於殿楹三十尺閣爲間五而東西朶樓爲間四隆其中而殺其旁縦横脩廣各中于度其上列十五大蓮華一華一佛一一華瓣亦各有佛以足萬數下施機輪可以運轉竒詭殊特昔􅀁未覩範銅爲巨鐘至萬八千斤比舊加三之一㑹南楚升居徑山􅀁作無量夀觀世音護伽藍神三小殿及演法集僧之堂三門兩廡厨庫之属皆弗克視其成它􅀁冝有而未及爲者猶多也今住持雪䆫眀以至正四年秋九月由虎丘遷主兹寺亟􅂢衣盂之貲構經鍾二樓各爲間者三其崇十有七尋脩廣稱是棲經有藏塗以純金一柱八面納匭五百天神環繞力士翊扶旛蓋香雲􅌭紛􅀩蔽逹官大姓好事之家觀者莫不目眩心駭争投錢幣以助勝縁雪䆫之經畫相勞靡憚其勤甫及三􅀊土木之功秩然有序以老病厭理繁􅇵悉裒衆施併傾巳槖以授提􅀧僧而退䖏虎丘之東菴八年冬行中書省謀扵行宣政院輓之復出遂以九年春三月再正法席增飾萬佛創造四臂觀世音四天神王護伽藍神􅀘􅀞正殿之八十四龕廡下之五十三􅂙杇墁瓴甓縝壮礱宻髹􅊮金碧絢耀華羙厨堂庫院什器之須纎細畢備南楚之弗克視其成者至是可以無憾矣斥大方丈為間者五上為重閣下為廣堂前為㕔事而􅀩堂有位衆寮有閣倉􅁃湢室亦次第告成南楚之未及為者雪䆫無不按其法之􅀁宜有而伸其志之􅀁欲為雖曰前規後随而功實倍之南楚之成其始者奎章閣侍書學士内翰虞公記之而雪䆫之成其終者未之有記扵是其徒奉事狀屬溍書而刻焉阿含經世尊􅀃若能􅀘故寺是謂二梵之福南楚虎巖適嗣雪䆫以晦機咲􅀮為師友相與紹隆祖道扶植教基期與􅀦家億萬斯年永永無極是用假方便力示現有為不離世間法而入苐一義豈止可資二梵之福而已雪䆫之功倍扵南楚而溍於虞公無能為役何以賛一辭㢤姑序其􅀊月使来者有考云爾思谿圎覺法寳寺舎利塔記呉興城東三十五里思谿之上有大叢林號圎覺法寳寺住山文􅎚重建塔成伐石屬溍書之用圗永乆按狀宋崇信軍承宣使王公永􅀙宣和間仕于朝慈受深禪師時住慧林永從暇日數與之㳺而咨决心要間語及有為因果禪師言起塔之功徳最勝盖舎利􅀁在則為有佛也永􅀙既謝事而歸則捨家造寺建塔迎禪師為之開山其後永􅀙子孫曰益衰悉取故􅀁施田而寺遂廢淳祐間觀文殿學士趙公與􅊸􅂢金錢􅂌之使以田復入于寺且繕葺其棟宇寺以復完􅀦朝至元十三年塔與寺屋俱燬于兵雖屢易主僧率皆苟蕳架漏取足自容僅存其香灺弗絶而已皇慶二年􅎚寔来罄已貲集衆縁大治土木作殿堂門廡及齋廬庖􅅒之属為屋緫若干區惟塔之役甚鉅乆乃克􅃱其力因舊為七級而増新為八面飛金湧碧巍煌中天䦨楯外周龕室内秘華燈寳鐸交輝和鳴睟容宻語妥置如法緇白四衆瞻仰讃歎以為多寳全身已滅而復現也在仁宗時西天竺甞以古佛金剛座石製塔方廣若干寸函舎利来獻􅇉以賜魏􅀦趙公孟頫魏􅀦尋以歸于􅎚俾永鎮兹塔而祈福報上至是諏吉奉安惟謹故􅀁有辟支佛齒骨舍利亦并蔵焉起天暦二年春訖至正二年秋凡十有五年而告畢工其秉心也專肆力也勤矣溍􅀼惟事之廢興係乎時物之成壊関乎數不囿乎時與數而歴刼長存者其惟夙昔所發深心大願乎異時之真僧上士有出没人間三世而後合浮圗之頴者今乃以十有五年之頃熾然建立如此不啻事半而功倍自其異者而言之時與數誠若不齊自其同者而言之本願則均是故應知三世非逺十有五年非近虚空有盡此願無窮矧今真身法塔為聖人出乘機縁之遇合而来止于此願力􅀁感殆非偶然視昔輪王天上人間龍宫海藏之􅀁分貯一即八萬四千八萬四千即一光眀之聚遍法界無􅀁不照其功徳為異為同雖有巧智莫能分别尚安能測其時與數之盈虚乎􅀁可托以永乆者有不在區區世諦文字之末也姑叙其畧庻来者得以考其構興之􅀊月云施財為助者之名衘具列于石隂兹不著武昌大洪山崇寧萬夀寺記鄂之城東有佛刹曰大洪山崇寧萬夀禪寺此黄鵠山也而謂之大洪山者盖大洪随之名山自随而鄂自鄂而許地雖易而號名不殊示有􅀁本云爾鄂今為武昌山距城十里而近北枕江漢南帶湖湘東届夀昌下瞰樊水層巒疊巘交拱互揖西接城闉民堵萬區前臨通逵而市聲􅊬不相及山之顛有岳忠武王手植巨松斗牛亭仙人石鼓崖尤為竒偉地位峻絶風物清間寺特㩀其最勝䖏遡其􅀁自出推靈濟慈忍大師為􅀄祖大師諱善信以唐廣徳二年四月六日下生於洪州南昌王氏受度扵本州開元寺北丘清照而契心印扵馬祖道一禪師北逰五臺感妙徳現瑞相發願為衆僧執㸑三年僧力郤之大師涕淚雪泣戚嗟不巳有老父吿之曰汝縁在南方衆不汝容盍行矣乎逢随即止遇洪即住大師遂挈瓶錫南還以寳暦二年秋抵随州覩一山巋然問於逆旅主人曰此為何山荅曰大洪山大師惕然思老父語則延縁而入至于山麓諸水􅀁委匯為重湖神龍居焉旱乾水溢有禱􅂺應時乆不雨郷人張武􅁜具羊豕將以􅆀禱大師見而悲之謂武􅁜曰雨􅊙不時本由業感害生自利徒増汝罪可且勿殺吾為汝祈約以三日必雨武􅁜聴之大師探幽履險得山之北巖泊然宴坐運誠黙禱及期雷雨大作雨旣霑足而止武􅁜訪求大師於巖中大師時猶在定蛛絲􅇈面附耳而號挃體而告乆之方覺武􅁜遂施以其山為建精舍大和九年五月二十九日大師宻語扵龍神曰吾前許以身代牲輟汝血食今捨身餉汝可享吾􅁏即引刀㫁左右足白液滂流儼然入滅􅀟足留鎮山門􅁏色乆而不變四衆哀慕稱之曰佛足有司以聞于朝賜號慈忍大師􅀁居精􅃕賜名幽濟禪院後以禱祈屢有竒驗累加大師號曰靈濟慈忍其佐神十有二封爵自王而公而侯等差不同皆天下知名之神威靈烜赫􅀍于四方此随之洪山也宋末随數被兵洪山又當其要害為南北必争之地􅁁境之民既多流散叢林之下亦無以安其居亰湖制置使孟公珙隨人也與都統張公順謀遷其衆適于樂郊乃度地扵兹山請雲菴興自随州捧佛足及累朝􅀁􅀍告􅃙徙寺額僑置焉仍奏請賜今名曰崇寧萬夀俾興為之開山此則鄂之洪山也興之後無諍須則翁寔􅁇之世祖皇帝在潜邸帥師南伐駐蹕鄂之元興寺遥見兹山之頂有神人立於雲端詢知為大師化迹􅀁寓深加敬異曁班師寔因函佛足扈從至亰師特命安置於祕宇而嚴奉之上旣正位宸極有旨遣使偕寔護送還山道出許州佛足重莫能舉使者歸奏詔即其地建寺此又許之洪山也鄂經摧䧟之餘寔又去不返吕公文徳制置亰湖請無積聚主之而寺以復新􅁇之者縁菴遇建靈濟塔増置菴院土田而玉崖潤無􅁁詠竹溪禧又􅁇之寺以災毀禧方謀起其廢俄委順而化至順三年今住持華公實来毅然以興復自任積衣盂之貲躬求良材於江上造大㧴以歸頋舊址局於地􅀔隘陋􅄶迫位置不皆合於規式乃夷崇岡堙巨壑累石為基使就顯敞首創大佛寳殿棟宇之制悉擬於亰師列刹而華飾有加焉兩廡山門之上為萬佛閣演法棲僧有堂輪藏及祖師公王有殿天書有閣而鐘樓經臺丈室􅀩堂旃檀林前資寮庫􅁃庖湢之属無不畢僃始作扵元統二年之某月訖功扵至正某年之某月費錢緫若干萬緡出扵華公者一萬出於􅂄舊僧宗森者二萬餘皆出扵衆施及經用之羡財金碧髹􅊮輝映林谷宏模偉觀人天具瞻其在先朝甞以為中宮祝􅁵之􅀁頒以香鐙金幣褒禮甚厚三大洪山法席之盛莫武昌若也華不逺數千里来徴文以記之溍竊惟毗盧身土周徧一切三千世界一一須彌無去無来非彼非此然則山未有寺法界宛然寺之旣遷依然故䖏增减成壊之相了不可得豈世俗文筆􅀁能記乎若夫法身大士示現有為扵如幻境作饒益事應化之迹亦有可得而言者庸次苐本末俾歸而刻諸華别號枯木嗣法於靈􅀮誾禪師云潜岳法喜院記金華縣北二十里有佛廬曰法喜院山曰濳岳按郡志潜岳一名尖峯山狀若芙蓉盖今之芙蓉峯也環四旁皆緇錫􅀁聚法喜峙其東而獨配兹山以為稱㦯者昔甞依山建院後乃僑置今􅀁歟是不可考已舊傳院在唐為巨刹衆至七百水􅁀溢山谷間一夕盡毀居民覩瑞光現其䖏發地得古石佛旣而有文翠禪師者莫知何許人即荆􅁄瓦礫之塲構屋而居墾田而食院以復興後梁之乾化三年也宋治平二年􅀄賜今額甲乙之傳無慮數十人承之者冝澹念其故宇􅋻陋摧圯弗稱天朝尊崇像教之意将斥大更新之乃辭􅀁領聖通法席而歸罄巳槖以市材甓僦匠傭與法孫元牧各出􅃌端血書華嚴經以自􅊎期事之必集起至元二十有七年訖元貞元年大殿三門次苐就緒司教事者無能為其勸相頋逞貪虐以撓之澹不得巳避于北阜僅畢東廡􅃍輟土木之功大徳七年始克營西廡遷普同塔􅂢錢助造佛菩薩阿羅漢護伽藍神之像而為澹結菴扵北阜者里人陳文通及其子徳眀也十年冬澹示疾而化牧以􅀫願故汲汲焉纂其􅀁已成而圗其􅀁未至食淡衣麄銖積寸累乆乃以延祐七年重舉其役逮至順元年佛閣及演法棲僧之堂經藏鍾樓庫􅁃庖湢乃悉告完創觀音殿扵法堂之後而祠故中書舎人潘公良貴於大殿之左尋又割田若干畒以待繕葺之須其􅃱力於此四十寒暑矣牧以書請紀其􅀊用且言潘公得法扵佛燈珣禪師語在嘉泰普燈録奉祠十載往来山中恒自稱飬空居士日與叢林衲子同起居飲食没因治地以葬遺鉢迄今存焉公能以道自信而不泥於名迹非有徳扵吾徒而吾徒歆仰之不已祠之􅀁為作也幸併志之竊觀考亭先生序公文集於公平生本末論述甚具向之云云皆先生􅀁不道而謂公自少至老出入三朝前後在官不過八百六十餘日清苦貧約䖏之超然由先生􅀁言而推其􅀁不言則公之有得乎中無累乎外髙風逺􅃱固可槩見牧之言良有徴不誣也况夫祠之興廢繫於院之盛衰尤不宜無以示後庸􅇱著之俾與逰方之外者商而刻諸澹號雲村牧號􅀟澗云杭州眀慶寺記杭之佛廬甲於東南湖山勝䖏禪林法窟髙下森列巖阿磵曲殆無遺壌傳律學者眀慶最為鉅刹乃巋焉獨㩀乎闤闠中四墉之外皆氓㕓賈區細人之家一或弗戒􅂺有欎攸之警然其毀也不乆􅂺復蓋􅀒荷有人則以廢爲興直易易耳按郡志唐大中戊辰僧㬌􅀄肇剏精藍扵木子巷曰靈隠院集賢殿學士栁公權爲扁其游息之􅀁曰眀碧軒宋大中祥符壬子乃錫今額曰眀慶寺暨詵公以大智祖師之上首弟子来涖法席四衆歸仰屹爲律宗南渡後僑置亰邑于杭眀慶號御前香火視東都之大相􅀦寺􅈗執百寮􅀊時祝􅁵與凡禱禳之事咸在焉寺之舊址不啻百畮自毀于金兵遂爲荆􅁄瓦礫之塲大将劉鄜王家因取以廣其賜第它田土又間爲有力者􅀁奪僅存其什伍寺􅄑不廢其後寂菴光公始請于朝復長洲田佛慧思公入内講律稱旨鑾輿之来淚有和大臣􅀁進喜雨詩宸奎之藻飾有眀慶及南山道塲六大字尋得請復崑山田而屋室亦漸充擴逮至我朝像教之隆古􅀁未有佛瑞祥公佛慈吉公佛鑑良公佛夀元公先後登于律座是迓是續罔有弗虔至元癸巳大徳癸卯十年之間寺再燬而再完且寖復其故址則佛鑑之功也學徒得以安居而習其業者垂四十年至正􅉝巳之夏寺洊厄于災今住持律師杲公弊衣糲食苦心勞形掇拾遺燼以圖興復耆舊無不為之感動而交相之地之入于劉氏及它姓者皆莫敢有而悉以来歸乃召匠蕳材諏日庀工首建大殿更其位置使稍西以逺歊煩而近亢爽危擔廣霤􅃉宇崇階金碧髹􅊮絢爛溢目鄰郡僧安公覩是勝縁亟抽已槖以倡衆施造釋迦彌陀藥師文殊暜賢迦葉阿難之像妥安其中觀世音三十二應湧現其後阿羅漢諸天環侍其旁􅂠旛帳座種種荘嚴靡不俻具丞相􅀦王朶而只時坐鎮江浙躬率官屬捧香幣集寺僧如其法展慶賛之儀豪宗右姓稽首嚮風争薦貨以佐營繕之費師益募􅂄舊僧出長財作佛閣僧堂鍾樓三門兩廡庫􅁃庖湢不五年咸潰于成寺有王荆公題法喜堂諸詩蘇文忠公書普門品及題大智􅀁書彌陀寺碑次苐捜訪而重刻焉舊觀頓還故疆畢復于前人有光矣奚止能起其廢而巳㢤師以為盛衰有時関乎天數非人􅀁能勝是皆􅀩􅀍帝力以濟登兹日與其徒修净行發弘願上以増崇􅐶筭下以扶植教基期億萬斯年相為無窮爰伐石求書其廢興之故用告于来者溍甞聞儒以禮立仁義佛以律持定慧佛之律猶儒之禮也在禮君子将營宫室宗廟為先庫廐為次居室為後師以利益群品故作如幻事旣新寳構而示有􅀁尊又實帑藏而俾得􅀁飬惟方丈之室未及就緒􅋻屋數椽不庇風日有合乎禮之居室為後者其精於律而通扵禮亦吾儒之􅀁喜聞而樂道也庸併書之南天竺崇恩演福寺記杭之南山由雷峰訖龍井其間浮屠之居四十有二而傳天台之學者惟崇恩演福寺為最盛寺在小麥嶺積慶山之靈石隖今􅀁謂南天竺也宋渡江􅀄山未有寺甞斥為牧地後以祥光異響出現其間人咸驚異焉淳祐戊申葬貴妃賈氏于山之左肇建寳坊錫以今額命天台宗師圎菴果為開山率其衆入而居之尋復給田以充華香食飲之須降錢以資土木營繕之費景定壬戌葬周漢􅀦公主于山之右益􅂌以呉江上􅃾之田五千畒嗣領教事者􅀄巖鑑石庭生並賜􅂵衣加右街鍳義毒鼔聲始奏蠲科徭而依律結界少藴光性菴岳浩翁川潜山珦次􅀘其䖏俱能恪守成規咸淳戊辰賈魏公柄􅀦以妃同氣故大發􅀻帑俾禪僧絶岸湘増新其棟宇顯敞宏麗視昔有加我朝尊尚教乘大江以南佛僧􅀁廬悉惟其承􅀓之舊於是無極度古源清海翁學寔来而弘演五時八教三觀十乘之旨以㳤其徒古源又即晉僧肇白蓮華院􅀊修法華三昧開東路㑹飲馬橋夹玉几峯而出至元戊子雲夢澤􅀍旨入覲對御􅀃法深稱上意特賜璽書作大護持自栁塘權渭濵清松溪晏傳至湛堂澄玉岡􅃳而諸方龍象多出其輪下人稱之為教海又再傳至竹居蕳而寺以重紀至元丁丑燬于灾乆未克興復㑹法席偶虚行宣政院求􅀎􅀒荷其事者得今才公以住是山至正癸未也涖事伊始僧俗信嚮而至者㦯為創大殿造洪鐘或為作三世佛及文殊普賢迦葉阿難之像㦯為作觀自在像湧現其後㦯為作梵釋二天像列侍其旁㦯施以一大藏教而十地菩薩大阿羅漢護法天神之像則合衆力以成之寺之􅂄舊咸克交賛叶助而分督其役齋室􅀩堂庫庾庖湢既莫不畢具而雲堂丈室經鐘二樓皆次苐告成先是衆以殿之方向為疑禱之三日乃得吉卜遂無􅀁改護伽藍神新像衆􅀁未悉亦決於卜而後定檀越有祠在殿西偏門徑迫隘則闢使寛廣凡可以致其力者無不為也惟兹山支于天目至是適當風氣之㑹清淑􅀁鍾欝而不洩岡巒廽復􅆼然靚深泉甘土肥林木茂遂誠宇宙間奧壌也閉藏扵空荒寂寥之中其已乆矣造物者一旦而啓之微妙法幢熾然建立際逢昭代教道益隆其興也殆若有時未及百年而鞠為荆􅁄瓦礫之場其廢也疑亦有􅁆得今才公而舊觀復還雕楹繡桷絢耀崖谷金鈴寳鐸殷入霄漢盖以廢為興存乎其人不可盡諉扵時與􅁆也豈宜無以垂示来者使勿墜其志乎才公名必才字大用嗣法扵湛堂云金華黄先生文集卷第十二
