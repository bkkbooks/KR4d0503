body:
  text: 記重􅁱紹興路儒學記今上重紀至元之六年聿新庻政博求才望俾牧逺人得南陽宋公以為紹興路緫管紹興古之㑹府􅀜决趨辦素號叢劇公承命而至未遑它及首以導掦徳意化民成俗為務下車之始周視廟學覩其屋室摧圮弗治倉􅅒枵然貲用單竭惕焉惟學校之廢是懼亟為貸􅀻錢以具祀事發餘粟以賦禄食其眀年改元至正秋大熟於是量入為出而給其經費莭縮浮蠧以資土木之役乃諭士之籍于學及民家之有力而好義者輸財薦貨以助其弗􅁇諏日之􅁻掄材庀工自禮殿論堂經閣齋舘周廡重門以至庫􅁃庖湢緫若干區仆者必起缺者必完瓴甓杇墁峻整堅宻髹彤藻繢偉麗顯嚴繚以脩垣而植表通衢之東西曰文眀坊公於程督􅂆相不憚其煩前後交賛之者教授曽君汝巽徐君霖愷直學韓臨之也其又眀年春甫告訖功而公去為山東轉運使郡人夏君㤗亨時教授杭學謂公之嘉惠斯文不可無以昭示方来奉事状屬溍書于貞石溍忝以非才預聞學政􅁩不敢辤􅀼惟國家臣一宇内弛武而隆文由京師逹于郡邑海隅徼塞四方萬里之外無不立學且慎選良二千石為之師帥徳至渥也頋其廢興靡常㦯彌乆而益振㦯寖就衰落而不支特係夫任其事者能知􅀁當務之緩急否耳兹郡故有學在城北偏其徙寘今􅀁三易州􅀅乃克大備我朝至元二十又七年提刑按察副使王公俁以歴􅀊旣深其敝已極不宜苟蕳架漏徒為具文令撤而改作焉其後郡守胡公元蘇公炳間甞施營葺之功未㡬􅂺壊逮公遂斥大其規制因舊以為新􅀅使儒服爼豆之事永有頼以不墜其仰體上意之􅀁嚮而悉心殫力扵職分之當為可書也已昔者魯脩泮宫詩人頌之土木之羙畧而弗著苐稱之曰穆穆魯侯敬眀其徳􅁇之曰濟濟多士克廣徳心今之土木一新矣游扵斯息於斯而能充􅀋􅃱思日新其徳則公之徳衣被于後人良未艾也請以是諗于同志併書而刻諸公名文瓉字子璋陪台垣儀憲府踐􅏡滋乆其為郡多善政非學校􅀁􅀜皆不書義烏縣學眀倫堂記義烏故有先聖廟在縣南宋慶暦中徙于縣東而立學以應令崇寧􅀄命縣皆置學又徙于縣西㝷燬于㓂今廟學在縣北則紹興間􅀁徙也其後又斥廟西地以為學而規制寖制逮入國朝有司以時繕治惟謹天暦二年冬逹魯花赤鐡閭始盡撤而新之奥殿邃廡夷庭穹門崇髙􅁱廣悉倍其􅃇且改作論堂直廟之北墉面􅀔甚正而地脉􅀮隠隆然以起堂適㩀其脊或挟宫宅地形之術審其方向謂冝避勿犯由是未及就緒而􅃍輟工後来間有不為其􅀁怵者率惮於役殷費鉅㒺敢自任頋假術者之言以為解閱􅀊滋逺莫或以動其意至正三年夏五月縣尹周侯自強来涖事展謁而退覩斯堂之曁茨不施欹仄敝漏殆􅀅覆壓問其故而為之太息亟令鳩財僝功易其已壞而􅀘其弗具杇墁瓴甓必堅必良棟杗豐碩櫺檻顯敞飛榱歩簷周于四阿左右齋序為屋十間基而未構者半完舊益新畢潰于成什器之須待用無缺先賢之祠曰忠孝堂寓於廡下則遷而位于廟之西南巨石偃蹇當乎前軒則因其自然輔以土壤及它山之石使就平坦甃其上為杏壇脩五十尺有竒而廣加其脩五之一始事於是年之冬訖役扵眀年之春主教事者欲圗賢侯之績俾永勿墜爰状其實屬溍記之盖古者惟有學而無廟後世㦯有廟而無學廟學之制莫備於今詔書屢下風厲作成視昔有加可謂盛矣義烏為名縣其有學亦巳乆夫何一旦倐興忽廢春秋行事駿奔走執􅇼豆濟濟在列而考徳問業羣居㳺息皆無其􅀁弦誦之聲希闊􅄫寥㡬若向之有廟而無學何以廣教道稱上旨㢤冝乎周侯鰓鰓焉􅃱其力而不䘏於流俗也凡先王建學眀倫之本意與是􅀖人材風俗文物之大㮣有晉􅁜胡公珵鄉先逹朱公如璋陳公炳及溍之六世祖䖏士君􅀁為記論著巳詳石多不存而其文並傳於今未泯溍不敢勦取前人成􅀃以瀆告于同志之士姑為記其顛末如此俾来者有考焉重􅁱釣臺書院記漢嚴子􅁜先生㑹稽餘姚人史稱先生少與光武同逰學光武即位令以物色訪之得於齊國拜諌議大夫不受去耕扵冨春山按圖志是時齊為郡而未為國其遺迹巳漫不可考今建徳之桐廬實冨春故地先生釣臺在焉􅀁謂嚴􅁜瀬也不獨以嚴名其地而且以嚴姓其州先生髙風盛烈之􅀁存扵此為最著崇立而表顯之使人知􅀁嚮慕奮發不亦為民師帥者之職歟釣臺有祠剏扵范文正公作州之日而重新於蕭侯燧其有書院則自陸侯子遹始更王侯佖趙侯汝歴規制乃備國朝仍其􅃇設師弟子貟而鄰僧怙􅀔悉奪其恒産以為巳有訴之於官僅復其半􅀁食者瘠田五十畝而巳間甞入錢佃其旁官山三十頃取鬻薪之竒􅑿以佐營繕之費豪民欲擅其利搆訟連數􅀊不决至正元年秋緫管羅公下車首務脩眀學政偶閱其牘亟命度其地之肥磽均而為二俾分佃之咸以為平而各安其業山長沈元鼎方謀銖積寸累以興壞而起廢公復諭士人合􅀻錢二千五百緡助其弗給土木之須靡不畢具元鼎㝷書滿徐天麟􅁇之公以元鼎經畫有素留使同竟其役㑹逹魯花赤髙昌公適至與公併志壹慮臨視勸相焉寮佐亦克交賛其事而躬程􅇂之勞則縣逹魯花赤亦刺馬丹也屋以間計凡四十有九完舊者曰燕居殿曰祠堂曰清風堂曰招􅀮堂曰客星閣曰山髙水長閣曰遂髙樓曰羊裘軒曰懐仁輔義兩齋増新者曰三公不換亭曰天下十九泉亭曰錦峰繡嶺亭曰東臺西臺兩亭甃登臺之路而為門以識之又作門其外榜曰釣臺曰冨春山庀事於是年之十月而訖役扵明年之五月寓公遺老来學之士共樂其成於是馬君㤗之以書来屬溍識其􅀊月夫以二千石之重而荷承流宣化之任􅀁以導􅀭上徳扶世覺民者非可家至而户曉也本諸名教樹之風聲待其目擊而心惟氣感而機悟􅀅有惕焉于􅂨不能自巳者矣諸君子蔵􅁱㳺息於斯頋瞻江山想像儀刑聞先生之風而莫不興起尚無忘賢師帥新羙之功哉若夫先生之行義與出䖏之大􅃱見於前賢􅀁論述者溍不敢贅陳也髙昌公名閭爾仕于中朝歴章佩監中尚卿羅公名廷玉興和人以監察御史累遷江北淮東道肅政㢘訪使今由兩淮都轉運鹽使来涖兹郡云婺州路重建府治記婺為郡二百九十有四年郡始為州又七百一十有八年而江南之版圗歸于職方州始為路建緫管府􅀁領為司縣者七為州者一以其地居浙水東一都㑹異時之州􅇬非帥臣則部使者以為治􅀁府署僅寓故西倅㕔之皃契局後稍徙於其西二十歩歴􅀊滋多而繕治弗􅁇復就摧剥經㦄元君某以為乆必益壊且其制度􅄶陋非􅀁以昭等威涖衆庶也謀撤而新之逹魯花赤某公同知府事某公因諉公緫其􅃥事於是諏日之吉徴材庀工増其址之廣三十尺深五十尺而崇稱之門廡堂室為屋以間計者三十有四而增其舊者四之一其宏敞嚴邃則視昔為有加經始扵元統元年夏四月落成扵冬十有二月凡役費為交鈔萬五千緡一出於規運子錢而公􅀻不與焉盖是役也由元君待人以誠而無􅀁欺遇事以勤而無􅀁憚用克底于有成抑亦賢守倅能虚已以聴其􅀁為而又力相之故君得以畢智殫慮而不愆十素也今逹魯花赤某公謂前人之成績不可使掩抑而弗著命刻諸石用昭示于永乆以溍受㕓属邑或者能述其構興之顛末乃以書来俾記之昔者魯脩閟宫詩人頌之曰奚斯􅀁作紀其實也作宫者奚斯而奚斯不專其羙故序詩者又以為頌僖公也溍庸敢􅀼取詩人之旨與序詩者之意誦元君之勞而推及守倅之賢以為之記若今公視前人之功不啻如已出汲汲焉圗表顯之其持心公平而不以彼我為間又嗣為政者􅀁宜取法也􅂺併記焉東陽縣門樓記古者國無小必為臺門􅀁以嚴等威重教令非苟􅆀崇飾而巳也以為不􅀂是無以習民扵上下之分而壹其􅀚聴也古今殊時郡國異體􅀁謂麗譙者不皆出諸侯三門之制其以樓易臺或猶有取禮之以髙為貴者乎春秋譏新作南門非謂夫脩舊而加其度也盖失時也東陽婺壮縣提封㡬二百里民堵至四萬區不啻如古子男國縣署之大門故有樓􅋻仄下陋􅀊乆且就圮丞耿君某以為是不稱古者嚴等威重教令之意爰合其郷之大家俾撤而新之㝷有二尺以為基之崇参其基以為屋之崇脩去屋崇五尺廣参其脩而益五尺凡脩廣視􅃇率加什二而崇倍焉為間者五而加其舊者二焉君之惠孚于人故民樂獻其力智周于物故工喜薦其伎始作於延祐二年冬十月而訖役扵三年春二月又不失乎土功之時是宜舉之易成之亟也學校之士咸相與言吾黨不可拱手視具乃買石而以書来曰吾耿君之興壊起廢可稱述者非一而樓為大願紀成事来者尚有考也溍不佞無能贊羙頌勤然􅀼觀是役也有禮之貴而無春秋之譏能勿喜聞而樂書之㢤動而法於禮春秋則夫􅀁冝書者兹樓云乎㢤程工屬役之凡庸可畧也義烏縣尉司記清江周侯為義烏之眀年至正四年也其年春三月新建縣尉因成来屬以記按圗志縣故有尉􅇬國朝至元間以為􅀱舘而未及改築間甞寓治縣之東㕔終不以為便延祐􅀄始􅁲地創立官署于金􅂠門之内旣已就緒隂陽家或言其地不利廢為荆􅁄之􅂣垂三十年領尉事者僦民屋以居而莅治靡有定􅀁吏抱文書徃来関白恒以宣泄為虞官兵散䖏閭巷阡陌間猝有呼調􅂺爽扵期㑹愚民起而為盗事覺坐逮無􅀁棲寘昏暮乘間􅀼出人尤患苦之周侯詢知其然謂是不可緩亟􅂢俸以倡興作尉刺馬丹㝷輟俸為之􅁇且躬任其役縣民樂周侯之㢘介而無取仁恕而有容者亦願市材甓募匠傭以效其愛助之意乃諏日之吉徙郵亭在縣門之左者於其右増柘􅃇址建㕔軒門廡為屋以間計者緫十有五自庀事至訖功凡五浃旬盖周侯之下車甫十閱月而百廢具舉此其一也夫尉之為職主於求盗而不能教民不為盗其為盗與否視縣政得失何如耳方今國家承平治化流洽周侯膺百里之􅀉又以豈弟之政撫摩其凋瘵􅇂察姦惡驅而歸於善良椎埋搏掩之風日以衰息民安其業而事益不至於尉之廷其庇庥􅀁及非徒循故事設官府俾寮佐得以分曺而按職也昔者詩人覩召伯􅀁舎之樹猶望其勿剪勿伐以侈無窮之思輪奐之羙居䖏攸寧不止扵􅀁􅃕之樹而巳後之君子覽今􅀁記而一日必葺以無忘周侯之徳庻㡬詩人之意乎周侯名自強字剛善以文學政事知名於時它可稱道而不係於兹役者未暇殫述也松陽縣惠洽廵檢司記處之松陽􅀁部六郷其一曰恵洽至元某年始置廵檢其地以教官而假廵檢則自吾岳君始先是居其官者凡􅀂干人咸即寓舍以為治􅀁卒伍散䖏墟落間緩急呼調􅂺後㑹期莫有以為意者至治二年冬十月君寔来眀年秋某月始買地作新􅇬為屋以間數者若干費錢若干而其什七出於君之􅀻槖不足則其吏士洎郷之大家合力以成之又眀年冬十有二月功以訖告門廡堂室器械之須靡不具完君旣諏日之吉入㩀㕔事而休吏士于旁舎廼以書来曰願有紀俾後之人勿廢也夫尉廵撿均以求盗為職而尉得與令長連署常治其邑中廵檢􅀁治率在乎荒郊林莾山區海聚幽昩曠絶之境其為力眎尉難矣矧處為山郡而介于甌越國家􅀄定南服患其􅀼發之不時也甞選用重臣建牙分閫以涖焉雖以積安日乆而椎剽之習或未盡去廵檢之為力不加難乎是以来者幸其苟逭扵吏議則望望然計吾􅀊月而去之固無以居䖏之崇為也君儒者按職甫及期枹鼔不驚而田里之人甘食以安寢又能􅆀其餘力以樹立官府如此向之􅀁謂難者君直易䖏之其設施之整暇何如㢤是有政焉非特土木之功而已世恒譏儒者迂且憚事若君之為武夫俗吏不可少媿耶為之記􅀁以昭作始之自亦􅀁以􅇚儒者之譏也君名自􅁱字徳敏宋太師鄂忠武王五世諸孫今為常之宜興人重􅁱廣濟庫記􅀦朝旣取宋分命重臣行中書省事涖治其地仍即其帑藏置廣濟庫以􅲁焉􅀁統郡邑􅀊入上供及經費之出納無􅀁不掌庫在今杭之清湖司其事者呵護惟謹至正元年夏四月乙未庫東南一里􅀁細人之家不戒于火延及庫門自官㕔吏舎衛卒􅀁廬至于神祠盡毀平章政事光禄公躬率僚属􅇂視救止之寳庫及它敖屋二十皆頼以完公謀於􅂙知政事道同中奉公謂興壞起廢莫先於此宜有􅀁改作以絶非虞故丞相儀同公適􅀍上旨出臨江浙􅁢恊其議爰俾照磨文林郎孫三寳都鎮撫脫脫度其形便以圗来上諏辰屬役因以孫君領其要按圗改作焉先是貢輸始至皆暫寓于行廊必文移巳具遣官監臨乃以入于内庫奸利之弊日滋且其飛榱步櫩􅂙差交錯遺燎􅀁由及也遂於内庫門之西増剏敖屋十有六以候貢輸之至中設架閣庫以庋簿書其東則為相府之行署與筦庫者之治􅇬略􅃇址立祠以奉倉史之神䖏衛卒於外門之左右而稍更定其位置撤寳庫之前軒及敖屋之行廊而悉易以方亭錮鐡為牖壘甓為墉中闢大門而四旁繚以脩垣亦如之鑿三池瀦水環扵其後周防備盡前􅀁未有孫􅀂述其顛末以授溍俾為之記溍􅀼惟昔之有國家者蔵冨之􅀁散于列州而今也蔵冨之􅀁聚于諸省大江以南為行省者三而土産之豐無踰扵江浙􅀊􅀁入泉幣金玉織文它良貨賄待用之物以鉅萬計􅀁儲為甚厚􅀁擊為甚大在禮君子􅀅有􅀁營必以廐庫先於居室釋之者曰重􅀦用也今兹火之􅀁焮故宇當復者㡬區􅈗執大臣知國用之為重而先其􅀁急寮屬執事之人又能力相之皆有合於禮􅀁可記者不止土木之羙而已庀材僝功之目公牘詳焉此不書平江西虹橋記㤗定元年冬十有二月庚午平江閶門外新作虹橋成古者辰角見雨畢而除道天根見水涸而成梁有司之常事耳春秋之法常事不書此何以書在有司常事也而此非有司之常事也按郡志橋之載扵圗籍者三百五十九而爲虹橋者三其一在城西􅀂干歩即此橋也去年夏大雨水􅁀溢橋居兩水之交􅀁施材甓皆腐缺莫能與水􅎨一夕盡圯其地適控通衢凡徴令賜予布政於方國􅀂奉貢輸賦脩職于亰邑者悉由是而之焉執事者奔走迎勞無虚日懼舟檝不足以嚴使客則栰木以竢之方謀􅀁以復其故而官帑不可􅂺發又重以其役厲民未知費􅀁出郡民鄧文貴聞之請分家貲之半更爲石橋以利永乆旣又以爲此有司者之事非細人􅀁得干也乃飭材用庀工徒以聴要束焉事聞于府府上之行中書已而報如其請遂以八月乙丑始事閱八甲子而告訖功橋之􅁱四百尺而其髙十分􅁱之一五分而殺其二乃與岸等脊之廣得髙之半而趾之廣加其什伍上設扶欄爲之周阹其下爲門如半月以釃􅈇河而隄其兩垂以度輓者􅀁用錢以緡計者十二萬五千有竒役以庸計者二萬四千有竒今緫管郭公旣率僚属觴酒橋上以落其成且謂文貴編户民非有名田稍食貨殖竒􅑿􅀂它大姓比川梁逵路官實領之而文貴頋能輟其衣食之餘以紓有司之急不宜無以示􅂆相乃伐石俾溍執筆書其凡而刻焉夫以一夫尸利物之功而長民者能表樹之以寓其風厲之意是皆有司常事之􅀁不及而於法冝書者溍不得辤也傳曰一家仁一國興仁一家讓一國興譲是􅀖之人誠知􅀁感發而慕效焉則夫可以脩廢舉墜而出扵有司常事之外者其屢書不一書尚託始於兹橋也文貴之可稱道而不繫於橋事者兹不書婺州通濟橋記婺瀕谿為郡二水薄城南合流而西其􅀔滋大距城一里􅀁故比舟為浮橋以逹徃来霖潦􅁀溢絙弱弗支舟數敗散水湍悍不容篙艣成有急而冒險以進多􅃱覆溺西峯及菴禪師憫人之病已甚謀伐石作橋以利永乆禪師名徳之重尊官大吏豪商冨民莫不慕嚮之輸財薦貨狎至宣慰使合刺䚟金吾公為移閩閫徴善工而授􅃥焉度地於浮橋西若千歩排積沙以定其基布横木以實其底絫石于淵者十有三旁為兩隄中為十一頓凡頓之形西正方東則小撱而剡其上以殺水怒起大徳四年秋九月訖十年春三月兩隄十一頓皆集未及架木為梁而禪師遷湖之道場㝷委順示寂杭㳺民沈甲㫁髮為頭陀走亰師紿權貴人言我及菴弟子願假外護以畢橋事權貴人不知其詐為請于東朝旣得請南還則並縁取民財奪商人木衆共患之郡長吏亦遭其􅇒侮而弗堪也乃發其姦陳之䑓司以聞于上正其罪沒入其錢遂罷橋局而毀石頓石堅緻不易動僅仆其五而止延祐元年冬十有二月也禪師之法子雪牛芻公甞以橋不可廢訴於官議乆不决元統二年春部使者徐公甫下車即詢民間利害當興除者有㡬友雲龍公時主西峯法席亟以兹橋為言徐公矍然謂人之為民害者宜繩以法橋以利人不宜因人而廢親署公櫝為申眀之未報㑹徐公入􅂙議中書省事白於􅈗相執政咸以為橋梁與不急之役異詔旨甚明有廢必舉無可疑者符下龍公首罄衣盂以倡興作江浙行中書省旣給以前􅀁沒入之錢二萬餘緡行宣政院亦命開壇集衆僧受具戒得香幣之資為錢五萬緡乃市大木於處之遂昌募良匠於閩南江左以至正二年夏四月庀事今工部尚書慶喜公前刑部尚書張公並持部使者節而来躬涖眡之且輟俸金以増役費寮佐及􅀁部吏民佽助恐後二公復併志壹慮殫其勸相程􅇂之勤於是諸頓悉完頓之髙去水四十有一尺貫以木梁􅀍以石甃髙出頓上又八尺而橋成橋之脩七百八十尺廣若干尺覆以屋如其脩廣楹間五十而為殿者三為亭者二殿以妥􅀚音大士泗洲僧伽玄天上帝之神亭以寘四天王因浮橋之􅃇名榜曰通濟其年冬十月既望張公率憲府曁文武官屬以落焉伻来俾為之記古者以夏正之九月成徒杠十月成輿梁有司􅀊一治之耳是役也遡其造端之始已不啻四十年而一作一輟卒有待乎任風紀者力振舉之援著令以􅀙事乃克就緒其廢興􅀁繫固非有司毎􅀊之常事􅀁可㮣論夫何以措其誦羙之辭㢤昔泉州守蔡公記萬安渡石橋苐叙役要而不及其它盖春秋之法􅀁謂直書其事具文見意者也溍不佞敢􅀼取斯義考其廢興之故而􅇱記之用謹􅀊月云爾昌平縣石橋記由都城北抵上亰其驛十有二而昌平之爲縣當其第一驛谿水逕闤闠中横絶通衢霖潦􅁀至則水湍悍益甚人莫利涉縣尹畢侯以爲昌平今畿縣大駕時廵次舎在焉凡侍􅀙之臣􅀫衛之士與夫外頒教令内奉職貢使客傳􅃍之徃来率由乎是為長吏者􅂚敢弗謹廼規貨食募匠傭揆曰之吉架石為橋其脩六十尺而其廣得脩四之一自始作至訖功為日若干車者無濟盈徒者無厲深而民不知有役咸相與誦羙之掌其驛事者宫君琪持父老之言来諗曰吾畢侯之為人素慎重雖居􅇵縣善操蕳以御煩見謂材敏然以㢘平不苛民樂其業田里安於無事用能以暇日􅃱力扵兹橋願有紀而附見其治行之槩勒諸岸左以貽永乆古者列􅀦有四鄰賔客之交入其境而門􅀜逵路廬舘川梁脩除之不時猶㦯譏其失政矧今百里之郊警蹕􅀁臨有能勤其官敬其事而不忘乎嚴飭具備如此可謂無失政矣豈徒一時興作之功有足稱道㢤庸弗辤而為之書善觀政者有考於斯則它治行固可推而知也畢侯名文質濟南士族其出􅈗也由翊正􅁺外􅀘云婺州路新城記婺在吴為東陽郡在梁為金華郡隋肇置婺州國朝即州建路設緫管府而郡城之剏始靡得而詳圗志載宋宣和四年知州事范之才重築周十里基三丈面廣三之一而髙倍之舊為門十有一後窒其四而存其七東曰赤松南曰八詠曰清波曰長仙曰通逺西曰朝天北曰旌孝逮今二百有三十年圮壞弗葺非一日矣聖人有作一視同仁八荒之内莫非我室我闥林林緫緫之衆相安乎鑿飲耕食無分乎此疆爾界而皇靈􅀁􅀍封守有截隠然若天險之不可􅁜不假参以人力也頋以承平滋乆執事者習於因循忽於細微不測之變起乎倉猝中區俶􅅰而旁州比縣民譌不寧於是行中書省用江東浙西列郡之請俾治其故城而新之以俻非常謂浙東地瀕鉅海尤􅀜於要害併下其事于帥閫令郡府相其便利而講行修築之政焉婺實肅政㢘訪司治􅀁今副使伯嘉訥奉政公僉事秃滿鐵穆爾朝列公奉議王公武曁照磨某官王君某咸以為有􅇱乃可以無患此古之良規今之切務属緫管太中陳侯伯顔不花亟謀興作僉事鐵穆迭爾奉議公適至交賛其議陳侯亦自任為已責而不敢後爰頒其役于州縣州縣之長吏各率􅀁部之民来聴要束資糧旣具匠傭旣集乃揆日以庀事大家則量地而賦工中産則輸財而佐費廧落屏蔽次苐就緒然以古之言地利者盖曰髙城深池今外壕堙塞城已髙而池未深也不可憚其勤而諉於方来由是役既輟而復舉籍向之役􅀁不及者使出錢為僦直募間民来即工而官給其食推求故道䟽鑿而濬滌之州縣長吏則更休迭進以董其役副使公首尾親臨􅇂視命奏差錢元丘岳與本路緫管府判官周九鼎及處州路青田縣尹葉伯顔等相􅁇緫其工程而為之經畫􅂆相經歴某官某知事某官某君某􅁇至副使公藉其佽助為多焉城之綿亘悉仍其故址以尺計者一萬七千七百九十厚二㝷有四尺髙二㝷有二尺以今昔之度凖之俱有加於舊縝壮雄峻則昔之􅀁無也七門並啓扃鍵如式而西北二門皆環以甕城甃石為路脩與城等絫甓為堞其崇五尺屋于門觀之上者七以謹候望屋于雉堞之間者三十有六以嚴徼廵其南因大溪以為險北東西三面壕之脩以尺計者八千六百二十有五廣六㝷二尺有八寸深二㝷有六寸跨以三釣橋遏以三石􅄵壌髙水絶則列樹七星樁以防其空郄屋于壕塹之旁者三十有六而棲戍卒扵其中凡城之役起至正十二年春閏三月己亥訖其年秋七月乙酉積日爲百有七壕之役起是年冬十月丁卯訖眀年夏五月甲申積日爲百九十有八而畢潰于成居者有恃而無恐徃役者以分之􅀁宜爲而忘其勞陳侯使叙次顚末以授溍曰其爲我書而鏤諸城隅用昭示于後人溍􅀼惟易於萃戒不虞而重門擊柝有取扵豫使莭􅀁莅婺爲㑹府民物萃聚殷盛叢􅇵儆戒無虞而隂消潜弭姦覦之萌誠有不容緩者鄰境之枹鼓相聞而婺獨按堵如故居安慮危思患豫防及是閒暇而汲汲焉圗􅀁以固吾圉夫豈過計也㢤矧今風紀之司􅀪宣徳化而人知尊君親上撫字之官博施恩信而人樂趨事赴功且􅀅以民心爲垣墉士氣爲樓櫓精神翕合與山川之脉絡相爲流通益重金湯之􅀔而於地利人和兩盡之矣國之保障永永是頼嗣爲政者􅀁當知也可無書乎州縣分領其役者蘭溪知州唐棣判官許文儼金華逹魯花赤阿速台尹徐􅁢益東陽丞􅃽受益把札普化義烏尹周思㤗丞小雲失帖木兒永康主簿李煦武義尹郭斌主簿陳以威浦江主簿暗都刺攝録事司官楊仁張仁府僚主文墨書其􅃥要者提控案牘兼照磨孫彌徳也紹興路新城記皇元建極四方攸同文恬武嬉踰七十載愚甿無知因乗間􅀼出而弄潢池之兵釜中㳺魚尚假息於海瀕封豕長蛇荐肆食於河洛重山浚谷野林荒墟螽屯螘聚之軰徃徃相挻而起蔓延及於杭城而官府邑屋之盛麗陸海珎異之冨饒一夕而燼至正十二年秋七月十日也紹興故越地杭越相距百里而近譌言相驚人不自保扶携而去閭井爲空御史檄浙東廉訪司分臨坐鎮之扵是僉事秃滿帖穆爾朝列公乘傳星馳而至時鄰境之遺孽猶未盡殄公亟募義勇民丁佐官軍扼其要衝以遏其奔突招集流散復業者一萬五千餘家士氣旣充民心亦寜而未有以為籓籬之固公首輟俸貲倡衆大治其羅城聞者咸歡趍之城之周廽四十五里度其當修築者四千五百二十犬六尺九寸賦於有田之家俾随苗稅之髙下而􅃱其力相城基之存否而以一丈為率粮至二十石則使因舊而繕完粮至四十八石六斗則使圗新而興作粮不滿三石則令助其費每民田一畒出鈔以錢計者三緡官田則减於民田而出其三之一無田者則令傭工就食而仍給其直城之址厚四㝷去其厚㝷有四尺以為城身之髙去其髙七尺以為城面之廣身與面俱帖以石而絫甓四尺以為女墻下設戍屋五區上設廵鋪一百二十五座夹城内外濵濠有路以通􅀐士之徃来其内有慢坡以便邏卒之登降爲門者五爲水門者六皆錮以鐵而水門之下半爲鐵䆫正東與東南正西與西北四門各有甕城抱其外正北則爲重門以代甕城門皆架石爲洞髙㝷有六尺水門亦如之上各有樓又建望亭及發號之㕔於城北隅之蕺山公以門之􅃇名乃前代􅀁命更製爲新名以易之正東曰雲瑞而水門在其北里曰朝陽東南曰㑹稽而水門在其北里曰東明正西曰常禧而水門曰澄清西北曰承恩而水門曰拱辰正北曰泰安而水門曰永定正南惟水門曰興利始事扵是年秋八月而訖功於眀年春三月公旣令州縣專官庀其役復命緫管府判官李􅀂愚推官錢徳誠録事判官瞿榮智爲緫制官以受役要而判官髙明推官馮某王某分􅇂其工程書吏伯岳䚟郭塤奏差張與義則廵察其勤惰而勸勞之今逹魯花赤伯篤魯丁正議公􅀄涖郡政未遑它及獨於兹役尤盡心焉謂不可無以序其成績告于後人爰命儒學教授杜易状其實而属溍以記溍􅀼惟越扵三代爲建國東漢立㑹稽郡包跨二浙七閩之境而提封益廣唐以越爲浙江東道節度使治􅀁後改置觀察使而以越州刺史領之自是越常爲㑹府兵衛之雄強城池之嚴邃悉與之稱而其地東奄溟海西界濤江南巒北阜環拱森列山川形勝千古一日綢繆牖户人事聿新今之爲郡雖同於支屬風紀之司則異時觀察使之任也持節􅀁届左控右引事􅁠合一脉絡貫通風采振􅀭方面増重􅀮然有不可犯之􅀔而斯人之􅀋莫不􅀝爲磐石之安豈非金湯之大者乎凡􅀁可記不止扵平板榦程土物議逺邇揣厚薄量功命日而已庸弗辤而為書永嘉縣重􅁱海隄記溫為郡俯瞰大海江岀郡城之後東與海合直拱北門枕江為亭榜其顔曰四時萬象候舘在焉使􅃌􅀁臨長吏迎勞無虚日亭之西為市區百貨􅀁萃㕓氓賈竪咸附趍之江滸故有大石隄延袤数千尺舎舟登陸者阻泥淖不得前其俗率於隄之旁為石路外出以属于舟次謂之馬頭凡為馬頭者二一以俟官舸一以逹商舶云先是江水遏於沙洲由江心寺之西逆流而上􅀔奔突莫支隄數毀繕治之費公􅀻交以為病至順二年秋水􅁀溢括蒼山中被郡境􅄓風激海水相輔為害隄傾路夷亭随仆永和塩倉亦圯水怒未已且􅀅破廬舎敗城郭永嘉盖郡之治􅀁縣尹趙君大訥謂是不可緩亟議興作俾大家之役於官者分任其事或輸以財或薦以力經畫勸相則身親之以潮汐之盈縮有時也􅄬其􅂩而賦功焉列巨木為柱而設栿柂其上内攅衆木圍之三周外施其芒以撥浪次填以石次積以瓦礫而實土其中加横木􅇱其欹側而帖石其背以便行者隄若路曁亭之址悉如之而亭亦復其故始事于三年之春二月訖役于冬十一月費不益於舊而功倍焉伻来俾記其􅀊月溍惟春秋之法有直書其事具文見意者敢􅀼取斯義叙次梗㮣不復效近人之記事謬為䛕言以亂其實續郡乘者尚有考扵斯徐偃王廟碑後記衢州徐偃王廟有韓愈氏􅀁為碑文其别廟在今蘭谿州者里人徐畸實為之記畸辨其未甞稱王而建安􅀽聘儒記江山之别廟直謂孔孟之徒無道偃王事者古昔帝王事蹟不載於經而雜出扵傳記百家之書固多矣况偃王事見司馬遷史記范曄後漢書張華博物志本末甚具至愈之文出而學者家傳人誦之偃王仁義之心遂以􅁀白扵天下後世由愈之言可信不誣也若愈者非􅀁謂孔孟之徒歟衢人柴某家于蘭谿既與州之士民脩其祠事且摹刻愈碑文立石殿廡而属溍志其􅀊月于下方溍􅀼惟湯武以仁義興偃王以仁義亡興亡雖異其為仁義未始不出於心之同然是州之人誠䏻於愈之言信而不疑則其􅃱力於神將弗懈而益䖍祥慶之来下䕃庥之􅀁加未有止也庸附見畸聘儒之􅀃而論次之庻覽者得以詳焉胡侍郎廟碑隂記胡公仕宋為時名卿婺之永康實公郷邑公甞讀書方巖山中殁而為神發祥其䖏宣和間封佑順侯紹興末乃賜廟額曰赫靈者􅀄封誥命中語也佑順之號既累加以嘉應福澤靈顯極于八字淳祐間遂進爵為公更號顯應㝷加正惠寳祐􅀄再加忠佑杭之南山龍井源公墓次有顯應廟􅃙命在焉廟不書賜額而以顯應名者因􅀄進封之號也公本以助王師殄巨宼廟食于一郷而其光靈無逺弗􅀍能出雲為風雨農人咸以望􅀊者望於公凡村墟里社必為祈報之􅀁故公之别廟布滿於郡境不啻數十百區其在吾烏傷之稠巖者里人方氏倡衆為之也宋􅀄婺之第進士者自公始至其季年方氏有大冶丞應龍以進士起家而族日益大其子孫相率􅃱力於祠事彌乆弗􅈈者盖亦視公為郷先逹而知􅀁敬慕不徒效俚俗徼福於公而巳廟之創造以至元二十六年重興以至正九年新廟告成以記来謁於溍由公之隂佑乎斯民而變化不測有以驚動其耳目者庸夫孺子皆能言之至於公之􅁬由一第逮事三朝七握州符六持使節選曺計省㦄踐要途晚以􅀙官全身而退其有徳扵人有功於國與夫出䖏之大􅃱非薦紳先生莫􅀎言也願俻著之溍􅀼惟公之官伐治行有傳在魏國韓公􅀁修宋實録而文正范公􅀁撰公墓誌論次尤悉謹書而􅂌之使刻諸石且為之記其作廟之􅀊月附見于下方若郡志言公甞奏免衢婺身丁錢民􅀍其賜而為之立廟則傳與墓誌皆無􅀁登載姑俟博洽之君子而考質焉忠簡宗公祠記義烏懣寺鍾記宋名臣忠蕳宗公之文也石毀弗存已乆寺僧曰直曰謐實公七世諸孫直先示􅄫謐今以甲乙之傳嗣為住持爰輟衣盂之資購田若干畒祠公於西廡探家集得􅃇記重刻諸石而俾溍志于下方謹按公諱澤字汝霖世為義烏人元祐六年中進士第調舘陶尉歴龍㳺膠水趙城令政和三年改官知莱州掖縣差通判登州忤道士得􅄑用事者既丐祠而歸猶坐削奪羈置鎮江因􅁲居焉經郊恩叙復監鎮江酒靖康元年以臺臣薦召對假宗正少卿充和議使公奏名不正更其名計議使訖不行㑹選易河北帥守乃擢公直祕閣知磁州河北義兵都緫管就遷祕閣修撰髙宗以親王奉使過磁公力止之朝廷即授以兵馬大元帥公為副元帥暨髙宗正位宸極命公以龍圗閣學士知㐮陽府俄徙知青州又徙知開封府遂以延康殿學士為京城留守兼開封尹陞資政殿學士公方身任中原之事時􅈗忌公者從中沮之公以憂憤成疾而薨建炎二年也有􅈲拜公門下侍郎御營副使而􅃍以遺表聞詔贈觀文殿學士㝷賜謚忠蕳公階正郎䘏典􅀄行止用侍􅀙恩數進四官後乃以通議大夫告其第累加至開府儀同三司云公墓在鎮江之京峴山而立廟於郷郡􅀙祀扵邑庠並著為有司之彜典謐之生上距公殁二百餘年且去家為浮屠而不忘乎賢其賢親其親祠事之興又禮之以義起者也溍是用序次其作始之自并以公官伐之㮣系焉公平生大莭及功施于社稷者有傳在國史有遺亊行扵世兹不書金華黄先生文集卷第九
