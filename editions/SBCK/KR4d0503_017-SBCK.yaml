body:
  text: 錢氏科名録序溍􅀚宋中興登科記未甞不爲之掩卷太息也嗟夫彼爲舉子業者營營汲汲積其晝夜之勤至於獲自進於有司而􅂛於天子之廷固千萬人􅀁共嘆羡其光榮而以爲不可企及者也今去之逺者不二百年數其氏名而泯沒無聞者已什七八􅄑而以材能􅃱通顯有績用可考見傳子若孫鮮不失其業者若夫大賢君子􅀁以垂世而不朽又非必恃科目以爲存也是不亦可深長思乎通川錢氏四世九十年間第進士者二人特奏名一人貢禮部者十有四人待􅀘太學生者十有二人迨國朝著取士令有名以道字子原者首應詔名賢書何昔之泯滅無聞者衆而錢氏之世彌乆益振也意其積累以􅃱此必有出乎科目之外者矣豈非古􅀁謂君子之澤哉子原之伯祖籍田令與溍之曽大父户部府君俱淳祐庚戍進士故子原以錢氏科名録示溍使為之序而溍頋謂科目有不足獨恃者其有望也夫其亦以自警也夫徐氏詠史詩後序孟子曰王者之迹熄而詩亡詩亡然後春秋作盖古昔盛時之為詩薦於郊廟則有以見其盛徳陳於朝廷則有以知其政之廢興施於􅀖􅀦郷人則出於上而􅀍扵下者又有以為教及其衰也先王之政教號令雖不行而流風遺俗有未盡泯是以風雅之變徃徃陳古以刺今至於王澤竭盡而無餘其詩始不足以使人創艾而興起故曰詩亡聖人不得巳因魯史作春秋褒善貶惡以示􅂆戒是則詩巳亡而其可使人創艾興起者頼春秋而猶存也後之君子有作其文則史其義則於春秋無取焉仁人志士覧其事而有槩扵心莫不為之發憤壹􅊊嗟歎而詠歌之然㦯因一人或因一事以為言若王仲宣􅈠子建之於三良張景陽之扵二踈謝宣逺之於張子房虞子陽之扵霍將軍是巳惟左太冲􅀁賦頗及戰􅀦秦漢事未有窮捜極討上下古今備究其得失而無遺者唐之詩人間有興懐陳迹章聮句續至於累百而止頋其言多卑近徒以資兒童之口耳於名教何預乎蘭谿徐公夙有聞家庭􅀁傳儒先道徳性命之􅀃而尤精於史學凡司馬氏資治通鑑􅀁紀君臣事實可以寓褒貶而存勸戒者人為一詩揔若干首大義炳然一本乎聖經之旨誠有功於名教者也春秋作於詩之旣亡而詩之能使人創艾興起者乃復見扵春秋絶筆千百年之後豈非先民性情之正有不亡者存詩與春秋固可迭相為用乎公殁巳乆仲子津始出其詩求許先生謙張君樞為序以傳不鄙謂溍盍爲後序溍􅀼􅀚先師朱子感興之作挈提前史之要領為言至約而有関於名教甚大朱子甞謂學不可徒博亦不可徑約今之學者不由公之博何以入朱子之約乎是用志諸末簡以諗于同志其亦以為然否公諱銞字秉􅀦其父兄師友源流之懿見於前序者此不具六藝􅀋要後序先王之教内施於國子外被於萬民其教之者有三徳三行六德六行之别而均教以六藝為法至詳且宻為事至煩且勞而人生其時無弗學焉後世經殘教弛專門之士有不能知其名物而通其意者矣况夫貴㳺子弟與凡民哉幸其遺法散見于經傳而雜出于他書後生小子雖以殊時異制不得身習其事猶可誦其言而粗窺其彷彿先儒朱子懼寖逺且益墜爰纂輯而彚次之以詔于方来其凡目存於小學之書而其宏綱大義微文小節悉著扵儀禮經傳通觧朱子自序禮之通行者及郷射大射已畧見諸篇樂經亡逸遺聲乆絶而書數日用􅀁須不可不講取周禮鄭註太史公淮南子前後漢志杜氏通典為鐘律篇取唐開元十二詩譜為詩樂篇取許氏􅀃文解字序􅀃及九章筭經為書􅁆篇廢不可考者惟御法而巳然其書作扵朱子之晚年䘮􅀕二禮旣以屬之門人甞欲請于朝以鐘律别為一書而奏不果上大射而下俱未脫藁書數則闕而弗具朱子之有志而未遂者能無望後之君子起而成之乎此六藝􅀋要之書􅀁為作也溍􅀼觀其􅀁述五禮之義六樂之歌舞五射之法五御之莭六書之品九􅁆之計壹本諸經而参稽乎傳註史氏百家之􅀃推尋其端緒以廣先儒之未備折􅂨其牴牾以啓先儒之未發有功於新學固多矣豈徒足為好古博雅之一助哉顧今之為士者􅀋皆慕逺大而忽細微穿穴性命窮髙極深而不察夫制度文為無非聖人精神心術之􅀁寓道之與器未始相離也眀先王之􅀁以教而成朱子􅀁欲為之志不在是書乎書凡六卷臨江周氏剛善父述有翰林掲公㬅碩頋與溍之同年王君師魯􅀁為序溍獨遡其源流之自以為是書實􅁇先儒而作庶㡬同志之士共謹其傳焉陸氏蔵書目録序呉郡陸君居闤闠中四壁之外輙與賈區直君殊不以為溷一榻簫然環以古今書凡若干卷自經史傳記下至權謀數術汜勝虞􅀄旁行敷落百家衆技之文櫛比而鱗次入其室如登群玉之府而探􅅫莱道家之名山焉忘其為居之隘也君旣苐其篇帙部分􅀋别為之目録以便覽者且屬予使序之夫稲粱稷􅁰魚肉果􅂼人􅀁資以為飬生之具不可一日缺者也得之足以飽而不足以極天下之味言珎異之味至豹胎猩脣封熊之蹯可以為羙矣而非可常􅃱以給朝夕之須彼水草小蟲蜩范蚳蝸野果之實人􅀁易􅃱而未必皆知好其味也世盖有􅄝書若􅄝飲食者頋􅀁􅄝之不同而有不可得兼耳君其兼而取之者耶􅀝相之􅀁讀今也夫人而讀之韓宣子之􅀁見今也夫人而見之延􅁜季子之􅀁􅀚今也夫人而􅀚之世之不可缺者君固不敢專而有也蘭臺之􅀁不掌金匱之􅀁不蔵世莫之􅆀與夫可􅃱而莫之好焉者君亦未始以為我之得􅀻也然則君之志􅂚甞不欲與世同其􅄝乎此目録之􅀁由作也抑予聞之老子曰五味令人口爽好竒之士苟㳺扵君而獲其􅀁􅄝焉染指而出足矣尚無以秦人之炙易吾之炙也哉鄭氏義門詩序浦陽鄭氏聚族而居者八世有司為請于中書而旌表之號曰義門且復其家力役之征俾無有􅀁與今集賢直學士掲公實為之記一時聞人徃徃賦詩以羙之謂子與鄭氏居同郡知鄭氏者冝莫予若因屬予以序予家距鄭氏不兩舎而近納交鄭氏父兄子弟間􅀊行已再周其知之固深矣集賢公之􅀁稱述豈有媿辭乎抑予聞之古有合族之道非士庻人􅀁得行而親親之仁無貴賤一也合族莫重於立宗立宗之法或五世而遷或百丗而不遷五丗而遷聖人不以為失於薄百丗而不遷聖人不以為過於厚遷以辨其異不遷以統其同二者盖並行而不相悖也若夫数百千指聚居而食雖古公侯之家皆所無有而後丗士庻人之家乃或有之可不謂難矣哉是宜史不絶書而上之人所以褒嘉之者遂著於令逮至我朝史臣序禮典為目三十有二而旌表居其一然則凡可以勸親親者又聖人之所不廢也兹非所謂禮以義起者耶鄭氏於古人合族之道夫亦有取其義云爾褒嘉􅀁及有司既奉著令􅀙事而未克上其􅃺于太史氏予輙弗辭而次苐其詩本諸作者之意系於末簡庸俟夫陳詩以觀民風者焉送吳良貴詩序異時浦陽方先生館同里吳氏栝吳先生善父粤謝先生臯父咸在焉三先生隱者以風莭行􅁩為人所尊師後進之士争親炙之而良貴有聞於􅀻淑為多方是時學者未有塲屋之累得以古道相切磋論文析理窮極根柢間出其緒餘更唱迭和於風月寂寥之郷亦足以陶寫其性靈三先生杖屦所臨一言一咲無非教也元貞丙申予幸􅀗執弟子禮見方先生僊華山之下退又辱與良貴游俛仰之間􅂷四十年先生已不可作一時之人物星離雲散或随牒逺方與時浮湛或以名字著聞入通朝籍或浩然獨徃於重山宻林不復與世接而予亦老於州縣聲迹邈焉不相及乆矣今年秋迺聞良貴將主教於稽山朋舊皆為詩以送之嗟夫良貴䆠家也祖父俱仕而未大顯不能母望良貴以其所就之實少自見於丗良貴頋獨逡廵逺引恬䖏下列瞠若諸公之後年踰五十猶為所謂山長者焉名不上於三銓秩不滿於百石豈其祖父之所望哉雖然良貴之得於三先生者非干禄之學也惟不必於仕故崇䑓䆳館不以為慕惟不必於不仕故寒齋冷廡不以為厭其出處之際慮之審矣吾黨無所復進其愛助之言姑為之詩以志其離合不亦可乎自方先生之子壽甫而下詩凡若干篇道其故舊以為之序庻幾作者之意也送應教諭詩序古之為師友者非徒有所嚴憚切磋其相與之際至親且樂也盖夫人之少也既游扵黨庠術序而其以賢能興於郷也必還使長而治之逮夫老而不仕則又朝夕坐於閭塾而為之師以敎其子弟􅀊時射飲讀法之事莫不相與從容揖譲升降酬酢奔走出入乎其間士生斯時自少而至壮且老固未有乆去乎學者雖以公侯之貴任君師之重為士者不敢以其尊而弗親之也故其詩曰無小無大從公于邁又曰載色載咲匪怒伊教由是言之則其師友之親且樂何如哉是以及其衰也詩人猶􅁔之曰縦我不徃子寕不来盖師􅆸民散而流風遺俗有未泯也古者學校之盛非後丗所及者豈獨其道之􅂭法之宻乎盖亦相接以粲然之文相愛以驩然之恩薫陶鼓舞優游而厭飫之有以興起其良心而成就其徳性焉尓今之士既不必群居於學主敎事者又皆以資格序遷而不能乆於其軄不幸有如荀卿􅀁謂子游氏之賤儒且將盻盻焉疾視其長上尚安望其親且樂耶黄岩應君署吾邑敎官以秩滿當受代邑之人士咸惜其去相率賦詩以道其離合之思大萹短章亹亹而不巳非其親且樂至於乆而不厭何以得此歟予故諸生也忝􅀍官使不得從先生長者之後日與應君相周旋以寓其親且樂之情􅀼喜應君之得扵其人者為不易又以見夫土風士俗視它邑為猶近扵古也乃為本諸詩人之旨以序作者之意且志予愧云送鄭生序今之官于學校者自職教一縣䓁而至扵胄監之長貳咸有師道焉胄監位尊而秩厚非鴻徳駿望莫能居之若夫縣教官率選署扵閫外累其月至九十始得上名銓曺􅀘郡文學而與醫􅁲執技者齒滿六􅀊乃得預流内銓其閱歴之勤且乆如此老生􅀫學旣無􅀁事乎其間有志之士苟資以自進固不得俟乎強而仕矣盖古之為師必取之仕焉而巳者而今也一以諉之未及强仕之人不亦任之䡖而責之重乎餘姚鄭生妙年好脩再試于有司輙不合方退而軄教于剡是特資以為進而非的然以師道自䖏也雖然吾懼夫人之以師求子也抑子聞之古者學官不必自為師􅀦學之政緫於大司樂而論􅀃扵東序者有大司成焉司樂弗專也郷學之政緫扵大司徒而朝夕坐扵閭塾者有父師焉有少師焉司徒弗親也􅀃者曰父師少師皆仕焉而巳者又曰父師司成司成豈亦仕焉而已者耶是故官有軄而師無軄官以法師以道也吾子誠不以今之法廢古之道剡之郷先生仕焉而巳者冝為子起矣它日剡父老舉以相告曰吾剡之得師自鄭君始頋不韙歟生之行有日凡朋從咸以詩送之而屬予以序故予為道其軄分之冝為者以告焉送汪生序始予旣知學頗思自㧞扵流俗而患夫窮郷下邑塊焉獨䖏無從考質以祛􅀁惑聞錢唐古㑹府號稱衣冠之聚􅀫儒遺老猶有存者則粮笥書踰濤江而西􅄑而有􅀁接識然以違親越郷不能乆與居與㳺間􅀗聆緒言之一二終未至盡大􅀚而無憾也毎誦昌􅀺韓氏􅀁志歐陽詹何蕃事未甞不有槩扵予心嗟乎詹以求道而去其親蕃以其親故不得安居以卒其業此兩人者雖若各行其志夫亦有􅀁不得已焉爾為士而生於師廢民散之後何其不􅄑歟四眀汪生少􅀙其父䆠㳺西州而及諸公之門􅀭秋濤於學海􅄃夕秀扵詞林有日矣今方奉晨昏于信之玉山信固名郡異時東南文獻多在焉其學者又徃徃先經術而後文藝屬兹昌辰崇雅而黜浮三􅀊大比褎然前列必信之士也入則有色養之􅂬出則有師資之益歛其華而就其實在此行矣是盖詹與蕃􅀁欲而不可得者矧如予之􅀌陋能無􅀁歆羡乎惟生知自慶􅄑而期無愧扵詹與蕃則予􅀁望也輙抒鄙懐以為臨别贈言之首云送王雲卿教授詩序昔朱文公與張宣公吕成公生同時且同以聖人之道為已任而傳洛學者獨推朱氏為大宗文憲王公則朱學之世嫡也吕氏王氏皆以故􅈗相家為吾􅀖之望王氏之族尤大以衍其不奪於冨貴卓然有􅀁樹立以表見于世者固不乏人而文憲訖能自任以斯道之重不亦豪傑之士哉溍生也後不得及其門而事之間甞獲􅂛玉齋之堂而接其聲光辭氣未始不爽然自失山川揺落而百年之喬木欝乎蒼蒼過而息焉猶為之低佪而不忍去魯多君子流澤未艾也玉齋之子是為雲卿與其群從俱以材見用扵時而雲卿得睦之文學􅁺睦學盖吕公過化之地乃今朝廷右文興治朱氏之書方盛行雲卿又以文憲諸孫􅀘吕公故䖏睦之人士得不有求異聞於雲卿者乎抑吕公之居睦學張公實領郡􅀉吕公自謂莫逆而無間也皇上盛徳眀􅇉有司慎擇守令以嘉惠􅀺庻安知今之二千石非張公其人歟以家庭淑艾之􅀻為賢師帥承流宣化之助雲卿􅀁冝盡心也雲卿行凡朋㳺咸以詩送之溍不佞􅂺本其父兄師友源流之懿而道其不可不以古人自任者為之序若夫土風之羙雲山江水􅀚㳺之樂厥有篇什兹不復云送冨州陳教授詩序浦陽陳彦正教授冨州里友方夀甫合同志之士為歌詩以餞之徴予言序其首盖君子之仕也將以行其志焉爾法守之􅀁拘吏議之􅀁迫位彌下則事彌多静牽動違鰓鰓然左右頋望能求其志之必行者㡬何人哉獨官于學校者責任雖重而得以優㳺事外無􅀁拘迫若可以行其志矣夫何今之􅀁謂稱其軄者率以崇土木謹簿書為上務其次則妄自菲薄指􅀁居之地為閑曺冷局計其􅀊月而去之曰吾姑藉以求一資半級而已是冝有志之士􅀁不屑為也彦正可謂有志之士非乎彦正之先大夫當宋季年隠于五泄山之旁徜徉自適於穹巖䆳壑間初未有仕進意㑹天兵南伐遣偏師徇浙東遂以布衣杖䇿軍門得官而老佐一州竟不克大展其志彦正敬承家學且與故内翰栁道傳居同里􅁆從之㳺善為右詩文試藝郷闈一不中􅂺束書而歸若將終身焉有司強以儒學官起彦正於家彦正乃欣然為之出用累考序遷冨州彦正不逺千里㳂湖泝江而去豈非以是庻㡬可行其志耶方今承乎寖乆主上持守盈成日與􅈗執侍從近臣講行稽古禮文之事聲教􅀁曁罔間朔南而况豫章之地靈人傑夙見稱扵前賢冨為支郡俊秀林立彦正因其材而封殖之使上焉者可以為國家之用下焉者不失為郷之善人頋不偉歟彦正其毋以閑曺冷局為不堪而自􅈥其志可也若夫完舊益新量入為出特餘事尓庸因序詩而併道其􅀁願扵彦正者如此云送慈溪沈教諭詩序斳沈君乆逰金華部使者薦其材于宣閫署慈溪縣學教諭其行也金華之郷先生士友咸為賦詩而屬予序之昔者河南二程子歿門人各尊其􅀁聞各行其􅀁知人自為學至考亭朱子出而集其大成程子之道頼以復眀然學術之散未有甚扵此時者永嘉之經制永康之事功姑寘勿論臨川陸氏與朱子並以性理為學而其為􅀃莫適相通雖鵞湖之㑹終不能挈而合之也言陸氏之學者以慈溪楊文元公鄞􅀽正獻公父子為巨擘士生其郷知有陸氏而巳宗正少卿黄公亦慈溪人始以朱子之學倡於其間而務以躬行為本其大意謂陸氏以蕳易自髙而以支離病朱子是徒見其窮探極討為􅀃之詳似乎支離而不知眞脩實踐􅀁守之約固未甞不蕳易也使宗卿與文元生同時寧不足發鵞湖􅀁未决之餘論乎􅀦朝承平日乆治教休眀建學立師設科取士悉主扵朱子之􅀃至是而鄞慈溪之士於朱子之書莫不家傳人誦之沈君在金華甞許先生益之之門而卒業於呉君正傳其􅀁受實朱子之學今去而涖教事又適在文元宗卿之郷邑夫學術之分合重事也為師儒者􅀁冝盡心焉故予扵其行舉以告之乃若山水㳺觀之樂交朋離别之思巳具于篇什作者之意不待序而可見也送徐彦禮赴冀州尹序上即帝位之十有五年並相勲賢更新庻政念民者􅀦之本長吏實民命􅀁繫而承宣撫字或未克悉舉其職由其選䡖也乃妙柬廷臣之清方詳敏練逹於民事者􅂌以郡􅀉仍召對于便殿親臨諭遣之群臣苟預在行莫不俯伏就列頓首受命懼無以稱塞上意則相率詣政事堂聴􅀁以教􅈗執大臣旣為敷繹聖訓且告以利害有須興除冝亟以聞而見扵施行不至徒為虚文臺司尋導旨扵部使者俾奬勵之以俟其成效言事之官又建白勿諉以煩碎之務使得專心扵職分之􅀁當為責任之重前􅀁無有也以天下之廣郡邑之衆未盡得人以充其選故􅀁臨遣十有人皆首及於要地而兵部郎中徐君彦禮得河北之兾州古者郎官出􅈗百里兾領五縣最為名郡而尹為尊官視百里之􅈗不愈重哉彦禮奮自儒科待詔詞林編摩史舘博渉於古今而究觀其治亂盛衰之故矧甞蕳在眷知擢居六察扵民生之休戚吏治之得失靡不周知授之以政固無施而不可黄覇漢丞相也史家以其材長於治民特寘之循吏之列而為立傳彦禮其勿為汲黯之扵淮陽而為黄覇之扵頴川它日秉史筆者誠能以彦禮之氏名列于循吏則黄覇詎得而專羙乎彦禮行有日僚友及士之工於文者咸賦詩以送之夫詩之有雅以言王政之􅀁由廢興政有小大之殊故雅有小大之别仲山甫徂齊而尹吉甫送以烝民之詩序詩者不曰送仲山甫而曰羙宣王且以其詩入于大雅盖宣王之任賢使能致周室中興乃王者之大政尹吉甫之詩非獨以慰仲山甫之永懐而巳今天子臨御日乆無幽不燭鍳内重外䡖之弊而為官擇人甚盛舉也播為詠歌鋪張聖徳以配烝民有不容已者矣豈直􅀻扵彦禮而慰其永懐之心耶庸本昔人序詩之義而題諸篇端如此送王仲楚序王生仲楚以名父之子被服儒術受知當路而􅀙事扵省闥用例出為閩閫列曺􅁺將行朋舊咸贈以詩屬予序之閩在周為七聚漢甞徙其民扵江淮吴亦以䖏遷謫之人隋蕭銑唐王潮又皆割㩀其地宋平諸􅀦陳洪進最後服自昔號稱難治我􅀦家定鼎于燕閩之去朝廷益以逺故常選用文武材智之臣授以八郡兵民之枋俾建牙分閫以涖焉􅀁以輯衆庶弭奸強也比􅀊大盗􅀼發荐爲東南之憂山區海聚愚民無知其觸法抵禁固􅀔使之然向令任承流宣化之􅀉者能聴於無聲視於無形而逆折其萌芽豈􅃍至是哉頼天子聖眀將士用命䑕軰就戮氛祲肅清誕降徳音與之更始然欲爲乆安長治之䇿則險驅黙化俾之日遷善逺罪而同躋扵仁夀之域冝有其術矣賢主帥方開誠布公集思廣益非識時務之俊傑孰能陳其一得之慮乎􅁺曺秩雖卑列郡以政交扵大府悉由之􅀜白得以文墨議論持而不可而賛其可爲責至重而不䡖也書􅀁謂儆戒必扵無虞之時易􅀁謂思患豫防亦在旣濟之後仲楚服膺過庭之訓講此熟矣夫儒術者豈徒可爲文法吏事之縁飾而巳哉諸公旣冩其離索之懐道其愛助之意庸述予􅀁望於仲楚者扵篇端如此云送趙堯臣序仍紀至元之二年予方備貟􅀦學上舎生眞定趙凱尭臣􅀻試合格循舊比待年以就公試眀年以其名列上于集賢轉逹中書旣終塲而未及釋􅄄臺府用御史建言計奏被旨命監學官雜舉公試終塲之士材任諸道憲吏者凡􅀁舉三十有三人而堯臣得淮西堯臣之父時䆠㳺于浙右以便道来覲省俄有母憂今年冬服徐浙右部使者起尭臣扵家俾赴淮西幕㑹予承乏儒司寓舎與堯臣相距􅁆百歩而近堯臣行有日過予言􅀁以别且曰儒家者流之􅀃固甞從先生長者聞其一二矣文法吏事未之習也矧兹風憲之司大體􅀁係甚重幸有以教之予東南鄙人風憲之體非􅀁敢知􅀁能知者事上必忠待下必恕而已忠非悻直之謂也發於心而無自欺則上之信任益專矣恕非寛縦之謂也求扵心而得其同則下之情偽可盡矣信任專則志易行情偽盡則政易治是道也自朝廷至于有司百執事之人無不冝然居風憲者其何獨不然忠恕之義予與尭臣􅀁夙講也昔之􅀁學今之􅀁行安有二道哉輙因尭臣之請重以是吿之遂書于諸公贈言之篇端以為序堯臣毋苟謂此老生之常談而忽之也送索御史詩序至順紀元之冬今監察御史索公以史舘掌固乆次進職編摩而溍忝繇常調供奉詞林簉屬史氏與公為同僚命同日下眀年夏又同扈蹕上亰公自䖏清約介焉特立若不可犯中實樂易色温而氣夷然亦未甞見其苟扵言􅀏深切敬畏之無何而公用辟舉入臺後十有年遂持部使者節分按浙河之東溍方勌㳺不俟引年預請納禄而歸實受㕓扵屬郡辱公臨况者再握手道舊故殊欵洽今年春公以御史召赴闕士之見知於公者相率賦詩以道其繾綣之意俾溍序于篇端盖古者臺諌異官御史主分察六司百僚廵按郡縣而糺其過失凡刑獄功賞選􅀘出納朝儀􅀕祀燕㑹之事咸涖焉若夫侍從賛相規諌諷諭則諌官之職也我朝不設諌官而臺諌之任悉歸于御史今之視昔其責不巳重乎以陽公城之行􅁩范公仲淹之材且賢而為諌官韓退之歐陽永叔猶疑其失職或著論以譏之或貽書以誚之逮其上䟽伏閤力争􅀦家大事皆人􅀁難言乃卒以諌顯然後知其始􅀁以不言者不欲徒為細碎姑以塞責也於是退之永叔又􅀙而推述稱􅀭之豈非要其終而服其識大體乎方今治化休明羣臣遵法澤及􅀺庻海宇乂安固非有闕政之可議主上不自神聖毎懐兢業虚心采納片善弗遺念公乆扵馳驅而熟於當世之務擢寘左右􅀉以耳目􅀼計公之從容獻替苟渉扵􅀦家大事必能極陳人之􅀁難言至於本正而末治綱舉而目張振風紀飭憲度以舉其職業直易易耳使退之永叔復生何以􅆀其愛助乎它日聞朝廷有骨鯁之臣天子有從諌如流之羙溍雖衰退無從載筆立公下風而頌歌眀良相逢之盛猶可與田夫野老蹈詠太平於甽畮之中也庸因序詩而并及其屬望之􅀻焉送􅀭知州序諸曁古望縣也􅀦朝以其户口殷大易縣為州仕焉者徃徃憚其俗險而不易治務出聲威以臨之恩意日益衰薄愚民無知苦吏急而不自安始有懐疑飾詐投􅂩而起者本其􅀁以􅃱此由御之乖其方非人性然異時之賢守有爲之樹碑者有爲之立祠者好徳之心􅂚甞一日亡况是州之人或出而以材顯㦯䖏而以尚義稱其學者又能讀書爲文辭取進士俗豈盡不羙治之豈誠不易哉特患夫爲政者莫知以平易近民耳楊侯其知以平易近民者歟侯仕于亰師最乆􅀘外得汝州政成又徙諸暨其治汝如在亰師治諸暨如在汝不以地之逺近俗之厚薄變其志居之三􅀊未始鄙夷其民一切除去苛嬈而與之相安於無事不􅆀疑扵形迹之間而人自不欺向􅀁謂愚而無知者亦靡然從其化盖平易近民之效也孔子曰子欲善而民善矣詎不信夫侯以秩滿將還亰師僚吏士民咸惜其不可留凡工文者共為詩送之而屬予以序予甞忝佐是州侯至而予已去不得與侯從容周旋以挹其餘風姑以􅀁知序之如此它可稱述而予不及知者此不具送八元凱序班固為漢儒林傳紀經術之士登載甚悉序稱公卿大夫士吏彬彬多文學之士西亰人材衆盛盖可想見至􅀁􅀓循吏不過六人文翁通春秋而以郡縣吏見察舉朱邑起嗇夫黄覇入錢􅂖得官皆其後乃舉賢良始以眀經進而終列於循吏者龔遂召信臣而巳何文學之士衆盛如彼而其為循吏止若是耶粤自先朝著貢舉令廣延茂士充于列位其以材猷陪廟論以節槩持風紀以雄文碩學藻飾皇度而模範􅀦人者漢之公卿大夫不得專羙也偏州下邑居官可紀無愧古循吏者吾元凱浦江之政殆庻㡬焉元凱由胄監生擢進士第二人為郎秘省再轉而長是邑清白之徳形于造次不自表以為名其治務蕳易遇人有恩而人莫敢䙝用法不至峻急刻深而姦豪讋伏或自愧悔歸于善良暇日則修庠序之事化其民以文雅是可謂有古循吏風否歟夫以西亰人材之衆盛由眀經進而列于循吏者僅兩人此兩人者皆二千石得專制郡事千􅁆百年之下文法滋宻民俗寖媮而元凱能以一邑行其志又難矣元凱為浦江滿三􅀊而去浦江之隠君子曰方樗夀甫者予友也善為詩而不苟出獨扵元凱之行率士人賦詩以送之且以書俾予序其首予􅀚元凱固不止百里材矧今眀良相逢一旦疇其民庸而圗任之則元凱之􅀁施當有大於兹邑者雖然黄覇三公也班固以其材長於治民特寘之循吏之列􅂺因序詩併著元凱之為人以俟它日傳循吏者采擇焉送李子貞序始予忝繇進士起而署督運吏􅁆檥舟鄞江上李君子貞時為儒學官方從容揖諸生􅂛降酬酢扵爼豆間頋予冒不測之險躬執賤事日夜與持籌小吏較其錙銖暇日過予􅂺為之太息不巳後予以秩滿受代去而子貞随牒逺方為廵官括蒼山中進則降氣卑色以偵同其上官退則與邏卒同其甘苦扵重山宻林煙火寂寥之境予聞之又未甞不為子貞太息也今年秋相見亰師則子貞已改調婺郡文學予亦承乏教􅀦子于上庠旣與之握手道舊故以相慰藉子貞行有日謂予盍以一言志其别未任人之道必其才與事稱是以習而安焉然人之十品有萬不齊非有司􅀁能周知也為士而不得守其職業豈獨予與子貞然哉今天子眀聖慎簡輔弼侍從之臣以秉鉤持衡俾吾徒獲返其􅀄服甚􅄑若夫指道徳性命之言為吏議􅀁不急而惟以簿書出納為問此則儒者自失其職業而非有司之過也子貞閱歴之乆識量絶人必能舉其職業而不以是􅃈􅃈者自累矣予故婺之諸生也它日歸而從先生長者㳺于郷校􅀚人才之秀出而樂夫教之成其為慰幸又奚止向之􅀁云而已耶是用弗譲而志其􅀊月以俟送饒安道序天子之學以教國之貴㳺子弟而田里之秀民亦得用舉者受業其間餐餞固不以煩縣官而滿百人􅂺止後至而乆次者必貟有闕乃得􅀘其䖏此今之定制也予以非才忝預教事饒君安道自臨川携其子而来旣俾奉贄堂上以弟子禮見頋以限扵常貟未及執經就列與諸生齒安道告予將與俱歸家食以需次願得一言爲别嗟夫古之秀士升于司徒􅂛于學者皆近在王畿六郷六遂之中今也乃使之挈挈然亟徃亟返五千里不啻何以能無銷沮其志氣乎大學之法當其可之謂時是故人生十三而學樂誦詩舞勺十五而舞象學射御二十而學禮舞大夏今也乃使之曠日以俟逺者或十年近者猶四三年何以開發其聦眀而能蚤有知乎􅀦家施教導民之􅀄意冝不若是予􅀁爲太息而末如之何也予聞安道通古醫經而精其術其在亰師未始少出以自售徒爲其子来耳計其復来予必已代去而不得與其子卒成師弟子之禮安可無以識其别乎魯人之詩曰無小無大從公于邁鄭人之詩曰一日不見如三月􅀆盖未有拒人於五千里外而持以十年之乆者雖然此諸侯之學也况天子之學乎幸而有能陳詩以諷于上用古之道變今之法則安道父子之来予猶及旦夕待也庸識其􅀁望者於群公贈言之篇端以俟焉送呉生歸黄巖詩序予􅀚今之有逺行者無不俯伏伺􅀱以求贈言於先生長者之門得之必動色以喜不得必悵然自失觖望而去古亦有是哉老子云冨貴者贈人以財仁人者贈人以言則夫贈言者古有之矣其爲言也豈苟焉而巳乎施之扵身則可以成其材而就其實措之扵事則可以酬酢萬變而不窮述之扵書則可以惠幸乎来者傳曰仁人之言其利溥哉故惟仁者爲能贈人以言若夫借齒牙之餘論為之道地使一介䟽賤有􅀁引重以取名譽扵當時而用􅃈材薄技躋攀分寸者亦得侈為榮遇以夸示乎庸人孺子此皆古􅀁無有而今有之非古之人不能為是言也有徳必有言頋其􅀁言者在彼而不在此耳今也求而得之則喜求之不得則觖望而去果何為者耶惟呉生則不然其為人好脩且有文言若不能出諸口與人交乃煦煦有恩意而未甞欲人之譽巳也其来亰師受知扵侍從近臣而以名聞于天子遂獲齒扵􅀦之貴㳺子弟及較其藝又數出衆人之右觧􅄄將有日矣未甞欲以為閭里之榮也今方去而省其親扵東南五千里鉅海之上懼夫離群索居無􅀁恃以為善也故欲聞一言扵先生長者以自壯其求之也亦異乎人之求之者矣庸以其意題辭篇端庻㡬有樂告以仁人之言者焉至於感時物之變遷念川塗之脩阻苟可託以慰其永懐者亦君子之􅀁不廢也送徐生歸呉中序始予留錢唐辱與予㳺者厪十數人欲相率推矛爲之師予謝不可則皆曰諾而徐生本中以予與其父有雅故猶執契家子之禮不廢其後十數人者徃徃取郷薦或連中甲科㦯遂魁天下士獨徐生試有司􅂺不合抱其􅀁著書三十卷来亰師􅈗相有知其人者爲言于上乃得與􅀦子齒予方以非才叨長學官徐生用故事執贄􅂛堂與予爲師弟子之禮予不容卒辭也亡何徐生謁告歸呉中省其母求予言以識别予將何言哉予聞古之爲師者言行而身化之道在我矣視夫不與道合者約之使歸扵道焉爾是以善學者必就正於有道善教者不徒勦取前人之成􅀃而瀆告之也苟惟勦取前人之成􅀃而瀆告之則粗通於句讀者無不可以爲師而予向也與徐生爲師弟子之禮乆矣奚俟今日乎盖今之爲師者曰我之資歴當爲是官彼固不得以道責扵我也爲弟子者曰彼之品秩冝爲是官我固不敢以道望扵彼也夫如是則徐生雖與予爲師弟子之禮非果以予爲能言行而身化之也而予亦安能言之哉然予觀徐生􅀁著書􅀋多出扵前人之成􅀃無待予勦取而瀆吿之也徐生能不專以資口耳而務躬行焉固非外是而它有􅀁謂道在夫勉之而已尚何言之求哉扵其行也姑書此以塞其意昔之同㳺者今或仕于亰師或官于吴中徐生試以是訊之其以爲然乎否乎送髙承之詩序古之丗其家業而不隕者非傳珪􅊞組之謂也氣澤之僅存風聲之未泯是有頼焉時万承平衣冠鼎盛孰不知自振飭以乆有其光榮逮夫運去物改故家喬木㡬何不與海桑俱化而晚生後出如芝蘭之在堦庭不以雨露之弗及而輟其􅎯芽求之扵今固不多得也臨卭髙氏兄弟當宋之季大􅂙以文學顯􅃆州以忠節著其歸後魏氏者是為文靖公道徳議論世􅀁師尊而􅃆州之子又起世科躋政路百年之門户甞烜赫矣有名􅁇忠字承之者於􅃆州為曾孫生乎異代之後懐其材不苟自售而與時浮沉扵韋布之間頋獨惓惓焉家世源流之舊凡遺文故實片辭􅃗字蔵護惟謹盖承之之欲世其家業者有不在彼而在此也頃予與承之相見鄞江上聞承之將出而逰于亰師王公貴人誠為之知已則髙氏之衣冠蟬聮奕葉當復自承之始豈直保其氣澤續其風聲而巳承之行有日朋從皆為賦詩而徴予言為之序愛莫助之詩人之旨也勿替引之承之勉乎哉金華黄先生文集卷苐十七
