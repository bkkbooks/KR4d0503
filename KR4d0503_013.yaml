body:
  text: 記化城院記仙華山化城院者僧法空之所創也山之東隱君子方先生居之先生殁葬山之北院距墓一里而近邑士與先生有雅故者以空嘗從先生遊相率即院中祠先生且以門人翰林待制栁貫所為銘刻置祠下而院之搆興顧未有所登載溍忝及先生之門故先生之子樗來為空謁記誼不得辭按圗志仙華山在浦江縣比髙百五十丈周二十五里列岫如屏障中為風穴古仙人上升處有壇宇在其下云先生遊録稱自巖腹望峯頂丹光閃閃如寶蓮花稍進至仙壇前峯聳削離立東一峯折裂數百尺俯視如池又東一峯如削循其罅而上踰石嶠如户限北下如井折而東至苐五峯之背有石室可坐數十人又東為中峯下睨烏傷東白原隰聚落如碁布其北諸山與新定接又一峯在其東極峻絶不可攀緣而苐二峯懸崖千仞有穴深黑風薄兩崖上出草木皆動凡先生杖屨所歷較圗志所敘尤險怪崛竒誠天壤間勝槩也空受業於同邑皇安山之普利院而遍遊浙東西州求善知識咨決心要既而充然自得浩乎其歸叢林虛席屢以名剡上皆避不就恆惴惴焉恐退藏之不密愛仙華之秀異將卓錫其中乃由北麓披蓁荒而入得幽谷直東峯之下窈然靚深遂剪荆棘結茅以自庇劣僅容膝名之曰雲巢無登陟之勞而有宴息之安以為若是不啻足矣里人朱仙亦先生門人與空為方外交歎其自處太𥚹陋首捐田為闢基址而同里樓億為作佛廬齋寢庖湢龍峯主僧永鎮尋輟田若干畒卑之而空之師清衍暨好事之家又助以田若山園總若干畒更其故所名雲巢曰化城精舍空因建鍾樓門廡益置田若干畒為久逺計易精舍之號曰化城院于是帝師為降法旨加護焉重紀至元之五年夏五月也至正改元之二年秋九月空復與其徒道元本覺撤舊屋一新之自大殿至齋堂寢室兩廡三門悉同巨剎之制佛僧之奉無不􅍯具兹山之面目亦軒豁呈露先生向所覩怪竒壯偉之觀可不煩舉趾而坐致也蓋空之倦遊而返乎故山志在遺去囂袢探幽擇勝以佚其躬而巳未始即人而人自即之用能建置成立如此巳無愧于古之有道者而空又能以其餘力與先生周旋于文字間其名固當配先生以傳如廬陵之有勤眉山之有潛相為不朽安用區區以丹青土木之美相誇詡也哉姑記其作始之大略俾來者無忘所自云爾空字無相族吳氏先生之祠事自有述兹不書聖夀院記聖夀院在義烏西四十里故號龍夀宋治平中乃卑今額大觀間更為十方禪院歲久弗葺椽棟毀墜藩拔級夷敗屋數楹不庇風雨荒基斷礎四顧寂寥盛衰固若有時而山川之勝𥘉無今昔之異特以地勢僻絶非尊官冨人轍迹之所及而其徒又蓄縮不自振日益散落故雖遭逢聖教興行之世莫有以為意者泰定二年秋千巖禪師來自錢唐愛其岡巒秀潤水木清深始度隙地結茅而駐錫焉緇素之侣嚮風坌集座下至無以容其居而給其食僧法聰德超慨然出山叩諸有力而好事者于是齊郡太夫人張氏首捐金為買田若干畒里中一二大家樂聞之爭治材甓以復其故宇佛殿則樓君如浚山門則樓君一得法堂則翁君弘道皆獨任其費妙相中嚴威神外護妥奉有儀瓜華幡蓋器物之須設置如式且各助以田二十五畒有竒既而一得之子某為作僧堂同郡善女徐氏為構鐘樓由丈室至左右兩廡庫堂齋庖湢室之屬則合衆緣以成之效奔走經營之勞者僧德義尼慈夀也禪師之來至是凡十有五年而其法之所宜有者靡不畢僃規制之廣則視舊有加禪師為而不有擇上首弟子俾之住持承其付託者亦能負荷而無所係吝不久輒謝事而退自壞空成無用貴絶照昶龍門省無礙了逮今滅宗繼巳六傳矣繼謂豫曰在吾教中聚沙積土無非佛事法施財施寧有差别請為我並志之於石庶幾來者不昧所自而思所以報稱焉豫聞禪師以單提直指普對羣機不起于座而道價之重傾動逺邇冝其以壞為成無難也有能于禪師之道一念淨信捨諸所有而不自以為德豈易然哉庸因繼之請托其所述而悉著之使刻焉禪師俗姓董氏名元長蕭山人説法嗣中峯和尚云上清資聖院復田記資聖院在義烏之西鄙距縣四十里而逺又西僅一里所限以溪水則鄰縣金華之境也院故有免科繇之田八十餘畒香燈之奉湯茗之須恆患於弗繼雖欲侈大其居而不可得當天朝像教盛行之日猶因循自守未有乘時振起之者僧沖意首殫其勞勩經營積纍以大德二年購金華田百四十餘畒將儲其歲入備土木之費以增新乎舊觀有志弗遂遽以延祐元年示寂承之者不念厥紹盡取意公所遺契劵私鬻于其縣冨人之家為直以錢計者八千緡泰定三年也僧嗣宗亟訴豫有司而異縣莫適統一臨之以監司帥守久且不決張君自誠家金華與院密邇力為之援元統元年始克竟其事令以田復入于院而反其直向之冒受錢者或巳物故或毀其衣而伍于編氓或單乏無以輸所負張君為扣巳槖悉代償之以弭其爭田乃卒歸蓄聚既日充遂以至正二年重構大殿它工役次苐畢舉于是宗公前一歲巳逝張君後一歲亦不起僧德潤謀於衆謂後之人賢否未可知契劵傳藏之不謹或得持以售于人冝廢勿用而列其田步畝圍號鄉落之詳總為之籍刻石廡下庶可圗永久僉以為然爰狀其顛末介同郡汪君祀求豫記之資聖以甲乙次相授非十方叢林衲子之所附集而荷重其事者代不乏人意公開拓於其前宗公規恢于其後潤公又汲汲焉為異日之慮而逆防其未然是皆不容無述矧兹遐方僻壤墟里之間無尊官貴戚為之慿藉無大商豪民為之佽助獨賴張君以一鄉之望左右外護且不愛其所有以為成就利益之勝因詎可無以登載而使來者知所自乎白樂天有言記者不惟記年月亦在乎辨興廢示勸誡今之為其徒而居遊食息于斯者苟能推往事得失而眀興廢之由鑒前人功過而存勸誡之實相與扶植數百年之基緒俾弗墜益隆以為夀國福民之地則張君之惠為無窮而豫之記不為徒作矣舊記稱後唐清泰二年順德大師道怤因古伽藍遺址建院號上清宋天聖六年所賜今額蓋郡人兵部侍郎胡公則守杭時為住山贊寧僧統移書州牧而得請于朝郡縣圗志並云院創於僧澄皎被賜之歲月亦不與記合傳聞之異辭非田事所係姑置勿論以俟博洽之君子考正焉半山報寧寺記報寧禪寺在今集慶路上元縣之半山集慶于宋盛時為江寧府丞相荊國王文公之父楚公終于江寧倅而葬於鍾山故荆公往來鍾山最久其園屋在白下門外康樂坊謝公墩之側者不設垣墻依林樾為屏蔽密邇通逵而四無人煙境尤清曠鍾山抵城十有五里至此適當其半所謂半山也荆公𥘉由外制出守江寧及兩去相位又皆均逸于江寧視江寧猶鄉郡因其園屋大治居第距捐館前二歲乃請于朝施為僧寺䛇如其請而錫以今額元豐七年荆公親製疏迎致文禪師來涖法席是為開山苐一祖暨苐二代寶禪師咸克紹隆宗風為世師表地以人增重而半山遂齒于大叢林寺基為畒八十環其旁之田園陂池為畒二百其在句容烏江兩縣者為莊五皆瀕于大江潮汐之所齧蝕歲入田租無幾經用所資惟太平青山莊之田出于荆公長子雱之婦蕭氏者為畒一千自始有寺至國朝重紀至元之五年凡二百六十有六載自文禪師至古潭龍凡二十有四傳而寺以災毀古潭首作法堂兩廡俱未就緒而逝至正二年信菴孚嗣住是山毅然以興復自任顧其恆産僅足具華香糜粥而丹青土木之費未知所措乃焦心勞形敝衣糲食銖積寸纍以庀工役三年建大雄殿四年即方丈造千佛閣至十年而山門僧堂庫院悉成倉庾庖湢之屬亦次苐畢備屋以間計者總若干上棟下宇各中其度斫雕藻繢焕然聿新金相玉毫妥奉如式其宏麗顯嚴有加于昔固多矣繚以修墉蔭以嘉木創康樂亭而重刻謝太傳像于其上文禪師僧史有傳寶禪師語録有序并刻置寺中則昔所未有而今乃有之爰以狀俾上人密詣介御史濟南張公來徴文以記其歲月竊荆公記揚州龍興講院亟稱主僧慧禮能以廢為興而歎美其材信菴咨決心要於笑隱欣公而兼傳其文印嘗居龍翔苐一座材望素著經度營構之功直其末使之獲從荆公遊則所以稱美之者當何如哉九原莫作猥令晚生後出以年侵學落之餘承乏記兹盛舉冝乎汗顔縮手筆屢閣而不能下也然以詣不逺千里涉重江而來旅泊幾三閲月必欲如其所求而後巳不得卒辭詣亦入哭隱之室者於信菴蓋同門也淨勝院莊田記凡佛者之居曰寺若院有甲乙次相授法田廬資蓄器械百須之物悉得以為世業傳子若孫其成之難而保有之不易與齊民之家固無大異也然人之子孫不皆才且賢而佛氏之子若孫率以義合必擇焉而得其人乃以卑之故其傳往往至於千數百歲而不墜世家大族弗如也迹以所慿藉以永久者存乎其人爾顧豈有它術哉婺州城西南二十五里其山曰石門前臨陂水陂之大可五百畒水乘髙而下者三級其旁之人或稱之曰龍門云有為佛廬於其地者曰淨勝院舊記以為建于吳赤烏中始號尊勝宋治平間乃更今名而又以為車騎將軍張公施地所造越之天章光逺法師實為之開山按天章創于近代謂開山為光逺則院不必肇於赤烏車騎將軍官廢巳久謂施地為張公則主是山者不必昉于光逺是雖無所於考然自治平賜額迄今已二百六十餘年矣先是衆幾千指後多散落其存者派别而三勢分而力單穹墉邃宇日就摧圯國朝至元間住山仁體始合其三者以為一未及有以振起之而逝嗣主院事者一真為購田若干畒俾食其什之七而别籍其餘田以資營繕之費法堂兩廡觀音殿甫告訖功會廣教虛席江湖道俗推以輔其處繼之者道勤益購田若干畒循舊比分以給其食及土木之須山門鍾樓羅漢堂方丈之室次苐畢僃院之耆宿若𥘉若宗若靜洎好事之家前後捐田為助又若干畒其傳以為世業者視昔有加焉靜之孫偉辱與豫遊爰伐石而以勤之命來謁文為記夫能以亡為存以廢為興者豈非得其人而卑之故歟雖然此世間法也窮千萬億劫而無增減成壞者蓋不即世間亦不離世間是固不待記豫亦安得而記之姑因其所欲言者敘次之如此福春院記凡浮屠氏之聚必有穹墉奧屋食飲百器之須大抵資於王公貴人而後具不然則夫婦之愚牽於其説而相與致力焉者也若夫冡間林下窮居獨遊未嘗以其事匱官勤民而能熾然有所建立可不謂難矣哉世儒恆譏其徒取于人之厚以為古無有是彼亦見夫飛竒鈎貨者為公私之病巳甚而弗深考其人之不必皆然也吾鄉有為浮屠之學者曰從起少受業金華之妙善院晚乃卜地于縣西若干里而為屋其處以間數之得四十有五門廡殿堂庫庾庖湢如式僃完請于所司揭以白沙福春院之故額率其衆入而居之且約以甲乙次相授既又買田若干畒山若干畒於是奉養之物不俟外求而具經始於大德之四年而卒事於泰定之二年總其費若干一出於起蓋起之名未有聞于時而其言又非世所傾動苐以食淡衣粗旬積月纍以及有是此豫之所謂難而得後人嗣守之勿壞尤難也是不可無述其以書來為起請記者又豫友張君子長也張君儒者慎許可亟稱起之為而無譏焉可記也遂記之經藏廣福院記婺之蘭溪經藏廣福院在州東一百三十五步故為聖夀寺之水陸院寺創於梁至宋號聖夀而水陸之為院莫詳所始歲久院廢天禧中藏休禪師來自餘杭得其故址肇建伽藍同郡金華曺仁夀尋為置經造藏因命曰經藏院殿中丞知封州史溫為之記當寺沙門有交集王右軍書以刻焉治平末賜聖壽額所以為佛僧之奉者猶缺如也政和間寓公贈少師吳點首輸財倡衆買官民田總若干畒創置兩莊由是華薌之具糜粥之須隨取而足孝宗時避光堯聖號易名廣福云國朝至元十三年院毀于兵二十八年其下院白蓮堂比丘普資覩其為荆棘瓦礫之場巳逾一紀未有任起廢之責者則去其故廬挈徒衆及衣盂之資即舊墟治院宇合經藏廣福以為號仍以族父王氏所遺田塘園地歸之其徒推本所自尊為重興之𥘉祖且請于有司必其子孫乃得住是山苐二代奉譯嘗募州人郭淳飾像設之䵝昧者葺殿堂之摧陊者苐三代永紹暨前住顯教永膺又理土田之冒沒者前住連雲履中於資為五世孫以某年嗣為住持能不愛其所有以續前人之遺緒郭氏四子亦承其先志同力佽助焉經藏有殿中為一柱兩輪棲匭輪間而實以黃藤赤軸悉如其舊齋堂庫院兩廡三門至它屋室次苐畢完懼來者無以究知廢興之故爰買石屬豫記之豫觀天下名剎其先必有靈異之迹驚動乎斯人是以聞者心鄉往之過者低佪而不能去兹山獨以好事之家寶其石刻而經藏之名傳於四方翰墨誠儒者餘事未可忽也顧此猶其細耳儒者謂古人得見書甚難而其士皆非後世所及今之書益多且易得而學者日趨于苟蕳嗟夫豈惟儒者為然哉考之舊記始自東都浮汴涉淮踰重江行二千里之險函經而來費金錢至二百萬非若近世轉相摹刻流通之廣不難致而易忽也夫欲求魚兔必有待乎筌罤一大藏教佛學之筌罤也今之經藏既巳一新為其學者有能從教起行無謂佛法不在文字而務馳騁于空言斯不負置經造藏之初意矣然則其徒所冝知者奚止廢興之故而巳乎敢緣記事併以是告焉中字無外族盛氏説法嗣徑山虛谷禪師密印院記婺之密印院實晉義熙中仁肇法師卓錫之所舊名永福宋大中祥符𥘉始易今號慶元元年秋燬于災僧法威慨然以興造為已任亡何威逝而如解嗣力倡衆成先志積五十稔院以復完且益置田二百畒鄉先生王君桐記焉先是士大夫避兵落南者往往即其處為寓舍地之入于民家以尺計者六千六百九十其存者為尺厪五千八百九十圗籍僃在莫敢質也國家奄有南服法幢所建崇護有嚴僧汝舟等援著令白于有司乃悉返所侵地斥其故宇而大之皇慶元年冬居民不戒于火院再燬舟圗復其舊垢衣糲食竭所蓄以資土木之費其徒德新等五人亦克協相其役起延祐元年春閲十寒暑大殿以成龍華僧一清洎鄉之大家張景崖等交致其助募衆作佛菩薩像安奉如法餘未具者繕治以次視解所建立殆幾事半功倍矣舟念所以為永久計仍割巳田二百五十畒隸焉新以豫郡人也冝能道其廢興之歲月屬豫記之豫觀世所稱大叢林必據名山奧壤天下勝絶處啓其靈祕以示化迹者又皆髙僧上士是以好事而有力之家莫不慕趍之故其居能久勿壞其壞也率不日而輒成人與境相資勢固宜然也密印居萬井中齋廬講舍旁直賈區鐃鼓魚蠡與市聲合非有穹巖邃谷幽逺勝絶之槩若它名山比千有餘年成壞相尋而卒無廢墜者不以其人歟蓋自肇師以來其間代有異人而金華聖者俱胝禪師為尤著雖然三大士逺矣苟得若解若舟者焉區區之成壞安足慮乎姑為記其歲月如此院故有治平間僧居政所作九級浮圗屹立風雨中必有繼舟之後盡其力者則其冝得豫記不止若今所書而巳也嘉興天寧萬夀禪寺記天寧萬夀禪寺列郡皆有之其在嘉興者距城北半里所故為施水菴唐咸通間以菴為院而其護伽藍神曰太祖蕭王莫詳所自宋治平中郡人慕容殿丞始請于朝更為十方禪剎熙寧𥘉賜聖夀額命興教惟一禪師開山清涼法眼之適孫也崇寧二年詔天下州軍各賜寺額曰崇寧嘉興改聖夀以應令而院升為寺三年加萬夀政和元年又易崇寧曰天寧紹興二年改報恩廣孝十一年又易廣孝曰光孝賜田二千畒立莊曰天錫乾道末水菴和尚説法于淨慈尋歸老而示寂于此靈異之迹甚著四方衲子指為名師過化之地而慕仰焉嘉定中癡絶沖公訥堂辨公相繼領寺事而法會鼎盛遂為大叢林蓋寺額在異時巳屢改易入皇朝仍其舊人猶稱以天寧萬夀之故號者以祝聖都道場在是也至元間朽菴祥公𬒳上旨住是山與耆舊僧智源兼任本郡僧司長二崇護尤謹創千佛閣於山門之東眀叟因公規恢基緒賴源之力為多延祐中千瀨慶公即方丈建圎通閣泰定間竺雲曇公重作僧堂衆寮其後月舟滿公窘于有司之征繇引避而去法席偶虛土木之功亦輟今佛鑑空海禪師念公以至正四年嗣為住持至則繕治僧堂斥大山門之舊址作門以間計者五其髙七尋有半深其髙尋有二尺左右設文武官僚之次且用隂陽家説築案阜于官河之南培主山于丈室之北樹以竒石名之曰秀玉峯詞臣墨客多賦詠焉寺後𬞞圃鄰于軍壘限以土墻歲久墻壞而鞠為芻牧之場乃白于官悉復所侵地繚以大石墻而斫石為霤以覆之其長萬餘尺費錢七萬餘緡竭力相其成者耆舊僧子常也又以𬞞圃地楄狹倍價僦民地而益之置薪蕩二百餘畒經理諸莊隱沒之田二百餘畒創寺務司于庫之東南兩廳對峙甃地為場其中而旁為兩倉二十敖受各莊之歲入絶蠧弊謂寺乃都道場而佛殿􅋻陋弗稱無以起人肅敬之心而盡歸美報上之誠乃捐長財以倡衆施郡人鹽倉副使沈權首為發私槖市香楠木柱十有六好事之家輸貨薦力者接踵而至乃徙鍾樓撤藏殿之前軒增拓故基以隆寶構其崇十二尋有半修廣皆十尋傑屋邃墉華榱文甓承以落井環以石闌皆窮壯而極麗植牌門于寺前之左街揭于楹間曰南湖苐一山空海之涖事逮兹厪十寒暑而內外煥然畢新利飬之須無所不備惟殿之役最巨經始於十年之三月落成于十一年之三月亦甫六甲子而告訖工書來諗豫以記粵自大教𬒳于中華通都望邑名山奧壤緇錫所廬廢興靡常或墜而弗舉或彌久而愈振談者率謂是殆有數而非偶然豫竊以為特係乎荷擔其事者之材與志何如耳有其材而無其志則不能以有為有其志而無其材則不足以有為空海乘本願力普為恩有作大福聚其志可謂弘矣假方便智示現有為縱橫無礙其材可謂周矣為之在我者未始以諉乎數冝其建立成就視古人事半而功倍也為之記以告夫來者尚相與扶植之而毋有所諉哉空海名良念族王氏台之黃巖人得度于瑞巖東原沂公稟法于仰山虛谷陵公又嘗從雲外岫公于天童而司其藏鑰及虛谷居徑山遂分半席一溪如公父行也其住寶林拉之偕行未幾謝事舉以自代因輔其處後乃由鄉郡之護國遷主兹寺常亦其同郡人云彌陀興福教院重建大殿記彌陀興福院在錢唐西山猊峯之麓宋慧光法師若訥所建也初慧光當南渡時𬒳遇三朝受法師號主教事于上天竺山者二十有七年乃得請而退處兹院纍加兩街僧録雲章寶器寵錫優渥其示寂也諡曰宗教廣慈塔曰普照云院始創以淳熙三年賜御書為院額以紹熙三年敕改十方天台教院以嘉定十三年自惠祥法師為其住持迄今十有八傳矣歷歲既久楹欹棟缺不勝風雨之震􅓸左支右拄事多苟蕳際今聖世像教興隆猶未有火起其廢者耆舊僧壽彌首為繕完僧堂門廡且範銅為大鐘顧佛殿摧敝特甚役費至巨遂罄其平昔之資蓄以治土木于是妙應等佐其費妙智等視其役起至正二年之夏訖三年之春僅九閲月而殿以成揆之舊制加五尋以為其廣加二尋有半以為其髙造靈山一會佛菩薩像而易其座以石增卑以崇者三尺材甓堅良物采焕發皆前所未有四年春息菴允兹來主是山謂不可無以告于永久爰伐石屬豫書之豫觀浮圗氏之聚莫盛于錢唐之西山而傳天台家之學者尤莫盛于上下兩天竺據山川形勝以為法窟四方學徒之所附趍逰者亦無不覩相而生信凡資於人以成其所欲為直易事也興福介乎兩山之間號西天竺距人境固不逺而地勢靚幽好事者所罕至故其廢興人莫以為意苟非得人為之荷負不愛其力而相與扶植之安能使久而益振乎矧今專法席者學精行粹時望所歸求升其堂入其室者未有止也蓋自開山四十有五年而院乃拓為十方又百二十有五年而院之重興復自今始可無書乎息菴生越之儒家族李氏夀彌臨海人夀光寺記奉元之夀光寺顯密圎融大師覺眀所建也師俗姓陳氏其先錢唐人世為士族宋末父某流寓維楊而殁于兵母趙氏懷師甫三月軍帥鄭某因挾以去母欲自絶不得遂從之西北行而師以至元丙寅生於寧夏自幼志趣不凡厭處塵俗母弗能止乃聽其出家且密書其鄉貫世系及其所以徙使謹志之九歲禮朵魯只上師祝髮為僧年十二受具戒從真覺國師松堂某公講般若華嚴諸經授以所服絳方袍及顯密圎融之號俾嗣其法鄭帥即城中為創淨土院以居之非其志也尋入賀蘭山精修苦行脅不及席足不踰閫冥心端坐者二十年乃還故居道價益隆又五年而宗王奧魯只公主虎都台駙馬買也台皆師事之官僚士庶慕風而至稟受戒法者不可數計所度弟子三十餘人師嘗發願禮文殊觀音于清涼寶陀訪先世遺迹於維楊而追報焉弟子德暹等三人杖策以從大德癸卯行次奉元陕西行省平章政事欽察行臺御史中丞長夀素聞師名共挽留之乃構精舍于草場街以為其駐錫之地今所謂夀光寺也佛殿僧堂三門兩廡庖廩之屬次苐畢備師率其徒入而居焉堅持禁戒日惟一食以妙法華經念佛三昧為恆課晝夜六時顯密兼行薄於奉巳而厚于接物勞而無倦和而不流閲二十五年如一日天曆戊辰二月八日説偈辭衆跏趺而逝世夀六十三僧臘五十一闍維得舍利建塔于城南下院之野狐冡德暹自童子時侍師左右服勤三十年間從松菴某公學一乘圎教而念念不忘纂師之遺緒闕者輔之仆者起之丹青嚴飾之美田園生植之豐視舊有加懼歲月寖逺後人不知其作始之自乃礱石介今户部尚書老老屬豫書之蓋奉元古長安也神州赤縣帝王所都逹官貴人豪民巨賈好事之家所以為浮屠氏之奉者嘗盛矣世殊事異城是人非不有大善知識為侯門戚里方面重臣之所信嚮而施外護之力安能于山川寂寥之餘作如幻事熾然建立如此乎其扶植教基為衆依怙有功甚大繼志述事世不乏人既克承其付囑又汲汲焉欲圗其永久是皆可書也庸備書之使刻焉無盡燈後記淨慈故有無盡燈創於宋乾道間其後寺毀復成而燈獨廢至正元年秋八月耆舊僧子能始輟衣盂之資仍建此燈于羅漢堂且捐錢唐縣靈芝鄉田五畒俾以歲所入米五石給膏油之費凡為燈之法內置一燈外安十鏡交光相涉普遍互融百界千如重重俱現蓋託事以顯理恐人不解其義乃買石摹刻真歇禪師所為燈記以開示或於是燈未能目擊而道存觀禪師之言思過半矣來遊如幻之境者毋徒以為一時之竒玩也哉真如院鍾樓記真如院在義烏縣治西南百十步故為雙林𪠘舍宋治平乙已𥘉賜額而儕於列剎恆産素薄屋室物器凡其法所宜有者久且未克大僃嘉定丙子僧若愚始範銅為巨鍾作樓以居之逮本朝延祐丙辰僅百年而樓為風所壞惟鍾獨完僧慧慈將募施者市材僦工以復其舊有志而未遂也今縣丞李侯若愚休沭憩止顧見鐘銘僧若愚名與巳適同恍焉如有所契即以起廢為巳任亟施錢為衆倡官僚吏士咸協贊之好事之家又來佐其費而諸僧亦為助有差爰興土木屬慧慈躬涖其役樓之建以至正元年三月乙巳而落成於二年三月甲戌崇廣嚴麗視昔有加既居鍾其上慧慈欲圗李侯于永久乃捐私田二十八畒有竒俾來者歲取其入嗣而葺之且伐石求豫為之記昔吳越忠懿王時有大比丘韶公為其國師自以與智者大師同族姓覩天台遺蹤如故居焉時智者之學幾絶忠懿用韶公言遣使十輩奉五十種寶詣髙句驪求得其書天台教之復傳于中土實自韶公發之由李侯視韶公財法二施雖殊其以姓名之同為利益成就之勝因一也夫姓名之同亦偶然爾有能察其心之所同則心佛衆生三無差别慧慈與其徒瞻華構之翬飛聆鴻音之鯨震若見若聞無非佛事李侯之施詎易量哉其所託以為存者有不在豫文矣縣令長而下暨緇白之士施錢有目具載于石背云金華黃先生文集卷第十三
