body:
  text: 敕賜康里氏先塋碑康里氏三葉疏王封者六人踐相位者四人咸有石章以紀勳德而其塋域在京城和義門之外者顧未有以表于封樹至正八年冬十一月十有二日皇帝御眀仁殿中書宰臣用今大司農達世貼睦邇之請以聞詔臣某為之銘以達世貼睦邇素善書有旨就令書丹別敕平章政事議中書省事姚庸篆其額以賜焉臣溍忝以非才待罪太史氏職在論撰不敢控辭康里古髙車國也我太祖皇帝親征而略其地其國之近屬有二孤子曰曲律曰牙牙其母古麻里氏賢而有識以二子置禇中負以槖駝而來朝則太祖已賔天乃以二子獻於太宗曰此吾國之遺胤也不可為人所得而辱於奴隸敢以來歸幸它日為天子使上憐而撫育之暨憲宗御極二子既長召入宿衛領昔寶赤遂扈從伐宋母廽康里而復來值憲宗陟方諸將皆北還二子獨後禱于神祠若有稱好者再問而知為吉兆比至家則二子亦至矣世祖皇帝入正大統疇其勞績給以土田人户俾居興和天城之大羅鎮母後以牙牙子貴追封雲中郡夫人牙牙贈宣忠翊德開治功臣開府儀同三司上柱國追封雲中王諡配忽都台氏封邢國夫人繼桓答氏封康國太夫人丞相順寧忠烈王阿沙不花丞相和寧忠獻王亦納脫脫皆雲中王之子丞相冀寧文忠王鐵木兒達識則和寧忠獻王之子也順寧忠烈王年十四入侍世祖以占對詳眀特見親幸令門者勿納以試之遂由水竇而入上嘉其志乃命聽其出入無禁嘗早朝露未晞洗行而前上望見尤歎異焉使掌門衛以察非常久之以西手千户領昔寶赤從成宗北征與海都戰數有功入為大宗正府也可札魯忽赤浙西豪民朱清張瑄以海運取顯官有罪抵死王奉旨簿録其家一無所私詔賜王宅一區鈔萬五千緡命兼兩兵馬指揮司達魯花赤姦軌不作輦下肅清武宗即皇帝位拜中書平章政事軍國大事並聽裁決尋加特進太尉依前平章政事有盜內府金者王退朝適與之遇訝其倉惶失措詰之果得黃金五十兩白金百兩上命以金賜王而誅盜王辭曰盜誠當誅金非臣所宜得請入金贖盜罪上為貸其死有旨出內府鈔十五萬緡賞蹴踘者王力持不可訖弗豫一日入侍于五花殿覩上玉色而進薄滋味寡嗜欲之戒上嘉其忠忱命進酒王曰陛下既納臣言而復以酒進是臣言不足取信也上為罷酒進中書右丞相行御史大夫尋復為平章政事加録軍國重事兼廣武康里衛親軍都指揮使封康國公遷知樞密院事薨享年四十有七贈純誠一德正憲保大功臣太師開府儀同三司上柱國中書右丞相追封順寧王諡忠烈配達海的斤氏追封順寧王夫人索羅真氏别哥倫氏並封順寧王太夫人和寧忠獻王少從其兄斡秃蠻獵於燕南斡秃蠻使獻所獲丗祖皇帝見其骨氣沈雄步履莊重即命入宿衛暨武宗撫軍朔方王在行間與諸將大敗海都軍于杭海手斫一士之首連背胛以獻武宗壯之兵之始交也武宗鋭欲䇿馬出戰王執其轡力諌上怒揮鞭抶其手不退上不得巳而後止與諸將朵兒答哈語及之朵兒答哈曰太子在軍中如身有首如衣有領脫有不虞衆安所附脫脫之進諌可謂忠矣上深然之成宗大漸丞相哈刺哈孫答刺罕稱疾卧直廬中王適以使事至京師乃俾馳告武宗以國恤且勸進安西王乘間入朝窺伺神器既而仁宗奉太母至自懷孟忠烈諜知姦黨謀偽賀千秋莭而舉事亟白于仁宗先二日而發內難悉平武宗聞太母詢所宜立於隂陽家遣王還察事機時太母以武宗遲廽不至已命忠烈往道宗室諸王貴戚元勳推戴之誠忠烈至野馬川上見之甚喜行次旺古察而王繼至趣使疾驅與之共載聞王致太母及仁宗之語乃大感悟釋然無疑暨忠烈還報仁宗即日命駕奉迎于上都武宗皇帝正位宸極尊太母為皇太后立仁宗為皇太子三宫協和而無間言王兄弟之力也先是武宗嘗命王同知樞密院問曽視事否王對曰今正殿未御宗親未見德音未下而扈從之臣攙取名位失四方之觀瞻寧不上纍聖德是以未敢祗事上嘉歎不已知樞密院只兒哈忽侍上於潛邸嘗有不遜語將置于法王諌曰陛下新即位大信未立而輒行誅戮知者以為彼自有罪不知者以為報仇恐人人自危况只兒哈忽習於先朝故興今固不可少也上乃宥之上亰大冥故事命一近臣敷宣王度以為告戒王薦只兒哈忽令具其言以進果稱旨上歎曰博尓术博爾忽前朝人傑脫脫乃今丗人傑也即以所進之言授王及諸王大臣𬒳宴服就列王即席陳西北諸藩始離終合之由去逆效順之義聽者莫不傾服王自同知樞密院事中書平章政事拜御史大夫遷南臺御史大夫召拜録軍國重事中書左丞相知無不言言無不行人以賢相稱之尚書省立以王為右丞相王辭曰爵賞者帝王所以用人也今爵及比德賞及罔功緩急之際何所倚賴乎中書所掌錢糧工役選法刑獄十有二事若從臣言恪遵舊制則臣願與諸賢黽勉從事不然用臣何輔上乃為下令俾濫受宣敕者赴所屬繳納僥幸之路既塞奔競之風頓衰中臺有贓罰鈔五百万緡王請出以賑孤寡老疾諸窮而無告者莫不舉手加額宗王南忽里部人告其謀為不軌王辨其誣抵告者罪宗王牙忽秃徴其舊民於齊王八不沙部中鄰境諸王欲奉齊王攻牙忽秃齊王懼奔牙忽秃以避之遂告齊王反王簿問得實釋齊王徙諸王于嶺南邉將脫火赤請以新軍益宗王丑漢廷議俾王往給其資裝王言時方寧謐不宜挑變生事辭不行遂遣丞相秃忽魯平章政事也先帖木兒往給之事幾以激變尋復為中書左丞相仁宗眷之彌篤欲使均役于外拜江浙行中書省左丞相下車伊始進父老問以利病咸謂杭城故有便河逹于江滸湮廢而久若疏鑿以通舟楫物價必平僚佐或難之王曰吾陛辭之日密旨許以便冝行事民以為便行之可也俄有旨禁勿興土㓛王曰敬天莫先勤民民蒙其利則災沴自弭土功何尤不一月而訖工人至今便之王以疑似召赴闕杭民數萬號慟遮道不得前既至賴仁宗察其無他厚賜而遣之還鎮王至杭未幾遷江西行中書省左丞相英宗嗣位召拜御史大夫帖赤隂忌之奏改南臺御史大夫復嗾言者劾其擅離聀守將徙之雲南會帖赤伏誅乃解王家居不出者五年泰定四年二月二日薨享年五十有六王階至開府儀同三司勳上柱國爵為馮國公兼官為集賢使仁虞使中都留守司逹魯花赤開寧路總管府逹魯花赤領崇福司回回司天臺中衛廣武衛親軍都指揮使贈推誠全德守義佐運功臣太師中書左丞相階勳皆如故追封和寧王諡忠獻配也先氏封馮國夫人武宗又妻以畏兀氏月魯忽圖仁獻章聖皇后之同乳也封薊國太夫人兾寧文忠王以大臣子事明宗於潛邸宏才雅量好學下士夙負公輔之望𩔶事纍朝由同知都護府事為工刑兩部侍郎擢監察御史遷祕書卿除禮部尚書遂參議中書省事擢西臺侍御史未行留為奎章閣侍書學士除大都留守遷同知樞密院事上既總攬權綱用脫脫為中書右丞相王為右丞以更新庶政科舉之廢也王在參議府爭之不得訖不署其奏牘至是力為上言前代科舉得人之盛遂復行焉金山大雪上遣王及知樞密院衆家奴齎鈔一千萬緡衣表裏各二萬匹往周給之王𬒳命即行雖皸瘃無所憚拜中書平章政事每入直上為御宣文閣詢以治道往往至夜分乃退上親祠南郊王言熙事慶成宜均惠于下詔賜民明年田租之半嶺北地寒不宜稼歲飢賑以鈔無從糴王請轉亰倉米百萬石貯和寧由是備先具而民不告病兩浙閩廣鹽額纍增而課愈虧王請歲減十萬引以紓亭戶之力中政近臣謀發蕃舶規取息王言與商賈爭利恐逺夷得以窺中國事遂巳日夲海商百餘人遇風漂入髙麗表請沒入其人於有司以為奴王以為天子一視同仁四方皆吾赤子豈可乘人之險以為利宜資其還上從之日本果上表稱謝無何日夲有僧告其國遣人至京師刺探國事王曰刺探者在敵國固有之今六合一家何以刺探為果有其人正可令覩中國之盛歸告其國人使知嚮慕旁觀稱歎曰真天朝宰相之言也拜御史大夫務以靜重持大體不為苛娔以立聲威建言近歲大臣獲罪重者族滅輕者猶籍其妻孥祖宗聖訓父子罪不相及請除其法上從之遂著為令飢民集於輦下奏出贓罰鈔糴米萬石即近郊寺觀為糜以哺之所活不可數計居嵗餘復為平章政事進位次於端揆大駕時巡留鎮大都舊法細民糴於官倉出印劵月給之者其直斗三百文謂之紅貼米賦籌而給之盡三月止者其直斗五百文謂之散籌米豪民貪夫得買其籌貼為利玉請别發米二十萬石遣官坐市肆使人持五十文即得米一升姦弊遂絶民蒙其惠乞解政柄不允拜録軍國重事中書左丞相領經筵事王入則告上以帝王之道出則正紀綱修法度奏立內外通調之制朝臣外輔許得陛辭上親臨遣責以成效郡邑賢能吏亦次苐甄拔分海漕米四十萬石置沿河諸倉以備凶荒先是朝廷患僧徒擁厚資事兼并抑使與齊民均受役于官柄國者右之法遂中變王奏復其舊延登故老俾預大議旁求遺逸待以不次之擢加孔子後嗣襲者秩二品嵗一再詣國庠進諸生而奬勵之使士咸知勸王天性忠直學術正大剸裁庶務片言立決重輕豫奪各適其宜上嘗問為治何先王對曰莫先於法祖宗上因稱王文統為竒才而有不同時之歎王前奏曰丗祖皇帝行仁義而文統輔以功利此所以為丗祖之罪人也使文統復生於今猶當逺之何足關聖念乎蓋王於書無不讀尤喜聞儒先性理之説而明於義之辨相業之隆實基於此從幸上亰還入政事堂甫一日暴得危疾上命近臣挾名醫狎至疾巳不可為以至正七年九月十八日薨享年四十有六葬以其月二十六日上命有司護其葬仍給􅉠鈔二十五萬緡兩宫皇后及太子致􅉠有差階至開府儀同三司勳至上柱國兼官為昔寶赤右手左阿速親軍宣忠斡羅思親軍都指揮使司逹魯花赤提調留守司武衛太醫院廣惠司寧徽寺事贈開誠濟美同德翊衛功臣太師中書右丞相階勳皆如故追封兾寧王諡文忠配曲出氏追封兾寧王夫人執政大臣言相位不可久虗上曰鐡木兒逹識有兼人之才後難為繼朕當徐思之金山禮尼别使者入見上顧謂知樞密院阿吉刺曰鐡木兒逹識籌邊事皆與朕意合斯人豈可復得哉因俯首太息不已按康里氏丗譜雲中王之配邢國夫人生四子曰孛别舍兒曰和者吉贈推忠宣力保德佐運秉義㓛臣太保開府儀同三司上柱國追封榮王諡忠武曰不别遙授甘肅省右丞曰斡秃蠻繼康國太夫人生二子一女二子則忠烈忠獻兩王也忠烈子男二長海亦兒順寧府逹魯花赤次伯嘉納前尹京時平反海商𬒳誣為盜者所活一百十六人纍遷中政院使女一也里八思密失適上都兵馬都指揮使亦思馬因封雲中郡君孫男一託和直女二忠獻子男九長霸都仁虞都總管府逹魯花赤贈禮部尚書次即兾寧文忠王次玊樞虎兒吐華同知樞密院事次逹世貼睦邇嘗以平章政事行省首行視忠獻所浚杭城便河而除治之父老多忠獻之遺民無不感泣入為大司農拜銀青榮祿大夫湖廣等處行中書省平章政事次哈答不花次阿魯輝帖木兒皆早卒次脫烈太府太監次哈逹帖木兒太都副留守次汪家閭同僉資政院事女八長哈逹忽都魯適衛王闊慱次帖木偏適侍禮郎不花次亦老寒適集賢大學士兼內史豐國公怯烈該次伯忽都魯適大宗正府也可札魯忽赤卓思丹朵兒只次乞刺沈挫適諸王蠻子次脫脫倫適中書刑部侍郎保保脫脫倫卒次保僧繼之次不魯罕忽里早卒蓋忠獻九子惟文忠及湖廣行省平章政事薊國太夫人出也孫男十女七文忠之男二長拔都兒襲領昔寶赤次天保奴女三長别的斤適中政院判官三閭次完者提斤適衛王子吉刺失八次的斤玉樞虎兒吐華之男一細鄰女逹丗貼睦邇之男一瓦咱刺失理女一招童脫烈之男二長壽安次某哈逹帖木兒之男二長萬次某女汪家閭之男一博羅帖木兒曽孫男女拔都兒之男二長秃魯仁虞都總管府逹魯花赤次完者帖木兒海口屯儲侍衛親軍都指揮使始忠獻嘗建書院于順寧宣平宮家莊之别墅賜額景賢後即其中為忠獻文忠兩祠堂春秋有事于先聖先師則侑食焉忠烈忠獻兩王異母之子孫惟榮忠武王之子燕不憐燕八思提别不花伯撒里為最顯燕不憐卒官遼陽行省平章政事太保興國公贈推誠效節佐運翊亮功臣太師開府儀同三司上柱國追封興寧王諡忠襄燕八思提大司農别不花嶺北行省平章政事伯撒里由御史大夫纍遷江浙行省左丞相餘皆至大官莫得而殫紀也臣溍欽惟太祖皇帝肇基朔漠丗祖皇帝統一方夏溥天率土共惟帝臣傑出其間而膺國家之重任者固非一族有若康里氏之先老母弱子不絶如線祖宗所以長育成就之以詒燕于後人者天實佑之豈偶然哉一門三相豐功茂烈未易以茟舌擬諸形容今獨取其關於宗社之安危民生之休戚者序次而顯詩之乃若今大司農之尊君親上好賢樂善發其素藴紹休前人圭傳祖襲方興未艾屢書不一書是在後之秉史茟者銘曰山川出雲膚寸之微綿綿瓜瓞天實培之猗康里氏家有賢母保其遺孤克開厥後有相之道俾熾而昌蟬聮奕葉四相六王相業之傳由忠烈始惟王忠獻厥績愈偉𬒳堅執鋭出從撫軍佩玉瓊琚入侍巖宸塤箎伯仲股肱左右奔走後先獻替可否陽九之厄國有危疑民心靡止孰為龜筮桓桓忠烈乃心帝室明炳幾先不俟終日繼以忠獻載驅載馳風騰雲躍夾日以飛大憝廓清德音布濩九廟尊安三宫恱豫天子有命忠獻是膺乃位該輔以秉國成百度惟貞六服承德寧有一夫不𬒳其澤帝眷南服爰資保釐克勤小物靡有遐遺秉其忠貞夷險一莭髙朗令終休有餘烈積慶儲祉卑于文忠丗濟其美乘時奮庸紬書金匱談經氊厦堯舜其君貴王賤霸咨詢故老延登逸民量能授任內外惟均懷柔逺人務全國體威行惠孚無間逺邇垂紳正笏泰山四維天胡弗憗當寧興思大事之書厥有顯册史臣奉詔表此幽穸翰林學士承旨致仕脫脫公先塋碑國朝之制官登七品始推恩於二親位極一品乃追榮于三代觀夫丗數之逺邇品級之崇卑則前人積纍之功有可得而徴者矣傳所謂德厚者其流光德薄者其流卑詎不信哉重紀至元之五年某月有制翰林學士承旨脫脫曽祖默而吉台贈中奉大夫江浙等處行中書省參知政事謢軍追封范陽郡公曽祖母哈敦追封范陽郡夫人祖吾都兒贈資善大夫江西等處行中書省右丞上護軍追封范陽郡公祖母夾谷氏追封范陽郡夫人父故任忠顯校尉平江路吳縣逹魯花赤帖古迭兒贈榮祿大夫河南江北等處行中書省平章政事柱國追封兾國公母朵羅以氏臧氏俱追封兾國夫人煌煌命書下飾泉壤而碑石未建君賜弗彰至正十年夏四月天子坐興聖殿東便殿翰林學士承旨臣哈刺八都兒臣拜拜以為言得旨命翰林侍講學士臣溍為之銘宣徽使臣三旦八書其文集賢侍講學士臣期頥篆其額俾刻焉臣謹按脫脫公系出蒙古默而吉台氏丗居范陽金季中原俶擾先丗兩郡公皆晦迹弗耀而能以善及人有隂𬒳其惠而不自知者垂休委祉逮於兾國仕皇朝厯昌平寧陵穰吳四縣逹魯花赤宦轍所屆政譽翕然而未足以展其素藴巳試之效特泰山之毫芒耳是以脫脫公起而承之由某縣逹魯花赤為大都路兵馬都指揮使擢大宗正府郎中出為江西等處行中書省左右司郎中纍遷潭州路逹魯花赤邵武路總管召拜吏部尚書尋由治書侍御史升侍御史進御史中丞領侍儀司事出為陕西諸道行御史臺御史大夫召拜翰林學士承旨知制誥兼修國史奎章閣學士院大學士其在中臺則入侍經筵其在翰苑則總裁三史傳燕見之際禮遇甚優至正元年告老祈間遂以翰林學士承旨致仕上每念之不置特拜平章政事議樞密院事提調屯田事九年以疾固辭乃復以翰林學士承旨致仕仍舊階榮祿大夫而食其祿娶逹逹爾氏繼李氏俱封兾國夫人子男一人安僧早丗女一人宣徽使三旦八即其壻也孫男一人張保某官女一人適憲使泰不花之子阿納實理其范陽縣某鄉某原三丗大墓所在也蓋木有本水必有源本深則末荗源長則流逺善慶所鍾篤生顯人為時名卿為國元老豈非蓄也久而發也不亟故其所成就昭融烜赫自有不可掩者歟記曰顯揚先祖所以崇孝也身比焉順也釋之者以為身比焉謂自著名於下也庸敢竊取斯義備述脫脫公歷官之詳使後人知天寵之所加其來有自銘實之大者其聲必宏發也有時乃震以轟猗兩郡公生于季丗藏鋒斂鍔百不一試有偉兾國逢時之昌志局于位所施未光篤生龎碩以材自奮鴻漸于陸循循而進踐敡中外駿望日彰乃秉銓衡乃持憲綱乃長詞林乃專史局談經氊厦從容啓渥有命自天賁于幽墟時之既至匪亟匪徐史臣奉詔推原夲始播諸頌歌揚耀千祀答祿乃蠻氏先塋碑異時乃蠻在諸部中最為盛強有别號答祿者子孫因以為氏是為答祿乃蠻其先曰曲出祿者乃蠻部主太陽可汗之弟也有子三人伯仲皆逸其名季曰敞溫我太祖皇帝受命龍興曲出祿亡其所部敞溫奔契丹契丹以女妻之是為太夫人耶律氏以嵗乙丑生隨頴等處征鎮萬户抄思公北俗以草青紀歲故莫詳其月日契丹滅而敞溫亦卒公年甫十有二耶律夫人與乳母徒步負之以避難晝伏宵行備殫其勞道遇河水乳母先下探其淺深及肩而返俄有敗車之板自上流泛泛而來乃取而坐公于上乳母引其前耶律夫人擁其後以濟遂來歸于太祖三皇后得旨留侍左右太宗時公年二十有五始出從軍睿宗以皇弟帥師破代石二州公先登有㓛及鴈門之戰與金人相拒於河上公為前鋒􅍱河馬陷失利以靴大拔足而出倉黃跣走幾為所獲翌日整兵復戰大敗之乃下令軍中皆改製大靴不如令者必繩以法公每出戰以長槍一主擊刺短槍一代盾捍矢短兵接則手舞二劍奮擊而前所向風靡歲王辰徒睿宗大破金兵於鈞州三峯山盡殱其衆金人自是不復能軍睿宗表其㓛于太宗賜以湯隂縣黃招撫等一百十七户公曰民無罪也力辭不受乃更賜以它有罪者魏使臣等三人及其妻孥五十餘口大名城中宅一區黃金飾具帶酒壷杯盂各一仍命丗領湯隂之户收其差稅以供上用有旨遣忽都虎留乞與公三人並以奉御為萬户發西京大名真定河間等諸州郡軍四千六十餘人占籍征行每千人領以官一貟及鎮守隨州招集人户仍以忽都虎兼夲州逹魯花赤又以保定府行唐縣邸琮充總押副之丁酉七月也後移鎮頴州進攻安豐城將拔以疾歸大名戊申正月十八日卒于賜第之正寢年四十有四夫人張氏康里氏張夫人代州石門良家子年十五避兵與父母相失公得之以進于三皇后賜名安坦察其秀慧遂以妻公且諭之曰此女必能成汝家也無子育庶子教化的為已子早卒教化的生拜的迷失亦卒而康里夫人以已丑春正月六日生台州路逹魯花赤别的因公自襁褓時留三皇后所張夫人歎曰吾夫有功於國而吾無子誰當襲其職者幸别的因在道里雖逺吾何憚焉乃具金帛戒車馬身自往迎之六年之間凡三往返且因近侍以請乃得旨而携公以歸於是康里夫人卒已久張夫人每訓公曰人有三成人知畏懼成人知羞耻成人知艱難成人否則禽獸而巳公之深自飭厲至于有立者張夫人之教也張夫人生于乙亥八月二十八日以至元二十一年十一月十一日卒年七十先是憲宗在御丗祖居潛邸甲寅自黑水承制諭察罕於開州命公襲父職遂以公為副萬户與留乞等征鎮隨頴等處丙辰冬又自孛魯哈覩諭征鎮諸軍稟受公等號令戊午春諸王塔察兒自亦運納諭公等守邊勿慢軍機公遵守惟謹士伍肅然中統元年丗祖即皇帝位有旨諭留乞忙古䚟兩萬户及所統千户百户悉聽公言議約束至是委任益専四年春河南統軍司召留乞與公赴行在忙古䚟留頴州十一月公入朝公身長七尺六寸美鬚髯肩豐多力善舞刀尤精騎射軍士咸畏服之丗祖密敕相士潛出于後捫其脅公為不動上亟稱之曰壯士問相士何如對曰其人大脅非極貴之相上愕然即日降金符命為壽頴二州屯田府逹魯花赤與總𬋩李繼昌同議公事纍遷陳州唐州信陽府逹魯花赤皆佩金符樂陳州土俗之美因家焉遷常德路總𬋩府副逹魯花赤厯沔陽安豐兩府逹魯花赤升池州台州兩路總𬋩府逹魯花赤兼管內勸農事官自武略將軍五轉至昭勇大將軍公在壽頴屯田府二州土地多荒有虎夜食民妻民訴于公公為立檻設機縛羖羔置其中以致虎羔思乳鳴不絶聲夜半虎果至機發而虎在檻射之矢再發皆中左右繼至虎巳斃詰旦總𬋩李繼昌聞之乃舉酒為公壽居民大恱自是二州無虎患信陽山中亦多虎公至未幾將出獵左右以多虎諌公不聽比出以鞍􅠷置于鞍上左右問故公笑曰吾有以也遂令燔山虎果出宜前搏公馬公以􅠷擲虎虎搏􅠷據地而吼人馬皆辟易失措公神色不變旋馬傍虎射之中其脅虎立斃左右環視良久曳歸剖而視之矢正貫其心咸以為神射公在常德新附人李明秀同知府事見公苐三子燕真不花貌魁梧善騎射有父風請妻以其女公􅍝許之既而明秀以公事行境內且將歸視其家邀燕真不花俱行公密語之曰南人新附未可恃也緩急當自為計明秀至家召親戚故舊酣宴燕真不花察其有反謀而不敢言至暮罷酒明秀出二紅巾一以與燕真不花一以與其奴二人陽受之而退夜二鼓伺其衆皆就睡燕真不花謂其奴曰可以去矣乃共取鞍馬弓矢竊其關而遁四鼓後追者至燕真不花與其奴疾馳各彎弓後向而不發追者稍却黎明至府白其事發兵討之不下公請自往招之明秀見公單騎來不設備公誘以自新明秀素服公之誠遂與公俱來公以聞于朝而誅之餘黨悉平公之官池州也道出頴上頴近荆山野豕時出害稼民聞公至迎候以告公曰吾嘗射虎未嘗射豕也姑試射之衆隨公行十餘里見豕在田鳴鐃逐之驚出公橫馬射之豕𬒳創怒奔八九里乃斃衆共分其肉凡三百餘斤以百斤為獻公不取燕真不花在侍傍公令度曲歌其事大德某年公始至台州未久遽以老疾辭歸安豐至大二年六月十日卒年八十一公之至孝出於天性蓋北俗喪禮極蕳無衰麻哭踊之節葬則刳木為棺不封不樹飲酒食肉無所禁見新月即釋服逮公居張夫人之喪始悉用中國禮踰年乃從吉公平生莭儉務夲俸祿給衣食之餘盡以買田園馬牛農具大名安豐陳頴之田幾二萬畒家僮幾二百人歸休之日輒課其耕作子孫賴焉夫人梁氏大名貴族自為處子時好誦釋氏書老益康健五步之外明見地上遺針生於丁酉二月二日以天曆二年十月十日卒年九十有四梁夫人生子男四人長不花奉訓大夫僉嶺南廣西道肅政廉訪司事居官廉介而寬簡人罕見其喜怒前公卒次曩加䚟一名文圭篤學而尚志卒贈承事郎祕書監著作佐郎次即燕真不花亦前卒次延壽彰德等處長官司逹魯花赤巳卒女三人長適中奉大夫浙東道宣慰使阿哈八失次適輝州逹魯花赤答失蠻次適芍陂屯田萬户鐡竒庶子男一人掇落䚟女一人皆居幼而早卒孫男七人長阿馬秃彰德等處長官司逹魯花赤次脫脫興濟縣逹魯花赤巳卒次豬狗亦卒次孛蘭溪用公廕為寧國路宣城縣逹魯花赤次守恭天曆三年進士今曺州判官次守禮泰定四年進士今武州逹魯花赤次完哲準東道宣慰使司奏差女八人長早卒次適真州判官張行簡次適武鄉縣主簿閔安逹兒次三人皆適名族次適集賢侍講學士中奉大夫兼國子祭酒前進士趙期頥次適唐兀康野仙曽孫男若干人長脫因襄陽縣主簿次火你赤次與權至正二年進士今祕書監管勾餘尚幼女若干人玄孫男若干人女若干人𥘉耶律夫人反抄思公張夫人俱葬大名而别的因公以其卒之年九月三日葬汴梁扶溝縣郭西南之阜原梁夫人之卒也孛蘭溪既奉柩權厝于扶溝先墓之次遂謀於族人曰先丗葬大名者八十三年矣其葬不如禮奈何咸曰曷遷於此乎孛蘭溪以為然乃自大名奉遷三喪以天曆三年四月二十八日改葬于扶溝與别的因公同兆域梁夫人祔焉其易服而斂也見抄思公之骨極大左臂自肩逹于指莭連錯瑩白如玉下棺之際有大風棬沙自北來至壙而散亦異矣孛蘭溪將樹碑以表于墓隧巳礱石而未及刻後二十年乃使其子與權奉趙集賢之狀屬溍以銘狀稱乃蠻之破滅也其本支幾無類矣耶律夫人煢煢然挈孤子歷艱險終以全其後可悲也巳隨頴府君奮身戎行披冒鋒匙鴈門三峯功伐特盛方將大其門而壽齡弗永惜哉台州府君招降叛逆如呼小兒馳射猛獸以除民害何其雄偉也官止於郡而不大顯相士之言信矣向微張夫人之力何以自致於此乎父子之智勇兼人克有勳業婦姑之貞烈尚義卒昌其家可無傳於後耶溍竊觀司馬子長所記多竒莭偉行非常可喜之㓛惟夫雄文善壯其説是以後之覽者為之激烈慕歎而不巳集賢答祿氏子壻故述其家丗為詳至所謂竒偉非常可喜之事茟力之宏肆蔚贍亦足以稱之非溍所能加損也謹備著之以為序而為銘以系焉銘曰草昧之𥘉群雄並馳既興而仆孰扶孰持猗答祿氏綿綿墜緒將絶而續由兩賢母匪母獨賢惟天佑之保其遺胤際于昌期委質輸忠先登賈勇以敗為勝不戁不竦既戡大敵遂長萬夫征行鎮戍靡有定居名城垂拔將星遽隕襲紫傳龜繼述惟謹父則有子君實知臣試以劇務俾職留屯載疇其庸授以民社兵衛晝間農抃于野叛人跳梁呼之來前翦其凶渠餘黨帖然惡獸縱橫殘民害物發無不中若貫蟣蝨時逾三紀七剖部苻久淹外服訖懸其車寓迹田園其樂也獨膂力未衍云何不淑積慶所鍾子孫振振接踵儒科易武以文退食委蛇鳴珂曳組視此石章無念爾祖濟南髙氏先塋碑國朝之制官七品以上咸得馳贈其先所以廣孝而勸忠也觀夫丗數之異等級之殊而其積纍之薄厚可得而徴焉泰定元年冬濟南髙公以亞中大夫鎮江路總𬋩致仕品苐三有司援典故以聞𬒳旨追贈二代信乎其德􅌋流光者矣按髙氏丗居棣州無棣縣之辛禮村殁因葬其地蓋其先出於齊公子髙以名為氏譜諜墜逸系緒莫詳今所居則猶故齊地也公之曽祖考曰滄洲鹽山縣主簿諱輪祖考曰滄洲孔目官諱憲今贈中順大夫同知某路總管府事騎都尉追封渤海郡伯祖妣李氏渤海郡君考曰宣武將軍管軍總領諱璋今贈亞中大夫某路總管輕車都尉追封渤海郡侯妣趙氏王氏並渤海郡夫人由鹽山府君而下三丗俱有仕籍而志局于位􅍏施未光貽慶垂祉鍾于後人公實承之也公名仁字壽之少以材推擇為吏會天兵南伐署招討司提控案牘歷萬户府知事辟湖廣行中書省掾從征安南討兩江群蠻有勞受知丞相順德忠獻王因携以入覲既丞相改涖江浙行中書省又奏以為檢校官尋遷左右司都事時同僚多以酒榷鹽策之利自汙簿問其事者以公厲獨清之操更見識拔剡上擢中書工部主事俄復入江浙行中書省為左右司貟外郎除江西行中書省理問官治蒙山銀賦之病民者捕寧都土豪之亡命者興利去害績用尤著廷議以公踐揚滋久將疇其民庸授吳江州知州下車未幾訟蕳役均田里無事乃大飭三皇孔子廟去之日州人相與立石以紀遺愛部使者以最聞授嘉興路揔管府治中時列郡方作祠奉帝師凡庀材用召匠傭一出於民力公獨諭浮屠氏之籍於白雲宗者俾任其役官無一粟之耗民無半餉之勞而祠事以備部使者復以最聞先是公數奉省檄行勞近郡以丹陽金壇故有公田虗額請悉蠲之而取他羡田輔其入又以松江東鄉水利久廢田不冝稻請去故所賦米而用土産菽粟代其輸事皆施行兩郡之人莫不便之年甫七十即乞謝事不俟報而歸吳門别業居焉至是遂休致之請應追錫之命而公之妻楊氏贈渤海郡夫人劉氏封渤海郡夫人公虔奉制書永懷明發展省墓下祭告如禮退自惟念宜有以昭上恩紀丗德乃俾來徴銘溍聞古之為銘者必斟酌先祖之美而自著其名焉所以示後丗法也謹敘次髙氏之丗家名爵與公之志行官業而銘以繫之銘曰顯顯髙氏齊文之昭代祀則綿莫守其祧不有厚德孰復乎始蟬聮三葉躋于膴仕胡卒不耀不震以轟儲厥義方嗣人之承展也嗣人是續是似服勤中外時踰四紀乃濟其美乃揚其名罔有失墜以荷寵靈煌煌天書下賁玄宅發其幽潛昭融烜赫辛禮之原巋然豐碑琢而銘諸以代鼎彞百丗之下視此遺刻維孝維忠永胤無極金華黃先生文集卷苐二十八
