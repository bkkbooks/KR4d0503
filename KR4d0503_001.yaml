body:
  text: 五言古詩臨川危素編次番易劉耳校正雜詩五首日月東而行羣動亦不息寄身萬物中寧獨􅒜兹伇所以魯中叟遑遑走南北聖哲諒已然旅人䏻久安晨起步南園旭日朗以清葵花衆草中曄曄敷丹榮流光非汝私獨爾心自傾覽物有深懷竚立方含情璞玉與寶劍淪落初未偶君看被湔袚各在千年後將身比金石誰當獨長久悠悠百代下相知復何有孤雲淡無心出山偶為雨長風忽吹散渺渺歸無處唯餘向來山突兀青如故慷哉魯仲連㓛成身已去春風著萬物欣欣皆自私可憐兒女花榮悴更相持獨有澗底松偃蹇如不知何疑楊執㦸草玄鬢若絲效古五首上山見明月下山月相隨月豈知愛我我行自見之故山日已逺故人不可思殷勤謝眀月願爾無時虧女美衆所恱士窮丗所䡖䡖重安足言泥盡水自清淮隂初寄食曲腰跨下行季子黃金多妻嫂來相迎自古已復然歎息空吞聲擊石乃有火石火光不揚攀天亦有路天髙路何長嵯峨萬古雲下覆歌哭場富貴誠足多貧賤不可忘落花隨風吹各自東西飛花飛既不息水流復無極同生不同歸能勿異顔色木生則有枝豹死則有皮悠悠岐路間多言亦奚為飲酒莫盡醉盡醉無餘歡讀書莫弔古弔古多悲酸蕭艾蔽中野白露摧芳蘭鳳飢不得死鴟梟食琅玕去去復玄玄采芝青雲端人事如草木人事如草木一氣榮悴之外物何預人而置喜與悲堂堂異姓王昔者跨下兒窮通本解后逹者固不疑阮生亦隘人慟哭真奚為煌煌眀月珠煌煌眀月珠未害居濁水君看黃河黃豈解汚清濟我方遺吾形寵辱齊一指懸知破琴戴未若檛撡禰微雲翳白日微雲翳白日羣動何喧喧嗚呼麒麟兒化為猴與猿登髙望四荒但見黃河奔誰哉泝其流與我歸昆崘萎㽔青桂花霜霰日已繁豈不有桃李對之可忘言古意荆人初得玉趼足辭巖阿持獻萬乘君君門正嵯峨誰其尸國工􅍝以石見訶迷邦誠不忍欺君反同科臣口不自眀臣心終靡它抱璞重再拜呼天淚滂沱淚盡血可續玉在良已多是事古則然嗚呼今奈何連雨雜書五首蕭蕭十日雨出門竟何之不愁道路難所懼沾我衣悠悠看屋梁作計誠己非有酒不解飲且遂哦吾詩昔慕栗里翁頗復志耕耘偶入翰墨場把筆學為文偃蹇獨何成喧啾浪云云念彼荷簔子窮年愧其勤虗堂坐無言繾綣悲宿昔常時眼中人已如不相識剝琢者誰子令我喜折屐忽去已莫追一笑岸玄幘我思仇山人山川莾回互十書九不到木葉歲頻暮頗聞近移居併失蘿中路得無挈妻兒倒載入山去今日曷不樂孤倡無與酬兀坐把書卷展玩不自休借問誰所為其人已千秋山雨政可聽撥書置牀頭晚晴泄雲散積雨林木含餘清披衣有奇懷偶從林叟行新晴逺峯麗夕隂孤花眀曠日固所虞聊茲息營營夜歸空山四寥寥落日翳榛莾蜿蜒草中徑躡屩度寒雨楠杉窈深黑忽忽疑伏乕林窮澗水眀稍聽歸人語讀忠簡宗公遺事公初起滏陽艱危屬多壘蒼然國家意委身干戈裏隂飈卷翠華朔雪被南紀悠悠虞淵日力盡揮不止寅恭秉齊鉞際㑹開朱邸長安付馮異漢業中興始宮庭數汛掃蹕路無荆杞疚心望鑾輿感激涕如水上表方出師嗚呼孔眀死宴安不可懷肉食毋乃鄙巨舟竟未焚三語猶在耳蕭然舊祠下碧草垂階戺登堂挹光儀赤舄仍几几千年墮淚碑一夫敢殘毁傳家有遺書叙事非虗美朂哉慎失墜庶以禆信史陪諸老夜飲丗故不可料忽若浮雲移坐令百年內顛倒殊歡悲顧惟我與公異代同一時覽古既深慨撫今亦餘噫長川玄悠悠青山暮委蛇向來遠逰意我行方遲遲咄哉有志士卒歲恆寒飢况復託渺茫欲與千載期盈虗信天運廢興豈人為願公姑舍是一觴聊可持曉行湖上曉行重湖曲旭日青林半霧露寒未除鳬鷖靜初散寅緣際餘景閃倐多遺玩㑹心乍有得撫已還成歎夙豫丹霞約久茲芳洲畔獨往願易違離居歲方換沙暄芷芽動春逺川華亂存期乃寂寞取適豈爛漫小隱倘見招漁樵共昏旦西峴峯層雲抱春岑急瀨泄嵌竇修蹊入窈窕衆緑蔚以茂名亭標水樂柱折荒碑仆幽尋得緇廬亂石扶結構青精午堪飯碧澗寒可漱平生慕真賞及此成解后冥探指絶頂有路忽通透緣蘿度蒙密翠氣濕衣袖寄身萬物中下睨人寰陋清謡雜風竹大嘯落巖狖東峰在眉睫可望不可􅈬同逰却何時瑶草春已秀夜興三首秋氣入病骨殘夢翛然驚芭蕉葉間露風過皆成聲攬衣泬寥內搔首天河橫飢蛩語不休中宵誰汝令孤鴻亦何苦犯霜度微眀悠悠念羣動百感忽我并大化倘不爾吾其免營營寒星挂踈林夜色翳餘暝雞聲驅行客出門路方永亦有山中人熟睡方未醒而我立于獨婆娑玩光景一笑天宇青此意君自領舉頭見殘月葉脫知深秋今我曷不樂歲月如驚鷗常憐古志士辛苦歌飯牛空山夜漫漫政合秉燭逰臨風振吾衣蕭瑟不得留小立殊復佳澗水鳴幽幽陳生詩陳生少也孤秉志何軒軒讀書奉慈母承顔郁春溫兀然處膝下不間晨與昏叢叢萬井中陳生深閉門暉暉百花時陳生不窺園常恐去左右㦯乖覆育恩一朝抱長痛飛霜隕秋萱鹽酪不入口日夜涕翻盆欲娶弗及養矢言終不昏尚賴百歲後兄子父所孫朝來逰子衣忽逐東風翻丗方醉糟粕何庸薦犧尊陳生顧謂我是事安足論幸託山水窟放情詠蘭菰嗟今學步者觸險爭飛奔願爾利鋤钁深斸六籍根願爾進竿櫓髙泝百聖源源長流自逺根大枝乃蕃勿搖崔嵬茟誇作磊磈言弘惟孝與弟百行兹其元咄哉行勿休日月方沄沄贈言豈豫敢情真覺辭繁匪為陳生榮庶感薄俗敦述懷端居有多感求志無餘營夙違金門路緬愛丹丘名􅍝沗君子顧捧身厠羣英卑栖念逺引窘步迷先征俯默敦宿尚低徊阻平生伏枕倦中夜攬衣寄遐情上天廓澄穆列宿揚光晶俯視林木改仰悲鴻鳴跂豫秉微素十年守柴荆希丗乖近務慕隱餘衷誠願言良時晚庶保幽人貞寄方子踐子彂窮居悵無遂徂歲聿載隂飛翹隕芳華候蛩厲哀音曽颸扇叢薄泫露栖喬林撫景慨往古端操思繼今折蘭間幽佩解纓濯清潯石林窅䓗蒨桂柏鬱䔥森遺丗豈余敢匡時非我任覽已􅒜高軌即事念所欽緾綿阻道里𬗟邈眺岡岑委懷竚芳訊貽好在規針寄俞子易間居寡歡豫枉駕欣周旋清言邁修夜朱火銷餘烟嘉㑹良不易鬱抱罄所宣揆余徇微業春冬屢徂遷著徽怍往哲馳芳􅒜時賢眷兹企三益揮袂增慨然杪秋淒且厲郊圻曠阡眠振飈捲飛藿積霧迷遐川契濶歲復流瞻望情所牽存期尚勿奪輔仁庶不愆紫芝無新曲白駒有遺篇矢心遂招要贈言比芳荃東園晚歸淟涊嬰近務超遙愛佳長興言望東菑良苗藹津津鄙人昧時趨曠途夙所遵幸逺簮組纍稍欣田圃鄰兀兀登故畦悠悠睇城闉理穢出新竹撼枯落荆薪夕日逗逺川餘暉散衣巾亹亹物變依依念農人渠渠長者惻惻非賤貧送凌吉叟杭州教授浙水西八州維杭實名都古來萬人海逐逐無賢愚况兹百年後淳朴古不如翩翩誰家兒白馬驕路隅春風樊樓醉一笑百解珠亦有朱門家齊謳間昊歈綃綺散烟霧繽紛被僮奴可憐彼蚩蚩久為紅塵驅頺俗如波瀾孰障羣流趨又如敗屋壁風雨須人扶博士非冗官豈即無良圖當令歌舞場化作弦誦區行矣徇所務辭章信其餘春風撡别衣晴沙秀寒蘆何以贈子行白雲不可呼聊持狂者言用比貂䄡褕送朱仲山之亰騏驎出渥窪意欲周八極芻豆豈不多未便甘伏櫪念君抱耿耿坐視暄涼易忽辭白髮親去作青雲客應恐鄧仲華笑尓長寂寂鄙人屬有念未辦經丗策青燈雨如線窮巷方逼仄懸知操斧斤不必晲樗櫟往哉布汝懷庶用副前席勿云萬戶侯自可談笑覔百年㴞㴞內𡵨路足南北出處㑹有為聚散奚暇惜歌我幸苦詞送子逺行伇峥嶸壯士志慘淡逰子色那無平生宦于南豫不識其父而識其子叔敬與之交信其所受之正矣始其父卒潭府推官顧言曰吾以一清遺爾子孫吾以為豐爾毋以為嗇也及叔敬免喪有仕資揭遺清扁所居堂上以承諸其先下以詔諸其後之是意也豈以一言易千金哉它日叔敬過豫寅軒請發其義豫無以解焉豫聞舉其所有持以豫人謂之遺而遺必有其物矣投桃之腆不薄于報瓊與帶之華不滋于獻紵故有所遺者其遺淺無所遺者其遺隆昔子之先君子推其所蓄以悉敷遺于子而子又能兢業奉持以保有所遺如臨水玉如飲沆瀣不泥滓以取義也不翕訿以為灾也不疏宕以取容也不窒塞以廢權也淵然澄穆之天洋乎陟降之地人城頭鴉鳴曙起坐理冠幘開窗寫遙望烟霧竟川澤喧喧市聲動漠漠井氣白如何山中人歲莫塵埃客晚泊釣臺下四山環一水遺臺故㠝岏那無漁樵居政復不敢安舍舟不敢兩慿軒俯清灣念昔乘興來無從寄逰觀今我有行伇乃尓容躋攀山靈豈愛我為解塵土顔落日奠蘋藻清風聞珮環幽尋不可極林暝吾當還却去望層碧孤舟生晚寒登鍾山最髙頂以三山半落青天外為韻得天字平陸漫千里兹山乃穹然猶憐布地金未即辭喧闐巖液散珠琲春岡走蜿蜒稍欣涉幽邃登頓衣屢褰路細石礧礧崖深竹姢姢洞扉剨開敞峻峯指中天冥探歷嶔崟垂蘿弱容牽碧潭隱光怪華雨標崇筵下睨飛鳥背茫茫但蒼烟眇默玄圃期淒涼雲嶠篇休駕將未䏻惆悵春風前休日集于城南投耒從逺逰牽世乖眀略豈不有簡書未䏻置丘壑崇岡近盤互春物紛照灼休沭集諸彥迂趾惠前諾稍空林中尊復詠霞上作迢迢歷墟壠靡靡瞰城郭修楊䕃晴渚野櫻散朱蕚撫時悼推斥畢景願栖託損益向子明才䏻賈生薄眷言觀歲寒無將愧場藿卞忠貞公墓江左失其御強臣玩天誅歡娛一以乖狂猘無趑趄黃屋播草野􅊮庭交劍殳事樞始誰秉捧手如奔狐偉兹百丗士死與二子俱孤哀耿未沫足以孚豚魚義旗果東指白日開天衢孰最撥亂㓛之人㦯其徒伊昔大雅廢清言鄙文儒禾􅎟已橫委衣冠尚舒徐屹然見砥柱獨障狂瀾趨髙風邈難攀捐生乃區區青簡煥遺烈蒼榛閟幽墟日夕悲吹多天髙年運徂世方用骩骳猶將愧玄虗江濤渺在望雪涕空漣如制使馬公祠堂朔風破滄溟白浪無餘地可憐甘棠樹乃尓䏻蔽芾借問誰所遺馬公古䏻吏當年印纍纍庶務劇千蝟藏龜不待灼騁駿無留轡逼仄兵馬區藹然承平意宴安亦聊爾國步方不易至尊久嘗膳壯士頻烈眥煌煌青冥鉞可同牛刀試嗚呼豪俊人竟偃風雲志致身豈云卑生丗己其季安知頴川守遂非廟堂器嚴祠閉寂寥古木含蒼翠平生瓣香祝母乃兒女事如何百載下能􅑁看碑淚永惟茂陵翁苦心抱天藝力耘冝有收黽勉觀未裔渠渠桑梓恭喋喋市井議庶哉瞻前修樹德母自畏送人赴盧陽學官播非人物居潭陽實其鄰荒淫雜巫鬼哀怨餘騷臣念子有行役水陸弥數旬乃知臯比座佇承文翰賓遐徼指天末男邦控城闉爼豆當在列冠裳㝎來臻足眀理化盛演溢周窮垠廣陌望八荒出車日轔轔蠻荆孰無適忠信惟書紳簡書有程期取别無逡巡揚鐮觸炎熱振鐸驚逺人沅水春蕩潏楚峯暮嶙峋行行慎其度離别何苦辛發金陵留别一二同志盛名不易居直道我所遵雖枉嘉遁志未渝白圭言罷釣出滄海回帆遡江濆城闉逺滅沒風水屢崩奔蕭條故交地愴恨遊子魂始雷茂陽澤孤生限窮鱗況翔自殊勢衰榮實同根戰勝物可遺目擊道已存乘桴詎無取絶弦難具論寄言同心子母徒念加餐龍灣夜泊乘潮出逺浦日暮北風平髙亭不可望遙遙鼓笳聲月眀寒鴈下江空夕烟生非關川途念沉憂坐自盈敬亭山昔窺謝公作今陟敬亭寺徴素欣始逰賞勝資深詣翛翛緣水木宛宛交蹊術緑縟澗草豐幽飀松飈駛微鍾響沓障高閣浮花氣聿熏旃檀妙豈愛巖壑媚慿生實內惕即事多冥契息隂眷枌檟搴芳懷芝桂海嶽期屢遷石林路深閟經營乖道要迫窄餘物纍稽首調御尊尚飲無生惠宿雲黃山作束髮弄文史挂席玄瀛壖解后乖良㑹擯落逮兹年息景念生理洗心賔象筵恭惟上皇代異人祕靈詮宗師既逾海兹山亦棲賢金棺滅䨥樹寶篋緘紅蓮仰窺攝誘㓛信知願力堅內愧實菲薄冥通未精專褰裳碧峯雨㷊香石林烟綵翠何紛糾苔澗窅洄沿尋幽匪外適藴真冀重宣二邉離有無五濁空腥膻豈伊俄頃用庶謝平生緣重登雲黃山兹山實靈竒吐納變舒慘太常闕弗録名號何黭黮重華秩山川盛典軼封䃭搜遺侈綸綍蠲潔羅醢鴆腐儒世所貸薄藝守鉛槧無䏻旅駿奔徒取肆逰覽霖潦時始收天地餘藹暗嵐光乍璘㻞石狀終黤黲行行恣芒屩往往得蛙坎冒進誠近貪自畫將豈敢久之氛埃豁秀色坐可攬青熒插鋒鍔翕赩披菡蓞崖奔馬騑騑石踞乕耽耽髙尋指天路幽矚極玄窞前行幾台背後㦯兩髦髧緣岡既踸踔登嶺仍轁􅰬舉頭塔廟涌地平忽如毯天人所食息璚玖化餘糂林輝寶燈燒風語金鐸撼敗壁詩者誰漬墨亂濃淡險盡乃更佳疲極復何憾是莭蕤賔初野薦首昌歜煮瀑茶可啜剖石蜜堪噉名談柝毫髮苦語􅅹肝膽理冥心自􅎇機湊首屢顉陽烏砉西翥衆色齊慘淡崔嵬識楩楠蒼莾辨葭菼莫投僧所寰鍾鏜鼓紞紞羣居肅不㕦共飯聲有嗿回睨夸奪場撫事叢百感趨名蛾赴燭逐利魚投槮何時脫火宅霍若髭去頷綺言息喃喃妙供分馣馣于焉寄相羊庶以忘坎壈誰云入道苦餘味需橄欖秋夜觀書作閒居感時駛獨學難為㓛眷言思古人幽懷極冲冲秉燭起中夜攬卷來清風恭惟千載心皎潔懸無窮氓俗自升降丗道非汙隆後來亦奚為黑白紛相攻芳華乍可悅軌轍何由通吾將離言說庶以觀其同所憂眀為纍不懼不豐開軒視眀河白月當天中怡然掩書坐夜氣方鴻濛覽元次山舂陵行有感近事追和其韻惟王始建官民命有所司奈何閲流莩束手無一施屬者秋夏交上狀殊酸悲赤日紛按行人馬同時疲連阡見標榜不救飢與羸仍聞恣鞭箠慘切傷膚皮檢核須再三供帳常恐遲哀哀鬻兒女貿貿行安之感兹欲無訴既往何由追尚慙噢咻恩稍緩租稅期云胡有倉卒徴斂更相隨但將充其數肯復計爾資肉食不自鄙謂我非敢知栖栖甔石儲剝割無㦯遺言是鄰壤凶藉此敷恩慈寧知是州人俟死它無為出語餘喘息行步須扶持猶令比樂土疾苦端謂誰俯首州縣間逭責自其冝况迫大府令聮絡飛符移豺狼方在郊鷹隼冝用時區區獮狐兔政爾何增虧吾賤不及議為君陳苦辭登錢山望菰城慨然而賦吳興水為州諸山若浮萍况此一培塿瑣屑丗未名所欣漁樵居乃與緇錫并種竹有萬竿結茅無十楹老僧解人意屣履能相迎芳草被行徑朱藤暗巖扃䔥條空階暮日照莓苔青猶嫌所歷卑未極逰眺情聳身白雲上始見春申城想當髙㑹時樓觀飛青冥竭海薦壘勺窮山羞鼎鉶安知千載後寂寞無人行煌煌冠蓋區壤壤狐兔營歸來朱門客聽此松風聲逸山過姚紫芝别業逸山誠復佳逸人不可逢何言一笑頃得此蒼髯翁今晨過其廬碧苔滅行蹤㘴我松竹間野簌羅甘豐初無驚丗談頗多曠士風念昔玄巖壑輟耕白雲中白雲故無恙我乃羞樊籠秪應山林癖未易藥石攻髙期出解后意氣將無同十年舊泉石忽忽蟠吾胸起視白日低歸禽亂西東拔地森四壁攙天唯一峯復聞麻谷幽近與金蓋通山態方屢改泉源殊未窮湫然一區內嗟我憧憧次韻答蔣眀府先生文章不經濟耽書㦯成淫偶從長者逰稍窺古人心不瑑豈非玉無絃孰為琴歲晏燈火微江濶魚龍深願言報嘉貺安得䨥南金次韻答儒公上人抱琴辭故山落葉被四野淒其不能聲豈曰無和者誰誇織女工苦念嫦娥寡請公母多談呼酒觴老瓦和方韶父先生以滿城風雨近重陽為韻七首掩書坐中宵階空葉落滿不見書中人蒼烟夢秋館豈不有膏沭所慕非傾城翠袖日巳薄朂哉歲寒情栖遲憐繫瓜夢寐追飛蓬去去羊荆州吳帆渺霜風當年白衣人賴以慰風雨不飲政復隹有酒無用湑江瑶配荔枝勝處終不近好醜且勿爭天道有㝎分聾丞遂已矣目斷山千重烟霞故無恙勝㑹何由逢寒花衰復榮東籬幾殘陽蟠桃亦何好千年期一嘗七言古詩可憐行紅顔白面可憐子杖藜飢走荒山裏翠眉新婦雪色兒掩䄂啼瘦如鬼道傍朱門照霜㦸腸斷汝翁呼不起金魚象笏供樗蒲紈袴終然愁餓死春風秋月哀思多嗟汝少年奈老何崑崙歌寄吾丘子行翠鸞啼雲天四垂花龍䨥䨥神姥歸金仙憶君淚如水昌陽落花青蕊蕊曽城珠闕揚素氛開眀狺狺環九門羲和赱馬不待人鯨魚吸海海生塵若有人兮悵修阻紫玉參差老鳳語笑揮如意教雲舞雲間鶴雖生兩羽歸來歸來勿蹉跎秋風吹折玕琪柯梓山行贈桑生昔聞山中采藥翁問姓但指簷前桐君家本以桑為氏胡不種種桑翻種梓桐君采藥不學醫桑君學醫兼采詩朝來索我歌梓山使我閣茟頻搘頥問君梓樹家何處青山難尋夢中路但見清風兩袖寬詩筒戢戢多于樹長歌短歌亦奚為坐看藥籠懸蛛絲種桑種梓俱有術也應無術醫君癡采芝曲贈永嘉林道士碧峯矗起三十六老芝千年琢紅玉帝遣仙人下采芝迷花失石憺忘歸忘歸幾載無消息蟠桃積核髙數尺何日青牛駕爾還肯念金華牧羊客登方巖謁赫靈廟却至夀山寺一峯屹立摩蒼穹四山拱揖如朝宗寅緣飛磴入鳥道獨扶瘦竹披蒙茸初驚細路局垠堮歘兒臣石蟠穹窿洞門髙開得絶頂直恐上與丹霄通想像胡侯此弦誦草木遺韻猶渢渢前修往矣不可作尚喜像設餘靈宮登堂謁拜仰風采奕奕華衮盤䨥龍白袍方領儼旁侍英姿颯爽皆人雄或云衆神各有職出納雲雨天無㓛斬藤絶壁泣萬鬼飲馬大壑清羣凶初疑此事出俚語粉飾詐誕誇兒童又疑靈異古㦯有荒忽變􅏊難為窮咄兹茫昧無足問但怪俗子何憧憧歲時歌舞連數郡奔走童叟多于蜂前呵後殿擬法駕翠華赤羽搖晴空恭惟英靈本正直倐忽來往無西東胡寧終歲久盤礴縮取備物華其躬荒㦲舊俗豈侯意嗟我欲語愁無從拂衣徑去指巖麓巒花澗草紛青紅峯回路轉逢古寺窈窕石室穿玲瓏連岡爭前擁奔馬飛瀑怒落懸長虹荒尋逺討不易極况乃人事多匆匆向來獨立渺何許烟霞滅沒山重重却歸溪館弄眀月臥聽簫鼓來天風金華山贈同逰者三十韻杖藜初出城西門萬株紅樹如雲屯芙蓉峯前問行路宛宛一線隨潺湲水聲漸逺山漸近弱蘿纎葛手所捫須臾橫側變峯嶺髙岸忽復為平原細泉瀏瀏竹竿直石樹駢立疑同根剝金敗碧逢廢剎猶以苐一名其軒天明獨去弔遺迹玉女委蛻空丘墦樓居西起望眀滅石扉呀若山之樊罅幽穴險徑沮洳膝行匍匐不得奔剨觀崖廣架㵳泬䨥龍繞霤蟠蜿蜿紛綸怪狀滿巖腹熊乕踞伏鸞凰騫其餘瑣細無不有形求像索難具言前趨林麓却下縋俯矚九地窮涯垠青枝翠羽不復辨但聽風水聲喧喧髙燒松炬度其背珠箔忽墮華燈繁聳身上出指絶頂碧桐髙下彌山園遙穿蓬艾踏雲兩險艱從此不易論秋毫細路莫容足下瞰不測傍無藩怪藤如鈎草如劍舉首仰歎愁攀援山翁顧之笑引臂前牽後接猴與猿馳坑跨谷欹側過背汗喘息逾炮燔隂沈古洞閟星日雖有寒暑無朝昏却行左轉復深入愈覺憀栗搖心魂珠纓縹渺現滿月稽首大士天人尊拂衣徑逐飛鳥下青山出沒波濤翻㦯云漢人隱身處仿佛肩背餘苔㾗蛇蟠磬折又數里龕巖十丈開墉垣夜歸草堂殿突兀坐看雲月吐復吞怡然携手盡文士頗覺茟下來源源名山石室如可託幸子歲晏來無諼送俞觀光寒窗讀書吻政悲坐聞剝琢走啓扉衝風踏凍至者誰俞子訪我繇剡溪相􅑮把臂語移時婦女驚笑羣兒疑俗物病我不可醫眼眀見此珊瑚枝朝來贈我天馬詩忽然掉頭去莫羈鼻端氣息于虹霓詎䏻折腰向小兒文章技癢聊爾嬉策勳聖處今毋遲繄我愛子莫助之臨岐躑躅徒嗟咨讀清江集元祐儒者煥星斗後有作者非其偶二龍三鳳何􅌭紛况乃淵源魯中叟適從塵編識英爽想見丗澤餘忠厚長公平生二三策大廷披腹驚羣后風流斑斑仲與季茅茨采椽絶丹黝獨追古昔寓陽秋稍抉疵瑕到瓊玖却蟠餘力歸賦詠古硬清圓無不有爰初人文啓河洛下逮百氏分戶牖空言可託匪末藝巨茟待援須好手典刑未墜乃至今吾生已幸何云後青燈照夜雨如線奧論微辭煩擊剖追慕政復慙捧心贊美胡能付鉗口從逰起死不敢期儻挹殘膏注空杇題李坦之詩卷神仙中人丗莫識政以文章為戲劇李生也復可憐人手種蟠桃待春色山空歲寒誰念汝青楓墮影霜露白逺逰賦成一朝去翠蓋雲旗暮何適蓬萊烟霧秋冥冥鄧君白鹿無消息袖中驪珠三百顆夜深勿近蛟龍宅金華之山青矗天山人看山忘歲年黃精芝草幸可食安得與子巢其間石牀醉聽松風眠無為長歌怨如哭使汝惻愴凋朱顔甲辰清眀日陪諸公入南山拜胡侍郎墓回泛舟湖中作日終甲子斗直辰持觴逺酹胡侯墳兩槳趂鷗背城四十有四同州人半為吳語如季真湖窮岸出水陸分舍舟登途指嶙峋少年健走黃犢奔或乃喝道驚春雲老翁繭足仍後塵解衣徑眠草為茵前趨一里趨廟門杖藜不得辭微􅉝嚴祠髙居絶四鄰傍為一丘標石麟叔階鞠躬羞藻蘋拜興有相祝有文亦㦯稽首稱諸孫歸途探幽抉荒榛下睨塵土多虻蚊放舟催彂無逡巡勝賞莫許窮涯垠開蓬列坐羅羶葷託名鄉飲無主賔誰歟解事强討論欲以窮逹為卑尊美人今代王右軍口吐秀句天葩芬鴈行拱立何紛紛爭言我公詩絶倫厖眉𬒳褐兩山民閉目宴坐方申申艤舟黑亭鴉噪昏晴楊吹花灑衣巾裁詩紀實聊云云慎勿浪傳來怒嗔送傅主簿吾聞上古之士比屋皆可封有材不必登王公可憐衛青日尊貴飛將自老風塵中傅公平生經濟手却抱一經今白首隨人騎馬著青衫爽氣如虹射牛斗出門大笑望長安長安萬里行路難行路難知奈何贈公一杯酒請公聽我歌崑崙之山兮髙巍巍黃河之水兮清有時洛陽少年休太息東山謝公來未遲燕昭之事不足云陛下聖德如華勛願公功成名遂身早退魯連小兒能笑人苕溪風雨中章德茂同泛黑風翻江白雨傾檣欹柂側斷人行此時唯我與章子孤舟蕩漾烟波裏烟波蒼蒼楊栁黃浩歌擊舷興彌長翩然一葉恣掀舞青山白塔頻低昂朝過城南莫城北舟人問我將誰適章子掉頭作吳語秋水夜來深幾尺忽看大字標竹林寺門對水仍隂隂敲門見竹不見人竹間翠石何蕭森回舟少林雨如注四顧冥茫但烟霧魚驚龍躍吾不知披簑却入菰蒲去岸傍羣兒拍手呼笑言狂客丗所無嗚呼古人今則無後來視我知何如為君留此有聲畫題作扁舟烟雨圖由苕溪出太湖抵陽羡十四韻首陽山人餓至死陶公乃為飢所驅大賢出處自有意腐鼠何得疑鵷雖誰初令我􅑁丗網久抱磊砢行﨑嶇今晨笑與親友别烟波泱􅐯扁舟孤穹天大澤合為一回睨人境茫如無向來蟻聚安足戀而取窘束同囚拘暮投髙館燈閃閃坐談姬孔歌黃虞是間幸可容一息孰與臣朔肩侏儒汗顔俯首飽腥腐咄子所樂非我娛故人殷勤入我夢云我作計陋且愚此生通塞久自斷豈愛一勺忘江湖春風二月花蔽野珊瑚玉樹惟空株丈夫兒女各有事為君起坐生長吁次韻子踐雪中見寄前年江南雪一尺腐儒共走誇三白寧知有客卧欲僵凍骨稜層撑鐡石今年復此雪塞門江湖無處浮吾樽野風蕭蕭日色死看人射乕蒼山根牛衣覆寒夜復夜金玉餘音慙慰藉平生萬卷定安施一瓻送我當渠借金華黃先生文集卷第一
