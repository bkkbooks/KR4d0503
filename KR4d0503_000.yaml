body:
  text: 黃學士文集序翰林侍講學士金華黃先生文集總四十三卷其初稿三卷則未第時作監察御史臨川危素所編次續稿四十卷則皆登苐後作門人王生宋生所編次也先生之文章刮劘澡雪如眀珠白璧藉之繅綺讀之者但見其光瑩而含蓄華縟而粹溫令人愛玩嘆息之不已而不知其致力之勤用心之苦也故其見諸朝廷簡册之紀載山林泉石之詠歌無不各得其體而極其趣以自成一家之言不既甚盛矣乎余嘗論之文章與世運同為盛衰或百年或數十年輒一見焉先生當科目久廢之餘文治復興之日淂大肆力於為已之學以擅名于海內雖其超見卓識有以異於人其亦適值也運之一盛也耶譬諸山川之風氣草木之花實息者必復悴者必榮蓋亦理藝之必然者夫豈偶然而已哉先生領延祐甲寅鄉薦先文靖公實為考官于師泰有契家之好其後同居史館又同侍經筵交詃為尤篤比廉問閩南過金華得先生之集于王生故敘而授之三山學官俾刻梓以惠耒學先生登進士苐授將仕郎台州寧海縣丞歷石堰場監運諸暨州判官浮沈州縣幾二十年始入翰林應奉文字尋丁外艱服除改國子博士居六年以太夫人春秋髙乞外補遂提舉江浙儒學年六十有四竟辭祿歸養以中順大夫祕書少監致仕及終大夫人喪年已踰七十矣復被召為翰林直學士兼經筵官升侍講學士中奉大夫同知經筵事數告老不許久乃得􅒜去仐年七十又九猶康強善飲啖援筆騁馳如壯歲云至正十五年十月既望朝𣪚大夫福建閩海道肅政廉訪使宣城貢師泰序
