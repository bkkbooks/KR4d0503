body:
  text: 臨川危素編次劉耳校正塔銘榮祿大夫大司空大都大慶壽禪寺住持長老佛心普慧大禪師北溪延公塔銘至正八年春三月十九日皇帝御明仁殿大司農臣篤麟鐵穆爾言故慶壽住持北溪禪師際遇先朝躋榮極品碑石未建行業弗彰請令翰林直學士臣溍為之辭翰林學士臣宗瑞書其文以賜今住持臣僧顯儀俾刻焉夏四月十四日宣政使臣鞏卜班入對明仁殿謂篤麟鐵穆爾嘗任翰林學士承㫖宜就令篆題其首上悉可其奏臣溍頓首受詔謹按顯儀所上行狀禪師諱智延北溪其别號也族髙氏自大公而上占籍雲州世以行義稱于鄉父某當國家龍興之𥘉奉命招撫河朔因㝎居于彰德母楊氏感異夢而生禪師幼失母鞠于繼母劉氏始在襁褓中見經卷輒書而咿嚘欲語每啼泣得經卷即止非歲與僧遇必斂容興敬人以為宿習而然及就學讀書善強記而通其大意稍長懇求出家父母弗能奪遣之師事鳯林某公鳯林以其克勤於道每指以語人曰此吾門精進幢也既得度受具出遊諸方聞汴洛汝漢之間講肆甚盛孝嚴溫公見地昭融辨說無礙往受業焉由其户庭而造其閫奧談經感雨花之瑞老于其學者無不歎服𬒳㫖南邁主長生御講于興化大弘圎頓之教一音所及隨類得解人以為一佛出世碩儒魁士或欲預聞至道必為之徹去藩籬而開示以佛之境界率皆生信而贊詠焉尋徙之囊山道價愈隆鳯林之殁抗䇿北歸以申心喪偶閲傳燈録有所感發乃走京師謁西雲安公于大慶壽方丈究教外别傳之㫖一旦豁然頓悟西雲付以衣而為說偈曰它時太液池頭月㝎向松軒照錦衣蓋期望之有素矣禪師殊不自矜益務韜晦仁宗皇帝在春宫聞禪師名俾駙馬太尉瀋王傳令以居彰德之天寧仍即慶壽開堂演法瀋王欲便于咨叩請以居呼奴之弘福㑹西雲示寂朝廷以慶壽禪宗第一剎非德器之重道眼之明力量足以荷擔大事者莫冝尸之乃詢于藂林大知識僉謂禪師西雲上足當𥙷其處仁宗方以萬機之暇遊心聖教且雅知禪師敕近臣函香有司具威儀送之入寺賜號佛心普慧大禪師法席肇正學徒咸集禪師一一辨勘而䇿勵之退省其私而升堂入室契心印于言下者甚衆王公大臣稱譽之不置上每幸慶壽數顧而與之語特授榮祿大夫大司空領臨濟宗事前後賜以金玉佛像經卷及它珍玩之物數十事祕府所蓄名畫凡涉于佛氏故事者悉出以示之英宗皇帝以禪師先朝舊德每入見必賜坐訪以道要命于永福寺與諸尊宿校勘三歲將鏤銅為板以傳後因屑金書藏經慮前賢撰集之書或有僞濫復命之刪㝎焉禪師久居大剎年老倦于應接投偈拂衣而退帝師聞之曰方今扶植教門不過數人安可聽其去亟使追之既至勉之曰若之去則髙矣其如教門何慶壽之大豈不足容一榻厭於人事少休其間可也禪師乃還居于西堂頃之竟拏舟歸天寧人聞禪師老而不衰望其復起俄以元統三年冬十二月二日遺偈而化春秋七十九夏十第子數百輩嗣其法者二十六人先是參知政事某人右丞某人來問法欵語終日謂兩人曰老僧非久于人世者歲暮必永訣矣幸以弘護為念兩人竊異其言及訃至皆大驚弔哭致奠不覺其過乎哀其徒用闍維法得舍利分建塔于天寧及慶壽之祖塋禪師始領寺事律巳以嚴而御衆以寬執事必用能者居歲餘而庫有積錢廩有積粟增置規運之所繕治殿堂門廡煥然聿新禪師謝事後議者請如它官寺立司存以􅌹其出入未幾而僧徒所給朝夕弗繼賃户患其煩擾亦皆棄去賴朝廷明于聽納而知其非便訖罷去之衆乃少安壽安山住持宗主大司徒洪公稱禪師物我兩忘而未始忘憂國之心其護教如大彗杲公其涖事如逺録公人以為知言夫百千度門同為一事無作而作非涉有為禪師兼宗說而俱通逹理事之不二以佛之福慧而自莊嚴其光膺帝眷師表人天夫豈偶然哉臣溍逰乎方內于禪師之道未能有聞奉詔屬辭姑述其感緣應迹之萬一云爾銘曰法流東漸空有殊宗孰䆒其極俾歸于同卓哉上士冥探道妙說而常默寂而常照單提直指洞徹心源實非教外别有所傳應機而起出逢熙運佛日重輝法雷普震為利益故示現有為五緣畢具四衆咸依世歷三朝位崇一品遺榮弗居翩其逺引白駒在場縶之維之法筵龍象非可紲羈七十九年如一彈指來也雲疑去也風止寥寥歲寒山空道行承之有人載鴻其聲詞臣作銘刻兹貞石學人是贍永有矜式佛真妙辨廣福圎音大禪師大都大慶壽寺住持長老魯雲興公舍利塔銘臣溍既承詔撰述大慶壽寺北溪禪師舍利塔銘繼北溪居慶壽者曰魯雲禪師併以命臣溍臣宗瑞臣篤麟鐵穆爾為之銘及書篆俾刻之兹碑魯雲于北溪為法門兄弟今住持臣僧顯儀于魯雲為法門之猶子臣溍謹奉詔即顯儀訪得其道行之實而論述焉禪師諱行興號魯雲俗姓李氏世居鄆城父潤贈奉訓大夫濟寧路兖州知州飛騎尉追封鄆城縣男有子二人長曰泰承事郎河南江北等處儒學提舉次郎禪師少頴異入鄉校從師授書日誦數十百言僅一二過輒記憶不忘十歲遘疾危甚兖州君禱曰若幸而有􅪜當遣之出家翌日果無恙即送其鄉之樂聞寺禮寺僧端公祝髮尋受具戒及父母殁皆歸廬墓三年然後去鄉人稱之禪師𥘉遊講肆䆒唯識圎覺凡疏鈔若干卷研核無餘藴耆年宿學莫不降歎自以為不及最先為龍岡聰公所知延居教庠一日忽自念曰名相之學筌蹄爾未足以超出死生及棄去北入京師謁大慶壽西雲安公一見若有宿契留三年而盡得其道西雲喜曰它日大弘吾宗者必子也出世主海雲十年之間百廢具舉俄以省墳墓辭歸鄆城久之英宗踐祚首命召還京師俾于聖壽萬安寺與一時髙德名流校讎三藏禪師博洽而精詳魯魚亥豕多所是正聲譽籍甚上聞而為之嘉歎不巳𬒳旨主竹林越三年汝州之風虛席不逺二千里遣使賫香幣請禪師主之寺衆遮留不得去禪師曰道行于一隅孰若行于四方衆乃唯唯而退遂赴風穴之請道果大行于汝漢間尋復勇退寓迹于壽安山文宗時起主趙州之柏林祖塔久不治亟加嚴飾而一新之丹堊炳煥逺近莫不瞻仰贊歎尋請于朝賜趙州古佛真際光祖國師之號上嘗咨訪時之髙人上士僉以禪師對持降璽書命主大慶壽寺開堂之日又刻玉為印以賜之其一曰慶壽長老其一曰領臨濟一宗蓋異數也先是寺之土田園林庫藏邱肆碾磑之屬悉掌于官出納之吝細及豪分饘粥不充衆皆離析禪師力言于時宰乃為奏罷所司而以恆産悉歸于寺自是諸方衲子川奔雲聚鍾魚之聲旦暮弗輟師日率衆焉國祝釐且大闡宗乘以開導之使知客得歸如醉得醒士大夫有慕其道而造其室者聞一言如執熱而濯清風病暍而飲甘露虛至而實還迷往而悟反宗風以之大振而西雲之言于斯尤信上益加禮遇俾功德使閭閭奉銀章及名香上樽以賜焉今上皇帝臨御之始皇太后命御史中丞趙世安至寺建藥師㑹七晝夜越三日禪師㝎起謂左右曰佛殿前放大光明若等知之乎即聲鍾揖中丞與衆共觀果見光𦦨陸離上徹霄漢經宿乃散竣事之日禪師升座敷宣第一義諦聞者咸恱日入申俄索筆書偈曰縱橫妙體任蹉跎勝㑹周圎迥出窠斫倒這邉無影樹白雲影裏笑呵呵投筆而逝元統元年十二月二十二日也世夀六十僧臘五十訃聞奉懿㫖賜賻二千五百緡停龕五日祥雲覆頂圎如車輪緇素莫不膜拜感泣龕出之日鐃鼓幢幡喧城塞道送者數千闍維三根不壞奉舍利建塔祔于樂間及房山諸祖所度弟子若干人禪師睱日遊戲藝事詩律則雅而不俗字畫則遒而不媚中書李公孟張公圭翰林李公謙劉公𢋫趙公孟俯集賢宋公渤李公衎王公約皆方外交也蓋菩提逹磨之傳至曹溪而支分為二至臨濟而派别為五以臨濟子孫相次􅌹慶壽法席者海雲簡公賾庵某公西雲安公北溪延公暨禪師五人而秋亭亨公及今顯儀繼之奉天子命佩以印章而主領其一宗則自禪師始非特為其徒者敬信之上而人主下而公卿士庶無不敬信之本末始終光明俊偉如此臣溍是用備著其事播之聲詩以詔永久使四方學者知其所宗而來取法焉銘曰曹溪之傳源逺流分派為臨濟蕃蕃子孫有大比丘克世其業上距流濟十有九葉化行京邑名簡帝衷獨持祖印為時大宗五㑹說法無彼無此密禆至化大開多士甘露法雨如注如傾洪纎髙下各遂其生扶植教基有墜必舉力摧魔鋒為衆依怙去生即滅斯理之常白雲無迹明月有光詔使儒臣勒辭焯實垂休無垠千載一日上天竺湛堂法師塔銘師諱姓澄因其字以為號曰湛堂家本越之㑹稽故又以越溪為别號父孫君滿母姜氏夢日輪從空而墮既覺𥘉日正照其榻師遂以生幼有異質四歲戲拈筆為佛像授以經文即能成誦若宿習焉至元丙子出家投同邑佛果寺石門殊律師明年祝髮又明年受具戒持法華諸經為日課石門謂三世佛法戒為根本教以探律藏而通其遮性雙單制聽止作之義歲乙酉始依佛鑒銛法師為天台之學聞鼎山舉法師講席之盛更往依焉尋歸侍石門時弘公道夫靜公仁叟適相密邇二公皆宗門巨擘朝夕咨叩得益為多逮石門示寂乃謁雲夢澤和尚于南天竺一見深加器重歷居其清班要職天台國清寺實智者大師行道之所或據而有之且昜教為禪師不逺數千里走亰師具建置之䫟末白于宣政院卒復其舊以祕密教不傳于東土因禀戒法于膽巴上師既入其室而受覺海圎明之號又從哈尊上師傳修習法門而䆒其宗旨元貞乙未入覲于上京賜食禁中復以國清為言宣政院為奏請降璽書加護命弘公主之辨正宗緒扶植教基使來者永有依庇師之力也師欲東遊髙句驪求天台遺書先上記其國之嗣王而𬒳國答以無有遂止不行再詣上京陛辭而歸大德乙已出世住東天竺之興元寺歲丁未吳越大旱師為說法禱禳好事之家多為感動捐所有以活其不能自食者死無以斂則為掩其遺骸仍作大㑹普度之至大戊申遷住南天竺之演福寺郡長官剡上其道行及濟人利物之功于行中書宰臣領宣政院事者轉聞于朝降璽書加護焉至治辛酉驛召至亰師入對明仁殿𬒳旨于青塔寺校正經律論三藏有司供張歲時錫子為禮殊厚駕幸文殊閣引見問勞賜食正旦及天壽節再朝于大明殿賜以無量壽經等若干卷校正事畢特賜金襴袈裟加以御用衣假巳給驛劵將南還俄有旨即白塔寺建水陸大㑹丞相東平忠獻王留升座說法衆咸恱服事聞寵賚尤渥仍降璽書加護進號佛海大師一時文學侍從之臣皆賦詩以美之泰㝎甲子以選住上天竺觀音教寺至順壬申師之居上天竺九年矣是歲六月朔忽撾鼓告其衆曰吾三住名山逾三十年自行無益世緣有限雖愧不敏古德風烈猶或可攀即說謁以辨才歸龍井自喻衆固留不可竟拂衣歸南天竺之雲外齊歲餘東還佛果以終老焉師所至學徒坌集諸方宿衲素有時名者爭趍其座下誨迪奬勵未嘗少倦教乘四晝小大諸部講徹則復始雄談博辨風駃濤湧有疑而未决者析以數語莫不泠然意解晚年篤志净業晨朝繫念雖病不廢嘗屏絶左右修一心不亂觀門者七晝夜屢感瑞應至於統理庶務瑣細靡密未始憚煩規制􅋻陋則增廣之居處敝壞則繕完之資用儉薄則經度之不以其涉於有為而忽之也佛果廢不治巳久師歸休其中慨念石門付囑之意罄巳槖一新之安陽韓先生為記其事一日衆以月旦問訊如常時師遽迎揖之曰老僧向非退間十二年幾在半途今日則有明日則無光隂其可把玩乎煩大衆點視行李用表無常衆為念佛師曰止止佛須自念明日却勞送别黎明衆集端坐書偈置筆而逝至正壬午八月二日也春秋七十有八夏六十有四龕留七日顔貌如生門人第子咸共奔赴以是月某日奉全身窆于清泰塔院先是師在上天竺捐錢創流香塔院以奉開山臻法師暨如法師而肖巳像於其左至是分爪髮建塔其中及南天竺之明靜塔院以為後人展敬之地師所著書有金剛經集注心經消灾經注阿彌陀經句解仁王經如意輪呪經科並行于世所度苐子若干人門人嗣其法而分住列剎者若干人四衆預法㑹者不可勝計前集慶住山弘濟奉狀以銘為請溍幸嘗獲登師之堂而望其下風聞其餘論狀所述可信不誣是冝銘也已銘曰雙林唱滅道乃東大蘇妙悟得其宗法門一柱屹北峯剡源流潤衆所蒙涵容萬法雲夢胸承以佛海揚宗風殊師異旨旁貫通㑹于其極歸于同法雷𥘉震聲隆隆一雲所雨彌太空積之也厚施也豐退焉不自居其功嚮晦宴息遂長終分燈繼照垂無窮巍巍窣堵環天龍勒辭貞珉表玄蹤靈隱恱堂禪師塔銘至大元年七月二十四日靈隱四十八代恱堂禪師告寂于丈室遺戒送終如常僧勿循故事建塔仍不得用世間法服衰麻之衣既為書遍别交遊及其法嗣遂書偈曰緣㑹而來緣散而去撞倒須彌虗空獨露置筆右脅而卧入于涅槃龕留七日顔色不變天方連雨闍維之日霽色朗然灰燼中得五色舍利大如菽其徒相與謀以為師之光明俊偉如此雖治命不可違然不宜無以表人天之瞻依慰四衆之摧慕靈隱所度苐子希清既捐私財造塔且買田若干畒歲度僧一人為永久計而未有以昭示來者塔成後三十有七年希清及希白等若干人以狀來謁銘按狀師諱祖誾自號恱堂族南康周氏母夜夢一老僧來借宿既覺而孕師遂以生宋端平元年八月一日也師􅏊不茹葷骨氣清偉家故業儒七歲就學殊非其志年十有三母病危甚禱于觀世音大士而刲股和藥以進病隨愈母以其與佛有緣乃語其父俾出家依同郡嘉瑞寺偃上人尋祝髮受具一日閲華嚴經至惟一堅密身一切塵中現忽有省即往見正叟心公于東林見别山智公於蔣山智問云近離何處師云江西智云馬大師安樂否師義手進云起居和尚智命侍香師即拂衣去見靈叟源公于焦山見斷橋倫公于净慈倫問臨濟三遭黃蘗痛棒是否師云是又問因甚大愚脅下築拳師云得人一牛還人一馬倫顧左右云再來人也倫示疾謂師曰吾必不起汝冝自勉師泣曰和尚滅度後當依誰倫云柏山介石和尚妙喜三世孫其往依焉倫逝而介石適來𥙷其處一日室中舉柏樹子話師方議擬石抗聲云何不道黃鶴樓前鸚鵡洲師言下頓悟即延入侍司翌日升堂白衆曰先師之道喜得人矣介石將終囑以宗門大事仍遣馳書于徑山偃溪聞公聞與語而契歎曰介石雖往賴有吾姪在師歸廬山東巖日公在圎通請師分座衆五百人莫有契其機者九江守錢公真孫以禮聘師出世於西林瓣香酬恩歸于介石國朝至元十二年取宋之師至江右居人咸避匿山谷間師獨宴坐一室軍士挾刃以臨之刃及頸問曰懼否師曰吾無生死有何懼乎軍士乃投刃而拜且遺師以白金師亦弗顧它軍士皆驚服散去一境之內賴以無恐二十五年遷開先法㑹益盛名聞于上三十年𬒳命遷東林東林大剎而恆産素薄屋壞弗治師以所受施資置田若干畒葺殿堂門廡使之一新謂廬山以匡先生得名購寺旁道宫之地築室而禮祠焉元貞元年奉詔赴闕入對稱旨賜璽書號通慧禪師并金襴法衣以榮其歸大德九年靈隱虛席行宣政院俾師主之師嘗勘一僧云微塵諸佛在你舌上三藏聖教在你腳底何不瞥地僧罔措師便喝又勘一僧云釋迦弥勒是他奴他是阿誰僧擬對師便打一僧新到師問何處來僧云閩中師云彼處佛法如何住持僧云飢即喫飯困即打睡師云錯僧云未審和尚此間如何住持師拂䄂歸方丈僧休去其機鋒峭峻多此類居四歲而逝世壽七十五僧臘五十二四坐道場三十六年惟以紹隆祖道為巳任至於崇屋室以安其居廣土田以足其食皆末事耳得法苐子東林住山宗廓等若干人得度苐子慶哲暨希清等若干人有語録若干卷行于諸方師自髫年受學于馮先生去非先生為時宗工師熏炙之久間出緒餘施於世諦文字多竒作師嘗刻先生之文于東林後人遂以師之文並刻以傳始豫徒玩味師之文而敬慕焉兹覽狀所述乃見其深造自得卓焉過人坐鎮叢林荷擔大事末後一著照映古今竊愧向之知師者淺也庸采狀所述序而銘之銘曰惟通慧師一世偉人少遵魯誥長探竺墳遊戲如幻發為至文曰是瑣瑣匪道所存朝夕咨訪直指心源刋條落葉洞見本根乃受智印乃啓度門乃膺帝眷道譽彌尊䕃注所及如彼大雲隨緣㑹散以返其真勿豐吾終厥有遺言罔極之報在其後昆金瓶寶篋巍巍真身表以靈塔勒以貞珉飛聲焯實垂之無垠下天竺玉岡法師塔銘至正二年十二月二十六日杭州天竺靈山教寺玉岡大和尚示疾而化世壽六十八僧臘五十四明年正月三日茶毗得舍利于遺燼中始和尚無恙時有請預為造塔者以偈謝之曰死後茶毗一幼身盡收白骨煆為塵何須石塔標名字畢竟當𥘉無此人其人遂不敢復請至是門人四衆失所依怙悲痛號絶碩存贍敬之地乃建塔于風篁嶺下白蓮華院之六唯亭奉舍利藏焉上天竺住山本無夙侍和尚咨詢法要謂不可無以慰其人之思爰以狀來徴銘和尚諱蒙潤號玉岡族海鹽顧氏父曰敏隱君子也母強氏祥應法師古源清公之甥女和尚方娠及始生母感異夢年十四棄家依古源于白蓮嘗禮護伽藍神土偶輒仆若答拜然左右皆驚古源授以經應曰成誦命禮院僧一祥為師祝髮尋進具從古源受天台家金剛錍十不二門諸書即能了其大意㑹古源歸寂遂師事竹堂傳公以卒其業因苦學嬰竒疾修請觀音懴七七日既獲靈應疾愈而心倍明利勤說勤行自集慶維那分座于南天竺之演福寺湛堂澄公來涖教席法㑹號為極盛和尚升居第一座凡所闡揚辭暢旨顯老成宿學咸敬服焉出世于海鹽當湖德藏寺長夏講法華經聽者日千餘人屠沽有為之昜業者瑞應之迹不可勝紀遷主演福宗風益振居六年退歸白蓮修念佛三昧依之者益衆日于肇公講堂止觀間語其徒曰吾祖智者所謂風煙山水外足忘憂妙慧深禪內充愈樂者其在斯乎自是誓不出山行宣政院強起之主下天竺時寺新燬惟普賢殿巋然荆棘瓦䃯中因慨然曰吾兹寺成于慈雲一殿尚存則祖師願力有在乃首加葺治次弟搆諸堂舍然不以經度程督之勞廢教事晝夜演說無倦色率同志修法華三昧感普賢放光現瑞識者知寺之重興有日矣居三年以涉世將迎乖其素志復歸白蓮老焉臨終之夕呼苐子子實法明䇿示止觀安心之法且告之曰吾生緣殆盡兹惟其時驟稱阿彌陀佛數百聲泊然而逝和尚神資頴秀出于天賦道力純固觀慧虛融志在利它有叩即應入室禀法者若干人登門請益者不可數計嘗求古源塔銘于陵陽牟公問以三觀之義其答如響公擊莭不巳以為聞所未聞每與一時名士折衷儒釋所談理性之異同無不歎其言簡而理盡和尚徇緣御物一本于誠所至道俗嚮慕或捨所居或創寺宇以延致之在嘉興則有演壽寺吉祥慧光等院若干所在杭則有壽聖寺瑞光懴院等若干所至于自行之精進修常坐三昧以九十日為期者七法華光明大悲净土諸懴法不可期數而潜德密行證悟所及有未昜淺窺者蓋狀之所述持其應迹而巳昔北齊尊者由文字中入不二法門以授南嶽尊者而天台大師得之惟其聞而能思思而能修是以極談辨于九旬正位階于五品啓諸佛之祕藏創一家之宗途或者不䆒其源流本末第見𥘉機之人方博綜于言詮未深涉于觀境遂謂此章句之學云爾不有名德屹立其間解行兼全以身任道曷能使人信其說而尊其教乎播為銘章貽諸承學庶俾知所矜式不徒以慰其追思也銘曰無上佛果成之者人惟解與行車之兩輪卓乎先覺真知實踐假方便力肆無礙辨圎音所及莫非度門得意忘象何有于言隨機赴感說而常默冥心絶待照而常寂風行草偃大亢其宗緣離化城委順而終勒辭貞珉用表應迹學人所瞻永永是式徑山元叟禪師塔銘菩提逹摩以摩訶迦葉所得無上正法耒止中土直接上根其後支分為二而心印獨付于曹溪派別為五而宗風大振于臨濟至大慧而東南禪門之盛遂冠絶于一時故其子孫最為蕃衍徑山元叟禪師大慧四世孫也師諱行端元叟蓋其字族臨海何氏世為儒家母教以論語孟子輒能成誦雅不欲泊沒於世儒章句之學十一從族叔父茂上人得度于餘杭之化城院十八受具戒一切文字不由師授自然能通而其器識淵邃夙負大志以斯道自任宴坐思惟至忘寢食初參藏叟和尚于徑山叟問汝是甚處人師云台州叟便喝師展坐具叟又喝師收坐具叟云放汝三十棒參堂去師于言下豁然頓悟一日侍次叟云我泉南無僧師云和尚聻叟便棒師接住云莫道無僧好叟頷之即延入侍司是時泉滿萬指莫有契其機者叟既告寂師至净慈依石林鞏公即處以記室相與激揚此事與虛谷陵東嶼海晦機熙東州永竹閣真為莫逆交尋以靈隱山水清勝往掛錫焉師嘗自稱寒拾里人橫川珙公在育王以偈招之曰寥寥天地間獨有寒山子師竟不渡江而謁覺庵真公于承天復參雪巖欽公于仰山岩問何處來師云兩浙岩云因甚語音不同師云合取臭口岩云獺徑橋髙集雲峯峻未識書記在師拍手云鴨吞螺螄眼睛突出岩笑顧謂侍者點好茶來即送師歸蒙堂居三歲而岩逝乃還浙右虎岩伏公時住徑山請師居第一座既而退處楞伽室擬寒山子詩百餘篇皆真乘流注四方衲子多傳誦之大德庚子出世湖之資福伏公加盛禮覬師唱其道師微笑而不答末後瓣香卒歸于藏叟居五載學徒奔湊名聞京國至大特旨賜師號曰慧文正辨行宣政院尋舉師主中天竺師當久廢之餘為樹門榜而正鄰剎之侵疆治殿宇而還叢林之舊觀延祐丙辰遷靈隱有旨設水陸大㑹于金山命師升座說法竣事入覲于便殿從容奏對深契上衷加賜佛日普照之號陛辭南歸即拂衣去養髙于良渚之西菴至治壬戌徑山虛席三宗四衆咸謂非師莫能負荷其任相率白于行宣政院請師𥙷其處事聞于朝泰㝎甲子降璽書作大護持師至是凡三𬒳金襴袈裟之賜二十年間足不越閫而慕其道者鱗萃蟻集至無所容歲饑皆褁糧而耒以得見為幸徑山自大慧中興後代有名德得師而其道愈光師嘗勘一新到僧云何方聖者甚處靈祗僧云臨朕砧師曰杜撰禪和如麻似粟參堂去又勘一僧云碁盤石砍破你腦門鉢盂池浸爛你腳板僧擬答師便喝又勘一僧云擘開華嶽連天秀放出黃河徹底清即且置平實地上道將一句耒僧擬開口師便打僧休去其機鋒峭峻多此類師以呵罵為門苐子慈功之誨以近人情行天下大公之道藏叟之的傳一人而巳師之利它皆隂為之沒齒不言而其道德聞望為朝野所推服荐膺命賜人以為榮而師未始自衒意漢如也暇日以餘力施于篇翰尤精絶古雅石田林先生隱居吳山不與世接獨遺師以詩曰能吟天寶句不廢嶺南禪其取重前輩如此師生于宋寶祐乙卯二月十六日以至正辛巳八月四日終于徑山之丈室世壽八十八僧臘七十六其先五日示微疾問待僧云呼之曽未休吸之尚未舍試問請苦源耒者不耒者如何是耒者不耒者侍僧無語師良久云後五日看越四日夜分沭浴更衣别衆趺坐書偈云本無生滅焉有去耒氷河𦦨發鐵樹花開投筆垂一足而化龕留七日顔貌如生以是月某日奉全身窆于寂照塔院而分瓜髮建塔如化城幻有精舍四㑹說法語有録行于世所度弟子若干人嗣其法而同時闡化于吳楚閩越蜀漢間者若干人其上首靈隱法林中天竺祖銘等狀師行業俾溍書之兹碑溍恭從章甫逢掖之後未能于宗門中嗅薝蔔之香嘗醍醐之味罔知所以措其頌美之辭庸備著狀所述而銘諸庶幾不失其實得以瞻承夫遺範云爾銘曰大雄唱滅宗途肇分不有單傳孰開我人巍巍大慧垂隂四葉門庭之盛規重矩疊法雷普震裂地轟天據師子座四十二年𬒳遇三朝便蕃異數王臣順風有嚴外護大法棟梁一夕而槯本無生滅焉有去耒寂而常照碧潭秋月散為千光非同非别徑山蒼蒼上與雲齊真身常住大慧焉依贊述虛空非愚則惑直書具文刻此山石天童坦禪師塔銘師諱妙坦族金氏婺之浦江人母張夢蓮花産于庭而生弱不好弄嶷然伯仲間祖父謂類巳令襲詩書學非其志也堅求棄俗依同里慧香净月師既得度受具聞北山覺報逺公蜀人通內外學軌儀峻甚往從之尋又下濤江登天竺山從晦巖照公研三觀十乘之旨㑹虛舟禪師以密菴四葉坐鎮靈隱遂委身而事焉一日室中舟舉古問如何是良遂知處師答以冬瓜瓠子語舟咄曰如斯見解不離教乘師擬答舟徑拳其面師有省遽作禮趍出舟即命侍香至元丙子隱于北山之智者應郡侯聘出世白鶴居再歲輒引去舟時涖徑山召分半座力辭更以為掌記巳而西遊吳中從覺庵真公于承天暨領無錫之保寧瓣香酬恩歸之于舟示有所本也尋遷慧山遷華藏退處承天久之乃赴靈巖居數月復遁于虎丘祖塔下大德戊戌𬒳上旨仍主華藏行宣政院以靈隱虛席檄師𥙷其處師謝曰夢堂和尚吾受宿德也位僅臻此吾有它望哉卒不就自是居華藏餘十年至大戊申遷天童屬當歉歲之後師不以儲㣥弗充故拒來者學徒恆數百人延祐乙卯五月五日示寂于丈室世壽七十一僧臘五十臨終神氣不撓理簿書如平時俄書偈投筆夷然而逰視去其身猶傳舍焉龕留七日顔色不為溽暑變其月某日奉全身塔于中峯之麓中峯密菴所藏也師雅不欲過為後計遺命俾祔其次瘞之日雲霧四塞行者莫相覩將窆晨曦乍朗下燭其隧若隙光然訖事旋復晦冥衆咸異之師𥘉號竹溪故內翰涿郡盧公數從師遊于慧山為扁其室曰竺西人因以為稱云師襟度沖豁與物無競其在華藏靈岩聞有攘之者亟避去不少吝華藏㒒夫有舁至中道而棄之者其復來也亦無所芥蒂人莫不歎服焉師提唱簡古善䇿厲娓娓使四衆忘倦五㑹語有録所度普霑等若干人嗣其法者今住慶元萬壽子文等若干人霑實師之族姪知師最詳以師行業請大比丘徑山陵公為之狀以授文屬溍序而銘之溍師之里中子也漫迹四方弗克展謁坐下而接間師之緒論其何能措一辭用敢悉取徑山之所陳序其而為銘以繫之銘曰教外之傳何同何別我手此拳即廣長舌真機不露大網已裂風行草偃非說而說山頽木壞非滅而滅峩峩中峯下有竁穴名言罔既尚謹歲月智者勤禪師塔銘絶學禪師既示寂于婺之北山智者寺後十有五年其弟子景琳始以狀來謁銘琳之言曰吾師之道固不藉文字以傳然非是無以慰學者之思也溍幸嘗及與師接不敢以不能知師為解謹托狀所述序而銘諸序曰師諱道勤族何氏同郡之浦江人年十五願棄家歸釋氏父母弗能奪俾依天宫善净師二十乃得度受具以未䆒已事參東叟禪師于杭之净慈東叟逝而石林禪師繼主法席復參焉一日入室有契即命侍香由是獲便于咨叩益造其閫域衆咸推敬之尋掌藏鑰于湖之鳯山遂出世領同邑之大樓崇照寺至元庚寅也後十有七年西峯及菴禪師遷道場力舉師𥙷其處又八年乃赴智者延祐丙辰十月六日示疾而化春秋六十有七夏四十有七其徒若干人以是月二十二日奉舍利建塔于寺西若干步遵其法也師性端慤履行純實不務為矯厲色柔氣夷而辭寡其接學者唯單提向上事或來求法輒示之以默莫不心領而神悟焉蓋自佛語心之學播于中土宗唱之盛逮近世而極師獨離一切言說相以為教用合乎逹摩氏之道其垂𥙿無際誠有不在文字間者矣師凡三鎮叢林所至興壞起廢為緇白所信向有金居士者慕而依然嘗囑其家曰吾死亦欲依師其殁也因歸骨塔傍仍捐田構精廬為永久計福建閩海道肅政廉訪使本齊王公為扁其塔曰同歸云銘曰皇矣像教因言以宣言不盡意是有别傳來之侁侁機鋒交起我以其默俾得吾髓山空歲寒遺響寂寥白月在天非指所標展也德人形容罔既刻辭山石表厥名字金華黃學士文集卷四十一
