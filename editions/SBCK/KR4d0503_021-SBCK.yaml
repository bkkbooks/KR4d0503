body:
  text: 題䟦恭䟦御書眀良二大字皇上在宥天下端拱無為清閒之燕時㳺心扵藝事雲章奎畫夐出前古帝王之上而臣下罕有獲拜賜者惟翰林學士承旨開府儀同三司扎刺爾公以開國元勲之胄世長􅀫衛清忠粹徳蕳在帝心親御翰墨書眀良二大字以賜焉仍命公因以為字臣溍忝以非才載筆從公之後公出以示臣俾志于下方臣􅀼惟君尊臣卑者分之殊休戚同之其體則一是故舜之作􅁔臯陶之賡載皆取諸人之一身而以元首股肱為喻元首之眀君徳也股肱之良臣道也合眀良之二言以為賜而因以字之于以表君臣之一體也非世家重臣與國同休戚者何以堪此乎雖然舜臯陶之賡歌􅀁謂元首眀㢤股肱良㢤者臣之良由君之眀也武丁之命􅀃􅀁謂股肱惟人良臣惟聖者君之聖由臣之良也然則公之圗為􅀘報者冝何如哉臣不佞不敢徒以公衣被昭回之光侈為一時之榮遇而獨以大人之事君者有望扵公罔俾昔賢專羙于前也恭䟦御書慶夀二大字今上皇帝改元至正之眀年翰林學士臣朶爾直班甞一日侍燕閒于宣文閣上親御翰墨作慶夀兩大字以賜焉後七年臣溍以非才待罪翰林臣朶爾直班由遼陽行中書省平章政事入為中政使出以示臣溍俾謹誌之臣溍欽惟皇帝陛下以天縦之多能聖學之餘事形扵心畫如雲漢之昭囬在上非下土愚臣􅀁得而窺測然􅀼聞之皇極五福以夀為先兆民􅀁頼一人之慶夫以勲賢貴胄為國世臣錫之眉夀以保其家冝也乃若推廣上恩均慶于下使八荒之人同躋夀域豈非􅀁謂彰君之賜乎臣溍扵名言之􅀁不及者旣不敢強賛一辭而屬望之􅀻有不容自已者謹以志于下方恭䟦賜名哈刺㧞都兒御書翰林學士承旨哈刺㧞都兒家蔵文皇􅀁賜御書墨本二卷親筆二卷此賜筆之一盖先朝甞賜以今名而上復出御筆申命之也恭䟦命哈刺㧞都兒充捧案官御筆天暦二年夏五月日皇帝坐奎章閣特降御筆以禮部尚書哈刺㧞都兒充捧案官臣溍竊惟國朝任官作命皆出外廷具有品式捧案官盖中朝侍􅀙近臣且不常設非可律以定制故天子親御翰墨以命之實盛典也史臣冝謹志之以􅇱舘閣故事焉恭䟦御賜永懐二字文皇以萬機之暇㳺心藝事神文聖筆冠絶古今間甞以佩刀刻蘆菔根作永懐二字亦妙具乎八法因模為墨本以賜近臣今翰林學士承旨哈刺㧞都兒時方以禮部尚書入侍燕閒與被是賜襲蔵已乆恐人無知者出以示臣溍俾志于下方臣竊惟永懐之義猶大雅之詩􅀁謂永言孝思也昔周成王剪桐葉為圭徒以實其戯言而上之孝思造次不忘乎聖念度越三代之人主逺矣後之史臣冝有述焉恭䟦御書奎章閣記石刻天暦二年春三月上肇開奎章閣延登儒流入侍燕閒冬十月臣鐸尓直作頌以獻至順二年春正月御製閣記成秋某月某甲子大學士泰禧宗禋使臣阿榮傳旨以刻本賜焉臣鐸爾直抃蹈而退襲蔵惟謹以臣溍待罪太史屬俾紀其􅀊月于下方臣竊聞前侍書學士臣集為臣言皇上以萬機之暇親洒宸翰書奎章閣記刻寘禁中凡墨本悉識以天暦之寳㦯加用奎章閣寳應賜者必閣學士畫旨具成案持詣榻前覆奏然後子之非文學侍􅀙近臣為上􅀁知遇者未甞輕􅂌臣鐸爾直當上踐阼之􅀄以保寧等䖏萬户召對眀仁殿持詔發兵河東陕西尋以前鋒迎敵遂廵鎮拊安河南山東又被􅈲􅇂諸將平雲南陛辭之日旣賜之弓矢及他服用貴珍之物以重其行逮凱旋而復命也頋以辭藝進而特預是賜殊常之恩夐絶前比兹盖時清主聖弛武而隆文示之意嚮以風厲于四方將使中林兎罝之士莫不鼔舞變化扵雲漢昭回之下甚盛徳也一嚬一咲豈虚乎㢤臣鐸爾直以周通之才出入文武動恊上意抑可謂不辱君賜矣臣是用備著之若夫天縦聖能心畫超詣有非䟽賤下愚􅀁得而窺測者不敢賛一辭也䟦平雲南頌右平雲南頌亞中大夫保寧等䖏萬户述律公鐸爾直作􅀄文宗皇帝以南詔弗靖師乆無功特命公徃􅇂諸將深入叛境殄其􅇯渠餘黨悉平公旣凱旋入奏因作頌以進仍録其副而傳焉今上皇帝謀元帥俾坐鎮西南夷而廷臣無以易公扵是距公之作頌盖已十年朝廷清明逺人嚮化兵寢不用四方無虞乆矣公下車之日冝用昔人銘燕然故事勒諸堅珉以宣皇威扵遐方萬里之外然則此卷豈直可傳扵學士大夫而已哉䟦􅀽翰林鹵簿詩昔我世祖皇帝肇建太室武宗皇帝始親祼獻逮英宗皇帝乃行時享之禮而備鹵簿之儀盖太平極盛之際也翰林直學士􅃱仕􅀽公時為秘書監著作郎冩以為詩使窮郷下士一覧觀焉如身在輦轂之下而覩熈朝之彌文何其􅄑歟漢應劭唐王象皆有鹵簿圗宋王欽若有鹵簿記三卷宋綬増為十卷後累増為三十三卷公乃括以六百言曲盡其鋪張之妙亦竒矣詩曰雖無老成人尚有典刑安可忽諸書先聖先賢圗賛後右孔子并七十二弟子像上有宋髙宗賛附以尚書左僕射同中書門下平章事秦檜記不知何人書檜􅀁謂搢紳之習或未純乎儒術頋馳騁狙詐權譎之􅀃以徼􅄑扵功利盖指當時言恢復者昔齊㐮公復九世之讎春秋大之則夫言恢復者未必與孔子異意也詎可一切以功利目之乎檜作此記時距其卒僅七十六日其罔上誣民之心至死而不巳也今其􅀃猶與圗賛並存庸表而出之以俟覧者詳焉䟦宋兩朝遺墨二首理宗與賈似道書右宋理宗付賈似道親筆按續通鑑長編景定三年二月丁亥朔李松夀来納欵上諭􅈗執曰情偽難慿又曰切須審䖏似道奏當與之要約如能歸漣海之地方可取信十二日戊戍都省言漣海巳遂􅀵復而新史歸地在二十四日庚戍乃因李璮是日有建節封王之命而連書之耳璮即松壽也此親筆以􅀄十日午時下曰来意真確又曰不可失信必在已要約之後未歸地之前盖是月之􅀄十日丙申也故事禁中䖏分事付外謂之内㧗又謂之御筆皆内夫人代書而􅀁謂御寳㧗者或上㧗或内夫人㧗皆用御寳惟親筆則上親書押字不必用寳璮之去就事繫機宻上不㧗示外廷而獨以親筆付似道故正史及它傳記皆無􅀁登載庸考次其月日以俻闕文度宗與賈似道書右宋度宗答賈似道手書命之曰師相而不名體貌之至矣其稱謂之過雖見譏扵史氏若夫實藉鈞庇伏丐鈞照等語如士庻之施扵敵已者君臣之分㡬扵盡廢此􅁓流落人間乃搜訪之􅀁不及是以史氏無譏焉孰知夫禮先亡而國隨之非細故也庸表而出之以俟後之秉筆者焉䟦㤗山碑㤗山碑字多磨滅唯二世詔粗完嶧山碑亦有此詔盖當時欲使来者知石刻是始皇帝􅀁為故皆刻此詔扵其後也䟦嶧山碑歐陽公謂嶧山無此碑觀杜子羙贈李潮詩則歐陽公之前無此碑已乆新齋李公甞以模本刻于金􅁜郡學其石今亦弗存此是徐鼎臣模刻舊本可寳也䟦舘本十七帖唐貞觀元年詔亰官職事五品以上子􅄝書者二十四人􅀠弘文舘習書出禁中法書以授之尋又置榻書三人此舘本之始也開元六年命整理御府古今工書鍾王等蹟得一千五百一十卷視貞􅀚時無􅀁增减龍朔三年裝進舘内法書至九百四十九卷然則當時舘本必不止十七帖此十七帖特以世􅀁共傳而其後有􅃙勒充舘本故名之曰舘本十七帖耳卷尾有僧權二字不完是梁之徐僧權云記石經漢石經自北齊徙鄴隋復徙長安至唐􅀄巳不啻亡其什九而拓本猶蔵開元御府由開元迄今六百年石之僅存者不可知拓本之可見者若是而已未知後六年其存㡬何好古博雅之士􅀁冝珍護以謹其傳也書石曼卿舘直詩後曼卿仕凡再入舘康定二年二月四日以秘閣校理卒扵官距作此卷時僅四浃旬耳安知非曼卿絶筆耶嗚呼曼卿之卓然不可朽固不必在是歐陽子􅀁謂軒昻磊落突兀峥嶸者覧卷猶可槩見也書唐誥後右唐誥逸其首尾姓名以石刻完本考之則顔公真卿也始比公山濤叔孫通者公甞為吏部尚書大暦十四年代宗崩而公為禮儀使也其後公以直不見容扵楊炎換太子少師猶領禮儀使者徳宗嗣位之眀年改元建中其年八月遥尊母沈氏為皇太后時也故事置使必因事乃置事巳􅂺罷公之為使不以一事者若韋縚之在開元以禮儀使而掌五禮也凡制􅃙􅁽命皆出扵中書是時郭子儀官中書令而不預省事楊炎同中書門下平章事而官門下侍郎唯舎人于邵獨在中書起草署行者邵也新史邵本傳稱邵以諌議大夫知制誥進禮部侍郎而不言其為中書舎人者意必以舎人秩卑扵諌議而略之也其用尚書吏部告身印者尚書實承而行之官尚書省者之氏名石刻猶可見也就其可知者䟽之如此其殘脫而不可知者不敢以臆􅀃􅂙焉亦闕疑之義也䟦南豐曽公謚文定覆議宋制文臣光禄大夫武臣節度使以上法當定謚者皆太常博士議之考功郎中覆之乃以上于朝而降􅃙紹興􅀄欲旌死莭之臣始有賜謚徑令中書舎人行詞給告太常考功咸不與焉由是應得謚者亦援以為比乾道末臣寮言其非故事而申眀之淳熈中遂詔特命謚者並經有司議定取皆出􅃙曽公官止四品因郷郡之請而賜謚其議扵太常覆扵考功者用近制也然其發揚褒羙雖書賛之詞殆不是過豈以降􅃙給告為輕重㢤劉公自嘉熈戊戍訖淳祐壬寅凡兩兼考功又真除貟外郎不知此議作扵何時今言者方建白重脩宋史考其􅀊月上之有司以􅀘曽公刋傳之闕文可也題黄給事山居圗予讀紹興正論小傳未甞不三復而悲之方秦檜起􅀔立威小不附者􅂺欲寘之死地而忠鯁之風不為少衰嗚呼何其盛也然皆僅足以掇禍固莫有得行其言者嗚呼又何不􅄑耶獨故給事中黄公居殿院時甞䟽檜姦狀檜由是去相位使當時聴言􅀋如此正論可無作矣它日檜卒用公卒斥我瞻四方蹙蹙靡􅀁騁嗚呼悲夫公之去也屏居海外馬秦﨩上蒼崖崛起長風怒濤中覧是圗猶可想見其􅀌標峻節當與之並存扵天壌間也䟦李西臺書涪翁稱西臺書出羣㧞萃肥不剩􅁏如羙女豐肌而神氣清秀但恨摹手失其筆意耳今獲觀此真迹而窺見其筆意寕復有涪翁之遺恨乎䟦晝錦堂詩祁國杜公草書晝錦堂詩紹興間甞歸之内府詩中適有御名故刋去之然此字本韓氏家諱而祁公用之不疑古人臨文不諱之意尚可見也䟦韓令公真賛居士集此賛末句作丞相魏公按公以嘉祐八年封衛國公治平二年廼進封魏賛作扵元年之八月曰魏公者盖後人􅇷改之􅄑真跡尚存可考也䟦范文正公書伯夷頌范文正公為蘇才翁書伯夷頌後有秦㑹之太師賈師憲太傅兩人圗記宋南渡後此卷必流落江左而甞入其家至李侯戡得之扵燕則宋亡之眀年也范氏􅀁居近在吴中兩人不能舉而歸之卒有待扵李侯而公之子孫乃獲敬受寳蔵焉豈偶然㢤盖自西方兵寝不用公歸而均逸外藩因得以暇日㳺心扵藝事才翁善書而深服公楷法之妙求公冩乾卦而公以字數多眼力不逮故為冩此頌卷末苐云書法亦要切磋未是䖏無惜賜教而巳後来一二大老乃推廣其􅀃謂公書此實為天下萬世綱常計至㢤言乎末學之士毋庸贅述也䟦范文正公與尹舎人帖尹公自謂與范公義兼師友而其言談罕及扵性命至尹公䖏死生之變尤人􅀁難能非知道者不足以與扵此盖是時風俗醇厚士大夫多不言而躬行未至立名字以相髙此宋三百年極盛之際也伏􅀚范公遺帖安得不為之撫卷而三嘆乎䟦唐御史臺精舎記漢史列傳具載包咸劉㳤檀敷李充􅀁立精舎而唐御史臺精舎史缺弗録盖彼四人者皆以講授諸生此則以奉浮屠氏故略之耳􅄑有此碑可存當時故事也䟦温公通鑑草温公通鑑書晉永昌元年事視此尤為詳備此特其􅀄藁耳而作字方整未甞為縦逸之態其敬慎無􅀁苟如此冝其十有九年始克成書歟今之文人􅀋以敏捷相髙貴輕揚而賤持重使温公復生未必能與之追逐也三復之餘唯有掩卷太息而已䟦尋僧圗荆公以元豐四年十月二十四日與道原過西荘遂㳺寳乘有兩詩此圗止書其一于卷首者但取末後二句以冩一時之髙􅃱云爾故扵詩中之南埭北山皆不以勞意匠何暇及其平生事業乎嘉定諸大老題識真足發其深趣毋庸吹毛洗垢以合閙也後公㳺寳乘二百六十年為今至正元年十月一十四日金􅂠黄溍書䟦閻立本􅀞宣和内府􅀁蔵閻相􅀞三十有二予甞扵故秘書少􅁥吕公家􅀚其房􅀫盖大徳中先朝􅀁賜宣和舊物也今乃獲覩此三星東海徐公謂􅀁見三本皆不逮此則其􅀁􅀞冝非一本此卷雖無内府印章而徐公在宣和間已鍳定為真跡誠可寳矣䟦李北海永康帖宣和内府􅀁蔵李公十帖此其一也今人徃徃喜效李書而罕得見其真跡予幸獲見之而又不能學安得相求而適相值㢤䟦荆公帖廣漢張子言公書如大忙中冩新安朱子以為切中其病而又謂先君喜學公書今觀此帖風神間逸韻度清羙臨學之家冝有取焉評書者未可以彼而廢此也䟦徐州鹿鳴燕詩序此序視東坡先生集􅀁載少六字不同者十三字按先生以嘉祐元年舉進士此卷云嘉祐之􅀄而集中作嘉祐之末􅄑真蹟尚存可正傳刻之誤也記水樂亭詩東陽婺大縣為長吏者恒憚其不易治若唐于君興宗宋王君槩鮑君極率以暇日寓情山水間苟非能使政平訟理而田里安扵無事雖窮觀㳺之羙誰與樂此然則地固未必難治獨患夫吏之知以簡易為治者少也王君為縣在熈寜時甞􅀙賔寮登西峴山作亭泉上名水樂眉山二蘇公咸為賦詩亭旣廢好事者或以其詩刻寘杭之南山水樂洞猶存其舊題曰東陽云天暦二年秋某月今縣尹趙侯某始即其故䖏作新亭且買石復刻詩亭中侯之為治不煩而餘力之􅀁及亦可見矣視前人何歉乎􅂺為志其􅀊月于下方庻後之􅀙政者有取焉爾䟦東坡書秦少㳺龍井題名元豐元年東坡先生謫黄州少㳺以二年秋至龍井三年秋先生乃為書此題名而記其後言與兒子邁棹小舟至赤壁西望武昌山谷喬木蒼然雲濤際天而先生作赤壁賦則五年之秋冬也溍兒時即能誦少㳺題名不意垂老獲見先生真蹟因考其􅀊月而謹志之䟦東坡贈巢三詩右蘇文忠公墨跡上有秦熺􅀻印盖其家蔵舊物也章蔡秦氏父子人品無大相逺㦯與公同時而不相容或異世而相慕愛之如此談者􅀋以爲公論須乆而後定豈不然㢤䟦蘇公父子墨跡右文安黄門二帖􅀁言皆􅀻家細事至煩碎而靡宻無足深論學士大夫相與存而傳之者豈不以其人㢤夫不能以古人自任千載自期而欲恃區區之文墨以爲不朽者可以􅁣然扵此矣䟦山谷贈元大師詩元符二年公在戎州有􅀉題祖元大師此君軒詩眀年公自戎州放還以十二月抵江安又眀年是爲建中靖國元年公以正月發江安元師自榮州来送之故有是作其詩今載别集中而蜀刻小本以爲祖無大師盖傳録者以元爲无故又譌而爲無􅄑真迹尚在可證其誤也䟦東坡先生帖先生有荅李之儀端叔書是未相識時此帖則相見之後也䟦李賛華獵􅀐圗賛華契丹國主之子東丹王突欲也後唐眀宗時越海歸中國以爲懐化軍節度使瑞慎等州觀察使􅀄因其舊封姓之曰東丹尋又賜以國姓而名以賛華宋宣和内府蔵其􅀞凡十有五􅀞譜稱其多冩貴人酋長䄂戈挟彈牽黄臂蒼服縵胡之纓不作中國衣冠亦安扵􅀁習者然馬尚豐肥筆乏壯氣今以其言驗之此圗爲賛華作無疑也䟦禇河南書兒寛傳賛子固以此賛與三龕孟法師碑用筆不同定為河南晚年書碑有􅀊月誠可信不疑然石刻視真迹自不無少異盖其轉摺精神䖏有非摹勒之巧􅀁能盡也䟦綦毋潜詩唐綦毋譛詩見扵殷璠􅀁編河岳英靈集者六篇而璠獨稱其題鶴林松覆山殿冷不可多得題靈隠塔影掛清漢鍾聲和白雲歴代未有龍興在吴中與兩山相望此詩必一時之作豈璠偶遺之耶抑其去取㦯自有意也因觀間上人􅀁刻墨本􅂺識其末以俟覽者詳焉䟦蘭亭五字損本宋景定咸淳間賈氏枋國定武舊刻流落人間者鮮不以資其清玩甞俾其客廖寺丞􅄁較諸本異同擇其字之尤精善者輯成一帖命婺之良工王用和刻之經年乃就尋補用和勇爵以酬其勞其石後歸亰師今在故執政吴公家此本有恱生印必甞俻選擇者可寳也䟦米元章書蘭亭序臨稧帖者得其貌似優孟之效孫叔敖也得其意似魯男子之學栁下惠也世􅀁傳三米蘭亭乃是以右軍書模勒上石此則元章臨右軍書貌不必同意無少異可寳也書肯齋李公遺墨後賈傅以䘮師去國朝士中與之不合者或􅀙而􅇷數其罪以為可殺及得一郡而去則賣降恐後君子耻之李公本以忤賈一斥十年其復官進職起帥長沙賈巳在謫籍雖力詆之孰曰不然而公此帖頋謂入謝表啓只須引咎不可怨尤至其盡瘁事􅀦視死如歸英風偉烈乃如此孔子曰君子欲訥扵言而敏扵行又曰有言者不必有徳豈非然㢤題唐臨蘭亭舊見馮承素米禮部及趙魏公􅀁臨稧帖未甞為苟同今觀此本筆􅀔翩翩風神秀發又絶異欲取而􅂙較之不能不以四者之難并為恨也䟦衛公夜㘴圗伯玉夜乘車過闕而止其敬慎如此􅀁謂欲寡其過豈專對之飾辭㢤夫人即南子也女婦而有知人之眀固未易及非但知伯玉又知孔子而願見焉孔子亦不拒而徃見之抑可謂難能也巳司馬遷以子路之不􅀃遂謂孔子因夫人而去且附以未見好徳之言其果然耶按論語􅀁記孔子非因夫人而去未見好徳自别爲一章不知何􅀁爲而發遷之􅀃恐猶有當考者因􅀚衛公夜坐圗􅂺試評之翰墨之妙未暇論也題鵪鶉圗􅀞有御府印章盖與􅀛書馬圗甞爲一時之物矣之二蟲何知其􅀩􅀍光耀乃爾㢤將有如昌􅀺公感白烏鸜鵒而爲之賦者粉墨之工無以議爲也題脫鞾返棹二圗嗚呼古之􅀁以取亡者非一而漢唐之亡獨與䆠者之禍爲終始豈不悲㢤當理宗時宋祚㣲矣盧董之憸謀狡智非不能爲甫節士良也衣冠之禍􅀁以未至如建寧太和之烈者夫亦一時之清言勁論有以殺其􅀔而遏其衝乎故資政殿學士牟公之守姑孰也甞􅀞脫鞾返棹二圗而爲之賛宋臣怒其譏已風臺臣論罷公公去未㡬而宋臣􅂺斥它日公旣召還宋臣亦􅂺進然竟以公䟽卒不復用君子小人勝敗之機實繫扵此是雖若無救扵趙氏之亡其不遂亡扵二三竪之手者天歟人歟覽是圗者未可苐以為一時之清玩也二圗作扵寳祐丙辰後六十年為今延祐丙辰公之孫溧水教授君更購善工縮圗為小卷以便觀者且俾其門生黄溍識焉實是􅀊之九月九日也䟦象山祠堂記象山在貴溪縣之西境雲山章公􅀁為祠堂記稱臨川彭世昌始開山結廬延􅃱陸先生講道其間然世昌極貧里人張南仲侍郎實助其役先生以山形如象故名之曰象山學者亦因用為先生之號先生殁遂即其地為祠堂云今象山書院僑置扵貴溪之徐巖盖􅀩齋􅀽公持節江東時􅀁作也此記石刻乆不存非侍郎家傳蔵其文人固莫知山之􅀁以名且將指徐巖為象山矣先生之學與考亭朱子同出扵孔氏後之人徃徃各尊其􅀁聞交攘互斥若不能相容者何㢤侍郎諸孫元􅇐今方列于仙班而侍祠于眀庭其為教不與孔氏合頋能不以彼我為間出此記而表章之度越扵吾輩逺矣觀者可無自警乎跋米南宫帖元章􅀒其才氣傲睨一世而推服道祖如此道祖之為人可知也世徒以其善書並稱之曰米薛而此帖無一語及之則其可推服者非直翰墨之工而已䟦晦庵先生帖右朱文公先生與侍郎馬公十一帖先生以淳熈八年冬為浙東常平使者九年秋累䟽劾知台州唐公仲友而唐公亦自訴于朝丞相王魯公與唐公居同里且有連頗隂右之亟􅂌以江西憲節而去先生抗章不已乃罷唐公新任而以先生填其闕先生以為蹊田奪牛三尺童子知其不可力辭不赴改江東又不赴乞祠而歸十四年秋復命先生代馬公持江西憲節未赴而魯公以十五年夏五月去相位六月先生入對除兵部郎官以林侍郎栗論奏有旨仍赴江西竟辤避不赴帖中雖謂馬公為交代而實未甞交承也先生旣用磨勘轉官除職予祠尋召入主管西太一宫兼崇政殿􅀃書未及上俄俾以秘閣修撰奉外祠前兩帖結衘稱朝奉郎主管嵩山崇福宫者方辭論撰而未􅁢也逮得旨依􅀁乞仍舊職且降詔褒諭次兩帖廼以直寳文閣入衘帖中云􅀁請亦􅄑開允更􅀍褒詔是也又其次兩帖止稱階官貼職者時已有旨起先生將漕江東即帖中云不知除授􅀁由者先生方控辭故祠官使職悉不以繫衘也婺相盖指魯公􅀁謂邪􅀃姦心隂自慿結廟社之靈實紏殛之者言若有激恐未必專以前事為憾也此六帖皆在十六年夏秋之間最後兩帖一稱權發遣漳州事在紹熈元年春一稱秘閣修撰主管鴻慶宫在其二年秋餘三帖則問眷請委之副楮也先生文集􅀁載尺櫝分出䖏問荅兩門凡四十卷而此諸帖皆不見集中謹􅇱著其􅀊月以俟采録而􅀘其闕逸云爾䟦米元暉帖翟􅂄年伯夀好古博雅君子也元暉因伯夀識桂勛而傳其術則勛之為術精矣不知今亦有傳其術者乎䟦朱張二先生帖慶元學禁方厲為士者至更名它師其問遺尺牘之偶存者未必非毀棄之餘也乃今遂如壁書冡簡復啓其秘是孰使之然耶俗好之向背固足占氣運之盛衰士君子政不當隨世爲歆艶蕳薄也林生出示􅀁蔵朱張二先生墨迹因書以諗焉䟦晦庵先生帖國朝善書者稱秋磵王公考亭朱子之書曰道義精華之氣渾渾灝灝自理窟中流出又曰道義之氣葱葱欝欎散扵文字間其評書如此則其善書豈直􅀧畫之工而已盖自許魏公推眀朱學而立其􅀃扵學官且用以取士朔南聲教􅀁曁咸知尊信之罔有異辭至其翰墨之妙􅀋以爲儒者細事寘而弗論秋磵公可謂目擊道存者矣道傳赴玉堂之召携考亭手帖北上玉堂諸老善書如秋磵公者爲不少􅄑求其試評之䟦六君子小像六君子􅀙祀先聖廟庭已乆至順二年始􅀍旨追􅂌二程先生以公爵詞頭之下溍􅀁預聞也先是周子巳封道國而司馬氏在異時身居相位爵爲國公無以復加獨張邵二子猶襲故封伏􅀚六君子小像庸志之如右庻有能舉揚以上聞者䟦王江州誥右王江州誥詞中書舎人樓鑰行宋三百年吾烏傷苐進士者實始扵王氏皇佑癸巳則恩陽令固紹聖甲戌則知福州贈正議大夫永年福州之孫寅乃弗取世科而用䕃入官歴守七郡其以朝請大夫知江州則慶元元年正月也凡州郡守臣差則出􅃙除則給誥而誥必有褒詞故尤以爲榮江州之七世從孫禕􅀙予㳺亰師子因閱官書扵史局得此誥詞録而歸之以俻其家乘之闕文䟦曽大父除武學諭誥宋理宗開慶元年七月故敷文閣學士朱公由史舘校勘授武學博士我曽大父户部府君由通判慶元軍府事授武學諭實與公並命後九十年是為今至正九年乃獲觀公曽孫業􅀁述公年譜誤以武學為太學謹録當時所􅀍誥詞歸之以􅀘其闕而訂其譌䟦宋諸公遺墨淳化閣帖張華桓温王導王敦四丞相並居晉人之首而揔題曰名臣法帖葢特取其翰墨之工而扵人品之邪正有不暇計也此帖自范歐陽司馬氏下至章蔡凡十人皆宋􅈗執人品不同而同為一卷者豈亦閣帖舊法乎卷中一帖不書名而標其旁曰宋宣公恐是宋宣獻耳䟦林和靖詩予甞見先生手書詩一多集中􅀁不載此三詩則皆有之而亦不盡同竊意集中是後来􅀁改定也䟦清􅈵國師􅀁書栖霞碑唐攝山棲霞寺律大師碑華嚴䟽主清􅈵國師􅀁書也國師越之會稽人飛来山寳林寺實其得度故䖏今住山同公舊讀裴相􅀦所撰妙覺塔銘而知國師得二王之筆法又聞趙魏公稱國師字畫之妙而知相國之言爲可徴毎歎其書罕傳扵世今年春出㳺呉中始從報㤙萬􅀊寺住上人得此墨本歸而刻諸石屬予志扵下方謹按國師以大暦三年受詔入内譯經爲潤文大徳是年三月二日律師示寂而碑之建在眀年三月十二日今去之已五百八十年覩其遺刻法度森嚴神采奮發而國師之徳容猶可藉是想見也國師世夀百有二書此時甫三十有一或者妄計其晚􅀊安住毗盧華藏必不復作如是㳺戯事予竊不敢謂然法身大士應化人間扵一毫端現諸萬象卷舒無礙寂用常如塵心交入無非法界覽者母徒弊弊焉索之扵形迹之間庻㡬目擊而道存者也䟦白蓮社圗逺公結社以修浄業邀靖莭入社而不赴康樂欲入社而逺公難之陸修静雖與逺公善而慕爲神仙􅀄非同社世􅀁稱十八賢自十二僧之外劉雷周宗二張六人而已史傳及它書􅀁載可考也諸公䟦語因此卷并􅀞靖莭康樂修静而誤以爲二十一人耳䟦蘇黄二公帖蘇帖稱元鈞殿院者吕陶元鈞也陶起追士累遷司門郎中􅈒宗即位拜殿中侍御史朱光庭時為左司諌奏翰林學士蘇軾撰舘軄䇿題譏議先烈乞正其罪陶亦奏軾素疾程頥光庭為頥報怨此洛蜀二黨􅀁由分也盖蘇與吕俱眉州人云黄帖不著稱謂莫知以灾去軄者為誰當别考也䟦静修先生遺墨溍弱冠時甞手鈔静修先生丁亥集悉能成誦後五十餘年始􅀙汝南張君獲覩先生遺墨盖君之先大夫受業先生之門故先生書此以授之其言小學書不取鄧伯道朱夀昌事善發明朱子言外之意溍旣得以快覩前脩之真蹟又有以竊窺先儒之微旨抑何幸歟䟦金縢圗尚書正義分金縢一篇為四節呉郡顔直之用龍眼遺法書其本文而畫其􅀁書以為此圗其􅀁書盖苐二節之􅁽祝苐三節之􅁲􅁻祝與􅁲同在一時萹終􅀁記乃後来事故略而弗及也經文可見者植璧秉珪唘籥納􅁽而已此圗扵鼎爼樽爵豆􅇼筐篚之屬靡􅀁不備亦􅀞家以意為之而曲盡其形容耳䟦韓魏公帖右韓魏公與歐陽文忠公帖淳熈丞相王公家蔵三十􅁓之一也文忠得蔡復留在􅃱仕前十有六年魏公方勉之以冝盤桓䟦語云多見二公請退之舉又云其言諄諄以必退為請盖不專指此一帖而言也䟦山谷帖求人作文字而煎迫之至使倉猝失其事實亦待去不暇頋盖自昔己然矣吾儕去古人不啻相千萬而動遭煎迫欲無失得乎偶閱此帖為之三歎䟦誠齋墨蹟右誠齋楊公與某僉判書凡七紙盖弔其父䘮且荅其求墓銘也􅀁謂扼其喉把其䄂而牛羊迫促之者此今人求文扵吾儕之常態公曽不免此耶撫卷為之永嘅䟦崇國公墓誌銘宋宗室崇國公墓誌銘翰林學士鄭居中撰知淮陽軍米芾書今題曰元章真蹟者世知寳愛其書而已夫以公胄系之貴爵秩之尊子孫又衆多且光顯若是而今無稱焉獨頼此書為好事者􅀁存傳而不廢故其官伐世序猶可考見嗚呼士君子􅀁恃以不朽者書云乎㢤䟦放翁詩草予徃来山隂道中此詩􅀁謂横林野水紅草緑荷皆故無恙而翁之家衰落乆矣叩其人亦無能道先世事者偶閱此卷大息而已題墨蘭月溪􅀞蘭傳者絶少政如深林􅀌芳人不可即廽睨夫託根扵堦庭玉樹間者殆與薺麦俱茂矣䟦趙魏公書歐陽氏八法近世錢唐金氏一之以善為歐書得名曁趙魏公出學者争慕效焉歐學遂廢而不知公之教子實用其八法頼此帖故存本末源流尚可考也雖然梓匠輪輿能與人以規矩不能使人巧父子不傳之妙必有出扵此帖之外者矣臨學之家冝深造而自得焉䟦金字心經右金字心經一卷趙魏公作按唐孫氏書譜論書之乖合各有五􅁓墨相發為一合􅁓墨不稱為一乖盖墨之調適固難用泥金視行墨為尤難此卷神融筆暢殊無澁滯之態非公無以及此可寳也䟦翠巗􅀞先生盛年客扵信國趙公頗欲以竒偉非常之功自見遭值聖時海宇為一老無􅀁用浮湛俗間其􅅐中之磊落軒昻峥嶸突兀者時時發見扵筆墨之􅀁及後生小子乃一切律以尋常書􅀞之品式冝其傳扵世者少也溍以大徳戊戍春見先生扵錢唐今已五十年因觀先生􅀁為孟浩然諸意圗聊識其後云䟦錢翼之千文呉興趙公早年學書用工至精宻迨其得扵心而應扵手縦横曲折無不如意之􅀁欲出以公之學名其家者務扵速成徃徃摹倣公暮年􅀁書而求其形似如不由其户而欲升其堂入其室也得公之用功精宻又􅂙以古人而别出新意自為一家如吾翼之者殊不多見此卷千文四體皆其得意書尤不易得今翼之巳不可作而有子能傳其業亦以子言為然否乎題雲山圗予不解􅀞凡古今名筆皆莫識其􅀁以為工近留南屏積雨彌月遥望群峰隠見扵煙雲杳靄間倐忽之頃變幻百出宛然它日􅀞中􅀁見乃知良工之意匠真有能窺造化之妙者昔人誦杜子羙夜深殿突兀以為親渉其境始悟為佳句豈虚言㢤天錫作此卷時盖與予俱寓南屏亦因其可見者移入縑素耳䟦張􅁥丞代祀虞帝廟詩有虞氏距今三十餘年廟而祀之盖非一日張侯將上旨以香幣走祠下􅃍能􅃱其昭受而􅂋荅此皆聖神在御徳恊古先故其感孚有同符契張侯固若無􅀁容其力矣雖然君猶天也其徳有不可名言者是以昔之詩人歌􅀕祀之盛唯羙夫駿奔􅂋相而巳張侯駿奔顯相之功不旣多乎播之頌聲亦清廟詩人之意也覽者盍以是􅀚焉䟦景傳新店彎詩新店彎在諸曁東北三十里景傳十八年間凡三題詩頃予忝佐是州以故事謁郡府道過其䖏覧最後􅀁題􅀊月盖予以督運吏居鄞時景傳携其子克譲来為予婿甞寓􅀫于此也􅇷計之已六年而㬌傳與予永訣者亦四年因次其韻以志存殁之感今相距又五年矣偶閱舊槀不勝愴然􅂺録為二通一以授克譲蔵扵家一以授新店主人俾附後題之末䟦景傳遺墨嗚呼此景傳絶筆也予尚忍言之哉景傳長予十五􅀊與予為忘年交而其子克譲予婿也景傳始屬疾隂陽家争来言􅀁穿新井不利景傳曰死生有命井非􅀁獲罪也皆謝遣之時克譲方從予鄞江上扵是有待汝不歸我行有程之語克譲旣歸則又有忍死待兒而兒歸之語嗚呼予尚忍言之㢤景傳之先有為邵州新化縣主簿者仕稍不􅂋主簿君之父䔍厚長者宗忠蕳公父事之其殁也公實銘其墓逮景傳之考君希聲先生遂以文學為後進師而景􅀓􅀒其不覊之才浮㳺物表人見其寓談咲扵文字間􅀋若依隠玩世至扵死生之際䖏之􅁉如合乎聖賢之學而出乎性命之正者人固未或能知之也其季景宗朝出畊夜歸讀古人書薄巳而厚物近乎昔之卓行君子者予􅀹畏慕焉景傳謂克譲汝非季父不立汝非外舅不成嗚呼景宗視克讓盖猶子也而景傳望予之厚如此予亦安能有以慰景傳扵地下而尚忍言之㢤景傳之死予旣無隻字以為之銘又無片辭以為之誄姑輯其遺言録而蔵諸以示無忘或者克讓因是尚有警也䟦進學工程易曰君子進徳􅁱業欲及時也記誦辭章云乎㢤記誦辭章末矣後生小子猶有廢而弗事者程君敬叔排年工程之書􅀁為作也敬叔以文學行􅁩髙一時其傳盖本扵考亭門人㬊氏進􅁱之功不必盡出是書夫亦度中人以下􅀁可企及姑爲是以誘掖之云爾古者大學之道比年入學中年考校一年視離經辨志三年視敬業樂群五年視博習親師七年視論學取友謂之小成九年知􅀋通逹強立而不反謂之大成即其排年之工程也學者苟能因今人之􅀁可及而求古人之􅀁必至敬叔將扵是書之外有􅀻淑艾焉行逺自邇登髙自卑在乎勉之而巳金華黄先生文集卷苐二十一
