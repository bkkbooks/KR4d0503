body:
  text: 記慶元玄妙觀玉皇閣記昔有虞肆類上帝而及于六宗山川羣神成周禋祀昊天而及于日月星辰司中司命風師雨師社稷五祀五嶽山林川澤四方百物今道家者流祝祭禮祠之事諸神位號之多至於三千三百而莫尊於昊天上帝率與有虞成周之法合老子為柱下史孔子嘗問禮焉于帝王之舊典禮經固無不知其徒之尊其所尊冝有所本矣然老子之道務清靜無為去健羡就卑弱古之人用之治其國而民以寧一至於飛符走檄崇玲館而啓玄科五千言之中雖未嘗及之而非有道外之法也凡天下通都大邑名區奧壤宫觀壇場之制自前殿之外必為玉皇之别殿蓋三境之髙真玄穹之主宰當各全其尊也慶元玄妙觀在唐為𬗋極宫以奉玄元在宋為天慶觀以奉聖祖國朝至元十九年燬于災元貞某年有䛇撤聖祖之祠黜天慶之號而改卑今額穹門邃廡奧殿廣堂悉復其舊惟帝座久虛而不設非闕典歟大德某年前住持雷谷陳君入覲𬒳上旨俾以甲乙次相授陳君慨然以興造為已任謀闢聖祖殿故址建玉皇閣未及庀工而化由陳君若干傳逮今住持順菴王君而閣乃成𥘉王君以泰定某年入侍內祠賜號玄門真士主本郡之太清宫以精於禬禳朝廷數遣代祀名山京師大旱禱雨輒應有司治決河投其鐡符水勢隨減名聞于上制授太虛玄靜明妙真人住持本觀至正五年冬奉今天子及兩宫皇后所降香幡歸建金籙黃籙二大齋感瑞鶴翔舞異香不散士民慕嚮而至者不可數計所獲信施甚厚乃裒聚以資土木之費始作於六年之十一月訖功于某年之某月閣之髙若干尺修若干尺廣若干尺列楹若干復霤重簷塗墍丹青窮極壯麗威儀像座嚴奉惟謹謂不可無以紀其成績乃以狀來求為之記夫以數百年之曠典一旦而舉之殆非偶然自今以始眀靈顧歆祥慶來下使斯人蒙其福澤保其夀康而泳遊于清靜無為之化此王君之志也所可記者奚止于程工屬役之勤而已乎王君名天助字致和同都昌國州之蓬萊鄉人也龍虎山仙源觀記仙源觀在信州龍虎山之馮原葆和通妙崇正真人徐公懋昭之所創也𥘉徐公得度于太上清正一宫通真院之逹觀堂其師曰通真觀妙玄應真人張公聞詩實開府大宗師輔成贊化保運神德真君之伯兄且開府所從受道也開府之弟子數十百人傳次之序以徐公為首徐公性篤實而耿介非義不苟取攻苦食淡由勤儉而致豐𥙿至元二十二年始闢地於馮原以為觀馮原者南距上清三十里異時有大姓馮氏居之遂以得名岡巒廽復林壑靚深泉甘土肥風氣完厚歐公嶺龍湫在其東琵琶麈湖雲臺藐姑象山在其南其西北則寶帶諸山也凡殿堂門廡位置髙下悉因地勢之自然而不以人力參焉其幽邃可以奠神眀之居其間寂可以棲來學之士有田數百畒可以資華薌􅊡粥之具得請于朝賜以今額徐公竹冠布𫀆宴息其中而往來乎上清日與仙翁道侶徜徉於萬物之表方是時開府以清靜無為之説上承訪問褒大尊顯無與為比執弟子之職而列侍於左右者往往被璽書綰銀章號真人而主治乎名山惟徐公間來展省而未嘗久留中朝逹官貴人至有欲識其面而不可得泊然無願于世者垂二十年大德六年䛇強起之住持宜興之通真觀賜號葆和通妙崇正法師居十年洊膺制命進號真人又十年夀八十有二乃乘運而化於仙源至治元年也傳徐公之道者馮君志廣上官君與齡徐君天麟彭君齊年薛君起東李君世昌蔡君仲哲徐君守勤彭君一寧自志廣暨天麟而下皆以次領觀事元統元年與齡始奉上命為住持提點仍賜號沖和持正眀素法師祇事云𥘉有廢必舉病其棟宇局于地勢乃改卜其西十步外平而無險中寬而有容程工役略基址諏日之吉而遷焉越三年大殿成明年法堂及鐘鼓二樓成又眀年三門兩廡成東有閣曰東閣西有樓曰西樓齋廬寢室庫庾庖湢之屬次苐畢僃沖真眀逺玄靜真人張公德隆開府之猶子也少嘗學道其處從開府來亰師侍祠於眀庭者四十年至正六年將使指奉香幣還故山覩其輪奐聿新念構興之難而充拓之不易爰伐石屬豫書之大抵人之常情樂因循而憚改作仙源之建置幾年于兹矣一旦有能舍其舊而新是圗纘先業于方隆植法基於永固有功于其教甚大而况不慿國家之力不求民間豪末之助一以身任其事而遹觀其成是皆可書也於是乎書松溪縣新學記建為先師朱文公之闕里松溪建屬縣士生其間身親受業于公之門與聞公言論風指於淑艾之私者踵武後先其地雖𥚹小而士習為最盛逮入皇朝治教休眀人才尤彬彬焉縣故有學規制甚備至正十二年大盜竊發于河南而江淮閩粵繹騷不寧山谷愚氓相挻而起侵軼縣境蹂踐民居兵燹之後惟夫子廟若魯靈光之巋焉獨存識者知為天佑斯文之兆匪朝伊夕必有起其廢者今天子方慎擇守令惠綏黎元十四年夏六月今縣尹􅓸侯實來視篆之三日用故事欵謁于先聖禮成而退左右顧瞻徘徊歎息曰學校之廢興長民者之責也我其敢不以為己任即命鉤考簿書徴理𩔶年贍學田租在豪民黠吏之手者凡得米若干石資以召匠市材揆日庀事侯躬涖教護屬功而課其章程縣人攝尉事葉弘道暨教諭李璿訓導傅子實皆悉力以相焉自禮殿論堂齋廬寢室至于門廡庖廩咸撤而新之崇其垣墻端其術道墍茨瓴甓􅉳堊髹􅊮舉稱其度始于秋七月訖于冬十月而告畢工妥神有位配侑在列範銅為祭器而它所宜有者靡不具完藏修息遊各適其所佩襟來集弦誦相聞饋膳之須亦無乏絶侯既行舍萌之禮以落其成不逺千里俾諸生楊壵奉書赱金華山中以記為請昔杜子美題詩衡山縣學稱陸宰以雅才新意修儒服爼豆事於干戈之餘其辭逸出橫厲氣誼激烈數百歲之下讀者猶為之悚然侯下車之𥘉即以興學為先務披荒殘植棟宇甫十旬浹而畢潰于成其雅才新意視陸宰孰多乎然竊觀魯人之頌僖公曰既作泮宫淮夷攸服固非衡山之事可同日而語也賢侯導宣上化以振起士類將見魯人之頌復作於今雖子美未易贊一辭矧以眇焉末學衰朽悖眊猥令載筆為之記何能鋪張偉績以昭示于方來也哉姑序次其廢興之歲月云爾侯名説吳興人大父祕書少監時中夙任風憲父嘉興總𬋩𢡟翁久居館閣家學淵源所從來非一日矣冝其為政知所本而不謬於緩急之序云重修月泉書院記浦江縣北有泉出仙華山之陽而發于縣西二里視月之盈虛以為消長號曰月泉宋政和癸已知縣孫侯潮始疏為曲池築亭其上咸淳丙寅知縣王侯霖龍因構精舍於亭之西北祠先聖先賢其中以為諸生講學之所逮入國朝乃卑書院額至元庚寅提刑按察副使王公俁行部嘗一新之至順庚午前進士八時思博化由祕書郎出長兹邑又重新之有劉先生應龜栁先生貫所為記至正􅉝卯今縣尹蕭侯用廉能舉守令𬒳上命而來爰以暇日臨于泉上覩其棟宇摧敝亟捐俸資謀繕葺焉占籍之士皆樂為佽助而分任其役以是年之六月始作十一月訖功自祠室論堂齋廬門廡至于庖廩之屬屋以間計者四十有五凡用工以日計者若干用錢以緡計者若干屋室既完教飬之具亦無不畢僃士咸德之謂不可無使後人知其所自乃貽書于溍求為之記溍竊觀在昔郡縣未有學之時天下惟四書院其在大江以南潭之嶽麓南康之白鹿洞而巳三吳百粵所無有也今郡縣悉得建學而環江浙四封之內前賢遺迹名山勝地為書院者其多至于八十有四好事之家慕效而創為之未見其止也意者人材之出亦將從而多顧若有所不及何歟昔者魯修泮宫而詩人頌之苐以僖公之色笑威儀美盛德之形容曽無一言述其輪焉奐焉之美者先儒以為修者修行其教學之法也今之輪奐既美而清泉白月舊觀復新諸君子從賢侯來遊來歌色笑威儀無非教也有能感厲奮發而無負侯作新之意將見異材輩出代不乏人真儒之效𬒳于來世而侯之德與之相為無窮豈係乎記之有無也哉姑為敘次其興作之歲月云爾其詳見于前記者兹得以略焉侯名文質許州襄城縣人歷宰三邑皆有治績今纍階儒林郎云學齋記伯溫甫以學齋扁其居室而來諗于溍曰豫幸以國子獲執經於館下忝釋褐而備官使于西陲者二十載異時同舍生類能以文學論議自見已獨無稱焉大懼去師友日逺墜失舊聞不得附于英俊之列爰以學名吾齋庶幾退息于斯有所自警以為進修之地匪但求無愧乎今人苟未至乎古人不敢不勉也子其為我記之溍聞魯論所記子夏氏有仕優則學學優則仕之言説者謂斯言非為學而弗仕者勸乃為仕而弗學者戒也然則學之優或不必于仕仕之優曷可以無學乎蓋古者由家而鄉以逹於國固無地而無學其賢能之興於鄉者必還以長而沿之歲時屬民射飲讀法使之習容間禮考德問業莫不有教學相長之道焉則亦無事而非學無時而不學也今之為學既不皆與古合其仕者又率以鈎托趨辦為大務而無暇從容出入升降酬酢於儒服爼豆之間若夫隨牒逺方邈焉海隅徼塞萬里之外則弦誦之聲益以希闊年未至而不親學者皆是也有能不為事物之所奪風氣之所移而卓然以古人自任如伯溫甫者不亦有志之士歟厯觀書傳所載能終始于學者無如衛之武公年九十有五猶作詩以自警曰相在爾室尚不愧于屋漏先儒以為此誠意正心之極功則其所學可知也伯溫甫敡歷之久譽望甚著年踰強仕以選擢外宰相之元僚而居是室也忘其齒之長身之貴不怠於自警如此其亦武公之徒矣由是而登于武公之年所造詎易量哉且老之為言考也庸謹記之以俟它日考其成焉湛然齋記祕書郎潛南張君名齋曰湛然而徴豫為記豫叩其所以名則先濵國文忠公以君之𥘉度親為賦詩四章其取義甚博以周而湛然之語乃指夫心以為言又一篇之體要也君謹志之不敢忘因以為齋室之號云夫以湛然喻人之心者以其體本靜而已方其泊焉以休耳不與聲接目不與色交好惡未形而心常虛寂表裏瑩徹如止水之不波樂記所謂人生而靜是也一旦出而與世酬酢不能無是非之相靡利害之相刃誘于所可喜而訹於所可懼其存者幾希蓋心之發見若泉之始逹而未知所適必有定向斯不妄動大學所謂定而後能靜是也生而靜者天也定而靜者人也是以善養其心者不徒反求于洞洞屬屬之𥘉而每密察於膠膠擾擾之際內有以全乎天理外有以盡乎人事故不物于物而常為萬物宗試即夫川上而觀之逝者如斯而其未嘗往者湛然自若也自昔父詔其子未有如公直示以心體之妙者然公之言則有本有末既原其理而啓迪之復列其事而策勵之君之揭于齋居以自警者固將以端本而澄源也必始終本末一以貫之靜極而動則其應變旁行而不流動極而靜則無一塵之纍而退藏于密向之湛然者無時而不然斯不負於公之教矣請以是進于君為之記云寶忠堂記翰林學士公朵爾直班以寶忠扁其所居之堂而貽書于溍曰昔我魯國忠宣忠武兩王侍太祖皇帝肇造區夏克有大勳慶賞所加爰及苗裔為國家之世臣兹已八葉忠武始嘗以太師國王都行省承制行事建牙于燕而今亰師迎陽里第則吾祖同知通政院事府君之所作也豫不幸少孤痛自䇿勵獲底於成人蒙𬒳眷知僃貟禁從恆廩焉以隕其家聲為懼竊聞古之人或以善為寶或以仁親為寶而吾家世之傳則以忠為寶子孫冝謹其承相與保守之而弗失是用名吾堂曰寶忠庶幾退食于斯心在帝室夙興夜寐靡敢忽忘不可無告後人俾繼吾志願有述而刻諸溍歷觀漢𥘉之豪傑並起而從髙帝馳驅於中原髙帝既定天下異姓之臣裂地而王者八國類皆鮮克有終張耳頗以智自全亦僅至其子而止獨吳芮受知髙帝稱之曰忠著于甲令由衡山而長沙傳號弗絶迄今千百年猶廟食于一邦孰不曰德之薄者其流卑德之厚者其流光推本而言則為德之薄厚特係乎能忠與否耳惟札刺爾氏之先奮其雄材翊扶興運元功茂烈載于彛常自時厥後享有茅土訏謨廟堂出入帷幄者莫不世濟其美德業之盛有光于前雖古帝王輔弼之臣殆不是過非僥幸於一時之際遇而謂之豪傑者可同日而語也然自魯王父子下逮東之三世易名節惠悉冠以忠視向之著令稱忠者若無以異令聞長世不亦冝乎蓋人材與時髙下固有不齊至于事上之貴乎忠無古今一也公以宗臣世胄日侍天子清間之燕而謙退不伐克念厥紹休沭在外輒與鴻生駿士探討儒家者流之言而知忠之為貴奉以周旋如恐弗勝既以受之前人者昭揭而自警又圗有託以貽方來俾永勿墜為慮豈不深且逺哉詩曰錫爾介圭以作爾寶此所謂寶上之賜也公之所寶家世之傳也能不失其家世之傳則能久有夫上之賜矣百世之下尚鑒于兹蘇學士畫像記故嶺北行中書省左右司郎中蘇公以延祐七年二月壬戌卒于亰師三月乙酉歸葬真定縣北三十里新市鄉其東北二里實漢新市縣故地有佛廬曰遍法寺後公殁之二十年是為至元元年寺僧廣朗以公少嘗讀書其中遺風餘韻去今未逺乃肖公像而祠焉公嗣子吏部尚書天爵疏其歲月屬溍為之記公諱志道字子寧真定人也𥘉以材受知郡守姚公得推擇為吏從決獄竟天方旱而雨人大驚異及辨元氏縣盜馬獄益有聲辟河東憲吏分讞屬郡大同獄囚雖重辟皆自以不冤用其使程公薦入察院佐御史監治和林正色不阿以嚴見憚楊州民家子訴𬒳賣為奴巳三易主御史以淮人多詐叱去之公曰詐則論如律安可置不問哉訊之果良民也浙西大猾聚愚民服僧衣復自號白雲宗以别於釋氏衆至數萬依權貴冒名爵州縣莫敢誰何會其姦利不法事覺廷議以禮部侍郎髙公往鞠之求諸曺史善持文墨者得公於户部與之俱公凡五往返于亰師乃克以具獄上奪其印章省所置官府沒入資産以巨萬計出其詿誤及良家子女數百人升掾樞密軍校當襲父職有十年不得調者悉舉行之俄有賜公弓矢及它服用之物俾從樞臣出行北邊還朝為中書掾同列以尚書省權勢所在爭趨之公不為動尚書省罷首命公鉤考其詮選之濫而釐正之擢中書檢校官擲吏曺資序失當四十餘事核户工兩曺過用錢幾四十萬緡米六百餘石斥去賊吏二十餘人或舉公材任御史而執法於中者以未識公為疑人謂當詣謁公曰以謁得御史可乎遷刑部主事有嗾盜旁引無辜者力辨其誣而黜主盜吏時宰欲殺盜內帑金者公曰獄未具孰敢遽殺人耶時宰怒謀中以它事樞密適奏除公斷事官經歷乃解有訴其兄非正嫡而欲奪其官者公執不可卒與其兄軍士護視公宴物器偶失兩銀盂將以盜論公曰此誤失之耳非真盜也使償所失而出之嶺北省治和林實國家興王之地生殖既久人安冨樂業一旦變起關中而和林大震並塞之民奔潰四出會天大雪畜盡死飢人無以自活走乞食於和林相枕藉死道上時倉儲僅五萬石民間米石至八十萬錢除吏雖有優秩率顧避莫肯行郎中之命下公即日就道至則白其長用便冝發倉賑給仍請于朝設髙估募人致粟和林於是邊儲充實如平時諸王泛索公悉持不與皇子安王是以褒以衣一襲吳王聞公徒行亦與名馬公受而以直歸之中書患和林禁酒法輕易犯更奏立重法罪至死令下三日犯者五人當坐公曰酒非三日可成犯在令前不冝用後法刑曺議如公言先是丞相順德忠獻王建孔子廟未就而薨至公訖成之日延寓士講説經史由是人始知學御史得邊民所列公政績上之未報而公辭歸遂不起公平居慎重寡言不妄與人交邅喪哀毀踰制而葬祭有禮諸父昆弟欲異居度弗能止則取薄田百餘畒遺書數百卷尤焉于教子其後尚書果以儒起家至顯官公殁時年甫六十階止中憲大夫以尚書貴贈集賢直學士亞中大夫輕車都尉追封真定郡侯配劉氏纍贈真定郡夫人公之考謹榮祖亦用尚書恩纍贈中順大夫禮部侍郎上騎都尉追封真定郡伯妣吳氏纍贈真定郡君溍歷觀古循吏居官可紀所去見思至於尸而祝之者由其利澤在人也深故人之報之也厚未有無所為而為之者廣朗方外人非素有德于公顧能拳拳致其尊慕之誠如此亦何所為而為之耶蓋公之行孚于鄉所居而化有以啓其秉彛好德之心焉爾溍既書其立祠之歲月竊懼後世拜公像而欲知公之為人者無所于考也惟公墓有志神道有銘庸敢掇取大略而并記之瑞雲觀記瑞雲觀在平江城東三十里今所謂笠澤福地者也吳松江由具區來出其西而其南為姚城江東為龍江又東為陳湖其北則闔閭浦也重波復浪四望如一其中可居處乃多沃土民安于耕桑皆朴淳有古風水木之清華禽魚上下泳飛之樂敻焉若在世外然而更千百年委棄于田夫野老之手未有能啓其祕而專其勝者玄門髙士陸君志寧始作菴于其處由是昔之祕者無所伏勝者益以發舒君不以得於耳目者為已足復斥故宇易菴以為觀合其徒而居焉凡觀之制中為三清殿而旁為玄天北斗太乙三元之别殿祠堂寢室講舍齋廬門廡庖湢次苐畢僃惟玉皇上帝之閣為役最巨久乃訖功而觀以成總為屋以間計者百有十繚以修垣而除道成梁以屬于南埭既又割上腴之田千五百畒有畸以資食飲百物之須為費一出于君而君之悉力殫慮二十年於此矣菴之𥘉為觀也教主嗣天師為署今額因命君開山而以甲乙為世守既而所司具以觀之成剡上天子特為下璽書加護焉君既勵其徒俾勿替且飭其族人毋敢有所預懼後莫之考而或毀其成也爰伐石以記來屬夫乾坤淸淑之氣川融山結非有數量而仙經所録洞天福地僅百一十有八神而眀之不以其人歟幸以人與境遇而又蒙𬒳帝力如此遊而息者衎衎施施未有巳也或者真仙異人於此乎出則福地之在笠澤而笠澤之有瑞雲將與金庭玉局並存于天壤間尚何成毀之足慮哉顧不可無以著作始之自乃弗辭而為之記云干氏贈封碑隂記仁宗即位之𥘉詔行貢舉始親䇿多士于廷江浙南士入奉大對者八人吳郡干公褎然居乎前列而溍亦叨塵末公淹外服巳久今天子用言者建白肆命宰臣總裁三史旁招群彥俾預纂修公既首膺召節下至溍之疏賤黭淺亦所不遺溍適有內艱不果行乃拜公集賢待制任以史事書成引年乞謝制授禮部尚書致仕貤恩于其大父鎮江府君父平江府君秩皆三品爵為通侯會同年歐陽公自翰林學士承旨出持七閩憲節道過吳郡為勒銘于豐碑彰君賜序世德也昔孟子論君子小人之澤一斷以五世説者蓋曰其人君子矣易世而非君子也者猶可以五世所以厚君子也其人小人矣易世而非小人也者亦可以五世所以甚小人也使世丗而君子也雖百世可也溍嘗疑其為説不與孟子合竊觀公之先有仕宋為諸司正使者五世至鎮江府君在宋季猶止于右階六世至平江府君乃以文易武三取薦書于漕于鄉又與其長子同上春官七世而公生今聖代遂擢乙科登八座流澤固未艾豈非所謂世丗而君子者耶溍于是知説者之善推言乎孟子也載念向之八人者多巳物故惟公與溍獨存溍嘗辱歐陽公銘先太常之墓兹獲覩公碑感門祚之衰薄仰令問之長世八世之後莫之與亰於公之子孫尚有望焉謹再拜識于下方以俟博古堂記故翰林待制僉淮西江北道廉訪司事申屠公至元間名御史也公平居無它玩好惟見以古彛器法書名畫求售者輒捐厚直取之所蓄既冨緘縢庋置覆以傑屋名曰博古之堂公殁逮今十有年嗣子耀州史君傳藏護視惟謹升其堂如見其親之存焉間嘗諗于溍曰我先君燕休之所曰九思堂吳文正公實為之記别號忍齋則翰林侍講學士揭公記之武昌别業有篛谷則翰林待制栁公記之作樓以儲書曰墨莊則翰林學士承旨歐陽公勒銘其上獨博古堂僅存治書侍御史李公魏國趙文敏公所書扁榜而未有為之記者幸卑以一言俾我後人永保而勿墜不亦可乎溍生也後不及從先生長者登公之堂而區區陋微于諸大老無能為役然托雅故於耀州非一日安敢以不敏辭昔者孔子言夏殷之禮而謂𣏌宋之文獻為不足徴當孔子時𣏌用夷宋圗霸已久典籍散亡而賢人之存者無幾其不足徴尚何怪乎秦人焚詩書而博士所掌故無恙蕭何從沛公入咸陽第能收其丞相府圗籍以知天下厄塞户口多少強弱之處至于先王之舊典儀物則一切委棄弗顧而墮於楚人之手以同歸于煨燼有識之士所為追恨痛惜而不巳也國兵南伐趙氏納土既封其府庫以入于有司而一伐之儀章物器皆公為江浙宣閫都司時親受於其主者以上于朝廷武夫俗吏莫敢壞傷斷簡殘編亦靡亡失其有功于斯文甚大中原文獻流落東南者固不得比隆夏殷公之賢于蕭何則巳逺矣而又能以餘力窮搜極訪因山巖丘隴屋壁之遺而窺見昔人制度法象之所寓精義之所存公之有志于古豈徒以資耳目玩好而已哉矧以耀州為之子克謹其承久且弗忘不待當祭而齋然後思其居處思其所樂思其所嗜也來者詎可忽諸公諱致逺字大用東平壽良人其歷官行事有永國文康閻公所為碑銘此不著耀州名駉以清方直諒世其家云述古堂記吳郡繆仲素好古博雅之士也平生所嗜惟古器物卒然遇之輒購以重資並置一堂之上其目若干所寶用者有宋內府故藏紹興丁已邵諤所進述古圗圎研因以𫐠古名其堂而求豫記之述古圗本李伯時效唐小李將軍用著色寫雲泉花木及一時之人物按鄭天民先覺所為記坐勘書臺捉筆而書者為東坡先生喜觀者為王晉卿憑椅而立視者為張文濳按方几而凝佇者為蔡天啓坐盤石上支頥執卷而觀畫者為蘇子由執蕉箑而熟視者為黃魯直憑肩而偶語者為陳無巳據橫卷而畫歸去來圗者為李伯時按膝而旁觀者為李端叔跪膝俯視者為眺無咎坐古檜下孹阮者為陳碧虛袖手側聽者為秦少遊昻首而題石者為米元章佇立而觀者為王仲至坐蒲團説無生論者為圎通道士偶坐而諦觀者為劉巨濟凡著幅巾者十有一人烏帽者二人而其一為道帽仙桃巾琴尾冠者各一人衣深衣𬗋衣褐衣者各二人青衣者四人黃衣者三人而其一為道服繭衣𬗋氅黲衣各一人一童執靈夀杖一童捧古研兩女奴雲鬟翠飾則王晉卿家姬也石床錦褥玉巵瑶琴以次陳列大溪峭壁怪石淙流曲徑危橋映帶左右松竹蘭蕙紅蕉𬗋葳蔽翳聮絡天民又謂有羽流名動四夷師表千古伯時偶未之及乘間寓意繪而為圗以資好事之玩莫知其所指為誰記作于政和甲午後二十又三年諤乃以研進研蓋端溪𬗋石其形正圎隆其中以受墨環其外以為水委而旁刻兹圗其物采雖不可辨而服飾位置猶倣佛可覩所謂述古圗圎研也豫聞商書記遲任之言曰人惟求舊器非求舊惟新夫所以欲求器于新者豈忽逺而貴近哉取其新以適於用而巳三代先秦古器往往流傳至今使兌之戈和之弓垂之竹矢離磬崇鼎一旦歸于士庶之家固無所用惟研也者自王公逹于庶人所通用也矧兹製作之妙備存人物儀刑之舊而其用則日新而不窮冝為仲素之所貴重歟堂以研得名記為堂而作仲素所蓄有出于兹研之前而非堂之所以名者豫不得而盡著也杏溪祠堂記杏溪祠堂者鄉先生傅公之祠也先生諱寅字同叔幼嗜學經史百家悉能成誦比長益求異書而讀之間從説齋唐公質疑問難皆有援據可反復説齋喜曰吾益友也及聞其升陑分陕之説語門人曰職方輿地盡在同叔腹中矣先生於天文地理眀堂封建井田律歷兵制之類世儒置而不講者靡不窮究根穴訂其訛謬資取甚博參驗甚精事為一圗纍至於百號曰羣書百考大愚吕公閲其禹貢圗考曰是書可謂集先儒之大成矣揭其圗請申言之而坐諸生以聽且曰以所能者教人所不能者受教于人理之所在𥘉無彼此先生亦樂為之盡亹亹不倦先生于文中子人不里居地不井授終苟道一章屢歎息而言周禮太平之書于時九等授田家給人足泉府之設特以備凶荒未必常用也况是書體有本末用有先後若大綱不舉而獨行所謂國服為息者是猶取名方中百品之一而服之及其害人則曰是藥出于名方云爾常恨熙寧諸賢未有如此辨之者故百考之書于成周之授地賦兵封國制軍增地制域畒步溝洫稼穡貢賦特詳焉亦足見先生之學可措于實用而非虛談矣先生又嘗遍遊江淮縱觀六朝故迹南北形勝詢諸故老質諸史諜而得其成敗廢興之故歷歷如指諸掌是豈徒以登臨之適為快也哉先生之教人每謂下學上逹自有次第不先其近者小者而驟語其逺者大者後生淺薄學益不實故于小學尤所留意來學者恆以百數必先授以曲禮內則少儀鄉黨諸篇使于日用之間與義理相發眀而知道之與器未始相離也先生論古軍制纎悉備具而不欲人讀兵書曰胸中無論語孟子為權衡遽聞譎詐之言則先入者為主害心術矣此先生之所學與所以教之大方也先生世居婺之義烏父孝儼篤行君子母樓氏禱于石姥山而生先生骨秀神聳蚤有器識事親孝謹處兄弟子姪均一無間鄉閭有事輒以身任之非公事不至官府縣長吏之賢者必造而問政言無所隱人有隂𬒳其賜而不知者里居之日與馬公師文孫公居敬為同志永嘉戴公少望聞先生名奉贄願交大愚在朝行數稱先生之文學行義彭公子夀章公茂獻葉公正則吳公德夫汪公季路黃公文叔黃公商伯無不推敬文叔欲與同列奏輔以官知先生不可屈乃止惟館于商伯最久賔主之間日以義利相針切不為無益語它所與遊亦皆顯人至其為臺諌為執政則絶不與通先生既不有仕祿又不屑治生業商伯持浙西庾節遺以錢五十萬先生悉散于宗族鄰里一無所留晚益貧郡守孟公聞而歎曰不可使賢者飢餓於我土地乃輟俸資倡其親友為買田築室於東陽之泉村而先生遂為東陽人於是大愚及一時名公皆在黨籍相繼放逐先生亦杜門不復出矣先生好為詩間逺右淡有陶靖節邵康節之風焉子七人皆克紹其家學大東尤敦慤克肖其德大原試漕闈為本經第一先生既遣猶子定受業朱文公之門得其微言奧旨歸與諸弟共講而大原亦從慈湖楊公遊楊公亟稱之程子謂君子教人有序非先傳以近者小者而後不教以逺者大者先生之所以教皆程子之遺意也先生年六十有八以嘉定八年卒于家後百二十年曽孫師蒙師佐懼人易而世疏乃即家建祠歲時以享祀燕私合其族祭主於先生者始遷之祖也上援其父者明有所本也下及其子者示有所傳也堂成於重紀至元之二年師蒙巳卒因以侑食堂師蒙作也祠室堂軒為間者三翼以齋廬為間者六有田三十畒子孫更掌之以供祠事師蒙兄子似翁將圖其永久爰以狀來謁記且曰祠之作本以寓子孫追逺之意而邑之士友以為古者鄉先生沒則祠於社其禮久闕弗講乃相率為文以祭冝率聮得書溍序其興作而首著先生學術源流之懿者庶幾後人知所矜式也來者能聞風而興起焉則是祠也有功于名教甚大奚止可以合其族而巳乃如其言併書之朱氏祭田記婺義烏赤岸之有朱氏始於漢槐里令雲之七世孫晉臨海太守泛又二世而建威將軍禮遂廟食其鄉郡志以建威為金威語之訛耳自是又若干世乃至三府君者有田以祭始於府君也府君諱良佑宋紹興間𥘉置旁舍常稔之田三十畒有竒合為一區而儲其所入以給孝祀燕私之事府君殁有子三人曰孟眀曰鄉貢進士中曰季龍同繼其禰而莫適為宗列屋聚居謂之三宅凡田事三宅歲迭掌之祭主於府君而三宅之子孫咸以次祔食不以世數毀為親疏逺邇之别族大以衍位序日繁患夫褻而弗專且難為繼乃稍裁定著其成規每歲以日北至與新穀之既升蕆事者二由府君上而祖考本所自出也下而三子則三宅之所祖也正配位總十有四皆世世不遷府君之孫之曽孫而為掌田事者之祖考乃得從腏食歲終合享者一亦惟掌田事之家在祖考行者乃與焉三歲則適遍于三宅玄孫亦與合食而斷以三十年為一世滿一世輒止袒免而下則絶而弗與墓祭之降殺亦以是為差懼逺者之易忘則用先儒家禮以立春日祀臨海而侑以建威慮親盡則情盡則有歲時之序拜而三宅之長幼無不在列此其大略也府君五世孫震亨以書諗于溍曰願有述刻置先墓之左庶俾後之人無墮其成故朝列大夫婺州路總管府治中致仕叔麒于府君為曽孫溍之從祖姑歸焉而震復與溍有文字之雅不敢以不敏辭惟府君去二代盛時已久又不有大夫士之位田祿弗及而能因地之利以報其親仁之至也宗法廟制不得行乎其家而能因人情為之節文以屬其族義之盡也數世之後以文學政事顯融于時者既巳流光奕葉而其處者亦往往𬒳服儒術馳英聲于士林修其已成之業而承其所欲為之志仁義之澤未艾也楚茨之首章曰自昔何為我藝黍稷府君之經始勤矣其卒章曰子子孫孫勿替引之三宅之嗣人尚慎其終以延𥙿于無窮哉金華黃先生文集卷第十四
