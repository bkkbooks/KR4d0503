body:
  text: 黄學士文集序翰林侍講學士金華黄先生文集総四十三􅃃其初稾三􅃃則未第時作監察御史臨川危素􅀁編次續稾四十􅃃則皆豋苐後作門人王生宋生所編次也先生之文章刮劘澡雪如眀珠白璧藉之繅綺讀之者但見其光瑩而含蓄華縟而粹温令人愛玩嘆息之不已而不知其致力之勤用心之苦也故其見諸朝廷簡册之紀載山林泉石之詠謌無不各得其體而極其趣以自成一家之言不既甚盛矣乎余甞論之文章與世運同為盛衰或百年或數十年􅂺一見焉先生當科目久􅆸之餘文治復興之日淂大肆力於為已之學以擅名于海内雖其超見卓識有以異於人其亦適值也運之一盛也耶譬諸山川之風氣草木之花實息者必復悴者必榮盖亦理埶之必然者夫豈偶然而已㦲先生領延祐甲寅郷薦先文靖公實為考官扵師泰有契家之好其後同居史舘又同侍經筵交詃為􅀹篤比㢘問閩南過金華得先生之集扵王生故叙而授之三山學官俾刻梓以恵耒學先生豋進士苐授将仕郎台州寍海縣丞􅊗石堰塲􅁥運諸暨州判官浮沈州縣㡬二十年始入翰林應奉文字尋丁外艱服除改􅀦子愽士居六年以太夫人春秋髙乞外補遂提舉江淛儒學年六十有四竟辤禄歸養以中順大夫秘書少􅁥致仕及終大夫人喪年已踰七十矣復被召為翰林直學士兼經筵官陞侍講學士中奉大夫同知經筵事􅁆告老不許乆廼得􅒜去仐年七十又九猶康強善飲啖援筆騁馳如壮􅀊云至正十五年十月既望朝􅄆大夫福建閩海道肅政㢘訪使宣城貢師泰序
