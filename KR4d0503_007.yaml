body:
  text: 命相詔國家大事非獨運之所能成宰相得賢則百度莫不具舉朕臨御歲久望治日深聿資夾輔之功庸致圗新之效惟時並命允穆僉言中書左丞相朵兒只雅量足以鎮浮大器足以任重夙由世胄誕紹王封恩威交著於一方終始殆逾于十載爰躋榮於台鼎荐作屏於藩維暨入總於憲綱遂延登於揆席克膺眷倚益茂聲猷屬以虛位而詢于在廷無若舊人之可與共政載加進拜式聳具瞻中書平章政事太平敦實而粹和周通而宏敏練逹朝廷之大體光昭祖父之遺休念其帝室之勳臣賜以國人之氏族肅特風紀密贊事樞宜升廊廟之崇俾展經綸之藴亶為盛舉匪出序遷今命朵兒只為開府儀同三司上柱國録軍國重事中書右丞相監修國史太平為開府儀同三司上柱國録軍國重事中書左丞相于以進退乎人才于以弛張乎政理凡制詔號令錢糧選法刑名造作干中書政務隔越奏請者以違制論便民事冝畫列于后於戲左右厥辟尚賴同寅而協恭小大攸司各冝奉法而遵職助成治化仰副至懷故兹詔示想宜知悉招諭雲南土官等詔朕誕膺景命君臨萬邦聲教所通無間逺邇眷此西南之地實我祖宗之民叛賊死可伐敢冒刑章作為弗靖侵掠境土戕害至人憫其狂愚纍加招諭本賊執迷負固罔有悛心爰命將而出師以恭行乎天討指其巢穴取彼渠魁尚慮諸路甸寨土官軍民人等或受制于凶徒相扇搖而構亂原其𥘉志匪出同謀既處危疑遂懷反側庸伸訓告俾亟來歸詔書到日除死可伐不赦外應有𬒳死可伐脅從詿誤之人納欵出降者並免本罪各安家業元有官者悉復其官能生擒死可伐及殺獲其首級者具以名聞優加賞賚升擢其死可伐族屬能生擒殺獲本賊者命為本路土官該載不盡事理令總兵官議擬申聞施行於戲咸與惟新式布寬條而示信自求多福勉思後效以圗功咨尓逺人體兹至意制二程子加封制朕惟三千之徒莫先顔氏眷言往哲式克似之故河南伯程皓體備至和躬承絶學元氣之會鍾於獨得聖人之道賴以復眀繄百世之真儒豈追崇之可後爰搜盛典爵以上公於戲緬想德容儼揚休而山立聿新禮命孚渙號以風行服此寵靈益綿道統可加封豫國公主者施行朕惟孟氏以來千有餘歲不見先覺孰任其承故伊陽伯程頥本諸躬行動有師法謂𥘉學入德始乎致知格物謂隨時從道在乎觀象玩辭遺書雖見于表章異數尚稽於封册胙之大國庸示褒崇於戲規矩凖繩庶有存於矜式火龍黼黻匪徒侈於儀章懋相人文以對休命可加封洛國公主者施行也列里术兀追封雲安王制天佑皇家既誕膺於正統禮嚴毋族爰申錫于崇封祗率舊儀亶惟異數豐國公故祖父也列里术兀英材茂挺盛德昭宣朝夕恪恭秉純誠於帷幄子孫昌熾開積慶于宫闈推恩及於外家列爵髙於常等于戲遺音日逺永懷世祚之隆新社雲安尚服王章之寵我之自出朕豈有私可追封雲安王也列里术兀妻丑哥追封雲安王夫人制朕誕膺丕緒興懷母后之家祗若舊章并錫王封之貴眷其中饋盍嫓上儀豐國公故祖母丑哥寬𥙿在躬柔嘉維則芝蘭盈室鍾秀異於雙枝蘋藻加籩相潔齋於宗事既百年而偕老極一品以同封於戲列爵推尊莫若諸侯王之重傳家惟永保兹千乘國之榮尚其幽靈服此休命可追封雲安王夫人帖木迭兒追封威寧王制中天下而立爰昭德以展親外王父之尊庸推恩而錫爵德之盛者禮亦冝之豐國公故父帖木迭兒正直而純眀溫恭而敦厚受天之慶嬪宗祀於宫中生朕之躬建母儀於天下慨寒泉之莫及斯沛渥之冝頒于戲有畏而威儼衮衣而來格其寧惟永與磐石以俱安惟時英爽之靈服此便蕃之數可追封威寧王帖木迭兒妻伯亦忒迷失追封威寧王夫人制邦國之興必資賢於內助后妃之德常推本於母家惟數之隆於斯為盛豐國公故母伯亦忒迷失出乎令族嬪此慶門生我大任實稟思齊之教育乎菲德遂膺成命之隆疏恩式考于彜章配德同躋於極貴於戲介楅于其王母赫乎象服之冝積慶及其子孫永贊鴻圗之盛尚其幽爽歆此寵光可追封威寧王夫人純直海加贈宣忠協力崇仁佐運功臣太傅開府儀同三司上柱國追封定西王改諡武穆制翊扶興運聿懷佐命之臣申錫徽章庸盡勸忠之道眷言英傑夙著勳勞雖寵渥之巳加顧褒崇之未至載楊顯册追賁幽扄故益都行省都逹魯花赤贈推忠宣力功臣金𬗋光祿大夫太尉上柱國追封溫國公諡忠襄珊竹純直海器量恢弘材資驍勇夷強宗於朔漠覆勍敵于西陲護諸將而濯彼南征建大閫而保兹東夏奔走禦侮蓋無戰而不從經營告成斯有功而必報逮移鎮于關陕旋留戍於覃懷涉歷艱危削平僣叛克謹殺降之戒益廣好生之心全活不啻於千人爵位冝超於五等錮銅斫􅃮既陟配於山陵胙土苴茅盍肇開于王社躋榮帝傅視秩宰司考行易名疇功進號於戲龍光下𬒳示恩數之非常馬鬛故封嗟爽靈之如在欽承不昧垂𥙿無窮可贈宣忠協力崇仁佐運功臣太傅開府儀同三司上柱國追封定西王諡武穆純直海妻喜禮伯倫加封定西王夫人制朕念祖宗開創之勤覽將帥勳勞之盛義弗遺於故舊恩允出於尋常矧伉儷之相成雖間關而弗避冝並加于異渥庸少慰于重泉故益都行省都逹魯花赤今贈宣忠協力崇仁佐運功臣太傅開府儀同三司上柱國追封定西王諡武穆珊竹純直海妻溫國夫人喜禮伯倫秉德柔嘉作配英傑警戒式資於內助忠忱克蕳于上知授鉞專征瓜牙之任彌重同舟共濟肘腋之變遽生脫良人於萬死之中殄叛寇於一鼓之頃訖使軍聲之復振豈惟婦道之可稱爰疏大國之封俾正小君之號於戲脂田載啓貴雖本於從夫彤管特書名永垂於信史欽豫時命相爾有家可追封定西王夫人也速䚟兒贈推忠宣力守正佐理功臣太傳開府儀同三司上柱國追封安慶王諡武襄制朕恭膺眷佑纘鴻業於宗祊緬想賢勞考舊章於盟府有功必報雖逺不忘矧兹文武之宏材為我祖宗之良弼嗟光靈之如在何册禮之久稽冝示褒崇用揚休烈故榮祿大夫江浙等處行中書省平章政事也速䚟兒性資沉毅器識弘通胸襟韜略之竒𬒳服文儒之雅夙陪禁近罄忠忱方宰臣稟成算以專征從伯氏提偏師而破敵樓船飛渡迄成百戰之功金鼎調元遂贊萬機之務屬藩方之弗靖扈清蹕以親行運籌帷幄之餘歸衮廟堂之上力扶凋瘵顯斥權姦惟東南勝國之故墟資將相重臣之坐鎮既已風行而草偃其如木壞而山頽慨念夫間世之英徒起不同時之嘆峻躋品位申慰泉扄於戲超五等以疏封亶為異數節一惠以定諡肇錫嘉稱精爽有知欽承無斁可特贈推忠宣力守正佐理功臣太傅開府儀同三司上柱國追封安慶王諡武襄也速䚟兒妻忽都魯追封安慶王夫人制事君以忠逮至久逺而彌著正位乎內必能夙夜以相成爰加錫命之隆式表從夫之貴故榮祿大夫江浙等處行中書省平章政事今贈推忠宣力守正佐理功臣太傅開府儀同三司上柱國追封安慶王諡武襄也速䚟兒妻忽都魯育秀名閥作配元臣允武允文茂著經綸之業冝家冝室益崇伉儷之儀嗟歲序之屢更念褒封之未舉肇新茂典稽合彛章於戲嫓德垂休既有光于盛烈娠賢濟美斯必享於榮名靈其歆兹沒不忘矣可追封安慶王夫人阿里海牙追封江陵王制經營四方肇建萬全之䇿弼成五服式開一統之期何賞典之已行而儀文之未稱覽外朝之上奏稽􅉀府之故藏啓壤地以增封錫贊書而告第故光祿大夫湖廣等處行中書省左丞相贈佐平南紀宣力功臣開府儀同三司太師上柱國追封楚國公諡武定阿里海牙材資敏逹器量沉雄由侍從之邇聮預圗回之廟算佐上相專征而逺略致敵人納疑以來歸龍􅋮飛渡於奔流虎旅留屯於分閫據南土要衝之會絶東兵後顧之虞降旗果出于三吳傳檄遍行於百粵犀甲雕戈之軍容益振黃旗𬗋蓋之王氣盡銷輿圗咸入于版曺部曲並登於政路峻躋鼎席臨鎮藩維曺參之功名雖若次於蕭相國去病之親貴固冝比於衛將軍嗟有司久失敷陳在今日盍加表異是用舉國家彛章之舊極人臣品秩之崇於戲超五等以疏恩今王亦爵冠百僚而序位為帝者師尚其有知足以無憾可特贈宣威服逺輔德翊運功臣開府儀同三司太師上柱國追封江陵王仍諡武定阿里海牙妻帖力并郝氏追封江陵王夫人制朕緬想舊臣誕揚新命昭示非常之典均頒及內之章故光祿大夫湖廣等處行中書省左丞相今贈宣威服逺輔德翊運功臣開府儀同三司太師上柱國追封江陵王諡武定阿里海牙妻帖力并郝氏相其良人為時碩輔由室家佽助之益當朝廷委任之隆恭稟睿謀克成偉績鉤膺四牡備酬勳伐之勞副笄六珈彌著閫儀之盛厥惟賢配冝示寵褒于戲事君以忠既疏恩而啓慶從夫而貴尚嫓德以垂休冥漠有知欽承不昧可並追封江陵王夫人帖木兒塔失贈太師中書右丞相追封兾寧王諡文忠制任人共政方隆巖石之瞻有命自天俄示台星之拆眷言該輔奄就考終人興珍瘁之嗟國有褒崇之禮故開府儀同三司上柱國録軍國重事中書左丞相帖木兒塔失純眀而博碩直亮而𥙿和稟間世之英姿際清朝之景運惟乃烈考事我武皇出從緑車撫六軍而臨絶域入居黃闥宅百揆而熙庶工克生後賢丕承先業夙由華胄久侍嚴宸備著忠勤屢更委任秉事樞於西府揔憲度於中臺暨踐𩔶於政途遂延登于宰席愛君有魏徴之直諌憂國有房喬之善謀援聖經而罄竭於敷陳刋舊史而申眀于監戒謂逺人之患難貴於存恤以全大體謂先朝之輔佐失於操切以圗近功至若虛庫庾以濟凶荒薄租賦以蘇疲瘵復科舉以通賢路招遺逸以振士風凡爾告之嘉猷皆朕志之先定弗憗遺於一老俾贊襄于萬幾覽其訃音為之隕涕是用參稽彛典並錫徽章循故秩以視儀推元功而進號峻躋右弼超冠三師加以殊勳賜之美諡疏王封於名郡揚制册於廣廷敻絶前聞亶為異數於戲眀良慶會莫盡展于經綸終始哀榮尚有光於窀穸爽靈不昧寵渥是承可贈開誠濟美同德翊運功臣太師開府儀同三司上柱國中書右丞相追封兾寧王諡文忠帖木兒塔失妻曲出封兾寧王夫人制密章下賁式昭佐理之功象服追崇庸舉從夫之典哀榮斯極今古所希故中書左丞相贈開誠濟美同德翊運功臣太師開府儀同三司上柱國中書右丞相追封兾寧王諡文忠帖木免塔失妻曲出淑慎而惠慈柔嘉而貞順禔身禮範嫓德相門凡謀猷入告之忠皆警戒相成之力雖婦言不出於壼非可強名然王化必有其基莫先正始念黃閣清風之已逺憫佳城白日之俱歸爰考故常載頒新渥於戲疏封異姓既肇啓於大邦進號小君庸增光於同穴兹惟顯寵尚克欽承可追封兾寧王夫人尚家奴封東平王制志士無求生以害仁不為苟合公論必須久而後定冝示眀揚乃眷勳賢素懷忠直橫遭汙衊良用䀌傷爰俾率於彛章誕頒行於恤典故開府儀同三司中政院使尚家奴周通而醇謹果敢而沈雄家傳河山之􅉀身際風雲之會入趨禁闥侍間燕於穆清出從撫軍宣皇威於朔漠克膺上眷遂秉鴻樞總內壼之政權長潛藩之衛士展也近臣之選屬兹貴胄之英暨先朝逺狩于龍荒奉中宫肅登於鳯輦備嘗險阻靡憚馳驅幸衮衣之來歸驚乘與之不駕力排群議誤抵深文肆豫拊髀而興嗟念爾忘身而徇義是用疇元功而進號還故秩于視儀超五等以疏恩冠三師而序位考諸諡法褒以制詞極於哀榮全其終始於戲焚丹書而去籍盡滌前愆錫盩綬以啓封亶為異數尚其精爽服此寵靈可贈竭忠宣力守義著節功臣太師開府儀同三司上柱國追封東平王諡貞愍尚家奴妻也先忽都封東平王夫人制臣事君以忠既頒行于恤典婦從夫而貴冝並受於褒封錫以命書賁于丘隧故開府儀同三司上柱國追封東平王尚家奴妻也先忽都育秀名族作配髙門力贊其夫克秉純誠之德盡瘁于國迄成俊偉之功方𩔶踐於要途何遽嬰於法網遭家多難守志靡它逮兹公道之復眀嗟尓重泉之永閟推恩所及視昔有加於戲玄衮黼裳既極維垣之貴魚軒翟茀尚增同穴之光沒而不忘服之無斁可追封東平王夫人只兒哈郎封威寧王制朕總攬權綱修眀憲度舉直錯枉視亡猶存眷言阿保之舊臣有大勳庸於帝室弗為朋附卒墮中傷既昭雪其非辜冝渙頒於異渥故資德大夫也可札魯忽赤只兒哈郎材資英鋭志慮精深侍衛武皇久習邊陲之事奉迎眀考灼知曆數之歸縱橫制變靡失於先幾奔走禦侮備殫於勞勩綽著成績茂蕳殊知矧乃名門克有賢配出入潛邸左右眇躬維時煦育之恩多尓扶携之助逮判司於宗寺預詢謀於路朝不苟動乎浮言遂橫罹乎酷罰嗟重泉之掩憾肆當寧而興懷是用即乃父之故封授真王之新命視秩宰司之貴躋班帝傳之崇錫號加勳易名定諡於戲百身莫贖從增既往之悲一品追榮兹實非常之典尚其冥漠服此休嘉可贈輸忠保衛守正效節功臣太傅開府儀同三司上柱國追封威寧王諡襄愍只兒哈郎妻申台封威寧王夫人制朕照臨所及故舊不遺眷言保姆之賢庸俾從夫之爵載揚制册追賁泉扄故資德大夫也可札魯忽赤贈輸忠保衛守正效節功臣太傅開府儀同三司上柱國追封威寧王只兒哈郎妻申台秉德溫良處心慈惠作配君子善警戒以相成撫育沖人謹扶持而靡懈矧能勸以南山殷雷之義深有助乎咸池洗日之功遭事變之無常居厄窮而不憫爰加渙渥式慰幽潛於戲象服有儀尚克光膺於新命綸言誕布匪徒申勸於舊勞冥漠有知欽承不昧可追封威靈王夫人張德隆授玄教大宗師制朕靈承上帝體大道以宅中緬慕先朝資至人而贊化聿求宿望誕紹正傳既允協於僉言冝眀􅏡於顯册沖真眀逺玄靜真人張德隆育秀紳緌之華閥遊神籖笈之真詮過庭夙得於異聞樂地兼通於名教翔千仞而後集入奉燕間御六氣以時行出陪扈從侍祠上方則克勤於毖祀謁欵介丘則靡憚於駿奔茂輯純禧荐膺殊遇矧乃伯父事我世皇扶興運於方隆播玄功於不宰延洪四世精白一心惟儉惟慈是繼是述圭璋令聞久為法器之儲梁棟臣材當荷宗門之寄覽奏章之來上考系緒之相仍庸升陟於仙階俾嗣登于師席併稽故實加峻文班以重表儀以昭纂序于戲疏恩最品肇錫爾非常之名迪德前猷式佐我無為之治增崇道紀祗對天休可授特進上卿玄教大宗師沖真眀逺玄靜演教大真人揔攝江淮荆襄道教知集賢院道教事宜令張德隆準此天妃林氏父母加封制天降眀靈之德有開必先人資利涉之功無逺弗屆渙頒書贊敷告祠庭靈慈廟護國庇民廣濟福惠眀著天妃父積慶侯林字母顯慶夫人王氏丕擁嘉祥誕生英淑揚乃神休於不測相豫漕事於方殷肹蠁冥通赫若虹光之下燭扶搖順濟恬然鯨海之安流川祗效佽助之勤京庾積委輸之冨聿嚴昭報夙著彛章永惟啓慶之源冝有追榮之數覽宰臣之上奏訂禮寺之舊儀俾進陟於號名用增崇於本始於戲百年廟食率遵蕆祀之常七命侯封特表貤恩之盛益施隂祐茂對寵褒積慶侯林孚可加封種德積慶侯顯慶夫人王氏可加封育聖顯慶夫人主者施行表翰林國史院賀正旦表一氣洪鈞肇協始和之序九天黃道肆陳元會之儀寰宇均歡臣鄰胥慶欽惟皇帝陛下堯神廣運湯德懋昭月竁天池揚風塵之號令蘭臺石室煥雲漢之文章茂對三陽誕膺百福臣等叨榮鼇禁簉迹鵷班黻黼丹青莫寫化工之妙梯航玉帛惟觀夀域之同國子監賀正旦表玄枵紀歲新曆象以更端太極受朝肅儀文而稱慶覆臨所暨抃蹈惟均欽惟皇帝陛下駿惠先猷丕昭嗣服體元建號道允協於重華備物隆名孝益嚴于長樂克承天貺式迓春祺臣等忝職教庠參陪班序鴻鈞一氣難名有造之仁眉壽萬年申衍無疆之祚七政旋杓回陽和於蒼陸一人當寧展朝會於彤庭凡在生成實同慶賴欽惟皇帝陛下宅心至正撫運重熙春育海涵播仁聲于庶類風行雷動敷治象于多方候應泰來祥開履吉臣等忝司六學獲旅千官瞻就日之清光載逢昌旦祝齊天之寶算永固丕圗中書省賀正旦表歲臨析木藹瑞氣於神臯天近太微赫清光於黼座三朝嘉會萬福來同欽惟皇帝陛下凝命上玄宅心至正典學與春秋而俱冨知人侔日月以並眀震器夙成俾橫經而就傳謙光下施加備物以展親惠綏群黎函蒙慶澤臣等忝司政柄獲領朝紳金鉉調元莫贊皇猷之盛玉巵稱夀願增寶算之長國子監賀聖節表虹流華渚肇開出震之祥龍見中星式應純乾之候三宫均慶百辟騰歡欽惟皇帝陛下柢遹文謨丕隆舜孝雲行雨施等天地以無為日就月將與春秋而俱冨斂時五福賴及萬方臣等忝職儒黌欣逢瑞節播南薰之至化鈞奏九成瞻北極之常尊嵩呼三祝頒度眀堂允協乘離之候紀祥甲觀肇臨載震之期喜溢大庭歡騰同宇欽惟皇帝陛下宅心淵粹凝命穆清長樂承顔昭聖人之孝治金華勸講開天下之文明茂對正陽益增神䇿臣等忝司教事欣覩朝儀律應薰絃並奏九韶之舞香浮合殿同稱萬夀之觴寶軫歌風更化絃而出治璿樞繞電屇瑞節以受朝率土歡心昌辰盛典欽惟皇帝陛下丕繩祖武誕舉皇綱照侔日月之眀知人則哲量等乾坤之大御衆以寬庸伸報上之誠同致後天之祝臣等忝司占畢獲旅縉紳金鑑效規莫助維新之政玉巵稱慶願綏有永之年中書省賀聖節表歲舍在庚應虹流之紀瑞月臨于巳瞻龍御之當陽縟典載行輿情胥慶欽惟皇帝陛下居冨盛之業撫熙眀之期地重青宫崇教事以端國本天開華閣陳古訓以宣人文茂對嘉辰荐膺多祉臣等忝居政府肅領朝儀接武泰階莫贊無為之化發祥神策願符有道之長國子監賀册太皇太后表德為聖人治有光於舜孝養以天下禮益謹於漢儀備物隆名熙朝盛典欽惟皇帝陛下誕膺駿命寅御丕圗黼座端臨念皇慈之保佑綸言播告極鴻號之尊崇事逺邁于古先慶旁流於中外臣等幸專教席獲旅廷紳傾向日之微忱遙瞻廣內祝齊天之睿算永奉慈闈國子監賀册皇后表顯册誕􅏡肇正宫闈之號鴻圗增重益隆宗社之基慶輯邦家歡均華夏欽惟皇帝陛下道尊皇極治本人倫與日俱新剛健允符於乾德自天作合順承式表于坤儀命出楓廷禮成椒掖臣等濫司教事欣覩彜章關睢正始之風四方來賀既醉太平之福萬夀無疆國子監賀太皇太后正旦表獻歲發春肇正孟陬之序隆名備物載新長樂之儀嘉與外廷肅稱元會欽惟太皇太后殿下道光內治德配先朝尊極宫闈誕舉推崇之禮慶流宗社彌章擁佑之功履兹端辰裒時多祉臣等忝司教育獲預班聮絳闕天開恭展三朝之拜瑶池日永歡騰萬嵗之呼國子監上太皇太后賀册皇后表禮行當寧丕昭文定之祥尊極重闈茂衍徽音之嗣歡騰禁掖喜浹寰區欽惟太皇太后殿下德備儉慈功參覆載承先朝之付託克協孫謀建中壼之表儀式資婦順流輝華於椒屋增鞏固於蘿圗臣等忝職上庠欣逢盛典二南正始大義本於家人萬夀無疆介福歸于王母箋翰林國史院賀皇后正旦箋春回椒掖茂迎百福之祥天近楓宸均備三朝之禮歡騰廣內喜溢羣工敬惟皇后殿下淑德純全徽音夙著中襲黃裳之美恪謹柔儀上侔𬗋極之尊永綏吉履肇臨榖旦並介蕃禧臣等忝職文詞獲陪班序化行宫壼願新彤管之書慶衍邦家敬上玉巵之夀中書省賀皇后正旦箋璣衡密運回玉律于青陽翬翟令儀應軒星於𬗋極慶行中壼喜溢大廷敬惟皇后殿下德並神眀功參覆載體家人之正位肇立化基志卷耳之求賢助成治道春生穀旦天錫蕃禧臣某等庀職宰司簉班元會載新椒頌展盛禮於三朝永固蘿圗登齊年于萬夀國子監賀皇后受册箋嘉禮備成正柔儀於內壼隆名載舉孚大號於外廷治首六宫歡形八表敬惟皇后殿下性全淑哲德並神眀玉册金相茂輯彌文之盛翬衣䄖翟光昭象服之崇稽合舊章亶為巨册臣等叨居黌序獲綴朝班瞻北極之四星祥開吉旦祝南山之萬夀慶衍齊年針朋樂齋針伯陽甫取孔門記言名齋居之室曰朋樂豫竊嘉其能得朋而懼夫樂之或過其節也為之針曰天壤之間並生者人矧曰同類其有弗親孰豫之從來之紛若匪善何信匪信何樂相古易象示人以朋母敢適莫惟德是徴復而朋來實用無咎坤以喪朋厥慶終有一陽之至我其俟焉三隂之聚我其舍旃豈兹記言與易殊指便辟佞柔既曰損矣二人同心其樂也康比之匪人其樂也荒猗伯陽甫式謹爾類交遊司規敢告閽隸銘勤有堂銘皇錫下人展也良貴能者守之罔敢怠棄惟勤為常非有為異反身而誠萬物咸備其勤斯何夭夀以之雖休勿休伊誠之思其有斯何匪我也私不物於物而誠之為孰劬而躬閔勉朝夕封吝殖驕執為已得一元默運其生職職天德之修人道之極猗君之為厥志允臧式敬爾承勿助勿忘間邦存誠充實輝光我曷振之勒銘兹堂兼善齊銘墨貴兼愛儒者擯之詎曰此道我之得私必由其本以及其支相古先民孰為我師莫窮匪顔莫逹匪伊何志何學朝斯夕斯乾之善世則罔敢知坤之積善尚其孳孳止也以所動也以時毋慕千里忽於毫釐仁如夷吾或羞其卑為善有術視我銘詩腴晦齋銘王君仲致以腴晦名其齋蓋有取乎考亭朱子冠而字之祝辭云爾夫所謂人晦于身神眀內腴者復而通也今乃援其辭而左之者通而復也仲致來徴銘為之銘曰惟皇播物終始一誠屈伸相推乃色乃形有出于幽以豐而亨有入斯息眀夷之貞而通而復與時偕行展也王君斂其華英退藏于密以觀其生與造物者遊神之廷曰豫庶幾天之性情我曷相之式彰兹銘恆德齋銘易之為義隨時變通有不變者確乎其中是曰恆性人之固有充為恆德不息則久聖人之道久而化成由其不息是之謂恆惟君法天偕行偕極惟臣承君咸有一德繄公之先國之元臣篤生後賢左右聖君吾儕小人朝不及夕夫孰如公自強不息體之既立其用必行措諸事業乃恆之亨允懷于兹益謹其度與國同休以永終譽興讓堂銘何官貞立起進士官七品法當封父母及妻父以讓于其相妻以讓于其祖母有司如其請以聞貤恩既行乃扁所居之堂曰興讓名人巨公樂道其事紀載而誦詠焉君出以示豫因系之以銘曰讓之為義推巳所有木水本原則有所受子承其考婦繼其姑家之積慶匪我有餘嗟嗟末俗借鋤取帚孰視爾民俾歸于厚施由親始千乘可輕義以起禮善不近名皇仁在上孝子不匱奕其龍光恩榮備至爰建稱號樹之風聲一家之讓國人其興作為銘詩薦此樂石匪私其家維以勸德方齋銘鄱陽胡君以方齋扁讀書之室而俾其子益來徴銘為之銘曰輿之方輪以圓而相資鑿之方枘以圎而相違天下之方盡於五寸之矩所不能盡者物情之不齊是故君子方以正巳之度圎以任物之宜主至靜以為德不自毀于腓隨匪惡圎而喜方諒所秉之莫移爾息爾藏矩範在兹無矜而名尚允蹈之圎硯銘翼之家藏王使君所貽圎硯有白文貫其腹銘曰黑之守處也久白之不涅歸也潔青石硯銘雪竇方丈所蓄青石硯德夀故物也銘曰匪琥其白匪璋其赤夫蒼蒼者天之正色韞櫝而藏守之以黑母曰兹宋之隕石也息菴銘上人允兹扁其菴曰息因以自號蓋扁以彰所息之處號以表能息之人能所相為無窮吾未見其息也上人來徴銘為之銘曰謂菴非人孰纍於名謂人非菴名孰與嬰所息者境能息者智菴耶人耶依正不二剎那之頃能所雙三十劫何短一息何長勿生疲勞而止中路咄兹草菴非汝住處朽室銘朽室者上公楩公之所居也浮屠氏之法衣壞色食瓦鐡其以朽室為居固宜然豫觀一切世間成住壞空非有定相朽與不朽即涉二邊假名無實何取何捨輒因安陽韓先生之言而申繹之以為銘曰身如虛空不係於物出三界家寧事一室善哉上人此休歇處惟適之安隨其所遇嗒焉枯坐兀若稿木敗壁頽簷容膝而足因緣幻境空華露電茫茫火宅終歸壞散有弊者形不朽者理昔本非成今亦無毀入如來堂應如是住金剛堅強永保貞固止足齋銘有為老氏之學者四眀陳君扁所居室曰止足豫懼其務內而忘外取小而遺大也為之銘以充其志焉銘曰人於兩間如海一粟萬物備矣匪我也獨昧者失之欲乃逐逐反身而樂伊誠之復道何逺而唯止斯足勿安一枝而甘滿腹顧曰我道無殆無辱銘以申之豫告非瀆尊德齋銘汝南蔣士權伯衡有志操力學繢文尤長于蒃隸武夷杜徴君愛之為作尊德齋扁其讀書之室金華黃溍為之銘曰天降生人曰有眀德君子得之有物有則保飬所賦敬共奉持外欲弗肆內德弗墮尊德樂義所尊在人尊德間學所尊在身道立德尊卓哉先覺惟伯衡氏究心聖學存存齋畫像贊孔氏之大宗曰存齋先生宋季襲衍聖之封已久國朝至元間召赴闕俾仍嗣襲先生力辭遂以國子祭酒提舉浙東學校世平於先生兄弟也惜其以存自號而不能欽承上意存其封爵因自稱曰存存齋具屬豫贊其畫像云東家之傳兮有本有支弗居其名兮匪德之衰德則可久兮可止者時猶有天爵兮繄我所縻金石絲竹兮家聲之遺有能宗豫兮文不在兹表以丹青兮展也令儀巍然靈光兮人皆仰之程楚公小像贊故楚國文憲程公以宏材碩學𬒳遇世祖歷事四朝為時名臣延祐紀元之𥘉溍舉進士至亰師因拜公于安貞里第後三十有三年溍起自休致入直詞林則公捐館巳久幸從公之孫世亰獲覩公遺像撫時運之推遷慨前修之莫作贊以一辭非敢曰美盛德之形容聊志歲月云爾􅐌曰褐衣角巾瀟灑出塵仰羡夫消搖于丘壑緬想其際會於風雲覬一言之寤意罄崇論而敷陳灼灼乎龜蓍之可覆洋洋乎魚水之相親激揚奮厲以紀綱乎憲度鋪張潤色以黼黻乎人文雖不以進退百官為職未始一日忘吐握之勤凡楚材之晉用皆藥籠之儲珍咸懷誠而秉忠共尊主而庇民奚必坐乎廟堂之上然後大展其經綸嗟儀刑之巳逺儼丰彩之如新古稱逹賢者有後是將在其來昆學軒贊器必琢而後成道必學而後知玉之不琢不失其為玉人之不學不失其為人也幾希是以有志之士莫不務學而求師虛以為受教之地眀以察進善之幾蓋深造以道固貴於升堂而入室取其虛眀則於軒為冝居焉遊焉朝斯夕斯嚮晦宴息尚要其歸請為學軒之贊亂以心齋之詩李御史畫像贊質厚而豐神完而充生乎相閥𥘉無貴驕之色立乎朝著常存肅穆之容挺拔于翠竹碧梧之表泳遊于祥雲麗日之中挹其光儀者猶可想見夫喬木世臣黃閣清風也蕭侯畫像贊侃侃之色暨暨之容垂紳正笏不動聲氣而精神隱然折萬里之衝蔚乎豹變之文彪于外而弸于中溫其如玉穆如清風望其餘光者孰知為萬夫之雄也耶瑞像贊仁和孫翁誦法華經三十年感異僧遺以一石久之忽有觀世音大士像涌現其中見者莫不歎駭以為殊勝希有之事為之贊曰三界之中萬法唯識石非動物何識何知而能有此如幻三昧由理具故事相宛然當知法身遍一切處假名依正一念三千我心與石等無差别若聞若見應作是觀同證如來不思議境王真人七十夀像贊列仙之癯澤夫道腴合氣乎元和遊神子太虛其應也無方而環中以為樞是宜長上古而不老等天地於籧廬視人間之七帙特塵劫之斯須挹其光儀清風穆如古所謂博大真人者兹非其徒歟雲外慶公畫像贊堂堂獨立無與為對描畫虛空徒勞藻繢一雲所兩何內何外勿於其間自為隔礙寶相儼然靈山一會擊蛇笏贊於烈孔公碩大且方麟鳯在郊百怪斂藏爾蟲何知乃罔畏忌怵彼蚩蚩改聽勿視維是手板猶古璧圭千鈞則重鼷鼠則微憤激於中有弗遑計寧使妖血狼藉沾漬屐也先覺俾民不迷九原莫作物是人非人之非兮鰌鱓之舞尚有聞孫曰子禦悔金華黃先生文集卷第七
