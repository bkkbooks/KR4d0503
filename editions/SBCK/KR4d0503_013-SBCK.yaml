body:
  text: 記化城院記仙華山化城院者僧法空之􅀁創也山之東隠君子方先生居之先生殁葬山之北院距墓一里而近邑士與先生有雅故者以空甞􅀙先生㳺相率即院中祠先生且以門人翰林待制栁貫􅀁為銘刻寘祠下而院之搆興頋未有􅀁登載溍忝及先生之門故先生之子樗来為空謁記􅁩不得辤按圗志仙華山在浦江縣比髙百五十丈周二十五里列岫如屏障中為風穴古仙人上昇䖏有壇宇在其下云先生㳺録稱自巖腹望峯頂丹光閃閃如寳蓮花稍進至仙壇前峯􅋍削離立東一峯折裂􅁆百尺俯視如池又東一峯如削循其罅而上踰石嶠如户限北下如井折而東至苐五峯之背有石室可坐數十人又東為中峯下睨烏傷東白原隰聚落如碁布其北諸山與新定接又一峯在其東極峻絶不可攀縁而苐二峯懸崖千仞有穴深黒風薄兩崖上出草木皆動凡先生杖屨􅀁歴較圗志􅀁叙尤險怪崛竒誠天壌間勝槩也空受業於同邑皇安山之普利院而徧㳺浙東西州求善知識咨决心要旣而充然自得浩乎其歸叢林虚席屢以名剡上皆避不就恒惴惴焉恐退蔵之不宻愛仙華之秀異將卓錫其中乃由北麓披蓁荒而入得幽谷直東峯之下窈然靚深遂剪荆􅁄結茅以自庇劣僅容􅂰名之曰雲巢無登陟之勞而有宴息之安以為若是不啻足矣里人朱仙亦先生門人與空為方外交歎其自䖏太􅄶陋首􅂢田為闢基址而同里樓億為作佛廬齋寢庖湢龍峯主僧永鎮尋輟田若干畒􅂌之而空之師清衍暨好事之家又助以田若山園緫若干畒更其故􅀁名雲巢曰化城精舎空因建鍾樓門廡益置田若干畒爲乆逺計易精舎之號曰化城院扵是帝師爲降法旨加護焉重紀至元之五年夏五月也至正改元之二年秋九月空復與其徒道元本覺撤舊屋一新之自大殿至齋堂寢室兩廡三門悉同巨刹之制佛僧之奉無不􅍯具兹山之面目亦軒豁呈露先生向􅀁覩怪竒壯偉之觀可不煩舉趾而坐􅃱也盖空之勌㳺而返乎故山志在遺去􅅝袢探幽擇勝以佚其躬而巳未始即人而人自即之用能建置成立如此巳無愧扵古之有道者而空又能以其餘力與先生周旋扵文字間其名固當配先生以傳如廬􅁜之有勤眉山之有潜相爲不朽安用區區以丹青土木之羙相誇詡也哉姑記其作始之大畧俾来者無忘􅀁自云爾空字無相族呉氏先生之祠事自有述兹不書聖夀院記聖夀院在義烏西四十里故號龍夀宋治平中乃􅂌今額大觀間更為十方禪院􅀊乆弗葺椽棟毀墜藩㧞級夷敗屋數楹不庇風雨荒基㫁礎四頋寂􅋁盛衰固若有時而山川之勝􅀄無今昔之異特以地􅀔僻絶非尊官冨人轍迹之􅀁及而其徒又蓄縮不自振日益散落故雖遭逢聖教興行之世莫有以為意者泰定二年秋千巖禪師来自錢唐愛其岡巒秀􅃳水木清深始度􅂩地結茅而駐錫焉緇素之侣嚮風坌集座下至無以容其居而給其食僧法聦徳超慨然出山叩諸有力而好事者扵是齊郡太夫人張氏首􅂢金為買田若干畒里中一二大家樂聞之争治材甓以復其故宇佛殿則樓君如浚山門則樓君一得法堂則翁君弘道皆獨任其費妙相中嚴威神外護妥奉有儀􅀲華旛蓋器物之須設置如式且各助以田二十五畒有竒既而一得之子某為作僧堂同郡善女徐氏為構鐘樓由丈室至左右兩廡庫堂齋庖湢室之屬則合衆縁以成之效奔走經營之勞者僧徳義尼慈夀也禪師之来至是凡十有五年而其法之􅀁宜有者靡不畢僃規制之廣則視舊有加禪師為而不有擇上首弟子俾之住持承其付託者亦能􅀒荷而無􅀁係吝不乆􅂺謝事而退自壊空成無用貴絶照昶龍門省無礙了逮今滅宗􅁇巳六傳矣􅁇謂予曰在吾教中聚沙積土無非佛事法施財施寧有差别請為我並誌之於石庶㡬来者不昩􅀁自而思􅀁以報稱焉予聞禪師以單提直指普對羣機不起于座而道價之重傾動逺邇冝其以壊為成無難也有能扵禪師之道一念净信捨諸􅀁有而不自以為徳豈易然㢤庸因􅁇之請摭其􅀁述而悉著之使刻焉禪師俗姓董氏名元長蕭山人􅀃法嗣中峯和尚云上清資聖院復田記資聖院在義烏之西鄙距縣四十里而逺又西僅一里􅀁限以谿水則鄰縣金華之境也院故有免科繇之田八十餘畒香燈之奉湯茗之須恒患於弗􅁇雖欲侈大其居而不可得當天朝像教盛行之日猶因循自守未有乘時振起之者僧冲意首殫其勞勩經營積累以大徳二年購金華田百四十餘畒将儲其􅀊入備土木之費以增新乎舊觀有志弗遂􅃍以延祐元年示寂承之者不念厥紹盡取意公􅀁遺契劵􅀻鬻扵其縣冨人之家為直以錢計者八千緡泰定三年也僧嗣宗亟訴予有司而異縣莫適統壹臨之以監司帥守乆且不决張君自誠家金華與院宻邇力為之援元統元年始克竟其事令以田復入于院而反其直向之冒受錢者㦯巳物故㦯毀其衣而伍扵編氓㦯單乏無以輸􅀁􅀒張君為扣巳槖悉代償之以弭其争田乃卒歸蓄聚旣日充遂以至正二年重構大殿它工役次苐畢舉扵是宗公前一􅀊巳逝張君後一歳亦不起僧徳潤謀於衆謂後之人賢否未可知契劵傳蔵之不謹或得持以售扵人冝廢勿用而列其田歩畮圍號郷落之詳緫為之籍刻石廡下庻可圗永乆僉以為然爰狀其顛末介同郡汪君祀求予記之資聖以甲乙次相授非十方叢林衲子之􅀁附集而荷重其事者代不乏人意公開拓於其前宗公規恢扵其後􅃳公又汲汲焉為異日之慮而逆防其未然是皆不容無述矧兹遐方僻壌墟里之間無尊官貴戚為之慿藉無大商豪民為之佽助獨頼張君以一郷之望左右外護且不愛其􅀁有以為成就利益之勝因詎可無以登載而使来者知􅀁自乎白樂天有言記者不惟記年月亦在乎辨興廢示勸誡今之為其徒而居㳺食息扵斯者苟能推徃事得失而眀興廢之由鍳前人功過而存勸誡之實相與扶植􅁆百年之基緒俾弗墜益隆以為夀􅀦福民之地則張君之恵為無窮而予之記不為徒作矣舊記稱後唐清泰二年順徳大師道怤因古伽藍遺址建院號上清宋天聖六年􅀁賜今額盖郡人兵部侍郎胡公則守杭時為住山賛寧僧統移書州牧而得請于朝郡縣圗志並云院創於僧澄皎被賜之􅀊月亦不與記合傳聞之異辭非田事􅀁係姑寘勿論以俟博洽之君子考正焉半山報寧寺記報寧禪寺在今集慶路上元縣之半山集慶扵宋盛時為江寧府丞相荊􅀦王文公之父楚公終扵江寧倅而葬於鍾山故荆公往来鍾山最乆其園屋在白下門外康樂坊謝公墩之側者不設垣墻依林樾為屏蔽宻邇通逵而四無人烟境尤清曠鍾山抵城十有五里至此適當其半􅀁謂半山也荆公􅀄由外制出守江寧及兩去相位又皆均逸于江寧視江寧猶郷郡因其園屋大治居第距􅂢舘前二􅀊乃請于朝施為僧寺􅇉如其請而錫以今額元豐七年荆公親製䟽迎􅃱文禪師来涖法席是為開山苐一祖曁苐二代寳禪師咸克紹隆宗風為世師表地以人增重而半山遂齒扵大叢林寺基為畒八十環其旁之田園陂池為畒二百其在句容烏江兩縣者為荘五皆瀕扵大江潮汐之􅀁齧蝕􅀊入田租無㡬經用􅀁資惟太平青山荘之田出扵荆公長子雱之婦蕭氏者為畒一千自始有寺至􅀦朝重紀至元之五年凡二百六十有六載自文禪師至古潭龍凡二十有四傳而寺以災毀古潭首作法堂兩廡俱未就緒而逝至正二年信菴孚嗣住是山毅然以興復自任頋其恒産僅足具華香糜粥而丹青土木之費未知􅀁措乃焦心勞形敝衣糲食銖積寸累以庀工役三年建大雄殿四年即方丈造千佛閣至十年而山門僧堂庫院悉成倉􅁃庖湢之屬亦次苐畢俻屋以間計者緫若干上棟下宇各中其度斵雕藻繢焕然聿新金相玉毫妥奉如式其宏麗􅂋嚴有加扵昔固多矣繚以脩墉䕃以嘉木創康樂亭而重刻謝太􅀓像扵其上文禪師僧史有傳寳禪師語録有序并刻置寺中則昔􅀁未有而今乃有之爰以状俾上人宻詣介御史濟南張公来徴文以記其􅀊月􅀼荆公記􅀭州龍興講院亟稱主僧慧禮􅀎以廢為興而歎羙其材信菴咨决心要於咲隠訢公而兼傳其文印甞居龍翔苐一座材望素著經度營構之功直其末使之獲􅀙荆公㳺則􅀁以稱羙之者當何如㢤九原莫作猥令晚生後出以年侵學落之餘承乏記兹盛舉冝乎汗顔縮手筆屢閣而不能下也然以􅍗不逺千里渉重江而来旅泊㡬三閱月必欲如其􅀁求而後巳不得卒辤詣亦入􅂘隠之室者於信菴盖同門也净勝院莊田記凡佛者之居曰寺若院有甲乙次相授法田廬貲蓄器械百須之物悉得以為世業傳子若孫其成之難而保有之不易與齊民之家固無大異也然人之子孫不皆才且賢而佛氏之子若孫率以義合必擇焉而得其人乃以􅂌之故其傳往往至於千數百􅀊而不墜世家大族弗如也迹以􅀁慿藉以永乆者存乎其人爾頋豈有它術㢤婺州城西南二十五里其山曰石門前臨陂水陂之大可五百畒水乘髙而下者三級其旁之人或稱之曰龍門云有為佛廬於其地者曰净勝院舊記以為建扵呉赤烏中始號尊勝宋治平間乃更今名而又以為車􅀐将軍張公施地􅀁造越之天章光逺法師實為之開山按天章剏扵近代謂開山為光逺則院不必肇於赤烏車􅀐将軍官廢巳乆謂施地為張公則主是山者不必昉扵光逺是雖無􅀁於考然自治平賜額迄今已二百六十餘年矣先是衆㡬千指後多散落其存者􅂀别而三􅀔分而力單穹墉􅃉宇日就摧圯􅀦朝至元間住山仁體始合其三者以為一未及有以振起之而逝嗣主院事者一真為購田若干畒俾食其什之七而别籍其餘田以資營繕之費法堂兩廡觀音殿甫告訖功㑹廣教虚席江湖道俗推以􅀘其䖏􅁇之者道勤益購田若干畒循舊比分以給其食及土木之須山門鍾樓羅漢堂方丈之室次苐畢僃院之􅂄􅀫若􅀄若宗若静洎好事之家前後􅂢田為助又若干畒其傳以為世業者視昔有加焉静之孫偉辱與予㳺爰伐石而以勤之命来謁文為記夫􅀎以亡為存以廢為興者豈非得其人而􅂌之故歟雖然此世間法也窮千萬億刼而無增减成壊者盖不即世間亦不離世間是固不待記予亦安得而記之姑因其􅀁欲言者叙次之如此福春院記凡浮屠氏之聚必有穹墉奥屋食飲百器之須大抵資於王公貴人而後具不然則夫婦之愚牽於其􅀃而相與􅃱力焉者也若夫冡間林下窮居獨㳺未甞以其事匱官勤民而能熾然有􅀁建立可不謂難矣㢤世儒恒譏其徒取扵人之厚以為古無有是彼亦見夫飛竒鈎貨者為公􅀻之病巳甚而弗深考其人之不必皆然也吾郷有為浮屠之學者曰􅀙起少受業金􅂠之妙善院晚乃􅁲地扵縣西若干里而為屋其䖏以間數之得四十有五門廡殿堂庫􅁃庖湢如式僃完請于􅀁司掲以白沙福春院之故額率其衆入而居之且約以甲乙次相授既又買田若干畒山若干畒於是奉養之物不俟外求而具經始於大徳之四年而卒事於泰定之二年緫其費若干一出於起盖起之名未有聞扵時而其言又非世􅀁傾動苐以食淡衣麄旬積月累以及有是此予之􅀁謂難而得後人嗣守之勿壊尤難也是不可無述其以書来為起請記者又予友張君子長也張君儒者慎許可亟􅁛起之為而無譏焉可記也遂記之經藏廣福院記婺之蘭溪經藏廣福院在州東一百三十五歩故為聖夀寺之水陸院寺創於梁至宋號聖夀而水陸之為院莫詳􅀁始􅀊乆院廢天禧中蔵休禪師来自餘杭得其故址肇建伽藍同郡金華曺仁夀尋為置經造藏因命曰經藏院殿中丞知封州史温為之記當寺沙門有交集王右軍書以刻焉治平末賜聖壽額􅀁以為佛僧之奉者猶缺如也政和間寓公贈少師呉􅀧首輸財倡衆買官民田緫若干畒創置兩莊由是華薌之具糜粥之湏随取而足孝宗時避光尭聖號易名廣福云􅀦朝至元十三年院毀扵兵二十八年其下院白蓮堂比丘普資覩其為荆􅁄瓦礫之塲巳逾一紀未有任起廢之責者則去其故廬挈徒衆及衣盂之貲即舊墟治院宇合經藏廣福以為號仍以族父王氏􅀁遺田塘園地歸之其徒推本􅀁自尊為重興之􅀄祖且請于有司必其子孫乃得住是山苐二代奉譯甞募州人郭淳飾像設之䵝昧者葺殿堂之摧陊者苐三代永紹暨前住􅂋教永膺又理土田之冒没者前住連雲履中於資為五世孫以某年嗣為住持能不愛其􅀁有以續前人之遺緒郭氏四子亦承其先志同力佽助焉經藏有殿中為一柱兩輪棲匭輪間而實以黄藤赤軸悉如其舊齋堂庫院兩廡三門至它屋室次苐畢完懼来者無以䆒知廢興之故爰買石屬予記之予觀天下名刹其先必有靈異之蹟驚動乎斯人是以聞者心郷往之過者低佪而不能去兹山獨以好事之家寳其石刻而經藏之名傳於四方翰墨誠儒者餘事未可忽也頋此猶其細耳儒者謂古人得見書甚難而其士皆非後世􅀁及今之書益多且易得而學者日趨扵苟蕳嗟夫豈惟儒者為然㢤考之舊記始自東都浮汴渉淮踰重江行二千里之險函經而来費金錢至二百萬非若近世轉相摹刻流通之廣不難􅃱而易忽也夫欲求魚􅇠必有待乎筌罤一大藏教佛學之筌罤也今之經藏既巳一新為其學者有能􅀙教起行無謂佛法不在文字而務馳騁扵空言斯不􅀒置經造藏之初意矣然則其徒􅀁冝知者奚止廢興之故而巳乎敢縁記事併以是告焉中字無外族盛氏􅀃法嗣徑山虚谷禪師宻印院記婺之宻印院實晋義熈中仁肈法師卓􅃬之􅀁舊名永福宋大中祥符􅀄始易今號慶元元年秋燬于災僧法威慨然以興造為已任亡何威逝而如觧嗣力倡衆成先志積五十稔院以復完且益置田二百畒郷先生王君桐記焉先是士大夫避兵落南者往往即其䖏為寓舎地之入扵民家以尺計者六千六百九十其存者為尺厪五千八百九十圗籍僃在莫敢質也􅀦家奄有南服法幢􅀁建崇護有嚴僧汝舟䓁援著令白于有司乃悉返􅀁侵地斥其故宇而大之皇慶元年冬居民不戒于火院再燬舟圗復其舊垢衣糲食竭􅀁蓄以資土木之費其徒徳新䓁五人亦克恊相其役起延祐元年春閱十寒暑大殿以成龍華僧一清洎郷之大家張景崖䓁交􅃱其助募衆作佛菩薩像安奉如法餘未具者繕治以次視觧􅀁建立殆㡬事半功倍矣舟念􅀁以為永乆計仍割巳田二百五十畒􅀠焉新以予郡人也冝能道其廢興之􅀊月屬予記之予觀世􅀁稱大叢林必㩀名山奥壌天下勝絶䖏啓其靈祕以示化跡者又皆髙僧上士是以好事而有力之家莫不慕趍之故其居能乆勿壊其壊也率不日而􅂺成人與境相資􅀔固宜然也宻印居萬井中齋廬講舎旁直賈區鐃鼓魚蠡與市聲合非有穹巖􅃉谷幽逺勝絶之槩若它名山比千有餘年成壊相尋而卒無廢墜者不以其人歟盖自肇師以来其間代有異人而金華聖者俱胝禪師為尤著雖然三大士逺矣苟得若觧若舟者焉區區之成壊安足慮乎姑為記其􅀊月如此院故有治平間僧居政􅀁作九級浮圗屹立風雨中必有􅁇舟之後盡其力者則其冝得予記不止若今􅀁書而巳也嘉興天寜萬夀禪寺記天寧萬夀禪寺列郡皆有之其在嘉興者距城北半里􅀁故為施水菴唐咸通間以菴為院而其護伽藍神曰太祖蕭王莫詳􅀁自宋治平中郡人慕容殿丞始請于朝更為十方禪刹熈寕􅀄賜聖夀額命興教惟一禪師開山清􅈵法眼之適孫也崇寕二年詔天下州軍各賜寺額曰崇寜嘉興改聖夀以應令而院陞為寺三年加萬夀政和元年又易崇寕曰天寧紹興二年改報㤙廣孝十一年又易廣孝曰光孝賜田二千畒立莊曰天錫乾道末水菴和尚􅀃法扵净慈尋歸老而示寂于此靈異之迹甚著四方衲子􅃌為名師過化之地而慕仰焉嘉定中癡絶冲公訥堂辨公相􅁇領寺事而法㑹鼎盛遂為大叢林盖寺額在異時巳屢改易入皇朝仍其舊人猶稱以天寧萬夀之故號者以祝聖都道塲在是也至元間朽菴祥公􅀍上旨住是山與􅂄舊僧智源兼任本郡僧司長貳崇護尤謹創千佛閣於山門之東眀􅅱因公規恢基緒頼源之力為多延祐中千瀬慶公即方丈建圎通閣泰定間竺雲曇公重作僧堂衆寮其後月舟滿公窘扵有司之征繇引避而去法席偶虚土木之功亦輟今佛鑑空海禪師念公以至正四年嗣為住持至則繕治僧堂斥大山門之舊址作門以間計者五其髙七尋有半深其髙尋有二尺左右設文武官僚之次且用隂陽家􅀃築案阜扵官河之南培主山扵丈室之北樹以竒石名之曰秀玉峯詞臣墨客多賦詠焉寺後􅂼圃鄰扵軍壘限以土墻􅀊乆墻壊而鞠為芻牧之塲乃白于官悉復􅀁侵地繚以大石墻而斵石為霤以覆之其長萬餘尺費錢七萬餘緡竭力相其成者􅂄舊僧子常也又以􅂼圃地楄陿倍價僦民地而益之置薪蕩二百餘畒經理諸荘隠没之田二百餘畒創寺務司扵庫之東南兩廳對峙甃地為塲其中而旁為兩倉二十敖受各㽵之􅀊入絶蠧弊謂寺乃都道塲而佛殿􅋻􅋘弗稱無以起人肅敬之心而盡歸羙報上之誠乃􅂢長財以倡衆施郡人鹽倉副使沈權首為發􅀻槖市香楠木柱十有六好事之家輸貨薦力者接踵而至乃徙鍾樓撤藏殿之前軒増拓故基以隆寳構其崇十二尋有半脩廣皆十尋傑屋􅃉墉華榱文甓承以落井環以石䦨皆窮壯而極麗植牌門扵寺前之左街掲于楹間曰南湖苐一山空海之涖事逮兹厪十寒暑而内外煥然畢新利飬之須無􅀁不􅇱惟殿之役最鉅經始於十年之三月落成扵十一年之三月亦甫六甲子而告訖工書来諗予以記粤自大教􅀍于中華通都望邑名山奥壌緇􅃬􅀁廬廢興靡常或墜而弗舉㦯彌乆而愈振談者率謂是殆有􅁆而非偶然予􅀼以為特係乎荷擔其事者之材與志何如耳有其材而無其志則不能以有為有其志而無其材則不足以有為空海乘本願力普為恩有作大福聚其志可謂弘矣假方便智示現有為縦横無礙其材可謂周矣為之在我者未始以諉乎數冝其建立成就視古人事半而功倍也為之記以告夫来者尚相與扶植之而毋有􅀁諉㢤空海名良念族王氏台之黄巖人得度扵瑞巖東原沂公禀法扵仰山虚谷􅁜公又甞􅀙雲外岫公扵天童而司其藏鑰及虚谷居徑山遂分半席一溪如公父行也其住寳林拉之偕行未㡬謝事舉以自代因􅀘其䖏後乃由郷郡之護􅀦遷主兹寺常亦其同郡人云彌陀興福教院重建大殿記彌陀興福院在錢唐西山猊峯之麓宋慧光法師若訥􅀁建也初慧光當南渡時􅀍遇三朝受法師號主教事扵上天竺山者二十有七年乃得請而退䖏兹院累加兩街僧録雲章寳器寵􅃬優渥其示寂也謚曰宗教廣慈塔曰普照云院始剏以淳熈三年賜御書為院額以紹熈三年􅃙改十方天台教院以嘉定十三年自惠祥法師為其住持迄今十有八傳矣歴􅀊既乆楹欹棟缺不勝風雨之震􅓸左支右拄事多苟蕳際今聖世像教興隆猶未有火起其廢者耆舊僧壽弥首為繕完僧堂門廡且範銅為大鐘頋佛殿摧敝特甚役費至鉅遂罄其平昔之貲蓄以治土木扵是妙應䓁佐其費妙智䓁視其役起至正二年之夏訖三年之春僅九閱月而殿以成揆之舊制加五尋以為其廣加二尋有半以為其髙造靈山一㑹佛菩薩像而易其座以石増卑以崇者三尺材甓堅良物采焕發皆前􅀁未有四年春息菴􅁢兹来主是山謂不可無以告于永乆爰伐石屬予書之予觀浮圗氏之聚莫盛扵錢唐之西山而傳天台家之學者尤莫盛扵上下兩天竺㩀山川形勝以為法窟四方學徒之􅀁附趍逰者亦無不覩相而生信凡資於人以成其􅀁欲為直易事也興福介乎兩山之間號西天竺距人境固不逺而地􅀔靚幽好事者􅀁罕至故其廢興人莫以為意苟非得人為之荷􅀒不愛其力而相與扶植之安能使乆而益振乎矧今專法席者學精行粹時望􅀁歸求升其堂入其室者未有止也盖自開山四十有五年而院乃拓為十方又百二十有五年而院之重興復自今始可無書乎息菴生越之儒家族李氏夀彌臨海人夀光寺記奉元之夀光寺􅂋宻圎融大師覺眀􅀁建也師俗姓陳氏其先錢唐人世爲士族宋末父某流寓維楊而殁于兵母趙氏懐師甫三月軍帥鄭某因挟以去母欲自絶不得遂􅀙之西北行而師以至元丙寅生於寧夏自㓜志趣不凡厭䖏塵俗母弗能止乃聴其出家且宻書其郷貫世系及其􅀁以徙使謹志之九􅀊禮朶魯只上師祝髮爲僧年十二受具戒􅀙真覺􅀦師松堂某公講般若華嚴諸經授以􅀁服絳方袍及􅂋宻圎融之號俾嗣其法鄭帥即城中爲剏净土院以居之非其志也尋入賀蘭山精修苦行脅不及席足不踰閫􅁳心端坐者二十年乃還故居道價益隆又五年而宗王奥魯只公主虎都台駙馬買也台皆師事之官僚士庻慕風而至禀受戒法者不可數計􅀁度弟子三十餘人師甞發願禮文殊觀音扵清􅈵寳陁訪先世遺跡於維楊而􅇷報焉弟子徳暹䓁三人杖筞以􅀙大徳癸卯行次奉元陕西行省平章政事欽察行臺御史中丞長夀素聞師名共挽留之乃構精舎扵草塲街以爲其駐􅃬之地今􅀁謂夀光寺也佛殿僧堂三門兩廡庖􅅒之屬次苐畢備師率其徒入而居焉堅持禁戒日惟一食以妙法華經念佛三昧爲恒課晝夜六時􅂋宻兼行薄於奉巳而厚扵接物勞而無倦和而不流閱二十五年如一日天暦戊辰二月八日􅀃偈辤衆跏趺而逝世夀六十三僧臘五十一闍維得舎利建塔于城南下院之野狐􅃁徳暹自童子時侍師左右服勤三十年間􅀙松菴某公學一乘圎教而念念不忘纂師之遺緒闕者􅀘之仆者起之丹青嚴飾之羙田園生植之豐視舊有加懼􅀊月寖逺後人不知其作始之自乃礱石介今户部尚書老老屬予書之盖奉元古長安也神州赤縣帝王􅀁都逹官貴人豪民巨賈好事之家􅀁以為浮屠氏之奉者甞盛矣世殊事異城是人非不有大善知識為侯門戚里方面重臣之􅀁信嚮而施外護之力安能扵山川寂寥之餘作如幻事熾然建立如此乎其扶植教基為衆依怙有功甚大􅁇志述事世不乏人旣克承其付嘱又汲汲焉欲圗其永乆是皆可書也庸俻書之使刻焉無盡燈後記净慈故有無盡燈創於宋乾道間其後寺毀復成而燈獨廢至正元年秋八月􅂄舊僧子能始輟衣盂之資仍建此燈扵羅漢堂且􅂢錢唐縣靈芝郷田五畒俾以􅀊􅀁入米五石給膏油之費凡為燈之法内置一燈外安十鏡交光相渉普徧互融百界千如重重俱現盖託事以􅂋理恐人不觧其義乃買石摹刻真歇禪師􅀁為燈記以開示㦯於是燈未能目擊而道存觀禪師之言思過半矣来㳺如幻之境者毋徒以為一時之竒玩也哉真如院鍾樓記真如院在義烏縣治西南百十歩故為􅀟林􅇬舎宋治平乙已􅀄賜額而儕於列刹恒産素薄屋室物器凡其法􅀁宜有者乆且未克大僃嘉定丙子僧若愚始範銅為巨鍾作樓以居之逮本朝延祐丙辰僅百年而樓為風􅀁壊惟鍾獨完僧慧慈将募施者市材僦工以復其舊有志而未遂也今縣丞李侯若愚休沭憇止頋見鐘銘僧若愚名與巳適同恍焉如有􅀁契即以起廢為巳任亟施錢為衆倡官僚吏士咸恊賛之好事之家又来佐其費而諸僧亦為助有差爰興土木屬慧慈躬涖其役樓之建以至正元年三月乙巳而落成於二年三月甲戌崇廣嚴麗視昔有加既居鍾其上慧慈欲圗李侯扵永乆乃􅂢􅀻田二十八畒有竒俾来者􅀊取其入嗣而葺之且伐石求予為之記昔呉越忠懿王時有大比丘韶公為其􅀦師自以與智者大師同族姓覩天台遺蹤如故居焉時智者之學㡬絶忠懿用韶公言遣使十軰奉五十種寳詣髙句驪求得其書天台教之復傳扵中土實自韶公發之由李侯視韶公財法二施雖殊其以姓名之同為利益成就之勝因一也夫姓名之同亦偶然爾有能察其心之􅀁同則心佛衆生三無差别慧慈與其徒瞻華構之翬飛聆鴻音之鯨震若見若聞無非佛事李侯之施詎易量㢤其􅀁託以為存者有不在予文矣縣令長而下暨緇白之士施錢有目具載于石背云金華黄先生文集卷第十三
