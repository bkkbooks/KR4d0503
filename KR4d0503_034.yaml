body:
  text: 墓誌銘門人編次項可立墓誌銘予為項君可立銘其大父墓後六年而君卒又九年而葬又三年而君之子師周始以狀走亰師問銘扵予㑹予方有史事及得謝而歸又三年乃克為之君姓項氏諱詗可立字也其先自台之仙居徙温之永嘉後復自永嘉徙台之臨海臨海故為章安縣今所居章安即舊縣所治也五世祖璣髙祖恵曾祖駰當宋南渡𥘉遭時多故並隠弗仕大父良材郷貢進士予所為作銘者也妣翟氏張氏父鼎迪功郎蜀郡虞公集銘其墓妣毛氏由迪功而上考諸前銘可見已𥘉君之大父有徳扵里中人至今思之國兵南伐偶為卒所得将剚刃焉忽撓而曲易以他刃復然卒駭曰此天所保護必有積徳後當生好人遂舎之而去及君之生質貌魁偉自少倜儻尚氣皆與大父類人以爲好人之驗稍長卓然有志於古不妄與人交所造詣必一時名人甞爲詩持以謁天㳺陳先生孚一見稱其善學李長吉君盖未之學特暗與之合耳時君甫弱冠天㳺謂曰子固他日之善鳴者觀其丰葺間婉若明金翠羽流麗雲屏能稍加鞭辟入扵義理則其縁飾萬物之情當變而爲鑑鏘清廟之音矣遂介之見此廬翕先生森又介此廬見右堂陳先生天瑞而卒業焉既而歸讀書扵嵩隠嵩隠者五世祖徳處也去家僅一里所由山麓縁綫路上絶磴穿石扉而入群峰環合中更平衍清池方竹超然如在世外四方士友及里中子弟負笈而至者傾所儲以給之無少厭歲饑人多採草根木皮以食有虎出爲害君移文誚山神而逐之是夕虎至舎外據地大吼林風震撼崖石迸落少選聲漸悲俄悄然無聞開户視之屏迹去矣君蔵脩息㳺扵其間者十年扵書無不讀而䔍好經學謂聖人修六經始以明人倫扵道之常終以扶世教扵道之變易首乾坤先陽後隂君臣之常道正矣終於未濟則隂陽失位非變乎書始於二典堯之遜位于舜君道之正也終以秦誓繼王者之誓非變乎詩始扵二南周之以服事殷臣道之正也終以魯頌繼天子之頌非變乎至扵禮壊樂崩則春秋不得不作首書元年春王正月正始也末書西狩獲麟示變也聖人之示變於其終所以俟後聖復常道扵已變也又以為六經之有春秋脩道立教之義剖斷始明尤致意焉延祐𥘉有詔著取士令郡縣𧺫居就試扵郷闈而君雅不喜效新進之士作科塲語以求合有司之繩尺故屢試而屢却未始以得失為欣戚也君素為吴越間學者所敬服争奉禮弊迎致而師事之乆客于外行槖所有悉送于家以具甘旨一豪不敢私逹官大人有欲薦之扵朝者辭以母老不可逺逰而止季弟某從君㳺乆既壯為之授室其費一以身任之永康胡先生長孺號㢘介休官而家益貧寓杭之青蓮佛舎以殁君夙為所奬重經紀其䘮事甚力裒輯其遺文將刻梓以行而未果也中歲不踐塲屋歸侍親庭杜門不出遇風日清羙間與一二勝流盤礴金鼇峰上而寄情扵漁釣人或繪為金鼇釣隠圗其歆慕之如此甞患渴竟以其疾至於大故君生於前至元戊寅某月某甲子卒扵後至元戊寅五月丙午享年六十有一臨将屬纊神色不亂語師周曰吾與爾永訣矣吾母垂白在堂而不得盡終飬之孝爾年甫及成童而不得盡撫育之恩吾既為明時棄物以就磨㓕爾當竭力奉吾母以及爾母厲志扵學以無沗前人勉乎哉傷乎哉言訖而逝母哭之慟絶而復蘇弔者皆哭盡哀俟殮畢乃退娶王氏後十年卒子男一人即師周陳氏出也女二人適王光讓黄應騘師周卜宅兆扵臨海保樂郷安仁里鳯山五世祖墓之側以至正七年冬十一月已卯奉君柩葬焉君所著有春秋繤義二十卷詩文若干卷蔵於家君殁師周年纔十五凢狀所述多質扵君仲弟某而得之也予與君為文字交非一日君生後扵予而先予死予之庸謭誖耄固不足任吾友不朽之託然以師周不逺四千里奉君治命而来有請業已心許之安可無以存掛劒之義乎銘以慰君亦以慰其嗣人云爾銘曰天之生物其成實難胡底于成而卒棄捐有木扵斯植彼中野由其萌芽至于拱把沐浴時雨膏液也豊行柯布葉干雲蔽空人指其材可梁可棟工師睨焉乃不有中委而弗取老于丘園斧斤所赦山林之尊不侈其逢寕不謂命保兹歲寒順受其正于嗟乎君不幸類之全夫天年何成何虧鳯山之原墓草既宿輟哭書辭用慰幽躅吕府君墓誌銘府君諱汲字仲脩姓吕氏吕氏扵婺為著姓而非一族人因以其所居地望為别居永康縣之太平郷者號太平吕氏宋之中葉有以經學教授于郷里者曰遵遵之子曰質質之子曰迪功郎師愈仇家搆飛語中其長子約而連及之父子同時與龍川陳公俱下天獄次子皓先以賑濟受知倉使朱文公奏𥙷郡文學用漕薦再上春官時年二十有四叩匭上書乞納所得官贖父兄罪丞相白無例孝宗正色曰義事安用例立命出之縁坐得釋者五十餘人㓜子源是為府君五世祖累贈通直郎髙祖諱介曽祖諱羔皆承節郎祖諱壄承信郎父諱懋咸淳間甞與計偕試禮部入皇朝版授知永康縣至元十五年也母何氏知樞宻院兼叅知政事夢然之從孫女府君少嗜學至老不懈讀書務窮理而扵百家數術靡不旁通其說平居致養扵親為具必豊族人不能自食者月有廪年當入學者家有塾列為成規守而不廢子女婚嫁必擇故家名族未甞論財接賔友情文兼至各盡其歡而止鄰里有急必周之歲大侵為粥食餓者所全活以千百計至扵自奉乃極簡薄衣無羙飾食無珎味器用苟完出入無傔從惟以一僮挾䇿自隨人望之蕭然山澤之癯也其㳟儉出扵天性孝友行扵家庭仁愛及扵宗族郷黨可見者如此而又多材能遇事明敏所處必中扵理衆咸厭服為人排難觧紛勇扵赴義不以為憚里中無頼之徒或假私鹽誣平民蔓延所及甚衆為之力辨扵官以免人尤徳之𥘉知縣公遭值江南新附官府未立毅然出任縣事而弗辭既撫㝎其民使無失業且為之捍衛以備非常人恃以安及朝廷置真令即奉身而退盖志在用權以全其郷井不藉是為進取之階也其役大盗竊發官庫進討復強𧺫之以為嚮導府君甫踰弱冠實預在行身踐重山宻林荒昧阻絶之境而直探其巢穴事平口不言功識者推其雅量晚益務韜晦自號水西翁云前娶朱氏郷貢進士環之女先四十三年卒後娶趙氏叅知政事資政殿大學士順孫之女先若千年卒子男三人長曰梓本伯兄之子次曰權曰機皆朱氏出府君既早失内助二子又㓜弱因鞠梓爲巳子俾持門戸事而悉卑以知縣公所遺田宅權既長遣從郷先生許公益之受學八華山中業成未及見扵用而先府君十五年卒無子府君以継躰之重爲之斬衰三年仍命以機子烜爲之後而機亦先府君三年卒女二人適同邑陳至寳東陽胡道隆孫男七人熈忠燧烱燁烜煥女四人曾孫男六人女九人府君生於宋咸淳四年戊辰閠月三日乙卯卒扵今至正六年丙戌二月三日壬子享年七十有九諸孫以其年十一月三十日癸酉奉柩合葬于東陽縣西部郷西郭先室朱氏之墓而以狀来謁銘昔歐陽子有言爲善無不報而遲速有時予觀水心葉公銘迪功之墓曰治生能冨教子能賢後溪劉公銘通直之墓曰宗族稱其孝弟郷黨敬其仁義盖吕氏之積累其来乆矣至府君家益昌而其材又有足用者苟出其緒餘稍自見扵世宜不止爲一郷之善士而巳頋乃歛蔵弗耀而優㳺以卒歲豈不曰爲善之報自有其時乎府君二子雖早世而孫曽蕃衍生今昭代必有能自致顯融而大亢其宗者爲之銘以朂之且以俟也銘曰有伏必興斯理之常惟徳之厚其流乃光于嗟府君隠居行義施澤於人而不有位保其世徳望于一郷繩繩子孫積善之祥亦既有子胡又夭閼百年之積欎而不發是継是述在其孫曽尚克有聞天寵是承貤恩所加賁及窀穸惟銘可徴勒此貞石富陽朱君墓誌銘富陽江泝流西行三十里東山之下有隠君子曰朱君既殁且葬其孫天麟以父命奉先友郷貢進士陳君𣏌所爲狀請文爲銘按狀君諱伯清字源之世為杭之冨陽人曽大父安禮大父璘父起南俱隱徳弗耀君少無他嗜好唯劬書至忘寢食群居誦說務以道義相切磨不専取為舉子業也叔父起渭調太平當塗尉携以謁郡守髙侍郎衡孫侍郎前軰慎許可見君丰姿秀整叩以所學甚器重之㑹科舉事廢君因得四其力扵聖賢之遺言所為詩文益就平實平居訓其家以儉而扵周人之急無所靳歲所輸二稅恒先期畢継之者以自後為耻有闘訟輙開諭之使觧去里中頼以無事民至有不識吏者瀕江故多盗聞君之風相戒無敢犯客舟下上必以君為依歸縣尹李侯質號剛介罕與人接慕君之為人欵門請見詢政事失得君為言酒榷及興造顧買之病民者數事尹施行如君言人至今稱之𥘉君所與為師友皆知名士後多取科第或班朝行君故未脫塲屋不以寘欣戚也又甞與故尚書右丞葉公李同事宋太學博士施先生南一時先生之門惟右丞年最少君察其有志氣以語當塗府君厚遇焉巳而右丞以亰學生扣閽斥言時宰創市田變楮諸新法非便得罪投漳州朋從懼莫敢省君獨徃與之訣且為具食飲服用之物俾所親送之二千里外其免歸也君逆之江上無一語相勞苦第勉以風節自終至元間右丞用薦者驟居政路士争附趍恐後君頋漠然若未始有雅故者右丞念君不置數遣迎致之卒謝弗徃由是終其身不有仕籍人尤以是髙之君卒於大徳十一年十二月某日年七十有二配吴氏先若干年卒泰㝎某年某月某日合葬于所居南三里馬鞍山之陽子男二人長曰文韶使来請銘者也次曰應申已卒孫男四人天驥天騏天鵬天麟曽孫男九人女四人銘曰有徃而弗返莫予遏也有發而弗舒莫予竭也兹昔賢之細事世駭以為㓗也幽幽其溍昭昭其晣也陵耶谷耶不尚有掲也鄞胡君墓誌銘鄞胡君以至治二年六月甲午卒年七十有三其又明年某月某日葬城西南六十里亭嶺下前事諸孤衰絰哭奉董生復禮之狀踵門再拜請文為銘予為之荅拜且辭則又再拜固以請乃次而銘之按狀君諱珙字伯玉夲費氏子生七年後胡氏胡氏自君之曽大父祖季大父桂發父徳潤皆未有仕籍至君始以材見推擇為郡列曹掾非其好也用乆次司郡倉積勞當序遷輙棄不就其居家奉母孝率子弟治田廬生産悉有法有餘財未甞資以為俚俗華靡豪縦事尊官顯人慕而與之交不肯為翕翕熱然如故舊煦煦有恩歲時閭巷相過雖賤夫㓜童必踆踆然與為禮有疑其矯飾者迨君病革姻黨朋從来候問度且弗起咸有戚色君纊息垂絶猶舉手加額曰惶恐惶恐疑者乃釋然服其出扵至誠君平生無他好玩獨嗜蓄古法書名畫持以售者歸其直累百金無所靳晚益聚書搆精舎小溪上延師儒教諸孫為舉子業葬地實在其西十里君所自辨㝎也盖君扵管郭之學甚䆳云君娶鍾氏子男六人曰元堅曰元垕曰元壵曰元基曰元堂曰元圭女一人未笄孫男十有三人鏞鑑鎮鈞錡銘鉅鑄鎰銳錫鍇鉉女十人婿曰俞祖錫張景松餘在室曽孫男二人宏翁興翁嗚呼予聞有隱徳者必有後觀君之自信獨樂非能以利澤昭𬒳于人而子孫茂衍若是冝有隱徳矣其所恃以為不朽者獨銘也哉銘曰維古宅兆眡占從違允矣胡君蔽志不疑我擇我蔵匪卦于著有封斯隆有潜弗輝有斐其銘嗣人之思蔣君墓誌銘溍弱冠時及石先生之門聞先生當宋景㝎咸淳間執弟子禮者恒以百數頋生晚不得厠其列然竊心慕之先生殁十有六年而溍爲諸曁州判官始識蔣君陶朱山中扣其師友之淵源則執弟子禮扵先生者也君不以軰行自髙言必稱同門若甞與㳺與居者焉㑹有詔賜髙年帛郡檄溍奉以從事溍方蹐君之門而君已死将葬其子果以狀来謁銘溍不得辭按狀君諱朋龍字飛卿蔣氏由漢兖州刺史詡二十四世至唐尚書左丞冽又十七世至宋國子監主簿某監簿生處州教授頴教授生國子助教翥助教之子曰一徳君之髙祖也曽祖諱嗣興祖諱允叅父諱亨之皆不仕其自冝興徙越之諸暨迨君九世矣君先娶姜氏前三十七年卒有子一人果也後娶楊氏有女二人長適胡一中起進士為紹興録事次適趙深孫男三人曰某曰某為兄進武校尉純後曰某𥘉助教君無恙時有異僧空入其室示以八字曰傳燈佛祖涅槃㑹人揖而與之語弗頋而去他日以其言驗之壽略如瞿曇氏其殁則雙林唱㓕之後一日也自是君之祖若父得壽同殁之日又同君之死也夢其父曰燈燈續傳不自我後不自我先寤而謂果曰吾先世之聞扵浮屠氏者固非所敢知以今之年明之日徴之殆與吾夣協吾其逝矣即索紙筆為書與親友訣翌旦正襟危坐奄然而逝泰㝎四年二月十六日也享年八十有一葬以某年某月某日墓在某郷某原銘曰有生之不齊兮寔命自天脩不可強促兮短不可苟延天胡厚君之家兮賦予之獨専死之日兮生之年一門四世兮弗後弗先吾固知命可受兮不可傳天者之難必兮孰測其然于嗟乎君兮尚歸夫全青陽縣尹徐君墓誌銘君諱泰亨字和甫姓徐氏其先衢州龍㳺人龍㳺之徐系出偃王而代祀遼邈莫詳其世次君曽大父曰誼甫有隱徳大父曰克威以疾廢里豪乘間兼并其家生事日削父曰進始成童能隱忍激勵卒自奮以致完厚然喜施予又樂道人善以長者稱𥘉娶越邵氏因徙家蕭山之漁浦尋又徙餘杭而占籍焉繼娶陸氏俱無子其子男二人女一人皆李氏出君最長徳祐元二從父避兵踰濤江夜夣神人告曰趣返否且及難既寤遂西還已而兵從東方来人皆曰天既俾徐氏有後又謹護之積善之報将在是乎君性䔍厚而遇事警敏少嗜學能為詞賦既又從師受經用舉者試吏平江精思竭力雖􅉵不休人或譏其過君曰事無少不可忽也軍校有不法事在郡府君視其牘議不少貸漕運官属恃其品級己髙尤恣横凡姦私殺虐執事者率畏憚不敢竟其獄君一一具上論如律民間以匿朱張財物多無辜坐逮者君力為辨析免男女為奴婢者若干人憲府以時所引用㫁例不一求文學吏整比之君㝎自中綂訖大徳為之綱目條分理貫蕳而易求約而可守覧者便之既書滿行中書省署君歸安縣典史白雲宗僧沈某冐名爵凌官府有悟其意者两人将寘之死地两人之怨家私鄰女不得殺以㓕口棄尸桑林中事覺隂使以他辭引两人傳致其罪君将直其冤吏持不可曰此沈公意孰敢拒也君盡立群吏于前語之曰吾能死不能濫殺以求媚於人㑹使者行部君卒白出之沈之徒有僧某者通民家婦為其夫所歐而衘之適有遭刼殺者賊弗得僧為飛書誣其夫及有他怨隙者七人故以書墮邏卒家七人中或以罪黥卒得之曰此警跡也因捕治不疑君察其冤而七人者苦卒虐莫敢易辭君命去其杻械始垂泣自言令以左驗已具難之君服弊衣詳為賣卜至其處悉得七人以已物實贓狀取其家餘絲布數升析縷以比無不合釡竈及他物存者又合僧乃㐲罪七人者得直已而獲真賊扵武康人始歎服焉縣獄舊有男以醉死弟自經死誣平人者獄已成君親為訪求其實悉生之隣縣安吉有逐其妻之子而夜死扵盗者意其子也廵官捕繫而煆煉成獄且取他衣物為證君為蹤跡其事或驚惶以實自首乃出其子而坐廵卒及行貨者屬歲大侵君夙夜施其拯救之術凡所給寧過厚曰無以法害吾仁也已代去省臺猶以荒政諉之陞平陽州提控案牘以内憂去服除遷海道都漕運萬户府提控案牘方遅次里居而經理法行君以書論田不實役不均之弊累數千言宰臣領其要者得書大喜俾乗傳白于行省時列郡守咸以田事期集争欲得君以佐其事君佐常州又佐池州所行一如其言他郡咸取法焉未幾以漕事至京師中書奏君以九品官仍為本府堤控案牘兼照磨承發架閣考漕法利病下至占候探測著海運紀原七卷後有掠其羙以自名者非本書也尋復以漕事至京師詣都堂獻書數萬言條陳漕運之弊當更張者十事執政得書移行省用其七至今頼之乆之以軄官入福建帥幕由令史為提控采列郡圖籍撰福建緫目若干卷用例授将仕佐郎建徳路緫管府知事言當世宜急行者其要有六府上其事轉逹于中書雖不報而隱然用其說人或指曰是徐某所甞言者時朝廷方選用重臣宣撫两淛江東君摭時政闕失關大體者為九䇿以獻㑹其使遷他官不果行用覃恩授承事郎池州路青陽縣尹為治務教養其民縣人方某為割地以廣學宫章某為捐地以建恵民局有司歲徵民輸荒田租為田千四百頃人甚苦之君寛為之限暴民墾闢教以修坊置閘而覈見田歸其實行視他民田之阻山瀕江者俾因地勢為蓄泄以備旱潦歲饑則輟已俸倡衆以賑之民有告四十人同發其廪粟者吏欲准強盗論君曰吾方憂其死而食之彼乃以求生而抵重禁當用法外意可也悉笞而遣之旁郡邑事類此有瘦死者憲府聞君議召其長吏切責焉隣縣銅陵人争魚池三十年君數語而决尤以是知扵上官滿代而歸留君吴之閶門無復仕進意結廬植花竹日與賔客觴酒賦詩或乘興獨徃徜徉山水間自號可可道人元綂元年六月忽搆疾諸子懼或請禱君止之曰吾猶未也果有異則止藥弗服時是矣巳而有瘳乆之乃以痁命止藥作遺書及戒其子佛事不必作親舊致􅉠不可受湏臾端坐言曰年六十五不為夭官正七品不為小得正而斃焉幸矣言訖而逝十月六日也享年六十有五娶謝氏先二十九年卒繼潘氏子男五人曰震餘杭縣學教諭曰恒出後徳清鍾氏曰濟曰孚曰艮紹興和静書院山長女一人適章光祖孫男五人思誠思㳟思温思義思文女五人俱未行震䓁遵治命以其年十一月某日歸葬錢唐石屋郷先墓之後𥘉君未及仕而父沒哀慟至頓絶母氏卒于官弟晉亨以憂病惑君曲盡調護之力焉君讀書務以致用不屑屑扵章句作詩善體物冩情凡所著有端本書忠報録自警録可可抄書各一卷歴仕集二卷集效方三卷及家譜詩集並蔵扵家吏學大綱折獄比事各十卷行扵世而所謂海運紀原福建緫録皆列於官書子方樂聞君行事而艮以狀来謁銘敢不諾銘曰儒者之效乆矣弗白矯矯徐君秉兹諒直施于有政藹然厥績胡不卒施而有遺䇿勒銘告哀用表玄宅應中甫墓誌銘中甫應氏諱本中甫其字也宋南渡時六世祖確由汴徙錢塘因家焉父普受知淮閫李公庭芝𥙷進武校尉宋亡李公死遂韜晦不復出中甫生而秀異稍長能自植立治家務勤儉與朋友交以信好為人排難觧紛而􅎮恤孤寡人以此稱之始中甫與子同年進士前史官楊公載共學明扵禮春秋喜為歌詩頗有志於䆠逰而弗遂年甫三十趙魏公以集賢直學士提舉江淛儒學辟主教仁和縣辭不就後㳺亰師集賢大學士王文㝎公力薦于朝年己六十無意扵仕進歸隱西湖上日與髙人勝士徜徉山水間遇竒書必厚其直而取之所積甚冨平居能自攝養筯力至老不衰手未甞釋卷每秉燭至夜分乃寐間有所得手抄成帙善鑒㝎古書畫一時名人咸服其精旁通數術方技而最深扵醫晚遂混迹扵藥市至正九年七月二十八日卒于海昌之寓舎享年七十有八以其年閠七月二十五日返柩葬于錢塘縣水月郷葛嶺之原先是中甫在海昌俄一日泛小舟至錢塘徧謁親故携其甥某登葛嶺指示以所卜樂丘之向背僅逾旬浹而竟不起屬纊之際神思不亂屏去婦人惟留諸子侍側告以平生俯仰無媿即死汝軰慎勿徇俚俗追薦之說也語畢而逝娶朱氏子男四人才两預郷貢用特恩授嘉興路儒學正偉嘉興路緫管府司吏貞晉陵縣儒學教諭毅仁和縣醫學教諭女二人適張天麟俞仁榮孫男五人女四人中甫所著有三家禮範辨一卷注春秋世紀一卷五七言律詩五卷集驗方一卷人多傳之盖中甫素陗直寡合不屑苟售然䔍於教子及見其成而身食其報禄雖未豊所養者志既壽而康遂以考終亦可無憾矣予獲締交扵中甫甚乆才也又辱從予㳺中甫之殁也予方告老将退休于田里使者以召還之命追及予扵錢塘敦迫就道無從申繐帷之一慟而才也跣走造予傳舎奉中甫治命以銘為請衰朽荒踈不足任付託頋義不得辭銘曰生也直畸於人積也厚燕及於子孫無悔無尤卒歲優㳺銘以焯扵幽處州路儒學教授致仕王君墓誌銘君姓王氏名某字則之後即其字以為名處州麗水縣人也曽祖徳昭祖仲逹父君舉俱弗仕宋咸淳末君甫弱冠試郷郡待𥙷太學諸生徳祐元二太學事廢迺悉棄故所習舉子業歸讀書山中為道徳性命之說殊無仕進意至元三十年部使者秋公桂始起君為縉雲縣教諭遷處州路學録陞蘭溪州學正用累考及格上名吏部而君遽以休致為請授将仕佐郎處州路儒學教授致仕至治二年也扵是君之子釋亦以儒學官借𥙷潮州掲陽縣湖口廵檢命下之日父子皆公服前後置褥位望闕謝閭巷以為榮㑹釋巳迫戍期有司給驛劵俾就道釋以君年髙乆未忍去君語之曰吾家本寒儒未甞為國家效分寸之勞而一門之中叨蒙誤恩如此頋吾已老汝其行矣苐思報稱無以吾為念也釋至掲陽歲餘而歸不一月君属疾甫數日遂不起閭巷之人又莫不深哀之娶潘氏子男二人長即釋次某女二人劉某趙某其婿也孫男女各二人君之在縉雲愛其山水之勝因家焉晩復築室城東闢地引泉樹佳花羙竹日與學者㳺息其間以詠歌先生之道其地有忘歸臺君倦憇臺上謂釋曰吾死必歸吾骨扵是釋謹識之君既卒以治命奉柩葬其處其卒以泰㝎元年九月二十一日得壽七十有三葬以三年十一月某日君平生所為詩文釋方彚次成若干卷蔵於家銘曰猗嗟王君與道為期出也或遄其歸處也弗佚其私蟬蛻春融樂也熈熈殁吾其寧昭以銘詩中憲大夫淮東道宣慰副使致仕王公墓誌銘父諱艮字止善姓王氏越之諸暨人曽大父諱天祐大父諱一榮俱弗仕父諱理用公貴累贈朝列大夫秘書少監騎都尉追封太原郡伯母祝氏方氏並追封太原郡君所生母厲氏贈宜人公少受業郡庠篤行勵學克自植立毎慨然以康濟爲志故秘書少監凌公時中爲江北淮東道肅政㢘訪司知事雅知公辟爲書吏及遷淮西以新制南士不得入憲幕两淮都轉運鹽使司書吏督辦冨安塲歲課塲距海逺潮不時至鹽丁負水取滷力疲而賦不充乃爲相其地形鑿渠以通海潮公私咸便之考滿調将仕佐郎廬州録事司判官淮東道宣慰使司辟爲令史掌織染之事所轄官府乆廢不治乃日臨視之爲脩作坊募工匠至於攻金治絲設色具爲區處迄今守爲成法两淮鹽綱病扵運河淺澁事聞詔遣都水監官䟽治之公從分閫至淮安之鹽城有司部役夫三千束手以俟都水之来公言不冝坐靡曰食促令興工仍立法每十夫一治炊㸑九操畚􅓩曰所穿廣四丈脩一丈深五尺比都水至河可通舟者已四十五里遂自新興五祐两塲屬于髙郵次第訖功而他州役議猶未㝎乃俾悉用公法行之調将仕郎峡州路緫管府知事入江浙行中書省為掾史㑹朝廷遣使復立諸市舶司公從之至泉州建言若買舊有之船以付舶啇則費省而工易集且可絶官吏侵欺掊克之弊中書報如公言凡為船六䑸省官錢五十餘萬緍升承事郎建徳路建徳縣尹以方郡君憂不赴服闋擢两淛都轉運鹽使司經歴越守王公克敬以郡民苦扵計口食鹽言于行省未報而王公為轉運使乃俾與新守于公九思集議咸謂宜稍損其額以紓民力沮之者率以為有成籍不可改公毅然曰民實寡而強賦多民之錢今死徙巳衆頋重改成籍而輕棄民命乎且浙右大郡啇旅輻輳未甞以口計也移其所賦散於啇旅之所聚何不可乎扵是議歲减越鹽伍阡陸伯餘引俄有旨改卑王公以湖南憲節後轉運使復排前議公以去就與之争丞相脫歡荅刺罕公聞之亟遣留公而議遂㝎𬒳本司檄分治淛東力除私販誣指之害按劾書吏奏差尤無良者黜之所徴贓為錢萬六千餘緡懼而以贓自首者為錢萬叁阡㭍伯餘緡丁少監公憂服闋擢海道漕運都萬户府經歴越之官粮入海運者十萬石城距海十八里歲令有司拘民船以俻短送舟人為之失業不足則勒陸居之民厚直轉僦以給之程期峻急吏胥得並縁以虐民及至海次主運事者又不即受而有折閱之患公抗言曰運户既有官賦之直何復為是紛紛也衆莫能奪乃責運户自買短送之舟運艘為風所敗者例當覈實而除其所䧟之糧文移徃還連數歲不絶公取吏牘躬自披閱除其粮弍拾伍萬弍阡捌伯餘石鈔弍伯伍拾貳萬貳阡伍伯餘緡布嚢一萬玖阡有竒而運户免扵破家遷承務郎楊州路緫管府推官以厲宜人憂不赴服闋除江淛行中書省檢校官有詣中書訢松江富民瞿氏包隱田土為粮壹伯㭍拾餘萬石沙蕩為鈔伍伯餘萬緡者乞立行大司農司勸農營田水利緫管府以紏察追收之中書移行省議擬違官四貟踏視其地而松江獨當什九公至松江七日而歸援古證今條陳曲折以破其妄且言其意不過欲多樁田粮蕩鈔以竦朝廷之聴而報宿怨請創設牙門為徼名爵之計耳萬一民心動揺患生不測豈為國家培養根本乆安長治之䇿哉同列聞公言皆相頋失色公處之泰然他所遣官聞公歸亦皆還行省以公言上于中書事遂寢遷廣州市舶提舉輟俸資造庫屋舶啇欣然出私錢為助不逾月而告成先是吏胥恣為姦利凡舶貨擇其善者出而售之不善者積乆不售公始為設法均配立號募啇人掣籖取物庫蔵為之一清居數月除江西行中書省左右司貟外郎吉之安福州有小吏誣其民欺隱詭寄田租玖阡餘石者𥘉止八家前後四十年株連至千餘家行省數遣官按問吏巳伏其虚誑而司属之喜功生事者復勒其民具報實有合徴之粮陸伯餘石憲司累援詔條革撥莫能止也公到官首言是州之粮比元經理巳増壹阡壹伯餘石豈復有所謂欺隱詭寄者乎淮憲司所擬可也行省用公言悉蠲之州人相率為生祠以報撫之金谿有陸氏三先生祠豪民據其屋而奪其田陸氏子孫三走訴于京師竟不得直公按其籍使悉歸之公所至興除利害多此類其詳見於省臺薦牘及安陽韓先生國子監丞陳君旅諸公所為善政記恵政歌者不可殫舉也公在江西歲餘年甫六十有六拂衣徑歸遂以中憲大夫淮東道宣慰副使致仕家食者五年扁所居室曰止止齋仍自號鷃逰子以見其志云公質貌魁梧心地磊落讀書務明理以致用不苟事言說為名髙弱冠時出逰錢塘與浦城楊君載鄜川劉君汶友善論作詩冝取法古人之䧺渾而脫去近世萎薾之習間挾其所為文登諸大老之門最為隆山牟先生永康二胡先生吴興趙公巴西鄧公所賞識公處家庭涖官臨民各盡其道平居慎重寡言故言必有中至扵委蛇進退之際莫可得而瑕疪人尤以為難能公卒扵至正八年正月癸亥其将終也神完志㝎無異平時正冠肅容端坐而逝享年七十有一以其年七月丙申葬于州東長寜郷之龍隖娶劉氏封某郡君子男三人長仲楊用公廕為楊州路如皐縣主簿次仲廬福建道宣慰使司都元帥府令史次仲淮大寧路儒學正前卒女三人適方泗陳嘉績虞尚忠孫男十一人女七人公既葬之明年溍以乆居詞林老不任事納禄而歸抵家甫一日而有召還之命扵是仲楊仲廬仲與謀来請文為銘而使者與仲廬至同日敦迫有嚴未遑即如其請載念溍納交於公踰四十年知公為深不可以遂己也乃以退直之暇追記其所可知者論次而顯詩之以遺焉銘曰惟士先志惟官先事志不可奪事乃有濟表表王公時之偉器抱負千百出僅一二竭蹷而趍劬躬盡瘁拾級而升不懈于位好是正直周而不比表裏洞逹𥘉終一致古今殊時學與政異公起文儒敏扵吏治詢其職業匪専撫字士飫其徳民酣其恵所去見思如古循吏没世不忘仁言之利脩涂九軌方駕而稅用雖未竟志則已遂薦斯銘詩賁于封隊有之佀之在爾来裔承直郎潮州路緫管府知事孔君墓誌銘君諱濤字世平姓孔氏先聖之四十三世曰後周曲阜今襲封文宣公贈兵部尚書仁玉又二世曰宋給事中贈太尉道輔又二世曰提舉江南西路常平茶鹽公事贈中奉大夫傳南渡𥘉自曲阜徙衢州又二世曰迪功郎監潭州南嶽廟贈少傳行可則君之髙祖也曽祖諱從龍迪功郎祖諱應祥從政郎主管尚書刑工部架閣文字入皇朝隱居弗仕考諱純西安縣儒學教諭以君貴贈承事郎濟寧路同知兖州事妣陳氏贈冝人君㓜有異質五歲知讀書八歲能屬文架閣公愛其警敏俾受業扵黙齋留先生間出㳺郡庠别駕陳公剛中大竒之年二十舉茂材異等一時名士大夫如永康胡先生吴興趙公巴西鄧公無不器重焉婦翁徐聖予從事江東憲府携君以行涿郡廬公柳城姚公前後持使者節君皆為之執弟子禮由是學益進聲譽益進用察舉署寜國路儒學録逮朝廷著取士令延祐元年曲阜首以君充賦東平曹公子貞得君所為古文歎賞不巳是歲以郷薦上春官所對傷太直且微譏切主司竟不合用特恩𥙷溧陽州儒學教授君既新其廟學而士多苦於徭役為白諸臺府悉蠲之七年再貢于東平未行江淛行中書省辟為掾史曹務雖劇君隨事緩急関白以行訖無所壅杭之啇稅比歲不登俾君趨辦旬月而集時宰以為能而風紀之司頗欲躡尋其過誤後乃察其無他事遂釋至治三年復試東平第一以泰㝎元年賜同進士出身用有官超授從仕郎平江路崑山州判官未上丁内艱服除改吴江州判官用覃恩轉承事郎𬒳省檄點浙東諸倉庫餘姚因仍前弊粮不宿倉官吏惶駭莫知所爲君知而不發使自爲之所粮既充而官吏亦得自逭乃皆感服君始視州事囚有張甲以擅殺盗錢乙坐逮獄已具君謂所殺非平民卒貸其死歲饑民多事剽掠君設計捕致數十人謂此皆迫扵凍餒而然不可以強盗論杖而遣之州瀕太湖故築埭以禦水繕脩無時病民特甚君爲改作使可支乆民力以紓水甞暴溢君跣禱予市橋移時水降人恃以無恐而四郊之外有溺死者君親収瘞焉鄰州飢憲府俾君徃賑之全活甚衆御史盖公耘夫率同院舉君治續爲諸州最未報㑹霖潦害稼君所檢視當免輸田租者衆使者覆按左右承風指誣君私庇之君無何誣君者以賄敗投逺方而君得調桂陽州判官天大旱禱于神弗荅君探獄有冤出其無罪者三人乃雨廣㓂竊發君獨任軍旅供億民不擾而軍食亦無乏絶州民與蠻獠雜處素號難治知州方思廣以貪虐啓其争殺人寘弗問反加告者罪君與之辨莫能直即日觧印綬去韓公徳新乘㢘車按是州劾罷思廣勉君復留君單騎直抵獠穴諭以禍福皆讋伏聴命人頼以安秩滿遷潮州路緫管府知事用入廣陞承直郎先是君在桂陽感末疾而歸疾稍間潮州迓吏至乘傳行次武林驛疾復作移寓龍山保和僧舎一夕卒至正二年四月十七日也年五十有七妻徐氏封冝人子男一人思􅌟女三人適張日新陳煥盛驎君易簀之夕惟思􅌟及季女在側發書笥得遺訓數十百言凡身後事區處甚具思搆遵治命奉柩渉江還衢州以其年七月四日葬西安郷孝悌里先墓之次𥘉太尉世父旣襲文宣之封五世至端友與中奉公同南由端友至洙襲衍聖之封者又五世至元十九年秋七月有詔令洙赴闕架閣公以族長𬒳命與俱中道而返洙獨入對廷議俾仍嗣襲洙力辭乃以為國子祭酒提舉淛東學校洙所居室扁曰存齋君惜其以存自號而不能欽承徳意存其封爵因自稱存存齋云君所為詩尚俊邁文渾厚不事纎巧有存存齋藁未及詮次惟闕里譜系一卷為成書君九歲時祖母黄氏有疾露香宻禱乞减壽一紀以延祖母之年疾隨愈後十年乃終人謂君得年不永所禱殆有徵焉架閣公及兖州府君相繼下世弟洧方孱弱君獨治葬祭貲産皆委而不較且援近比請授以官存齊之子崇安尹楷卒于杭君輟錢營護歸葬其子公溥曁两女淪落民間咸訪求得之今公溥已強而仕两女亦各有家公溥兄割地為報郤弗受其孝友出扵天性然也郡文學孔某系出永嘉族人以其䟽逺而弗之親適以事置對憲府時君甫八歲力為求直而出之同里徐伯潤託其息女於君而沒君鞠之如已子既長為嫁于士人術士頋知幾来謁遽以疾亡君為具衣衾以歛而緘其行槖惟謹妻子聞訃而至悉以授之皆感泣請以其術為獻拒弗納有同與計偕者見黜於有司貧不能歸君為貸錢壹阡緡扵冨人而代償之其人後亦取進士有禄秩或謂可責償矣君不聴而焚其劵其急扵人之患難窮厄多此類胡先生没君集同志之士弔祭而上私謚焉黙齋之䘮主辦尤力溧水州判官朱性𥘉與君聮事扵省户到官未㡬而卒䘮過杭君迎致於其家而為位以嚴親舊皆感動争来歸􅉠其篤於師友之誼又如此君與人交驩然無間然尚氣不阿有過必面折之聞者若不能堪乆乃服其識量平生無苟取甞龍書大蔵經有旨賜幣亦辭弗拜家居不事生業有書伍阡卷而巳君之葬也思􅌟巳記歲月納諸壙復以狀来謁路予締交扵君最乆且親自謂知君莫予若而狀之所述多予未及知者予固不得而略也庸備著以為序而銘以系之銘曰古有六行以教萬民比屋可封孰非全人矯矯孔君生今之世無待而興六行兼備直道以行視險若夷出其緒餘卒不大施爰擇斯蔵里曰孝悌銘彰其存用諗来裔金華黄先生文集卷第三十四
