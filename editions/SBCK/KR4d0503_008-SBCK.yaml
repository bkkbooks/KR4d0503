body:
  text: 碑文上都大龍光華嚴寺碑至正七年夏四月天子時廵上亰今中書左丞相太平時為平章政事一日入奏于便殿上問龍光華嚴寺創建於世祖踐阼之初何以乆而猶有􅀁未備對曰此無它由其役殷費鉅而財用弗􅁇耳其年秋八月廽鑾次三十里店諭旨中書賜以鈔十萬緡給其營繕之費仍令寺僧護視屬役勿以諉于有司住持比丘惟􅁕欽承睿􅈲親率其徒鳩材僝工諏日庀事經畫􅃌授而程􅇂相勞之靡敢弗䖍輪奐之羙丹碧交輝寳旛華座嚴奉如式在其教􅀁宜有者纎悉完具眀年秋八月大駕南還復至三十里店丞相以訖役聞請􅃙詞臣著于石章以紀成績制曰可事下翰林以命臣溍臣溍謹按惟􅁕􅀁述事狀世祖皇帝始在潜邸駐軍和林念國家龍興朔漠奄有萬􅀖聲教􅀁覃地大且逺㑹朝展親奉貢述職道里宜均爰相地于桓州東灤河北之龍岡建開平府首扵城中乾艮二隅造兩佛刹曰大乾元寺曰大龍光華嚴寺龍光華嚴則以傳菩提逹摩之學者居之世祖正位宸極采古者兩亰之制詔以大興爲大都開平爲上都鈞天帝􅀁上應􅂵微羽衛句陳周廬千列而兹寺尚仍其舊未有􅀁改作仁宗在東宮躬戾其宇下左右頋瞻懼弗稱世祖􅃱崇極於􅁴皇之意俾有司斥而大之英宗嗣位萬㡬之暇數甞臨􅄑謂五方佛像在世祖時因感異夢而迎􅃱于兹命於故大殿之南别作前殿以妥奉焉且賜以呉中上􅃾之田一萬畒使贍其衆然自經始以来更渉累朝歴九十餘年逮今天子特軫聖情圗終先志乃克因舊為新而訖考其成帝力􅀁加固非一朝一夕之積其成之也盖自有時夫豈偶然㢤寺之開山􅀄祖曰至温與故太師劉文正公秉忠友善有志氣而深於謀畧世祖甚器重之温六傳至維夀以道行文學受知英宗制授大司徒壽傳弘琛琛傳妙桂今惟􅁕則挂之法嗣也自報㤙来􅀘其䖏云臣溍􅀼觀昔之有國家者莫不􅂙用真乗助宣皇度廣資勝利昭薦國􅁵故凡赤縣神州必有禪林法窟我世祖皇帝􅀁以維持億萬年太平之基者規模宏逺矣列聖相承以迄于今扶植而振起之􅀅欲與之相為悠乆是誠不宜無以詔于方来謹序次其本末而為之銘曰龍岡之原灤水之滸度􅀜而北兹惟天府肇啓帝亰自我皇祖克宅其中下臨九土金輪旣御法幢斯竪普為人天作大福聚如逰化城共趨寳􅀁沉沉華構奚啻百堵奥殿廣堂有楹惟旅架以虹梁承以􅀛礎有飛其榱有網其戸廓為夷庭延為行宁峙為穹門周為邃廡經之營之洊更寒暑聖子神孫纉承遺緒逮今皇上不忘􅁇序俯垂清問温其天語蔽自淵􅂨便蕃錫予召彼役徒赴我鼛鼓群工薦技風斤月斧金碧焜煌萬目咸覩靈山一㑹儼然故宇瞻之在前瑜珈五部玉豪金相如日當午神帝龍君後先􅂙扈天魔恐怖曰有禦侮棲經于匭縣鍾于虡息有室廬食有庖􅁃勝縁畢具宗風載舉増崇上化翕受多祜􅀊時省方鳴鑾樹羽宗􅉀戚畹班行文武企望属車奔赱俯僂大家右族豪商鉅賈廣衆稠人下及寒窶猋至景從㕓居野䖏洪纎髙下一雲􅀁雨稽首度門永有依怙扵萬斯年奉我眀主詞臣作頌誕告終古阿育王山廣利禪寺承恩閣碑阿育王山廣利禪寺住持比丘悟光創建承恩閣成使以狀来請書其􅀊月刋之兹碑以示永乆盖自􅀟林唱㓕像教東流有國家者咸知信嚮而無能若我朝之􅃱其隆極者凡九州四海名山福聚至於遐陬絶域萬里之外靈蹤異跡靡不搜訪而加禮焉矧惟兹山乃釋迦如来真身舎利寳塔之􅀁止冝其􅀩􅀍帝力尊崇侈大非它山􅀁得而比倫也舎利始出於西晋歴宋梁陳唐五代曁宋其随機赴感發祥現瑞殊勝希有考諸傳記􅀁述可見巳世祖皇帝底定南服而兹山入于職方首命奉迎寳塔妥安於内苑之萬􅀊山上都之龍光華嚴大都之聖夀萬安諸大刹及諸官署置十六壇􅂣車駕親臨瞻敬於聖夀萬安百寳光眀􅀙壇而起髙貫寺塔遥燭禁庭皇情大恱亟命護送還山仍賜以名香金幣敕行中書􅈗臣郡長吏增構殿宇髙深雄麗視昔加倍四衆莫不抃躍欣慶得未曽有列聖相承逮今天子􅀊時函香遣使賜予尤渥㑹法席偶虚而寺㡬廢今太尉納麟公時為行宣政使求可任其事者扵是光由平江之開元来􅀘其䖏至正二年七月也光旣重新門廡殿堂庫􅁃庖湢之屬且盡復豪家􅀁㩀諸庄田土園林而資以為奉飬者一無􅀁缺學徒雲集内外不下千人光以為寺之􅀁宜有􅄑已畢具而天使下臨祗肅無􅀁乃出上􅀁賜白金為兩二百市材僦工造傑閣以嚴使命列楹若干架霤若干屋之以間計者七其崇若干尺廣加其崇若干尺脩去其廣􅀂干尺飛榱歩簷方櫺曲檻悉稱其度名之曰承㤙之閣上設像座而即其下為傳宗之堂後為方丈之室費有不給則􅁇以經用之餘貲民不知而官不與焉庀役於九年之冬訖功扵十年之春前人未及為而今為之其作始之自固不可不書也昔大覺禪師懐璉歸老兹山扵其君之賜有􅀁弗受不欲以已易物也光獨汲汲焉圗􅀁以彰吾君之賜如恐弗及不忘以下報上也璉之辤譲光之恭敬同出於儒者之􅀁謂禮則其為道冝亦無不同也􅀁可書者豈直經度之勤營締之羙而巳哉光蜀人族某氏别號雪䆫云銘曰佛之真身徧一切䖏非滅而滅非住而住金瓶寳篋八萬四千兹惟其一留鎮人間粤自先朝逮今聖世星軺絡繹香為佛事櫝有金貝篚有綺繒侑以多儀用薦徳馨因果不殊財法交施受用見聞同增福慧大恩莫報君賜未彰荷􅀒有人不敢怠遑乃擇嘉辰開寳樓閣熾然建立無作而作華旛珠網像座中嚴龍光下賁人天具瞻三輪旣空莫非實相知報佛恩則為報上史臣作頌来者是徴於萬斯年彌謹其承故􅂙知政事行中書省事􅀦信使贈榮禄大夫平章政事上柱國追封閩國公謚忠愍王公祠堂碑至元十五年秋七月閩國王公以福建道宣撫使覲于上亰世祖皇帝與語大恱朝退首命左丞張公即公寓邸傳旨詢日本事公對以日本蕞尓島夷不足煩天討因畫招徕之䇿以進深契上􅂨􅀅使預聞國政公懇辤廼降金虎符授公中奉大夫刑部尚書福建道宣慰使兼提刑按察使仍爲御便殿曲宴以遣之俾左丞吕公爲公起舞霑醉而止公旣還治閩中具宣徳意十六年夏五月舉家入朝眀年正旦上眷禮有加擢户部尚書數奏事稱旨甞命之坐而輟御膳以賜以廷辯薄百官俸非便忤權臣意丐外十九年春二月拜正奉大夫􅂙知政事行中書省事􅀅之官江西即政事堂條陳二十四事丞相齊魯􅀦文忠公大喜恨得公晚留公母行二十一年春正月進對言日本未易以力服而可以計取誠令臣得備一介之使以招徕之事成可無殘民匱財即事不成亦無損國威重上嘉納之因以公爲國信使凡􅀁須一惟公意公以爲臣他無􅀁須秪須一印佩之擇􅂙佐數軰奉詔書以行足矣有旨命公視草且賜公玉環連絛納瑟瑟􅂁帽鞾馬鞍各一俾丞相善護視公妻子之留質亰師者公旣陛辤以夏四月發慶元五月抵躭羅躭羅人或勸公勿䡖徃公不聴秋七月至日本境上先令持旗榜諭其國中并移書國主及用事者日本遣来郊迎甚設請遂以詔書入􅉝卯望艤舟對馬島丙夜俄有舉火譟讙島上者公竟遇害而薨得年五十有六夫人葉氏携諸􅀌跣哭赴愬闕下上聞訃震悼命須其家衣􅅒如故給夫人驛劵乗官舸五南還䆒其事㝷謚公敬愍侯録其季子􅀙仕郎南劒路順昌縣尹都中為少中大夫平江路緫管府治中即平江賜宅一區田八千畮厥後都中累遷荆湖北道宣慰副使言公雖已得謚而爵秩未稱有司以聞仁宗皇帝覽其奏皇慶元年春三月詔加贈公榮禄大夫平章政事上柱國追封閩國公改謚忠愍扵是夫人亦􅀙公爵封閩􅀦太夫人旣以告其第太夫人母子相與感泣懼無以昭上恩侈前烈爰􅁲呉縣至徳郷白蓮橋之西二百歩構堂肖公像而祠焉公姓王氏諱積翁字良存其先光之固始人世為宋官族髙祖諱戩贈太保髙祖妣陳氏東莱郡夫人太保南渡時甞仕閩因家焉故又為福之長溪人曽祖諱椿贈太傅曽祖妣陳氏通義郡夫人林氏平原郡夫人祖諱萬全登淳熈二年進士第任䖏州青田縣令贈太師祖妣林氏信衛􅀦夫人考諱方大贈少保妣陳氏頴川郡夫人􅀄少保無子禱扵顯應崔府君之神而生公性至孝博學工為文辭年十八領􅀦子舉眀年用叔父􅂙知政事忠文公伯大䕃􅀘承務郎調監嚴州都酒務故􅈗相吴公濳分閫四眀辟奉國軍節度推官改㳂海制置大使司幹辦公事累數十年不决之訟悉以諉之凡􅀁剖析三百餘事有平心録四卷除提領戸部犒賞􅀁檢察官貽書􅈇使趙公與訔􅂢和平十二酒庫積逋十七萬和平三百家為之少蘇馬公光祖以執政尹天府辟浙西安撫司幹辦公事奉朝􅈲决六縣獄單車夜至餘杭閱獄囚一百七十悉得其情當坐者僅數人餘皆平民眀日召縣官盡釋之􅀁平反他邑疑獄全活甚衆辟淮東緫領􅀁措置糴買官改江東轉運司幹辦公事用舉者改秩差知冨陽縣治辦為諸邑最皇族有縦家僮殺人者論如法無少貸人尤快之秩滿堂除兩浙轉運司主管文字力請寛版曺催科之限東南諸郡咸便之除監左蔵封樁上庫差通判臨安府除提轄文思院主管諸軍審計院遷太府寺丞兵部郎官出知徽州兼都􅇂兵馬府􅂙議官軍帥李詮㩀城謀為變􅀔張甚公以計柔服之且施恩信離其黨民恃以無恐加兵部侍郎仍舊任俄除江南東路提舉常平茶塩改福建路提􅀧刑獄行次永嘉復以為天下兵馬都元帥益王府司馬辤不就改知南劒州兼福建路提􅀧刑獄兼招捕使進兵部尚書除寳章閣學士福建路制置使兼職仍􅃇於是徳祐内附三宫已北上而景炎新造未乆又航海去廼抵福州行省以八郡圗籍上之行省承制以公知建寜府㝷充福建道宣撫副使部􅀅李䧺挟淮兵為辭殺同知宣撫司事潜􅀃友而屠其家公収潜尸爲治後事且以計紿雄而厚結其麾下因大閱擒雄誅之以功陞宣撫使福州路緫管兼府尹兼提刑按察使巳而淮兵亂復作公率郡民捕其黨悉斬以徇閩生齒數十百萬卒頼以完亡何而入覲郷􅀦之人至今思之公夫人曰陳氏曰林氏皆封安人先卒曰葉氏今閩􅀦太夫人也其為比丘尼而在者曰圎眀静慧慈照大師住持杭州眀慧寺搠思丹巳卒者曰宏宗圎眀佛曰大師住持平江妙湛寺普貴子男七人曰時中易名為僧以卒餘悉以公奏􅀘官曰􅄾眀威􅀅軍同知肇慶路揔管府事曰權中􅀙仕郎同知循州事曰昇中􅀙仕郎寧海縣尹皆卒曰建中從仕郎建安縣尹閩􅀦太夫人出也從太夫人留質而歸卒于維楊驛無子以都中之子某爲其後曰端中􅀙仕郎尤溪縣尹亦卒曰都中今正議大夫兩浙都轉運塩使女六人四適名門二爲尼孫男七人女四人曽孫男五人女一人堂成後三年都中以太夫人之命来徴文􅀅刋之兹碑溍􅀼惟公之忘身殉國亦旣蕳在帝心而足以􅁀白扵天下太夫人勤懇壹意爲天􅀁祐年㡬八袠貌端神澤福祉未艾正議又以材猷徳望嚮用於時有光于前人盖人紀之大者三公之爲臣太夫人之爲婦正議之爲子可謂盡之矣欲勿書得乎太夫人之弟茂辰甞以公薦爲武徳􅀅軍管軍揔管公之殁也爲之七走亰師而􅃱力於祠事尤悉亦有功扵王氏而可書者也其銘曰於赫世祖緫􅄃群雄委質自奮時惟王公千載之逢由一言始歸護全閩惟天子使相彼林林孰完其生繄公是怙弗震弗驚廼疇民庸廼踐朝著廼啓廼沃廼居政路蠢兹島夷敢有不恭􅎨言請使出次于東溟波浩浩其下不測長風大颿萬里一息天聲􅀁加咿嗢睢盱鞬櫜帞首頫伏路隅煌煌英蕩使事有􅃌庶公其歸赤舄几几胡蹈大難而以訃聞舍生取義哀動帝宸䟽封進爵易名節恵于飾其終罔不􅇱至公則逺矣遺烈不泯孰其承之惟後有人一畒之宫百世之祀麗牲有碑刻示無止故陕西諸道行御史臺御史中丞贈攄誠宣惠功臣榮禄大夫陕西等䖏行中書省平章政事柱􅀦追封濵􅀦公謚文忠張公祠堂碑故濵􅀦文忠張公家濟南而其别墅在歴城縣北十里華不注鵲山之陽歴山之隂號曰雲㽵公自􅂙議中書省事退休其中者垂十年至治㤗定之問詔使沓至皆堅卧不起文皇御極以翰林侍讀學士召未至改陕西諸道行御史臺御史中丞公乃幡然就道時公年甫六十到官僅三閱月而薨于位天暦二年七月壬午也始公甞謂吾居雲㽵而樂且宻邇吾先世大墓吾死必以昭穆序葬而於是乎祠焉九月丙辰公嗣子今祕書郎引遵治命奉柩以葬而以清河郡夫人郭氏祔至順二年三月戊子乃作祠堂凡屋之為間者四堂居其三而室居其一妥神有位物器􅇱完􅀊時蕆事饋奠惟謹以溍忝綴公門生之末俾有述以告来者溍􅀼惟公􅀄尹堂邑撫人有恩用獄不失有罪能使豪彊讋伏而盗賊化為良民為御史則􅎨言尚書省不可立其變更法度易置官府􅀅厲天下且擅除御史大夫中丞非祖宗故事䟽時政之弊萬餘言力拄權姦㡬蹈禍而不悔在中書則諌止内廷燈山之戯卒以忠直受上賞暨執法西臺属􅀜右荐饑一以荒政為己任有禱于神其應如響乃傾􅀻槖斥公帑奏請大發錢粟下輸米授爵之令用便宜通鈔法以来商旅由是人始得食至於疾病死亡皆具為區䖏慮有司怠於奉行則分遣察官臨視之委曲纎悉竭盡其力頼以少蘇者雖甚衆而公竟以憂勞悲感奄及於大故􅂢舘之日奉元鼔樓梁木自壊濟南里第有光若隕星者民之無禄庸非天乎事聞制贈公攄誠宣惠功臣榮禄大夫陕西等䖏行中書省平章政事柱國追封濵國公謚曰文忠䘏典之優異先帝憫悼深矣公􅀁學務􅃱於實用而一語一黙之細亦無􅀁苟仁宗時公居禮部為侍郎尚書雨持文枋克廣賢路深契上􅂨新進士衘刺来謁􅂺拒不與為禮書方寸􅁓令閽人諭之曰但思報􅀦無以􅀻謝為也􅀁譔著施於朝廷行於四方萬里人莫不傳誦之盖公之莅民政多卓異冝如循吏之立祠直道以匡君而勤事以死冝如功臣之􅀕於大烝文學論議存乎㳤艾之􅀻冝如先賢之祀扵學固非其家􅀁得而專也然以公居此為最乆􅀙容去就之際聞者至今為之咨嗟歎息過而見其平生釣逰䖏池深木寒猶􅀅低佪不忍去况登斯堂而仰公之遺風餘烈可使貪夫㢘懦夫立其於名教殆非小􅀘尸而祝之豈獨仁人孝子用以厚其親㢤溍旣不敢辤而序其㮣復為銘以系焉公諱養浩字希孟世次官閥行事之詳有傳在史氏今皇上又申􅃙詞臣勒諸石章昭掲墓隧矣非有􅀜扵祠事者此不著銘曰瞻彼樂郊齊山兩間山之幽幽水清且漣孰遄公歸而止于此使者在門公不為起止非無􅀁行也以時大君有命賁然来思曰予赤子汝饑予哺庻㡬當宁寛是西顧盡瘁以仕不有其躬神㳺故墟有寧一宫公像在斯皇皇卷服生氣􅏮焉過者必肅記丞相兾寧文忠王祠堂記故丞相兾寧文忠王以至正七年秋九月十八日丁巳薨于位二十六日乙丑祔葬亰城和義門外之先塋八年春某月某日某甲子建祠堂順寧府宣平縣宫家㽵之景賢書院冬十一月十二日甲辰􅈗執大臣奏事明仁殿而退諭上旨俾臣溍撰王先塋碑銘并以祠堂記命臣溍製其文賜王母弟今大司農逹世貼睦尓使書于石仍􅃙平章政事議中書省事姚庸􅂐題其首而刻焉惟武宗皇帝昔在潛邸出鎮朔方故丞相和寧忠獻王以􅀫衛重臣乆侍帷幄上旣嗣大歴服忠獻遂以佐命元勲入秉􅀦鈞夙興夜寐勤勞帝室􅀅寘其家于北土令就髙爽而逺歊袢乃以上􅀁賜宫家㽵之地築别墅居之而延師教其二子俾有成立為時名臣即文忠及大司農也里人化之無不恱學忠獻以父老之請為創精舎聚其子弟而教育之有司以狀白于中書􅂌之額曰㬌賢書院立山長為學者師忠獻旣殁因作堂而祠焉其構興之􅀄今上皇帝特出内帑金錢幣物以相其役東朝及中宫􅃱助有差迨其訖功上復遣使函香具牢醴以落其成詔詞臣歐陽玄為之記至是别為堂以祠文忠事聞又命臣溍記之臣溍􅀼考古者天子之公卿有大勲勞則􅀕於大烝後世之廟廷配享是也諸侯有國大夫有家則設廟祧壇墠而􅀕之後世之羣臣家廟是也傳􅀁謂釋奠有合有􅀦故則否􅀃者以為國故若唐虞之有伯夷后夔周之有周公有則自奠之無則合於鄰國今學校各祠其郷之先賢猶有取其遺意也夫唐虞成周固非有鄰國之可合舎夷夔周公而誰歟忠獻以雄才偉略出則膺􅀲牙之任入則荷腹心之􅀉至於䖏危疑之際不動聲色而施轉旋闔闢之功民志以之而定國􅀔以之而安可謂社稷之臣矣文忠用貴王賤覇之術佐今天子於重熈累洽之餘以親附百姓鎮撫四夷為已任而務使官得其職物遂其冝雖古良相殆無以過而况前作後述濟羙象賢位冠百僚爵超五等是宜配侑於烝甞享祀於廟室豈郷國之間學校之士􅀁得而專乎其相與尸而祝之者盖以事夷夔周公之禮事之也臣溍庸因記事推述而論著焉文忠諱鐵木兒逹識官中書左丞相録軍國重事階開府儀同三司勲上柱國贈開誠濟羙同徳翊運功臣太師中書右丞相階勲皆如故􅇷封兾寧王謚文忠餘見扵前記及上􅀁賜勲徳之碑者此不具眀正書院田記宋南渡後衢之先賢忠簡趙公而下六人盖尸祝之􅃇矣景定末王侯巳守是􅀖始諗于朝即故吏􅀁㩀祠地為道院者闢書堂曰明正且以其没入之田百七十有六畮􅀠焉咸淳間􅁇之者趙侯孟奎又益以它田六十有三畮祠事以􅇱􅀦朝因之建書院額設山長貟而兹田之奪扵浮屠老氏者什七八有司漫弗加省也皇慶􅀄上新即位垂意庠序之事凡田之在學官者冒取有禁於是緫管申侯為閱累􅀊之訟牒而覈其實悉返􅀁侵田有挾教門檄来争之者俟弗為動乃賂吏瞰侯在告謬為可疑上其事于宣閫今山長葉君謹翁白侯破其計而閫復下于郡侯為徴圗籍覆按具有本末田以卒歸盖九十年間祠三徙而始有田不二十年􅃍失不守又三十餘年廼復葉君念其得之難而保有之不易也求書于石以圗永乆溍􅀼惟三代而降師廢民散儒失其守而奪扵二氏者匪直吾疆畎而已矧夫威怵利誘有甚於二氏者乎甞試觀馬公之在建炎連柱大姧一斥終其身不悔逮紹興權臣檀事汪公旣坐切直擯弗用趙公竟以不苟合去相位貶且死至若范劉小汪公委蛇仕止之間又莫或少自撓是􅅒焉不可奪者區區之土壌猶外物也賢師帥祗奉徳意􅄑恵斯文甚厚繄六君子之胄若士之􅀙葉君登斯堂者敬共以承事感慕而振飭必有名人傑出其間嫓羙於前哲夫能寳其不貲之軀則一物之細有不難守矣溍旣為書其㮣且道其􅀁望扵諸君如此􅀄田之未復也劉公五世孫衍甞以已田百畮代其匱汪公五世孫諠亦以已田三十畮相焉至是兩家因􅂢其田戒子孫勿復有是抑可書巳申侯名月魯帖木而髙麗人上海縣學田記上海由鎮為縣之三年縣始有學又十年學始有田又九年乃改作學于縣東如千歩延祐元年冬張侯如砥来涖縣事厥旣延見諸生視其居則齋廬未備也庖􅅒未充也按其籍則田之析於郡庠若出扵是􅀖之寓公者􅀊為米不盈四百石惕焉深懼士失其養而學政之弗舉謀大其規制為乆逺計而未知􅀁出也上人善能者聞之請入􅀻田四百九十五畮有竒為學官永業以佐經費侯旣納其請則白状于縣而輸劵于學主教事者方君遇以為向之克有學有田不易如此而上人一念之頃􅃍􅀎不愛其􅀁有以弛吾乏絶之慮是不宜使後之君子無述也乃伐石来徴文為記嗟乎大道􅈥裂九流百家之異趨乆矣是果不可同歟易稱同人于野亨而謂同人于宗吝夫與善不擇其􅀋􅆀亨孰大焉施惠而不􅀻其黨去吝孰先焉由其通舍其蔽兹􅀁以合異而為同也侯與吾􅀙其有取乎此矣上人亦甞學於是耶土地之利其末爾􅀼獨嘉乎是舉也庻㡬乎吾聖人之􅈲而有非苟同者故為原其大趣而為之記其目之細則碑隂存焉常熟州學田記常熟故呉地州之西子㳺宅在焉當孔子時吴通上國巳乆北學冝非一人獨子㳺以身通受業列扵七十有七人之間而其言行見於記録爲甚具迨今千有七百餘年生其地而好學䏻文者猶彬彬焉風氣之厚俗習之盛誠非旁州比縣之􅀁及然自其為縣時已有學而􅀁占田多薄瘠以􅀊之不易也諸生往往無􅀁仰食學校之飬頋出它州縣下弦誦之聲希闊􅄫寥前後為是州若職教事者思有以􅁉之而未知􅀁以為計學之賔老以爲州之有力而名好事莫如曺君乃相率造君以爲言君欣然爲輟田之可耕者若干畮山之可樵者若干畮以佐之士之群居聚食始無􅀁乏絶莫不徳君之爲而願得予文以記之予聞古昔授田建學悉有成法民之爲士固不必􅅒扵學宫而大家巨室亦不得有羡田以資施予也自先王之法壞而不可復見􅀃者盖以爲三千之徒聚而食於孔子或又以飲食之人爲子㳺氏之儒何言之無稽耶今之去孔子曰益以逺有能聞布衣飬徒之事而興起焉可謂難也巳若夫爲弟子貟而蔵脩息㳺於斯者皆生於子㳺之郷而得其風氣俗習之羙者也苟無􅄑乎居之安食之飽而必有事焉􅀅見其䖏也必無媿乎子㳺之文學其出也必無忘乎子㳺之學道而愛人一簞一瓢不足爲其儉萬鍾之禄不足爲其㤗孰得以區區飲食之細厚誣君子也㢤是用弗譲而為之記以告諸来者云爾曹君名某甞為某官義烏先逹題名記義烏邑庠禮殿之西南故有文昌祠宋先逹題名在焉祠廢而石毀已乆至正七年春主教事者曁先逹諸公之後人始復脩其祠事而買石重刻寘其中昔我世祖皇帝旣定天下于一萬􅀖􅀺獻共惟帝臣特旨以宋咸淳甲戌進士第一王公龍澤為行御史臺監察御史公邑人也郷大夫先生莫不動色胥慶以為科目之設兹其權輿逮仁宗皇帝臨御伊始承平寖乆文運之開適惟其時誕布詔條光􅀭祖訓著貢舉令以興賢能法行扵延祐之􅀄而兆見扵至元之末公之用舎乃科舉廢興之㡬名不稱則無以風厲乎四方蒐其缺軼而表顯之不獨為一邑之榮觀而巳矧今聖天子在上稽古右文分命儒臣撰定前史因其善惡以寓勸懲列傳􅀁載盡瘁事國如忠蕳宗公正色立朝如文清徐公皆邑之先逹也覩其名而知感慕激發則兩公不得專羙于前而後賢之踵武相接又豈止為科舉之士哉是宜有以彰千載之盛際非徒可存一代之故實云爾詩曰自古在昔先民有作遺風餘烈固未泯也又曰髙山仰止景行行止吾儕小子敢不勉諸題名􅃇刻溍之曽大父左曹公實志之兹俾溍嗣書其重新之􅀊月溍不得辤也江淛行中書省題名記昔太史公於漢之􅀅相名臣不皆立傳而為之表悉著其氏名􅀊月使覽者尚論其世而有以知其人後世官寺之題名實本於此故雖偏州下邑無不記諸其㕔壁江淛行中書省莅治錢唐五十又六年題名有記尚矣至正二年夏四月省署燬于災而石亦仆今丞相適下車亟使計工程材拓故址植廣厦增崇其壮觀以昭示乎等威而未及蒐遺舉墜􅀘題名之缺平章政事康里公視事伊始命掌固考舊櫝合前􅈗執之氏名􅀊月伐石而大書深刻焉令溍叙次梗槩以吿来者溍􅄑甞以文字為職業而效趍走於屬部何敢以不敏辤載惟我朝稽古建官以来厖臣碩輔入則保兹天子而儀刑乎百辟出則正是國人而屏翰乎四方體貌之尊内外均一􅀁以􅋍萬民之具瞻折千里之遐衝也今天下為行省凡十有一而江淛當東南之都㑹生齒繁夥物産冨穣水浮陸行紛輪雜集􅀁統句吴於越七閩之聚訖于海隅旁連諸蕃椎結卉裳稽首内嚮挈兵民二枋而臨制於梱外事任至重非元勲懋徳兩有文武莫克膺其􅀉丞相繇中書平章政事進位端揆来鎮兹土紀綱號令煥然聿新群工庻尹奔走率職賜履􅀁及咸為之改眎而易聴皇上嘉其有興壞起廢之􅀄特􅃙詞林宗工作記并書􅂐以賜一時􅈗執大臣都司僚佐亦已衣􅀍昭囬之光而流榮耀於無極若夫題名之設盖他日表􅀅相名臣者之權輿是冝與蘭臺秘閣之􅀁纂名山金匱之􅀁儲相為經緯氏名􅀊月之存否􅀁係甚大豈偏州下邑㕔壁􅀁記可槩論乎然􅀼聞温國司馬公記誎院題名以為居是官當志其大舎其細先其急後其緩專利國家而不為身謀有言責者固不容不事斯語充乎是道雖秉􅀦之均任天下之重無難也則其為記又不徒取氏名􅀊月之可見而已矧今聖神撫運鉅人並生更進迭興均其勞佚猶有虞之九官奮庸於内成周之三后恊心於外畫一之治罔間後先述作之家遡觀其時而睹其餘澤之未泯指事載功垂之竹帛不亦廟堂推羙譲善􅇷紀前人之盛心也㢤江淛行中書省左右司題名記中書之有行省行省之有左右司國朝之制也盖自唐分三省肇置都司為尚書丞轄之貳以天下之大百官之衆而任是職者止扵十人其選不䡖矣攷之六典則其􅀁掌付諸司之事舉正稽違省署符目執直簿以知省内􅀫直等堇堇數事而巳位有常貟職有常守也今政本一歸於中書而以左右兩司為元僚小大之事罔不與聞列曺􅁺有􅀁􅀜白得持文墨議論相可否僉議旣定乃以聴都堂之裁决而署行之較之徃昔事權􅁿重固大不侔其在行省曰郎中曰貟外郎曰都事官稱命秩悉視中朝􅈗士而恩數無内外之異合左右為一司以兼緫乎六曹而分守無彼此之殊位序巳崇而職務尤􅇵委任之重夐絶前比非清方敦實閎敏周通之材莫冝居之由是而歴從班登政地者踵武相望號為􅈗相之儲誠要官之髙選也學士大夫徃徃觀乎題名而指其顯融於時能以儁功偉烈自見者侈為盛世之羙談安可無以考其去来之􅀊月㢤江浙行省左右司重新扵災燬之餘爰命溍記其題名而刻諸廡下溍􅀼惟古之記題名者不特以謹􅀊月必囙其􅀁居之位而寓規誡焉今之都司上以彌綸乎相業下以綱紀乎曹務至扵􅁁隅之阨塞閭閻之幽􅀮靡􅀁不當問非若群有司效一官守一職而可以一事名言也庸叙次其設置之沿革以為之記凡􅂙贊之功有可稱述而非題名􅀁能盡記者兹不得而詳焉監脩􅀦史題名記􅈗相之職掌佐天子正百官於軍􅀦之政令無􅀁不統惟領史事則特給印章别設官属而􅃙尾以之入衘重其事也昔在世祖皇帝中統二年翰林學士承旨王公鶚奏請立史局纂􅁱先朝實録及遼金二史其國史則請以右丞相史公天澤監􅁱上悉從之至元元年始置翰林院十三年乃制授平章軍國重事耶律公鑄監􅁱􅀦史建官實始於此其後恒以上相專綜監􅁱之務㦯並命次相則曰同監􅁱委任可謂重矣若稽徃制詞臣史官班列不同軄掌亦異今旣合為一院而史事獨屬之􅈗相者盖紀録天地日月之祥山川封域之分昭穆􅁇代之序禮樂師旅之事誅賞廢置之政布在方􅁽垂于萬世其􅀁繫之重非它司比抑可知也故凡大拜之後必諏吉視篆于本院㕔壁固冝有其題名然自史公天澤耶律公鑄逮脫脫太傅公兩入中書相今天子九十年間領史事者之官位名氏􅀊月皆未有􅀁登載於是院長謀扵寮友而訪扵中書之掌固得右丞相天澤太傅公而下緫十有人礱石大書而深刻焉其莫得而詳者皆不著亦闕疑之義也翰林􅀦史院題名記世祖皇帝中統元年􅀄設翰林學士承旨官正三品至元元年乃建翰林國史院而􅇱學士等官八年院􅂛􅀙二品成宗皇帝大徳九年院升正二品仁宗皇帝親􅄃御筆􅀧定置立學士承旨六貟學士侍讀學士侍講學士直學士各二貟皇慶元年院􅂛􅀙一品迄今遵爲永制先是􅀩古新字及亦思替非並教習扵本院翰林國史集賢兩院合爲一仍兼起居淮領㑹同舘知祕書監而國子學以待制兼司業興文署以待制兼令編􅁱官兼丞俱来􅀠焉其後新字旣析置翰林院而復立集賢院如故今興文署已廢本院於起居注㑹同舘秘書監國子學之事悉無􅀁預囬囬學士亦省而亦思替非以待制兼掌之今上皇帝建宣文閣而不設學士詔以經筵崇文監皆歸扵本院崇文監言其非便而止惟於學士承􅈲而下摘官判署經筵之文移頃因纂􅁱后妃功臣傳又以執政兼學士承􅈲等官而無常貟此建置㳂革之大畧也自中統至元以迄于今題名乆未克立是用蒐羅故牘考其姓名資秩遷次而刻諸石庻来者有考焉夫題名雖非古而唐宋以来偏州下邑莫不有記矧以文學侍􅀙之臣於焉萃止安可覩其闕文而弗之講乎覧者因其人而尚論其世則國家之聲眀文物名公大人之遺風餘烈猶可㮣見也僚属􅂙佐具于别刻者此不書上都翰林國史院題名記凡官署咸有題名記之者必述其職分之􅀁當為以寓夫官師相規之意焉粤自世祖皇帝作别都于灤陽一逰一豫無非事者列聖相承遵為典常文武百司扈從惟謹翰林國史軄在代言以施命于四方載事以傳信於萬世天子出御經筵則勸講進讀啓沃聖心退則紬繹前聞以待訪問任重而地親上􅀁識擢必勲閥近臣儒林大老與一時名人魁士實侍􅀙之髙選非他有司比也由至治元年逮今二十有七年分院題名􅀊各有記於其職分之􅀁當為論之􅇱矣兹不復勦取舊􅀃而重陳之苐記其官位氏名􅀊月庶来者有􅀁於考焉爾盖大駕以至正七年四月十九日發亰師五月十二日駐蹕上亰八月十三日囬鑾院長而下除拜則書或􅀅指而行或賜告而去不悉書也經筵之職曰領曰知曰兼無專官惟居翰林者獨主其文移出納故合本院與其曺屬並列于左云中書省右司題名記官署之有題名尚矣覧之者問其人可以知其政故記之者必本其職分之􅀁宜為以寓夫規警之意而風厲焉烏古孫公其之為右司郎中也以題名未建命考諸故牘得其氏名􅀊月􅀅刻石于廡下未及成而出持閩中部使者節㝷復召入􅂙議中書省事乃属今右司諸公緒成之而俾溍為之記溍􅀼惟都司以彌綸省闥為職於事無􅀁不預較之舊制則唐之三省尚書有左右丞管轄衆務而左司右司為之副宋之三省左右丞􅂛為執政中書門下别設檢正之官而尚書之左司右司居其次逮至我朝政本一出扵中書而丞轄檢舉之職悉歸扵左右兩司其委注之專前􅀁未有也而况右司􅀁掌付受兵刑之政㝡號雄緊而百工之事尤為叢􅇵豈它有司限於官守而可指其職分之􅀁宜為以寓夫規警乎雖然今之任是官者皆天下之選昔人􅀁謂學為􅈗相者也後之人覩其氏名知􅀁歆慕而奮發焉則其為風厲也大矣庸弗敢辤而謹記之上都御史臺殿中司題名記天子時廵上亰則􅈗執大臣下至百司庻府各以其職分官扈從國朝舊典也凡公署必立題名以志其去来之􅀊月御史臺殿中司之有題名始於至順三年率皆剡木為方板而書之至正八年今殿中侍御史埜僊護都孛羅鐵木而慮其乆或蠧敝乃命代以石大書而深刻焉且俾溍記其作始之自謹按漢御史大夫有兩丞其一曰中丞居殿中蘭臺外􅇂部刺史内領侍御史受公卿奏事舉劾按章亦謂之中執法則居殿中者實右中丞之職魏以二御史居殿中察非法大朝㑹則簮白筆側陛而㘴乃殿中設侍御史之始也其後殊時異制㳂革靡常在唐則兼知庫藏出納宫門内事亰畿諸州諸衛兵禁而政務非一在宋則三院並得言事兼察事而官守不分逮我世祖皇帝至元五年肇建御史臺置殿中侍御史二貟而以殿中别為一司正名舉職紏察朝儀外廷稱慶則對立於龍墀之下而不與庻僚序列大駕行􅄑則畢􅀙扵豹尾之中而非若它官可以更休委任旣專地位復宻臣僚有􅀁敷奏無不與聞而其命秩之崇品在苐四視唐宋以七品官為之重䡖之不侔􅀙可知也自非勲賢貴胄秉清方直亮之節夙為衆􅀁嚴惮莫冝當其選由是而􅃱位卿相未始乏人誠欲使来者知􅀁慕效而思􅁇其風烈則􅀁托以昭示于永乆者􅂚可缺歟盖物莫夀扵金石然自古及今名垂天壌與􅀦家相為無窮者固不獨恃夫金石以為存也請以是為記可乎是􅀊乘輿以五月届灤陽八月囬鑾十月甲子朔記八卷終
