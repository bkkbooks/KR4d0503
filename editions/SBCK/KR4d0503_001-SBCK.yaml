  text: 金華黄先生文集卷苐一初藁一
  hash: sha256:f591110d7f13d1942d143e383808f61b45159481fba48d3cb01e03acbd61b36b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0503_SBCK_001-1a}
body:
  text: 五言古詩臨川危素編次番易劉耳校正􅇎詩五首日月東而行羣動亦不息寄身萬物中寧獨􅒜兹伇􅀁以魯中叟遑遑走南北聖哲諒已然旅人䏻久安晨起歩南園旭日朗以清葵花衆草中曄曄敷丹榮流光非汝私獨爾心自傾覧物有深懐竚立方􅅤情􅒄玉與寳劍淪落初未偶君看被湔袚各在千年後􅀅身比金石誰當獨長久悠悠百代下相知復何有􅀌雲澹無心出山偶爲雨長風忽吹散渺􅄅歸無䖏唯餘向来山突兀青如故慷㢤魯仲連㓛成身已去春風著萬物欣欣皆自私可憐児女花榮悴更相持獨有澗底松偃蹇如不知何疑楊執㦸草玄髩若絲效古五首上山見明月下山月相随月豈知愛我我行自見之故山日已逺故人不可思殷勤謝眀月願爾無時虧女羙衆􅀁恱士竆丗􅀁䡖䡖重安􅁕言泥盡水自清淮隂初􅀉食曲腰跨下行季子黄金多妻嫂来相迎自古已復然歎息空吞聲撃石乃有火石火光不􅀭攀天亦有路天髙路何長嵯峨萬古雲下覆歌哭塲富貴誠􅁕多貧賤不可􅁯落花随風吹各自東西飛花飛旣不息水流復無極同生不同歸􅀎勿異顔色木生則有枝豹死則有皮悠悠岐路間多言亦奚爲飲酒莫盡醉盡醉無餘懽讀書莫弔古弔古多悲酸蕭艾蔽中野白露摧芳蘭鳳飢不得死鴟梟食琅玕去去復玄玄采芝青雲端人事如草木人事如草木一氣榮悴之外物何預人而寘喜與悲堂堂異姓王昔者跨下児窮通本觧后逹者固不疑阮生亦隘人慟哭真奚爲煌煌眀月珠煌煌眀月珠未害居濁水君看黄河黄豈觧汚清濟我方遺吾形寵辱齊一指懸知破琴戴未若檛撡禰微雲翳白日微雲翳白日羣動何喧喧嗚呼麒麟兒化爲猴與猿登髙望四􅂽但見黄河奔誰㢤泝其流與我歸崐崘萎㽔青桂花霜霰日已繁豈不有桃李對之可􅁯言古意荆人初得玉趼􅁕辭巖阿持獻萬乗君君門正嵯峨誰其尸􅀦工􅍝以石見訶迷􅀖誠不忍欺君反同科臣口不自眀臣心終靡它抱􅒄重再拜呼天淚滂沱淚盡血可續玉在良已多是事古則然嗚呼今柰何連雨􅇎書五首蕭蕭十日雨出門竟何之不愁道路難􅀁懼沾我衣悠悠看屋梁作計誠己非有酒不觧飲且遂哦吾詩昔慕栗里翁頗復志耕耘偶入翰墨塲把筆學爲文偃蹇獨何成喧啾浪云云念彼荷簔子竆年愧其勤虗堂坐無言繾綣悲宿昔常時眼中人已如不相識剥􅅣者誰子令我喜折屐忽去已莫􅇷一咲岸玄幘我思仇山人山川莾回互十書九不到木葉􅀊頻暮頗聞近移居併失萝中路得無挈妻児倒載入山去今日􅂚不樂􅀌倡無與酬兀坐把書卷展玩不自休借問誰􅀁爲其人已千秋山雨政可聴撥書置牀頭晚晴􅂥雲散積雨林木􅅤餘清披衣有奇懐偶􅀙林叟行新晴逺峯麗夕隂􅀌花眀曠日固􅀁虞聊茲息營營夜歸空山四寥寥落日翳榛莾蜿蜒草中逕躡屩度寒雨楠杉窈深黒忽忽疑伏乕林窮澗水眀稍聴歸人語讀忠簡宗公遺事公初起􅇭陽艱危屬多壘蒼然􅀦家意委身干戈裏隂飈卷翠華􅃋雪被南紀悠悠虞淵日力盡揮不止寅恭秉齋􅃏際㑹􅄏朱邸長安付馮異漢業中興始宮庭􅁆汛掃蹕路無荆杞疚心望鑾輿感激涕如水上表方出師嗚呼孔眀死宴安不可懐肉食毋乃鄙巨舟竟未焚三語猶在耳蕭然舊祠下碧草垂階戺豋堂挹光儀赤舄仍几几千年堕淚碑一夫敢殘毁傳家有遺書叙事非虗羙朂㢤慎失墜庶以禆信史陪諸老夜飲丗故不可料忽若浮雲移坐令百年内顛倒殊懽悲頋惟我與公異代同一時覽古既􅀷慨撫今亦餘噫長川玄悠悠青山暮委蛇向来遠逰意我行方遅遅咄㢤有志士卒􅀊恒寒飢况復託渺茫欲與千載期盈虗信天運癈興豈人為願公姑舎是一觴聊可持暁行湖上曉行重湖曲旭日青林半霧露寒未除鳬鷖静初散寅縁際餘景閃倐多遺玩㑹心乍有得撫已還成歎夙予丹霞約久茲芳洲畔獨徃願易違離居􅀊方換沙暄芷芽動春逺川華亂存期乃􅄫寞取適豈爛澷小隠倘見招漁樵共昬旦西峴峯層雲抱春岑急瀬􅂥嵌竇􅁱蹊入窈窕衆緑蔚以茂名亭標水樂柱折􅂽碑仆幽㝷得緇廬亂石扶結構青精午堪飯碧澗寒可漱平生慕真賞及此成觧后􅁳􅊥指絶頂有路忽通透縁蘿度􅀩宻翠氣濕衣袖􅀉身萬物中下睨人寰陋清謡􅇎風竹大嘯落巖狖東峰在眉睫可望不可􅈬同逰却何時瑶艸春已秀夜興三首秋氣入病骨殘夢翛然驚芭蕉葉間露風過皆成聲攬衣泬􅋁内搔首天河横飢蛩語不休中宵誰汝令􅀌鴻亦何苦犯霜度㣲眀悠悠念羣動百感忽我并大化倘不爾吾其免營營寒星挂踈林夜色翳餘暝雞聲驅行客出門路方永亦有山中人熟睡方未醒而我立扵獨婆娑玩光景一咲天宇青此意君自領舉頭見殘月葉脫知深秋今我􅂚不樂􅀊月如驚鷗常憐古志士辛苦歌飯牛空山夜澷澷政合秉燭逰臨風振吾衣蕭瑟不得㽞小立殊復佳澗水鳴幽幽陳生詩陳生少也􅀌秉志何軒軒讀書奉慈母承顔郁春温兀然䖏膝下不間晨與昏叢叢萬井中陳生􅀷􅐬門暉暉百花時陳生不窺園常恐去左右㦯乖覆育㤙一朝抱長痛飛霜隕秋萱鹽酪不入口日夜涕翻盆欲娶弗及養矢言終不昬尚賴百􅀊後兄子父􅀁孫朝来逰子衣忽逐東風翻丗方酔糟粕何庸薦犧尊陳生頋謂我是事安足論􅄑託山水窟放情詠蘭菰嗟今學歩者觸險争飛奔願爾利鋤钁深斸六籍根願爾進竿艣髙泝百聖源源長流自逺根大枝乃蕃勿揺崔嵬茟􅑞作磥磈言􅊼惟孝與弟百行兹其元咄㢤行勿休日月方沄沄贈言豈予敢情真􅁴辭䌓匪為陳生榮庶感薄俗敦述懐端居有多感求志無餘營夙違金門路緬愛丹丘名􅍝沗君子頋捧身厠羣英卑栖念逺引窘歩迷先征俛黙敦宿尚低􅆦阻平生伏枕勌中夜􅄃衣寄遐情上天廓澄穆列宿揚光晶俯視林木改仰悲鴻鳴跂予秉微素十年守柴荆希丗􅆾近務慕􅀮餘􅂨誠願言良時晩庶保幽人貞寄方子踐子彂竆居悵無遂徂􅀊聿載隂飛翹隕芳華􅀱蛩厲哀音曽颸扇叢薄泫露栖喬林撫景慨徃古端操思􅁇今折蘭間幽佩觧纓濯清潯石林窅䓗蒨桂栢􅉱䔥森遺丗豈余敢匡時非我任覧已􅒜高􅁤即事念􅀁欽緾綿阻道里􅃡􅊬眺崗岑委懐竚芳訊貽好在䂓箴寄俞子易間居寡歡豫枉駕忻周旋清言邁􅁱夜朱火銷餘烟嘉㑹良不易􅊊抱罄􅀁宣揆余徇微業春冬屢徂遷著徽怍徃哲馳芳􅒜時賢睠兹企三益揮袂増慨然杪秋淒且厲郊圻曠阡眠振飈捲飛藿積霧迷遐川契濶􅀊復流瞻望情􅀁牽存期尚勿奪輔仁庶不諐紫芝無新曲白駒有遺篇矢心遂招要贈言比芳荃東園晚歸淟涊嬰近務超遥爱佳長興言望東菑良苗藹津津鄙人昧時趨曠途夙􅀁遵􅄑逺簮組累稍欣田圃隣兀兀豋故畦悠悠睇城闉理􅁾出新竹撼枯落荆薪夕日逗逺川餘暉散衣巾亹亹物變依依念農人渠渠長者惻惻非賤貧送􅇒􅁻叟杭州教授浙水西八州維杭寔名都古来萬人海逐逐無賢愚况兹百年後淳朴古不如翩翩誰家児白馬驕路隅春風樊樓醉一咲百觧珠亦有朱門家齊謳間昊歈綃綺散烟霧繽紛被僮奴可憐彼􅃖􅃖乆爲紅塵驅頺俗如波瀾孰障羣流趨又如敗屋壁風雨湏人扶􅀶士非冗官豈即無良圖當令歌舞塲化作弦誦區行矣徇􅀁務辭章信其餘春風撡别衣晴沙秀寒蘆何以贈子行白雲不可呼聊持狂者言用比貂䄡褕送朱仲山之亰騏驎出渥洼意欲周八極芻豆豈不多未便甘伏􅇫念君抱耿耿坐視暄􅈵易忽辭白􅄠親去作青雲客應􅂲鄧仲華咲尓長􅄫􅄫鄙人屬有念未辦經丗筞青燈雨如綫窮巷方偪仄懸知操斧斤不必晲樗櫟往哉布汝懐庶用副前席勿云萬戸侯自可談咲覔百年㴞㴞内􅄮路足南北出䖏㑹有為聚散奚暇惜歌我􅄑苦詞送子逺行伇峥嶸壯士志􅃤澹逰子色那無平生宦扵南予不識其父而識其子叔敬與之交信其􅀁受之正矣始其父卒潭府推官顧言曰吾以一清遺爾子孫吾以為豐爾毋以為嗇也及叔敬免䘮有仕資掲遺清扁􅀁居堂上以承諸其先下以詔諸其後之是意也豈以一言易千金㢤它日叔敬過予寅軒請發其義予無以觧焉予聞舉其􅀁有持以予人謂之遺而遺必有其物矣投桃之腆不薄扵報瓊與帶之華不滋扵獻紵故有􅀁遺者其遺淺無􅀁遺者其遺隆昔子之先君子推其􅀁蓄以悉敷遺扵子而子又􅀎兢業奉持以保有􅀁遺如臨水玉如飲沆瀣不泥滓以取義也不翕訿以為灾也不䟽宕以取容也不窒塞以廢權也淵然澄穆之天洋乎陟降之地人城頭鵶鳴曙起坐理冠幘開䆫寫遥望烟霧竟川澤喧喧市聲動漠漠井氣白如何山中人􅀊莫塵埃客晚泊釣􅄗下四山環一水遺􅄗故㠝岏那無漁樵居政復不敢安舎舟不敢兩慿軒俯清灣念昔乗興来無􅀙寄逰觀今我有行伇乃尓容躋攀山靈豈爱我為觧塵􅁟顔落日奠蘋藻清風聞珮環幽尋不可極林暝吾當還却去望層碧􅀌舟生晚寒豋鍾山􅇰髙頂以三山半落青天外為韻得天字平陸澷千里兹山乃穹然猶憐布地金未即辭喧闐巖液散珠琲春崗走蜿蜒稍欣涉幽􅃉豋頓衣屢褰路細石礧礧崖􅀷竹姢姢洞扉剨􅄏敞峻峯指中天􅁳􅊥􅊗嶔崟垂蘿弱容牽碧潭隠光恠華雨標崇筵下睨飛鳥背茫茫但蒼烟眇黙玄圃期淒􅈵雲嶠篇休駕􅀅未䏻惆悵春風前休日集于城南投耒􅀙逺逰牽世乖眀略豈不有簡書未䏻置丘壑崇崗近盤互春物紛照灼休沭集諸彦迂趾恵前諾稍空林中尊復詠霞上作迢迢􅊗􅇕壠靡靡瞰城郭􅁱楊䕃晴渚野櫻散朱蕚撫時悼推斥畢景願栖託損益向子明才䏻賈生薄睠言觀􅀊寒無􅀅媿塲藿卞忠貞公墓江左失其御強臣玩天誅􅂬娱一以乖狂猘無趑趄黄屋播草野􅊮庭交劍殳事樞始誰秉捧手如奔狐偉兹百丗士死與二子俱􅀌哀耿未沬􅁕以孚豚魚義旗果東指白日開天衢孰最撥亂㓛之人㦯其徒伊昔大雅癈清言鄙文儒禾􅎟已横委衣冠尚舒徐屹然見砥柱獨障狂瀾趨髙風􅊬難攀捐生乃區區青簡煥遺烈蒼榛閟幽􅇕日夕悲吹多天髙年運徂世方用骩骳猶􅀅愧玄虗江濤􅄅在望雪涕空漣如制使馬公祠堂朔風破滄溟白浪無餘地可憐甘棠樹乃尓䏻蔽芾借問誰􅀁遺馬公古䏻吏當年印累累庶務􅇵千蝟藏􅀛不待灼騁駿無㽞轡偪仄兵馬區藹然承平意宴安亦􅊃爾國歩方不易至尊乆甞膳壯士頻烈眥煌煌青􅁳鉞可同牛刀試嗚呼豪俊人竟偃風雲志􅆀身豈云卑生丗己其季安知頴川守遂非廟堂器嚴祠􅐬􅄫􅋁古木􅅤蒼翠平生瓣香祝母廼兒女事如何百載下能􅑁看碑淚永惟茂􅁜翁苦心抱天藝力耘冝有收黾勉觀未裔渠渠桒梓恭喋喋市井議􅞈哉瞻前􅁱樹徳母自畏送人赴盧陽學官播非人物居潭陽實其隣􅂽滛􅇎巫􅀑哀怨餘騷臣念子有行役水陸弥􅁆旬乃知臯比座佇承文翰賓遐徼指天末男􅀖控城闉爼豆當在列冠裳㝎来臻􅁕眀理化盛演溢周窮垠廣陌望八􅂽出車日轔轔蠻荆孰無􅆘忠信惟書紳簡書有程期取别無逡廵揚鐮觸炎熱振鐸驚逺人沅水春蕩潏楚峯暮嶙峋行行慎其度離别何苦辛發金􅁜㽞别一二同志盛名不易居直道我􅀁遵雖枉嘉遯志未渝白圭言罷釣出滄海逥帆遡江濆城闉逺㓕沒風水屢崩奔蕭條故交地愴恨遊子魂始雷茂陽澤􅀌生限竆鱗況翔自殊勢衰榮實同根戰勝物可遺目擊道已存乗桴詎無取絶弦難具論􅀉言同心子母徒念加飡龍灣夜泊乗潮出逺浦日暮北風平髙亭不可望遥遥鼓笳聲月眀寒鴈下江空夕􅃄生非關川途念沉憂坐自盈敬亭山昔窺謝公作今陟敬亭寺徴素忻始逰賞勝資􅀷詣翛翛縁水木宛宛交蹊術緑縟澗艸豐幽飀松飈駛微鍾響沓障高閣浮花氣聿熏旃檀妙豈愛巖壑媚慿生實内惕即事多􅁳契息隂睠枌檟搴芳懐芝桂海岳期屢遷石林路􅀷閟經營􅆾道要廹窄餘物累稽首調御尊尚飲無生恵宿雲黄山作束髪弄文史挂席玄瀛壖觧后乖良㑹擯落迨兹年息景念生理洗心賔象筵恭惟上皇代異人秘靈詮宗師既逾海兹山亦棲賢金棺㓕䨥樹寳箧緘紅蓮仰窺攝誘㓛信知願力堅内愧實菲薄􅁳通未精專褰裳碧峯雨㷊香石林􅃄綵翠何紛糺苔澗窅洄􅆓㝷幽匪外􅆘藴真冀重宣二邉離有無五濁空腥膻豈伊俄頃用庶謝平生縁重豋雲黄山兹山實靈竒􅄍納變舒􅃤太常闕弗録名􅃅何黭黮重華秩山川盛典軼封䃭蒐遺侈綸綍蠲㓗羅醢酖腐儒世􅀁貸薄藝守􅉢槧無䏻旅駿奔徒取肆逰覧霖潦時始收天地餘藹晻嵐光乍璘㻞石狀終黤黲行行恣芒屩徃徃得蛙坎冒進誠近貪自畫􅀅豈敢乆之雰埃豁秀色坐可􅄃青熒挿鋒鍔翕赩披菡蓞崖奔馬騑騑石踞乕耽耽髙㝷指天路幽矚極玄窞前行㡬台背後㦯兩髦髧縁崗既踸踔豋嶺仍轁􅰬舉頭塔廟涌地平忽如毯天人􅀁食息璚玖化餘糂林輝寳燈焼風語金鐸撼敗壁詩者誰漬墨􅅍濃淡險盡乃更佳疲極復何憾是莭蕤賔初野薦首昌歜煑瀑茶可啜剖石􅁡堪噉名談柝毫􅄠苦語􅅹肝膽理􅁳心自􅎇機湊首屢顉陽烏砉西翥衆色齊􅃤澹崔嵬識楩楠蒼莾辨葭菼莫投僧􅀁寰鍾鏜鼓紞紞羣居肅不㕦共飯聲有嗿逥睨夸奪塲撫事叢百感趨名蛾赴燭逐利魚投槮何時脫火宅霍若髭去頷綺言息諵諵妙供分馣馣扵焉寄相羊庶以􅁯坎􅇄誰云入道苦餘味需橄欖秋夜觀書作閒居感時駛獨學難為㓛眷言思古人幽懐極冲冲秉燭起中夜􅄃卷来清風恭惟千載心皎㓗懸無窮氓俗自升降丗道非汙隆後来亦奚爲黒白紛相攻芳華乍可悅􅁤轍何由通吾􅀅離言􅀃庶以觀其同􅀁憂眀為累不懼不豐開軒視眀河白月當天中怡然掩書坐夜氣方鴻濛覧元次山舂􅁜行有感近事􅇷和其韻惟王始建官民命有􅀁司柰何閱流莩束手無一施屬者秋夏交上状殊酸悲赤日紛按行人馬同時疲連阡見標􅖑不救飢與羸仍聞恣鞭箠慘切傷膚皮檢覈湏再三供帳常恐遅哀哀鬻児女貿貿行安之感兹欲無訴既往何由􅇷尚慙噢咻㤙稍緩租稅期云胡有倉卒徴歛更相随但􅀅􅂶其􅁆肯復計爾貲􅁏食不自鄙謂我非敢知栖栖甔石儲剥割無㦯遺言是隣壌凶藉此敷恩慈寧知是州人俟死它無為出語餘喘息行歩湏扶持猶令比樂􅁟疾苦端謂誰俛首州縣間逭責自其冝况迫大府令聮絡飛符移豺狼方在郊鷹隼冝用時區區獮狐兎政爾何増虧吾賤不及議為君陳苦辭豋錢山望菰城慨然而賦吴興水為州諸山若浮萍况此一培塿瑣屑丗未名􅀁欣漁樵居乃與緇錫并種竹有萬竿結茅無十楹老僧觧人意蹝􅂂能相迎芳艸被行逕朱藤暗巖扃䔥條空階暮日照莓苔青猶嫌􅀁􅊗卑未極逰眺情聳身白雲上始見春申城想當髙㑹時楼􅀚飛青冥竭海薦壘勺竆山羞鼎鉶安知千載後􅄫寞無人行煌煌冠盖區壤壤狐兎營歸来朱門客聴此松風聲逸山過姚紫芝别業逸山誠復佳逸人不可逢何言一咲頃得此蒼髯翁今晨過其廬碧苔㓕行蹤㘴我松竹間野簌羅甘豐初無驚丗談頗多曠士風念昔玄巖壑輟畊白雲中白雲故無恙我乃羞樊籠秪應山林癖未易藥石攻髙期出觧后意氣􅀅無同十年舊泉石忽忽蟠吾􅅐起視白日低歸禽亂西東㧞地森四壁􅍴天唯一峯復聞麻谷幽近與金盖通山態方屢改泉源殊未窮湫然一區内嗟我憧憧次韻荅􅃽眀府先生文章不經濟躭書㦯成􅁋偶􅀙長者逰稍窺古人心不瑑豈非玉無絃孰為琴􅀊晏燈火微江濶魚龍深願言報嘉貺安得䨥南金次韻荅儒公上人抱琴辭故山落葉被四野淒其不􅀎聲豈曰無和者誰􅑞織女工苦念嫦娥寡請公母多談呼酒觴老瓦和方韶父先生以滿城風雨近重陽爲韻七首掩書坐中宵階空葉落滿不見書中人蒼烟夢秋館豈不有膏沭􅀁慕非傾城翠袖日巳薄朂哉􅀊寒情栖遲憐繋􅀲夣􅄰􅇷飛蓬去去羊荆州吴帆渺霜風當年白衣人頼以慰風雨不飲政復隹有酒無用湑江瑶配荔枝勝䖏終不近好醜且勿争天道有㝎分聾丞遂已矣目㫁山千重烟霞故無恙勝㑹何由逢寒花衰復榮東籬㡬殘陽蟠桃亦何好千年期一甞七言古詩可憐行紅顔白面可憐子杖藜飢走荒山裏翠眉新婦雪色児掩䄂啼痩如􅀑道傍朱門照霜㦸膓断汝翁呼不起金魚象笏供樗蒲紈袴終然愁餓死春風秋月哀思多嗟汝少年柰老何崑崙歌寄吾丘子行翠鸞啼雲天四垂花龍䨥䨥神姥歸金僊憶君淚如水昌陽落花青蕊蕊曽城珠闕􅀭素氛􅄏眀狺狺環九門羲和赱馬不待人鯨魚吸海海生塵若有人􅀆悵􅁱阻紫玉叅差老鳳語咲揮如意教雲舞雲間鶴雖生两羽歸来歸来勿蹉跎秋風吹折玕琪柯梓山行贈桒生昔聞山中采藥翁問姓但􅃌簷前桐君家本以桒為氏胡不種種桒翻種梓桐君采藥不學醫桒君學醫兼采詩朝来索我歌梓山使我閣茟頻搘頥問君梓樹家何䖏青山難㝷夢中路但見清風兩袖寛詩筒戢戢多扵樹長歌短歌亦奚爲坐看藥籠懸蛛􅁝種桒種梓俱有術也應無術醫君癡采芝曲贈永嘉林道士碧峯矗起三十六老芝千年琢紅玉帝遣仙人下采芝迷花失石憺􅁯歸忘歸㡬載無消息蟠桃積核髙􅁆尺何日青牛駕爾還肯念金華牧羊客登方巖謁赫靈廟却至夀山寺一峯屹立摩蒼穹四山拱揖如朝宗寅縁飛磴入鳥道獨扶瘦竹披蒙茸初驚細路跼垠堮歘児臣石蟠穹窿洞門髙開得絶頂􅀡恐上與丹霄通想像胡侯此弦誦草木遺韻猶渢渢前􅁱徃矣不可作尚喜像設餘靈宮豋堂謁拜仰風采奕奕華衮盤䨥龍白袍方領儼旁侍英姿颯爽皆人雄􅂉云衆神各有職出納雲雨天無㓛斬藤絶壁泣萬􅀑飲馬大壑清羣㓙初疑此事出俚語粉飾詐誕􅑞兒童又疑靈異古㦯有􅂽忽變􅏊難為窮咄兹茫昧無足問但恠俗子何憧憧􅀊時歌舞連􅁆郡奔走童叟多扵蠭前呵後殿擬法駕翠華赤羽揺晴空恭惟英靈本正直倐忽来徃無西東胡寧終􅀊乆盤礴縮取備物華其躬􅂽㦲舊俗豈侯意嗟我欲語愁無􅀙拂衣徑去􅃌巖麓巒花澗草紛青紅峯逥路轉逢古寺窈窕石室穿玲瓏連崗争前擁奔馬飛瀑怒落懸長虹􅂽㝷逺討不易極况廼人事多匆匆向来獨立渺何許􅃄霞㓕沒山重重却歸溪館弄眀月臥聴簫鼓来天風金華山贈同逰者三十韻杖藜初出城西門萬株紅樹如雲屯芙蓉峯前問行路宛宛一線随潺湲水聲漸逺山漸近弱蘿纎􅁑手􅀁捫湏􅁷横側變峯嶺髙岸忽復爲平原細泉瀏瀏竹竿直石樹駢立疑同根剥金敗碧逢􅆸刹猶以苐一名其軒天明獨去弔遺迹玉女委蛻空丘墦樓居西起望眀滅石扉呀若山之樊罅幽穴險徑沮洳膝行匍匐不得奔剨􅀚崖广架㵳泬䨥龍繞霤蟠蜿蜿紛綸恠狀滿巖腹熊乕踞伏鸞凰騫其餘瑣細無不有形求像索難具言前趨林麓却下縋俯矚九地窮涯垠青枝翠羽不復辨但聴風水聲喧喧髙燒松炬度其背珠箔忽堕華燈繁聳身上出􅃌􅅸頂碧桐髙下彌山園遥穿蓬艾蹋雲兩險艱􅀙此不易論秋毫細路莫容足下瞰不測傍無藩恠藤如鈎草如劍舉首仰歎愁攀援山翁頋之咲引臂前牽後接猴與猿馳坑跨谷欹側過背汗喘息逾炰燔隂沈古洞閟星日雖有寒暑無朝昬却行左轉復􅀷入愈􅁴憀慄摇心魂珠纓縹渺現滿月稽首大士天人尊拂衣徑逐飛鳥下青山出沒波濤翻㦯云漢人隐身䖏仿彿肩背餘苔㾗蛇蟠磬折又􅁆里龕巖十丈􅄏墉垣夜歸草堂殿突兀坐看雲月吐復吞怡然携手盡文士頗􅁴茟下来源源名山石室如可託􅄑子􅀊晏来無諼送俞觀光寒窓讀書吻政悲坐聞剥琢走啓扉衝風蹋凍至者誰俞子訪我繇剡溪相􅑮把臂語移時婦女驚咲羣児疑俗物病我不可醫眼眀見此􅃢瑚枝朝来贈我天馬詩忽然掉頭去莫覊鼻端氣息于虹蜺詎䏻折腰向小児文章技癢聊爾嬉筞勲聖䖏今毋遅繄我愛子莫助之臨岐躑躅徒嗟咨讀清江集元祐儒者煥星斗後有作者非其偶二龍三鳳何􅌭紛况乃淵源魯中叟適􅀙塵編識英爽想見丗澤餘忠厚長公平生二三筞大􅋝披腹驚羣后風流斑斑仲與季茅茨采椽絶丹黝獨􅇷古昔寓陽秋稍抉疵瑕到瓊􅅼却蟠餘力歸賦詠古硬清圓無不有爰初人文啓河洛下逮百氏分戸牖空言可託匪末藝巨茟待援湏好手典刑未墜乃至今吾生已􅄑何云後青燈照夜雨如綫奥論微辭煩擊剖追慕政復慙捧心賛羙胡能付鉗口􅀙逰起死不敢期儻挹殘膏注空杇題李坦之詩卷神仙中人丗莫識政以文章為􅃧􅇵李生也復可憐人手種蟠桃待春色山空􅀊寒誰念汝青楓堕影霜露白逺逰賦成一朝去翠盖雲旗暮何適蓬莱烟霧秋冥􅁳鄧君白鹿無消息袖中驪珠三百顆夜深勿近蛟龍宅金華之山青矗天山人看山􅁯􅀊年黄精芝草幸可食安得與子巢其間石牀醉聽松風眠無為長歌怨如哭使汝惻愴凋朱顔甲辰清眀日陪諸公入南山拜胡侍郎墓囬汎舟湖中作日終甲子斗直辰持觴逺酹胡侯墳兩槳趂鷗背城四十有四同州人半為吴語如季真湖窮岸出水陸分舎舟豋途􅃌嶙峋少年徤走黄犢奔􅂉乃喝道驚春雲老翁繭􅁕仍後塵觧衣徑眠草為茵前趨一里趨廟門杖蔾不得辭微􅉝嚴祠髙居絶四隣􅅖為一丘標石麟􅅩階鞠躬羞藻蘋拜興有相祝有文亦㦯稽首􅁛諸孫歸途􅊥幽抉􅂽榛下睨塵􅁟多蝱蟁放舟催彂無逡廵勝賞莫許窮涯垠􅄏蓬列坐羅羶葷託名鄉飲無主賔誰歟觧事强討論欲以窮逹為卑尊羙人今代王右軍口吐秀句天葩芬鴈行拱立何紛紛争言我公詩絶倫厖眉􅀍褐兩山民閉目宴坐方申申艤舟黑亭鵶噪昬晴楊吹花灑衣巾裁詩紀實聊云云慎勿浪傳来怒嗔送傅主簿吾聞上古之士比屋皆可封有材不必豋王公可憐衛青日尊貴飛􅀅自老風塵中傅公平生經濟手却抱一經今白首随人􅀐馬著青衫爽氣如虹射牛斗出門大咲望長安長安萬里行路難行路難知柰何贈公一杯酒請公聽我歌崑崙之山􅀆髙巍巍黄河之水􅀆清有時洛陽少年休太息東山謝公来未遅燕昭之事不􅁕云陛下聖徳如華勛願公功成名遂身早退魯連小兒能咲人苕溪風雨中章徳茂同汎黒風翻江白雨傾檣欹柂側㫁人行此時唯我與章子􅀌舟蕩漾烟波裏􅃄波蒼蒼楊栁黄浩歌撃舷興彌長翩然一葉恣掀舞青山白塔頻低昂朝過城南莫城北舟人問我􅀅誰適章子掉頭作吳語秋水夜来􅀷㡬尺忽看大字標竹林寺門對水仍隂隂敲門見竹不見人竹間翠石何蕭森逥舟少林雨如注四頋冥茫但􅃄霧魚驚龍躍吾不知披簑却入菰蒲去岸􅅖羣児拍手呼咲言狂客丗􅀁無嗚呼古人今則無後来視我知何如爲君㽞此有聲畫題作扁舟烟雨圖由苕溪出太湖抵陽羡十四韻首陽山人餓至死陶公乃爲􅏇􅀁驅大賢出䖏自有意腐䑕何得疑鵷雖誰初令我􅑁丗網乆抱磥砢行﨑嶇今晨咲與親友别􅃄波泱􅐯扁舟􅀌穹天大澤合爲一囬睨人境茫如無向来蟻聚安足戀而取窘束同囚拘暮投髙館燈閃閃坐談􅁎孔歌黄虞是間􅄑可容一息孰與臣􅃋肩侏儒汗顔俛首飽腥腐咄子􅀁樂非我娱故人殷勤入我夢云我作計陋且愚此生通塞乆自斷豈愛一勺忘江湖春風二月花蔽野􅃢瑚玉樹惟空株丈夫児女各有事為君起坐生長吁次韻子踐雪中見􅀉前年江南雪一尺腐儒共走誇三白寜知有客卧欲僵凍骨稜層撑鐡石今年復此雪塞門江湖無䖏浮吾樽野風蕭蕭日色死看人射乕蒼山根牛衣覆寒夜復夜金玉餘音慙慰藉平生萬卷定安施一瓻送我當渠借金華黄先生文集卷第一
