  text: 金華黃先生文集卷苐五續藁二
  hash: sha256:f50420ae2cb1c75edd30c02d312481eba2f2530310e9c18f6f9eef982a6e0326
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0503_SBCK_005-1a}
body:
  text: 五言律詩𥘉至寧海臨川危素編次番昜劉耳校正地至東南盡城孤邑屢遷行人雲作路纍石海為田蜃炭村村白棕林樹樹圎桃源名更美何處有神仙縹眇蛟龍宅風雷隔杳冥人家多面水島嶼若浮萍煮海鹽煙黑淘沙鐡氣腥停驂方問俗漁唱起前汀洋山夜發肅肅洋山暮倉忙拜水神吹噓端有力漂泊竟無津黑夜魚龍界皇天蟣蝨臣生還如偶遂敢憚歷微􅉝次韻答陳君采兼蕳一二同志溫詔欣𥘉覩峩冠盍共纓如何滄海上獨看白雲生燈火三千櫝氷霜五百程誰須富車騎終古陋桓榮憶昔雙溪上相逢暮兩時交游傾意氣談笑挹手儀草草中年别寥寥大雅詩受材知有分豐嗇竟誰同不謂飄零曰求賢網四張胡然卑小技乃爾閟孤芳寶唾非無色冥鴻詎有行𣪚材何所似徒愧飾青黃十載西州客論交著處新時時談述作一一望光塵淡月銀河曉暄風玉樹春幸令窺髣佛微薄尚何伸默守知存道清言不廢儒身方同木石名巳在江湖此士須前席何人屬後車惟應耕釣者縹眇識霞𥚑尚想南歸始簮花出禁闈塵沙迷故步桃李借餘輝有曰酬天造終身返布衣風流成二老巾屨倘相依亦有貞居子難忘太古情詩筒來絶響茗碗出新烹磊落單傳意蕭條異代名無為念離别惆悵不能平讀陳制幹遺事歷歷青雲上飛揚彼一時深春曲江宴清夜郾城詩老去山河在仙成日月遲空言徒有託千載欲誰期題剡溪張氏書樓木杪出飛樓仙山在上頭可能無客至小為借書留藝草春仍長虹光夜不收如何試乘興一棹剡中舟陸氏水軒分韻得揚字髙㑹軒楹敞清秋笑語涼行雲隨度曲野水映飛觴㘴挹才華盛衰慙鬢髮蒼新詩穿窈眇何力共游揚寄黃伯陽摻别逢春雨移舟落夜濤忽驚滄海大轉覺碧雲髙揚子多竒字王祥忝佩刀深情空繾綣短髮正刁騷送陳飬直歸四眀迢迢浙河水同渡不同歸執𬒮方成别驚帆巳若飛野橋行酒處風雪去時衣瞻望嗟何及天長鴻鴈微題天童疊秀軒名山摽巨剎樓閣在青冥别路通禪窟當軒列翠屏暝禽多雪色偃樹盡龍形負土新成塔非才愧勒銘隆山牟先生挽章井絡收英氣文昌返列星能官須閥閲仍世覿儀刑漂轉逾三峽森扶並五丁芝蘭紛滿砌橘柚歘充庭它日看空櫪羣公羡發硎鼎湖驚掃迹華表訝摧翎風物嗟王粲心期託管寧乘桴良巳後抱瑟匪求聽此道誠何病眀時忌獨醒迢迢瞻北極衮衮化南溟薦剡多新墨恩𫀆秪舊青故應氊座冷不愧草堂靈食檗餘深味懸車及暮齡一朝傷永訣千古閟遺經謬忝鴻私久徒增雪涕零無辭歌薤露有恨寄泉扄送胡允文紹興録事斯文千載後一髮渺存亡尚喜衣冠舊能傳翰墨香春秋嚴助對冨貴買臣鄉莫厭官曺劇諸生在鴈行入亰道中寄同里諸友十年州縣底及此望亰華客路時時雨春江岸岸花何方堪報國將老更浮家可得同携手山顛復水涯送句龍提舉之雲南獨抱文章印驅車背朔風行歌萬里别聲教百蠻通列郡創殘後諸生色笑中誰當偕計吏封殖待新功癸酉四月同子長至赤松子長先去遂獨宿智者之草堂巳而子長與正傳俱來同一上人宿鹿田逰三洞還過山橋至潜嶽謁故中書舍人潘公祠堂復回智者而别昔共張公子翩翩訪赤松重來逾兩紀獨宿去孤峰古木蒼陂映禪房側徑通夕隂千嶂黑人語一燈紅幸及軒車㑹寧辭杖屨從相看如夢寐健走愧兒童春去山仍好林深澗忽窮天低時墮兩寺逺但聞鍾弔古田無鹿探竒洞有龍幽尋穿􅌄窱髙步踏玲瓏靈草多成藥踈篁不作叢嵐霏生暗曖野色在空濛下瞰疑無底言旋復向東巖阿棲斷礎煙際出飛淙細路緣苔磴危橋跨石硔泉依山曲曲雲與樹重重巨榜標名嶽穹垣護畒宫倚䦨斜日下入室老僧逢零落螭頭墨荒涼馬鬛封不才持薄祿終古望遺風弛檐雲關裏傳觴雪峽中追趨煩道侣述作付文雄急景真流電浮生尚轉蓬後期觀歲晏來往莫憧憧送趙仲理御史藉甚聲華舊頻年沭盛恩校書天祿閣執法太微垣攬轡炎埃豁揮毫玉露繁庸踈徒自笑投贈欲何言送趙宗吉御史憶共趨鼇禁驚聞正豸冠汗顔居館下矯首望臺端去路黃河直飛霜白日寒仙舟如可託歸理釣魚竿送王道一郎中使者下青冥郎官動列星揚旌開瘴癘持斧用雷霆逺俗難馴化儒臣解引經無知多詿誤能勿望平亭送宋顯夫憲僉分題得邵伯埭謝公千載後陳迹在淮壖遺愛傳終古嘉名配昔賢藕花方爛熳使節莫留連移取甘棠樹分栽郢水邊送宋翼卿照磨莾莾關河路西征獨據鞍借材蓮幕底飬望柏臺端指日傳溫詔朝天正法冠廣平心鐡石寧憚朔風寒送潮陽蘇縣尹夜水藏蛟鰐秋天卷瘴雲田多陶令秫石有大蘇文巧䆠誠為樂修才况不羣尚煩驅筆陳時復張吾軍送蕳縣尹蕳氏多兄弟才名萃一家嗟君本朝士出宰向天涯度嶺三冬雪行春一縣花應憐未歸客鞍馬尚風沙送馬伯忱教授卓犖青雲彥飛騰及妙年書成天祿閣座有廣文氊九陌車塵外千軍筆陳前白頭慙倚席臨别思范然送方叔髙巡檢矯矯列仙儒瀛洲路不迂大書歸石室壯志在桑弧田里方髙枕雲山總畫圗登臨屬多暇寧復嘆馳驅送劉子簡難弟與難兄專門用一經夫君眉更白諸老眼多青薦剡登天府揚帆指洞庭何官不可樂離合任雲萍題道士態君夀母詩卷跨鶴出山中春衣密密縫度關占𬗋氣賜酒折黃封介夀慈顔喜承家積慶重蘇耽却來否石上有仙蹤同劉遂𥘉修撰周伯溫編修任大瞻經歷王繼忘架閣西山行香次遂初韻仙馭賔天久衣冠此出游祗園金地古汾水白雲秋謁拜陪諸彥躋攀展寸眸始知山水窟近在帝王州深岫藏青靄平蕪映緑疇層臺臨太液環海像瀛洲粵自遺弓劒無從望黈旒眀庭虛次舍綵纜舊維舟陛㦸盈千列靈輿副九斿祠官偵伺謹中使往來稠備禮兼今昔求神遍顯幽琅函開貝葉玉瓉薦黃流肹蠁人天合輝光日月侔遙看陳羽衛疑是問龍樓花雨繽紛落香煙泱􅐯浮重關羅虎兕簇仗擁螭蚪去去簫聲逺微微扇影收清都成夢境塵劫等浮漚歸徑緣湖尾殘陽掛樹頭舉杯相慰藉分席暫淹留物色迂行轡風寒襲敝裘廽瞻天路永坐感歲時周戀闕慙衰朽非材墮謬悠詞林冨鴻藻珍贈若為酬試院同諸公為主試官作右轄升庸日秋闈獻藝𥘉端居煩㘴鎮妙柬備賢書憶昔興文運惟天啓聖謨教條行九有學業出三餘儒術俄中否詞場遂久虛綸言何噩噩髦士共于于吐握承謙德飛楊感牡圗至公留藻鑑成物待洪爐肅穆華星聚涵容化曰舒誰歟隨計吏行矣聽傳臚橘柚天朝貢參苓相府儲鋪張須巨筆衰朽愧荒踈誠院同諸公為監試官作文治回亨運群言協睿謀設科存墜典傳詔極遐陬風動黃簾曉霜飛白簡秋迂臨宣上化精察副旁求懷牒魚鱗集摛辭繭絍抽按行承奬飭鼓舞望甄收氷鑑垂清照淵珠免暗投充庭先品物入彀總英游奏自蘭臺上名依桂籍留神仙司下土桃李在南州使節光華盛公堂禮數優無能禆末論傾詠獨綢繆送餘姚孔學正不到歷山前于今二十年忽聞東魯客去㘴廣文氊短棹濤江外髙齊海水邉風雩有新樂况及暮春天逰石門净勝寺十頃蒼陂上山回地勢偏屋棲黃面老碑掛赤烏年葉葉風荷顫層層雪瀑懸青燈夜寥閴獨照一僧禪次韻王眉叟真人歲晏驚黃落樓居隔翠微擁爐春滿座卧楫雨生衣大患元非病髙飛獨見機桃源多美酒觴至且頻揮泉月開金鏡仙山並玉簮杜陵茅作屋涑水布為衾有約陪笙鶴交談接芥針三神那易近失喜聽新吟悼雨公離别騖雲散那知竟不回長期真滿供橫騖樂邦開一柱空危石重湖有劫灰去來誠夜旦覽物謾生哀送鏐上人逰廬山廬山幾千仞屹立大江邉地勝非人境雲深何處禪祥燈開黑夜怒瀑下青天物色撩詩興應須冨近篇送矩上人逰廬山廬阜西江上秋風道路賖泉飛青玉峽池浸白蓮花此去聊乘興何時定到家慿髙莫回首誤指赤城霞遊法華山回宿樓氏書房遙望嵩頭陀智者國師道場上清五雲龍夀諸山而未及其處贈同游傅生國章故廬湖水曲門對法華山百里空荒外三峯䁆靄間倦游煩汲引濶步強躋攀老怯髙寒境非緣興盡還小憩虛齊夕何人笑語同青雲一才子白髮兩衰翁節物逢春好名區有路通未能窮勝踐還往愧匆匆過永康桃巖立石平如削飛雲近可梯莫窮千古勝但惜衆山低靈草經春長珍禽隔樹啼人言舊朝士感事有留題七言律詩闕下口號遹駿先猷在作人忝陪多士奉眀綸端闈乍唘清光近臚句髙傳茂典新奎璧照臨回景運風雷鼓舞契昌辰不才何以酬天造徒詠菁莪樂至仁賜第後歸謁郡府承為置宴口號拜賜才霑雨露香又驚盛典出黃堂鳴騶合遝迂千騎坐席雍容纍百觴它日同鄉修故事不才終古𬒳餘光承宣德意逢眀牧諸彥能無共激揚郡㕔宴集之明日鄉先生復為置酒重述口號去年此日宴瓊林雨露光華映古今稱慶謬承賔禮重徼榮彌覺主恩深少須天詔從容至坐看宫花取次簮千載斯文寄來哲可應外物纍𥘉心北山歸路呈古心師兼蕳方外諸友尋幽偶向靈源宿却過雲關望翠微𥘉日映空千樹立驚風繞澗百泉飛舊題歲月人頻異乍别煙霞路易非幸有潘郎遺事在何時一鉢去如歸送樊生歸鳯翔負笈東逰萬里餘翩然却去復踟蹰金臺不入平生夢石室曽窺未見書赤曰蒼涼雙䄂窄黃流渺􅐯一帆孤眀時急士方如渴看爾重來出有車送祝錬師祠武當山春風馹騎過流星西指神山百丈青白道蜿蜿通使節玄關額額護祠庭按行石樹多千歲叱咤雲雷有萬靈想到天池却回首笑看日月兩浮萍喜趙繼道至有懷陳君采匆匆聚散定何常耿耿心期故未忘草木關情人事異雲霄回首路岐長交游歷落銀河隔製作紛紜瑞錦張為語何時共傾倒秋床風露己生涼寄别宋推官目斷仙帆去莫從翩然心逐北飛鴻未忘緑幕追逰盛况忝黃堂禮數崇南國幾人歌召伯漢廷有日相于公悠悠聚散何堪計趨走終期出下風送鹽官傅都目春風匹馬去翩翩老佐名州鬢未斑遙數驛程知到日㘴令官府靜如山河塘燈火機聲裏墟落鹽煙海氣間歷歷舊逰成夢寐可容乘興一追攀送姜學録短褐蕭條兩鬢蒼逢人猶解說春坊雲霄有路新推轂風月傳家舊佩囊此去官曺雖冷落不妨門戶暫輝光况聞寮友多華胄休暇過從樂未央何山夜宿艤舟夜聽西窗雨一别重來二十年何氏殘編非舊讀胡公遺碣是新鐫山中倘遂招為隱教外寧須别有傳巳對爐熏消百念感時懷古自茫然婺州治中致仕朝列朱公挽章朔風吹淚濕寒雲忍見層丘卧石麟千載文章非小技半生州縣秪勞人黃金帶重班方峻白玉樓髙記又新回首慈恩它日事不才終古望清塵寄子訥干夀道二同年憶同鵠立簉天關清漏無聲虎豹間黃榜未開齊望拜𬗋衣髙唱遽分班巳驚恩出尋常表更羡身居季孟間海國鄰疆幸無逺可容接武向蓬山天台道中殘雪𥘉乾不作泥微隂豁盡衆峰齊梅花浩浩天相映桂樹團團鬼所棲春水未深容度馬午煙孤起忽聞雞仙人秪在丹丘頂應是青雲别有梯送麗水應教諭諸公携手賦眀光此士猶令滯一鄉肯著麻衣號遺逸勇持木鐸布文章仙山髙步氷霜峻燈火新題霧雨香未可區區輕十室共看它日冨才良送雙溪孔山長歲晏天涯偶見君忽驚飛𬒮逐風分諸公政爾誇先覩家學能無出異聞紅日逺帆先去鴈碧溪涼雨未生芹悠悠聚𣪚何堪計目斷江東有暮雲象山東門别夀上人一笑相看寂寞濵杖藜還往得辭頻猊床白拂風標舊寶網金沙世界新後㑹山中應有曰定知海水未揚塵而翁賸語今多少此去如何舉似人送杭州貢教授致仕歸里䆠情鄉思兩依依獨裹寒氊去若飛歲晏忍為千里别林間驚見一人歸官河逺樹迎仙棹夕日暄風揚綵衣漫使臨岐生悵望可容泉石借餘輝送宋兵部還亰氷壷炯炯映髙秋端是人間第一流小屈神仙來下土為栽桃李遍南州鳯池歸近聞佳語金匱書成識壯游憔悴陳人頭半白臨𡵨空望李膺舟送陳漢卿三年坐客詠無氊一日為郎望若仙共喜貔貅間白晝匆聞鵰鶚上青天忘形不用公榮酒先路空慙祖逖鞭此夕臨𡵨倍惆悵水煙沙雨正茫然送姚利用青春白日映紅顔空谷寧容久棄捐新刷鳯毛看有色勇穿虎穴去無前風雲政爾多良㑹山澤終然要列仙故里樵柯如好在歸期莫指後千年陳山晚泊一柱孤撑杳靄間人言此是客星山流風百世今誰嗣應詔諸生故未還荒塜草深迂石路髙齊月滿閟松關窮年漫迹滄江上及此維舟獨厚顔送三髙祠陸主奉垂虹古祠煙樹新昔賢髙致久無聞畫圗想像空陳迹譜牒流傳喜到君春水白鷗分座席寒泉秋菊薦爐熏臨岐何限滄洲意目斷風帆天際雲送陳推官之信州三朝兩世掌絲綸異代仍瞻玉樹新尚喜傳家餘䆠譜又聞議獄用儒臣中年離别情何限南渡風流迹未陳遙想郡齊多暇日肯憐州縣正勞人送胡古愚兼蕳道傳博士㘴擁皋比十載餘忽聞飛鶚上公車此行未可輕投筆隨處猶須少曵𥚑燈火尚慙餘事在雲霄轉覺故人踈為言留滯今頭白無用諸公薦子虛送淮海書院丘山長遙望官河駐綵橈春深絳帳不蕭條已驚雨露恩光厚還喜山川物色饒盡日樓臺人載酒隔江燈火夜吹簫定知館下多才彥政樂風雩對一瓢留别錢翼之矯首清標二十霜白頭傾蓋鄭公鄉忘形肯厭追逰數借潤頻飛翰墨香世態浮雲看不定别情流水去方長杏花時莭霏霏雨誰共春風舉一觴送王景文應薦北上自是春風席上珍雲霄有路獨逡巡未妨豹隱山林久及見龍飛雨露新黃甲駸駸傳盛事青衫獵獵愧陳人瀛洲此去無多步應笑蹣􅘐尚後塵送胡允文楊廉夫應薦北上憔悴陳人復此邦坐看仙棹發濤江華年春栁嗟難及壯氣晴虹詎易降㑹向君門俱第一誰言國士定無雙瓊林宴罷歸來日共話芭蕉夜雨窗送楊廉夫天台縣尹十載韜藏席上珍爛然錦製一時新羽人笑指雲為路山鬼愁聞筆有神遙想到官多暇日不妨領客試行春石橋瀑布逢佳句取次飛箋莫厭頻諸暨休日偶書一室蕭然似冷官更無車馬駐江干天清不斷絲絲雨春淺猶生陳陳寒公事癡兒何日了雲山圗畫要人看輕風正滿微黃栁誰與相從試憑䦨湖心寺夜㘴蕭蕭涼月滿池臺水檻風櫺四面開一柱殘燈何熠煜半簷衰栁故崔嵬謬持微祿知無𥙷未謝餘緣得重來塵土馬蹄眀日事可容良夜廢㗸杯次韻答徐文蔚一别溪頭十五春歸來烏帽尚黃塵故應用意﨑嶇外未忍忘情寂寞濵圗畫雲臺非我事掛冠神武獨何人也知州縣徒勞耳相見空慙白髮新送黃季與歸盱江天際江流映碧山春風浩蕩一帆懸長吟白雪誰憐爾却望孤雲獨慨然逸少向來曽誓墓元龍此去盍求田相逢况復敦同姓聊寫深情入短篇次韻申屠子迪試院唱酬一札天開雨露香青冥萬里看飛黃共驚鵠立多如堵誰取龍標逺擅場塗抹已忘年少樂卷舒偏喜漏聲長從渠曲學能阿世敢謂公孫䇿最良次韻曺待制試院九日坐客今無賀老狂酒徒寧復舊髙陽下風共仰衣冠盛餘潤仍分翰墨香佳節政須開笑口多言非必有它腸何人可與公榮飲願摘寒花侑一觴雨立諸郎輟苦吟華堂星聚㘴方深放懷不厭如澠酒過眼休遺擲地金古往今來千載意東塗西抹少年心花前起舞為公夀肯作牛山淚滿襟題胡大參禱雨詩後雙徑迢迢一線通仙山九鎖白雲封黃塵果日迂鳴騎黑夜幽潭起蟄龍農父不須愁歲事川原還喜見秋容眀公自是為霖手四海蒼生望正濃送馬之驥同年一從鴈塔共留題回首何人在鳯池㘴閲歲年今若此久居州縣亦奚為鳴琴晝靜魚龍聽落筆風生草樹知行看金屏署名姓應憐樗散鬢成絲送汪臣良縣丞之亰兼蕳諸同年文場雜遝盛才賢共羡青雲獨妙年秪謂種花能滿縣忽聞騎馬去朝天臨分無用歌三疊有作時須奏一篇若見鳯凰池上客為言憔悴浙江邊送顧仁甫上計亰師憶昔曽隨計吏行浮沈州縣竟何成涼風嫋嫋仙舟去夕日依依魏闕情金匱故藏多巨典石渠髙論盡鴻生棲身朱墨非君事早晚公車上姓名送沙彥文架閣分題得西山憶昔寒江破浪歸西山回首落煙霏忽逢朝士登舟去如望仙人拔宅飛游戲何妨依緑水追趨早已到黃扉公餘若過滕王閣為捲珠簾挹翠微題金眀宴逰圗危樓縹眇碧波中曲檻方櫺面面通雲氣傍花如欲雨栁絲垂地不驚風千年華表人非是九奏鈞天樂未終更有殘山并剩水煩君回首六橋東送蘇伯修御史君别鼇峰我獨留又聞驄馬向南州振衣忽若神仙去落筆遙生草樹秋封事皂囊須亟上藏書金匱待窮搜北山猿鶴如無恙為報詩人已白頭送仇治書赴陕西行臺妙柬驚聞出九重路人猶識舊乘驄久陪廟算知無敵復覩臺評用至公攬轡清風何颯颯浮關𬗋氣已葱葱齊居决事須公等歸覲行看馬首東送徐教授麻鞋厭踏洛陽塵莫共簷花試一樽遙想清風問前路不妨紅日在西軒米家書畫隨歸棹白傅林塘近故園館下諸生虛悵望蒼蒼煙霧隔龍門送許録事劇曺自昔號難為敏手如君直小施故喜將迎多暇日獨憐趨走不同時滄波古木知章宅衰草寒煙逸少池回首舊逰成夢寐可無新語慰相思送唐真人歸江陵荆門霜落布帆開晴日空江轉怒雷應到故園回北斗却從雲氣望蓬萊兒童不識千年鶴氷雪相看一樹梅莫羡登樓是吾土玄都觀裏待重來送陳法師歸建康嫋嫋天風揚六銖玉函新捧𬗋泥書遙知華表歸來處猶記崆峒訪問𥘉上界于今足官府仙人自昔好樓居腐儒頭白慙無用空抱遺經望石渠上巖寺訪一公曉色微茫尚帶星修蹊犖確斷人行獨支瘦竹身猶健髙入重雲地忽平落月正當山缺處細泉頻作雨來聲上方燈火青林曲隱隱踈鐘一再鳴寄題髙逺樓聞道危樓架沈寥樓前物色不蕭條窗臨謝傅祠邉樹門對曺娥渡口潮解使詩人爭應接也知老子極風標倦逰巳忘山隂路勝踐仍須折簡招送李教諭片帆西上興悠哉小室如舟絳帳開山縣官田生苜蓿故鄉雲氣隔蓬萊少微有日占星動滄海何年載月廽慚愧臨岐無可贈因風聊遺一枝梅題東柯谷圗長松密竹翠交加洞府新開碧海涯石上仙人留足迹春深澗水出桃花流傳圗畫來千里生長兒孫只一家目斷飛鴻那可到舊逰空指赤城霞聞趙繼清調安陸縣尹慈恩塔上墨猶鮮一别重來十七年相見都門驚判袂又聞澤國去鳴絃素衣久出風塵外青瑣行依雨露邉跂馬望君先數日縣花雖好莫留連送趙繼清潮州推官相國南遷有故居理官髙選出新除承恩特與金魚袋訪舊爭迎駟馬車春入圜扉庭草暗天低驛路嶺梅踈鳯池不隔同年面歸及將花鴈影𥘉題雪竇妙髙臺偶為清逰宿梵宫凌晨試上最髙峰水翻雪色寒猶落雲掩丹光逺茰重舊有一僧能跨虎近聞三洞盡藏龍下方車馬應難到煙際惟聽日暮鐘題觀海圗昔年解纜岑江上𥘉日團團水底紅鼉吼忽搖千尺浪鷁飛仍挾半帆風遙看島嶼如星散祗謂神仙有路通及此棲身萬人海舊逰却在畫圗中送張法師召嗣天師於龍虎山甘泉久矣候神仙何日靈風響佩環洞府樓居雲霧裏星槎使節斗牛間潜蚪有待將為雨跨鶴相從早出山歸及皇州春色好一時𬗋氣滿函關送胡古愚白溝河水照行裝楊栁春旗日影長傲兀鄭公新座席斂藏馬史舊文章談經安用青油幕載筆徐歸白玉堂北望京華天尺五賸收餘興入奚囊送夀應奉赴興國經歷退直承明未倦逰獨隨逺牒向南州清江短掉蒹葭雨斜日虛庭鴈鶩秋小却猶為蓮幕長重來應到鳯池頭豫環行矣聆佳語休蠻箋賦别愁送麥敬存檢校天邊豸角自峩峩老矣南公懶上坡省署六曺新撿正著庭三史舊編摩紅蓮幕底秋光淡黃鶴樓前月色多莫笑鄭䖍官獨冷别時聊唱醉時歌送隂陽胡教授之四眀手挾飛雲萬里逰朔風雨雹弊貂裘忽聞水北山人去不作周南太史留炯炯心胸藏列宿駸駸步武近瀛洲此行莫厭官曺冷猶勝寒儒老一丘送黃生歸廣州萬里來充觀國賔春風座上俊才新政慙杜甫敦同姓忽報何蕃去省親歲月如流須僶俯雲霄有路莫逡巡異時鄉郡知名士金榜曽為第一人送潘生之江西緑楊堤上曉風輕屈指歸人第一程萬里江南新驛使十年窗下舊書生青雲共羡飛黃去白晝何妨衣錦行笑殺四門韓博士夜深還對短燈檠送吳生歸黃巖南州才子氣如虹一日聲名徹九重退就諸生居六館㘴觀文史冨三冬揮毫小試絲綸手獻賦徐開錦繡胸暫爾稱觴拜家慶眀年歸有𬗋泥封次韻孫伯剛龍虎臺即事秋風原上獵塵開曉日天邊羽衛來誰念艱難獻無逸但聞歡樂詠靈臺時巡不厭蒙霜露清問應須及草菜絲鬢廣文何𥙷報莫言相遇且㗸杯題天雲詩卷一錫秋風信所之漫將外物託心期雲根元自無栽處天路何曽有到時即色是空應巳悟安名立字復奚為欲相點綴忘言說㘴看爐煙裊碧絲題李氏榮夀堂吾親疇昔𬒳恩封幸與公家具慶同仰羡班聮方貴近光膺寵數獨尊崇蘭臺薇省歸休日鳩杖魚軒笑語中倘念小人今有毋滄江願乞半帆風夀汪太祝父六十獨專一壑住深幽不換人間萬户侯故里樵柯猶在手新年花甲始平頭靈椿丹桂聲華茂墨綬銅章寵數優舊賜黃封冝介夀飛觴應度縠江流夀胡古愚千軍筆陳􅏮英風儤直難淹秃髮翁㘴久無氊如鄭老年堪入社似溫公夜深虛室生純白春在酡顔借晚紅九十馮唐才不仕錦衣歸去莫匆匆夀夏真人兩人一百二十歲愧我先成秃髮翁苜蓿盤深差可戀蓬萊路近若為通縱令地位仙凡隔未害生年甲子同大斗㪺霞方介夀衰顔可許借春紅次韻題劉氏石壁精舍佳城杳杳隔千峯精舍寥寥一徑通夜靜寒泉猶映月秋深老樹不驚風舊題尚喜苔碑在髙卧無令蕙帳空我巳倦游今白髮有山如此願長終送葉仲輿巡檢重著儒冠望帝鄉翩然一舸犯晨霜秋來鬢髮依前黑日射河流徹底黃此去乘槎須有路可容執㦸更為郎絲綸閣下多知已握手應分滿䄂香和外舅主簿公自為挽詩五十年前馬上飛青春流水去難追一從玉樹歌殘後數到黃粱夢覺時李賀元無樓可記劉伶漫有鍤相隨少須海上蟠桃熟歸簉仙班恐未遲留别一公琳公浪走紅塵鬢巳絲此身端合老巖扉興來復舉山隂棹别去仍留海上衣夜聽泉聲如雨落晴看天末有雲歸浮萍飛絮何時定空使詩人賦式微送傅汝礪之安南南徼車書路不遙秋風使節下青霄頗聞僚佐登才彥應有文章逹教條日照樓船江水活天低銅柱瘴雲消歸時嶺上梅花發想見詩囊未寂寥兩浙轉運司知事張公挽章二十餘年立下風故家喬木欎青葱群趨缺識官曺貴末論難禆鍳裁公九折鹽車方止止一坯文冡巳崇崇英姿爽氣歸何處盡在山光水色中題寧節婦詩卷春旗栁色映門閭華扁新題節婦居作傳小裁青竹簡疏封近降𬗋泥書河壖松柏風煙外階戺芝蘭雨露𥘉三釡及親殊未晚花前何日奉安輿送孔御史歸曲阜清流共喜聚群賢新渥時聞下九天東觀紬書何日了中丞遺笏要人傳過家莫久依林廟封事先須徹御筵千載斯文寄來哲臨分握手重懸懸送龍南歐陽縣尹絲綸閣下半同𫀆獨上南船去莫招出宰不嫌官俸薄過家未覺驛程遙長溪白石晴雷轉深洞黃茅毒霧消想見行春有佳句㘴令逺俗變風謡金華黃先生文集卷第五
