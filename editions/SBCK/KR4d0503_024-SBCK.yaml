  text: 金華黄先生文集卷第二十四續藁二十一
  hash: sha256:5a369d44f5817a81af5289d4a56495ff15c1d7d1f0a3c3374f8267d371732056
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0503_SBCK_024-1a}
body:
  text: 神道碑臨川危素編次番昜劉耳校正中書右丞相贈孚道志仁清忠一徳㓛臣太師開府儀同三司上柱􅀦追封鄆王謚文忠神道碑至正八年春正月五日皇帝御興聖宫便殿中書省臣以故右丞相鄆文忠王神道之碑未建奏請􅃙臣溍為之文以賜其家俾刻焉臣溍􅀼惟王之宏模偉度山髙而海深非末學小臣􅀁能窺測懼無以稱塞明詔頋以待罪太史属職在記述不敢伏􅆣控辤則退而考其世次官伐行事之實序而銘之昧死以上謹按王諱拜住系出札刺爾氏六世祖諱孔温窟哇􅀙太祖皇帝伐乃蠻以巳馬濟太祖􅇍戰而殁贈推忠效莭保大佐運㓛臣太師開府儀同三司上柱􅀦追封魯􅀦王謚忠宣六世祖妣諱闊䕫追封魯􅀦王夫人五世祖諱木華􅀺􅀙太祖皇帝滅克烈太祖即帝位以爲左萬户􅀙破金入燕專征遼東西諸郡授太師􅀦王都行省承制行事建牙于燕以經畧中原金主南奔齊魯趙魏晉秦之地次苐悉平臨終以金人未滅爲憾贈體仁開􅀦輔世佐命㓛臣太師開府儀同三司上柱􅀦追封魯􅀦王謚忠武五世祖妣諱普合倫追封魯􅀦王夫人髙祖諱孛魯嗣􅀦王奉太祖皇帝命攻西夏㝎河北平山東以㓛食東平郡贈純誠開濟保徳輔運㓛臣太師開府儀同三司上柱􅀦追封魯􅀦王謚忠㝎髙祖妣諱合䔍輝追封魯􅀦王夫人曾祖諱覇都魯􅀙世祖皇帝伐宋為先鋒元帥巳渡江與世祖會鄂州而憲宗崩世祖俾総師􅅏屯而還殁于軍贈推誠宣力翊運㓛臣太師開府儀同三司追封東平王謚武靖曾祖妣弘􅁻烈氏諱銕木倫昭睿順聖皇后女兄追封東平王夫人祖諱安童事世祖皇帝掌環衞之政令位百僚上拜中書右丞相食四千戸佐皇子北平王出鎮北邉十年而歸復拜中書右丞相替上冊皇后皇太子議規㐮陽以取宋􅀁薦史忠武公天澤姚文獻公樞許文正公衡商攵㝎公挺皆時之􅀫望以阿合馬桒􅁑尚書省之政誤􅀦害民而力斥之立御史臺以正朝綱立太常寺以崇典禮㝎强􅀼盗賊論罪輕重法以止濫殺語􅀦朝之賢相必以為稱首贈推忠同徳翊運㓛臣太師開府儀同三司追封東平王謚忠憲加贈推忠守正同徳翊運㓛臣上柱􅀦進封魯王餘如故祖妣怯烈氏諱普顔怱都累封魯王夫人考諱兀都台成宗時􅊞掌環衛以大司􅀙領太常寺事贈輸誠保徳翊衛㓛臣開府儀同三司太師上柱􅀦追封東平王謚忠簡加贈宣力迪慶保徳翊運㓛臣進封兖王餘如故妣篤思刺氏諱吐薛怯温累封兖王夫人忠宣忠武兩王故有廟于東平英宗皇帝特賜以碑額曰元勲世徳别賜忠憲王開􅀦元勲命世大臣之碑勑翰林侍講學士元明善製為銘辭􅀣于王􅀁食采地范陽之通逵囙臨幸而􅀚焉號其地曰駐蹕荘云王生五􅀊而􅀌兖王夫人撫育􅇱至令知文學者陳聖賢孝弟忠信之􅀃以開導之聞􅂺領解大徳十一年武宗皇帝入正大統王甫十􅀊迎謁道左上親執其手慰藉久之人見王嶷然公輔之器相與属目謂有祖風至大二年􅊞掌環衛􅊗事仁宗皇帝眷注􅀹深延祐二年擢資政大夫太常禮儀使四年加榮禄大夫大司􅀙仍領太常五年遷金􅂵光禄大夫六年進開府儀同三司七年春三月英宗皇帝嗣位拜中書平章政事􅀄上在儲闈王之令譽日間扵左右遣使召見王謝曰以扈􅀙之臣而徃来宫邸嫌疑之際不可不謹臣之􅀗罪固無􅀁避亦豈太子福耶上嘉其有識可属大事由是首登用焉故事天子即位之日必大㑹諸侯王讀太祖寳訓是日命王啓而讀之王風儀峻整音莭鴻亮聴者肅然夏五月加上柱􅀦錄軍國重事進拜中書左丞相先是東朝嬖倖估寵干政首相帖木迭而頗與之相為表裏仁宗不悅解其政柄無何上崩英宗在諒闇中遂復出居相位睚眦之怨必報一時善􅀋􅇜其誣衊多䧟扵不測之罪其黨與以權􅀔相軋而日生釁􅂩亦莫䏻自全王與之並相獨堅持正論不少囬撓遇僚佐闕必公選棆而用之䑓臣奏䟽謂君子小人不可同處首相以爲譏已而深銜之頋未有以發至治元年監察御史言大􅀊在酉不冝造寺扵西山遂􅃌以爲􅉪訕言者既横加酷罰囙盡斥􅁬臣而援䥫實為御史大夫又以其子八里􅁻思為宣政中政䓁九使􅃈南為治書侍御史􅊚黨分據要途秋月王至自上亰梘事于中書首相稱疾不出以伺間而謀為中傷巳而言􅍚愈􅀅出上使止之氣乃沮二年秋遂以病死八里􅁻思與姦人􅄭獻民田而冒受其􅀡王奏誅之又奏黜􅃈南以通言路冬十一月王拜中書右丞相監脩􅀦史上為虚左揆之席以示圖任之專仍降詔布告于中外王舉前平章政事張珪與之共政集大臣及故老詢􅀁以弭日食地震之變士大夫􅇜擯棄者咸以􅀁長収叙文學之臣則待以不次之除格内降待銓者六七百人振舉學校而士知􅀁作興脩眀條制而吏有􅀁遵守减江南民租八十餘萬石設宗仁衛贖蒙古子女之奴扵民間者以􅀠焉朝廷政令聳然一新四方之人無不動色胥慶上之始臨御也以察罕腦兒行宫亨麗殿䂓制褊廹命改作而侈大之王引莭用愛人使民以時之言極諌而止又將以元夕結綵為山張燈禁中參議中書省事張養浩上䟽諌王亟以聞即命罷之仍賜羙錦以旌其􅀡仁宗當升祔而廟無其室王􅀓􅈲集諸儒議僉以為廟之始建前殿而後寢今寢已燬于灾宜更作前殿為間十有五其中三間為太祖室以􅇱祫享列聖神御間為一室東西兩間為祧而以今殿為寢上可其奏廟制乃完上欲躬行享祀之禮王進太常􅀁纂儀注詔頒下有司􅁲日有事于太廟始􅇱大駕鹵簿建太常十有二斿列黄麾仗五千人上服通天冠絳紗􅂁出自崇天門衆庶聚􅀚儀衛文物之盛莫不感歎以為三代禮樂復見扵今及行事王攝太尉上親􅀍衮冕執圭瓉祼獻禮成還宫王率群臣稱賀于大明殿推㤙􅃬賚有差上甞坐穆清閣頋謂王曰今亦有如唐魏徴之敢諌者乎王對曰槃圎則水圎盂方則水方有太宗納諌之君則有魏徴敢諌之臣上稱善􅂉􅂆上純任釋氏之法以治天下上問王何如王曰釋氏之道貴清静寂滅可以自治而不可以治人帝王之仁義禮樂乃􅀁以爲治也上黙然有􅈲俾王提調大司農王曰􅈗相之職無􅀁不統寕獨大司農耶上以爲知大體甞賜以金脊殿車又甞閱寳玉扵章佩監命惟意􅀁擇皆力辭㝷詔􅊚宗室女又辭命􅀦工繪王像勑翰林侍講學士􅀽桷爲之賛御書唐皮日休吾愛房與杜魁然真宰輔黃閣三十年清風億萬古之詩以賜之盖期望之也至矣王亦感上殊遇自任以天下之重事有當㢮張知無不爲既盡發故首相欺悖之迹削其官爵仆其碑籍其家背公死黨者多謀不利扵王左右請爲之備王曰吾尽吾心上不負吾君吾祖父下不負吾士民而己何備爲然深患䜛言之興囙侍燕間􅀙容奏曰陛下不以臣年少無似使􅇱貟􅈗相方務彰善癉惡期􅃱隆平苟有沮之者則臣不􅀎有􅀁爲矣上曰卿第勉之果有間言朕不聽也三年复上時廵甫至上亰夜寐不寕趣大作佛事王曰財􅀙民出􅀦以民安殫財困民未見其福上矍然曰朕􅀁創惟夀安山餘皆完其舊爾民亦以爲病乎自今其輟土木之伇既而負罪懼誅者復隂訹群僧言􅀦當有厄非作佛事而大赦無以禳之王叱曰爾軰不過圗得金帛而巳又欲庇有罪耶姦黨聞之皆失色而八里􅁻思之罔上爲姦利事連䥫寳恐不自保遂與赤囙帖木而等潜蓄異謀其年秋乘輿還次南坡帝崩王亦及扵難王生扵大徳二年春三月八薨扵至治三年秋八月四日享年二十有六以是年月日塟于大都宛平縣鄉田村之原秋九月晉王入􅁇􅋝臣族誅命奉王像祠扵海雲寺泰㝎元年贈清忠一徳佐運㓛臣太師開府儀同三司上柱􅀦追封東平王謚忠獻今上皇帝至元元年又􅃙翰林􅀡學士歐陽玄賛王像蔵于秘書監年加贈孚道志仁清忠一徳㓛臣進封鄆王改謚文忠太帥開府儀同三司上柱􅀦如故祖考皆加贈進封焉夫人諱妥妥徽太府卿土禄不花之女婦道母儀恊于閫範王薨省臺各奏賜鈔十五萬緡今上又賜金五十兩鈔王萬緡􅀊給諸王供膳衣物仍􅃙奎章閣學士巙巙大書表其􅀁居曰貞節之門夫人生扵大徳四年夏五月二十日薨於至正三年夏六月八日享年四十有四以是年月日合塟于王墓由東平夫人進封鄆王夫人賜謚貞静盖異數也子男二人長荅利麻碩理虎符宗仁蒙古衛親軍都􅃌揮使後王年卒次囙牙納碩理文宗時賜名䔍麟鐡穆爾襲􅕄環衛虎符宗仁蒙古衛親軍都􅃌揮使時十有一上見其朝服列扵班行神采煥發甚愛重之命受經扵奎章閣􅊗崇福司太常太禧兩院使大宗正府也可札魯忽赤宣徽使知樞宻院事中間惟兩翰林院皆再入為學士承􅈲今以特􅈲遷大司農仍舊階開府儀同三司端粹􅀶碩尚文而下士當承平無事時侍上起居弗懈益虔人以為䏻世其家臣溍􅊗觀帝王之肇基立極必有元才鉅徳􅀿期而出以翊扶昌運十亂造周三傑興漢載籍􅀁記埀輝千齡然閎散之後相業無傳蕭張之家侯封莫續有如王之恢張先烈乗時奮庸為􅀦世臣同休共戚委祉于後繼述有人可謂卓冠古今夐絶倫比也巳矧惟昔之名臣􅂉前䂓後隨以相成􅂉􅀿變守文而共濟未有不同心戮力而能光輔帝室者王以勲賢貴胄夙受主知魚水之親䐇合無間而􅀁與共立者非其人王獨精白一心盡悴事􅀦力摧百壬之鋒訖使朝廷百官四方逺近莫敢不一扵正盖其事視古人為尤難雖􅇜值變故而平生大莭彌乆益著又亘古之􅀁未有播之聲詩以震于無垠夫亦􅂆忠之道也百世之下尚鍳于兹銘曰大眀麗天赫赫英皇巖石爾瞻侃侃鄆王惟王之先鷹􅀭朔土手挈中原歸奉真主異才間出騰風躍雲克濟其羙為􅀦虎臣聖神撫運綂一寰宇轉旋鈞軸篤生碩輔垂紳正笏乾清坤寧經綸之業惟王敬承左右三朝服勤帷幄靖共正􅀡執事有恪乃世其官典領奉常乃授以政乃登廟廊崇儉抑奢諌行言聽乃宅百揆以佐出令仁漸義摩文恬武嬉禮樂之興􅆘惟其時龍承祀肅肅在廟惟時顯相丕􅀭聖孝徳教􅀁加望治有期孰使共兠接武夷䕫緬彼滔天屹乎砥柱不震不竦衆正􅀁怙福善禍􅁋天道之常魁柄既專化弦乃張曀霾滌盪天青日白檮杌嵬􅃈莫掩其迹蹈于危疑搆兹閔凶萬姓之悲攀髯􅈽弓金攴翠盖神㳺寥廓英姿爽氣清風延閣增崇位號惟帝念㓛勒辭啚堅于以勸忠尚其嗣人咸有一徳與􅀦同休永永無極江淛行中書省平章政事贈太傅安慶武㐮王神道碑至正八年春正月二十日丁巳詔贈故江淛䓁處行中書省平章政事也速䚟兒推忠宣力守正佐理㓛臣太􅀓開府儀同三司上柱􅀦追封安慶王謚武㐮於是王之薨五十年矣皇上纉承鴻業追念舊勲不以存亡乆近爲間渙頒異􅁆以照臨之甚盛徳也臣溍承乏詞林既推述聖意形諸賛書三月丁酉朔上復用中書奏􅃙臣溍考次㓛業勒兹樂石臣􅀍命而退謹即王之孫今上都􅅏守古納刺訪求王世系官閥行事之實序而銘之王元名帖木兒成宗御極避而易今諱曰也速䚟兒系出兀里養哈䚟氏其先折里麻生合赤温合赤温生哈班扵王為曾大父有子二人曰忽魯渾曰速不䚟俱以驍勇善射稱忽魯渾則王之大父也以哈必赤百户事太祖皇帝哈班甞􅀙太祖飲班术納河之水遇盗舉槍欲刺之為忽魯渾反鋒􅀁刺人馬俱踣又甞􅀙太祖避乃蠻追兵扵長城之南忽魯渾射却其渠帥餘衆夜自相驚而潰中原既㝎方論功行封不及禄而卒父曰哈丹大宗正府也可札魯忽赤母曰王生扵朔漠資禀雄毅沈重有謀讀書能知大意弱齡入侍世祖皇帝列職于環衛以忠謹深􅀍眷知速不䚟之孫是為丞相河南武㝎王阿术受詔伐宋王扵武㝎為􅀙弟武㝎察其材智絶人可爲已貳言扵上挾與俱行􅀙武㝎破樊城下㐮陽至元十一年世祖命丞相淮安忠武王伯顔與武㝎大會師于㐮陽分軍為三道並進忠武與武㝎由中道􅀅濟江忠武宻謀扵武㝎為擣虗之計王􅀙武㝎以昬時泝流行二十里夜半絶江徑渡􅀺明與宋􅀅夏貴大戰陽羅堡㧞之遂􅂑鄂州順流而東宋都􅇂賈似道與大軍相拒扵丁家洲其前鋒孫虎臣来􅊇戰武㝎俾王乘髙覘之見其陣勢首尾横决以戰艦衝擊之似道先遁十三萬軍一時俱潰王􅀙武㝎追奔逐北百五十里􅀁至禁部曲不得侵暴敵人委棄資仗悉以與􅀅士莫不畏其威懐其惠而樂扵趍事赴㓛十二年有􅈲行中書省駐建康行樞宻院駐鎮江别􅃙武㝎攻􅀭州武㝎俾王率䝉古軍鏖戰揚子槗出竒兵斷真州餫道宋􅀅張世傑以巨舟萬餘艘屯􅀭子江中流王􅀙武㝎領伉徤善彀者夾射而急撃之􅁇以火矢灼其蓬檣大敗世傑于焦山下自是宋人不復能軍凡大軍與宋人接戰王無不在其間十三年宋以􅀦降十四年朝廷第㓛行賞授行中書省㫁事官階懐逺大􅀅軍十五年轉昭勇大􅀅軍十六年除淮東道宣慰使遷鎮􅀦上􅀅軍奉省檄馳報邉事王謂機事不可不宻入對便殿出奏牘于懐上大竒之召近臣知文墨者使進讀而左右適無其人王拜而言曰臣亦粗知文墨乃誦其文而􅇚以譯語音吐明暢辭􅈲精切上恱令縦横行殿中而黙察之知為偉器諭􅈗臣俾與共政遂以參議中書省事它日奏事殿中問居何職王以實對上詰􅈗臣曰朕􅀄意以為卿同列置之僚佐何耶二十二年丞相魯􅀦忠武王安童自北邉歸秉政為世祖言帖木児䝉古人而扵漢人語言文字無􅀁不通久淹下位冝升用之其言適􅆻扵上意問居其上者為誰對曰叅政郭佑參議秃魯花拜降即日命為中奉大夫中書參知政事位郭佑上仍􅃙之曰自今事皆責成扵汝二十三年進資徳大夫中書左丞二十四年尚書省立拜榮禄大夫平章政事甫視政而宗王乃顔叛扈蹕親征給餉運籌備殫其勤既平乃顔群臣􅀙属車奏凱而歸王復與諸􅀅􅅏兵討其餘黨金家奴塔不䚟悉戡㝎之乃還上以王生事素薄賜鈔五千緡王囙奏臣前出軍至亦乞列思之地有来供餽郷導者上命厚賞之二十七年武平地大震姦人乘灾異相扇揺藩王為其言􅀁動者三人民大惶惑上慮乃顔之黨囙而為變遣王引兵五百人徃撫㝎之王率有司齋沐禱于山川百神以便冝蠲田租弛商稅除酒禁發鈔四萬二千緡運采萬名轉海而至以賑其乏絶教民母惑扵訛言捕斬乘時為盗者無少貸收三藩王而鞠之始皆倔強不伏既得其情徐諭以禍福之重輕乃伏其􅇳事間上甚韙之遼陽行省治懿州驛道自北亰至上都頗廻逺王囙奏請徙由髙州以北而减去五驛其三以備它驛人户物力之乏絶其二以􅈻虎賁司給土田牛具俾之立屯公􅀻咸以為便方是時桒哥在相位巳乆專恣日甚誣陷忠良賣官鬻獄設計局以求遺利毒及編民王既還居政府乃列上其罪状會侍􅀙近臣亦有顯斥其姦者􅮏哥及同惡皆誅死王以是益為上􅀁親信年拜江浙等䖏行中書省平章政事仍舊階榮禄大夫成宗皇帝以王先朝奮弼委任愈專江淛省治錢塘實宋之故都􅀁統列郡民物殷盛􅀦家經費之􅀁􅀙出而又外控島夷最為巨鎮非朝廷重臣莫克任蕃屏之􅀉王威望素著涖事伊始風采一新屬部帥守重􅁕而立以俟要束􅁠貴無􅂉敢撓其政豪強震懾田里晏然大徳二年秋八月十九日以疾薨于位享年四十有五其年月日還塟于大都宛平縣郎山之原王性剛􅀡而善扵自持雖異巳者莫能伺其間􅂩由是始卒無疪然喜汲引人物凡􅀁甄㧞後多知名王之配曰忽都追封安慶王夫人子男三人曰忽刺䚟江浙䓁䖏行中書省平章省平章政事曰探迪御史中丞曰木八刺沙南陽府逹魯花赤女一人曰夘罕適翰林學士承􅈲朶䚟孫男九人脫囙納陜西諸道行御史䑓御史大夫紐兒該同知都護府事古納刺由江淛等䖏行中書省平章政事擢江南諸道行御史􅄗御史中丞今以榮禄大夫為上都留守兼本路都総􅃹府逹魯花赤完者不花金保也䔍古八刺臣溍􅀼􅀚自昔君臣際㑹之盛􅂉䇿勲扵行陣之間􅂉訏謨扵廟堂之上未始不各效其􅀁長若王之出入􅀅相豐㓛茂烈彌久益彰盖亦鮮矣是冝没而不亾克承天寵慶流後裔與􅀦家相為無窮者也垂于竹帛被于弦歌光在􅀖家豈徒賁其丘隧而已乎銘曰氣運合一實生偉人惟材之完出武入文聖神御天誕受方􅀦猶有江流限夫南北恭恭元戎上􅀁􅀝毗仡仡虎臣左之右之潜師宵濟􅄬鞭勇徃訖成儁功光膺上賞乃居屏翰乃登廟廊身屬櫜鞬􅂑彼叛王旄頭豹尾凱旋亰􅇅分兵後拒剪其餘孽􅀅􅃌東藩假以便冝力止訛言俾民不迷榷姦擅􅀦簧鼔聖徳朝綱紊弛民不堪命白發其􅀻靡􅀁覆蔵􅀭于大廷解弦易張肅持政柄坐鎮南服枹鼓不鳴家給人􅁕庶遄其歸衮衣繡裳胡不憗遺奄其淪亾時逾四紀綿綿世胄咸濟其羙賜􅂂之舊瞻彼郎山有封斯崇生氣凛然拱木清風念舊啚功褒羙有詔申􅃙詞臣薦此碑號宣徽使太保㝎􅀦忠亮公神道碑故榮禄大夫宣徽使荅失蠻以延祐四年九月五日薨于位享年六十越三日􅁙于亰城東杜樹辛荘其眀年制贈推誠㝎力守正功臣太保金􅂵光禄大夫上柱􅀦追封㝎􅀦公謚忠亮又六年史臣禮部尚書曺元用始奉􅃙撰次公行業以為神道之碑又二十四年是為今天子至正八年夏四月九日上御興聖殿西便殿翰林學士承􅈲臣岳柱為奏請命臣溍􅁇元用為之銘以賜其家俾刻焉謹按公諱荅失蠻其先西􅏾人系出哈刺魯氏曽祖馬馬贈集賢學士正奉大夫護軍追封中山郡公祖阿里贈資徳大夫司農卿上護軍追封中山郡公父哈只贈榮禄大夫司徒柱􅀦追封㝎􅀦公曾祖妣太帖尼氏祖妣忽委氏並中山郡夫人妣阿兀思吉氏㝎􅀦夫人􅀄集賢公在西􅏾為其􅀦之近臣素倜儻有大志知天命之有歸當太祖皇帝正大位之六年􅀊在辛未奉其􅀦主阿爾思蘭来覲于龍居河司農公前􅌰乃以司徒公為質子時年尚􅏊上命育于春坊稍長事太宗皇帝為寳児赤寳兒赤盖古内饔之職最為親宻司徒公以㳟謹尤被寵遇扈􅀙西征有㓛妻以河而貴族㝎􅀦夫人也世祖皇帝取南詔伐宋司徒公皆與在行㝷以疾􅌰公少襲父職為寳兒赤世祖甚噯重之甞侍上左右極論阿合馬尚書省之政蠧􅀦病民上怒而斥之曰無預若事公徐對曰犬馬知報其主臣世荷􅀦恩事有關扵治亂安敢坐視而不言其後阿合馬死尚書省罷上乃思其􅀡賜以玉環及鈔二千五百緡且諭㫖後有􅀁知其盡言毋諱􅀙討叛王乃顔有㓛妻以名族女脫脫倫氏仍賜良馬白金佩服珎異之物抗海之役督餉餽扵雲中晉王軍乏食給以米數千石師還以專擅待罪上善其有識量而知􅅦變嘉歎不巳賜白金百兩鈔千五百緡公囙奏草青畜肥之日尚賖今􅀁給未充恐終不免轉死請增給以半年之食上􅀙之衆頼以安㑹復立尚書省公以前有􅈲得盡言遂􅃌陳其非便言􅀹剴切暨桒􅁑伏誅而其言皆驗詔賜宅一區固辭乃賜王環及燕服以旌其忠禮遇之厚有加扵前成宗臨御之􅀄以奉議大夫領供膳司事叛王海都稱兵内向車駕親征倍道兼行晝夜不息士􅌰巳疲而後軍不􅁇公諌曰獨徃恐生它虞宜徐行俟衆大集而後進乃可為萬全之䇿上韙其言後􅁆日戰大捷海都敗走凱旋而歸第㓛行賞賜以田三百畒㝷擢司農丞進職為卿與其子買奴侍上􅍚扵卧内連數月衣不觧帶􅍚少間賜以鈔二萬五千緡成宗賔天公北迓武宗皇帝扵野馬川歸正宸極仁宗在儲闈以公先朝舊人奏為中書參知政事仍兼司農卿賜以金帶犀帶七寳笠珠帽珠衣金五十仁宗踐阼首命僉宣徽院事同列以出納不謹䧟扵􅀻罪公獨不汙其事仍充舊職厯副使同知院事遂為其院使累階榮禄大夫甞侍坐侑食問以典故􅀙容奏對委曲詳盡深稱上􅈲賜玉帶海東白鶻且命􅀦工為之繪像其􅂑重如此俄以􅍚不能朝遣尚醫診視竟不可為臨終告其諸子曰人之隕其世業者必自貪與奢始汝等能兢兢自持不苟取不妄用恒以忠君報􅀦尊祖睦族為念吾死無憾矣語畢而逝公持身介㓗寛厚愛人輕財樂施人有忿争搆怨得一言莫不為之釋然咸稱其長者元配納思馬立氏婦徳母儀族黨稱焉生三子一女前公二十九年􅌰封㝎􅀦夫人繼室即世祖􅀁賜脫脫倫氏􅀹䔍於慈愛視三子如巳出亦封㝎􅀦夫人子男三人長買奴累官河南江北等䖏行中書省平章政事今以翰林學士承􅈲榮禄大夫􅃱仕次忻都資善大夫上都􅅏守兼本路都緫管府逹魯花赤後公十八年􅌰次怯来資善大夫同知宣徽院事孫男六人亦老荅而䦨遺少監哈八失同知河東都轉運塩使司事不蘭奚黒驢王家馿木八刺魯孫男八人臣溍奉詔書詞謹悉取前史臣􅀁述公平生大槩備著之而申之以銘于以昭示聖天子之追録舊㓛不以久近爲間百世之下何日而忘之㢤銘曰惟皇建極立賢無方左右侍􅀙咸懐忠良猗歟㝎公啓家西域肇自髙魯歸于有徳奉其􅀁事共惟帝臣荷天之寵傳及子孫逮公而昌懐林自􅁬出􅀙征伐入陪頋問宻勿吿猷連柱大姦不以􅀁長守夫一官乃位列卿乃居政路乃贊􅀦徽綴班台輔身後之榮赫其龍光惟帝念功雖逺弗忘属辭比事儒臣之􅕄是不一書薦以新刻遼陽等處行中書省左丞亦輦真公神道碑故遼陽行省左丞亦輦真以至正七年冬十月二十有二日薨于位年五十有二訃聞天子為之嗟悼不巳知樞宻院臣老章亦輦真之弟適􅀫衛禁中上弔慰之詔有司護送其喪還􅁙遂以八年春三月二十有四日􅁙于真㝎欒城先塋之次而神道之碑久未有銘其年冬十月十有三日上御眀仁殿樞宻臣僚入對殿中知院事臣阿吉刺臣忽先臣也先帖木兒等皆老章之同列乃代為奏請上既可其奏遂傳􅈲翰林命侍講學士臣溍為文學士承􅈲臣起巖書丹别勑禮部尚書臣泰不花􅂐其額臣溍謹按公諱亦輦真偉吾而人上世為其􅀦之君長􅀦中有兩􅀣合而生癭剖其癭得五癭兒四児死而第五兒獨存以為神異而敬事之囙妻以女而譲以􅀦約為世㛰而秉其􅀦政其􅀦主即今髙昌王之􅀁自出也公五世祖之官為的斤必里傑忽提譯言智福大相也四丗祖小云失脱忽憐之官為吾魯阿烏只譯言大臣也父子俱􅀙其􅀦主来歸于我太祖皇帝小云失脫忽憐尤見親幸未嘗􅂺去左右􅀙西征有㓛令侍睿宗皇帝扵藩邸荘聖皇后子視之以為㫁事官真㝎睿宗分地遂以為逹魯花赤㑭世􅊞其􅕄曾祖諱八丹銀青榮禄大夫大司徒祖諱刺真事世祖皇帝為榮禄大夫中書平章政事考諱察乃事仁宗皇帝為金􅂵光禄大夫陜西行御史䑓御史大夫至治中入為通政使用新制捵榮禄大夫泰㝎間終扵光禄大夫中書平章政事公㓜敏慧不喜與群兒狎長者偶見其飲酒責之曰是兒少嗜飲它日可覬其成立乎公聞之即絶飲而深自飭厲年逾二十為英宗皇帝御位下必闍赤泰㝎􅀄為内八府􅈗相髙麗嗣王阿難荅失里既襲位其􅀙父弟完者䔍愬于上曰我父兄也彼父弟也烏得為王阿難荅失里来朝遂畱弗遣而収其印章至是有􅈲命公以阿難荅失里復􅀦公具宣徳意以告其人闔境之内無不恱服􅀄公弟老章􅀙明宗皇帝北狩間關虎口調護聖躬親􅄑無與為比大駕還自朔漠公與一二大臣奉皇帝蠒綬逺迓于傑堅察罕上大恱奬諭之曰卿祖父克有勲烈兄弟􅇱殫勤勞忠孝萃于一門惟予一人汝嘉即除翰林學士資善大夫䝉古教官之選壅滯巳久俾幕僚閱其牘而一清之故事藩王入朝􅀙翰林求進止餽遺交錯悉拒弗受遣使諸王必慎擇其人未甞辱命今天子嗣位之􅀄擢資政大夫河東山西道肅政㢘訪使召還除通政院使奉詔廵視驛傳公不憚險逺歴荅失八刺哈孫抵晃火兒目連之地事有當更革随宜處置人咸便之大同東勝州之吴灤永興馬牛三驛牧馬草地為諸人􅀁侵冐訟乆弗決公􅀍􅈲按問得其實十二郷之人百有餘家冐耕其地巳十六七年一旦同聲辭服願返􅀁侵地公為正其經界而緩其􅊗年之租賦公家三世領通政院事每以扶殘極弊為務遇灾沴必奏請加恤之後使者􅂉牽扵􅀔而不䏻行其􅀁欲為皆歎服曰非刺真平章子孫世其官不可也感公徳者相與􅀣碑扵灤陽驛以頌羙焉􅁶山東東西道宣慰使鈔法之不通塩法之為民病者悉建白而更張之􅀊旱有禱􅂺應形扵歌謡事間有詔奬諭俾仍舊職而升其位序扵帥座之首未幾淮潁羣盗􅀼發鄰郡騷然沂莒滕嶧四州當其衝民害尤酷上命公捕治之時同僚悉移疾避去父獨任閫事使至即行不􅀫命於家若豫􅇱然宣靖王㝷遣怯薛丹十人與諸郡郡兵来􅀙至邳州境内遇海寕賊兵二百官軍皆觧散公僅與十二人當其首賊且撃且射賊衆披靡追奔逐北十餘里斬首七十餘級其黨皆創殘而潰公亦以矢盡廽沂州収兵復出徃来逐捕殺􅀗不可数計俄拜遼陽等處行中書省左丞公曰代者未至我安可辭其責諜知盗在􅑟州整兵行至沂水而代者至乃還後人頼公區畫素㝎故不勞餘力而掃除其遺孽遼陽久不􅀨民間公至曰是在山東䏻􅃱􅀨者吾属無􅁨矣公視事之日果􅀿禱而雨民飢則為之設法以􅂆分薄關市之征以通商旅米價頓平人無艱食之患公才智出扵天性操守得扵家傳遇事立决嚴不失扵苛寛不失扵縦􅀁以至有聲在遼東三年鎮之以静識者以為得大臣体􅃍以一􅍚不起人尤痛傷焉夫人􅁲顔金貴族完顔氏陜西行中書省右丞教化的之女累封范陽郡夫人柔嘉貞順克盡婦道見􅁛扵􅊚族公兄弟十人兄曰孛孛實中奉大夫河東山西道宣慰使曰老漢弟曰老章光禄大夫知樞宻院事曰草地里中奉大夫真㝎路総􅃹府逹魯花赤曰􅑃烈秃資善大夫宫傳曰荅刺海曰羅羅中奉大夫江東建康道肅政㢘訪使曰撒馬䔍大夫中書參知政事曰伯顔帖木兒朝散大夫光禄少卿孛孛實老漢荅刺海羅羅皆前􅌰夫人以公喪至知院公率諸弟逆于通州而殯于亰城南佛舎摧慕號泣哀動路人其既􅁙也夫人自真㝎使来告于知院公曰兹幸獲㐮大事而公殁無遺㣧恐其行􅀎勞烈久遂湮没盍思􅀁以圖其不朽扵是知院公諗于僚友以聞夫人可謂賢有識矣龍光下賁炳耀泉壌公其庶㡬無憾矣乎銘曰聖神受命萬􅀖来同群木雲合咸在彀中惟公之先夙陪禁近地官之貴䟽榮一品積慶􅀁鐘䔍生後賢再世辨章相業是傳公方盛奉峻躋内相升華文苑為時雅望出持使莭風采振􅀭昭宣皇度肅正官常奉貢修􅕄布徳施令傳置􅀁逹􅀦之大政総以專使患夫才難夫孰如公克世其官来旬来宣保兹東􅁟潢池弄兵公􅁬厥武以寡敵衆莫我敢嬰餘威􅀁加氛祲廓清簡在上􅂨進位丞弼殿于大藩民用寕一盍遄其歸使秉事樞奄其逝矣當宁欷歔公不有子公多兄弟承詔勒銘垂示無止宣徽使太保㝎􅀦忠亮公神道苐二碑至正八年夏四月九日臣溍承詔撰故宣徽使太保㝎􅀦忠亮公神道碑銘公之嗣人歴官行事法當附見而其詳有不可勝書者冬十二月二十有五日翰林學士承􅈲臣拜拜臣岳柱復爲奏請而命臣溍勒銘兹碑臣溍謹按㝎􅀦公荅失蠻有子三人其二人皆已􅌰惟今翰林學士承百買奴榮禄公謝事而食一品禄公字徳卿㝎􅀦長子也年十二入見世祖皇帝命平章政事刺真教以􅀩古衛兀兒文字越二年乃命􅀙宣徽使速渾察児習治御膳爲寳兒赤成宗皇帝不豫公􅀙㝎􅀦入侍至康復而退逮成宗賔天􅀙㝎􅀦迎武宗皇帝入正大綂至大中以積勞授御藥局逹魯花赤升太醫院經歴舉名醫久次者奏􅀘以官大興醫學以淑後進皇慶􅀄擢監察御史分廵嶺北平反和林􅁈獄而寘真殺人者于法出其誣服者五人念民之受役莫重扵站赤奏請官􅇱和林站首思􅀊増給木連帖干兩站米百石有貧乏而鬻其妻子以􅀿􅃥者贖而歸之沙嶺至上亰十一納缽􅀁須柴薪宜勿科扵民以紓其力斡耳朶户求運載和林官物者冝禁止而以雇募之􅀡十萬餘㝎賦扵站户使􅀩其利上皆可其奏贖還其妻子者仍户給羊百牛馬各十民瘼既􅂫乃撤酒肆以變􅁋風興儒學以崇徳教及為御史䑓經歴以宣徳奉聖諸郡舊􅀠河東憲司道路廽逺請改令御史分臨按治􅀍􅈲至西􅁜州鞠厭鎮大長公主獄止戮一僧餘詿誤者皆薄其罪延祐中出為山南江北道肅政廉訪使以属郡􅀊饑聞于朝下其直糴官粮二十萬石江􅁜有夜入人家為其􅀁傷以死者有司當以殺人之罪公原其情而出之㝎􅀦寢疾革仁宗皇帝遣中使傳􅈲俾歸侍疾比至家則㝎􅀦巳􅃿詔起復還舊任固辭􅀙之服除入中書為右司􅀰中扈􅀙至龍慶州謂儲御膳扵民􅃁非􅀁以􅃱敬亟覆以屋于納缽之㫄易都城木槁以甎石者三百五十􅀁有司估計造馬轎及城壕木座彩畫官舎用鈔二千一百餘㝎公為撙莭止用四百餘㝎有􅈲賜一僧金襴袈裟金玉府言當用絲一百二十斤紅花紫草各六十斤金十八兩公止用紅注􅁝一縑納瑟瑟五尺而􅀁製未甞不如其法除同僉宣徽院事始公甞計􅀧宣徽羊馬増出羊二萬三千牛二百四十馬四百至是理筭提調尚食生料尚牧柴塲又减省官價為鈔百五十萬貫復入中書為左司􅀰中至治􅀄擢江北淮東道肅政㢘訪使通泰二州塩竈毀扵風濤諭富商􅂢鈔七千八百三十㝎以救其灾公􅀻咸頼以濟後􅀩省降鈔四千五百㝎皆弗果用復以歸于官有毒殺人而誣其祖母自殺之者公究其實􅇚其祖母而下首惡及合謀者于獄改河北河南道肅政㢘訪使河決原武親詣其䖏􅇂視興築用役夫一萬人稍草六萬束命􅎥夫五百採退灘野生蘆葦得十餘萬束民不擾而河患息又令汴梁属邑預􅇱稍草連􅀊􅀁積至六十餘萬束免􅂑具扵臨時人甚便之南陽山西有馬頭堰堙廢已久命脩復之􅀁溉田千餘頃皆為上􅃾設米市以抑冈利之徒罷檢鈔行人而籍市户使􅀊當一日役既輕而弊亦去嚴小倒之禁而鈔法以通建言折収田粮輕賫而民受其惠以舟代車送亞當􅁻北還而不至扵妨農公三持憲莭􅀁至必繕治公宇及三皇孔子廟凡為屋以楹計者數百川梁逵路脩除必時什器之須纎悉畢具種蒔桒果花木至數十萬本事雖㣲而未甞忽也泰㝎中參議中書省事有􅈲扵撫州北安火車秃之地建殿以􅀚飛放引古之人君竆奢極侈而􅂑敗者為喻以力諌而止以灾異乞免􅀁居官詔勉諭之曰爕理隂陽事在宰相非汝之過其起就職㝷􅁶司農少卿天暦至順間由司農卿􅁶同知宣徽院事除燕王宫相又以大都􅅏守兼宫相都総管府逹魯花赤除吏部尚書上䟽言聖朝以禮譲為􅀦以孝治天下髙麗王子迫其父退居躭羅而據其位無禮不孝宜令其父還就王位􅁍令其居躭羅宰執大臣咸歎服其言㝷復為宫相総管府逹魯花赤吏部尚書又以通政使兼舊職公在通政拯治有法力􅃥均而使客之至如歸無不胥恱今上皇帝臨御特授太禧宗禋使都典制神御殿事拜河南江北䓁䖏行中書省平章政事召入為利用卿受納皮貨􅀁以防其欺􅁦者甚至不以事之煩為憚也遷翰林學士承􅈲援禮引年遂以本官􅃱仕階自承務郎八轉至榮禄大夫􅀁服犀玉帶皆上􅀁賜先是武宗皇帝命以故宋太后湯沐地悉歸千大崇㤙福元寺平章政事伯顔持不可上震怒猶抗論不巳暨仁宗皇帝以鈔法詰責前宰相執政公言伯顔在先朝􅀎犯顔進諌可謂盡忠不宜例加罪譴上乃􅇚之後二十餘年伯顔事今上皇帝以師臣位上相公未甞一言及扵前事人以為難公歴事累朝以㳟謹見稱􅀁治御膳尤精扵烹飪前後􅀍賜珠㡌珠衣只孫金玊馬腦車渠七寳諸束帶及它衣幣服用之物以十數鈔無慮數十萬貫上樽􅈿膳鞍馬之屬不與焉公性孝友㝎􅀦之世賞及田廬貲蓄皆以譲其弟至奉㐮大事又獨任其􅃥費既告老賜鈔萬五千緡悉用増葺其先塋娶卜蘭奚氏封博􅁜郡夫人仁宗又妻以宫女陸氏昭獻元聖太后為治匳具賜宴于興聖宫命太傅帖哥司徒伯順送至其􅀻苐後封郡夫人􅁇娶秃滿倫氏脫脫尼氏弩哈出氏弩罕氏王氏並封薊􅀦夫人子男二人長亦老荅兒􅁲蘭奚氏出也奉政大夫䦨遺少監仁宗妻以朶兒别台氏􅁇娶阿兒温的斤氏次不蘭奚孫男人故上都㽞守忻都資善公㝎􅀦苐二子也由寳児赤為典膳署令累遷司農少卿章佩監同知通政院事由僉宣徽院事為其副使天暦間拜雲南行中書省左丞至順􅀄叛王秃堅與伯忽䓁率衆来攻城平章政事帖木而不花守北門公守東門叛兵乗間由它門入遂刼去省印公亦見執問何以不走公曰奉天子命為行省官安敢棄城去伯忽欲殺之秃堅不可而止乃命其黨忽哥皃兀馬兒以五十人護送入城囚之公與兩人相䖏既久囙說以逆順禍福刺血撓金為誓謀共殺反者未㡬豫王引大軍至伯忽遣忽哥兒兀馬兒徃拒之行次占兾州兩人如公􅀫約徑囬金馬山殺伯忽兄弟三人得其􅀁刼省印以授公復立行省公遣使以三人首級獻于亰師尋出迎豫王至麻隆縣􅀅還行省次􅀝隆州豫王􅀁領漢軍復陷􅃿公欲奉䂊王至烏撒而諸王啜思班巳入雲南豫王乃命公馳報于朝廷上嘉其㓛賞賚甚厚即除上都留守兼本路都総管府逹魯花赤階自奉政大夫六轉至資善大夫前後􅀍賜珠衣玉束帶各一白金千兩鈔六萬貫它衣敝諸物稱是􅌰扵元綂三年九月十七日享年五十有七娶㝎哥察氏封咸陽郡夫人忙哥氏伯顔哥氏並封范陽夫人子男一人哈八夫大夫同知河東都轉運塩使司事孫男人故同知宣徽院事怯来資善公㝎􅀦苐三子也􅀄為寳兒赤用伯兄􅀁譲㝎􅀦􅄻授器􅇱庫提􅀧外除同知建徳路総管事入為度攴少監􅁶利用少監遂為其太卿除大都􅅏守􅁶同知宣徽院事階自武徳􅀅軍􅂯轉改中憲大夫又四轉至資善大夫前後被賜珠㡌珠衣各一只孫四白金百兩鈔二萬五千貫它衣幣諸物稱是􅌰扵至正七年五月十日享年六十有二娶脫脫尼氏封咸陽郡夫人丑丑氏完者的斤氏並封范陽郡夫人子男三人黒驢王家驢木八刺孫男人由㝎􅀦而上其行􅀎勞烈臣溍既序次而登載于前碑兹不復出銘曰古之名家曰萬石君人臣尊寵舉集其門孰如㝎􅀦􅀋其㳟謹父子同時列于貴近職親地要天子􅀁毗惟才之豐靡適弗冝恂恂長公際逢熈運奉宣憲度叅陪廟論出居屏翰入侍燕間踐􅏡中外踰四十年行止以時委蛇而退便蕃錫予流㤙未艾萬石之㳟二踈之賢公兼有之庶㡬夫全偉㢤仲氏致位丞轄設竒制變茂著勲烈季亦競爽克友其兄譲行于家遺澤是承天覆日臨罔間存殁􅃬以石章用焯其實金華黄先生文集􅃃苐二十四終
