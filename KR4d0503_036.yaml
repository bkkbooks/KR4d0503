body:
  text: 墓志銘臨川危素編次番昜劉耳校正贈文林郎江浙儒學副提舉許公墓志銘前進士許廣大為武義之明年以內艱去銜哀致辭于豫曰昔吾父之棄諸孤也廣大年甫十有七後八年乃以非才叨綴末第獲備官使又十有四年始用例贈吾父文林郎江浙等處儒學副提舉封吾母冝人廣大祗奉命書將以告于墓下且求時之文人勒諸貞石以昭先德而侈上恩詎謂吉凶同域吾母遽以疾不起風木之悲罔極奈何忍未即死以終大事願推述吾父啓慶儲祉源流之所自及吾母為之助者合而銘之惟許氏逺有世序其占籍台州路之天台縣莫詳所以徙提舉公諱嗣字繼可曽大父某大父某父某俱弗仕自曽大父時以子孫衆盛㑭人専一經故許氏明經者代不乏人提學公少受尚書而於諸經無不通然未嘗資以事進取為名譽朝益暮習皆為巳之學其為人純慤靜重不妄言笑動以禮自持父喪哀毁骨立衰麻之制哭踊之莭必求合於古諸弟尚幼撫育訓誨至于成人而授之以室先世所遺資産惟其所用無靳賔祭百須及門户事悉身任之諸弟咸感化而父事焉其教子尤篤延師必一時名人躬承事之如弟子禮寢疾病之前三月預為詩示廣大詩僅百四十言而處已接物之道靡所不該廣大佩服不敢忘訖能有所樹立擢元統元年進士第調昌國州判官以選入行宣政院為掾史用資格序遷而來武義居亡何百廢具舉刑清訟簡民安其業受知上官見謂廉能皆堤學公之教而冝人相之也宜人張氏同邑宦族提學公之殁率諸子奉窀穸惟謹事舅姑以孝治家勤儉而有法待宗黨恩意甚至遇貧乏必周之諸子既蚤失所怙宜人遵遺訓戒勵之尤切廣大在武義迎致宜人就養每晨出必告之曰臨事貴詳審不可奪於私喜怒莫歸則詢于僕隸有少不厭其意輒戚戚不樂前是武義數有水患謀作隄以捍之而或者憚其勞費先聖廟及學舍屢徙而多未完欲繕治崇飾之而或者以為非所急廣大慨然以為已任宜人曰德惠未施於人而並興土木之役得無為民病乎後知廣大以身先之而人樂趍事乃喜其賢有識如此談者多謂提學公雖老於山林而貤恩所及在其身後一門之內死哀生榮可以無憾矣豫竊觀其示廣大詩則穹官峻爵固非其所慕惟後之人能以斯道自任以古人自期乃其所望也廣大既有以成其志曷可無一言以慰之於泉下乎提學公卒於泰㝎二年七月某日享年四十有五以其年十二月某日祔葬于某鄉龍山八世祖墓次宜人卒於至正六年七月九日享年六十有九以某年某月某日合葬焉子男三人長即廣大文林郎婺州路武義縣尹兼勸農事次彌大喪明而卒次小戊方業儒女一人適趙景良先卒孫男一人孟浩女五人提學公有詩若干卷因其自號名之曰得靜齋集溍嘗序其篇端以為清髙而不失乎迂平實而不近乎俚兹故弗論獨序其平生大槩而銘之銘曰許出太嶽古之封君後以國氏世多顯人公居盛時乃不有聞卒不以施藏器于身爰有淑德嫓于名門克生材彥孔敏而文惟君子使有社有民潤澤實豐水必有源逝者如斯不亡者存龍光下賁耀於無垠公侯之復在爾子孫龍山之原巋焉丘墳木則巳拱合祔惟新歸歟同穴表以貞珉贈從仕郎某官陳府君墓志銘至正八年秋故贈從仕郎某官陳府君宜人張氏以其子文杰官七品並膺贈典于是府君之殁三十有六年宜人之殁十有一年矣文杰使以狀來曰先人之葬已久而墓上之石未有刻辭文杰自惟無所肖似非敢效昔人之有所待兹幸昭𬒳上恩賁于泉壤皆先人積纍所自致又非敢竊以為功也惟所以發潛德之幽光者不宜無述敢奉狀以請願卑之銘按狀府君諱某字某世居常之晉陵曽祖某祖某父某皆業儒至府君乃以醫名家府君于書無不涉獵病時人溺於場屋之文絶去弗為嘗慨然曰仕將行吾志以及物也而不可必得幸而得之又未可必行吾志可以及物而又得以必行吾志者惟醫乎乃求良醫而師事之洞究其術人以疾來告不憚風雨寒暑囊藥以往或有以報之輒謝曰吾志不在是也府君性紀篤甫十歲父母相繼亡毀瘠如成人墓在永升西鄉去家六十里廬其旁而朝暮上食事之如生至元十三年國朝取宋之兵至常州府君挈家避地姑蘇中途與兵遇兄姊妹及從弟四人俱為所虜府君傾家資求得之同居三十年恩義無少常州已降而復為宋守主將怒屠其城府君母族妻族及其師之家皆無遺類府君還哭之曰吾恨不得與俱死也歲以城陷之日為位于别室以祭焉永升冡舍毀於兵鄉人或據其故址而犁為田府君不與校惟日夜至其處號泣而巳有憐而問其故者愀然曰吾親託體魄於此吾不孝無以動人而使至是敢不自咎乎其人聞而愧悔乃以地來歸府君酬以錢比常直三倍復為屋其上而墾田以給饋祀不廢府君家居尚儉素所服惟布衣出入無輿焉或勸稍廣其田宅以為子孫計輒應曰古人謂賢而多財則損其智愚而多財則益其過吾固不欲損其智况忍益其過哉府君生於宋淳祐二年九月十一日卒於今皇慶二年七月二十有九日享年七十有三以某年某月某日葬于安㝎西鄉之姚墅張宜人有淑德後二十有五年卒合葬焉子男二人長文照次郎文杰今為從仕郎池州路東流縣尹女二人適鄭天錫鄒通德孫男二人在垕女若干人一適湖州路南潯鎮巡檢夏某餘未行豫觀府君平生志在澤物及遭值變故又能以義起禮而處之各盡其道終於隱約而以子貴成身後之名豈非所謂積善之報不在其身而在其子孫者歟文杰方以材見用於時所以追榮其親者未見其止姑以其所巳至者敘之如此銘曰身之不逹志則已施時之孔艱義有必為自其族姻逮于師友德之在人所積巳厚擇術也良及物也深擁其餘祉𬒳于來今荷天之休流光未艾尚不一書以謹登載廣福司提舉封奉訓大夫太和州知州周公墓志銘公姓周氏諱方平系出吳偏將軍瑜瑜子都鄉侯㣧失侯而徙廬陵廬陵今為吉安路吉安之有周氏自㣧始有仕隋為會稽太守者曰汾翁忤煬帝屏宜春久之復還廬陵後五世乃自廬陵之烏東遷泥田又九世當宋元符崇寧間有與中書舍人劉公才邵並遊太學者曰諤楊文節公慕其遺風而為之追賦浩齋者也浩齋子遂良是為公之髙祖曽大父諱叔度大父諱椿年當江南臣附之𥘉事會轇轕強家大俠來時恣橫獨能以儒生為狂瀾之砥柱公私咸賴焉父諱琦母楊氏公其長子也幼從名師教以先涵飬而進于義理之學壯歲嬰家務以幹蠱自任凡稅賦徭役田廬資聚小大衆事無不身親之稍間則延名勝之士與居與遊由是聲譽日廣仁宗時駙馬都尉瀋陽王嗣主髙麗國事署公為本國西海道勸課農使公幡然曰方今車書大同朝廷以髙麗望國㑭得自除吏此豈非仕國乎既至京師忽慨然曰吾親老矣不可逺涉鯨波重貽膝下之憂竟辭不赴居數歲用薦者得旨以公為廣福監丞比出命先令供職時方立重名爵之法上以廣福所掌摹造𣑽典為東朝集福之所特命勿拘此制尋復有旨周方平儒者其速授以命書諸人無得援以為比公感上恩而恪恭所事及監改為司留公為提舉公黽勉就職旋即辭歸泰㝎元年也公在京師十餘年尊官顯人若程文憲趙文敏諸公皆略名位與交公𥘉未嘗有所攀援以求進也既歸遂不復出里有櫟溪族人列居兩旁乃因面勢治亭臺作新樓榜曰雲泉優遊家林二十餘年將終諸子咸侍受所欲言公曰子孫以和順相保家事從叔父則吾無憾矣以至正四年十二月十二日卒享年六十有五明年九月二十四日葬于新淦州楊名鄉石洞之原公性孝友割田卑龍雲山僧以奉祖考忌辰敬承先志敘次家譜聚族居泥田者千餘家散處他郡者倍是尊卑逺近無敢紊者鄉鄰有艱厄必周給之公𥘉以子九鼎貴封承事郎吉安路同知太和州事暨加封奉訓大夫吉安路太和州知州飛騎尉永豐縣男已不及受練祥之日命適下哀榮兼至焉夫人李氏唐西平王晟之後亦自宜春來徙與公家為世姻夫人善綜理家事公父子無內顧之慮而得以成其官業者夫人之助也夫人𥘉封宜人加封永豐縣君以至正六年二月某日卒享年七十有三十二月某日祔葬于其鄉赤石潭先墓之次子男七人長紳永順安撫司蒙古字教授次繕皆前卒次即九鼎以材受知丞相文忠王輔宗仁蒙古衛儒學教授今以纍遷為奉訓大夫婺州路總管府判官次茂次厚次復次總宜女四人適曽嵩李繼善李畹李滐孫男九人女十二人曽孫男三人公年十七而舉子三十九而抱孫未六十而曽孫生歲時家慶甥孫中外詵詵在列人以為積善之報九鼎至婺而溍方以老不任事得謝而歸書來俾銘公墓溍幸獲受㕓為泯安敢以衰朽荒落辭謹以公族孫鄉貢進士聞孫之狀序次如右而銘之銘曰周顯于吳以竒材稱遙遙千載乃用文鳴垂芳四葉學優不仕逢時奮興自公兄弟人皆好徑公避弗趍天語褒嘉命之曰儒公方退讓仕不擇祿時止則止返吾𥘉服碧溪泠泠飛雲湧泉俯仰自得踰二十年榮光下賁由公有子揚名之鄉公其寧只贈承事郎同知奉化州事葉府君墓志銘君諱應咸字心可姓葉氏處州麗水縣人葉于處為著族君十世祖襄自松陽徙麗水遂占籍焉髙祖冠宋季再領鄉薦善言性理而尤深于易有起進士至敷文閣待制者曰宏其伯兄也曽祖一鳴舉進士未第而卒祖正大登仕郎父天與仕皇朝為美化書院山長秩滿當教授一州輒棄不就母青田潘氏宋祕書丞復之曽孫女君少有經濟志嘗慨然曰窮經將以致用也非精無以造微非篤無以道逺乃發先世遺書朝誦暮習凡聖賢授受之奧古今治忽之幾至於儀章度數圗書曆象靡不研究山長公知其將適于用試使綜理家務外內修飭日有餘暇山長公正衣冠坐堂上子孫環列左右俾君援引經傳典故參以當今事宜而訓戒之雖隆寒盛暑不廢前史官鄭陶孫以子壻銘登仕公之墓稱君通朗秀潤詳雅善幹蠱人以為無愧辭科舉𥘉行有司以君充賦試不合以親老不復入場屋專意色養甘旨之奉必夫婦躬親之或燕飲他所遇時新之物未薦於祖未進于親者則不敢嘗子弟守以為法天曆戊辰山長公卒既祥禫益不出築室菜山之西扁曰肖堂蓋山長公自號則堂君示不忘也母氏生君而卒君始生之旦即母之諱辰每至其日必變服號慟如𥘉喪子孫無敢言稱壽者始君既失所恃登仕公之侍人方氏鞠育之及長事之如母奉繼母王氏曲盡孝敬撫諸弟有恩教子有法第三子琛為通政院宣使至順辛未以公事自上京至江浙行省便道省侍君曰父子天性也五年一見面豈不願為旬日之留然簡書有程小子𥘉仕不可不戒抵家之日即命遍謁先墓信宿遂行且告之曰能愈加廉謹以自持則可再見我如今日矣琛去又五年未及再見而君以至元乙亥四月庚申卒于家得年五十有二臨終以山長公墓石未刻屬諸子緒成之語不及他其又明年丁丑十二月壬辰葬于某鄉岑原之清風臺去家五里而近娶同邑湯氏雩都縣尹垓之女有婦德生與君同歲後君六年卒合葬焉子男四人長珂蚤卒次玘後君五年卒次即琛别名伯顔由歙縣丞辟行中書省掾史考滿而遭君之喪服除乃得調今為承事郎處州路青田縣尹次瑾未仕女二人壻曰湯奎何逵孫男六人女三人曽孫男三人君所為詩文有棲間集一卷其言務去健羡而甘淡泊不事華藻以諧世好也琛官正七品法當封贈父母如其秩至正九年春得請贈君為承事郎慶元路同知奉化州事君配湯氏為宜人其明年琛用治最受知憲府諉以核田于吾婺之屬邑會豫歸自京師乃奉君妹壻松江府儒學教授練晦孫之狀來謁銘狀稱君材可用世特以切於孝養寧隱不仕故所施僅及其家傳曰是亦為政奚其為為政君蓋有得其旨矣惟夫知君之深是以言必以實而不苟過為夸大可謂善敘事者也豫何能贊一辭庸備著其語而作銘以系之銘曰士之為善兮不與名期積久必發兮名斯我隨君則有材兮又有其時曷賈弗售兮卒以不施安常處順兮乘化而歸儲社實多兮嗣人之貽寵靈所加兮長世光輝樹此碑板兮昭以刻辭贈從仕郎浙東道宣慰使司都元帥府都事趙府君墓志銘今天子至正二年肇修祖宗故事肆命有司復用科目收天下士于是趙生由欽首以國子上舍為左榜釋褐第一循舊制授七品官因得請于朝贈其父教授府君為從仕郎浙東道宣慰使司都元帥府都事曩豫沗備貟學官與由欽有斯父之雅故由欽求為銘以表于墓隧豫不得辭府君諱孟賚字仲良姓趙氏其先宋之宗室世為汴人自燕恭懿王六世至宗正少卿贈金紫光祿大夫子英始不緣屬籍而以材自奮擢宣和某年第嘗為台州黃巖縣丞遭靖康之變遂家焉人即其所居以為稱曰西橋趙氏宗卿生朝請大夫知南外宗正事伯洙則府君之髙祖也曽大父諱師雍朝議大夫直寶章閣贈容州觀察使大父諱希聖宣教郎史館校勘贈清逺軍節度使封吉國公父諱與票咸淳七年進士調鄂州州學教授仕皇朝至翰林學士嘉議大夫知制誥同修國史贈禮部尚書上輕車都尉追封天水郡侯諡攴簡永國閻文康公復實志其墓母史氏贈某郡夫人府君性醇慤幼侍文簡公至京師嶷然如成人稍長讀書務博覽強記而明其大義不資以為辭章時新製蒙古文字頒行未久鮮有能通之者府君一見曰此聲音之學耳試習之輒精其藝用薦者授溫州路蒙古字學教授非其志也文簡公欲使涉歷于政事姑遣之官府君拜辭怵惕不忍遽離左右到官數月忽若有動于中即日解印綬還侍旁文簡公果屬疾府君晝夜奉湯藥無少懈疾竟不可為遂薨貧無以具喪事賴朝廷賜􅉠給驛乃克返葬府君平居事母孝母畏雷焚香侍立終日不去歲時祭祀以禮治家處置有法盛暑必冠言無諧謔由是子弟未嘗敢有惰容褻語待賔客樂為之傾盡與人交以誠有持物來售者紿以髙價如數酬之其人深自愧悔後不敢復為欺鄰家偽為契劵據所賃隙地而有之終弗與校人服其長者紛爭不決多求質焉或遺子弟來見必戒飭使敬謹無失皆嚴憚之娶范氏順德唐山人僉雲南諸路肅政廉訪司事范公震之女封宜人婦道母儀見稱于宗黨子男四人長由鑑紹興路儒學録次由鋭次即由欽𥘉輔從仕郎台州路寧海縣丞秩滿改調汝寧府潁上縣尹次由鑰孫男五人宜浚宜汶宜涿宜洋宜瀍女三人宜淑適同郡吳明逺宜潤宜汜府君嘗與宜人往省范公於鎮江因留居焉重紀至元之二年十二月二十日以疾卒于寓舍享年六十有四諸孤以某年某月某日奉柩權厝于丹徒縣崇德鄉之釡頂山𥘉世祖皇帝既㝎江南有以文簡公名上聞者召至上京奏對稱旨即以為翰林待制尋升直學士進侍講學士數陳讜論深契上衷眷遇益厚特命官其一子府君兄弟三人文簡公之殁也伯兄孟實既有官序遺澤次當屬府君輒以讓其季弟孟貫服除調漳州路蒙古字學教授亦不赴浮湛里閈二十餘年而終伯兄後纍遷朝列大夫廣海鹽課都提舉季弟今以通議大夫祕書卿致仕獨府君仕而弗顯乃以子貴卒享身後之榮由欽方妙年而進用于時貤恩所及未見其止談者率謂此造物乘除理所必至其果然耶夫理之在天固不易知觀其善讓而能廉蓋有合乎人道之好謙君子之有終者不可使後之人無𫐠焉此豫所以不辭而為之銘也銘曰有豐其積推而弗食有夷其塗郤而弗趍惟天所卑克平其施一本而分既參以均其委其源有考兹文曰公侯之子孫山齋喻君墓志銘山齋喻君諱髙字仲明其先由杭之富陽徙婺之義烏義烏多宦族而莫盛于喻氏宋南渡後六十年間第進士者六人有兄弟自為同年者以特科及世賞入官者十有二人升于學貢于鄉于漕者又不預焉君之曽大父諱南強承直郎處州路縉雲縣丞大父諱厚祖未仕而卒父諱夢炎登仕郎本慶元巳未進士朝奉郎賜緋魚袋致仕侃之孫縉雲府君命為大父後與兄綱俱以有官就試于漕闈綱試兩浙不利登仕府君試江東為周禮第一當上春官而不欲先其兄後三歲綱領鄉薦乃與之俱行道病卒綱泣曰吾弟所以以不蚤自振者以吾故也今吾弟已矣吾尚忍由科第取祿仕耶遂不復踐場屋而用廕輔官母浦江石氏通判泉州南外大宗正丞範之孫女有子三人長曰京次曰魏早卒君最幼江南新附母於干戈未㝎之際窖藏白金千兩京適出君取而用之京歸母語其故京曰兄弟一體也弟之有即兄之有何較焉母因以他所藏白金千二百兩均遺之君請悉歸于京而京復推以與君兄弟交讓者纍日京僅取其百兩君亦不敢過取從叔祖長林尉死無以斂其家以絲來質錢有金叉從絲中墜地左右匿不以告君適窺見亟白于母而歸于叔祖母彼𥘉不知絲中有所藏也君五歲而孤依母兄以立母兄相繼殁殯俱在堂而台之巨寇竊發于鄰邑家人皆走避君獨倣徨不忍去斂金帛置兩柩間寇至舉以卑之曰吾不吝其所有而不愛其死者覬全吾母兄之柩耳寇哀其情而弗受柩亦賴以完妹病瘖君撫育四甥如已子母有金叉為甥持去君輒以他金叉進曰在是矣竟不責其甥亦不以語人妹及其夫死皆為具棺衾而窆焉妻兄李石通判廬州拉君至官下石攝帥事有卒去數日而負其母以來當以軍法從事卒訴曰母老且病恐不復見誠知擅去當誅得一見死無恨君偶在測泫然流涕曰吾亦有母老矣舍母弗養而逺遊于數千里外曽不若一卒之孝乎君獨不見韓魏公之事乎石感君言而貸之軍中大恱君亦即日以母老辭歸石莫能留也君為人莊重而坦夷持身處家待人接物務各盡其道蚤年師事東陽樓先生雖老不親學歲必再迎致而厚禮之閲二十年如一日君既耄而三子無在者安于天命處順自適而已性嗜飲而不過其量好奕碁而不以勝負為意平居淡然無營而喜談農務所居山齋大書聖賢格言于座右尤愛誦邵堯夫詩間有所賦詠直寫其胸中之趣而不雕飾以求工亦不以示人也年八十有四以泰㝎二年正月二十七日卒於家臨終神色不變謂親友曰窮逹禍福自有㝎分語訖而逝以三年十二月二十七日葬于崇德鄉繡湖西距家二十步而近君所自卜也娶湖之德清李氏觀文殿學士忠愍公若水世孫女先四十八年卒葬洪判塘山再娶同邑賈氏先八年卒與君合葬焉子男三人長祺為堂弟鑑後先三年死次祐為兄京後先四年死次祐賈氏出先十三年死于京師今祔葬君墓旁女一人適童祐知英德府必大之曽孫亦已卒孫男一人崈本君次男祐之子命為祐後而聘外孫女童氏為之婦曽孫男一人濬女一人君沒時崈甫弱冠後二十有五年始克裒其遺事以告于溍而圗其不朽溍生於宋亡之後猶及見昔之故家人物其處而不出者類皆以時異事殊而有依隱玩世之心後生小子習而不察謹厚之風日益以衰而君凝然居衆人之中未嘗有遊言戲色竊敬慕焉今觀崈所述庶幾乎古之卓行君子者始愧向之知君者未深也庸掇其可傳於後者序而銘之銘曰清風喬木繡湖一曲生於此乎歌死於此乎哭所謂伊人其行也獨表以石章有轟其伏篆刻惟新不知夫草之既宿慈溪黃君墓志銘慈溪黃君卒于嘉興之寓舍其孤玠將返柩以葬來諗于溍曰葬宜有銘敢以為請往者屬子銘吾母而子久未及為幸牽聮書之溍之曽祖户部公與君之大父宗卿府君同仕宋季夙有雅故而玠又與溍託文字交誼不得辭君諱正孫字長孺姓黃氏世為明之慈溪縣人曽大父諱一鶚以子貴贈奉議郎大父諱震擢寶祐丙辰進士第歷知撫州提舉江西浙東常平茶鹽其在江西又嘗提點刑獄終於宗正少卿積階朝奉大夫父諱祖勉蔭輔將仕郎母林氏君生有美質雅志恬靜年十二而宋亡即絶意於仕進父殁事母盡孝與仲父季父患難相從不異資産逮今雍睦罄已槖嫁孤妹三人皇慶癸丑出遊西州玠負笈以從嘉興縣東魏塘之上有義士吳君聞君父子名遣幣馬迎致之君欣然弗拒遂止居焉君履行端粹為學者所尊慕雅不喜記誦辭章之習文成無留藁晚自號尚絅翁以見其志云至正乙酉正月七日以疾卒享年八十有一屬纊之夕戒其二子曰吾祖一剖州符三持使節枲麻葛越之衣菜茹魚鮭之食淡素終身日抄等書今方盛行遺風餘祚彌久弗墜汝等善繼承之無忝為清白吏子孫言畢而逝玠奉柩東還卜以某月某日葬㝎海縣靈緒鄉澤山之西阜從先塋也君夫人陳氏諱潤字汝玉同郡奉化人父著宗卿府君同年進士由太學博士知台州公年二十出為贅壻居十有七年乃歸夫人于夫婦之間相成以道執箕帚侍巾􅌨無違禮治絲繭縫衣裳無廢事主饋食共祭祀無曠典而又不憚劬勩致養于姑得其歡心詩書語孟及女誡女則等篇皆能成誦玠方幼口授以書程督嚴於外傅尤喜觀易所占多驗間作小詩亦有思致嘗為二子賦詩若干韻有關於倫紀可禆於治化學士大夫咸稱誦之君居魏塘之眀年玠即奉夫人來就養以泰㝎丁卯十二月十日卒年六十有三天曆戊辰九月某日歸葬奉化州剡源之三石子男二人長即玠次瑋女一人適戴幼儒故婺州路儒學教授帥𥘉先生之子也孫男二人曽紹文女一人曽孫男一俊民惟宗卿府君以直道為時名臣而其學一本於躬行所著書不為空言以相髙公親傳家學不自表襮而教其子玠克有成立遂以文名於一時世顧罕有能知君者銘不可以無作也銘曰汲黯之直侃侃宗卿義方之訓聞孫是承戰兢自持以孝謹稱如萬石君不言躬行學以為已不近名逮爾嗣人復用文鳴發潛闡幽式鴻其聲惟石可久薦以兹銘臨川李君墓志銘君姓李氏諱宗慶字可善其先自升徙撫之南城後析其地置金溪縣故又為金溪人曽祖升祖彥誠父公縉母王氏而君章氏出也君幼孤從兄漕貢進士夔子撫而教之稍長能以勤儉持其家待人咸有恩意時江南新附徭役無㝎法君周旋委曲悉得其宜人莫不善其逹于世故然性本疏直無鈎棘脂韋之態見阿媚取容者深惡焉聞者莫敢愠有不説者亦弗顧也間嘗卜居先塋之旁晚復歸治故廬而居之雖迫闤闠而有林壑之趣暇日從容園池間課家僮以樹藝畜牧暮還呼子若孫聚語酒酣岸幘浩歌以自適君既老以家事付其子而諸孫亦頗出頭角能以文學自見方將泊焉以休而遽以疾不起至元三年十有一月甲子也享年七十有七眀年二月壬寅葬永和鄉之烏石岡娶余氏先十有五年卒合葬焉子男二人長日起蚤世次日隆孫男二人敘敏而敏以君治命為日起後曽孫男二人同冏女三人豫友危君素與君同里閈而有通家之好敘又受學於危君而辱交於豫奉其父命以危君所述來謁銘按舊祖也髙祖諱祖尹贈承議郎曽祖諱士龍淳祐辛丑右科進士以閣職歷知復賔廉雷四州積階武節郎其行治有吏部侍郎馮公夢得所為墓志祖諱逢辰考諱耆老並國子免解進士君以從子為之後本生父頥老亦國子免解進士考吾母弟也君少敦朴不務矯飾稍長受學于名師制行益粹夷事親盡孝待族姻里黨有恩平居足迹不履官府雖門户事一無所謁而於將迎之禮惟謹與物接不為操切險刻恂恂寡言未始以聲色加人樵兒牧竪或犯之終不與校州里之人咸稱其長者元貞大德間用薦者輔儒學官纍遷處之石門洞書院山長俱以本生母老不赴母既殁裴􅏆故山絶意仕進木老花殘不復計偕惟知保其先廬而訓子孫扁所居曰肯堂以見其志至順三年十二月丙辰以疾卒享年六十有四娶王氏先七年卒子男三人長觀次咸次興善蚤卒女三人適樓光大李巽亨吳文耀孫男五人永文永慈永大永泰永恭女九人觀等卜以四年十一月某日奉柩葬明義鄉雷州使君墓西北十里青山之原遵治命也豫與君家故為世姻咸又豫妹壻屬為之銘不得辭𥘉文林君筮仕尉鄞端明殿學士薛公叔似實任簿領其殁于浙漕父船官公已躋法從哀而銘其墓以長者稱焉馮公亦稱雷州長者木必有本水必有源由君之著稱於人者徵之家世之懿有自來哉序而銘諸匪豫之私言也銘曰古之長者猗萬石君名在史氏以孝謹聞惟君自持履冰臨谷一鄉之評史所不録展也厚德有本有源千載所悲驥尾青雲薦兹銘詩表厥封樹曰惟長者劉君之墓明善書院山長薑公墓志銘鼎尚書陳公存數薦其材皆不報入皇朝遁迹弗仕自台徙杭又徙鄞至君遂徙昌國其徙昌國也知州李侯某實迎致而㑭五子師事之昌國固雲海島嶼之尤敻絶者也君不以所居所養易其素扁讀書之室曰敬齋以自厲焉君卒以至順三年十二月乙丑享年七十有一葬以元統二年二月某日墓在縣東隅郎家奧雙䯰峯之南娶唐氏子男四長即天禧次天祐次天𥙿早世次天祺女二適陶昱應貟孫男二女四銘曰薑氏之先維師尚父煌煌家諜逺有系序于嗟乎君為位則卑百世之祀匪君之私君雖不逮君多孫子有隕自天將復其始爰建碑號曰齊之薑表兹海隅式告勿忘金華黃先生文集卷第三十六
