body:
  text: 墓表臨川危素編次番昜劉耳校正蛟峯先生阡表故宋禮部尚書方公𩔶事三朝為時名臣宋亡晦迹弗仕學者因其自號稱之曰蛟峯先生如隱者焉在丗祖峕旁招遺老以待咨訪詔御史中丞崔或起公於家辭疾不赴以髙壽終今天子稽古圖治誕命儒臣刋定前史以鑒觀其得失而有司莫能奉公事狀以聞竟不為立傳書巳上而溍與公曽孫道壡適同在史館因得公言行之詳乃撫其大要而序次之以授道壡俾刻石為阡表庸備史之闕文謹按方氏睦之淳安人公曽祖汝翼贈宣教郎祖謙贈朝散郎父鎔封奉直大夫母邵氏贈今人公𥘉名夢魁淳祐十年理宗臨軒䇿士覽公所對敷陳鯁直親擢為進士苐一賜名逢辰故公以君錫為字用例輔亰官簽書平江軍節度判官廳公事寶祐元年召為祕書省正字升校書郎引疾去官除著作佐郎未命除知寧國府未上並以言者罷開慶元年召為著作郎兼權尚左郎官居無何復以言者罷除知婺州以外臺奏寢新命除知嘉興府未上改知瑞州甫及期亦皆以言者罷咸淳元年召為司封郎官兼國史院編修官實録院檢討官兼直舍人院纍遷祕書少監起居舍人三年出為江南東路提點刑獄公事徙江南西路計度轉運副使五年入權兵部侍郎同修國史實録院同修撰兼侍讀七年知貢舉竣事除吏部侍郎丁內憂服闋以侍左侍郎召辭不赴自是不復出德祐元年除亰湖四川宣撫司參謀官權户部尚書改禮部尚書俱以父疾辭遂丁外憂此公所閲之官也祕閣修撰公之職也承事郎若干轉至中奉大夫公之階也某縣開國男食邑三百户公之爵也鄭丞相清之秉政御筆以雷變徹樂減膳恤刑獄而獨無求言一條中外傳聞以為廟堂監謗之術及兩察官以忤清之去國公亟扣閽上書力言之且謂所貴乎大臣者以道事君不可則止今君嗣未定不能贊之敵國佯遁無以備之貨臣聚斂土木方新顛而不扶危而不持則具臣而巳聞其屢疏丐間留之者愈堅攻之者愈衆此非所以愛之時公猶在期集所而未官也上特優容之賈丞相似道制置兩淮海州喪師更以捷聞公上疏言海州之事三尺童子皆能言之而閫臣以敗為勝陛下曲徇其意出御茟令學士院降詔奬諭之豈不知而受其欺耶抑已知而姑以掩外觀而自欺耶願陛下急收回御筆以解萬丗之議而免外國之笑借曰萬世之議未睱恤鄰敵笑我何以立國乎公之取怒於似道自此始理宗在位日久務總攬權綱政多從中出群憸乘時弄威福之柄公上疏曰當大夲猶豫之秋豈無旁睨蜉蝣之撼甫節之𦦨𦦨難度其心平勃之屹屹當儲其後又曰天下有貧州縣而無貧太守有貧國家而無貧邸苐南司貧而北司之應奉不貧百姓貧而緇黃之窟宅不貧至於挾小才以濟大貪者近親有依慿焉宫中有承受焉左右有遊舉焉陛下以得之左右者出自聖斷而用之曰吾自除吏也不知有從旁竊威福者矣又曰京有尹畿有漕所以培護夲根愛養命脈邇年居是官者不過為奄竪輩一大承受耳無名宣頭真偽莫詰非時取索隱匿莫規仇士良謂天子不可令間睱若以財貨聲色蠧其心使無睱更及它事然後吾輩可以得志今此曺皇皇汲汲求適吾意者正士良之䇿也帥漕兩司疲於應奉帑庾赤立萬一畿甸之內有一旦警急何所趣辨何所倚仗乎碩斷自今日止營繕省宣索兩司不急之應辨悉停之左右並緣需索之有例者悉閣之然後可以救兩司之貧緩急之備也上頗感悟而土木之㓛不為之少輟也公復因論邊事屢及之有曰善處急者不以急亦不以睱古之謀人國於江左者莫窘於淮淝而談笑奕棋莫迫於新亭而從容就席固不以急也外示談笑而內有以神其指授之略陽示從容而隂有以伐其壁後之謀所謂睱者豈真睱哉又曰吾其有以自謀而不以鄰國之存亡為安危則不依於人又曰吾其有以自備而不以敵國之緩急為喜懼則不制於人苟以彼之存者為安緩者為喜萬一鄰敵陽示安枕以紿我而假敵以道臍可噬乎又曰今與敵對境我無一日謀敵而敵無一日不謀我彼所築者金城鐵壁我所築者土妖血山彼所築者奪我地為之我所築者奪民地為之其言切中當時玩細娛而不圖大患之病尋上疏極陳備邉之䇿曰以必爭之規模奪浮光然後可以全兩淮而保長江以必死之規模守樊襄然後可以拒光化而全江陵夫淮之猶可守可耕者以有一線之河也今􅍱河而築浮光乃吾户內若屯於斯耕於斯教訓於斯日夜出騎以撓我淮東西俱不可耕雖堅城閉壁而坐為禁制不得動矣為吾之計當勉諭淮閫盡力以爭浮光則兩淮猶可安枕也萬一樊襄不牢彼反奪之則江陵孤注尚足恃哉為吾之計當擇荊之猛將責以必死之規模守樊襄則北可拒光化南可全江陵一則思所以奪其地二則思所以爭其民則對壘之勝負決當在此而不在彼矣識者謂公此疏真活國之良劑朝廷不能用以至於亡而公言無不驗故重為之太息焉御史洪天錫劾內官盧允升董宋臣不行而去公移書宰相勉以行申屠嘉之事且抗疏援膏盲二竪為喻曰何陛下愛其國不如愛二竪之甚乎漢唐之季建置天子在奄竪掌握罪大惡極朝廷不能誅之天下必有起而誅之者漢之宦官陳蕃竇武爭之不勝并州之將操戈而殪之唐之宦官宋申錫攻之不勝河中之帥移兵而屠之小人之在君側操心何所不至其所以不敢動于內者蓋有所憚於外若外不足憚則無忌憚之心生而無君之惡動矣言尤激烈上覽之不恱公遂稱疾求去丁大全方以臺長用事欲鉤致諸賢公見幾而作謁告徑行董丞相槐勸公不必逺引公曰丞相且自照管越數月果為大全所擊而去吳公潛拜左丞相公亦召還會國子博士徐庚金等言大全雖去相位而六賊尚存乞誅之以謝天下上諭潛不當引汲庚金等議論紛絃潛於榻前自辨上為之斂容而隙自此開先是鄂渚危急上命似道提師江陵似道奏請下流兵權潛奏鄂以上既屬似道鄂以下冝屬趙葵上不從徑以下流併聽似道節制凡似道密奏外廷不得預聞上反以不知邉報為潛罪及廷臣奏忠王之立人心所屬潛獨不然姦謀叵測潛遂罷相中外惴惴疑必有後命公上疏曰天下之所同好我獨惡之天下之所同非我獨是之則為人上者亦難知矣大抵上易知則下親上難知則下畏下親則上安下畏則上孤窘急而求之一緩而遣之號呼而進之一唯而退之旁觀沮縮何以作人任事之氣乎上問為誰公奏臣不敢直指願陛下曲回天怒以安中外上乃首肯而榻前欵密之言外廷無聞知者既而似道入相希指論公者章連上矣度宗即位公乃還朝一見甚喜欲大用之公乞命朝臣為知縣以重其事權專以均田稅正版籍均力役勸農桑崇孝悌訓士卒除盜賊為考課之法有旨從所奏後沮不行此公之忠讜見於立朝者也信州措置軍糧失冝召亂朝廷以江東臬事付公聞命􅈬道及境或來言城中事勸公偃旗息鼓而過公笑不答即日單騎入州決獄一城肅然戒能事者訪得亂卒姓名禽其凶渠逆黨悉置于法事平有詔褒諭比公於韓魏公云蓋公於他獄事莫不盡其情故一路無冤民而盜賊屏息及將漕江西有獻議於廟堂請以銅錢一當十委公自江西行之公抗言其不便而止講行賑糶以救民飢乞蠲和糴以蘇民病有女妖以左道惑衆鄰郡愚民十百成群踵門徼福公杖而流之由是遂息此公之績用見於出使者也蓋似道柄國十有六年公屏居者十年諌則不行言則不聽而施于有政者又厪厪若是此有志之士所以羡其際逢之盛而惜其設施之未究也公天稟卓絶於書無所不讀而會於理學以為歸宿自為幕職官至秉麾持莭所至以教化為先務暇日輒從容庠序間授學者以求端用力之方自躬行上起自人倫日用上起婺之東陽有好事者創義學迎致公為之師從遊者數百人閩人林光丗寅緣宦竪而賜出身素不滿於科名之士及為浙東常平使者首劾公不當俯就義學之招婺州之命由是而寢公遂即家建孰以私淑其徒後以從官侍經帷每事啓沃以格君心度宗眷遇之甚至問公講授之所賜御書扁額曰石峽書院仍賜手詔褒寵之江南新附鄉寇猖獗官舍民居盡燬而書院巋然劫火之餘葺治既完而諸生稍稍來集公倡明正道以致和力行名其堂以仁義禮智名其齋時所在士風頽靡公所以振起而作新之者成效甚著此則公自任以師道之重期於繼往聖而開來學者也公所著有孝經章句一卷易外傅圖説五卷尚書釋傳四卷中庸大學釋傳三卷格物入門一卷行於丗公人物魁岸聲音如鍾磊落若青天白日渾淪醇厚不見涯涘觀書至老不廢視紛華盛麗事蔑如也待諸父昆弟子姪各盡其禮接物以誠而無不恱服不為察察而自莫能欺公卒於至元二十八年正月三日享年七十有一以三十年三月二十九日葬于縣西之安溪娶邵氏封令人再娶朱氏子男三人長梁太學生次棟次楍入皇朝並以儒起家棟月泉書院山長楍長洲縣儒學教諭然皆恬於進取不有顯秩女三人長適修職郎無為軍無為縣主簿徐敏中次適武學生項雄飛次適邵元廷孫男四人女三人曽孫男七人女一人棟之孫道壡以至順元年擢進士苐今自翰林國史院編修官出為嘉興路總管府推官階某郎石峽書院既領於有司而設師弟子貟道壑病其庳迫弗稱乃以公之故居廣其基址而新其棟宇絃誦之聲不減公在峕先儒有言道不行百丗無善治道不傳千載無真儒公之道雖不行於當時而其學有以傳於後丗夫何憾乎溍之曽大父左曺府君實公榜中進士託斯文之雅故於公門四世百年矣今所述乃學士大夫之公言非溍之私言也來者尚有考焉格菴先生阡表格菴先生趙公宋執政也公之志業未及盡展於一時而淑艾之私有足惠幸乎百丗讀其書者知為吾先生而巳蓋自考亭朱子合四書而為之説其微辭奧旨散出於門人所紀録者莫克互見公始采集以為纂疏今四方學者既家有其書以故弗論若公之丗系出處固不可俾後之君子無述也按趙氏之先葪人齊國公逈遷居洛齊公之子是為韓忠獻王族大以衍派分而三居毫者曰光祿卿期又遷處之縉雲由光祿三丗至公之曽祖考諱濟贈太子太保博平郡公祖考諱軫贈太子太師東萊郡公考諱雷以再薦于鄉特贈開府儀同三司少傳衛國公妣田氏贈蘄國太夫人公諱順孫字和仲八歲能誦説九經嘉定十五年賜童子出身真文忠公見而竒之謂少傳曰大君之門者必此子也公不以自矜益務親師取友而求其所未至朝淬夕礪幾三十年乃以春秋試于鄉于禮部皆苐一淳祐十年賜進士出身調太平州學教授秩滿差江東常平司幹官未上改臨安府學教授召試除祕書省正字兼景獻府教授升校書郎添差通判婺州以內憂去咸淳改元入為祕書郎兼崇政殿説書公因進講言今茲建元伊始正治亂相承之機度宗竦聽諭公曰卿老儒議論似富弼蘇軾公退有旨擢監察御史仍兼説書歷右正言左司諌遂為殿中侍御史皆兼侍講進侍御史兼侍讀公久當言路凡日食震電水火為災必授據經傳及纍朝故實為危亡可畏之説隨事致戒時帑藏枵乏而人主不知宮掖汰侈而大臣不問公疏奏者八面奏者三謂周官九式均節財用冡宰實總之今之大臣未聞過而問也豈不曰錢穀出入當如陳平問之主者乎大臣自處不在周公下而以陳平為足法乎真宗嘗令三司具中外錢穀大數陳恕以天子富於春秋若知府庫充實恐生侈心竟不進恕慮先朝知其有臣慮陛下不知其無也度宗不以為忤令內外諸司條具申省以聞公又言內廷之怒不可輕發恩賞之濫有所謂特除特轉特輔特贈者不可輕徇庶僚上殿過為瑟縮專求瑣細以備對揚當申警之以格習諛踵陋之風纍疏乞召洪天錫陳宗禮陳宜中還居言職劾龔日新昏鄙不宜為察官它所薦湯漢李伯玉何基徐宗仁吕圻歐陽守道吕大圭等數十人多朝廷宿望及當丗知名士度宗皆嘉納之美人楊氏進封淑妃公率同列言美人父楊纘上遺表未半月進封之命巳下獨不念其有葛覃之情蓼莪之感乎疏入遣中使問公以正謝之期降制之日何時而可俄又宣諭欲以百日為制公復奏請以期年為期時雖不能悉如公言猶久之乃成禮謝堂以從官導旨樞庭出入宫禁權傾中外公奏外戚用事漢柞中微長此不巳禍有不可勝言者歷疏其姦於榻前以去􅈬爭之度宗諭解至再公執之益堅卒免堂官堂弟垕以莭鉞奉朝請居近市其家僮日伺於闤闠間細民以物求售輒攘之公奏其狀度宗以東朝故猶豫而不報公抗疏不巳卒罷垕朝請仍徙其居似道以太傅平章軍國重事公力陳其買田變楮之弊乞討論之似道上章自辨且求謝事會其姪蕃丗守廣德負勢貪虐公奏黜之似道滋不恱公屢以疾丐去皆不允新宫之建議毀民廬以廣衢路雖用公疏令帥漕兩司相度指定奏聞而帥漕希旨持兩端之説公再疏言力爭堅挽於事將形之𥘉者耳目官之責隂消潛格於人不知之中者有股肱之大臣在今之師臣相臣有諌王清昭應如王旦之密疏乎似道復上章自辨且乞骸骨公亦以疾丐去除吏部侍郎兼國子祭酒兼同修國史實録院同修撰仍兼侍讀公猶不自安求去益力遂以顯文閣待制知平江府兼淮浙轉運使四年八月也先是郡庾赤立率以夏𥘉徴民租公謂古者十月納禾稼今先期半載民何以堪僉曰此例行之三十年不然將有乏興之憂公不聽首以俸入及例卷所供助糴夲而抑浮費以繼之糴幾二十萬斛迄免預徴郡既大治創學道書院俾諸生肄業焉五年復以吏部侍郎召尋升尚書兼職如故於是似道方諱言邊事言援襄者尤惡之公之入對首言今所謂危急存亡之秋母曰端平失襄他時可以復襄今日之事與端平異不亟援襄禍至無日許翰有言治丗諱危亡之事而不諱危亡之言亂丗諱危亡之言而不諱危亡之事人臣知危亡而不言則人主處危亡而不知矣入則無法家拂士出則無敵國外患者國恆亡今敵國外患有古之所無而法家拂士無古之所有臣甚為國家廩廪也度宗為愀然變色似道笑曰此書生腐語爾襄縱不守何至不可立國遽以亡言不亦甚乎公雖莫能與似道合而似道以公時望所屬每倚重焉六年由吏部尚書拜端明殿學士同簽書樞密院事進簽書院事兼權參知政事八年同知樞密院事兼參知政事公自躋政地數建守備之䇿似道自詭知兵終不以為意馬丞相廷鸞辭位去公獨知省院印度宗欲逐拜公右揆兼元樞公聞之歎曰不早用吾言國將亡而吾相吾其為張悌矣比降麻公適中末疾乃弗果拜中使傳旨宣問趣御醫診視旁午於道疾少間除資政殿大學士提舉臨安府洞霄宫仍書御扇出尚方物以寵其行公舟次富陽謂所知曰吾一疾勝二十四考矣十年依舊職知福州福建安撫使為州民代輸夏秋二稅錢以緡計者四十餘萬而寬催特放蠲減之數禮士犒軍之費不與焉代還之日其士人爭以詩文誦遺愛軍民焚香夾道持綵旗擁車不忍去者數千人公既歸知時事不可為憂悶成疾醫以樂進公麾使去曰吾可死矣以至元十三年四月二十又三日薨于里苐之正寢壽六十有二某年某月某日葬縣南鄉憩雲之原公階止太中大夫爵止縉雲郡開國公食邑二千五百户食實封五百户配胡氏贈魏郡夫人子男三人長曰鞏次曰瑾次曰華惟華以承奉郎直祕閣終鞏仕皇朝歷南劒建昌邵武福信五路總管積官通議大夫贈兩浙都轉運鹽使上輕車都尉追封天水郡侯諡懋康瑾承事郎南劒路光澤縣尹女一人壻曰東平吕汲孫男八人長曰桂承德郎湖州路烏程縣尹次曰楠曰機曰棣曰權曰椅曰某曰某女八人長適懷大將軍芍陂屯田萬户陳夔次適葉可大應大圭陳璋胡衡陳允德杜龍幼在室曽孫男七人女三人玄孫男五人公幼孤謹於事母而持身以嚴嗜好殊蕳薄踐敡中外餘二十年家無留資焉𥘉少傅師事考亭門人滕先生璘授以尊所聞集公既脫去場屋遲次里居因以得於家庭者遡考亭之原委纂疏所由作也後雖成書猶不廢考訂至易簀乃已公處館職秉史筆者或質所疑輒口占其本末以授之其博敏又如此奏草存可見者二十有九所著惟四書纂疏行於丗近思録精義若干卷孝宗繫年録若干卷中興名臣言行録若干卷文集若干卷並藏於家公位二府法宜有諡于太常有傳于國史而公之殁也兩宫北上九浹旬矣後五十有五年公之孫機以墓遂之石未有刻文爰以狀授溍俾撰次以備闕軼溍於公纂疏之書童而習之而我曽大父户部府君又與公有同年好施及後人不敢以不敏辭惟公夙受主知以言事官論是非殿陛上方嚮用而輒自引去晚執事樞國步已棘范希文修亰城之策不用於慶曆李伯紀經制兩河之䇿不用於建炎而公援襄之䇿不用於咸淳天之所棄孰能興之是誠有非人力所及者奉身而退以全其歸則公之自處可謂無憾矣銘曰道之不行託于空言顯顯趙公則既有聞言路之闢衆正所聚山川出雲膏澤在下夫豈弗逢止或尼之瀆則不告斂藏蓍龜善非為名禮進義退靖共夙夜罔間外內有命來覲宵衣以須蹇蹇匪躬終始弗渝孰尸其㓛不自為政時遊廟堂勞以二柄念彼多壘瞻彼四方曰其殆而繫于包桑執之仇仇聽之藐藐獨安其危而以為樂大廈之騫孰持孰扶當寧曰噫其遂相豫天胡嗇之弗俾卒相乃以晉陽為國保障允矣明哲歸潔其身碩果不食曰惟斯又若昔大臣飾終有禮諡在奉常傳在太史公則不逮公多遺書銘以昭之過者式諸􅌉峯先生墓表睦之桐廬有隱君子曰􅌉峯先生以至大三年正月八日卒年六十有七越七年乃克葬于縣北大隱阡光墓之次延祐三年十一月某日也去年秋溍以退休之餘𬒳命復出艤舟桐廬驛先生之孫𥙿來謁曰吾祖之葬子之鄉先生方公鳳既為志于玄堂而未有以表諸封隧今三十有三年矣懼愈久人無得而稱焉敢惟子也請昔在宋季先生之外舅將作少監朱公杰與溍之曽大父户部府君仕同朝居同里先生於溍為大父行溍年十六七即參陪於杖履之末先生古貌野服髙談雄辨四座盡傾每語當丗事及前代故實亹亹不倦然喜汲引後進有如溍之無所肖似猶不以凡子見遇每折行輩以相傾下興懷疇昔夢寐不忘竊碩以一言自託於先生不可得而溍亦老矣矧以𥙿重有請乎先生少力學工於文辭嘗携所業贄見內翰劉公克莊大竒之由是名動州邑弱冠遊太學登咸淳四年甲科賜進士及第調衢州軍事判官用龍飛恩階文林郎居官有廉能聲大參家公鉉翁詳刑浙左雅知先生所至輒挽以自隨獄事悉委焉屬部之民有縱火殺人者株連坐繫甚衆嵗久不決先生採得其情多所平反它疑獄經先生詳讞無不服其明允衢俗好鬪不相能則弄兵以相讎先生𬒳郡檄遍行村落戒諭之皆委刀劒為良民蜀名卿史公繩祖僑寓是邦先生睱日輒相與研究先儒性理之學為士者往往聞其緒言而有所開悟故相留公夢炎郡人也愛先生才且賢欲以女歸之先生不可乃巳秩滿辟御前軍器所幹辦公事未幾國破而家亦燬先生避地萬山中草棲露宿若與丗隔久之乃歸而稍復其故宇為終焉之計程公巨夫以侍御史將使指南來求遺逸之士得先生以應詔先生固辭弗能強也留公入覲後為吏部尚書所薦前進士七人獨王公龍澤起為行臺監察御史而先生甘老於布衣桐君古隱者廬於東峰指桐為姓縣以得名先生居東峰之丁西望漢嚴子陵釣臺唐方玄英白雲原僅數十里山峙川流儀刑如在先生徘徊其間慨然以古人之風莭自期與鄉先生袁公易魏公新之為三友袁魏云亡先生孤子立如鼎一足意有不適咄咄書空而巳家公當運祚之垂絶以使事如亰師久留河間先生數致書候安否暨得歸年已八十先生徒步往見之握手道舊故輒相對欷歔泣下前郡守方公回既奉版圗上子職方復以總𬋩兼府尹終更猶留居久乃去前後十有二年先生不一造其門後與之邂逅于錢塘始恨識先生晚賦詩愧謝焉先生屬纊前二日猶與親友劇談盡數刻精神無少憒眊亦足以見其所養有素矣孔子曰殷有三仁焉説者以為人臣之義莫易於死莭莫難於去國而屈辱用晦者亦所難辨宋之亡也先生不在其位而未始行乎患難不降其志而卒以明哲保身從容於出處去就之際而不至於屈辱其善用晦者歟蓋人之難能亦非人之所能辨也是用因其迹以推其心之所存論次而表顯之庶百丗之下有觀感而興起者焉其言行之詳志所載巳具兹不復贅先生姓孫氏諱潼發字帝錫一字君文􅌉峯其别號也先丗由婺之金華徙桐廬遂為睦人髙祖顯曽祖寶祖漕貢進士廉父承奉郎致仕之才母孺人方氏妻朱氏子男二人濬誼女二人適施昉毛元孫男若干人女若干人曽孫男若干人女若干人先生所著述散見於學者之家子死孫幼久未克裒集彚次以行惟手編前賢紀詠桐君事曰桐君山集者人多傳之石先生墓表先生石氏諱一鼇字晉卿丗為婺之義烏人至大四年年八十有二卒明年十有二月王申葬賈山之原嗚呼先生宋景定甲子鄉貢進士也人莫或用為其稱而稱之必曰先生者先生學者之共尊衆人之同慕也𥘉徐文清公倡道丹溪上及門者或仕或不仕皆時聞人文清之學蓋親得於考亭而祕書丞王君丗傑則有得於文清者也先生少受業于監榷貨務都茶埸王君若訥既又從祕丞君遊學日以荗實大而聲逺負笈而至執弟子禮者亡盧數百人然自祕丞君以耒惟用舉子業相授受故先生之門名賢書升學館者相望其髙第或據乙科最後榷貨君之孫龍澤遂為咸淳甲戍進士第一入國朝以材學顯融於時者猶彬彬焉識與不識咸以是為先生之盛至其端緒之微藴奧之邃丗固未必盡知之也蓋先生晚而覃思於易著互言總論十卷其為説不皆本於徐氏凡文清之教曰命曰性曰心曰中曰誠曰仁微辭奧義或尚有託乎嗚呼昔者子貢蓋歎孔子之文章而以性與天道為不可得聞竊意今之稱先生者雖其文章猶莫得而聞也顧以是瑣瑣者為其盛邪吾見其為先生之纍而巳鳴呼所謂同尊而共慕者其果於此乎彼乎溍生也後幸執弟子禮而不及與夫數百人者群遊並進於先生十卷之書復未能與有聞焉間乃掇其棄餘以充有司之求向之纍先生者閲四十年而固在也嗚呼使先生之道卒掩遏而弗揚者誰歟溍實懼焉謹次其師友淵源揭表墓道庶耒者之求先生無以彼易此而徐氏之傳不終寥寥也先生之丗出行事具於塜上之銘壙中之志茲不著至哀無文至敬不飾故亦弗復為之辭焉處士蘇公墓表真定有隱君子曰蘇公諱誠字誠夫其先由欒城徙行唐又徙真定纍數丗丘隴俱無恙而譜逸不傳所可知者公諱元老母孫氏金貞祐二年舉家南遷而公以興定五年九月二十三日生于汴年十有二國朝伐金之師渡河汴城危蹙乃侍親北還道路梗澀數瀕於死期月始逹年寢長事親盡孝丗故一不關於念慮然以生長戎馬間慷慨尚氣節時河朔甫定諸豪或乘勢肆為暴橫民皆逃匿公奮不顧率衆禦之諸豪亦斂避不敢犯鄉井悉賴以安兵難流離之際人鮮知學公首延師教其子而里人稍有來就學者公平居喜飲酒而不及亂善治生而不求富輕財好義人有急則往赴之莫不稱其長者大德二年十二月二十六日卒於家享年七十有八葬真定縣新市鄉新城原娶畢氏廬州宦家女前十五年卒於至元二十年三月十六日享年六十有三合葬焉子男五人長曰榮祖纍贈嘉議大夫兵部尚書上輕車都尉追封真定郡侯次曰玄曰實曰信曰德順和寧路儒學正女二人孫男八人長志道中憲大夫嶺北等處行中書省左右司郎中纍贈中奉大夫河南江北等處行中書省參知政事護軍追封真定郡公次嗣道安道允道逹道師道進道昌道女十七人曽孫男十一人天爵今通奉大夫江浙等處行中書省參知政事天澤真定某提舉司都目天益天覺天彝天常天章天申天經行唐縣尉天紀天祥女十一人玄孫男十四人昌文國子學士昌言侍儀舍人昌衡宣政院宣使餘尚幼公殁巳五十年今參政公天爵始奉國子司業楊俊民之狀以授溍曰自吾髙祖暨吾祖吾父墓隧咸有石章以紀德業吾父神道碑銘則中書參知政事許公有壬承詔撰述也惟吾曽祖之墓未有以識之茲用伐石為表幸為我書而刻諸昔諸葛孔明與龐德公生並丗而或出或處有不苟同夫亦各行其志云爾國家肇造之𥘉起閭閻而趨風雲之會以建功立號者皆公一時之人物公獨退藏於密而居易以俟命逮其孫曽當太平之盛際乃以政事文學為時名卿行且推恩三丗不有得於彼必有得於此矣公之託身畎畒固不減鹿門之髙致所以遺其子孫者以今視昔為孰多乎溍曩嘗忝載筆從今參政公之後不敢辭以年侵學落輒因狀所敘而論次之如此公之隱德非名言所能既者亦靡得而詳焉翰林待制桞公墓表公諱貫字道傳姓桞氏其先由展季仕魯食采栁下因以為姓子孫居河東者在唐為官族宋南渡𥘉有自解徙杭者生子曰森又自杭徙婺之浦江家於縣西烏蜀山𩔶四丗至公之曽祖考諱藴俱韜晦弗仕而寓迹於醫祖考諱輔之迪功郎嘉興府崇德縣主簿考諱金忠翊郎髙郵軍髙郵縣令入皇朝以公貴贈奉訓大夫淮安路泗州知州飛騎尉追封浦江縣男妣俞氏追封浦江縣君公之生也外大父閣門俞公葵暨泗州府君同擢右科進士第因命之曰貫義取以兩文易兩武贊於今文為貫故公自署其名為貫云公幼有異質頴悟過人嘗侍泗州府君謁神祠得旁人所遺金珠可直萬緡密伺其人復至而還之泗州府君大驚知其器量不凡期以逺到丱嵗遣受經於同郡金先生履祥即能究其旨趣而於微辭奧義多所發揮既又執弟子禮於同里方先生鳳括吳先生思齊粵謝先生翺三先生隱者以風莭行義相髙間出為古文歌詩皆憂深思逺慷慨激烈卓然出於流俗清標雅韻人所瞻慕公左右周旋日漸月漬不自知其與之俱化也杭於宋為故都向之宿儒遺老猶有存者公遍遊其門無不折行輩與為忘年交而與紫陽方先生回淮隂龔先生開南陽仇先生逺句章戴先生表元隆山牟先生應龍永康胡先生之純長孺兄弟交尤密往來咨叩無虛日凡學問之本未文獻之源流歷歷如指諸掌發於論議言必有徴不徒事浮藻以追丗好也諸公亦往往喜為之延譽由是名聞於一時𥘉東平王公俁持使者莭按察屬部大舉學政教官之備貟充位者一切謝遣之更延致前代賢士大夫之老於文學者輔其處於是泗州府君為之起而主教於鄉邑公在侍側王公一見輒加器重亟稱薦之公年甫弱冠殊未有仕進意後十有餘年始以察舉為江山縣學教諭又為昌國州學正江山乃川阻山窮處昌國則邈焉雲海島嶼間公不鄙夷其人所至日與為士者敷陳仁義道德之説人多化之用纍考赴選集於亰師中書左丞張公思明首令子弟耒􅈬學逹官大人得公文皆竒其才公例當教授一州用薦者特授湖廣等處儒學副提舉未上改擢國子助教階將仕佐郎由助教為慱士轉將仕郎前後在弟子列者千餘人業成而仕後多知名遷徴事郎太常慱士時方承平稽古禮文之事次苐並舉遇有所討論公援據詳洽權古今之宜而為之折衷廷議莫不服其精當沅州嵗貢苞茅四十匭茅輕舟搖多致覆溺公請以附它貢物鎮其舟至今以為便勳戚大臣請諡者數十家文移山積久格不行公悉為考行易名以上凡三月而畢臨江守李侯倜為部使者所劾他使者力辨其誣後終於大官當得諡其家求於諡議中母及臨江事公曰著其事所以白其非辜安可沒乎其子乃歎服柄國者欲以其祖配食孔子廟衆莫敢忤公獨毅然持不可而止有神降于洺郡長吏列上儀曺乞加封爵公以為神姦能鼓民不治且將為亂宜下所部禁戢之儀曺符夲郡如公言監察御史馬公祖常薦公才任風憲章再上不報乃丐外以文林郎為江西等處儒學提舉視事伊始吏循比舊以例卷進嵗為米八十石公斥去之後來莫有敢追襲其弊者龍興郡學久廢公為新其棟宇聘名儒為學者師士風以之復振道士作廟屋侵學地東湖書院田為僧所據者三百二十畒悉奪而歸之他書院不籍於官者無慮數十舊設主領一貟司其金穀之出納公命勿設而以其事分隸所在學官豐城尸教席者不任職士子因持其短長交政互訐公折以片言而各當其罪莫不心服修漢先賢徐孺子墓立宋髙士蘇雲卿祠古碑碣所紀有關於名教者必訪求而重刻之苟可以扶丗導民者無不為也南康倉吏坐株連逮繫者百餘人公𬒳行省及憲府檄讞其獄鉤擲隱伏而得其情所平反甚衆人尤服其長於政事秩滿而歸杜門不出者十有餘年自號曰烏蜀山人扁其齋曰靜儉室廬僅庇風雨饘粥時或不給而處之𥙿如若將終身焉今天子更化之𥘉登用儒雅而中朝諸老多巳凋落近臣以公名聞于上乃以翰林待制承務郎兼國史院編修官起公於家公幡然出見使者退謂人曰吾老矣忝列職禁林儻緣次對而獲陳堯之道以禆聖政之萬一豈非幸歟會有詔復行貢舉法留主文衡於鄉闈竣事乃行到官僅八閲月俄以疾卒于宇舍至正二年十一月九日也享年七十有三省臺院監皆來致􅉠集賢吳大學士直方國子吳博士師道並敦鄉曲之義共經紀其喪事靈輀南還諸公引紼陳奠於都門之外道路之人咸為咨嗟隕涕夫人盛氏纍封浦江縣君前公十二年卒以三年十二月二十三日合葬于縣西通化鄉荆山之原子男三人長卣次同次因孫男三人秬頴穆秬早夭頴以父命用公廕入官未調女一人公氣韻沈默局度堅凝平居未嘗見其疾言遽色雖有桀驁者亦皆望之而意銷孝友本乎天性弟實出後外家俞氏遇之恩意彌篤讀書傳覽強記自經史百氏至於國家之典章故實兵刑律歷數術方技異教外書靡所不通故其文涵肆演迤舂容紆餘才完而氣充事詳而詞蔚然成一家老不廢詩視少作尤古硬竒逸而意味淵永後學之士爭傳誦之工篆籀楷法善鑒定古彞器書畫而别其真晚益沈潛於理學以為歸宿之地焉所著書有近思録廣輯三卷字系二卷金石竹帛遺文若干卷烏石山房類藁二十卷盡公之葬也御史中丞張公起巖以居胄監時夙有同寮之雅故既為之銘納諸壙中卣等復奉門人宋濂之狀屬溍為之表揭于冡上溍與公居同郡學同志辱遊於公為最久知公為最深所以圖公於不朽者實溍之責也是用弗讓書而授之俾刻焉其辭曰桞居河東為唐望宗從宋南遷再丗外官公生其季逮今盛際以文易武承考之意延祐𥘉元朝多俊賢公遊其間翶翔後先于于而耒列于庶位詩書禮樂孰非吾事由中而外退也委蛇遺丗獨立一紀于兹國之老成日益淪謝鋒車在門公不俟駕有懷欲陳堯舜吾君輪當次對乃以訃聞乘化而歸公乎何憾士林䀌傷失其一鑑斯文未喪儀刑具存表以石章刻在墓門張子長墓表上即位之十一年分命儒臣纂修遼金宋三史今師相以監修國史領都總裁既進擬收擢遺逸之士四人以兩院次對之職俾參茟削仍奏辟子長為夲府長史使者奉驛劵行四千里求得子長於金華山中力辭不拜四方之士莫不髙其風後五年申命史臣纂倄本朝后妃㓛臣傳於是山林之招皆正除入館俾預討論子長名在五人之列以翰林倄撰儒林郎同知制誥兼國史院編修官召復避不􅈬使指有嚴不得巳為之起行至武林驛卒辭而歸士大夫益以是髙之子長之才之美過絶人逺甚其無愧於前修可傳於來丗者則不在彼而在此也子長姓張氏樞其名子長其字幼聰慧爽朗受教於父屏巖先生而外家潘氏蓄書數萬卷金石遺文千餘卷子長盡取而讀之過目輒不忘且能通其大意年十四五肆筆成章頃刻數千言嘗作小臣䇿譏宋髙宗忘親事讎而追為之定復兩宫之計以為當時狃於宴安莫有知出此者時前代遺老多尚存無不降歎弱齡益自愛重杜門不妄出頗易視當丗直欲方駕於古人同郡之士與之交者可以僂數暇日寓情巵酒意氣豁然視餘子蔑如也海內賢士及名卿才大夫至於是邦皆以得見為幸或問以古今沿革政治得失咸樂告之宇宙之分合禮樂之廢興以至帝號官名歲月後先皆無所脫誤每及一人則其丗系閥閲與才質之良窳歷歷如指諸掌論事後當成敗不旋踵皆驗𥘉東萊吕成公倡道於婺不幸天不假以年故婺之言性理者悉本於紫陽朱文公由文公五傳為白雲許先生子長少先生二十二歲先生偶見之漫叩以漢髙帝何以取天下輒應口而對出入紀傳貫穿鉤引語蟬聮不能休先生大竒之閲數日子長以書上謁先生答書勗之以正道期之以大成子長請就弟子列先生不可始終以朋友待之自是子長益斂華蓄鋭趍於平實學日以粹其能不失乎進退之正者學力所至也凡為文務推明經史以扶翼教道不喜作雕瑑侈靡諂諛戲豫放浪無實之言謂學春秋者必始於三傳而其義例互有不同乃辨析其是非會通其歸趣參以儒先之説裁以至當之論為三傳歸一義三十卷又謂啖氏於春秋卓然有見於千載之下而陸氏繼之所纂春秋微旨以朱墨别三傳之當否歲久漫滅寢失其真乃重加考訂為三傳朱墨夲若干卷言有未周意有未暢則出新義以輔之金之巨儒大寧敬先生有春秋備忘久未及行於丗暨入國朝先生之諸孫公儼以憲節來涖於婺槖其稿請子長為之校讎乃因近臣以聞而刻焉謂三國之正閏固不侍辨自古國必有號史亦從其實而書之漢之為漢未嘗稱蜀陳壽欲帝魏而以晉承其統遂以蜀易漢抑此所以伸彼也壽父獲罪於諸葛武侯而壽又為武侯子瞻所薄故於武侯之駿㓛偉烈多略弗著而武侯再挫司馬懿亦沒而不及內以報私憾外以為時諱也譙周壽之所師力贊後主納欵於魏賣降覆國壽不以為非反善其䇿餘所書往往類是乃紏其疵􅍝之害義正其繁蕳之失宜為刋定三國志六十五卷又别撰漢夲紀列傳附以魏吳載記為續後漢書七十三卷三國之臣有能致莭於其君者舊史或諱不書或書而失其實或僅見於異代之史皆為更定而於漢事必備載以詳正統或一事數説必參訂使歸于一是非疑似抑揚豫奪咸有論著繫于各萹之後名曰訓志經筵檢討危君素言子長是書立義精密可資勸諜朝廷為下夲郡取而上之宣文閣藏焉他所著有林下竊議一卷曲江張公年譜一卷謂宋之亡也將相群臣伏義死莭者固巳有傳在史氏卑官下士吏卒女婦之死者多史所弗録乃詢諸故老旁采稗官得若干人為宋季逸事若干卷平昔所作歌詩針銘贊頌碑記序説志狀之屬有敝帚編若干卷其言閎深浩博而峻厲潔清援據精切而論議純正尢長於敘事而扶善遏惡率能使人有所感發懲創至於微辭奧義又有未易以淺近窺者大抵其文主於氣氣命於志志立於學故言無所苟出處之際無不克踐其言江西鄉闈嘗奉書幣迎致子長司其文衡返其幣而却其請蓋場屋之文非子長之所謂文也子長之先占籍臨海唐乾寧間避地來徒是為婺之東陽人宋末稍有出而仕者曽祖日新承莭郎祖友諒迪㓛郎父觀光屏巖先生也娶金華潘氏又自東陽徙家金華先生少遊太學德祐納士從三官北上用執政薦授婺州路儒學教授階將仕郎仍刻印以給之婺歸皇朝之後有學自先生始在官十年改調紹興路平準行用庫大使循新例換將仕佐郎以母老不赴遂弗仕家食者垂四十年而終子長生於至元二十九年二月二十五日卒於至正八年八月四日享年五十有七娶王氏既不克終事子長故子長無子為之後者長曰燧李氏甥之子也次曰燃族人之子也以十年十有二月九日奉子長柩葬于金華縣循理鄉信義里許先生之殁以其子元屬於子長元欲師事之而子長則以先生之待巳者待焉子長之葬元既狀其行實之詳乞銘於危公且求溍托其大者表于墓隧先是浙東部使者交薦子長章九上俱未報逮論撰之命下溍適承乏北扉法當歲舉守令一人因以子長應詔廷議以子長纍徴不應重於勞以州縣之事遂格不行子長平生大莭非獨為士者知之宰執大臣亦知之矣夫既有以信於仐不可無以貽於後元所以汲汲焉為之圖其不朽也後漢史稱樊英𥘉𬒳詔命僉以為必不降志及後應對又無竒謀深䇿談者以為失望豈不以其名最髙故毀最甚乎蓋名者衆人之所忌君子之所避也嗚呼子長明炳幾先薰不自焚膏不自煎以保其身以歸乎全松柏丸丸清風凛然後今千年過者式焉邉氏崇孝阡表崇孝阡者吏部尚書邉公先丗大墓也邉氏居汴之尉氏而墓在其縣西二里言族氏者以為邊氏出於宋平公之子御戎字子邉御戎之孫卭為司徒以王父字為氏自漢而下代不乏人惟韶以儒顓門名尤著五代時鎬為江南李氏將其後子孫或居椘丘或居陳留汴故為陳留郡而今之陳留縣與尉氏俱隸汴由尚書五丗以上軼其譜莫詳所以分與所以徙尚書之髙祖考諱鎮髙祖妣李氏有子男六人長曰琮次曰理次曰璽次曰琥次去家為浮屠亡其名次諱琰字君琬尚書之曽祖考也幼失怙恃屬天朝伐金之師南下汴最為受兵之地遂遷避於河北之武道鎮兄弟散處而力田以自給嵗適大侵乃南徙汴之紀縣尋復尉氏故業兄弟仍同居焉曽祖妣張氏有子男三人長曰儉娶宋氏有女二人適宋氏鄧氏次曰儀娶王氏有女三人適謝氏李氏王氏次諱信字仲誠贈中順大夫禮部侍郎上騎都尉追封隴而郡伯尚書之祖考也性純篤追念祖父而下流離之餘甫遂生聚而死者未及同兆域以葬大德辛丑乃卜今地率子姪奉遷改葬以祖居中昭穆為左右而正其位所謂崇孝阡也侍郎年八十有五而卒祖妣王氏追封隴西郡君有子男三人長曰賢次曰贄次曰質女一人適西河耿氏賢字政卿朝耕夜讀且以課其子弟孜孜不怠尚書之幼學壯行成其宦業而致顯融者平昔誨導之力居多其輕財尚義於親黨無彼此之間人有逋負不能償亦不責也家奴有恪恭所事者即縱為良民而子視之里人有為水所漂者適見之而莫知其為誰亟攝衣往援之幾共溺而不自悔人稱其長者以後至元戊寅十月卒傾邑里之人來吊咸涕泣曰善人亡矣娶劉氏前卒繼孫氏無子有女七人其六人皆歸名族以苐六女納贅壻孫某承其家諱贄者字禮卿封集賢直學士亞中大夫輕車都尉隴西郡侯尚書之父也由集賢而上並孝於父母友於兄弟以勤儉起家以慈和睦族守為家法丗如一集賢兄嫂相繼殁其女歸孫氏者年未三十而夫蚤丗子甫五嵗念其確持貞莭自誓靡他撫存之甚至從妹歸王氏者夫殁子亦夭招致而養贍之以親親之仁推而及人多此類母王氏前卒追封隴西郡夫人有子男一人名公佐字邦臣即尚書也女一人適李氏繼母朱氏封隴西郡夫人有子男五人公輔公略公度公儼公弼女一人適田氏尚書用舉者由山南憲司中臺察院書吏為刑部令史升樞密中書掾授工部司程歷户部主事徽政都事經歷擢監察御史遷樞密院經歷中書左司都事吏部郎中出僉燕南河北道肅政廉訪司事入為户部侍郎除海道都漕運副萬户召還同僉中政院事擢中書左司郎中拜吏部尚書積官太中大夫先是尚書在户部以階三品推恩上及其祖考既增廣塋域設置翁仲而碑石未建懼無以彰上賜而昭先德乃馳書金華山中屬溍為之銘溍歷觀自昔草昧之𥘉出其經綸之藴以翊扶興運者固已䇿俊功而建榮名其懷材不試以儉德自保而甘老於丘園者積久必發亦莫不有以庇賴其子孫而表見於後丗本深則末茂源逺則流長夫豈偶然哉有若集賢公之親享其報年今八十有三耳聰目明康強無恙及見其子躋于八座此則丗之絶無而僅有者也溍雖衰朽無能贊揚盛美其曷敢辭謹備著其丗序之詳而顯詩之以為崇孝阡表曰邊氏之先出宋司徒韶以五經為漢巨懦南唐將鎬子孫居汴友于尉氏統分派衍尚書之貴自其髙曽隱居種德不有其名侍郎繼之其積巳久煌煌密章賁于身後餘慶則多集賢是承義方之教成於家庭有亢其宗遂享其報優遊事外躬膺榮號蒼顔白髮金紫交輝既壽而康實丗所希緬彼松楸佳城鬱鬱寵靈所加罔間存殁惟木有本惟水有源培之濬之在爾後昆推述丗序表以樂石念茲厥𥘉永永無斁費氏先墓石表昭武大將軍海道漕運都萬户致仕費公之先湖之長興人家于荆溪鄉上徐村浮雲山之陽髙祖諱顯妣徐氏曽祖諱祐妣沈氏墓咸在焉祖諱出贅嘉興劉氏宋季以䇿干兩淮制閫得官纍階武莭郎任浙西兵馬鈴轄權提舉上海市舶司事因僑居其地上海後為縣故今以占籍為松江之上海人仕皇朝卒官懷逺大將軍浙東道宣慰使贈鎮國上將軍福建道宣慰使都元帥護軍追封江夏郡公諡榮敏夫人即劉氏次薑氏皆前卒次宋氏追封江夏郡夫人考諱拱辰前武翼郎殿前司主管機宜文字至元內附從征交址有功佩金虎符為武德將軍平江等處運糧萬户有子六人曰英曰雄曰擕曰傑曰僖曰侃雄即昭武公也天資精悍有祖父風用廕授昭信校尉海鹽等處海運千户四遷至武德將軍海道漕運副萬户􅍱巨海者數十所轉輸米以石計者數百萬年踰六十輒請納祿遂以今之官職致其事𥘉榮敏公居上海既久先墓在長興者後人或不能辨其處昭武公始訪求得之而加封植焉每自念一門三丗荷國厚恩而子孫蕃衍三十餘人非前人積慶儲祉無以及此不可不告于來者俾嗣守而勿墜爰伐石為表屬溍書之而揭于墓之原溍聞之韓魏公曰心不忘乎先塋者孝之大也歐陽文忠公曰惟為善者能有後而託於文字者可以無窮昭武公可謂孝之大矣溍之文字安足託乎直書具文不敢以浮辭亂其實也榮敏公之歷官行事有武公外舅趙文敏公之狀暨前大理少卿牟公所為碑銘茲不復書張君妻趙氏墓表溍為諸暨州判官之明年得一士曰張復蓋喪其母踰再閏猶哀慕不己益求時之聞人為詩若文以抒無窮之悲焉竊嘗取而閲之非直其母為可稱道其父之事尤有足紀者夫刑善以勸俗長民者之責也溍幸以末學與聞有政庸掇其繫乎人之大倫者為銘以卑之銘曰於粵之墟句無之里孰望其地曰有張氏軫君之名君實其字群居太學五載不苐文不在茲運去物改白刃可蹈惟義所在爰有賢配克儷其美名曰與婉胄出燕邸五丗祖詪疏封安定從伯祖光典領宗正􅘊惟伯父以文藝著兩制八座纍膺異數父曰希㙠進食京族出宰桂平千室之邑其叔父埊主亦外藏流芳奕葉後先相望展也令淑婦德是履守莭自誓嫠居四紀至治𥘉年龍集壬戍三月之朏翼日而卒上距始生五百甲子男復暨頥訖葬以禮于嗟復也終身之慕禫服既除祥琴弗御父也義士母也莭婦不有子孝曷表父母繄長民者冝存風厲顧慙不敏承乏下吏瞻彼西莊丸丸松柏勤辭相哀用勸凡百金華黃先生文集卷苐三十
