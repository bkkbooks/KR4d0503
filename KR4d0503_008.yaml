body:
  text: 碑文上都大龍光華嚴寺碑至正七年夏四月天子時巡上亰今中書左丞相太平時為平章政事一日入奏于便殿上問龍光華嚴寺創建於世祖踐阼之初何以久而猶有所未備對曰此無它由其役殷費巨而財用弗繼耳其年秋八月廽鑾次三十里店諭旨中書賜以鈔十萬緡給其營繕之費仍令寺僧護視屬役勿以諉于有司住持比丘惟足欽承睿旨親率其徒鳩材僝工諏日庀事經畫指授而程督相勞之靡敢弗䖍輪奐之美丹碧交輝寶幡華座嚴奉如式在其教所宜有者纎悉完具眀年秋八月大駕南還復至三十里店丞相以訖役聞請敕詞臣著于石章以紀成績制曰可事下翰林以命臣溍臣溍謹按惟足所述事狀世祖皇帝始在潜邸駐軍和林念國家龍興朔漠奄有萬邦聲教所覃地大且逺㑹朝展親奉貢述職道里宜均爰相地于桓州東灤河北之龍岡建開平府首于城中乾艮二隅造兩佛剎曰大乾元寺曰大龍光華嚴寺龍光華嚴則以傳菩提逹摩之學者居之世祖正位宸極采古者兩亰之制詔以大興為大都開平為上都鈞天帝所上應𬗋微羽衛句陳周廬千列而兹寺尚仍其舊未有所改作仁宗在東宮躬戾其宇下左右顧瞻懼弗稱世祖致崇極於覺皇之意俾有司斥而大之英宗嗣位萬幾之暇數嘗臨幸謂五方佛像在世祖時因感異夢而迎致于兹命於故大殿之南别作前殿以妥奉焉且賜以吳中上腴之田一萬畒使贍其衆然自經始以來更涉纍朝歷九十餘年逮今天子特軫聖情圗終先志乃克因舊為新而訖考其成帝力所加固非一朝一夕之積其成之也蓋自有時夫豈偶然哉寺之開山𥘉祖曰至溫與故太師劉文正公秉忠友善有志氣而深於謀略世祖甚器重之溫六傳至維夀以道行文學受知英宗制授大司徒壽傳弘琛琛傳妙桂今惟足則挂之法嗣也自報恩來𥙷其處云臣溍竊觀昔之有國家者莫不參用真乘助宣皇度廣資勝利昭薦國釐故凡赤縣神州必有禪林法窟我世祖皇帝所以維持億萬年太平之基者規模宏逺矣列聖相承以迄于今扶植而振起之將欲與之相為悠久是誠不宜無以詔于方來謹序次其本末而為之銘曰龍岡之原灤水之滸度關而北兹惟天府肇啓帝亰自我皇祖克宅其中下臨九土金輪既御法幢斯竪普為人天作大福聚如逰化城共趨寶所沉沉華構奚啻百堵奧殿廣堂有楹惟旅架以虹梁承以龜礎有飛其榱有網其戶廓為夷庭延為行寧峙為穹門周為邃廡經之營之洊更寒暑聖子神孫纘承遺緒逮今皇上不忘繼序俯垂清問溫其天語蔽自淵衷便蕃錫豫召彼役徒赴我鼛鼓群工薦技風斤月斧金碧焜煌萬目咸覩靈山一㑹儼然故宇瞻之在前瑜珈五部玉豪金相如日當午神帝龍君後先參扈天魔恐怖曰有禦侮棲經于匭縣鍾于虡息有室廬食有庖庾勝緣畢具宗風載舉增崇上化翕受多祜歲時省方鳴鑾樹羽宗􅉀戚畹班行文武企望屬車奔赱俯僂大家右族豪商巨賈廣衆稠人下及寒窶猋至景從㕓居野處洪纎髙下一雲所雨稽首度門永有依怙于萬斯年奉我眀主詞臣作頌誕告終古阿育王山廣利禪寺承恩閣碑阿育王山廣利禪寺住持比丘悟光創建承恩閣成使以狀來請書其歲月刋之兹碑以示永久蓋自雙林唱滅像教東流有國家者咸知信嚮而無能若我朝之致其隆極者凡九州四海名山福聚至於遐陬絶域萬里之外靈蹤異跡靡不搜訪而加禮焉矧惟兹山乃釋迦如來真身舍利寶塔之所止冝其蒙𬒳帝力尊崇侈大非它山所得而比倫也舍利始出於西晋歷宋梁陳唐五代暨宋其隨機赴感發祥現瑞殊勝希有考諸傳記所述可見巳世祖皇帝底定南服而兹山入于職方首命奉迎寶塔妥安於內苑之萬歲山上都之龍光華嚴大都之聖夀萬安諸大剎及諸官署置十六壇埸車駕親臨瞻敬於聖夀萬安百寶光眀從壇而起髙貫寺塔遙燭禁庭皇情大恱亟命護送還山仍賜以名香金幣敕行中書宰臣郡長吏增構殿宇髙深雄麗視昔加倍四衆莫不抃躍欣慶得未曽有列聖相承逮今天子歲時函香遣使賜豫尤渥㑹法席偶虛而寺幾廢今太尉納麟公時為行宣政使求可任其事者于是光由平江之開元來𥙷其處至正二年七月也光既重新門廡殿堂庫庾庖湢之屬且盡復豪家所據諸莊田土園林而資以為奉飬者一無所缺學徒雲集內外不下千人光以為寺之所宜有幸已畢具而天使下臨祗肅無所乃出上所賜白金為兩二百市材僦工造傑閣以嚴使命列楹若干架霤若干屋之以間計者七其崇若干尺廣加其崇若干尺修去其廣若干尺飛榱步簷方櫺曲檻悉稱其度名之曰承恩之閣上設像座而即其下為傳宗之堂後為方丈之室費有不給則繼以經用之餘資民不知而官不與焉庀役於九年之冬訖功于十年之春前人未及為而今為之其作始之自固不可不書也昔大覺禪師懷璉歸老兹山于其君之賜有所弗受不欲以已易物也光獨汲汲焉圗所以彰吾君之賜如恐弗及不忘以下報上也璉之辭讓光之恭敬同出於儒者之所謂禮則其為道冝亦無不同也所可書者豈直經度之勤營締之美而巳哉光蜀人族某氏别號雪窗云銘曰佛之真身遍一切處非滅而滅非住而住金瓶寶篋八萬四千兹惟其一留鎮人間粵自先朝逮今聖世星軺絡繹香為佛事櫝有金貝篚有綺繒侑以多儀用薦德馨因果不殊財法交施受用見聞同增福慧大恩莫報君賜未彰荷負有人不敢怠遑乃擇嘉辰開寶樓閣熾然建立無作而作華幡珠網像座中嚴龍光下賁人天具瞻三輪既空莫非實相知報佛恩則為報上史臣作頌來者是徴於萬斯年彌謹其承故參知政事行中書省事國信使贈榮祿大夫平章政事上柱國追封閩國公諡忠愍王公祠堂碑至元十五年秋七月閩國王公以福建道宣撫使覲于上亰世祖皇帝與語大恱朝退首命左丞張公即公寓邸傳旨詢日本事公對以日本蕞尓島夷不足煩天討因畫招徠之䇿以進深契上衷將使預聞國政公懇辭乃降金虎符授公中奉大夫刑部尚書福建道宣慰使兼提刑按察使仍為御便殿曲宴以遣之俾左丞吕公為公起舞霑醉而止公既還治閩中具宣德意十六年夏五月舉家入朝眀年正旦上眷禮有加擢户部尚書數奏事稱旨嘗命之坐而輟御膳以賜以廷辨薄百官俸非便忤權臣意丐外十九年春二月拜正奉大夫參知政事行中書省事將之官江西即政事堂條陳二十四事丞相齊魯國文忠公大喜恨得公晚留公母行二十一年春正月進對言日本未易以力服而可以計取誠令臣得備一介之使以招徠之事成可無殘民匱財即事不成亦無損國威重上嘉納之因以公為國信使凡所須一惟公意公以為臣他無所須秪須一印佩之擇參佐數輩奉詔書以行足矣有旨命公視草且賜公玉環連絛納瑟瑟𫀆帽鞾馬鞍各一俾丞相善護視公妻子之留質亰師者公既陛辭以夏四月發慶元五月抵耽羅耽羅人或勸公勿䡖往公不聽秋七月至日本境上先令持旗榜諭其國中并移書國主及用事者日本遣來郊迎甚設請遂以詔書入􅉝卯望艤舟對馬島丙夜俄有舉火譟歡島上者公竟遇害而薨得年五十有六夫人葉氏携諸孤跣哭赴訴闕下上聞訃震悼命須其家衣廩如故給夫人驛劵乘官舸五南還䆒其事尋諡公敬愍侯録其季子從仕郎南劒路順昌縣尹都中為少中大夫平江路總管府治中即平江賜宅一區田八千畝厥後都中纍遷荆湖北道宣慰副使言公雖已得諡而爵秩未稱有司以聞仁宗皇帝覽其奏皇慶元年春三月詔加贈公榮祿大夫平章政事上柱國追封閩國公改諡忠愍于是夫人亦從公爵封閩國太夫人既以告其第太夫人母子相與感泣懼無以昭上恩侈前烈爰卜吳縣至德鄉白蓮橋之西二百步構堂肖公像而祠焉公姓王氏諱積翁字良存其先光之固始人世為宋官族髙祖諱戩贈太保髙祖妣陳氏東萊郡夫人太保南渡時嘗仕閩因家焉故又為福之長溪人曽祖諱椿贈太傅曽祖妣陳氏通義郡夫人林氏平原郡夫人祖諱萬全登淳熙二年進士第任處州青田縣令贈太師祖妣林氏信衛國夫人考諱方大贈少保妣陳氏頴川郡夫人𥘉少保無子禱于顯應崔府君之神而生公性至孝博學工為文辭年十八領國子舉眀年用叔父參知政事忠文公伯大䕃𥙷承務郎調監嚴州都酒務故宰相吳公濳分閫四眀辟奉國軍節度推官改㳂海制置大使司幹辦公事纍數十年不决之訟悉以諉之凡所剖析三百餘事有平心録四卷除提領戶部犒賞所檢察官貽書漕使趙公與訔捐和平十二酒庫積逋十七萬和平三百家為之少蘇馬公光祖以執政尹天府辟浙西安撫司幹辦公事奉朝旨决六縣獄單車夜至餘杭閲獄囚一百七十悉得其情當坐者僅數人餘皆平民眀日召縣官盡釋之所平反他邑疑獄全活甚衆辟淮東總領所措置糴買官改江東轉運司幹辦公事用舉者改秩差知冨陽縣治辦為諸邑最皇族有縱家僮殺人者論如法無少貸人尤快之秩滿堂除兩浙轉運司主管文字力請寬版曺催科之限東南諸郡咸便之除監左藏封樁上庫差通判臨安府除提轄文思院主管諸軍審計院遷太府寺丞兵部郎官出知徽州兼都督兵馬府參議官軍帥李詮據城謀為變勢張甚公以計柔服之且施恩信離其黨民恃以無恐加兵部侍郎仍舊任俄除江南東路提舉常平茶鹽改福建路提點刑獄行次永嘉復以為天下兵馬都元帥益王府司馬辭不就改知南劒州兼福建路提點刑獄兼招捕使進兵部尚書除寶章閣學士福建路制置使兼職仍舊於是德祐內附三宫已北上而景炎新造未久又航海去乃抵福州行省以八郡圗籍上之行省承制以公知建寧府尋充福建道宣撫副使部將李雄挾淮兵為辭殺同知宣撫司事潜說友而屠其家公收潜尸為治後事且以計紿雄而厚結其麾下因大閲擒雄誅之以功升宣撫使福州路總管兼府尹兼提刑按察使巳而淮兵亂復作公率郡民捕其黨悉斬以徇閩生齒數十百萬卒賴以完亡何而入覲鄉國之人至今思之公夫人曰陳氏曰林氏皆封安人先卒曰葉氏今閩國太夫人也其為比丘尼而在者曰圎眀靜慧慈照大師住持杭州眀慧寺搠思丹巳卒者曰宏宗圎眀佛曰大師住持平江妙湛寺普貴子男七人曰時中易名為僧以卒餘悉以公奏𥙷官曰琦眀威將軍同知肇慶路揔管府事曰權中從仕郎同知循州事曰升中從仕郎寧海縣尹皆卒曰建中從仕郎建安縣尹閩國太夫人出也從太夫人留質而歸卒于維楊驛無子以都中之子某為其後曰端中從仕郎尤溪縣尹亦卒曰都中今正議大夫兩浙都轉運鹽使女六人四適名門二為尼孫男七人女四人曽孫男五人女一人堂成後三年都中以太夫人之命來徴文將刋之兹碑溍竊惟公之忘身殉國亦既蕳在帝心而足以暴白于天下太夫人勤懇一意為天所祐年幾八袠貌端神澤福祉未艾正議又以材猷德望嚮用於時有光于前人蓋人紀之大者三公之為臣太夫人之為婦正議之為子可謂盡之矣欲勿書得乎太夫人之弟茂辰嘗以公薦為武德將軍管軍揔管公之殁也為之七走亰師而致力於祠事尤悉亦有功于王氏而可書者也其銘曰於赫世祖總攬群雄委質自奮時惟王公千載之逢由一言始歸護全閩惟天子使相彼林林孰完其生繄公是怙弗震弗驚乃疇民庸乃踐朝著乃啓乃沃乃居政路蠢兹島夷敢有不恭抗言請使出次于東溟波浩浩其下不測長風大帆萬里一息天聲所加咿嗢睢盱鞬櫜帞首俯伏路隅煌煌英蕩使事有指庶公其歸赤舄几几胡蹈大難而以訃聞舍生取義哀動帝宸疏封進爵易名節惠于飾其終罔不備至公則逺矣遺烈不泯孰其承之惟後有人一畒之宫百世之祀麗牲有碑刻示無止故陕西諸道行御史臺御史中丞贈攄誠宣惠功臣榮祿大夫陕西等處行中書省平章政事柱國追封濵國公諡文忠張公祠堂碑故濵國文忠張公家濟南而其别墅在歷城縣北十里華不注鵲山之陽歷山之隂號曰雲㽵公自參議中書省事退休其中者垂十年至治泰定之問詔使沓至皆堅卧不起文皇御極以翰林侍讀學士召未至改陕西諸道行御史臺御史中丞公乃幡然就道時公年甫六十到官僅三閲月而薨于位天曆二年七月壬午也始公嘗謂吾居雲㽵而樂且密邇吾先世大墓吾死必以昭穆序葬而於是乎祠焉九月丙辰公嗣子今祕書郎引遵治命奉柩以葬而以清河郡夫人郭氏祔至順二年三月戊子乃作祠堂凡屋之為間者四堂居其三而室居其一妥神有位物器備完歲時蕆事饋奠惟謹以溍忝綴公門生之末俾有述以告來者溍竊惟公𥘉尹堂邑撫人有恩用獄不失有罪能使豪彊讋伏而盜賊化為良民為御史則抗言尚書省不可立其變更法度易置官府將厲天下且擅除御史大夫中丞非祖宗故事疏時政之弊萬餘言力拄權姦幾蹈禍而不悔在中書則諌止內廷燈山之戲卒以忠直受上賞暨執法西臺屬關右荐饑一以荒政為己任有禱于神其應如響乃傾私槖斥公帑奏請大發錢粟下輸米授爵之令用便宜通鈔法以來商旅由是人始得食至於疾病死亡皆具為區處慮有司怠於奉行則分遣察官臨視之委曲纎悉竭盡其力賴以少蘇者雖甚衆而公竟以憂勞悲感奄及於大故捐館之日奉元鼓樓梁木自壞濟南里第有光若隕星者民之無祿庸非天乎事聞制贈公攄誠宣惠功臣榮祿大夫陕西等處行中書省平章政事柱國追封濵國公諡曰文忠恤典之優異先帝憫悼深矣公所學務致於實用而一語一默之細亦無所苟仁宗時公居禮部為侍郎尚書雨持文枋克廣賢路深契上衷新進士銜刺來謁輒拒不與為禮書方寸𥿄令閽人諭之曰但思報國無以私謝為也所撰著施於朝廷行於四方萬里人莫不傳誦之蓋公之蒞民政多卓異冝如循吏之立祠直道以匡君而勤事以死冝如功臣之祭於大蒸文學論議存乎㳤艾之私冝如先賢之祀于學固非其家所得而專也然以公居此為最久從容去就之際聞者至今為之咨嗟歎息過而見其平生釣逰處池深木寒猶將低佪不忍去况登斯堂而仰公之遺風餘烈可使貪夫廉懦夫立其於名教殆非小𥙷尸而祝之豈獨仁人孝子用以厚其親哉溍既不敢辭而序其概復為銘以系焉公諱養浩字希孟世次官閥行事之詳有傳在史氏今皇上又申敕詞臣勒諸石章昭揭墓隧矣非有關于祠事者此不著銘曰瞻彼樂郊齊山兩間山之幽幽水清且漣孰遄公歸而止于此使者在門公不為起止非無所行也以時大君有命賁然來思曰豫赤子汝饑豫哺庶幾當寧寬是西顧盡瘁以仕不有其躬神遊故墟有寧一宫公像在斯皇皇卷服生氣􅏮焉過者必肅記丞相兾寧文忠王祠堂記故丞相兾寧文忠王以至正七年秋九月十八日丁巳薨于位二十六日乙丑祔葬亰城和義門外之先塋八年春某月某日某甲子建祠堂順寧府宣平縣宫家㽵之景賢書院冬十一月十二日甲辰宰執大臣奏事明仁殿而退諭上旨俾臣溍撰王先塋碑銘并以祠堂記命臣溍製其文賜王母弟今大司農逹世貼睦尓使書于石仍敕平章政事議中書省事姚庸篆題其首而刻焉惟武宗皇帝昔在潛邸出鎮朔方故丞相和寧忠獻王以宿衛重臣久侍帷幄上既嗣大歷服忠獻遂以佐命元勳入秉國鈞夙興夜寐勤勞帝室將置其家于北土令就髙爽而逺歊袢乃以上所賜宫家㽵之地築别墅居之而延師教其二子俾有成立為時名臣即文忠及大司農也里人化之無不恱學忠獻以父老之請為創精舍聚其子弟而教育之有司以狀白于中書卑之額曰㬌賢書院立山長為學者師忠獻既殁因作堂而祠焉其構興之𥘉今上皇帝特出內帑金錢幣物以相其役東朝及中宫致助有差逮其訖功上復遣使函香具牢醴以落其成詔詞臣歐陽玄為之記至是别為堂以祠文忠事聞又命臣溍記之臣溍竊考古者天子之公卿有大勳勞則祭於大蒸後世之廟廷配享是也諸侯有國大夫有家則設廟祧壇墠而祭之後世之羣臣家廟是也傳所謂釋奠有合有國故則否說者以為國故若唐虞之有伯夷后夔周之有周公有則自奠之無則合於鄰國今學校各祠其鄉之先賢猶有取其遺意也夫唐虞成周固非有鄰國之可合舍夷夔周公而誰歟忠獻以雄才偉略出則膺瓜牙之任入則荷腹心之寄至於處危疑之際不動聲色而施轉旋闔闢之功民志以之而定國勢以之而安可謂社稷之臣矣文忠用貴王賤霸之術佐今天子於重熙纍洽之餘以親附百姓鎮撫四夷為已任而務使官得其職物遂其冝雖古良相殆無以過而况前作後述濟美象賢位冠百僚爵超五等是宜配侑於蒸嘗享祀於廟室豈鄉國之間學校之士所得而專乎其相與尸而祝之者蓋以事夷夔周公之禮事之也臣溍庸因記事推述而論著焉文忠諱鐵木兒逹識官中書左丞相録軍國重事階開府儀同三司勳上柱國贈開誠濟美同德翊運功臣太師中書右丞相階勳皆如故追封兾寧王諡文忠餘見于前記及上所賜勳德之碑者此不具眀正書院田記宋南渡後衢之先賢忠簡趙公而下六人蓋尸祝之舊矣景定末王侯巳守是邦始諗于朝即故吏所據祠地為道院者闢書堂曰明正且以其沒入之田百七十有六畝隸焉咸淳間繼之者趙侯孟奎又益以它田六十有三畝祠事以備國朝因之建書院額設山長貟而兹田之奪于浮屠老氏者什七八有司漫弗加省也皇慶𥘉上新即位垂意庠序之事凡田之在學官者冒取有禁於是總管申侯為閲纍歲之訟牒而核其實悉返所侵田有挾教門檄來爭之者俟弗為動乃賂吏瞰侯在告謬為可疑上其事于宣閫今山長葉君謹翁白侯破其計而閫復下于郡侯為徴圗籍覆按具有本末田以卒歸蓋九十年間祠三徙而始有田不二十年遽失不守又三十餘年乃復葉君念其得之難而保有之不易也求書于石以圗永久溍竊惟三代而降師廢民散儒失其守而奪于二氏者匪直吾疆畎而已矧夫威怵利誘有甚於二氏者乎嘗試觀馬公之在建炎連柱大姧一斥終其身不悔逮紹興權臣檀事汪公既坐切直擯弗用趙公竟以不苟合去相位貶且死至若范劉小汪公委蛇仕止之間又莫或少自撓是廩焉不可奪者區區之土壤猶外物也賢師帥祗奉德意幸惠斯文甚厚繄六君子之胄若士之從葉君登斯堂者敬共以承事感慕而振飭必有名人傑出其間嫓美於前哲夫能寶其不資之軀則一物之細有不難守矣溍既為書其概且道其所望于諸君如此𥘉田之未復也劉公五世孫衍嘗以已田百畝代其匱汪公五世孫喧亦以已田三十畝相焉至是兩家因捐其田戒子孫勿復有是抑可書巳申侯名月魯帖木而髙麗人上海縣學田記上海由鎮為縣之三年縣始有學又十年學始有田又九年乃改作學于縣東如千步延祐元年冬張侯如砥來涖縣事厥既延見諸生視其居則齊廬未備也庖廩未充也按其籍則田之析於郡庠若出于是邦之寓公者歲為米不盈四百石惕焉深懼士失其養而學政之弗舉謀大其規制為久逺計而未知所出也上人善能者聞之請入私田四百九十五畝有竒為學官永業以佐經費侯既納其請則白狀于縣而輸劵于學主教事者方君遇以為向之克有學有田不易如此而上人一念之頃遽能不愛其所有以弛吾乏絶之慮是不宜使後之君子無述也乃伐石來徴文為記嗟乎大道墮裂九流百家之異趨久矣是果不可同歟易稱同人于野亨而謂同人于宗吝夫與善不擇其類致亨孰大焉施惠而不私其黨去吝孰先焉由其通舍其蔽兹所以合異而為同也侯與吾從其有取乎此矣上人亦嘗學於是耶土地之利其末爾竊獨嘉乎是舉也庶幾乎吾聖人之旨而有非苟同者故為原其大趣而為之記其目之細則碑隂存焉常熟州學田記常熟故吳地州之西子遊宅在焉當孔子時吳通上國巳久北學冝非一人獨子遊以身通受業列于七十有七人之間而其言行見於記録為甚具逮今千有七百餘年生其地而好學䏻文者猶彬彬焉風氣之厚俗習之盛誠非旁州比縣之所及然自其為縣時已有學而所占田多薄瘠以歲之不易也諸生往往無所仰食學校之飬顧出它州縣下弦誦之聲希闊寂寥前後為是州若職教事者思有以𥙿之而未知所以為計學之賔老以為州之有力而名好事莫如曺君乃相率造君以為言君欣然為輟田之可耕者若干畝山之可樵者若干畝以佐之士之群居聚食始無所乏絶莫不德君之為而願得豫文以記之豫聞古昔授田建學悉有成法民之為士固不必廩于學宫而大家巨室亦不得有羡田以資施豫也自先王之法壞而不可復見說者蓋以為三千之徒聚而食於孔子或又以飲食之人為子遊氏之儒何言之無稽耶今之去孔子曰益以逺有能聞布衣飬徒之事而興起焉可謂難也巳若夫為弟子貟而藏修息遊於斯者皆生於子遊之鄉而得其風氣俗習之美者也苟無幸乎居之安食之飽而必有事焉將見其處也必無愧乎子遊之文學其出也必無忘乎子遊之學道而愛人一簞一瓢不足為其儉萬鍾之祿不足為其泰孰得以區區飲食之細厚誣君子也哉是用弗讓而為之記以告諸來者云爾曹君名某嘗為某官義烏先逹題名記義烏邑庠禮殿之西南故有文昌祠宋先逹題名在焉祠廢而石毀已久至正七年春主教事者暨先逹諸公之後人始復修其祠事而買石重刻置其中昔我世祖皇帝既定天下于一萬邦黎獻共惟帝臣特旨以宋咸淳甲戌進士第一王公龍澤為行御史臺監察御史公邑人也鄉大夫先生莫不動色胥慶以為科目之設兹其權輿逮仁宗皇帝臨御伊始承平寖久文運之開適惟其時誕布詔條光揚祖訓著貢舉令以興賢能法行于延祐之𥘉而兆見于至元之末公之用舍乃科舉廢興之幾名不稱則無以風厲乎四方搜其缺軼而表顯之不獨為一邑之榮觀而巳矧今聖天子在上稽古右文分命儒臣撰定前史因其善惡以寓勸懲列傳所載盡瘁事國如忠蕳宗公正色立朝如文清徐公皆邑之先逹也覩其名而知感慕激發則兩公不得專美于前而後賢之踵武相接又豈止為科舉之士哉是宜有以彰千載之盛際非徒可存一代之故實云爾詩曰自古在昔先民有作遺風餘烈固未泯也又曰髙山仰止景行行止吾儕小子敢不勉諸題名舊刻溍之曽大父左曹公實志之兹俾溍嗣書其重新之歲月溍不得辭也江浙行中書省題名記昔太史公於漢之將相名臣不皆立傳而為之表悉著其氏名歲月使覽者尚論其世而有以知其人後世官寺之題名實本於此故雖偏州下邑無不記諸其㕔壁江浙行中書省蒞治錢唐五十又六年題名有記尚矣至正二年夏四月省署燬于災而石亦仆今丞相適下車亟使計工程材拓故址植廣厦增崇其壯觀以昭示乎等威而未及搜遺舉墜𥙷題名之缺平章政事康里公視事伊始命掌固考舊櫝合前宰執之氏名歲月伐石而大書深刻焉令溍叙次梗槩以告來者溍幸嘗以文字為職業而效趍走於屬部何敢以不敏辭載惟我朝稽古建官以來厖臣碩輔入則保兹天子而儀刑乎百辟出則正是國人而屏翰乎四方體貌之尊內外均一所以聳萬民之具瞻折千里之遐衝也今天下為行省凡十有一而江浙當東南之都㑹生齒繁夥物産冨穰水浮陸行紛輪雜集所統句吳於越七閩之聚訖于海隅旁連諸蕃椎結卉裳稽首內嚮挈兵民二枋而臨制於梱外事任至重非元勳懋德兩有文武莫克膺其寄丞相繇中書平章政事進位端揆來鎮兹土紀綱號令煥然聿新群工庶尹奔走率職賜履所及咸為之改視而易聽皇上嘉其有興壞起廢之𥘉特敕詞林宗工作記并書篆以賜一時宰執大臣都司僚佐亦已衣𬒳昭回之光而流榮耀於無極若夫題名之設蓋他日表將相名臣者之權輿是冝與蘭臺祕閣之所纂名山金匱之所儲相為經緯氏名歲月之存否所係甚大豈偏州下邑㕔壁所記可槩論乎然竊聞溫國司馬公記誎院題名以為居是官當志其大舍其細先其急後其緩專利國家而不為身謀有言責者固不容不事斯語充乎是道雖秉國之均任天下之重無難也則其為記又不徒取氏名歲月之可見而已矧今聖神撫運巨人並生更進迭興均其勞佚猶有虞之九官奮庸於內成周之三后協心於外畫一之治罔間後先述作之家遡觀其時而睹其餘澤之未泯指事載功垂之竹帛不亦廟堂推美讓善追紀前人之盛心也哉江浙行中書省左右司題名記中書之有行省行省之有左右司國朝之制也蓋自唐分三省肇置都司為尚書丞轄之二以天下之大百官之衆而任是職者止于十人其選不䡖矣考之六典則其所掌付諸司之事舉正稽違省署符目執直簿以知省內宿直等堇堇數事而巳位有常貟職有常守也今政本一歸於中書而以左右兩司為元僚小大之事罔不與聞列曺掾有所關白得持文墨議論相可否僉議既定乃以聽都堂之裁决而署行之較之往昔事權輕重固大不侔其在行省曰郎中曰貟外郎曰都事官稱命秩悉視中朝宰士而恩數無內外之異合左右為一司以兼總乎六曹而分守無彼此之殊位序巳崇而職務尤劇委任之重敻絶前比非清方敦實閎敏周通之材莫冝居之由是而歷從班登政地者踵武相望號為宰相之儲誠要官之髙選也學士大夫往往觀乎題名而指其顯融於時能以俊功偉烈自見者侈為盛世之美談安可無以考其去來之歲月哉江浙行省左右司重新于災燬之餘爰命溍記其題名而刻諸廡下溍竊惟古之記題名者不特以謹歲月必因其所居之位而寓規誡焉今之都司上以彌綸乎相業下以綱紀乎曹務至于邊隅之厄塞閭閻之幽隱靡所不當問非若群有司效一官守一職而可以一事名言也庸叙次其設置之沿革以為之記凡參贊之功有可稱述而非題名所能盡記者兹不得而詳焉監修國史題名記宰相之職掌佐天子正百官於軍國之政令無所不統惟領史事則特給印章别設官屬而敕尾以之入銜重其事也昔在世祖皇帝中統二年翰林學士承旨王公鶚奏請立史局纂修先朝實録及遼金二史其國史則請以右丞相史公天澤監修上悉從之至元元年始置翰林院十三年乃制授平章軍國重事耶律公鑄監修國史建官實始於此其後恆以上相專綜監修之務㦯並命次相則曰同監修委任可謂重矣若稽往制詞臣史官班列不同職掌亦異今既合為一院而史事獨屬之宰相者蓋紀録天地日月之祥山川封域之分昭穆繼代之序禮樂師旅之事誅賞廢置之政布在方冊垂于萬世其所繫之重非它司比抑可知也故凡大拜之後必諏吉視篆于本院㕔壁固冝有其題名然自史公天澤耶律公鑄逮脫脫太傅公兩入中書相今天子九十年間領史事者之官位名氏歲月皆未有所登載於是院長謀于寮友而訪于中書之掌固得右丞相天澤太傅公而下總十有人礱石大書而深刻焉其莫得而詳者皆不著亦闕疑之義也翰林國史院題名記世祖皇帝中統元年𥘉設翰林學士承旨官正三品至元元年乃建翰林國史院而備學士等官八年院升從二品成宗皇帝大德九年院升正二品仁宗皇帝親攬御筆點定置立學士承旨六貟學士侍讀學士侍講學士直學士各二貟皇慶元年院升從一品迄今遵為永制先是蒙古新字及亦思替非並教習于本院翰林國史集賢兩院合為一仍兼起居淮領㑹同館知祕書監而國子學以待制兼司業興文署以待制兼令編修官兼丞俱來隸焉其後新字既析置翰林院而復立集賢院如故今興文署已廢本院於起居注㑹同館祕書監國子學之事悉無所預回回學士亦省而亦思替非以待制兼掌之今上皇帝建宣文閣而不設學士詔以經筵崇文監皆歸于本院崇文監言其非便而止惟於學士承旨而下摘官判署經筵之文移頃因纂修后妃功臣傳又以執政兼學士承旨等官而無常貟此建置㳂革之大略也自中統至元以迄于今題名久未克立是用搜羅故牘考其姓名資秩遷次而刻諸石庶來者有考焉夫題名雖非古而唐宋以來偏州下邑莫不有記矧以文學侍從之臣於焉萃止安可覩其闕文而弗之講乎覽者因其人而尚論其世則國家之聲眀文物名公大人之遺風餘烈猶可概見也僚屬參佐具于别刻者此不書上都翰林國史院題名記凡官署咸有題名記之者必述其職分之所當為以寓夫官師相規之意焉粵自世祖皇帝作别都于灤陽一逰一豫無非事者列聖相承遵為典常文武百司扈從惟謹翰林國史職在代言以施命于四方載事以傳信於萬世天子出御經筵則勸講進讀啓沃聖心退則紬繹前聞以待訪問任重而地親上所識擢必勳閥近臣儒林大老與一時名人魁士實侍從之髙選非他有司比也由至治元年逮今二十有七年分院題名歲各有記於其職分之所當為論之備矣兹不復勦取舊說而重陳之苐記其官位氏名歲月庶來者有所於考焉爾蓋大駕以至正七年四月十九日發亰師五月十二日駐蹕上亰八月十三日回鑾院長而下除拜則書或將指而行或賜告而去不悉書也經筵之職曰領曰知曰兼無專官惟居翰林者獨主其文移出納故合本院與其曺屬並列于左云中書省右司題名記官署之有題名尚矣覽之者問其人可以知其政故記之者必本其職分之所宜為以寓夫規警之意而風厲焉烏古孫公其之為右司郎中也以題名未建命考諸故牘得其氏名歲月將刻石于廡下未及成而出持閩中部使者節尋復召入參議中書省事乃屬今右司諸公緒成之而俾溍為之記溍竊惟都司以彌綸省闥為職於事無所不預較之舊制則唐之三省尚書有左右丞管轄衆務而左司右司為之副宋之三省左右丞升為執政中書門下别設檢正之官而尚書之左司右司居其次逮至我朝政本一出于中書而丞轄檢舉之職悉歸于左右兩司其委注之專前所未有也而况右司所掌付受兵刑之政最號雄緊而百工之事尤為叢劇豈它有司限於官守而可指其職分之所宜為以寓夫規警乎雖然今之任是官者皆天下之選昔人所謂學為宰相者也後之人覩其氏名知所歆慕而奮發焉則其為風厲也大矣庸弗敢辭而謹記之上都御史臺殿中司題名記天子時巡上亰則宰執大臣下至百司庶府各以其職分官扈從國朝舊典也凡公署必立題名以志其去來之歲月御史臺殿中司之有題名始於至順三年率皆剡木為方板而書之至正八年今殿中侍御史野仙護都孛羅鐵木而慮其久或蠧敝乃命代以石大書而深刻焉且俾溍記其作始之自謹按漢御史大夫有兩丞其一曰中丞居殿中蘭臺外督部刺史內領侍御史受公卿奏事舉劾按章亦謂之中執法則居殿中者實右中丞之職魏以二御史居殿中察非法大朝㑹則簮白筆側陛而㘴乃殿中設侍御史之始也其後殊時異制㳂革靡常在唐則兼知庫藏出納宫門內事亰畿諸州諸衛兵禁而政務非一在宋則三院並得言事兼察事而官守不分逮我世祖皇帝至元五年肇建御史臺置殿中侍御史二貟而以殿中别為一司正名舉職紏察朝儀外廷稱慶則對立於龍墀之下而不與庶僚序列大駕行幸則畢從于豹尾之中而非若它官可以更休委任既專地位復密臣僚有所敷奏無不與聞而其命秩之崇品在苐四視唐宋以七品官為之重䡖之不侔從可知也自非勳賢貴胄秉清方直亮之節夙為衆所嚴憚莫冝當其選由是而致位卿相未始乏人誠欲使來者知所慕效而思繼其風烈則所托以昭示于永久者曷可缺歟蓋物莫夀于金石然自古及今名垂天壤與國家相為無窮者固不獨恃夫金石以為存也請以是為記可乎是歲乘輿以五月届灤陽八月回鑾十月甲子朔記八卷終
