body:
  text: 石臺紀逰詩序寧海多大山其髙或俯視雲雨名於仙經地志者天門閬風丹丘桐栢而南因號為福地好事者率病其幽逺險絶莫適至頋獨喜逰石臺石臺距縣治僅五里所山皆土阜非有竒巖峭峯水泉花藥竹箭之羙由山足縁坡陀蛇行穿灌莽而上至其脊乃得巨石五六相積壓如累器物其頂上隆然正方而平劣可坐十人旁睨四山屏嶂離列東北山缺䖏海霞島霧縹緲可睹也臺之勝止是特以卑近而易即凡觀逰者恒用為稱首予佐縣之又眀年始合耆俊之士登斯臺抉剔蔽翳求昔人之遺刻旣漫滅不可識唯慶元諸老題詠故在徘徊乆之望東麓杉松蒼翠甍桷隱隠或曰是謂南園道院乃欵而休焉因相與飲酒賦詩抵暮而去盖忘其爲山之卑地之近也孰使予樂焉而無志乎其髙且逺者非兹臺也耶然予聞古君子雖甚陋必有㳺息之物以養其觀聴而發其意慮卑髙近逺物之不齊者也夫苟無累乎物斯異方而同得也詩所以志兹逰之得序而歸之南園以爲石臺故事劉忠公奏議集序嗚呼君子小人之勝敗國家治亂安危繫焉誦其言而欲知其人尚論其世可也宋亡乆矣自熈寧而元祐而紹聖而建中靖國姑寘勿論故侍御史守戸部侍郎致仕贈中大夫劉忠公之事理宗其䖏君子小人勝敗之㡬者乎𥘉史嵩之以右相出督專務張皇邊事遥制朝廷暨入㩀相位引㧞私人布列要途持權自恣益甚言事者有及之輒斥去公為御史彈奏侍從两制而下九人葉賁以嵩之腹心居言路公不少貸賁左遷而公竟以是去國君子小人之勝敗未分也嵩之父憂起復三學士論沸騰而朝臣率皆瑟縮頋忌噤不敢言能言之者僅數人耳理宗亦患苦嵩之之專而未知所䖏念公素強直無所附麗可屬任以太常少卿召諌長劉晋之臺臣王瓚胡清獻龔基先皆嵩之所倚以為肘腋亟請寢公新命理宗覽其奏夜出御筆逐四人擢公左司諌未至改侍御史君子小人勝敗之㡬至是乃决也公旣引見速劾執政金淵從官鄭起潛濮斗南而下八人其言馬光祖奪情緫餉實嵩之預為引例之地尤中其姦扵是邪黨漸解而理宗猶豫不㫁公累章宻奏乞早命相言逾剴切理宗悟嵩之訖不復用此君子小人勝敗之兮也夫何國論甫定綱已舉而目未張天不憗遺遽使人懐殄瘁之痛嗚呼悲夫公始在庻僚應詔上書輪對進講随所開陳咸有𥙷益非徒掇拾細微苟備故事而巳前後凡再入臺皆不及兩月盡言無避蹇蹇匪躬其崇論谹議旣已載之國史所不勝書而見於家集者固不冝無傳也公殁迨今垂百年曽孫徳輝懼其遺編乆且墜軼探舊蔵得奏草及經筵所上輯語附以舘軄䇿揔二十有七篇以授溍使志諸篇末庸俟後之秉史筆者它詩文雜著則别集存焉或謂徐元杰以說書入侍語及嵩之事大契理宗之意晉之瓉等四人急攻元杰理宗悉黜之起復之命亦罷不行傳聞雖異辭實一事也公與元杰之死人皆以為嵩之所毒朝廷獨疑元杰無疾暴亡為興詔獄至公與元杰俱被䘏典則同一憫悼之辭殆有深意乎考之内翰程公許所撰墓銘旣稱公感末疾卒又以與元杰並言且反覆致意於天運人事而嘆世故之不可料其旨微矣疑以傳疑亦史家所當知也故併著之石峡書院詩序宋尚書侍讀淳安方公以文學行義師表一世家食之日户屨殆無所容公因闢里第為講舎治祠宇其中以春秋行釋奠禮賜號石峡書院更築室其西而家焉皇朝因其故額而設山長貟始領於有司今山長方晋明病其規制𥚹陿將斥而大之公曽孫銅陵縣尹道壡亟命徙所居室使益西以其地廣書院舊址族人亦相率割旁近地為助晋眀乃與直學汪汝懋度其位置令士人有籍于書院者合私錢以徴工僦傭遷故所有殿堂及它室屋去迫隘而就顯敞且白于郡府檄縣長吏涖其役起至正元年冬十月訖二年秋八月落成之日夏君溥為識其顛末于石呉君暾為登堂舉知行之說以發楎公名堂之義兩人今為其郷先逹耆俊之士咸樂與之更唱迭和以慶其成前後為詩近百篇㑹粹為一帙属溍序其首溍竊惟昔州縣未有學之時天下四書院而巳其後州縣旣皆立學而前賢講授之地與其所居所游亦莫不别建書院近世好事之家又多慕效創為之日増月益而學與書院参立扵州縣間亦巳盛矣所謂四書院者其一曰應天本睢陽戚氏舊居戚氏自正素先生以師道自任傳子及孫俱為名臣或嗣主其書院南豐曽公稱為能世其道徳者也石峡實公講授故䖏無異應天之在睢陽公擢倫魁後八十年道壡復奮身科級為今名流能脩其前人之業使弗墜而愈振視戚氏亦何以異固非好事之家慕效而創為之者可同日而語也形於頌聲豈溢羙哉溍之曽大父戸部府君幸與公同對大廷而溍又辱與道壡托斯文一日之雅雖鄙陋無能序作者之意其何敢辭庸述其梗槩以為之序方先生詩集序黍離麦秀其為音之哀以思一也黍離出於周之大夫而與文王清廟俱傳者雒鼎未遷風雖變猶有所繫也麦秀出於商之仁人義士而不與猗那長發並存者薄社已屋風不止扵變且莫知所繫也夫旣無所繫矣而其辭見於今卒不泯者豈非所謂民之性先王之澤歟然則先生之詩固君子所不廢也先生在勝國時未及仕而運去祚移抱其遺經隠于仙華山之陽窮深極宻殆與世隔乆之稍出㳺浙東西州遇遺民故老扵殘山剰水間徃徃握手歔欷低佪而不忍去縁情託物發為聲歌凡日用動息居㳺合散耳目之所屬靡不有以寓其意而物理之盈虚人事之通塞至扵得失廢興之迹皆可㮣見故其語多危苦激切不暇如它文人藻飾穠麗以為工也先生歿其音遂絶盖至是而百年之耆舊盡矣先生有友二人曰呉氏善父曰謝氏臯父素以風莭行誼相髙而皆前先生死先生二子樗梓懼時無知先生者不敢輒以遺藁示人栁君道傳方官于太常自以逰先生門最蚤圗其不朽者甚悉旣緘辭銘其墓且探其家蔵摘五七言古律詩三百八十篇釐為九卷属永嘉尹趙敬叔刻寘縣齋以溍幸甞及先生之門伻来俾為之序夫誦其詩而欲知其人必也尚論其世先生之盛年不得從周大夫之後晚乃扵商之仁人義士而有志焉不亦悲乎此溍所為掩卷太息而不巳也異時龔公聖予見先生於錢唐覽所賦詩識以二十二言曰由本論之在人倫不在人事䓁而上之在天地不在古今言先生之詩者無以易此矣溍復何云㢤先生方氏諱鳯字韶父婺浦江人年夀卒葬具如墓銘此不著見山集序始予聞餘姚人亟稱見山先生然莫得其所以稱也它日過歴山之陽乃識先生又得先生所爲詩嗚呼兹其所以爲先生歟先生葉氏𥘉名某宋咸淳甲戍禮部正奏名於是枋國者方務隔截後進筆墨豪縷之異抉擿無少貸先生竟不得奉大對罷遣而歸其眀年枋臣南遷又眀年而三宮北上矣先生旣倀倀然無所售其技重山宻林窮居而獨㳺餘四十年凡古今事㑹人物至於卉木魚蟲之細目觸而心接壹發扵詩故老徃徃置不忍讀後生之聞之澷不省爲何䓁語冝其莫知所以稱先生也大雅曰芃芃棫樸薪之槱之又曰勉勉我王綱紀四方夫薪槱山材也綱紀大業也而詩人始終致意焉一士之失得若無預乎廢興存亡古之人固不謂然也先生之詩旣不得升歌爲清廟欲爲薪之槱之之棫樸又不可得而爲空谷之白駒而遂爲黍離是果孰使之耶必有執其咎者雖然黍離之大夫當周之東猶有禄食而服事焉視先生所䖏抑異矣感深者難忘習乆者易變不亦人之常情㢤而先生之志未甞以淺深乆近爲異扵此見禮義之澤民之性情有不與物俱化者其格力之健語意之妍拙所未暇論也隆山牟先生文集序若昔宋東都盛時眉山蘇氏父子出而蜀之文章被于海内渡江後疆圉日蹙衣冠流散而蜀之文章萃于東南及其旣乆也百年之遺老相繼淪謝而陵陽牟氏父子遂巋然為蜀士之望以耆年宿徳擅文章之柄而雄視乎東南者大理公一人而巳隆山先生大理公之冡子能世其家業而不隕者也先生之大父大資清忠公為時名法從所交皆當代鴻碩先生無不趍其下風而接其餘論大理公旣與世相違優㳺事外先生居家庭之間父子自為師友日以經學道義相切磨母夫人鄧氏太史李公外孫女又從而有聞扵史學大理公歿學者有所不知必之先生而考質焉先生於前朝制度之損益故家文獻之源流歴歴如指諸掌寒門下士窺見一斑扵殘編㫁簡中者固不足以與此至扵白首窮經孳孳矻矻而忘其老閥閱貴㳺挟清才雅藝以馳騁扵英俊之域者亦未易企而及也凡先生所撰著言必有實而要其歸一本於理昔之善為品評者謂有山林之文有臺閣之文先生盖兼之矣内翰蜀郡虞公稱先生警敏過人志趣髙邁援引根㩀不見涯涘其文沛然若江河之决不極所至不止眞知言㢤嗚呼墜緒茫茫千鈞一髮剥果不食萌芽方新斯文之未喪豈但為蜀士之幸乎先生有子五人獨必逹必勝在必勝􅊞蔵遺藁懼歲逺或致放逸乃彚聚為若干卷而刻焉書来俾溍序于篇末惟大理公仕宋季與溍之曽大父朝請府君同為郎於吏部溍生也後猶及拜公牀下而辱贈以言際今承平復著取士之令異時科第中人物存者無㡬先生乃應聘出持江浙文衡而溍以非才沗與薦送故必勝以序為託溍之鄙陋衰朽安能知先生而發揮述作之旨耶姑次苐其梗槩云爾先生諱應龍字成甫其先由陵陽徙呉興先生辭亰官之世賞而以咸淳􅉝未取世科調光之定城縣尉仕未逹而國事巳非先生旣不有禄以貧強起為儒學官晚乃教授溧水州尋以建康上元縣主簿致其事先生之世系卒葬與其言行虞公巳為誌于幽堂此不具地鈐序呉越忠懿王時有大比丘曰徳韶為其國師能以山川岡壠形勢辨地之吉凶凡作圗以志浙東西州之冝為墓地者千有三百師旣示寂世罕傳其圗葬而偶直其䖏徴應率與圗合嗚呼何其神也師姓陳氏䖏州龍泉人得教外之傳扵清涼法眼時天台學㡬絶忠懿遣使十軰用五十種寳求得其書于髙句麗五時八教之旨晦而復眀實自師發之𥘉師至天台覩智者遺蹤如故居且適同俗姓或疑其後身云然僧史中莫有名其為良葬師者豈秘不䡖出人無得而稱耶抑其徒不欲以餘伎為師累而諱之也予聞古之為城邑室屋若治地而葬者必以卜直用龜而已緜之詩殷盤周誥孔子之語曽参可考也夫山川岡壠之形勢亦甚易見頋獨求之難知之鬼神者寧非地可以形盡而鬼神之為變不窮也㢤後世隂陽家務騁其精鑒絶識始不復受命於鬼神至師之為圗苟粗知方位者皆可按而求之舉有盡之形周無窮之變雖聖人莫成其能矣客有視予以其圗者請序而傳之嗚呼師非藉圗以傳圗固不冝無傳也予旣惜師之自祕其徒又諱不道是用弗譲而題辭篇端焉雲門集後序越之山水雲門最勝淛河之東大抵皆以山水為州非它無勝䖏也姑以越中言之禹穴秦望天姥四眀五洩東山蘭亭鏡湖剡谿或幽阻峻極人跡所不通或㩀舟車徃来之㑹好事者不過以一覽爲足或宻邇於城闉畸人静者不屑自混其中惟雲門之去人境近而不迫逺而不迂髙僧上士多擇其勝地以爲窟宅名公才彦無不喜與之㳺而爲之紀述賦詠亦有未始至其䖏而寓歆羡之意於文字間者焉予觀栁子厚記永之黄谿栁之西山皆清邃竒麗勝䖏前乎子厚未有能啓其秘後乎子厚莫有嗣其賞音寧不以荒遐僻陋去人境之逺乎子厚又於西山錮鉧潭小丘歎其乆爲棄地且謂使致之澧鎬鄠杜則貴㳺之士争欲得之夫澧鎬鄠杜在當時爲神州赤縣第宅之聮屬冠盖之追随相望不絶登臨獻酬之樂形於篇什者徃徃流傳至今誠非窮郷下土所有杜牧之家扵樊川擅澧鎬鄠杜之勝而終南山僧乃不識其姓名則以紛華侈靡去人境太近㳺方之外者莫肯頋留而日與之狎也有其勝而無二者之病其惟雲門乎盖地必以人而重人必以文而顯雲門緇流道價之穹足以重其地者固多納交於賢士大夫而有文可見者雅音逓發鴻藻交映亦未易一二遽數地以人重人以文顯而其文又必頼後之人以傳上人允若所以汲汲焉致力扵此也凡其所裒輯上下千餘年得詩文緫若干篇號曰雲門集將使予為之序而刻之山中予不敢輒以蕪斐之詞寘諸羣言之首惟聖人之􅐌易序卦䖏末庸竊取斯義作後序以系乎左方資正備覽序至正九年冬詔以中政院使榮禄大夫札刺尓公為資正院使涖事伊始首詢官府之㳂革及所揔政務之本末次第前徽政院紀源之書部帙汗漫而序述弗詳披閱再四莫得其要領盖設官之始在東宫則曰詹事院在東朝則曰徽政院互為廢置間甞改建儲慶使司及儲政院而詹事徽政之所掌悉隷焉今天子始錫名資正院以奉中宫由其更易靡常新舊交承文案填委舛錯隠漏猝難窮竟故扵戶口之登耗財計之盈虧人材之升黜工役之作輟皆無從周知公以為古之君子居其官則思其職苟非有舊典之可稽則雖欲舉其職不可得也乃謀扵院官令架閣庫出所蔵故牘俾經歴司官與提控掾史䓁精加考覈㑹稡成書院官後至者咸樂賛其成凡本院曁所統諸司官屬之貟數品級係籍人户撥賜土田方物貢輸歲賦徴納銓選格法營造規程彪兮昈列細大弗遺釐為三卷號曰資正僃覽挈其大綱而萬目畢随舉而措之斯易易耳以溍承乏隷太史氏俾執筆題辭于篇端昔漢文帝問周勃陳平天下一歲决獄㡬何錢糓出入㡬何勃皆謝不知平對曰有主者問决獄責廷尉問錢糓責治粟内史帝曰君所主何事平舉宰相之職以對帝稱善夫周勃陳平均有所不知而平知責之主者故勃自以為不如矧今資正領以專使皇上為官擇人非執政侍從近臣莫克當其選倚注之重豈羣有司比乎公乃不敢諉扵主者而一以身親之他日入侍燕間上承清問必能枚舉以對雖使陳平復生必自以為不如也抑是書之作不特蒐羅故實以俻闕文且將貽于方来為不刋之典其用意深且逺矣来者尚無忽諸科名緫録序登科有記尚矣而郷貢之士未有記之者昔未始有而今記之以昔之所取者衆不易殫舉今之所取者寡可以遽數也取之衆則其求也廣取之寡則其擇也精扵至廣之中而得其至精者焉則今之上于春官者皆昔之冝登于天府者也况夫或被特㤙而躋顯仕為時聞人或由辟舉而能以材自奮可使其氏名無所考見歟鄱陽徐勉之當塲屋之𥘉廢褎然偕計吏来亰師所謂豋科記已不可復續乃㑹稡國朝凡預鄊薦者之氏名合若干人次苐成編號曰緫録盖以為士之歌鹿鳴而来亦一時之榮遇非謂祖宗菁莪豐芭之澤為止扵是而已也上方宵旰渇士赫然下眀詔㒺羅四方之遺逸豈不以向之待士也使之拘而不得肆卓詭魁傑之彦有未盡在吾彀中者乎廣求而精擇焉不有得於此必有得於彼矣昔㤗山孫眀復眉山蘇眀允皆甞試有司不合而以布衣召拜官伊川先生亦以廷試報聞後乃應聘而起詎知今不有其人耶是固不待勉之以傳而勉之此編則不冝無傳也乃弗譲而序焉東郡志序南山宋公以侍御史致政居滑州滑領二縣而治白馬白馬故東郡地也公暇日閱前史及它傳記得東郡事參以舊聞作東郡志十有六卷屬溍序之溍竊惟昔之言地理者有圗有志圗以知山川形勢地之所生而志以知語言土俗博古乆逺之事是以成周之制職方氏掌天下之圗而道地圗以詔王者有土訓之官焉小史掌邦國之志外史掌四方之志而道方志以詔王者有誦訓之官焉凡皆逹扵朝廷而關於政令不特以資學士大夫之汎覽而已後世列郡或有志無圗或以圗合于志而未甞領扵王官有司率謂非吏議所急漫不加省幸其士之有文學而好事者奮然欲以述作為巳任而偏州下邑僻陋之境無故家大老文獻之足徴其書雖粗具而莫能詳覈甚者遂缺而弗具儒臣史家卒有所詢訪徃徃無以應遺文軼事不得附見簡牘之未者多矣况其大者乎滑固名州公又以耆哲為是州之望文獻有足徴者冝其為書纂輯也俻考据也精所記人才消長風俗盛衰上可以眀教化之得失而禆益乎治道古今文華事實㳂革之故下可以俟采録而垂之無窮豈託於空言以為著述者可同日而語㦲溍是用序其大略如此使覽者知是書非獨為一州之榮觀也周易集說序周易集說四十卷纂圖二卷古占法一卷林屋山人俞氏述其為說大抵祖程邵而宗朱古今諸儒之言之善有所弗遺也而其巳意亦以附見焉其是非取舎不合於聖人者寡矣盖古者三易皆掌於大卜四學之教詩書禮樂而已孔子晚乃好易其與七十子之徒難疑荅問固未有以易為言者易在秦猶為卜筮之書漢興言易自田何始何之傳為施孟梁丘其别出為焦贛為費直贛專扵隂陽占察之術而直惟以彖象文言䓁十篇解上下經至唐貞觀中又㫁然俾學者以王韓為師費氏藉以僅存焦氏又廢矣談者率以為理學近扵費數學近扵焦而不知河南兩先生之精誼獨得有非漢儒所及知者未可寘同異扵其間也考亭夫子合兩先生之學以為書七十子之徒所未聞於孔子者三尺之童咸得誦而稱之嗚呼盡之矣今傳其書僅百年述作之士不阿以為同則矯以為異其所望扵来哲者果若是耶竊甞聞之善立言者不必出扵古不必不出於古也非有異焉則其書可無作也非有同焉則其書亦不能以獨傳也惟夫同不為阿異不為矯斯言之善者也俞氏其有焉是用為之序以著其是非取舎之不謬扵聖人者由其學之源委如此讀之者所冝知也字鍳序古之小學有六藝焉學之者必自數而書而樂而射御而禮其為法至詳且宻其為事又皆有次苐而無敢以捷疾取朝夕之效士生其時自㓜至于成人非是六物者不以役扵四體接扵心思磨礲長養之有其素故其進而博之以大學之教咸有以成其材而就其實詩所謂成人有徳小子有造者也小學之廢已乆近世大儒始来古經傳輯以為書學者誦其言徒知有六藝之目而未甞身習其事其習焉而不廢者書而巳而又昩形聲事意轉借之辨迷文字子母音聲之原然則雖書亦廢矣聖賢之託於簡䇿以傳者魯魚亥豕其存㡬何後生小子方且玩思空言髙談性命而以為資身譁世之具切近之意微誇傲之氣勝此士之所以成材就實如古者少也呉郡李生文仲年未弱冠本說文作字鑑若干篇誠有志扵小學者豈不猶行古之道哉雖然此小學也以生之有志於古又能弗失其為學之次第如此則夫從事於大人之學以成就其材實者無患乎不古若也子夏曰君子之道孰先傳焉孰後倦焉予於生則有望矣庸識諸篇端以為之序云法書類要序君子之學必始於六藝書其一也古之人於鑠金疑土弓車皮玉畫繢之事雖藝成而下莫不有法而書之法無述焉盖其於書三歲而一同之考其文而已偏正工拙有不足論也厥今學士大夫生乎書同文之時㳺心藝事者得以暇日審其偏正而辨其工拙盍可無以著其法哉是冝得之者不食而大呌見之者搥胸而嘔血夫何臨學之家率随人以作計徇於今之厚而徴於古之略也予年十七八時甞得所謂書苑菁華者窮晝夜而觀之因取其所不録而雜出扵史氏百家之言者次苐以為臨池拾遺記然以所見未博無能𥙷其闕軼之一二焉後三十年乃獲觀錢唐呉君所輯法書類要其多至於二十又五卷書之為法備矣盡矣惜夫歲月之慆邁而予之不能從事扵此也君不鄙屬予以序予聞之孟子盖曰大匠誨人必以規矩學者亦必以規矩然而又曰梓匠輪輿能與人規矩不能使人巧士君子之㳺於藝與百工之事異乎知乎此則思過半矣敢援以為序庸俟覽者詳焉送東川書院陳山長序古之釋奠于先師者必本其學之所自出而各自祭之非其師弗學也非其學弗祭也今之言師友者孰不知求儒先之書而為其說讀若漢嚴子陵諸葛孔眀晉王逸少陶元亮唐陸敬輿白樂天諸人言談不及於性命其遺文之厪存者非世所用以說讀也或者猶相率尊師焉而尸祝之不廢得不以其髙風盛烈使夫人觀感而興起有非說讀之所及歟予友陳君以選為東川學者師而元亮東川之先師也元亮於書未甞務為甚觧而其死生去就之際浩然無所滯礙不亦知道之君子哉二三子之從君登斯堂也不知學元亮者祭非其學也舎元亮而他學焉者學非其師也而所謂五栁先生傳桃花源記歸去来兮辭等篇固不可以說讀為也盖予聞之古有憲老而無乞言憲者儀刑其徳而已問而荅焉其次也有講焉有聴焉又其次也講而未必聴焉則末如之何矣君誠能令二三子知所觀感興起而以古人自任以千載自期一洗尋常說讀之陋斯善學元亮者也詩曰髙山仰止景行行止豈惟學元亮者為然乎庸因君之行書其所與君語者以附贈言之末云爾送髙節書院劉山長序尚論两漢之士必曰經術名節自公孫弘至張禹孔光之流皆以經術致位宰相而持禄保位未能免阿䛕之譏不有名節孰矯其失所謂名莭則嚴子陵實倡之迄今千三百年其故所居及甞釣逰䖏猶為之立祠即其旁置書院而奉之以釋奠于先師之禮焉其有功名教賢於章句儒逺矣盖古之先師詩有毛公書有伏生禮有髙堂生樂有制氏𥘉不以其賢而尊事之行其學則祭其人示有所本云爾唐制孔子廟由顔子而下爲先師者二十二人有毛公伏生髙堂生而無制氏詩書禮存而樂亡也孔門髙弟惟顔子子夏並爲先師子夏詩有序易有傳固學者所共宗顔子非有遺書可傳而以賢有徳克配于先聖其後復列子夏于十哲而獨推顔子爲先師者詎不曰講習其言未若儀刑其徳乎今之道學一出於濂洛乾淳三數大儒此學者之先師也夫旣立其書于學官而躋之從祀矣其爲書院者又取前史所載髙人逸士若子陵者以爲先師子陵矯前人之失不過荅侯覇之兩語它論議風指則皆寂寥無聞世特以其人之賢而尊事之如此爾夫道一而已發於文則爲經術脩於行則爲名莭豈若九流百家人自爲學莫適相通乎建陽劉生仲寳以選署餘姚之髙莭書院山長餘姚子陵故所居也予聞仲寳之先少師文蕳公受業考亭讀論語至子欲無言喟然而嘆謂言語非所以為學由是一意務為躬行實踐其出䖏之際與子陵雖殊而脩名姱莭視子陵可無媿仲寳家庭之傳必有異乎區區以呻吟佔畢為事者矣諸生在列仲寳進則風厲之以儀刑夫前哲退則以家學私淑之使羣居而講習焉不亦可乎仲寳之行也同志之士臨别贈言凡若干篇亰兆杜君伯原甫實序之及来錢唐復求予為後序杜君隠居武夷山中聘使在門而不為起庻㡬善學子陵者仲寳試以予言質之何如送宣公書院陳山長序古者學必有師歿則祭焉近世以吏為師者類喜讀唐陸宣公論諌諸篇而莫有敢上援公為先師者獨其郷之士以公為國故而禮祠之盖知法者恒患乎少文聞公精於吏事而其文聚古今之精英謂可資以為縁飾故愛而慕之耳至於公之譏陳時病本於仁義可為後世法者非儒家者流不能知也夫旣為之立祠又即其旁治講舎置師弟子貟而士之㳺扵斯息扵斯非性命不談方相與割裂傳䟽之微辭碎義以求合有司之繩尺未聞有能紬繹公之緒言者學於其祭之所不及而祭於其學之所不傳何其交相戾若是歟公避謗不著書世所傳奏草奏議者合十二卷雖非可誦習以為顓門名家之學然今之由儒入吏者肩相摩𬒮相屬苟以公之言推而措諸行事將見如公之上不負天子下不負所學則今之為吏非昔之為吏者矣它日旣仕而歸休扵其郷從見大夫修春秋之事扵公之祠下尚何媿乎錢唐陳君以選為之師而予忝以非才與聞學政故於君之行以是為君告尚與諸生懋眀之送曺順甫序曺君順甫與予居同郡且同舉教官予訖不調而順甫用累考序遷為温學正其行也㑹予以督運吏書滿歸自海壖順甫謂予幸以一言識其别於是距予與順甫同舉時二十又三年矣劣弱無似不能使其學與曰俱進詎有以増益順甫之所未至哉然甞從郷先生聞乾淳師友之盛未始不歎其人物之聚學術之散也盖婺之學陳氏先事功唐氏尚經制吕氏善性理三家者唯吕氏為得其宗而獨傳至於人自為書角立兢起吕氏終莫能挈而合之也其在温則王道甫之慷慨名義甞合扵陳氏矣而其言無傳焉陳君舉本薛士隆上下古今而和齊斟酌之以綜世變為說下皆與唐氏合其厪存者亦莫之傳也葉正則推鄭景望周恭叔以逹於程氏若與㠯氏同所自出至其根祗六經折衷諸子剖析秦漢訖于五季凡所論述無一合於吕氏其傳之乆且不廢者直文而巳學罔弗與焉三代之聖人逺矣扵大道墮裂之餘而能必尊其所聞必行其所知豈非卓然獨立而不懼者乎是未可以專私蔽錮為其詬病也冡鉅淪没晚後無所依風承響接苐以世之所共傳為信遂使散者不可復合不傳者曰就泯墜安知紛然不同之中有混然大同者在耶夫考師友源流之自務合乎聖人之本統以壹諸生之道徳學校重事也故予敢以為順甫告是雖非有以増益順甫之所未至其望於順甫則厚矣它日順甫歸休而與予㳺於郷校尚挹其緒論以袪所惑焉送王照磨詩序頃歲有司以浙東西鹽筴法乆而弊議更用官糶之法如淮南法制下其事行中書擇可任倉氏之出納者得濟南王君以涖于四眀盖君甞掾六察以為非君莫冝當其選也居亡何中臺復奏署君海南憲府掌故豈以為向之瑣瑣者未足盡其才耶嶺海去天萬里民生之休戚吏治之得失誠有大於出納之事者矣國家宵旰求忠賢智能之助用興太平侍從近臣為君知巳非直如狗監之知子虚而已君之陟清華陪禁宻固可旦夕待天下事不又有大於嶺海間者乎未知一掌故果足以盡君之才否也抑予聞之古之仕者行其志逹其道焉斯已爾成康盛時皮角筋骨之歛傎賄人民牛馬兵器珎異之市皆掌以再命之士陳肆辨物量度成賈四命之大夫實長而司之為法至詳且宻為事至煩且勞而莫有以不得其志為憾焉者故其詩曰藹藹王多吉士維君子使媚于天子又曰藹藹王多吉人維君子命媚于庻人不然則汲都尉之耻縣令而薄郡守蕭太傅之雅意本朝其扵道之窮逹何如哉予幸以督運吏託官聮於君觀君之敏而𥙿周而通使有以竭其才必不苟動其志枉其道也是故於君之去不敢遽以世俗相華耀者為䛕說而獨識其屬望之私於羣公篇什之端焉聮珠續集序鄞故多官族而傳世之乆者稱蔣氏蔣氏之起家在太平興國初至寳元康定中家始大有累官金𬗋光禄大夫者其子當元符崇寧間咸起進士至大官世禄所逮且三葉最後有起進士為嘉熈言官者至刑部尚書最貴顯尚書之猶子亦起進士為將作監主簿有名咸淳時此蒋氏世次之可見者也溍生也後弗及覩夫衣冠之盛過其家而訪焉則髙文大册散落已乆所可徴者獨其詩而已竊惟古者載籍所記大辭令大褒貶存於書春秋而其流風遺俗形於詠歌謡誦之間纎悉委曲見於詰為最備善謔窹言馳驅洒掃葵棗瓜壷苴荼之食為事至微為物至細聖人以之列于三百五篇之中與文王清廟之什並傳而不廢者厥旨微矣而况宋三百年蔣氏實與之相終始誦其詩而尚論其世流風遺俗猶足以槩見豈可忽哉凡其為詩㫁自開禧以前有三徑聮珠集宣獻樓公旣為之序將作主簿君之子昭先復纂次其續集俾溍序之昭先今方以儒入官引而勿替蔣氏之世澤未艾也後復有續是集者秉筆之士尚不一書金華黄先生文集卷苐十六
