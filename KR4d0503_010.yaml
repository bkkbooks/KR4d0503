body:
  text: 新城縣學大成殿記新城縣有學昉于唐中宗時其禮殿則後四百八十年宋乾道間縣令耿君秉所建也繼耿君者劉君景修謝君夢生張君德逵皆嘗繕葺之逮國朝大德七年又一百三十年矣縣尹魏君榮欲謀改作而力有弗給僅克營其齊廬門廡而止仍紀至元之六年今逹魯花赤來蒞縣事下車之𥘉展謁于先聖視其棟宇摧敝支拄架漏垂將覆壓大懼無以庇爼豆毅然以興造為巳責遂綴俸資用為衆倡官僚佐吏咸樂相其役有力而好事之家佽助恐後於是撤故禮殿而新之斥大舊規加其廣者四尋增其崇者一仞礱斫藻繪悉中法式儀象有嚴器服畢具以至正元年夏五月始事秋八月訖功其月上丁釋奠于新廟諸生駿奔執事惟謹邑里秀民嚮慕就列靡不觀感興起而相與詠歌賢侯之德非直土木之壯麗足為夸美也竊惟古者有學而無廟故孔子之廟終漢世不出闕里至唐而州縣學皆得廟祭孔子為先聖其後學之廢興不常而廟以通祀著於令莫之有改宋𥘉州縣未有學而新城在唐已先有學歷五季而獨完者學依乎廟而存也矧今承平寖久治教休眀廟學之制於斯大備有土有人者能汲汲致其力焉可謂知化民成俗之本也巳是役也教諭芮耆孫實身任之而俾士人馬章總其役費之出納㑹有詔遵舊典用科目收天下士章充賦而來首取鄉薦為言詩者第一耆孫既馳書來謁記且謂章之策名有司乃賢侯作興之效冝牽聮得書嗚呼孔子之道推而極之至于位天地育萬物皆士之分也文運初復禮殿聿新仰瞻睟容如親薰炙勿忘其所已能而益勉其所未至庶幾不負賢侯風厲作成之意矣同志之士尚無忽諸逹魯花赤唐兀氏名天祐泰定元年進士也德清縣學祭器記德清縣學新作祭器成主簿潘君以書來曰縣有學學有廟尚矣前教諭蔣釣所置祭器僅四十有九吾縣尹蘇侯之始至也首以興學為務勒褒封之辭以昭國典飾嚴奉之具以崇廟貌增廣生貟而訓迪勸勵之尋用今教諭胡宗海之請按舊圗𥙷造祭器之未備者百三十有九樽爵簠簋豆登􅎆勺槃玷之屬如式告完費錢以緡計者千七百五十皆冨而好禮之家慕嚮而恱助之者也蓋侯之撫民有恩馭吏有法而濟之以無倦今逹魯花赤與侯下車同日克䔍於寅恭之義併志一慮俾伸其所欲為㒒居其間雖無能為役亦左右交贊之故未及朞月而庭無滯訟姦豪屏息官府事益以蕳餘力所逮自社稷壇三皇廟至於公署賔館亭臺庫廄以次畢新凡侯之所設施可稱道者非一而莫重於禮器之大備願舉其所重為之記它善狀得以附見焉豫惟古之釋奠為禮也略為器也容不必備今既廟事孔子在著令為中祀牲幣物器咸有定制其禮自朝廷逹于四方而偏州下邑迫於米鹽細故曰不暇給春秋之薦幸不廢而巳蘇侯獨識其若緩實急而不苟于因陋就寡考儀文之缺而于器數之末有所不遺能盡其職分之當為而敬其事如此餘可知也庸弗辭而記之逹魯花赤名孛蘭奚河西右族蘇侯名靖世居濮之臨清潘君名子陽豫同郡金華人也祭器之目及助錢者之氏名悉列于石隂云海鹽州新作大成樂記古之釋奠折爼升觴而巳其為禮也略故其用樂之始莫得而詳記曰凡釋奠者必有合也說者或以合為合樂然則釋奠之有樂其出於古歟若其音莭器數則自漢儒未嘗言之前史所載元嘉之六佾特施於太學開元之宫懸僅設于兩亰政和造雅樂名大晟始頒行于天下而紹興著令郡邑釋奠其樂三成蓋至是而州縣學有事于先聖先師無不用樂者矣國家有因有革存其聲音物器之舊而變其稱號以新一代之觀聽今所謂大成樂是也海鹽昔為縣時既立學而廟祀孔子逮版圗入職方朝廷以其地大人夥易縣為州而廟學之制猶循其故禮具而樂缺有司以吏議所不責久置弗講至正元年夏四月陳侯某來知是州首務興舉學政問其籍則為士者百家為田者萬畒問其春秋之事則有牲幣而無樂侯為之惕然與寮佐延諸儒共圗之僉言儀真有周君者善樂事老而不仕寓迹于雲間欲正雅樂非君不可侯即俾持書幣迎致焉君曰樂以導和不和不足為樂㒒觀江淮間所用樂雜出於伶人賤工之手器不中法音不中律左右髙下參差混淆惡足以致和哉苟徒捐厚費而飾虛文㒒弗為也侯曰作樂以和神惟君言是聽君乃為考其數度齊量範金為鐘而協以古律管彼此適均吹其律而鐘自應至於琴瑟亦悉自製惟笙磬之屬擇善工使受指畫而為之集諸生三十有二人教之肄習而以眀年春二月上丁合奏焉在列者無不欣豫於是教授陳某以狀來屬豫書於麗牲之石用垂永久蓋古之設教莫重于樂非止用于釋奠也侯之於樂不但欲辨其鏗鏘又必求通其義者相與討論之可不謂知所本乎諸君子從侯修其時事周旋升降於堂序之間必有聞其樂知其德而鼓舞于鳶魚飛躍之下者矣是舉也有功于教道甚大非徒備其闕典而巳可無書乎浦江縣三皇廟記醫有學三皇有廟尚矣合廟學為一而俾醫師領其祠事有司以春秋之季發公帑具祭料而折爼升觴焉今制也蓋三墳之書世莫得見可見者非必其本書百家所録又多怪迂鄙野而爽於用能推其所承傳而措諸民生日用之間惟言醫者為然耳三聖人開物成務之功有託以弗泯其在兹乎凡立學必釋奠于先聖先師禮也仲尼祖述堯舜憲章文武而其徒無敢推唐虞成周之君以為先聖醫家者流乃得上援羲農黃帝氏而尸祝之希世之盛典歟國家仁育庶類將悉躋之夀域垂意於醫事至重而不䡖崇廟祀以表章其學著在令式而偏州下邑或不能奉以從事非知為政之緩急者莫肯盡心焉浦江自版圗歸職方踰四十載逮至治𥘉始克有廟于邑署之西南不久輒壞天曆間嘗繕完之而猶未有學也今逹魯花赤八時思溥化以廷對第二人由中祕外𥙷再轉而長是邑既興學宮以嘉惠章甫逢掖之士尋又以為今之建學立師醫與儒等爾隆于彼而嗇於此非所以欽承天子之命教也乃捐俸資倡衆而改作焉中為殿堂具嚴像設兩廡旁列四墉外周前植櫺星門而齊宿之次論說之所無不畢備經始於至順三年之某月落成於眀年之某月書來屬溍記之溍竊惟三聖人之法被于萬世其大庇乎斯人者若天覆而地載不可以一事名言也百藥齊和湯火針石之施與易大傳所稱網罟耒耜衣裳舟楫􅍫杵弧矢棟宇棺槨均之為一事爾其不可名言者孰得窺測而擬諸形容哉乃若賢侯之敬恭秩祀道宣靈休不宜無以告來者庸弗辭而為之記餘見于舊刻者兹不重出焉海寧州三皇廟祭田記延祐五年知鹽官州張侯克明以部使者北臯張公之命肇建三皇廟于州署之東南州故為縣時橫浦張公五世孫宣嘗主縣簿因諉以督其役明年殿成而侯以秩滿去泰定元年方侯存心繼知是州乃克施采章以嚴像設尋增創東西廡及儀門後改號其州曰海寧而李侯憼以至元某年來知州事又為圗從祀造禮器遷櫺星門前臨通衢右廟而左學齊廬庖舍次苐畢完今知州張侯光祖涖事之又眀年至正二年也以政理之暇周視其所缺自兩廡三門屬于通衢悉加以陶甓疏水為池而環以石隄藻飾華好內外聿新士民靡不瞻仰歎息顧獨未有田以供粢盛酒醴取具臨時幾于苟蕳侯謂是非所以崇典祀其年春三月蕆事而退爰集僚佐共輟俸資以為衆倡俾醫學正胡某隂陽學録許某率其籍于醫者三十家籍於隂陽者三百家合錢若干緡購民田若干畒有畸載以兩青冊留其一于州而以其一併劵書藏于學即廟置倉儲歲入以給祀事有餘則以待營葺之須不得輒移為它用凡出納必白于長官之主領學事者侯欲使後人守其要束永久而弗廢來徴文以記之謹按宋元嘉中醫始有學唐天寶間三皇始有廟學不附於廟而廟不出於亰師醫針按摩呪禁之師生並隸於太常而享先代帝王之儀制名數專掌於禮部歷五季逮宋莫之有改也我朝言醫及隂陽者乃原其所自推三皇以為先聖天下郡邑咸得通祀焉蓋振古未及行之曠典乃今而舉之土木之役固不止一人一日之力至於有田以祭而廟學之事斯為大備侯之垂意於此則已勤矣若夫三聖人之道既非一藝可以名言而其功亦無一物可以為報稱兹不敢復贊以一辭也姑叙其建置之始末及其成規而為之記用告于嗣為政者焉杭州路儒學興造記杭於宋為行都士之所聚為亰學凡著籍其間得以類申補太學諸生人以比古之外雍四方之士咸附集焉以厭於太學故其規制𥚹迫􅋻陋顧出它州郡下擔登負笈而至者殆無所容德祐納土杭為外藩聖化所暨無間逺邇士風之盛不减異時廟學悉㳂其舊久未有所改作禮殿之東有論堂宋理宗書飬源堂三大字故在左右前後環以十齊曰進德曰興能曰登俊曰持正曰賔賢曰崇禮曰致道曰尚志曰養心曰率性每齊前列屋為間者五而後為爐亭題扁則文丞相天祥陳參政文龍諸名公書之堂之北為髙閣以藏書榜其顔曰尊經者國朝行中書省平章政事髙公興所書也大德七年王教授去疾始撤尚志一齊以廣殿基至大四年倪教授淵遂撤養心率性兩齊以營學官𪠘舍至治元年進德興能兩齊燬於災總管忽都魯沙又即其地構㕔事僅存而可居者五齊率皆局於地勢前阻逵路後逼㕓居雖欲充拓使就顯敞而遺囂煩不可得也至正二年夏細人之家不戒于火飛燎及殿擔而止持正賔賢崇禮致道四齊與廟垣外比屋而居者數十家盡燬弗存執事者請割學西隙地益以錢若干緡易其廢址改建論堂四年夏儒學提舉班公惟志方俾之度木蕳材而李君祁來為副提舉亟命學正録直學等揆日庀工適當總管趙公璉下車伊始教授謝君池亦至趙公既鋭然以學校為己任謝君亦克併志一慮而趍事赴功乃徙閣於四齊之故位且為屋掖其兩旁而以堂之故位作新堂及前軒設大小學齊東西對峙輦石刻置閣之北數百步而為亭以覆之殿廬門廡官㕔吏舍及故所有登俊一齊下至庖廩之屬仆者起之缺者完之丹采之剝蝕者飾治之屋之因舊繕葺更新創造以間計者總若干甓堂涂自門屬于閣二百餘尺土木匠傭之費為錢若干緡為米若干石悉出于瞻學經用之餘未嘗以匱官勤民為士者亦無所與始作於六年冬十一月訖役於七年夏四月謝君狀其實馳書亰師屬溍記之夫政事由人而廢興制度隨時而損益必人與時㑹乃可以舍舊而圗新今天子嚮用儒雅嘉惠斯文羣臣承宣德意如恐弗及經之營之室苟美矣息焉遊焉士何事乎誠能充類致思而知吾之所居廣居所位正位所行大道非人之所能廢興非時之所能損益必有感厲奮發求至於聖賢之域而升其堂入其室者則賢師帥振起作新之功不止若今所記而巳溍既序其工役之概併志所望于其士者如此云趙公至治􅉝酉龍飛進士今為禮部尚書班公前集賢待制李君至順癸酉廷試第二人謝君宋丞相太師魯王五世孫也鄉學記霸之益津人宫君琪即其西鄉所居作學舍合諸㽵子弟俾肄業其中且為廟像先聖先賢以春秋旦望奠謁如學官法念不可無以示永久爰狀其事走亰師請奎章閣侍書學士內翰虞公為之記公方有大論撰未暇如君琪請乃以狀授溍俾執筆而書之溍惟古之施教導民有本有原必由鄉以逹于國是以六鄉之吏去民愈近者為教愈詳一歲之中州長之屬民讀法者四黨正七族師十有四而閭胥則無時焉若夫二十五家之閭則又有門孰以仕焉而巳者為之左右師雖閭胥弗親也故上之教不煩而民之為士者恆足賴故其詩曰攸介攸止蒸我髦士人生其時獨何幸歟今郡邑用著令既咸得立學承宣德意而崇厲之厥有師帥而鄉閭之教希闊弗講雖有朴茂之質何以培其根而逹其支也哉君琪不自耀其材以取顯仕而主昌平之候館固非有長民者之責乃能汲汲焉圗所以私㳤其人如此可謂有志于古矣昔者魯修泮宫而春秋不書說者類曰此有國之常事爾君琪之為蓋禮之以義起而出於常事之外者也可無書乎凡廟學總為屋若干楹費錢若干緡經始于至順二年春二月而落成於秋八月翰林直學士趙公子昌與君琪居相望實有以相之其來請記則冬十有二月也文學書院田記昔州縣未有學儒先㦯擇勝地建精舍以講授為政者輒就而褒美之號曰書院宋初天下四書院而已然惟白鹿睢陽之有田僅見於傳記皆上之人以是而厚其養未有以一鄉之善士專任其事者其後命州縣咸立學而學校之官遍于天下書院之創置亦日增多我朝尊右儒術以風厲乎海內聞者莫不知勸有力而好事之家往往構廣厦以崇祀事輟良田以豐廩食其為書院者遂與州縣學委立而布滿於四方既奉濓洛乾淳二三大儒以為先賢而於前代名臣山林髙蹈之士有所弗遺凡尸而祝之者非其仕國則其鄉邑也孔子之門從遊三千速肖七十獨子遊為吳人今常熟州實其所居里南州之先賢孰有加于子遊者乎寥寥千載莫有能表顯之者州故為縣時孫公應時知縣事嘗為位於學官講舍之西偏率學士大夫及其子弟行釋菜禮而未克為專祠後百五十年為今至順二年州人曹君始出私錢買地作祠宇而闢論堂於其後列齊廬于其旁有司因為請于中書設師弟子貟而揭以新額曰文學書院曹君既贍以田一千六百畝有竒恐旱乾水溢之不虞益卑以田二千六百畒有竒其田有苗稅而無力役春秋之事得不匱乏為士者亦有所蒙賴而得以藏修遊息于其間爰狀其實屬溍記之溍竊觀孫公舉曠古之缺典意甚美而為事蕳略特以先師朱子之記而見稱於人曹君乃能不愛其所有而汲汲焉致力于孫公之所不及固巳不易以一鄉之善士而專任樂育人材之責亦古所無顧欲以溍之蒙陋嗣為之記而自附於朱子之末安敢犯是不韙哉惟朱子之文天下學者莫不家傳人誦之况為其州之士而羣居於此豈無聞其緒言而興起者誠能相與勉焉朝益暮習而無苟利乎為養之厚必有異乎今世之所謂文學而不為昔人之所謂賤儒此則朱子之所望于來者溍無庸以勦說為也傅氏義田記烏傷之北鄙有義門者里人傅氏之居也傅氏之長曰某過豫而言曰家故有田四百畝合族而食五世矣以羣從子姓之蕃衍也歲率用八畝之入食一人而籍其餘可當十人之食以給賔祭百須之費吾懼夫久且弗繼而無以善其後也吾竭吾私焉耳矣蓋得田凡若干畝别儲其入為子本而權其竒贏俟它日更購田以附益焉是不可無告來裔使成吾志以惟子也請嗟乎義之名孰從生乎親親仁也因時制冝義也禮之所由起也蓋豫聞之古之制禮者為之井田以同其利為之比閭族黨以均其安夫然後教以有急相賙有喜相慶死喪相恤疾病相養猶患其未足以勸親親也於是乎有宗法焉而非㑹居聚食之謂也服窮于緦而同姓殺于袒免是以祖遷於上聖人莫䏻存也宗易于下聖人莫能止也戚也而日以疏勢也繫之以姓而弗别綴之以食而弗殊則是疏可使戚也其所因者本也循其勢故教易行逹其本故道可久聖人惡有術以強合之哉大雅曰飲之食之君之宗之王者之大政也田制壞宗道廢仁人孝子不得由乎先王之禮之盛而各以意行之假區區生養之具以收聖人之所不能合夫亦有取其義云爾也充其義而仁不可勝用也記曰一家仁一國興仁一家讓一國興讓在乎勿替引之而巳書而歸之俾刻諸石豈非其所望以扶吾義於百世而弗墜者耶旌異之實存乎舊記條約之凡具于碑隂兹不書湯氏義田記湯氏在龍泉為巨族宋南渡時岐國公思退以文章家致位宰相族益著岐公之伯祖太中大夫稻後九世是為武翼大夫大莭武翼生望以父䕃讓其弟始不有世祿有子曰鏞字伯韶生十三年而德祐失國遂隱不仕人稱之曰石屋處士云處士君既不仕則混迹民間務為生産作業家以苟完自奉甚蕳薄而樂振人之窮急謂仁民愛物冝始于親親乃置義田以贍同族其為田二百畒歲可得穀四百石擇族人廉謹而有幹局者俾任其出納月給人五斗有喪者二石葬則半之産子者一石再有子則倍之子始入學豫錢三十緡嫁女如入學之數娶婦則减三之一年七十者每歲帛一匹能自業者弗預不知檢飭而有子弟之過者罷之大略倣范文正公之成規而微有所損益其為施貧活族之義則無以異也蓋范公有志于是者三十年暨出臨方面入踐政途位充而祿厚始克終其志岐公方貴顯時未及為而處士君乃以一布衣為之可謂難也巳然嘗觀三王之民皆有常業食飲服用之須不必仰于人而後具公卿大夫所受田祿亦有等差而不得過其制安所取羡田以為相賙相恤之資乎若夫合族之道又非衣食于我之謂也厥今田制之壞宗道之廢亦巳久矣有能以義起禮而崇其恩愛于服窮親竭之餘不愈難哉處士君三子長濵次溱次亰溱不幸先卒濵與亰是繼是述弗懈益䖍而亰不逺數百里走錢唐求豫書其事于石以告後人俾勿墜孝子仁人之用心何其深且逺歟是固豫所喜聞而樂書者也處士君之言行前進士葉峴既以銘其墓兹不復云鄞縣義役記浙水東州縣隸慶元大府者六凡所入田租鄞以一縣當其什五諸名額及非時之須稱是取民為最夥而其為縣在巨海上號東南一都㑹牧伯守將若它司以轉漕市易鹽䇲之利有事于海者悉涖治其處一切趣辦用民為最繁冨者巧自辟匿貧者日削而弗繼吏鰓鰓焉惟期㑹之㦯後為懼而公私交病矣天台周君之為丞也㑹國家申嚴役法豪右以它名數自占者母敢弗與周侯進父老具宣德意且教之為義役于是縣西南五十里林村之民次當受役者三十有五家首相與謀視物力之薄厚各捐巳槖得錢七千五百緡為子本推執事者五人操其竒贏以供百役之費而存其母常勿絶復推其五人日詣有司以聽徴令歲終則更休焉厥既條上于縣周君合長佐白狀大府而定其要束因廷酌父老以為衆勸旁鄉比井爭慕為之其致力也均其待事也易姦胥悍卒不得舞手其間而民益忘為役之勤其效可睹矣周君以秩滿去父老過豫而請曰願有紀庶幾夫嗣為政者知有以相之俾後之人母棄其成也昔者孔子稱子産使民也義夫義也者固古之所以使民也今也田里之人不愛其力相率以聽于有司而謂之義役非上之人以義使之而能然哉是蓋子産之所以為鄭而孔子之所與也其孰得而廢之然則可託以永久者有不在豫文矣周君名仔肩延祐五年進士其來以七年二月而義役行于至治元年正月其去以三年三月云邵氏義孰記華亭邵君天驥家于縣西南六十里自號翠巖處士遺榮弗居而志在澤物遇其鄉之人委曲纎悉一以惠利不自謂若是為已足又將使之修其孝悌忠信而為士君子之歸患夫去庠序之逺而其子弟無所于學乃捐私錢即所居之旁闢義孰贍以胥浦風涇仙山三鄉之田二百十八畒有竒禮名士主其席聚里中之俊秀而教育之二子彌逺彌堅咸克成其志而力相其事處士君既以髙夀終而彌堅亦卒彌逺老矣懼來者㦯墮其成則刋其田之步畒鄉落以狀白于官示不敢有且求豫記之傳曰家有孰非家各有孰也二十五家為閭乃有孰以有道有德者為之師而閭中子弟無不學焉黨之有庠遂之有序蓋歲時屬民行射飲讀教法正齒位之所也為士者固不必常在其間而其為閭孰者則無地而無之故其詩曰攸介攸止蒸我髦士民生其時抑何幸歟三代而下禮缺學廢以漢唐之盛而郡縣不皆有學雖或有之而設置不常宋制惟藩鎮乃得立學其後用執政大臣之請而學始遍于郡縣我朝因之自亰師至于偏州下邑海陬徼塞四方萬里之外莫不有學凡所以嘉惠而振飭之視昔有加可謂備矣然以郡守縣令為民師帥者恆迫于職務之繁而不得專意教事其以禮屬民僅若有見于春秋二仲與月之旦望况夫里居之逺于州邑者欲以時㑹于庠序而瞻其禮容聆其言論且不可得非其鄉之善士以義起禮采古人建孰之遺意以為私㳤之地則秀民之䏻為士者果何賴乎處士君誠所謂一鄉之善士而鄉之秀民賴之以為士者也君今巳不可作而其嗣人能迓續之如君之存弦誦之聲久而愈振將見藏修遊息于斯者皆得以培其根而逹其支成其材而就其實它日必有能以幼之所學為壯之所行而措諸事業者矣至是然後為學之成而可以見君父子有功于斯文豈不偉哉義孰創于元統二年之夏四月其來謁記則至正二年之秋九月也戴氏義孰記嘉興郡城東北六十里曰白牛鎮居人數百家為其鄉之望者曰暘谷處士戴氏諱某患鎮學之弗立而後生小子無所受教規創義孰以私淑乎里人有志未遂而沒後二十年其子曰光逺始因其經畫之素度地于鎮東若干步廣袤可二十畒而贏程土物略基址考正面勢石匠蕳材揆日興作先聖先師之殿峙其中論堂踞其後齊廬翼其旁邃廡穹門下至庖湢庫庾直舍之屬為屋總四十有五間陶甓􅉳堊縝壯而不華圗史之藏什器之須纎悉畢備周以繚垣環以幽篁佳木花徑果蹊而瀦其流泉為芰荷菰蒲之區又十畒不啻起至正某年某月訖七年某月而告成八年春二月乃延儒師招來學用仲丁行舍萌之禮退即講席俾序進而請業焉四齊職教者各一人生貟恆百五十人割上腴之田五百畒以贍之既卒成前人之志又將有昭示于後人而圗其永久於是慈溪黃伯成甫以髙文宿德主領教事伻來求豫記之豫聞昔人有言惠有術也養有道也惠不在豐而在乎不費養不在大而在乎不窮豐而多費是知愛于彼而不知愛于此非其術也大而易窮是知愛于今而不知愛於後非其道也惟其不費故可尚也惟其不窮故可貴也戴氏父子其深知夫惠之之術養之之道矣乎古者五家為比五比為閭門側之兩堂為孰大夫士老而不仕坐其間為左右師合閭中之子弟而教焉今之義孰猶有其遺意若夫屋室之多為間至四十有五則不止于門側之兩堂學徒之衆為貟至百有五十則不止于二十五家之子弟是皆非古之所有其為惠也豐矣古者步百為畒而以百畒為一夫之私田民無不受田之家而士不必仰給于學今卑以田五百畒則十家之産也而况今一畒為步至于二百四十又不止十家之産而已是則出于古之所無其為飬也大矣天之生人也莫不賦以仁義禮智之性聖賢與塗人本無以異因其根于心者使之親師取友朝益暮習而日趍于善逮夫深造而自得皆其本然之固有𥘉非損于此以益于彼斯不亦惠而不費乎物之聚也有數而其用也易耗雖封君之冨欲以萬鍾為弟子之養尚恐廩人之粟有時而弗繼今乃欲以布衣養徒之事自任而致其力焉使之因地之利歲取之而不竭利於今者有以施及于後斯不亦飬而不窮乎蓋設教必有先後次第此特導以幼學之莭而養其良知之本云爾它日由是而以俊選論于鄉以賢能登于天府授之以政將見利澤之加于人為惠益豐為養益大戴氏父子之功奚獨善于一鄉而止乎按郡乘宋名臣陳公舜俞其地人也舉進士應制科皆在前列以山隂宰召試館職不就而上書力詆青苗法忤執政意謫為監當官公以直道自信無所回撓每跨犢往來山中自號白牛居士人遂以名其故里諸生息斯遊斯仰企前修儀刑未逺誠有所感慕而興起安知無如公者出于其間戴氏父子且與之同不朽矣此又豫所厚望也庸因記事而并志之以俟焉沈氏義莊記湖之歸安東七十里是為花城其鄉之好義者曰沈君家故業儒君之父處士公遺外聲利不有仕祿而樂出私財以振人之急謂親親仁民冝有本末次第首圗創義孰義㽵以教養其族人未及就緒而殁君以為前人之志不可不續爰以至順􅉝未捐田五百畒建義孰搆殿宇妥先聖先師像其中以春秋修釋奠之儀闢講舍齊廬延宿儒為之師而聚族之子弟俾隨材以受業鄉人來學者弗拒也尋復以至正乙酉捐田五百畒即義孰之南立義莊屋以間計者若干歲取其田之所入以實之擇族中之長且賢者同主其出納貧無以給昏喪諸費者量薄厚之冝制隆殺之等而周給焉大抵本于昔人之成規而微有所損益懼來者弗克嗣其志則以聞于外宰相執政及部使者咸報如所請沈君既求里之寓公記其義孰而義莊未之有記乃叙次其事以屬筆于豫古之有國家者必度田授民以厚其生立宗收族以教之親愛自其法不行於後世而民之失其養者日多風俗亦日衰薄然而萬古一心萬心一理田制壞而此心不與之俱壞宗道廢而此心不與之俱廢仁人君子苟充其一念之良心推吾有餘資彼不足使得遂其生而發其油然親愛之心豈非禮之以義起者哉是則生乎千載之下猶為三代之民也傳曰一家仁一國興仁一家讓一國興讓有能慕沈君之為而興起焉將見人各親其親而同宇之內無一夫不獲其所矣子子孫孫勿替引之善繼善述者所冝盡心也戚戚兄弟莫逺具邇秉彜之良心誰獨無之豫弗辭而為之記者匪徒以朂沈君之後人纂承而勿墜亦以為冨而好禮者之勸也沈君名野先字進之今為進義校尉江浙財賦都總管府照磨云諸暨州鄉貢進士題名記溍佐諸暨之眀年州人士有同升於春官而旅進于天子之廷者其調𥙷而歸也學正陳繼龍既合鄉薦之士為題名而虛其左以俟且屬溍記之溍惟國朝以科目取士著于令列聖相承守之如一上以繼志述事下以立邦家太平之基甚盛德也越于東南號稱都㑹異時人材輩出起進士至宰相者有之自版圗入職方章逢之流相與蹈詠為日已久如種待穫適惟其時是以詔下之日莫不爭翔競奮以自厠于英雋之列獨是州閲十年而偕計吏第奉常者始接踵而起後先相望滋不乏人其科級之優又旁州比縣所未有也惟其發也不亟故其就也愈偉則其進也孰禦焉雖然士非科目不能以自逹至其措諸行事足以𬒳今而垂後者恆有在乎科目之外苟徒誇榮侈盛而以為稽古之所蒙豈賢師儒昭示上德風厲學者之意哉肆成人有德溍與諸君子求無怍焉可也小子有造溍于承學之士蓋日望之南山題名記婺之䆠學于杭者每歲暮春必相率之南山展謁鄉先逹故宋兵部侍郎胡公墓仍即其廟食之所致祭焉竣事遂飲于西湖舟中以叙州里之好大德八年春三月癸亥㑹者四十有四人魏國趙文敏公時方以集賢直學士領儒臺溍幸獲從先生長者之後而趍走于公履屐之末逮今三十有九年乃以非才𥙷公故處暇日從鄉僧遊龍井覩公舊題而與道其故事咸謂不可久廢而莫之舉亟以白于宣政副使王公合同郡大夫士暨方外交四十有一人以至正二年春二月癸亥復㑹于南山追數向之四十有四人存者殆無幾或顯融于中朝或隨牒調𥙷于逺方㦯已倦遊歸休于家林惟溍忝有祿食于此而得齒兹盛集未知後三十有九年今之四十有一人重來者誰歟古人云後之視今亦猶今之視昔此題名之所為作也諸公謂溍冝題識其首是用弗讓而直書其歲月以俟後之覽者焉天目山禱雨記至正二年夏四月不兩江浙行中書省宰執都司親禱于杭之宗陽宫俾真人唐永年為作符檄朱書鐡簡命道士持詣天目山祈靈于兩龍祠仍遣吏同臨安于潜兩縣長二奉香幣以從十五日乙卯抵太微蓋元洞天至道宫白于靈濟顯澤昭德聖烈王千六日丙辰黎眀以楮鏹藉疏狀符檄投諸龍池疏狀符檄皆逆流北上俄若有啓其封而展之者至洞口遂與所投鐡簡俱沉水中已而隂雲四起下山甫一里雨隨至亭午抵玄霤山真慶觀白于護國庇民廣濟眀著天妃之神以楮鏹藉符檄鐵簡投諸龍井如前儀符檄獨浮不下或謂此天妃祠而緘題云玄霤龍王冝其弗納乃以意默謝封忽自啓而沉還至于潜縣𪠘雷雨大作潤澤所被合境告足爰命儒學提舉黃溍直書其事光揚神休二十日庚申謹記金華黃先生文集卷第十
