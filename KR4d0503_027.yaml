body:
  text: 神道碑臨川危素編次番昜劉耳校正御史中丞贈資政大夫中書右丞上護軍追封平陽郡公諡文靖徐公神道碑公諱毅字伯弘姓徐氏丗為平陽趙城人家于霍峯鄉不明里髙祖諱澤曽祖諱潤皆力夲尚義值金季之亂晦迹弗耀入皇朝始有出而仕者祖諱玉由元帥府都提控歷崞縣提領岢嵐州長官終於河東南路提舉常平倉事御史中丞王公傳文銘其墓纍贈嘉議大夫上輕車都尉追封平陽郡侯祖妣髙氏平陽郡夫人考諱德舉由尚書省掾出為平陽路轉運司經歷終於太原路監使司提舉翰林學士承旨姚公燧銘其墓纍贈中奉大夫護軍追封平陽郡公妣盧氏邢氏並平陽郡夫人公盧夫人出也幼頴異丱歲受業於魏國許文正公磨礲浸灌日長月益以清方徑正為衆所嚴憚莫不以逺大期之弱冠辟掾調同知檀州事當國者急於賦斂督責甚峻郡縣長吏奉承如恐弗及公獨不阿其意帷務布德澤以蘇疲瘵人稱其有古循吏風丗祖皇帝聞其名擢監察御史上言江南新附未久宜隱恤流亡以固民心京師天下根本宜蠲除地稅以厚民力檢核災傷宜以時而發倉廩之儲捐山澤之利申明酒禁以修荒政鰥寡孤獨宜有養民所疾苦宜遣使詢問方今庶政姑息中書親細務而宰相失體六部僚屬多非其人因力陳省臺為治之要及憲司事宜監治官吏當加警戒不可因人之誣言而升降察官行樞密院行大司農司行通政院及尚書省理算受賞進官者皆可罷又以日食地震乞罷諸行省四川妄啓邊釁交址虛勞王師獻䇿以邀㓛生事者宜勿聽官軍承襲皆膏粱子弟未嘗知兵當别議立法增國子之貟重教官之選以興學校治宗廟以崇祀典修國史以存故實設朝立班不可全無流品之分實封陳言母使苟為進身之計它如選用官吏減錢糧之費理婚田之訟馬禁水利􅐭鈔諸法其弊當救者前後所奏七十餘疏其言後多施行丗祖賔天上封事于太皇太后皇太后曰四海不可一日無君大行皇帝奄棄天下巳五日矣苟非早定大䇿萬一或啓姦覦變生不測實可寒心皇孫撫軍朔漠先帝既授以皇太子寶聖意可知伏願明諭宗藩大臣叶謀推戴遣使奉迎歸正大統上以副先帝之遺意下以慰四海萬民之所屬望廷議韙之成宗皇帝既踐天位首請早正東朝尊號以嚴孝養因言陛下方虛心求治而大臣不肯任事人主之職在論一相今宰相貟太多論議不一伯顔乃先帝舊臣留以遺陛下宜亟相之為治不在過求髙逺但當遵守舊制其要有四親賢逺佞信賞必罰而巳又伏闕上言建立儲二敦睦宗藩選任臺諌教習親軍勿事西南夷而專備北邊赦不可數等十事所上疏又二十餘上皆嘉納焉擢僉陜西漢中道肅政廉訪司事未上改吏部貟外郎時選曹事多壅滯公不避權勢凡銓量注擬必考其資歷察其才品人皆恱服奉詔使甘肅給軍儲糴買轉輸規措有法事集而民不擾除僉河東山西道肅政廉訪司事閲所部獄囚而得其冤狀所釋五百餘人時稱明允召為徽政院長史舊例臺察於徽政之事一無所問公謂法者天下之公器宜共遵而行之臺察者執法之司何獨不得與聞徽政之事乎有與公不相能者力詆之公即謝去尋除樞密院經歷贊決事機申嚴號令夲兵者賴其佽助為多遷御史臺都事改右司郎中除陜西行臺治書侍御史並以外艱不赴服除召為左司郎中夙夜匪懈彌綸庶政損益必中其度列曹咸取則焉擢治書侍御史柄臣欲搆害御史郭章公力為之辨有沮之者事竟報聞公以言不行自引去召還授陕西漢中道肅政廉訪使關右地接羌戎人多強悍號稱難治公柔之以恩而懾之以威土俗為之丕變入為刑部尚書上言自昔有國家者必定律令使有司知所遵守方今承平日久宜參酌古今立一代之成法上可其奏仍命總其事方次苐就緒未及上而改授河北河南道肅政廉訪使無何復入為刑部尚書擢侍御史除僉樞密院事仁宗皇帝在儲闈素知其有公輔之器及正位宸極擢江南行臺侍御史遷燕南河北道肅政廉訪使召赴闕遂參議中書省事頃之拜陕西諸道行御史臺御史中丞力辭而歸每謂人生未老得間乃為貴吾年周六甲歷事四朝恆以無能輔報為懼安敢昧止足之戒乎延祐元年十二月二十六日以疾薨于里苐之正寢享年六十有一某年某月某日葬某鄉某之原公纍階資善大夫訃聞上嗟悼不已詔特贈資政大夫中書右丞上護軍追封平陽郡公諡文靖仍命詞臣為贊書以褒寵之娶裴氏封平陽郡夫人子男一人宗義亞中大夫衡州路總管女四人長適常德路揔管裴宗文次適薑某夫亡年未三十即歸居父母家今巳七十餘次適朝列大夫曹州尹麻鄘次適敦武校尉某處榷茶提舉王琦孫男二人俶僖公遺書有奏議五卷詩文三卷翰林學士吳公澄為之序惟公以純實之資克承正學遭逢聖代為時名臣雖雅志恬退而造次不忘於愛君憂國光膺茂渥生榮死哀不亦宜乎公殁之歲溍始舉進士至京師三十有五年公孫俶以墓隧之碑未建介翰林修撰王宗哲以銘來屬溍雖不及遊公之門而覿其光儀聆其罄咳讀公之書而論其丗君臣之際何其盛哉序而銘諸史臣之職也曷敢以不敏辭銘曰惟公之先隱顯以時再丗外官不大厥施委其餘祉伊公之貽公𥘉筮仕華問四馳擢置臺端用副倚毗作帝耳目為國蓍龜宫車晚出人心危疑盡言無避神器有歸出將使指風紀見持入綴從班獻納論思乃隮宥府乃陪宰司訏謨逺猷贊襄萬幾峻陟文階執法太微胡然逺引莫可􅎗鞿公身在外忠愛不衰庶公復來赤舄衮衣遺表上聞當寧齎咨一鳯之鳴六龍以飛申錫寵褒厥有制詞有封若堂昭以銘詩沿海上副萬户石抹公神道碑至正七年冬十月二十七日武德將軍沿海上萬户府副萬户石抹公終于台州之私苐卜以某年某月某日從葬于栁城之先塋公諱明里帖木兒别名繼祖字伯善迪烈糾人其先出於梁蕭氏隋蕭后以族入于突厥后歸唐而其族留突厥至遼為述律氏仕遼多至顯官金滅遼改命為石抹氏曰庫烈而者於公為六丗祖義不仕金望日再拜而卒曰脫羅華察耳者於公為五丗祖承先志亦不仕其苐二子曰也鮮公髙祖也問父何為不仕父語以其故慨然曰兒必復之金主聞其材武多智召為奚部長固辭弗獲乃俾兄瞻德納姑受之以全其宗遂遁去之北野山射狐鼠以食誓不食金粟聞太祖皇帝龍興朔漠乃杖䇿來歸謁拜于九斿白旗之下言東京金人根本之地得東京則金何圗上即命取東京師次髙州與之千騎使為前鋒諜知東京新易留守出竒計獨與數騎邀殺之遂入東京得地千里户十萬八千勝兵十萬進攻北京三年而克之得其守將四十有七城邑二十二有旨以北京旅拒王師當屠力諌止焉特授御史大夫領北京逹魯花赤别募精鋭之士萬二千號黑軍以其籍來上賜金虎符加上將軍提控諸路元帥府便宜行事太祖西征俾統糾漢黑軍偕諸將經略中原徇地至蠡州死焉曽祖諱查刺繼為御史大夫統黑軍定河東陕西諸郡移師攻益都城破衆欲盡殱降者堅持不可益都之人生為立祠以黑軍長驅入汴進拔雎陽太宗皇帝疇其勞授真定兼北京兩路逹魯花赤祖諱庫祿滿以黑軍與從弟度刺攻襄陽樊城丗祖皇帝念其祖父之㓛降制褒諭賜金苻為總管與叛將戰于濟南死焉考諱良輔以黑軍攻五河及湖南諸部宋平論㓛行賞賜金虎符歷蔡州弩軍萬户黃州招討使尋以沿海副都元帥開閫于四明會改元帥為萬户遂以為沿海上萬户府副萬户纍階昭毅大將軍由昭毅而上四丗有傳在國史妣莊氏封某郡太夫人公少負材而尚氣不肯為人下大德七年以門㓛入備宿衛事成宗皇帝為舍利别赤將上旨禱祠山川所過州邑名人魁士莫不器重之十一年昭毅公以老謝事詔以公嗣其職方是時承平日久黑軍𣪚落之餘多巳它屬武宗即皇帝位仁宗為皇太子上命悉括黑軍以衛東宫宗戚貴臣弗便事遂寢公𥘉以沿海軍分鎮台州皇慶元年又移鎮婺處兩州馭軍嚴肅而恩意周浹當揀放而老且貧不能歸者曲為之地使有以自給而逹於鄉里旅殯者纍數百擇地為叢冡聚瘞而時祭之婺之教場多餘地最為沃衍相其土宜樹桑藝粟麥而儲其入幕府勞徠供億軍中藥餌棺槥咸取給焉睱日則延師儒咨諏善道士譽翕然居民亦樂其不擾往往形於謡詠江西大盜起寧都寇贑州列郡皆警朝廷命行省宰臣親率諸道兵往討之公預在行聞公所設方略深服其決機之精即檄公為行軍都鎮撫部郢復諸軍生縳其凶渠二人而乘勝搗其巢穴逆黨潰去元惡尋亦就擒乃班師凱旋處之遂昌愚民嘯聚竊發郡縣約官軍合捕公按兵不出單騎直抵其處責長吏失於撫字諭富家輸粟賑濟而團結保伍以自衛不旬日誅其首亂而歸其同黨三十五人于有司餘皆令復業如故兩浙之鹽法積弊日滋行省俾公與轉運司官共整治之公訪求其致弊之源隨事釐革亭户之凋耗者亟為僉替使無缺役官課既登而民間私煮盜販之害有未盡除事聞于上命行省擇所部萬户歲一巡歷以申明其禁令公首膺兹選所至人莫敢犯或弗悛而麗于法立蔽其罪未嘗留獄由是平民免於誣構株連之患公復深究其利病酌古今之宜為上中下三䇿行省以上于中書事格不行有識之士以公言不可廢相與刻置郡庠人至今傳之昭毅公既老每懷鄉土之念捐館之日家僅存遺書數千卷公粥其故廬為舟車之費奉柩還葬栁城餘資悉分諸弟太夫人久留遼東因迎侍南來致其孝養諸弟相繼即丗撫育其孤子至於成立嫁其孤女咸得所歸公𥘉從昭毅公在四明師事前進士史先生蒙卿先生沒公為治葬且割田以祭焉四明之學大抵祖六氏而宗楊袁惟先生上接㬊氏之傳為學一本於朱子公天資頴悟凡先生所指授聞輒領解然不徒守其空言而務在明體以逹用自經傳子史下至名法縱橫天文地理數術方技異教外書靡所不通而韜鈐之祕則家庭所夙講商榷古今亹亹忘倦治法征謀如指諸掌公素慕為竒節偉行非常之㓛有志於當丗而喜推轂士類志局于位弗克盡展所藴因自號北野兀者年踰強仕即請納祿舉仲弟振祖以自代樂台州山水之勝買田築室而居焉扁宴休之所曰抱膝軒雅歌賦詩以自娛家事付之諸子一無所問更自號太平幸民致和天曆之交行省強起公防遏松江海道事定表為閩帥公微聞之以親老力辭及太夫人以髙壽終公年巳耳順哀毀過禮既奉柩祔葬于昭毅公之左廬墓三年然後去太夫人所遺服御之物悉以卑季弟其篤於孝友天性然也省臺交章列薦略不動其意覃官之令下亦不自陳安常待終不疾而逝享年六十有七所著抱膝軒吟若干卷清新高古有作者風娶弘吉刺氏封武平郡君子男五人長宜孫襲武德將軍沿海上萬户府副萬户次文孫次德孫俱國子學生次厚孫今以昭信校尉為沿海上萬户府副萬户次哈刺女三人長適泰不華英宗龍飛進士苐一今纍遷翰林侍讀學士中奉大夫知制誥同修國史餘在室昭信君以葬有日奉公門下士潘倬之狀以碑銘來屬溍幸辱遊公父子間且與侍讀公同官為僚不敢以衰朽不文為解狀稱公倜儻似魯仲連淵深機密似李泌得士似魏公子無忌廉退似邴曼容至於料敵制勝論事剴切抑又公之所長人以為知言銘曰猗公之先為時名臣運去物改不事二君逮其孫曽歸我真主纍將重侯勳在盟府垂休五葉惟公敬承際逢熙運四方砥平專城坐鎮偃旗卧鼓海波不驚萬室按堵蚊虻之細安足掃除小試之效特公緒餘公材則多敏而恱學九流百家由慱而約經綸之妙出武入文斂藏弗耀抗志青雲時逾兩紀優遊事外嘯歌息偃春融蟬蛻積慶儲祉卑于後人提將之符棨戟在門史所屢書公先四丗嗣作公碑其尚無愧嘉議大夫禮部尚書致仕于公神道碑至正十三年九月已已嘉議大夫禮部尚書致仕干公終于平江里第享年七十有八以其年十月丁酉葬吳縣至德鄉洞涇鷹蕩之原公諱文傳字壽道姓干氏干之得姓始於春秋時宋大夫犨漢有蜀郡尉獻吳有軍師吉晉有將軍瓉著作郎寶史氏所紀代不乏人其後有家于汴而仕于宋至武顯大夫者曰思義於公為六丗祖武顯之子曰信於公為五丗祖建炎𥘉與其弟武節大夫恭扈蹕南渡僑居平江子孫因占籍焉髙祖諱振曽祖諱拱辰皆弗仕祖諱宗顯承信郎今贈亞中大夫鎮江路總𬋩輕車都尉追封穎川郡侯祖妣吳氏追封潁川郡夫人考諱雷龍鄉貢進士入皇朝終於饒之慈湖書院山長今贈嘉議大夫兵部尚書上輕車尉追封頴川郡侯妣吳氏顧氏所生母陸氏並追封頴川郡夫人其詳具如公同年翰林學士承旨歐陽公玄所為贈封之碑𥘉承信府君雖仍先丗以武辨入官而力教其子以文易武故兵部府君一薦于漕再薦于鄉最後遂與長子湯同上春官鄉人榮之未幾場屋事廢湯亦卒而陸夫人生公兵部府君名以今諱蓋深有望焉公少嗜學十歲能屬文年未弱冠而聲譽籍甚用舉者為吳及金壇兩縣學教諭饒之慈湖書院山長浙右憲府辟入幕未赴而丁兵部府君憂仁宗臨御之始有詔著取士令公首以江浙鄉貢會試京師登延祐二年乙科𬒳旨賜進士出身故事布衣入宫𣪚階當二等主選吏以舉人亦起於布衣疑未決上特命蒙古人與正六品階後勿用為例餘皆與對品階授承事郎慶元路同知昌國州事昌國一海島耳民頑獷不昜治其尤無良者往往群行剽掠於巨海中若化外然公柔之以恩信俗為之變長宫有強愎自恣者公不與校而推誠以待之久乃自屈服瀕海有三鹽場司其事者帖轉運使之勢虐使州民身服重役而家業破蕩公語同寮曰吾屬受天子命以牧此民可坐視而弗之救乎乃亟為之陳理辭嚴義正上官莫能奪民賴以免在官五年去之日如始至遷承務郎平江路長洲縣尹長洲公鄉邑地廣人稠牒訴轇轕歲輸秋租至四十餘萬石公於關決趣辦具有條理使傳往來將迎無虛日亦靡憚其勤徙榻公署無事未嘗輒出而親舊莫敢通私謁會創行助役法凡民田百畒令以三畒入于官為受役者之助行中書省檄公專任長洲之事既又連以華亭上海兩縣無錫一州之事諉焉公之號令素孚於長洲之民聞公諭以善言無敢為詭寄所得皆腴田旬日而事集華亭上海之亭户不統於有司而無錫多豪家大姓非長洲比公委曲化導人皆恱從詭寄之弊既絶亦以腴田來歸中人之家自是不病於役以陸夫人喪去官服闋遷承德郎湖州路烏程縣尹富民張某之妻王無子張隂納一妾於外生子未周歲王誘之來逐其妾而留其兒以器貯水沈之不死以帛勒其頸乃死夜以醬塗死兒而焚之張知而無如之何公聞之乃發其事死兒餘骨巳至官王厚賄妾之父母買鄰家兒以為妾所生兒𥘉不死公令妾抱而乳之兒啼不就抱亦不肯食妾之父母辭窮吐實乃呼鄰婦至庭下兒見親母躍入其懷乳之即食王遂伏殺兒之辜人以為神明丹徒縣民周某有一女二子而二子共殺其女獄久不決浙西憲司俾公往鞠之公於片時間悉得其情而周有母乞貸二子命以養其老公謂二子所承有輕重合以首從論乃議以為首者當殺姊之罪為從者免其死使養之憲司如公言人稱明允安定胡先生葬何山寺僧壞其墓而據其地數十年來郡守之清強有風力者與之爭皆莫能得公白于大府始還其舊而表樹焉升奉議大夫徽州路婺源州知州婺源依山為州民素淳朴而丗降風移俗習變遷男女婚聘後富則渝其約有育其女至老死不嫁者親喪貧則不舉有停其柩纍數丗不葬者公下車即呼其耆老使以禮訓告之閲三月而婚嫁喪葬之事俱畢朱文公上丗居婺源故業為豪民所并子孫訴于有司莫能直公呼豪民折之以理不煩窮治而悉歸之募好義者即宅建祠令其家丗守焉富民江某出遊京師娶倡女張為婦江既客死張間關數千里返其柩以葬前妻之子遇之不以禮而重困苦之日給脫粟二升使自舂爨以食張不能堪子恐生它變乃與其弟共殺之瘞其尸山谷間官府知之而利其賄不問也公曰為人子而戕其庶母人道滅矣可逭其誅乎乃發其事而論如法升朝列大夫平江路吳江州知州吳江去公家僅數十里猶長洲也公綜理裁決小大庶務處之以公而行之以恕親舊訖無間言公歷仕所至必以均賦役為先催科追逮一用信牌度其緩急而嚴為程限民亦不敢違村落之間不識有悍吏之呌囂墮突也至於明要束以正官常謹防間以清吏弊厚拊養以紓民力精勸勵以淑士心有古循吏之風焉人始而憚久而安終而愛且慕既去而又思之也在丗祖時王文康公鶚嘗請修遼金史至仁宗時李文忠公孟又嘗請修宋史久未有成書今天子至正三年始命首相總其事凡文學侍從之臣布在列位並令入館分任𫐠作其效官于四方及山林之遺逸咸加搜訪俾預討論於是公自吳江召入居宋史前局公恪恭其職雖憊不少休甫逾再期而三史咸以次告成燕犒錫賚寵數優渥仍有旨四品以下各進一官擢公集賢待制朝請大夫居無何遂致仕先是朝廷為官擇人以公才長於治劇而數煩以州縣之事公以治行為一道最而舉於憲府者四韓公鏞乘使者車按行屬部至親作烏程謡以紀其政績惜乎所試者小未能盡展其經綸之藴晚逢盛際峻躋邇列人皆期公致位通要有大設施而公雅志廉退齒髮未裒輒請納祿優遊里閈垂將十年而以壽終縉紳先生及于是者其幾何人公氣貌充偉識度凝逺遇事皆不苟平居衣服無華飾食無珍味而於親庭之養家廟之祭必致其豐腆無他玩好而獨耽於書手自校讎至老不倦喜接引後進來者必與均禮而諄諄誘掖之江浙江西鄉闈聘公同考試者三主其文衡者四所取士後多知名為文務雅正不事浮藻有來謁者亦不厭於應酬公以仁里自號暮年又自號止齋有仁里漫藁若干卷藏於家娶顧氏逾年而卒繼時氏纍贈頴川郡夫人繼朱氏亦皆前卒時夫人執婦道尤謹有子男三人長旟用公致仕澤為忠翊校尉河南府路同知陕州事次旌建寧路醫學正次城國子生女五人長適張思誠早卒次適管瑾丹徒縣儒學教諭次適葉元英次適章祥次適陶思敬嘉興倉監支納庶女二人一許嫁袁養福一尚幼孫男八人德潤德淵德源德洵德溫德浚德􅊹德滋惟德淵為國子學生餘皆業儒女四人曽孫男一人女二人公之殁也遺命速葬旟方在官下旌及城弗敢違逾月而葬焉與時夫人同兆域窀穸之事甫畢旟適以秩滿受代而還攀號靡及乃奉公甥吳洪之狀逾濤江走金華山中問銘於溍以作公碑始公入秉史筆溍實同𬒳召命適遭內艱弗果赴逮公書成受賞得謝而歸溍乃起自休致承乏太史屬預聞修本朝后妃㓛臣傳幸從諸公之後執茟具草而竟未獲裁定上進溍之不敏愧公多矣安足以任不朽之託乎然以江浙之士與公為同年者十人溍獨後死義不得辭也銘曰氣運合一人材乃完公生其時弗後弗先皇仁在上豐水有芭長之育之逮夫強仕乃拔其萃乃揚其英褎然前列旅於天廷踆踆退讓守官外服進也不亟鴻漸于陸孰遄公歸俾居帝旁蘭臺石室大啓祕藏歷觀後王推求故實用禆乙覽考其得失疇功册府簉迹仙班上方眷公公遽引年東門祖餞光華載路八座之崇熙朝異數九原莫作一鑑未亡疏封錫諡嗣舉彞章顧慙不敏汗青無日猶及銘公曰茟則茟嘉議大夫婺州路總管兼管內勸農事揑古䚟公神道碑公諱忽都逹而字通叟系出蒙古揑古䚟氏其先曰伯帖木兒丗居雲中曽大父曰阿屯赤那演以侍衛近臣受知先朝弗及官而殁大父曰火者楊州路泰興縣逹魯花赤當用公恩贈官封爵未命父曰阿散纍贈嘉議大夫禮部尚書上輕車都尉追封雲中郡侯𥘉尚書侍親至江南因占籍於金陵後又徙湖北而卜居於澧陽母蜀人馮氏宋某路提點刑獄立之孫女追封雲中郡夫人有子一人即公也公幼警敏篤孝於親比長雅好儒術遊學湖湘間從名師受經史而究其大義肆筆成文咸造於理儕輩敬歎自以為莫及俗尚淫祀公讀書之所旁民家數有鬼禍公為驅逐禁止之一夕鬼見夢於其人曰公貴人也我不敢與之抗當舍此逺去自是其妖遂絶聞者駭異焉延祐四年郡縣以公充賦有司為湖廣鄉試苐一五年會試京師及上親䇿遂為廷試苐一𬒳旨賜進士及第授承務郎祕書監著作郎奉詔函香禮祠五嶽竣事還朝除湖廣行中書省左右司貟外郎會蠻徭竊發從省官出兵討之公乘機制變密運籌畫賞罰明信士樂為用事平以聞褒寵甚渥擢奉訓大夫江南行御史臺監察御史彈劾無所避風來為之二新分按所至嚴而不苛人莫不感服除江浙行中書省左右司貟外郎江浙地大人夥政務叢劇文移填委公處之以間睱而事無不治宰執及僚屬多賴焉遷朝列大夫都水庸田副使行部至錢塘有司言民居侵入湖面請盡撤之公白于行省曰西湖水利當疏通者在乎九井苟無壅塞何多毀民屋為此特小吏欲乘勢為姦利耳有司不敢復言民乃獲奠居于無優鹽官海隄為風濤激蝕而崩田廬亭竈皆淪沒危及于城廓朝廷為遣宮謀捍禦之公督有司具木石以庀役事晝夜不少懈隄成而水患息改荆湖北道宣慰副使到官三月丁尚書公憂自江陵扶柩涉江湖抵錢塘遵治命卜地於吳山萬松嶺之側以葬焉公居喪悉用古禮廬于墓次三年築亭號永思示終身無忘也服闋授同知饒州路總管府事國朝之制以六事考郡縣之殿最公下車未幾而六事俱有成效至於整站赤以通使命華鄉司以正稅籍造浮梁而民免於病􅍱明法令而豪強震懾崇教化而禮讓興行可紀者不一而足在官三年以治最聞公以秩滿將解印綬去士民攀戀不巳復為留二年升中憲大夫同知衡州路總管府事時有大盜搆亂於廣海軍旅之興所過騷然公給其需求而戢其暴橫皆有法由是軍士無敢譁而居民得以安於田里郡庠有諸葛孔明祠歲久弗葺主教事者因而廢之公慨然曰孔明王佐之才立祠依聖人孰謂不可即命復其祠如故湖湘間多學者公聘名儒設賞格試以經術辭藝是歲大比上春官者皆前日預選之士皇上臨御日久望治益切慎擇守令付以承流宣化之寄公用舉者授大中大夫濟南路總管鈔法滯不行首為立變通之方公私咸便之歲旱有禱輒應人以為公精忱感孚所致未及三年復以六事備舉治最俄移疾而歸廷議謂公才任治劇不宜使􅈬間退詔除嘉議大夫婺州路總管未上而疾作遂不起公生於元貞二年五月十二日卒於至正九年十二月十二日享年五十有四以十年二月某甲子朔祔葬于尚書公墓之左夫人河東聶氏宋某路提點刑獄光之孫女事舅姑有禮待姻族有恩年四十有六先公一年卒追封雲中郡夫人有子男一人曰揑古思公教之甚篤每撫而誨之曰吾忝以倫魁致位三品蒙國恩厚矣爾能不墜吾家聲吾死之日瞑目何憾乎揑古思佩服訓言而刻意於學至正七年中山東鄉試苐二名用特恩輔清州儒學正今用公廕為忠顯校尉平江路同知吳江州事女二人長揑古真未嫁而卒次傑烈真適某人庶子一人曰揑古烈尚幼惟公早由館閣出入省臺而雅志恬靜廉於進取𩔶仕已踰三十年食祿不過二千石今方嚮用而遽不可作惟嗇其年是以其材弗究於用也然竊觀古之君子藴蓄經綸之業而不克大施後之人必有起而成其志享其祿位者公則有子矣揑古思緣斯文之雅故以狀來屬溍銘公神道之碑謹序而銘之銘曰大山穹林𣏌梓出焉名宗貴胄實生俊賢際時熙洽文場遊啓公以儒英克冠多士承明之廷群才所儲瓊琚玉佩拾級而趨乃贊政機乃持風紀往臨外服使事有指人徯公歸公來徐徐緹屏泥軾兩乘倅車晚專名城有民有社導揚德意膏澤在下膚寸之雲盍雨九州上方側席公去不留胡不愸遺俾躋上壽公才則多用而未究有子承考公殁不亡于飾其終國有彝章諡在奉常傳在太史惟墓有碑負以龜趾銀青榮祿大夫大司徒陳公神道碑泰定二年六月十八日銀青榮祿大夫大司徒陳公薨于京師阜財坊寓舍權厝于城西之某所公嗣子逹甫三嵗留婺之蘭溪故居後二十有六年是為至正十一年逹始克返柩卜某月某日襄大事于蘭溪某鄉某山之原爰以狀授溍俾勒銘神道之碑按狀公諱萍姓陳氏自周封有虞之後於陳春秋時為楚所併子孫以國為氏𣪚處四方丗有名人其居于溫莫詳所始公曽祖諱景彥晦德弗耀祖諱春倜儻好施喜周人之急刻意教子期于有成考司馬府君諱自中娶于蘭溪楊氏因以家焉宋季與伯兄右丞相兼樞密使宜中俱以進士起家德祐元二丞相當國我朝伐宋之師逼臨安邀丞相出降竟不出而奉益王廣王南遷及至海上知天命已去乃浮海之占城之暹而沒府君以大都督府行軍司馬提兵拒守分水關與大軍相持十餘日食盡援絶軍帥欲降之不從朝服南向再拜而死五子存者三人皆育於外家楊氏公其仲也丗祖皇帝以丞相不降而去遣使追之不及命物色其子弟在江南者外氏遂以公兄弟歸于京師公天資頴敏髫齓之年儀觀語言巳如成人丗祖見其骨相厖厚異於常兒大竒之公亦念陳氏故宰相家不可不自樹立刻意於學無所不通以兼善𣑽學𬒳旨賜名輦真加刺思俾事𥙿宗皇帝於東宫於是丗祖皇帝方長駕逺馭網羅英豪公因得與居與遊而晞日月之光華覩風雷之迅奮聰明益以開發至於騎射亦精其能上深器其材而未及用成宗皇帝以公先朝舊臣尤加眷遇日侍左右與聞謀議自國家統一函夏惟土蕃最為西方強國諸戎咸畏憚之昔唐人與之通婚結好而日尋干戈未始休息今雖臣附巳久而竊發不時朝廷視為重地建宣政院以統治焉會邉人告警上欲命將出師而難其人詢於在廷無以易公特拜榮祿大夫宣政使佩三珠虎符領土蕃宣慰使以討之陛辭之日賜以銀印金劍使得便宜從事公受知纍朝每思以竒偉非常之功自見慷慨激烈勇往直前士氣百倍戈矛所指氛祲肅清殱其渠魁數十人盡定多含思桑思加康撒兒之地凱還召對賜上樽襲衣奬諭甚至武宗皇帝臨御之始以公習於西事命持詔撫寧邊陲𥘉入亂境有數千騎整衆而來公猝與之遇亟命從騎解鞍列坐環以重車如城郭左右指揮外示間睱敵疑有伏懼莫敢前有以所戴白帽揭於竿首者公引弓一發中之遂驚駭遁去由是諸部服公威名聞公至皆膽落不敢言叛矣入朝以功拜大司徒進階銀青榮祿大夫以宣政使兼會福院使延慶司使土蕃宣慰使如故仍推恩于三代曽祖贈中奉大夫祕書卿護軍追封永嘉郡公諡安惠祖贈資德大夫集賢學士上護軍追封永嘉郡公諡恭僖曽祖妣王氏妣楊氏並追封永嘉郡夫人考司馬府君贈銀青榮祿大夫大司徒上柱國追封溫國公諡康順母楊氏封溫國太夫人公入則侍燕間出則陪扈從妙選時髦開府設屬門生故吏多致通顯寵錫榮耀震于一時或以公驟貴而忌之譛於上曰亡國宰相之子孫不宜置之禁近上若曰其父勢節而死為彼忠臣其子豈不能忠於我乎夫官爵以待豪傑之士非爾所知也仁宗皇帝以重熙纍洽之餘右丈興治元儒大老森列乎臺閣公翶翔其間推賢讓能多所薦引因事論説明諒不阿莫不歎服焉英宗皇帝奮乾剛以御群下大臣動遭譴責公每從容諷諌天顔為霽威嚴所全護甚衆𥘉臨安既下干戈之際公與太夫人相失莫知其所在尋訪不獲為之不御酒肉者二十年獳慕之思久而彌切或傳在順州某氏之家公奉金幣及名馬以請而弗能得聞于朝為降旨賜泉幣萬緡白金十鎰皇太后及諸王大臣織文錦綺之屬又不下萬匹公舉以遺之遂迎侍以歸一時文人咸為賦詩頌美其事朝野榮之太夫人日思鄉里公之兄芹女兄媁適至自南方媁孝思尤篤自與母相失斷髮誓不嫁然指為香十指僅存其四至是與芹奉安輿還蘭溪服勤孝養克盡子道太夫人康寧壽考享年七十有三而終延祐五年三月也公聞訃南奔朝廷賻泉幣萬緡給驛馬四十匹遣近臣諭旨於行省宰執及部使者護其葬别勑詞臣為製碑銘未幾上三遣使賜七寶束帶一金織文假十泉幣五千緡起公於家公還朝久之俄感未疾宣醫診視相望於道屢乞歸皆不允疾增劇始得請出為行宣政院使未行而遽不起享年五十有七訃聞朝論深痛惜焉娶某氏封某夫人子男一人即逹工於書今上皇帝嘗命題欽安殿榜及渾天儀躔度集𩔶代郊祀禮甚𬒳嘉獎嘗奉旨禮祠寶陀竣事而歸錫賚尤渥人謂陳氏有子矣公兄芹弟葭皆前卒芹以子愛穆柯貴贈中順大夫同僉通政院事愛穆柯受知今上日見親近與逹雅相敦睦家庭之間動中禮法陳氏之丗澤未艾也康順之忠義死莭固享有其報非公能濟其美亦何以致是哉銘曰顯允陳公克生相門際今聖代四海一君奉身來歸年甫羇貫服勤帷幄出入無間不亟于進譽望日隆藴其宏略以時奮庸西人弗靖事聞當寧峻陟使名統臨蕃部銀章寶劍假以便冝盡護諸將往宣皇威賈勇長驅士樂用命凶渠既殄邉地悉定凱還論功委任益專洊將使指來旬來宣視險如夷出竒制變折其姦萌莫敢復叛上公之貴兼總數官公材則多靡憚其煩入居帝旁從容獻替人得不聞隂𬒳其賜公起疏逺人或譛之蔽自上衷用公不疑公逝不留公則有子追逺不忘遷神故里某山之原有封若堂祥慶所鍾後其彌昌公位一品名在史䇿寫以聲詩刻此山石特進上卿玄教大宗師元成文正中和翊運大真人總攝江淮荆襄等處道教事知集賢院道教事夏公神道碑玄教苐三代大宗師夏公既順化歸真而遷神于故山其大弟子張公德隆襲掌教事以狀授溍曰先師之道行德業當援故實請命于朝而勒文豐碑惟是體魄之所安不可無以表于封樹敢屬於吾子溍固辭弗獲則按狀所述序而銘之序曰公諱文泳字明適別號紫清丗居信州貴溪縣之唐甸曽大父諱如愚大父諱英夫皆業儒而不仕父諱希賢宋末舉進士未第而德祐失國八皇朝特授昭文館大學士中奉大夫母楊氏封江夏郡夫人兄弟四人長文次文深次文濟公最幼生而開爽英發丱歲就學讀書日記數千言不喜徇丗俗紛華之習一日慿髙四望忽若有省慨然起求仙之興年十六學道於龍虎山之崇真院𥘉開府儀同三司上卿張公入覲丗祖皇帝肇立玄教命為大宗師建崇真萬壽宫以居之公素清慎博雅為開府公所賞識大德四年始至京師與大宗師特進上卿吳公同侍開府公左右日相切磨而學益以進八年閛府公以上命遣公撫視諸道流于大江之南比還制授元道文德中和法師崇真萬壽宫提點至大四年仁宗皇帝在儲宫聞公賢有道而其法又多靈驗乃召見命獨任本宫承應法師有司嵗給車馬扈從往來兩京出入禁衛無間奏對率皆稱旨甚敬禮焉仁宗正位宸極皇慶元年首降制特授元成文正中和真人江淮荆襄等處道教都提點賜以銀印視秩二品天語褒嘉恩意隆厚非常典也延祐元年公父遂拜昭文之命兄文亦特授某階中政院判官五年奉上旨代祀龍虎三苐閣皂三山竣事悉以祭供金繒分施各宫觀秋毫無所私上清宫靈星門歲久腐壞抽已槖伐石於太湖而更新之內翰歐陽公為之記既又度地築宫於龍虎山北一里得請於上賜額元成魏國趙文敏公為篆其扁榜曰勑賜元成之宫云七年開府公示將解化以教事付吳公而命公繼之至治三年晉王入踐大位所居便殿每至中夜庭户輒有聲兩宫為之不寧近臣拾得驢國公等傳旨俾公以苻水祓滌之是夕肅然翌日適當元旦即命設醮於崇真萬壽宫仍出璽書賜元成宫為大護持今上皇帝以公纍朝宿德寵待尤渥元統二年親灑宸翰作元成宫三大字以賜焉至正六年吳公乘化而終以開府公治命屬公嗣領教事中書集賢同奉上旨授特進上卿玄教大宗師元成文正中和翊運大真人總攝江淮荆襄等處道教知集賢院道教事璽書護持佩以先朝所賜開府公玉印寶劍他恩數皆如舊制公既登教席一意精白以佐清靜無為之治綜理庶務悉遵前人成規衆咸安之九年春俄感微恙飲食起居不異常時祝贊禱祠之事未嘗倦廢二月十四日乙亥呼弟子畢集于前語之曰吾留京師五十年早荷聖朝眷遇之隆晚膺宗教承嗣之重未知所以報稱今大期已至當與汝曹永訣其尚勉旃遂語張公德隆曰宗門教位四傳至汝吾可無身後之慮矣十七日戊寅晨起盥手焚香整衣端坐翛然而逝丗壽七十有三卜以十年某月某日奉遺蛻窆于貴溪某山之某仙壇弟子薛廷鳳上官與齡薛起東詹處敬于有興王景平蔡仲哲彭堯臣蔡允中董載靜丁迪吉董宇定王用亨徐守勤彭一寧劉若沖等若干人居元成宫者張從聖倪善成等若干人公性介潔不妄取與自奉殊蕳薄名宴休之室曰素朴齋以見其志三教九流之書無所不讀而深明於儒先理學之旨又嘗受河圗於隱者有昔人未覩之祕而於皇極經丗之説亦暸然胸臆間所至名山洞府必窮探極討以廣見聞道法齋科悉加考訂折衷下至醫藥卜筮莫不精究其術一時賢士大夫館閣名流皆與為方外交公風標俊偉談辨絶人其語國家之因蓽廢置古今之成敗得失與中原故老之遺言逸事𩔶𩔶如指諸掌或有可疑必就問焉蓋狀之可見者如此其隂㓛密行固有非人所及知者矣溍之生也與公歲月同而忝先一日顧獨後死衰朽荒落何能發揚萬一乎汗顔執茟存其梗概云爾銘曰顯顯開府丗皇外臣佩玊瓊琚其從如雲矯矯夏公􅌉桓丘壑以時而至祥麟一角遐觀道妙默贊化機右我仁廟格于穹祗民躋壽域物不疵癘飛飈走霆直其餘事渙揚制䇿竣􅕾仙班出陪巡幸入侍燕間𩔶事纍朝逮今天子人惟求舊洊加優禮巋然鄉山神明别都昭回衣𬒳百靈森扶傳次所歸天子有詔卑以文階冠于師號貴先九列榮亞三司時有久速道無成虧嗟丗溷濁超然髙舉金支翠旗上升帝所之墟巍巍仙壇真遊憩止孔侐且安承之有人永丗無斁祗薦石章用表玄宅金華黃先生文集卷苐二十七
