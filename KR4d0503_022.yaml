body:
  text: 題䟦臨川危素編次番昜劉耳校正讀新宋史汪立信傳淳祐􅉝丑呉莊敏公淵守鎮江承大饑之餘為粥以哺兩淮流移之人我曽大父户部公時客呉公所識汪公立信扵稠人之中挈之俱歸呉公一見與語大恱即留置賔舘禮遇甚厚居數歲與户部公先後登丁未庚戌第寳祐丙辰呉公以觀文殿學士鎮亰湖辟汪公幹辦公事户部公凖備差遣丁巳春正月呉公有参預之命未行而薨汪公與户部公同護其柩歸葬宣城汪公後以法從出當方面終扵端眀殿學士新史本傳載其𥘉見呉公事頗詳户部公諱夢炎而史誤作應炎失扵采聴傳聞之不審矣汪公安豐人史以為澈之孫澈乃饒州人故削安豐而不書非也其取進士史或以為見呉公之眀年或以七年為六年非但自相抵牾兩年亦非榮士之歲也庸謹誌之以俟它日告于史官而訂正焉䟦淳熈名公帖異時士大夫尺櫝徃還稱謂封題咸有定式文雖渉太繁然其貴而不倨卑而不詘亦有足觀者焉此四十七帖自宰執侍從庻僚至于亰官選人揔二十有四其交際之間流風遺俗猶可見也䟦傳氏所受告命溍八歲入學受書扵傅先生後七十年乃辱與先生從孫藻㳺因獲觀其先世所𬒳告命盖修職郎致仕思聦扵先生為曽大父迪功郎致仕大中扵先生為大父修職故有官以長子時中得解而加封其苐二子即迪功亦以長子奎得解而受封迪功苐四子翼則先生之父藻之曽大父也傅氏世業儒異時甞有苐進士者僅霑一命而止先生之上世又皆以慶典推㤙懐才而不試藻妙齡秀發委祉所及將扵是乎在先生名肖說字商佐云書仙都王公遺墨後二首碩畫仙都王公手書孔眀見先主下至㓂凖出師澶淵凡九事號曰碩畫公之以古人自任不輕矣公伯氏魯國文定公事宋孝宗持政枋者十有五年有傳在史氏而公厪宰百里未及大有設施以殁尚頼此書之存其志猶可見公之子是為魯齋先生以授其猶子且謂或有發揮于後者今故家日益凋落而王氏子孫以材自見列扵仕藉者斑斑相望魯齋之待于其後者冝不乏人公之遺志將有託以不墜手澤在焉非直記事纂言而已與仲子書魯齋先生學為世師其承傳之自夫人能推言之而其得於父兄培植之素以為受道之地者世或莫之知也夫以公間生之質又蚤有志于學家庭之間扵一言一動之細猶諄諄告誡使致其謹如此蒙以養正聖功也安可忽哉今之顔狀嬰孩言談性命者觀此帖可以自警矣書葉信公年譜後宋制文臣少卿監武臣正刺史以上在先朝薨卒者實録内例有附傳國史列傳之所本也今者言方建白重修宋史而丞相信國葉公之薨在徳祐失國後三年無附傳之可据溍甞過公故第而拜公遺像扵甽忠堂退又得故禮部尚書王公所撰公墓誌銘而知公平生大節歴官行事之槩兹獲觀公家所述年譜視墓誌銘為尤誰竊意當時名卿大夫相繼淪没扵徳祐以後者冝不止公一人未必皆如公之有後而能以儒世其家也文獻之不足徴者旣如彼幸其猶有存者冝謹襲蔵以俟有司之詢訪焉若夫考其時事而著論􅐌之辭則有秉史筆者在非吾徒所敢知也書賈氏家譜後宋南渡後婺之東陽苐進士者自蘭隰賈公始公諱廷佐字子野父奉直公用故宰相魏國文元公㤙𥙷官而公自真定還居東陽家譜幸完可考縣志載公為刪定官以忤秦檜去國而公主桐廬簿時乞罷和議三書皆缺弗録人無得而傳焉檜俾其君稱藩扵敵國史諱不書但謂之和而臣僚章奏如忠蕳胡公所謂朝廷宰執盡為陪臣者自不可掩公書亦曰陛下為戎人諸侯臣為犬彘陪屬與忠蕳不謀同辭尤可見當時事實𥘉非過為是激切之言也夫和者東都盛時甞以施扵鄰國何獨紹興之事能使人感憤若是乎詔諭之使受書之禮盖不止形扵空言矣予友呉正傳為公畫賛序謂言一至此其君所不能堪是猶以史氏所諱而疑其言之過扵激切也正傳又謂世知有忠蕳之書而不知有公嗚呼自古忠正之士危言讜論湮没無傳者豈獨公哉公之所言則有足徴者不可使終無傳也庸因正傳所序而備論之以俟著述之家訪問焉䟦餘姚海隄記書叙禹之治水備著其濬導之功孟子亦稱禹䟽九河瀹濟漯決汝漢排淮泗其扵海惟曰入于海注之海而巳盖至此無所復用其力是以太史公河渠有書班孟堅溝洫有志至扵海則存而不論也餘姚居天下之東南而地訖于海居人數有海患其故為縣時宋慶暦間知縣事謝景𥘉甞為隄二萬八千尺慶元間知縣事施宿甞為隄四萬二千尺而其中為石隄者五千七百尺其用力扵海皆古所未及可謂難矣國朝易縣為州四十餘年而葉君恒来為其州判官所作石隄以尺計者前後緫二萬四千二百二十五視前人不愈難㢤先儒胡文昭公毎以經義治事分齋教學者所治之事水利其一也自世儒務為髙論而不屑意扵事為之末或者遂指經義為無用之空言以相詬病亦已乆矣君以經義釋褐入官而善扵治事至扵水利亦能用力扵古所未及大書深刻登載巳詳今獨推其能為人之難能者由其知先儒為學之道而經義之果不為空言也䟦臨汝記臨汝記者前進士楊舟為江西行中書掾申屠子迪作也撫州民呉甲以貲致身郡吏又欲援其子乙司臨汝書院錢糓計山長萬士元持不可甲怒假他事属郡倅廷辱之士元不能堪歸自剄而不殊乙遽来受事士元益痛憤引刀絶亢而死士元無子唯一力甲欲㓕其口復假他事俾有司逮繫之諸生皆駭散鄰僧収士元尸而瘞焉乙後自陳考滿挟憲府公牒于堂𥙷儒學官子迪時為都曺掾按儒臺故牘得士元死與乙受事月日白其狀罷遣之且為文弔祭士元御史来監治者欲為乙地而莫能奪其議也子迪旣調官去乙得行其計遂取臨江儒學録其在臨江數自驚謂萬山長至云凡舟之記亡慮二千言其大畧如此嗟乎向使士元死而事覺子迪得閱其獄暴殺人者罪而誅之則記之所述冝有大扵此者頋以歲月相去巳乆且會赦故所記止是予所以哀士元之死悲子迪之志為之掩卷而太息也輙刪其要而論著于篇讀蘇御史奏藁伯脩三為御史在中臺僅四閱月而章四十五上自聖躬至于朝廷政令稽古禮文閭閻幽隠苟有關乎大體繫乎得失知無不言尤以進賢退不肖為急所劾五人皆權要所舉百有九人則世臣耆徳與一時之名流而扵外官下吏草澤之士有弗遺也竊惟國家稽古建官擇正人俾司風紀固將使分别忠邪而為之進退今臺司計簿毎歲最其以甚罪坐免官若干人以微文抵吏議若干人而以㢘能見識察者無㡬意以為世道衰薄故賢者寡不肖者衆而未敢必其然兹獲觀伯脩奏章始知天下未始乏材特患夫司黜陟之柄者好出聲威以立名譽一有所引重輙以附麗為嫌而止是以斥棄常多甄㧞常少也雖然陽城居諌官七年視伯脩為已乆所論唯陸贄裴延齡兩人視伯脩則已畧而又不能如伯脩得行其言非城之賢不逮伯脩盖伯脩遭逢盛際與城所遇之時有不同也昔之序名臣奏議者不專以盡言為功而獨以聴納觀人主之徳豈不然哉讀譚汝楫傳予乆留亰師竊觀四方之士論述時人行事未有若豫章王武所譔譚汝楫傳使人讀之而不厭者豈武之文為可尚哉亦汝楫之事有足稱道故武得以馳騁其筆力如此爾昔歐陽子為桒懌傳謂司馬遷所書皆偉烈竒節士恠今人如遷所書者少疑遷特雄文善壯其說古人未必然及得懌事乃知遷書不誣今人固有而不盡知也夫以汝楫前後捕執大盗百三十有五人旣已無愧扵懌矣然懌惟以交趾獠叛甞𬒳命一徃殺之而汝楫連引兵攻徭賊手射殺其酋又縦兵殱其衆而生致其酋六十一人九洞悉平其討叛黎也與主帥分軍鼎立以相掎角而獨繫敗賊數千人又以偏師突賊圍㧞其守將曁麾下十九人而乘勝斬首四十一級他竒謀儁功有未易遽數者視懌為孰多乎至其以寡敵衆往往挟數十騎出入賊衆三五萬人中子戰殁而弗頋人馬俱中流矢身𬒳七十一創而戰益力及救兵不至潰圍而出猶反弓射殺數人為事盖有甚難而其所遇與懌甚不同也然懌與汝楫﨑嶇簿尉間名位略䓁懌以吏匿其閥用例得兵馬監押而汝楫亦牽扵吏議功狀乆格不下随牒調𥙷邊郡録事判官兹非有志之士所為太息流涕者耶嗟夫使汝楫與歐陽子生同時冝愈信遷書之不誣而懌不得專羙矣世無歐陽子而使武得著録其事汝楫倘藉是而有見扵世復何憾歟庸表而出之以俟後之秉史筆者䟦趙公臨右軍書今人臨二王書不過随人作計如賣花檐上看桃李耳若趙公乃是枝頭葉底親見其活精神者此未易與俗子道也䟦鮮于公書予從公㳺最蚤屢聞公言學書之法予友徐文蔚學焉予未之學也今人窺見公一斑扵㫁楮敗素間率能以書名傾動俗惜予之衰巳乆雖欲復從事扵此以自厠扵諸英儁之末豈可得哉偶閱公所書蘇詩猶想見公引筆行墨時追念疇昔徒切愧悔而巳䟦五常圗伏生五行傳五事所属不皆與黄帝氏合近代建安蔡氏祖述朱子之旨以五事配五行尤與伏生異客有示予以五常圗者乃㫁然以漢儒之說為信必有見扵此矣盖恒性之言始於湯五常之名出扵董子至周子以五行五性互見於圗書而配属之義益著今文雜引易洪範月令諸書列以為圗誠有功扵𥘉學予頋不能無疑焉者洪範之配属其一耳它不能遽數也故於兹圗未暇飾巧言以相稱賛姑質所疑如此幸有以唘之嗣是當有請焉䟦仰山寺碑虚谷禪師重建仰山寺成廣平程公旣為勒銘山門今雙林一溪如與師之上首弟子木巖植復用杜征南峴山故事以呉興趙公所書别本刻寘師舎利塔之左夫毗盧樓閣非有成壞盧舎那所說大方廣修多羅實記而頌之雜華三譯即其别本雙徑大仰香水海中兩浮漚耳峴山故事有足託乎其亦㳺戯如幻示同乎人者也溍與師生同世居同里而不及一登其門睹兹勝縁敬識下方以謹歲月書餘姚新學詩後餘姚學正楊君請于府若州撤廟學而新之予友彦實既為作記歸羙其守長邦人士樂君之志有成而懼来者之弗嗣也復相與播之聲詩以垂無窮之思焉昔者魯修頖宮孔子不書而史克頌之盖羙其君而為之師者弗與也何楊君之得扵羣公者閎侈若是哉記春秋之所不書法之變也歌詩人之所不頌情之不可巳也情之不可巳而至扵法之變夫亦禮以義起者也凡礱斵之宻丹黝之麗紀詠備矣故予為本詩春秋之旨系之末簡云䟦顔樂齋詩濠梁之魚莊子不必知其樂莊子不知魚之樂惠子亦不得而知也夫顔子之樂唯孔子能知之故曰囬也不改其樂七十子之徒容有未盡知之者矣張君知顔子之樂與否人固莫得而知又惡能樂其樂而言之耶是以與張君逰者徃徃取昔人之成說而重陳之盖於此難為言也言筌蹄爾得魚兎者必忘筌蹄得意者必忘言君果能如顔子之無聴以耳而聴以心無聴以心而聴以氣將有忘言之人與君同其樂而以不言之言為君言之矣予何人斯敢措一辭哉書王申伯詩卷後始予弱冠時學爲詩同郡栁道傳王申伯陳茂卿方子踐子發皆以能詩稱者也栁𥘉效粤謝皋羽後自成一家方受學尊父存雅先生而雜出扵謝陳與謝不相識乃酷似之獨申伯别出機軸十數年間星離雲散凡予所與㳺與居而以文字相娯樂者又一時之人物矣延祐庚申秋予忝預校文郷闈㑹申伯繇閩閫白事中書行署相與握手道舊故出所爲詩如干篇清粹圎羙庶㡬霜降水涸而涯涘見者於是茂卿死已乆道傳方入爲國子學官子踐兄弟亦遯迹仙華山中不復與世接頋予乃得從申伯相傾倒扵邂逅之頃聆其詩豈非所謂跫然之音者耶申伯之子餘慶尤善爲古章句且將小屈蟠以求合有司之繩尺而子發之婿呉莱竟以言春秋取郷薦抑又一時之人物矣然則予扵申伯能勿重跫然之喜耶因泚筆書卷尾以志歲月䟦續歸田賦續歸田賦黄山李先生擬漢張衡之作也衡賦不録扵漢史唐李周翰稱衡四十不仕順帝時閹䆠用事欲歸田里故作是賦以予攷之殆不然也衡事安帝為郎中太史令永𥘉中謁者僕射劉珍䓁請衡参論東觀時衡年未四十然則謂衡四十不仕者非也順帝時衡以侍中在帷幄諸常侍共䜛之衡乃倣離騷賦思玄而歸田之遣言寄意無及䆠豎者然則謂衡此賦作於順帝時者又非也盖衡𥘉㳺亰師舉孝㢘不行辟公府不就大將軍鄧騭竒其才累召不應賦之所為作乎衡後由侍中出為河間相徴拜尚書終其身未始一日歸田也豈衡少作此賦晚復悔之邪今先生年逾七十以郡文學滿三歲解印綬去非效衡為空言也欲知先生者尚以予言求之題徐君行卷人莫不有親也聖賢之扵塗人無以異也謂事親必若曽子而後可者盖欲夫人以曽子自為固非曰曽子為獨然而人不能皆然也古者比屋可封而人人有士君子之行豈惟曽子然乎予扵徐君之事則重有感矣徐君以一文學掾弃官歸養其親時之文人才士相與稱道之不置者得不以其事為甚髙而難行也耶夫以徐君之事為甚髙難行者非知徐君者也謂徐君為能然而人不皆然者是厚誣天下之君子也由徐君之道充而至於曽子其可也孝子不匱徐君則庻㡬矣景行行止尚奚以多言為哉記止善集止善集者上虞劉先生自名其所為書也先生名漢儀字山甫伯氏侍御史忠公以直諌有名宋理宗時為史嵩之所毒以死其季華文公亦以材為名監司獨先生用特㤙𥙷官仕稍不顯頋能以道自任旣殁而言立嗚呼何劉氏兄弟之多賢也溍生也後不及拜忠公之子婺州史君而辱與華文公之孫彦徳㳺獲觀所謂止善集者盖先生之學得扵雲源何氏雲源得扵建安蔡氏然先生書所述皆其眞知實踐不苟牽引取合乎師說世之剽掇近似以資口耳者可不少媿哉表而出之以自警也亦以厲吾徒也書把氏阡表後潁州府君遺績可考見者治群盗毀淫祠復水利三事耳師魯載以三百言紆餘反覆曲折備盡辭雖繁不以爲厭及推本其脩于家以至民懐而吏畏將使千載之下猶有以得其爲人事雖略不以爲歉也昔蘇文忠公僅記外曽祖程君辨蘆菔根獄事語又甚怪獨以公名徳重望流傳至今師魯所述視蘇公則已詳把氏得師魯爲外孫而託以不朽視程君無憾矣䟦奉先堂記奉先堂者廣平趙氏家祭之堂也古者大夫士之家皆有廟庻人無廟則祭扵寢三代而下廟制廢巳乆則凡可以致力扵其親者宜無不得爲矧今之堂非古之廟而所謂祭者直薦而已是固無害於禮亦何憚而不爲乎人不能爲而趙氏獨爲之諸公之所稱述未可以爲溢羙也庸表而出之以風于有田禄而儉其親者焉䟦黙成潘公帖考亭朱子稱公所居僅庇風雨郭外無尺寸之田經界法行獨以丘墓之寄輸帛數尺而已此帖所言歴仕二十六年無一畆可耕一椽可居是也朱子又謂公前後在官不過八百六十餘日然則二十六年之中所歴實不滿今之一考俸賜盖亦無㡬冝其清苦貧約也吾郷先逹貴而能貧者惟公及徐文清公而公之襟度尤為灑落烏乎賢哉䟦危公墓誌銘宋崇寧選人七階判司薄尉為迪功修職郎有舉主三貟則関陞令録即從政郎也自從政四遷至承直郎是為兩使職官留守判官猶是選人有舉主五貟則班引而改合入官以職事官改者則吏部具鈔外改則免班引改官後例差作縣謂之須入若它有除擢而理為須入則免作縣也危公已自從政兩遷至文林故超授通直郎盖迪功而上則改亰官文林而上則改陞朝官謂之合入通直乃其合入之官仁和赤縣故公以陞朝官知其縣事也若夫所謂轉官者又與改官不同亰官以上四年一磨勘轉至前行正郎止待制以上六年一轉至諌議大夫止之類是也因陳君論誌銘誤以改官為轉官以知縣為縣令謹考舊制附見于後云䟦吕叔和詩玉山在東陽斗絶䖏旁鄰扵天台重崖複嶺長林深谿如與世隔民生其間不見異物而遷焉為士者徃徃樸茂䔍學而無慕乎其外以材自見扵時者一人兩人耳予甞識吕君叔和扵邂逅之頃别後莫能省記其歲月聲迹邈不相聞今年夏予退直詞林以老得謝而歸叔和不逺數十百里重趼而来函封儷語以為予賀意若謂予今是而昨非也予方為之歎息不已叔和復示予以所為詩予伸𥿄疾讀未及終卷而叔和遽辝去嗟夫天之生材有萬不齊随其所長皆可致扵用然登扵薦籍者恒少而堙没扵窮山腐壌者恒多使叔和肯出而逰扵英俊之域以詠歌太平之盛未必瞠若乎諸公之後也予旣不能為之軒輊而叔和亦漠焉不以窮逹介其意姑志于卷末而歸之䟦蘭亭圖右蘭亭圗趙千里作永和稧集四十又二人其不見扵史傳者世或莫知其姓名千載之下乃有能摹冩其儀刑風度以𥙷史氏之闕者非直可資一時之清玩而已李伯時有觴詠圗好事者已為刻石以傳此圗纎麗㣲宻雖有善工亦未易刻尤可貴也題羣芳圗宋諸王孫前有子固後有子昻人品皆為當世苐一翰墨之妙直冩其胸中之趣耳譬如眀月在空不假浮雲相點綴也題識奚以多為㢤䟦張經㦄徳政記天下之事患不能為與不得為以能為之材居得為之地而時方清寧無事之可為則亦無績用之可言也夏陽張君由中臺出為河西憲府元僚適當天暦兵荒之後用便冝發營田官糧下其估什七以賑糶者一萬石其甚貧而計口給之者二千石仍儲其本錢以糴新粮歸之官倉大家及浮屠氏有餘粟俾悉以市直糶扵民間遏糴者則减其直之半度在宮不食之地作巨冡葬旅殯無所歸者千餘櫝遺骸原野者則歛而瘞焉民流為盗當徒役而親年七十者為建言請暫弛其徒親死終喪乃役之滿三歲無再犯則得齒扵齊民生者無死徙之憂殁者無暴露之苦而不至於匱官勤民化凶惡為良善而不至於廢法是不徒切扵近務固為法之可通扵乆者也盖君以能為之材居得為之地而其時又多可為之事故其績用昭著為人所稱述如此然甞觀古之為民興利除害而號曰循吏者類皆出於郡縣之守令誠令今之守令咸以君之心為心使斯人安於田里以養生喪死而無憾則君雖以能為之材居得為之地不必身任其可為之事而以績用自見也予友張樞有史學善叙事扵君之治迹記之已詳故予獨因其所記而推言之以告夫為守令者有能聞君之風而以君之心爲心則斯人之幸也題温上人墨戯二首日觀作此畫後四十六年自題其卷尾云恰如一夢又四十六年而道士葉君出以示予扵是日觀之夢覺乆矣今之視昔已如彼未知後之視今何如也温師戯墨妙絶當代而好書可喜可愕之語附見其旁故觀者無不駭歎以爲竒予所見數十本莫不皆然殆近乎有意爲之也䟦常掾平反序晉寧府掾常某從其推官劉君慮囚稷山有張甲者坐殺兄獄具已乆常掾閱其牘知有冤白于劉君直而出之劉君深服其詳敏自以位卑莫克論薦廼序其事而傳焉漢史稱于公爲東海决曹决獄平頋其可見者獨孝婦不殺姑一事而太守不能聴嗟乎婦之不殺姑與弟之不殺兄事正相類常掾能為于公之所不能為者非常掾之才有大過扵于公盖其所遇不同也然則劉君賢扵昔之為太守者逺矣劉君方入居史局倘采録而登載焉亦足以見當今吏稱其職而天下無冤民前代所不及也安可以為小善而略之哉題朱掾辨誣詩卷後人莫不有是非之心充是心也行扵朝廷則為公道發扵士君子則為公論公道廢而後公論興公論息則天理㓕矣敬之以剛直取怒受誣而臺府為别白其是非以昭雪之朝廷之公道行矣奚以士君子之公論為哉諸公猶嗟歎之永歌之而不已者非專為敬之發也盖將使在髙位而無是非之心滅天理窮人欲者聞敬之之事足以戒也敬之之事前序已詳兹故弗論獨論其所以不宜無傳庸俟夫觀人風者焉䟦右丞葉公上書副本宋景定甲子秋七月彗出栁詔求直言三學之士皆有書言朝政缺失故尚書右丞葉公李時㳺亰學與同舎生唐棣等八十三人叩閽上書斥言宰臣賈似道專權誤國尤為剴切似道知奏藁出扵公八月令亰尹劉良貴捕寘于獄以僣用金飾齊扁為公罪竄漳州徳祐乙亥似道以喪師謫漳州乃放公自便𥘉世祖皇帝親揔六師駐江上而憲宗皇帝奄棄群臣世祖歸正宸極鄂州圍解似道方宣撫亰湖邀為已功遂入㩀相位公書所謂適有天幸克成厥勲是也中原士大夫徃徃能傳誦之國朝旣取宋至元十四年命御史大夫相威行臺江南訪得公於杭州即以公提舉儒學二十四年尚書省立由提舉召拜左丞尋遷右丞二十八年卒扵官東山朱君伯清少與公同師事太學博士施先生南一公之獲罪人莫敢近朱君獨具服食之物遣所親護送以行及公居政府士多由公以進公數遣迎致朱君訖謝弗徃以布衣終公南去時朱君之子文韶甫七歲臨别以所上書副本授之文韶襲蔵惟謹迨今八十年莫有知者文韶没後其子夫驥始出以示溍俾志其歲月于左方以俟秉史筆者采擇焉䟦李西臺書考亭朱子與尤公延之評西臺書足以見前軰不務爲苟同洪公景盧旣不敢可否扵其間樓公大防又不過署氏名而巳後學尚何言哉䟦宋諸公遺墨右宋人尺櫝十有二凡十人雷知院孝友宇文簽樞紹莭同事茂陵而呉節使瓌憲聖猶子曽開府覿夀皇潜邸舊人此卷先執政從官次宗戚近臣以及庻僚而不復計其時軰之後先又以蔡尚書㓜學為中書故亦寘扵鄭侍郎作肅之後贉卷𥿄有小墨印曰臣陳瑾重背造是必甞歸扵秘府矣此十人者不皆以善書自名當時相去又未乆不知何以貴重之如此徐君扵六十年後得之五千里外豈不可為竒玩也哉䟦乾淳四賢墨跡四首朱文公與大愚帖淳熈丙申公用執政薦除秘書郎而群小間之尋降御批曰引虚名之士恐壊朝廷公亦辭不拜且有與東莱書時公新作草堂於雲谷以待来學故帖中云諸况已具恭兄書中腐儒之效如此豈敢復有傳道授業之意但欲杜門念咎以畢餘生也公以六月辤除命七月不允再辤十月乃奉祠崇道故帖中云一請徃来動踰兩月也大愚任四眀倉曺在壬寅冬距公之得祠首尾七年帖中稱之曰監倉者必作扵其需次之時也張宣公與東莱帖乾道辛卯春詔以知閤門事張說簽書樞宻院事公時以左司兼侍講手䟽極言其不可命中寢而宰相隂主之乃出公守袁州壬辰春遂伸說前命帖中云元晦之約竟能成否宜春闕在来年六月若不𬒳汰斥果成赴上則眀秋可邀二兄過彼相會然公自去國退居三年袁州之闕竟不及赴淳熈甲午乃起帥廣西東莱以正字丁外艱是年夏服除奉崇道祠秋入越故帖中稱之曰主管正字且問其留㑹稽幾日公作此帖於冬𥘉廣西之命盖未下也吕成公與某少卿帖少卿莫詳為誰公以宣教郎繫衘者帖作扵乾道辛卯七月改亰官以後九月除舘職以前也吕忠公與石應之帖應之名宗昭越之石氏東莱門人公作此帖扵紹熈甲寅之正月云妺子姻事歲晚巳畢而同月有祭妹之則作此帖之日妹猶無恙也帖中後一段盖應之哭内已乆故公欲其得賢配為内助而公有女將適其子故帖中云此自君家事累𥿄叨怛近扵強聒又云然渠成亦秦之利也其稱應之曰正字者應之乾道壬辰乙科進士至是巳餘二十年必召試入舘也䟦項可立序舊仲舉家故官族四世祖謝公廓然仕宋孝宗時致位執政仲舉以世殊事異淪落不偶變姓名食扵一技人莫識也可立以家世之契且有連獨識之邂逅逆旅中旣與之飲酒又為文與之序舊士大夫始知仲舉本閥閱子弟稍加禮遇焉可立為誼則厚矣亦豈仲舉之志哉予觀昔之隠者徃徃混迹庸衆人之間要以自全而已近世所謂髙人逸士身居物表而名聲常赫然諸公貴人之間其智頋出仲舉下何耶予固非敢謂仲舉為賢扵今之髙人逸士竊獨因世道之不古而扵仲舉之事重有感也然則可立之文曷冝無傳乎䟦黄希眀字說易大象離之體十有六或為火或為電獨離晉眀夷四體為日大眀日也故傳不曰日而皆謂之眀用易者之扵日取其眀而已然予觀易之稱名取類也不一晉之彖象同稱眀出地上而彖言麗乎大眀者眀在彼也象言自昭眀徳者眀在我也新安黄君名晉而字希眀夫希之為言觀也慕也唯無慕其在彼而觀其在我者焉斯有以合其眀矣君以字說来求予題識其後乃為本諸易而申言如此云題呉興趙公書洛神賦此趙公被㫖書寳陀寺碑時所冩公是行遇暴風昌國鉅海中舟垂覆而免殊不以為意方且㳺戯翰墨及乎屏翳収風川后静波之句豈非善謔者哉即此亦足以觀其雅量矣䟦歐陽文忠公帖右歐陽文忠公帖奉職者公苐十三姪與其弟十四郎名皆未詳帖中云十四郎自縣中来三班奉職右選卑官必為監當扵一縣也公以皇祐四年三月丁鄭夫人憂五年八月自潁歸葬扵吉而此帖作扵是年之正月盖因遣人求墓誌而附致之也别一帖云只十六程可到必潁之隣郡但墓誌不傳莫詳所稱知府舎人為誰或誚公不當言官職難得只教以脩天爵奉天職可也伏觀此帖雖不㩀古傳經為甚髙論而勸戒之辭諄切懇到出扵至情與家人語當如是也蘇文忠公甞䟦公與十二姪司理等帖云凡人勉強扵外何所不至惟考之其私乃見眞偽此歐陽公與其弟姪家書也又云聞公之子季黙編公牋牘為一集此數帖尤有益扵世當録以寄季黙蘇公真知言哉記髙祖墓表後右迪功郎黄公墓表公溍之髙祖其葬也宗正丞兼左司郎官朱公元龍方奉祠里居故我曽祖戶部公求爲之文表于墓道曰迪功者宋紹定辛卯公以東朝慶典受封𥘉階也後以户部公景定間再遇眀堂恩庚申贈宣義郎癸亥贈承議郎咸淳丁卯又以郊恩累贈朝散郎髙祖妣宗氏累封安人後公二十七年卒年九十有二曰孺人者亦其𥘉封也子男四人長諱夢炎即户部公是爲溍之曽祖㓜能屬文年十有一郷先生或戯謂曰小甘羅之一歲早已能文應聲曰加孔子之數年可以學易郷先生大竒之表所謂挑以文應口輙對是也旣而以紹定戊子嘉熈丁酉連請兩浙轉運司文解表云再薦于漕者時猶未第也公殁後八年乃以免解擢淳祐庚戌進士第仕至太常丞樞宻院編修官左曹郎官以朝請大夫致仕後公三十年卒年七十次焱𥘉户部公客于觀文殿學士少師吴公淵假以勇爵使就試於漕闈非其志也掇俚諺為唘以辤曰舉子忙槐花黄早已覺壯心之動時文熟秀才緑要須取本色而歸呉公嘉其志而不容其卒辤乃以回貤扵焱後累遷忠翊郎權安慶府望江縣令炳盖其舊名也後公四十八年卒年八十有五次焕所後父曰伯恭公之毋弟次熒以公殁前一年𥙷太學生後公二年卒年二十有八女二人長適王囦金嘉熈戊戍殿試苐五人授從事郎昭慶軍節度掌書記未上而卒表不書節鎮軍號而書州名曰安吉者取其易知也次適劉瞻孫即時孫也户部公二子長垓次承節郎諱堮是為溍之祖一女適劉景辰有子應龜太學内舎生望江令二子長埴次壔咸淳己巳户部公以眀堂恩當任子輙推以與壔故户部公之子無用廕入官者壔未命而户部公遭内艱尋更名君澤以進武校尉試有司名不見扵表者時猶未生也一女適朱叔麒登咸淳戊辰乙科授從事郎䖏州軍事判官遷國子監書庫官太學生一子埈一女適劉璨埈生扵嘉熈𥘉元而承節公生扵隆興寓舎表所書皆小字時猶未名也其後埈又更名景山云孫女實三人而表云四人莫得而詳也惟我髙祖妣之葬户部公所為壙誌有墨本傳蔵至今而髙祖墓表石弗存已乆溍生扵髙祖旣殁三十五年之後年今七十始於朱公家集獲見其文追慕感泣不能自已大懼歲月寖逺墜逸不傳謹錄而蔵之并䟽其纎悉委曲俾我後人尚有考也曽玄而下表所不及者家譜存焉書曽大父代朱簽判作唘劄後遯山朱公蚤從我曽大父户部府君㳺户部府君竒其材以仲弟望江令之女歸焉公年二十有六擢龍飛乙科𥘉筮處之幕職祗事伊始例修竿牘之敬自通扵臺閫守倅交代同寮皆户部府君爲之具藁盖以文爲贄在盛時固有之其爲禮之煩苛則至季世而極重緘疊幅累百千言間有以一二聮援据之切偶儷之工而被知遇者精搜巧琢尤不敢率易焉場屋之士甫就選調門無食客佐其操觚染翰鮮不資扵父兄師友渡江後名公别集所載可見也逮今盛時風俗復還扵淳古上下之交際以實而不以文公雖勞神州縣垂三十年莫有責以向来煩苛之禮者矣自公得謝而終老于家又不啻四十年當時故事有後人耳目所不及接者焉溍近因裒輯户部府君遺文而得此藁凡爲啓劄緫若干通輙録以授公之孫濂俾謹蔵之濂䔍於學而酷嗜爲古文若無用此爲㦯者觀其舊俗而有以驗今昔質文之異尚也金華黄先生文集卷苐二十二
