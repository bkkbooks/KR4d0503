body:
  text: 記麗水縣善政記法出乎朝廷承而行之者有司也至于法久弊生姦吏乘之下蒙其害而上不察則承而行之者有未善也法不可遽變而弊可以漸除能發其姦而去其泰甚斯為良有司也巳昔人謂寬之一分則民受一分之賜豈非然哉厥今東南為民病者莫甚於鹽策始則亭戶患其耗而不登次則商旅患其滯而不通及均敷科買之法行而編民之家無貧冨莫不受其患况夫吏得肆其姦則民之不堪益甚矣松江府判官致仕王君仲達𬒳省檄執事于秋闈過豫西湖上為豫言曰吾所居麗水縣之民歲當食鹽以引計者六千三百三十有七姦吏暗减它縣額而來抑配焉增加引數至九千一百三十有七賴吾長官賢眀以闔郡丁口通計之而白于上官去其所增加者為引二千八百由是民獲少蘇蓋吾長官之善政不一而足惟兹事民受其賜最厚幸為我記之豫自筮仕以來佐治瀕海州縣目擊鹽事之病民顧以政非已出末如之何麗水之政不亦豫之所樂聞者乎輒弗辭而為之記以遺仲逹俾歸而與其父老刻諸庶幾嗣為政者有所据依而播其惠於無窮也其長官名某今以承務郎為縣之逹魯花赤云蘇御史治獄記至順二年冬十有一月趙郡蘇公天爵由翰林為御史南臺時方用中書奏遣官審覆論報天下獄囚三年春正月公甫就職即分涖湖北湖北所統地大以逺其西南諸郡民獠錯居俗素獷悍喜鬪爭獄事為最繁公不憚山溪之阻瘴毒之所侵加遍履其地雖盛暑猶夜篝燈閲文書無少倦囚有言其冤狀者公曰憲司歲再至不言何也囚皆曰前此慮囚者應故事耳聞公至當受刑故不得不言公為之太息事無巨細必盡心焉辰之沅陵民文甲無子育其甥雷乙後乃生兩子而出乙乙伺兩子行賣茶即舟中取析薪之斧並斫殺之既沈斧水中而血漬其衣跡故在事覺乙具服部使者顧以為三年之疑獄而釋之公曰是事二年半耳不殺人何以衣有血汚何以知斧在水中且其居去殺人處甚近何謂疑獄遂復置于理有龍光祖者買官得同知某州事用例奪官家居其子及家奴言胡孫溪有吾家故所請射官地而宋某來耕其上今宋已死冝募佃者光祖從其言而宋之子乙來爭此地光祖以牛米鹽遺洞蠻使與佃人夜持兵圍宋所居盡縛其家人以去佃人指乙兄甲謂洞蠻曰不殺此人恐走出洞事泄遂射殺之而散賣其妻子于諸洞甲既死乙竟脫歸訴其事吏受賕止以占田坐其佃人置光祖不問公曰殺人而坐以占田可乎乃諭洞蠻悉出宋家人而正殺人者罪沅之麻陽民張甲彭乙爭溉田水交惡張以禾方熟夜往視之彭適過其處張因殺之而誣以盜禾取其家竹䉂實禾為驗吏以為所殺者真盜也將貰其罪公曰彼盜汝禾用手取之耶抑用鎌也曰用鎌耳公問鎌安在不能對乃論如法有黃天發者兄子四人仲獨冨而其季性剛愎與諸兄數有爭且陵侮天發仲欲殺季乃告于天發而以錢與謝某者使共殺之季妻發其事仲謂天發曰兄殺弟則罪重叔承之則罪不至死叔婦子某能衣食之天發許諾尋就逮自言實出錢與龔某者使殺之龔蓋仲之舅而其妻則謝之母也仲吏如其言文到成獄公疑有冤訊之果然乃以始謀者為罪首常德之桃源民盧中莫乙汪丙同出求傭工於人甲誤墮水死甲弟之為僧者欲私甲妻不得訴甲妻與乙通而殺其夫乙不能自眀言實與丙同擊之至死慮其復蘇斷首棄草間而棄尸與仗于談某家溝中吏往視之果得髑髏而尸與仗皆無有公曰尸與仗縱存今已八年未有不腐者呼談問之則甲未死時其因已瞽而謬云曽見一尸為水所漂去公知其誣語吏曰此乃疑獄且不止三年也卒釋之楊乙者始娶而得悶風疾其妻惡之逃歸父母家乙往追取其聘財婦翁以訴于官事未决而乙於屠者燕甲家見其妻因與甲鬪歐既去而至屠者燕丙家責所貸又與丙鬪歐而去中路病發死其母知無它而恐官以前事來索之故極以聞吏不察乃捕繫兩屠者治殺人事公問其母得乙風狀兩屠者賴以免印社子者問同里民家女為妻未及娶而周某者耻與為婭壻止婦翁使勿嫁社子恨周而殺之楊惠孫黃文德皆里中大家故有怨社子本受傭惠孫所又適僦文德屋以居文德因嗾社子援楊父子造謀使殺周惠孫彊服而不能言其故𥘉言周捕其子姦事而殺之次言周通其妾而殺之後徙其獄龍陽則又言過洞庭遇風禱于神許採生以祭而殺周取心肝祭之公閲其牘曰前二說既非是使如後說有尸可驗猶未足信况無尸乎及詢得其實則教之自誣者衛推官也於是社子已瘐死乃出楊父子破械遣之州人劉文貴死妻弟同郡朱德來省其姊文貴養子飲以酒數日而患腹脹文貴次子與養子爭家財有隙因謂德曰得非中蝦蟇毒乎搗烏桕根和酒飲之得暴下視之無它毒而病愈劇德歸具以養子言告其母其母以聞于官未及逮問而德死録事及武陵縣官來驗其尸皆以銀叉探口中色不變定為病死衛推官者先以他事怒録事欲假定驗不實為其罪更命龍陽知州聚檢作中毒死辭連三十餘人養子已誣服公疑有冤為訪諸路人且諭使吐實衆皆曰獄辭盡衛推官教我云然公既反其獄併按衛推官罷之凡此皆死獄公所平决未有不得其情者也冨者以佃客家人死而蒙非辜公則直其冤貧者以年飢取他人穀因擊傷之而傳重議公則薄其罪所活又數十百人澧之齊氏沅之曺氏駱氏靖之唐氏並雄於資而善持吏短長為民害齊因湖泊官不聽其撲買而汙以他事曺與駱有罪例當施粉壁著其過惡遂藏去省檄以滅其跡唐以白身為黃平府判官追奪之令下而拒不納公至吏始克舉其法無所避有以婚田來訴者公雖歸其事於有司後必詢所處當否即有未當折以片言莫不心服而去公既召還兩入臺為御史湖北之人思之不置而士之有文學者太祝周君歷叙其事焉昔者于定國嘗為御史矣而其為廷尉也居十八歲乃遷夫以十八歲之久事之可書者冝不一而足史厪存其父于公爭孝婦不殺姑事而于定國之事一無所登載第稱之曰民自以不冤而巳豈非當時軼其傳而史家無述歟竊用是有感于公之事輒因周君所叙剛取大略為之記以慰其人之思後之秉史筆者或尚有考也公今由中書禮部侍郎出為江北淮東道肅政廉訪使云玄靜菴記冲真眀逺玄靜真人張公無杰築室于信州貴溪縣之金雞山曰玄靜菴用所受賜號為扁名也元杰之先有為唐宰相者與漢天師同出於留侯子孫家于貴溪之上磜里有仕宋至刑部侍郎者於元杰為六世祖嘗與里人共構精舍於所居之西延陸文安公講道其中俾子弟受學焉文安以山形如象命之曰象山人因稱文安曰象山先生象山又西十里則龍虎福地也元杰學道於祖庭而侍祠於帝所從其伯父大宗師開府公及其所禮嗣師吳公居亰師之崇真萬夀宫逮今踰四十年數被上旨函香代祀嶽鎮海瀆汾隂后土龍虎武當諸山至正六年夏竣事於上清正一宫退而徘徊乎家林由上磜㳂大溪折而西行覩重岡復嶺支于象山之東南披荆榛而進得勝處焉即所謂金雞山也舊傳有金雞自石穴中飛出因以得名其地外廣衍而中寬舒泉深壤夷草木幽茂乃據其風氣之㑹以營樂丘且鑿山纍石創置兹菴將俟它日退休而與名人道侣相羊其間百歲之後遂以為棲神之所追惟侍郎為時名卿有傳在史氏而金匱石室之藏世莫得見乃謁文于史官豫章揭公以表其墓并請志其先人隱君之墓而銘之以侍郎徙居鄱陽而葬於其城東北之鳯凰岡去故山逺乃立石于菴東而覆以屋隱君之兆域則相距五里而近并以志銘附於其左開府公受道於其兄通真觀妙玄應真人溪之南曰石龜渡冠劒在焉清風拱木蔚乎相望雲臺藐姑龍井諸峯二十四巖山雲之伏興朝暮晦眀之變化千態萬狀交呈互獻于其前溪水來自七閩縈為三折而掠山之右匯為澄潭浮光靜影可坐而挹也元杰既圗其怪竒偉麗之觀求內翰虞公為之賦詩復疏興作之詳屬豫以記豫聞有道之士必乘天地之正御六氣之辨以逰無窮而未始有所待視夫以泉石煙霞為膏盲痼疾者固未易同年而語也至於變幻出入於靈仙飛化之術直其餘事耳翛然而來莫知其所始翛然而往莫知其所終尚何樂於兹丘乎夫亦寓意於物與人為徒者也又豈世俗文筆可得而記乎所可記者皆其名迹之粗而已唐宰相曰文瓘侍郎諱運政和中進士終于左通奉大夫敷文閣待制纍贈少師開府儀同三司隱君諱某元杰名德隆元杰者其字也自號環溪云澄碧堂記道士四眀吕君所作大瀛海道院翰林學士臨川吳公實記之頃豫至四眀數與君遊君復求豫記其所謂澄碧堂者豫未及為而去後三年來錢唐見君三茅觀求益力豫不得辭也𥘉司馬錬師居天台嘗自題其宴休之所曰澄碧而大瀛海者陶隱居丹竈故處也君既得度於崇道觀而受上清法籙于華陽宗壇至是因取錬師舊題以名其堂所以示後人使知承傳之自也按隱居始築室華陽尋變姓名至永嘉楠溪青嶂山泛海詣霍山經年還木溜嶼受戒於鄮縣阿育王山今道院在象山縣爵溪之陽與阿育王山相望其為隱君遺跡無疑錬師天台所居則今崇道觀是也蓋自楊君七傳至隱居隱居傳升玄王君升玄傳中嶽潘尊師中嶽傳錬師由錬師又三十三傳至今劉君號為宗師君所從受籙也昔劉歆叙七略神仙數術與道家為三而其後一歸之老氏老氏之徒以經籙相授受者復分為三而其後一出於張氏張氏之傳子孫世守之而其術長于執不祥劾鬼物人見其驅飇赱霆變化翕忽無不敬異師尊焉而又有穹官峻爵為世所歆艷冝乎星冠羽服之士慕而趍之雖華陽之弟子亦未有不為其學也君顧能拔去流俗溯其所承傳而表見之豈不猶行古之道哉嗟夫古之學者必有師自巫醫百工莫不皆然非獨儒者為然也若君之為可無怍矣此豫之所不得辭而為之記也其亦以厲吾徒也茅齊記玄覽真人王公治杭之開元而别業在德清之玉麈山曰開玄道院青原龍先生實為之記其燕息之所曰開玄堂則蜀郡虞公記之既又俾大弟子張君來屬溍記其茅齊者按縣志百寮山一名東主山公始摘吳大宗師詩語易以今名蓋公嘗侍祠眀庭謁欵介丘退而休于故宇厭名城之紛華爰擇地兹山而特據其要負雲嵐揖泉瀨徘徊乎穹林絶壑之間以就聞曠而遺煩囂謂道院神眀所舍不可褻復為堂於山之左而居焉自桃源洞蓮花池至于玄泉有亭看雲有樓介春有室堂之四旁花石瀾楯與房櫳相曲密而琴樽圗史竒珍祕玩環列其中四方之賔客慕人境之俱勝而來從之遊者㦯兼旬纍月無不各適其適而去公因喟然曰張樂設餌而過客以止老氏所薄盍求於所謂淡乎無味者而與之相忘乎堂故西面乃即其前山之麓結屋南向為楹間者三覆以白茅號曰茅齊制度朴古規模蕳略屏几龕座以竹若蒲衾幬以楮杯器以陶藥爐茶竈待用之物惟取粗具清風愛日環堵蕭然公居之既久世慮莫能入年踰七袠身益輕強返聰還眀而有得于內向之玄覽者亦將滌除而無疵矣凡居處之道大率有二近乎髙眀則志廣而不滯安乎淡泊則神全而不虧苟欲事於內外交相飬者未之偏廢也公何獨去彼而取此歟德人天遊不纍於物太虛以為家無何有以為鄉一席之廬直其迹之寓耳若夫彼此不形異方同得固非拘儒曲士所得而窺也况以溍之鄙陋焉敢自附于大君子之末而強贊一辭哉庸悉取張君之言而謹志之其見於前刻者兹不書雲巢記羽士葉君學道龍虎山之上清宫而結廬于宫之東五里號濵洲菴其西偏為屋以欵四方真遊之侣名之曰雲巢清溪橫陳俯見毫髮茂松密竹左右蔽虧麈湖聖井琵琶藐姑射象山諸峰華潤峭拔若夸竒而競秀林霏靄隱見伏興于戶牖几席間仙者金蓬頭多來遊其處方外之交咸附集焉濵洲有記虞公伯生實為之文所謂雲巢者則范公德機嘗大書其顔而未有為之記者君來俾豫記之古者生人之初未有家室晝拾橡栗暮棲木上是為有巢氏之民向之橧巢今既易以厚棟廣宇矣矧兹名山奧區仙聖所宅璿臺琳館挾日月而抗星辰不知與人間隔幾風雨顧猶有薄蓬萊而羞崑崙者指天路以孤騫度重雲而一息託名于巢以喻其離世異俗之意此豈尋常懷居之士所能窺其髣佛哉雖然是固有待以為依者也若夫無所待而足無所依而安逍遙于萬物之表而以無何有為鄉太虛為家則廽睨夫雲層之峩峩又在履舄之下矣然則君之所以寓其迹者安得以豫之寓言盡記之乎豫聞危君太朴時携書就讀其中姑以豫言與之商而刻焉可也君之名字與其師弟子之源流見于菴記者兹不復云仁夀菴記仁夀菴者無錫強君退休之所也君少負志氣能自植立以文學起家歷官五品用著令貤恩父母以及其妻因自念邅時承平天子方施錫類之仁以廣孝治榮光所𬒳萃于一門欿然深以滿盈為懼年未及謝即上懸車之請朝廷欲寵嘉之以獎成亷退之俗遂如其請而官其子時君長子可仕從事帥閫成資以待調于銓曺乃任其仲子可大俾尉一縣君既釋組綬而還兩子又皆有祿秩以為養始得肆情丘壑不復以世故自纍爰相善地營樂丘于州西北五里粲山之陽而築菴其旁締構杇塓朴不近陋華不過侈有室可居有堂可以奉賔客有閣以登眺有亭以燕嬉曲徑方池尤花異卉可以近清涼而娛淡泊使來告曰菴以佚吾私丘以息吾歸也幸為我志之曩者君蓋以仁山扁所居之堂矣今名其菴曰仁夀者仁其體夀其效也君嘗建義孰梁溪上以淑其里之子弟設義冡兹山之下使貧無葬地者咸葬焉此又其仁之見諸用者也為效豈旦夕之近哉抑豫聞是邦以慧山為巨鎮靈秀所鍾欎而不泄土厚石堅草木蒼潤泉發其中雅於茶事為冝陸羽品之為天下苐二誠宇宙間名區奧壤也兹山岡連隴接而特據其勝處去人境不逺而幽靚閒美若與世隔非有隱德莫冝居之慧山有仙者徐神翁之徒盧君遺迹安知其人不往來山中而與君遇乎君儻得而友之則刀圭之益為夀有非數量之可計且將乘雲氣騎日月而逍遙乎六合之外尚焉因兹丘為惟仁者之必夀本於吾聖人之言可徴不誣而今之名菴者克協其義是冝有述然不敢勦取先儒之說而重陳之姑承君之命叙次其大略如此君名以德字振之由湖廣儒學提舉以某官致其事春秋甫踰六十云𥙿菴記金華程君與其妻童氏相繼卒其子友德友實葬之城北十五里峽石山既又取材于市即其旁大治冡舍屋之以間計者若干役工三閲月乃畢堂宇豐整室廬靚幽歲時汛掃饋薦有禮仍買田若干畒用為經久之規㑹豫以漫遊留芙蓉峯友德自峽石來請所以為扁名者豫為名之曰𥙿菴蓋豫與君居同郡閒從先生長者聞君之為人素願慤起家儉勤不喜飾邊幅恆以冒進為耻逾其涯分為懼口不談當世之務足不踐權貴人之門從俗浮沉而優遊以卒歲君之自處可謂綽有餘𥙿矣抑嘗見隂陽家言凡墓地雖以乘氣之淺深驗受䕃之薄厚然名山勝地非有積德者莫冝專之峽石在仙人赤松子錬丹山西由山之麓緣修蹊歷崇岡而上至其處乃更平衍佳木美箭茂密而蒼潤穹巖巨阜形附勢趍或擁其後如負㦯環拱其左右如伏如興兩水夾山下注山盡水亦止如返顧不亟去其前溪南諸峯效竒獻秀可俯而與之揖山之西尤多靈蹤異迹瓌詭之觀其又西則道書所稱金華洞元之天也夫以宇宙間清淑所鍾鬱為奧壤而君之體魄託焉以寧殆庶幾隂陽家所謂有積德者其垂𥙿乎後詎有既耶在謹其承而已友德再拜曰菴之得名則既聞命矣惟先人名不列于仕籍非有伐閲功勞可登載不敢輒求銘于立言之君子願記今名菴者歸刻諸石或者先人尚賴以不朽也豫竊嘉其言而矜其志乃弗辭而記焉君諱文字光逺其卒以至順二年四月壬申夀六十有二童氏之卒以元統元年八月戊子夀六十其年十二月庚申朔葬之日也友德兄弟預上其所生母某氏之樂丘實同兆域云永思菴記永思菴者常熟趙氏之墓廬也趙氏家故汴人宋南渡時由汴入吳至常熟遂卜居而占籍焉有名至善字性存者䔍厚君子也年八十有八性存生德字潤之樂善好施常儲粟俟凶年下其直而出之遇貧甚者取所入之錢密置粟中以資其薪㸑凡推心類如此年七十有三潤之字雯字雲卿醇謹出於天性亦習于家庭者然也年七十有七雲卿生壁字君瑞謙恭雅飭卮匜圗史陳列左右日與親朋相娛樂自以為太平之逸民年六十有一蓋自汴入于金先隴隔絶已久四世皆葬于常熟西五里感化鄉之邵家灣其地前臨尚湖後負虞山曲澗縈廽于其太平岡偃伏于其右泉疏壤夷草木幽茂神靈所安鬱為佳城君瑞有子二人曰益曰晉相與謀闢地築菴于兆域之東屋以間計者若干中建祠室為歲時饋薦之所買田若干畒以供粢盛俾浮屠氏主之仍用其法妥置像設崇勝因以資冥福又東為兩軒以備遊息摘大雅永言孝思之語名其菴曰永思欲使後人久而勿忘也爰伐石求豫記之豫聞古之思其親者齊之日思其居處思其笑語思其志意思其所樂思其所嗜此將祭而齊當齊而思詩人所謂綏我思成孔子所謂以時思之其思有時也若夫知事君不忠之非孝則言必思忠知蒞官不敬之非孝則事必思敬知居處不莊之非孝則色必思溫貌必思恭記禮者所謂一舉足而不敢忘父母固無時而弗思也豈必歲時饋薦至於墟墓之間而後致其思乎趙氏自北而南一門四丗善不近名並以髙夀考終于家視古人可無忝尓子尓孫能無時弗思斯能久而勿忘其遺風餘澤雖百世不泯可也君瑞不惟有子且有孫矣庸因記而發其所以名之義以告焉瑞芝記客有為豫言𬗋芝生上海郁君先隴者其莖四白芝生其旁奉祠之宇者其莖七異米同芳相望尋尺間不模而圜不膏而澤蓋非人力所能致而自至者也豫聞而疑焉它日過郁君觀所謂芝者客語良信君復出其常所往還鴻生顯人之歌詩若干篇而求豫文為之記夫芝希世之産也非希世之士不足語此而豫安能言之顧嘗獲陪羣英出端門謁胄監仰視殿楹有芝在焉連跗儷蕚亭亭尓奕奕尓竊意文章之英氣渟涵勃鬱外發難遏而有託于草木之芳華也殊祥異瑞千載之一遇詎謂窮荒下土而復見之耶豫方惜其眇兹海裔不得與昔所覩者侔光齊榮而猶幸其不失于樵兒牧竪之手使吾儕得以玩其華而播其實也向令託根禁近將見竭史氏之才殫詞臣之技形容之不足而今也以豫之蕪陋記之而有餘此又芝之不幸而作記者之幸也豫聞郁君父子世種德稱善士而其諸孫復好讀書為文辭安知異時不有挹膠庠之餘芬以合符兹瑞者而豫陳人也尚當吻渴筆為君賦之逺懷亭記東陽蔣君子晦作亭名逺懷亰兆杜君伯原為之篆題而未有發其所以名之義者子晦既不可作其子允同允興允亨允升相與謀而以記來屬于豫蓋子晦之先家于東陽者十一世乃定居縣南二十五里之橫城曽大父迪功府君生于宋季用入粟佐邊𥙷𥘉品官而不汲汲于求進平居淡然無營惟務擇師勗其子弟于學且將推以淑其一鄉未及有所為而逝大父建昌府君有材幹而倜儻尚義纂承先志以景定元年即所居之西建講堂寢室齊廬直舍及庖廩之屬為屋以間計者總若干割田租一萬以隸焉號橫城義孰迎致故禮部尚書方公為之師公時自著庭歸臥蛟峯下欣然為之出其立教先德行而後文藝凡所揭示一本於先儒月書季考具有程式擔簦負笈者不逺數百里而來居無何聞廷議欲卑以婺之郡符東陽婺屬邑也公遂撤臯比而去鄉先逹見山喬公霽月陳公存齊吕公繼之四明東洲吳公又繼之為教悉遵其舊法戶外之屨亦無减于昔名人魁士項背相望後生晚出頭角嶄然見于題名石刻者六百八十有五人建昌之諸父元善兩膺鄉薦從弟今猶子朋龜並登上庠領胄舉長子國光尋升學館仲子國賔從子國華國珍俱取漕薦咸淳六年建昌為仇家飛語所中不得安其居而孰廢矣天朝奄有南土至元十五年命左丞廉公行中書省于江右聞其久在廬陵亟遣招之見其磊落不羈論議亹亹知為竒士力加甄拔授進義副尉南康路建昌縣主簿時已年踰耳順拜命之官不久辭歸距祖居三里所營别業于南溪上以處其季子即子晦之父穀城府君也既又遷義孰故宇之僅完者于溪東更號城南精舍謀復合子姪及里之俊秀羣居而肄習焉二十一年精舍甫就緒而建昌殁穀城逢時休眀慨然以材自奮久留亰師且有官簿于朝暨出為穀城尉倦遊而退休于家林遽以疾終精舍亦廢矣子晦自以生晚不及覩家孰之全盛而其美意不可不續圗起其廢而有不暇給爰卜地於精舍故址之南百步曰黃金塢雙峴擁其後鄰邑之桃巖龍門諸山拱揖其前而東岡獨據其勝處以至正元年六月構屋其上為楹間者三舁石刻置其中外為小軒以憩來客而便觀眺曰逺懷亭者示子孫使勿忘也故翰林學士侍讀尤公序東陽縣志稱其大家多創書院作好飯招延名師以教鄉黨子弟詩書講誦相聞旁郡它邑所不及指石洞西園南湖安田先賢過化之地及金龍四孰而言也山空歲晏遺響寂寥而蔣氏一門百年五世君子之澤猶有餘潤眀發有懷前人未逺如將見之而親聽命焉考其成規舉其墜典使賢材興於昭代義聲動于遐方豈非子晦之𥘉意乎此豫所厚望于其嗣人也其可大書特書屢書不一書者奚止若今所記而已穀城之墓豫實銘之得以互見者不贅述焉自怡齊記山林肥遁之士遺世而絶俗聲色狗馬金珠服玩之美舉無足動其意而其意之所樂猶有寓乎草木禽魚煙雲荒忽風月寂寥之間是雖若與世俗異嗜而不相入其不能無待於外則一而已自夫外物者言之金珠草木均之無知也狗馬禽魚均之無識也果奚取奚舍焉苟無纍于取舍則稊稗也螻蟻也瓦甓也萬物之職職未有不可寓其樂也獨煙雲風月乎哉仁者樂山而未始資夫山以為仁知者樂水而未始資乎水以為知君子之樂固無待于外也豫嘗與客造乎自怡之齊而叩其主人之名齊者則華陽陶隱居詩語也噫謂白雲不堪持寄而可自怡恱者華陽之戲論爾夫既巳逰乎方之外矣白雲何物能為之纍耶賢主人不愛其重圭疊組一旦蟬蛻而去由由然立乎萬物之表蓋有不屑為山中宰相者聲色狗馬金珠服玩安足多道華陽之白雲固不能為之纍也今之名齊顧有取乎其自怡之云者是其中必有真樂者存而外物不與焉昔者孔子之門有以浴乎沂風乎舞雩言其志者矣非有自得乎其中則夫所待以寓其樂者曽何異于山中之白雲乎雖然濠上之逰魚之樂莊子不必知也莊子之不知魚之樂惠子不必知也白雲之可怡恱與否賢主人固無庸知之而賢主人之自樂者豫亦不得而知也而安能言之姑識其與客語者如此主人合魯其氏泰不華其名嘗以嗣襲長萬夫云巽菴記餘姚楊君名其宴休之室曰巽菴而徴豫言所以名之義夫巽之義聖人之作易既言之矣其又奚言顧君之名其菴者不可無辨焉耳蓋菴也者山林枯槁之士木茹澗飲而託焉以休其身者也巽之為卦其彖辭曰利有攸往利見大人其象傳曰君子以申命行事由是言之則離世異俗者固無用乎巽矣而况君邅時承平方以材見推擇且寖有顯職冝其席不暇暖寧能久居此耶雖然觀象玩辭居者之事也君退而家食藏修遊息于斯其于有攸往見大人者揆之必至審而於申命行事者究之必至悉動則觀其變玩其占而已以言乎變則巽自遁來遁而為巽四乃得位得位而近君其動之占所以悔亡而有功者四以一隂處四陽之間而上順于五皆以正而相得巽之善者也君果遁而不變者乎誠使之進居近列必有以處此矣豈若山林之士離世異俗木茹澗飲嗒然休其身而無所用心也哉抑豫聞聖人之言易取義非一端是故巽為有攸往見大人申命行事而㦯為隱㦯為伏竊懼昧者疑君之寓迹乎兹菴有類夫以潜隱屈伏為巽者于是乎言古齊記古齊者雲間曺君之所遊息也曺君之先嘉禾大族其别於雲間有為宋季名進士者君之所祖也家既益充所居亦益以侈大尺椽寸瓦皆非先廬之舊獨此齊之屋猶為六世故物自君之曽大父徙置今所號為西齊于是又八十有六年矣至君復加繕治藻飾環以佳花美木池臺水月之勝蕭然如在穹林邃壑間其堂之顯敞可以燕朋友其室之靚深可以休四方之賔客琴樽書冊左右森列而朝昏燠寒所須之物無不畢具乃更號之曰古齊而以書來徴文為記蓋將示後之人使無忘也夫所貴乎古者豈不以先世氣澤之所存乎彼沾沾焉慕為榮古而陋今者曽不以為意方且巧取豪奪乎人之缺壷破釡枯竹敗素棄遺無所可用之物摩挲把玩而以博古自命至於其先人之廬一椽之折一瓦之墜易而去之惟恐不亟視君之為亦可少愧矣商人之詩曰自古在昔先民有作夫謂之先民而又謂之昔謂之古其辭之繁而不殺者非以致意于居處物器之細而已引而勿替必有事焉庸書而歸之俾刻石陷諸壁間庶幾後之人復以今為古而彌謹其存也止齊記四眀周君名所居之室曰止齊而徴豫記其所以名者豫復之曰昔者孔子之在魯或仕或止當其可而已不必于止也君盛年厚自振飭知君者又一時聞人顧獨事夫一室而曰將以為吾止也可不可乎君曰否古之士有弗仕無弗學焉孔子之事則我不敢知幸嘗于其遺書有聞乎所謂止於至善者庶幾日有睹以自省也願卒為我記之豫竊嘉君辭之卑志之勤也則為之言曰大學之教在止善而書稱善無常主豈非求所止者必以善為的務盡善者不可膠一定之止哉今君之藏于斯息於斯也泊焉其居冥焉其與造物者遊善之名且不立非止非不止也事幾無窮時之運亹亹而不息君方以眇然之軀周旋其間唯所處之安而已止固止也仕亦止也孰為所止孰為非所止乎由是言之全吾止于一室也若甚易與事物遇而不失吾止也㦯難矣雖然五寸之矩可盡天下之方所以閉户造車而出門合轍也酬酢萬變有不自夫一室者始耶蓋聖人之言止莫備于易之艮艮其背不獲其身行其庭不見其人其為止一也君既有志乎此矣時止則止時行則行動靜不失其時其道光眀其為止不一也君其尚審所擇哉君曰敢不諾則書以卑之是為記樊川記樊川長安勝處也野仙護都殿中君别業在焉間嘗謂豫曰吾先世家隰州之永和五世祖雍郡公薄逰關中愛其風土完厚遂徙居鄠雍郡之仲子是為吾髙祖雍國貞獻公𬒳遇世祖於略畔山之陽眷遇甚至而恬于進取足迹不至亰師以亰兆奧魯總管終于家吾曽祖太師奉元忠貞王吾祖太師涇陽忠宣王再世掌上亰留鑰前後四十餘年忠貞既歸老關中而忠宣亦返葬于鄠蓋視鄠為鄉土久矣吾父佐今天子位為丞相匪朝伊夕陟降左右而吾又以大臣子叨𬒳上恩入則侍間燕于內廷出則奉溫清於私室去鄉土日以逺鄠杜異縣而壤地相接樊川在杜之封內即吾土也頃嘗買田築室將以佚吾私而不可得蓋無一夕夢寐不在其間幸為之記庶幾時一展玩以自慰焉按圗志漢亰兆杜縣之樊鄉有樊川以樊噲所食邑得名一名後寬川以其水出秦嶺又名秦川有佛廬號華嚴寺俗但稱之曰華嚴川亰兆今為奉元路杜廢入萬年而萬年今為咸寧縣其南三十五里是為樊川西為韋曲東為杜曲則唐人所謂城南韋杜去天尺五者也夫氣運之消長往來無窮人事之盛衰每與之相為終始秦樹隴雲斜陽衰草城是而人非無復向來冠蓋追逰之盛而原隰之平泉流之清陸海之冨饒民物之蕃阜不减於異時雨露所濡佳花美木生意充周未嘗少息也唐宰相杜岐公甲第在長安而樊川有别墅中有桂林亭卉木最為幽邃日與公卿燕集焉後以太保致仕遂居於此家廟石室遺迹故存岐公孫牧之尤愛樊川傾俸資以治其墅其知中書制誥也每退直亟召密友往逰其地自謂我老為樊川翁要有文章數百首號為樊川集殿中君與牧之生宰相家則同執法殿中又同所不得與牧之同者昔之城南去天尺五今則去天半萬里矣欲朝而往暮而歸于竹洲藤岸苔徑花齊不可得也能勿緬然而長望渺然而遐思乎豫聞古之逹人以太虛為家無何有為鄉視半萬里皆我室我闥也而况鈞天清都之樂又安可與下土同日語殿中曰君是有以慰吾平生之懷矣遂次苐其語書而歸之是為記志學齊記於潜謝圭家于天目山之陽而讀書于所居北十里之谷口扁其室曰志學齊屬豫以記豫復之曰在心之志為己之學非它人所能預也子顧欲以文字相求於外乎圭曰不然吾所患者無師友可以知其心而救其失懼夫志之不立學之不進也故碩聞一言刻置座右庶幾朝夕有以自警云爾幸卒為我記之豫既不得辭則告之曰豫竊聞先儒有言志伊尹之志學顔子之學過則聖及則賢不及則亦不失于令名釋之者謂以發䇿决科榮身肥家希世取寵為志則其志非伊尹之志也以廣聞見工文詞矜智能慕空寂為學則其學非顔子之學也子之志果伊尹之志乎子之學果顔子之學乎豫皆不得而知也處畎畒之中樂仁義之道與夫簞瓢陋巷之不改其樂此伊尹顔子之所同子方窮深極密惟恐去人之不逺于其所同者既有志于慕效之矣至於使是君為堯舜之君使是民為堯舜之民則伊尹之所獨也子誠欲學為有用之學于其所獨者亦思所以自任乎學之成與否在我君子所不敢不勉志之行與否在天聖賢所不能必也古人不可作矣其僅存者遺書而巳子母徒玩其華而必踐其實上不至􅓸髙厲空而遺世絶俗下不至計功求獲而資身譁衆修其在我而聽其在天則志之與學斯兩得之雖聖賢之域未易遽入令名固我隨矣請以是為記可乎圭曰謹受教則次苐其語書而歸之敏學齊記吳郡施允文好修之士也築室于城東為齊居之所扁曰敏學四方士大夫來吳允文必踵門請見來者亦莫不樂與之逰會豫將北上艤舟姑蘇驛允文來求豫記其所謂敏學齊者豫告之曰六經之言學肇見于武丁之命說而論為學之道曰遜曰敏而已遜者欲其謙退而如有所不能敏者欲其進修而如有所不及退則虛而受人進則勤以勵已二者固不容偏廢也孔子大聖人而不自聖故曰我非生而知之者可謂遜矣然而又曰好古敏以求之者則其求之也曷嘗不貴于敏乎它日與顔曽二子言仁與孝而二子皆自謂不敏其遜抑可見矣回之仁參之孝三千之徒未能㦯之先焉豈真不敏者乎茍徒為自卑而不思所以自強是謂知退而不知進蓋遜雖美德然必敏則有功由是言之則為學之道所重尤在於敏也允文取以名其齊誠知所務矣而允文不自以為足汲汲焉欲求豫言申其義以記之豫聞孔子教人以訥於言而敏于行又以敏于事慎于言為好學允文平居奉親孝交朋友有信敏於行與事者也因其所巳能而勉其所未至進進不已必有深造自得者焉奚以豫多言為哉姑以此復于允文云爾是為記濳􅌪記剡源先生嘗題其居曰縮軒從之逰者陳君養直亦以濳窩扁其宴休之室君之云云則有所受之矣蓋縮之為言退也潛之為言藏也是固以世為莫足用吾聰眀而務為退藏者也古之善為退藏者豈隤然伏其身窅然閉其言而已哉昔者先生方盛壯時髙視闊步英雋之林舍者必避席煬者必避竈庸人小子却立而睨之如萬斛之舟順流而東騏驎騕􅒁薾浮雲而上也可謂進耶退耶一旦倦遊而歸逡巡乎山砠海涯而時出以浮沉俗間所居而屨滿于戶外矣鴻聲駿望猋起水涌庸詎知夫退之非進耶惟夫不為物首而墨以為守是以恆瞪若乎人之後不知孰吾進孰吾退而吾未始與之俱進退也君之于先生則幾矣然而未嘗進也惡乎退未嘗行也惡乎藏顧獨弊弊焉于其名迹之間是將有窺其藏者矣夫湛盧豪曺固不蘄一割之用其光氣燁然星辰之上者雖千仞之土有未易以􅰪遏也善刀而藏亦有其道乎誠有莫吾用而未始不行莫吾舍而未始不藏者則其退藏也斯密矣而豫安能知之安能言之慥慥齊記天台項君可立甫周君彥德甫俱以慥慥名其齊今國子祭酒集賢鄧公各為之大書其顔蓋以旌其志之同也二人者復俾豫合為之記以繹其義焉夫慥慥者所以美中庸之君子言與行相應者也而齊也者謂夫閒居以養其心若於此而齊戒也方二人者各適其安而嗒焉以休言不與物交也行不與事接也惡睹所謂慥慥者哉蓋人之感焉而易動者物也其來無時而常使人善惑者事也揆事物之理以酬酢萬變而不窮者人之心也平居養之無其素一旦出而卒然與夫事物遇易動者或怵之善惑者㦯眩之口之於言身之於行有不暇擇也其無繆迷而顛錯者幾希二人者誠深知乎此故其晝談夕講之隙退而即於私室各著其志以自警焉此中庸屋漏潜伏之功古之君子所以成其慥慥之美者未始不出於此也在易風自火出其卦為家人其象為君子以言有物而行有恆釋之者蓋曰火內也風外也由內以及外是以能有物而有恆也夫二人者求美其言行而圗之於飬其心之所內外賔主之辨其審如此豈不可謂知所務矣哉是道也苟知擇乎中庸者冝無不然而非二人者為獨然也彼慥慥之名又豈二人者所得專而有哉書而歸之所以記也亦以厲同志也閒止齊記錢唐張子英生䆠家且居今盛時而雅不樂仕進日以篇翰自娛尤嗜淵眀詩摘其語扁所居室曰閒止齊而屬豫記其所以名之義豫觀淵眀止酒詩章首即以居止城邑逍遙間止為言則其所謂止者不止於止酒而已夫天壤間事物有萬不齊是非之相傾利害之相乘妍媸之相形強弱之相陵莫知其所終極而人以眇然之一身與之周旋而左右酬酢乎無窮之變孰能於膠膠擾擾中求其止乎山林枯槁之士棄事絶物而寓情於風月寂寥之鄉仰雲嵐而俯泉瀨若可以止矣是猶為有所待而未能無纍于外也惟放於自得之埸物任其性事稱其能而吾方且遺其所寄不知城邑之為山林山林之為城邑斯可以無往而不得其所止此非莊生之所謂逍遙而淵眀取以為害者子抑其言不止於止酒亦不止於及其居止也坐止于問䕃而不知孰為輪奐之美步止於蓽門而不知孰為康莊之逺味止於園葵而不知孰為食前之方丈歡止於稚子而不知孰為侍妾之數百非去彼而取此也間放不拘逍遙自適耳又安知孰為莊生之逰孰為淵眀之止乎子英清修好古處城邑如在山林未嘗弊弊焉牽於名迹冝其聞淵眀之言而有契於心也然豫聞孔子可以止則止苟未可以止而止與可以止而不止蓋胥失之當其可仕則如淵眀以弦歌為三徑之資當其可止則如淵眀之不為五斗米折腰解綬而去無纍於物而異方同得何適而非逍遙是乃善學淵眀而得其真止者也子英屬豫記其為止之義豫之所知若是而止耳昔者曽子以緝熙敬止釋止善與淵明以逍遙間止詠止酒其取義皆非尋常梏於章句訓詁者所能通豫方欲見好讀書而不求甚解如淵眀者共論斯事子英可謂淵眀之流非歟倘能為豫言之請留更僕而筆受之以為後記金華黃先生文集卷第十五
