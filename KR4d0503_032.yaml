body:
  text: 墓志銘霽峯李先生墓志銘先生諱洧孫字甫山姓李氏其先出唐宗室燉煌房五代時避地越之三界三界者會稽上虞嵊三邑之衝也乃益東南至台之寧海家焉曽大父穆宋迪㓛郎大父開之弗仕父演與同里葉公夢鼎俱受業直龍圖閣鄭公霖葉公後由太學釋褐至丞相先生之父故為布衣人知其宜有後矣先生丱歲即能讀父書既成人師事太學博士舒公津學日以進方是時羇旅之士得群試于漕司號曰寓試就試者動以萬數歲甲子先生年二十有二以詞賦中其選第一間者咸歎竒之巳而上春官不合鄉先逹右司郎官陳公緯憐其才宦遊所至恆引以自近癸酉更以國子舉預奏名遂擢甲戌進士苐授迪㓛郎黃州司户參軍未上而黃州以版圖歸職方先生捿遲海濵者餘二十年有終焉之志郡府或以先生名剡上先生為強起詣亰師述大都賦以獻時大德二年也居亡何而歸六年乃得杭州路儒學教授延祐元年以選為江浙同考試官三年調臨江路儒學教授七年復充江西同考試官至治三年以從仕郎台州路黃巖州判官致仕天曆二年三月二十八日卒于家上距生癸卯得壽八十有七卜以至順某年某月某日葬朱開鄉何山之原元配王氏先五十一年卒祔葬董公山先墓繼胡氏先十二年􅌰與先生合葬焉子男四人長規以先生致仕恩今為某官次矩次大德蚤􅌰次桌日人人孫男十一人炯炫燧炳燁灼嗣忠嗣弘照烜輝凡先生為學官教人有法其較文稱賢主司至於興壞補弊出內之謹直其細耳故侍御史馮公翼嘗薦先生可臺職不報先生蓋仕而未顯故學者因其自號尊之曰霽峯先生云先生所著詩賦贊頌針銘表啓碑志序説總若干卷唯大都賦今行于世重修台州圖經列于官書溍以先生較文鄉闈之歲忝備薦送筮仕之始適在先生所居邑而獲以禮見先生之將葬也矩與溍遇于錢唐泣且言願得銘刻石冡上溍雖不敏誼不敢辭銘曰嗚呼先生兮世孰豫知山之幽幽兮食有蕨薇謂世莫知兮終不我遺大龜寶玉兮其陳以時褻味雖厚兮弗實鼎彛鼓缶而歌兮日􅉴之離何虧何成兮式全吾歸清風拱木兮百年之思樹此貞石兮昭薦刻辭胡景吕先生墓志銘諸暨之鄉先生曰胡君景吕以泰㝎三年十一月二日卒年八十有二致和元年某月某日葬某鄉某原于是先生之子三人無在者前葬其孫鏈蹐門泣以告曰吾祖葬有日以鏈之藐焉不肖而持重服奉大事懼無以振吾祖于幽執事苟矜而卑之銘吾祖雖死不沒矣惟溍之曾祖户部府君與先生之父承議公俱宋淳祐庚戌進士户部府君之外孫劉君應龜在太學與先生俱允蹈齋生溍生也後顧嘗受學于劉君而獲知先生兹又仕于先生之鄉而及與先生接銘固不敢辭按胡氏世為越之諸暨人謂先生之名景吕其字也曾大父煒弗仕大父士英纍封通直郎父杲承議郎江南東路轉運司主管父字用年勞賜緋衣銀魚母王封孺人先生幼有異質孳孳問學尤謹于踐履入太學輒為私試苐一居歲餘承議公以內憂解職先生崎嶇扶侍絶江而東會天兵南下學廢士𣪚先生奉承議公倣徉山澤間未始頃刻去左右承議公得以優遊恣肆嘯歌息偃囂然以樂隤然以委乎至順而忘其老者以先生能為之子也先生既隱居田里無復當世志乃益致其力于經史百氏之言而務極其旨趣手書危坐雖老無少懈為文一主乎理至於詩歌儷語率不苟有雞肋集若干卷藏于家娶樓氏先若干年卒子男三人長􅚇次玖次玶亦俱􅌰孫男五人鍵鈞鈁鏸鏞女一人適司里方洵曾孫男六人女一人先是里中為舉子業者多來學于先生從孫一中實在列一中之上春官也交遊皆以詩送之時先生病巳革猶口占為序引逮一中取進士得鄉郡録事以歸而先生不及待矣一中每言之必為掩涕為之銘以貽其嗣人亦以慰一中無窮之思也銘曰不辱以承其先不􅌒以開其後志則已遂而不居其有兹聖賢之所自盡先生尚與之參不朽也化州路儒學教授王君墓志銘化州路儒學教授王君諱勳字仲昭生十歲而孤能以禮持其身以信義交于人資産置弗問而護視先塋惟謹冠昏喪祭必考諸古之遺制而不苟同流俗文字之外無它嗜好宗族朋友稱焉仕未顯輒止而以夀終其賢乎人亦多矣君嘗教授肇慶逺郡事多率略學有田而無籍歲所入為租四百石而已君始至喻佃人令自實稍增其額為六百石廩食有餘而俗習鄙陋士氣弗張使者行部君請擇其知學而有文者試以經術辭藝得七人焉上其名于宣閫悉輔儒學官由是諸生莫不知勸暨取士之令下廣海數十郡不薦一人而肇慶首以陳祖義充賦有司遂與中州之士並進于春官人皆以為君作興之效也君𥘉以江山教諭遷慈湖山長年已垂四十又二十年乃拜肇慶之命及再調化州而君已老故其才不究于用可見者若是而止人又皆深惜之蓋王氏上世有仕吳越為鎮城使者從其主歸宋有賜田在睦州後徙家青溪又徙越之山隂始居青溪者曰仁厚于君為九世祖曾王父諱遂良以恩贈訓武郎王父諱灝擢慶元丙辰右科終于武經郎權發遣鬱林州事父諱集當用蔭得官推與其弟而以布衣取鄉薦母汪氏繼母趙氏薛氏而君周氏出也自訓武府君而上皆葬山隂其居衢開化之馬金則自鬱林府君始山隂之最著者曰佐以進士苐一至某部尚書君改葬鬱林府君于崇化鄉松公里之莊山尚書四世孫修聀郎易簡實志之君􅌰于重紀至元之歲五月十四日年七十有七以至正改紀之明年三月十二日葬于鬱林府君墓左娶余氏先􅌰子男四人長曰墉次曰圻為伯氏後次曰堪曰坰女一人適單父蓋士直孫男八人巨鑑銖鑄鐖鎌錡鈺女二人適汪某黃􅎚君葬有日堪以書抵溍曰君之子辱壻先人孫女宜能道吾家世之詳敢以銘為託溍不得辭然竊觀自昔運去物改大家巨室鮮不隨之惟君之先厚積薄發雖閲世已久而流澤未艾君又廉于進取不盡享其有而以卑來人可託以永存者固不繫銘之有庶序而詩之聊以慰君于冥冥云爾銘曰有濬其源其來不窮用之也舒蓄也愈豐有沃其枝遺潤是蒙歸乎何憾妥兹玄宮安陽韓先生墓志銘先生諱性字明善姓韓氏其先相之安陽人宋司徒兼侍中贈尚書令魏忠獻王生某官某某生某官某某生左司郎中膺胄扈蹕南渡始家于越膺胄生某官某則先生之髙祖也曾祖諱椘卿贈中奉大夫祖諱識中奉大夫直徽猷閣考諱翼甫朝奉郎大理寺主簿學者尊之曰詢齋先生曾祖妣何氏祖妣章氏並贈令人妣趙氏封恭人先生天資凝粹而警敏七歲讀書數行俱下日記萬言九歲通小戴禮作義操筆立􅈬文意蒼古老生宿學皆歎異焉國朝取宋嚮之在班行者多携故所受告敕入換新命寺簿公獨挈家絶江而東杜門不交人事以聖賢之道自樂于是科舉事廢先生周旋家庭間益得肆其力于為已之學無何寺簿公以疾不起先生甫十有二歲執喪如成人識者謂韓氏有子矣先生既弱冠博綜群籍自經史至諸子百家靡不極其津涯究其根柢而于近世儒先性理之説尤深造其閫域秉心制行表裏如一不徒馳騁于空言而巳婦翁國子監書庫官徐公天祜號賢有德與先生自為師友不敢待以尋常子壻之禮永康胡之綱仍仲之純穆仲長孺汲仲並以學行相髙于先生為內兄弟而齒差長間以微辭奧義相叩擊三人咸自以為它日當有所不及前代遺老若王尚書應麟俞御史淅文章大家若四明戴表元帥𥘉往往折行輩以先生為忘年交同里與先生遊最密者唐與玉潛王易簡理得吕同老復𥘉皆一時名士而王監簿英孫禮遇之甚至每值風日清美或同挾策于雲門禹穴或共榜舟于耶溪鏡湖逍遙容與彌日忘返望之者疑其為世外人先生之文博逹俊偉而變化不測人苐見其如竒葩珍木不擇地而發魚龍出沒隱顯後先以為可喜可愕而莫知夫山之所以髙海之所以深也延祐𥘉有詔以科目取士四方學者不逺千里負笈而來以文法為請先生語之曰今之貢舉悉本朱文公私議欲為貢舉之文而不知文公之學可乎四書六經千載不傳之學自程氏兩夫子至文公而發明無餘藴矣顧力行何如耳有德者必有言施之場屋直其末事豈有它法哉蓋先生之文一主于理凡經其口授指畫不為甚髙論而義理自勝不期文之工而不能不工以應有司之求亦未始不合其繩尺預薦送取科級者彬彬多佳士焉先生操履純固體備至和日用酬酢動必中莭任斯道之重而不苟立標榜為名髙人自化服之負髙世之志而謙恭不伐不見其崖岸人自樂親之士有一善必為之延譽不巳及辨析是非則毅然有不可犯之色平居不問家有無自奉簡約而好周人之窮買地數百畝于山隂巖谷中死無所歸者給以棺槥聚瘞其處韓氏渡江時有仕籍者尚八九十人散處諸郡而越族為特盛家法之嚴族義之厚迄今弗變者先生實表帥焉先生出無輿馬僕御所過負者息肩行者避道巷夫街叟爭前迎揖童稚厮役咸稱之曰韓先生韓先生云先生蓋生乎杭而居乎越曰安陽者本其舊也先是完顔公貞分持使莭出按屬部聞先生名舉為慈湖書院山長先生謝曰幸有先人之敝廬可庇風雨薄田可具饘粥讀書砥行無愧古人足矣祿仕非所願也受而不赴暮年愈自韜晦而未嘗忘情斯世張公升王公克敬于公九思前後為郡皆良二千石政事有所未逹輒虛巳咨訪先生從容開導洞中肯綮多所禆益有隂𬒳其賜者矣天曆中平章政事趙涼公首以先生名聞于上後十餘歲門人李齊以進士第一為御史南臺又力舉其行義而先生逝矣先生素康強垂殁之際𥘉無所疾苦諸生列侍左右以文字就正者纍數十百篇日晏少休俄得上氣疾進諸子戒之曰我且死若等其善自持言巳瞳子上下瞭然頃之氣息奄奄夷然而逝先生之卒以至正元年五月七日享年七十有六聞者無間尊官庶士方外之交相與嗟悼掩涕如喪所親其為當世歸重如此配徐氏有淑德而善理其家先生得不以米鹽碎務嬰其心而能成其業者內改之力為多先二十年卒子男四人長傳之次徽之蚤世次衡之臨之女三人適全公升張正蒙髙璿孫男四人女二人傳之等卜其年七月十日奉柩葬會稽縣太平鄉白木原先塋之次而以門人夏泰亨之狀屬溍為之銘昔曾文㝎公論古之世其道德者漢有袁氏楊氏陳氏唐有桞氏竊考宋三百年故宰相家克世其道德未有如吕氏韓氏久而益振者也吕氏自許公八世而東萊先生出于中興盛世韓氏自魏王八世乃得先生于運去物改之後故家喬木不與海桑俱化而文獻所存有足徴者豈偶然哉溍衰朽之餘意長語短抑亦可以無愧辭矣先生之遺書有禮記説若干卷書辨疑一卷詩釋音一卷文集曰五雲漫藁者十二卷並行于世續郡志八卷藏于有司至于天文地理醫藥卜筮浮圖老子之書雖無所不通然以非世教所急故其論著無傳焉銘曰烈烈魏王古社稷臣來家于南自其曽孫五世而昌受材孔顧不世以官世其道德真知實踐學貫天人積中發外大振于文化行其家施及來學乃輯前聞以開後覺朝多巨儒稽古作經一鑑之亡文獻孰徴揚其幽光薦此樂石嗚呼休哉君子之澤白雲許先生墓志銘先生諱謙字益之姓許氏其先占籍亰兆之興平後有官于吳者因家焉九世祖延夀宋刑部尚書六世祖實元豐間始居笠澤尋又徙婺為金華縣人曽祖諱經國祖諱應龍皆弗仕考諱觥淳祐丁未進士卒官宣教郎主管三省樞密院架閣文字無子以從父兄貢士君日宣之次子嗣即先生也先生天資髙嶷甫能言貢士君之夫人陶氏授以孝經論語入耳輒不忘五歲􅈬學莊重如成人宋亡家毀貢士君相繼淪殁先生稍長僑居城闉借書于人以四部分而讀之雖疾恙不廢所涉向博知解且至既開門授徒而猶有所疑無所從質聞仁山金先生講道蘭江上委巳而學焉金先生曰士之為學若五味之在和醢鹽既加則酸醎頓異子來見我己三日而猶夫人也豈吾之學無以感發于子耶先生聞之惕然于是金先生年七十先生三十有一矣請不拘常序就弟子列而所居相距尚逺會金先生設教于吕成公祠下乃獲便于參扣金先生嘗告之曰吾儒之學理一而分殊理不患其不一所難者分殊耳先生由是致其辨于分之殊而要其歸于理之一又嘗告之曰聖人之道中而已矣先生由是事事求夫中者而用之金先生殁先生益肆充闡多所自得自謂吾非有大過人惟為學之㓛無間斷耳先生制行甚嚴而所以應世者不膠于古不流于俗介而不矯通而不隨身在草萊而心存當世大德十一年歲在丁未熒惑入南斗句巳而行先生以為災在吳椘竊深憂之是歲大侵先生貌加瘠或問曰先生豈食不足耶先生曰今公私匱竭道殣相望吾能獨飽耶其處心蓋如此而素志沖淡以道自樂浙東憲府聞先生名而不察其志辟以為掾避弗就肅政廉訪使劉公庭直舉茂材異等副使趙公宏偉舉遺逸亦皆固辭趙公在南臺命除舍館迎致先生將使衆僚多士有所矜式先生欣然為之起而不久留也先生既東還以目眚􅌒于應接屏迹入華山中學者翕然籯糧笥書而從之居再歲以兄子喪而歸戶屨尤多逺而幽冀齊魯近而荆揚吳越皆百舍重趼而至先生之教以五性人倫為本以開明心術變化氣質為先以為巳為立心之要以分辨義利為處事之制至誠諄悉內外殫盡嘗曰巳既有知使人亦知之豈不快哉或有所問難而辭不能自逹則為之言其所欲言而解其所惑討論講貫終日無倦攝其粗踈入于密微聞者方傾耳聽受而其出愈真切惰者作之鋭者抑之拘者開之放者約之為學者師垂四十年著録殆千餘人隨其材分咸有所得逹官冨人之子望閭而驕氣自消踐庭而禮容自飭四方之士無賢不肖以不及門為耻搢紳先生至于是邦必即其家存問焉或訪以典禮政事先生觀其會通而為之折衷聞者無不厭服省臺諸公若王公士熙耿公焕王公克敬鄭公允中李公端吳公燾趙公天綱陳公思謙趙公仲仁前後列其行義于中朝鄉闈主司曺集賢鑑楊翰林剛中亦率同院剡上其名于省闥郡復以遺逸應詔先生終不為動仍紀至元之元年屬當大比諉先生以文衡亦莫之能致也嘗謂吾非必于隱以為名髙仕止惟其時耳晚年尤以涵養本原為上務講授之餘齋居凝然一日瞑目坐堂上門人弗知也徑入焉則間其無人乎先生之側拱立久之先生顧而徐言曰爾在斯耶其習于靜㝎久而安焉可知也先生少羇孤不逮事架閣公及其夫人韓氏而事陶夫人克盡子聀兄璟性剛嚴委曲承順怡怡如也時氏姊有子而貧無以為養迎歸奉之終身鍾愛二子而教飭有方冠昏喪祭賔客之禮必盡其情文既老而益艱瘁僦屋以居有田不足具饘粥而處之𥙿如門人吕權蔣玄金稽古方謀為先生買田築室而先生逝矣先生素多疾金先生病革徒步往省之會大雪中寒濕及奔兄璟喪于廣信疾增劇不良于行疾少間而神更清茂三年冬十月疾復作謂其子元曰伯兄以是月二十三日卒我死殆與之同日乎及是日正衣冠而坐戒元以孝于母友于弟元復請所欲言先生曰吾平日訓爾多矣至此復何言門人朱震亨進曰先生視稍偏矣先生更肅容端視頃之視微瞑遂卒享年六十有八娶朱氏承直郎廣德路總管府推官天與之女子男二人長即元次亨以為兄璟後先生葬以其明年春正月壬寅墓在縣西北婺女鄉安期里交友來赴者若干人門人以義制服者若干人合泉布營葬事因其自號而題其表曰白雲先生許公之墓其又明年學者相率上狀郡府祠先生于學宫僉肅政廉訪司事杜公秉彛建請贈官賜諡未報先生於書無不觀窮探聖微蘄于必得雖殘文羡語皆不敢忽有不可通則不敢強于先儒之説有所未安亦不敢苟同也讀四書章句集注有叢説二十卷敷繹義理惟務平實每戒學者曰士之為學當以聖人為凖的至于進修利鋭則視巳之力量何如然必得聖人之心而後可學聖人之事舍其書何以得其心乎聖賢之心盡在四書而四書之義備于朱子顧其立言辝約意廣讀者或得其粗而不能悉究其義或以一篇之致自異而𥘉不知未離其範圍世之詆資貿亂務為新竒者其弊正坐此耳始豫三四讀自以為瞭然巳而不能無惑久若有得覺其意𥘉不與已異愈久而所得愈深與巳意合者亦大異于𥘉矣童而習之白首不知其要領者何限其可以昜心求之哉讀詩集傳有名物鈔八卷正其音釋考其名物度數以輔先儒之未備仍存其逸義旁採逺援而以巳意終之讀書集傳有叢説六卷時有與蔡氏不能盡合者每誦金先生之言曰自我言之則為忠臣自它人言之則為讒賊要歸於是而巳其言春秋三傳有溫故管窺若干卷間以者秋大義數十百條與友人張君樞極論之皆傳注所未發于三禮則參伍考訂求聖人制作之意以翼成朱子之説其語學者必順天地之理酌古今之宜使通于上下皆可遵用又嘗句讀九經儀禮三傳而于其宏綱要旨錯簡衍文悉别以鉛黃朱墨意有所明則表見之其後友人吳君師道得吕成公點校儀禮視先生所㝎不同者十有三條而巳其與先儒意見䐇合如此有老儒自以為善言易力詆程子先生與之反覆辨論辭詳義正老儒語塞乃謝曰不意子之于易若是其精也先生中年以還仰觀俯察益有見于隂陽往來升降消長闔闢之故謂伏羲之經廣大悉備文王周公孔子之辭乃其傳注六爻之義特發凡舉例耳諸儒于象辭變占各有攸尚要不可舉此而廢彼也然獨未有所論述豈不以孔子晚始好易孟子深于易而不言易乎其觀史有治忽幾微若干卷倣史家年經國緯之法起大皡氏訖宋元祐元年秋九月尚書左僕射司馬光卒備其世數總其年歲原其興亡著其善惡蓋以為光卒則宋之治不可復興誠一代理亂之幾故附于續經而書孔子卒之義以致其意也書成以示張君樞為言運祚之延促豈必推之天命猶有人事焉漢之大儒言災異皆欲近修人事上答天變况聖賢之培植基本祈天永命者哉有國家者不可不仁民蓋以此也先生于天文地理典章制度食貨刑法字學音韻醫經數術靡不該貫一事一物可為傳聞多識之助者必謹志之至於釋老之言亦皆洞究其藴謂學者孰不曰闢異端苟不深探其隱而識其所以然能辨其同異别其是非也幾希凡其書俱巳行于世述作之大意則見于序引文多不得以盡載有三傳義例讀書記皆藁立而未完諸生有日聞雜紀未及詮次其藏于家者有詩文若干卷文主于理詩尤得風人之旨有自省編晝之所為夜必書之殆疾革始絶筆云金先生所著論語孟子考證資治通鑑前編皆未遑刋㝎垂殁以屬之先生今二書得以大備而盛行先生力也自聖賢不作師道久廢宋𥘉學者有師始于海陵胡公先生六世祖受業于海陵號稱能以師法終始者逮二程子起而倡聖學以淑諸人朱子又遡流窮源折衷羣言而統一其歸使學者有所據以從事由是師道大備文㝎何公既得朱子之傳於其髙弟文肅黃公而文憲王公于文㝎則師友之金先生又學于文憲而及登文㝎之門者也三先生皆婺人學者推原統緒必以三先生為朱子之世適先生出于三先生之鄉而克任其承傳之重遭逢聖代治教休明三先生之學卒以大顯于世然則程子之道得朱子而復明朱子之道至先生而益尊先生之㓛大矣先生葬巳十年而元以張君樞之狀俾溍為之銘溍之少也無所識知莫能從先生逰於髙明之域奔赱汨沒不知老之將至而為庸人之歸鄙陋之言何足形容有道者氣象乎重惟先生之交遊多巳凋謝而溍偶獨後死義不得辭也敢悉取狀所述序其首而為之銘以系于左方銘曰道學之傳天下為公婺之儒先獨得其宗巨人迭興踵武相接逮于先生綿綿四葉先生之學能自得師實踐之㓛出乎真知萬殊之差無微不析一本之同會歸有極酬酢萬變必用其中涵養本原以敬始終際兹休明力扶正學聞風而來罔間南朔春陽時雨隨地發生洪纎髙下咸仰曲成迪惟前人學有師法克生後賢規重矩疊先生有作彌大而昌師嚴道尊于昔有光先生之身斯道所寄視其安否以為隆替天胡不憗不訖耄期山穨木壞人將疇依不亡者存遺書孔有文不在兹尚啓尓後金溪曽君墓志銘撫之金溪有篤行之士曰曽君諱嚴卿字務光以致和元年六月辛丑卒年五十有三門人相與私諡曰恭貞先生至元某年十月某甲子葬所居陶原里明山之麓其子堅辱交于溍謂先丗在異時嘗有同年好以銘來屬溍不得辭按曽氏丗譜曾子後十四丗當王莾時避地豫章之廬陵凡六丗始徙臨川今撫州也又十二丗至唐刺史司空洪立乃徙南豐洪立生散騎常侍延鐸延鐸生仁昭仁旺宋中書舍人鞏尚書左僕射布翰林學士肇皆仁旺之後仁昭生贊堯贊堯生易祥易祥生千復居撫之金溪千生學學生應臣應臣生仕欽仕欽生濬濬生綱綱生彥明則君之髙祖也曾祖諱􅊹隱居弗仕祖諱子良擢咸淳龍飛進士苐終于淳安令父諱正吉國子進士並以文學行義師表其鄉母黃氏澧州司理參軍庭蘭之女生君于淳安故名嚴而字光君質厚氣完不妄言笑雖宴休必正㯲危坐事親至孝父有疾呼天乞以身代父命疾旋愈自祖父以來皆推先世故業與其兄弟君亦以所居屋讓其叔有四妨悉營嫁之逮其有子皆教育使至成人平居不汲汲于生事視勢利漢如也讀書曰有常程務求知聖賢微言大旨而不徒事記覽為文主于理未始與人較其短長而一時負才氣者皆自以為不及同里以士名者無不受業焉君接之色溫而莊恆以經術教授誦説若不能出諸口及有所問難分章别句類數辨名無不究盡隨才誘掖以成其美而不病以其所不能與人交無圭角崖岸不矯矯為異亦不翕翕為同人自不得而親踈之憐里有見侵侮者未嘗形于言色咸服其長者家人化之雖僮㒒不聞有穢惡之聲史稱黃叔度言論風旨無所傳聞而見之者靡不服深逺去疪吝君庶幾近之然君遺文有南明齋藁三十卷傳于學者言論風旨之在人固多矣娶何氏後十六年卒合葬焉子男二人長堅鄉貢進士博學有文能世其家次大年早卒女二人適南城歐復同邑黃里孫男五人侁偕儕仰佺曽孫男一人立銘曰嗚呼先生學足以禔身行足以範俗無欲而心自正不言而民自服前人之光是迓是續丗其德而不丗其祿天運有常其周必復惟尓嗣人有轟其伏鄱陽朱君墓志銘鄱陽朱君既卒而其孫坦舉進士來亰師踵門納謁拜且言坦之充賦有司也大父方屬疾語坦曰昔吾祖蓋兩貢于鄉晚厪以恩輔官主浮梁縣學故吾之少也慨焉思自奮于科目而埸屋事遽廢逮國明復以科目取天下士而吾巳老前人之發而未舒者將有望于汝行矣勉旃無以吾為念也坦銜訓就道尋辱預薦名而大父竟不及待顧乃挈潔然籝糧笥書而來者庶幾獲綴下列以酬先志夫何埸屋又廢而莫之舉願刻銘冡上之石用慰大父于地下謹奉先友程翔之狀以惟子也請溍哀其言亟為之答拜曰敢不諾按狀朱氏世居鄱陽之堯山里號著族君之曾祖世顯弗仕祖應復生學君也父泳涯亦弗仕君諱明普字升朝自號止善天性醇厚父殁事母孝與二弟異居而無間言子姪有過必從容告諭使自愧悔其靜重沉默若有不可犯之色至與人交未嘗不務為卑讓春秋既髙族人在父兄行者以十數為之執子弟禮不少衰母喪猶致毀歲時祀事身親饋奠惟謹𥘉江南新附大家多踣于徭役君獨能隨時俯仰與物無忤門户賴以不墜歲侵輒發粟以惠貧乏人多德之所居負山瞰湖君暮年幅巾藜杖徜徉煙光水色間足不涉城府藏書數千卷耽玩至忘寢食取古語大書屋壁曰吾聚書多矣必有好學者為吾子孫此所以識也鄉先生吳君仲迂程君時登吳君存並以所學教授君俾諸孫從之遊而往來叩擊焉名勝士欵門必留連彌日盡歡乃巳有以善地理學來見者館穀之不厭或勸預相地為樂丘則應之曰生事死葬人子之職吾安用蚤計哉遇仙翁釋子雖不眩于其説亦不深斥之也司里萬户山有僧廬先逹多講學其中君捐錢葺治以為諸孫遊息之所曰吾欲其趾美前賢耳君生于宋開慶元年四月十四日卒于今元統三年七月二十二日享年七十有七以某年某月某日葬某鄉某原娶鮑氏子男二長勳其官次某未仕女二適余某劉某孫男五長即坦次蚤夭次垕次塤次祐女四曽孫男五女一凡狀所述可見者如此嗚呼道之汚隆科目不預焉而君之志則有足悲者溍聞之荀卿子曰皓天不復憂無疆也千秋必反古之常也弟子勉學天不忘也銘以慰君亦以勗其後人銘曰朱以國氏後支分名于一經用顓門父災子播逮厥孫不以無年輟耕耘果之云剝有本根惟革既故鼎乃新天者之定能勝人食報豈必于其身佹詩可徴我所聞揭辭石章慰營魂奉訓大夫瑞州路總管府判官致仕黃公墓志銘頃豫與危君素同在史館素以僚友之契狀其外王父黃公之行俾公曽孫求巳奉贄來謁曰惟我曽大父之葬翰林學士吳文正公既篆題于墓碩之首而逮今未有銘敢以為子請豫辭以史事方殷而返其贄求巳既去豫亦以衰朽納祿而歸抵家甫二日俄有召還之命暨至亰師素復數以為言豫不得卒辭也按狀公諱順翁字濟川姓黃氏建昌南城人曽祖暹祖維俱不仕父澄宋末起進士卒官迪㓛郎栁州州學教授無子公以同宗為之後少卓犖多材能尚氣莭而輔之以學國朝取宋之師次建昌公族人萬石為江西制置使退保杉關公徒步叩軍門言事補保義郎辟知撫州金溪縣公察萬石降志已決辭不就萬石舉酒屬公曰明旦則子女玉帛皆它人所有惟意所擇公一不以自汚叔父某死于南城之盜請于有司發兵殱其凶渠而貸某餘黨久之郡府知公儒者禮為盱江書院山長且為徙其書院于城中時學者未有場屋之纍公首出朱子小學書以教之尋遷儒學教授廣州大盜竊發公上平盜之策于江西行省事㝎未及論㓛行賞至元二十一年有詔宋故官得驗其資級換授故人有客京師者代為公陳于吏部遂以公為從仕郎武岡路新寧縣尹長官暴橫自恣公不與挍而待之以誠乃更敬服執禮甚恭江南新附人心未寧公招集流散督其民樹藝畜牧簡條約興教事民皆安之徭人作亂湖廣行省右丞劉武宣公出師討之公儒服上謁曰遐􅑍之氓未霑聖化致勞廟算逺興師徒下官書生也沗為新寧長吏上樂下樂兩洞皆在所治境內請往諭之諭而不降討之未晚萬戶曺侯某雅與公善止公母行公不可肩輿從一老兵携孝經一千卷直拞洞中分遺其人且為講説大義至庶人章皆涕泣叩頭請罪曰蠻俗無知今乃得出蒙蔽見日月明公之賜也不敢復為亂矣事平徭人家立公祠題曰生父黃氏武宣大喜命公勒石紀㓛而班師翰林學士承旨程文憲公前宣閫幹官張公山翁咸為文頌美其事公在官九年縣齋後有竹數百個公所植也民即其處為建生祠湖南廉訪副使余公恁以其竹比于召公之甘棠而為之記公去後祠壞民輒更新之其遺愛在人如此大德四年仍奮階調龍興路稅課提領史鄂公以平章政事行省江西延致公受論語大學多所開發鄂公之父詣門以謝焉九年遷徴事郎撫州金溪縣丞十一年大飢公持所受敕命質官倉之粟以賑之人賴以活力贊其尹趙君佺核正民田賦役以均皇慶元年升承務郎江州路德化縣尹到官未幾獄為之空延祐元年以老得謝授奉訓大夫瑞州路總管府判官致仕以某年某月某日卒于江州其又明年某月某日葬南城縣南城鄉南原之逍遙樓下母劉氏妻利氏武安軍莭度掌書記登之女再娶熊氏子男二人長純夫養利州判官次敏夫女四人長適金溪危永吉今贈承事郎太常博士素之父也素今為應奉翰林文字文林郎同知制誥兼國史院編修官孫男二人宏子早卒寬子用公廕三為巡官卒以廕歸其兄子即求巳也曽孫男二人求巳今為某官嵩方業儒女二人玄孫男四人女一人公氣貌清嚴中實樂易恂恂恭謹待人無少長如一語言懇惻詳盡人皆親之素之母有疾出公小像并書一通以授素令謹藏之母沒􅢳其書則謂素漸長盍端儀表以正之讀書乃其次也素由是知為學之本末次苐而有以用力焉嗟夫古之人負其所有百不一施泯滅無聞者何可勝數今也􅌾其親者乃莫不有銘夫亦孝子慈孫求盡其心而巳若公之魁岸傑特雖不得卿大夫之位以展盡其經綸之藴而所試輒效時行時止訖以考終有不可銘者耶銘曰有偉黃公材周而通出武入文用惟其逢鬪之以智匪奏伐㓛置之于安式疇民庸志則巳遂祿乃不豐翩其逺引浩然長終寫以丹青凛焉英風勒之樂石昭于無窮贈太常博士危府君墓志銘府君諱永吉字德祥姓危氏撫之金溪人年五十有七以致和元年夏四月壬戌卒于家秋七月甲申葬白馬鄉范田之原其子素博學而有文間出遊亰師一日隱然名動公卿間莫不交口薦舉之今天子稽古圖治誕開經筵即以素為撿討未幾上復用言者建白妙選儒臣纂修三史又以素為史官史事既畢中書奏以素為國子助教用資歷及恩例階承事郎遂追贈府君承事郎太常博士至正六年也其年冬素由助教遷應奉翰林文字文林郎同知制誥兼國史院編修官而溍以退休之餘蒙恩召入寓直詞林與素命同日下而同官為僚且有平生之雅素以府君墓道之銘耒屬誼不得辭按危氏出於姬姓其先自洛徙汝南又徙江南唐泉州録事參軍凝有子曰亘銀青光祿大夫撿挍刑部尚書洪州别駕亘之子曰全諷曰仔倡居撫之南城當江淮寇盜充斥之時合鄉人立壁壘以自衛而大破賊兵朝廷因命以官全諷金𬗋光祿大夫撿挍司徒守撫州刺史兼御史大夫上柱國錢唐縣開國男纍加大傅封南庭王仔倡特進撿挍太傅虔州防禦使守信州刺史汝南郡開國侯仔倡後歸吳越子孫皆仕于其國賜姓元氏宋之盛時起進士至大官者參知政事太子少保章簡公絳為最顯而危氏在南城者皆祖全諷由南城徙金溪則自全諷六世孫怦始怦五世孫光大有子曰鼎臣府君之髙祖也曽大父諱時發宋贈承事郎大父諱炎震景㝎三年進士調吉州司理參軍治獄明允用舉者改秩以通直郎知臨安府仁和縣事年未六十以不能媚權臣乞休致而去父諱龍友入皇朝為潮州小江等處􅐭司提舉母劉氏府君好讀書而深于易工于詩文聞儒先格言輒書于屏間以自厲事親盡孝小江歲課不登督責甚峻不憚竭力服勞傾私財以紓父之急母病刲股和藥仍籲天碩減巳年益母夀徙居雲林三十六峰之陽身服田畝以為養而薄于自奉一布裘至十年不易歲凶出粟賑其鄰里而為粥以濟路人未始計家有無學問之餘兼善於醫或迎致之雖大寒暑必往不拒貧則藥無所靳有醫説一卷傳于學者平居氣剛而和警敏善料事親故有過必加規正有患難必力排解之素過庭之際嘗告之曰世有學未充而巳為利祿計者既得之又恐失之竟何為哉汝其求師取友痛自修飭期無愧于古人貧賤乃士之常不足念也素出告反面問孰與逰聞其賢也則喜否則必深戒焉晚過九江登廬山有終焉之志無何而屬疾遂不起娶同里鄧氏忠義社統領克志之孫女今封冝人再娶建昌黃氏奉訓大夫瑞州路總管府判官順翁之女子男七人素為適長黃出也今改擢宣文閣授經郎次白次蒼次丹次赤次會次點女二人適陸鉉傳權孫男二人偃斿女一人府君之葬素自為阡表稱道先德甚具而未及敘其世系之詳至於贈典所加又在其十有五年之後是用備著之不嫌其詞之繁而不殺也素方進用於時所以為親榮者未知其止固當屢書不一書姑為之銘俾刻以俟銘曰危出于姬顯于唐伯仲並起尸一方或變其姓後方昌為宋巨人司文章綿綿大宗多材良仁和身退名愈彰垂芳奕葉逮太常有子承考沒不亡發于皇朝耀休光賁以命書煒煌煌增髙益崇未渠英琢石以俟于其藏贈承事郎尹公墓志銘和之某縣有隱君子尹公諱堯道字道夫既卒二十有六年以其子則祖官七品追贈承事郎於是則祖以書來曰則祖之家故多顯者逮我先人始不有祿食則祖遭值盛時忝備官使賴先人之遺訓苟逭瘝曠得以疏榮賁及泉壤蓋先人之葬巳久墓道有石而無文昭上恩以侈先德兹惟其時幸為之銘尹氏世居開封之酸棗宋真宗時有仕于和州者因占籍焉其譜可見者朝請大夫漢傑生某寺少卿希古希古生通判某州穆穆生某縣主簿莘之又八世至公之顯考諱亰字景山咸淳乙丑進士𥘉筮尉興化數平反疑獄有政譽遷廬州教授入皇朝晦迹弗仕公自丱歲即有志欲以明經取士科莆田周君合肥汪君夏君號名師儒公悉從之遊習為詩以􅊞家學年甫十五而埸屋事廢遂絶意仕進屏居黃山率其弟舜道事親以孝廣田園以供伏臘間出遊江淮操竒贏以自溷有餘資則周其族􅊚里黨不以自豐殖也公為人多材能有幹局持身莊重而遇事通敏博涉群書至于隂陽方伎無不通其説以善自韜默人鮮有能知之者公卒于大德十一年八月五日享年四十有六配束氏武翼大夫某之女先公六年卒享年四十有三今贈冝人其合葬以公卒之年某月某日基在某鄉先塋之次子男三人長則祖承事郎台州路總管府經歷次榮祖杭州路醫學正次振祖未仕女一人適凌國賔昔者竊聞之世其家業而不隕者雖古猶乏也尹氏八百年間圭組相望獨公終于布衣而有則祖為之子克以材自奮及見其登憲幕以卒兹又荷國之寵靈以發其幽光可謂死而不沒矣播諸石章用告天來者以似以續尚延其餘慶于無窮哉銘曰繄公之先歷世顯融十有二葉而止于公惟弗終止是以有子際于昌辰以復其始公則死矣有生之榮龍光下𬒳耀于泉扃母曰君子其澤五世在爾後人有引勿替婺源州知州致仕程公墓志銘公諱郇字晉輔姓程氏其先廣平人唐御史亮以直言忤旨謫通義令通義宋眉州也子孫家焉髙祖諱符孫承事郎贈太中大夫曽祖諱公許嘉㝎四年進士官至刑部尚書兼侍讀以龍啚閣學士致仕贈宣奉大夫諡忠文自忠文始出蜀而僑居于今之湖州祖諱子泳贈奉直大夫考諱繩翁朝散大夫將作監入皇朝以公貴贈奉訓大夫台州路黃巖州知州飛騎尉追封烏程縣男妣陶氏追封烏程縣君公幼聰慧又生于名家耳濡目染能蚤有知年十二入鄉校頴出儕輩間稍長遊心聖賢之學于書無不讀為文博敏閎肆有竒氣下筆頃刻數千言觀者莫不駭服前代遺老如尚書陳公存參政文公及翁大卿牟公巘與公居同郡咸器重之用薦者署嘉興路儒學録丁外艱服除升平江之和靜書院山長書院故在虎丘為寺僧所據既徙置城中豪家又欲奪而有之賴公力爭而止秩滿上名中書適值銓曺行限年法再調紹興之和靜書院山長書院奮有田七百畝籍于郡學公取而有之用纍考合格授將仕佐郎台州路儒學教授新殿宇及禮樂之器增置養士之田百餘畒調將仕郎鎮江路總𬋩府知事郡當南北往來之衝前是為幕僚者窘于將迎事多留滯公獨處之𥙿如遷從仕郎衢州路江山縣尹為政務平昜官府日益無事以餘力造舟濟行者且買田百餘畝使為久逺計使者行部郡守縣令多生事免公獨以廉介見禮遇再遷徴事郎武岡路綏寧縣尹縣鄰于溪洞民夷雜處竊發不時公將循以愷悌之政人多感化境內以安會廣寇猖獗犯全道兩州長二而下以供億軍需出境公獨任縣事師旅經從柭梧遣發戒令嚴眀士􅌰帖帖不敢肆行省檄發屬郡民兵公選義勇應之皆慷慨赴敵戰數有㓛縣有義倉糧二萬餘石積為豪強所侵公悉徴理之歲適大侵賴以全活者甚衆有偽鈔獄十年不決公力辨其非辜既而朝廷遣官慮囚閲其始末見稱明允升承事郎慶元路慈溪縣尹慈溪密邇帥閫事尤叢劇公設施注措若不經意而咸盡其冝縣故以食鹽額重為民病公規畫有方賦足而民不困縣東花嶼蓀湖受諸水溉田可六十頃豪民或請堙湖為田而輸糧于官吏以成案請署公毅然不可事遂寢湖旁農家乃均獲其利公三為縣涖事之暇尤垂意于庠序之事年乘七十預請納祿遂以奉訓大夫徽州路婺源州知州致仕公既歸老于家杜門不出手植五栁于前庭扁曰栁軒舍下環以松菊時與諸老留連觴詠置家事不問四方來求文者應酬無倦色有栁軒退藁十卷藏于家俄感微疾既痊而復作却藥謝醫談笑如平日忽命具湯休斥女侍呼子孫立左右端坐而逝公生于宋咸淳巳巳四月一日卒于今至正六年七月二十五日享年七十有八娶史氏中書舍人其之孫女封烏程縣君子男四人長遊兩浙都運鹽使司海沙場鹽司管勾次濤次洽次女一人適孟良實孫男八人權模楷植楫同生文孫住孫女七人曽孫男一人遊等遵治命以是年十月二十九日奉柩葬于烏程縣永新鄉桃塢先塋之旁公為人溫良昜直未嘗髙自標榜與人交無畦畛與後生談前朝文獻歷歷如指諸掌喜誘人為善不深于疾惡故賢者親而愛之不賢者敬而畏之𥘉龍啚公事宋理宗為兩制侍從權臣枋國憸黨盈庭鋤姦衛良靡遺餘力凡五立朝而五速煩言每一去國更得盛名公際遇聖世朝廷清明而又恬處下列得以從容進退者與龍啚公所遭之時異也溍幸嘗辱登公之堂而接聞公之緒論遊等又不逺數千里奉國子助教宇文公諒之狀來徴銘誼不敢辭銘曰程顯唐世由御史君龍啚仕宋乃振于文危言正色匪躬之故寧與百壬更起迭仆髙風盛德增光前人垂休委祉逮其曾孫以名師儒為賢長吏視龍啚公世殊事異非有􅌉錯利器焉施長歌鼓缶式全其歸人之所瞻百年喬木世其家者是似是續承務郎富陽縣尹致仕倪公墓志銘公諱淵字仲深倪氏其先汴人宋靖康時五世祖南金以武辨扈從南遷于錢唐四世祖某又徙家烏程故今為湖州人曽祖俊民弗仕祖椿年用同知樞密院事謝公堂奏輔官終于某路兵馬監押父守真輕財尚義鄉稱善人入國朝以公貴贈承務郎松江府判官母濮氏贈恭人公生而卓異精敏絶人讀書遇目成誦德祐失國科舉事廢公年甫九歲猶能習為其文既長乃棄去而刻意聖賢之學三山敖先生繼翁深於三禮而尤善易公從之遊於莭文度數之詳辭變象占之妙靡不博􅊲洞究參知政事文公大理少卿牟公皆前代遺老莫不器重焉用薦者署本郡儒學録髙公克恭持風裁慎許可時為江浙行省左右司郎中聞公名欲識之一見與語降歎不巳曰君大才不可小用也及為南臺治書侍御史首以敖先生及鄧公文原陳公康祖姚公式與公五人並薦于朝未報而行省調公杭州路儒學正河南王孛憐吉䚟嘗受業魏國許文正公之門方以平章政事行省江浙聞公講説大契其意即遣子從公受學且移文中書舉公可教國子而中書巳㝎擬臺章所薦五人各輔郡文學乃以公為杭州路儒學教授視事伊始承歉歲之餘帑庾枵然絃誦息響適嗣歲小稔則量入為出莭縮浮蠧既又復民問冒沒之田為米三百石資用稍充乃嚴飾從祀輔造祭器自禮殿論堂書閣至它屋室皆一新之先是列郡釋奠多用俗樂公訪得故太常樂工兩人俾以雅樂教諸生胄監聞之因招致兩樂工為國子樂師今諸郡備金石之樂實自公倡之秩滿當改調于是髙公巳為吏部尚書舉公可任史事中書左丞髙公昉前在行省雅知公即欲處以編摩之職公微聞之亟具啓事以親老乞便養遂以公為湖州路儒學教授未上丁外艱服除中書左司都事王公克敬知公不樂逺宦諭銓曺授以元缺復需次于湖州家食者十有五年恬然若與世相違泰㝎丙寅江南三省交聘公校文鄉闈使者同日至公辭不獲遂應江浙之命士論翕然歸之湖學自虞君志道主教事重搆先聖殿而杇慢藻繢多待公始完既又葺稽古閣改建講堂考安㝎先生湖學奮法列經義治事諸齋以惠來學又創仁知軒為其遊息之所其後學者為公立生祠公移文止之不得躬往撤之用纍考入流授將仕郎太平路當塗縣主簿時長官皆以故免去公獨理縣事延祐𥘉經理田土考核多失其實賦斂不均公私咸以為患公為分畫編次以為啚籍出其隱匿而去其增加二稅乃如期而集縣有㝎塘溉田可十頃豪家據而田之民以病告中書下其事于版曺議以還民吏憚豪家莫敢奉行或言于公立命歸之和州民有田在縣境富家與為交昜劵成而負其民訟于官而富家執劵自辨有司莫知所裁乃越江來訴公探得其情始懼而以其直歸之縣民立異姓為後者所後父母沒巳久有非其族而姓偶同者賂吏給慿改立而盡奪其資産公焚其憑而釐正之里父老數十人羅拜馬前曰公神明之政也歲適大侵民以狀言災傷郡戒縣勿受公爭之不得即解印求去郡中驚悟遣吏謝公且以檢視之事悉諉之公躬履阡陌不避其勤民賴以蘇元公永貞為江東廉訪副使巡厯而還謂其使王公士熙曰吾分按太平池州廉能吏惟一當塗主簿而巳王公亦素知公聞之喜力薦公才堪風憲元統乙亥江浙行省參知政事孛术魯公翀復聘公司文衡禮遇尤至部使者舉公可上縣令而公以年垂七帙告老而歸授承務郎杭州路富陽縣尹致仕公天資粹美而輔之以學造次必由于禮家人未嘗見其有惰容居官朝出涖事暮歸讀書課子弟或至夜分不寐少嘗從星官曆翁治其術運算尤精既老于家杜門罕與人事接潛心於易著易集説二十卷啚説序例各一卷十年之間精力盡在是書矣公寡嗜欲善攝養老而氣貌益充無衰􅉵態俄以疽發背而􅌰病巳革猶置昜説于几案間時諷誦之語其子曰死期至矣夫復何言須臾翛然而化至正五年夏六月二十九日也娶鄭氏先十八年卒贈恭人子男三人長􅋮巳卒次駿松江府儒學教授次侁女二人長適楊福孫亦巳卒次適陸元瑾孫男六人長璨用公廕為紹興路錢清務副使次璛琰璋瑛瓉女三人曾孫男二人女二人公昆弟四人伯叔季皆早世叔有遺孤甫四歲撫而教之踰于已子伯季皆無嗣則以駿侁為之後駿等遵治命以某年冬十月某日奉柩葬烏程縣德政鄉毗山先墓之次與鄭恭人同兆域後四年乃命璛赱京師屬溍為之銘蓋髙公所薦五人惟鄧公掌制命侍經幄仕最顯公雖與有民社而未足以展其材餘三人又僅止于文學掾然皆能脫略名迹而以道義相髙有識之士莫不服髙公之知人而嘉五人之不負所舉也五人相繼下世巳久今天子以鄧公先朝奮臣用臣僚奏特賜以神道之碑銘而溍以門生沗𬒳上旨與聞論撰兹又執筆而銘公一時之人物至是凋落盡矣何能無感愴于斯文也哉巨曰知人之明古以為難聲求氣應夫豈偶然公𥘉有逢連茹而進孰不望公爭翔競奮大道甚夷公行徐徐既揚其英發而不舒自首一官老于文學丕闡聖謨以開後覺晚乃佐邑未究所施俄復引年納祿而歸加恩增秩不煩以事鼓缶而歌優遊卒歲儲祉則豐卑于來昆尚克自振益伉其門史氏作銘言無溢美寫之方珉揚芬千祀金華黃先生文集卷苐三十二
