body:
  text: 贈黄資深臨川危素編次番昜劉耳校正􅈵風蕭蕭吹敝裘三年小作周南留相逢傾蓋盡青眼肯抱遺經空白頭捧檄定知毛義喜著書非有虞卿愁春秋决事待公䓁莫戀寒氊成乆逰題張武定公死事詩卷後古稱馬革褁尸還秪有空言世共傳一死如公良偉甚百年遺廟獨巍然要􅀙身後觀餘烈試聴軍前奏凱還文武衣冠方迭起後先奕葉更綿綿題王君冕同年芳潤亭花縣歸来晝寂寥終南山翠湧亭臯林􅀷未覺蘭蓀變天逺何妨雨露髙此去漑根須食實誰分賸馥與殘膏行看小試揮毫手香霧霏霏滴鳯毛題丁文苑同年哀詞後自别瓊林雨露􅁁江湖目㫁繡衣前禹門尚想龍􅀄化遼海驚聞鶴已仙烈日秋霜空耿耿重山􅀫草正芊芊不才後死知何用坐對諸郎獨泫然送尉彦誠道州經歴一别垂垂四十年朔風吹􅁂雨蒼然寒氊乆㘴歸何日上幕􅀄登望若仙莫使催科書下考盛談名理繼前賢春生馬首逢廽鴈併冩相思入近篇送畢縣尹歸途環佩曉􅃢􅃢白日青天映羽翰疑是省親辭太學驚聞出宰用郎官花迎墨綬春光暮風引仙舟海色寒想見捧觴仍戲綵鄉人争作錦衣看送陳季和髙齋燈火正蕭條忽遡天風上沈寥共喜彈冠如貢禹豈期投筆學班超時清桴鼔元無用􅀊晚弓旌倘見招雪後江南春水活重来莫厭驛程遥送陳君歸江西咫尺清光近玉除姓名何不逹公車也知賈傅今無䇿猶􅄑虞卿􅃇有書江上歸帆随去鴈年来旅食厭􅀐驢諸公正索山人價能勿相招學隠居送張良卿學士之淮南坐厭流塵拂面紅行携􅈵月下青空三千里外楊州鶴四十年前御史騘先廟鐡衣猶卧壁兒郎玉帳已生風貞元朝士今無㡬歸及花時一咲同次韻蘇侍郎平村晚歸中臺多暇獨儀曺退食歸来路不遥扶老未須蒼玉杖行春聊過赤䦨橋揮毫風雨傾三峡聴履星辰接九霄愧我白頭方􅀝席敢􅀅巴曲和仙韶夀吴宗師非煙瑞氣欝嵯峨帝遣仙官下大羅㘴看層雲三界小行周花甲十年多詞臣灑翰題真賛詔使傳觴薦雅歌少駐壷中閑日月長安銅狄要摩挲嗣天師禱雪有應諸公咸為作詩邀予同賦萬人舉首望蓬莱詔使函香出上台祕殿緑章方夜奏層城銀闕巳天開新晴更覺西山好和氣應先北斗􅅆下土儒臣驚偉􅀚仍聞鳯沼有詩来送王法師祠武當山二月春光􅀞不如緑楊隂裏度雲車獨持使節辤金闕逺上天壇禮玉虚􅀱吏傳呼開洞府羽人􅀧指望霞􅅂仙家近在蓬莱境歸及皇輿北狩􅀄送尚子正理問上相臨分控列州理官髙選用儒流風生使節聲華舊地近台垣寵數優南土政平多睱日西山氣爽入新秋公餘若過􅅬王閣煩為題詩在上頭送蘇伯脩憲使乆􅂙法從侍凝旒忽擁幨軺按列州太史山川皆熟路淮南草木自生秋遥瞻龍節辤中禁尚想鼇峰接雋游樗散鄭䖍無􅀁用􅄑搜巖穴副旁求送王止善檢校官無失政吏無􅀻鉤校寕煩事細微遥想名曺多暇日不妨髙詠發清暉潮生江上仙舟逈春到湖邉驛使稀送盡北来南去客石田茅屋㡬時歸送髙唐李知州来登延閣預時髦出守名州領教條巳羡漢儒知吏事要􅀚齊俗變風謡䨇旌前路方迢逓八座家聲未寂寥此去行須歸報政鳴珂㡬日造昕朝送􅀓汝礪廣州教授耻學山人赴辟書勇随使者駕軺車横經乆合居髙座上􅃁應須過舊廬黒夜文星南斗外青冥鵬路北風􅀄来期莫落梅花後待詔先生席正虚送劉遂􅀄脩撰近聞退直自承明忽報􅀭鑣出鳯城未老巳嫌金帶重暫歸不著繡衣行故人尚作瀛洲客􅀊晚無忘魏闕情臨别贈言聊復爾誰能持酒􅂆公榮送于􅃌揮歸宻州故山東望路何長逺奉靈輀返夀蔵予告公朝存􅃇典䟽封泉壌發幽光緫戎行復開油幕儤直仍須赴玉堂它日過家如上􅃁􅀊寒松栢正蒼蒼題春暉堂一别慈顔隔􅀊時故山遥望白雲飛近聞巳㧞仙山宅不用更逢㳺子衣九轉還丹堪却老千年華表未容歸寸心猶恐恩難報擬託斯文重發揮書巢張君挽章􅀊晚巢君􅀉一枝上林無樹可相依不随葉縣飛鳬去竟作遼東化鶴歸架上牙籖書在否門前珠履客来稀春江如箭舩如馬忍見丹旌颺落暉府判謝公挽章換得朝衣不稱身勇辤新爵號遺民錬成偃月爐中藥閱遍銅駞陌上人魯􅀦靈光俄委地謝家玉樹正傷春怱聞􅃇唱貞元曲衰涕能無灑石麟予與江隂何鼎叔鉉别三十六年乃相見扵錢唐感舊述情謾成四韻月寒霜樹乆相依春去風花各自飛逺信巳随潮水斷故交渾􅀂曉星稀綈􅂁可戀知誰在青鏡頻看歎昨非正欲􅀙君共傾倒莫言興盡便須歸庚戌正月二十一日予與儒公禪師謁松瀑真人于龍翔上方翰林鄧先生適至予為賦詩四韻諸老皆属和焉後三十一年􅀊􅉝巳正月二十三日過伯雨尊師之貞居無外式公劉君衍卿不期而集􅂺􅇷用前韻以紀一時之髙㑹云廬山舊事誰能􅁇三十年前此㑹同偶爾共来今日雨蕭然猶有古人風坐深遥對花如霧興盡徐歸月滿空仰止前脩那可作聊􅇷餘響託無窮送式公歸髙麗一錫􅇒空海上飛星河蕩􅃞宿雲波頗驚遼鶴歸来晩正值驪龍睡覺時百尺􅃢瑚無地種六花薝蔔任風吹髙秋蘭􅀂煙波外此樂應須乆自知送史景福十年相望各天涯上幕新開􅁂未華日岀公庭来鴈鶩風生老筆動龍蛇蜀郷路逺春多雨江國雲深樹有花􅀂見君家彭澤令爲言且莫問桑麻次韻荅薛玄卿真人都門一别向天台二十餘年獨此来衰朽尚慙沾禄食凡庸安得借仙才􅄑逢休運臨奎璧宜有英髦出草莱容我脫身巖壑裏籠鵝時復泛舟廻送夢堂噩公住開夀寺天低海闊路微范此去頭頭是故郷但覺英游空兾北肯隨世好薄淮陽至人無夢心華現夀域重開化日長蔵􅅱有知應咲道吾孫也識老馮唐送􅁇公住東掖山西􅁜江上渡􅂳廽東掖山中聘使催飛錫􅇒風天路永寳華如雨法筵開髙談應有龍能聴佳句須令鴈帶来老矣江淹才欲盡暮雲凝碧思悠㢤贈龍山詗上人舜江東下艤官船㡬聴潮聲徃復還老去未知重到日夢中誰識􅃇逰山秋風飛錫来天外滄海遺珠出世間為問而翁強徤否龍門髙絶許誰攀題莫氏山㽵圗旋移小隠近南峯逺有咸平䖏士風山態近人猶偃蹇湖光無雨亦空濛行春杖屨時時到臨水軒䆫面面通别作小亭供戯􅇵青帘揺曳杏花中丁亥六月十三日上亰翰林開院喜雨院長開府公俾爲詩以志之雨浥鼇峯長緑苔佳辰良㑹玉堂開􅈵生薫殿宸居近恩予官壷詔使来盡醉不愁􅀐馬滑新詩可待片雲催作霖政尓須公䓁行見文星入上台安南遣使入朝用故事奉贄納謁于翰林其歸也次介􅀺括以贈言為請賦詩四韻以遺之上聖敷文格逺人外藩脩職用儒臣並馳使介踰丹徼特設朝班覲􅂵宸炎海計程歸塔永都亭宴餞寵光新祗承德意勤宣布鼓舞鳶魚詠至仁送徐志尹赴安郷縣尹自為􅀙史直鑾坡㡬見郷山爛斧柯能事正宜􅂙筆削借才聊復試絃歌屈原故國蘭都長陶令公田秫最多應咲衰翁苦留滯汗青無日欲如何送陳元逹代祠􅀘怛落迦山天下名山小白花鯨波帖帖度仙槎函香祕宇祈靈貺出節宸廷振使華殿牓舊誇韋誕筆錦衣重過買臣家相門喬木殊無恙萬古清風碧海涯逰夀山五峯寺鑿開混沌自何年广石垂空一髪懸飛瀑散為花雨落老僧長抱白雲眠􅃇逰不改桃源路化境寧同􅂎􅀦天囬視人問成壞相無邊刼海正茫然送李師曽蔣仲善赴春官憶随飛鶚上秋天夢㫁慈恩四十年及此􅁂毛俱秃盡見君頭角共嶄然計偕巳趣軺車動臚句行聴衛士傳􅂵陌紅塵衣易化看花得意莫留連送徐教諭苔生茅屋鄭公歸杜宇從今不用啼小雨輕風寒食後殘山剰水浙江西夜䦨深巷猶燈火春暮髙城自鼓鼙好向清時窮勝事花前莫惜醉如泥次韻荅胡古愚愽士麻衣草座老仙翁曽及清時侈際逢行殿曉趨開豹尾禁林秋宴出駞峯休官尚想英游並愛客何嫌異味重况乃東陽山水窟主張風月有詩宗予與子長以庚戍之春癸酉之夏兩至赤松今年秋復来則子長巳倦㳺而予亦老矣同㳺者汪生元眀許生存仁旣又得龍丘余子方與俱行由小桃源登煉丹山謁二皇君祠囬􅀫寳積觀感􅀊時之代謝念交朋之離合􅂺成短句奉蕳子長来徃仙家􅁆十秋未能長共赤松逰暮年􅄑巳成􅀄志吾土何妨為少留歴覽舊山如夢境喜逢新士緫名流桃源近在人間世誰解相從老一丘丙戌中秋􅀫徐道濟書房即事兼懐永之郎中天開屏嶂列竒峯水滿方塘碧鑑空十里平原無曠土百年喬木有清風髙齋偶爾成三􅀫羙酒欣然為一中坐對良辰并樂事興懐存殁思何窮題􅀞卷渡口歸舟取次横歸人相逐望柴荆蔵村古木株株暗背雨閑雲片片䡖巨石􅀌撑如欲堕遥峯寸碧不知名披圗省識曾逰䖏日暮山隂道士行送髙生歸淮南山林早巳遂吾􅀄湖海交逰日漸踈枉過謾勞千里駕清言難敵十年書要知俗學元無用且復歸求自有餘投我木桃何以報邉韶腹笥乆空虚送馬縣尉烱烱半標玉樹枝神仙􅀮吏最堪為况逢繡水重清日正是金沙欲現時􅀫雨漲溪飛去棹微風拂地颭歸旗雲霄直上無多歩掺别空慙兩􅁂絲送覺上人逰金華山憶同夜上妙髙臺坐􅃪泉聲響怒雷乆别煙霞如夢􅄰舊題巖石長莓苔掛冠方厭人間事飛錫俄􅀙天上来何䖏新春可娯客金華山色􅂵崔嵬次韻伯雨臘月八日雪中同登来鶴亭興来欲泛山隂雪不柰舟膠野水凝朝士白頭愁獨歩仙人赤脚傲層氷招徕盡是雞群鶴趍附空慙􅂹尾蠅夜乆松龕同擁毳絶勝儤直有青綾題張真人玄静菴一峯屹起碧嶙峋隠隠金雞五夜聞安用佳城開白日正須㧞宅上青雲天垂龍井丹光接地拆􅀛潭水􅀔分閣老新題今寡和往来仙子􅄑能文五言絶句題趙公􅀞蘭竹猗蘭幽人操緑竹君子徳夭夭彼􅁄心胡為乆吾側題錢舜舉作東坡􅀞竹圗執筆不見人毫端赱風􅀨至今身外身獨與墨君語題馬虚中􅀞人歸白雲䖏舟在清溪曲不聞欵乃聲但見山水緑題郭天錫􅀞漠漠踈林晚蕭蕭寒鴈鳴窮秋萬里客開卷􅀂為情題眀公􅀞蘭猗蘭如幽人不受塵俗拘墨卿亦何為挽之来座隅題木石􅀞卷山木則有枝白石何時爛長歌木石間冉冉􅀊年晏七言絶句青山白雲圗十年失脚走紅塵忘却山中有白雲忽見􅀞圗疑是夢冷花􅈵葉思紛紛松江舟中偶書山房偶為故人留又領飛雲過別州白浪千花帆一葉茫茫天地此生浮移舟夜泊華亭縣却聴吴歌思渺然最憶澱山湖北寺白雲堆裏看青天追和景傳新店客舎壁間韻我夢方酣子􅃍醒絶絃可復要人聴梨花寒食東風惡淚盡重山􅀫草青題蘇黄二先生像五祖禪師出世人婆娑乆已㫁生因莫􅀅描􅀞虚空手更覔當年身外身咲殺黄龍老晦堂相逢剛道木犀香披圗面目渾依􅃇鼻孔何曽有短長題諸公䟦子昂詩晚生猶􅄑及諸公展卷還疑是夢中日暮况聞鄰舎笛􅁂毛衰颯正秋風題宣和御􅀞青城塵土晝濛濛百二山河一夕空収歛神功歸化筆野花啼鳥尚春風宣和􅀞木石石􅁁古木尚青枝地老天荒石不知故國小臣誰在者蒼梧落照不成悲堂和􅀞牛淺水平沙落鴈時長牟頋犢過前溪睿思東閣圗中看寕見北風吹草低宣和盡䑕睿藻徒煩飾細微撫時􅀚物重歔欷更無麟鳯㳺郊棷池籞秋風野䑕肥武王扇暍圗一夫偶爾獲清􅈵四海仁風孰奉􅀭有道曽孫不忘逺􅄑均此施遍羣方洪涯出逰圗靈仙飛化事難言驢背春風度市門不到人間今巳乆多應醉卧古藤根題子固􅀞蘭天人眉宇帝王孫憔悴寕同楚屈原何意清風眀月夜盡􅀅心事託蘭蓀題子固墨梅南渡倉忙彼一時􅀌臣曽賦墨梅詩安知亰洛風塵外有此青春玉樹枝題李早􅀞馬平沙如雪草如煙想見春風士馬閑玉勒錦韉塵土化􅀞圗流落向人間山水圗老樹無隂石有稜亂山髙下白雲層夢中猶識江南路惟恨舟人喚不譍海月圗憶曽夜叩潮音洞海闊天髙月正中㘴對􅀞圗如夢寐六街塵土晝濛濛水仙圗翛翛翠羽映眀璫誰遣乗風過我傍􅀊晏髙堂空四壁一簾煙雨夢瀟湘桃竹􅀞眉圗􅀃盡春愁䫉不成翠深紅逺􅀂爲情江南有客頭空白腸斷東風百囀聲灤陽邢君隠於藥市製芍藥芽代茗飲號曰瓊芽先朝甞以進御云君家藥籠有新儲苦口時供茗飲須一味醍醐充佐使􅀙今合喚酪為奴芳苗簇簇遍山阿珠蕾金芽未足多千載茶經有遺恨吴儂元不過灤河春風北苑闘時新萬里函封效貢珍羡爾託根天尺五不勞飛􅀐走紅塵次韻虞閣學上亰道中欲去仍為一日留玉堂中夜有詞頭歸鞍曉逐南飛鴈猶及西山一半秋送許􅂙政歸武昌别業九衢蕩蕩緑槐風旌斾揺揺馬首東惆悵鳯凰池上客青天萬里一㝠鴻待漏東華霜滿靴掛冠神武意如何也知乆歴中書考若比汾陽恐未多氊筆書題墨尚新杏花零落故園春一􅀙今日公歸後身到黄扉復㡬人曉日都門祖帳開路人嘖嘖歎賢哉東風無限新桃李不敢煩公手自栽片雲為雨出山時羣物欣欣各自􅀻収歛神功去無迹㝷常草木竟何知住近韓家晝錦堂不􅀅牙纛詫同郷翻嫌相國歸来日腰下猶懸太守章白袍鵠立漫紛紛遥聴車音共􅀱門相見惟須飲醇酒看山看水㘴忘言南逰聊食武昌魚莫學騷人賦􅁲居天子若思真漢相可云吾亦愛吾廬五十人間冨貴年山中道士早求仙石田茅屋歸無計愁絶燈前老鄭䖍龍門尚想􅃇同逰藥籠深慙晚見収新築沙堤却何日欲歸且復為公留石節婦詩伯也南征去不歸舅姑長慟小兒悲元戎奏徹鐃歌曲来聴完州節婦詩四皓圍棊圗當局沉吟秪謾勞區區勝􅀒直秋毫顛嬴蹶項非君事頼有安劉一着髙屈原行吟圗大夫生不遇眀時故爾行吟楚水湄今喜太平歌既醉不須多和獨醒辭瑶池春宴圗西飛青雀㡬時還貝闕琳宮縹緲間筆底春風殊未老蟠桃積核巳如山韓幹衮沙馬圗韓生妙􅀞本無師正值沙塲馬壮時虎卧龍跳未渠巳朔風駿尾亂如􅁝桃源圗山容惨惨􅀅為雨雲氣垂垂欲傍花莫問前村何䖏覔垂蘿盤石即吾家題髙公􅀞竹木木葉蕭蕭半欲空竹竿裊裊不成叢絶憐意匠經營䖏都在風煙惨淡中版築圗千載巖阿迹巳陳披圗風采儼如新兒曺秪羡麒麟􅀞誰記前朝夢裏人牧羝圗屬國歸馳􅃇使車披圗仍是牧羝奴不知它日麒麟􅀞如此風埃滿面無甘美人家蔵李翰林醉歸圗可是良工筆有神冩成醉䫉出天真雲牎霧閤時開卷咲殺當年捧硯人大年小景叢叢古木煙雲晩葉葉秋荷浦溆風開卷無聲元有句安排旋巳落空濛題平章康里公春日杏園西即事詩後鏘金戞玉音聲古抉石奔泉氣􅀔雄目㫁雲車天路永小樓春雨杏花風逺塵齋􅀉言佛子善思惟莫厭塵勞事出離法界本来無逺近須知煩惱即菩提怡雲亭道人無物可怡恱偷眼看雲山石中爲問風吹雲散後􅀅何游戯太虚空先照樓􅀄日􅇛􅇛出海東􅇒晨先照最髙峰不知今日華嚴界樓閣新開第㡬重鳯山鷺雪軒千山杳杳一僧歸鳯去山空僧不知忽見鷺鷥飛似雪逢人開卷覔題詩月庭夜乆庭空萬􅄜沉寥寥一月在天心莫教見􅃌先忘月更向申到䖏㝷次韻荅濟公舊逰零落如星散坐對􅀌山似守株聴徹貞元供奉曲羞􅀅短髪照西湖病須藥餌親丹竈老厭書帷徹絳紗􅄑有文殊来見問更無天女散天花白頭朝士方徒歩欲過六橋愁路賖目斷紅雲花島上樓居縹緲梵王家題清鏡閣投老歸来賀監舩何時結屋鏡湖邉羡公髙㘴毗盧閣萬水同波一月􅇛題趙伯容鶴巢平原公子去翩翩獨遡剛風直上天家近􅀌山春樹好歸期莫落後千年老牛磨癢圗感時懷古彼何人叩角啇歌涕滿巾溪畔牧兒方自適癢疴都不切渠身題文泉石眼元無一尺深中涵千古聖賢心潘江陸海毋多詫好向源頭活䖏㝷飲後示陳生􅀊終博士不超遷便腹先生醉欲眠匡鼎若来猶自可後堂無䖏着彭宣野航亭新亭下瞰碧溪流楓葉蘆花兩岸秋應念兒郎風雨外半區學舎小如舟牧溪圗何人貌此多牛翁世間之樂􅀅無同我亦金華牧羊客可容添著􅀞圗中䑕粟圗四頋茫茫復畏誰終朝􅀼食可無飢是間大勝倉中樂丞相當年特未知􅂵菊圗九陌青春拂面塵故園秋蘂爲誰新披圖風露生顔色萬里天涯有似人􅀝梅圗􅃒莫南枝與北枝得春多䖏即堪依故園夢㫁頭空白千里􅀜山雪正飛題扇頭翛篁老栁各成叢兩岸樓臺夕照中逺水如天舟似葉釣竿長裊一􅁝風峭壁攅峯上入雲珍樓寳閣四無隣小橋流水春風外時見􅀭鞭舉棹人次韻題墨梅一自携家湖水東放舟時度玉花叢因君貌得横斜影閑却􅀌山月一蓬題澧水雪消圗嫋嫋幽花野水湄暖風晴日雪消時竹君石友何為者春去春来緫不知題獨山詩卷後一錫一瓶兼一單懸氷跨雪度雲端悄然獨宿孤峰頂不與叢林共􅀊寒贈月江術士㘴閱人間六十年始知我命不由天千江一月無分照枝北枝南影自偏題陸山長栁洲簇簇春山􅂵翠圍瀰瀰烟水白鷗飛東坡正作西湖長一曲空慙賀監歸題明公􅀞蘭呉僧戯筆􅀧生綃嫋嫋幽花欲動揺夢㫁楚江烟雨外秋風灤水暮瀟瀟題朱氏春雨樓粟里􅀌山二圗柴桑䖏士晉風流苔徑茅廬竹樹幽睡起小樓春雨足披圗還喜見西疇小樓春雨暗䆫紗㘴對咸平䖏士家盡日看山仍看􅀞方知梅有隔年花東陽縣西道中柿葉成隂緑滿村桐花覆地草連雲百年舊事無人記猶指前朝御史墳壬辰三月逰左溪癸已三月逰天宫有感而賦頻年謁拜祖師庭柢有山光與水聲尚想玄珠宻相付免令我慢肆譏評金華黄先生文集卷第六
