body:
  text: 祝文謁先聖祝文忝繇諸生蒙恩錫苐洋洋聖道實佑啓兹覆載生成名言罔既欽承睿旨展謁告虔聖神臨之敢負夙學諸暨州謁廟祝文先聖昔者夫子之論政蓋曰子欲善而民善矣溍忝繇諸生與聞有政請事斯語以對越夫子在天之靈三皇維三聖人為郡邑之通祀有著令溍祗事云𥘉肇以禮見遵舊典也城隍溍𬒳命佐州與有民社祗役告虔式遵故常治人事神敢不夙夜維爾有神尚鑒臨之東嶽泰山之雲實雨天下郡邑所在得望祀焉溍祗事云𥘉是用展謁曰雨曰暘維神其嘉惠之諸廟治人事神吏之職也禦災捍患神之力也通幽顯而一貫所以交盡其責也顧兹陋微無能為役也神之相之尚不忒也祗事虔舊典是式也維爾有神尚昭假也太史院秋祭祝文皇帝元辰天剛蒼龍之首躔次伊始元辰所舍永綏多祉億萬斯年歆此毖祀皇帝照星羅㬋日月之交是曰天首靈儀旁燭陟降左右祗薦苾芬尚祈默佑皇帝胎星室宿定之方中式營有居儲精上玄實開丕圗有嚴蕆祀神靈具孚皇后元辰小吉鶉首之舍坤維受事肅肅中宫元辰攸次神其降康饗于眀祀皇后照星太陽大眀麗天照臨下土承兹休光隂教是輔昭薦常事用膺多祜皇后胎星參宿坤申之間旗伐孔掦清眀在天淑德之祥來歆肆祀介福無疆太子元辰太衝對時育物青陽在春育粹震宫肇兹元辰精誠是鑒福祿駢臻太子照星太陽衆陽之宗有赫臨照重光所𬒳前星有耀永錫蕃釐無忘昭報太子胎星斗宿倬彼雲漢南斗有光降靈錫羡長發其祥精禋匪懈皇圗永昌國學仙設先師配位祝文釋奠上丁國之通祀四賢並修厥有舊章穆卜靈辰具嚴廟像奉遷改作伏慮震驚庀事云𥘉敢修虔告大成殿修造祝文禮殿有嚴妥靈兹允旅楹故惟新是圗飭材庀工諏辰興作廟庭清謐伏懼驚喧菲薦陳誠尚祈昭鑒巍巍聖師廟祀維舊增新崇構有覺其楹既固既完式芘爼豆吉蠲薦告兾兹妥安神之格思永世無斁太廟時享祝文青陽屆候雨露既濡永言孝思有懷先烈吉蠲致享來燕來寧錫羡降康益綿寶緒太宫奕奕列聖端臨蕆祀有常夏享以禴禮文告具昭薦孔時茀祿是承永世無斁太史院重修簡儀告成祝文欽天觀象肇自古先設置靈儀用嚴測候載新繕治稽合玄文涓吉告成式陳嘉薦謁胡侍郎墓祝文維神生為名臣沒有廟祀維桑與梓是庇是依巋焉兹丘髙山仰止展謁之禮大懼弗時爰考舊規祗薦爼豆有引弗替神其鑒之八世祖墓祭告祝文瞻望先塋邈焉異縣族分世易展省弗時大懼因循久或禋廢周視剪刜封植維新侵地畢歸仆碑復立恭陳菲薦伏謁告虔神其永寧芘及祚㣧先大夫封贈祝文維至正二年歲次壬午五月辛未朔二十七日丁酉孝子奉政大夫江浙等處儒學提舉溍敢昭告于先考祕丞府君溍蒙賴教有竊有祿位疏恩分土已表生榮進秩升朝載揚恤典伏奉至正元年十月制書贈奉政大夫祕書監丞驍騎尉追封義烏縣子慶澤所𬒳下逮一門祗念厥由不任感慕而溍繫于職守不得躬展彛儀謹遣弟溥淇詣墓次以告謹告維至正六年歲次丙戌正月庚辰朔三日壬午孝子中順大夫祕書少監致仕溍敢昭告于先考太常郡伯府君先妣郡君童氏溍忝有仕籍垂三十年幸免曠官克承委祉陳情歸養而奄罹大故乞身得謝而獲𬒳加恩伏奉至正五年三月制書先考贈中順大夫同僉太常禮儀院事上騎都尉追封江夏郡伯先妣追封江夏郡君今雖無燎黃之法而禮有可以義起莫之敢廢是用祗薦于墓下音容如在命數維新瞻望松楸不勝感咽謹告青詞行中書省禳火醮青詞充位備貟實難勝于重任遇災知懼爰載控于髙真恭啓玄科肅陳丹悃伏念臣等忝登台輔出鎮藩維當祝融司候之𥘉遭回祿降殃之極始自㕓氓之不戒致令府署之靡遺兹蓋臣等固寵妨賢有負公朝用人之意乖方失政未契天道好生之心徒攄籲帝之誠莫遏燎原之勢庸上酬于素欵庶永絶于非虞伏願圎象垂慈炎官悔禍群黎蘇息復安闤闠之居同宇乂寧均賴帡幪之力疏請如公住寶林疏師子座上要揚逹磨家風龍華會中幸逢彌勒伴侣庶紹隆于先業益振起于頽綱欲寫渴心無嫌饒舌如公禪師閩南異産濟北真傳雖嘗以佛法住持不倦于諸方接待急流勇退固知髙尚之情大厦將傾必藉扶持之力乃眷雙林之勝境猶存十剎之舊名豈容虛席而莫居是用闥辭以為請得萬間屋何妨儒釋一家拈一辨香共祝皇王萬歲請欽公住圎覺疏大覺圎地實此衆之所依妙法華經必有時而乃説是宜虛左以待司南凡在交遊舉同慶幸欽公法師冥搜教網逺紹祖燈遡流尋源深造四眀法窟韜光匿景獨宿蓬萊道山雖有志于利它𥘉不求于知我惟兹公選匪伊人謀一超直入以無難三請益虔而弗懈伏兾如佛出世能盡暢于本懷申命自天用增崇于睿算俚言不佞慧鑒是祈追薦先父疏意資父事君敢憚服勞于逺役呌天叩地驚聞遘禍于私門摧割奚堪奔馳靡及輒陳哀悃仰瀆慈尊伏念溍先父從仕郎溫州路樂清縣尹黃公涉世多艱承家罔缺早膺祖澤僅擬輔于一官晚荷國恩遂疏封于七品方安老境奄迫大期而溍忝預代言參陪扈蹕覺帝鄉之天近嗟親舍之雲遙雖未能求忠孝于兩全何遽至判死生于一别歸程甫畢凶問亟來始知屬纊之辰正在演綸之日病既無由嘗藥斂又弗得慿棺五十年父子之情晨昏永隔四千里關河之阻氷雪兼行逮獲執喪已踰卒哭不謹逺遊之戒徒銜罔極之悲罪大難容恩深莫報苟可事亡事死固當從俗從冝匪仗覺乘曷徼冥福伏願慧光等照慈蔭下垂肹蠁潛通俯鑒不肖孤之意爽靈昭徹速歸極樂國之居成無上之正真作來生之依怙祭文祭永康胡先生文嗚呼先生古之豪英清風峻標孰可狀名弗崇為髙顧以文鳴其文斯何出史入經汲書魯簡武戒湯銘下逮百氏名墨縱橫旁行敷落律令章程包羅揆序弗猥弗并維蓄之厚故施之宏紛其百嘉鬯逹滿盈藏英斂華根柢一貞以歸于極以集于成金舂玉撞發其和平逺彼聵聾勿使震驚獨抱厥器旅于天庭胡不廟郊薦之䪫韺乃弦乃歌乃佐武城人趍易良俗失悍獰稚耋熙熙怙為父兄于穆昌辰文事聿興乃謝􅎗鞿乃專鑑衡賤華貴實樹之風聲磬咳所及驅飈走霆學徒嚮方俊良用登藐此陋微亦纍品評贊邑海堧遺則是徴擇士藝闈緒言是承庶終惠我免夫兢兢曷使中路奪其依憑嗚呼先生為幽為眀有煒斯文揭若日星重江復山煙慘雲冥瞻言遠而泣涕雨零馳辭侑觴式昭哀誠行狀元故翰林學士承旨中書平章政事贈舊學同德翊戴輔治功臣太保儀同三司上柱國追封魏國公諡文忠李公行狀曽祖執皇贈濟美功臣光祿大夫平章政事柱國追封韓國公諡康惠祖昌祚皇任潞州招撫使贈保順守正功臣金𬗋光祿大夫司徒上柱國追封韓國公諡文靖父唐皇任徴事郎略陽縣尹致仕贈推誠保德佐運功臣太傅開府儀同三司上柱國諡忠獻母王氏追封韓國夫人本貫公諱孟字道復系出後唐李氏丗為潞州著姓康惠公金末舉進士不第以行義見稱于時文靖公歸皇朝佩銀符使潞州卒于官忠獻公始去家而仕于秦蜀四十餘年乃致其事樂漢中風土之勝因家焉公生而頴悟十歲能屬文稍長益肆力于學讀書日記數千言學既淹貫文愈超卓每考論古今治亂盛衰之故慨然有志于當世然耻于干進屏居閭巷開門授徒逺近負笈而至者翕如也時之名公巨卿如商公挺王公博文劉公魏公𥘉至漢中往往折行輩與之交郭君彥通于公為父執名能知人見公魁碩偉岸謂忠獻公曰此郎骨相殊常公輔器也至元十九年侍忠獻公留四川藩閫聞公名將置幕下辭不就改辟主晉康縣簿又辭臺府交章舉之亦不起一日幡然曰大丈夫固不能俯首州縣方今朝廷更化政治聿新招徠衆正材俊林立獨不可與之並逰乎乃束書如亰師行中書右丞楊公吉丁一見輒加器重薦之𥙿宗皇帝得召見于東宫未及登用而𥙿宗賔天楊公遂延致家孰俾諸子師事之翰林諸大老竒其材剡上于中書謂冝置之館閣而銓曹調公主梓潼縣簿非其志也忠獻公方為夔府經歷乃往省焉未幾從忠獻公出峽泝襄江還漢中日以奉溫凊具甘旨為事忠獻公勉之入仕乃復北上三十一年成宗皇帝臨御首命詢訪先朝聖政以備史臣之紀述公過關中陕西行省因俾公與諸儒討論彚次成編乘傳以進時武宗仁宗俱未出閣徽仁𥙿聖皇后求名儒職輔導公首當其選大德元年武宗撫軍北邊仁宗時留宫中公日陳善言正道從容啓沃多所禆益受知于成宗特旨除太常少卿當國者以公不及其門沮格不行改禮部侍郎亦中寢昭獻元聖皇后幸覃懷公以宫僚從戢衛卒無敢侵奪民居在覃懷四年夷險一節信任益專十一年春成宗陟遐神器暫虛宗王大臣密謀橫變國勢危疑人情􅍅洶公從兩宫還亰師遂與丞相哈刺哈孫答刺罕等力贊仁宗削平內難中外晏然定策迎武宗入正大統仁宗即承制以公為中書參知政事公久在民間于閭閻之幽隱靡不究知損益庶務悉中其利病逺近無不恱服然以抑絶僥幸羣小多不樂公不為之少自撓也居亡何言于仁宗曰執政大臣冝出于嗣天子親擢今鑾輿在道臣未見顔色誠不敢冒當重寄仁宗不許則逃之許昌築室于陘山潩水間若將終身焉夏五月武宗即皇帝位仁宗為太子物色得公所在白于上遣使徴詣闕下至大三年春正月入覲武宗于玉德殿上指公謂宰執大臣曰此先太毋命為朕賔師者冝亟任用之三月特授榮祿大夫平章政事集賢大學士同知徽政院事四年春仁宗皇帝正位宸極真拜中書平章政事進階光祿大夫推恩其先三世且諭之曰卿朕之舊學其悉心以輔朕之不逮公感上知遇毅然以國事為巳任慎賜子重名爵核太官之濫費汰衛士之冗貟貴戚近臣惡其不利于巳而莫敢言也前所建新法有未便者奏請革去百司庶政一遵世祖皇帝成憲而行焉仁宗素崇儒且察見吏弊欲痛剗除之公曰吏亦有賢者在乎慎擇而已上曰卿儒者冝與吏輩氣類不合而曲佑之如此真長者之言卿在朕前惟舉人所長而不斥其短尤朕所深嘉也同僚有積與公忤者人意公必銜之及其坐事見黜公乃力言于上俾殿外蕃且優加賜賚以慰其意聞者莫不服其有容方是時朝野乂安民康物阜號稱極治公欿然不自以為功士大夫或譽之輒謝曰此聖天子之德也吾何力之有焉乞解機務上曰朕在位必卿在中書朕與卿君臣當相為終始自今其勿復言尋賜爵秦國公上親授印章仍錫書命以褒寵之上在潛邸嘗因公所自號命集賢大學士王顒書秋谷兩大字御署以賜公至是又命繪公像敕詞臣為之贊入見必賜坐與語移時而退惟以字呼之曰道復而不名其見尊禮如此皇慶元年春正月特授翰林學士承旨知制誥兼修國史依前平章政事尋謁告歸葬其父母于潞州之先塋上勞送之曰卿襄事畢冝亟還母久留孤朕所望冬十二月入朝上大恱公因請謝事優詔不允然重違其意乃命以平章政事議中書省事依前翰林學士承旨知制誥兼修國史秦國公大夫令皆公視草史册所記亦公手自刑定辟置官屬多時之聞人二年夏請歸秦國公印綬不允童三上乃如其請先是上與公論用人之道公曰自古人材所出固非一途而科目得人為盛今欲取天下人材而用之捨科目何以哉然必先德行經術而後文辭乃可得其真材以為用上深然其言遂決意行之延祐元年冬十二月復拜公中書平章政事依前翰林學士承旨知制誥兼修國史二年春遂命公知貢舉及親䇿多士于廷仍命公為監試官秋七月進階金紫光祿大夫加勳上柱國改封韓國公職任如故公頻年扈從上亰數以衰病不任事乞歸田里六年乃從所乞解其政柄復授翰林學士承旨知制誥兼修國史散階勳爵如故公既退居散地日以文史自娛每入侍燕間禮遇尤至七年春仁宗奄棄羣臣英宗在諒暗中太師帖木迭兒再入相以公前共政時不附巳妄構誣言盡收前後所頒封拜制命降授集賢侍講學士嘉議大夫意公必辭因中傷之公受命欣然就職夏五月分治院事于上都至秋乃還略不以利害得失介其意恆謂人曰吾待罪中書無輔于國聖恩曲宥俾遂間適今既老矣何以報之上聞而悟其為譛也恩意稍加焉人望公將復見柄用至治元年春瘡發于股醫莫能療公知不可復起乃區别家事手書付家人使治葬地于燕遂以夏四月三日薨于大都和寧坊居第之正寢享年六十有七以其月十八日葬宛平縣石井鄉原遵遺命也公薨後臺臣纍疏辨其誣乃給還所收制命而復其元官今天子念舊圖功加贈舊學同德翊戴輔治功臣太保儀同三司上柱國追封魏國公諡文忠配劉氏前公二十一年卒納合氏昭獻元聖皇后所賜前公一月卒並封秦國夫人改韓國夫人俱合葬焉繼室何氏封韓國夫人有子一人曰獻今為資善大夫御史中丞知經筵事能世其家者也公宇量閎廓材略過人三入中書事關休戚知無不言援古證今務歸于至當苟有益于國家雖違衆而行無所憚四方之士為時所推許者甄拔無遺汲引後進未始有吝驕之色品題所及後多知名公退一室蕭然留連觴詠言笑竟日無異布衣時其為文跌宕有竒氣要其歸一主于理詩尤清壯麗逸人爭傳誦之蓋公之歷官行事及平生大略可見者若是而止中朝大謀議既非外間所得聞它所奏陳亦皆自削其藁莫得而詳也公已定諡于奉常而國史之傳未立許昌有公祠堂翰林學士歐陽玄為之記公詩文有秋谷集御史中丞許有壬為之序溍幸辱從兩人之後濫厠公門生之列公嗣子獻命溍為之狀以俟太史氏之采擇義不敢辭謹撰次如右謹狀至正八年月日門生黃溍狀元故中奉大夫湖南道宣慰使于公行狀曽祖某金定逺大將軍心水令曽祖母衛氏祖伯儀皇任朝列大夫太常丞兼法物庫使纍贈嘉議大夫禮部尚書上輕車都尉追封河南郡侯祖毋晉氏纍贈河南郡夫人父夔皇任中書省掾纍贈中奉大夫河南江北等處行中書省參知政事護軍追封河南郡公母張氏纍贈河南郡夫人本貫公諱九思字有卿其先家河南而仕于金汾州節度使知開封府者于公為五世祖朝請大夫延津令者于公為四世祖延津府君之子則沁水府君也自沁水府君而上咸葬汴梁金末之亂家譜散落獨存其官稱而軼其諱元光正大中尚書府君嘗給事內廷金亡奉衛夫人遷雲中逮我朝括新附之民以經義試中程得隸于儒籍復自雲中奉衛夫人還居薊丘殁遂葬焉故又為薊丘人中統𥘉禡禡丞相行中書省事于燕承制以為禮部貟外郎至元間乃以太保劉文正公薦召見大安閣預定朝儀授尚衣局使久之進丞太常兼法物庫使積階朝列大夫以年老辭不允卒于官參政府君受知左丞姚文獻公以為中書省書表官尋遷為掾甫逾壯歲而卒左丞魏國許文正公率諸生哭而誄之後以公貴追贈二代敕詞臣歐陽玄為製碑文凡行治之美恩寵之盛登載甚具參政府君始封漁陽郡伯張夫人始封漁陽郡君者以家之所在後徙封河南者本其世之所從出也公生四歲而失所怙稍長奉尚書府君及張夫人之教深自策勵博觀經史百氏之書以資其見聞又善為譯語入尚書中書兩省為必闍赤以久次為其提控至元三十一年授承直郎尚舍監丞數與同列奏請禁絶尅減衛士金帛之弊上嘉納而褒賜焉成宗正位宸極加上世祖𥙿宗兩朝帝后號諡公承上旨預書譯玉册慶賞之優無與為比大德元年以奉訓大夫知紹興之諸暨州諸暨故為劇俗尚氣而喜爭牒訴紏紛為長吏者恆患其不易治公委曲詢訪盡得其情偽擇尤無良者痛繩以法暇日則集州人之子弟于學示以孝弟忠信之説囂譁之風為之寖衰或言其地産水晶砂金使者旁午調民丁採取之闔境皆為騷動公力陳其妄而止七年以奉直大夫知慶元之奉化州歲適大侵𬒳省檄賑台州及昌國之飢比還則州人訴災傷者限已迫吏白冝勿受公悉受之仍與同僚分檢者約若以荒為熟而民無糧可輸則為代輸由是所按視皆得其實仍為畫拯救之䇿家以四口為率人與米三斗幼稚則半之尋復𬒳省檄賑象山之飢象山斗入巨海中以道逺而後至者公謂苟俟申請恐緩而無及則權冝半給之且謂如不得請則已償其費已而報如公請前後所活各數千人州民以強劫捕繫者兩人獄巳具公察其冤兩人得不死在官六載治績為諸州最皇慶元年用舉者擢僉江南湖北道肅政廉訪司事未上除朝散大夫兩浙都轉鹽副使其分治也斥去受財敗法者黃巖州判官嘉興檢校袁部鹽司丞各一人由是人知畏憚所部肅然亭户有實受之官本商旅無浮費之事例課日增羡其以私販坐逮者不得它有攀引民賴以安延祐三年以朝請大夫任江浙行中書省理問官白雲宗僧使權貴冒名爵恣橫不法擅剃度遊民四千八百餘人事下公鞠治請謁不行咸伏其辜所徴贓為錢六萬餘緡冨民以繼立訴其家財有三十年不得直者公究其實而折以片言其爭遂息十年遷亞中大夫杭州路總管杭為東南一都會素號繁劇公剖決如流庭無留訟至于公上之需一切趍辦未嘗缺之所造鹵簿法物事尤重自始作至訖功公皆躬督視之包銀令下人駭于創見公為程其物力足為等級民不病而事以集推選官酒户必擇大家足以任之者人服其平至治二年除嘉議大夫海道都漕運萬户歲所漕糧三百餘萬石舟人受糧之地逺則勞近則逸水程之往復則春運為易而夏運為難公皆立法以均之至它禁防具為區處纎悉備至年規官降錢五千緡命道流蕆醮事而以牲幣祠于水神祈弭風濤之害公言于朝需官錢五萬緡為子本歲得息一萬八千緡由是官無甚費而所用給足上下便之泰定三年遷通議大夫紹興路總管紹興自洊飢之後二十餘年民力猶未蘇公下車即以輕徭薄賦安集流散墾闢荒間為先務會歲復不登俾州縣募冨家出米穀一萬三千餘石錢二萬四千餘緡賑其乏食者一萬四千餘口轉運司科郡民歲買鹽二萬二千四百餘引公為申眀減其五千六百七十餘引民得以少紓拜中奉大夫廣東道宣慰使都元帥其地內雜蠻獠外接蕃夷最為巨鎮廣西徭人竊發公給其軍餉十萬石而民不知擾仍以便冝分遣屯戍遏其衝突境內帖然海寇殺人于貨者名捕弗獲公為設方略乃悉就擒諸流外之職當選署于大閫者公令以方寸之紙書其姓名而探之吏不得有所髙下謁選者雖不得其所欲亦莫不心服焉天曆二年移湖南道宣慰使公聞命就道以宿染瘴癘成疾還憩于杭遂引年乞致仕既得請給以半俸疾亦少間日與寓公遺老方外之士徜徉湖山間以觴詠相娛樂未幾疾復作以至正元年五月一日終于杭之私第享年七十有四娶馬氏再娶楊氏並纍封河南郡夫人子男三人長溱以公廕為承務郎平江路同知吳江州事次渭次澤女三人長適粘合泰安次適沿海上副萬户石抹冝孫次未行孫男二山夀海壽女二皆幼公為人介潔而中實樂易平日篤于教子處家儉而中禮御衆寬而有制勇于行義喜周人之急與諸公貴人交未嘗干以巳私或詢政事之得失苟有可為禆益者亦不靳也公揚歷中外凡四十五年居官所至去思有碑在奉化則戴先生表元在紹興則韓先生性實記之溱等卜以是年六月十五日奉公柩葬仁和縣某鄉黃鶴山之原泣謂溍曰先公官三品法當定諡立傳勒銘樂石願有述以備考擇溍幸嘗獲登公之門而公之守越也又辱效官使於部內知公為詳不敢以不敏辭謹具公世出行事年壽卒葬如右上奉常及太史氏副在私家庸俟立言之君子謹狀至正九年月日奉政大夫江浙等處儒學提舉黃溍狀元故正議大夫衛輝路總管兼本路諸軍奧魯總管管內勸農事知河防事盧公行狀曽祖鉉贈中順大夫中山府知府上騎都尉追封范陽郡伯曽祖母王氏追封范陽郡君祖璉贈亞中大夫東昌路總管輕車都尉追封范陽郡侯祖母喬氏追封范陽郡夫人父克柔中奉大夫河南江北等處行中書省參知政事贈通奉大夫河南江北等處行中書省參知政事護軍追封范陽郡公諡文昭母翟氏追封范陽郡夫人李氏封范陽郡太夫人本貫大名路開州濮陽縣公諱景字彥逺其先出于范陽盧氏五季之亂靡有定居後由鄭之河隂徙滑之胙城自中山府君而上皆葬胙城之班聖固歲壬辰東昌府君仕于開州因家焉故今為大名路開州濮陽縣人文昭公蚤有時名兩府大臣交舉之𥙿宗皇帝時在東宫召見與語大説留置左右顧遇日隆由樞密院架閣庫管勾歷典要職出秉憲節入陪台垣事任益重自僉樞密院事拜參知政事涖治河南江北以疾歸亰師薨于里第訃聞官勳封諡恩數有加尋返葬濮陽之黃斌原有子二人長亘博學而善為文用姚文公薦入翰林國史院為編修官五遷至待制皆兼編修以久次當遞升奏未上而卒次即公年二十以材選備宿衛受知成宗皇帝給事禁闥扈從屬車備殫勞勩丞相興元忠憲王尤器重焉居三歲授承直郎都水監丞河決東安州之藍合秀隄盡毀水行地上冒原田敗廬舍事聞于朝以為不亟治將益壞有旨命公總其役公量事期審功用鳩材庀工不踰月而隄復合民無久役之苦而獲安其居莫不深德之改御帶庫副使以恭謹𬒳武宗皇帝眷寵彌厚嘗賜以玉帶公叩首力辭不敢受上嘉其廉讓而有禮纍遷奉政大夫資乘庫大使朝散大夫沙糖局提點踐揚既久能稱籍甚朝廷欲疇其民庸而圗任焉乃以公為中順大夫江隂州尹至治二年也建言者謂浙右之民困于徭役冝令大家割田為之助事下行中書首檄公講行之公稽驗民籍以其田之多寡第為三等取之既不失其平且勸之毋徒以磽瘠充數凡所得皆上腴使役于官者輪掌其歲入儲以待用由是民不告病公每謂長民者固在于厚其生然不可以無教用是尤垂意于庠序之事州學舊有眀倫堂歲久傾仆賴公而棟宇復立後生小子始有考德問業之所人咸稱公可謂得師帥之職矣升中大夫衢州路總管公順其土俗所冝以為治摧姦猾扶善良健訟之風為之衰息盜起常山劫取民家資財官兵捕之急株連甚衆有平民為仇家所搆陷指為賊首吏莫能察掠治使誣服公疑有冤為詳讞而得其情誣服者以不死株連所及亦皆免于非辜人以為神眀歲飢捐圭租以活流茡為惠尤大在官五年去之日如始至父老為伐石以紀遺愛焉遷嘉議大夫處州路總管公鈎考學廩得羡糧八百石大興土木自禮殿論堂書樓齋室至于門廡煥然畢新學田為青田豪僧所據者千百畒已四十餘年前是為郡者皆莫能正公按視舊牘始究其實而悉還其故士之為養益充弦誦之聲洋洋相聞間有自奮于科級者事見太常博士栁貫所為記行中書省嘗諉公封舶泉南秋毫無取冨商大賈咸戴其德亦為立石于東郊以頌美之公既書滿奉李夫人寓居于江隂𥘉翟夫人生公八年而殁李夫人實撫育公至于成人公事之以孝奉晨昏具甘旨恆恐或缺遇疾病則嘗藥以進宦轍所屆遇佳山水侍板輿婆娑嬉遊必盡其歡或逺不可迎致輒徘徊思慕不能自巳李夫人夀九十有三而終公方持服俄有正議大夫襄陽路總管之命辭不拜服闋改衛輝路總管未上至正三年九月二十二日以疾卒于寓舍享年六十有一元配劉氏繼室邢氏史氏並贈范陽郡夫人子男四人長僧孺用文昭公遺澤輔官纍升奉直大夫兾寧路崞州知州以公憂不赴今以遷調為泉州路總管府判官次弘志方治進士業次慶孫次添孫俱幼孫男二人女人僧孺等以至正四年秋某月自江隂奉李夫人及公柩還濮陽其年某月某日祔林公之子鎮國寺善佑庫仲父居中則歷事法當賜諡立傳冝有狀上于奉常及太史氏且以其副乞銘于當世立言之君子揭諸墓隧以示方來而僧孺出佐邊郡縻于官守俾弘堅蹐門以請吾子其毋讓溍幸嘗辱與公有雅故不敢以不敏為解苐愧與公遊之日淺莫能備著其詳謹以所知者序次如右以俟采檡金華黃先生文集卷第二十三
