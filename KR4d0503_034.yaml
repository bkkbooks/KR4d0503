  text: 金華黃先生文集卷苐三十四續藁三十一
  hash: sha256:bbe3e0530f302fd2b535aee626821de30839f5eff4c8d4fd1e9e4063bce21278
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0503_SBCK_034-1a}
body:
  text: 墓志銘門人編次項可立墓志銘豫為項君可立銘其大父墓後六年而君卒又九年而葬又三年而君之子師周始以狀走亰師問銘于豫㑹豫方有史事及得謝而歸又三年乃克為之君姓項氏諱詗可立字也其先自台之仙居徙溫之永嘉後復自永嘉徙台之臨海臨海故為章安縣今所居章安即舊縣所治也五世祖璣髙祖惠曾祖駰當宋南渡𥘉遭時多故並隱弗仕大父良材鄉貢進士豫所為作銘者也妣翟氏張氏父鼎迪功郎蜀郡虞公集銘其墓妣毛氏由迪功而上考諸前銘可見已𥘉君之大父有德于里中人至今思之國兵南伐偶為卒所得將剚刃焉忽撓而曲易以他刃復然卒駭曰此天所保護必有積德後當生好人遂舍之而去及君之生質貌魁偉自少倜儻尚氣皆與大父類人以為好人之驗稍長卓然有志於古不妄與人交所造詣必一時名人嘗為詩持以謁天遊陳先生孚一見稱其善學李長吉君蓋未之學特暗與之合耳時君甫弱冠天遊謂曰子固他日之善鳴者觀其丰葺間婉若明金翠羽流麗雲屏能稍加鞭辟入于義理則其緣飾萬物之情當變而為鑑鏘清廟之音矣遂介之見此廬翕先生森又介此廬見右堂陳先生天瑞而卒業焉既而歸讀書于嵩隱嵩隱者五世祖德處也去家僅一里所由山麓緣線路上絶磴穿石扉而入群峰環合中更平衍清池方竹超然如在世外四方士友及里中子弟負笈而至者傾所儲以給之無少厭歲饑人多採草根木皮以食有虎出為害君移文誚山神而逐之是夕虎至舍外據地大吼林風震撼崖石迸落少選聲漸悲俄悄然無聞開户視之屏迹去矣君藏修息遊于其間者十年于書無不讀而䔍好經學謂聖人修六經始以明人倫于道之常終以扶世教于道之變易首乾坤先陽後隂君臣之常道正矣終於未濟則隂陽失位非變乎書始於二典堯之遜位于舜君道之正也終以秦誓繼王者之誓非變乎詩始于二南周之以服事殷臣道之正也終以魯頌繼天子之頌非變乎至于禮壞樂崩則春秋不得不作首書元年春王正月正始也末書西狩獲麟示變也聖人之示變於其終所以俟後聖復常道于已變也又以為六經之有春秋修道立教之義剖斷始明尤致意焉延祐𥘉有詔著取士令郡縣起居就試于鄉闈而君雅不喜效新進之士作科場語以求合有司之繩尺故屢試而屢却未始以得失為欣戚也君素為吳越間學者所敬服爭奉禮弊迎致而師事之久客于外行槖所有悉送于家以具甘旨一豪不敢私逹官大人有欲薦之于朝者辭以母老不可逺逰而止季弟某從君遊久既壯為之授室其費一以身任之永康胡先生長孺號廉介休官而家益貧寓杭之青蓮佛舍以殁君夙為所奬重經紀其喪事甚力裒輯其遺文將刻梓以行而未果也中歲不踐場屋歸侍親庭杜門不出遇風日清美間與一二勝流盤礴金鼇峰上而寄情于漁釣人或繪為金鼇釣隱圗其歆慕之如此嘗患渴竟以其疾至於大故君生於前至元戊寅某月某甲子卒于後至元戊寅五月丙午享年六十有一臨將屬纊神色不亂語師周曰吾與爾永訣矣吾母垂白在堂而不得盡終飬之孝爾年甫及成童而不得盡撫育之恩吾既為明時棄物以就磨滅爾當竭力奉吾母以及爾母厲志于學以無沗前人勉乎哉傷乎哉言訖而逝母哭之慟絶而復蘇弔者皆哭盡哀俟殮畢乃退娶王氏後十年卒子男一人即師周陳氏出也女二人適王光讓黃應驄師周卜宅兆于臨海保樂鄉安仁里鳯山五世祖墓之側以至正七年冬十一月已卯奉君柩葬焉君所著有春秋繤義二十卷詩文若干卷藏於家君殁師周年才十五凡狀所述多質于君仲弟某而得之也豫與君為文字交非一日君生後于豫而先豫死豫之庸謭悖耄固不足任吾友不朽之託然以師周不逺四千里奉君治命而來有請業已心許之安可無以存掛劒之義乎銘以慰君亦以慰其嗣人云爾銘曰天之生物其成實難胡底于成而卒棄捐有木于斯植彼中野由其萌芽至于拱把沐浴時雨膏液也豐行柯布葉干雲蔽空人指其材可梁可棟工師睨焉乃不有中委而弗取老于丘園斧斤所赦山林之尊不侈其逢寧不謂命保兹歲寒順受其正于嗟乎君不幸類之全夫天年何成何虧鳯山之原墓草既宿輟哭書辭用慰幽躅吕府君墓志銘府君諱汲字仲修姓吕氏吕氏于婺為著姓而非一族人因以其所居地望為别居永康縣之太平鄉者號太平吕氏宋之中葉有以經學教授于鄉里者曰遵遵之子曰質質之子曰迪功郎師愈仇家搆飛語中其長子約而連及之父子同時與龍川陳公俱下天獄次子皓先以賑濟受知倉使朱文公奏𥙷郡文學用漕薦再上春官時年二十有四叩匭上書乞納所得官贖父兄罪丞相白無例孝宗正色曰義事安用例立命出之緣坐得釋者五十餘人幼子源是為府君五世祖纍贈通直郎髙祖諱介曽祖諱羔皆承節郎祖諱壄承信郎父諱懋咸淳間嘗與計偕試禮部入皇朝版授知永康縣至元十五年也母何氏知樞密院兼參知政事夢然之從孫女府君少嗜學至老不懈讀書務窮理而于百家數術靡不旁通其說平居致養于親為具必豐族人不能自食者月有廪年當入學者家有孰列為成規守而不廢子女婚嫁必擇故家名族未嘗論財接賔友情文兼至各盡其歡而止鄰里有急必周之歲大侵為粥食餓者所全活以千百計至于自奉乃極簡薄衣無美飾食無珍味器用苟完出入無傔從惟以一僮挾䇿自隨人望之蕭然山澤之癯也其恭儉出于天性孝友行于家庭仁愛及于宗族鄉黨可見者如此而又多材能遇事明敏所處必中于理衆咸厭服為人排難解紛勇于赴義不以為憚里中無賴之徒或假私鹽誣平民蔓延所及甚衆為之力辨于官以免人尤德之𥘉知縣公遭值江南新附官府未立毅然出任縣事而弗辭既撫㝎其民使無失業且為之捍衛以備非常人恃以安及朝廷置真令即奉身而退蓋志在用權以全其鄉井不藉是為進取之階也其役大盜竊發官庫進討復強起之以為嚮導府君甫踰弱冠實預在行身踐重山密林荒昧阻絶之境而直探其巢穴事平口不言功識者推其雅量晚益務韜晦自號水西翁云前娶朱氏鄉貢進士環之女先四十三年卒後娶趙氏參知政事資政殿大學士順孫之女先若千年卒子男三人長曰梓本伯兄之子次曰權曰機皆朱氏出府君既早失內助二子又幼弱因鞠梓為巳子俾持門戶事而悉卑以知縣公所遺田宅權既長遣從鄉先生許公益之受學八華山中業成未及見于用而先府君十五年卒無子府君以繼躰之重為之斬衰三年仍命以機子烜為之後而機亦先府君三年卒女二人適同邑陳至寶東陽胡道隆孫男七人熙忠燧炯燁烜煥女四人曾孫男六人女九人府君生於宋咸淳四年戊辰閠月三日乙卯卒于今至正六年丙戌二月三日壬子享年七十有九諸孫以其年十一月三十日癸酉奉柩合葬于東陽縣西部鄉西郭先室朱氏之墓而以狀來謁銘昔歐陽子有言為善無不報而遲速有時豫觀水心葉公銘迪功之墓曰治生能冨教子能賢後溪劉公銘通直之墓曰宗族稱其孝弟鄉黨敬其仁義蓋吕氏之積纍其來久矣至府君家益昌而其材又有足用者苟出其緒餘稍自見于世宜不止為一鄉之善士而巳顧乃斂藏弗耀而優遊以卒歲豈不曰為善之報自有其時乎府君二子雖早世而孫曽蕃衍生今昭代必有能自致顯融而大亢其宗者為之銘以朂之且以俟也銘曰有伏必興斯理之常惟德之厚其流乃光于嗟府君隱居行義施澤於人而不有位保其世德望于一鄉繩繩子孫積善之祥亦既有子胡又夭閼百年之積欎而不發是繼是述在其孫曽尚克有聞天寵是承貤恩所加賁及窀穸惟銘可徴勒此貞石富陽朱君墓志銘富陽江泝流西行三十里東山之下有隱君子曰朱君既殁且葬其孫天麟以父命奉先友鄉貢進士陳君𣏌所為狀請文為銘按狀君諱伯清字源之世為杭之冨陽人曽大父安禮大父璘父起南俱隱德弗耀君少無他嗜好唯劬書至忘寢食群居誦說務以道義相切磨不専取為舉子業也叔父起渭調太平當塗尉携以謁郡守髙侍郎衡孫侍郎前輩慎許可見君丰姿秀整叩以所學甚器重之㑹科舉事廢君因得四其力于聖賢之遺言所為詩文益就平實平居訓其家以儉而于周人之急無所靳歲所輸二稅恆先期畢繼之者以自後為耻有鬪訟輒開諭之使解去里中賴以無事民至有不識吏者瀕江故多盜聞君之風相戒無敢犯客舟下上必以君為依歸縣尹李侯質號剛介罕與人接慕君之為人欵門請見詢政事失得君為言酒榷及興造顧買之病民者數事尹施行如君言人至今稱之𥘉君所與為師友皆知名士後多取科第或班朝行君故未脫場屋不以置欣戚也又嘗與故尚書右丞葉公李同事宋太學博士施先生南一時先生之門惟右丞年最少君察其有志氣以語當塗府君厚遇焉巳而右丞以亰學生扣閽斥言時宰創市田變楮諸新法非便得罪投漳州朋從懼莫敢省君獨往與之訣且為具食飲服用之物俾所親送之二千里外其免歸也君逆之江上無一語相勞苦第勉以風節自終至元間右丞用薦者驟居政路士爭附趍恐後君顧漠然若未始有雅故者右丞念君不置數遣迎致之卒謝弗往由是終其身不有仕籍人尤以是髙之君卒於大德十一年十二月某日年七十有二配吳氏先若干年卒泰㝎某年某月某日合葬于所居南三里馬鞍山之陽子男二人長曰文韶使來請銘者也次曰應申已卒孫男四人天驥天騏天鵬天麟曽孫男九人女四人銘曰有往而弗返莫豫遏也有發而弗舒莫豫竭也兹昔賢之細事世駭以為潔也幽幽其溍昭昭其晣也陵耶谷耶不尚有揭也鄞胡君墓志銘鄞胡君以至治二年六月甲午卒年七十有三其又明年某月某日葬城西南六十里亭嶺下前事諸孤衰絰哭奉董生復禮之狀踵門再拜請文為銘豫為之答拜且辭則又再拜固以請乃次而銘之按狀君諱珙字伯玉夲費氏子生七年後胡氏胡氏自君之曽大父祖季大父桂發父德潤皆未有仕籍至君始以材見推擇為郡列曹掾非其好也用久次司郡倉積勞當序遷輒棄不就其居家奉母孝率子弟治田廬生産悉有法有餘財未嘗資以為俚俗華靡豪縱事尊官顯人慕而與之交不肯為翕翕熱然如故舊煦煦有恩歲時閭巷相過雖賤夫幼童必踆踆然與為禮有疑其矯飾者逮君病革姻黨朋從來候問度且弗起咸有戚色君纊息垂絶猶舉手加額曰惶恐惶恐疑者乃釋然服其出于至誠君平生無他好玩獨嗜蓄古法書名畫持以售者歸其直纍百金無所靳晚益聚書搆精舍小溪上延師儒教諸孫為舉子業葬地實在其西十里君所自辨㝎也蓋君于管郭之學甚邃云君娶鍾氏子男六人曰元堅曰元垕曰元壵曰元基曰元堂曰元圭女一人未笄孫男十有三人鏞鑑鎮鈞錡銘巨鑄鎰鋭錫鍇鉉女十人壻曰俞祖錫張景松餘在室曽孫男二人宏翁興翁嗚呼豫聞有隱德者必有後觀君之自信獨樂非能以利澤昭𬒳于人而子孫茂衍若是冝有隱德矣其所恃以為不朽者獨銘也哉銘曰維古宅兆視占從違允矣胡君蔽志不疑我擇我藏匪卦于著有封斯隆有潜弗輝有斐其銘嗣人之思蔣君墓志銘溍弱冠時及石先生之門聞先生當宋景㝎咸淳間執弟子禮者恆以百數顧生晚不得厠其列然竊心慕之先生殁十有六年而溍為諸暨州判官始識蔣君陶朱山中扣其師友之淵源則執弟子禮于先生者也君不以輩行自髙言必稱同門若嘗與遊與居者焉㑹有詔賜髙年帛郡檄溍奉以從事溍方蹐君之門而君已死將葬其子果以狀來謁銘溍不得辭按狀君諱朋龍字飛卿蔣氏由漢兖州刺史詡二十四世至唐尚書左丞冽又十七世至宋國子監主簿某監簿生處州教授頴教授生國子助教翥助教之子曰一德君之髙祖也曽祖諱嗣興祖諱允參父諱亨之皆不仕其自冝興徙越之諸暨逮君九世矣君先娶姜氏前三十七年卒有子一人果也後娶楊氏有女二人長適胡一中起進士為紹興録事次適趙深孫男三人曰某曰某為兄進武校尉純後曰某𥘉助教君無恙時有異僧空入其室示以八字曰傳燈佛祖涅槃㑹人揖而與之語弗顧而去他日以其言驗之壽略如瞿曇氏其殁則雙林唱滅之後一日也自是君之祖若父得壽同殁之日又同君之死也夢其父曰燈燈續傳不自我後不自我先寤而謂果曰吾先世之聞于浮屠氏者固非所敢知以今之年明之日徴之殆與吾夢協吾其逝矣即索紙筆為書與親友訣翌旦正襟危坐奄然而逝泰㝎四年二月十六日也享年八十有一葬以某年某月某日墓在某鄉某原銘曰有生之不齊兮實命自天修不可強促兮短不可苟延天胡厚君之家兮賦豫之獨専死之日兮生之年一門四世兮弗後弗先吾固知命可受兮不可傳天者之難必兮孰測其然于嗟乎君兮尚歸夫全青陽縣尹徐君墓志銘君諱泰亨字和甫姓徐氏其先衢州龍遊人龍遊之徐系出偃王而代祀遼邈莫詳其世次君曽大父曰誼甫有隱德大父曰克威以疾廢里豪乘間兼并其家生事日削父曰進始成童能隱忍激勵卒自奮以致完厚然喜施豫又樂道人善以長者稱𥘉娶越邵氏因徙家蕭山之漁浦尋又徙餘杭而占籍焉繼娶陸氏俱無子其子男二人女一人皆李氏出君最長德祐元二從父避兵踰濤江夜夢神人告曰趣返否且及難既寤遂西還已而兵從東方來人皆曰天既俾徐氏有後又謹護之積善之報將在是乎君性䔍厚而遇事警敏少嗜學能為詞賦既又從師受經用舉者試吏平江精思竭力雖􅉵不休人或譏其過君曰事無少不可忽也軍校有不法事在郡府君視其牘議不少貸漕運官屬恃其品級己髙尤恣橫凡姦私殺虐執事者率畏憚不敢竟其獄君一一具上論如律民間以匿朱張財物多無辜坐逮者君力為辨析免男女為奴婢者若干人憲府以時所引用斷例不一求文學吏整比之君㝎自中統訖大德為之綱目條分理貫蕳而易求約而可守覽者便之既書滿行中書省署君歸安縣典史白雲宗僧沈某冒名爵凌官府有悟其意者兩人將置之死地兩人之怨家私鄰女不得殺以滅口棄尸桑林中事覺隂使以他辭引兩人傳致其罪君將直其冤吏持不可曰此沈公意孰敢拒也君盡立群吏于前語之曰吾能死不能濫殺以求媚於人㑹使者行部君卒白出之沈之徒有僧某者通民家婦為其夫所歐而銜之適有遭劫殺者賊弗得僧為飛書誣其夫及有他怨隙者七人故以書墮邏卒家七人中或以罪黥卒得之曰此警跡也因捕治不疑君察其冤而七人者苦卒虐莫敢易辭君命去其杻械始垂泣自言令以左驗已具難之君服弊衣詳為賣卜至其處悉得七人以已物實贓狀取其家餘絲布數升析縷以比無不合釡竈及他物存者又合僧乃伏罪七人者得直已而獲真賊于武康人始歎服焉縣獄舊有男以醉死弟自經死誣平人者獄已成君親為訪求其實悉生之鄰縣安吉有逐其妻之子而夜死于盜者意其子也巡官捕繫而煆煉成獄且取他衣物為證君為蹤跡其事或驚惶以實自首乃出其子而坐巡卒及行貨者屬歲大侵君夙夜施其拯救之術凡所給寧過厚曰無以法害吾仁也已代去省臺猶以荒政諉之升平陽州提控案牘以內憂去服除遷海道都漕運萬户府提控案牘方遲次里居而經理法行君以書論田不實役不均之弊纍數千言宰臣領其要者得書大喜俾乘傳白于行省時列郡守咸以田事期集爭欲得君以佐其事君佐常州又佐池州所行一如其言他郡咸取法焉未幾以漕事至京師中書奏君以九品官仍為本府堤控案牘兼照磨承發架閣考漕法利病下至占候探測著海運紀原七卷後有掠其美以自名者非本書也尋復以漕事至京師詣都堂獻書數萬言條陳漕運之弊當更張者十事執政得書移行省用其七至今賴之久之以職官入福建帥幕由令史為提控采列郡圖籍撰福建總目若干卷用例授將仕佐郎建德路總管府知事言當世宜急行者其要有六府上其事轉逹于中書雖不報而隱然用其說人或指曰是徐某所嘗言者時朝廷方選用重臣宣撫兩浙江東君托時政闕失關大體者為九䇿以獻㑹其使遷他官不果行用覃恩授承事郎池州路青陽縣尹為治務教養其民縣人方某為割地以廣學宫章某為捐地以建惠民局有司歲徵民輸荒田租為田千四百頃人甚苦之君寬為之限暴民墾闢教以修坊置閘而核見田歸其實行視他民田之阻山瀕江者俾因地勢為蓄泄以備旱潦歲饑則輟已俸倡衆以賑之民有告四十人同發其廪粟者吏欲准強盜論君曰吾方憂其死而食之彼乃以求生而抵重禁當用法外意可也悉笞而遣之旁郡邑事類此有瘦死者憲府聞君議召其長吏切責焉鄰縣銅陵人爭魚池三十年君數語而决尤以是知于上官滿代而歸留君吳之閶門無復仕進意結廬植花竹日與賔客觴酒賦詩或乘興獨往徜徉山水間自號可可道人元統元年六月忽搆疾諸子懼或請禱君止之曰吾猶未也果有異則止藥弗服時是矣巳而有瘳久之乃以痁命止藥作遺書及戒其子佛事不必作親舊致􅉠不可受須臾端坐言曰年六十五不為夭官正七品不為小得正而斃焉幸矣言訖而逝十月六日也享年六十有五娶謝氏先二十九年卒繼潘氏子男五人曰震餘杭縣學教諭曰恆出後德清鍾氏曰濟曰孚曰艮紹興和靜書院山長女一人適章光祖孫男五人思誠思恭思溫思義思文女五人俱未行震等遵治命以其年十一月某日歸葬錢唐石屋鄉先墓之後𥘉君未及仕而父沒哀慟至頓絶母氏卒于官弟晉亨以憂病惑君曲盡調護之力焉君讀書務以致用不屑屑于章句作詩善體物寫情凡所著有端本書忠報録自警録可可抄書各一卷歷仕集二卷集效方三卷及家譜詩集並藏于家吏學大綱折獄比事各十卷行于世而所謂海運紀原福建總録皆列於官書子方樂聞君行事而艮以狀來謁銘敢不諾銘曰儒者之效久矣弗白矯矯徐君秉兹諒直施于有政藹然厥績胡不卒施而有遺䇿勒銘告哀用表玄宅應中甫墓志銘中甫應氏諱本中甫其字也宋南渡時六世祖確由汴徙錢塘因家焉父普受知淮閫李公庭芝𥙷進武校尉宋亡李公死遂韜晦不復出中甫生而秀異稍長能自植立治家務勤儉與朋友交以信好為人排難解紛而􅎮恤孤寡人以此稱之始中甫與子同年進士前史官楊公載共學明于禮春秋喜為歌詩頗有志於䆠逰而弗遂年甫三十趙魏公以集賢直學士提舉江浙儒學辟主教仁和縣辭不就後遊亰師集賢大學士王文㝎公力薦于朝年己六十無意于仕進歸隱西湖上日與髙人勝士徜徉山水間遇竒書必厚其直而取之所積甚冨平居能自攝養筯力至老不衰手未嘗釋卷每秉燭至夜分乃寐間有所得手抄成帙善鑒㝎古書畫一時名人咸服其精旁通數術方技而最深于醫晚遂混迹于藥市至正九年七月二十八日卒于海昌之寓舍享年七十有八以其年閠七月二十五日返柩葬于錢塘縣水月鄉葛嶺之原先是中甫在海昌俄一日泛小舟至錢塘遍謁親故携其甥某登葛嶺指示以所卜樂丘之向背僅逾旬浹而竟不起屬纊之際神思不亂屏去婦人惟留諸子侍側告以平生俯仰無愧即死汝輩慎勿徇俚俗追薦之說也語畢而逝娶朱氏子男四人才兩預鄉貢用特恩授嘉興路儒學正偉嘉興路總管府司吏貞晉陵縣儒學教諭毅仁和縣醫學教諭女二人適張天麟俞仁榮孫男五人女四人中甫所著有三家禮範辨一卷注春秋世紀一卷五七言律詩五卷集驗方一卷人多傳之蓋中甫素峭直寡合不屑苟售然䔍於教子及見其成而身食其報祿雖未豐所養者志既壽而康遂以考終亦可無憾矣豫獲締交于中甫甚久才也又辱從豫遊中甫之殁也豫方告老將退休于田里使者以召還之命追及豫于錢塘敦迫就道無從申繐帷之一慟而才也跣走造豫傳舍奉中甫治命以銘為請衰朽荒踈不足任付託顧義不得辭銘曰生也直畸於人積也厚燕及於子孫無悔無尤卒歲優遊銘以焯于幽處州路儒學教授致仕王君墓志銘君姓王氏名某字則之後即其字以為名處州麗水縣人也曽祖德昭祖仲逹父君舉俱弗仕宋咸淳末君甫弱冠試鄉郡待𥙷太學諸生德祐元二太學事廢乃悉棄故所習舉子業歸讀書山中為道德性命之說殊無仕進意至元三十年部使者秋公桂始起君為縉雲縣教諭遷處州路學録升蘭溪州學正用纍考及格上名吏部而君遽以休致為請授將仕佐郎處州路儒學教授致仕至治二年也于是君之子釋亦以儒學官借𥙷潮州揭陽縣湖口巡檢命下之日父子皆公服前後置褥位望闕謝閭巷以為榮㑹釋巳迫戍期有司給驛劵俾就道釋以君年髙久未忍去君語之曰吾家本寒儒未嘗為國家效分寸之勞而一門之中叨蒙誤恩如此顧吾已老汝其行矣苐思報稱無以吾為念也釋至揭陽歲餘而歸不一月君屬疾甫數日遂不起閭巷之人又莫不深哀之娶潘氏子男二人長即釋次某女二人劉某趙某其壻也孫男女各二人君之在縉雲愛其山水之勝因家焉晚復築室城東闢地引泉樹佳花美竹日與學者遊息其間以詠歌先生之道其地有忘歸臺君倦憩臺上謂釋曰吾死必歸吾骨于是釋謹識之君既卒以治命奉柩葬其處其卒以泰㝎元年九月二十一日得壽七十有三葬以三年十一月某日君平生所為詩文釋方彚次成若干卷藏於家銘曰猗嗟王君與道為期出也或遄其歸處也弗佚其私蟬蛻春融樂也熙熙殁吾其寧昭以銘詩中憲大夫淮東道宣慰副使致仕王公墓志銘父諱艮字止善姓王氏越之諸暨人曽大父諱天祐大父諱一榮俱弗仕父諱理用公貴纍贈朝列大夫祕書少監騎都尉追封太原郡伯母祝氏方氏並追封太原郡君所生母厲氏贈宜人公少受業郡庠篤行勵學克自植立每慨然以康濟為志故祕書少監凌公時中為江北淮東道肅政廉訪司知事雅知公辟為書吏及遷淮西以新制南士不得入憲幕兩淮都轉運鹽使司書吏督辦冨安場歲課場距海逺潮不時至鹽丁負水取滷力疲而賦不充乃為相其地形鑿渠以通海潮公私咸便之考滿調將仕佐郎廬州録事司判官淮東道宣慰使司辟為令史掌織染之事所轄官府久廢不治乃日臨視之為修作坊募工匠至於攻金治絲設色具為區處迄今守為成法兩淮鹽綱病于運河淺澀事聞詔遣都水監官疏治之公從分閫至淮安之鹽城有司部役夫三千束手以俟都水之來公言不冝坐靡曰食促令興工仍立法每十夫一治炊㸑九操畚􅓩曰所穿廣四丈修一丈深五尺比都水至河可通舟者已四十五里遂自新興五祐兩場屬于髙郵次第訖功而他州役議猶未㝎乃俾悉用公法行之調將仕郎峽州路總管府知事入江浙行中書省為掾史㑹朝廷遣使復立諸市舶司公從之至泉州建言若買舊有之船以付舶啇則費省而工易集且可絶官吏侵欺掊克之弊中書報如公言凡為船六䑸省官錢五十餘萬緍升承事郎建德路建德縣尹以方郡君憂不赴服闋擢兩浙都轉運鹽使司經歷越守王公克敬以郡民苦于計口食鹽言于行省未報而王公為轉運使乃俾與新守于公九思集議咸謂宜稍損其額以紓民力沮之者率以為有成籍不可改公毅然曰民實寡而強賦多民之錢今死徙巳衆顧重改成籍而輕棄民命乎且浙右大郡啇旅輻輳未嘗以口計也移其所賦散於啇旅之所聚何不可乎于是議歲减越鹽伍阡陸伯餘引俄有旨改卑王公以湖南憲節後轉運使復排前議公以去就與之爭丞相脫歡答刺罕公聞之亟遣留公而議遂㝎𬒳本司檄分治浙東力除私販誣指之害按劾書吏奏差尤無良者黜之所徴贓為錢萬六千餘緡懼而以贓自首者為錢萬叁阡㭍伯餘緡丁少監公憂服闋擢海道漕運都萬户府經歷越之官糧入海運者十萬石城距海十八里歲令有司拘民船以備短送舟人為之失業不足則勒陸居之民厚直轉僦以給之程期峻急吏胥得並緣以虐民及至海次主運事者又不即受而有折閲之患公抗言曰運户既有官賦之直何復為是紛紛也衆莫能奪乃責運户自買短送之舟運艘為風所敗者例當核實而除其所陷之糧文移往還連數歲不絶公取吏牘躬自披閲除其糧二拾伍萬二阡捌伯餘石鈔二伯伍拾二萬二阡伍伯餘緡布囊一萬玖阡有竒而運户免于破家遷承務郎楊州路總管府推官以厲宜人憂不赴服闋除江浙行中書省檢校官有詣中書欣松江富民瞿氏包隱田土為糧一伯㭍拾餘萬石沙蕩為鈔伍伯餘萬緡者乞立行大司農司勸農營田水利總管府以紏察追收之中書移行省議擬違官四貟踏視其地而松江獨當什九公至松江七日而歸援古證今條陳曲折以破其妄且言其意不過欲多樁田糧蕩鈔以竦朝廷之聽而報宿怨請創設牙門為徼名爵之計耳萬一民心動搖患生不測豈為國家培養根本久安長治之䇿哉同列聞公言皆相顧失色公處之泰然他所遣官聞公歸亦皆還行省以公言上于中書事遂寢遷廣州市舶提舉輟俸資造庫屋舶啇欣然出私錢為助不逾月而告成先是吏胥恣為姦利凡舶貨擇其善者出而售之不善者積久不售公始為設法均配立號募啇人掣籖取物庫藏為之一清居數月除江西行中書省左右司貟外郎吉之安福州有小吏誣其民欺隱詭寄田租玖阡餘石者𥘉止八家前後四十年株連至千餘家行省數遣官按問吏巳伏其虛誑而司屬之喜功生事者復勒其民具報實有合徴之糧陸伯餘石憲司纍援詔條革撥莫能止也公到官首言是州之糧比元經理巳增一阡一伯餘石豈復有所謂欺隱詭寄者乎淮憲司所擬可也行省用公言悉蠲之州人相率為生祠以報撫之金溪有陸氏三先生祠豪民據其屋而奪其田陸氏子孫三走訴于京師竟不得直公按其籍使悉歸之公所至興除利害多此類其詳見於省臺薦牘及安陽韓先生國子監丞陳君旅諸公所為善政記惠政歌者不可殫舉也公在江西歲餘年甫六十有六拂衣徑歸遂以中憲大夫淮東道宣慰副使致仕家食者五年扁所居室曰止止齊仍自號鷃逰子以見其志云公質貌魁梧心地磊落讀書務明理以致用不苟事言說為名髙弱冠時出逰錢塘與浦城楊君載鄜川劉君汶友善論作詩冝取法古人之雄渾而脫去近世萎薾之習間挾其所為文登諸大老之門最為隆山牟先生永康二胡先生吳興趙公巴西鄧公所賞識公處家庭涖官臨民各盡其道平居慎重寡言故言必有中至于委蛇進退之際莫可得而瑕疪人尤以為難能公卒于至正八年正月癸亥其將終也神完志㝎無異平時正冠肅容端坐而逝享年七十有一以其年七月丙申葬于州東長寧鄉之龍塢娶劉氏封某郡君子男三人長仲楊用公廕為楊州路如皋縣主簿次仲廬福建道宣慰使司都元帥府令史次仲淮大寧路儒學正前卒女三人適方泗陳嘉績虞尚忠孫男十一人女七人公既葬之明年溍以久居詞林老不任事納祿而歸抵家甫一日而有召還之命于是仲楊仲廬仲與謀來請文為銘而使者與仲廬至同日敦迫有嚴未遑即如其請載念溍納交於公踰四十年知公為深不可以遂己也乃以退直之暇追記其所可知者論次而顯詩之以遺焉銘曰惟士先志惟官先事志不可奪事乃有濟表表王公時之偉器抱負千百出僅一二竭蹶而趍劬躬盡瘁拾級而升不懈于位好是正直周而不比表裏洞逹𥘉終一致古今殊時學與政異公起文儒敏于吏治詢其職業匪専撫字士飫其德民酣其惠所去見思如古循吏沒世不忘仁言之利修涂九軌方駕而稅用雖未竟志則已遂薦斯銘詩賁于封隊有之似之在爾來裔承直郎潮州路總管府知事孔君墓志銘君諱濤字世平姓孔氏先聖之四十三世曰後周曲阜今襲封文宣公贈兵部尚書仁玉又二世曰宋給事中贈太尉道輔又二世曰提舉江南西路常平茶鹽公事贈中奉大夫傳南渡𥘉自曲阜徙衢州又二世曰迪功郎監潭州南嶽廟贈少傳行可則君之髙祖也曽祖諱從龍迪功郎祖諱應祥從政郎主管尚書刑工部架閣文字入皇朝隱居弗仕考諱純西安縣儒學教諭以君貴贈承事郎濟寧路同知兖州事妣陳氏贈冝人君幼有異質五歲知讀書八歲能屬文架閣公愛其警敏俾受業于默齊留先生間出遊郡庠别駕陳公剛中大竒之年二十舉茂材異等一時名士大夫如永康胡先生吳興趙公巴西鄧公無不器重焉婦翁徐聖豫從事江東憲府携君以行涿郡廬公柳城姚公前後持使者節君皆為之執弟子禮由是學益進聲譽益進用察舉署寧國路儒學録逮朝廷著取士令延祐元年曲阜首以君充賦東平曹公子貞得君所為古文歎賞不巳是歲以鄉薦上春官所對傷太直且微譏切主司竟不合用特恩𥙷溧陽州儒學教授君既新其廟學而士多苦於徭役為白諸臺府悉蠲之七年再貢于東平未行江浙行中書省辟為掾史曹務雖劇君隨事緩急關白以行訖無所壅杭之啇稅比歲不登俾君趨辦旬月而集時宰以為能而風紀之司頗欲躡尋其過誤後乃察其無他事遂釋至治三年復試東平第一以泰㝎元年賜同進士出身用有官超授從仕郎平江路崑山州判官未上丁內艱服除改吳江州判官用覃恩轉承事郎𬒳省檄點浙東諸倉庫餘姚因仍前弊糧不宿倉官吏惶駭莫知所為君知而不發使自為之所糧既充而官吏亦得自逭乃皆感服君始視州事囚有張甲以擅殺盜錢乙坐逮獄已具君謂所殺非平民卒貸其死歲饑民多事剽掠君設計捕致數十人謂此皆迫于凍餒而然不可以強盜論杖而遣之州瀕太湖故築埭以禦水繕修無時病民特甚君為改作使可支久民力以紓水嘗暴溢君跣禱豫市橋移時水降人恃以無恐而四郊之外有溺死者君親收瘞焉鄰州飢憲府俾君往賑之全活甚衆御史蓋公耘夫率同院舉君治續為諸州最未報㑹霖潦害稼君所檢視當免輸田租者衆使者覆按左右承風指誣君私庇之君無何誣君者以賄敗投逺方而君得調桂陽州判官天大旱禱于神弗答君探獄有冤出其無罪者三人乃雨廣寇竊發君獨任軍旅供億民不擾而軍食亦無乏絶州民與蠻獠雜處素號難治知州方思廣以貪虐啓其爭殺人置弗問反加告者罪君與之辨莫能直即日解印綬去韓公德新乘廉車按是州劾罷思廣勉君復留君單騎直抵獠穴諭以禍福皆讋伏聽命人賴以安秩滿遷潮州路總管府知事用入廣升承直郎先是君在桂陽感末疾而歸疾稍間潮州迓吏至乘傳行次武林驛疾復作移寓龍山保和僧舍一夕卒至正二年四月十七日也年五十有七妻徐氏封冝人子男一人思􅌟女三人適張日新陳煥盛驎君易簀之夕惟思􅌟及季女在側發書笥得遺訓數十百言凡身後事區處甚具思搆遵治命奉柩涉江還衢州以其年七月四日葬西安鄉孝悌里先墓之次𥘉太尉世父既襲文宣之封五世至端友與中奉公同南由端友至洙襲衍聖之封者又五世至元十九年秋七月有詔令洙赴闕架閣公以族長𬒳命與俱中道而返洙獨入對廷議俾仍嗣襲洙力辭乃以為國子祭酒提舉浙東學校洙所居室扁曰存齊君惜其以存自號而不能欽承德意存其封爵因自稱存存齊云君所為詩尚俊邁文渾厚不事纎巧有存存齊藁未及詮次惟闕里譜系一卷為成書君九歲時祖母黃氏有疾露香密禱乞减壽一紀以延祖母之年疾隨愈後十年乃終人謂君得年不永所禱殆有徵焉架閣公及兖州府君相繼下世弟洧方孱弱君獨治葬祭資産皆委而不較且援近比請授以官存齊之子崇安尹楷卒于杭君輟錢營護歸葬其子公溥暨兩女淪落民間咸訪求得之今公溥已強而仕兩女亦各有家公溥兄割地為報郤弗受其孝友出于天性然也郡文學孔某系出永嘉族人以其疏逺而弗之親適以事置對憲府時君甫八歲力為求直而出之同里徐伯潤託其息女於君而沒君鞠之如已子既長為嫁于士人術士顧知幾來謁遽以疾亡君為具衣衾以斂而緘其行槖惟謹妻子聞訃而至悉以授之皆感泣請以其術為獻拒弗納有同與計偕者見黜於有司貧不能歸君為貸錢一阡緡于冨人而代償之其人後亦取進士有祿秩或謂可責償矣君不聽而焚其劵其急于人之患難窮厄多此類胡先生沒君集同志之士弔祭而上私諡焉默齊之喪主辦尤力溧水州判官朱性𥘉與君聮事于省户到官未幾而卒喪過杭君迎致於其家而為位以嚴親舊皆感動爭來歸􅉠其篤於師友之誼又如此君與人交歡然無間然尚氣不阿有過必面折之聞者若不能堪久乃服其識量平生無苟取嘗龍書大藏經有旨賜幣亦辭弗拜家居不事生業有書伍阡卷而巳君之葬也思􅌟巳記歲月納諸壙復以狀來謁路豫締交于君最久且親自謂知君莫豫若而狀之所述多豫未及知者豫固不得而略也庸備著以為序而銘以系之銘曰古有六行以教萬民比屋可封孰非全人矯矯孔君生今之世無待而興六行兼備直道以行視險若夷出其緒餘卒不大施爰擇斯藏里曰孝悌銘彰其存用諗來裔金華黃先生文集卷第三十四
