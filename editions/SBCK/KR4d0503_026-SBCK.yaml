body:
  text: 臨川危素編次神道碑資徳大夫陜西諸道行御史臺御史中丞董公神道碑故陜西諸道行御史䑓御史中丞董公旣殁且葬二十年而墓隧之石未有刻辭至正十年夏四月九日皇帝御興聖殿東便殿治書侍御史臣老老奏請命翰林侍講學士臣溍為之銘資政院使臣朶爾直班書其文治書侍御史臣期頥􅂐其額以賜焉臣溍謹按公諱士㳟字肅卿姓董氏真㝎之藁城人贈光禄大夫大司徒趙國宣懿公諱昕公曽祖考也龍虎衞上將軍監軍右副元帥知中山府事贈推忠翊運效節功臣大傅開府儀同三司上柱國趙國忠烈公諱俊公祖考也資徳大夫典瑞卿僉樞宻院事贈體仁保徳佐運功臣太師開府儀同三司上柱國趙國正獻公諱文忠公考也妣顧氏趙國夫人公生而端重確實人未甞見其嬉咲狎昵正獻公薨世祖皇帝甚悼惜之召見其諸子公年甫十三從長兄清獻公士􅈿至上前命徃返行于庭中見其氣宇凝粹正色歛容周旋中度大竒之自是出入禁闥無間問曽學射否對曰陛下統一四海功成治㝎無事於武況漢人挾兵有禁故臣於弓矢之事未之學也上頋左右曰其父祖於國家有大勲勞非他漢人比即賜以弓矢仍命董氏之族悉弛其禁公旣長入備宿衛為尚奉御從成宗皇帝至三不刺時方俾道流設黄籙大醮以公純誠恭謹命領其事及代祀嶽瀆復命稱旨益􅀍奬眷忠烈公九子正獻次居八世祖恒呼之曰八哥而不名正獻五子公最㓜成宗見公如見正獻因以察罕八哥呼之其見親禮如此大徳九年特授奉議大夫典瑞少監十一年有位公下者中書奏升為太監上怒曰董少監本居上乃不升何耶特命升太監進階正議大夫公再辭而後就軄宫車晏駕親王有覬覦噐者亟欲得符璽公横身堅守至廢寝食仁宗皇帝入平内難公奉御寳以進詢其姓名以父名對仁宗大悅俾司舊軄武宗皇帝旣正大統賜黃金帶以旌其忠至大元年典瑞升為院即拜公中奉大夫同知典瑞院事二年有勑樹碑先塋賜以鈔十萬緡辭至再三止受其半訖事悉分其餘於親鄰一豪不以他用四年岀爲江南諸道行御史臺侍御史處事務舉大綱不爲苛細人服其知體仁宗嗣位皇慶二年典瑞爲監如故圗任舊人無以易公乃拜公資徳大夫典瑞卿俾幕僚偑金字圎牌馳驛敦請公旣至適有皇族位公下者公辭曰臣以庸陋尸位惶恐未安矧敢居宗室之上乎願處其下上坐寢殿遣中使促之曰朕以卿勲舊之子故兹委注其母多讓待卿署事然後視朝公不得已乃拜命入謝上嘉奬曰老成君子也甞問民間􅀁疾苦以薄歛省刑對問臣子之道以忠孝對由是愈見信任清獻公薨扵開平特給乗傳俾公護䘮還葬盖異數也延祐二年復立陜西諸道行御史臺以公爲侍御史上曰董士恭忠勤篤實冝加升擢乃以公為御史中丞太師阿斯罕以丞相行省陜西嘗有旨命之迎接便服不拜俄一日詔下肩輿登堂北面而坐衆皆惡其無禮而畏其􅀔􅆋無敢以為言者公厲聲曰天子憐公以足疾賜公便服不拜而已今坐扵堂上而使衆官具公服羅拜扵堂下不敬孰甚焉叱左右去其肩輿明日諸察官踵門謝曰微公一言紀綱墜矣我曹誠可愧旣而有以尸位自劾者􅀊大旱公齋沐潜禱于九龍池而雨􅀊即大熟俄謝病而歸僚属追至㶚橋􅃒留之公不爲止皆垂泣而還累擢河北河南江北淮東兩道㢘訪使俱不赴優㳺田里杜門謝客與世相忘十五年如一日雖家事一無􅀁問嘗語􅀁親曰吾渉歴䆠途東馳西鶩不遑寕處今幸􅀗投閑以詩書教子孫而樂餘年平生之願也竟不復出而以考終公生扵至元十五年三月三日卒於至順元年三月三日享年五十有三以其月十五日葬于藁城九門先塋之次娶張氏中書左丞贈太師忠宣公文謙之女封某郡夫人前十年卒繼喬氏封某郡夫人子男二人長守讓太中大夫東昌路緫管兼本路諸軍奥魯緫管管内􅂆農事次守訓大夫中書工部司程女三人長適劉文鐸次適武衞親軍都指揮使鄭某次適廣東道宣慰使司都元帥府都事蘇樞孫男二人錞鍷女二人公質貌魁竒性度坦夷慎威儀寡言語以謙退自處而臨事善斷識見過人平生不登權貴人之門上眷雖渥未老而休人莫不歎慕之而公􅀄不自以為髙也臣溍忝以非才承乏執筆􅀠太史氏頃􅀊􅀍旨纂修功臣傳董氏一門豐功盛烈見扵登載者皆幸與聞兹又承詔嗣為公碑考公平生制行詩􅀁謂好是正直書􅀁謂世篤忠貞昜􅀁謂謙謙君子盖兼之矣冝其光膺眷􅀝為國親臣勲徳之著至扵乆而人不能忘也頋鄙陋衰朽莫能上副聖天子寵嘉老成之意稽首獻文無任戰慄銘曰董氏之先世著勲庸蟬聮四葉逮于公公生相閥蚤有令聞從容入對弗亟于進陟降左右日侍燕間命以典瑞實惟世官國有危疑保其重噐完歸于上靡容窺伺人惟求舊由監而卿温其天語褒以老成公居外臺肅持風紀昭受主知遂長御史重臣貴倨人莫敢言公􅂋斥之朝􅋝乃尊奉身而退時止則止洊頒使莭公不為起深居獨樂十有五年委順而化式歸其全史臣勒銘朂爾後嗣敬承天休世濟其羙御史中丞贈推誠濟羙功臣榮禄大夫河南江北䓁處行中書省平章政事柱國追封兾國公謚忠肅董公神道碑至正八年春某月制贈故御史中丞董公守簡推誠佐治濟羙功臣榮禄大夫河南江北䓁處行中書省平章政事柱國追封兾國公謚忠肅中書宰臣旣奉制付外施行夏四月丙子復奏請并賜以神道之碑上可其奏勑翰林直學士臣溍爲之銘河南江北行中書省左丞臣守誠禮部尚書臣期頥書􅂐以賜焉臣溍頓首受命而退公兄子太常禮儀院判官鑰以其􅀌鎧祥事未畢代爲奉集賢侍講學士蘇天爵􅀁述行狀授臣溍曰請以􅇱采擇臣溍謹按董氏世居真㝎之藁城公諱守簡字子敬曽祖諱俊龍虎衞上􅀅軍監軍右副元帥知中山府事贈推忠翊運效節功臣太傅開府儀同三司上柱國追封趙國公謚忠烈祖諱文忠資徳大夫典瑞卿僉書樞宻院事贈體仁保徳佐運功臣太師開府儀同三司上柱國追封趙國公謚正獻考諱士珎資政大夫御史中丞贈純誠肅政功臣太傅開府儀同三司上柱國追封趙國公謚清獻三世並有傳在國史曽祖妣李氏祖妣顧氏妣柴氏俱從封趙國夫人公年甫弱冠入􅇱宿衞克遵祖父之訓畨直不踰晷刻歩武必中尺度仁宗皇帝察其忠謹特命為集賢侍讀學士公辭曰臣幸以家世之舊給事内􅋝臣之學行猶不及臣兄守中况國家肈置集賢資其徳義以輔翼聖眀臣實不足當其選上曰朕素知卿家法崇謙讓今為卿成之公兄方官于典瑞乃特遷之集賢而授公朝列大夫僉典瑞院事以代其兄官長有善謔者見公舉止端重數為俚語以誚之上曰董僉院儒者勿嫚侮也上嘗賜公以真徳秀􅀁著大學􅄛義時承平多暇近侍問進以酒公因引􅄛義之說以諌上嘉納焉英宗皇帝嗣位禁衞周宻非元勲貴戚不得入見獨公出入無間一日上問卿平居何好何習亦善射乎對曰臣聞諸父師曰為臣當盡忠為子當盡孝􅀼好其言患未之能習弓矢之事雖常習之非􅀁好也上恱有名駞良馬幣之賜公奉詔禱祠秦蜀山川而還上問来何遅對曰道經陜西見民多飢死移文行省開倉廪以賑之故来也後然不能無專擅之罪上曰卿朕之汲黯也亟加賞賚眷遇彌渥丐外遷嘉議大夫淮安路緫管為治務以平易近民而民自不能欺土豪或挾其黨與恣為暴横公痛繩以法民乃􅀗安􅀊大旱條列􅂽政便宜驛聞未及俟報首以禄廪倡僚属及冨家􅂢錢出粟土著之人則給以錢使不失其業旁郡流移而至者則為粥以食之慮衆之􅀁聚昜生疫癘則處以閑曠髙爽之地則收瘞焉旣而朝廷講救荒之政下令募人入粟􅀘官公益得盡其心而不憂之不􅁇職田皆棄弗取曰吾為天子牧民寧忍坐視其飢而獨飽乎䢴溝水涸運道弗通發官帑僦工䟽浚之因使貧民得食其力公私咸以為便旣而水旱相仍有禱輙􅀿民以免扵􅂢瘠未幾徙汴梁路緫管郡人挽留不得行單􅀐由他道而去汴梁為大河以南一都㑹事至叢􅇵公操約馭詳􅋝無畱訟齊人官于汴而不返者有弟利其家貲迫寡嫂破冢出其柩歸葬于郷嫂弗欲而莫能止也則匿其夫遺骨之一體弟訴之官下嫂于獄鄰有豪家覬以賤價專其田宅乃共賄獄卒殺其嫂而以病死聞公探得其情事乃白弟及豪家獄卒皆論死宛丘有惡少為宗族閭里害其同黨乗衆怒殺之而誘其妻以逃事斍有司逮惡少族人當以殺人之罪公閱其牘詰吏曰惡少旣死其妻安在吏不能對乃捕其同黨及􅀁誘妻至則一訊具服遂釋其族人汴人以為神明公治兩郡􅀁至必大興學校以化民不徒善綜理庻務而巳擢海北海南㢘訪使廣西徭人􅀼發不時官軍莫能制徒侵暴居人湖湘間􅀹困扵飛芻輓粟民無寧􅀊公劾罷其緫兵官行省左丞諸軍肅然用命其地悉平仙江淮財賦都緫管或疑公有不屑爲公恪共其職無少憚人乃知公未昜淺窺也擢江東㢘訪使以疾告歸居無何召為大都路都緫管兼大興尹辭不赴特遣中使賜以上樽強起之旣入見上面諭曰朕深知卿淮安汴梁之政京師雖浩穰以卿之才為之無難也輦轂之下豪右多挾勢以撓法有犯者公一無􅀁貸威声大震聞者無不震讋期月而政成除樞宻院判官擢山東㢘訪使未行拜中奉大夫陜西行中書省叅知政事以疾辭擢浙西㢘訪使召除侍御史拜資善大夫湖廣行中書省左丞俄改拜江南行御史臺御史中丞先是剏建龍翔集慶寺雜取土田噐物之籍于官者以給之故平章政事張蔡公别業亦􅈻焉􅀍旨復以歸于張氏有司猶䂊觀望弗即奉行公旣至立命歸之召還拜御史中丞用人但取其忠實惡以訐為直以察為明不動聲色而保完正氣其識量遠矣居數月拜中書左丞公力辭曰臣以非才忝備官使受任以来夙夜戰兢恒恐􅈥祖父之遺業而􅀒國家之至恩况中書岀治之本丞轄列扵執政何敢貪冐寵榮而不自揆乎上曰此朕志􅀁素㝎卿其勉思報效可也公旣視事以畿甸之民阻飢白扵丞相岀京倉粟二十萬石下其直以濟之慮四方之逺耳目有􅀁不及則遣官分道撫問而存恤之時宰執惟公爲漢人畫禦灾之筞至忘寢食形容爲之枯槁新進士當授官而銓曹言恐礙入粟􅀘官者公曰朝􅋝下詔求賢􅀅以爲公卿大夫之儲苟急扵彼而緩扵此人􅀅以獻榮不如獻粟爲口實而貽􅀏扵天下後世矣衆無以對乃授進士官如故事有司患盗欲重其法公曰民貧故爲盗不求􅀁以使之不爲盗而􅁋刑以逞豈善政乎或謂頃􅀊汴人搆亂首惡固已伏誅而連坐者獄猶未竟此盗􅀁以滋也公曰罪人已得州縣奉行文書容有不能辨其真偽者非可盡以首從論且事在赦前豈可使國家失信扵人而無以安反側乎當坐者百餘人皆釋不問始盗起時􅋝議禁漢人母挾弓矢上曰董左丞祖父佐先朝取天下有大功不可例以爲漢人而而禁之特命賜之弓二凡其族人皆勿禁著為令以左丞知經筵事仍緫裁遼金宋三史及三史成公自中書奏上之未幾復拜御史中丞進階榮禄大夫公援舊比固辭上􅄪三勉諭乃拜受至正六年夏四月大駕時廵上京公扈從至幄殿上觧御服以賜命居大都留臺五月庚子以疾薨于位享年五十有五臨終告其子鎧曰我在中書時皇上賜以先清獻公神道之碑而乆未及刻我死汝亟為之言訖而逝訃聞上為之震悼􅉠以鈔二萬五千緡仍令有司護視其歸葬遂以六月癸酉葬藁城九門之東髙里先塋公資禀沈毅履行純篤生􅀅相家而未始豢扵貴驕清獻公家法素嚴公居侍旁循循雅􅅚早渉書傳不煩師授而大意已瞭然心目之間盖其􅀁養與草茅凡下固自不侔也忠烈家庭之訓曰吾少遭多難長遇眀時樹立勲名皆朝廷聖徳神功之􅀁及今老矣無能為也汝等當思㢘慎不欺以報國家或以貪墨敗官則非吾子孫死亦不得從葬先兆宜謹識之公佩服不敢忘故居官以清白著聞家無留貲僅蓄書數萬卷俸禄不侈扵自奉惟䘮􅀕則致其豐待宗族羣從以恩吉㓙皆有􅀁給教子必延名師里中􅀌寒之子亦使就學接公卿士庻咸有禮度故殁之日無貴賤少長莫不痛悼焉公娶烏氏國朝名士沖之女扵經史無不通動必恊扵閫範累封趙國夫人子男二人長􅃏内供奉見謂能稱其家不幸前卒次即鎧好學而有立當用􅄻􅀘官未命女二人長適秘書監丞鄭鄈次適崇福司丞張歪頭􅀂稽古昔帝王之興必有豪傑起而應之率資其力以成大業至扵第功行賞剖苻受封傳子及孫保其世禄重侯累􅀅未爲乏人􅀂夫異材間岀繼世象賢秉忠懐誠以承休徳書于史䇿號曰名臣求之近世如董氏一門者罕見其比也當金之末造忠烈公灼知天命擁衆来歸與金人戰死濉水上而金亦㝷滅其後正獻公與其伯兄忠獻公文炳仲兄忠穆公文用俱以勲臣子從征雲南又從伐宋濟江而還曁再出師忠獻遂與丞相淮王伯顔同取宋而㝎天下于一際時承平忠穆旣以􅂄徳元老緫臺綱掌帝制正獻復以上􅀁親信入尚符寳由郎而卿逾二十年子孫世嗣其職而公在典瑞歴兩朝不遷他官御史中丞位望􅀹爲尊重自忠穆至公父子兄弟居是官者六人可不謂昭代衣冠盛事乎江漢之詩曰無曰予小子召公是似肇敏戎公用錫爾祉公正色立朝始終一節增光前烈形于賛書天子之命公與宣王之命召虎殆無以異公雖死猶生也臣溍鈆槧末學固不敢􅀼自附扵大雅之詩人欽承詔旨序次本末抑亦庻幾無媿辭者矣銘曰世其家者雖古或希顯􅁢董氏有之似之天造方新聖作物覩豪傑之興克歸真主篤生後賢卒其伐功皇靈􅀁加四方来同河山帶礪勲在盟府正笏垂紳以文昜武逮公父子遺烈是承翊扶熈運保其盈成公滋益㳟委蛇進退陟降左右踐敭中外莬符龍節未䆒􅀁施乃預樞筦乃佐宰司乃長御史整齊憲度峻陟崇階丕昭異數一鑑之亡哀動帝宸拊髀曰嘻兹予世臣錫之􅁡章下賁玄宅申以頌辭樹此貞石集賢大學士榮禄大夫史公神道碑故集賢大學士史公以髙壽終公卿大夫相弔扵朝親戚故人聚哭扵里曰兹我朝之遺直也故事大臣之葬必著石章載其世系官職行能勞烈於是宰相執政以聞于上命臣溍為之文仍􅃙河南江北等處行中書省左丞王守誠翰林學士承旨張起巖書􅂐以賜其嗣子銓俾掲于墓之原臣溍謹按河東山西道宣慰使辛鈞之狀公諱惟良字顯夫姓史氏其先居亳之城父金末避地鄆城因占籍焉曾祖諱深贈中奉大夫司農少卿護軍追封亰兆郡公妣唐氏京兆郡夫人祖諱誠累贈資徳大夫江淛等處行中書省左丞上護軍追封京兆郡公妣王氏京兆郡夫人考諱興累贈榮禄大夫河南江北等處行中書省平章政事柱國追封秦國公妣陳氏秦國夫人左丞府君仁厚長者遭時多故親戚皆不相保府君獨􅀒􅃽氏姊之弱子仁﨑嶇兵間卒免扵難李璮之􅅍羣盗乗時蠭起府君率衆捍衛郷井人恃以無恐至今徳之秦國公有子三人長即公次惟次惟㳟􅀄秦國夫人夜夣車馬人從羅列扵庭旣窹遂以至元十年正月二十八日生公扵北四封堡公少受學前進士王仲文結廬城北􅂽􅁄中攻苦食淡者五年而卒其業甫踰弱冠出逰京師受知臺府諸公得推擇試吏憲部某年用例􅀘官授􅀅仕郎河間都轉運鹽使司知事抑絶請託紀綱肅然辟大宗正府􅁺遂為本府架閣庫管勾預纂集通制有勞延祐某年遷刑部主事陞本部貟外郎文移填委剖决如流詳讞大獄時稱明􅁢五年擢監察御史居數月除中書右司都事俄復入御史臺為都事入右司為貟外郎丞相帖木迭児威福自恣僚佐莫知􅀁為公獨抗以正論丞相面加含容而心實忌之欲挽使出門下公不可遂謀中以隂事巳奏于東朝幸仁宗察其無他猶坐免􅀁居官人莫不危之至治元年乃以江南諸道行御史臺都事起公扵家􅀊餘又以刑部􅀰中召㝷以奉議大夫為本部侍郎剖决詳讞視為主事貟外郎時事任益重謁告歸省不報泰㝎元年中書奏除右司􅀰中同日御史臺奏除雲南諸路肅政㢘訪使中書請留為太子家令丞未上復以為朝列大夫右司􅀰中同日樞宻院又奏除叅議院事故事省院􅂙議特設席僚佐之上樞宻多武臣或不諳舊典抑使歸僚佐之列公始建白改正焉二年除朝請大夫江南諸道行御史臺治書侍御史賜上尊金叚以重其行居數月召人為治書侍御史舉用察官部使者號稱得人三年改僉宣政院事頃之除吏部尚書視事甫兩月復除治書侍御史進中奉大夫侍御史賜􅀁服犀帶一不一月拜中書叅知政事賜只孫金叚表裏四貂䑕衣一四年以疾辭且薦某官張友諒某官王士熈自代不􅁢左丞相倒刺沙平章政事兀伯都刺奏請囬付西域賈人逺年􅀁中寳石鈔五百萬緡公持不予丞相怒欲加以違制之罪頼右丞相塔失帖木児敕觧而止平章復請以囬付貴辨扵公公曰寳石出西域市估乃西城牙儈􅀁㝎難以覆實如令某囬付當以其物還之遂召賈人付以元中寳石賈人特丞相􅓎謂非故物公曰寳石藏内庫宫禁中誰易之者賈人語乃塞公還自上京移疾徑去天暦元年文宗至自江陵遣使趣召入見于明仁殿復拜侍御史僅旬曰特授資善大夫中書左丞􅀁陳十事大略以為今大事未㝎可憂者陜西據河山之固四川有順流之便江南素多草􅀼髙麗迫近直沽皆當預為之防至扵量材授職録徳㝎位乃萬世良法迩者特恩太多旁及無功未盡合於外議况兵革未息財用當量入為岀不可濫加賞賜且莭儉必自内始増設怯薛丹宜􅁠住其請給䟽奏皆見納用時中書左丞朶朶􅂙知政事王士熈等坐繫樞府罪且不測用公言得從逺貶江淛行省平章政事換住髙昉等以慢易中使命鎻繫問故公言杭為前代故都居民百萬家􅀂鎻繫行省宰臣民必震駭懼生他變悟命給官舸召致之後皆置不問西兵入潼関樞宻院議發太行以西民丁禦之公􅋝詰知院别不花等曰兵法先聲後實但當内固根本以􅇣待勞急起民丁是示人以弱也可乎徃復辨論聲色俱厲又扵上前力陳其不可議遂寢國家承平􅀊乆倉卒調兵事機交急公左右應接指畫略如平時事無停者上深􅀝之事必詢而後行九月宰相率百僚上尊號公攝門下侍郎成賜銀百兩金叚表裏各一大軍之後横尸蔽野公屢請下有司收瘞母俾逺人有以覘吾國從之齊王魯王圍上亰倒刺沙面縳奉璽綬来歸朝􅋝巳肆顯戮并欲加罪群臣隔絶在圍城中者公不可大臣或與公異議公乗間白上曰彼各爲其主耳漢髙帝􅀁以封雍齒也况可加罪乎事遂觧十一月某日秦國公薨公聞訃即日就道􅃙賜鈔萬緡以給其䘮二年有詔起復拜御史中丞辭不赴改太子副詹事遣典牧監經歴伯單傳旨賜金叚上樽趣使入見扵朶羅班忽都魯納鉢哈刺殿乞終制不􅁢特授資政大夫御史中丞知經莚事固辭又不􅁢賜只孫金叚表裏各十公進唐太宗帝範及端本求治十事曰畏天曰愛民曰脩身曰納諌曰求言曰薄歛曰崇儉曰求治曰御群臣曰上皆嘉納焉命還中道引疾繳納驛劵及􅀁以方預大事不可拘扵常制仍令御史臺徧諭􅀁屬而御史有不悅公者謂冝􅁢其請上特命䑓臣以上令趣中丞復任公㝷應詔言時務十四事大略以為今視至元􅀄年天下輸租納稅之民旣已减少土地又不加多而宫女宦寺怯薛丹昔寳赤及法師醫官樂工之流視昔何啻十倍即宜分㨂元貞大徳以後剏置官府􅀹當减併賜予名爵錢物必須稱其功徳僧道以不殺不貪清净為教祝讃禱祠之事冝令自備母耗官物大司農司專尚文具當整治以求實效隨朝官必歴二十月然後改調以息奔競吏貟必申眀取􅀘試驗程式以防冒濫内侍醫卜楽官不得混授文武散階遇大朝㑹楽官别為一班於後以别流品不急之役動擾軍民可一切罷之議論剴切皆人􅀁難言􅀍旨付中書議行多著為令時方建龍翔集慶寺命以集慶路錢粮差稅悉予之公聞􅃍入請對便殿言今國用匱乏集慶江南大郡財賦淵藪豈冝輕􅂌上謂不可食言公請姑給以今年􅀁入後勿為例上大悔悟親取佩刀削其公牘而改從公言至順元年二月特授資徳大夫中書左丞有詔纂修皇朝經世大典俾公專知其事撒敦以丞相介弟為其庻母請賜鈔五十萬緡公曰聞撒敦巳妻其庻母髙官厚禄不能養一婦人猶欲費公帑乎丞相然其言遂不復以為請從大臣有因兵興扈􅀙荆南者失馬四百匹得旨議公曰從臣失馬而取償扵國家如必償償請先償萬人之命事聞竟不予上知公素貧命賜以沛縣田五千畝見自陳家有薄田可以給饘粥方媿無功􅀼禄不敢冐受大賜以速譏謗上諭以卿積有勞賜田出自朕意其勿辭公再三乞返恩命上注視黙然公不得巳拜謝而退㝷移文備述􅀄意訖以田歸于官連乞歸侍親皆不􅁢貽書于丞相燕帖木而及移文中書謂自居政有政務紛錯灾沴荐臻豈可待人言而後去旣得請復賜以鈔萬緡三年五月起爲浙東海右道肅政㢘訪使以母老不赴四年與某官許師敬某官張昇等十老偕召赴闕議㝎䇿事五月㑹于上京公抗言曰當今􅀁急惟在早正宸極布告逺邇使之聞知然後修政事睦宗族除宿弊安群情苟或因循乆曠神噐恐姦人乗此妄生異議非社禝之福也乃陳政要三十四事首言自去年冬迄今半載内外臣民觸法抵禁公然無忌昔世祖踐祚之􅀄不肆赦仁宗不赦貪官汚吏深意存焉冝恪守前規戒飭中外使知非常之恩不可幸覬此㝎民志之先務也次言脩律令擇守宰辨人品以清風憲限民田以抑豪強朶朶王士熈還自貶􅀁巳蒙恩復其官職乞以元没入家産付之六月四日㑹于闕下申言前􅀁陳十事奉旨依舊中書左丞六日㑹于栁予今天子即位于大安閣詔條多採用公言宣讀畢以病謁告賜忽里台銀百兩鈔萬緡金叚表裏各一又以母老告辭右丞相伯顔左丞相撒敦傳皇太后旨遣使敦請視事公附使者奏方今之患在二三其徳政出多門無以成就庻務甚則有不測之變生於肘腋宜察衆心􅀁願欲而行之使政令歸于一􅁇移文中書歴叙古今國家之始亂母后之禍福至於師保之職在乎輔導聖躬教育皇子􅀹人􅀁不敢言又貽書兩丞相諌選髙麗閹竪女子辭愈迫切明日遂行元統元年除山東東西道肅政㢘訪使以母老力辭三年召拜樞宻副使仍賜上樽綺叚趣使入朝以内憂去至元三年五月服除擢燕南河北道肅政㢘訪使時年六十有五即乞致仕亡何御史臺復奏賜上樽金叚起爲江南諸道行御史臺御史中丞以首相多變􅅍祖宗法令居一月而辭歸更化之後復以老人召拜集賢大學士榮禄大夫中書集議救灾衆皆黙然公獨上言三十三事及録本朝誅阿合馬清冗職詔草附禮部尚書阿魯􅁅等以聞遂移疾而歸以論事激切深爲權要所憚嗾言者奏奪大學士公殊不以爲意他察官及部使者交章辨析至正六年八月御史臺以聞詔給還􅀁納制命俄以七年正月四日薨于􅀁居之正寢享年七十有五是日有白鶴數十集于庭公曰此弔鶴也弟惟善侍疾欷歔流涕公曰死生常事男子盖棺事乃畢汝不憂身之不脩尚奚悲我為召子銓教以忠君孝親之道勿汲汲扵求進且戒以母厚葬曰石槨雖堅不如速朽紙衣瓦棺足周吾身或違吾言非吾子也言畢而逝鶴復翔鳴者七日人莫不駭異焉子銓遵遺志歛以時服其年五月十九日葬于甘塸保之原公㓜聦敏旣長鬚眉踈秀多才而有大志不拘小節噐宇凝重性資剛直遇事洞見其情與人不為苟合喜讀書起居坐卧賔客燕談之􅀁皆設几案列簡編或納卷䄂中隨所至而觀焉其始致仕也自號逸翁作臨漪亭浩然堂貫道書院藏書不啻萬卷春秋佳日駕青騾小車意行林曲遇園池之勝輙裵􅏆其間與田夫野老忘形爾汝􅀂􅀅終身焉晩年閱理精熟為詩文愽敏而純實有奏議雜文歌詩緫若干卷自題曰泛藁云娶華氏阿刺王氏並封秦國夫人子男一人銓某階順徳路緫管府判官有學有文􅀹工􅂐􅀠女二人適承直郎某官李思儀承直郎某官苗頥孫男二人買住端住女一人狀稱公歴事七朝聞召命即行言不用即去平日慕司馬文正公之為人岀處略似之浮雲飄忽而白日常新頽波横潰而砥柱不改其言良信矧當天暦至順間公所建明多國家大計安可使来者無述乎大書深刻以侈上賜不特為泉壤之光而己也銘曰剛毅木訥斯近扵仁苟有其徳亦必有言有偉史公生逢昭代蹇蹇匪躬難進昜退危言正色不詘不枝忘人之􅀔藐夫巍巍杜絶倖門鋪張治具為官擇人奉􅀭憲度言之可徴如􅀛如􅆱惟天子明聴用弗疑公益靖共不􅈈于位晚登廟廊荐陪大議豈無謀夫發言盈􅋝畨番黄髪國有老成歸安里閭閔勞以事㑏聞吿猷乃以訃至顯忠佑賢天子聖神保其􅀄終為時名臣勒文豐碑垂示無極嗚呼休哉古之遺直翰林侍講學士中奉大夫知制誥同脩國史同知經筵事追封豫章郡公謚文安掲公神道碑至正七年夏四月辛􅆗皇帝時廵上京秋七月丙戍御慈仁殿文學侍從之臣咸就列以􅇱頋問當宁憫焉興念舊人以故翰林侍講學士揭傒斯神道之碑未立俾同知樞宻院事臣世傑班傳詔于學士承旨臣岳柱命直學士臣溍爲之文仍勑河南江北等處行中書省左丞臣守誠禮部尚書臣期頥書篆以賜焉臣溍蒙恩起自休退懼志慮之凋落無能發􅀭聖天子敬故尊賢之意承命震􅅥莫知􅀁爲然􅀼自念忝以詞臣執筆􅀠大史氏不敢控辭謹按前脩撰劉聞􅀁上容臺之狀及前學士承旨歐陽玄􅀁爲幽堂之銘公諱傒斯字曼碩掲之得姓出扵楚司掲氏者以官出扵漢安道侯掲陽㝎者以邑出於漢陽信侯劉掲者以名唐末有爲檢校尚書左僕射使持節􅀽州諸軍事守􅀽州刺史者曰鎮始家于􅀽與居旴江者曰瑱居豫章者曰稹同祖司掲而言姓氏者或謂當祖安道汝寜之族則又别祖陽信世逺譜帙莫得而詳公扵稹爲世孫占籍豫章之豐城豐城今冨州也自曽祖光朝而下三世俱弗仕以公貴故祖惟聦累贈嘉議大夫禮部尚書上輕車都尉追封豫章郡侯考来成累贈中奉大夫江西等處行中書省參知政事護軍追封豫章郡公􅀄朝􅋝罷群臣贈典特賜公號貞文先生至是又奉旨爲建書院因􅀁賜號以爲額祖妣黃氏何氏妣黄氏並追封豫章郡夫人公生而頴悟年十二三讀書已能窺見古人爲學大意家貧不能􅀒笈逺㳺父子自爲師友刻苦奮厲窮晝夜不少􅈈􅆂濡旣乆經史百氏無不貫通發爲文辭咸中矩度同里年相埒者多敬畏而師事焉年二十餘稍出㳺湘漢間湖南帥趙文恵公淇素號知人一見輙驚異曰他日翰􅁐名流也程楚公鉅夫􅃰郡盧公摯前後持湖北使者節程公竒其才妻以從妹仁宗踐祚之􅀄程公在翰林公至京師因館扵其門執賔主之禮甚謹人不知為肺腑之親也盧公􅀹愛其文亟表薦之方是時東南文章鉅工若鄧文肅公文原􅀽文清公桷蜀郡虞公集咸萃于輦下公與臨江范椁浦城楊載繼至以文墨議論與之栢頡頏而公名最為㬥著受知中書李韓公孟集賢王文㝎公約翰林趙文敏公孟頫元文敏公明善而全平章岳柱禮遇􅀹至相為推輓不遺餘力延祐元年由布衣入翰林為國史院編脩官李公以政府兼史館觀公􅀁撰功臣列傳撫卷歎曰此方謂之史筆他人真謄吏牘耳三年陞應奉翰林文字同知制誥仍兼編脩四年遷國子助教用本院奏畱居舊軄五年謁告南歸泰㝎元年以元官召俄丁内艱公十年間三應奉扵翰林朝廷之事臺閣之儀靡不閑習王公每謂與公談治道大起人意授之以政無施不可也天暦二年文宗始聚勲戚大臣之子孫扵奎章閣而教之命學士院擇可為之師者得十餘人而無以昜公乃擢公授經郎閣在興聖殿西公蚤作必徒歩先諸侍臣而至諸貴㳺来受業者謀合錢為貰馬公㣲聞之輙自置一馬㝷復鬻之示不欲以已為人累而已其後去公座下而入侍帷幄者皆為國之重臣而未甞假以為聲援視之泊如也上時坐閣中有􅀁咨訪奏對稱旨恒以字呼之而不名中書薦用儒臣必問之曰其才何如掲曼碩間岀公􅀁上太平政要四十九章示臺臣曰此朕授經郎掲曼碩􅀁進卿等試觀之其見親重如此豐城地不産金官府惑扵姦民之言為慕淘金户三百家而以其人緫之散徃他郡采金以獻􅀊課自四兩累増至四十九兩有竒其人旣死而三百者􅀁存無什一又貧不能􅂓生有司責民之役扵官者代輸其金民多以是破産囙公􅀁上政要及之遂蠲其征人頼以甦至順元年預􅁱皇朝經世大典上覧公􅀁撰憲典頋謂近臣曰此非唐律乎超授藝文監丞參檢校書藉事且屡稱公純實欲噐使之而竟不果用元綂元年今皇帝入正大綂召對便殿慰諭良乆命賜以諸王􅀁服表裏各一躬自辨識以授焉一日入直奎章閣上適至左右奉法書名􅀞珎器物以進公厯陳其製作之年世與其人之氏名為之㘴閱移時至元元年遷翰林侍制兼國史院編􅁱官四年拜集賢􅀡學士先是儒學官赴吏部銓必移集賢考較其􅀁業院下于國子監監下于愽士吏文稽滯動經累月公請奏更其法以事付本院屬官人以為便五年奉旨函香祠北嶽北海濟瀆􅀯鎮竣事引疾便道西還丞相太師秦王令集賢促公亟囬以疾辤六年上親擢公奎章閣供奉學士聞命即日就道未翰林􅀡學士知制誥同􅁱國史至正元年肇開經筵首公兼經筵官二年陞侍講學士知制誥同􅁱國史同知經筵事公階自􅀅仕佐郎累遷至中順大夫其爲侍講階當與品封而新格超陞不越二等独公不爲例進四等轉九階爲中奉大夫實異數也經筵無專官曰領曰知多􅈗執大臣微辭奥義率屬公訂定然後以進其言徃徃寓獻替之忱務以禆益治道上嘉其忠懇數出金織紋段以賜之三年以年七十致其事而去詔遣及扵漷􅀯上表力辤㝷復遣使奉上樽諭旨還撰眀宗皇帝神御殿碑文成賜楮幣萬緡白金五十兩中宫􅀁賜白金數亦如之求去不許命脫脫右丞相及諸執政面諭公母行公曰使掲傒斯有一得之獻諸公用其言而天下􅀩其利雖死于此不恨不然何益之有丞相囙問方今政治何先公曰儲才為先飬之扵位望未隆之時而用之扵周宻庻務之後則無乏才廢事之患矣他日集議于朝堂公抗言當兼行新舊銅錢以救鈔法之幣執政持不可公言之益力事雖不行丞相以公不阿獨心敬之有詔脩遼金宋三史以平章政事而下曁公等六人為緫裁官而以右丞相為都緫裁丞相問脩史以何為本公曰用人為本有學問文章而不知史事者不可與有學問文章知史事而心術不正者不可與用人之道又當以心術為本也公既領史事毎與僚屬言􅁒求作史之法湏求作史之意古人作史善雖小必録􅁖雖小必記不然何以示勸戒乎自是毅然以筆削自任凡政事之得失人材之賢否一切律以是非之公至扵物論之不齊必力與之辯求歸扵至當而止四年遼史成以進有旨奬諭仍俾早成金宋二史公感激知遇惟􅂲無以稱塞辰入酉出憊不敢休㑹盛夏􅀨潦襆􅀍宿館中得寒疾返寓舎甫七日而􅃍不起公卿大夫士聞者無不馳徃哭之盡哀省院䑓部寺監而下咸致􅐠有差時方有使者至自上亰燕勞史局以公故為改燕日使者還以聞上為之嗟悼以楮弊一萬緡賜其家仍給驛劵具官舸送其櫬歸江南公少䖏窮約事親菽水粗具而能得其歡心曁有禄入服食稍踰扵前輒愀然曰吾親未甞享此也故其平生清儉至老不渝與兄弟有無相通始終無間言子弟有過不加顯責奴僕得罪亦寛容之人問之曰長上遇下稍見卞急後生使習暴戾不得不以身教也公立朝雖居散地而恒急扵得士考郷試者二考會試者一為廷試讀卷官者二考國子公試者七􅀁甄㧞後多知名御史建白用㑹試終埸郷試次榜舉人為教官廟堂以咨扵公力贊成之由是士無遺才之憾公喜汲引後進而不能俯徇流俗郡縣有一㢘吏稱之寕過其實聞吏之貪墨病民亦不曲為之揜復達官大人意有不合終身不造其門雖見軋而不悔間冩其心之所不平扵文字間人或疑㤗甚公曰言當如是不必慮也公為文叙事嚴整而精覈持論一主扵理語簡而㓗詩長扵古樂府選體清婉麗宻而不失乎性情之正律詩偉然有盛唐風善楷書而􅀹土扵行草國家大典册及元勲茂徳當得銘者必以命工人子欲顯其親者莫不假公文以為重仙翁釋子殊􅀖絶域慕公名而得其片言隻字者皆寳而傳之暮年求文者衆寢食為廢殊不以為憚然亦不苟作有郡守諷其民奉金為壽求紀政績公頗知其人斥而去之末幾其人果以賄敗客有為人謁文而私其金者他客發其事公曰巳受之矣人􅀹服公雅量有文集􅀂干卷行扵世公薨扵至正四年秋七月戊戌享年七十有一以六年秋九月甲子葬冨州冨城郷冨陂之原制贈護軍追封豫章郡公謚文安有勲爵而無官階有司失之也元配李氏繼即程氏太中大夫同知荆湖北道宣慰司事嚴卿之女並追封豫章郡夫人子男二長汯李氏出國學上舎生今用公􅄻當􅀘官未命次廣陽生七年矣女一人通楊湘盖人才之生必于興運其以文事與時而奮恒在乎重熈累洽之餘惟養之厚而用之不亟故其望實彌乆而益著非僥倖扵一旦坐致顯融者可同日而語也公以庻士起逺方而􅆦翔扵清途三十年晚乃蔚為儒宗文師荐膺眷遇勤事以死大明在上照臨􅀁及故舊不遺播之聲詩垂于無極公亦生榮死哀矣乎銘曰扵穆世皇遐不作人豐􅉮之澤燕及後昆在仁廟時群獻俣俣出入左右經文緯武公居其玉長􅅂載筆以從其行徐徐歴事四朝乃登延閣乃司論􅀃乃掌述作清問􅀁及字而不名公滋益㳟不挾不矜逮今昌辰峻躋邇列翩其逺引萬夫莫遏天子有命式遄公歸重煩以事俾職訓辭明明天子不自神聖廣厦細氊公言是聴稽古圗治監觀後王公能敬承大啓厥藏發潜闡幽驗諸成敗斟酌典謨用存勸戒竒聞異見叅錯猥并公􅀁折衷信而有徴藉夫衆功訖于絶筆克成公志公死不没人孰不仕孰完扵公始卒無疪而以豐終敬故尊賢天子之徳詞臣奉詔薦此樂石嶺北湖南道肅政㢘訪使贈中奉大夫江浙䓁處行中書省叅知政事護軍追封南陽郡公謚文肅鄧公神道碑銘至正九年夏四月二十日知經筵事臣朶爾直班同知經筵事臣埜僊護都臣溍等進講于明仁殿臣朶爾直班臣埜僊䕶都奏鄧文原經筵舊臣歴事累朝􅇱極榮遇兹又顯受聖恩贈封㝎謚墓上之石宜賜刻文上旣可其奏命臣溍為之銘别勑翰林學士承㫖臣起巖􅂐其額臣埜僊護都請就令臣朶爾直班書丹上復如其請乃退而以前史臣范梈之狀授臣溍臣溍謹按故嶺北湖南道肅政㢘訪使鄧公諱文原字善之曽祖從黼妣楊氏祖昭祖累贈嘉議大夫成都路緫管上輕車都尉追封南陽郡侯妣雍氏南陽郡夫人考漳累贈中奉大夫四川等處行中書省􅂙知政事護軍追封南陽郡公妣孫氏㳺氏並南陽郡夫人其先由長安徙資中又徙綿之彰明杭為宋行都南陽郡公避蜀兵来依焉故今為杭州人公六􅀊入小學九􅀊從三山楊先生受春秋十五以流寓取漕薦曁科舉事廢遂一意務為聖賢之學行益脩業益茂開門授徒户屦常滿中州士大夫多慕而與之交徐文獻公琰髙文簡公克㳟知公􅀹深王叅政巨濟素刻深與公語亦嚴憚之巨濟後以事䌓獄自悔不用公言􅀄用江浙行中書省辟署杭州儒學正秩滿調崇徳州儒學教授用薦者擢應奉翰林文字􅀅仕郎同知制誥兼囯史院編脩官承旨閻文康公復扵寮友少􅀁假借公獨見推重凡大撰著必属焉由􅀿奉升脩撰成宗即位就任轉從仕郎成宗崩預纂脩實録姚文公燧王文肅公搆並為承旨持見不同閱公􅀁眞槀互有指擿公不與辨第令櫝藏以俟後數日二公取視之皆莫能昜一字以儒林郎出為江浙等處儒學提㪯教人先學行而後文藝士習為之丕変召除國子司業建白脩眀學政而樂因循憚改作者與之論不合遂移疾去仁宗即位詔以科目取士江淛行中書省檄公考延祐元年郷㪯公以朝廷立法之􅀄多采考亭朱氏貢㪯私議慮逺方之士未悉上意大書其文掲示之由是士無復踵異時􅂣屋之弊㝷翰林待制承直郎兼囯史院編脩官召䑓臣交章舉之擢承徳郎僉江南浙西道肅政㢘訪司事湖州民有抵夜禁者􅀍執而遁追者及之剚刃其左脅其兄問殺汝者誰曰白㡌青衣而長身者也語畢而死其兄訴之有司歸罪扵直􅀄更張福児坐繫三􅀊公閱其牘曰白㡌青衣姑勿問福児身不滿六尺未見其長且福児用左手傷何以在右命覆勘之真殺人者張彈壓也建徳戴汝惟􅀍盗己捕寘獄中而夜有火其居者失汝惟所在公曰此有以也責有司推治得汝惟尸扵水濵及其妻謀殺夫狀人以爲神江隂饑民稱貸扵冨家不得則持火徃取􅂖誤焚其屋十三人所分􅂖皆不滿五升有司悉當以強盗公謂此非其情也時痩死者已半餘皆杖而遣之平江僧訴總管府判官理熈納其賂旣誣服而公適至探得其情杖僧釋熈移僉江東建康道肅政㢘訪司事寕囯諸郡茶課􅀄止三千餘錠累增至十八萬錠皆鑿空取之民間民受誣抵法則轉運司得以失斍察擅加罪五品以下官州縣長吏皆重足而立公至而提舉茶事者適以賄敗乃為設法以漸去其弊且建言冝罷茶司而使郡縣領之饒州有告欺隠官粮者事連數百人累嵗不决公曰此不難知以官租為民田交易而抄户時以之定差徭經理時以之㝎租稅耳命據籍為㝎訟遂息小吏有結為兄弟持官府短長者號五府杖而流之人莫不稱快有甥盗其舅家財者以􅂍滿罪至死公曰􅂍五十綻盗惟二人其一人􅀁分止五錠何也録之得其實􅀁盗十三錠而巳遂以减死論徽州民僞造楮幣扵僧舎有避雨者適見之其人懼事􅂥因啖以利而止之使為烘焙獄具當死公曰造偽當死者其等有七烘焙當何等冝比行使加等杖事聞于朝報如公言徽州民謝蘭家貧其從子囬貸以錢而倍取其息又利其田宅而欲搆害之蘭家僮死囬使吿蘭殺之公察其􅁈釋蘭坐囬天方旱而雨士子或為私書以非考亭之學公命毁其書曰吾以息邪􅀃也江淛行中書省復移行御史臺檄公考延祐七年郷舉得今翰林侍讀學士泰不花以為舉首旣上春官果為􅋝對第一士論翕服拜集賢直學士奉訓大夫以地震應詔論弭灾之道謂今天下士師非才惟受成扵吏死囚􅀊上刑曹􅀋延緩不報痩死者多冝慎選理官死罪應决即决􅁈即釋之河北流民復業朝􅋝雖令計口給緡錢而有司奉行不至冝㑹計海運粮支發之羡餘隨處置倉以􅇱凶年而振之又申言茶法之害民乞併罷轉運司以息人怨感天和時論韙之進奉政大夫兼國子􅀕酒依前集賢直學士􅀍旨知泰㝎元年貢舉及上親筞多士于􅋝仍俾充讀卷官有詔開經筵特命中書平章政事張蔡公珪翰林學士吴文正公澄及公入侍其見知遇如此大駕時廵公當扈從苦脾疾就醫扵京師遂乞謝事南歸􅀊餘召拜翰林侍講學士中奉大夫知制誥同脩國史未行擢嶺北湖南道肅政㢘訪使以疾不赴天暦元年五月二十二日薨于杭州私第之正寢享年七十以其年七月十三日葬湖州徳清縣千秋郷百寮山之麓太常􅀄議以莊康易公名今天子始用公門人集賢大學士馮公思温之請特贈公中奉大夫江淛等處行中書省參知政事護軍追封􅀯陽郡公改謚文肅娶徐氏封南陽郡夫人前公一月卒合葬焉子男一人􅄛用公䕃為承務郎江浙䓁處儒學副提舉後公􅀂干年卒女二人適石洞書院山長史公埜司徒府掾史戴孟淳孫男一人莱孫公蚤慧稍長能自植立外家㳺氏􅈲清獻公佀相宋理宗門户煇赫公未始挾以自矜又甞客扵故后族謝氏家視華靡豪縱事漠如也公丰姿凝粹氣貌純明内嚴而外恕議論若不可犯至扵以文相接以恩相加未甞不使人心恱而誠服平居善處窮約奉巳常薄待人常厚諸生有病而以槖中金託扵公者曰萬一死願以歸吾親其死也或􅀼金以去公買金以付其親而終不言安南入貢以黄金丹砂象齒為私覿之禮公却之其人曰清白物耳公曰爾物雖清白我受之則汚也􅀁至僦屋以居四壁蕭然晚乃積俸貲買宅一區􅀅以佚其老而疾亟矣公扵經史百氏之書無不䆒極其根祗為文精深典雅東南遺老凋落既盡文章之柄悉歸焉及在朝􅋝施于訓誥者温潤而有體志扵簡􅁽者確實而有徴詩􅀹簡古而麗逸凡􅀁著有讀易􅀋編􅀂干卷内制集􅀂干卷素履齋藁若干卷行扵世工扵筆札與趙魏公孟頫齊名徽仁􅁉聖皇后命以泥金書大藏經公應聘率門人前集賢待制班惟忠等二十人北上竣事二十人皆賞官而公不預第隨牒調􅀘教授一州後乃以文學政事昭􅀍主知而至大官前後從游無慮數百人惟御史中丞王公士熈與馮公思温位最顯其受業上庠而掇巍科躋膴仕有名扵時者􅀹多不可遽数也始公較藝郷闈臣溍誤辱薦名及公再主文衡臣溍遂忝預執事兹又􅀗載筆􅀠太史氏欽承明詔勒文公碑不敢以菲陋荒踈伏闕控辭謹拜手稽首序而銘之銘曰井絡之靈實鍾俊賢展也鄧公受材孔全公方盛年盤桓山澤翔而後集靡徐靡亟􅀒其􅀁韞時而出之學為儒宗政為吏師其學斯何蜚英文􅁐鋪張皇猷裁成帝典弘敷教道模範國人談經氊厦堯舜吾君其政斯何肅􅀅使指扶善遏惡以樹風紀鼓之舞之士氣以振軺車􅀁届獄無􅁈民聖門四科公兼其二學以從政匪有二致國之老成天子􅀁毗公不為起乗化而歸門生奉詔薦此樂石庻無媿辭過者必失金華黃先生文集卷第二十六
