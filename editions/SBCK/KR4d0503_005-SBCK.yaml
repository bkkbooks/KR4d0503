front:
  text: 金華黄先生文集卷苐五續藁二
  hash: sha256:120e9f14baa010890d3b57da037e1b027659660b50f26d909007464a6b5ae010
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0503_SBCK_005-1a}
body:
  text: 五言律詩􅀄至寧海臨川危素編次番昜劉耳校正地至東南盡城􅀌邑屢遷行人雲作路累石海為田蜃炭村村白㯶林樹樹圎桃源名更羙何䖏有神仙縹緲蛟龍宅風雷隔杳冥人家多面水島嶼􅀂浮萍煑海鹽煙黒淘沙鐡氣腥停驂方問俗漁唱起前汀洋山夜發肅肅洋山暮倉忙拜水神吹嘘端有力漂泊竟無津黒夜魚龍界皇天蟣蝨臣生還如偶遂敢惮歴微􅉝次韻荅陳君采兼蕳一二同志温詔欣􅀄覩峩冠盍共纓如何滄海上獨看白雲生燈火三千櫝氷霜五百程誰須富車􅀐終古陋桓榮憶昔䨇溪上相逢暮兩時交游傾意氣談咲挹手儀草草中年别寥寥大雅詩受材知有分豐嗇竟誰同不謂飄零曰求賢網四張胡然卑小技乃爾閟􅀌芳寳唾非無色㝠鴻詎有行􅄆材何􅀁似徒愧飾青黄十載西州客論交著䖏新時時談述作一一望光塵澹月銀河曉暄風玉樹春􅄑令窺髣髴微薄尚何伸黙守知存道清言不廢儒身方同木石名巳在江湖此士須前席何人屬後車惟應耕釣者縹緲識霞􅅂尚想南歸始簮花出禁闈塵沙迷故歩桃李借餘輝有曰酬天造終身返布衣風流成二老巾屨倘相依亦有貞居子難忘太古情詩筒来絶響茗椀出新烹磊落單傳意蕭條異代名無為念離别惆悵不能平讀陳制幹遺事歴歴青雲上飛􅀭彼一時深春曲江宴清夜郾城詩老去山河在仙成日月遲空言徒有託千載欲誰期題剡溪張氏書樓木杪出飛樓仙山在上頭可能無客至小為借書留芸草春仍長虹光夜不収如何試乗興一棹剡中舟陸氏水軒分韻得􅀭字髙㑹軒楹敞清秋咲語􅈵行雲随度曲野水映飛觴㘴挹才華盛衰慙􅁂髪蒼新詩穿窈眇何力共游揚􅀉黄伯陽掺别逢春雨移舟落夜濤忽驚滄海大轉覺碧雲髙􅀭子多竒字王祥忝佩刀深情空繾綣短髮正刁騷送陳飬直歸四眀迢迢浙河水同渡不同歸執􅃑方成别驚帆巳若飛野橋行酒䖏風雪去時衣瞻望嗟何及天長鴻鴈微題天童疊秀軒名山摽巨刹樓閣在青冥别路通禪窟當軒列翠屏􅊕禽多雪色偃樹盡龍形􅀒土新成塔非才愧勒銘隆山牟先生挽章井絡収英氣文昌返列星能官須閥閱仍世覿儀刑漂轉逾三峡森扶並五丁芝蘭紛滿砌橘柚歘充庭它日看空􅇫羣公羡發硎鼎湖驚掃迹華表訝摧翎風物嗟王粲心期託管寧乗桴良巳後抱瑟匪求聴此道誠何病眀時忌獨醒迢迢瞻北極衮衮化南溟薦剡多新墨恩􅂁秪舊青故應氊座冷不愧草堂靈食檗餘深味懸車及暮齡一朝傷永訣千古閟遺經謬忝鴻􅀻乆徒増雪涕零無辭歌薤露有恨􅀉泉扄送胡􅁢文紹興録事斯文千載後一髮渺存亡尚喜衣冠􅃇能傳翰墨香春秋嚴助對冨貴買臣郷莫厭官曺􅇵諸生在鴈行入亰道中􅀉同里諸友十年州縣底及此望亰華客路時時雨春江岸岸花何方堪報國􅀅老更浮家可得同携手山顛復水涯送句龍提舉之雲南獨抱文章印驅車背朔風行歌萬里别聲教百蠻通列郡創殘後諸生色咲中誰當偕計吏封殖待新功癸酉四月同子長至赤松子長先去遂獨􅀫智者之草堂巳而子長與正傳俱来同一上人􅀫鹿田逰三洞還過山橋至潜岳謁故中書􅃕人潘公祠堂復廻智者而别昔共張公子翩翩訪赤松重来逾兩紀獨􅀫去􅀌峰古木蒼陂映禪房側徑通夕隂千嶂黒人語一燈紅􅄑及軒車㑹寕辭杖屨􅀙相看如夢􅄰徤走愧兒童春去山仍好林深磵忽窮天低時堕兩寺逺但聞鍾弔古田無鹿􅊥竒洞有龍幽㝷穿􅌄窱髙歩􅂿玲瓏靈草多成藥踈篁不作叢嵐霏生晻曖野色在空濛下瞰疑無底言旋復向東巖阿棲㫁礎煙際出飛淙細路縁苔磴危橋跨石硔泉依山曲曲雲與樹重重巨榜標名岳穹垣護畒宫􅀝䦨斜日下入室老僧逢零落螭頭墨荒涼馬鬛封不才持薄禄終古望遺風弛檐雲􅀜裏傳觴雪峡中追趨煩道侣述作付文雄急景真流電浮生尚轉蓬後期觀􅀊晏来徃莫憧憧送趙仲理御史藉甚聲華􅃇頻年沭盛恩校書天禄閣執法太微垣攬轡炎埃豁揮毫玉露繁庸踈徒自咲投贈欲何言送趙宗􅁻御史憶共趨鼇禁驚聞正豸冠汗顔居舘下矯首望臺端去路黄河直飛霜白日寒仙舟如可託歸理釣魚竿送王道一郎中使者下青冥郎官動列星􅀭旌開瘴癘持斧用雷霆逺俗難馴化儒臣觧引經無知多詿誤能勿望平亭送宋顯夫憲僉分題得邵伯埭謝公千載後陳迹在淮壖遺愛傳終古嘉名配昔賢藕花方爛熳使節莫留連移取甘棠樹分栽郢水􅁁送宋翼卿照磨莾莾􅀜河路西征獨㩀鞍借材蓮幕底飬望柏臺端􅃌日傳温詔朝天正法冠廣平心鐡石寕憚朔風寒送潮陽蘇縣尹夜水蔵蛟鰐秋天卷瘴雲田多陶令秫石有大蘇文巧䆠誠為樂脩才况不羣尚煩驅筆陣時復張吾軍送蕳縣尹蕳氏多兄弟才名萃一家嗟君本朝士出􅈗向天涯度嶺三冬雪行春一縣花應憐未歸客鞍馬尚風沙送馬伯忱教授卓犖青雲彦飛騰及妙年書成天禄閣座有廣文氊九陌車塵外千軍筆陣前白頭慙􅀝席臨别思范然送方叔髙廵檢矯矯列仙儒瀛洲路不迂大書歸石室壮志在桑弧田里方髙枕雲山緫􅀞圗登臨属多暇寧復嘆馳驅送劉子簡難弟與難兄專門用一經夫君眉更白諸老眼多青薦剡登天府􅀭帆􅃌洞庭何官不可樂離合任雲萍題道士態君夀母詩卷跨鶴出山中春衣宻宻縫度􅀜占􅂵氣賜酒折黄封介夀慈顔喜承家積慶重蘇躭却来否石上有仙蹤同劉遂􅀄脩撰周伯温編脩任大瞻􅀴歴王繼忘架閣西山行香次遂初韻仙馭賔天乆衣冠此出游祗園金地古汾水白雲秋謁拜陪諸彦躋攀展寸眸始知山水窟近在帝王州􅀷岫蔵青靄平蕪映緑疇層臺臨太液環海像瀛洲粤自遺弓劒無􅀙望黈旒眀庭虚次舎綵䌫􅃇維舟陛㦸盈千列靈輿副九斿祠官偵伺謹中使徃来稠備禮兼今昔求神遍顯幽琅函開貝葉玉瓉薦黄流肹蠁人天合輝光日月侔遥看陳羽衛疑是問龍樓花雨繽紛落香煙泱􅐯浮重􅀜羅虎兕簇仗擁螭蚪去去簫聲逺微微扇影収清都成夢境塵刼䓁浮漚歸徑縁湖尾殘陽掛樹頭舉杯相慰藉分席暫淹留物色迂行轡風寒襲敝裘廽瞻天路永坐感􅀊時周戀闕慙衰朽非材堕謬悠詞林冨鴻藻珍贈若為酬試院同諸公為主試官作右轄􅂛庸日秋闈獻藝􅀄端居煩㘴鎮妙柬備賢書憶昔興文運惟天啓聖謨教條行九有學業出三餘儒術俄中否詞塲遂乆虚綸言何噩噩髦士共于于􅄍握承謙徳飛楊感牡圗至公留藻鑑成物待洪爐肅穆華星聚涵容化曰舒誰歟随計吏行矣聴傳臚橘柚天朝貢参苓相府儲鋪張須鉅筆衰朽媿荒踈誠院同諸公為監試官作文治囬亨運群言恊睿謀設科存墜典傳詔極遐陬風動黄簾曉霜飛白簡秋迂臨宣上化精察副旁求懐牒魚鱗集摛辭繭絍抽按行承奨飭鼔舞望甄収氷鑑垂清照淵珠免暗投充庭先品物入彀緫英游奏自蘭臺上名依桂籍留神仙司下土桃李在南州使節光華盛公堂禮數優無能禆末論傾詠獨綢繆送餘姚孔學正不到歴山前于今二十年忽聞東魯客去㘴廣文氊短棹濤江外髙齋海水邉風雩有新樂况及暮春天逰石門净勝寺十頃蒼陂上山廻地􅀔偏屋棲黄面老碑掛赤烏年葉葉風荷顫層層雪瀑懸青燈夜寥閴獨照一僧禪次韻王眉叟真人􅀊晏驚黄落樓居隔翠微擁爐春滿座卧檝雨生衣大患元非病髙飛獨見機桃源多羙酒觴至且頻揮泉月開金鏡仙山並玉簮杜􅁜茅作屋涑水布爲衾有約陪笙鶴交談接芥針三神那易近失喜聴新吟悼雨公離别騖雲散那知竟不廻長期真滿供横騖樂􅀖開一柱空危石重湖有刼􅁅去来誠夜旦覽物謾生哀送鏐上人逰廬山廬山㡬千仞屹立大江邉地勝非人境雲深何䖏禪祥燈開黒夜怒瀑下青天物色撩詩興應須冨近篇送矩上人逰廬山廬阜西江上秋風道路賖泉飛青玉峡池浸白蓮花此去聊乗興何時定到家慿髙莫回首誤􅃌赤城霞㳺法華山囬􅀫樓氏書房遥望嵩頭陁智者國師道塲上清五雲龍夀諸山而未及其䖏贈同游傅生國章故廬湖水曲門對法華山百里空荒外三峯䁆靄間倦游煩汲引濶歩強躋攀老怯髙寒境非縁興盡還小憇虚齋夕何人咲語同青雲一才子白髮兩衰翁節物逢春好名區有路通未能窮勝踐還徃媿匆匆過永康桃巖立石平如削飛雲近可梯莫窮千古勝但惜衆山低靈草經春長珍禽隔樹啼人言舊朝士感事有留題七言律詩闕下口號遹駿先猷在作人忝陪多士奉眀綸端闈乍唘清光近臚句髙傳茂典新奎璧照臨囬景運風雷鼓舞契昌辰不才何以酬天造徒詠菁莪樂至仁賜第後歸謁郡府承為置宴口號拜賜􅂊霑雨露香又驚盛典出黄堂鳴騶合遝迂千􅀐坐席雍容累百觴它日同郷脩故事不才終古􅀍餘光承宣徳意逢眀牧諸彦能無共激􅀭郡㕔宴集之明日郷先生復為置酒重述口號去年此日宴瓊林雨露光華映古今稱慶謬承賔禮重徼榮彌覺主恩深少須天詔􅀙容至坐看宫花取次簮千載斯文􅀉来哲可應外物累􅀄心北山歸路呈古心師兼蕳方外諸友㝷幽偶向靈源􅀫却過雲􅀜望翠微􅀄日映空千樹立驚風遶磵百泉飛􅃇題􅀊月人頻異乍别煙霞路易非􅄑有潘郎遺事在何時一鉢去如歸送樊生歸鳯翔􅀒笈東逰萬里餘翩然却去復踟蹰金臺不入平生夢石室曽窺未見書赤曰蒼􅈵䨇䄂窄黄流渺􅐯一帆􅀌眀時急士方如渇看爾重来出有車送祝錬師祠武當山春風馹􅀐過流星西􅃌神山百丈青白道蜿蜿通使節玄􅀜􅋕􅋕護祠庭按行石樹多千􅀊叱咤雲雷有萬靈想到天池却囬首咲看日月兩浮萍喜趙􅁇道至有懐陳君采匆匆聚散定何常耿耿心期故未忘草木􅀜情人事異雲霄廻首路岐長交游歴落銀河隔製作紛紜瑞錦張為語何時共傾倒秋床風露己生􅈵􅀉别宋推官目㫁仙帆去莫􅀙翩然心逐北飛鴻未忘緑幕􅇷逰盛况忝黄堂禮數崇南􅀦㡬人歌召伯漢廷有日相于公悠悠聚散何堪計趨走終期出下風送鹽官傅都目春風匹馬去翩翩老佐名州􅁂未斑遥數驛程知到日㘴令官府静如山河塘燈火機聲裏墟落塩煙海氣間歴歴舊逰成夢􅄰可容乗興一追攀送姜學録短􅄄蕭條兩􅁂蒼逢人猶觧􅀃春坊雲霄有路新推轂風月傳家􅃇佩嚢此去官曺雖冷落不妨門戶暫輝光况聞寮友多華胄休暇過􅀙樂未央何山夜􅀫艤舟夜聴西䆫雨一别重来二十年何氏殘編非舊讀胡公遺碣是新鐫山中倘遂招為隠教外寧須别有傳巳對爐熏消百念感時懐古自茫然婺州治中􅆀仕朝列朱公挽章朔風吹淚濕寒雲忍見層丘卧石麟千載文章非小技半生州縣秪勞人黄金帶重班方峻白玉樓髙記又新囬首慈恩它日事不才終古望清塵􅀉子訥干夀道二同年憶同鵠立簉天􅀜清漏無聲虎豹閑黄牓未開齊望拜􅂵衣髙唱􅃍分班巳驚恩出㝷常表更羡身居季孟間海􅀦隣疆􅄑無逺可容接武向蓬山天台道中殘雪􅀄乾不作泥微隂豁盡衆峰齊梅花浩浩天相映桂樹團團􅀑􅀁棲春水未深容度馬午煙􅀌起忽聞雞仙人秪在丹丘頂應是青雲别有梯送麗水應教諭諸公携手賦眀光此士猶令滯一郷肯着麻衣號遺逸勇持木鐸布文章仙山髙歩氷霜峻燈火新題霧雨香未可區區輕十室共看它日冨才良送䨇谿孔山長􅀊晏天涯偶見君忽驚飛􅃑逐風分諸公政爾誇先覩家學􅀎無出異聞紅日逺帆先去鴈碧溪􅈵雨未生芹悠悠聚􅄆何堪計目㫁江東有暮雲象山東門别夀上人一咲相看寂寞濵杖藜還徃得辤頻猊床白拂風標舊寳網金沙世界新後㑹山中應有曰定知海水未􅀭塵而翁賸語今多少此去如何舉似人送杭州貢教授􅆀仕歸里䆠情郷思兩依依獨裹寒氊去若飛􅀊晏忍為千里别林間驚見一人歸官河逺樹迎仙棹夕日暄風颺綵衣漫使臨岐生悵望可容泉石借餘輝送宋兵部還亰氷壷炯炯映髙秋端是人間第一流小屈神仙来下土為栽桃李遍南州鳯池歸近聞佳語金匱書成識壮游顦顇陳人頭半白臨􅄮空望李膺舟送陳漢卿三年坐客詠無氊一日為郎望若仙共喜􅆛貅閑白晝怱聞鵰鶚上青天忘形不用公榮酒先路空慙祖逖鞭此夕臨􅄮倍惆悵水煙沙雨正茫然送姚利用青春白日映紅顔空谷寧容乆棄􅂢新刷鳯毛看有色勇穿虎穴去無前風雲政爾多良㑹山澤終然要列仙故里樵柯如好在歸期莫􅃌後千年陳山晚泊一柱􅀌撑杳靄間人言此是客星山流風百世今誰嗣應詔諸生故未還荒塜草深迂石路髙齋月滿閟松􅀜窮年漫迹滄江上及此維舟獨厚顔送三髙祠陸主奉垂虹古祠煙樹新昔賢髙􅃱乆無聞􅀞圗想像空陳迹譜牒流傳喜到君春水白鷗分座席寒泉秋菊薦爐熏臨岐何限滄洲意目㫁風帆天際雲送陳推官之信州三朝兩世掌絲綸異代仍瞻玉樹新尚喜傳家餘䆠譜又聞議獄用儒臣中年離别情何限南渡風流迹未陳遥想郡齋多暇日肯憐州縣正勞人送胡古愚兼蕳道傳博士㘴擁皐比十載餘忽聞飛鶚上公車此行未可輕投筆随䖏猶須少曵􅅂燈火尚慙餘事在雲霄轉覺故人踈爲言留滯今頭白無用諸公薦子虚送淮海書院丘山長遥望官河駐綵橈春深絳帳不蕭條已驚雨露恩光厚還喜山川物色饒盡日樓臺人載酒隔江燈火夜吹簫定知舘下多才彦政樂風雩對一瓢留别錢翼之矯首清標二十霜白頭傾盖鄭公郷忘形肯厭追逰􅁆借潤頻飛翰墨香世態浮雲看不定别情流水去方長杏花時莭霏霏雨誰共春風舉一觴送王景文應薦北上自是春風席上珍雲霄有路獨逡廵未妨豹􅀮山林乆及見龍飛雨露新黄甲駸駸傳盛事青衫獵獵愧陳人瀛洲此去無多歩應咲蹣􅘐尚後塵送胡􅁢文楊㢘夫應薦北上顦顇陳人復此邦坐看仙棹發濤江華年春栁嗟難及壮氣晴虹詎易降㑹向君門俱第一誰言􅀦士定無䨇瓊林宴罷歸来日共話芭蕉夜雨䆫送楊㢘夫天台縣尹十載韜蔵席上珍爛然錦製一時新羽人咲􅃌雲為路山􅀑愁聞筆有神遥想到官多暇日不妨領客試行春石橋瀑布逢佳句取次飛箋莫厭頻諸曁休日偶書一室蕭然似冷官更無車馬駐江干天清不㫁􅁝􅁝雨春淺猶生陣陣寒公事癡兒何日了雲山圗􅀞要人看輕風正滿微黄栁誰與相從試凭䦨湖心寺夜㘴蕭蕭􅈵月滿池臺水檻風櫺四面開一柱殘燈何熠煜半簷衰栁故崔嵬謬持微禄知無􅀘未謝餘縁得重来塵土馬蹄眀日事可容良夜廢㗸杯次韻荅徐文蔚一别溪頭十五春歸来烏帽尚黄塵故應用意﨑嶇外未忍忘情寂寞濵圗􅀞雲臺非我事掛冠神武獨何人也知州縣徒勞耳相見空慙白髮新送黄季與歸盱江天際江流映碧山春風浩蕩一帆懸長吟白雪誰憐爾却望􅀌雲獨慨然逸少向来曽誓墓元龍此去盍求田相逢况復敦同姓聊冩深情入短篇次韻申屠子迪試院唱酬一札天開雨露香青冥萬里看飛黄共驚鵠立多如堵誰取龍標逺擅塲塗抹已忘年少樂卷舒偏喜漏聲長􅀙渠曲學能阿世敢謂公孫䇿最良次韻曺待制試院九日坐客今無賀老狂酒徒寧復􅃇髙陽下風共仰衣冠盛餘潤仍分翰墨香佳節政須開咲口多言非必有它膓何人可與公榮飲願摘寒花侑一觴雨立諸郎輟苦吟華堂星聚㘴方深放懐不厭如澠酒過眼休遺擲地金古往今来千載意東塗西抹少年心花前起舞爲公夀肯作牛山淚滿􅁭題胡大􅂙禱雨詩後䨇徑迢迢一綫通仙山九鎻白雲封黄塵果日迂鳴􅀐黒夜幽潭起蟄龍農父不須愁􅀊事川原還喜見秋容眀公自是為霖手四海蒼生望正濃送馬之􅂹同年一􅀙鴈塔共留題囬首何人在鳯池㘴閱􅀊年今若此乆居州縣亦奚為鳴琴晝静魚龍聴落筆風生草樹知行看金屏署名姓應憐樗散􅁂成􅁝送汪臣良縣丞之亰兼蕳諸同年文塲雜遝盛才賢共羡青雲獨妙年秪謂種花能滿縣忽聞􅀐馬去朝天臨分無用歌三疊有作時須奏一篇若見鳯凰池上客為言顦顇浙江􅁁送頋仁甫上計亰師憶昔曽随計吏行浮沈州縣竟何成􅈵風嫋嫋仙舟去夕日依依魏闕情金匱故蔵多鉅典石渠髙論盡鴻生棲身朱墨非君事早晚公車上姓名送沙彦文架閣分題得西山憶昔寒江破浪歸西山廻首落煙霏忽逢朝士登舟去如望仙人㧞宅飛游戯何妨依緑水􅇷趨早已到黄扉公餘若過􅅬王閣為捲珠簾挹翠微題金眀宴逰圗危樓縹緲碧波中曲檻方櫺面面通雲氣傍花如欲雨栁􅁝垂地不驚風千年華表人非是九奏鈞天樂未終更有殘山并剰水煩君􅅆首六橋東送蘇伯脩御史君别鼇峰我獨留又聞騘馬向南州振衣忽若神仙去落筆遥生草樹秋封事皂嚢須亟上蔵書金匱待窮捜北山猿鶴如無恙為報詩人已白頭送仇治書赴陕西行臺妙柬驚聞出九重路人猶識􅃇乗騘乆陪廟筭知無敵復覩臺評用至公􅄃轡清風何颯颯浮􅀜􅂵氣已葱葱齋居决事須公䓁歸覲行看馬首東送徐教授麻鞋厭􅂿洛陽塵莫共簷花試一樽遥想清風問前路不妨紅日在西軒米家書􅀞随歸棹白傅林塘近故園舘下諸生虚悵望蒼蒼煙霧隔龍門送許録事􅇵曺自昔號難為敏手如君直小施故喜􅀅迎多暇日獨憐趨走不同時滄波古木知章宅衰草寒煙逸少池囬首舊逰成夢􅄰可無新語慰相思送唐真人歸江􅁜荆門霜落布帆開晴日空江轉怒雷應到故園廻北斗却􅀙雲氣望蓬莱兒童不識千年鶴氷雪相看一樹梅莫羡登樓是吾土玄都觀裏待重来送陳法師歸建康嫋嫋天風颺六銖玉函新捧􅂵泥書遥知華表歸来䖏猶記崆峒訪問􅀄上界于今􅁕官府仙人自昔好樓居腐儒頭白慙無用空抱遺經望石渠上巖寺訪一公曉色微茫尚帶星脩蹊犖确㫁人行獨支瘦竹身猶徤髙入重雲地忽平落月正當山缺䖏細泉頻作雨来聲上方燈火青林曲􅀮􅀮踈鐘一再鳴􅀉題髙逺樓聞道危樓架沈寥樓前物色不蕭條䆫臨謝傅祠邉樹門對曺娥渡口潮觧使詩人争應接也知老子極風標倦逰巳忘山隂路勝踐仍須折簡招送李教諭片帆西上興悠哉小室如舟絳帳開山縣官田生苜蓿故郷雲氣隔蓬莱少微有日占星動滄海何年載月廽慚愧臨岐無可贈因風聊遺一枝梅題東柯谷圗長松宻竹翠交加洞府新開碧海涯石上仙人留足迹春深磵水出桃花流傳圗􅀞来千里生長兒孫只一家目㫁飛鴻那可到􅃇逰空􅃌赤城霞聞趙繼清調安陸縣尹慈恩塔上墨猶鮮一别重来十七年相見都門驚判袂又聞澤國去鳴絃素衣乆出風塵外青􅃈行依雨露邉跂馬望君先數日縣花雖好莫留連送趙繼清潮州推官相國南遷有故居理官髙選出新除承恩特與金魚袋訪舊争迎駟馬車春入圜扉庭草暗天低驛路嶺梅踈鳯池不隔同年面歸及􅀅花鴈影􅀄題雪竇妙髙臺偶為清逰􅀫梵宫􅇒晨試上最髙峰水翻雪色寒猶落雲掩丹光逺茰重舊有一僧能跨虎近聞三洞盡蔵龍下方車馬應難到煙際惟聴日暮鐘題觀海圗昔年觧䌫岑江上􅀄日􅇛􅇛水底紅鼉吼忽揺千尺浪鷁飛仍挟半帆風遥看島嶼如星散祗謂神仙有路通及此棲身萬人海􅃇逰却在􅀞圗中送張法師召嗣天師於龍虎山甘泉乆矣􅀱神仙何日靈風響佩環洞府樓居雲霧裏星槎使節斗牛間潜蚪有待􅀅為雨跨鶴相􅀙早出山歸及皇州春色好一時􅂵氣滿函􅀜送胡古愚白溝河水照行装楊栁春旗日影長傲兀鄭公新座席歛蔵馬史􅃇文章談經安用青油幕載筆徐歸白玉堂北望京華天尺五賸收餘興入奚囊送夀應奉赴興國經歴退直承明未倦逰獨随逺牒向南州清江短掉蒹葭雨斜日虚庭鴈鶩秋小却猶為蓮幕長重来應到鳯池頭予環行矣聆佳語休蠻牋賦别愁送麥敬存檢校天􅁁豸角自峩峩老矣南公􅂴上坡省署六曺新撿正著庭三史舊編摩紅蓮幕底秋光淡黄鶴樓前月色多莫咲鄭䖍官獨冷别時聊唱醉時歌送隂陽胡教授之四眀手挟飛雲萬里逰朔風雨雹弊貂裘忽聞水北山人去不作周南太史留炯炯心胸蔵列􅀫駸駸歩武近瀛洲此行莫厭官曺冷猶勝寒儒老一丘送黄生歸廣州萬里来充觀國賔春風座上俊才新政慙杜甫敦同姓忽報何蕃去省親􅀊月如流須僶俛雲霄有路莫逡廵異時郷郡知名士金榜曽為第一人送潘生之江西緑楊堤上曉風輕屈􅃌歸人第一程萬里江南新驛使十年䆫下舊書生青雲共羡飛黄去白晝何妨衣錦行咲殺四門韓博士夜深還對短燈檠送吴生歸黄巖南州才子氣如虹一日聲名徹九重退就諸生居六舘㘴觀文史冨三冬揮毫小試絲綸手獻賦徐開錦繡胸暫爾稱觴拜家慶眀年歸有􅂵泥封次韻孫伯剛龍虎臺即事秋風原上獵塵開曉日天􅁁羽衛来誰念艱難獻無逸但聞歡樂詠靈臺時廵不厭􅀩霜露清問應須及草菜絲􅁂廣文何􅀘報莫言相遇且㗸杯題天雲詩卷一錫秋風信􅀁之漫􅀅外物託心期雲根元自無栽䖏天路何曽有到時即色是空應巳悟安名立字復奚爲欲相􅀧綴忘言􅀃㘴看爐煙裊碧􅁝題李氏榮夀堂吾親疇昔􅀍恩封􅄑與公家具慶同仰羡班聮方貴近光膺寵􅁆獨尊崇蘭臺薇省歸休日鳩杖魚軒咲語中倘念小人今有毋滄江願乞半帆風夀汪太祝父六十獨專一壑住深幽不換人間萬户侯故里樵柯猶在手新年花甲始平頭靈椿丹桂聲華茂墨綬銅章寵數優舊賜黄封冝介夀飛觴應度縠江流夀胡古愚千軍筆陣􅏮英風儤直難淹秃髮翁㘴乆無氊如鄭老年堪入社似温公夜深虚室生純白春在酡顔借晚紅九十馮唐􅂊不仕錦衣歸去莫匆匆夀夏真人兩人一百二十􅀊愧我先成秃髮翁苜蓿盤深差可戀蓬莱路近若為通縦令地位仙凡隔未害生年甲子同大斗􅆽霞方介夀衰顔可許借春紅次韻題劉氏石壁精舎佳城杳杳隔千峯精舎寥寥一徑通夜静寒泉猶映月秋深老樹不驚風􅃇題尚喜苔碑在髙卧無令􅈍帳空我巳倦游今白髮有山如此願長終送葉仲輿廵檢重著儒冠望帝郷翩然一舸犯晨霜秋来􅁂髮依前黒日射河流徹底黄此去乗槎須有路可容執㦸更為郎􅁝綸閣下多知已握手應分滿䄂香和外舅主簿公自為挽詩五十年前馬上飛青春流水去難􅇷一從玉樹歌殘後􅁆到黄􅆝夢覺時李賀元無樓可記劉伶漫有鍤相随少須海上蟠桃熟歸簉仙班恐未遲留别一公琳公浪走紅塵􅁂巳絲此身端合老巖扉興来復舉山隂棹别去仍留海上衣夜聴泉聲如雨落晴看天末有雲歸浮萍飛絮何時定空使詩人賦式微送傅汝礪之安南南徼車書路不遥秋風使節下青霄頗聞僚佐登才彦應有文章逹教條日照樓船江水活天低銅柱瘴雲消歸時嶺上梅花發想見詩嚢未寂􅋁兩浙轉運司知事張公挽章二十餘年立下風故家喬木欎青葱群趨欠識官曺貴末論難禆鍳裁公九折塩車方止止一坯文冡巳崇崇英姿爽氣歸何䖏盡在山光水色中題􅇞節婦詩卷春旗栁色映門閭華扁新題節婦居作傳小裁青竹簡䟽封近降􅂵泥書河壖松栢風煙外階戺芝蘭雨露􅀄三釡及親殊未晚花前何日奉安輿送孔御史歸曲阜清流共喜聚群賢新渥時聞下九天東觀紬書何日了中丞遺笏要人傳過家莫乆依林廟封事先須徹御筵千載斯文􅀉来哲臨分握手重懸懸送龍南歐陽縣尹絲綸閣下半同􅂁獨上南舩去莫招出􅈗不嫌官俸薄過家未覺驛程遥長溪白石晴雷轉深洞黄茅毒霧消想見行春有佳句㘴令逺俗變風謡金華黄先生文集卷第五
