body:
  text: 新城縣學大成殿記新城縣有學昉扵唐中宗時其禮殿則後四百八十年宋乾道間縣令耿君秉􅀁建也􅁇耿君者劉君景脩謝君夢生張君徳逵皆甞繕葺之逮國朝大徳七年又一百三十年矣縣尹魏君榮欲謀改作而力有弗給僅克營其齋廬門廡而止仍紀至元之六年今逹魯花赤来莅縣事下車之􅀄展謁于先聖視其棟宇摧敝支拄架漏垂􅀅覆壓大懼無以庇爼豆毅然以興造為巳責遂綴俸資用為衆倡官僚佐吏咸樂相其􅃥有力而好事之家佽助恐後於是撤故禮殿而新之斥大舊規加其廣者四㝷増其崇者一仞礱斵藻繪悉中法式儀象有嚴器服畢具以至正元年夏五月始事秋八月訖功其月上丁釋奠于新廟諸生駿奔執事惟謹邑里秀民嚮慕就列靡不􅀚感興起而相與詠歌賢侯之徳非直土木之壮麗足爲夸羙也􅀼惟古者有學而無廟故孔子之廟終漢世不出闕里至唐而州縣學皆得廟􅀕孔子爲先聖其後學之廢興不常而廟以通祀著於令莫之有改宋􅀄州縣未有學而新城在唐已先有學歴五季而獨完者學依乎廟而存也矧今承平寖乆治教休眀廟學之制於斯大備有土有人者能汲汲􅆀其力焉可謂知化民成俗之本也巳是役也教諭芮􅂄孫實身任之而俾士人馬章緫其役費之出納㑹有詔遵舊典用科目􅀵天下士章充賦而来首取郷薦爲言詩者第一􅂄孫旣馳書来謁記且謂章之筞名有司乃賢侯作興之效冝牽聮得書嗚呼孔子之道推而極之至扵位天地育萬物皆士之分也文運初復禮殿聿新仰瞻睟容如親薫炙勿忘其􅀁已能而益勉其􅀁未至庻㡬不􅀒賢侯風厲作成之意矣同志之士尚無忽諸逹魯花赤唐兀氏名天祐泰定元年進士也徳清縣學􅀕器記徳清縣學新作􅀕器成主簿潘君以書来曰縣有學學有廟尚矣前教諭蔣釣􅀁置􅀕器僅四十有九吾縣尹蘇侯之始至也首以興學為務勒褒封之辭以昭國典飾嚴奉之具以崇廟貌增廣生貟而訓迪勸勵之㝷用今教諭胡宗海之請按􅃇圗􅀘造􅀕器之未俻者百三十有九罇爵簠簋豆登􅎆勺槃玷之屬如式告完費錢以緡計者千七百五十皆冨而好禮之家慕嚮而恱助之者也盖侯之撫民有恩馭吏有法而濟之以無倦今逹魯花赤與侯下車同日克䔍於寅恭之義併志壹慮俾伸其􅀁欲為㒒居其間雖無能為役亦左右交賛之故未及朞月而庭無􅆡訟姦豪屏息官府事益以蕳餘力􅀁逮自社稷壇三皇廟至於公署賔舘亭臺庫廐以次畢新凡侯之􅀁設施可稱道者非一而莫重於禮器之大備願舉其􅀁重為之記它善狀得以附見焉予惟古之釋奠為禮也略為器也容不必備今旣廟事孔子在著令為中祀牲幣物器咸有定制其禮自朝廷逹于四方而偏州下邑迫於米鹽細故曰不暇給春秋之薦􅄑不廢而巳蘇侯獨識其若緩實急而不苟扵因陋就寡考儀文之缺而扵器數之末有􅀁不遺能盡其職分之當為而敬其事如此餘可知也庸弗辤而記之逹魯花赤名孛蘭奚河西右族蘇侯名靖世居濮之臨清潘君名子陽予同郡金華人也􅀕器之目及助錢者之氏名悉列于石隂云海鹽州新作大成樂記古之釋奠折爼􅂛觴而巳其為禮也畧故其用樂之始莫得而詳記曰凡釋奠者必有合也􅀃者或以合為合樂然則釋奠之有樂其出於古歟若其音莭器數則自漢儒未甞言之前史􅀁載元嘉之六佾特施於太學開元之宫懸僅設扵兩亰政和造雅樂名大晟始頒行于天下而紹興著令郡邑􅇚奠其樂三成盖至是而州縣學有事于先聖先師無不用樂者矣􅀦家有因有革存其聲音物器之舊而變其稱號以新一代之觀聴今􅀁謂大成樂是也海鹽昔為縣時旣立學而廟祀孔子逮版圗入職方朝廷以其地大人夥易縣為州而廟學之制猶循其故禮具而樂缺有司以吏議􅀁不責乆寘弗講至正元年夏四月陳侯某来知是州首務興舉學政問其籍則為士者百家為田者萬畒問其春秋之事則有牲幣而無樂侯為之惕然與寮佐延諸儒共圗之僉言儀真有周君者善樂事老而不仕寓迹扵雲間欲正雅樂非君不可侯即俾持書幣迎􅃱焉君曰樂以導和不和不足為樂㒒觀江淮間􅀁用樂雜出於伶人賤工之手器不中法音不中律左右髙下参差混淆惡足以􅃱和㢤苟徒􅂢厚費而飾虚文㒒弗為也侯曰作樂以和神惟君言是聴君乃為考其數度齊量範金為鐘而恊以古律管彼此適均吹其律而鐘自應至於琴瑟亦悉自製惟笙磬之屬擇善工使受􅃌畫而為之集諸生三十有二人教之肄習而以眀年春二月上丁合奏焉在列者無不欣豫於是教授陳某以状来屬予書於麗牲之石用垂永乆盖古之設教莫重扵樂非止用于釋奠也侯之於樂不但欲辨其鏗鏘又必求通其義者相與討論之可不謂知􅀁本乎諸君子􅀙侯􅁱其時事周旋升降於堂序之間必有聞其樂知其徳而鼓舞于鳶魚飛躍之下者矣是舉也有功扵教道甚大非徒備其闕典而巳可無書乎浦江縣三皇廟記醫有學三皇有廟尚矣合廟學為一而俾醫師領其祠事有司以春秋之季發公帑具􅀕料而折爼􅂛觴焉今制也盖三墳之書世莫得見可見者非必其本書百家􅀁録又多恠迂鄙野而爽於用能推其􅀁承傳而措諸民生日用之間惟言醫者為然耳三聖人開物成務之功有託以弗泯其在兹乎凡立學必釋奠于先聖先師禮也仲尼祖述堯舜憲章文武而其徒無敢推唐虞成周之君以為先聖醫家者流乃得上援羲農黄帝氏而尸祝之希世之盛典歟國家仁育庻􅀋将悉躋之夀域垂意於醫事至重而不䡖崇廟祀以表章其學著在令式而偏州下邑或不能奉以􅀙事非知為政之緩急者莫肯盡心焉浦江自版圗歸職方踰四十載迨至治􅀄始克有廟于邑署之西南不乆􅂺壞天暦間甞繕完之而猶未有學也今逹魯花赤八時思􅄎化以廷對第二人由中祕外􅀘再轉而長是邑旣興學宮以嘉惠章甫逢掖之士㝷又以為今之建學立師醫與儒等爾隆扵彼而嗇於此非􅀁以欽承天子之命教也乃􅂢俸資倡衆而改作焉中為殿堂具嚴像設兩廡旁列四墉外周前植櫺星門而齋􅀫之次論􅀃之􅀁無不畢備經始於至順三年之某月落成於眀年之某月書来属溍記之溍􅀼惟三聖人之法被于萬世其大庇乎斯人者若天覆而地載不可以一事名言也百藥齊和湯火箴石之施與易大傳􅀁稱網􅅈耒耜衣裳舟楫􅍫杵弧矢棟宇棺槨均之為一事爾其不可名言者孰得窺測而擬諸形容哉乃若賢侯之敬恭秩祀道宣靈休不宜無以告来者庸弗辤而為之記餘見扵舊刻者兹不重出焉海寧州三皇廟􅀕田記延祐五年知塩官州張侯克明以部使者北臯張公之命肇建三皇廟于州署之東南州故為縣時横浦張公五世孫宣甞主縣簿因諉以􅇂其役明年殿成而侯以秩滿去㤗定元年方侯存心􅁇知是州乃克施采章以嚴像設㝷增創東西廡及儀門後改號其州曰海寧而李侯憼以至元某年来知州事又為圗從祀造禮器遷櫺星門前臨通衢右廟而左學齋廬庖舎次苐畢完今知州張侯光祖涖事之又眀年至正二年也以政理之暇周視其􅀁缺自兩廡三門屬于通衢悉加以陶甓䟽水為池而環以石隄藻飾華好内外聿新士民靡不瞻仰歎息頋獨未有田以供粢盛酒醴取具臨時㡬扵苟蕳侯謂是非􅀁以崇典祀其年春三月蕆事而退爰集僚佐共輟俸貲以為衆倡俾醫學正胡某隂陽學録許某率其籍扵醫者三十家籍於隂陽者三百家合錢若干緡購民田若干畒有畸載以兩青􅁽留其一于州而以其一併劵書蔵于學即廟置倉儲􅀊入以給祀事有餘則以待營葺之須不得􅂺移為它用凡出納必白扵長官之主領學事者侯欲使後人守其要束永乆而弗廢来徴文以記之謹按宋元嘉中醫始有學唐天寳間三皇始有廟學不附於廟而廟不出於亰師醫鍼按摩呪禁之師生並􅀠於太常而享先代帝王之儀制名數專掌於禮部歴五季逮宋莫之有改也我朝言醫及隂陽者乃原其􅀁自推三皇以為先聖天下郡邑咸得通祀焉盖振古未及行之曠典乃今而舉之土木之役固不止一人一日之力至於有田以􅀕而廟學之事斯為大備侯之垂意於此則已勤矣若夫三聖人之道既非一藝可以名言而其功亦無一物可以為報稱兹不敢復賛以一辭也姑叙其建置之始末及其成規而為之記用告于嗣為政者焉杭州路儒學興造記杭於宋為行都士之􅀁聚為亰學凡著籍其間得以􅀋申補太學諸生人以比古之外廱四方之士咸附集焉以厭於太學故其規制􅄶迫􅋻陋頋出它州郡下擔登􅀒笈而至者殆無􅀁容徳祐納土杭為外藩聖化􅀁曁無間逺邇士風之盛不减異時廟學悉㳂其舊乆未有􅀁改作禮殿之東有論堂宋理宗書飬源堂三大字故在左右前後環以十齋曰進徳曰興􅀎曰登俊曰持正曰賔賢曰崇禮曰􅃱道曰尚志曰養心曰率性每齋前列屋為間者五而後為爐亭題扁則文丞相天祥陳􅂙政文龍諸名公書之堂之北為髙閣以蔵書榜其顔曰尊經者國朝行中書省平章政事髙公興􅀁書也大徳七年王教授去疾始撤尚志一齋以廣殿基至大四年倪教授淵遂撤養心率性兩齋以營學官􅇬舎至治元年進徳興能兩齋燬於災緫管忽都魯沙又即其地構㕔事僅存而可居者五齋率皆局於地􅀔前阻逵路後逼㕓居雖欲充拓使就顯敞而遺囂煩不可得也至正二年夏細人之家不戒于火飛燎及殿擔而止持正賔賢崇禮􅃱道四齋與廟垣外比屋而居者數十家盡燬弗存執事者請割學西􅂩地益以錢若干緡易其廢址改建論堂四年夏儒學提舉班公惟志方俾之度木蕳材而李君祁来為副提舉亟命學正録直學等揆日庀工適當緫管趙公璉下車伊始教授謝君池亦至趙公旣銳然以學校為己任謝君亦克併志壹慮而趍事赴功乃徙閣於四齋之故位且為屋掖其兩旁而以堂之故位作新堂及前軒設大小學齋東西對峙輦石刻置閣之北數百歩而為亭以覆之殿廬門廡官㕔吏舎及故􅀁有登俊一齋下至庖􅅒之屬仆者起之缺者完之丹采之剥蝕者飾治之屋之因舊繕葺更新創造以間計者緫若干甓堂涂自門屬于閣二百餘尺土木匠傭之費為錢􅀂干緡為米若干石悉出扵瞻學經用之餘未甞以匱官勤民為士者亦無􅀁與始作於六年冬十一月訖役於七年夏四月謝君状其實馳書亰師屬溍記之夫政事由人而廢興制度随時而損益必人與時㑹乃可以􅃕舊而圗新今天子嚮用儒雅嘉惠斯文羣臣承宣徳意如恐弗及經之營之室苟羙矣息焉㳺焉士何事乎誠能充􅀋􅃱思而知吾之􅀁居廣居􅀁位正位􅀁行大道非人之􅀁能廢興非時之􅀁􅀎損益必有感厲奮發求至於聖賢之域而􅂛其堂入其室者則賢師帥振起作新之功不止􅀂今􅀁記而巳溍旣序其工􅃥之㮣併志􅀁望扵其士者如此云趙公至治􅉝酉龍飛進士今為禮部尚書班公前集賢待制李君至順癸酉廷試第二人謝君宋丞相太師魯王五世孫也郷學記覇之益津人宫君琪即其西郷􅀁居作學舎合諸㽵子弟俾肄業其中且為廟像先聖先賢以春秋旦望奠謁如學官法念不可無以示永乆爰狀其事走亰師請奎章閣侍書學士内翰虞公為之記公方有大論譔未暇如君琪請廼以狀授溍俾執筆而書之溍惟古之施教導民有本有原必由郷以逹扵􅀦是以六郷之吏去民愈近者為教愈詳一􅀊之中州長之屬民讀法者四黨正七族師十有四而閭胥則無時焉若夫二十五家之閭則又有門塾以仕焉而巳者為之左右師雖閭胥弗親也故上之教不煩而民之為士者恒足頼故其詩曰攸介攸止烝我髦士人生其時獨何􅄑歟今郡邑用著令旣咸得立學承宣徳意而崇厲之厥有師帥而郷閭之教希闊弗講雖有朴茂之質何以培其根而逹其支也㢤君琪不自耀其材以取顯仕而主昌平之候舘固非有長民者之責廼能汲汲焉圗􅀁以􅀻㳤其人如此可謂有志于古矣昔者魯修泮宫而春秋不書􅀃者􅀋曰此有國之常事爾君琪之為盖禮之以義起而出於常事之外者也可無書乎凡廟學緫為屋若干楹費錢若干緡經始扵至順二年春二月而落成於秋八月翰林直學士趙公子昌與君琪居相望實有以相之其来請記則冬十有二月也文學書院田記昔州縣未有學儒先㦯擇勝地建精舎以講授為政者􅂺就而褒羙之號曰書院宋初天下四書院而已然惟白鹿睢陽之有田僅見於傳記皆上之人以是而厚其養未有以一郷之善士專任其事者其後命州縣咸立學而學校之官徧扵天下書院之創置亦日増多我朝尊右儒術以風厲乎海内聞者莫不知􅂆有力而好事之家往往構廣厦以崇祀事輟良田以豐􅅒食其為書院者遂與州縣學委立而布滿於四方旣奉濓洛乾淳二三大儒以為先賢而於前代名臣山林髙蹈之士有􅀁弗遺凡尸而祝之者非其仕國則其郷邑也孔子之門􅀙㳺三千速肖七十獨子㳺為吴人今常熟州實其􅀁居里南州之先賢孰有加扵子㳺者乎寥寥千載莫有能表顯之者州故為縣時孫公應時知縣事甞為位於學官講舎之西偏率學士大夫及其子弟行釋菜禮而未克為專祠後百五十年為今至順二年州人曹君始出􅀻錢買地作祠宇而闢論堂於其後列齋廬扵其旁有司因為請扵中書設師弟子貟而掲以新額曰文學書院曹君旣贍以田一千六百畝有竒恐旱乾水溢之不虞益􅂌以田二千六百畒有竒其田有苗稅而無力役春秋之事得不匱乏為士者亦有􅀁􅀩賴而得以蔵脩㳺息扵其間爰狀其實屬溍記之溍􅀼觀孫公舉曠古之缺典意甚羙而爲事蕳略特以先師朱子之記而見稱於人曹君乃能不愛其􅀁有而汲汲焉􅃱力扵孫公之􅀁不及固巳不易以一郷之善士而專任樂育人材之責亦古􅀁無頋欲以溍之􅀩陋嗣爲之記而自附於朱子之末安敢犯是不韙㢤惟朱子之文天下學者莫不家傳人誦之况爲其州之士而羣居於此豈無聞其緒言而興起者誠能相與勉焉朝益暮習而無苟利乎爲養之厚必有異乎今世之􅀁謂文學而不爲昔人之􅀁謂賤儒此則朱子之􅀁望扵来者溍無庸以勦􅀃爲也傅氏義田記烏傷之北鄙有義門者里人傅氏之居也傅氏之長曰某過予而言曰家故有田四百畮合族而食五世矣以羣􅀙子姓之蕃衍也􅀊率用八畮之入食一人而籍其餘可當十人之食以給賔􅀕百湏之費吾懼夫乆且弗􅁇而無以善其後也吾竭吾􅀻焉耳矣盖得田凡若干畮别儲其入為子本而權其竒贏俟它日更購田以附益焉是不可無告来裔使成吾志以惟子也請嗟乎義之名孰從生乎親親仁也因時制冝義也禮之􅀁由起也盖予聞之古之制禮者為之井田以同其利為之比閭族黨以均其安夫然後教以有急相賙有喜相慶死喪相䘏疾病相養猶患其未足以勸親親也於是乎有宗法焉而非㑹居聚食之謂也服窮于緦而同姓殺于􅃝免是以祖遷於上聖人莫䏻存也宗易扵下聖人莫能止也戚也而日以䟽􅀔也繫之以姓而弗别綴之以食而弗殊則是䟽可使戚也其􅀁因者本也循其􅀔故教易行逹其本故道可乆聖人惡有術以強合之㢤大雅曰飲之食之君之宗之王者之大政也田制壊宗道廢仁人孝子不得由乎先王之禮之盛而各以意行之假區區生養之具以収聖人之􅀁不能合夫亦有取其義云爾也充其義而仁不可勝用也記曰一家仁一國興仁一家譲一國興譲在乎勿替引之而巳書而歸之俾刻諸石豈非其􅀁望以扶吾義於百世而弗墜者耶旌異之實存乎􅃇記條約之凡具于碑隂兹不書湯氏義田記湯氏在龍泉為鉅族宋南渡時岐國公思退以文章家􅆀位􅈗相族益著岐公之伯祖太中大夫稲後九世是為武翼大夫大莭武翼生望以父䕃譲其弟始不有世禄有子曰鏞字伯韶生十三年而徳祐失國遂􅀮不仕人稱之曰石屋䖏士云䖏士君旣不仕則混迹民間務為生産作業家以苟完自奉甚蕳薄而樂振人之窮急謂仁民愛物冝始扵親親乃置義田以贍同族其為田二百畒􅀊可得􅂖四百石擇族人㢘謹而有幹局者俾任其出納月給人五斗有䘮者二石葬則半之産子者一石再有子則倍之子始入學予錢三十緡嫁女如入學之數娶婦則减三之一年七十者毎􅀊帛一匹能自業者弗預不知檢飭而有子弟之過者罷之大畧倣范文正公之成規而微有􅀁損益其為施貧活族之義則無以異也盖范公有志扵是者三十年暨出臨方面入踐政途位充而禄厚始克終其志岐公方貴顯時未及為而䖏士君乃以一布衣為之可謂難也巳然甞􅀚三王之民皆有常業食飲服用之須不必仰扵人而後具公卿大夫􅀁受田禄亦有等差而不得過其制安􅀁取羡田以為相賙相䘏之資乎若夫合族之道又非衣食扵我之謂也厥今田制之壊宗道之廢亦巳乆矣有能以義起禮而崇其㤙愛扵服窮親竭之餘不愈難㢤䖏士君三子長濵次溱次亰溱不􅄑先卒濵與亰是􅁇是述弗􅈈益䖍而亰不逺數百里走錢唐求予書其事于石以告後人俾勿墜孝子仁人之用心何其深且逺歟是固予􅀁喜聞而樂書者也䖏士君之言行前進士葉峴既以銘其墓兹不復云鄞縣義役記浙水東州縣􅀠慶元大府者六凡􅀁入田租鄞以一縣當其什五諸名額及非時之湏稱是取民爲最夥而其爲縣在鉅海上號東南一都㑹牧伯守􅀅􅀂它司以轉􅈇市易鹽䇲之利有事于海者悉涖治其䖏一切趣辦用民爲最繁冨者巧自辟匿貧者日削而弗􅁇吏鰓鰓焉惟期㑹之㦯後為懼而公􅀻交病矣天台周君之為丞也㑹國家申嚴役法豪右以它名數自占者母敢弗與周侯進父老具宣徳意且教之為義役扵是縣西南五十里林村之民次當受役者三十有五家首相與謀眡物力之薄厚各􅂢巳槖得錢七千五百緡為子本推執事者五人操其竒贏以供百􅃥之費而存其母常勿絶復推其五人日詣有司以聴徴令􅀊終則更休焉厥旣條上于縣周君合長佐白狀大府而定其要束因廷酌父老以為衆勸旁郷比井争慕為之其􅆀力也均其待事也易姦胥悍卒不得舞手其間而民益忘為役之勤其效可睹矣周君以秩滿去父老過予而請曰願有紀庶㡬夫嗣為政者知有以相之俾後之人母棄其成也昔者孔子稱子産使民也義夫義也者固古之􅀁以使民也今也田里之人不愛其力相率以聴扵有司而謂之義役非上之人以義使之而能然㢤是盖子産之􅀁以為鄭而孔子之􅀁與也其孰得而廢之然則可託以永乆者有不在予文矣周君名仔肩延祐五年進士其来以七年二月而義役行扵至治元年正月其去以三年三月云邵氏義塾記華亭邵君天􅂹家于縣西南六十里自􅃅翠巖䖏士遺榮弗居而志在澤物遇其郷之人委曲纎悉一以惠利不自謂若是為已足又将使之脩其孝悌忠信而為士君子之歸患夫去庠序之逺而其子弟無􅀁扵學乃􅂢􅀻錢即􅀁居之旁闢義塾贍以胥浦風涇仙山三郷之田二百十八畒有竒禮名士主其席聚里中之俊秀而教育之二子彌逺彌堅咸克成其志而力相其事䖏士君旣以髙夀終而彌堅亦卒彌逺老矣懼来者㦯􅈥其成則刋其田之歩畒郷落以狀白于官示不敢有且求予記之傳曰家有塾非家各有塾也二十五家為閭乃有塾以有道有徳者為之師而閭中子弟無不學焉黨之有庠遂之有序盖􅀊時屬民行射飲讀教法正齒位之􅀁也為士者固不必常在其間而其為閭塾者則無地而無之故其詩曰攸介攸止烝我髦士民生其時抑何􅄑歟三代而下禮缺學廢以漢唐之盛而郡縣不皆有學雖或有之而設置不常宋制惟藩鎮乃得立學其後用執政大臣之請而學始徧于郡縣我朝因之自亰師至于偏州下邑海陬徼塞四方萬里之外莫不有學凡􅀁以嘉惠而振飭之視昔有加可謂俻矣然以郡守縣令為民師帥者恒迫扵職務之繁而不得專意教事其以禮属民僅若有見扵春秋二仲與月之旦望况夫里居之逺扵州邑者欲以時㑹于庠序而瞻其禮容聆其言論且不可得非其郷之善士以義起禮采古人建塾之遺意以為􅀻㳤之地則秀民之䏻為士者果何頼乎䖏士君誠􅀁謂一郷之善士而郷之秀民頼之以為士者也君今巳不可作而其嗣人能迓續之如君之存弦誦之聲乆而愈振􅀅見蔵脩㳺息扵斯者皆得以培其根而逹其支成其材而就其實它日必有能以㓜之􅀁學為壮之􅀁行而措諸事業者矣至是然後為學之成而可以見君父子有功扵斯文豈不偉㢤義塾創扵元統二年之夏四月其来謁記則至正二年之秋九月也戴氏義塾記嘉興郡城東北六十里曰白牛鎮居人􅁆百家為其郷之望者曰暘谷䖏士戴氏諱某患鎮學之弗立而後生小子無􅀁受教規創義塾以􅀻淑乎里人有志未遂而没後二十年其子曰光逺始因其經畫之素度地扵鎮東􅀂干歩廣袤可二十畒而贏程土物略基址考正面􅀔石匠蕳材揆日興作先聖先師之殿峙其中論堂踞其後齋廬翼其旁􅃉廡穹門下至庖湢庫􅁃直舎之屬為屋緫四十有五間陶甓􅉳堊縝壯而不華圗史之蔵什器之須纎悉畢備周以繚垣環以幽篁佳木花徑果蹊而瀦其流泉為芰荷菰蒲之區又十畒不啻起至正某年某月訖七年某月而告成八年春二月乃延儒師招来學用仲丁行舎萌之禮退即講席俾序進而請業焉四齋職教者各一人生貟恒百五十人割上􅃾之田五百畒以贍之既卒成前人之志又將有昭示于後人而圗其永乆於是慈谿黄伯成甫以髙文􅀫徳主領教事伻来求予記之予聞昔人有言惠有術也養有道也惠不在豐而在乎不費養不在大而在乎不窮豐而多費是知愛扵彼而不知愛扵此非其術也大而易窮是知愛扵今而不知愛於後非其道也惟其不費故可尚也惟其不窮故可貴也戴氏父子其深知夫惠之之術養之之道矣乎古者五家爲比五比爲閭門側之兩堂爲塾大夫士老而不仕坐其間爲左右師合閭中之子弟而教焉今之義塾猶有其遺意若夫屋室之多爲間至四十有五則不止扵門側之兩堂學徒之衆爲貟至百有五十則不止扵二十五家之子弟是皆非古之􅀁有其爲惠也豐矣古者歩百爲畒而以百畒爲一夫之􅀻田民無不受田之家而士不必仰給扵學今􅂌以田五百畒則十家之産也而况今一畒爲歩至扵二百四十又不止十家之産而已是則出扵古之􅀁無其為飬也大矣天之生人也莫不賦以仁義禮智之性聖賢與塗人本無以異因其根扵心者使之親師取友朝益暮習而日趍扵善逮夫深造而自得皆其本然之固有􅀄非損扵此以益扵彼斯不亦惠而不費乎物之聚也有數而其用也易耗雖封君之冨欲以萬鍾為弟子之養尚恐􅅒人之粟有時而弗􅁇今乃欲以布衣養徒之事自任而􅃱其力焉使之因地之利􅀊取之而不竭利於今者有以施及扵後斯不亦飬而不窮乎盖設教必有先後次第此特導以㓜學之莭而養其良知之本云爾它日由是而以俊選論扵郷以賢能登扵天府授之以政􅀅見利澤之加扵人為惠益豐為養益大戴氏父子之功奚獨善扵一郷而止乎按郡乘宋名臣陳公舜俞其地人也舉進士應制科皆在前列以山隂􅈗召試舘軄不就而上書力詆青苗法忤執政意謫為監當官公以直道自信無􅀁囬撓毎跨犢徃来山中自􅃅白牛居士人遂以名其故里諸生息斯㳺斯仰企前脩儀刑未逺誠有􅀁感慕而興起安知無如公者出扵其間戴氏父子且與之同不朽矣此又予􅀁厚望也庸因記事而并志之以俟焉沈氏義莊記湖之歸安東七十里是為花城其郷之好義者曰沈君家故業儒君之父䖏士公遺外聲利不有仕禄而樂出􅀻財以振人之急謂親親仁民冝有本末次第首圗創義塾義㽵以教養其族人未及就緒而殁君以為前人之志不可不續爰以至順􅉝未􅂢田五百畒建義塾搆殿宇妥先聖先師像其中以春秋修釋奠之儀闢講􅃕齋廬延􅀫儒為之師而聚族之子弟俾随材以受業郷人来學者弗拒也㝷復以至正乙酉􅂢田五百畒即義塾之南立義莊屋以間計者􅀂干􅀊取其田之􅀁入以實之擇族中之長且賢者同主其出納貧無以給昬䘮諸費者量薄厚之冝制隆殺之等而周給焉大抵本扵昔人之成規而微有􅀁損益懼来者弗克嗣其志則以聞于外􅈗相執政及部使者咸報如􅀁請沈君旣求里之寓公記其義塾而義莊未之有記乃叙次其事以屬筆扵予古之有國家者必度田授民以厚其生立宗収族以教之親愛自其法不行於後世而民之失其養者日多風俗亦日衰薄然而萬古一心萬心一理田制壊而此心不與之俱壊宗道廢而此心不與之俱廢仁人君子苟充其一念之良心推吾有餘資彼不足使得遂其生而發其油然親愛之心豈非禮之以義起者㢤是則生乎千載之下猶爲三代之民也傳曰一家仁一國興仁一家譲一國興譲有能慕沈君之為而興起焉􅀅見人各親其親而同宇之内無一夫不獲其􅀁矣子子孫孫勿替引之善􅁇善述者􅀁冝盡心也戚戚兄弟莫逺具邇秉彜之良心誰獨無之予弗辤而為之記者匪徒以朂沈君之後人纂承而勿墜亦以為冨而好禮者之勸也沈君名野先字進之今為進義校尉江浙財賦都緫管府照磨云諸曁州郷貢進士題名記溍佐諸曁之眀年州人士有同􅂛於春官而旅進扵天子之廷者其調􅀘而歸也學正陳􅁇龍既合郷薦之士為題名而虚其左以竢且屬溍記之溍惟􅀦朝以科目取士著扵令列聖相承守之如一上以􅁇志述事下以立􅀖家太平之基甚盛徳也越扵東南􅃅稱都㑹異時人材軰出起進士至􅈗相者有之自版圗入職方章逢之流相與蹈詠為日已乆如種待穫適惟其時是以詔下之日莫不争翔競奮以自厠扵英雋之列獨是州閱十年而偕計吏第奉常者始接踵而起後先相望滋不乏人其科級之優又旁州比縣􅀁未有也惟其發也不亟故其就也愈偉則其進也孰禦焉雖然士非科目不能以自逹至其措諸行事足以􅀍今而垂後者恒有在乎科目之外苟徒誇榮侈盛而以為稽古之􅀁􅀩豈賢師儒昭示上徳風厲學者之意㢤肆成人有徳溍與諸君子求無怍焉可也小子有造溍扵承學之士盖日望之南山題名記婺之䆠學扵杭者每􅀊暮春必相率之南山展謁郷先逹故宋兵部侍郎胡公墓仍即其廟食之􅀁􅃱􅀕焉竣事遂飲于西湖舟中以叙州里之好大徳八年春三月癸亥㑹者四十有四人魏國趙文敏公時方以集賢直學士領儒臺溍􅄑獲􅀙先生長者之後而趍走扵公履屐之末逮今三十有九年乃以非才􅀘公故䖏暇日􅀙郷僧㳺龍井覩公􅃇題而與道其故事咸謂不可乆廢而莫之舉亟以白于宣政副使王公合同郡大夫士曁方外交四十有一人以至正二年春二月癸亥復㑹于南山追􅁆向之四十有四人存者殆無㡬或􅂋融扵中朝或随牒調􅀘扵逺方㦯已倦㳺歸休扵家林惟溍忝有禄食于此而得齒兹盛集未知後三十有九年今之四十有一人重来者誰歟古人云後之視今亦猶今之視昔此題名之􅀁為作也諸公謂溍冝題識其首是用弗譲而直書其􅀊月以俟後之覽者焉天目山禱雨記至正二年夏四月不兩江浙行中書省􅈗執都司親禱于杭之宗陽宫俾真人唐永年為作符檄朱書鐡簡命道士持詣天目山祈靈扵兩龍祠仍遣吏同臨安扵潜兩縣長貳奉香幣以􅀙十五日乙卯抵太微盖元洞天至道宫白于靈濟顯澤昭徳聖烈王千六日丙辰􅀺眀以楮鏹藉䟽狀符檄投諸龍池䟽狀符檄皆逆流北上俄若有啓其封而展之者至洞口遂與􅀁投鐡簡俱沉水中已而隂雲四起下山甫一里雨随至亭午抵玄霤山真慶􅀚白于護國庇民廣濟眀著天妃之神以楮鏹藉符檄鐵簡投諸龍井如前儀符檄獨浮不下或謂此天妃祠而緘題云玄霤龍王冝其弗納乃以意黙謝封忽自啓而沉還至扵潜縣􅇬雷雨大作潤澤􅀁被合境告足爰命儒學提舉黄溍直書其事光􅀭神休二十日庚申謹記金華黄先生文集卷第十
