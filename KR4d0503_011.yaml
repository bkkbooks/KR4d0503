body:
  text: 記臨川危素編次番昜劉耳校正净居寺記黃檗山在吾烏傷北望之森然其起如騖其伏如踞其支而出也如趍如附亘二十里靡迤而不絶抵縣治乃巳由山之趾緣修蹊而上磬折行清池古木間至其腹重岡㳫嶺周如四墉則又窈然而深有佛廬曰净居院唐涉公禪師行道之所也先是山皆榛莾貁貍蛇虺以為窟宅樵蘇之迹所不通涉公以雙林緇錫猥衆欲去喧而就寂咸通中始來隱于此結茅自䕃宴坐磐石上人無知者久乃得棄𬞞澗水濵遂相率訪求之既見而髙其行為闢地治棟宇如它浮圗居且白狀于刾史以聞賜寶勝額宋大中祥符初易今名景定未大比丘珏公以癡鈍嫡嗣領天下第一山理宗甚尊禮之故其境以人而益勝豫兒時避兵山旁民家屢往憩焉仰視殿堂丹采皆昧父老指石羅漢云相傳池水嘗夜出光怪因得此像十六及石磨一或以為廬山歸宗寺故物莫知何以至此又指前巨閣云此御書閣舊藏理宗所書荆叟兩大字荆叟珏公自號也後豫遊䆠四方不能數造其處屬者偶過之則文栱華榱晃耀林谷中嚴金相後列玉函花香物器備完無闕上人法暉揖豫而言曰暉少得業是山今老矣大懼無以續前人之遺緒經營積纍殆十星霜佛殿則創于泰定元年之十月藏殿則落于至順三年之二月僧堂兩廡次苐畢新蓋其材則因山之良食則取歲之羡不足則繼以衣盂之私雖未嘗持簿赱民間里中好事者捐錢為助亦弗拒也竊不自揆將馳書謁辭以紀歲月而辱惠顧焉敢遂以為請嗟夫今之為佛學者方務飾空言以相髙凡塔廟之奉類指為非道之所存而不以屑其意上人乃䏻逹理事之不二汲汲焉扶植振起之豈非難哉豫觀兹山土堅石秀水無暴湍杉櫧松楠竹箭之産荗美而恱澤清㳤所鍾固宜代不乏人髙山仰止涉公之行業珏公之名德未墜也綢繆牖户上人之功盍可以弗嗣乎書而歸之俾刻諸石庶來者有槩于心而益致其力焉爾其徒相是役及施者之名氏具列于石背云滿心寺法堂記浮屠氏之居在吾烏傷者四十有八唯滿心為寺據湖山最勝處南距縣𪠘百八十步而近歲時祝釐與凡禬禳之事咸集焉縣大夫率僚屬備服就位稱萬夀巳必聲鐘伐鼓合諸名山大比丘之上首而推其警敏辨慧無礙者俾舉揚乎師說以啓天人龍鬼之聽學徒得持所聞用相叩擊環而觀者動百千人非有崇階廣霤穹座邃筵則說者不嚴聽者不肅不嚴不肅則不足以契感通之妙而昭報上之誠其演說之所豈餘列剎比哉主是山者以甲乙相授受至普澤師而仆者必興缺者必完獨法堂未有所改作以梁間題識驗之歲行十周天矣懼愈久且壞乃與其徒藴謐撤而新之地之亢爽不殊于昔而棟宇之偉麗宏敞視舊有加堂之後又增創重閣妥故所奉普賢大士以至順三年春某月庀事夏某月訖功市材甓僦匠傭總費錢若干緡出于師與謐者什九而惟祥智慧洎里中十數大家之為助當其什一程督勸相則印傳悉力焉蓋寺産素薄師雅不欲飛竒鈎貨以病民而一以身任之謐亦能不為黍案計惜竭已槖倡衆以成師之志往來之人第見夫丹甍翠桷隱顯于水光山色煙雲暗靄間而莫知其為役之殷也按圗經唐武德四年嘗即縣置綢州七年復廢州以為縣寺實州署故址建立之歲月靡得而詳其先號宣化咸通九年更號聖化宋開寶五年始易今額而猶以綢名其山者襲州之舊也溍既為記堂之成而寺之本末前無所登載并記之溍它日歸休故廬望鵷鷺行邈在天上幸獲從里父老拜舞退而升斯堂庶幾覩優曇鉢華之一現而於其為法㦯與有聞焉兹不敢緣作記勦記而儳言之也鳯皇山禪宗大報國寺記昔在丗祖皇帝執金輪以御宇內聲教所暨與如來化境相為逺邇普天率土悉主悉臣惟宋人藉中華之運保有荆楊益三州之地久而未服至元十一年肆命宰臣㑹師南伐不三載而勝國之社遂墟二十一年有旨即其故所居杭州鳯皇山之行宫建大寺五分宗以闡化其傳菩提逹摩之學者賜號禪宗大報國寺乘法力以暢皇威宣天休以隆國勢也比丘妙齊承詔開山朝廷既授以田若干畒而蠲其稅賦齊復置宜興莊田若干畒而資用日益豐夫何嗣其後者因循架漏歷歲滋久寢就衰削延祐六年又以不戒于火而寺盡廢側金所布鞠為荆榛其眀年江浙行中書省左丞相脫歡答刺罕領行宣政院事擇可任興復之寄者得大欣以為住持欣既涖法席則告于衆曰世祖皇帝肇建兹寺以鎮南服非它列剎比宏模偉略當垂之億萬斯年有墜必舉吾屬之責敢憚其勞勩乎于是耆舊僧法遍竭智殫慮以贊其經畫聚貨食召匠傭斥基址蕳材甓將諏日以庀事首令善于宫宅地形之術者測景辨方審其面勢寺故東向易稍近南作佛殿法堂丈室山門而庫藏囷倉庖湢以次就緒後負立壁前瞰奔濤茂松美竹蔽虧左右位置適宜而山川為之改觀飛翠濕紅侵霄映地棟宇之雄麗亦昔所無刻雕藻繪像設有嚴華幡鼓鐘列置如式莊田奪于豪民則白之有司而侵疆畢歸泰定二年欣遷中天竺而法眀來補其處眀宗門宿衲土木之事悉諉于遍繼主是山者皆不久㦯委順而終㦯髙蹈而去程督勸相遍獨以身親之雲堂蒙堂衆寮兩廡既成而牀策卧具井匽舂磑之屬一無所缺至正四年今住持正逵實來其明年造鐘經兩樓而叢林之規制大備自始役至訖功凡十六寒暑其為費大率取諸經用之羡財而合衆緣以相其力之所不給欣𬒳遇文宗皇帝命為大龍翔集慶寺開山卑三品文階以冠師號今上皇帝加授釋教宗主兼領五山便蕃寵錫中使狎至欣亦欲彰君之賜間以所得金幣來致助焉鐘樓則遍罄其巳槖以為之也逵以狀來諗于溍曰寺之廢而復興非一日之積逵忝備灑掃而獲視其成晨香夕燈以昭薦國釐而答揚帝力固無敢弗䖍惟是原本始以詔方來為經久之計者不可無述豫嘗有職業于太史氏其言倘可傳信幸為文以記之溍竊觀自古帝王有天下運祚之綿長必取以仁義守以仁義我世祖皇帝承靈山之付囑以不殺而定天下于一攝一切世界歸一世界取之既有其道所以守之者不特厖恩􅐮澤周浹乎黎庶又以神道設教使含生之類莫不泳遊于覺海之中而安養休息于天日覆照之下法幢所建百靈受職時康物阜枹鼓不驚遐陬裔壤鑿飲耕食為太平之民巳七十年此蓋聖神在御參用真乘密禆至化之眀效大驗二帝三王有所弗及也煌煌寶構奠兹奧區法筵重啓龍象咸萃王臣外護稽首順風尚有以扶植教基俾與國家同其悠久也哉溍下凡愚陋管窺蠡測罔既名言叙次本末苐以謹其歲月云爾狀稱始創寺時斸地得斷石乃安國羅漢院記相傳此即其故址異時以院為行宫而今復為寺殆非偶然按宋史及臨安志行宫本杭之州治其徙安國羅漢之額於相國西井在建行宫後五十有五年與狀所載不能盡合姑附見之以廣異聞焉上天笁寺觀音殿記杭之上天竺山廣大靈感觀音教寺新作大殿成住山慧日屬溍記之按郡志石晋時僧翊結菴兹山有瑞光發于前澗就視得竒木募善工刻為觀音大士像㑹僧勳自洛陽持佛舍利來納置頂中妙相以具吳越錢氏易菴為院宋天聖𥘉乃徙今所即瑞元所發處也嘉祐治平間賜號靈感遂以為院額淳熙初易院為寺淳祐末又加以廣大之號云皇元尊像法而尚教乘天竺實居江南列剎之首仍紀至元之三年春三月寺毀于菑惟聖像巋然獨存珍異服器亦無損豪末人以為是有神物隂護之必重興之兆亡何而主僧仲頥告寂集慶子思以五年夏五月來涖寺事謂欲復吾故宇莫先于治殿以揭䖍妥靈耆舊僧之意適同各探巳槖出錢有差知事僧亦力相之俄有大商至自江右獻巨柟六十有三尋收亡僧所遺錢以緡計者五千銀以兩計者七百八十田以畒計者四百既而逹官大姓相繼輸錢為施不啻十萬緡于是隨木之冝以庀其材斂田之入以給其食量緡錢之多寡以總其費殿之始建以其年冬有十有二月凡其制為間二十有四悉准其舊其崇八尋倍其崇而益尋有二尺以為修半其修而去尋有二尺以為廣功未竟者三之一而子思以至正二年春二月遷四眀之延慶本無由延慶東堂出領兹山悉力殫慮圗終其役三年春三月殿乃落成冬十月本無逝四年春閠二月慧日自下天竺山升𥙷其處命莭縮浮費併裒衆施之羡餘完以杇墁墍茨益募施者得錢二千五百緡飾以髹彤布以文甓而前堂後室煥乎一新先是平章政事執禮和台光祿公覩其帳座故敞卑子思錢五千緡使改為之鸞翔鳯翥金碧焜煌諏辰協吉安奉如式逮慧日之來而器物之須法所宜有者纎悉畢備緇白之侶有所瞻依薦紳之流咸共欣慶焉蓋天竺據羣山之奧乳竇峰跱其前白雲獅子雙檜諸峯拱揖其左右其外則襟江而帶湖風氣之㑹清淑所鍾神棲聖止光靈彰灼有以大庇乎斯人而杭在異時為行都旄頭屬車之幸臨宸章奎畫之褒飾寶冠龍符玉缶觚彛之賜豫燁其餘輝下賁林壑矧今昭代帝德所覆承護有嚴名香花幡中使狎至王公貴人至于閭里好事之家稽首慕趨恆恐弗及冝不難于以壞為成然猶六更歲籥三換主席乃克就緒溍是用備記其廢興之顛末來者尚鍳于斯而扶植之俾勿墜哉若夫大士以種種之形示現諸國土以巍巍之力饒益諸衆生非世諦文字可得而記者不敢􅐌一辭也天竺靈山教寺大殿記如來昔于舍衛國談般若波羅密大弟子集以為經祗陀給孤獨非當機同聞衆而其名號首見于序豈不以别而為六則始于檀那終于般若通而為一皆波羅密歟教外之傳𥘉至中土斥造寺功德為人天小善有漏之因者蓋以其執著于有為計所施而求獲從貪起妄滋長無眀故用是導之出于迷途云爾積土聚沙皆已成佛詎可忽哉苟能信財施法施非有差别于二施中知施實相起慈悲心發願回向具足方便成就無上菩提佛果是則名為事究竟到彼岸度無極以佛之福慧而自莊嚴奚止局于人天小善有漏之因而已杭州天竺靈山教寺自東晉時梵僧理公始置翻經院隋觀法師改建天竺寺唐末盜起寺焚時則有若吳越武肅王為造五百羅漢院宋初更號靈山慈雲法師領徒唱教其間時則有若兾國王文穆公臨鎮是州為奏復天竺舊額而發帑藏以搆大殿兵部侍郎胡公繼典州事為輟俸資以營三門兩廡此皆王公大臣獨任其役如樹之出于祗陀園之出于給孤獨故特著於銘刻列于圗志它輸財薦貨以支傾植仆者不可得而殫紀也寺燬於重紀至元之三年惟普賢殿僅存雖嘗繕葺之而未及大起其廢至正二年夏六月日公來住是山亟謀興作顧未知費所出上海蔡君思恭以儉嗇致𥙿夙慕宗乘所以為嚴奉之具傾其資無少靳僧德春其里人也君間語之曰向聞天竺菑變吾有志為創大殿今主法席者為誰能成吾志否吾欲迎致其來尚肯耶否耶春為言日公行願之精堅而力贊其事且以白于日公日公欣然欵君之門君一見若有宿契既與為賔主之禮遂卑以錢十五萬緡具舟衛送其回日公即命徴工僦傭大治土木而躬涖視焉始役于其年冬十有二月事未半而蔡君以三年夏四月屬疾不起君妻李氏卒緒成之秋七月乃告訖功李氏復捐錢雕佛菩薩護法天神凡七軀環以十六大阿羅漢其後為觀音大士湧現雲海間依正俱圎主伴參㑹人天胥仰靈山儼然觀者咸以為三百年來兹山非無大興作未有如蔡君䏻繼昔之王公大臣獨任其役者日公既祠君于殿之西偏尋升居上天竺嗣住是山者安公恐來者不知所自爰伐石介上人慧炬求豫記之豫竊惟蔡君之為力固不易抑亦日公之行願默有所感召也財法二者交相為施檀那般若皆波羅蜜世俗文筆曷能頌美其萬一乎姑叙次梗概如此嶽林寺經藏記如來滅後傳于今者像教而巳開元所録五千四十八卷與後人之增譯即其所謂教也自菩提逹磨承摩訶迦葉教外之别傳而不立文字學者幾于廢經不談而禪林所在無安置經藏尊奉惟謹竊意世尊從始成佛乃至涅槃于其中間不說一字藏固無所收雲臺寶網盡演妙音毛孔光眀皆能說法藏亦不可攝凡其所教所傳有以開示悟入乎佛之知見者蓋非外非內非别非同也嶽林寺古之禪苑水南湘師今之禪伯師主寺事十有六年以其化導之餘力從事乎興作而於經藏尤汲汲焉致其意以至治元年冬摹全經至順元年冬構廣殿元統元年冬度美材徴良匠建大寶輪一柱八面實經其中其上山立其作雷動天宫水府神帝龍君涌現圍繞如佛所住前呵後負可怖可愕琢雕藻繢殆無遺功金碧髹彤絢爛溢目觀者為之嘆仰而不巳㑹豫謁𥙷怛洛迦山還過嶽林師謂豫曰吾書中言觀音彌勒各有五百化身彌勒在震旦浙河之東于雙林則為傳大士于嶽林則為布袋和尚其應迹尤暴著大士以創物之智肇制經藏撮十方于一塵卷大海于一滴使夫人一舉手而種種佛法皆悉現前兹大聖人以方便利益群品而吾徒之所取法也子大士里人藏成而子適來宜為之記豫既覩兹殊勝且有以識夫為禪學者不即文字亦不離文字實非于教外别有可傳庸弗辭而記之寺之本末有事實刻石堂上兹不著崇夀院西方三聖銅像記杭之北山盡處是為寶石山清㳤之氣畢萃焉標以佛塔而環以僧坊號崇夀院飛榱涌簷縹眇烟際岌若中天化人之居西湖之曲苐一勝境也宋元祐間性法師來自㑹稽始建殿于塔之後而塑西方三聖像於其中宣和間大律師净公之弟子蹈法師因以為修念佛三昧之所而闡揚律師之教律師道髙行滿人尊之而不敢名指其族姓號喻彌陀緣託境而成境資人而重緇白四衆靡不有所瞻依矧今昌辰興隆像教崇飾嚴護罔或弗䖍而成住壞空事至叵測延祐三年冬十月癸未塔毀于災殿堂像設莫能獨完上人慧炬得度于兹院而所從請業之師曰真如觀主正夀間嘗過其遺墟周視太息謂吾徒生於像法未墜之時亦云幸矣像之弗存法將安寄苟欲得大堅固久住而不壞曷若範美銅以肖金色之身乎上人聞之慨然負荷其事顧力有不給遂倣佛所發願之數化同行之人四十有八令一人復化四十有八人如是展轉乃至百千萬人約以日稱佛名一千而持一錢為施㦯施以多錢弗拒也積三歲得錢四百八十萬為銅三萬二千四百八十斤好事之家輸財萬計助庀工接踵而至肇自重紀至元之五年擇間曠之地于葛嶺以治爐鞴越眀年夏五月丙辰佛像成其髙丈有六尺遵教典也二大士之像則以次成于至正二年冬十二月乙卯三年春三月戊寅迎致有儀妥安有式益募施者大市材甓構殿以覆焉時逾兩紀舊觀乃還若正若依如佛所住尋又造尺有六寸之像四十有八軀俾有緣念佛者探而得之用表分身之化往上人既以佛之弘誓自製發願文納置腹相之中且屬豫推述其概刻諸貞石以告來者原夫婆娑化主稱讃樂邦務引衆生出離五濁教以觀彼佛六十萬億那由它恆河沙由旬之法身而先之以華上寶像者開示方便使觀粗見妙也繼之以一丈六像者隨順下凡使觀小見大也蓋粗妙異想悉由性而起修小大殊形咸自本而垂迹能觀之性𥘉無差别所觀之本寧可度量是故圎頓之談一音普被開示其次苐而非漸隨順其根器而非偏並啓觀門全彰實相像教之源不在兹乎上人念廢興之無常而以有為之力圗其永久廣為未來作大饒益此不思議事也覩相生善者誠能因似以證真即劣以顯勝悟惟心之所造非昔毀而今成同夀量于虛空等金剛之不壞則上人本願可酬功不唐捐矣上人㑹稽王氏子蚤服勤于衡台之學雖莫知其何修何證而一時豪家貴族下逮閭巷小子識與不識皆呼之曰炬菩薩若將以配嚮之喻彌陀者其人固不待讃也兹豫得以略焉延慶寺觀堂後記四眀延慶寺故保恩院也宋至道丙申拓以為大叢林大中祥符已酉乃易今號顧其規制未備有講舍而無觀室定慧尊者然公始闢其隙地創彌陀懴院庀工以元祐乙巳訖事以元符已卯忠肅陳公記焉建炎庚戌金人擁大兵至城下城陷寺焚而院屋巋然烈㷔中金人異之因挾然公以北嘉定庚辰寺以菑毀院竟莫能獨存寶慶丁亥乃復于舊涖教事者古雲粹公實主其役入國朝以來荐厄于至元巳丑重構于元貞乙未而守者不戒于火又以泰定甲子秋九月廢為瓦礫之區乙丑春二月石泉洽公嗣領教事令僧慶夀合緇素之士分募民錢謀以建西方殿未及視其成而去至順壬申夏四月殿成秋九月今住持我菴無公實來郡人鄒某首捐私槖俾僧普光出其意匠凝土鑠金肖三聖睟容于殿上普光亦悉已力倡衆功即殿後作海水巖壁像觀自在大士佛菩薩僧天神龍鬼湧現其間無公尋以元統癸酉冬十月建大悲殿而禪觀之室護法之祠以次落成其徒伐石請為之記以示永久無公以為定慧之弘願忠肅之微言不可使沒而弗傳命重勒舊記且屬溍書其廢興之歲月于下方他施者之氏名則見諸别刻云北禪寺觀堂記天台智者之傳在吳郡惟北禪寺為特盛故有觀堂歲久不治來者無所依止皇慶初住山天泉澤公以為失今弗圗恐墮先業而墜教基既命其徒德普相與支傾植仆且將議興作顧力有弗給郡人陸君雅尚浮圗法普未得度時嘗父事之亟以為言陸君夫婦欣然為捐錢若干緡葺其杗桷之蠧敝者繕其瓴甓之摧圮者飾其金碧丹白之䵝昧者華香物器列置如式延净行僧十有六人各據一室依教以觀而舉其業精行成者一人為之領袖仍贍以田若干畒俾與寺異籍而從住山擇人司其出納於是昔所有者復完其未有者今亦畢備澤公將刻石以示方來俄遷主杭之下天竺久乃復歸住是山求豫追書之按圗經及舊記寺本晉戴顒故宅唐名乾元宋名大慈元祐間法智三葉孫大比丘梵公尸教席以行願力故感普賢大士于虛空中授戒羯磨出大音聲如撞巨鐘而飛雪散華天神按行鬼王頂禮諸靈異之迹尤衆郡守推為管內法主緇素之士莫不稽首嚮風奔走附集其座下宣和末始即寺西偏别為禪觀之所曰無量夀院從解起行者得以同居焉建炎初燬于兵大弟子深公嗣為法主首發弘願以起其廢重階祕殿修廡密室規制視昔有加而糜粥鹽醯𬞞茹湯茗之須猶有資于施者恆患其絶而弗續未暇日尋土木之事也垂二百年始得陸君夫婦而營締日侈儲蓄日豐其建立成就之不易如此蓋有志于道者固無事於安居而飽食然必有以厚其養使之體舒氣夷而無撓乎意慮乃能致夫靜且眀之效如來以種種言說教人趍極樂正路修證之要為觀十有六而山家總眀四教用觀前方便莫先于具五緣故此道場既有菩薩僧示現作為建立于其前又有善知識隨順開導成就於其後方便之力固不容擬議也有能于檀波羅密而生净信若陸君夫婦者可無所表見乎陸君名應祥兼通道家者流虛無之說嗣天師嘗卑以髙士號其婦周氏與之俱乘化而逝于德原女慧真悉能繼其志為山門外護云松山普眀寺記餘姚江支流由州署之西磬折北出二十里所水踰堰而入復支為兩又北行五里所有山隆然突起兩水間按郡志是曰松山或曰是蓋名從山從山者言衆峯離立水外東西拱揖其勢如相從也山之南麓普眀寺在焉僧法炬為豫言山之未有寺也里人陳氏居之有以身為僧而以家為寺者是為文通法師山之初祖也寺建于唐天祐號報恩逮宋祥符乃錫今額而俾以甲乙次相授黃牒故在可考歲寖逺而繕治弗繼華榱文甓或委為土梗吾徒懼焉相與殫晝夜之勤日綴而月緝迄今餘二十稔未始資毫末之助于人而仆者起缺者完像座華幡鼓鍾食飲之物纎悉必具凡為三門而斫石為楹以棲扁榜于其外者炬之父舜若深及安也為室以禮六時者安及炬若觀也為輪藏實經其中而屋其上者炬父子也惟吾浮圗氏廟塔在人間廢興相尋如漚起電滅兹山之香灺燈炷閲幾成壞而不與劫俱化蓋吾祖之蒙被其胄㣧者深且厚也然其言行於僧經佛史一無所登載所度五弟子亦莫之有聞焉獨近代夢菴華禪師為山隂陸公遊方外交又卒隱不耀願有述俾後之人知吾徒所慿藉為久逺者皆前人之遺休而吾祖尚託以弗泯也頃豫始至其處見其池深而木寒甍桷户牖隱顯煙際意以為此仙聖之宅必有化佛靈僧寓跡其間而炬言如此飛鴻印雪瓜趾宛然固無俟豫擬諸形容也姑叙興復之槩使刻焉菁山普眀寺記普眀禪寺在湖之烏程由郡城之南溯大溪舟行四十五里捨舟登陸又二里許是為菁山去人境殊不逺而泉清木深峯巒峭拔巖壑鬱紆最為勝處久蔽翳于荒榛灌莾間未有居焉者宋紹興五年閩僧觀公禪師始來駐錫而結菴為宴坐經行之所名之曰普眀後十年山神一夕見夢告以有趙姓人當至宜出迓之翌日師出山僅數百步見服儒衣冠者兩人憩古松下延之入坐甫定兩人相顧曰地之美者無以易此熟視師而莫敢言師叩其氏名其一果趙姓乃孝宗之兄崇憲靖王將營宅兆以葬其父秀安僖王與之俱者則隂陽家師欣然撤其墻屋以地卑之寺之右安僖園廟其故址也師尋改卜而築菴于今所買民山若干畝置長興秀德莊田八百畝以贍其徒淳熙五年孝宗在位十有五年矣用憲靖奏為降敕額曰普眀禪院師春秋八十有六而終憲靖執弟子禮親為文以祭之殁因葬于院之西麓了菴審公與師為法門兄弟既以次𥙷其處益買山拓地建殿堂門廡增置山旁下吳壩之田六百畝松江田二百畝儲蓄愈充規制悉備寧宗嘉定四年賜號净照禪師仍書了菴二大字俾為山林之榮觀焉了菴三傳為柏庭果續置長興秀福莊田五百畒由柏庭五傳為斷江義首𬒳我成宗皇帝大護持之命且易其故為院者曰普眀禪寺蓋自觀公至斷江皆以甲乙相授受翰林學士承旨趙文敏公實憲靖四世孫始請于仁宗皇帝命友雲龍為住持龍退席玉林妙瓊以了菴四世嫡孫嗣主是山乃還甲乙之舊天曆二年也于是寺之凋弊已久莊田多以質錢于冨人棟楹傾仄階序拆圮佛僧之奉缺如也玉林念前人創置之不易扶衰舉墜靡愛其力發巳槖復所質田視歲豐凶量入為出經用之餘盡以資土木之費修佛殿法堂建丈室正受堂左右兩廡作佛菩薩像範銅為鐘其外則繚以穹垣一萬餘尺䕃以巨木五十萬本三田莊久廢則重立焉既又捐私錢以創藏殿且將度美材以造佛閣殫慮畢力十有七年于兹以寺之㳂革廢興未之有述爰伐石來徴文以記之嗟夫憲靖覬得地而觀公一無所靳院之有額卒賴其力文敏慮甲乙之傳得人為難而以廢為興碩有待於了菴四世之嫡孫此皆事之不可逆知者也然竊觀今之叢林宿衲多以激揚斯道自任而於事為之末或不以屑其意觀公審公俱圜悟粹禪師之嫡嗣玉林則圜悟勤禪師之七葉孫其劬躬盡瘁示現有為成始成終為功多矣非性智融眀逹理事之不二何以及此乎是用為之備記其顛末庶來者知自朂而相與扶植之俾久而弗墜也玉林之行業有可稱道而不係于寺之廢興者皆不書普眀寺藏殿記玉林妙瓊師既屬豫記其所住菁山普眀禪寺復以書來曰瓊備貟兹山所以興壞起廢者固不敢不力然多因其舊而作新之惟藏殿故所無有瓊竭其衣盂之資創為之者也幸詳記之而别刻焉蓋開山觀禪師故閩人卓菴于此菴既有額為院師欲備列剎之制乃還閩中造藏經以來此有經之始也師報緣既謝乘化而逝繼之者了菴審禪師始命僧閲其經且置長興田若干畒儲其歲入以待熏蠟湯茗之須後以田歸于了菴塔院而其事遂廢今已六十餘年逮玉林自南屏歸正法席院巳改稱為寺既繕治使一新謂舊規之久廢者不可不復乃建藏殿于寺之西廡此有殿之始也起至正元年冬十有二月訖二年春三月為工以日計者二千用錢以緡計者二萬而殿以成列楹五十崇髙修廣率與之稱中奉佛菩薩護法天神之像而左右設四大厨代轉輪棲匭函庋置經卷以便於開闔仍買寺西雞籠塢之山五百畝以卑之百須之費咸取材而給焉以田不可必其常稔而山非有旱乾水溢之虞也凡其為費皆玉林獨任之昔逹摩指楞伽可以印心六祖聽談金剛般若而知一切萬法不離自性豈不以摩訶迦葉之所傳與阿難陀之所結集同出于一佛並行而不相留礙歟四十二章肇見于漢六百五十七部大備於唐通謂之三藏者其多至五千四十有八卷猶日增月益而未巳博覽在乎專精妙悟存乎冥契特患夫利鈍殊器勝劣異機愚者不及而憚其大繁賢者過之而視為可略不然則外緣弗具㦯撓之也今之髙人上士俱㑹一處幸無過不及之失名師宿德為之負荷又有以資之使息諸緣務而遊心聖教必有發信生解渙然氷釋于一句一偈之間者矣觀公審公及今玉林俱以不立文字為學而汲汲焉致力于經藏之事如此豫所謂並行而不相留礙也來者詎可忽諸它見於前所記者兹不重出也龍山淨眀寺記杭州龍山净眀寺建于晋天福七年吳越文穆王給號廣濟以處佛氏之為律學者大中祥符元年乃賜今額南渡草創有司以其地在國之陽因取僧所食田若干畝為祀天圎丘而寓齊宫于其室久之僧相率自言起處非便請撤寺屋即其西南改築而居焉宋氏失國郊祀事廢至元二十年所司以聞于朝願斥祠壇仍為田以卑之事竟沮不行延祐二年住山律師國瑞以訴于行省始悉得其故地方謀所以增􅋻益狹而或者不戒于火師慨然以興作為己任旬積月絫閲十寒暑而寺以復完凡殿堂門廡庫庾庖湢總為屋若干區費錢若干緡一出于經用之羡財與其私槖豪末之助不以資于人泰定四年某月某甲子落成之日也師之同業興教律師道眀以書來曰净眀廢興之顛末粗見于郡乘而瑞之經營寺事未之有述也幸為文以記之夫談觀遊之美者必稱杭之南北山靈僧化佛之所依止金鈴寶樹震耀崖谷王公貴人好事之家無不目寓而心趍焉唯净眀居南山之南由湖漘舍舟陸行踰慈雲嶺乃抵其處大江橫陳潮生汐落髙桅徑櫓之後先魚龍之出沒風沙雲日晦明之變化旁睨海門諸山隱顯天際怪竒閎廓可喜之觀治兩山間所無有然以其去人逺莫適以為意蓋自像教布傳中土未有盛于今帝力所𬒳侵者歸仆者立而净眀當此時衰削毀敗久且弗克自振獨賴師之為事也勤為志也專以及有是可無述乎寺故有江月菴笻舄亭而所謂梅巖易安齊者又為齊宫時所創也纍朝御題石刻猶在云衢州大中祥符寺記佛滅度後像教東傳至我朝而益盛自王公戚里百執事之臣下逮黎庶靡不稽首嚮風奔走附集以致其力靈宫祕宇巍煌中天宏耀崇嚴古所未有四方禪林法窟緇錫所聚往往蒙其餘休仆者以起缺者以完而衢之祥符當此時荒榛廢礫充滿其中敗屋數楹僅庇風雨香灺燈炷不絶如線莫有能振之者豈非時既至而猶有待其人歟按圗志寺本名鄭覺後更號隆興宋真宗時例易今額舊傳吳征虜將軍鄭公評年九十有三捨所居宅為寺而唐中書侍郎平章事陸公贄給以田四千石銘刻墜軼而鄭公守龜山事載太平寰宇記可信不誣其建立巳不啻千載中間歷幾廢興皆無所于考由至元丙子兵燹之餘龍象散亡人天摧慕者又五十年於此矣泰定乙丑義山逺來主兹寺慨焉以興復為已任因前人所作三門大殿加蓋瓦級甎而髹彤藻績之造佛菩薩執金剛神像總十有一軀創東西廡畫善財所參五十三善知識兩壁間寶塔珍臺煥焉畢新室堂庖庾繕治以次為巨鐘範銅至若干斤以七載之勤成就若是而不敢遽以為足謀所以崇役之未巳也其徒咸共慶幸謂人與時㑹以濟登兹當有紀述用昭帝力之所被永永無極伻來屬溍書之蓋依于幻有者不能以無弊有待以拯其弊者恆患乎天時人事之不齊宜其廢興相尋如空華之起滅壞之易而成之難也若夫毗盧樓閣非成非壞與此道場非同非别然則向未始作寺久已成成而無作無能壞者是而壞相非目所覩曷可言傳哉姑因其所欲道者直叙之如此是役也施者凡若干人惟郡人陳某所輸錢尤厚且捐田若干畒以贍其衆云逹觀院興造記武康縣東北沙溪上獨蒼山之陽有佛廬曰逹觀院其僧之上首曰古山宗青山祐故同氣也青山以大慧五世孫出鎮叢林唯古山身任院事其為人魁重多才幹緇白共推服之大德庚子用甲乙之傳主是山所以經紀之者靡愛其力裒衣盂之羡以皇慶壬子創西方殿程庫庾之入以延祐乙卯改建藏殿礱斫丹􅉳弗侈弗陋華屋寶函嚴奉以式益買田二百畝而施以田一百畝山五百畝青山時涖妙峰亦助以田及山合一百畝贍其衆者既日充裕人咸樂于勸功方謀磬巳槖斥大其三門而報緣已謝以至治壬戌委順而化繼之者東山軍僅獲視兩廡之成俄又告寂今主僧唯能實古山之弟子與其徒心鏡正傳師授等夙夜以先志之弗嗣為懼凡其留貸一不敢有悉用市木石以泰定丙寅撤三門而新之仍度其故材更立外門崇髙修廣無少愆于疇昔指畫之素過者莫不徘徊歎息以為古山雖沒不已矣青山之徒師瑞以豫與山門辱有事契狀其顛末俾記焉按圗志院始造于梁之大同一剎那須巳八百年陵遷谷變而兹幻境獨不隨劫增減逮今盛時弗替愈隆是固非有顯官豪民為之外護如它名山比保守於既盈振飭于未墜冝代不乏人而舊記所叙斷自宋新公而下五季之上皆無所考且謂諸僧清苦自持寡求不爭以故香火弗至曠絶豫觀古山兄弟之或出㦯處不即世間亦不離世間其示現有為以作佛事誠未易以淺窺也豈直如向之所云而巳哉豫姑因其迹之可見者序次之如此百丈山大智夀聖寺天下師表閣記菩提逹摩大師後八葉有大比丘居洪之百丈山人稱之曰百丈禪師今天子始命因其舊諡大智覺照者加以弘宗妙行之號寺以夀聖名則故額也山去郡治三百里其未置寺時林壑深阻岩徑峭絶樵蘇之迹所不通有司馬頭陀者善為宫宅地形之術覩其山勢斗拔與夫岡巒首尾之起伏知為吉壤所留鈐記有曰法王居之天下師表禪師之來式符其言東陽德輝以禪師十八代孫嗣住是山既新作演法之堂且增創重屋其上以妥禪師遺像榜于楹間曰天下師表之閣云初文宗皇帝入踐天位即金陵潜邸造寺曰龍翔集慶詔開山大欣領其徒而以禪師所制清規為日用動作威儀之莭顧其書行世巳久後人率以臆見互有損益自為矛盾靡所折衷輝與欣學同師而柄法于祖庭大懼夫來者傳疑莫知適從無以一諸方之觀聽爰走亰師欲有請而釐正之今御史大夫撒迪時執法中臺為言于上得召見有旨令輝撰次舊聞以授欣使擇習于師說者共考之而頒行為叢林法仍加錫禪師以今號褒顯而風厲焉輝奉璽書將南還以閣之成未及有所紀述諗于溍曰願叙其構興之端原歸而刻諸溍竊觀遂古聖賢乘時繼作弛張迭用循環不窮所以通其變也佛之為教必先戒律諸部之義小大畢陳種種開遮唯以一事去聖逾逺局為顓門名數滋多道日斯隱是故建摩不階方便直示心原律相宛然無能留礙世降俗末誕勝真離馳騁外緣成邪慢想是故百丈弘敷軌範輔律而行調護攝持在事皆理蓋佛之道以逹摩而眀佛之事以百丈而備通變之妙存乎其人厥後逹摩之傳派别為五而出於禪師者二它師所倡殊宗異教雖各名其家至于安處徒衆未有不取法于禪師者然則天下師表之言良可徴不誣也粵自中土君臣知尊佛法光昭崇極莫越于今輝遭值聖時蒙被帝力用克發揚先訓紹隆宗風俾與國家相為悠久永永無已不持今之天下以為師表盡未來際咸有依承溍是用謹志之而於其經度之勤營締之美有不暇論也閣為屋以間計者五其崇百有二十尺三其崇之一以為其修三其修以為其廣以至順二年夏六月庀工冬十月訖事實輝住山之眀年而輝入對以元統三年夏五月命下則其明年春三月也蔣山寶公塔院記道林真覺慈應慧感普濟大聖師寶公感緣應迹肇見於宋齊之際靈異不可殫紀至梁武帝信嚮尤篤親執弟子禮以事之大師嘗指蔣山定林寺前岡獨龍阜謂帝曰苟以為隂宅後當永久帝問誰合得大師曰先去者得天監中大師示寂于興皇寺帝以錢二十萬購其地奉真身窆焉皇女永定公主既捐湯沭之資造塔其上帝因為建僧坊其下今太平興國禪寺是也寺𥘉為精舍名開善塔曰妙覺大師應世之塔唐乾符中改精舍為寶公院南唐復開善故名而以院為道場宋太平興國中乃卑今額錫大師以道林真覺之號而詔避其諱祗稱寶公慶曆初郡守葉清臣始合定林諸寺為一以廣其居而奏請十方禪剎紹興中又纍加大師號以慈應慧感塔曰感順之塔云塔去寺二百步其環以列屋别為塔院不知昉于何時逮入國朝廢而復興已六十年矣泰定二年寺厄于災㑹文宗居潜邸數臨幸而有禱于大師禎祥之兆屢形吉夢錫以緡錢圗起其廢暨歸御宸極內出金幣雲委山積飭工庀材窮壯極麗且進封大師曰普濟聖師徴主僧守忠對揚便殿授三品文階以冠師號增創新寺賜額崇禧惟塔院尚存其舊規制􅋻陋未及改作而守忠遷主徑山今住持法匡來𥙷其處莭縮浮蠧庫庾日充乃盡撤塔院而一新之塔之趾徑六筵以漸而鋭其上六面五級周以步簷最下一級飛榱外出至二十有二尺當其前為正殿以間計者三其髙六尋修如其髙而益尋有二尺以為其廣又前為獻殿井亭後為觀音殿以間計者五而其崇减于正殿五之一正殿之旁翼以應夢之樓彌勒之閣闢兩扉而作堂直其衝左曰木末右曰真樂環其外為僧廬庖湢之屬以地勢中髙外下易於傾阤則帖石以廣其址四隅各設巨甕貯水百斛以備不虞門術故多怪松久而摧缺益植稚松以萬數凡木石瓦甓匠傭之費為鈔一十四萬九千九百緡為米四千三百九十斛經始於至正四年之冬落成于六年之夏華鐙輝映金鐸鏘鳴曲檻方櫺下臨無地耆舊僧竒偉等謂此殊勝昔所未覩冝有登載以示方來爰狀其實謁辝為記按建康志蔣山距城十五里舊名鍾山建康今為集慶路山之得名志所叙詳焉考其地脉則由東南泝長江而西數百里乃止其止也蜿蟺磅礴既翕復張中脊而下降為平衍郡治在焉西為覆舟雞籠諸山又西為石頭城而兹山對峙其東諸葛亮所謂龍蟠虎踞帝王之宅主於土中而言也蓋自其所負山脊側而睨之兹山持其左腋及至其處則沓嶂橫陳廽鑾內向正中一小峯隆然孤起即所謂獨龍阜後人以峯頂圎粹如珠名之曰寶珠峯緣坡陀下抵山足仰而視之苐見夫坐據要會而獨擅其尊不知為山之腋也今又决渠立閘遏西谷之水折而東流以合隂陽家之法人力之所及抑有以助成其形勝者焉竊意宇宙間清㳤之氣倐聚忽散𥘉無定在雖古帝王莫得而專是以支為名山莫兹吉壤神棲聖止託焉以安其光靈震耀閲千載猶一日殆非偶然也矧今昌辰遭逢之盛所以致其崇極者蔑以加矣然非荷負得人安能祗承德意昭宣遺休如此乎是用弗辭而為記其歲月若夫大師為如來使密贊化機乘方便而示現有生假神通而攝誘群品不思議事固非凡情所能度量且有前賢之碑銘記傳在兹不贅述焉金華黃先生文集卷第十一
