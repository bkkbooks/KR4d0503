  text: 金華黄先生文集卷苐二十續藁十七䇿題
  hash: sha256:bf67a6f0266e5e927a6ad9d4cb5d819d4270f16360701752f1c0fb346d635fe3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0503_SBCK_020-1a}
body:
  text: 會試漢人南人䇿問問孔子告門人以旣庻加冨旣冨加教牧民而三事具則王道成矣其設施之略可得而知歟稽之周官則􅀁以庻之者有九兩保息本俗􅀁以冨之者有九職土㑹上冝土均􅂽政職事􅀁以教之者有八統十二教三物八刑五禮六樂其經制之詳可得而聞歟孟子之語時君無非周公之法孔子之意也推而行之果可通扵今歟漢唐盛時亦云庻且冨矣君子或以為其教無聞焉㦯以為未知􅀁以教也伊欲盡三事之責若何而可以去漢唐之陋若何而可以比成周之隆抑有其道歟其酌古今之冝而折􅂨之以對上都郷試􅀩古色日人䇿問問天下事可言者多矣未易以􅃍數也姑舉其一二言之可乎人才有短長而惟限扵資格民力有髙下而同困扵征徭儒術非不尊而未能崇雅黜浮吏治非不嚴而未能發姦擿伏因循積乆莫知􅀁以爲變通之方識時務之俊傑詎可黙黙而巳乎願攄􅀁藴以俟爲政者擇而行焉母徒爲甚髙論也江西郷試南人䇿問問三代法制見扵經者惟周官一書大綱小紀詳略相因其言人事悉矣然稽之尚書王制孟子之書有不能盡同者何歟或以爲周公􅆀太平之迹或以爲六國隂謀之書果何􅀁折􅂨歟周衰諸侯惡其害已而皆去其籍是書何以獨存歟漢除挟書之律是書最後出而冬官亡矣時以考工記足之或者排其非是考工有記果出於誰歟或又謂三百六十之屬已散見於五官冬官果未甞亡歟國家以經術取士而是書不列於科目豈以劉歆蘇綽王安石軰用之而不驗歟抑他有可議者歟厥今朝廷内建六曹盖古六官之遺意也豈其成法固在所取歟抑猶有可舉而行者歟諸君子為有用之學宜熟講之矣願聞其􅀃江浙郷試􅀩古色目人䇿問問先儒以經義治道分齋教諸生而水利居其一然則水利亦儒者之􅀁當知也古􅀁謂水利曰河渠曰溝洫溝洫施於田間故其效易見河渠限於地􅀔故其功難成方今言東南之水利莫大於呉松江視古之河渠與溝洫其為力孰難而孰易其為利孰少而孰多諸君子習為先儒之學必夙講而深知之矣􅄑試陳之以禆有司之餘議江浙郷試南人䇿問問事有不本於古而可施於今者君子􅀁不廢也然亦安可徒守故常而不究其始終乎漢之取民者有更繇有筭賦而除天下田租之令時出焉唐之兩稅與之孰䡖孰重而迄今以為定制乎漢之任人者有察㢘有課最而舉可為將相之詔間見焉唐之循資與之孰得孰失而迄今以為定格乎其果皆無弊乎推本而言則取民莫善於井田任人莫重於封建自秦開阡陌置郡縣千載之下迄今遵為成憲者大抵皆秦之舊也何以能使其法施於人乆而不變乎漢之限民名田唐之襲封刺史非盡泥於古也亦莫有堅持其􅀃而卒行之者豈時殊事異通於古者或戾於今而上下之􅀁便安者無古今之間乎民苦於兼并而無以樂其生吏病於􅁆易而不得善其治又非可謂便安之也其弛張損益猶有當議者乎它如交鈔引鹽近倣於宋以立法者又未可􅃍數也請姑以其大者考歴代之㳂革原其始要其終而折􅂨之庸俟上之人采擇焉毋苟謂此儒者之常言而雷同勦􅀃以對國學􅀩古色目人䇿問問禹湯文武其道一也而有忠質文之異尚子丑寅之異建何歟至吾夫子又有行夏􅀙周之􅀃其去取之旨可得而聞歟記禮者有曰虞夏之質殷周之文至矣由是言之有虞氏亦有􅀁尚歟殷之前夏已尚質周之前殷巳尚文歟三代而下以迄于今􅀁用固夏時也今之為文果皆周之文否歟時務莫有大於此者不可以不講也幸究其􅀃問學者將以行之也􅀁學何道歟􅀁行何事歟弦歌之化本於四科之文學後世專門名家猶有以儒術飾吏者以經義决事者矣夫何古道湮墜士習日媮羣居則玩思空言而指簿書錢􅂖為細務􅀙政則苟逭吏議而視仁義禮樂為虚文不㡬於􅀁學非􅀁行而􅀁行非􅀁學歟二三子􅀩􅀍樂育以㓜學為壯行之地可無􅀁熟講而素定歟孔門逺矣西漢之士有不可企而及者歟願試陳之無以讓為也問進賢退不肖古之道也國家設官分職以理庻務而俾持風紀者司其黜陟夫何州縣間絓扵吏議者徃徃而是登于薦牘者曽不多見歟有虞氏􅀁舉十有六人􅀁去四人而已由是推之三載之􅀁黜陟㮣可知矣豈今不古若賢者寡而不肖者衆歟孔子曰十室之邑必有忠信安可厚誣天下無君子歟願試陳之以祛􅀁惑問古之為國者必務訓農其民冨而俗醇良有以也方今朝廷重臣旣專領司農之官郡縣長吏又兼任勸農之職而田里之間地有遺力人多游心談者率以為田不井則背本而趨末者衆是固然矣夫井地之法旣未易卒復若何而能使守本業者有以盡其力逐末作者有以易其心􅄑試陳之問國家之患盗自古而然矣方今朝廷清眀天下無事而民間推埋搏掩之習猶有存者以為飬之未至窮而無頼歟教之未盡愚而無識歟則農桒學校之政甞舉矣以為郡縣之治有未善苦吏急而􅆀然歟則守令之選又未甞不精也願推言夫不能使民不為盗者其失安在弭之之方冝何如母諉曰此有司者之事非諸生之􅀁知也問古之為治者必正習俗􅀁尚不同故其為俗亦異禹湯文武之道一也而忠質文各有􅀁尚何歟􅀃者以為五帝以前風俗大同故無􅀁尚而記禮者曰虞夏之質殷周之文至矣然則有虞氏亦有􅀁尚歟殷之前夏巳尚質周之前殷已尚文歟孔子有郁郁乎文哉吾􅀙周之􅀃而董生謂漢冝損周之文用夏之忠何歟由漢而来千有餘􅀊中間土字分裂而政殊俗厖固未可㮣論方今天下大同徳教流洽而習俗未能丕變以為文耶則士多因陋而就寡以為質耶則民多澆淳而散朴以爲忠耶則為吏者又徃徃舞智而御人􅀁尚果安在歟欲救其弊冝何先歟諸君子它日獲備官使出而任承流宣化之責扵當代􅀁冝損益者可無夙講歟試言其畧問飬士將以􅃱用也養之於未用之前者有教法焉用之於旣養之後者有選法焉爲法雖不同而首尾相資有不可偏任者夫何今也拘扵法守莫能相通漢之徒三千不盡登於銓曺唐之吏八百不皆出於學舘􅀁養非􅀁用而􅀁用非􅀁養選法在今爲甚宻教法視古則已䟽法制之䟽宻既殊事任之重䡖不得不異此􅀔之􅀁必至歟是果出於立法之􅀄意否歟品調消息之使無彼此䡖重之偏亦有其道歟此區區之􅀁欲聞也問昔者孔門弟子之問荅言必以實聴其言而其志之􅀁趨學之􅀁造可知也去聖日逺後生小子􅀋以空言相髙端木氏之􅀁不得聞者若巳有聞漆雕氏之􅀁未能信者若巳可信雷同勦􅀃併爲一談雖有知言之君子亦莫能察其􅀁志之逺近􅀁學之淺深也惟自知之眀者其爲言也實二三子冝審扵自知矣幸因荅問少攄其素藴以見夫􅀁志􅀁學之實何如也問爲􅀦者皆欲吏之㢘不知􅀁以􅃱其㢘皆患吏之貪而不知􅀁以去其貪談者謂禄秩厚則㢘者有􅀁勸禁令嚴則貪者有􅀁懲是固然矣今之禄秩非不厚而㢘吏不爲之多禁令非不嚴而貪吏不爲之少其理安在乎問民貧則􅀦無獨冨民冨則國無獨貧此理􅀔之必然而無可疑者今天下之民以爲貧耶木土􅀍文錦犬馬餘􅁏粟者亦或有之以爲冨耶䄈􅄄不完含菽飲水而不免於飢寒者盖已多矣􅀦家之調度將一切取贍於冨家固不能無朘削之患欲使均無貧而皆有以待公上之湏又慮夫兼并之弊終未易除然則爲􅀦計者如之何其可也問聖賢之論治未甞不取法於古顔淵問爲􅀖而孔子告以四代之禮樂􅅬文公問爲國而孟子告以三代之井田學校何􅀁取之不同歟由設施次苐言之必養之以井田教之以學校而後禮樂可興也其法果可偏廢歟孔孟􅀁言布在方􅁽顔淵無其位而不得行􅅬文公有其志而不能行後世雖或行之而未盡也今亦有當講者歟尚畢其􅀃問盖聞君子學道則愛人小人學道則易使今之君子知學道者誠有之矣小人而能學道者􅀄不多見也伊欲以斯道覺斯民使化行俗羙而比屋可封則為君子者不得不任其責請試言之以􅀚二三子之自任者何如也問昔安先生之教學者有經義齋有治事齋治事者人治一事又兼一事故其出而仕多適於世用若老扵吏事者由講習有素也夫窮經而不能􅆀用則經為空言矣作事而不師于古訓則其為事亦苟焉而已矣是果可岐而二之歟然以其成效觀之則又如彼何歟諸君子朝斯夕斯􅀁談者無非經義也􅀁治事果何事歟幸試以素􅀁講習者言之毋譲問為法必有先後之序知􅀁先後則舉而措之斯易耳盖昔之言治者曰明黜陟也抑僥倖也精貢舉也擇官長也均公田也厚農桒也修武備也减徭役也覃恩信也重命令也此十事者孰於今為急而在􅀁當先孰於今為緩而在􅀁當後二三子習為眀體逹用之學必甞究心乎此矣請條陳之問錢出於古而交會創於近代然􅀁謂交㑹者必以錢為之本盖合劵􅀁以取錢非以彼易此使之捨實錢而守虚劵也方今鈔法獨行而錢遂積於無用之地立法之􅀄固有因有革及其旣乆亦冝有變通之道焉請試言之以待執事者之財擇問除盗捄荒非無良法然莫若思患而豫防之乃今聖仁在上威行恵孚蟻聚之衆固巳肅清菜色之民殆􅀅甦息及是時也儆戒無虞蓄積備具有不可不素講者二三子儻有志焉於􅀙政乎何有請試陳之以俟有司者之詢訪也問君子小人如隂陽之相反用君子則治用小人則亂不待智者而後知也然稽之前古雖治世未甞無小人果可盡去乎夫􅀁以䖏之者必有其道矣聖人推隂陽之消長以為䖏小人之法或尚剛决或貴扵不惡而嚴何其不同乎方今眀良相逢君子道長時之􅀁以為㤗也欲保其㤗有急於䖏小人者乎聖人􅀁謂剛决與不惡而嚴者今冝何先請擇於斯二者以對國學漢人䇿問問傳有之曰教之以徳齊之以禮則民有格心教之以政齊之以刑則民有遯心此豈非聖人􅀁以論治者乎漢崔寔始為嚴之則理寛之則亂之􅀃而史臣以為眀於政體寔之論猶空言耳諸􅁑亮治蜀刑法峻急而史臣以為識治之良才則又見扵行事者也然則聖人之論治者非耶諸君子眀古而識今冝熟講扵此矣它日出而􅀙政則何以㢤其悉陳之毋譲問昔者舜以契為司徒而敷五教于百姓命之以一言而已至命䕫典樂以教胄子則為言不一而足焉成周之教萬民者大司徒而已其教國子也有師氏焉有保氏焉又有大司樂及樂師焉為教雖不必盡同略於郷而詳於國則一也豈不以􅀁䡖者可略􅀁重者冝詳歟洪惟我朝事必師古乃者綸音洊降嘉惠乎成均之士甚厚皆帝王之遺意也􅀁重固有在而待之不加詳焉何以稱塞上旨歟盖古之設教者有聲音律吕干戈羽籥弧失之􅀋為事至詳也果可用於今而不以為戾歟二三子朝斯夕斯􅀁談無非天人性命之理凡昔人爲教之具皆未甞身服其事寧不曰彼􅀁習者器之末此􅀁講者道之本歟先儒之論學盖曰不可厭末而求本幸推原其本末而於其法之􅀁冝詳者條陳之將以復于上而相與講習焉母苟曰異世殊時不相㳂襲也問古之造士必以四術而莫尚於樂有虞胄子之教典樂專焉成周國子之教司樂緫焉考其名官而􅀁重可知也豈不以樂者學之􅀁以成終歟漢唐去古日逺詩書禮之文雖僅存而樂之缺有間矣然猶有以樂立扵學官者有請以樂教諸生者其爲樂果皆出於古歟我朝㳂襲近制雅樂之設于成均者惟釋奠乃有合而未始用以爲教也其爲樂果不通扵今歟孔子適齊以童子視端行直而知韶樂之作樂之善人心其效如此而可希闊弗講歟伊欲如帝王盛時俾為士者無不成於樂亦有其道歟二三子㳺于庠序之間蹈徳詠仁不為不乆願具陳古樂之本末與其可施扵今者有司得以詳擇焉問若昔三代之士論于郷者必升于學然後官爵加焉其取之也詳故其為材也備漢之四科不皆養扵學校唐之六舘不皆擇於郷閭至宋之方州舎法遂判焉兩途而亦足以得人何歟洪惟國朝自至元間建首善之地于亰師以風四方逮延祐􅀄乃以科目取士著于令如種之獲適惟其時三􅀊登賢能之書于天府僅百人以博士弟子而預其列恒不若偕計吏者之衆豈取之有未盡歟抑教之有未至歟或者閥閱貴㳺耻與寒畯争長歟伊欲考古之制自郷而學自學而官爵之其可行扵今否歟後世之法亦有可􅂙用者歟幸試陳之毋隠問國朝之制䇿士必以經史時務時務誠未易知經出于聖人亦不容擬議也姑以史事言之左氏之􅀁傳太史公之􅀁紀立法何不同歟班固荀恱范曄􅀽宏陳夀之流互有祖述孰為得失歟歐陽子唐書法太史公者也司馬公通鑑法左氏者也而皆不能免先儒之譏是盖有其􅀃矣然綱目之作㦯因其舊或革而正之其是非去取可得而聞歟方今六舘之士奮自儒科而居編摩論撰之列者踵武相接也二三子扵昔人之是非得失安可無夙講而為之折􅂨歟願試陳之以􅀚􅀁學問古之為國者四曰井田曰封建曰學校曰􅁏刑其存於今者學校而已夫阡陌之巳開者不可復矣何以使民無甚貧而遂其生乎郡縣之已置者不可變矣何以使吏無數易而成其治乎箠令已定則法之輕者不可加重矣何以使人無易犯而不䧟扵罪戾乎若夫學校雖以著令僅存而知仁聖義忠和之教不及扵萬民直温寛栗剛蕳之教不行扵胄子何以使之成其材就其實乎先王之遺制廢而莫之舉者旣如彼存扵今者又如此其弛張損益亦有可議者乎二三子㳺扵庠序之間而務為有用之學得無夙講扵此乎其酌古今之冝以對問人材者國之􅀁與立也培植本根以成其名莭者上之待士冝過乎厚奮揚精采以持其清議者士之自待不冝過乎薄四代逺矣東漢太學之士三萬餘人嘘枯吹生公卿徃徃折節下之辟召常出其口唐之六舘宋之三舎猶有能眀目張膽叩閽言事者史諜􅀁載可信不誣也方今聖仁在上菁莪樂育古􅀁未有芻蕘之言一善弗遺夫何以賢士之􅀜萃四方之英㳺而扵民生之休戚政治之得失一切存而不論徒規規焉綴緝陳言以求合有司月書季攷之繩尺視昔人若不能無歉上之人待之者亦旣厚矣其自待者毋乃太薄歟豈世降俗敝士氣萎薾不可復振歟抑為表率者未有以鼔舞而作興之歟􅀚立朝必扵平日它時倘有言責亦將守其嘿以為醇謹歟願聞􅀁以變今日之積習追昔人之風烈者其道何若亦以􅀚􅀁志焉問三代之興皆改正朔夏建寅啇建丑周建子此三代之正朔也而甘誓有三正之言則三代之前三正旣迭用矣黄帝顓頊之暦堯之授人時舜之恊時月正日果何􅀁建歟前乎夏啇旣建寅矣以湯武周公之聖何為不能踵而行之而行夏之時猶有待於孔子然後定歟建子者一陽之生天道之始也建寅者三陽之長人事之始也商之建丑獨何義歟秦之建亥亦商周有以啓之否歟先儒謂三代改正朔而不改月數以詩書言之月固不改矣攷之孟子則月盖未甞不改也何其不同歟由漢迄今率用夏時是無容議矣然語古而無徴習今而不察亦君子􅀁耻也試索言之問一代之興必有一代之俗風聲旣立氣習繫焉東漢尚清議而名節日以崇西晉好清談而禮法日以替得非好尚之殊遂以成俗歟然夷攷其人無􅀁囬撓戮力王室者清議激之也而亦有遜辭恭色取媚於時者焉清議果安在歟任放為逹廢弛軄業者清談啓之也而亦有檢攝衆事未甞少閑者焉清談何甞為之累歟豈士君子之制行有不随風聲氣習轉移者歟稽前言徃行之得失以自鑒而防其好尚之偏不亦學者之切務歟幸試陳之以觀􅀁趨嚮者安在問選舉之法其来尚矣􅀃者率以為古之取士以實不以文後世反是故其人才不古若也稽之經史則有虞氏之敷納以言近於文成周之賔興以六徳六行近於實謂有虞氏之法不及成周可乎若漢之以孝㢘察於有司者即古􅀁謂徳行唐之以直言極諫對於天子之廷者即古􅀁謂言也然以唐人詞章之習較之西漢之儒術東漢之名節固自不侔夫豈文勝其實誠如談者􅀁云雖有虞氏之遺法亦不能無弊乎此皆有司􅀁甚惑也幸相與推言其故問漢儒言災異者焦延夀亰房以易夏侯勝劉向歆父子以洪範五行故延壽作易林而向作洪範五行傳論至班固始述歆言以為河圗雒書相為經緯八卦九章相為表裏盖二者莫可偏廢也􅂚為而固書獨五行有志乎近世學士大夫皆以易言吉凶而不復以洪範言休咎豈非欲矯其偏乎漢儒之牽合拘泥誠若未足盡信固􅀁序次禍福徴應之實果可盡廢乎然考之周官則太卜􅀁掌三易之外無􅀁謂洪範五行者豈古之隂陽占驗一以易為㫁而洪範不預乎箕子之言安􅀁用漢儒之言何􅀁本乎易洪範並列于六藝五行災異之學豈但小道之可􅀚而巳今亦有能通其􅀃者乎請聞其略問為學必求師而取友師之尊未若友之親也樊遲問仁與知夫子旣吿之矣退復質諸子夏始喻夫子吿之之意當時學者旣問於師又辨諸友其務實如此非後進􅀁冝取法歟二三子群居終日求於師者為甚詳而取扵友者則已略是固知師之可尊矣亦知友之當親歟在易麗澤兊君子以朋友講習釋之者曰兊為􅀃朋友講習􅀃之大者也知講習之為􅀃則知友之當親矣其相滋相益豈淺淺歟願以古者湏友而成之義相與懋明之毋苟曰歸而求之有餘師也問成周郷飲酒之禮歴漢唐猶存漢唐行於郡邑而西晉行於辟雍今頋以非著令􅀁及莫之敢舉惟偏州下邑守令之有志於古者乃或講行之固未必能盡合於舊典也盖古之郷飲酒或以蜡􅀕或以習射或飲􅀦中之賢者唐惟三􅀊賔興略用其儀今又廢矣升歌笙入間歌各三終皆以小雅合樂三終則周南召南漢惟鹿鳴騶虞僅􅀓其聲今亦亡矣然則古禮之存者㡬希伊欲蒐輯遺文以諗于朝而肄習于庠序之間諸君子倘有意焉􅄑相與商訂之問漢耿壽昌奏設常平倉蕭望之非之而宣帝不聽常平法既行民果以為便後世因之莫敢廢也夫以望之論議有餘材任􅈗相豈迂闊扵事情而不知變通者歟若壽昌者徒以能商功利得幸於上何以使法施於人如是之乆歟近代常平義倉領以專使逮至我朝乃有義倉而無常平頃甞有以復常平為請者事下有司將行而輙止或者夀昌之遺法至是不能無弊而望之之言為不謬歟徴古驗今以究其得失而折􅂨之有司之􅀁願聞也問班固志地理條其風俗最為詳悉按禹貢周官職方氏辨九州山川土地􅀁宜皆未始及乎風俗而十三國風之變獨見於詩􅀃者謂盛治之世天下大同故無風俗之可言國異政家殊俗而風聲氣習随之故不得不論其風俗作史者兼而取之􅀁以俻著古今之本末云爾然以其時考之禹有反道敗徳之苗民周有怙侈㓕義之殷士則扵其同之中有未盡同也曹之失奢魏之失􅄶鄭衛之失􅁋而唐有堯之遺風則於其變之中有未盡變也文翁倡其教相如為之師而蜀之文章冠天下韓延壽先之以敬譲黄覇􅁇之而頴川之教化大行則風有時而移俗有時而易似未可專以地分為㫁也夫語時務者莫大於移風易俗而扵經史之指若有􅀁未喻幸有以祛􅀁惑焉問尚論昔之言治者必推賈􅁩董仲舒而劉向稱仲舒雖伊吕無以加􅁩雖伊管未能逺過則是􅁩仲舒皆伊吕之流也然而一則曰伊吕一則曰伊管豈仲舒􅀁言純乎王道􅁩􅀁言雜出扵覇道歟向子歆不以向之稱仲舒者為然而扵􅁩無􅀁貶􅁩果非仲舒􅀁及歟至歆叙七略􅁩仲舒又何以與伊尹太公管子並列扵諸子歟若夫治安之策天人之對乃班固􅀁謂切於當世之事而二三子􅀁夙講以待問者也請摭其言之無怍於古人可施於今日者條陳之問曺参避正堂舎蓋公而齊國安集周亞父得􅇵孟若一敵國而知呉楚無能為班固於本傳備著之者以其有􅀜於治亂成敗云爾至為司馬遷傳賛乃譏其先黄老而後六經退䖏士而進姦雄其旨安在乎固又謂道家者流清虚以自持卑弱以自守合扵堯之克譲易之謙謙布衣㳺侠之倫温良泛愛振窮周急謙退不伐亦皆有絶異之姿其稱之如此豈猶有取於遷之遺意乎方今治教休眀風俗醇羙為士者旣不屑道虚無之言為民者又莫敢以豪傑自任諸君子亦甞􅁥古今習尚之變而考前史論議之同異得失乎願聞其􅀃問職田之制其来尚矣而今也謂之養㢘職田職田而以養㢘為名則是吏之㢘否時視夫􅀁養何如耳然以田之在官者有限有田則給焉無田則弗給也不㡬扵􅂖禄不平乎若夫人品之不齊又未易以槩論㢘者固不待養而有養者未必皆能㢘也豈非無恒産而有恒心者惟士為能乎伊欲使上之􅀁養也均下之自養也厚其道何由可得而聞乎問古者士有常業官有常守故其為事專而成效易見也夫何後世之用人惟以􅀊月序遷而不復審其􅀎否至於官數易其守而士數易其業以儒名家者不得專意於稽古禮文以吏為師者不得專力扵簿書期會自非以數術方技執藝事為世守鮮有乆扵其職業者授以不素習之事而欲委任責成焉亦難矣豈當世之士皆有非常之材而措諸事業者無施不可歟抑為士者徒知計官資之崇卑而未能如數術方技執藝事者之安其􅀁守歟不然則古者任人之道不可行於後世歟必有其􅀃問昔之大儒盖有以習文法吏事見稱扵史氏者然則文法吏事亦君子之􅀁冝知也安可忽乎孔子曰古之知法者能省刑本也今之知法者不失有罪末矣惟夫使之無訟而後可以省刑是誠難能也苟非有以得其情鮮或不失有罪者豈易然乎律學之廢巳乆理官􅀁掌固非諸生􅀁得與聞乃若先王立法之意考諸載籍猶可見也二三子姑以􅀁知者究其本末而極言之可乎問談者謂秦尚申韓故其治刻薄而少恩晉尚莊列故其俗浮華而無實其􅀃是也我國家尊尚儒術褒孔子之道以昭示乎四方搢紳先生言必以孔子之詩書執禮而非敢爲申韓法家之言也教必以孔子之文行忠信而非敢爲莊列道家之教也是冝刻薄之風浮華之習爲之丕變乃猶有一二之或存而未盡去者何百家邪􅀃入人之深而儒者之效頋若是緩與夫豈為士者溺扵口耳之末而昩扵當世之􅀁尚與不然則承流宣化者未能諭上旨歟願聞􅀁以轉移而興起之者其道何由也問自古有國者不能去刑必設官以主之虞之九官眀刑者有士焉而折民惟刑者秩宗之官也周之六官掌刑者有司㓂焉而以郷八刑紏萬民者司徒之官也旣有刑官而又以它官分任其職何歟豈其為事固有不同歟今之刑曺即古之士與司㓂也禮官無􅀁謂折民之刑而教官無􅀁謂紏民之刑職任可謂專而不分矣夫職任專則事易治何古之人慮不及此歟二三子姑為之解問古者家有塾黨有庠術有序􅀦有學盖無地而無學亦無時而不學也王制諸侯天子命之教然後為學然後為學則凡天子之命􅀁未及者不得有學矣將輟而弗教歟千乘之國為郷術與二十五家之閭者有㡬而建學立師悉聴命扵天子為法何若是之煩歟小學在公宫南之左大學在郊此諸侯之國學也豈當時國學湏天子之命乃立郷學之設不待禀命歟夫學校之政亦時務之大者也考經傳之遺文以祛􅀁惑敢俟来對問天下之事恒患夫過與不及不及則失於蕳過則失扵煩其不適扵中一也曺参日飲無􅀁請事而不嫌其蕳諸􅁑孔眀夙興夜􅄰罰二十以上皆親覧而不厭其煩俱號稱良相其為事有不同何以能同歸于治乎豈其才智之不齊舎􅀁短而用􅀁長乎抑以世殊事異其弛張緩急難以㮣論乎千載之下欲以古人自期者苟未至乎無過不及之地則守職而不病扵蕳為曹参可也奉法而不傷扵煩為諸􅁑亮可也不猶愈扵為胡廣之中庸乎先儒甞教人以志伊尹之志矣曺参諸􅁑亮之事寕足多譲乎願聞諸君子之自期者何如也問自古􅀦家莫不重馬政􅀁以蕃息之者必有其法焉儒者引經而言則以為衛之詩人羙其君有秉心塞淵来牝三千之語盖人之操心充實而深逺故其馬生息之蕃如此也夫苟於芻牧之事漫不加省而但扵吾之一心求馬之蕃息不太迂乎前史􅀁載漢諸苑三十六􅀁馬三十萬匹唐八坊四十八監馬七十萬六千匹而後魏之馬乃至二百餘萬匹以後魏與衛人􅀁畜較之㡬七百倍果皆本諸其心而􅃱之乎抑有它術乎天下之事固未有不本扵心者馬政特其一矣孟子曰徒善不足以為政釋之者謂有其心而無其政也馬政於今為尤重請即是而試論之則凡發扵心而措扵事業者可以􅀋推也堂試􅀩古色目人䇿問問一代之治必有一代之法儒者之論恒以為古之治純任道後之治純任法天下其果有道外之法歟洪惟天朝列聖相承國之􅀁慿藉扶持者規模至宏逺也徴古而驗今或者未能無疑焉考課之法非不眀而奏最者甚寡紏察之法非不嚴而貪沓者尚多减繁有法而獄訟不為之􅃍衰服色有法而僣侈不為之少戢豈奉行之有未至歟抑離道以為法而􅃱然歟其弛張損益或猶有可言者歟諸君子眀扵時務念此至熟也其参酌古今條陳以對母泛母畧堂試漢人南人策問問道學何始歟危微精一以為傳文行忠信以為教道學之名未立也漢董生唐韓子皆當世大儒其亦􅀁謂道學非歟粤自營道河南􅀜西倡其前􅂵陽廣漢東莱承其後逮至我朝文正許公出而以身任道學之􅀉學士大夫莫不知􅀁依歸乃者仁皇在御眀詔有司以經術造士且示學者以􅀁宗師道學之盛莫今若也夫何新學小子味其糟粕者不過為取科目之計老成􅀫學窺其閫奥者􅀋皆有輕科目之心古之道學亦若是歟伊欲循其名考其實使下焉者母徒譁世以取寵上焉者毋苟䡖世而肆志豈非今日作人之大務歟諸君晝談夕講扵道學之言為日乆矣願試陳之亦以􅀚􅀁學問自古以知人為難君子小人􅀁為如隂陽晝夜之相反本不難知也特患夫近似者未易辨耳以謹重為君子浮薄為小人耶則與家人語而不及朝省政事者似乎謹重矣而人不免譏其阿䛕人主嚮儒術而常毁之者似乎浮薄矣而人莫不憚其正直何也以恬退為君子以奔競為小人耶則晦迹於終南山者似乎恬退矣而狥權利為驕縦人指其隠居為仕䆠之捷徑伏謁扵光範門者近乎奔競矣而皇皇扵仁義人仰其道徳扵㤗山北斗何也苟不扵其近似者而辨之則人豈誠易知哉有天下國家者孰不欲進君子退小人而鮮能不失扵近似之間毫􅁵之差千里之謬辨之不可不早也願聞其方問三代而降典籍殘缺言禮學者離為專門夫禮莫重扵􅀕而諸儒或分五帝為六天或合二祧為七廟至扵郊丘異同祫禘大小六宗之義七祀之文明堂屋室之數論議角立莫能相通我􅀦家承平日乆稽古禮文之事固已大俻然於諸家之􅀃有不容兼取而並用者考其孰得孰失而折􅂨之以待問焉諸君子之事也幸相與試詊之母苟諉曰則有司存勸農文諸曁州􅂆農文古之有民社者未甞不以農事為先拊循􅂆率具有其法我朝参稽故典郡邑守令悉以􅂆農入衘事莫重焉比以受任之􅀄延登􅂄年詢以風土咸謂是州地産素薄兼之襟山帶湖旱澇相半仍􅀊凶歉民多阻飢夫不知盡其在人而一切聴其在天可不可也昔魏文侯使李悝作盡地力之教以方百里之地為田六百畒理田勤則􅀊增粟百八十萬石不勤則􅀊减粟百八十萬石勤與否之利害相逺如此然則欲盡地力者亦在乎盡人力而巳誠能率而子弟竭其四肢之力以􅀙事於南畒將見冨􅀊之入弗减益増蓄積旣多縦有旱澇可無乏食之慮矧今聖仁在上茂育羣品至和之應必有豐年乃若奬厲而成就之固長民者之責也兹以東作方興率遵故常躬秉耒耜為爾農􅂆其尚勉之母苟以為具文而藐藐其聴也上梁文行中書省上梁文我國家幅貟至廣屏翰有嚴輟宰執之近班緫兵民之大柄分符而專節制端笏以領縉紳左江右湖擅東南之都會上棟下宇聳廊廟之具瞻内拱帝宸外臨蕃服孰使百竂之長莫安一日之居旣合舊以圗新寕因陋而就蕳冝增崇於壯觀用昭示於等威官属駿奔工徒鱗集辨方拓土置水臬以取平度木蕳材運風斤而獻巧舉無愆素役靡告勞審面􅀔以得中覩儀刑而如故穹門洞唘燭幽􅀮於閭閻巨厦燕休折遐衝於樽爼是􅀁謂政事之本匪徒誇興作之功􅀛兆弗違虹梁將架庸伸善頌式相歡謡抛梁東海上雲開曉日紅大舶髙䑺来萬里島夷稽首慕皇風抛梁西三吴􅁰稌徧髙低灌輸亰邑倉箱溢猶有餘粮野外棲抛梁南閩嶠風行掃瘴嵐枹鼓不驚民按堵九天雨露聖㤙覃拋梁北舳艫衘尾官河直百賈流行道路通日中聚貨如山積抛梁上紛郁非煙遥在望台階清潤六星齊太平可見非無象抛梁下俯瞰江濤奔萬馬居人㳺衍競讙呼共樂昇平陶至化伏願上梁之後五兵偃息百􅂖豐穣民風擬於鄒魯相業侔於虞唐宣暢鴻靈益固藩籬之守翊扶寳祚􅁢資柱石之強等天長而地乆慶君眀而臣良金􅂠黄先生文集卷第二十
