body:
  text: 序臨川危素編次番昜劉耳校正教苑清規後序天台教苑清規舊甞刻寘上天竺山之白雲堂後燬弗存今圎覺住山慶公懼乆將廢墜乃取故􅀁蔵本重加詮次正其舛訛􅀘其闕軼而参考乎禪律之異同􅂢巳槖復刻焉昔者􅀼聞之儒以禮立仁義離禮扵仁義不可言儒佛以律持定慧離律扵定慧不可言佛故雖佛以一切種智攝三界必先用戒菩薩以六波羅宻化四生不能捨律盖自中土有佛法以来僧多居於律寺至百丈始别立禪居此清規之􅀁由作也且古今殊時人情亦異帝王制禮不能無􅀁損益佛氏之爲法其何獨不然律儀如聖人之有經禮雖非後世􅀁便習而未甞不傳扵今清規如先儒之有家禮雖皆一時􅀁訂定而未甞不本扵古百丈創為清規以輔律而行天台大師兼善毗尼其後人亦因叢林之日用而折中之以匡持其教今􅀁謂教苑清規也歴􅀊滋乆諸方􅀁守百丈遺法巳互有不同山家冝有不能與之盡合者若夫通其變而以時措之其􅃱一也慶公方究心净業而能垂意扵威儀節文之細如此内外交相飬之功可謂兩盡之矣非来者􅀁冝取法歟是用不揆其凡陋而為之序系諸篇末云爾珪上人詩集序予識珪師扵南湖時師方以苐一座尸教事學徒常數十百人予間􅀙旁聴其談性具之旨娓娓千萬言珠貫而縷觧固已心􅀼異之而未知其兼善乎丗諦文字也它日師示予以􅀁為詩如干篇且徴予序其首予為之玩諷累日其風容色澤恬緩而豐暢眀金綷羽出媚林谷非若夫空株敗枿歘生之芝瞥過人目而已盖師之先君子曰碧峯李君當宋之季甞鼔其辭鋒三簉于春官而伯氏文叟亦用文墨角逐踵武取郷薦膏􅃳􅀁􅀍華葉沃如也豈師之去父兄雖旣乆而習氣有未忘耶予聞衡台之書冨埒􅁽府業之者必章剖句析以極其趣又必括之於一心導之扵萬行以要其歸非有強力敏智沒世不能卒其學自夫殊宗異􅂀不得以兼通而奚暇揺豪擲簡放浪乎水情雲態間哉寓無碍辯扵世諦語言師之為能則多矣雖然夫工射者之控弦注羽未始不志乎巴蛇九日而穿楊貫蝨要亦同盡其彀是故解牛之為技飬生之為道一也師之為詩技歟道歟予不得而辨也而安能序作者之意乎姑寘予言篇端覧之者無規規焉扵詩乎求之可也㑹上人詩集序為浮屠學至言語道㫁而止扵詩何取乎然在其教中一切法皆佛法世諦文字固與實相不相違背也是以昔之髙人上士逰戯乎山光水影之間以陶冩其性靈者比比有之而於今為尤盛就予􅀁識而言若元菴㑹上人又其卓然者矣始予侍坐扵南陽仇先生而語為詩先生稱今之詩僧必曰元菴後十􅁆􅀊與上人相見鳯凰山下獲􅀚呉興趙公􅀁書上人詩如千首予甞評其人峭然獨立如霜松雪栢而其發於清辭秀句如青田露寒白鶴一鳴也今年秋客南屏乃得因蜀郡虞公􅀁序上人詩集如千卷而觀其平生􅀁存之槩益知上人之呻吟嘯呼以簸弄萬物扵烟雲寂寥之郷者直其寓耳上人契心印扵佛心慧禪師而薾然退䖏下列衣壊食色瓦鐵廽睨夫猊床白拂髙談人天之表有不以屑其意者其度越流軰獨詩云乎哉頋予適逰乎方之内於上人之道未能盡大􅀚而無憾也凡古今為詩之變虞公旣備論之是用推本其􅀁以為詩者在此而不在彼後之續髙僧集者或有考焉覺隠文集序覺隠道原師逰學扵永康胡先生而得法扵徑山佛鑑和尚凡􅀁撰著志在乎衛道而未甞徒作自其同袍至于章甫逢掖之士莫不有味其言髙君士眀始以其文與天隠至公之牧潜藁咲隠訢公之蒲室藁㑹稡成編號三隠集刻而傳之木巖植公以為序牧潜蒲室者皆當世文章鉅工而覺隠未之有序爰屬予題辭其篇端夫三隠之文鼎立天壌間非可優劣予何人敢以鄙陋之言自附扵大人君子之末乎然􅀼􅀚師之論文命意必欲其合乎道遣辭必欲其順乎理故其比事連􅀋託物引喻娓娓千百言咸有􅀘扵世教而扵儒釋氏同異之辨尤􅃱意焉盖世出丗間為法不同為教亦異而扵此乎扵彼乎受其教者均是人也萬人一心萬心一理則道豈有二㦲譬如人有􅀁適飛橈鼔楫無慕乎車之安駢衡方􅁤無羡乎舟之利􅀁趨之途不能不異􅀁造之地則同因其􅀁造之地同而疑其􅀁橾之器可以互用遂指虞姁工倕之􅀁作為車奚仲吉光之􅀁造為舟則過矣非逹人大􅀚孰能㑹其異而要其同乎天隠甞謂三學浮屠各􅀻其教為兒戯之争市井之閧咲隠亦謂禪者之􅀃與止􅀚同今之縦傲自得者澷不知為何事而曰吾祖云吾祖云是猶同中之異耳儒釋氏之徒各􅀻其教縦傲自得者抑又異中之異也師獨汲汲焉務挈而合之以求夫異中之同其為衛道之功不旣大乎師寘身寂寥枯槁之郷而其才思飈馳水涌外發難遏􅀁為歌詩率皆清麗峻㧞可喜覧者多愛其辭之工而未必識其意之􅀁寓今不暇論姑序其有関扵教道者俟世之善知識詳焉師名本誠道原字也族某氏嘉興人紀夢詩序自先王夢祲之法不傳後世史家􅀁記夢之竒驗可徴不誣者固多而人莫不有夢不必皆可驗於事也重紀至元之元年春予忝以非材􅇱貟􅀦子學官其年秋挍文上亰夜夢􅀚新進士上謝㤙表褎然出班前立者諸生遜都思其氏拜术其名眀善其字者也子旣竣事而歸則聞眀善已預在亰薦名旣以上于春官而科舉事􅃍廢予頗疑夢之不足徴眀善退自有司歸就弟子列尋以憂去服闋而来􅀻試數占首選時予猶居􅀦學其夢如􅀄􅀻試之法以入學之先後貢十人而止眀善適在十人之外方待年而未及釋􅄄予益疑夢之不足徴及予請外南還而中書用臺臣之請計奏被上旨復以科舉取天下士予亦復夢如􅀄至正改紀之年也是􅀊眀善果再薦扵亰師二年春以正奏名入對大廷遂爲進士苐一予夢扵是始驗其兆見扵科舉將廢之􅀄其應在扵科舉復興之後天者素定乆矣夫豈人力也㢤盖古者􅁲以三兆筮以三易必参之以三夢夏曰致殷曰觭周曰咸陟其術皆亡粗可考者獨周有占夢之官􅀁掌六夢一曰正二曰噩三曰思四曰窹五曰喜六曰懼而六夢之占有二其善而吉則以獻而歸羙于上其惡而凶則贈送而去之予向之􅀁夢以爲噩歟則眀善族系之貴學殖之冨溷以一第不足驚愕也以爲思歟則六舘之士數百人予􅀁思者不止明善也以為寤歟則眀善之氏名非予覺時􅀁甞道也以為喜與懼歟則予扵眀善未甞喜其得而懼其失也無􅀁感動而自夢殆正夢歟兆見扵科舉之將廢而夢固不惡應在扵科舉之復興則夢可謂吉矣時之文人才士內交扵眀善者聞予言徃徃為詩以紀之好事因㑹稡成卷求予志于卷首以實其􅀃予聞詩言牧人之夢其占以魚爲豐年旐旟為人衆釋之者謂此即􅀁獻之吉夢也矧今聖神在上文運方新其事有大扵牧人之􅀁夢者頋予䟽賤不得如古之牧人獻其吉夢而歸羙焉若夫諸公嗟嘆之不足而永歌之則小雅詩人之意也雖然廢興得失之故固出扵天者之素定苟未能脩其在人而徒欲取必扵在天可乎孟子曰命也有性焉此予與眀善之􅀁夙講不敢以瀆告之也贈余生詩序昔西山蔡氏善言地理先師朱子深有取焉而朱子之門不必人人皆西山也盖地理術者之事以儒者而兼通其􅀃特博聞多學之一端耳􅂚甞以是為學者􅀁急乎後生小子群居終日視記誦詞章為不足為而獨以不知地理為耻探竒勦􅀃慿虚造言人自為家務以取勝俗習􅀁尚相師成風抑又西山時􅀁未有也觀其論辯馳騁出人意表誠若可喜是以孝子慈孫甘受其欺而曽不悟反疑術者未覩此秘徃徃委已以聴焉甚者變置百年之丘壟使先世體􅅎不得寧扵地下有人心者􅀁不忍言予之病此乆矣故先人之葬凡擇地一付之術者士友或来咎予不學地理而䡖信人言且為圗􅀃以見告其圗則一岡一阜悉加以醜􅁾之名其􅀃則旁引曲譬抑楊開闔詭怪莫測毎更端必助以嗟㦲悲夫可爲太息流涕䓁語大抵皆􅂣屋中譁世之浮詞予固已厭其強聒逮今十有五年其􅀃訖無􅀁驗而術者之言可徴不誣予扵是益信地理果非學者􅀁急欲擇地但當擇術者而已蘭谿余生今之􅀁謂術者而樂交扵吾徒持􅀁得贈言若干篇求予爲之序予方懼書生以㳺談亂其術余生乃不自以其術爲可恃欲藉諸公之餘論以収名定價扵一時豈亦未能免俗乎余生誠能益進扵其術而無速扵自售俟有如西山者出徐起而就正焉彼沾沾動其喙者將自息矣余生之術不患其不行也鄙野之言不足序作者之意同志之士倘有槩扵心乎平宋録序平宋録者紀淮安忠武王平宋之功也王廟在杭城燬扵災監察御史言王宣勞戮力弼成正統功莫大焉宜令有司復其祠宇仰副􅀦家崇報之意御史䑓上于中書省以聞已􅀍旨可其奏而江浙行中書省亦以為言乃命中順大夫本投下諸色緫管府逹魯花赤普化乘傳而南與行省官同涖其役廟之告成也行省旣請胙王以大􅀦錫銘扵石章且俾儒司刻平宋録于杭學以侈其傳按録之舊文與􅃙賜王廟碑開􅀦元勲佐命大臣碑皇朝經世大典􅀁序五戰間有不能盡同二碑大典皆史家承􅇉撰著今悉取正焉它書有可證㩀則増入有當􅂙訂則附註餘無􅀁考者並存其舊以俟史官之裁擇王世胄之懿官伐之隆徳器之宏勲烈之茂則有制詞及碑文在謹以冠予篇端兹不敢贅述也李節婦詩序節婦馮氏名易安大名南樂人山東東西道提刑按察使開之孫湖州録事汝弼之子武寧縣尹李君如忠之􅁇室也李氏故爲金之䆠家今占籍東平汶上髙祖曰仲略山東路按察使曽祖曰景雲御史中丞祖曰先永昌令父曰定􅀦朝至元間􅀙下江南因􅀉居扵越君􅀄娶探馬赤氏有子曰某生十年而探馬赤氏卒録事君時仕越之筦庫以節婦歸焉僅再朞君􅃍以疾卒大徳某年四月某甲子也君垂歿時語節婦曰吾已矣爾其柰何節婦引刀㫁髮􅊎靡它方是時節婦年二十有七其子二人任甫一􅀊伏方娠後兩月始生汶上之族及􅊥馬赤氏之家聞君死多留貲合内外屬南来悉取其􅀁蓄聚而携其子任以去節婦一聴其􅀁爲弗與較四壁蕭然室惟兩柩而已閭巷之人莫不哀之節婦有姨母事山隂尉李君良佐頼其力奉柩葬城東北蕺山下録事君念無以資衣食將嫁之節婦􅀲其面流血以死自誓録事君知不可奪為飬女求贅婿以周給之盖其嫠居者十有九年二子旣克有成立乃以泰定元年春遷李君曁探馬赤氏之柩返葬汶上先塋之次中書平章政事王公實為之銘扵是南北聲問阻絶巳乆宗􅊚里黨意其必巳更適人或疑為死矣聞其来皆大驚太息至泣下節婦俾任留奉丘隴而與伏来越上以存江南之祀一時名人多為賦詩属予以序予惟方今徳教流洽俗化淳羙女婦能以義自守而見褒表者無地無之其遭值變故始也能居人之􅀁不堪終也􅀎伸已之􅀁欲為若馮氏者㡬何人㦲庸直書其事于卷首俾覧者知其賢與它見褒表者固不侔也賛羙之辭則篇什存焉義烏志序義烏自秦為縣歴漢唐訖五季見扵前史與它圗記者或緫序一州一郡或略舉一事一物其詳靡得而周知宋元豐舊志出扵縣令校書郎鄭安平而􅀁紀下及南渡以後非必其本書咸淳續志出扵溍之族曽祖􅈇貢進士應龢手藁具在而别本互有異同盖方纂輯而未經裁定亦非其成書矧自國朝統一函夏縣地入於職方巳七十有八年官府之建置人材之登用風俗之趍嚮戸口之名􅁆貢賦之品目悉無􅀁登載可不謂闕典歟為政者迫扵簿書期㑹米鹽碎務未遑有􅀁咨訪也今縣大夫操約馭詳而事無不理爰以暇目詢山川形􅀔地之􅀁生語言土俗博古乆逺之事得元豐咸淳二書屬溍重加詮次以傳溍衰朽荒踈無能為役乃俾王生禕朱生濂合二書而􅂙之郡乘刪其繁冗訂其舛誤法當􅀘書則引􅀋相從而増入之附以辯證􅁵為七卷仍以圗冠于卷首溍旣辱視其成因為之序㑹兩生並赴秋闈遂俾傅生藻相與校正歸于執事者而刻焉見大夫逹魯花赤儒林郎亦璘真畏兀而人尹承直郎周思泰許州㐮城人貢侍郎文集序延祐􅀄元故内翰貢文靖公較藝江浙郷闈溍以非才誤􅀩薦送忝綴末科公旣入居文學侍􅀙之列而溍隨牒逺方浮湛州縣晚乃登畿將以門生禮見則公􅂢舘舎已乆猶幸與公仲子侍郎公託契家之好而締文字交侍郎由供奉翰林外􅀘而復以元官召累陞次對溍適自退休備貟􅂆講同官為寮日相欵洽屬有史事罔敢不親其職業辰入酉出無須􅁷間扵侍郎之髙文大􅁽長篇短章雖時獲窺豹一斑甞鼎一臠終未能盡大觀而無憾也溍以老得謝歸卧林麓侍郎方峻躋䑓省出駕使車相望日益以逺諸生有辱侍郎謂之進而旅扵門下之士者彚次其文集爲若干卷持以示溍始遂其快覩而厭飫其雋永之味焉昔之論文者盖曰文之體有二有山林草野之文有朝廷䑓閣之文夫立言者或㩀理或指事或縁情無非發扵本實有是實斯有是文其􅀁䖏之地不同則其爲言不得不異烏有一定之體乎侍郎蚤􅀙文靖公至亰師而與英俊並㳺扵成均逮釋􅄄授官而踐􅆒中外在朝廷臺閣之日常多故其藴蓄之素施扵􅇉令則務深醇謹重以導宣徳意而孚衆聴施扵史傳則務詳贍精覈以推叙功伐而尊􅀦埶施扵論奏則務坦易質直以别白是非邪正利病得失而不過爲矯激他歌詩雜著賛頌碑銘記序之屬非有其實不苟飾空言以曲狥時人之求至扵䆠轍􅀁經名區勝地大山長谿穹林䆳壑風嵐泉石幽遐竒絶之槩有以動其逸興而形扵賦詠與畸人静者互爲倡荅率皆清虚蕳逺可喜亦非窮郷下土草野寒生危苦之詞可同日語也盖其爲文􅀄不膠扵一定之體安知其孰爲臺閣孰爲山林也耶東坡先生曰吾文如萬斛泉源不擇地皆可出在平地雖一日千里無難及與石山曲折随物賦形不可知也􅀁可知者常行扵􅀁當行常止扵不可不止如是而已欲知侍郎之文請以先生之言觀之至正十又五年秋八月甲子黄溍序族譜圗序古者圗譜有局掌於史官局廢而士大夫家自爲譜言氏族者㦯謂黄氏嬴姓陸終氏之後或謂黄氏出扵帝髙陽者自栢翳賜姓嬴而其後有江黄諸􅀦為楚􅀁滅子孫之仕楚者有黄歇出扵金天氏者自臺駘封汾川而其後有沈姒蓐黄諸􅀦為晋􅀁㓕子孫之仕晋者有黄淵皆以􅀦為氏或又謂嬴之得姓始扵栢翳祖臯陶而本金天可盡㩀乎漢尚書令香太尉瓊父子江夏人唐之江夏曁㑹稽零􅁜巴西東郡江􅁜洛陽晉安八郡各有黄氏而今也同望江夏何以别乎官失其守而譜學墜絶乃欲旁引曲證而推及扵千載之上固難矣惟婺之黄氏由金華徙越之剡洪之分寧豐城信之弋陽江􅁜之􅁥利為五大族而溍之九丗祖八世祖仍居婺之浦江舊譜以為自分寕来歸而郡志􅀁載黄氏墓在浦江者見扵開元十道圗則浦江之有黄氏已乆似未可以舊譜為信要之其言必有􅀁本無從考質也七世祖始徙義烏族日蕃衍系序之承傳支屬之分異斯可得而詳焉六世祖􅀮居弗仕用薦者當授官未命而没五世祖亦隠弗仕逮我髙祖乃以子貴累膺贈典其以進士登于科者我曽祖一人而已先祖先考在異時俱甞􅀘官而不及禄溍際今盛世叨􅇱官使而獲推恩扵二代頋以鄙劣無似弗克􅀒荷駸尋暮景懼一旦殞㓕以為大憾安可無使後人知夫源流之自而思亢其宗乎昔太史公庭堅自序本出扵金華而其譜止及扵分寧七世以上皆畧弗著盖慎之也庸敢􅀼取斯義㫁自九世祖而下丘隴之尚完􅀕享之不廢者為之圗若譜逺不可知疑不能眀者悉闕焉凡為圗譜之法親者冝詳䟽者冝畧為子孫者各詳其親則其􅀁略者自可互見今不以親䟽為間而有􅀁㦯遺者恐諸房子孫不必人人能有其圗譜而扵􅀁親各􅃱其詳也来者當思􅀘其􅀁未􅇱而無厭其傷扵繁㢤後序溍作族譜旣闕其􅀁疑與其􅀁不知舊譜􅀁無者亦不敢妄有増加然尚有當考訂者我七世祖妣宗氏觀文殿學士忠蕳公澤之女弟忠蕳之子直秘閣頴誌其墓孫男五人其二人曰公顯公煥今見扵譜者孫男七人惟上三人與誌合其下有無咎少亮潜之楊祖而無公顯公煥誌乃當時􅀁作必無謬誤非名之更易則譜之脫遺也浦江之花橋有黄將軍廟在我九世祖墓之旁将軍名仁環郷先生倪朴為立傳載其捍衛郷井之功甚悉子孫至今不絶同里細人之家皆黄姓而散䖏于邑中者多士族疑上世必同􅀁自出􅀊乆而失其世次譜􅀁以不及也義烏之蘆砦有紹熈四年進士名耕字子野仕至郡通守按登科記於我曽祖爲諸父行不知何以亦不入扵譜也抑甞觀太史公庭堅自序其先金華人七世以上失其譜而豐城譜乃扵其七世之上又遡求得其四世且謂其先由秀而婺由婺而洪越之新昌有庭堅同年進士某推序昭穆知爲兄弟而進士之從曽孫禮部尚書度乃謂黄氏居江浙者大抵出扵建之浦城其先由建而婺由婺而越二􅀃尤異併識于此以待咨訪焉􅀃唐生字􅀃東陽唐生名圭而其爲字者不與名配求予有以易之予旣字之曰公謹甫且告之曰玉之爲物也至貴爲器也不一而莫重扵圭是以古之用扵朝聘者執之如不克焉謹之至也夫蔽眀而有璪充耳而有瑱佩而有珩璜琚瑀起量也而有駔琮發兵也而有牙璋固皆服用之􅀁貴若其為􅀦之重器則有圭焉九寸而為桓七寸而為信為躬者天子之命諸侯之守也命尊而守嚴能勿謹乎傳曰玉不琢不成器生盖㡬扵成矣故予獨告之以其持之而無失墜焉者曰謹而已嗚呼其懋敬之李生字􅀃中山李生弘道之字曰仲能為之􅀃以繹其義者三人矣而未足以厭其欲復来徴予言夫冠而字古也冠禮廢不舉而字之配名者不廢今也在禮始冠三加皆有祝字之辭一而巳一字而三􅀃焉今之又今也雖然生之名若字得無取諸吾聖人􅀁謂人能弘道者㦲舜何人予何人禹稷顔囬同道人也道也果且有古今乎㢤道未始與世推移而人不必皆聖智皆賢有徳患夫有能有不能耳生其勉之姑以名字自守而行乎吾聖人之言無務以多聞為也鄭生字􅀃若昔􅀁記聖人心學之要不曰中乎尭之一言至約也舜益以三言則巳詳焉孔子賛易復因三百八十四爻以眀夫用其中者至矣盡矣蔑以加矣廣信鄭生元吉之字曰得中盖有取扵離之六二生之父若師剖析爻象為之訓辭諄諄數百言冨矣㦲而生不以為足將求予申言之嗚呼道可受而不可傳如以言則生􅀁聞扵父師皆鍼石也黙識而自得焉雖三聖人之言猶筌罤也無易由言無曰苟矣予􅀼用以自警髙山仰止景行行止生其勉之蒲察仲敏字􅀃仲敏名志學徴予序其為字者序曰昔者孔子與顔淵言仁顔淵曰囬雖不敏請事斯語矣與曽子言孝曽子曰参不敏何足以知之而孔子之自道則曰我非生而知之者好古敏以求之者也賢者不自以為敏故如恐弗及聖人固無事於敏猶勉焉孳孳由是觀之進學之功孰先扵敏乎六經之言學始扵􅀃命􅀃之言曰務時敏為學之貴乎敏自古而然矣雖然學以為政也孔子盖曰人道敏政地道敏樹則敏者又􅀁以從政歟仲敏之講學有年矣可以出而􅀙政矣予旣知其敏扵學抑有望其敏扵政序其字因以朂之啓謝郷試主司徐照磨啓三月十三日􅀩恩賜同進士出身者祗命以還撫躬無措載循忝胃亶有寅縁􅀼以詩詠思皇侈成周之多士史稱間出彰大漢之異材垂照来今蔚為盛際然必郷書上獻乃登天府之名計吏與偕方署太常之籍凡皆重乎其始進是故擇焉而愈精昔在熈朝率由兹道矧右文而興治若先烈以敷猷蒐曠典扵三紀之餘徕羣英扵千里之外戔戔束帛殆㡬跫然而有聞于干纓冠孰甘瞠若以自後􅁄連闈而並樹􅂁何白以太紛惟薦送之定貟實抑損扵舊制加以文非故習蕩無榘度之可稽業有專攻競出管闚之餘見飾辨麗者或乖雅馴之體獵幽眇者或昩精祲之原乃欲定去取扵一日之間而使論安危扵九重之上其􅀁繫者大矣豈不確乎難㦲自非精鍳裁以持衡􅄃英䧺而入彀妍􅃖並照細大不遺則何以闢賢路之􅀄程承天光之下燭肆時盛舉屬我宗工冝搜傑異之材佇副詳延之意如溍者器資窳陋術業踈蕪簉迹英􅄤猥玷譽髦之造睎光華旦謬充跅弛之求敢期小技之曲迂亦借大方之品目忘其瑕垢不俟三獻而􅃍􅀵出諸泥塗􅂺與十朋而前列辱采甄之及此頋庸謭其奚堪粤陪方物之陳荐入春官之考綸言俯被雍容衢室之諏櫝奏森羅煥爛上方之札盍少禆扵末議庻無􅀒扵殊知夫何鼔巳至扵再三威實臨扵咫尺厪終條對靡中題評挟以先登徒愧大宫之士存而勿去偶同矍圃之賔叨綴第以為榮省流恩之有自兹盖某官先生導􅀭徳意砥礪文風假華衮之寵褒曲乗薦藉􅃱黈旒之過聴獲預井容溍敢不勉企前脩益圗後效鞭駑附􅂹豈十駕之難􅇷磨鈍為銛尚一割之可用上酬亨遇次荅隆􅀻激烈情深鋪棻語淺賀周縣丞啓䇿名昕陛賛邑海壖榮命載行輿言胥慶惟古有詳延之禮肆時多間岀之材扵皇昌辰聿新曠典文塲初啓􅀋霑優渥之恩英彀重張果極俊髦之選科目見謂得士州縣豈徒勞人盖將任以事功必先飬其譽望某官卓乎懿行􅁢矣令儀獨抱遺經詞章固為餘技究觀當世設施匪事空言粤䇿儁扵郷闈逮旅陳扵方物褒然髙舉藉甚能稱可縁再鼓而少衰仍與十朋而前列用膺妙柬式副旁求日􅉴彤庭旣親承扵大對天臨黼座宜宻近扵清光侈是際逢胡然引却姑一登扵選部不再轉而為丞庶岀緒餘稍甦疲瘵佇聴疇庸之羙亟􅀚圗任之新某猥以陳人覿兹盛事雲霄直上詎為儒者之榮膏澤下流尚慰斯人之望聊攄悃愊少助忻愉通李州判啓晉登上第臨佐偏州偶縁臭味之同遂託雲仍之雅􅂺慿書問庸俟車音共惟某官流慶仙源飛英學海故家舊物陋􅂎宋之莫徴大􅁽髙文卑􅄯董之􅀁對科目之士扵斯為盛州縣之職夫豈徒勞竚展材猷力禆治化風行草偃里無弭筆之民川泳雲飛􅚋有彈冠之客載新觀聴􅁢頼作成屬當視籕之期敢後典籖之詗溍衰遲漫迹惕息素餐忝冒謂何乆自慙扵掦粃瞻承伊邇􅄑毋爽扵及􅀲拱俟晤言悉攄下悃公文陳乞依舊􅃱仕咨文伏念溍誤玷科名叨塵官使幸獲逃扵瘝曠毎思戒扵滿盈􅀁以不待引年自請納禄一歸田里五閱星霜夫何姓名猶存乎齒録之餘造化曲盡乎陶鈞之妙遂令朽質仍預清流起􅀙外􅁥之散貟入就禁林之儤直北扉視草東􅀚紬書扈蹕上亰談經内府躐躋􅂆講之職􅂙陪侍􅀙之班庸謭奚堪僥逾特甚方陳免牘俄俾賜環專使在門大君有命靡得以循墻而避是用不俟駕而行揣微分以淩競感深􅂨而激烈趑趄故歩黽勉汗顔孰知旣去而復来寧非以退而為進不圗控􅈼􅂚逭譏評而况蒲栁易零桒榆巳迫隕越是懼􅀘報無由敢祈叩扵洪鈞􅂅保全扵末路尚惟矜察轉以上聞代浙東憲使請立耶律文正公書院公牒􅀼謂人能弘道學必有師仰惟碩徳之間生實􅁇先儒之正統流風未逺世澤猶存不有專祠􅂚彰遺烈伏見故昭文舘大學士兼􅀦子􅀕酒贈資徳大夫河南江北等䖏行中書省右丞上護軍􅇷封漆水郡公謚文正耶律公前代賢王之貴胄本朝上相之諸孫􅀒深沉不器之資懐耿介㧞俗之志爰親師而取友用􅁱巳而治人粤若世祖之時咸宗許氏之學克嗣其業􅁢屬扵公卓居軰行之先式膺付託之重一貫忠恕之妙獨傳扵曽参三千弟子之徒同師扵有若凡􅂛堂而入室必蹈矩而循規一􅀙􅀦學之建官三爲􅀕酒以設教啓前賢之藴奥示後學之楷模青青子忴覩時髦之傑出戔戔束帛承天寵之褒嘉逮請老而懸車復興歎扵當守特馳乘傳加錫上罇髙朗令終旣䟽封而告第華皓一節已定謚而易名孰知郷􅀦之舊居尚缺禮祠之精舎當職乆司風紀博采輿言謂後人苟獲瞻其儀刑雖異世亦將知􅀁觀感冝立書院而脩其祀事仍置山長以領其生貟庶㡬人材之作興可􅇱􅀦家之任使誠非小補是用申明金華黄先生文集卷苐十九
