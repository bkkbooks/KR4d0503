front:
  text: 金華黄先生文集卷第三十八續藁三十五墓誌銘臨川危素編次番昜劉耳校正
  hash: sha256:c282324fbca36ca5e62f4c3adfd35537068e3f9b0cf907d4c109106aa618a065
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0503_SBCK_038-1a}
body:
  text: 嘉議大夫武昌路緫管致仕張公墓誌銘故嘉議大夫武昌路緫管致仕􅀳寧張公以重紀至元之元年三月九日終于里第壽七十有八某年某月某日葬臨汾縣七里之原公之子九成以公嗣子九思􅀁次行狀來言于溍曰九成之先累世咸有仕禄而局於時與位弗克大􅂋逮我先君遭逢盛際乃以材自致踐敭中外餘五十年然不自表襮謹持文法叅賛謀議未甞出以語人布宣徳化惠綏􅀺元有隂􅀍其賜而不知者事之可見僅僅一二而休稱羙譽形于薦剡甚具􅉎石未有刻文無以昭示来葉幸為我序而銘之按狀􅀁述公諱徳榮字􅂋卿姓張氏世爲􅀳寧人祖諱林仕金季積戰多至萬户戍􅁑壁寨引兵援蔡州軍敗見執㐲節而死父諱義入皇朝任汀州路武平縣尹公既貴累贈其祖亜中大夫同知河東山西道宣慰使司事輕車都尉並追封清河郡侯祖妣楊氏以贈妣李氏以封俱爲清河郡夫人公少􅄝書能通其大義􅀹習於國家故事􅁣然有志以功業自期年踰弱冠入福建平海等處行中書省爲令史由福建遷湖廣從其省官征兩江叛蠻有功授承事郎本省檢校官事有未當必鉤摭而􅁵正之丁外艱用御史中丞魏公􅀄薦起復尋陞承務郎左右司都事紀綱列曹事無不舉轉承直郎出爲寧國路宣城縣尹大江以南宣城素號繁􅇵户籍田賦視州邑皆數陪人多憚其不易爲公盡心按職鋤剔其蠧弊而拊摩其凋瘵民有殺其兄子而託言死於盗者官爲索盗數月不得公始至閱其牘曰此必叔殺之而妻與其謀訊之果伏乃叔報其妻且利其財而殺之也人以爲神明􅀊適大侵道殣相望連數百里公振􅅒勸分境内獨無害父老相􅀓爲口實部使者舉公五事備又舉公治行爲諸邑最臺府亦交章論薦之擢朝列大夫陕西等處行中書省左右司貟外郎彌綸庻務多􅀁禆益終南山僧作亂伏誅愚民多以詿誤當坐公驗其辭而探得其情免死者􅀂干人召入除中憲大夫僉殊祥院事將嚮用矣上方勵精圗治思得良二千石俾牧逺入乃輟公以行拜亜中大夫信州路緫管公因其俗而理之政尚㢘平而遇事無􅀁囬撓有􅀔家子調属邑令交權要爲奸利莫敢孰何公一繩之以法令以罪去吏民恱服聲望翕然部使者言公材任清要不宜乆淹外服未報而公􅃍援禮引年遂有武昌之命公旣納禄而歸縱情物外夷猶自適凡若干年而逝娶関氏前卒繼侯氏亦以贈若封俱為清河郡夫人子男五人長九陽早卒次九思用公恩􅀘官今為承務郎􅀽州路同知萍郷州事次九逹次即九成浙東海右道肅政㢘訪司書吏次九臯女三人長次皆適刀氏㓜適某氏孫男􅀂干人女􅀂干人公位三品冝賜謚扵奉常立􅀓扵太史其可托以不朽者不専繫乎銘然非是無以表封樹志陵谷孝子仁人之用心不亦逺乎銘曰繄公之先􅁬于伐功嗣世而興載疇民庸厥施未光寧不有俟公克承之以有􅂋仕乃選其勞乃升都司乃踐朝著出秉郡麾薦書交馳㳯洋華問鴻漸于陸盤桓不進幡然逺引􅊬乎髙風旣壽而康遂以考終公之􅀁履恩威兼備泰山豪芒存於軼序綿綿厥紹則熾而昌惟徳之符乆而彌彰矢辭鑚石昭掲墓道後公千年不尚有考奉議大夫餘姚州知州致仕范公墓誌銘公諱文忠字煥章姓范氏七世而上皆家于姑蘇宋之中葉避地東徙故今為慶元之㝎海人曽祖公捷迪功郎􅁥清泉鹽塲祖仲宏太學生父泰之入皇朝以公貴贈承務郎嘉興路同知崇徳州事母俞氏黄氏並贈㳟人公黄氏出也㓜失􅀁怙兄弟十二人又俱早夭與妹相依以生母氏撫育備至稍長入則􅈬學出則膺門户事天性純篤事母能盡子道妹先扵公五年而逝躬治其䘮靡􅀁弗周從父禹錫隠居授徒公甞受業焉其殁也三子相繼而亡為􅁲善地以葬教其遺􅀌至於成人而授之以室遣其􅀌女五人皆歸于名門有挾閫帥之􅀔謀陻三湖為田瘠人以肥已者衆莫敢言公獨􅁬然以陳于省臺而湖得不廢人􅀩其利大徳十一年民飢為盗海瀕遐逺為害􅀹甚公手􅅞其渠魁十有四歸于有司餘黨竄伏閭里恬然功狀已上而未報俄有母憂服除中書乃以賞典奏用公為慈溪縣鳴鶴廵檢至大四年也公始至即􅂢私錢購民地立官署申眀法令而去其煩苛無頼之徒冐鹽禁以䧟良民者為之屏息有盗殺一僧而取其衣盂之貲以去山蹊幽阻盗無迹可尋公設計捕得之人以為神陞主徽之歙縣簿同僚及郡邑官屬多以賄敗公獨無􅀁頋以材取知憲府有疑事輙諉焉遷主􅁻安之廬陵縣簿廬陵習俗譁徤喜争素號難治縣民蕭甲與其子殺人以誣怨家劉乙公親涖檢視而窮䆒其獄遂寘殺人者于法而籍其家受誣者以免豪右無不讋服先是􅀍郡檄市紅藍於江陵者率髙其佑而利其畸嬴公承命而徃痛絶前弊平給其直之外得羡錢猶六萬餘緡悉還于官以㢘能見稱扵時調平江之吴江州判官郡守患賦役之不均專屬以推收事公謂是不可欲速必同輸粮之日吏胥咸在而拘檢之乃謂得其實後訖如其言而賦役以平嘉㝎知州管洤祖詣中書訴郡守􅂿灾田多虚冐指公爲黨省臺􅀍上旨鞠問公先衆人力爲辨白得直而洤祖竟以誣罔坐禁錮桐里廵檢􅀗竊盗十有一并􅂍仗送州公察其􅁈而釋之後果得真盗人乃服其眀􅁢婺源靈順神祠遇瞿曇氏降生之日四方之人徃徃凾香致誠富啇大賈因人􅀁聚以爲市行省檄公榷其征稅時朝廷方重迎賽之禁以貨至者殊少公既一無􅀁私課入反加於前擢延平之沙縣尹下車未幾造義倉以備凶荒築社壇以謹祈報崇儒學以興禮讓豫章羅先生之裔孫受㕓邑下建書院以奉祠事公欣然如其請而助成之士莫不知勸公在官四載以年登七袠禮當納禄􅄬牒徑去有識之士共歎其賢至家甫一􅀊忽感㣲疾戒諸子曰吾仕而未顯幸不墜前人之遺訓汝軰亦冝深體吾意吾􅀁以名吾亭曰存耕者可不念哉旣而􅁍藥謝醫夷然􅉂目而化至正五年八月十一日也享年七十有一階止承務郎六年夏有制授奉議大夫紹興路餘姚州知州致仕而公不及拜矣娶翁氏封㳟人次沈氏髙氏子男九人長一民江淛等處行中書省檢校書吏次惟善元善逹善止善擇善復善師善處善俱未仕女三人適沈徳純桑存善楊伯生孫男四人女四人一民等旣遵治命以某年某月某日奉柩葬于某郷桃花谷先塋之側且以公妹婿沈與道之狀來謁銘按狀􅀁述公之治行多今人􅀁難能雖􅀁試者小未足盡展其然進退之際始卒無疪􅇱福考終可以無憾是宜得銘乃序而銘之銘曰范望扵呉自文正公支于海􅀖仕弗􅂋融積乆必發逮于公躬取彼凶渠克有儁功乃著官簿乃疇民庸禮進義退􅊬焉髙風有隕自天命秩則隆不居其有尚飾乎終蕃蕃子孫餘慶􅀁鍾式敬爾承保兹丘封江淛官醫提舉張公墓誌銘故成全郎江浙等處官醫提舉張公諱去非婺之東陽人世祖亮與宋政和中舉八行賜號冲素處士曰志行者實兄弟行殁葬縣南乗騘郷木掘嶺荷塘西原子孫因家于荆浦父諱潤以脩徳尚義為郷善士母頋氏有子五人公其季也少警敏有大志旣葬而隐扵醫其為術深超徑詣精驗如神然不専扵為人巳疾􅀹善以太素脉言人􅁻㓙貴賤壽夭率皆竒中公自號實堂人罕用為其稱而直以藝配其姓稱之曰張太素云至元二十有六年大盗竊發扵鄰郡蹂踐縣境尚書左丞史公弼宣慰淛東督諸軍討捕之一夕氣填膺逆上結塞脹滿寢食併廢公授以匕劑立愈因留置幕下及移屯永康縉雲皆預在行將卒道病與藥輙効事平計功行賞當得官公謝非其本志不就乃署公本郡官醫提領史公入朝或詢以江南名醫必首及公且貽書招致之大徳五年公至京師而史公由僉樞拜平章政事行省江西後二年召還樞庭見公􅂬喜陛對亟薦公于上李叔固丞相時領太醫奏用公為尚醫奉御食五品禄明年扈􅀙上亰阿忽都楚王疾􅇵有旨命公徃視之王旣平復入謝上嘉奬焉又明年王􅀍命廵朔漠廽次和寕王孫明安帖木児有竒疾衆醫莫知􅀁為遣府僚孫司馬者詣闕請輟公以來公以體氣漸衰不任逺役懇辭上再三勉諭出尚方襲衣重裘安車善馬資之以行仍勑有司厚贍其家公旣至施之鍼焫投之湯液閱月而疾良已王為之刲羊刑馬大㑹宗戚餞公南還且遺以交鈔五千緡白金百兩内謁者張哥司徒復言于上及東朝加賜交鈔五千緡文綺四端以旌之由是聲動朝野太醫剡上其名于中書以聞擢江西等處官醫提舉階成全郎某年也公過家上冡即抵官下居三􅀊職事修舉省臺交譽之以秩滿去官僚屬皆泣拜而别公性温厚家食之日待郷鄰有恩意以疾來告者赴其急無難色方將優㳺扵一丘一壑以怡神引年而江浙之命下矣到官數月俄拂衣而歸遂以天暦元年三月二十有四日卒扵家享年八十有三重紀至元某年十二月某日葬荆浦之北原元配何氏繼室馬氏皆前卒至是合祔焉子男二人長安道何氏出終扵杭州路醫學教授次至道馬氏出前昌國州醫學教授俱能襲父業以醫名女一人適厲某孫男六人女二人曽孫男五人女二人公之葬已乆而墓上之石未刻扵是至道以狀來取文爲銘且曰先人在亰師時志道與先兄留治家事凡先人􅀁㳺􅀙與治療之曲折言人禍福之徴應皆莫能知其詳􅀁可知者僅􅀂是而止先兄因赴銓謁叅知政事張公某公言昔􅀂尚少求而父切脉即知吾後當居政路不自意沗􅀼至此而父可謂精於其術者也今豈可復得哉由公之言而推其􅀁不及知闕軼固多矣獨先人自序太素脉訣出於蜀之青城山王卧仙翁而歙人張子元子發甞校其書􅀓至楊上善而予得之始奏請以行于世其端緒之相承可槩見也昔劉歆序七略醫經之言人血脉經絡隂陽表裏者黄帝扁鵲白氏内外經及旁篇七家而已盖太素之書猶秘而未出故無得而述焉庸備著公􅀁序扵銘文之首庻史官傳方伎者有考云爾銘曰太素之學古有别􅀓卓哉張公窮幽極玄爰取諸身以知來物活人之功抑其仁術帝謂斯人醫師之良􅂌以制書歸榮故郷幡然勇退遂考終命前知孔灼順受其正公則逺矣公書具存潜發明㣲在爾子孫謁文訂實推述原委薦諸石章用禆信史江浙官醫堤舉􅁑公墓誌銘父諱應雷字震父世爲平江人其先仕宋季而未顯宣義郎思㳟扵公為大父進義校尉􅀙豫扵公為父公少􅀙季父某受周禮為舉子業國朝取宋塲屋事廢公無仕進意􅀂將終身焉􅀄進義府君業儒而扵九流百家靡􅀁不通尤工扵醫公旣不得以文學自見退而取家庭􅀁聞靈樞素問諸書之􅀃研窮精覈見世之言醫者執方拘論而莫䆒其源委多與古法背馳扵是推五運六氣之標本察隂陽升降之左右以㝎五蔵六府之虚實以合經絡血氣之流注而知疾病之候死生之期其處方劑施砭􅌊率與他醫異以此名動一時浙西提刑按察司判官李公某中州名醫也甞自診視其父疾復以咨决扵公聞公言父子相頋駭愕曰南方何以有此耶則盡出􅀁藏劉守真張㓗古之書與公討論􅀁見無不脗合江南言劉張之學自知始公􅀁著書大旨以為醫當視時盛衰劉守真張子和軰值金人強盛民悍氣剛故多用宣􅂥之法及其衰也兵革之餘飢饉相仍民勞志困故張㓗古李明之軰多加􅀘益之功至􅀂宋之季年醫者大抵務守護元氣而不識攻伐之機能飬病而不能治病失在不知通其變也書凡二十卷名之曰醫學㑹同摘古語扁其齋曰恒盖用術貴扵通變立志則不可無恒也四方士大夫聞公名奉幣馬迎致之無虚日延譽益廣大徳十年用薦者􅀘平江路醫學教授治廟宇闢􅁟田教育其弟子貟後多爲良醫尋用省臺交舉擢江浙等處官醫副提舉遂爲其提舉階自醫愈郎陞成全郎延祐五年也公前後在官十年其學大行扵東南至治二年丁母憂而歸居䘮過扵哀毁如不欲生竟以三年春正月十八日卒于家享年六十娶盧氏宋某官銊之孫女子男二人長震孫先五年卒次乾孫女一人適胡就矩亦已卒孫男四人公資禀和粹識量明逹外嚴而内寛事親孝而友愛其弟郷鄰有急拯救之如恐不及人以長者稱焉乹孫旣以泰㝎元年春二月二十八日奉柩葬于吴縣志徳郷望野墩先墓之次後十有三年始以故宋進士顔先生堯煥􅀁爲公行狀屬予爲之銘予􅀚前史􅀓扁鵲倉公華佗皆歴言其已試之效先生狀公行皆略弗著惟論次其􅀁以爲術之本可謂善序事者也是用悉取而􅇱陳之公雖寓迹方技而未甞廢詩禮之傳遭時承平復以經術網羅天下士獨周禮爲無􅀁用乃俾乾孫學爲詩以應有司之求乹孫篤扵學而敏扵文庻幾能成公之􅀄志者銘曰猗􅁑公抱一經訖不試以術鳴帝有命公是膺樂其職不近名尚有子蜚儒英際聖時伏必興貤茂恩耀泉扃發其兆在兹銘朝列大夫杭州路緫管府治中致仕范府君墓誌銘府君諱景文字煥卿姓范氏其先京兆藍田人髙祖諱昻霄金大安中進士歴官同知静難軍節度使兼邠州􅀚察使終扵正議大夫吏部郎中入國朝徙居真㝎以儒占籍曽祖諱元泰􅀙仕郎解州判官妣張氏封宜人祖諱天祐汀州路緫管府經歴贈奉議大夫真㝎路趙州知州驍􅀐尉追封元氏縣子妣李氏封元氏縣君考諱忠朝請大夫僉江南浙西道肅政廉訪司事妣白氏樞宻院判官某之孫女封髙平郡太君府君生長官家多􅀁見聞而有志扵學人知為逺大之器至大戊申集賢以茂材異等薦于中書署真㝎路儒學正未赴皇慶壬子辟㢘訪司掌書司官分按嘉興建徳鎮静不苛而風采凛然府君之捭益居多延祐乙􅆗入江南行御史臺為察院書吏䑓官有貴倨不法者衆皆側目而莫敢言府君獨􅁬不頋白于御史大夫明數其罪劾而去之同列咸敬憚焉􅀙御史分廵湖廣黜憲長之徇私敗政者一人郡縣長吏之貪虐者悉望風觧印綬去􅀁至宣布教條更新弊政御史頼其賛助交章舉之已未行宣政院辟充令史錢唐两大刹因争地致訟有司莫能直事聞于朝遣宣政院狗児􅂙議公涖治焉府君為具其始末而辨其是非事遂决用􅂙議公薦入為宣政院􅁺史至治壬戍授將仕郎杭州路臨安縣主簿行中書省奉詔擇㢘幹官分督未絶事府君首膺是選至江東㝎期限之逺近而責其稽違量事情之輕重而求其平允民無不畏服旣還復俾􅁥辦杭城稅課甫三閱月􅀘其元􅃜二十餘萬緡増羡一十餘萬緡丞相脫􅂬刺罕公嘉其能泰㝎甲子辟充本省􅁺史尋升提控天曆已巳遷􅀙仕郎松江府知事奉省檄􅁥􅀵秋粮且俾􅁥裝海運積出餘粮􅀂干石用叅知政事胡公薦擢承事郎江西行中書省理問􅀁知事未上本省辟充􅁺史尋升堤控御史刷磨諸曹案牘無可指摘知出扵府君與闔院御史交章舉之至元戊寅除承直郎平江路緫管府推官平江􅇵郡多大家素號難治屬州豪民有誣平人為盗厚賂官吏而抵其罪者事覺為物色得其真盗而昭雪焉府君治尚嚴明而本扵仁恕平心易氣察辭燭理凡􅀁鞠問悉得其情由是獄無􅁈滯見謂稱職至正壬午遷承徳郎湖州路緫管府推官引疾祈閑遂以朝列大夫杭州路緫管府治中致仕癸未十月二十四日竟以疾卒于平江寓舎享年五十有九真㝎先塋逺在數千里外自曽祖以下俱葬于平江路長洲縣武丘郷白蓮橋之北原諸􅀌以是年十二月廿八日奉府君柩祔葬焉君持身㢘介不妄取予而撫宗族􅀌㓜助其婚嫁一無􅀁靳有詩文􅀂干卷曰覆部集當代名公序其篇首咸稱許焉娶李氏封某郡君子男二人長公琇從仕郎衢州録事次公琰慶元緫管府吏女五人長適曹州曹榮祖次適懐慶録事宣徳劉大用次適鹿邑縣尉衞輝田秉仁次早卒次適東㢘訪司書吏廣平牛師􅀃孫男七人女三人府君葬巳乆公琇以銘來屬謹摭狀􅀁述序而銘之銘曰天之降材必于名門用而不匱如水有源府君之先世有仕禄逮兹五葉是似是續直道而行蹇蹇匪躬剛而不折綽有父風邅逥外服隨牒平進名曹􅇵職恢恢㳺刃小試之效泰山豪芒未老而傳奄其淪亡家聲不墜由子克肖咨爾來昆是則是傚奉議大夫同知諸路金玉人匠緫管府事􅀓公墓誌銘故奉議大夫同知諸路金玉人匠緫管府事􅀓公旣卒且葬三十有六年而􅃁上之石未有刻辭公之孫亨貞皆甞􅀙予逰及予承乏居國學又適在苐子列而亨取上京郷薦苐一予􅀁與聞也縁斯文之雅故將其父命以隐君嚴威之狀来謁銘按狀諱進字仲與其先燕人祖曰徳父曰榮祖當金之季始去燕居雲中晦迹弗耀而獨稍出其藝以自見彼遇憲宗於和林錫金符長其同列六十人以􅇱宿衛世祖建國開平驛致其家屬因占籍焉公生而頴異氣貌甚偉孝友出於天性與人交以信有士君子之風至元二十五年世祖選用世勞以為金銀噐盒提舉乆次當改調而儕軰中無以易公大徳三年官將仕郎八年官承事郎凡再陟其階俾居舊職十一年乃遷奉訓大夫諸路金玉人匠府副緫管尋以至大四年陞奉議大夫同知府事公服勤三朝每制噐以進無不稱旨賞賚優渥不可勝計仍特為降璽書存護其家實異恩也至於裁抑竒巧崇尚質素又未甞不寓執藝以諌之意識者賢之皇慶元年正月十九日以疾卒于官享年六十有一世祖之㝎都于燕也公􅁣然曰燕故吾􅁟祖父魂魄能無思乎吾歸其時矣乃卜居今京城積慶里而奉祖父曁母吴氏之柩葬城西十里樊村漆園之原公卒遂葬其墓次夫人陶氏宣徳人有懿行善理其家後公二十三年卒元統二年三月二十日也其年四月四日合葬焉子男一人曰賢佐仁宗欲使疇其先業特授承事郎陽山瑪瑙提舉今以累遷為行諸路金玉人匠緫管積階嘉議大夫孫男三人亨以郷貢擢第為將仕郎太常禮儀院太祝貞以國子釋褐為􅀙仕郎章佩􅁥知事庸國子學生曽孫男二人女二人盖金之將亡中原雲擾衣冠世族強者戮弱者俘為自全之計者或乗時崛起争相長䧺而使人莫能犯或自混扵雜流而取容一時然恃其力而以暴陵人有仁心者􅀁不忍為惟百工之事有以利用而無害於義故君子寧屑為之公後雖藉是有位序而恒􅀂以為歉甞語人曰吾家再世遭時艱虞而隠於一藝豈徃而不返者耶今天下一家死生相保而吾祖父乃不及見承平之盛賫志以殁子孫誠知之必有能自㧞以昌吾門者矣扵是陶夫人亦力賛公以教子為務嘉議公之官于金玉行府也留錢唐乆之故􅀁知位丞相出臨江淛略􅀔分而與居與㳺視疇昔無異􅀙容宴語未甞輙及其私慎重如此得於家庭者可知矣亨與貞又皆生盛時蒙菁莪豐􅉮之餘澤而以儒起家公至是復何憾哉序而銘之庻以慰公於治下云爾銘曰九官濟濟疇􅀂子工帝曰咨垂實先䕫龍降及中古為民者四人思擇術貴徳賤藝惟公父子靡適弗通出此入彼與時汙隆曰予之先家有詩禮夫豈世官倉􅁃為氏亦旣有時有子有孫迄用一經守為顓門兆兹幽虚尾箕之野列星之英後有興者奉訓大夫武昌路諸色人匠提舉􅃮君墓誌銘君姓􅃮氏諱榮祖字仲華古有􅃮氏而孔子弟子􅃮雕開之後亦或為漆君盖其裔也曽大父世昌居江之瑞昌大父文興徙興國之永興又徙太平之當塗而占籍黄池父永成宋將仕郎君仕皇朝歴黄池建康杭州三織染局副使稍遷武昌路造作副提舉遂為武昌路諸色人匠提舉􅀄階進義副尉用先賢子孫改將仕佐郎累陞奉訓大夫年踰六袠􅂺致仕而去君少敏於學敦行孝悌將仕君殁􅀒土成墳松栢皆手植與兄弟分財均兄及弟前卒經紀其家事無遺力􅀂未始異居者􅀹喜周人之急􅀊饑則為發粟病則與藥死則與棺里有叢􅃁積乆暴露為聚而化之如浮屠法郷鄰多頼焉居官􅀁至克脩其職業執藝事者咸精其䏻其在建康以貢輸詣京師者再皆蒙恩錫賚甚厚人以為榮惜其􅀁處非要地品級已優而績用未􅂋也異時將仕君遊青山之保和菴以為兹謝公玄暉舊宅不宜使乆廢不治買田二十畒􅂌其徒至君又益以田四十有五畒而祠將仕君於廡下里人羅君記之將仕君封樹在新埂去家僅一里􅀁君謀於兄弟割田􅀂干畒以給􅀊時汛掃之湏前進士汪君記之瑞蓮生墓前方池中前進士夏君記之興國先隴隣於􅀟泉寺君􅂢錢千二百五十緡爲興茶利其徒創置祠宇守視墓域惟謹故集賢直學士貢公記之君甞延羽流爲將仕君蔵醮事感八鶴来下述黄籙儀因著其􅂕應之實今天師張公玄教大宗師吴公序之故翰林學士承旨姚文公之使江東也愛君沈静寡言進退閑雅爲製其號曰可心其爲一時鉅公引重如此君之才雖不大見扵世觀其􅀁與而其人可知也同里廣教寺法堂乆未建君歸自武昌􅁣然以營造爲已任閱兩寒暑而堂成用錢以緍計者􅀂干一出於巳仍施田百畒以資他日繕葺之費住持僧徳逺以瞿曇氏示現之日爲登堂說法緇白四衆咸㑹君忽頋謂其子興宗曰吾事已畢將行矣明日竟以疾不起聞者歎異焉君生於前至元辛未二月十一日卒於後至元丙子四月九日得年六十有六明年丁丑八月十日葬新埂將仕君墓之左娶史氏次索氏子男一興宗也􅄻授寧國路織染局使女一嫁故相吴許公之玄孫鍇孫男一女六其葬也興宗不逺四千里俾以狀来乞銘乃按狀􅀁載序而銘之銘曰繄君之先惟􅃮雕氏受業聖門而不苟仕君扵􅀁祖匪襲其迹仕不擇禄由由自得孰遄其歸年未及謝展也逹生委順而化仕而能止没宜有後刻辭石章式示永乆江浙行中書省左右司貟外郎致任陳君墓誌銘君諱遘字謹之姓陳氏其先自婺之東陽徙台之臨海曽祖諱夣蕳某官祖諱仍某官父諱孚入國朝以世祖皇帝由翰林國史院編脩官授禮部郎中副吏部尚書梁公曽使安南陛辭賜五品服佩金符以行旣至詰其世子陳日燇以不廷之罪且却其重贄辭直而壯日燇震讋願遣陪臣入貢使還稱旨拜翰林待制兼國史院編􅁱官上方欲寘之要地而公􅃍請外歴建徳衢台三路緫管府治中積階奉直大夫政績之詳具如楚國程文憲公鉅夫􅀁為碑銘母頋氏封臨海縣君待制公殁時君年甫十四執䘮如成人弱冠用􅄻補台州録事判官台實郷郡人以其年少頗靳之君延見父老舊故情文􅇱至或干以私輙不復與之接臨事無㣲不察吏莫敢侮奸民為之歛避乃皆歎服曰勿齋有子矣勿齋待制公自號也秩滿遷將仕郎常州路緫管府知事冨家史氏築大圩環小民田其中強委錢貸之覬子本相侔而有其田民不肯受則因治田與之閧毆傷其七人縣吏受賕反欲加以罪民訟其􅁈君白郡長貳召吏責之乃釋􅀍誣者而致史于法民間祖賦許自輸而禁􅇛結舊制也豪民多冐禁而利其贏餘君申眀之則相率行賄賂假􅁠􅀔沮撓焉君不為動禁之愈厲公私咸以為便居二年以母疾棄官歸養民挽留不能止乃樹碑以頌去思凡為碑者五其遺愛在人多矣君旣抵􅂰下而母竟以疾弗起居哀毀如不欲生服除猶無意於仕家食者十年調集􅂟路江寕縣主簿不赴改􅂟元路緫管府知事􅂟元為浙東帥閫治􅀁事至繁夥有自臺端來居帥座者奴視司属人畏其氣􅆋凡􅀁諭指意多曲法以阿之君檢飭吏櫝使無間􅂩可入有私託則據法以對度不可屈乃為之霽其威嚴郡長貳每事必資君而後决君於民之􅁈者直之吏當次􅀘而貧無貲者循其資序而用之或来謝􅂺弗納曰我奉法耳非有恩於汝也郡學有沙田在海島石衕山中土豪擅魚􅈉之利􅀊輸緡錢八千而恒􅀒其半君奉憲府令徴理之盡取其錢以具􅀕噐諸生立石以紀焉􅀁受圭租平其斗甬而令民自操槩無他官倍取及左右侵牟之弊莫不􅀒其餘粮而去居四年擢江浙䓁處儒學副提舉進階文林郎杭俗素華靡士子習於浮薄君擇宿儒有學行者為之師以作新之省曹書佐多起於閭閻不觧文義俾君試驗君從容對曰此軰􅀂知文義當自為士肯傭書耶業已命試取文意不背可也頼君言而􅀗并容者甚衆居無何俄病渇引飲動一二升閱数月病作瘍醫不能為遂移疾請納禄授承直郎江浙䓁處行中書省左右司貟外郎致仕命下而君不及待矣君卒於至正四年八月五日享年四十有九以九年八月十八日葬􅀁居太平郷後嶺之原娶葉氏尚書右丞南陽郡文簡公李之孫知賀州朝列大夫同之女封㳟人子男三人長曰樜某書院山長後君四年卒次曰集衢州路龍㳺縣􅂕山廵檢次曰楧左翼屯田萬户府儒學教授女三人長適處州路石門書院山長四明􅀽曅翰林侍讀學士郡文清公桷之孫次適將仕郎太常禮儀院太祝藁城董守緝翰林學士承旨趙國忠穆公文用之孫次適建寕録事判官同郡周士潚集賢待制仁榮之子孫男三人女􅀂干人君㓜聦敏日誦数百言非􅀊能属文中年䆠㳺􅀁至晝接賔客夜考經史訖能承其家學君丰神凝整外剛方而内和易每謂居官處事求中扵理何至過為深刻耶故其馭吏使不可犯而已涖民則思有以便安之喜周人之急而不自表見鮮有知之者待制公有別業君重加繕葺扁其室曰慎獨而㳺息其中􅀊時集宗人徘􅆦竟日以示終身之慕焉􅀄奎章諸老交薦君擬奏辟以為属而君適有内艱浙東部使者或舉君可居館閣或舉君堪任風憲或又以君應守令之選朝廷旣處君扵儒臺而時宰又雅知君甚禮重之今天子方妙東儒臣纂脩三史遂以君名剡上冀國董忠粛公守簡時方緫裁史事及為中執法力官君㢘慎而明逹宜署臺職旦夕且向用而君逝矣識與不識咸悼惜之曰近世閥閱子弟率以縦逸墜其家聲君少而􅀌未壯而仕乃能卓然自立如此千百人中一兩人耳而止是乎君葬後五年楧以君甥婿黄池稅課副使楊孝原之狀来謁銘載念君與予同時筮仕扵台之司縣别後音問􅊬不相遏及予忝預聞學政去官間一􅀊而君継至竟莫能叙契闊詎謂君遽先予死衰朽餘齡動増感愴何忍執筆而銘諸専价蹐門靡容固拒書辭繁猥不知􅀁裁銘曰台之陳氏故為望宗揚英振華肇自先公在世祖時朝多俊彦頴出其間茂膺上眷鋪張帝業􅃳色皇猷揉彼蠻方敬承天休功成弗居盤桓外服委祉於君以有世禄􅇵曹上幕罔憚其勤乃陟儒臺乃柄斯文人皆望君入對召節發舒素藴光昭遺烈胡嗇不年而遏其施尚克有子圖永其垂不以予耄俾専述作鄙言匪􅃾􅂓慰㝠漠上海縣主簿呉君墓誌銘君諱福孫字子善姓呉氏其先有為宋執政者曰正肅公育自建之浦城徙汴之新鄭南渡􅀄有自汴之新鄭徒武義者曰克立建君世矣父東又自婺徙家于杭故今為杭州人母施氏君生而俊爽稍長強學好脩元貞元年用浙西憲使東平徐公察舉補嘉興路儒學録遷寧國路儒學正江東憲司治寧國􅃰郡盧公臨按之暇略其􅀔分而與之㳺數以詩篇相倡答君旣書再考例當序進絶口不自言前代名流及時之雅望􅀂戴先生率􅀄仇先生仁近胡先生汲仲鄧先生善之咸加愛重莫不折行軰與之均禮魏國趙文敏公待之􅀹親宻文敏以善書名天下慕而效之者徃徃逼真然罕有􅀂君能得其早年楷法之妙者君兼工扵􅂐籕文敏極稱許之皇慶二年詔起文敏入侍講扵集賢輓君俱行中朝賢士大夫禮遇甚至君泊然未甞有􅀁造請至治二年乃以教官借授潮州路潮陽縣青洋山廵檢遐荒之地縣長貳乆缺君攝縣事􅀗強盗之捕誅者八人脫平民􅀍誣為盗者􅀂干人而􅀗其真盗者􅀂干人廣東憲府有疑獄多以諉焉未幾移疾而歸至順二年赴選集扵京師某月某日天子坐奎章閣阿榮大學士以其􅀁作小楷書數萬字上進因得召見巙巙學士方侍書扵閣中前奏曰臣濫得能書名如呉福孫􅀁書雖臣亦有􅀁弗及上頷之命侍臣引金鍾酌酒以賜將用為閣職有沮之者而止今上皇帝至元元年調常州路儒學教授君氣岸素髙又在師儒之位不肯為謟曲以事上官竟坐是去改調嘉興路澉浦務稅課大使君承命欣然就職殊不以為歉也晚益務恬退足迹不渉逹官貴人之門日與方外大老玄覽王真人及名公之歸休弗仕者湖南帥于公有卿道州守徐公叔清翰林次對劉公時中徜徉湖山間不復以仕禄為意至正六年銓曹考其資厯當升授將仕佐郎松江府上海縣主簿到官之始歳遍大旱有禱立應遂為豊年理民田為豪強􅀁據乆而不歸者諭止婚姻之訟積數􅀊不决者他利害有當興除方次弟舉行俄奉省檄詣温台兩郡臨給􅐭塲工本七年秋執事扵郷闈甫撤􅁄復俾馳􅀓督閩中稅賦以疾還上海八年正月十三日卒扵􅀁居之􅇬舎享年六十有九以某年某月某日返葬錢唐縣欽賢郷西漠花塢先墓之西娶唐氏宋朝請大夫天麟之孫女前五年卒合葬焉子男一人肅女一人適冝興岳枋早卒孫男一人􅁇善君明敏出於天性豪邁不覊談辨絶人娓娓不倦好客之名聞于四方自儒釋老氏至於岐黄汜勝之書無不讀􅄝古彛器法書名畫其書􅂐施扵金石為􅀹冝奉贄幣求之者無虚日禮部尚書太不花甞為扁其􅀁居曰清容軒因自號清客野叟􅀁著有清容軒手鈔若干卷樂善齋集若干卷古文韵選􅀂干卷古印史一卷蔵於家君入仕時年甫十有六至四十有三始被初命及出佐一縣已六十有七矣間一􅀊遂不起士患不遇君可謂有􅀁遇否乎後来者居上而君僅止於斯天乎人乎肅以状来謁銘謹摭其􅀁述附以平昔􅀁知者序而銘之銘曰先發而後至進難而退易不汲汲於富貴􅀋依􅀮以玩世􅉱􅉱而不衰者浩然之氣俯無怍􅀆仰無愧不贏於躬􅀆来者之􅂌之始就職君謂数之為術至矣而未始外扵理舎理而言数非􅀁以為訓乃為諸生發揮先儒性理之􅀃聴者無不恱服棟宇之摧剥及􅀕噐之敝壊者􅂢俸資而新之學廪則擇人以司其出納而一無􅀁問秩滿當主教列郡旣上名中書未調而君属疾臨終戒其子勿為惡兄弟宜相友愛勿有􅀁争語不及他家人以藥進君曰母苦我俄問日早暮家人曰日將中矣遂奄然而逝至正八年某月某日也享年五十有八以其年某月某日葬某郷某原娶張氏有子男一人曰日新播州儒學正女一人適余珽再娶周氏有子男一人曰又新女二人長適大都路雜造局照磨呉􅂋已卒次適汪簡孫男七人女二人君舉止莊重織量渊深自少嶷然有成人之風同里知黄巖州張君與紹甚噐重之故以女歸焉君平居孝友弱冠綜理家務謹守成法父􅃿無改於其道父􅀁建義塾祠郡王於其中始居貴溪者也君敬承先志益買田以共祠事翰林侍講學士掲公記之弟死其􅀌甫五􅀊教育之如已子處宗族郷黨􅀁施恩愛禮讓各適其當與人交􅀂淡簿而推誠相與雖乆不衰不喜言人過失待人無疾聲厲色驕慢之氣而人自敬莫不推其長者徭役之不給者助之紛争之不决者觧之人貧及􅀊饑則散財發粟以周之有作屋而侵其地者據其山以葬者􅀼􅂑其林木以為材者皆忍不與較其寛厚如此君之葬也其諸父中為國史院檢閱官適與予同在史局代為日新等奉常徳路緫管張公熈祖之狀來謁銘予不得辭銘曰惟数與理未始相離流而為術昧者􅄮之卓哉倪君不梏扵數消長成敗灼知其故物理之㣲驗諸一身其行其止與時屈信秋江黄君墓誌銘君姓黄氏諱一清字清夫徽之休寧人初李韓公以中書平章政事知貢舉某用門生禮拜公里第君在焉别去二十有五年而君之子晉踵門泣且言君巳没持黄竹廵檢程君之状以銘為請按状君曽大父拱大父振逺並能施惠其里中見謂長者父元珪蚤卒母吳氏守節自誓内事舅姑外資諸子使為學君亦痛自飭勵期無愧於古人年逾四十始逰京師乆之無􅀁知名洎李公以􅃇學相仁宗賢才彚進而君以母老不忍去母告之曰汝父夙有志四方而今已矣汝其忘之乎君乃幡然復入京師謁李公君古貌長身鬚髯如㦸寛衣髙冠容止簡率又作吳語左右多目笑之公望見大驚異即下執其手延之上座時公門下皆名人顯士而君以布衣居其間恒與公亢禮坐客莫出其右􅀮然名動京師君以秋江自號而李公自號秋谷遺君詩有君釣秋江月我耕秋谷雲逃名君笑我伴食我慚君之句朝野傳誦滿口内翰趙文敏公既寫以爲圖且謂不宜使清時有遺才力薦之當路諸公以君深於易通隂陽家言欲用爲杭州教授君笑曰吾以布衣締交相國榮孰大焉持此􅁕以復吾親矣竟辭歸築山房摘李公詩語爲扁名以見志公欣然遣以錢助之宣徽王公奉使江東過君山房因圖其􅀮居十景以去其爲當世􅀁重如此君甞以母病籲天願減已年益母夀夜夢人語之曰有老嫗来當得藥明日果有老嫗来授以啖􅁡法而無􅀙得􅁡君往乞諸旁近村民家還遇虎君駭曰我死不足惜如母何虎熟視逡廵而去集賢大學士陳公言是家母爲節婦子為孝子冝旌表以風四方事下有司署其家及里門皆曰節孝國朝徽人得旌表者自君母子始其後君有母之喪赱京師乞銘於閣學虞公以塟張蔡公時當國問士於韓公式以君對且要與俱詣公恨相見之晚即欲擢寘館閣君以塟母辭公知不可奪則為詩以送之終喪復至京師遍謝前為銘及哀挽者趙魯公在中書素善君卒欲用之集賢亦舉君為儒學提舉君歎曰吾親在且不仕今尚須禄仕耶遂去入玉蓮山中構精舍􅀅老焉故人完顔君守贛奉幣馬迎致郡齋居􅀊餘俄思歸艤舟未發適值始生之日飲而歡抵暮疾作旦起奄然而逝至元三年八月九日也享年七十有五贛守為具衣衾買棺以歛而二子􅀙行者奉柩以還卜某年某月某日塟藍田山之原娶張氏前十三年卒子男五人曰俊淮安屯田副提舉亦已卒曰􅀳有家學今為徽州教授曰紹為仲氏一鶚後曰勝曰芳女二人長適行金玉緫管府知事汪洪次適俞榮孫男五人女三人君性踈曠好客不厭處鄉隣有恩不喜言人短而常推禍福成敗之幾開人為善其在京師􅀁主皆朝廷重臣毎有􅀁諮訪未甞出以語人􅀁薦士亦不以為已徳累朝元老臺閣名公至於卑官下僚新進之士無不與之交其死也無不悲之某竊􅀚昔人去就之際出者或未能無累於物處者或專務使影響昧昧不聞於人此二者皆過也若夫進不徇人退不絶物如君者盖鮮矣而某安􅁕以知之姑摭状􅀁述為之銘以紓其嗣人之哀思云爾銘曰士之懐才難得者時逢時之来患莫已知亦既有時又有知已胡有不為而止於此處非吾介出非吾通自信不疑卒蹈厥中發揚在上其藏在下銘以昭之用慰来者養齋􅃽君墓誌銘杭為東南一都㑹其民率多藝善貨殖市區相属如鱗次意必有若昔之大􅀮者寓迹以自混於其間以予􅀁聞􅃽君殆其人乎君既死且塟其子元龍介前進士汴梁段君以状来謁銘予雖不及識君而君予􅀁知也銘固不得辭君名景世為杭人􅃽氏故宦族而君之先獨弗仕至君遂學為醫然不專以其技自用恒蓄善藥為丹齊湯餌以售於人取嵇叔夜養生論􅀁引神農氏語以養齋扁其藥室其製藥也自山澤来致其物者必以色味叅諸圗經非其地崖及采暴之時弗苟取也銖分之等擣治爁炙合和之宜必本諸方書小失其度輒弃去弗苟用也言醫者兾得善藥輔其術教病家求藥必之養齋自達官顯士閭巷小夫至於旁州比縣之人無不知求藥於養齋者故其室無留藥日役數十人藥猶不給或持錢蹐其門累日乃得藥不以爲愠杭之業於藥者千百不啻莫敢與之齒也凡學於君者多良醫而食於君者皆良工云盖世之知君如此君之修於家者世未必盡知之也君平生自奉無輕裘肥馬而於親交里黨之乏絶賙恤之無少靳其拊人以恩而於子弟家僮之微過每對尊客斥責之使知愧以自厲元龍爲人恂恂有父風家庭之教也天師太玄子甞爲君書養齋兩大字而前太常博士東陽柳君記之以爲君養於内者有其本其言良信此予􅀁以意其必有􅀮徳也君生於宋寳祐三年九月一日卒於今天暦三年四月九日夀七十有六其年六月十六日塟西湖上南山之仙芝塢娶管氏子男一人元龍也孫男二人女一人銘曰漢有韓康唐有宋清猗歟蔣君卑不近清之利髙不近康之名庻幾古之中行者耶松溪縣丞王君墓誌銘君諱嚴字敬之姓王氏處之麗水人旣殁且葬其女孫之婿葉渭以狀来謁銘予之鄙陋固無􅀁辱命焉其来也不憚六百里重岡復嶺之逺躡蹻走風雨中浹旬乃抵予舎下其望予厚矣􅁩不得辭按狀王氏系出江左今占籍麗水之雲和郷者或䧺於貲或登朝致通顯最為鉅族宋迪功郎時中君五世祖也曽大父儀大父珪父克寛俱晦徳弗耀君少􅀒儁材善記覽以能賦有聲場屋間咸淳末名賢書上春官未第而徳祐失國君與伯兄挺並用福建宣慰使李公玨薦􅀘官挺為福州路閩清縣尹而君為建寧路㳂溪縣丞自以不能随俗俯仰命下拜而不赴君性孝友平居無疾聲厲色而治家肅然有條不􅄝酒而好客務盡其歡乃巳遇後進之士以禮有􅀁問難輙口占答之未甞以肥田廣宅侈於自奉而樂周族姻里黨之急細人之家無以為養生送死之具者多頼焉􅀊㐫發粟必下其直越中之飢流民相率而至悉以君為依歸􅀁居旁曰梅桞市當甌閩徃来之衝行者苦其地險惡君為作石路千餘尺人以為便浮圗老子之宫有廢不治亦􅂌以錢使一新之其嗇巳􅁉物見於前進士葉君現􅀁為積善堂記部使者分按屬縣聞君風誼咸為賦詩或就見而存問焉君晚中末疾逾年稍間巳而疾復作子􅀂孫以藥進􅁍之曰生􅀉也死歸也吾年旣耄可歸矣夫閱數日夷然而逝君生於宋寳祐六年八月己丑卒扵今至正二年七月戊戌享年八十有五葬以四年二月丙午墓在其家北十里天堂之原娶梅氏蚤卒遂不復娶以閩清之仲子􅀖彦嗣女二人適潘璹梁祖壽孫男三人勲烈炫女一人壻即葉渭為􅀖彦来謁銘者也曽孫男五人女二人始君冠而以敬為字因以為齋居之名觀君於死生之際瞭然無􅀁惑亂殆有得扵先儒􅀁謂常惺惺法乎是可無媿扵名其齋者矣銘曰士患無時亦旣有逢盤􅁊弗進卒逸其躬利澤在人􅀁施必豐奚必有位乃為􅂋融戰兢自持以成其終刻文孔昭表兹堂封金華黄先生文集卷苐三十八
