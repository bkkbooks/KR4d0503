body:
  text: 序臨川危素編次番昜劉耳校正送任時仲逰金陵序新安任時仲與豫别十年而相見錢唐言將逰于金陵願有聞以自壯時仲之逰道亦已廣矣豫何能為之軒輊乎雖然不可無以告也蓋吸風飲露乘雲氣御飛龍者莊周之所謂逰左雨師右雷公經營四荒周流六漠者屈平之所謂逰是皆其寓言云耳可姑置而勿論有如司馬遷之南逰江淮上會稽探禹穴窺九疑浮于沅湘北涉汶泗講業齊魯之都觀孔子之遺風鄉射鄒嶧厄困鄱薛彭城過梁楚以歸其閲山川之形勝而考廢興之陳迹有以見往昔君臣盛衰得失之由涉聖賢之故里而博習于稽古禮文之事有以見君子之澤彌久不衰而其舊俗猶有存者即所見以證所聞而撰定成一家之言千載而下可徴不誣夫其為逰非徒以極視聽之娛而已也金陵古帝王州六朝以來其事雖淺陋無足言苟能因耳目之所及參之前史而有所論著則兹逰豈徒然哉若夫出逰而歸既歸而復出卒以逰説顯名諸侯如蘇秦張儀者固無所用于今天下一家之日然大江以南金陵為會府朝廷重臣總憲度于外者實涖治其處而持風紀以使于十道者咸稟命焉尊官大人冠蓋相望或者以一言遇合蒙被薦籍與英俊並逰而無周南之留滯則其飛騰變化坐致顯名又非豫之所能測矣送鄒生歸臨江序臨江鄒生少執業于鄉先生而能窺其端緒及來錢唐遇士之有文學者必與之遊時出微辭碎義以相叩擊而博極其趣其泝江而西歸也咸相率賦詩贈其行而豫為之序豫觀古之君子有弗仕無弗學後世自中人以下非志于仕弗學也其學焉者直以為于祿之資而巳夫干祿固非所以為學而亦有道焉孔子之語子張者是也蓋聖人未嘗絶人之干祿又惡不由其道是故聞與見欲其多疑與殆欲其闕言與行欲其慎能是三者則雖不言祿而祿在其中矣今之學者羣居終日稽經諏史不患所識前言之不多患夫搜竒摘隱苟為難問未能自信耳不患所識往行之不多患夫􅓸髙厲空不習其事未能自安耳然且言之而不以為怍行之而不以為歉以是干祿猶非其道况欲希賢希聖乎吾子既有所受于其師又遑遑焉取友于四方聞見非不多也誠能即其耳目之所及真知而實踐之盈科而進成章而逹雖入於聖賢之域可也奚止可以干祿哉苟以豫言為然則歸而求之有餘師矣若徒望豫以曼辭詭辨為希世取寵之助豫不惟不敢亦不暇姑述其鄙陋以代序引庸俟吾子之覽擇焉送周眀府詩序古之作史者必為循吏立傳漢西亰二百年間傳所書厪六人蓋才難自古而然尤難得者循吏也皇元統一函夏吾烏傷領于職方逾七十年溍生乎其時而獲事其大夫之賢者固多求可擬于古循吏者清江周侯殆其人乎先是為政者務以平易近民或奉贄納謁以自通皆弗之拒習為故常人不訝也侯至一切峻却之是可謂之廉矣而世未嘗乏廉吏也異時屢建局以核田糧而隱匿飛併之弊有未盡革侯始令民得自實且躬任其鉤考之勞一無所憚期月而簿書井井有條愚民無知喜爭豪猾之徒誘使相告訐而隂持其豫奪之柄以為利事未竟家已破而猶弗悟侯遇其有所赴訴悉委曲譬曉調護而遣之去負其不直者悉皆慙伏悔罪詘者以信部使者郡長吏數諉以鄰境之疑獄及纍歲不決之訟侯折以片言人莫不服其眀允官府既以無事用其餘力大治土木營尉𪠘葺儒黌創常平義倉而分貯公私之穀以實其中完舊益新百廢具舉是可謂之能矣而世未嘗乏能吏也惟夫所居民冨所去見思至于生為立祠樹碑廪廩庶幾循吏之遺風乃絶無而僅有者也而况漢之循吏皆郡國二千石今也以百里之邑而得一循吏焉不愈難哉侯書滿解印綬行有日吾黨之士各賦詩以道其戀慕之私俾溍序于篇首侯初由湖北海南憲掾入湖南廣西帥幕以招兩江叛蠻有功超擢宣閫都司歷江東兩劇郡元僚績用甚著其來烏傷治治行為諸邑最憲府方交章列薦于中朝行嚮用矣輒因序詩而附見侯行事之大略俟它日傳循吏者采擇焉送胡季城序東陽胡先生往來亰師三十年通籍于朝再居史館悉以家政卑其二子一無所問二子亦能承先生之志厚自植立歲時遣問寒溫所進資用服食之須相屬不絶先生以是安之忘其身之客也嗣子瑜方侍慈親且力持門户事恆以不得奉晨昏於萬里為歉先生以書來謂已得請以太常博士致其事品在苐七用著令得貤恩于父母將歸而展燎於先塋瑜聞之即日籯糧就道往迎候焉昔者陸賈以千金分其五子各二百金令為生産約以過之則給人馬酒食極飲十日而更一歲中率再過毋久溷汝疏廣受以宦成名立行足止之計歸老故鄉日令其家設酒食請族人故舊賔客相與娛樂子孫幾及君時頗立産業基址而廣以為自有舊田廬豫嘗評先生之曠逹似陸生廉退似疏傅若夫有田廬而令子孫勤力其中以供衣食則不止于人二百金父子相隨出關而歸賣金供具與鄉黨宗族同饗上賜則不止于歲中再過其子與疏傅固無大異視陸生殆將過之然竊觀陸生始事髙帝後去官家好畤至文帝時乃復起未必能常乘安車駟馬從歌舞鼓琴瑟數擊鮮以為樂也國家承平滋久垂意稽古禮文之事招徠耆俊以備咨詢先生年未及謝而自請納祿安知不有知陳丞相之言陸生而復起先生於家者先生雖欲以疏傅自處得乎豫以衰謝之餘繼罹憂患結廬先墓待終天年無從簉迹于鄉黨故舊履屐之末試以豫言諗于先生何如瑜曰諾則次第其語於行卷之首以為序蕙山愁吟後序古之為詩者未始以辭之工拙驗夫人之窮逹以窮逹言詩自昌黎韓子廬陵歐陽子始昌黎蓋曰窮苦之言易好廬陵亦曰非詩能窮人殆窮而後工耳自夫為是言也好事者或又矯之以詩能逹人之説此豈近于理也哉匪風下泉誠窮矣鳬鷖既醉未或有不工者竊意昌黎廬陵持指夫秦漢以來幽人狷士悲呼憤慨之辭以為言而未暇深論乎古之為詩也臨川艾君當宋之季負其所有一不售于世凡所撰著率散落而詩獨傳其亦所謂窮而工者耶感城郭之非是嘆江濤之眇然悃欵惻怚一出畎畒之衷雖流離顛越而不悔是耿耿者固非詩之所能窮逹而其詩亦不俟窮而後工也夫豈非適于先民性情之正者乎溍生也後不及望君之風采幸辱與君諸孫廷暉遊而獲聆君之詩愛其辭之工而閔其窮且老以死也庸敢顯誦所聞以發其歸趣云順齋文集序故贈祕書少監順齋蒲公既殁仲子御史君機裒輯遺文曰間居叢藁者為二十有六卷以授溍俾序之孟子曰頌其詩讀其書不知其人可乎是以論其世也按公行狀公生而岐嶷丱歲就學強記過人未成童已通經大義弱冠文聲籍甚諸老多折行輩與之交逮乎立年復以濂洛諸儒之説倡于漢中而漢中之士知有道德性命之學蓋公之求端用力務自博以入約由體以逹用真知實踐不事矯飾而於名物度數下至隂陽醫藥無不究其精微教人具有師法大柢以行檢為先而窮經則使之存心靜定而參透于言語文字之外郡縣長吏或有所取正亦必引以當道而使之行其所無事臨終却藥弗御飲酒賦詩夷然而逝由是觀之則公之為人可知也粵自國家統一宇內治化休明士俗醇美一時鴻生碩儒為文皆雄深渾厚而無靡麗之習承平滋久流風未墜皇慶延祐間公入通朝籍以性理之學施于臺閣之文而其文益以粹譬如良金美玉不俟煆錬雕琢而光輝發越自有不可掩者矣時上新即位方嚮用儒術設科目以網羅四方之賢俊而御史君以公在班列之日䇿名於昕陛士大夫尤以為榮論其丗則太平極盛之際也溍浮沉州縣白首登畿忝以非才承乏胄監實公去官十有五年之後無從接聞緒論兹幸獲以疵賤之氏名自附于公是用忘其衰朽荒落而序其梗槩如右後之覽者論其世而知其人則於公之文思過半矣公諱道源字得之系出漢蒲將軍至晉安西大將軍遂避亂入蜀而宋資政殿學士贈太師楚國公宗孟居眉之青神公之考皇贈禮部郎中諱政午又以國𥘉徙興元公嘗為郡學正終更因不復出晚以遺逸徴詣亰師編摩史館供奉詞林尋以博士教國子居歲餘輒自引去詔起公提舉陕西儒學訖不就後用御史君貴以有今贈其年夀卒葬與言行之詳壙有志神道有碑兹不贅述焉致用齋詩集序始豫舉進士至亰師辱遊伯溫父子間時尊公以次對居集賢伯溫日侍左右豫不久亦調輔而去未暇以文字相叩擊也後二十又五年伯溫在翰苑豫適備貟學官休沭相過因出所為詩曰致用齋藁者若干卷𥘉第見其筆勢翩翩東西馳騁莫不如意之所欲出而無艱辛齟齬之態玩味之久乃見其摹寫之工人情物理難狀之景歷歷如指諸掌言皆有實而非徒作也蓋伯溫之少也涉江逾淮泝大河而上徘徊齊魯燕趙之郊以逹于天子之都博習乎朝廷之故事臺閣之舊儀而周覽乎古昔君臣廢興之遺迹有以資其見聞蒙被樂育而翶翔乎英俊之林有以飬其性情逮其強而仕也隨牒逺方﨑嶇嶺海萬里之外長風怒濤魚龍變化巖竒穴怪殊言異服宏大卓絶瓌詭之觀又有以開廓其心目今方載筆屬車之後度居庸陟龍門息駕灤水之陽入則與聞國家之命令出則覩夫山溪之固士馬之雄志愈充而氣愈夷凡形于言者無非身之所履境與神會而託于詠歌以發其胸中之趣是故不待巧為刻飾而文采自然可觀彼屑屑焉掇拾于零編碎簡之中而張為虛辭者未易以語此也伯溫徴豫序卷首輒以所知序之如此云雲蓬集序延祐庚申秋豫忝預校文鄉闈得一人焉曰髙君􅋮雖甚有味其言然竊意埸屋之士苟負其才而馳騁于筆墨畦徑之間者可企而及也後三年識君于錢唐觀其氣貌充然聽其言磊落正大始知君誠佳士非特一日之長傑出于儕輩而巳自是聲迹不相聞倐二十年君不逺千里槖其歌詩雜著曰雲蓬集者若干卷以示豫蓋君退自春官不復踐場屋平生故習刋落殆盡其為文也和易而不迫髙不強同乎古卑不苟合乎今譬如大山長林象犀翬翟玉石怪珍之産雜集其中皆伏而不耀藴積之厚殊未易量豫于是又愧向之知君者不深也豫聞昔人論文有朝廷臺閣山林草野之分所處不同則所施亦異夫二者豈有優劣哉今四方學者苐見尊官顯人摛章繢句婉美豐縟遂悉意慕效之故形于言者類多有其文而無其實君既髙蹈物表不蘄當世之譽凡有託以見其志者非身之所歷則耳目之所接未嘗侈大其説而求以為竒君之于文可謂有其實者也顧豫方牽于祿食操觚挈牘出應時須掇拾陳腐日不暇給徴其實則無有與君相去固巳逺矣尚安能為之品評以序作者之意乎題辭篇端姑識豫愧云爾霽峯文集序宇宙間清靈秀淑之氣未有積而不發天不能閟藏而以卑於人人不能閟藏而復出以為文遭時遇主詠歌帝載黼黻王度則如五緯麗天下燭萬物有目者孰不仰其餘光退而託于空言以俟來哲則如珠捐璧委而輝山媚川終不可掩蓋有得於天者不必皆有合於人顯晦雖係乎時天之所不能閟藏者人亦不能閟藏之也此理之所必至夫何疑焉寧海為縣在東南斗絶處其地多連山穹林而大海距其前清靈秀淑之所聚至是而止瑰瑋之士隨所受之豐嗇發而為文或蕳雅而峻潔或博贍而弘麗往往各名其家霽峯李先生則並遊乎英俊之林而以才自奮于其間者也先生年甫弱冠從流寓之士試藝漕闈籝糧笥書而來者以萬計先生微見所長輒為其苐一暨登名于天府筮仕於邊郡則國步已蹙運去祚移杖䇿東還屏迹海上簟瓢晏如垂將兩紀逹官貴人有知先生者強起而致之亰師先生因作大都賦以進一時館閣諸公咸共歎賞交薦于上擢教授杭學而其賦遂為人所傳誦先生後由杭學遷教授臨江尋以黃巖州判官致其事竟不及以崇論谹議施于大撰著由是學士大夫靡得而稱焉然先生嘗上書闕下懇懇數千言所陳六事皆有關于政理格不行而其藁具存它歌詩古文下至近世駢儷之語筆勢橫放如懸河注水愈出而不竭與夫屑屑然刻雕藻飾以求工于片言隻字者固自不洠也延祐𥘉朝廷設科取士溍以非材叨預薦書先生實預秉文衡後十有五年而先生以髙夀終又十有五年溍亦以年逾六十上謝事之請歸休于田里先生之季子栗始裒輯遺文詮次為二十卷俾溍序之豈非顯晦有時天所不能閟藏者人亦莫得而閟藏也哉昔楊子雲以奏賦受知當時為郎給事黃門而子雲之意本欲以文章成名于後世太玄法言所由作也子雲歿既久法言乃行玄猶不顯學者苟徒誦先生之賦而挹其膏馥以為希世資身之助何以異于向之知子雲者乎必也即其祕藏於昔而顯於今者盡大觀而無憾則先生之為言可得而知矣先生諱洧孫字甫山世系年夀卒葬溍既志于墓上兹不復云吳正傳文集序溍竊聞昔人之論文率謂文主於氣氣命于志志立於學者也蓋三代而下騷人墨客以才驅氣駕而為文驕氣盈則其言必肆而失於誕吝氣歉則其言必苟而流於諂譬如一元之運百物生焉觀其榮耀銷落而氣之屈伸可知也惟夫學足以輔其志志足以御其氣者氣和而聲和故其形於言也粹然一出於正兹其所以信於今而貽於後歟若吾亡友吳正傳氏可謂有志之士矣正傳自羇丱知學即善記覽工辭章才思涌溢亹亹不巳時出為歌詩尤清俊麗逸人多誦稱之弱冠因閲西山真氏遺書乃幡然有志於為巳之學刮摩淬礪日長月益訖為醇儒𥘉𬗋陽朱子之門人髙弟曰勉齋黃氏自黃氏四傳白北山何氏魯齋王氏仁山金氏白雲許氏皆婺人正傳金氏里中子不及受業其門而耳濡目染其微辭奧義於遺編之中間以質於許氏而悉究其旨趣是以近世言理學者婺為最盛然自何氏以來並髙蹈逺引遺榮弗居正傳生今聖時值文運之聿興始以才自奮浮沉常調幾二十年所至能使政平訟理民安其業取知上官用薦者通朝籍同志之士方相與慶幸國人有所矜式俄以憂去尋移疾上休致之請遂不起惜夫所試者小不得盡展其志之所欲為可以信今而貽後者獨其文而已正傳既以道自任晚益邃於文剖析之精援據之博論議之公視古人可無愧其所推眀者無非𬗋陽朱子之學其好已之道勝則昌黎韓子之志也正傳冡子深前卒仲子沉裒其詩文彚次成若干卷以授溍曰先人所與遊相知之深而居相近者多已凋謝而執事與東陽張君獨存先人之葬張君已揭表于墓道惟是家集冝有序以傳非執事將誰屬溍不敢以不敏辭謹考論其師友源流之懿使覽者知正傳之文非徒以才驅而氣駕其夙知而莫成由其有志以基之而又能成之以學也正傳諱師道延祐辛酉進士調髙郵丞歷寧國録事遷建德尹入教國子由助教為博士以奉議大夫中書禮部郎中致其事制下正傳巳卒它所著有某書若干卷某書若干卷不在集中唐子華詩集序荀卿子曰藝之至者不兩能言人之學力有限術業貴乎專攻也若夫天機之精而造乎自得之妙者其應也無方其用也不窮如泉之有源不擇地而皆可出豈一藝所得而名歟且聲之與色二物也人知詩之非色畫之非聲而不知造乎自得之妙者有詩中之畫焉有畫中之詩焉聲色不能拘也非天機之精而幾於道者孰能與於此乎子華弱冠時以善畫際遇先朝嘗登于乙覽而列于東壁圗書之府矣散落人間者好事之家莫不􅊞藏用為珍玩其馳名四方巳三十年固未始規規然若窮閻下士雕章刻句蘄以詩顓門名家而為詩之工如此蓋其詩即畫畫即詩同一自得之妙也荀卿子所謂不兩能者特指夫藝而言之耳詎為知道者發哉是故庖丁之技與飬生之道同不知者苐見其能庖而已誠使易其事而為之則老聃列禦冦之徒矣竊恐時人有愛子華之畫而未知愛其詩者是用表而出之以為序云夏生文藁序豫筮仕寧海之歲屬當大比凡充賦者八十有五人惟夏君洪參年最少其年之最髙者曰陳先生大有先生宋咸淳乙丑進士入國朝嘗以將仕佐郎教授處州春秋七十有四矣豫止先生毋行先生不聽遂上其名于郡府俄有專使持省擊起先生為考官先生又不就卒就試有司已而與夏君俱不合先生既歸老越溪上夏君亦棄舉子業而肆其力于古文蓋與豫别十有六年乃相見錢唐示豫以所為文一編曰邯鄲步者豫為之展玩不巳向令以區區之得失少纍其志能使才隨年長若是否乎夏君一出不售輒逺引而去視先生誠若太早計然較之摧折困踣於埸屋老死而不悔者孰得孰失有不待辨也故豫于夏君之文不屑屑焉鉤托其片言隻字為之品評而獨論次其平生之大槩如此它日夏君年益邁志益堅文當益醇覽者尚因豫言而有考焉方彥登詩後序彥登少好畫以善畫名江湖間已久俄棄去而歸治舉子業下筆亹亹文采論議有過人者試有司一不合輒復棄去不入場屋杜門讀書習為古文辭然未及有大撰著間出為歌詩皆清俊可喜今所存者厪百餘篇蓋彥登死時年三十有四故其可見者若此而巳使假之以年將併棄之而進于聖賢之學矣豈遽止於是耶古者民之師帥必斂其英髦而長育之道德眀秀可為公卿者胥此焉出中材之下亦不大失為善士詩所謂肆成人有德小子有造是也今也長育之者既非有其實幸有不待上之教誨而思自拔於流俗庶幾有志之士矣又夭閼之如此豈非天哉故豫不敢以彥登所已至者為可恃而不朽獨憫其志之有進無退未知所終極而死也嗚呼悲夫彥登之詩有鄉先生江山縣尹致仕徐君所為序評品已詳姑識其歲月于卷左以抒豫哀云爾彭克紹詩序鄱陽彭克紹來亰師示豫以其詩曰學餘藁者若干卷豫愛其出新意而不傷于巧未始規規然求古人之形似而不失其為髙為之展玩數四叩其家世則故四川制置副使忠烈公其祖也豫竊觀宋之季年疆圉雖日蹙而文武材智之士足任方面之重者未為乏人公又傑出其間而能以竒偉非常之功自奮者也謀人之國者視此為何時而使全軀保妻子之臣得以媒孽其短一斥而不復廢興存亡固皆天運抑有人事焉凡公巳試之效著於簡册藏之史官者世既莫得而見其平生所藴未克究于設施者史亦莫得而詳也而克紹以異代事頗諱言之蓋自國家臣一四海弛武不用朝野多暇文治日興為士者惟知涵煦德澤而相與詠歌太平之盛欲訪百年之遺事而故老盡矣顧豫與克紹生今無事之時飽食終日而得以文字相娛樂豈非幸歟克紹之詩有吳仲退先生所為序稱之曰竒材而又勉之曰未可以是為足其望克紹厚矣兹不復云山中集序山中集者東陽胡君師古自名其所為詩也師古夙有文聲而雅不欲以俗學纍其志藴蓄之素一發于詩崇巖邃壑風月浩然父兄子弟自為倡答石樹蟲魚水泉花藥無一不在題品中山林間物色􅼲拾殆盡矣異時有司嘗以月泉山長起師古於家居亡何輒棄去歸隱故廬杜門不復出時人雖罕與之接得其片辭隻字未有不為之擊莭也自豫以斗升之祿奔走四方與師古别踰二十年今乃獲覩是集其雜擬諸作思致髙絶步驟深穩它小篇短章亦蕳逺而有味視古人皆可無歉顧豫方隨俗浮湛強出其蕪陋以應時人之須不能無違繩墨舍規矩而徇其所欲回睨師古敻焉獨立萬物之表不知相去尚隔幾塵師古不鄙辱謂豫盍置一言于卷末豫弗讓而為之書者蓋以志豫愧非敢以為能發明作者之意也凡古今為詩之源流不專繫于師古者昔人巳備論之矣兹不復云學圃詩序翰林主人伯溫甫世居張掖而其别業在長安城東有堂曰飬正之堂堂之左有齋曰仁齋右有齋曰學齋學齋之外有圃直其西北曰學圃雜植𬞞果花木其中而引九龍池之水環屋東西分注于蓮池以溉其圃九龍即興慶池也又于其旁作懷古之臺濯纓之亭四方賔客來過必欵而休焉大篇短章更唱迭和因會稡成卷而俾豫序之或曰昔樊遲請學為圃孔子既婉其辭以拒之復峻其辭以斥之伯溫甫何慕乎豫曰不然樊遲所謂學圃志在圃也伯溫甫所謂學圃志在學也古者自國而鄉自鄉而家莫不有學出入起居目觸心接亦無一事一物而非學園圃者所以育草木也觀天地生物之心周流而不窮則可以驗吾心之仁無一息之間斷因雨露之沾濡則思有以培本而逹支因風霜之搖落則思有以斂華而就實至于蕪穢之不可不去則克治之功自有不容于鹵莽滅裂矣又以其榮耀消隕而推求夫盛衰之故則有以處屈伸進退之際而不惑矣而况水花庭草皆先賢格言精義之所存又豈徒可以供宴娭而已乎伯溫甫即其齋以藏焉修焉所以飬其內性理之學也即其圃以息焉遊焉所以飬其外物理之學也是固有不可偏廢者矣傳所謂人情為田禮耕義種而學以耨之者蓋以農喻學此則以圃喻學也庸因或者之疑而釋之以為學圃詩序群玉集序蕭侯存道世為將家而𬒳服儒術巨公顯人四方知名之士咸喜與之交遺以詩凡三百餘首侯懼久或散軼乃裒稡成編號群玉集俾溍序之嵩髙之卒章曰吉甫作誦其詩孔碩其風肆好以贈申伯蒸民之卒章曰吉甫作誦穆如清風仲山甫永懷以慰其心吉甫為申伯仲山甫兩人作是詩而序詩者皆以為美宣王何歟蓋兩人雖賢有德非宣王莫能任使而褒賞焉觀其職業之修文物之備而周室之復興天下之平定可知也竊意兩人之可稱道者非獨吉甫能知而言之諸公大夫至于國人無不能知之能言之國史采其關于王政之大者播于樂章謂之大雅是故學者得因其文繹其義世守之以為經而史所不能盡録者今皆無所於考矣侯以文武材受知天子將使指樹軍功拊叛民殄狂冦事皆偉甚錫豫之優悉出異數其赫然可見而上繫于朝廷者固當𬒳之弦歌與嵩髙蒸民之什同垂于無窮若夫英俊之並遊粲然有文以相接亦足見方今材華之盛俗習之厚皆國家百年涵濡之澤培飬所致安可以一話一言之細而略之哉冝兼存之以俟後之刪詩者庸弗辭而本諸古人序詩之旨志于篇端云師友集序師友集者張君伯雨所得名公贈言及倡酬之作也伯雨之生去宋季未久其大父漳州通守公雅不欲諸孫豢于貴驕而縱為異時華靡遨放事延儒先以為師教之甚篤而伯雨特聰窹爽朗頴出不群丱歲即務記覽弄翰為辭章方是時前朝遺老宿儒魁士猶有存者數百年之文獻賴以不墜然皆尊其所聞人自為學未嘗凌髙厲空併為一談以事苟同伯雨覿其光儀而聆其緒論如企嵩岱而得其髙臨河海而得其大且深佩服之素固非一日年運而往諸老相繼淪謝伯雨乃以壯盛時去為黃冠師間出而觀國之光屬當文眀之代一時鴻生碩望文學侍從之臣方相與鎔金鑄辭著為訓典播為頌歌以鋪張太平雍熙之盛伯雨周旋其間又皆與之相接以粲然之文如塤鳴而箎應也逮伯雨倦遊而歸入山益深入林益密並遊之英俊多已零落而伯雨亦老矣後生晚出如春華夕秀竒采遞發欲一經伯雨之品題者無不挾所長以為贄而伯雨皆莫之拒雖細弗遺冝其所積之冨如此嗟夫伯雨負其超邁卓絶之材不徒有聞于家庭而脫落綺紈之習遂能遺世獨立周覽六合必欲盡大觀而無憾其髙風雅致固可槩見也雖然四十年間氣運有升降人物有盛衰而文章之變化與之相為無窮述作之家尚有考焉詩文揔若干篇其次苐不係乎齒爵位望而一以歲月為後先方外一二士既編輯而校讎之復俾溍為之序而刻置伯雨所居靈石山之登善庵溍之鄙陋言不足以盡意序續集者寧不為之畢其説乎繡川二妙集序吾里中前輩以詩名家者推山南先生為巨擘傅君景文陳君景傳其流亞也先生曩遊太學未及釋褐而學廢士散束書東歸遁迹林壑間覽物興懷一寓于詩悲壯激烈有以發其邁往不羣之氣自視與石曼卿蘇子美不知何如近代江湖間呫呫然動其喙者姑勿論也二君之年稍後于先生而皆有能詩聲景文之詩精切整暇如清江漫流一碧千里而魚龍光怪隱見不常莫可得而測也景傳之詩涵肆彬蔚如竒葩珍木洪纎髙下雜植于名園終日玩之而不厭也其以氣自豪則同宜乎能接先生之俊軌而與之參翶翔非餘子可得而預也豫年復後於二君而于先生為中表子姪行自丱歲侍先生杖屨而知愛先生之詩顧以材器劣弱局量𥚹小不敢窺其涯涘徒有望洋而歎可以配先生者二君而已豫嘗因先生自序夢藁癡藁聽雨留藁者重加詮次為二十卷題曰山南先生集而先生之交朋皆巳凋謝後生晚出有嗜好酸醎之殊由是未克大行於世二君與先生相繼死而其遺藁亦僅藏于家因訪而求之得景文所作若干篇景傳所作若干篇合若干卷題曰繡川二妙集而序其梗槩庶二君之遺風餘韻有托而不遂泯滅也先生韜光弗耀十五寒暑部使者強致之俾主教事不得已為之起後卒歸隱而終二君從俗浮沉嘯歌自適與先生俱能不以名自纍名且不有詩之傳不傳蓋無足為其重輕也雖然物之顯晦固自有時天下之寶當為天下惜善而藏之以待後世之楊子雲不亦可乎先生姓劉氏諱應龜字元益景文諱野景傳諱堯道云石門六觀詩序東陽多佳山水涵碧有亭肇見于劉賔客之品題戴峴鮑巖水樂環翠至于郭氏之石洞蔣氏之南園凡名公紀詠所及入於圗志者不一而足石門在縣東南七十里山益髙水益深尤為竒境而埋沒于榛莽翳薈之間久未有啓其祕者李君公澤厭城邑之囂煩始闢其地建别業而居焉既大治臺榭亭館據其要會以極逰眺之美又旁攬其勝槩號曰六觀各為一詩鄉先生與時之俊流咸共屬和而太常胡君為序于左方公澤復出以示豫求題辭于萹首唐史載太尉中書令西平王李晟之子十二人咸有仕祿願憲訴聽並至節度使而訴為左僕射同平章事聽為檢校司徒涼國公或曰願即韓文公所序居盤谷者韓公述其言大丈夫以遇不遇為出處可徴也信如或者之説則願嘗秉旄鉞專方面不可謂不遇豈非願身為逹官而心有所不樂遂逺引而去乎公澤故宋嘉定進士吏部尚書寶謨閣直學士之玄孫淳祐進士通判慶元軍府事之曽孫而其祖父俱以世賞輔官其兄仕于皇朝者或以教官從宣政使辟舉入幕而出臨絶域或逰上庠登乙科而纍佐名郡公澤亦嘗被命倅一州獨避不就而甘于肥遁由公澤兄弟視西平諸子名位固不侔而公澤之志則與願無以異也雖然自有宇宙便有此山千載之上盤谷與石門等耳盤谷得願而地始重願得韓公而名益顯石門之有公澤猶盤谷之有願安知世無韓公之鴻筆能鋪張其事以為之序乎非豫所敢僣也矧豫以衰退之餘強顔復起而竊食於輦轂之下奔走伺候趑趄囁嚅其為人視公澤何如尚安能形容其清標雅致之髣佛乎公澤曰子不敢自附于前賢可謂善揣分矣以區區陋微而擬于古之大人君子無乃非其倫乎姑置勿論而以一言相慰藉于風月寂寥之鄉可也豫應之曰敢不諾因次苐其語書而歸之是為序金華黃先生文集卷第十八
