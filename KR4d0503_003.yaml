body:
  text: 賦臨川危素編次番昜劉耳校正離居賦慨豫後古人而生兮恆潔志以好修慿祖先之遺業兮援往列之餘休粵總角以授經兮歲行汨其巳周獨貿貿吾何故兮庶遠悔而違郵攬俊哲以我弼兮懿前志之為謀非夫人察豫之衷兮孰蹭蹬而見收胡閔勉抱兹獨兮曠周旋于窮􅑍廓私處而莫伍兮愴增思以懷愁昔回路之相贈兮竭所獲以交投􅌰並轡以疾驅兮入聖域而彌優彼獨何人兮豫顧忍耻而䝉羞惟昔者之擇從兮極逺討而旁搜衆雜遝其既多兮邈異趣之交鉤紛詡詡以徴逐兮咸胥顧而勸憂曰豫行之不可兮矧將朂豫以良猷居怏悒其誰語兮弦豫歌之幽幽恫愡慌以顧懷兮耿孤倡而無酬哀下圡之坌濁兮駭奔飛其呀咻大龜視豫以吉卜兮曷去之而遐遊廣輪曼曼而靡極兮忽又惑其所由非識路為之先道兮懼九折之摧吾輈羌冘豫以狐疑兮悵臨𡵨而夷猶軫中情之戀嫪兮思勃欎而莫抽噫遺行之巳纍兮固吾以為贅疣弗暝眩之是圖兮何厥􅍚之能瘳堅所秉猶未怠兮悼年歲之易道諒豫懷之既騁兮雖坎壈其敢偷苟非豫之所存兮夫又何求結煩言而招要兮遂矢心以綢繆夫有恃以為善兮詎無成而淹留騷訟魃皇亶正直兮冒下惟仁肇育嘉種兮誕生蒸人胡汝魃之暴亢兮盜威柄以自神禍凶是司兮俾閼厥伸窮千里以逞毒兮豈此土為匪民歲丁未而孕孽兮俶九厄之遘凶乘陽竊出兮霍霍隆隆斥棄輿馬兮謂肥􅖆其猶龍絳㠾􅊮靷兮􅍚赱如風揚氛壒于澮涂兮瞻我野其童童餱糧殫于草木兮搏塊礫之不可食旄倪僵尸兮疆􅴠死力首丘而弗遑兮胡愍隸之可得狐狸飽而跳踉兮腐胔縱橫藋出戶兮室無哭聲野蓁蓁其誰闢兮鄰火煜其宵行皇保下人兮曷椓喪而極斯樂人之死兮職魃所為耗賊太和兮遏玄澤于既施朋殃友厲兮出入敖娭仰九關而􅉨訴兮豫踆踆其屢止曰無往而弗復兮其悔禍之汝俟胡披猖而荐肆兮將窮菑乎今兹扇虐𦦨于熒熒兮導伯强使先之怒氣㶿其如饙兮􅉃薄人之四肢梃刃歘至兮狼顧睽睽曽遺民其幾何兮矧有秋以為期咨汝魃兮誠忮忍而險愎慿妖矜㜸兮畔戾聖則謂吾莫汝燭兮何裸身頂目而辟易有赫臨汝兮顧微臣其何力命不可久斁兮威不可久乘孰怙終而稔毒兮能自逭於天刑皇斯震怒兮尚叱咤乎雷霆斧鉞孔利兮百神效靈害戕屏絶兮鬯嘉生于百齡磔棄妖膂兮沈溺清泠嗟魃弗悛兮後雖悔其何懲答問答客問㒒大德中忝被選舉一時後進之士多見拔擢而㒒方深居田里或譏其苞苴不修以為迂闊乃倣昔賢述其問答之辭云客問主人曰蓋聞周乎道者不貞于小諒通乎變者不偭于俗度所以超尋常而建榮名者也是故劉澤捐百金而王全燕不韋資竒玩以相疆秦由此言之豈非仁者固以財發身耶今吾子餐醇和襲芳華畢弋文翰之林而藩道德以為家有日矣生逢熙洽之朝名厠英俊之列曽不能披金閨歷絳闕騰􅋮翕赩揚眉鼓舌使聞之者膽寒炙之者手熱下是猶不得輸筋力效智䏻于斗食之末然且僶勉趑趄擇地而趨持下執雌以踸踔乎泥塗子之為術不既疏乎于是主人瞪然而視輾然而笑曰若客之言毋乃眩勢交之榮悴昧俗化之隆庳睹􅞬橇之利用而將乘之階戺也曩者王途墋濁僄狡接足恈恈婞婞壤壤矗矗川奔猋馳爪拏角觸富者蹈顯榮貧者嬰賤辱當是之時毁廉爽行懷膏潤以賈媚恱者蓋不可勝録也一旦恩移勢奪權傾位軋金銷石毀星離電滅信夫以膏沃火者膏盡則火微以利錮交者利盡則交絶爾其便翾捷􅍚更起迭仆朝躆要津夕僒羈旅曽得喪之幾何而蒙詬于終古是冝顏子殉志于簞瓢魯連唾睨于商賈長騖獨立蟬蛻滓溷而弗顧也今國家陶泰和溯淳源軼燧農轢羲軒厖恩􅐮澤旁魄布濩圓顱方趾之民濯沭神化者無不抱信讓揭貞素藉禮義之袵席服中正之冠屨時則羣公庶尹濟濟鱗列騰聲發采作世玉雪譬若以伯夷為太傅曾參為司徒公儀休為御史孟公綽為尚書原思為博士于陵仲子為大夫鮑焦給事于黃門黔婁待詔于公車邈哉此非常之際亘億齡之所無繇是遐􅑍裔壤嵬岸之士莫不舒翹振華纓冠縱履喁喁于于以觀羔幣之所抵雖以眇䯢邅逃朝占夕呻亦且睢盱批捩羞沒齒而無聞也然而淹速有時顯默有冝故甘生以童孺都上卿而太公白首乃為萬乘師此理之固然而物之不可必齊者也今吾子處盛時而談叔季當羣居而言財利奈之何笑鳴玉曳履之舒徐而欲挾􅏽離騕􅒁以助其駛耶客乃憮然有間曰夫市井之言不足以陳于先生之前固也敢問君子之將售其志者亦潔名以為髙矜己以自熹而已乎主人曰何為其然也昔百里用秦鬻身五羊鞅介嬖竪􅍏開富疆毛坐重趙引錐脫囊孔舍魯而歷聘摯匿媵以要湯是皆韞不世之閎略將圗霸而謀王誠懼夫􅍏志之弗䆒寧卑已而遑遑夫以鮿生黭淺豪𥙷縷拾退若失九牛之一毛進若增太倉之一粒固冝量簣而容度綆而汲亦安敢肩聖哲而駢立哉乃若樹不貪以為名宋司城之寶也弗枉尋以合汙鄒孟氏之道也斯吾徒之所知而百世之師表也且豫聞之時盈時虗天理之常乃仁乃義人道之綱是以君子立不易方故曰勿行爾悔無患名不大勿信爾欺無患祿不隨客獨不觀夫蘭滋九畹珠媚重淵無脛以自致無舌以自宣至其流光晶吐郁烈則人亦莫得而棄捐也若夫卜生投間于乏興張季藉勢于雄資相如發􅮾于武騎涎公奮迹于沈黎是亦非窶人子之可幾獨共巳俟命而奚疑雜著賈諭曷嘗觀于賈區乎吳之鹽蜀之布㑹稽之美箭代之名馬至于􅃮枲巵茜筋膠藥物之衆無不叢聚區列而貝璣丹銀重淵邃谷怪珍之産又皆篝火腰絙冒百死之禍乃能奪而出諸虎豹蛟鼉之宅亦且畢致而錯陳焉彼其役傭工費舟車遑遑顒顒心計目察笥者間者在筐筥者櫝而藏者辨之患弗良聚之患弗豐耳辨而良則售益博聚而豐則獲益厚其貨誠千金也人且以千金至矣求其張虗肆負枵槖自厠其間而能以操竒贏者無有也于是日昃鼓起囊金適市者莫不鱗集蟻合辨物以莫賈焉方囂譁烟壒之中一旦有委千金于販夫販婦而未嘗少見德色者誠將文致其利而向之千金非以施愛云爾也仁義忠信士之大寶而爵祿車服國家之千金矣夫其為寶也非必燭幽縋深􅍱死地而後能有也彼飾虗懷枵號呼以望售者何憧憧耶償人之直而能無德色者又幾人耶嗚呼市井之事學士大夫所共賤鄙而羞以汚齒牙也今之稱乎大人君子者果何如㦲果何如㦲讀賈生傳屈原死後百有餘年而漢有賈生以適去過湘水乃投書以弔屈原太史公蓋合二子以為傳夫亦徒見生之為文愁痛無聊發憤一欎不殊于原而未極其趣者也夫懷王受欺于張儀疏屈原而不用身陷國蹙為天下笑頃襄親值其亂而曽不悟反怒原遷之江南而楚亦尋滅彼屈原者誠悼夫存君興國之志終無所伸而為是彂憤無聊也生之在漢非有肺附之親歷試之久顧于卒然遇主之頃欲使盡去其舊而唯己之所欲為一不見用則遂自附于原而待其君以亡國之主誠何理耶夫改正朔易服色法制度㝎官名興禮樂事至不䡖也大臣不聞議士不與而遽自草具其儀法可不可㦲絳灌之屬皆先帝舊臣苟逺嫌而不言則誰當言者且此二四公位為將相爵為通俟權寵之盛豈復有過于是亦何忌而不容一新進之賈生耶然則謂生以讒去而遂以配于屈原者甚不然也夫生之始欲改㝎制度也將無以天下為既和洽歟至其論厝火積薪之藝顧在乎數年之後凡其言之可行而必效者大抵皆南遷之餘也吾意生以憂患怵迫習于丗故未必不悔其前言之易而尚肯尤人之短已哉然則今之疾視絳灌之屬而比之上官子蘭者又非必生之志也周人之詩曰肆成人有德小子有造絳灌之屬安足以知此徒使如賈生者不淂盡其材反以年少初學而見斥逺則其䝉蔽賢之譏非不幸哉陸君實傳後叙僕為此叙時固巳不敢悉以客語為信及來京師將取正于太史氏而新史所紀二王事與皇朝經丗大典自有不盡合者史既成而鄧氏光薦家始以其填海録等書上進又不能無所見所聞之異辝謹托其一二附注于舊文之下以訂其訛舛𥙷其闕逸云陸君秀夫之死楚人龔先生開既為立傳且曰君實死事得之里人尹應許尹得之翟招討國秀翟得之􅉝侍郎來莘而君實在海上乃有手書日記日記藏鄧禮部光薦家數從鄧取之不得故傳所登載殊弗䏻詳至公之官位為丞相為樞密使亦且二其傳而莫能定因字稱之曰君實而不爵蓋闕疑也㒒往在金陵客有來自番禺者頗能道崖山事云宋益王之踐帝位也不踰年而改稱景炎歲丙子五月乙未朔宋丞相陳宜中等立益王于福州以為宋主改元景炎升福州為福安府新史所書無非其實而大典據傳聞之辝誤以景炎為咸熙云眀年南遷化之碙州景炎改元之十一月御舟入海自衆而潮十二月次甲子門明年正月次梅蔚四月移廣州境次官冨場六月次古墐九月次淺灣十二月駐秀山召武山一名虎頭山入海至井澳一名仙女澳風大作舟敗幾溺復入海至七州洋欲往古城不果遂駐碙州鎮碙州屹立海中當南北道隸化州見新史及填海録又眀年四月戊辰殂於舟中自井澳遇風驚悸成疾以至大漸遇風之日新史以為丙子填海録以為丙寅越三日庚午衛王襲位是日黃龍見海上羣臣皆賀乃升其地為翔龍縣庚午龍見海中書于新史而填海録以為是日午登壇禮畢還宫御輦所向有龍拏空而上身首甬目俱全暨入宫雲隂不見非見於海中也翔龍縣填海録以為祥龍又以為龍興拜張世傑少傅樞密使蘇劉義開府儀同三司殿前都指揮使陸秀夫端明殿學士簽書樞密院事餘進官有差景炎新造之𥘉世傑為撿校少傅兩鎮莭度使樞密副使兼福建廣南宣撫大使劉義為撿校少保莭度使主管殿前司公事兼諸路經制鎮撫大使廣東西䇿應大使秀夫為中書舍人兼直學士院纍遷權尚書加端明殿學士尋謫潮州明年七月劉義罷經制等使免兼殿司十月秀夫還行朝除同簽書樞密院事祥興嗣立丗傑以樞副秉國政秀夫以簽樞禆助之皆未嘗進拜惟劉義以問官纍加開府儀同三司填海録所載視新史為詳而秀夫之官位與新史為異㑹雷州失守而六軍所泊居雷化犬牙處乃稍北徙廣州之境五月寓梓宫于香山縣尋葬其地上廟號曰端宗陳冝中以宰相為山陵使事畢宜中一夕浮海去莫知所之上廟號以四月辛已梓官發引以八月乙亥永福陵􅓖宫復土以九月壬午朔皆非五月亦非先寓於香山先是宜中辝相位而以樞密使都督諸路軍馬御舟次碙州衆舟皆未㑹惟宜中自南蕃洋轉施往占城纍召竟不至山陵使乃觀文殿學士曾淵子非宜中也見填海録而新史不書六月世傑等遂奉御舟抵崖山崖山者在新㑹縣南八十里巨海中與竒石山相對立如兩扉潮汐之所出入也山故有鎮戍世傑以為此天險可扼以自固始不復事轉徙矣六月巳未御舟發碙州乙亥至新㑹縣潮居里之崖山起行殿庚辰升廣州為祥興府見填海録而新史謂升廉州為翔龍府宜中之去劉義追之不䏻及夜泊仙女灣俄有天火飛集其舟延燒衆舟幾盡劉義追宜中事無可考八月庚申月貫南斗己巳夜復有星大如缶衆小星千百隨之自西北流墮東南海水中聲隆隆如雷蓋天狗云巳巳星墜海中書于新史而填海録以為癸亥夜一鼓後墮廣州南𥘉隕紅大如箕中爆裂為五既墮地殷如鳴鼓一時頃止非墜落於海中也其年十月蒙古漢軍數路並進江東宣慰使張弘範以舟師由海道出漳潮江西行省參知政事李恆以步騎出梅嶺弘範拜蒙古漢軍都元帥恆為副元帥大典所書可考而恆廟碑謂恆為都元帥江淮省亦遣弘範至自漳潮眀年正月已酉朔宋改年祥興行元㑹禮丁已登海舟丗傑就崖山巷碁結巨艦千餘艘為方陳中艫外舳貫以大索四圍起樓櫓如城堞以待敵見大典新史及填海録己未弘範兵至崖山庚午恆亦以兵來㑹乃先遣斷其汲道舟人茹乾糗餘十日渴甚則下掬海水飲之海鹹不可飲飲者亦輒病嘔泄軍中大困事見大典及填海録新史不書二月戊寅朔世傑部將陳寶降陳寶以二月戊寅朔降見新史而填海録及其所撰祥興本紀於正月乙丑書統制陳寶與發發張逹忿爭而降又書統制陳忠與撥發張成不協而降其實一事而月日亦與新史不同癸未大戰恆南向隨潮下弘範北向隨潮上夾攻之恆乘早潮退攻其北至午潮上弘範攻其南見新史恆廟碑不書而弘範廟碑詳書之但誤以癸未為癸未之明日云自朝至日中戰未决㑹日暮雨暴作昏霧四塞宋師部伍大亂秀夫朝服抱宋主赴水死丗傑命小舟取幼主入巳舟秀夫懼丗傑舟或不免或反為人所賣𬒳執辱於是擁之負璽綬自沈後宫及百官吏士從死者以萬數國秀等文武班行之降者猶百餘人是歲實至元之十六年也國秀官承宣使見大典其父貴以復州迎降而國秀在海上為龍神䘙四廂都指揮使㳂江招撫使時貴巳死填海録所載已詳至叙國秀事乃多誤書其名曰貴云世傑知大事巳去乃挾鬪艦十八潰圍奔南思州五月庚戌還至海陵港遇颶風舟敗死焉餘衆盡沒自是嶺海間無復宋軍旗幟矣丗傑劉義等三十餘艘斬纜乘潮而遁丗傑出仙女澳得風入洋追兵不及而還舟至山東欲向占城土豪強之回廣東乃回舟檥南恩之海陵山散潰稍集謀入廣擇宗室子立之六月庚辰颶風大作將士勸丗傑登岸丗傑慮為人所圗即登施樓露香以祝風壽愈甚墮水溺死諸將焚其尸函骨葬潮居里赤坎村劉義出海洋後為其下所殺見填海録云其事往往傳所不書竊嘗有志論録附傳而行以備本事然恨其不能記陸公終何官秀夫終於端明殿學士同簽書樞密院事見填海録新史書秀夫景炎之𥘉為簽書樞密院事祥興之𥘉為左丞相而大典於秀夫之死第稱之曰端明殿學士蓋丞相文天祥家傳謂秀夫以樞密兼宰相者言其以簽樞行相事耳恆廟碑又誤以端明為資政云又慮所談三十年前事道里時日不容無小失謬故久未敢稱述後逰宣城有蘇寶章者縣小吏也㒒邂逅見之戲謂曰前朝貼職乃有寶章誰以是字汝縣吏亦帶職耶其人無所對旁一人曰是人乃蘇劉義之子以恩𥙷官嘗直寶章閣人習呼之而莫䏻變非字也劉義次子景由直寶章閣見填海録㒒為之矍然起將以向所記客語質之其人故為不聞者徑去㒒嗟惋久之因念曰杞宋大國也其不足徵久矣它何譏焉姑叙客語傳末庶幾傳疑之義云爾至大二年春二月東陽布衣黃溍謹叙說水贈蔣春卿陽羡蔣君春卿嗣主安定教事於吳興以秩滿去友生金華黃溍送之苕溪之陽酌之水而與之言曰君知水之為物乎嵌巖礨空一掬之多遺針投芥可指而取非不泠然氷骨雪齒也無搖焉無溷焉斯可耳及其去而為湍為澗也驀山跨谷厯百折而弗顧不既壯歟然而迫於風則驚扼于石則怒矣若夫釃為三江鍾為七澤茫洋演溢涵煙霏而滔日星者漫不知其幾百里泊乎其休汩乎其不可留沈沈乎黃龍之所宫穹龜巨魚之所家蝦蛤生焉而不以為隘也來牛去馬飲焉而不以為耗也鳬鷗出沒焉而不以為䙝也蟯蛔投焉而不以為汚且辱也神妖物怪居焉遊焉而不以為異也千漚萬泡交起互滅瀇滉尓浡潏尓泄之莫䏻害其蓄撓之莫䏻亂其澄潜淵之珍參錯朗耀而荒查醜石屑瑣附麗之物亦無所不容也嗟乎水一而已其量之相逺固如此非夫所處者異勢耶今君之去山谷也久矣接天潢度瀛海且有日盍亦拓七澤以為襟舒三江以為帶而無以是氷雪者沾沾自喜哉雖然水行天地間其適也愈逺則其趨也愈下孔子蓋稱智者樂水夫不激不流非智者不足以與此君非智者與持㳙滴以助波瀾秪彊顏耳離歌既闋風帆遽張因次第其語書以識别記先世墓志銘右墓志銘二通前銘黃夫人宗氏於溍為七世祖妣實故京城留守兼開封尹贈觀文殿學士忠蕳公澤之堂妹作銘者夫人之姪頴忠蕳子也忠蕳夢于汴數日將士去者十五汴人以頴嘗居戎幕得士卒心相率言于朝請以繼其父任時巳除杜充留守乃以頴直祕閣為其判官尋與充議不合去秦檜枋國參政李光得罪免頴坐貽光書有忽聞逺適豈勝惶駭等語降三官銘作於檜死之月曰右朝奉大夫者其元官也又兩月遂為兵部郎中終其官後銘居士黃公夫人第三子是為溍之六世祖公第二子諱紹祖則溍之五世祖也作銘者公之甥喻良能前銘叙女適喻葆光者其父也以子貴纍贈中散大夫子男五人皆黃氏出而其四人俱以文章家知名良倚良䏻同擢紹興丁丑第良材國子進士良弼國學進士龍川陳亮稱烏傷四君子叔竒之文精深蕳雅季直之文蔚茂馳騁叔竒者良䏻字季直者良弼字其二人則何恪茂恭陳炳德先也良能仕子朝嘗為太常丞兼工部郎官以朝議大夫義烏縣開國男致其事有香山集行于世而此銘不載集中居士公樂俯蓋題秦檜所建太平樓佞臣謂檜也公殁逮今百五十有五年遺文皆散落惟所賦樂府猶為人所傳誦溍嘗訪求得它詩文與樂府合五千餘言第為三卷間又從宗氏得此二銘謹録而藏之庶來者有考也記居士公樂府右居士公題太平樓滿庭芳即志銘稱公所作樂府也舊傳秦檜所建按宋史紹興五年五月神武中軍統制楊沂中發卒輦怪石置太平樓殿中侍御史張絢劾奏其事沂中坐罰金是時檜巳去相位則樓之建當在檜秉政𥘉暨檜再相和議成日使士人歌誦太平中興之美樂府所為作也時檜命察事卒數百遊市中聞言其姦者輒捕送大理獄殺之上書言朝政者例貶萬里外忠正之士多避山林間公亦歸隱不復出矣溍既録二銘并以公樂府及何公恪跋文附見其左恪乃龍川所謂烏傷四君子之一也右居士公和東坡百字令見苕溪胡仔所編草堂詩餘評曰東坡赤壁詞語意髙妙真古今絶唱近時有人和此詞題於郵亭壁間不著姓氏語雖粗豪亦氣概可喜溍以家集較之不同者三十九字家集蓋近歲溍從族人訪求編入而苕溪則得於當時壁間所題然亦間有舛誤而不可通者乃傳刻之訛也今悉以家集訂定焉山南先生集後記右山南先生集凡二十卷記曰辭必巳出古也騷不必如詩玄不必如易而太史公書不必如尚書春秋十三國風之作大抵發乎情耳矣然而止乎禮義發乎情故千載殊時而五方異感也止乎禮義以天地之心為本者也其為本不二故言可得而知也有如先生之閎材傑志百不一施而其言猶莫為世所貴則言豈誠易知哉蓋先生自少時為舉子業巳能知非之逮其年邁而氣益定支離之習刋落盡矣故其為文逸出橫厲譬如風雨之所潤動雜葩異卉不擇地而輒發人見其徜徉恣肆惟意所之而止耳世之善為近似者方竊竊然揣量剽掇譁衆以立的而曰吾古學也陳性命者躐幽微辨名數者殫豪末而先生之文遏而不行矣孰知夫繇繇儃儃浮湛俗間其自視吾言蜩甲爾蛇蛻爾豈復纍於稱譏者耶溍受學于先生最久且親誠悼其餘芳溢流無所託以𬒳于後乃因先生所自序夢槀癡槀聽雨留槀者合而一之目曰山南先生集嗚呼是其為言也非出于古非不出於古也夫能不二於古今而有不以天地之心為本者乎綿千祀貫萬彚而無遷壞淪滅者莫夀於是物矣區區之萹櫝尚奚為哉姑用以致吾意焉爾先生之氏名與出處大概溍既為之述兹不復云贊間間贊客有談玄教嗣師間間公於㒒者曰夫間無為也無事也公固方外士亦既登鈞天之庭而主列仙之籍烏乎間僕聞而笑曰嘻蠛蠓不足以語扶搖之髙蛭蚓不足以語𬈑渤之廣安得執迂儒曲士之見以窺夫強名者哉請贊公之道以祛子之惑可乎客曰唯唯乃為之贊曰謂之仕也而委廊廟於泥塗謂之隱也而等山林於蘧廬衆方昭昭我且于于孰知夫白若辱大方無隅出入消搖與道為俱放情八紘之表遊心萬彚之𥘉是固軒裳所不䏻繫丘壑所不能拘夫間之又間者非斯人之徒也歟碑長興州東嶽行宫碑今天子履帝位作神主厥既奉吉玉于廟于郊則遣遍禮羣望且俾有司蕆時事毋缺惟長興之為州北距泰山幾三千里而州西五峯之麓嶽神别祠在焉知州前祕書少監吕公澍同知州事今監察御史馬公鎔承命震惕祗帥僚吏卜日之吉咸會祠下眀盛既蠲法齊既實備服就位周視祠庭榱桷腐敗階序拆陊登降俯伏若罔克施大懼觖民望貽神羞無以稱塞旨意由禮考冝將有加飾乃捐祿廪用為衆倡僚佐吏士交贊而協助焉于是州之大家洎浮屠氏下逮市井工伎販傭之夫莫不稱力而受事分曺而賦㓛凡所以經畫而相勞之者合志殫慮靡有弗恪藻櫨繪栱煥焉聿新龍駕帝服具嚴像設屋之以間計者總七十有八因而苴治者四十有九撤而創制者二十有九經始於皇慶元年之十二月而告成於眀年之三月謹按祭法諸侯山川在封內則祀之未有越境而徼福者岱宗魯望也遐方逖壤奔赱祠事罔敢自後何哉公羊氏稱泰山之雲不崇朝而雨天下其威神德惠之所加𬒳列諸守祀夫亦禮以義起者也或謂人之生命神實制之故特為世所敬畏而尊事其果然耶惟時長吏克謹命祀匪懈有䖍不宜無以垂示來裔也是用揚之頌聲勒兹樂石其辭曰巍巍岱宗包方侔圜列嶽莫亰和氣絪緼有渥其澤飛流寰瀛厖休所加仙閭神府式垂號名惟帝有命崇飾典祀守臣是膺顧念兹宇棟毁級夷惕焉靡寧乃制貨食乃程匠傭新廟以成奕奕新廟豐屋峻墉邃嚴密清神樂來歸鬯其嘉祥旁逹下盈肆時外服遐闊僻陋畢楊鴻靈彌覆極載惟皇之楨屏我有邦㣧于萬年與山不傾篆刻頌辭昭示後則毋替厥承記湖州路總管府題名記代趙學士作古者諸侯之國必有史官太史公始托其所述年經而國緯之合以為表蓋將使有民杜者幸而覽觀焉必且曰某年為何時某侯為何人而我何如也自秦置郡縣既不容有私史猶幸有所謂題名者而可闕與吳興為郡曰內史曰太守曰刺史曰知州事由晉王羲之而下凡若干人亦既列其氏名于貞石矣粵自聖化南𬒳國家遴選仁哲以惠幸兹土者聲相聞迹相接而迄未有所登載也今總管某公始合長二立石為題名而屬豫以記子惟題名之設本以昭歲月辨爵秩觀其氏名與其所以去來而其人之賢不肖可知也善善惡惡而懲勸存焉此太史公之深旨而春秋之微權也昔司馬文正公記諌官題名而繫之以忠詐回直之目使來者知所避就嗚呼豈獨諌官也㦲序陳茂卿詩集序詩之為用其微矣乎輶軒之使不至而挾飛霞簸眀月者徒以自怡於萬物之表而已夫音奏之悲涼意象之荒忽𥘉若澶漫無屬至其使幽人狷士有適而不懟或者舒揚振導之益猶有資乎覽者顧謂其如瑶華琪樹世所罕見探而有之或嗇於用若吾亡友陳茂卿之為詩其亦所謂瑶華琪樹者非耶茂卿平居惴惴寡言容貌不䏻動人生三十年未嘗踰里門以死故時無識茂卿者而茂卿之自窮亦果矣自豫與之交而善而弗獲窺其奧茂卿既死訪遺槀其家亦既無得蓋以殉葬焉因追次嚮所僅聞而可知者為五七言古律詩若干篇嗚呼茂卿緣情序事清邃激越其嗇於用與否豫固莫得而知載而傳之四海之大千歲之久烏知其不有合也而茂卿孑孑焉自窮如此有可為追惜而悼慕乎然豫聞之荊山之韞豐城之閟必有俟以彰其用雖玉煙劒氣非窮山腐壤之所堙滅物之顯晦固繫其逢哉序而藏之庸俟知者不復苟為讓也送葉審言詩後序嗚呼四民失其業久矣而莫士為甚非謂夫賤且拘之為病也饋膳以厚之給復以優之所飬有古之所無而所就無古之所有何㦲蓋昔之生齒衆矣未有不使以士君子自為者而今也惟以其占籍為斷焉耳方儒服爼豆煟然勃興而秀人碩士不得業乎其間者比肩而是彼施施焉于于焉逸居飽食而肆其力於負販技巧者亦豈少哉幸而有䏻砥礪激發稍自出以售於世㦯者且將縻之以簿書束之以律令使之伏其所長而效其所短譬猶任劉纍以飯牛責卞莊以搏彘抑又失其業之大者也若吾葉君幼而學壯而仕未始一日而去夫黨庠術序可謂能不失其業矣乎然豫觀君之用其材奮乎若騎而爭險於猱狖也躍乎若丸飛而矢决也歘乎若揚飄風簸巨海而髙帆大舶出沒後先也俊稱美譽踊溢未已庸詎知不有奪其業而用之儒服爼豆之外者耶今方由吾烏傷教官以秩滿去吾烏傷之士咸相與侈為歌詩以識其别而鄉先生朱公序之偹矣豫固有志於士君子而重失其業者能勿歆羡而贊慕乎雖然豫懼夫奪之者之將至也姑因末簡而私焉以著吾志庶幾乎君無䡖于去就而若豫之有所羡慕也哉夫以君之絶藝殊䏻宜有不止於豢龍刺虎者若將以遊戲出之則非豫之所知矣送孔周卿序昔者七十子之徒蓋以有若為似夫子而師事之矣它日雖以不能對諸子之問叱避而退其記言之書終不敢字稱之而猶必曰有子焉彼其失孔子未久也於質貌之偶同者且尊慕之如此則凡後孔子千百歲而生而見夫隆䫙者升脣者墟頂者河目者面如蒙倛者將皆趍而拜之不暇况其子若孫之克肖者乎厥今孔氏之族日大以蕃其䏻服詩禮如伯魚原性命如子思者豫雖莫得而悉識距夫子五十四世有名文栩字周卿者豫所識也周卿主教吾烏傷三年矣當以秩滿升吾烏傷之士莫不華其行而吝其去豫竊以為孔子之道如天之無專覆地之無獨載日月之不擇物而照顧豈私其家者耶誠令流風餘澤之所存必孔氏謂宜列之公台建之方嶽俾諸大夫國人咸有所寓其尊慕焉可也又豈一州一邑所得而私耶詩曰雖無老成人尚有典刑豫固未敢遽以吾周卿為賢於有子不猶愈乎隆䫙升脣墟頂河目面如蒙倛之偶同者耶周卿行矣豫之屬望於周卿也厚矣凡離曠之思愛助之意既形于群公之篇什故豫獨論其所貴乎孔氏者如此云送徐生序異時為舉子業者劬躬苦思弊弊焉穿穴乎經史百氏之書􅉵不得休垢不暇沭然後能以其藝角強而取勝幸而有䏻自拔於千萬人之中莫不贏糧笥書呻呼踊躍合乎亰師以鬪其一日之技或者屢進而輒弗利又未嘗不闔户塞竇益淬其鋒鍔而望更進焉國家愛士不欲使卒廢乃為之定制凡得舉十有五年者俾輒試于禮部又十有五年而遂升之天子之庭於是天子亦且閔其老而以故事特豫之一官幸者乃得為縣文學其勤且久如此而今也一更訓蒙之職輒升而居其任可不謂大幸歟夫一考之勞非有三十年之逺環十數童子而授之句讀非有抗千萬人之難也而又有官稱之美祿食之冨豈若夫冒險途觸畏㬌挈挈然亟往亟返連蹇困踣沈欎而無聊者哉逸用其力而厚食其報是宜吾黨之士操觚擘箋以歆羡乎徐生之去也况夫嘗自拔於千萬人之中而不得一官以慰其勤且久者能無所致其歎慕之意乎豫獨以為向之求於生者十數童子而巳耳一旦峩冠大裙于于揚揚執經以升於髙座則人之蘄君將有大於童子之所求者矣惟生無幸其所易而忽其所難則雖掉臂于金馬揚眉於石渠而無怍焉可也尚何文學掾之足云珠玉在前豫無以復進敢道其所望于生者置諸篇端焉送飬直師序始吾聞浮屠氏稱其道爽然不與孔子異而世儒恆譏其去尊卑略貴賤無君臣禮其果然哉厥今薄海外內郡縣所置主僧之官輒與角立凡府署之崇傔從之盛往往視守令而其徒卑躬曲意聽命承事之有加焉吾於是知尊卑貴賤不可卒廢而浮屠氏果無以獨異於人也夫何世儒又有訾乎其用於時者以為釋氏子宜捐貨財毁衣服木茹澗飲以求其所謂道誠不宜逐逐焉唯印組之為務也嗟乎是不亦責人終無已乎且古之生人必有君也而一人不能以獨理也必將斂其賢者䏻者而授以事則夫賢者能者冝為世之所不捨矣浮屠氏寧於是而復與人異情耶若直師之負材傑驁庶幾不見捨於其徒者也今方出而官於甬東甬東之人苟隸乎僧籍者望其來而聽命承事之久矣是宜於簿書號令之外有以淑其衆矣其行也猶有兾乎吾徒一言以為贈夫豈自歉於其道而思有異聞乎傳曰大哉乾元萬物資始此人之所以為性而道之所以為本也其為夲不二故浮屠氏不能苟為異也而吾且安取異哉顧其蒙詬於世者不可以無辨焉耳甬東之文學掾曰栁君者吾友也試往諗之其以吾言為弗畔矣乎題跋題陳茂卿詩卷茂卿贈豫詩稱古來賢逹士不當世知朂哉保令德千載以為期嗚呼其望豫至矣而固茂卿所自志也夫窮一世之贊毁不足動其心而獨有待夫寥寥無情之後世誠亦可悲矣今其自託於千載者何如哉攬卷及此流涕而已題山房集孟子稱王者之迹熄而詩亡夫詩生於心成於言者也今之有心而能言者與古異耶山謳水謡童兒女婦之所倡答夫孰非詩彼特莫知自名其為詩耳㦯者幸䏻探幽發竒使組繡之麗𬒳于草木是固知以詩自名而非孟子之所謂詩也吾少嘗學文而知自名其為詩顧其用恆在於山髙水深風月寂寥之鄉措心立言能自異於童兒女婦者無幾耳自吾去丘壑而吾詩併亡今讀姚君山房集乃知吾所以為詩失之此而彼得之非果亡也它日從先生長者山水間尚因吾詩以求孟子之所謂詩者其有得乎跋六經直音周都官為汴都賦至使人不能讀雖以模宣獻之博洽而為之音釋其弗知而闕焉者蓋多矣嗟乎聲韻母文字子也子非母不生執其子以求其母而不得乃憧憧如是耶易書詩禮春秋之文昭揭千古學士大夫童而習之非若夫賦汴都者之鉤竒托隱而使人不得其讀也直音蓋舊有其書陳君是編不過搜其脫遺摘其舛謬為力亦易耳雖然不䏻讀汴都賦何害六經之書一失其讀則二三聖人傳心之奧旨經世之大務所賴以存者幾希矣夫使之日星垂而江河流者陳君是編不有助乎方之樓公竭精􅉵神於魚蟲石樹之細者不又有間乎然豫聞有直音有反切反切之法本於西土今譯人所用二合字是也陳君目是編曰直音而兼用反切者蓋變例也誠懼夫音之未易以直盡也是抑可尚也跋竹靜齊記竹植物非動物冝若靜矣夫一寸之萌至于劒拔十尋而上者氣化而形生之也是果能離夫動耶乃若其𥘉則固靜矣翾飛跂行未有不本於靜者豈惟竹然耶夫知竹之為靜未若夫未始有竹之為靜也方其未始有竹也猶未能忘乎靜也是故竹物也動靜境也物我混融境智冥合則靜且不有而况於竹耶世蓋有執昔人之言而求太極於梅枝者矣先生獨於竹乎若有見焉是非善觀物而不物於物者耶欲知先生者固不必以竹求先生也書吳善父哀辭後右吳善父先生哀辭永康胡氏穆仲作始豫未識先生得先生所為詩而讀之其氣盈而不肆志伏而不折言無緣飾而忠厚惻怛之意躍如也私心慕焉元貞丙申秋豫遊仙華寶掌間因得拜先生浦陽江上先生顧豫喜曰吾二十年擇交江南有友二人焉曰方君韶父曰謝君臯父今臯父巳矣子乃能從吾遊乎子其遂為吾忘年交豫謝不敢先生蓋豫大父行也然自是間歲輒一再㑹㑹則必歡欣交通如果忘年者先生間為豫上下今古人物使審所擇而尚友焉先生之心其有望於豫者哉大德庚子秋有越客道浦陽境上謂豫先生且死已而知其妄也厥眀年某月或又謂先生死矣豫不敢即哭蓋猶幾其為越人之傳也既閲月而韶父之子育以訃至育先生壻也嗚呼先生真死矣先生之先處州人由大父壻龍川陳氏故又為婺之永康人先生嘗以父任入官仕未顯而所為要以直遂其志中歲頗慕管幼安陶淵眀之為人因自放山水間時與畸人靜者探幽發竒以泄其羈孤感欎之思遇意所不釋或望天末流涕其所居室扁曰愚隱先生古冠服不妄笑言樵兒牧竪或戲紿之先生不疑欺我不知者以先生誠愚也晚乃取古所謂全而歸之者自號全歸子云先生死時年六十有四嗚呼先生之夀不必滿於德而其存逺矣志不必究於物而其行得矣稽其存不可謂夭徵其行不可謂窮先生雖死何憾矣顧天之所以佑善人者君子恆若以為歉焉此哀辭之所為作也先生之死豫既哭之以詩故弗復為辭以相之姑追叙疇昔以志豫感愴之私云爾書金剛經後豫嘗見說象者以為其頭如石其尾如繩其脊如床其腹如甕其腳如臼其耳如箕其鼻如杵其牙如蘆蔔根已而取畫象驗之良是它日過南人而問焉則未嘗知其為石為繩為床為甕為臼為箕為杵為蘆蔔根也而其所說無非象也何則彼固以所見者言之耳昔大雄氏有般若波羅密法名之曰金剛世之揣量摸擬以得其說者不為不近而虛白老子直於見處指以示人不即章句亦不離章句蓋其目中有全象久矣顧有待豫共訂其同異豈以豫為善觀畫者耶雖然豫知畫象而巳苟欲識真象當求其非石非繩非床非甕非臼非箕非杵非蘆蔔根者可也而豫尚何言哉書上憲使書㒒烏傷之鄙人也郡縣不見菲薄猥以充員由是昧昧於一來庶幾求伸其所欲為重惟呈身識面昔人所耻輒不敢踵門納謁以速誚讓庸藉不腆之辭致其區區於下執伏惟少垂察焉㒒聞國之所與立者曰人才人才之所由興者曰風俗而風俗之所恃以不墜者曰大人君子古者士之仕也上有求下之制下無求上之法故夫學修于家行孚于人者其鄉之老之大夫若列國之諸侯且以禮而賔送之漢非古矣然而州郡之所舉公府之所辟要非有待於人之求之也唐宋以來士子得以投牒自試而下之人始有求於上覬幸之念生趨競之俗成矣國家剗除前弊改試為課以教不爭其貢士之法即鄉舉里選之遺制也立法不殊於古而得人之效缺焉未著豈風俗實為之歟且古者舉一人而不仁者逺今也一有所舉而巧取豪奪者不知其幾人雖有瓌偉傑特之彥且逡巡引却而羞與之比又安能俯首匍匐以事迂曲於其間哉故所得非鄉里之冨民則貴遊之子弟耳蓋夫睥睨而欲前也其言以為凡物之適於欲者未有不求而得之奈何世之操豫奪之柄者亦且曰是宜有求於我者也然則廉耻之不立豈獨忘身徇勢者之咎耶伏惟眀公以君子之德居大人之位又適以觀人風為職其於俗化之變遷固宜有以品調消息之是未可以為細故也僕生而寒微賴家世遺緒不失身於農工啇賈之列幼而知書年十五六而能屬文時之巨工宿學皆幸而與之進莫不玩其華而望其實也僕於是忽然以疑釋然以悟盡棄俗學之陋而務極其業於力之所至凡聖賢精神心術之妙古今廢興治忽之由固嘗竊窺之而未始敢以為有得也不意今兹誤玷選舉俾受察於下執是用囊書裹糧而來且庶乎親承明問以少抒其平生之素計日俟命不為不久而寂焉無聞倣徨躑躅欲進而不能欲去而不敢上之人未聞有求於僕而僕方汲汲焉若有求於上者其為滯留淟涊之狀寧不起人厭薄之心而重風俗之不美也哉僕於門下既不得有私謁又不容默默而遂巳也輒敢顯誦所聞於左右若夫引而進之抑而絶之眀公事也非僕敢知也惟眀公不以僕之進退為嫌而以人才風俗為念幸甚幸甚祭文祭朱叔文山長文嗚呼世其家者雖古㦯希豈光華之莫續顧習尚之易非惟君子之秉心也諒以直而制行也粹以夷若良玉之不瑑况可得而瑕疵是固出于天性或者有得乎家庭之遺謂冝益大于先烈遂襲𬗋而傳龜奈何乎步武之𥘉唘而遽尼於斯嗚呼哀哉晝夜之道天人之際蓋君之所夙講齊死生於一指兮尚窮逹乎奚疑君之自處雖可以無憾吾黨所未能釋然者悼故家之遺俗方就陋而趨卑曰賢者之有後幸百聞而一窺攀靈車於道周望喬木以增欷跽陳辭而薦酒為有知兮無知嗚呼哀㦲傳栁立夫傳栁立夫者名森當塗人也祖父世醫至立夫遂以其技知名立夫於醫善為脉其治疾决人生死多竒驗然志在德物未嘗挾以為市也人以病叩門不擇貧冨輒往或委金錢率謝弗取即取取足自飬而已亦用是見稱士大夫間而參知政事吳公淵尤遇立夫厚立夫亦喜為之留吳公乃買田築室居立夫不使輒去也𥘉立夫兄嘗誤殺人就逮當死立夫曰兄先人世嗣又有子且吾母老矣吾自度生無益於兄終不能為兄愛其死乃自言有司願以身受刑贖兄罪吏感其誼而悲之乃議出其兄而立夫亦竟得不死然重以立夫故廢法遂論黥立夫當吳公盛貴時士多以善為方出入門下者而特敬重立夫用比貴客不獨以其技也吳公有愛姬無子將出以嫁立夫立夫聞之輒先自娶婦亡何婦死吳公卒欲以姬妻之立夫乃謝曰吾婦雖亡母固在爾吳公曰娶婦非以養姑耶立夫曰不然是方豢貴驕襲美飾而能躬井臼以事吾毋耶於是吳公止不復言姬聞而歎曰吾乃為刑餘之人所棄吾終不可以事人即日脫簮珥入道終其身諸公聞之以為吳公所得姬待賔客皆非常人也以此賢吳公而益重立夫吳公既病殁立夫乃去賣藥黃池上里中子或求立夫愈疾弗為報立夫嘗為稱貸於冨人又弗償也㑹復得疾乃不敢致立夫而更迎它醫它醫以藥溫之病加劇不得已始召立夫立夫診之曰病得之勞而伏暑奈何以剛齊燥之方冬沍寒而立夫言如此它醫素害其技乃謂病家彼固有嗛於君不可信病家將遂謝罷立夫巳而念立夫素長者卒聽不疑竟如其言而效乃奉幣物重報立夫立夫輒罵曰公市人何復以市人處我趣歸而逋無用是汚我也里中子乃大慙悔盡償所貸錢由是鄉閭皆慕化立夫行有不可者惟懼立夫知之也立夫後以髙夀終贊曰先左曺君布衣時客吳公與立夫遊而善常弟畜之亟稱立夫賢有道者蓋寓於醫云以豫所聞立夫為人已疾其治驗甚衆而立夫所著有詅脉圗有可用方今江淮間類多襲用其書以故弗論論其卓恑殊絶之行著于篇俞器之傳俞器之者名時中金華人也其先事錢氏最貴顯錢氏亡子孫世仕宋凡十一世乃至器之器之自少時知讀書能屬文年十六盜起里中器之盡室走辟匿旁近山谷間㑹大軍南下或直其叔母劉所藏處遂為所得將殺之劉懼祈哀器之識其聲知為叔母急走從叢薄中出曰此吾母也即欲殺吾母者當以身代母耳軍士壯其語乃釋劉不殺而心獨竒器之因挾以去是歲至元十三年也器之既與其家隔絶然幸得不死乃惕然自傷思隱忍以有所就於是常盡力其所事蚤夜如恐不稱以此得母辱困更善遇之其年冬至亰帥遂以見公卿貴人公卿貴人憐其儒家子且得所以北來狀莫不歎竒之乃使受學羅郎中所羅郎中者蜀人號倜儻喜士且又貴幸當是時兩都賢士大夫皆延頸慕交之器之事羅郎中數以材見稱因為其子壻由是名益聞諸公間稍得推擇給事尚書吏部為令史居久之用薦者以布衣對禁中𬒳㫖入翰林與纂次本草事遂為太醫令史由太醫遷都水監用例補官監通州樂歲倉秩滿當改調器之自念拔羈鹵官七品是有以復其父母矣乃以親老求便飬遂得諸暨州判官以歸𥘉父母既失器之數從人問求其所在莫能得或言死矣去十二年聲問始來又十九年乃歸閭里之人皆為之歔欷歎息其里中少年子弟多器之去後乃生無識器之者聞器之至爭共來聚觀之不知者見器之以為北人也器之歸時父母殁已久劉亦死再朞器之乃為位制服晨夕號慟如𥘉喪且自為文以祭其言悃欵惻怛皆可流涕也贊曰豫睹器之踆踆然為卑讓君子哉跡其遭值艱難蹈白刃而不讋誠亦能勇矣至身為係纍摧剛下志窮而不䏻自財又何盩也彼固隱畏約以有所待獨死為難乎故曰死有䡖於鴻毛死有重於泰山無所苟而已耳嗟夫以器之之材窮不失仁逹不失義豈俟它日然後信耶行述山南先生述先生姓劉氏諱應龜字元益世為婺之義烏人自曽大父祖向大父夢龍父景辰無仕者先生少恢踈常落落多大志宋咸淳間遊太學馬丞相髙其材將女焉先生不可乃己由是名稱藉甚非直用文墨出小異也於時同舍生掇其緒論或取髙第而先生故為博士弟子貟亡何當以優升解褐值德祐失國乃返耕築室南山之南賣藥以自晦人勸以仕輒不答然亦不為激詭嶄絶事眩俗矜衆也居久之㑹使者行部知先生賢彊起以主教鄉邑先生始幡然出山即席於是至元二十有八年矣終更調長月泉有司以纍考合格上名尚書親友白當詣謁先生笑弗顧銓曺謬以年未及出其名復俾正杭學先生竟不自言眀年遂以疾卒於家夀六十四大德十一年八月二十日也先生偉貌美髯談辨絶人然任氣好臧否閭里少年以為厲巳而相與謀中傷之卒亦無以害也先生學本經濟而以蕳易為宗讀書務識其義趣未嘗牽引破碎以給浮說至其為文雄肆俊拔飈駛水飛一出於巳無少貶以追世好丗亦未有能好之者凡所著為夢槀六卷癡槀六卷聽雨留槀八卷藏于家先生蓋有祿食於世矣而未顯也故識與不識皆稱之曰山南先生如隱者焉𥘉娶吳氏卒再娶許氏子男一人曰鼎孫男女合三人既卜宅于永寧鄉白茅之原將以某年月日窆而未有以昭不朽也溍惟我曽祖左曺府君以文章家知名當世先生以外孫實得其學顧溍之蒙鄙劣弱猶幸弗失身負販技巧之列以隕先業者先生教也先生之庇庥我厚矣而溍安足以永先生之存庸疏其世系出處卒葬之歲月以諗夫志同而言立者尚幸為之銘若誄以揭諸幽云金華黃先生文集卷第三東陽黃君晉卿博學而善屬文示豫文稿讀之使人不能去手其用意深切而立言雅健雜之古書中未易辨也豫愛之敬之適有以吉日癸已石鼓二周刻見遺者則欣然曰是可與晉卿之文並觀者耶皇慶元年十月草九日趙孟俯書右日損齊𥘉槀金華黃晉卿先生少時作舉進士後則有續稿先生故衣冠家及師友前代遺老素至亰師盡得其文而讀之愛其雅暢深密而討論精核蓋及於古矣謹第録為若干卷庸俟學古之君子臨川危素記
