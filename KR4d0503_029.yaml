front:
  text: 金華黃先生文集卷苐二十九續藁二十六墓碑臨川危素編次番昜劉耳校正
  hash: sha256:3a882556605393f0c26a490b6f82a144773215f65e93abbbe8aeef2a86fe8d4d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0503_SBCK_029-1a}
body:
  text: 宛平王氏先塋碑今上至元六年秋八月中順大夫江浙等處財賦都總管王公得請於朝疏恩二代爰狀其實來諗於溍曰是宜有𫐠以章示上賜庶假寵我子孫於無窮敢屬筆於子溍辭不獲則序而銘之按王氏上丗家遼之蓋州總管公之髙祖諱璘知金將亡與二兄禧祺擁衆歸于我太祖從睿宗南政汴愍二兄之死事感激奮厲誓不與敵俱生摧堅擊強所向輒克屢以捷聞汴既下計㓛行賞授虎符𬋩領女直漢軍都元帥奉二兄柩葬于燕之宛平因為其縣人髙祖母曰亦刺氏曽祖諱德璋襲父職仍為管領女直漢軍都元帥曽祖母曰吾古倫氏祖諱堮通文史練尤善譯語事憲宗為必闍赤而以材學受知丗祖擢禮部侍郎於是國家龍興垂六十年上方注意稽古禮文之事所以潤色鴻業者左右佽助與有力焉居歲餘出為真定路奧魯總管真定於河北為巨鎮民多占籍軍伍撫馭之甚有恩意人皆德之祖母曰李氏斡里根氏父諱承良好修而嗜學歷觀古昔廢興失得之故而慨然有志於當丗鮮有能深知之者嘗由行工部怯憐口總管府令史輔徽政院掾史調將仕郎兾州等處納綿提舉遷從仕郎崇祥監知事監升為院以承事郎為其院都事又以承務郎為其院之規運提點母曰李氏魏氏四丗皆祔葬宛平先墓之次此其系序官業之可見者也初總管公由晉王內史府掾升記室遂入掾中書以文林郎任禮部主事始贈其父應奉翰林文字丈林郎同知制誥兼國史院編修官及公以殊祥院都事遷宣政院經歷轉奉直大夫參議院事乃贈其父奉議大夫樞密院判官驍騎尉太原縣子其後公自大宗正府左右司郎中改授大都兵馬都指揮使又贈其父中順大夫兵部侍郎上騎都尉太原郡侯至是公以中政院判官拜今命遂追贈其祖翰林直學士亞中大夫輕車都尉太原郡侯李氏斡里根氏並太原郡夫人加贈其父嘉議大夫禮部尚書上輕車都尉太原郡侯李氏魏氏並宜人纍遷至太原郡夫人公妻孫氏亦以從封至太原郡夫人蓋自尚書府君而上四丗咸有官序而藴蓄之素未克大施福祉所儲總管公實承之公名洪字彥弘少受學於鄉先生同門莫不敬服事斡里根夫人定省之莭衣服飲食之供靡所違缺寒夜則捧其足而卧病目則每旦以舌舐之至病愈乃巳尚書府君既殁家事悉咨於魏夫人而後行得祿必歸之且舉孫夫人奩具以奉焉先丗所遺田廬則盡以卑其子慶不幸慶蚤丗喪之喪過哀人尤以為難有餘資輒分惠其三族貧無所依與不能具吉凶之禮者則贍給之所引拔登仕版者二十餘人其居家孝友如此至於蒞官臨民績用尤著始入內史府來謁選而六七年不得調者三百餘人亟為關白程其材品較其資歷而輔署焉天曆𥘉通州三河潞縣之人為東兵所殺掠兵未息而又苦寒公時在宣政院中書傳上旨俾往賑之賴以全活者甚衆收瘞其死者四千五百餘人誘還其俘虜者三千五百餘人兵馬司主求盜事最叢劇而能使庭無留訟皆其灼然可紀者也觀公名位之進則積善之慶為可知觀公行治之修則義方之教為可見是用牽聮而備書之公有子二人長曰惟德國學生次曰螟蛉女三人皆在室其蕃衍盛大未艾嗣是冝有屢書不一書者銘曰王氏之先奮自遼東際逢興運克有伐㓛耒居于燕蟬聮變葉踐敡中外圭重組疊志局于位厥施未光委祉後人五丗而昌煌煌密章馳恩父祖升華禁從疏封胙土惟神在幽𬒳服褒嘉假兹寵靈大啓厥家史臣作頌庸侈上德勒諸堅珉昭示無極藍田王氏先塋碑藍田王公以奉政大夫僉浙東海右道肅政廉訪司事分按婺之屬邑溍適以衰謝跧伏于田里公不鄙見臨而謂溍曰豫兒時侍先大父之側大父數顧豫而言吾家徙居藍田逮汝六丗地豐美縣之于里莊先隴在焉粵自版圗入于皇朝墟墓兆域為豪民所變易吾宦遊四方去藍田久慨念狐猶知首丘汝其勿忘豫聞而志之惟謹豫自獲𬒳官使揚歷中外四十餘年未嘗一飯不在藍田下隧道之碑雖存而多剝落然亦間有可考幸為豫追書其概而重刻焉庶他日圖輔報之萬一而歸老於彼卒成前人之志也溍謹按王氏系出太原廉訪公之五丗祖諱臨淵字伯龍金末登進士第纍遷通判商州藍田商之名邑覩其山川巨麗陕右衣冠所聚心甚樂之因留家焉四丗祖諱彪字虎臣有膂力善騎射稱雄一峕卒官藍田尉曽大父諱子山字安仁始隱弗仕父諱榮字荗卿仕國朝為奧魯官父諱自邇字逺夫從韓徴君遊能講周公孔子孟軻聖賢之道而通其大意陜西行省辟為掾屬以久次授荆陽尹為政曉暢夲末聲譽籍甚擢江南諸道行御史臺監察御史未上而卒今纍贈某官廉訪公名武字仲幼與群兒戲大文見其頭角嶄然不類常兒指以語人曰亢吾宗者必此兒也公既長克自樹立由歲貢入仕歷西南兩臺監察御史入為大宗正府貟外郎拜監察御史出僉四川廉訪司事公天性剛方操履端慤嘗謂朝廷寄耳目於內外臺察官吾終不效塗聰塞眀以苟祿固位遇事輒發無所回撓會奉使宣撫行部或誣公有所私奉使不察而薄問焉公不為屈廳事梁俄壞大蛇出其中衆駭𣪚明日有神降奉使前慿其傔人跳踉呌呼抱公而泣曰公實廉潔勿妄汚公奉使大驚事遂解乃改擢浙東有識之士或稱之曰進思報上忠也退不忘所由生孝也可謂精白一心篤行君子者矣𥘉公當授父廕推以與仲弟或調都稅使或亦能力學而承其家公有子惟吉今為國子髙等生蓋其丗次可見者如此昔韓魏公訪得五丗祖塋於深州慱野之蠡吾鄉一新其封植而為文以記曰謹家牒而不忘乎先塋者孝之大也子孫其志之迄今二百八十年韓氏子孫丗守其遺言而不墜廉訪公敬共祖訓而惓惓於五丗祖之塋其能盡孝與魏公固無以異若夫事君以忠則其宦業視魏公猶未艾也溍不侫敢托公所言序而銘之公歸刻諸樂石來者無忽焉銘曰顯顯王氏系出太原家于仕國商之藍田蟬聮再丗食兹樂土久乃去之不留不處恂恂隱君沒身布韋傳子及孫際今昌峕懷材自奮後先踵武卓惟御史受知聖主人方側耳朝陽一鳴胡不憗遺不震以轟承之有人靖恭正直追逺不忘孝思罔極緬彼故丘雲深木寒使事有指曷云其還有欲必從匪朝伊夕來瞻來崇載新封植馳恩所加國有典常天日覆臨孰敢壞傷嵗時展省益謹其守式固且安大庇爾後吳府君碑泰定元年嘉興吳君漢傑以所居官品苐七用著令得請于朝追贈其顯考府君承事郎溫州路同知瑞安州事仍封其母陳氏妻陶氏皆宜人厥眀年漢傑用舉者以夲官署五品職於是府君纍贈奉訓大夫江浙等處行中書省理問所相副官飛騎尉追封嘉興縣男陳宜人陶宜人並纍封嘉興縣君漢傑祗奉命書齋肅以告巳事而退竊自念言所以致是者實先人積纍之效福慶衍溢賁及生存國之寵靈非孱焉不肖所克負荷宜紀丗德以承天休垂示後嗣永永無極爰以四明黃向之狀來謁文溍惟府君之里居丗緒年壽卒葬列於吳興趙公所為志趨操行事施豫惠利播於永康胡公所為銘庸敢掇取其大者以為植德儲祉之符而顯詩之府君姓吳氏諱森字君茂其先汝南人後徙居嘉興祖實父澤並宦事宋為水軍正將君少襲武辨以沿海制置使李公曽伯辟署準備差使仕而未顯功伐弗揚國朝至元間以征東行中書省右丞范公文虎薦任管軍千戶遭時承平始遂逺引𥘉府君既失所怙悉推資産以歸二兄以鞠其弟妹逮有家室推是志也逹之於鄉鄰飢有米粟寒有繒纊病有藥餌死有棺槥舟梁道路倄除惟時輟田四百畒闢書孰聚閭巷子弟延師儒以教之由是人知有學有司狀其顛未移部使者核實以上中書用近比署其門曰義士云其寢疾也遺命捐種户逋租猶三千石春秋六十有四以皇慶二年五月癸酉委順而終窆于所居西北之麟瑞里於歲行既周矣府君有子四人長曰漢英從仕郎平江等處財賦提舉巳卒漢傑其苐三子承事郎溫台等處海運副千戶今方以材顯融於時貤恩所及未艾也嗚呼君子之為善非以近名而名隨之表立景附聲震響從有不期而至者矣然其蓄也厚則其奮也不亟易曰積善之家必有餘慶吳氏其成於積而出於有餘者平銘曰皇諏古制弘敷孝治疏封班秩咸錫爾類顯顯府君匪以子貴啓慶自躬曰有吾義其義斯何在物為利由家而鄉弗屯其施單夫窩人幼童弱稚室無凍餒俗有孝悌為而不居嗣人之遺乃播乃穫乃引勿替有命自天下飾丘隧赫其龍光松柏衣𬒳朂哉嗣人無敢失墜便蕃申錫如川方至增崇夲始覃及來裔尚不一書斟酌祭器華府君碑華氏之先出宋戴公肇自考父别於大宗食采於華以邑為氏傳子逮孫丗為卿士源逺流分譜軼莫詳公之所祖家宋大梁避兵南遷常之無錫卜居梅里克有隱德曽大父智大父曰詮輔將仕郎遂卒于官父曰友聞屬當內附仕于其州提領稅務母曰袁氏實人璞公之諱其字德珍也幼有美質不煩師教平居沈靜寡於言笑出與事遇剖析是非具有條理無失豪釐年登六帙母故無恙先意承志惟其所向兄弟子姓合食同居處之盡道家庭穆如奴隸有過亦為掩覆託以他事遣之使去丗降俗敝豢於富驕公矯其失疏食緼𫀆薄已厚物樂施無靳族姻之貧時加存問或辭不答輒為愀然懷金遺之或以勿言貸人以錢不厚取息三取其二人以為則推已之善及乎鄉鄰敦本抑末言之諄諄人有鬪訟必諭以理啓其良心俾窹而止或以資産欣于有司曰汝姑退歸而自思兄弟錢財孰輕孰重吾償汝欲汝母妄動其人愧謝雍睦如𥘉一家之讓化行里閭歲適大侵民食弗足時方有詔以官昜粟公輸所蓄千石有竒法當得官公乃固辭或􅞮之行公曰不可民命方急何睱私我遺榮弗居浩然而歸山椒水澨以敖以娭僧某人者同飲至醉曰公欲官吾力能致公紿僧言可仕者峕官非三品吾有不為僧走京師薦于當路授公總管屯田打捕俾以其職涖治河東晉寧兾寧為其四封卑以右階進義挍尉秩則三品視郡長吏有隕自天公懼且疑卒辭不就老於布衣至順改紀二年辛未四月某日乘化而逝六十有七壽匪不多年不滿百命也奈何重紀至元二年丙子九月某日葬所居里兆其墓位冷村之原反壤而樹式固且安同郡王氏公之元配沒先於公十有九嵗子男六人嫡長野仙以才自致列于朝班居功德司為其都事二十有六華年蚤丗次鎮及鎬年俱弗長鈞則未仕鏐亦蚤亡鎡又其次年方幼稚其女三人惟仲前死餘皆有行歸于名門壻鄧大亨暨錢宗元孫男七人十有一女野仙所生長曰幼武次為宗道浤及慶年次靜及潚𥙿又次焉曽孫男八其女有四由夲而支綿綿丗系為之狀者陳君子平以授幼武使來謁銘溍弗敢拒勒此貞石發其幽潛昭示無極弘文𥙿德崇仁真人薛公碑公諱玄曦字玄卿姓薛氏其先在春秋時為列國至唐而河東之族尤著有仕南唐為其司徒者宋秉義郎習其後也秉義於公為五丗祖嘗官于信州因留居貴溪縣之仙浦里曾祖諱瑑太學進士祖諱士亨晦迹不顯父諱勉以學行見稱于鄉私諡文清先生四明袁公志其墓公生而頴異舉動不類常兒雅不樂紛華年十二辭家入道龍虎山師事故開府大宗師張公及今特進大宗師吳公始至亰師即出遊渤海碣石間縱觀古靈仙之迹人莫知其所在久之乃還仁宗時用薦者得召見侍祠延祐四年制授大都崇真萬壽宫提舉居三嵗升提點上都崇真萬壽宫一峕巨人元夫俊遊之士皆在朝廷公周旋其間接聞緒論學日益粹泰定元年奉詔徴嗣天師既至𬒳旨住鎮江之乾元宮未行扈從灤陽還至龍虎臺喟然歎曰楚雲江樹遐阻萬里引領親舍寧無惻然於中乎即日辭歸士大夫咸送以詩蜀郡虞公為之序三年八月也公既歸則闢清寧齋見心亭熙明軒築瓊林臺於龍虎山之西髙爽靚幽各適其冝日與學仙者相羊其間而密修大洞廽風混合之道蓋嘗遇異人而有所授云由龍虎山抵貴溪惟篠嶺最為峻絶乃作屋其上號崇賢館東為振衣亭仍割私田具茗飲以息過客臨川吳公為作文以記之𥘉公所祖真人孫公住杭之佑聖觀孫公仙去法席久虗至元六年外宰相部使者暨諸官僚具書幣迎致公輔其處辭不就至正三年四月八日上御明仁殿集賢以聞制授公弘文𥙿德崇仁真人佑聖觀住持兼領杭州諸宫觀公不得辭乃拜命而遣弟子攝其事以遂髙舉逺引之志焉公性孝友父殁自京師奔赴而歸犯霜露􅚼草莾哀號頓踣若罔克生專意致養以慰其母而恤其弟母年八十有三嘗與公俱感微疾既瘳而見母喜極以悲五年正旦之日公將復見懼傷母懷使人請曰願母安意母戚繼此當數來省也自是𩔶造山中之耆舊及常所與遊者若訣别然俄一日酬酢詠歌如平時坐及夜分具盥濯畢語弟子曰天地之間何有非幻吾其逝乎厥明翛然而化是年二月七日也春秋五十有七異時公嘗遊所居東五十里之辰虹嶺愛其岡巒廽復林木蒼潤澄潭前匯秀峰外峙神氣翕聚宜為樂丘乃築壇其處名之曰棲神至是弟子陳彥倫巳卒諸孫詹處敬于有興王景乎及趙宜𥙿等七十餘人卜以某年某月某日奉冠劒而窆焉遵治命也宜𥙿故宋諸王孫清修文雅尤為公所愛重念無以伸罔極之報爰伐石以銘為請惟公夙負才氣倜儻不羈讀書日記萬言自孔老之學至於天文地理隂陽數術靡所不通善為文而尤長於詩豫章揭公留瓊林月餘齋三日乃為作序稱其老徑深穩如霜松雪檜百折莫能撓清拔孤峻如豪鷹俊鶻千呼不肯下蕭條間逺如空山流泉深林孤芳自形自色不與物競人以為知言公書札極麗逸片楮出人爭欲得之有聞公之風而未之見者或使圖其像以去見心亭後有土阜隆然人稱之曰薛公墩其見重於時如此公自號上清外史所著有上清集若干卷撨者問一卷會粹群賢詩文為瓊林集若干卷謹因冝𥙿之請托張君天雨行狀所述序而銘之銘曰二氣絪緼降靈合真鍾粹姿兮超丗拔俗秉端抱擉自得師兮誕啓玄祕運行天地執元機兮金苻玉章闔隂開陽徹萬微兮􅌭其來下感契鴻化際昌時兮侍祠竹宫肹蠁豐融輯蕃釐兮飛佩珊珊頡頏群仙同宴娭兮幡然髙蹈含光弗耀謝􅎗鞿兮山英川靈前驅屏營遄其歸兮泊乎其休與造物遊葆醇熙兮薰陶所至動植生遂不癘疵兮顯晦自我無可不可人莫窺兮穹巖邃谷崇臺列屋樂莫支兮以身為纍蟬蛻而逝忽若遺兮寥寥上清渺渺玉亰邈難期兮方壇密室千嵗一日閟音徽兮弟子摧慕返壤而樹尚何為兮謁辭揚芬篆兹貞珉表時思兮玄明宏道虛一先生趙君碑先生諱嗣祺姓趙氏故宋魏悼王十一丗孫南渡後家于龍泉父曰若釨生先生於宋亡之明年幼即不凡稍長慨然有出塵拔俗之志年二十四學道于武夷山天遊道院髙士張君德懋凝神宴坐未嘗出山張君携之至錢唐謁其師真人杜公於宗陽宫一見大竒之公方兼領吳興計籌山升元報德觀其旁有通玄觀則公所創也遂令張君居通玄先生居升元以便於咨叩久之杜公欲廣先生之見聞乃勉之出遊京師諸公貴人多慕而與之交方是時開府上卿張公以大宗師主教事今特進上卿吳公為嗣師咸加禮遇因挽置館下聲譽日起延祐元年有旨以先生住仙都山玉虛宫給以銅章俾用甲乙相授受仍兼少微山紫虗觀提點焚修仙都少微皆先生鄉郡之名山也又嘗住金陵之玄妙觀至順元年錫號教門真士玄明宏道虛一先生虛一蓋先生自號因以命焉人以為榮尋詔改玄妙觀為大元興永壽宮出內帑金帛使加繕治先生即以造大殿建法輪且出私錢作堂宇及外門會升元住山姚君季安仙去先生奉制命嗣為住持涖事未幾為建大門買山四百餘畒修飭敝壞輔苴墜缺靡憚其煩吳郡有胥氏之崇福觀管氏之玄真觀張氏白鶴觀俱備禮求先生主之既得旨以崇福玄真隸永壽及先生至升元遂兼白鶴先生於吳興金陵並領夲路諸宮觀欽承上意扶植道教不遺餘力其徒賴焉在玉虛時兩將使指代祀太華吳山江瀆嵩髙王屋濟源竣事過家慨然興追逺之思置田若干畒卑猶子仲成給春秋饋薦之事乃還京師以乘傳函香蕆祠事於龍虎山宣大護持詔書於江淮荆襄廣海八番諸郡使莭所憩𩔶覽勝概而訪求巖穴之士得一善輒薦揚之先生自奉甚約終身不茹葷而坐客常滿搗珍擊鮮為具必豐尢喜推轂士類賴其引重而成名者甚衆先生既厭紛華甘淡薄歸休于大江之南而往來山林間凡十年偶自升元至宗陽遂至白鶴忽顧謂弟子表守約曰吾丗緣巳盡將回光而返照矣因索筆書遺言俄斂茟奄然而化至元六年十二月十九日也春秋六十有四其明年是為至正元年十月十五日守約與永壽之弟子楊玄鑑等奉遺蛻藏于紫雲關乾元山之麓以狀介真人華公來徴銘竊觀先生年壯盛時果於求道窮居獨遊邈不與人事接及出而酬酢丗故未始絶物而於物無所凝滯卒乃逺引而去餐和飲醇以終天年出處之際庶幾可以無憾矣是宜銘遂為之銘曰古之德人與天者遊無纍於物不激不流卓哉先生夙志輕舉草衣木食坐閲寒暑幡然而起一息九州乃侍明廷乃謁介丘時行時止無往不復歸領珍祠返乎𥘉服捐巧棄智以佚其軀委順而化棲神清都原始要終刻此貞石貽爾後人用慰罔極體仁守正弘道法師金君碑吳之長洲有為老子之學者曰金君諱善信字實之家故儒也曽大父曰琭大父曰暀父曰煥漳州路龍溪縣尹母沈氏顧氏龍溪之墓故翰林侍講學士揭公實為之銘君幼凝靜少長好虛無之説欲辭父母去而求師父母不可授以家事而羈縻之君應酬少間輒取老子書反覆玩味久而曰老子之教𥘉不必毁形絶丗若今人之為也吾黨如蓮花生汚穢外接丗緣內無所搆鬪何必去父母哉既止不行且納婦有子矣乃曰父母留我者我無不盡其責古之至人雖不必草衣而木食嚴棲而穴處然學必有師我將從有道者􅈬正焉時玄妙觀有雷師生不識錢數能以符篆捕逐鬼神君甚敬之由是冠其冠而為之執弟子禮巳而聞莫先生洞一者嗜酒醉輒詬罵人雖王公不避時時呼雲役雷狎褻如兒戲然君知其有道者則延致而尊事之有所折辱未嘗為之動色或毀其所甚愛之物亦不以為意先生知君信之篤悉授以不傳之祕他弟子不得者而君盡得之遂建仁壽觀于城東北隅日與其徒研核姒旨凡旁門小道力排斥不少置其言以為心神至虛無所汨沒氣定光出諸隂銷盡諸陽自集蓋有形者隂無形者陽陽益勝隂氣益調精我得清靜去道無難矣知之不親見之不明枯稿於山林何益乎蓋其造道之本末可見者如此君𥘉為子弟時無私蓄既壯能使貨倍其舊鄉里有紏紛不可解輒為揣摩洞見底裏類使之以柔退不爭取勝遇時之名流必加敬禮有不給則周之未嘗務遺丗獨立以為髙而其襟度特為沖曠闢一室植挂樹若干本於其前題曰桂軒列一二古圖畫徜徉其中飄飄焉神仙人也故賢士大夫多樂與之遊君年雖髙而視聽步履如強壯一曰呼左右謂曰吾死矣遂奄然而逝非真有所得惡能處生死之際若是哉君生於宋咸淳九年十二月十一日卒於今至順二年二月一日年五十有九以其年三月某日奉遺蛻葬于武丘鄉半塘之原君所自營也君妻溫氏事舅姑克盡婦道教育其子若女克盡母道人莫不稱之子三人大亨大振大謙惟大謙為溫氏出女四人孫男女合若干人葬後十七年大謙始以建安陳方之狀來徴銘昔老子嘗為周柱下史周之舊典禮經無不知之非棄絶人倫者也至其以無為清靜為教漢人用之而天下以治豈無益之學哉老子逺矣今道家者流所宗漢天師張氏既舉賢良方正直言極諌其子若孫或徴為黃門侍郎或辟為丞相掾祚胤相承逮今千有餘歲不絶有能遵其軌範無廢人間事有以究夫道之所存不亦善學老子者乎是可銘也已始君受知嗣天師留國公起為廣德路道録仍提點仁壽觀卑之號曰體仁守正弘道法師且以聞于朝再下璽書為之加護豫既備著君之道至於出處之大槩亦不得而略之也銘曰老子有云修之於家其德有餘歷丗既久襲訛踵偽寢迷厥𥘉歸潔其身長往不返木石與居有美一人清風峻標列仙之儒養生有道不斷外緣神明內腴謂人一心無撓無雜漠然沖虛滌除玄覽抱一不二方與道俱惟是所存久而愈晣百丗不渝有崇斯丘表以石章過者式諸玄門髙士陸君碑髙士陸君諱應祥字景雲丗為平江人曽大父曰士元大父曰邁父曰文明母戈氏君甫成童而失所怙能自刻厲檢飭內則奉其偏親饘酏滫瀡必適所欲撫諸稚妹及笄而嫁咸得所歸外則殫其勞勩以植立門户遇事無小大處之如轉丸鄉鄰有紏紛不可解輒以為請隨啓其端莫不洞中窽郤其幾警練逹衆共推服焉性淡泊無厚嗜經營積纍餘四十年資業得比素封未始妄用黍絫圭撮以資革靡恆戒子弟以勤儉承其家然樂賙人之急族黨不能自振者多仰以食嵗飢設糗餌於路以活餓者𣪚錢動以萬計尤篤信釋老氏不喜殺雖為賔客修具鮮薧之物亦取諸市凡所施與往往傾其囊禇無毫髮顧惜意新萬壽寺大殿而造佛菩薩像田卑北禪寺以興復其觀堂所居傍光孝觀摧圮不治首為搆髙閣廣殿方丈之室餘宜有而未備者逮屬疾猶俾緒成之其創置則有笠澤之瑞雲觀以棲十方羽士橫山之瑞雲菴延流專領之給以田有差作浴室於城南燂湯織履以俟過客而休焉者冬有鬻縻夏有茗飲嵗以為常他所建饒益事不可悉紀也維陸氏實吳之著姓上下千百年名公顯人史不絶書而君之先比數丗皆韜光匿景無所表見君生逢盛峕頗欲以材自奮百未一試輒引身去著道士冠教主嗣天師因命為玄門髙士瑞雲觀開山住持仍剡上而加護焉君謝不敢當尋詣句曲山參受大洞經籙於上清宗壇意將餐和飲淳以葆其餘齡且示無所用於丗也年七十有二元統元年十月晦終于家明年二月朔葬吳縣橫山北先墓之次配周氏子男一人曰德原女二人長適沈宗德而卒次適施從政而從政又先卒孫男一人曰頥尚幼女二人長適徐元震次未行既葬德原以狀來謁曰先人嗇已而𥙿物平生惠澤在人甚多而未嘗自言今所述特其粗爾幸即其可知者序而表顯之豫既辭弗獲則悉取狀所述次苐為序而系之以銘俾刋于兹碑銘曰泉其可欲不榮以祿而無殆無辱行事以智利物以義而無怍無愧不亡者存揭德有文是率是循在爾後人金華黃先生文集卷苐二十九
