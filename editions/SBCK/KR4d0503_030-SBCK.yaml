  text: 金華黄先生文集卷苐三十續藁二十七
  hash: sha256:e97effae3ec701d59c7cff4ff1f95ff13e547c5755f60b497d0a06242c3e1f36
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0503_SBCK_030-1a}
body:
  text: 墓表臨川危素編次番昜劉耳校正蛟峯先生阡表故宋禮部尚書方公㦄事三朝爲時名臣宋亡晦迹弗仕學者因其自號稱之曰蛟峯先生如隱者焉在丗祖峕旁招遺老以待咨訪詔御史中丞崔或起公於家辭疾不赴以髙壽終今天子稽古圖治誕命儒臣刋定前史以鍳觀其得失而有司莫能奉公事狀以聞竟不爲立傳書巳上而溍與公曽孫道壡適同在史館因得公言行之詳乃撫其大要而序次之以授道壡俾刻石爲阡表庸備史之闕文謹按方氏睦之淳安人公曽祖汝翼贈宣教郎祖謙贈朝散郎父鎔封奉直大夫母邵氏贈今人公􅀄名夢魁淳祐十年理宗臨軒䇿士覽公所對敷陳鯁直親擢為進士苐一賜名逢辰故公以君錫為字用例􅀘亰官簽書平江軍節度判官㕔公事寳祐元年召爲秘書省正字升校書郎引疾去官除著作佐郎未命除知寕國府未上並以言者罷開慶元年召爲著作郎兼權尚左郎官居無何復以言者罷除知婺州以外臺奏􅃦新命除知嘉興府未上改知瑞州甫及朞亦皆以言者罷咸淳元年召爲司封郎官兼􅀦史院編脩官實録院檢討官兼直舎人院累遷秘書少􅁥起居舎人三年出爲江南東路提􅀧刑獄公事徙江南西路計度轉運副使五年入權兵部侍郎同脩國史實録院同脩撰兼侍讀七年知貢舉竣事除吏部侍郎丁内憂服闋以侍左侍郎召辭不赴自是不復岀德祐元年除亰湖四川宣撫司叅謀官權户部尚書改禮部尚書俱以父疾辭遂丁外憂此公所閱之官也秘閣脩撰公之軄也承事郎若干轉至中奉大夫公之階也某縣開國男食邑三百户公之爵也鄭丞相清之秉政御筆以雷變徹樂减膳恤刑獄而獨無求言一條中外傳聞以為廟堂監謗之術及两察官以忤清之去國公亟扣閽上書力言之且謂所貴乎大臣者以道事君不可則止今君嗣未定不能賛之敵國佯遁無以備之貨臣聚歛土木方新顛而不扶危而不持則具臣而巳聞其屢䟽丐間㽞之者愈堅攻之者愈衆此非所以愛之時公猶在期集所而未官也上特優容之賈丞相似道制置两淮海州䘮師更以捷聞公上䟽言海州之事三尺童子皆能言之而閫臣以敗為勝陛下曲徇其意出御茟令學士院降詔奬諭之豈不知而受其欺耶抑已知而姑以揜外觀而自欺耶願陛下急収囬御筆以觧萬丗之議而免外國之􅀏借曰萬世之議未睱恤鄰敵􅀏我何以立國乎公之取怒於似道自此始理宗在位日乆務緫􅄃權綱政多從中出群憸乗時弄威福之柄公上䟽曰當大夲猶豫之秋豈無旁睨蜉蝣之撼甫節之􅆋􅆋難度其心平勃之屹屹當儲其後又曰天下有貧州縣而無貧太守有貧國家而無貧邸苐南司貧而北司之應奉不貧百姓貧而緇黄之窟宅不貧至於挾小才以濟大貪者近親有依慿焉宫中有承受焉左右有游舉焉陛下以得之左右者出自聖㫁而用之曰吾自除吏也不知有從旁竊威福者矣又曰京有尹畿有􅈇所以培護夲根愛養命脉邇年居是官者不過爲奄竪軰一大承受耳無名宣頭真偽莫詰非時取索隱匿莫規􅄷士良謂天子不可令間睱若以財貨聲色蠧其心使無睱更及它事然後吾軰可以得志今此曺皇皇汲汲求適吾意者正士良之䇿也帥􅈇两司疲於應奉帑􅁃赤立萬一畿甸之内有一旦警急何所趣辨何所􅀝仗乎􅂅斷自今日止營繕省宣索两司不急之應辨悉停之左右並縁需索之有例者悉閣之然後可以救两司之貧緩急之備也上頗感悟而土木之㓛不為之少輟也公復因論􅁁事屡及之有曰善處急者不以急亦不以睱古之謀人國於江左者莫窘於淮淝而談􅀏弈棋莫迫於新亭而從容就席固不以急也外示談􅀏而内有以神其指授之略陽示從容而隂有以伐其壁後之謀所謂睱者豈真睱哉又曰吾其有以自謀而不以鄰國之存亡為安危則不依於人又曰吾其有以自備而不以敵國之緩急為喜懼則不制於人苟以彼之存者為安緩者為喜萬一鄰敵陽示安枕以紿我而假敵以道臍可噬乎又曰今與敵對境我無一日謀敵而敵無一日不謀我彼所築者金城䥫壁我所築者土妖血山彼所築者奪我地為之我所築者奪民地為之其言切中當時玩細娱而不圖大患之病㝷上䟽極陳備邉之䇿曰以必争之規模奪浮光然後可以全两淮而保長江以必死之規模守樊襄然後可以拒光化而全江陵夫淮之猶可守可耕者以有一綫之河也今􅍱河而築浮光乃吾户内若屯於斯耕於斯教訓於斯日夜出􅀐以撓我淮東西俱不可耕雖堅城閉壁而坐爲禁制不得動矣為吾之計當勉諭淮閫盡力以争浮光則两淮猶可安枕也萬一樊襄不牢彼反奪之則江陵􅀌注尚足恃哉為吾之計當擇荊之猛􅀅責以必死之規模守樊襄則北可拒光化南可全江陵一則思所以奪其地二則思所以争其民則對壘之勝􅀒決當在此而不在彼矣識者謂公此䟽眞活國之良劑朝廷不能用以至於亡而公言無不驗故重為之太息焉御史洪天錫劾内官盧􅁢升董宋臣不行而去公移書􅌠相勉以行申屠嘉之事且抗䟽援膏盲二竪為喻曰何陛下愛其國不如愛二竪之甚乎漢唐之季建置天子在奄竪掌握罪大惡極朝廷不能誅之天下必有起而誅之者漢之䆠官陳蕃竇武争之不勝并州之將操戈而殪之唐之䆠官宋申錫攻之不勝河中之帥移兵而屠之小人之在君側操心何所不至其所以不敢動扵内者盖有所憚於外若外不足憚則無忌憚之心生而無君之惡動矣言尤激烈上覧之不恱公遂稱疾求去丁大全方以臺長用事欲鉤􅃱諸賢公見幾而作謁告徑行董丞相槐勸公不必逺引公曰丞相且自照管越数月果為大全所擊而去吴公潜拜左丞相公亦召還會國子􅀶士徐庚金䓁言大全雖去相位而六賊尚存乞誅之以謝天下上諭潜不當引汲庚金䓁議論紛絃潜於榻前自辨上爲之歛容而􅂩自此開先是鄂渚危急上命似道提師江陵似道奏請下流兵權潜奏鄂以上旣屬似道鄂以下冝屬趙葵上不從徑以下流併聽似道節制凡似道宻奏外廷不得預聞上反以不知邉報爲潜罪及廷臣奏忠王之立人心所屬潜獨不然姦謀叵測潜遂罷相中外惴惴疑必有後命公上䟽曰天下之所同好我獨惡之天下之所同非我獨是之則爲人上者亦難知矣大抵上易知則下親上難知則下畏下親則上安下畏則上􅀌窘急而求之一緩而遣之號呼而進之一唯而退之旁觀沮縮何以作人任事之氣乎上問爲誰公奏臣不敢直指願陛下曲囬天怒以安中外上乃首肯而榻前欵宻之言外廷無聞知者旣而似道入相希指論公者章連上矣度宗即位公乃還朝一見甚喜欲大用之公乞命朝臣為知縣以重其事權專以均田稅正版籍均力役勸農桑崇孝悌訓士卒除盗賊為考課之法有旨從所奏後沮不行此公之忠讜見於立朝者也信州措置軍糧失冝召亂朝廷以江東臬事付公聞命􅈬道及境或來言城中事勸公偃旗息皷而過公􅀏不荅即日單􅀐入州决獄一城肅然戒能事者訪得亂卒姓名禽其兇渠逆黨悉寘于法事平有詔襃諭比公於韓魏公云盖公於他獄事莫不盡其情故一路無􅁈民而盗賊屏息及將􅈇江西有獻議於廟堂請以銅錢一當十委公自江西行之公抗言其不便而止講行賑糶以救民飢乞蠲和糴以甦民病有女妖以左道惑衆隣郡愚民十百成群踵門徼福公杖而流之由是遂息此公之績用見於出使者也盖似道柄國十有六年公屏居者十年諌則不行言則不聽而施于有政者又厪厪若是此有志之士所以羡其際逢之盛而惜其設施之未䆒也公天禀卓絶於書無所不讀而會於理學以爲歸􅀫自爲幕軄官至秉麾持莭所至以教化為先務暇日輙從容庠序間授學者以求端用力之方自躬行上起自人倫日用上起婺之東陽有好事者創義學迎致公為之師從游者数百人閩人林光丗寅縁䆠竪而賜出身素不滿於科名之士及爲浙東常平使者首劾公不當俯就義學之招婺州之命由是而􅃦公遂即家建塾以􅀻㳤其徒後以從官侍經帷每事啓沃以格君心度宗眷遇之甚至問公講授之所賜御書扁額曰石峽書院仍賜手詔襃寵之江南新附郷㓂猖獗官舎民居盡燬而書院巋然刼火之餘葺治旣完而諸生稍稍來集公倡明正道以致和力行名其堂以仁義禮智名其齋時所在士風頽靡公所以振起而作新之者成效甚著此則公自任以師道之重期於􅁇徃聖而開來學者也公所著有孝經章句一卷易外傅圖􅀃五卷尚書􅇚傳四卷中庸大學􅇚傳三卷格物入門一卷行於丗公人物魁岸聲音如鍾磊落若青天白日渾淪醇厚不見涯涘觀書至老不廢視紛華盛麗事蔑如也待諸父昆弟子姪各盡其禮接物以誠而無不恱服不爲察察而自莫能欺公卒於至元二十八年正月三日享年七十有一以三十年三月二十九日葬于縣西之安谿娶邵氏封令人再娶朱氏子男三人長梁太學生次棟次楍入皇朝並以儒起家棟月泉書院山長楍長洲縣儒學教諭然皆恬於進取不有顯秩女三人長適脩軄郎無爲軍無為縣主簿徐敏中次適武學生項雄飛次適邵元廷孫男四人女三人曽孫男七人女一人棟之孫道壡以至順元年擢進士苐今自翰林國史院編脩官出為嘉興路緫管府推官階某郎石峽書院旣領於有司而設師弟子貟道壑病其庳迫弗稱乃以公之故居廣其基址而新其棟宇絃誦之聲不减公在峕先儒有言道不行百丗無善治道不傳千載無眞儒公之道雖不行於當時而其學有以傳於後丗夫何憾乎溍之曽大父左曺府君實公榜中進士託斯文之雅故於公門四世百年矣今􅀁述乃學士大夫之公言非溍之􅀻言也來者尚有考焉格菴先生阡表格菴先生趙公宋執政也公之志業未及盡展於一時而㳤艾之􅀻有足惠幸乎百丗讀其書者知為吾先生而巳盖自考亭朱子合四書而爲之􅀃其微辭奥旨散出於門人所紀録者莫克互見公始采集以爲纂䟽今四方學者旣家有其書以故弗論若公之丗系出處固不可俾後之君子無述也按趙氏之先葪人齊國公逈遷居洛齊公之子是爲韓忠獻王族大以衍􅂀分而三居毫者曰光禄卿期又遷處之縉雲由光禄三丗至公之曽祖考諱濟贈太子太保博平郡公祖考諱軫贈太子太師東萊郡公考諱雷以再薦于郷特贈開府儀同三司少􅀓衞國公妣田氏贈蘄國太夫人公諱順孫字和仲八􅀊能誦􅀃九經嘉定十五年賜童子出身真文忠公見而竒之謂少􅀓曰大君之門者必此子也公不以自矜益務親師取友而求其所未至朝淬夕礪幾三十年乃以春秋試于郷于禮部皆苐一淳祐十年賜進士出身調太平州學教授秩滿差江東常平司幹官未上改臨安府學教授召試除秘書省正字兼景獻府教授陞校書郎添差通判婺州以内憂去咸淳改元入爲秘書郎兼崇政殿說書公因進講言今茲建元伊始正治􅅍相承之機度宗竦聽諭公曰卿老儒議論似富弼􅂫軾公退有旨擢􅁥察御史仍兼􅀃書􅊗右正言左司諌遂為殿中侍御史皆兼侍講進侍御史兼侍讀公乆當言路凡日食震電水火爲災必授据經傳及累朝故實為危亡可畏之􅀃随事致戒時帑蔵枵乏而人主不知宮掖汰侈而大臣不問公䟽奏者八面奏者三謂周官九式均節財用􅃁􅌠實緫之今之大臣未聞過而問也豈不曰錢􅂖出入當如陳平問之主者乎大臣自處不在周公下而以陳平為足法乎真宗嘗令三司具中外錢􅂖大􅁆陳恕以天子富於春秋若知府庫充實恐生侈心竟不進恕慮先朝知其有臣慮陛下不知其無也度宗不以為忤令内外諸司條具申省以聞公又言内廷之怒不可輕發㤙賞之濫有所謂特除特轉特􅀘特贈者不可輕徇庻僚上殿過為瑟縮專求􅃈細以備對揚當申儆之以格習䛕踵陋之風累䟽乞召洪天錫陳宗禮陳宜中還居言軄劾龔日新昬鄙不宜爲察官它所薦湯漢李伯玉何基徐宗仁吕圻歐陽守道吕大圭等数十人多朝廷宿望及當丗知名士度宗皆嘉納之羙人楊氏進封㳤妃公率同列言羙人父楊纉上遺表未半月進封之命巳下獨不念其有􅁑覃之情蓼莪之感乎䟽入遣中使問公以正謝之期降制之日何時而可俄又宣諭欲以百日為制公復奏請以朞年為期時雖不能悉如公言猶乆之乃成禮謝堂以從官導旨樞庭出入宫禁權傾中外公奏外戚用事漢柞中㣲長此不巳禍有不可勝言者􅊗䟽其姦於榻前以去􅈬争之度宗諭觧至再公執之益堅卒免堂官堂弟垕以莭鉞奉朝請居近市其家僮日伺於闤闠間細民以物求售輙攘之公奏其狀度宗以東朝故猶豫而不報公抗䟽不巳卒罷垕朝請仍徙其居似道以太傅平章軍國重事公力陳其買田變楮之弊乞討論之似道上章自辨且求謝事會其姪蕃丗守廣徳􅀒勢貪虐公奏黜之似道滋不恱公屡以疾丐去皆不􅁢新宫之建議毀民廬以廣衢路雖用公䟽令帥􅈇两司相度指定奏聞而帥􅈇希旨持两端之􅀃公再䟽言力争堅挽於事將形之􅀄者耳目官之責隂消潜格於人不知之中者有股肱之大臣在今之師臣相臣有諌王清昭應如王旦之宻䟽乎似道復上章自辨且乞骸骨公亦以疾丐去除吏部侍郎兼國子祭酒兼同脩國史實録院同脩撰仍兼侍讀公猶不自安求去益力遂以顯文閣待制知平江府兼淮浙轉運使四年八月也先是郡􅁃赤立率以夏􅀄徴民租公謂古者十月納禾稼今先期半載民何以堪僉曰此例行之三十年不然將有乏興之憂公不聽首以俸入及例卷所供助糴夲而抑浮費以継之糴幾二十萬斛迄免預徴郡旣大治創學道書院俾諸生肄業焉五年復以吏部侍郎召尋陞尚書兼軄如故於是似道方諱言􅁁事言援襄者尤惡之公之入對首言今所謂危急存亡之秋母曰端平失襄他時可以復襄今日之事與端平異不亟援襄禍至無日許翰有言治丗諱危亡之事而不諱危亡之言􅅍丗諱危亡之言而不諱危亡之事人臣知危亡而不言則人主處危亡而不知矣入則無法家拂士出則無敵國外患者國恒亡今敵國外患有古之所無而法家拂士無古之􅀁有臣甚爲􅀦家􅅒廪也度宗爲愀然變色似道笑曰此書生腐語爾襄縦不守何至不可立國􅃍以亡言不亦甚乎公雖莫能與似道合而似道以公時望所属毎􅀝重焉六年由吏部尚書拜端明殿學士同簽書樞宻院事進簽書院事兼權叅知政事八年同知樞宻院事兼叅知政事公自躋政地數建守備之䇿似道自詭知兵終不以爲意馬丞相廷鸞辭位去公獨知省院印度宗欲逐拜公右揆兼元樞公聞之歎曰不早用吾言國將亡而吾相吾其爲張悌矣比䧏麻公適中末疾乃弗果拜中使傳旨宣問趣御醫診視旁午於道疾少間除資政殿大學士提舉臨安府洞霄宫仍書御扇出尚方物以寵其行公舟次富陽謂所知曰吾一疾勝二十四考矣十年依舊軄知福州福建安撫使爲州民代輸夏秋二稅錢以緡計者四十餘萬而寛催特放蠲减之􅁆禮士犒軍之費不與焉代還之日其士人争以詩文誦遺愛軍民焚香夾道持綵旗擁車不忍去者􅁆千人公旣歸知旹事不可為憂懣成疾醫以樂進公麾使去曰吾可死矣以至元十三年四月二十又三日薨于里苐之正􅃦壽六十有二某年某月某日葬縣􅀯郷憇雲之原公階止太中大夫爵止縉雲郡開國公食邑二千五百户食實封五百户配胡氏贈魏郡夫人子男三人長曰鞏次曰瑾次曰華惟華以承奉郎直祕閣終鞏仕皇朝􅊗􅀯劒建昌邵武福信五路緫管積官通議大夫贈两浙都轉運塩使上輕車都尉􅇷封天水郡侯謚懋康瑾承事郎南劒路光澤縣尹女一人婿曰東平吕汲孫男八人長曰桂承徳郎湖州路烏程縣尹次曰楠曰機曰棣曰權曰椅曰某曰某女八人長適懐大將軍芍陂屯田萬户陳䕫次適葉可大應大圭陳璋胡衡陳􅁢德杜龍㓜在室曽孫男七人女三人玄孫男五人公㓜􅀌謹於事母而持身以嚴嗜好殊蕳薄踐􅆒中外餘二十年家無㽞貲焉􅀄少傅師事考亭門人􅅬先生璘授以尊所聞集公旣脫去場屋遲次里居因以得於家庭者遡考亭之原委纂䟽所由作也後雖成書猶不􅆸考訂至易簀乃已公處館軄秉史筆者或質所疑輙口占其本末以授之其􅀶敏又如此奏草存可見者二十有九所著惟四書纂䟽行於丗近思録精義若干卷孝宗繫年録若干卷中興名臣言行録若干卷文集若干卷並蔵於家公位二府法宜有謚于太常有傳于國史而公之殁也两宫北上九浹旬矣後五十有五年公之孫機以墓遂之石未有刻文爰以狀授溍俾譔次以備􅇅軼溍於公纂䟽之書童而習之而我曽大父户部府君又與公有同年好施及後人不敢以不敏辭惟公夙受主知以言事官論是非殿陛上方嚮用而輙自引去晩執事樞國􅇍已􅁄范希文脩亰城之策不用於慶暦李伯紀經制两河之䇿不用於建炎而公援襄之䇿不用於咸淳天之所棄孰能興之是誠有非人力所及者奉身而退以全其歸則公之自處可謂無憾矣銘曰道之不行託于空言顯顯趙公則旣有聞言路之闢衆正所聚山川出雲膏澤在下夫豈弗逢止或尼之瀆則不告歛藏􅆱􅀛善非爲名禮進義退靖共夙夜罔間外内有命來覲宵衣以湏蹇蹇匪躬終始弗渝孰尸其㓛不自爲政時遊廟堂勞以二柄念彼多壘瞻彼四方曰其殆而繫于包桑執之仇仇聽之藐藐獨安其危而以為樂大廈之騫孰持孰扶當宁曰噫其遂相予天胡嗇之弗俾卒相乃以􅀳陽爲國保障􅁢矣明哲歸㓗其身碩果不食曰惟斯又若昔大臣飾終有禮謚在奉常傳在太史公則不逮公多遺書銘以昭之過者式諸􅌉峯先生墓表睦之桐廬有隱君子曰􅌉峯先生以至大三年正月八日卒年六十有七越七年乃克葬于縣北大隱阡光墓之次延祐三年十一月某日也去年秋溍以退休之餘􅀍命復出艤舟桐廬驛先生之孫􅁉來謁曰吾祖之葬子之郷先生方公鳳既爲誌于玄堂而未有以表諸封隧今三十有三年矣懼愈乆人無得而􅁛焉敢惟子也請昔在宋季先生之外舅將作少監朱公杰與溍之曽大父户部府君仕同朝居同里先生於溍爲大父行溍年十六七即叅陪於杖履之末先生古貌野服髙談雄辨四座盡傾毎語當丗事及前代故實亹亹不倦然喜汲引後進有如溍之無所肖似猶不以凡子見遇毎折行軰以相傾下興懐疇昔夢􅄰不忘􅀼􅂅以一言自託於先生不可得而溍亦老矣矧以􅁉重有請乎先生少力學工於文辭甞携所業贄見内翰劉公克莊大竒之由是名動州邑弱冠游太學登咸淳四年甲科賜進士及第調衢州軍事判官用龍飛恩階文林郎居官有廉能聲大叅家公鉉翁詳刑浙左雅知先生所至輙挽以自随獄事悉委焉属部之民有縱火殺人者株連坐繫甚衆嵗乆不决先生採得其情多所平反它疑獄經先生詳讞無不服其明􅁢衢俗好闘不相能則弄兵以相讎先生􅀍郡檄徧行村落戒諭之皆委刀劒爲良民蜀名卿史公繩祖僑寓是􅀖先生睱日輙相與研䆒先儒性理之學爲士者徃徃聞其緒言而有所開悟故相㽞公夢炎郡人也愛先生才且賢欲以女歸之先生不可乃巳秩滿辟御前軍噐所幹辦公事未幾國破而家亦燬先生避地萬山中草棲露􅀫若與丗隔乆之乃歸而稍復其故宇爲終焉之計程公鉅夫以侍御史將使指􅀯來求遺逸之士得先生以應詔先生固辭弗能強也㽞公入覲後為吏部尚書所薦前進士七人獨王公龍澤起爲行䑓監察御史而先生甘老於布衣桐君古隱者廬於東峰指桐爲姓縣以得名先生居東峰之丁西望漢嚴子陵釣䑓唐方玄英白雲原僅数十里山峙川流儀刑如在先生徘􅆦其間慨然以古人之風莭自期與郷先生􅀽公易魏公新之為三友􅀽魏云亡先生􅀌子立如鼎一足意有不適咄咄書空而巳家公當運祚之垂絶以使事如亰師乆㽞河間先生􅁆致書候安否暨得歸年已八十先生徒􅇍徃見之握手道舊故輙相對欷歔泣下前郡守方公囬旣奉版圗上子職方復以緫􅃹兼府尹終更猶㽞居乆乃去前後十有二年先生不一造其門後與之邂逅于錢塘始恨識先生晚賦詩媿謝焉先生属纊前二日猶與親友􅇵談盡數刻精神無少憒眊亦足以見其所養有素矣孔子曰殷有三仁焉􅀃者以爲人臣之義莫易於死莭莫難於去國而屈辱用晦者亦所難辨宋之亡也先生不在其位而未始行乎患難不降其志而卒以明哲保身從容於出處去就之際而不至於屈辱其善用晦者歟盖人之難能亦非人之所能辨也是用因其迹以推其心之所存論次而表􅂋之庻百丗之下有觀感而興起者焉其言行之詳誌所載巳具兹不復贅先生姓孫氏諱潼發字帝錫一字君文􅌉􅄘其别號也先丗由婺之金華徙桐廬遂爲睦人髙祖􅂋曽祖寳祖􅈇貢進士廉父承奉郎致仕之才母孺人方氏妻朱氏子男二人濬誼女二人適施昉毛元孫男若干人女若干人曽孫男若干人女若干人先生所著述散見於學者之家子死孫㓜乆未克裒集彚次以行惟手編前賢紀詠桐君事曰桐君山集者人多傳之石先生墓表先生石氏諱一鼇字􅀳卿丗爲婺之義烏人至大四年年八十有二卒明年十有二月王申葬賈山之原嗚呼先生宋景定甲子郷貢進士也人莫或用為其稱而稱之必曰先生者先生學者之共尊衆人之同慕也􅀄徐文清公倡道丹谿上及門者或仕或不仕皆時聞人文清之學盖親得於考亭而祕書丞王君丗傑則有得於文清者也先生少受業于監榷貨務都茶􅂣王君若訥旣又從秘丞君游學日以荗實大而聲逺􅀒笈而至執弟子禮者亡盧数百人然自秘丞君以耒惟用舉子業相授受故先生之門名賢書升學館者相望其髙第或㩀乙科最後􅅦貨君之孫龍澤遂為咸淳甲戍進士第一入國朝以材學顯融於時者猶彬彬焉識與不識咸以是為先生之盛至其端緒之微藴奥之􅃉丗固未必盡知之也盖先生晚而覃思於易著互言緫論十卷其為􅀃不皆本於徐氏凡文清之敎曰命曰性曰心曰中曰誠曰仁微辭奥義或尚有託乎嗚呼昔者子貢盖歎孔子之文章而以性與天道為不可得聞竊意今之稱先生者雖其文章猶莫得而聞也頋以是􅃈􅃈者為其盛邪吾見其為先生之累而巳鳴呼所謂同尊而共慕者其果於此乎彼乎溍生也後幸執弟子禮而不及與夫數百人者群游並進於先生十卷之書復未能與有聞焉間乃掇其棄餘以充有司之求向之累先生者閱四十年而固在也嗚呼使先生之道卒揜遏而弗􅀭者誰歟溍實懼焉謹次其師友淵源掲表墓道庻耒者之求先生無以彼易此而徐氏之傳不終寥寥也先生之丗出行事具於塜上之銘壙中之誌玆不著至哀無文至敬不飾故亦弗復為之辭焉處士􅂫公墓表真定有隱君子曰􅂫公諱誠字誠夫其先由欒城徙行唐又徙眞定累数丗丘隴俱無恙而譜逸不傳所可知者公諱元老母孫氏金貞祐二年舉家南遷而公以興定五年九月二十三日生于汴年十有二國朝伐金之師渡河汴城危蹙乃侍親北還道路梗澁数瀕於死期月始逹年􅃦長事親盡孝丗故一不􅀜於念慮然以生長戎馬間慷慨尚氣節時河朔甫定諸豪或乘勢肆爲暴横民皆逃匿公奮不頋率衆禦之諸豪亦歛避不敢犯郷井悉頼以安兵難流離之際人鮮知學公首延師敎其子而里人稍有来就學者公平居喜飲酒而不及􅅍善治生而不求富輕財好義人有急則徃赴之莫不稱其長者大徳二年十二月二十六日卒於家享年七十有八葬眞定縣新市郷新城原娶畢氏廬州䆠家女前十五年卒於至元二十年三月十六日享年六十有三合葬焉子男五人長曰榮祖累贈嘉議大夫兵部尚書上輕車都尉追封眞定郡侯次曰玄曰實曰信曰徳順和寕路儒學正女二人孫男八人長志道中憲大夫嶺北等處行中書省左右司郎中累贈中奉大夫河南江北䓁處行中書省􅂙知政事護軍􅇷封眞定郡公次嗣道安道􅁢道逹道師道進道昌道女十七人曽孫男十一人天爵今通奉大夫江浙䓁䖏行中書省叅知政事天澤眞定某提舉司都目天益天覺天彝天常天章天申天經行唐縣尉天紀天祥女十一人玄孫男十四人昌文國子學士昌言侍儀舎人昌衡宣政院宣使餘尚㓜公殁巳五十年今叅政公天爵始奉國子司業楊俊民之狀以授溍曰自吾髙祖暨吾祖吾父墓隧咸有石章以紀徳業吾父神道碑銘則中書叅知政事許公有壬承詔撰述也惟吾曽祖之墓未有以識之茲用伐石爲表幸爲我書而刻諸昔諸􅁑孔明與龐德公生並丗而或出或處有不苟同夫亦各行其志云爾國家肇造之􅀄起閭閻而趨風雲之會以建功立號者皆公一時之人物公獨退蔵於宻而居易以俟命迨其孫曽當太平之盛際乃以政事文學爲時名卿行且推恩三丗不有得於彼必有得於此矣公之託身畎畒固不减鹿門之髙致所以遺其子孫者以今視昔爲孰多乎溍曩嘗忝載筆從今參政公之後不敢辭以年侵學落輙因狀所叙而論次之如此公之隱德非名言所能旣者亦靡得而詳焉翰林待制桞公墓表公諱貫字道傳姓桞氏其先由展季仕魯食采栁下因以爲姓子孫居河東者在唐爲官族宋南渡􅀄有自觧徙杭者生子曰森又自杭徙婺之浦江家於縣西烏蜀山㦄四丗至公之曽祖考諱藴俱韜晦弗仕而寓迹於醫祖考諱􅀘之迪功郎嘉興府崇徳縣主簿考諱金忠翊郎髙郵軍髙郵縣令入皇朝以公貴贈奉訓大夫淮安路泗州知州飛􅀐尉􅇷封浦江縣男妣俞氏􅇷封浦江縣君公之生也外大父閤門俞公葵暨泗州府君同擢右科進士第因命之曰䝺義取以两文易两武賛於今文爲貫故公自署其名為貫云公㓜有異質頴悟過人嘗侍泗州府君謁神祠得旁人所遺金珠可直萬緡宻伺其人復至而還之泗州府君大驚知其噐量不凡期以逺到丱嵗遣受經於同郡金先生履祥即能䆒其旨趣而於㣲辭奥義多所發揮旣又執弟子禮於同里方先生􅃫括呉先生思齊粤謝先生翺三先生隱者以風莭行義相髙間岀為古文歌詩皆憂深思逺慷慨激烈卓然出於流俗清標雅韻人所瞻慕公左右周旋日漸月漬不自知其與之俱化也杭於宋為故都向之􅀫儒遺老猶有存者公徧遊其門無不折行軰與爲忘年交而與紫陽方先生囬淮隂龔先生開南陽􅄷先生逺句章戴先生表元􅂭山牟先生應龍永康胡先生之純長孺兄弟交尤宻徃来咨叩無虚日凡學問之本未文獻之源流􅊗􅊗如指諸掌發於論議言必有徴不徒事浮藻以􅇷丗好也諸公亦徃徃喜爲之延譽由是名聞於一時􅀄東平王公俁持使者莭按察屬部大舉學政教官之備貟充位者一切謝遣之更延􅃱前代賢士大夫之老於文學者􅀘其處於是泗州府君為之起而主敎於郷邑公在侍側王公一見輙加噐重亟􅁛薦之公年甫弱冠殊未有仕進意後十有餘年始以察舉爲江山縣學教諭又爲昌國州學正江山乃川阻山窮處昌國則邈焉雲海島嶼間公不鄙夷其人所至日與為士者敷陳仁義道徳之􅀃人多化之用累考赴選集於亰師中書左丞張公思明首令子弟耒􅈬學逹官大人得公文皆竒其才公例當教授一州用薦者特授湖廣䓁處儒學副提舉未上改擢􅀦子助教階將仕佐􅀰由助教爲慱士轉將仕郎前後在弟子列者千餘人業成而仕後多知名遷徴事郎太常慱士時方承平稽古禮文之事次苐並舉遇有所討論公援㩀詳洽權古今之宜而爲之折􅂨廷議莫不服其精當沅州嵗貢苞茅四十匭茅輕舟搖多致覆溺公請以附它貢物鎮其舟至今以爲便勲戚大臣請謚者数十家文移山積乆格不行公悉爲考行易名以上凡三月而畢臨江守李侯倜爲部使者所劾他使者力辨其誣後終於大官當得謚其家求於謚議中母及臨江事公曰著其事所以白其非辜安可没乎其子乃歎服柄國者欲以其祖配食孔子廟衆莫敢忤公獨毅然持不可而止有神降于洺郡長吏列上儀曺乞加封爵公以爲神姦能鼔民不治且將爲亂宜下所部禁戢之儀曺符夲郡如公言􅁥察御史馬公祖常薦公才任風憲章再上不報廼丐外以文林郎為江西等處儒學提舉視事伊始吏循比舊以例卷進嵗為米八十石公斥去之後来莫有敢􅇷襲其弊者龍興郡學乆廢公為新其棟宇聘名儒爲學者師士風以之復振道士作廟屋侵學地東湖書院田為僧所㩀者三百二十畒悉奪而歸之他書院不籍於官者無慮数十舊設主領一貟司其金􅂖之出納公命勿設而以其事分􅀠所在學官豊城尸教席者不任職士子因持其短長交政互訐公折以片言而各當其罪莫不心服脩漢先賢徐孺子墓立宋髙士蘇雲卿祠古碑碣所紀有􅀜於名教者必訪求而重刻之苟可以扶丗導民者無不為也南康倉吏坐株連逮繫者百餘人公􅀍行省及憲府檄讞其獄鉤擿隱伏而得其情所平反甚衆人尤服其長於政事秩滿而歸杜門不出者十有餘年自號曰烏蜀山人扁其齋曰静儉室廬僅庇風雨饘粥時或不給而處之􅁉如若將終身焉今天子更化之􅀄登用儒雅而中朝諸老多巳凋落近臣以公名聞于上乃以翰林待制承務郎兼國史院編脩官起公於家公幡然出見使者退謂人曰吾老矣忝列職禁林儻縁次對而􅀗陳尭之道以禆聖政之萬一豈非幸歟㑹有詔復行貢舉法㽞主文衡於郷闈竣事乃行到官僅八閱月俄以疾卒于㝢舎至正二年十一月九日也享年七十有三省臺院􅁥皆来致􅉠集賢吳大學士直方國子吳􅀶士師道並敦郷曲之義共經紀其䘮事靈輀􅀯還諸公引紼陳奠於都門之外道路之人咸為咨嗟隕涕夫人盛氏累封浦江縣君前公十二年卒以三年十二月二十三日合葬于縣西通化郷荆山之原子男三人長卣次同次因孫男三人秬頴穆秬早夭頴以父命用公􅄻入官未調女一人公氣韻沈黙􅈰度堅凝平居未嘗見其疾言􅃍色雖有桀驁者亦皆望之而意銷孝友本乎天性弟實出後外家俞氏遇之恩意彌䔍讀書傳覧强記自經史百氏至於􅀦家之典章故實兵刑律􅊗􅁆術方技異教外書靡所不通故其文􅆂肆演迤舂容紆餘才完而氣充事詳而詞蔚然成一家老不廢詩視少作尤古硬竒逸而意味淵永後學之士争傳誦之工篆籀楷法善鑒定古彞噐書􅀞而别其眞晚益沈潜於理學以為㱕宿之地焉所著書有近思録廣輯三卷字系二卷金石竹帛遺文若干卷烏石山房􅀋藁二十卷盡公之葬也御史中丞張公起巖以居胄􅁥時夙有同寮之雅故既爲之銘納諸壙中卣等復奉門人宋濂之狀属溍為之表掲于冡上溍與公居同郡學同志辱游於公爲最乆知公為最深所以圖公於不朽者實溍之責也是用弗譲書而授之俾刻焉其辭曰桞居河東為唐望宗從宋􅀯遷再丗外官公生其季逮今盛際以文易武承考之意延祐􅀄元朝多俊賢公游其間翶翔後先于于而耒列于庻位詩書禮樂孰非吾事由中而外退也委蛇遺丗獨立一紀于兹國之老成日益淪謝鋒車在門公不俟駕有懐欲陳尭舜吾君輪當次對乃以訃聞乘化而歸公乎何憾士林䀌傷失其一鑑斯文未䘮儀刑具存表以石章刻在墓門張子長墓表上即位之十一年分命儒臣纂􅁱遼金宋三史今師相以􅁥􅁱國史領都緫裁旣進擬収擢遺逸之士四人以两院次對之軄俾參茟削仍奏辟子長為夲府長史使者奉驛劵行四千里求得子長於金華山中力辭不拜四方之士莫不髙其風後五年申命史臣纂倄本朝后妃㓛臣􅀓於是山林之招皆正除入館俾預討論子長名在五人之列以翰林倄撰儒林郎同知制誥兼國史院編􅁱官召復避不􅈬使指有嚴不得巳爲之起行至武林驛卒辭而歸士大夫益以是髙之子長之才之羙過絶人逺甚其無媿於前􅁱可傳於来丗者則不在彼而在此也子長姓張氏樞其名子長其字㓜聦慧爽朗受敎於父屏巖先生而外家潘氏蓄書数萬卷金石遺文千餘卷子長盡取而讀之過目輙不忘且能通其大意年十四五肆筆成章頃刻数千言嘗作小臣䇿譏宋髙宗忘親事讎而􅇷為之定復两宫之計以爲當時狃於宴安莫有知出此者時前代遺老多尚存無不降歎弱齡益自愛重杜門不妄出頗易視當丗直欲方駕於古人同郡之士與之交者可以僂数暇日寓情巵酒意氣豁然視餘子蔑如也海内賢士及名卿才大夫至於是􅀖皆以得見爲幸或問以古今㳂革政治得失咸樂告之宇宙之分合禮樂之廢興以至帝號官名􅀊月後先皆無所脫誤每及一人則其丗系閥閱與才質之良窳􅊗􅊗如指諸掌論事後當成敗不旋踵皆驗􅀄東萊吕成公倡道於婺不幸天不假以年故婺之言性理者悉本於紫陽朱文公由文公五傳爲白雲許先生子長少先生二十二􅀊先生偶見之漫叩以漢髙帝何以取天下輙應口而對出入紀傳貫穿鉤引語蟬聮不能休先生大竒之閱􅁆日子長以書上謁先生答書勗之以正道期之以大成子長請就弟子列先生不可始終以朋友待之自是子長益歛華蓄銳趍於平實學日以粹其能不失乎進退之正者學力所至也凡為文務推明經史以扶翼教道不喜作琱瑑侈靡謟䛕戯豫放浪無實之言謂學春秋者必始於三傳而其義例互有不同乃辨析其是非會通其歸趣參以儒先之􅀃裁以至當之論為三傳歸一義三十卷又謂啖氏於春秋卓然有見於千載之下而陸氏􅁇之所纂春秋微旨以朱墨别三傳之當否􅀊乆漫滅􅃦失其眞乃重加考訂為三傳朱墨夲若干卷言有未周意有未暢則出新義以􅀘之金之鉅儒大寕敬先生有春秋備忘乆未及行於丗曁入國朝先生之諸孫公儼以憲節来涖於婺槖其槀請子長爲之校讎乃因近臣以聞而刻焉謂三國之正閏固不侍辨自古國必有號史亦從其實而書之漢之爲漢未嘗􅁛蜀陳壽欲帝魏而以􅀳承其統遂以蜀易漢抑此所以伸彼也壽父􅀗罪於諸􅁑武侯而壽又為武侯子瞻所薄故於武侯之駿㓛偉烈多略弗著而武侯再挫司馬懿亦没而不及内以報􅀻憾外以為時諱也譙周壽之所師力賛後主納欵於魏賣降覆國壽不以為非反善其䇿餘所書徃徃􅀋是乃紏其疵􅍝之害義正其繁蕳之失宜為刋定三國志六十五卷又别撰漢夲紀列傳附以魏呉載記為續後漢書七十三卷三國之臣有能致莭於其君者舊史或諱不書或書而失其實或僅見於異代之史皆為更定而於漢事必備載以詳正統或一事􅁆􅀃必叅訂使歸于一是非疑似抑揚予奪咸有論著繫于各萹之後名曰訓志經筵檢討危君素言子長是書立義精宻可資勸諜朝廷為下夲郡取而上之宣文閣藏焉他所著有林下􅀼議一卷曲江張公年譜一卷謂宋之亡也將相群臣㐲義死莭者固巳有傳在史氏卑官下士吏卒女婦之死者多史所弗録乃詢諸故老旁采稗官得若干人爲宋季逸事若干卷平昔所作歌詩箴銘賛頌碑記序􅀃誌狀之属有敝帚編若干卷其言閎深浩􅀶而峻厲潔清援据精切而論議純正尢長於叙事而扶善遏惡率能使人有所感發懲創至於微辭奥義又有未易以淺近窺者大抵其文主於氣氣命於志志立於學故言無所苟出䖏之際無不克踐其言江西郷闈嘗奉書幣迎致子長司其文衡返其幣而却其請盖塲屋之文非子長之所謂文也子長之先占籍臨海唐乾寕間避地来徒是爲婺之東陽人宋末稍有出而仕者曽祖日新承莭郎祖友諒迪㓛郎父觀光屏巖先生也娶金華潘氏又自東陽徙家金華先生少游太學徳祐納士從三官北上用執政薦授婺州路儒學教授階將仕郎仍刻印以給之婺歸皇朝之後有學自先生始在官十年改調紹興路平準行用庫大使循新例換將仕佐􅀰以母老不赴遂弗仕家食者垂四十年而終子長生於至元二十九年二月二十五日卒於至正八年八月四日享年五十有七娶王氏旣不克終事子長故子長無子為之後者長曰燧李氏甥之子也次曰燃族人之子也以十年十有二月九日奉子長柩葬于金華縣循理郷信義里許先生之殁以其子元属於子長元欲師事之而子長則以先生之待巳者待焉子長之葬元旣狀其行實之詳乞銘於危公且求溍摭其大者表于墓隧先是浙東部使者交薦子長章九上俱未報逮論撰之命下溍適承乏北扉法當􅀊舉守令一人因以子長應詔廷議以子長累徴不應重於勞以州縣之事遂格不行子長平生大莭非獨為士者知之􅌠執大臣亦知之矣夫旣有以信於仐不可無以貽於後元所以汲汲焉為之圖其不朽也後漢史稱樊英􅀄􅀍詔命僉以為必不降志及後應對又無竒謀深䇿談者以為失望豈不以其名最髙故毀最甚乎蓋名者衆人之所忌君子之所避也嗚呼子長明炳㡬先薫不自焚膏不自煎以保其身以歸乎全松栢丸丸清風凛然後今千年過者式焉邉氏崇孝阡表崇孝阡者吏部尚書邉公先丗大墓也邉氏居汴之尉氏而墓在其縣西二里言族氏者以爲􅁁氏出於宋平公之子御戎字子邉御戎之孫卭為司徒以王父字為氏自漢而下代不乏人惟韶以儒顓門名尤著五代時鎬為江南李氏將其後子孫或居椘丘或居陳㽞汴故爲陳㽞郡而今之陳㽞縣與尉氏俱􅀠汴由尚書五丗以上軼其譜莫詳所以分與所以徙尚書之髙祖考諱鎮髙祖妣李氏有子男六人長曰琮次曰理次曰璽次曰琥次去家爲浮屠亡其名次諱琰字君琬尚書之曽祖考也㓜失怙恃属天朝伐金之師南下汴最爲受兵之地遂遷避於河北之武道鎮兄弟散處而力田以自給嵗適大侵乃南徙汴之紀縣尋復尉氏故業兄弟仍同居焉曽祖妣張氏有子男三人長曰儉娶宋氏有女二人適宋氏鄧氏次曰儀娶王氏有女三人適謝氏李氏王氏次諱信字仲誠贈中順大夫禮部侍郎上􅀐都尉􅇷封隴而郡伯尚書之祖考也性純䔍􅇷念祖父而下流離之餘甫遂生聚而死者未及同兆域以葬大德辛丑乃􅁲今地率子姪奉遷改葬以祖居中昭穆爲左右而正其位所謂崇孝阡也侍郎年八十有五而卒祖妣王氏􅇷封隴西郡君有子男三人長曰賢次曰贄次曰質女一人適西河耿氏賢字政卿朝耕夜讀且以課其子弟孜孜不怠尚書之㓜學壯行成其䆠業而致顯融者平昔誨導之力居多其輕財尚義於親黨無彼此之間人有逋􅀒不能償亦不責也家奴有恪恭所事者即縱爲良民而子視之里人有爲水所漂者適見之而莫知其爲誰亟攝衣徃援之幾共溺而不自悔人稱其長者以後至元戊寅十月卒傾邑里之人来吊咸涕泣曰善人亡矣娶劉氏前卒繼孫氏無子有女七人其六人皆歸名族以苐六女納贅婿孫某承其家諱贄者字禮卿封集賢直學士亞中大夫輕車都尉隴西郡侯尚書之父也由集賢而上並孝於父母友於兄弟以勤儉起家以􅄌和睦族守爲家法丗如一集賢兄嫂相􅁇殁其女歸孫氏者年未三十而夫蚤丗子甫五嵗念其確持貞莭自誓靡他撫存之甚至從妹歸王氏者夫殁子亦夭招致而養贍之以親親之仁推而及人多此􅀋母王氏前卒􅇷封隴西郡夫人有子男一人名公佐字􅀖臣即尚書也女一人適李氏􅁇母朱氏封隴西郡夫人有子男五人公輔公略公度公儼公弼女一人適田氏尚書用舉者由山􅀯憲司中臺察院書吏為刑部令史陞樞宻中書􅁺授工部司程􅊗户部主事徽政都事經􅊗擢監察御史遷樞宻院經􅊗中書左司都事吏部郎中出僉燕南河北道肅政廉訪司事入為户部侍郎除海道都􅈇運副萬户召還同僉中政院事擢中書左司郎中拜吏部尚書積官太中大夫先是尚書在户部以階三品推恩上及其祖考旣増廣塋域設置翁仲而碑石未建懼無以彰上賜而昭先德乃馳書金華山中属溍為之銘溍􅊗觀自昔草昧之􅀄出其經綸之藴以翊扶興運者固已䇿儁功而建榮名其懐材不試以儉徳自保而甘老於丘園者積乆必發亦莫不有以庇頼其子孫而表見於後丗本深則末􅌗源逺則流長夫豈偶然哉有若集賢公之親享其報年今八十有三耳聦目明康強無恙及見其子躋于八座此則丗之絶無而僅有者也溍雖衰朽無能賛􅀭盛羙其􅂚敢辭謹備著其丗序之詳而顯詩之以為崇孝阡表曰邊氏之先出宋司徒韶以五經為漢鉅懦南唐將鎬子孫居汴友于尉氏統分􅂀衍尚書之貴自其髙曽隱居種德不有其名侍郎􅁇之其積巳乆煌煌宻章賁于身後餘慶則多集賢是承義方之教成於家庭有亢其宗遂享其報優㳺事外躬膺榮號蒼顔白髪金紫交輝旣壽而康實丗所希緬彼松楸佳城􅉱􅊊寵靈所加罔間存殁惟木有本惟水有源培之濬之在爾後昆推述丗序表以樂石念茲厥􅀄永永無斁費氏先墓石表昭武大將軍海道􅈇運都萬户致仕費公之先湖之長興人家于荆谿郷上徐村浮雲山之陽髙祖諱􅂋妣徐氏曽祖諱祐妣沈氏墓咸在焉祖諱出贅嘉興劉氏宋季以䇿干两淮制閫得官累階武莭郎任浙西兵馬鈴轄權提舉上海市舶司事因僑居其地上海後爲縣故今以占籍為松江之上海人仕皇朝卒官懐逺大將軍浙東道宣慰使贈鎮國上將軍福建道宣慰使都元帥護軍追封江夏郡公謚榮敏夫人即劉氏次姜氏皆前卒次宋氏􅇷封江夏郡夫人考諱拱辰前武翼郎殿前司主管機宜文字至元内附從征交阯有功佩金虎符爲武徳將軍平江䓁處運粮萬户有子六人曰英曰雄曰擕曰傑曰僖曰􅋲雄即昭武公也天資精悍有祖父風用􅄻授昭信校尉海塩䓁處海運千户四遷至武德將軍海道􅈇運副萬户􅍱鉅海者数十所轉輸米以石計者数百萬年踰六十輙請納禄遂以今之官軄致其事􅀄榮敏公居上海旣乆先墓在長興者後人或不能辨其處昭武公始訪求得之而加封植焉毎自念一門三丗荷國厚恩而子孫蕃衍三十餘人非前人積慶儲祉無以及此不可不告于來者俾嗣守而勿墜爰伐石為表属溍書之而掲于墓之原溍聞之韓魏公曰心不忘乎先塋者孝之大也歐陽文忠公曰惟為善者能有後而託於文字者可以無窮昭武公可謂孝之大矣溍之文字安足託乎直書具文不敢以浮辭亂其實也榮敏公之􅊗官行事有武公外舅趙文敏公之狀暨前大理少卿牟公所爲碑銘玆不復書張君妻趙氏墓表溍為諸暨州判官之明年得一士曰張復盖䘮其母踰再閏猶哀慕不己益求時之聞人為詩若文以抒無窮之悲焉竊嘗取而閱之非直其母為可稱道其父之事尤有足紀者夫刑善以勸俗長民者之責也溍幸以末學與聞有政庸掇其繫乎人之大倫者爲銘以􅂌之銘曰於粤之墟句無之里孰望其地曰有張氏軫君之名君實其字群居太學五載不苐文不在茲運去物改白刃可蹈惟義所在爰有賢配克儷其羙名曰與婉胄出燕邸五丗祖詪䟽封安定從伯祖光典領宗正􅘊惟伯父以文藝著两制八座累膺異数父曰希㙠進食京族出􅌠桂平千室之邑其􅅩父埊主亦外蔵流芳奕葉後先相望展也令淑婦德是履守莭自誓嫠居四紀至治􅀄年龍集壬戍三月之朏翼日而卒上距始生五百甲子男復暨頥訖葬以禮于嗟復也終身之慕禫服旣除祥琴弗御父也義士母也莭婦不有子孝􅂚表父母繄長民者冝存風厲頋慙不敏承乏下吏瞻彼西莊丸丸松栢勤辭相哀用勸凡百金華黄先生文集卷苐三十
