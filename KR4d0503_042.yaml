body:
  text: 塔銘臨川危素編次龍翔集慶寺笑隱禪師塔銘今天子至元元年太中大夫廣智全悟大禪師住持大龍翔集慶寺欣公上謝事之請御史大夫撒迪公以聞上不允遣使特詔加釋教宗主兼領五山寺敕臺臣諭㫖俾安居以終老寵錫優渥賚及其徒公不敢違黽勉受命至正四年夏五月巳丑朔乃升堂辭衆退處東庵且援著令循本宗資次舉徑山曇芳忠公以自代俄示微疾其月二十有四日壬子委順而化六月四日􅉝未奉全身殯于石頭城塔院臺府暨郡邑諸司咸設祖奠于道左送者數千人八月十有六日壬申窆于塔院之後岡分爪髮建塔杭之鳳凰山下弟子密詣以師法嗣穹窿住山廷俊之狀走金華山中諗于溍曰先師紹隆祖道師表人天克協帝心光膺聖眷宜有述以示來葉子嘗庀職太史氏且辱交於先師銘非子誰冝為敢奉狀以請溍載念師之告寂也不逺千里以所服玩來識永訣若有所屬於溍者誼不得以衰退為解謹按公諱大欣自號笑隱族陳氏唐尚書操之裔丗居江州後徙南昌故今為龍興之南昌人父載母蕭氏公幼開爽授以書即成誦七歲遊僧舍見佛像輒作禮瞻戀忘歸父母知不可留九歲俾去家依伯父雲上人於本郡之水陸院祝髮禮雲之徒彰上人為師尋受具戒年十七𥘉至廬山謁開先一山萬公留掌內記既而遣詣百丈山𠫭晦機熙禪師一見深加器重由內記升居記室一日詰之曰黃龍得旨泐潭領徒遊山名聞叢林及見慈明氣索汗下過在什麼處公抗聲曰千年桃核裏覔甚舊時仁師愈竒之又一日以百丈野狐語詰之曰且道不落因果便墮野狐身不昧因果便脫野狐身利害在什麼處公擬答師遽喝之自是平生凝滯渙然氷釋矣公每謂先德有云但有纎疑不到無學安䏻七縱八橫乃益研教典㫄及儒家道流百氏之說師遷杭之净慈仍舉公居記室出丗住湖之烏回遂以瓣香為師法嗣居歲餘去遊江浙間復歸净慈一時大尊宿在父師行者咸與為忘年友嘗訪中峯本公於天目山坐語至夜半風大作勢欲裂崖石左右皆辟易公不為動中峯甚敬異焉鳳凰山大報國寺以灾毀而法席空虛行宣政院倚公起其廢公既至棟宇一新而規制有加於舊土田為豪民所據者悉取而歸之丞相脫歡答刺罕公領行院事雅知公遷主中天竺而寺亦以灾毀不一年尽復其舊天曆元年有詔以金陵潜邸為大龍翔集慶寺妙柬名德俾之開山公首膺其選特卑三品文階以冠法號明年驛召赴闕入見奎章閣賜坐良久咨問法要對揚稱㫖因及公師傳之自於是侍書學士虞公集承詔為晦機製塔銘既又改中天竺寺額曰天曆永祚以表公興𣸪之功而公之别院曰廣智亦俾虞公為書其扁㮄所賜貂裘金衲衣及它貴珍服用之物悉出異數從行者預賜有差尋命中使傳旨館公於泰禧宗禋院留居浹旬勞問狎至再召見遂辭歸餞送之禮弥厚公巳南還復遣使降璽書加護香幣之頒無虛月皇上御極待遇益隆用大臣奏命公與百丈住山東陽輝公同挍正􅓜林清規書成四方咸耴法焉公嘗於室中問一僧百丈野狐作麼生僧方擬進語公便打復問旁僧你道這僧好打麼僧亦擬進語師亦打云同坑無異土又一僧參次公云青州布衫重七斤即不問你道万法歸一一歸何處僧云東廊頭西廊下公云瞎漢來這裏亂說拈拄杖便打又一僧參次公以手指云釋迦弥勒文殊普賢從你腳根下過去了也僧茫然公即喝去其機鋒峻峭類如此一住八年不淂謝復住九年脫歡公為行臺御史大夫示疾前一日往致别焉既又别一二所知欵語良久逮唱滅猶力疾趺坐屬其徒以纍受賜金帛作萬佛閣上報國恩餘一無所及遂書偈而逝春秋六十有一夏四十有六所度弟子若干人得法而分居列剎者若干人四㑹語有録外集曰蒲室藁公以母年髙闕於覲省每自謂有愧於睦州編蒲奉親爰以蒲名室因以名其藁云公質貌魁特襟度豁如其所為文無山林枯寂之態變化開闔竒彩爛然而論議磊落一出於正未嘗有所偏蔽虞公稱其如洞庭之野衆樂並作鏗鈜軒昻蛟龍起躍物怪屏走沈冥發興至於名教莭義則感厲奮激老於文學者不䏻過也人以為知言𥘉魏國趙公孟俯未識公得其文歎賞不巳即命駕訪之一時賢士大夫咸慕而交焉公歸寂之日天大風雨殯之日密雲四合隂凮肅然窆之日城東南皆雨而城西獨無沾􅊜靈異之迹可徴不誣其遭逢盛際始榮終哀有不偶然者矣銘曰昔在先朝龍潜下土蠖濩之居化為寶所人天四衆川奔雲聚度門巍巍公其梁柱于皇昌辰金輪御宇寵綏故舊使節㫄午函香示信傳宣天語曰以五山悉統於汝凡兹釋教汝為宗主敷求遺範用繼汝祖恩光衣𬒳榮過衮黼匪公宿德疇克荷負典則所存有墜必舉木鐸載揚重規疊矩單提直指表正端緒竪立法幢作大依怙密禆上化萬物時雨云胡不憗訃聞當寧石頭之岡崇崇窣堵史臣勒銘垂休千古崑山薦嚴寺竺元禪師塔銘師諱妙道字竺元台之寧海人俗姓陳父曰某母何氏家故業儒師生而骨氣凝重神資秀朗幼嗜學不煩師訓尤喜誦佛書既而曰文字之學人皆可為吾當求之于文字之外可也善凬鍳者語其父曰此子不凡置之僧中可作長老人皆呼為長老兒偶患右目母携以禱於觀音像前仰見像之右目有小蛛窠為揭去之患隨愈父以為于佛有緣年十六俾出家依杭之六和開化寺正嚴法師十八得度尋受具戒於大昭慶寺𣑽祥律師嚴師令學百法論師曰一法不學學百法乎乃辭去遍參禪門知識皆不契最後至阿育王山謁橫川珙禪師未幾延歸侍司一日聞室中舉乾矢橛話意未解怏怏不巳忽曰何乃自為疑礙遂入見質所疑川曰汝不㑹耶展開兩手云那那師豁然大悟即呈偈曰雲門乾夫橛光明照十方鄮峯才彂足五日到錢唐川頷之顧謂衆曰再來人也由是名動􅓜林行輩更相詰難每出其上㑹中飽𠫭者如竹山圭東石契唯菴貫皆敬畏之至元已丑用舉者出世于本邑之慈源寺說法嗣橫川居六年法席鼎盛俄謝去訪髙沙彌遺踪於湧泉因留止焉仙居之紫籜山廣度禪寺久廢道俗僉言非師莫能起之郡府以為然元貞丙申請師主寺事居五年棟宇一新仍懇荒穢之地為田以足其食學徒坌集師於土木場中接引無倦仁宗朝有以師名上聞者𬒳旨住黃岩之浮山鴻福禪寺賜號㝎慧玄明禪師皇慶癸丑正月也寺㫄民多豪橫師至無不輸誠傾嚮衆始獲安其居紫籜浮山皆古剎由師而名愈顯延祐丙辰忽若有不適于意者亟引去部使者俾有司迫之還山是夜衆悉夢師再至巳而𣸪潜歸紫籜遂往拜橫川塔於育王省嚴師於六和嚴師處之於白賁庵淨慈靈隱兩山爭欲致之俱不就㑹平江之東禪薦嚴禪寺虛席郡府及諸山同以疏請師𥙷其處居四年而拂衣歸休于白賁六和雖外宗衲子來𠫭叩無虛日師年逾七十稍厭于煩瀆懷紫籜之幽絶乃曵杖東還送者往往泣别於江滸師責之日衲僧家當以斯道為巳任視聚散如浮雲奈何戀戀效兒女輩耶自此不出山者十有四年門人在方外者期以師年九十會慶於膝下師聞之曰我不過明年正月半明年乙酉正月十有二日𥘉無所疾苦忽修大方諸老及外護書囑以宗門大事且戒其𠫭學比丘永達司聰曰汝等從朝至暮行住坐卧起心動念皆是自家珍寶若辦真實工夫作得主宰自然與道相應任從生死變遷直是移換汝絲毫不得方名大丈夫不孤負出家學道之志庶無愧於父母師友亦不虛受佛祖慈蔭吾明日行矣汝等冝各努力無喪光隂十三日黎明沭浴更衣趺坐略叙平生始末以別衆逹聰乞留偈師曰諸方到此作尽伎倆我只如常不得巳援筆書偈曰佛夀八十我多九年丗間情尽寂滅現前投筆而逝春秋八十有九臘五十有二龕留七日闍維目睛齒牙不壞設利尤晶熒所度弟子可田一玄建塔于浮山曰歸源清宇元寂建塔于紫籜曰圎明當寺住持門人惟一收設利與諸不壞者分藏焉師身不滿七尺而質貌魁偉性剛直慎許可安貧樂道不為緣飾進退之際處之𥙿如日用中惟以向上事開示學者丗諦語言不以掛口一僧問陸亘大夫見南泉云弟子家中有一片石也曽坐也曽卧欲鎸作佛得麼泉云得亘云莫不淂麼泉云不淂未審意作麼生師云如人向十字街頭開箇飯店只是不許人喫一僧問和尚教看柏樹子話並無入路師云河裏失錢河裏漉一僧夜上方丈請益師問汝每日看什麼機緣僧云看狗子無佛性話師云試舉看僧欲啓口師厲聲云夜深下去僧不㑹歸堂中怨詈不巳或者以告師云它向後㑹去在僧聞之釋然其方便為人多此類台之郡長官某問如何是佛師云牛背上老鴉問如何是法師云蘸雪喫冬瓜大契其意即挽師主天寧未行而有浮山之命晚歸紫籜自號東海暮翁淅東大帥某居蘄縣翼萬户府時兩入山問道聞師開示深用歎服南臺御史常公某不逺二千里來訪師發藥之留兼旬不忍去其為達官大人所重又如此紫籜有梁昭明太子廟大德丁未歲大旱官吏父老請雨不應師欲徙其廣神見夢於縣長吏曰為我一言明日當雨長吏以白於師雨隨至師之道非獨有以信于人雖鬼神亦莫之能違也故示滅之後識與不識無不尽哀師有重枮雪竇舉古一百則頌古五十三則四㑹說法語録若干卷識者評其機用峭拔如鐡橛石片云溫之夀昌禪寺住持門人法源既結集而求太常博士栁公貫序其首以行其丗司聰復以慶元保福禪寺住持門人一知所狀師行業來徴銘溍幸及與師接而挹其真凬顧以遊於方內未䏻受法雨之餘潤懼無以贊揚万一而司聰之來重以前育王住山印公諸大尊宿為之勸請不敢以鄙陋固辭銘曰禪林之盛宗唱並傳古響復續矯惟橫川師之有聞匪聽以耳不勞展手巳淂吾髓虛而善應宗通說通末後一著乃其極功佛之夀命非有數量特以八十示世間相師多于佛奚啻九年靈根不壞身真􅌂然門人所記四㑹有録我銘其藏用志陵谷筠巖律師塔銘師諱大節號筠岩族趙氏越之㑹稽人幼不茹葷年二十有六乃辭家入道得度於上虞法果寺中孚禪師尋受具戒動必中度其祖欽律師住台之妙果甚愛重之遣從同郡花涇銛法師為天台性具之學輒䏻通其大義銛見師戒行精嚴謂曰佛之慧命寄在毗尼汝大父律中宗匠汝䏻于叔丗光紹其宗吾道不在兹乎師承命即日渡江依石峯印律師于杭之靈芝寺不數年悉䆒其宗旨明慶吉公延致西班久之㑹虎岩良公嗣主法席推居苐一座演暢融明軌範峻整為衆所恱服而敬畏然䏻以慈悲攝誘與物無忤出世本郡之羅漢院支傾植仆靡憚其勤遷主松江之延恩報德寺道譽益盛屢欲謝事而其徒不忍捨居二十有六年一旦不疾而逝臨終稱佛名不輟俄默坐而暝如入深㝎焉重紀至元之元年十月二十五日也丗夀九十僧臘六十五闍維舌根不壞函靈骨歸上虞建塔于法果師長眉深目廣顙豐頥三衣惟布日但一食人施以錢有來索者豫之無以故囊無留資在明慶時寺屋以灾尽毀而師所居蒙堂獨存明日有一卒來前言昨日救火傷吾足言訖忽不見而几上韋陀天神像足缺一指聞者莫不大驚師三閲大藏行中書左丞容齊李公以師事之一日延師誦經神僧為降異光滿室衆所共覩李公語人曰節公佛菩薩地位中人也歲大侵淅河東西殍死者縱橫溝壑間師出衣盂之資建無遮大㑹三晝夜施者不慕而集瑞應之迹尤夛而師未嘗言之蓋自雙林唱滅丗逺教分殊師異旨莫適相通師雖受持律部而兼修念佛三昧效古人作懷净土詩數十萹昔大智和尚嘗曰吾生弘毗尼死歸安飬平生所淂惟二法門大智之後善繼善述惟師有焉師所度弟子一清今住越之東山禪寺孫若干人其上首明慶住持講律宗主志果狀師行業請為之銘用刋于兹碑銘曰佛久滅度三學殊宗卓然大智合異為同惟師承之克協其志㑹二法門歸一大事彂祥效瑞人天具依靈根不壞窣堵巍巍有大苾芻為律宗主謁辭樹碑昭示所祖四明乾符寺觀主容公塔銘四明乾符寺觀主大師諱普容字太虛俗姓茅氏丗為餘姚人年十有四出家於里之嶼山又十有三年祝髮于杭之昭慶明年受具戒於明之開元依碧溪聞公於明之延慶杭之集慶者久之從石林介公歸延慶淂止觀法門於桐溪濟公既歷四行雪岑海公為升座說偈因以主觀事亡何返嶼山于是乾符久廢新復半岩全公北溪謙公咸諉以興造師為募施者建寺如其舊買田六百畝有畸與寺别籍作九品觀室居焉法席偶虛江湖道俗皆兾得師補其處避不就郡人福清州判官楊某為構精舍城東三里所白有司以聞于朝有㫖賜寺額曰慈濟且加法師號俾之開山師黽勉受命為買田三百畝有畸贍其衆而仍居乾符俄舉净業㑹于慈濟與衆別眀日遂别士大夫常所住還者又明日示寂於所居之觀室春秋七十夏四十四時延祐七年二月一日也某月某日奉全身塔于慈濟寺東南若干步所度弟子惟允法言等若干人法言既嗣住慈濟始狀其行事願刋之兹碑溍謹為之序曰師家故業儒詩禮之學厥有端緒今不言尊其教也粵自大雄唱滅殊師異旨莫適統一惟天台之傳為得其宗而學者或梏於章句有教無行師蓋病之是故一年修常坐二年修常行餘時則修半行坐非行坐凡然其頂者三爇其臂者百閲七年而四三昧以具既又集同行修大悲期一年净土期七年寓公處士慕而與之遊輒為舉東林故事四衆從之為四十八願㑹者座下恆數十百人所著書惟圎修要義一卷而未嘗示有證入故人無得而稱焉歲大饑且疫為粥活其不䏻自食者用闍維法斂送其死無所歸者今行中書左丞李公時為紹興路總𬋩師為建普度㑹十晝夜竣事若有歌謡聲同知慶元路總𬋩府事張侯以旱告師為合同修六十人詣白衣觀丗音像前肉香祈哀感瑞光如瓔珞雨三日乃止駙馬都尉瀋王謁𥙷怛洛迦山道出四明膜拜執弟子禮請主如意輪期三七日尋獲異夢益申敬事此皆丗之所共稱者也昔安㝎梁氏蓋入天台之室矣然于其行位猶曰不可得而知也矧以溍之蒙陋未始一登師之堂其有以異夫丗之知師者乎撰次其略贊揚万一云尓銘曰八教所詮曰一大事孰昧其依淂語失義有偉大師玄珠密契爰即身心而指㝎慧法網可裂行海無際一雲在空潤澤旁施丗出丗樂平等不二侯王順凬天龍效瑞徒窺應迹莫表階位勒文焯實式告來裔真如觀主夀公塔銘錢唐真如觀主大師示寂後五年弟子慧炬始以狀求豫銘其舍利之塔豫退休之餘方掃除筆研然以師道行之尊乃豫夙所歆慕而慧炬又遣使馳書踰濤江而來何敢以荒落固辭按狀師諱正夀别號松壑族姓徐氏杭之錢唐人父名某家故業儒師自髫齔之年厭處塵俗棄家學浮圖法於南天竺之崇恩演福寺某年從住山栁塘權公法師得度為沙門誦經禮佛晝夜不輟平居食不過中脅不至席嚴持禁戒彌久益堅某年玉岡潤公法師來住是山師既聞妙教即立妙行道譽日廣遂升居苐一座為學者師座下恆數百人師隨機開示縱談極辨未嘗少倦江湖道俗爭欲得師出丗以主法㑹師之母某氏賢而有識每戒之曰慎勿以住院纍我師亦恪遵母訓諸方以聘幣來者皆峻拒不納而于自行之功愈加精進行四三昧終而復始雖寸隂弗棄有施以財物者輒均分於衆而以已所得贖禽魚之屬以放生衣鉢之外絶無長物某年肇建真如觀堂於錢唐城北母亦隨喜尽出其奩具以資役費堂成奉安千手千眼觀丗音像於其中歲以季秋之月集十方行人修大悲懴三七日又别立普賢道場歲修法華三昧構重閣􅍥置金書大般若經銀書大智度論於其上而闢其下為講堂以待來學師凡造佛像演經文主懴期授戒法往往感天神侍坐天雨寶花靈光瑞相變化非一莫可殫紀至正二年春二月俄示微疾語其衆曰佛涅槃前一日我當去可為我建净土懴七晝夜以助西歸十三日沭浴更衣端坐達旦廣說觀心觀佛净土法門以䇿勵學徒安然而逝十四日也丗夀若干僧臘若干十九日闍維啓龕視之顔貌如生手足柔軟既而於火輪中放金色光涌髙數丈衆共覩師坐五色雲端凝然不動遺燼中舌根不壞得舍利無數其徒相與謀而起塔于觀堂之若干步師所度弟子得其法者曰德禹嗣主觀堂曰普曜住車溪廣福教院曰慧炬及宗勝英辨慧寧至道居安等今同居天竺靈山寺行法華三昧以千日為期云銘曰衡台之教因言以傳惟真如師匪託空言以净信心由解起行具四三昧圎修圎證捴持万法安住一乘乃發弘願接物利生天神􅑙靈寶華現瑞感應之交靡容思議化期既畢駕言西歸萬目所瞻真身在兹昔本非來今亦非去寫以銘詩式慰摧慕道行碑大慶夀禪寺住持秋亭禪師亨公道行碑有大比丘曰秋亭禪師𬒳今天子命住持大都大慶夀禪寺其謝事而去逮今十有四年王公大人莫不髙之學徒欲望其聲光接其辭氣而不可得今住持臣僧顯儀實師法嗣之上首謀立石以頌其德使覽者有所觀感而興起焉至正十年夏四月九日上御興聖便殿翰林學士承㫖臣哈刺八都兒臣拜拜以為言制可其奏事下本院命侍講學士臣溍撰文學士臣好文書丹别敕集賢侍講學士臣期頥篆題其額臣溍謹按師名洪亨順德之綦陽鎮孔氏子也家本業農而其父嗜讀書為善士母仁慈而有賢行尤崇信釋氏之說一夕夢金像滿室翊日而師以生師天禀迥異常兒自幼不茹葷飲酒每慨然懷出塵之想父母不欲違其志七歲即令出家禮本府開元寺公為師服勤左右朝夕匪懈師性醇厚而言簡檏人未嘗見其喧譁戲笑年二十得度受具遍遊講肆微言奧旨無所不達謂單提直指乃向上宗乘之捷徑遂至京師謁西雲禪師安公于大慶夀寺一見輒加賞識命入室侍香師勤於咨決雖示以呵責略無動色西雲大竒之傳衣而付法焉西雲唱滅師法兄北溪禪師延公嗣領其衆首命師主城西之廣福寺居歲餘挈瓶錫南遊襄漢江淮間凡名山巨剎大善知識無不與之相叩擊而䆒其㫖趣㑹于大同還駐竹林寺未幾復歸休于慶夀尋以北溪命主彭村之觀音院垂及五年四衆傾慕施者坌集大殿丈室門廡咸為之一新北溪退席法兄魯雲禪師興公繼之命于苐一代玄冥禪師法座秉拂拈香開堂演法出丗住持奉聖州之保寧寺甫四年信嚮者愈衆魯雲逝而師以公舉𥙷其處亦止四年小大之務靡不尽心䇿厲其徒多成法器俄一日大書偈曰和南上禮諸髙德別請他人拯釣船書畢投偈于地芒鞋竹杖出門徑去衆皆大驚奔走求之不得或報師隱於文明門外一小院兩班執事率衆邀迎師不為起再書偈曰䇿杖腰包歸去也再來不直一文錢衆莫知所為乃相率白于宣政院遣客省使詣師挽留之仍詢以逺引之故師曰祖師有云三年不去五年不住此乃從上流傳之遺凬客省使還院白其事皆歎曰去冨而就貧真所謂高僧也太師右丞相秦王伯顔在中書亦遣官再三勸請度不可强乃聽其所之師遂歸隱于順德之開元寺足不出户者踰十年顯儀既𬒳上旨來𥙷其處乃遣迎致師於故所住觀音院以便展省師年埀七十耳聰目明住丗歷劫未昜量也所度弟子勝喜勝寧等若干人嗣其法者今慶夀顯儀及永平開元住持某等若干人惟慶夀實四方禪宗列剎之首朝廷嘗刻玉為印以賜之崇階㫫位之所加後先相望當路知師雅意謙退第奏請降㫖賜號某大禪師其高凬逺致槩可想見而臣溍起自衰退久竊寵榮顧何足以知師受記書辭無任愧懼其銘曰巍巍人師祖道是承兼善三學實為一乘精求博訪玄機密契燈皆同明海無異味推其自利用以利他雲奔川湊如客赴家功成身退拂衣逺舉蟻聚鱗集如兒失母四衆攀慕万夫莫回迹有隱顯心非玄來動也時行靜也時止出以濟物處以全已龍象所萃人天具依鴻飛冥冥弋者奚為名之我隨上徹當寧詞臣作頌清凬千古金華黃先生文集卷弟四十二
