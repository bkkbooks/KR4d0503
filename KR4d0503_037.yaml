body:
  text: 臨川危素編次番昜劉耳校正墓志銘青田縣尉鄭君墓志銘青田縣尉鄭君既殁且葬三十有七年其子太和乃以書來曰先君子之葬已久冡上之石未有刻文四子惟大和最長而獨後死大和年今八十恐一旦溘先朝露無以見先人於地下謹奉狀以請幸而卑之銘死且無憾夫終者人所易忽逺者人所易忘大和於其親能無所忽忘如此厚之至也其何敢辭按狀鄭氏之先家睦州宋元符中有徙婺之浦江者兄弟三人其季曰淮為鄉之善士人稱其所居里曰仁義里淮之子曰煦曰熙曰照照之子曰綺明春秋榖梁學綺之子曰聞聞之子曰運運之子曰政則君之父也君諱德璋字子振少通敏長益自樹立居家著雍睦之行勤身率下盡力於生業能使資過其舊未始以冨而不由禮晨興必具冠服詣祠堂展謁退坐一室隨事巨細處之咸中肯綮夜則秉燭呼子弟誦孝悌故實倣象山陸氏製訓辭百餘言每月旦望令子弟一人讀之家人悉拜而聽焉咸淳末國勢日蹙愚民幸變往往嘯儔侶依山林投間竊發人罹其毒散走避匿空村無煙火動數十里君以計誘致倡亂者縛送有司集同里作寨柵以防其餘黨之奔突人乃獲安常平使者王公霖龍行部嘉其捍衛鄉井之功以聞于朝會處之青田大盜數起即以君為青田尉君度時事不可為辭不赴至元間江南新附兵燹之餘居人乏食賴君以活者甚衆君素以剛直與物多忤里胥或誣陷以不測之罪當會逮楊州君兄德圭抱君哭曰彼所欲害者我也無預爾事我往折以片言則姦狀白矣爾去其如彼何言訖詭以他故出就吏君垂泣而追之至楊州兄已死仰天號慟絶而復蘇者數四負其柩歸葬廬于墓者再期兄子文嗣幼病僂不良于行鞠之逾於巳子且為娶於名族君雖老語及楊州事猶為之嗚咽不已君廣顙豐下身長七尺餘風神峻整性尤方嚴子弟聞其謦咳皆斂手正容步履不敢肆也晚忽喪明六年而終君之寢疾也大和方效官使于鄱陽亟歸則殆將屬纊大和輟泣問齊家之道君張目厲聲曰母聽婦言乃暝大德乙已九月七日也享年六十有一眀年二月二日大和等遵治命奉柩葬于家南二百步東明山娶黃氏子男四人長即大和某官次攴泰次文厚次攴轟女一人適嚴權孫男九人鋭欽鑾鍾鉉銖巨鎡銘女三人適洪興黃譽金華張志道曽孫男二十二人源深漢泳洵渙淵湜洪瀛淇濬渶淂澧洧漴泉瀱沂􅔿瀦女九人適周宣張善應洪廉洪蓮義烏王剛金華應隆韓觀其二許適洪亨東陽蔣嘉亨玄孫男三人棣楨棫𥘉君之髙祖始合其族同居而共食傳之再世纘承惟謹逮君復考舊規擴而大之文嗣及大和兄弟又能率群子姓修其業而不墜有司為請于中書而旌表之號曰義門嗟夫世之仁人君子推其親親之心以及於民物者固多矣有如君家代不乏人迓續其遺休於無窮者幾希銘以彰君之德亦以朂其嗣人云爾銘曰鄭以國氏支分于睦來家浦陽大合其族惟君家教曰孝與悌軫夫顛連雖死弗辟君材則多冝有位序排患釋難而卒無取洸洸義聲撼于州邑有伉其門子孫蟄蟄孰云君子其澤五世勿替引之是在來裔穀城縣尉蔣君墓志銘故將仕佐郎襄陽路穀城縣尉蔣君諱吉相字迪卿其先以國為氏代有聞人系序可見者唐吏部貟外郎曰則則之子曰勳仕吳越為其檢校司空兼御史大夫始家于婺之東陽勳三子其仲曰承郢承郢之子曰駟由駟八世至君之曽大父諱頴又卜居縣南之橫城大父諱天廙宋紹熙中輔迪功郎父諱沐特逹多材智推先志立義孰延時之巨儒尚書侍讀方公逢辰以為之師後進賴其淑艾率為佳士里人孫祕丞德之時宰賈魏公似道客也嫉其得士譽譛于賈復使人怵以禍福俾獻其所蓄珍玩之物弗為動則中以飛語坐徙廬陵賈以誤國獲罪去乃得自便逮世祖皇帝統一海內簡拔南士可官使者江東宣慰使左丞廉公以其名聞授進義副尉南康路建昌縣主簿年巳踰六十謝病而歸終身不復出君幼警敏年十一罹寇難能以計免宗黨咸竒之暨成人循循雅飾晦迹林泉間以溪逸自號示無仕進意會廉公之壻平章政事孔公宣慰浙東廉公念主簿公不置屬之訪其子若孫孔公一見君深加器重居館下未幾而孔公拜湖廣行中書省左丞尋𬒳召遂與俱北上時廉公已捐館舍孔公以見成宗皇帝有旨令備宿衛君驅馳兩亰侍上起居服御以恭謹數𬒳稱奬孔公欲命以官而廷議有不合弗果用君將南歸值仁宗皇帝入定內難正位東宫因留事焉時𥘉置利用監擢君為其知事特下令卑承事階而執政疑非舊法乃已亡何以使事乘傳至閩中感瘴癘成疾還過蘭溪去家僅二百里移疾而歸疾稍間將遂退休以就間適上既登極春坊寮屬並以恩超遷有單祓者君為知事時所任佐史也亦得儀封尉君巳升朝官品在第八乃止調君穀城尉階不過𥘉品人皆以銓曹失其平謂君盍自陳君曰此上命也敢計其崇庳耶即日就道其縣長官故給事於省闥未嘗獲與君齒一旦為寮而君顧位其下恆不自安事無大小必咨于君兵燹後民多非土著往往輕生而喜鬪其不能自業起而為盜者尤衆舊以主簿兼警曹政既不専人益以慢至是設尉君首為之鎮之以靜紏之以嚴俗為變而盜亦衰息民有訴仇家縱火者君呼其鄰訊之曰火自內出乎抑自外入也皆曰自外入耳乃逮其仇屏箠楚以情詰之則惶恐具服其察理之明感物之誠又如此部使者聞之欲辟置幕下君語人曰尉雖卑官猶得以伸吾志奈何持文書俯仰偵伺為其所不欲哉固辭弗就君讀書不屑屑於章句而能通其大義處事之中節殆非偶然主簿公夫人曰劉氏而君戴氏出也以咸淳十年十有一月辛巳生君於廬陵寓舍故主簿公以州名命君甫閲月而戴氏死旅殯廬陵餘四十年君每語及之輒泫然泣下穀城書滿代者不至謀於故人金同曰奉遷改葬是有著令吾將由漢入江泛湖以逹廬陵子其護吾家沿江東下同曰舟行千里風濤不測我不能獨任斯責其俱歸而陸走衢信以往可也君如其言民聞其去皆遮道請留委曲勞遣久之乃羅拜而别君既抵家將治行而前所患瘴癘之疾復作情愈迫切飲食寢處惕焉靡寧疾竟不可為以至治元年正月丁酉卒於家享年四十有八臨終無他語惟戒其子玄曰汝能返葬吾生母吾死瞑目矣君先娶施氏宋國子博士郁之孫女逾年而出再娶朱氏故上虞縣尹文魁之女子男一人玄也女四人長適道州路總管府推官李𥙿次適同邑胡珣浦江趙友淳金華許元孫男四人允同允興允亨允升女四人先是玄以泰㝎四年正月丙辰葬君仁壽鄉戴𥘉里水齧其墓乃以至元二年十有二月乙酉改葬于乘聰鄉御史里夏山之陽虛其右以為朱夫人之壽藏作祠堂於墓前百步以生母戴氏慈母曽氏祔食其别室仍卜地墓旁造竁穴俟戴氏之柩既返而並瘞焉其改葬後七年玄始奉君壻李𥙿所為狀以銘來屬竊觀君服勤先朝遭逢之際亦盛矣而不得在顯位及隨牒外輔俯首下僚尋常資級猶可序進而遽止於是小試之效雖班班可覩蓋未足展其平生素藴之萬一也殁又無以振之於幽可乎庸弗讓而為之銘俾刻焉銘曰士之用舍恆係其逢乘時捷出或取顯融嶷嶷蔣君鱗攀翼附不自奮飛獨行其素雨露所濡蔚乎良材孰尸繩墨奪為桷榱有隕自天豈不謂命嗇不使年莫俟其定夏山欎紆清淑所鍾兆兹新卜以寧君躬尚俾嗣人飲其福澤龍光是承賁于松柏武義縣尉蕭君墓志銘元統元年冬十有二月甲戌新婺州路武義縣尉蘭溪蕭君以疾卒于京師年五十有二君二子鑑鉉俱留杭京師距杭四千里凡再閲月問始通霜露草莾號走靡及君弟致祥時為太尉府長史具衣衾棺物以斂於是太尉來歸􅉠士大夫知君者咸弔哭而相其遣奠挽引之事二子既迎君柩南還而卜地于蘭溪某鄉某原將以某年某月某日葬奉臨海項君炯所為狀屬溍序而銘之按蕭氏由建安徙婺之蘭溪者曰迪功府君譜失其名逮君六世矣曽大父曰果宋承信郎監臨江軍古城酒稅務大父曰化龍仕國朝為登仕郎兩浙都轉運鹽使司龍頭場鹽司丞父曰玉奉訓大夫紹興路總管府判官母何氏某官某之女君諱資字深之自為兒童時巳嶷然如成人貌和而內有守事父母無子弟之過與人交重然諾特不喜拘曲士亦未嘗輕議人是非家故饒於資承之以儉勤罔有廢缺然其待鄉鄰以恩細人之家有逋租弗能償往往棄不責平居不溺意珍異之玩惟以古書籍法帖來售則厚直取之所藏書僅萬卷日誦率數千言下籌遍至百乃止而釐家務少間復挾册莊誦雖祁寒暑雨弗輟教子必延名師非聖賢格言大訓不令接於心目獨嗜為近體詩遇勝日美景翛然意得輒於詩發之有雙溪小藁二卷藏于家君娶范氏奉議大夫泉府少卿宇之女子男二人長鑑次鉉女四人長適張堂次適莫維賢餘未行孫男四人溥浩演沔女一人𥘉君少壯時耻為物役不汲汲於祿仕閉關却掃若將終焉或為君言前人所藴積以封殖乎祚胤者不可使掩遏而弗耀君乃幡然而起以門蔭自陳持文書詣京師赴吏部銓溍方竊食詞林官曹多暇日與君遊欵洽甚亡何而溍以憂去間一歲聞君得調近地命下而君已不及待嗚呼悲夫微二子之請尚將以區區之文寓吾情銘固不得苟辭也銘曰行乎遲遲三年而飛名乎我隨如取如携繅籍既施乃隕璧圭泉疏壤夷考卜在兹前人之災後其收之饒州路儒學教授許君墓志銘君諱熹字華甫婺之東陽人宋宣和中睦寇竊發八世祖瓊聚民丁衛鄉井𬒳州將命赴援有功得官尋以城中兵食不繼力戰而死里人至今廟祭焉大父諱元凱父諱文昌號空雲處士無子弟文奎實生君年十五育以為巳子處士兄弟素嚴毅君左右侍養各盡其道先意承志咸得其歡心於同産弟兩人交愛尤篤先世之田廬一無所較公上徴求百役之須皆身任其費子姪化之靡有間言異時處士兄弟從鄉先生石公遊有雋聲後二十年復遣君兄弟受業石公之門君幼警敏既長務以靜専自持同門中推為髙弟用舉者試憲府例當輔縣教官隨牒赴儒臺𥘉筮得浦江會朝廷欲重師儒之選俾職教一縣者悉改調於外省君解職以名剡上俄又命更其法從宣閫署置同時捧檄而至者一百四十人皆以次輔授序遷間以舉子業自奮君獨恬於進取有司強以充賦試不合輒棄場屋家食者久之始分教於武義再調處之麗水丁本生親憂服除或謂稍增加所歷月日則當升君不可遂復調台之天台用纍考充湖之東湖書院山長在武義取豪民所據山塘歸于學在天台預鄉薦者三人輟官俸斥私錢禮遣之募好事者捐田以助養士東湖創於里之大家事多綿蕝亦勸之割田附益焉秩滿調饒州路儒學教授拜命而卒臨終戒其子曰爾等入當善事而母出當善事而叔父扶植吾門户使勿墜他則平日誨爾熟矣言訖而逝重紀至元之元年十二月二十一日也享年六十有一六年十月四日葬所居西北二里某鄉某原娶劉氏子男二人曰怡曰愈女二人壻曰王濟川蔣世安孫男四人女四人君貌癯而志俶儻自奉殊儉薄而客至館穀必豐贐必厚産不踰中人而輕財急義族姻里黨老而無依幼而孤者衣食之未嫁者擇士族歸之歲飢鄰里不能自活者賑恤之故其善日積而家日耗殁後囊無餘資廪無餘蓄久乃克葬諸孤既志歲月納壙中仍蹐門請豫銘以揭于墓道豫幸獲執弟子禮於石公與君為同門知君為深庸托志所述參以豫所知序而銘之按東陽許氏出晉孝子孜孝子史有列傳其子孫至近世愈蕃衍居邑中者為西南兩族而君之先别居近郊之梅峴邑居之族掇世科踐朝著若以延賞入官者數十百年相望不絶而君之先獨不大顯雖能捍大患以死勤事後之人未有食其報者君生今聖時而以文學起家人謂其將致身華要又邅廽而不進甫霑一命竟不及祿其不可哀也夫銘以慰君亦以告于嗣人庶有知其委祉之自而思亢其宗者銘曰九軌之塗衆方疾驅長𥚑佩玉行之徐徐與物委蛇世或謂迂銖稱寸量月計有餘成之匪亟得而莫居載其榮光歸賁幽墟善積于家穰穰所儲有謹其承其發必舒鸞翔鵠翥亢其門閭惟銘有徴永世不渝丹陽縣尹致仕薛君墓志銘君諱觀字處靜姓薛氏家于慶元之鄞縣聚族千指同居合食者五世號為義門宋淳熙紹熙間里中數十百家再燬于火而先廬獨存人以為積善之報曽大父濂弗仕大父起之待輔太學生父辰伯入皇朝以君故贈承事郎紹興路同知餘姚州事母某氏贈宜人君讀書善強記為文未嘗起草不妄交流俗而喜接引後輩生事雖儉簿親黨無依者必周恤之雅無意於仕進自國家著取士令且十年足不踐場屋至治癸亥有司迫使就試遂名賢書同里上春官者三人其兩人並以進士教國子而君以特科分教平江之常熟州閭巷之人莫不以為榮秩滿遷杭州杭實東南一都會士風尤盛君為學官所講皆道德仁義之説金穀出納第持其大綱而理田土之冒沒完屋室之弊壞亦未始不盡心焉用纍考輔將仕郎主常德之沅江縣簿沅江俗淳古官府事殊稀簡尉偶缺郡俾君通攝之在官三載盜賊日益衰少君不自以為功每謂吾求無愧其職足矣援禮引年授承事郎鎮江路丹陽縣尹致仕君既得謝而歸日與賢大夫士從容觴詠間絶口不及世事人見其耳聰目眀方期以上壽俄感足疾以至元六年九月十七日卒于家享年七十有六娶楊氏封宜人先五年卒子男一人憲女一人適楊天祺孫男一人永年女一人未行至正元年某月某日憲遵治命奉柩葬于其縣翔鳯鄉之原前事逾重江抵豫西湖寓舍以銘為請始豫識君于鄞見其循循雅飭知為篤厚長者惜其韜晦之久逮出而小試已迫於老之將至而無所用其材為可憾也庸因其請而銘之曰有待者時不鳴不飛翔而後集覽兹德輝其機則張所發也微不震以轟卒不大施鼓缶而歌式全其歸掩石幽竁昭以銘詩許村場鹽司管勾謝君墓志銘故兩浙都轉運鹽使司許村場鹽司管勾謝君既殁且葬其子資深以狀來謁銘始豫識君於京師長身美髯氣充而志鋭諸公貴人為其知已者多欲引拔之然竟無所遇合隨牒調輔而去以死嗚呼悲夫君諱瑞字信翁惟謝氏逺有世序其家于杭於潛天目山之陽莫詳始所以徙曽祖敦祖宣皆有隱德父輔中歲慕黃老氏建道院白鶴溪上自號鶴溪處士其卒時年八十五矣援筆大書十有六言端坐而化人疑其仙去云至順間朝廷募民入粟賑關陜之飢處士素樂施與亟俾君輸米伍伯石有司用例授以官非君父子始望也君𥘉由橫浦場鹽司管勾改吉安路永新州升鄉寨巡檢升鄉在萬山中群盜所出沒君不憚警捕之勞民賴以安到官甫三閲月俄有處士之憂服除乃得許村許村苦海水為害課比不登而私販又數為官府之纍任令丞者畏吏議多自引去君既就職曰此理財之一事耳以公滅私何事不可為是雖拘於法吾用法外意為之可也未幾而課日增羡姦民亦無所售其私亭户有交訟者則委曲諭遣之事益以簡既書滿受代未及歸而屬疾以至元五年秋七月丙子終于海寧州時和鄉長壽庵之寓舍享年五十有七庚辰返柩于家六年春正月癸酉葬于雲谷里沈村下塢之原娶阮氏子男三人長即資深平江等處財賦提舉司吏目次庭芝次庭圭女三人適孫璹滕𥘉徐煥孫男七人鏞鏜銓鉷鍈鑑鎮女三人皆幼君事親孝𥘉處士以父有危疾刲股和藥以進疾隨愈其後處士亦得疾危甚君刲股和藥如處士之奉其父而處士竟無恙治家有法閨門肅然遣其子受學於時之名師遂至于成人性質直不喜以機巧御物人有忤巳𥘉若不能平終亦不含怒蓄怨也資深之來謁銘君兄石實狀其行豫未及為之銘而君兄亦卒嗚呼不又可悲也夫銘曰謂不有時兮孰振而起之謂不有命兮孰遏而止之百年之積兮一朝而啓之不卒其施兮竟孰使之後有興者兮尚克嗣之建德録事劉君墓志銘君諱環翁姓劉氏其先自婺之金華徙台之寧海居縣東北之閬風山曽大父皓宋文林郎昭慶軍莭度判官大父應球宋迪功郎慶元府慈溪縣主簿父圭年十六入太學遂家于杭仕皇朝為進義校尉寧海縣東奧等處海船上百户母陸氏君生三年而不能言既成童敏悟絶人讀書至忘寢食母懼其以勞致疾禁弗與燈燭君竊篝火閉窗隙坐必至四鼓年踰弱冠出從名師受春秋學取元統元年鄉薦會科舉事廢執其業不少懈若有待者逮今天子更新庶政科舉復行遂以至正四年再薦于鄉登五年進士第授將仕郎建德録事有在君弟子列而與君為同年生者曰文宣死於疫君經紀其喪事無所避因染疾遷寓門人廉氏家而卒五月某日也得年四十有三君𥘉娶費氏前若干年卒後娶顧氏合卺甫五日而君應薦北上費氏之媵方娠而未生也君卒之日手自為書奉束帛為母壽第言旦夕南歸未幾而廉氏家以其書與君柩俱至費氏媵之子邵祖生已兩月君不及知矣母與仲兄饒翁哀慟幾絶時進義府君殁巳若干年猶旅殯于杭饒翁乃啓其殯并君之柩返于寧海卜以某年某月某日葬某鄉某原且以狀來謁銘豫筮仕寧海聞閬風山中有兩先生曰劉公某曰舒公嶽祥並以文章大家師表一時心甚嚮往之而兩先生之不可作已久暨辱交於君乃知君于劉公為從曽孫舒公之子叔獻則君所從受業也木水本源有自來哉君為人介潔不阿然不喜臧否人物與之遊者莫窺其涯涘其訓諸生于杭學具有師法識者多以逺大期之際逢聖時賢才彚進而君獨遽止於是可哀也已始進義府君有子年十二而夭臨終言我死當復為劉氏子後十年見夢于父母曰我至矣果再得子八歲而又夭後二年復見夢於父母曰父母撫我厚豈忍捨去已而生君遂取昔人識環事名之曰環而字之曰環翁其再薦也適感異夢乃以字為名曰環翁云銘曰不有時兮孰甄而拔之不有命兮孰夭而閼之得於彼而喪於此兮孰豫而孰奪之母倚門而啼兮兒􅈱􅈱而泣靈之歸兮何嗟及兒勉學兮天不忘往必復兮後其昌徽州路儒學教授陸君墓志銘君諱德原字靜逺姓陸氏平江長洲之甫里人甫里實唐處士天隨子故居君蓋其後也曽大父邁大父文明父應祥母周氏君少知學治别室延宿儒與居與遊左右書數千卷常乘間披閲之家在民數中稱多資自視欿然不敢與有力者爭其豪侈恆惴惴焉以不克保前人之遺業為懼已而同郡資相埒者稍稍傾散惟君獨完然能尚義而好禮遇歉歲細人之家賴以全活甚衆館四方賔客無虛日莫不滿意而去訃音所及或不逺千里往􅉠之永嘉林寬以文學知名君與之年相若以兄事之時從問古今體詩寬死無以斂厚恤其家而為嫁其女寬弟某死復為買棺以葬君每見浮屠老子之居金碧亂人目而儒宫往往就摧毀慨念世俗訹於福報之説而不知聖人道德仁義之澤𬒳於無窮也故於學校之事尤致意焉族有田千畒當得君曰吾衣食幸有餘又私此田不可創義孰以田歸之遣重幣迎儒先生為時所信重如陸君文圭龔君璛柳君貫者以為之師户屨至無所容筆劄飲膳之物惟所須而具刻古靈陳公製時立志已不凡言不妄發為人謀必以忠不以家有餘資而華其冠服教子治家一以勤儉外舅陸公父執也君嘗從之學為吏事察君材可用以女歸焉君贅其家執子壻禮理家事惟謹家既日豐乃出而異居婦家所當與者略不以屑其意人以為難君生於前至元十四年十月庚申卒于後至元二年十月丙子享年六十以三年八月甲申葬長洲縣陳公鄉先墓之左妻陸氏子男一人曰右則杜氏出也好學而能文久遊都邑用薦者當得官以祖母在無他兄弟固辭士論以此多之女三人長適海門縣尉吕濤先卒次適施友次亦杜氏出未行君葬後五年右以狀來請銘豫觀古之仕者行其志而已所志苟不在是雖貴且冨弗取也幸而獲從其志之所適雖卑官下僚猶將安焉君庶幾能行古之道者是宜銘乃托狀所述而銘諸銘曰惟古之人仕不擇祿有非其志不逺而復猗歟沈君或久或速惟志之求其得常足惡盈好謙神之式穀委祉嗣人叶此吉卜嘉議大夫僉宣徽院事致仕孫公墓志銘至正七年秋肇慶路總管雩都孫公以疾請謝事制授嘉議大夫僉宣徽院事致仕命下而公以九月十日卒于肇慶其孤勝安壽山既返柩于雩都以八年某月某日葬某鄉某原乃以鄉貢進士唐旗之狀北走京師介翰林國史院編修官王君大本謁豫為之銘王君辱與子為僚友其所稱道可信不誣豫不敢拒也按狀公諱伯顔字元晉姓孫氏其先自太原徙居青齊間唐鳯翔少尹鍠生刑部侍郎揆中書侍郎拙刑部史有列傳中書避地南遷家于虔之虔化虔今為贑州路而虔化為雩都縣雩都之有孫氏自中書始中書之子誗以材武為某官其四世孫長孺宋進士以太子中舍知潯州中舍之孫立節登進士甲科以不肯為條例司屬官忤王荆公及為桂州節度判官力抗經制使謝麟而活大小使臣十二人於死蘇文忠公為作剛説者也其二子曰協曰勴皆從文忠遊協亦起進士以某官知嶽州於公為一世祖髙祖諱延休晦迹弗仕曽祖諱德誠皇贈松江府知府祖諱興禮皇贈德安府知府階官皆中順大夫勳皆上騎都尉爵皆追封樂安郡伯曽祖妣李氏祖妣曽氏並樂安郡君考諱正臣皇贈祕書少監纍加同知淮東道宣慰使司事副都元帥階自朝散大夫至中大夫勳自上騎都尉至輕車都尉爵自樂安郡侯進封郡公妣陳氏自樂安郡君進封郡夫人公少開敏尤精於譯語大德𥘉年甫十五逰京師得備扈從泰㝎中侍元帥公入覲於咸寧殿有旨命中書録用之公辭不敢當尋辭監修國史譯史天曆𥘉還自上京改辟大司農司譯史今天子重紀至元之四年用纍考輔官授承務郎京畿運糧同提舉禁綱吏之侵欺輔壩夫之逃亡舊法運舟五歲一易請展為十歲以紓民力役徒受直必親給之宰相以為能至正三年奏除朝列大夫廣東市舶都提舉琛貝山積一毫不以自汚部使者及帥臣交章薦其材任牧守拜中大夫肇慶路總管兼勸農事下車之始痛戢黠胥悍卒之舞法病民及科取追呼之煩擾嚴求盜之法而時出法外意諭使自新民所食鹽歲為價十五萬緡率令民先期輸官公命先給鹽而後責其價至於興學校舉遺逸皆世俗之所謂不急公獨盡心焉伯父良臣撫州萬户府經歷叔父毅臣肇慶路總管府推官輔臣德慶路總管夢臣朐山縣尹信臣新會縣尹兄寶孫僉慶逺安撫司事弟鼎之子赫斯廣西宣慰司照磨一門冠蓋後先相望於千里之內人以為榮而毅臣前在肇慶有聲公之至也郡人莫不胥慶焉廣東分閫闕官檄公攝其事所控制兩路三州皆要害之地公鎮之以靜民夷帖服居數月而疾作遂不起享年六十有四公垂屬纊惟壽山在側戒以務學修身孝親敬長語不及他勝安來省公疾中道聞訃逮其至公已不及見矣公娶卜氏纍封樂安郡夫人後公九月卒子男二人勝安壽山也女四人孫男一人女一人公性簡質居家孝友與人交重然諾喜獎拔後進周人之急其發為政事皆自修於家者推之惟有其才有其時而設施未竟士論惜焉餘慶所鍾後將復振卑之以銘使刻以俟焉銘曰惟公之先家有世科用而弗究儲祉則多克生才彥纂其遺緒際今昭代咸有官序公位三品有社有民施于有政利澤在人盍疇其庸俾踐朝著年未及謝胡奪之遽公則逝矣不亡者存承休襲美在其後昆無往不復惟天可必惟銘可徴刻志幽室都功德使司都事華君墓志銘故都功德使司都事華君之子幼武既介豫友陳君謙求銘其大父府君之墓尋復以書來曰先君之殁三十有五年而冡上之石未有刻文今方改卜奉遷不有以識之懼歲月寖久後人不知兆次之變易或致于湮昧曩者幸獲私於執事而託吾祖之不朽兹不敢以他屬也是用有請而不嫌其瀆惟矜而卑之銘豫衰年多感不欲銘其父又銘其子而陳君歷援前賢銘人父子者為比不容卒辭君諱野仙一名鉉字子舉其先自汴徙常之無錫曽大父諱詮宋將仕郎大父諱友聞仕皇朝為無錫州稅務提領父諱璞以入粟振荒當輔官辭不受尋用薦者特授進義校尉晉寧兾寧等處打捕屯田都總管府總管又辭不拜豫所為作銘者也母王氏君自為兒時即不凡既長慷慨尚氣莭處事剛果明決一無所撓意所欲往人莫能回華氏故大家宗族鄉黨率務以資相長雄君獨不肯苟徇世好而有志以功名自奮出與逹官貴人酬酢未嘗以少且賤自處而有所退縮見者無不器重之君大父亦欲成其志俾北逰京師君即日具舟楫徑行去其家數千里無少顧戀至京師未幾以才受知於月者罕脫脫罕兩院使因共推轂得備宿衛輦真吃刺思司徒時為都功德使尤見禮遇奏授使司都事至大某年某月也朝廷之制由布衣進用者𣪚階下所居官二等都事官七品當冠以八品文階而銓曹靳弗與近臣有欲為之請而弗果言君亦不以為歉都功德使所掌祝釐禬禳皆朝廷重事每入對上前都事輒載筆以從書其奏目及所得聖語雖在庶僚而日近清光士林中以為榮居亡何俄患體熱而咳李梁公領太醫亦雅知君屬其院官親為診視治療後三日病良巳還白梁公言其病巳去者七分餘三分則其一猶可為其二使俞扁復生亦無如之何也已冝聽其亟歸君於是謁告就醫江南抵家接親舊相問勞如平時殊無所苦居五閲月而病再作氣逆臚脹遂以皇慶元年九月八日卒於家得年二十有六夫人陳氏誓不他適而保其遺孤後二十年有司乃以上聞而表其門閭名之曰旌節里子男一人即幼武時甫六歲陳夫人念嗣續之重在其一身撫育訓誨甚至幼武亦不敢恃愛而縱弛恆以其期望者思無負所託訖能有立至於成人女二人壻曰鄧德章鄒德逺孫男四人女三人始君以其卒之月某日葬于所居梅里之冷村而君弟鎮鏐及妹先後相繼死並厝一垣內墓位不與禮合隂陽家尤以為忌至是乃得善地於其西北若干里羅村之原以至正某年某月某日改葬焉豫觀士之有其才有其志而不有其命泯滅無聞者多矣君雖未壯而卒弗克究於設施而化行其家靡他之節無愧前古引而勿替嗣世有人潛德幽光久而彌著尚何憾乎豫不及識君而陳君之言可徴不誣銘諸石章庶以慰君於泉下云爾銘曰君先汴人後南徙或仕弗顯或弗仕逮君有作承委祉生逢盛時又才美君家系出宋公子孰無望公復其始入通朝籍何壯偉以疾賜告遽不起三年一飛未渠巳繅藉甫陳璧乃毁既葬而遷無違禮君其永寧芘後嗣揚君英聲垂千祀為之銘者太史氏乾寧軍民安撫司文昌縣尹王君墓志銘君諱文鍔字勝逹姓王氏撫之臨川人宋丞相荆國文公安石之弟太子右贊善大夫安上生承奉郎贈朝散大夫旗有子曰右朝散大夫直祕閣梲葬其母劉氏於郡城東百里鍾山之下山旁有池曰上池心甚樂之嘗曰昔荆國葬先太師楚公於金陵之鍾山因卜居其處今吾親墓所在山名適同吾其老於此乎遂築别墅携其子瑀而居焉瑀官石城尉自瑀而下六世皆不顯七世孫曰元亨自號冕峯君之曽大父也為人素厚重歲飢出粟取直與衆人無異而隂以錢置粟中與之其好善而不欲近名如此大父曰天經有隂德父曰慶來少從淳安令曽公子良逰以材略自負江南新附群盜竊發里中大家為所剽掠郡委以招捕不旬日悉剪平之及卒曽公為銘其墓母黃氏奉其姑至孝姑病瞽日抱持盥􅌨閲二十五年無少懈儒學提舉姚公雲表其墓曰孝婦而為之銘三子君最長生而警敏丱歲謁父執觀察判官徐公龍貴跽而問曰為人何以自立徐公大竒之自是益自刻厲讀書為學頴出儕輩間時列郡役民為平凖庫吏以不習官府事宜多致破産爭納賂祈免逮役及君家君曰姑為之既而用君言定令以吏充管庫而役不及民人以為便父病革顧三子曰年長者不足慮所憂者幼子耳君曰當竭力願無以為念後卒訓掖之為善士兄弟同室而居事母盡禮𥘉度集客不逺數百里母喪弔者數郡畢至林氏姊早寡作屋居之而以女妻其孤甥𥘉君之曽大父作義孰號明珠書院部使者聞而嘉之得其所著六義約説俾郡守上于省部而以君為瑞之髙安縣學教諭遷吉安之龍溪書院山長吉號多士教官殊不易為君至士論翕服以纍考上銓部借授廣之南海縣黃鼎寨巡檢到官兩月盜起鄰境奉帥閫檄率弓兵民義泛海直抵其巢穴盜聞君來相顧曰王巡檢不貪且能撫治不可與抗羅拜於海島而去未幾海北寇起帥閫檄君部軍糧數千石或謂君海道不測盍以計免君毅然曰食其祿安敢怠其事即日遂行三日至金星灘雲霧晝晦風濤大作舟多漂散從者皆泣下君語之曰母懼今日之事國事也海神享國家之典祀其不相國家之戎事乎為詩投之風即止諸舟亦來集人以為異比至海北而大軍移屯海南又令以糧往赴之踰月而逹分省官獎其勞欲用為帥府掾辭不就歸構新居扁其樓以海嶠曰吾於海上艱險備嘗之矣幸而少休可遂忘之耶尋調攸州儒學教授學廪素薄君為之規措而教養之具得無乏絶除乾寧軍民安撫司文昌縣尹階將仕郎乾寧故海南之瓊管道險且逺或謂君可無行君不答奮然就道在官歲餘令行禁止日以無事慨然曰吾冒瘴癘涉鯨波而從事於斯者無他庶幾效一日之忠爾今老矣雖久何為即解印綬去父老遮留不得既行而道病至家乃愈飲啖步趍如五六十歲人日與親朋酌酒賦詩嘯歌為樂凡七年而終至正六年閏十月十六日也享年七十有七娶李氏子男三人長宗震吉安路儒學教授次欽未仕次佐用君廕當輔官未命女四人長適林明次適劉晉順倪森皆前卒次適夏元英孫男六人女五人曽孫男三人女四人宗震等既卜以某年某月某日奉君柩葬于饒州安仁縣某鄉方塘之原前葬俾佐奉曽君堅之狀來謁銘狀稱君平居議論亹亹主於建功業亢宗族慷慨卓立無柔懦趑趄之態年過七帙氣不少衰有馬援班超之風焉豫弱不自振未老納祿暨蒙恩復出竟以殘年餘力無所可用乞身而歸方有愧於君之老而益壯安能以材驅氣駕出竒語揚英光乎焉以佐不逺千里踰江湖而來序而銘之姑以慰其孝思云爾銘曰逺矣王氏望于臨川保其世業與時周旋君材則豐又克有志不卑其官樂職嗜事返乎𥘉服肇正師模有命自天製邑海隅竭蹶以趍老而益壯一日之忠無忘報上虛舟不繫勇退急流某丘某水卒歲優遊方塘之原石堅土厚銘昭其藏式示永久承務郎建德路建德縣尹致仕徐君墓志銘君諱沂之字聖與其先家于汴七世祖徽言宋右科進士積官武功大夫忠州刺史宣和間金人犯邉荖知晉寧軍主管嵐石路安撫司公事力戰而死贈彰化軍節度使賜諡忠壯建炎南渡子孫自汴徙衢更以文學自見君曽大父致明大父德英俱未及仕而殁父環起進士為修職郎揚州司戶參軍母沈氏君幼知學稍長善屬文國朝統一宇內治具甫新未遑以科舉取士杜門自守餘二十年時方尚文法吏事郡長二有愛其材敏者挽使任簿書大德壬寅始赴浙東憲府辟為書吏纍遷浙西江東十年之間遍歷三道所至以廉介自將贊其使者務持大體遇事一決於理不為苛刻以抉擲細微人稱為平其在浙西歲適大侵𬒳行臺檄分賑湖松江兩郡設策以勸分豪民閉遏不奉命者悉繩以法不數日得米數萬斛不足則發官倉以繼之事訖乃聞臺府嘉其得權宜而不責其為專擅所活以萬數用纍考上名中書皇慶癸丑授將仕佐郎溫州路總管府提控案牘兼照磨承發架閣庫管勾疏剔蠧敝小大庶政寖就條理會使節按臨其從吏乃君故所識拔恃契分通殷勤覬為其聚賕君正色拒之其人深以為憾假僉鹽丁事嗾郡吏巧為攀緣搆陷以快其忿君不自明引垢誣伏事聞于臺俾御史覆按無驗劾罷其人而事遂白延祐戊午調兩浙都轉運鹽使司仁和場鹽司管勾亭户多強梗不受要束姦民又習為私販犯法者衆君不急於威刑惟以理化之其風乃變歲課既登平民亦免株連之患公私咸以為便泰㝎甲子遷將仕郎延平路將樂縣主簿所掌獄之重囚數十旦夕檢視其飲食醫藥戒獄卒不得縱虐之而尹素貪暴數加法外之刑囚聞君詣郡府白晝反獄欲殺尹而逃既就執皆曰吾徒罪極無復望生苦尹之酷不得速死而􅢳幸生之心然恐為主簿纍故俟其出而後發聞者無不大息焉居二歲俄浩然有歸志曰吾年垂七帙諸子亦巳見頭角曷若歸佚吾老乎即日引年請納祿而去遂以承務郎建德路建德縣尹致仕命下而卒天曆巳巳正月二十有七日也享年七十有四臨終神氣不亂却藥謝醫翛然而逝娶王氏子男三人長辰孫以茂異輔儒學官今為承事郎兩浙都轉運鹽使司曹娥場鹽司令次任由翰林書寫授從仕郎澧州路安鄉縣尹次孺杭州路錢塘縣尉女三人長適前進士承直郎潮州路總管府知事孔濤先聖五十三代孫也次適汪應辰次適陳光祖皆同郡宦族孫男十人女五人君早失怙恃奉兄姊甚謹外姑婺矛牙居無子君以贅壻事之五十年如一日後以九十之壽終於將樂斂之以禮不逺千里返柩而葬歲時别為位祭焉君於用舍行藏未嘗以淹速為計較居家不殖資産惟篤於教子旁舍種竹數百個號曰竹所左圗右書焚香宴坐客至則與之徜徉其間優遊以卒歲辰孫等既卜宅兆于某縣某鄉某原以其年某月某日襄大事後二十年任從豫在史館乃以銘為請豫不敢以衰朽固辭銘曰藏器於身所待者時觀其會通與時推移亦既有逢不取顯位一命而上皆可行志位則不顯績用孔多其止時止鼓缶而歌貽慶嗣人及見其進接軫華塗交翔並奮積善有報難必者天夫獨胡為能得其全惟源之長其流乃逺昭以銘詩樹此碑板承直郎慶元路總管府判官致仕王君墓志銘君姓王氏諱奎字宿之其先台州人君始徙家慶元而占籍焉曽大父諱某父諱崇義贈承事郎慶元路同知奉化州事母葉氏贈宜人君𥘉以才見推擇為吏於郡府又以廉能見察舉為浙東西福建三道憲司書吏凡歷四考乃赴吏部銓授將仕佐郎婺州路總管府提控案牘兼照磨承發架閣庫管勾浙東帥閫辟為令史調將仕郎建德路總管府知事升承事郎延平路總管府經歷引年告老遂以承直郎慶元路總管府判官致仕君六歲而孤事母孝每以早失所怙弗獲承顔而祿不及養為歉居常忽忽不樂暨積官七品用例推恩乃詢諸宗屬在尊行而髙年者審其像命工以意圗之而加以命服如其官秩歲時祭享伸如在之敬焉嘗卜地為樂丘虛其中穴以藏父母之衣冠命諸子他日以已祔其旁君之致孝於親無所不用其情如此君素倜儻家務悉資內助一無所問愛其子而能教之性端慤不輕喜怒議論依於寬厚不以訐為直待人以和而無崖岸明白坦夷終始如一無不心服焉君居憲幕佐其使者鎮之以靜不事矯激沽名為郡僚彌縫闕失必盡其誠民𬒳惠尤深廉慎自持奉巳甚嗇宦塗跋涉五十寒暑南轅北轍備殫其勞晚乃得謝而歸終其天年出處之際可以無憾矣君生於宋寶祐元年十月六日卒於今元統二年四月十日享年八十有二娶周氏封宜人子男三人長某承直郎嘉興路同知崇德州事次次明俊次明德太常禮儀院某署太祝明俊明德皆周宜人出也女二人長適陳德泉次早卒孫男七人女九人諸孤遵治命以至元二年十一月十七日奉君柩葬于鄞縣西史山莊之原即君所自卜也豫納交於君最久君與豫别十有七年而殁又十有七年而豫與明德相見於京師明德踵豫門而言曰先人之墓逮今無銘者蓋未有所屬也知先人莫子若敢請豫不得辭銘曰嗚呼王君處為孝子出為廉吏人無間言官無乏事不求赫赫之名以震耀于一世時止則止優遊卒歲餘慶實多宜有開於來裔真㝎路總管府逹魯花赤致仕道家奴嘉議公墓志銘公諱道家奴蒙古人父闊端母不顔忽都公生有美質異於常兒至元十四年甫十歲即入見世祖皇帝愛其謹厚留備宿衛尋用為御位下必闍赤以材智見稱儕輩間叛王乃顔稱兵東鄙上躬行天討公從屬車冒矢石而前抵黑龍江戰數有功未幾復扈駕親征海都凱旋已久而賞典未行公謙退不伐還就宿衛之列絶口不自言元貞元年中尚卿也里失班秃魯等以功狀聞于成宗皇帝有旨特授從仕郎資成庫副使大德三年遷承事郎左藏庫副使七年遷承務郎右藏庫大使至大元年制授承直郎左藏庫堤點皇慶元年升奉直大夫出為大同路朔州逹魯花赤兼管本州諸軍奧魯勸農事至治元年轉朝列大夫入為豐潤署令泰定四年仍舊階同知晉寧路總管府事今上皇帝元統元年轉中順大夫同知道州路總管府事公任管庫克勤其職出納惟允治民多惠愛不自表襮以為名而所至政聲籍甚部使者數薦進之未及召用遽引年請納祿以嘉議大夫真㝎路總管府逹魯花赤致仕居歲餘遂不起公生於前至元五年七月二十八日卒於後至元五年十一月二十一日享年七十有二以其年某月某日葬于京城文明門外東石村之原公夫人曰奴倫氏次當兒次滿堂子男一人曰普顔女三人適阿塔罕拜住宣徽院判官七十堅孫男三人曰阿牙赤曰觀音奴曰太帖木兒女二人曽孫男二人先是公既謝事普顔用公廕為承務郎同知汾州事遷承直郎諸路寶鈔提舉後公八年卒至正七年十月十二日也得年僅五十有二以其年十二月某日祔葬公墓之左阿牙赤蓋提舉君長子於公為適孫以冡上之石未有刻文請于翰林學士承旨嶽柱榮祿公俾溍為之銘溍幸獲執筆從榮祿公之後誼不得辭第愧衰朽無能贊揚萬一姑以志其歲月云爾銘曰人材之生必于昌時公以弱齡昭受主知入持文墨出履行陳功成不居耻於自進天監在下曽莫遐遺試以劇職無適不宜既疇民庸盍踐朝著乃遽引年納祿而去公則逝矣髙風凛然亦既有子胡嗇不年尚其聞孫引而不替謁辭圗堅式告來裔從仕郎紹興路諸暨州判官致仕蔣府君墓志銘君諱葵字昌南姓蔣氏先丗成都人髙大父源登宋元豐進士第知汝陽縣因家新息曽大父誠大父椿父庚贈從仕郎杭州路臨安縣尹母王氏追封宜人君生質頴敏劬書力學性至孝蚤歲嘗為童子師講授邑里以供菽水之勞承顔奉飬歡藹如也至元丁亥江淮行省以儒辟君為吏兩浙轉運司兩浙鹽額數浩繁歲調官分辦文書旁午為姦莫之能防君為上其狀中書請刻分司印四降而用之大德間鹽法失治諸吏繫于獄屬君籌畫君以善利導人不迫不優而事巳集上官優禮焉考滿調溫之平陽州幕官其俗嚚訟君唯守律令吏不得欺每治死獄必反覆究其情而求活之比歲丁未杭州大飢江浙行省檄君賑之民賴以生者不可勝數未幾再調松江府又請降八品知事印今所用者是也廟學壞重倄之禮樂器悉完之其後復長平陽州幕平陽人聞君來爭趨迎百里外州之鹽課無蓻纍貧民君為視民田多寡以㝎其賦委里正掌之民利其便學舍為海潮墮廢歲久弗治君以儒者田計畒勸諭遂以更完士譽其美至刻石紀焉天曆戊辰謁選中書論資當贊襄一郡吏部以缺少奏授君湖州路安吉縣務稅課大使居二年于是君亦老矣遂告老以從仕郎紹興路諸暨州判官致仕卜居錢唐湖上一時名公如聊城周馳錢唐仇逺南陽鄧文原臨海陳恕可皆與君為髙交友襄羊山水飲酒賦詩以逸老志自號曰竹齋平生沉毅未嘗妄言笑毀譽用舍一無所動其心所居僅庇風雨郭外無尺寸之田家無餘資處之𥙿如也教子弟嚴與朋友信葬親故之不能葬者四人嫁外氏兄姨孤遺女三人以後至元四年三月草有六日卒于正寢享年七十有七娶錢唐夏氏封宜人先九年卒子二人曰宏由君廕補官今為某官曰完都水庸田司書吏孫一人士權興化路儒學正其年四月八日與宜人合葬錢唐縣履泰鄉佛衙塢口之原葬後八年宏等涉濤江走金華山中持翰林編倄官陳君繹曽狀請銘嗚呼若君之為其可不謂之賢乎哉溍嘗觀丗之為吏者操刀筆要利以肥其身以厚其子孫君一佐轉運三為劇郡幕而其子孫歉然守貧家若未嘗仕者其于為人之賢不肖可知也銘曰廉以潔其身曽不如丗之人以豐盈貪以汚其身曽不如君以儒行成吁嗟乎君是以為太史之銘屏山處士王君墓志銘剡有隱君子曰王君諱琰字汝圭至正十三年二月十六日以疾卒葬之二年其內弟前進士諸暨州判官許君汝霖為狀其行代致其諸孤之言來請銘按王氏出姬姓晉室之東始興文獻公負時重望十二丗孫綝綝五丗孫璵璵孫搏皆為唐相吳越時璵五丗孫承慶始避地來剡其孫濰遂㝎居剡之東林丗以儒為業在宋時貢于鄉舉于成均者踵相繼逮君之曽大父廷皎大父洪父資之皆潛晦弗仕丗篤孝友闢家孰以教諸子族人故鄉里莫不稱王氏為望宗焉君幼頴悟能博記下筆不凡鄉先生奇之謂其大父曰此兒佳器當必有成君受教于大父能自奮為文敏捷以氣為主同輩推服會國家科舉法行君出試有司稍不合輒慨然曰名宦之競孰若岩壑之逸乎遂絶意仕進擇所居靜曠隙地面山築堂題曰屏山因以自號內翰虞公為書之堂左為齋貯書萬餘卷扁曰訓經岡巒竹樹深秀翛然隱者之居焉君每且上堂候溫凊甘旨退則坐齋中閲經史盡卷乃巳生産家事悉任奴隸井有條序嘗曰理家猶理國失其術則綱目紊矣兄弟無間言族姓蕃盛處之如一家羣從勤學者奬掖之逺遊者資助之皆兾其成諸子稍長為聘名師同里鄰邑聞風爭來􅈬學君喜曰此吾之所以淑夫人者耶逺邇朋友時莭必來會君為具款延相與講經義評古今人物賢否政治得失倡和為樂而不肖無賴者至不敢安其境其為人所愛畏如此性尤好施豫樂周人之急遭歲侵大雪使諸子探飢者密以粟賑之且戒勿令人知以小惠干譽非我志也東林士友規建精舍為隸業之所而力有不給將捐帑割田助成之聞于官乞書院額以圖久永忽感異疾賫志以殁君子惜之享年五十有九方無恙時樂清隱林丘之勝預為壽藏及疾革敕諸子曰吾平生不信僧道巫覡我且死勿以此為我纍一遵士禮治喪事汝曺能以詩書承家不墜先業吾死且瞑目矣語畢而逝諸孤以卒之歲五月十八日奉柩以葬治命也君娶章氏有淑德君為義事贊助居多子男三人可大直大方大孫男六人如心中心宅心啓心澄心俊心女一人所為詩有雙清藁若干卷君資器沉重寡言笑貌服間潔望之如丗外人而眀智足以察微圎機善于應變其才蓋可用于丗者顧乃惟志韜晦終無怨尤其所自處固亦何憾而和君者則不能不為之深惜焉嗚呼夷考其行雖古有道之君子何以尚之是宜為銘銘曰繄夫降才豐嗇不齊才既豐矣時或莫為猗處士君生逢眀時又有其才孔完孔冝胡不顯庸乃遏弗施乃韜其腴乃閟其輝不激以亢不淪以卑惟樂其全素履坦夷有藴必彂子孫之貽後欲知君視茲銘詩金華黃先生文集卷第三十七
