body:
  text: 記慶元玄妙觀玉皇閣記昔有虞肆􅀋上帝而及于六宗山川羣神成周禋祀昊天而及于日月星辰司中司命風師雨師社稷五祀五嶽山林川澤四方百物今道家者流祝􅀕禮祠之事諸神位號之多至於三千三百而莫尊於昊天上帝率與有虞成周之法合老子為柱下史孔子甞問禮焉扵帝王之舊典禮經固無不知其徒之尊其􅀁尊冝有􅀁本矣然老子之道務清静無為去徤羡就卑弱古之人用之治其􅀦而民以寧一至於飛符走檄崇玲舘而啓玄科五千言之中雖未甞及之而非有道外之法也凡天下通都大邑名區奥壌宫觀壇塲之制自前殿之外必為玉皇之别殿盖三境之髙真玄穹之主􅈗當各全其尊也慶元玄妙觀在唐為􅂵極宫以奉玄元在宋為天慶觀以奉聖祖國朝至元十九年燬于災元貞某年有􅇉撤聖祖之祠黜天慶之號而改􅂌今額穹門􅃉廡奥殿廣堂悉復其舊惟帝座乆虚而不設非闕典歟大徳某年前住持雷谷陳君入覲􅀍上旨俾以甲乙次相授陳君慨然以興造為已任謀闢聖祖殿故址建玉皇閣未及庀工而化由陳君若干傳逮今住持順菴王君而閣乃成􅀄王君以泰定某年入侍内祠賜號玄門真士主本郡之太清宫以精於禬禳朝廷數遣代祀名山京師大旱禱雨􅂺應有司治决河投其鐡符水􅀔随减名聞于上制授太虚玄静明妙真人住持本觀至正五年冬奉今天子及兩宫皇后􅀁降香旛歸建金籙黄籙二大齋感瑞鶴翔舞異香不散士民慕嚮而至者不可数計􅀁獲信施甚厚乃裒聚以資土木之費始作於六年之十一月訖功扵某年之某月閣之髙若干尺脩若干尺廣若干尺列楹若干􅃨霤重簷塗墍丹青窮極壯麗威儀像座嚴奉惟謹謂不可無以紀其成績乃以狀来求為之記夫以數百年之曠典一旦而舉之殆非偶然自今以始眀靈頋歆祥慶来下使斯人􅀩其福澤保其夀康而泳㳺扵清静無為之化此王君之志也􅀁可記者奚止扵程工屬役之勤而已乎王君名天助字􅃱和同都昌􅀦州之蓬莱郷人也龍虎山仙源觀記仙源觀在信州龍虎山之馮原葆和通妙崇正真人徐公懋昭之􅀁創也􅀄徐公得度扵太上清正一宫通真院之逹觀堂其師曰通真觀妙玄應真人張公聞詩實開府大宗師輔成賛化保運神徳真君之伯兄且開府􅀁從受道也開府之弟子數十百人傳次之序以徐公爲首徐公性篤實而耿介非義不苟取攻苦食淡由勤儉而􅃱豐􅁉至元二十二年始闢地於馮原以爲觀馮原者南距上清三十里異時有大姓馮氏居之遂以得名岡巒廽複林壑靚深泉甘土肥風氣完厚歐公嶺龍湫在其東琵琶麈湖雲臺藐姑象山在其南其西北則寳帶諸山也凡殿堂門廡位置髙下悉因地􅀔之自然而不以人力􅂙焉其幽􅃉可以奠神眀之居其閑寂可以棲来學之士有田數百畒可以資華薌􅊡粥之具得請于朝賜以今額徐公竹冠布􅂁宴息其中而往来乎上清日與仙翁道侶徜徉於萬物之表方是時開府以清静無爲之􅀃上承訪問褒大尊顯無與爲比執弟子之職而列侍於左右者往往被璽書綰銀章號真人而主治乎名山惟徐公間来展省而未甞乆留中朝逹官貴人至有欲識其面而不可得泊然無願扵世者垂二十年大徳六年􅇉強起之住持宜興之通真觀賜號葆和通妙崇正法師居十年洊膺制命進號真人又十年夀八十有二乃乘運而化於仙源至治元年也傳徐公之道者馮君志廣上官君與齡徐君天麟彭君齊年薛君起東李君世昌蔡君仲哲徐君守勤彭君一寧自志廣暨天麟而下皆以次領觀事元統元年與齡始奉上命爲住持提􅀧仍賜號冲和持正眀素法師祇事云􅀄有廢必舉病其棟宇局扵地􅀔乃改􅁲其西十歩外平而無險中寛而有容程工役略基址諏日之吉而遷焉越三年大殿成明年法堂及鐘鼓二樓成又眀年三門兩廡成東有閣曰東閣西有樓曰西樓齋廬寢室庫􅁃庖湢之屬次苐畢僃冲真眀逺玄静真人張公徳隆開府之猶子也少甞學道其處􅀙開府来亰師侍祠於眀庭者四十年至正六年將使指奉香幣還故山覩其輪奐聿新念構興之難而充拓之不易爰伐石屬予書之大抵人之常情樂因循而憚改作仙源之建置㡬年于兹矣一旦有能舎其舊而新是圗纉先業扵方隆植法基於永固有功扵其教甚大而况不慿􅀦家之力不求民間豪末之助一以身任其事而遹觀其成是皆可書也於是乎書松溪縣新學記建為先師朱文公之闕里松溪建属縣士生其間身親受業扵公之門與聞公言論風􅃌於㳤艾之􅀻者踵武後先其地雖􅄶小而士習為最盛逮入皇朝治教休眀人才􅀹彬彬焉縣故有學規制甚俻至正十二年大盗竊發扵河南而江淮閩粤繹騷不寧山谷愚氓相挻而起侵軼縣境蹂踐民居兵燹之後惟夫子廟若魯靈光之巋焉獨存識者知爲天佑斯文之兆匪朝伊夕必有起其廢者今天子方慎擇守令恵綏􅀺元十四年夏六月今縣尹􅓸侯實来視篆之三日用故事欵謁于先聖禮成而退左右頋瞻徘􅆦歎息曰學校之廢興長民者之責也我其敢不以爲己任即命鉤考簿書徴理㦄年贍學田租在豪民􅃛吏之手者凡得米若干石資以召匠市材揆日庀事侯躬涖教護属功而課其章程縣人攝尉事葉弘道暨教諭李璿訓導傅子實皆悉力以相焉自禮殿論堂齋廬寢室至于門廡庖􅅒咸撤而新之崇其垣墻端其術道墍茨瓴甓􅉳堊髹􅊮舉稱其度始扵秋七月訖扵冬十月而告畢工妥神有位配侑在列範銅爲􅀕器而它􅀁宜有者靡不具完蔵􅁱息㳺各適其􅀁佩衿来集弦誦相聞饋膳之須亦無乏絶侯旣行舎􅎯之禮以落其成不逺千里俾諸生楊壵奉書赱金􅂠山中以記爲請昔杜子羙題詩衡山縣學稱陸􅈗以雅才新意脩儒服爼豆事於干戈之餘其辭逸出横厲氣􅁩激烈數百􅀊之下讀者猶爲之悚然侯下車之􅀄即以興學爲先務披荒殘植棟宇甫十旬浃而畢潰于成其雅才新意視陸􅈗孰多乎然竊觀魯人之頌僖公曰旣作泮宫淮夷攸服固非衡山之事可同日而語也賢侯導宣上化以振起士􅀋将見魯人之頌復作於今雖子羙未易賛一辭矧以眇焉末學衰朽誖眊猥令載筆爲之記何能鋪張偉績以昭示于方来也㢤姑序次其廢興之􅀊月云爾侯名􅀃呉興人大父秘書少􅁥時中夙任風憲父嘉興緫􅃹􅅷翁乆居舘閣家學淵源􅀁􅀙来非一日矣冝其為政知􅀁本而不謬於緩急之序云重修月泉書院記浦江縣北有泉出仙華山之陽而發扵縣西二里視月之盈虚以為消長號曰月泉宋政和癸已知縣孫侯潮始䟽為曲池築亭其上咸淳丙寅知縣王侯霖龍因構精舎於亭之西北祠先聖先賢其中以為諸生講學之􅀁逮入􅀦朝乃􅂌書院額至元庚寅提刑按察副使王公俁行部甞一新之至順庚午前進士八時思博化由祕書郎出長兹邑又重新之有劉先生應􅀛栁先生貫􅀁為記至正􅉝卯今縣尹蕭侯用㢘能舉守令􅀍上命而来爰以暇日臨于泉上覩其棟宇摧敝亟􅂢俸貲謀繕葺焉占籍之士皆樂為佽助而分任其役以是年之六月始作十一月訖功自祠室論堂齋廬門廡至扵庖􅅒之屬屋以間計者四十有五凡用工以日計者若干用錢以緡計者若干屋室旣完教飬之具亦無不畢僃士咸徳之謂不可無使後人知其􅀁自乃貽書扵溍求為之記溍竊觀在昔郡縣未有學之時天下惟四書院其在大江以南潭之嶽麓南康之白鹿洞而巳三吴百粤􅀁無有也今郡縣悉得建學而環江浙四封之内前賢遺迹名山勝地為書院者其多至扵八十有四好事之家慕效而創為之未見其止也意者人材之出亦将􅀙而多頋若有􅀁不及何歟昔者魯脩泮宫而詩人頌之苐以僖公之色咲威儀羙盛德之形容曽無一言述其輪焉奐焉之羙者先儒以為脩者脩行其教學之法也今之輪奐旣羙而清泉白月舊觀復新諸君子􅀙賢侯来㳺来歌色咲威儀無非教也有能感厲奮發而無􅀒侯作新之意將見異材軰出代不乏人眞儒之效􅀍于来世而侯之徳與之相為無窮豈係乎記之有無也㢤姑為叙次其興作之􅀊月云爾其詳見扵前記者兹得以略焉侯名文質許州㐮城縣人歴􅈗三邑皆有治績今累階儒林郎云學齋記伯温甫以學齋扁其居室而来諗于溍曰予􅄑以􅀦子獲執經於舘下忝釋􅄄而俻官使扵西陲者二十載異時同舎生􅀋能以文學論議自見已獨無稱焉大懼去師友日逺墜失舊聞不得附于英俊之列爰以學名吾齋庶㡬退息扵斯有􅀁自儆以為進脩之地匪但求無媿乎今人苟未至乎古人不敢不勉也子其為我記之溍聞魯論􅀁記子夏氏有仕優則學學優則仕之言􅀃者謂斯言非為學而弗仕者勸乃為仕而弗學者戒也然則學之優㦯不必扵仕仕之優􅂚可以無學乎盖古者由家而郷以逹於􅀦固無地而無學其賢能之興於郷者必還以長而􅆓之􅀊時屬民射飲讀法使之習容閑禮攷徳問業莫不有教學相長之道焉則亦無事而非學無時而不學也今之為學旣不皆與古合其仕者又率以鈎摭趨辦為大務而無暇􅀙容出入升降酬酢於儒服爼豆之間若夫随牒逺方􅊬焉海隅徼塞萬里之外則弦誦之聲益以希闊年未至而不親學者皆是也有能不為事物之􅀁奪風氣之􅀁移而卓然以古人自任如伯温甫者不亦有志之士歟厯觀書傳􅀁載能終始于學者無如衛之武公年九十有五猶作詩以自儆曰相在爾室尚不愧于屋漏先儒以為此誠意正心之極功則其􅀁學可知也伯温甫􅆒歴之乆譽望甚著年踰強仕以選擢外􅈗相之元僚而居是室也忘其齒之長身之貴不怠於自儆如此其亦武公之徒矣由是而登扵武公之年􅀁造詎易量㢤且老之為言考也庸謹記之以俟它日考其成焉湛然齋記祕書郎潜南張君名齋曰湛然而徴予為記予叩其􅀁以名則先濵􅀦文忠公以君之􅀄度親為賦詩四章其取義甚博以周而湛然之語乃􅃌夫心以為言又一篇之體要也君謹志之不敢忘因以為齋室之號云夫以湛然喻人之心者以其體本静而已方其泊焉以休耳不與聲接目不與色交好惡未形而心常虚寂表裏瑩澈如止水之不波樂記􅀁謂人生而静是也一旦出而與世酬酢不能無是非之相靡利害之相刃誘扵􅀁可喜而訹於􅀁可懼其存者㡬希盖心之發見若泉之始逹而未知􅀁適必有定向斯不妄動大學􅀁謂定而後能静是也生而静者天也定而静者人也是以善養其心者不徒反求扵洞洞屬屬之􅀄而每宻察於膠膠擾擾之際内有以全乎天理外有以盡乎人事故不物扵物而常為萬物宗試即夫川上而觀之逝者如斯而其未甞往者湛然自若也自昔父詔其子未有如公直示以心體之妙者然公之言則有本有末既原其理而啓迪之復列其事而筞勵之君之掲于齋居以自儆者固将以端本而澄源也必始終本末一以貫之静極而動則其應變旁行而不流動極而静則無一塵之累而退蔵扵宻向之湛然者無時而不然斯不􅀒於公之教矣請以是進扵君為之記云寳忠堂記翰林學士公朶爾直班以寳忠扁其􅀁居之堂而貽書扵溍曰昔我魯􅀦忠宣忠武兩王侍太祖皇帝肇造區夏克有大勲慶賞􅀁加爰及苗裔為􅀦家之世臣兹已八葉忠武始甞以太師􅀦王都行省承制行事建牙于燕而今亰師迎陽里第則吾祖同知通政院事府君之􅀁作也予不幸少􅀌痛自䇿勵獲底於成人􅀩􅀍眷知僃貟禁􅀙恒􅅒焉以隕其家聲為懼竊聞古之人㦯以善為寳㦯以仁親為寳而吾家世之傳則以忠為寳子孫冝謹其承相與保守之而弗失是用名吾堂曰寳忠庻㡬退食扵斯心在帝室夙興夜寐靡敢忽忘不可無告後人俾􅁇吾志願有述而刻諸溍歴觀漢􅀄之豪傑並起而􅀙髙帝馳驅於中原髙帝既定天下異姓之臣裂地而王者八􅀦􅀋皆鮮克有終張耳頗以智自全亦僅至其子而止獨呉芮受知髙帝稱之曰忠著于甲令由衡山而長沙傳號弗絶迄今千百年猶廟食于一􅀖孰不曰徳之薄者其流卑徳之厚者其流光推本而言則為徳之薄厚特係乎能忠與否耳惟札刺爾氏之先奮其雄材翊扶興運元功茂烈載于彛常自時厥後享有茅土訏謨廟堂出入帷幄者莫不世濟其羙徳業之盛有光于前雖古帝王輔弼之臣殆不是過非僥倖於一時之際遇而謂之豪傑者可同日而語也然自魯王父子下逮東之三世易名節惠悉冠以忠視向之著令稱忠者若無以異令聞長世不亦冝乎盖人材與時髙下固有不齊至扵事上之貴乎忠無古今一也公以宗臣世胄日侍天子清閒之燕而謙退不伐克念厥紹休沭在外􅂺與鴻生駿士探討儒家者流之言而知忠之為貴奉以周旋如恐弗勝既以受之前人者昭掲而自儆又圗有託以貽方来俾永勿墜為慮豈不深且逺㢤詩曰錫爾介圭以作爾寳此􅀁謂寳上之賜也公之􅀁寳家世之傳也能不失其家世之傳則􅀎乆有夫上之賜矣百世之下尚鍳于兹蘇學士􅀞像記故嶺北行中書省左右司郎中蘇公以延祐七年二月壬戌卒于亰師三月乙酉歸葬真定縣北三十里新市郷其東北二里實漢新市縣故地有佛廬曰遍法寺後公殁之二十年是為至元元年寺僧廣朗以公少甞讀書其中遺風餘韻去今未逺乃肖公像而祠焉公嗣子吏部尚書天爵䟽其􅀊月属溍為之記公諱志道字子寜真定人也􅀄以材受知郡守姚公得推擇為吏􅀙决獄竟天方旱而雨人大驚異及辨元氏縣盗馬獄益有聲辟河東憲吏分讞属郡大同獄囚雖重辟皆自以不􅁈用其使程公薦入察院佐御史􅁥治和林正色不阿以嚴見憚楊州民家子訴􅀍賣爲奴巳三易主御史以淮人多詐叱去之公曰詐則論如律安可寘不問㢤訊之果良民也浙西大猾聚愚民服僧衣復自號白雲宗以别於釋氏衆至數萬依權貴冒名爵州縣莫敢誰何㑹其姦利不法事覺廷議以禮部侍郎髙公往鞠之求諸曺史善持文墨者得公於户部與之俱公凡五往返于亰師乃克以具獄上奪其印章省􅀁置官府没入貲産以鉅萬計出其詿誤及良家子女數百人陞掾樞宻軍校當襲父職有十年不得調者悉舉行之俄有賜公弓矢及它服用之物俾􅀙樞臣出行北􅁁還朝爲中書掾同列以尚書省權􅀔􅀁在争趨之公不爲動尚書省罷首命公鉤考其詮選之濫而􅁵正之擢中書檢校官擿吏曺資序失當四十餘事覈户工兩曺過用錢㡬四十萬緡米六百餘石斥去賊吏二十餘人或舉公材任御史而執法於中者以未識公為疑人謂當詣謁公曰以謁得御史可乎遷刑部主事有嗾盗旁引無辜者力辨其誣而黜主盗吏時􅈗欲殺盗内帑金者公曰獄未具孰敢􅃍殺人耶時􅈗怒謀中以它事樞宻適奏除公㫁事官經歴乃觧有訴其兄非正嫡而欲奪其官者公執不可卒與其兄軍士護視公宴物器偶失兩銀盂将以盗論公曰此誤失之耳非真盗也使償􅀁失而出之嶺北省治和林實􅀦家興王之地生殖旣乆人安冨樂業一旦變起関中而和林大震並塞之民奔潰四出㑹天大雪畜盡死饑人無以自活走乞食於和林相枕藉死道上時倉儲僅五萬石民間米石至八十萬錢除吏雖有優秩率頋避莫肯行郎中之命下公即日就道至則白其長用便冝發倉賑給仍請于朝設髙估募人􅃱粟和林於是􅁁儲充實如平時諸王泛索公悉持不與皇子安王是以褒以衣一襲呉王聞公徒行亦與名馬公受而以直歸之中書患和林禁酒法䡖易犯更奏立重法罪至死令下三日犯者五人當坐公曰酒非三日可成犯在令前不冝用後法刑曺議如公言先是丞相順徳忠獻王建孔子廟未就而薨至公訖成之日延寓士講􅀃經史由是人始知學御史得􅁁民􅀁列公政績上之未報而公辭歸遂不起公平居慎重寡言不妄與人交􅇜䘮哀毀踰制而葬􅀕有禮諸父昆弟欲異居度弗能止則取薄田百餘畒遺書數百卷尤焉扵教子其後尚書果以儒起家至顯官公殁時年甫六十階止中憲大夫以尚書貴贈集賢直學士亞中大夫䡖車都尉追封真定郡侯配劉氏累贈真定郡夫人公之考謹榮祖亦用尚書恩累贈中順大夫禮部侍郎上􅀐都尉􅇷封真定郡伯妣吴氏累贈真定郡君溍歴觀古循吏居官可紀􅀁去見思至於尸而祝之者由其利澤在人也深故人之報之也厚未有無􅀁為而為之者廣朗方外人非素有徳扵公頋䏻拳拳􅃱其尊慕之誠如此亦何􅀁為而為之耶盖公之行孚于郷􅀁居而化有以啓其秉彛好徳之心焉爾溍旣書其立祠之􅀊月竊懼後世拜公像而欲知公之為人者無􅀁扵考也惟公墓有誌神道有銘庸敢掇取大略而并記之瑞雲觀記瑞雲觀在平江城東三十里今􅀁謂笠澤福地者也呉松江由具區来出其西而其南為姚城江東為龍江又東為陳湖其北則闔閭浦也重波􅃨浪四望如一其中可居䖏乃多沃土民安扵耕桑皆朴淳有古風水木之清華禽魚上下泳飛之樂夐焉若在世外然而更千百年委棄扵田夫野老之手未有能啓其秘而專其勝者玄門髙士陸君志寧始作菴扵其䖏由是昔之秘者無􅀁伏勝者益以發舒君不以得於耳目者為已足復斥故宇易菴以為觀合其徒而居焉凡觀之制中為三清殿而旁為玄天北斗太乙三元之别殿祠堂􅃦室講舎齋廬門廡庖湢次苐畢僃惟玉皇上帝之閣為役最鉅乆乃訖功而觀以成緫為屋以間計者百有十繚以脩垣而除道成梁以屬于南埭既又割上􅃾之田千五百畒有畸以資食飲百物之須為費一出扵君而君之悉力殚慮二十年於此矣菴之􅀄為觀也教主嗣天師為署今額因命君開山而以甲乙為世守旣而􅀁司具以􅀚之成剡上天子特為下璽書加護焉君旣勵其徒俾勿替且飭其族人毋敢有􅀁預懼後莫之考而􅂉毀其成也爰伐石以記来屬夫乾坤淸淑之氣川融山結非有數量而仙經􅀁録洞天福地僅百一十有八神而眀之不以其人歟幸以人與境遇而又􅀩􅀍帝力如此㳺而息者衎衎施施未有巳也㦯者真仙異人於此乎出則福地之在笠澤而笠澤之有瑞雲將與金庭玉局並存扵天壌間尚何成毀之􅁕慮哉頋不可無以著作始之自乃弗辤而為之記云干氏贈封碑隂記仁宗即位之􅀄詔行貢舉始親䇿多士于廷江浙南士入奉大對者八人呉郡干公褎然居乎前列而溍亦叨塵末公淹外服巳乆今天子用言者建白肆命􅈗臣緫裁三史旁招群彦俾預纂􅁱公旣首膺召節下至溍之䟽賤黭淺亦􅀁不遺溍適有内艱不果行乃拜公集賢待制任以史事書成引年乞謝制授禮部尚書􅆀仕貤恩于其大父鎭江府君父平江府君秩皆三品爵為通侯㑹同年歐陽公自翰林學士承旨出持七閩憲節道過呉郡為勒銘于豐碑彰君賜序世徳也昔孟子論君子小人之澤一㫁以五世􅀃者盖曰其人君子矣易世而非君子也者猶可以五世􅀁以厚君子也其人小人矣易世而非小人也者亦可以五世􅀁以甚小人也使世丗而君子也雖百世可也溍甞疑其為􅀃不與孟子合竊􅀚公之先有仕宋為諸司正使者五世至鎮江府君在宋季猶止扵右階六世至平江府君乃以文易武三取薦書于􅈇于郷又與其長子同上春官七世而公生今聖代遂擢乙科登八座流澤固未艾豈非􅀁謂世丗而君子者耶溍扵是知􅀃者之善推言乎孟子也載念向之八人者多巳物故惟公與溍獨存溍甞辱歐陽公銘先太常之墓兹獲覩公碑感門祚之衰薄仰令問之長世八世之後莫之與亰於公之子孫尚有望焉謹再拜識于下方以俟博古堂記故翰林待制僉淮西江北道㢘訪司事申屠公至元間名御史也公平居無它玩好惟見以古彛器法書名􅀞求售者􅂺􅂢厚直取之􅀁蓄既冨緘縢庋置覆以傑屋名曰博古之堂公殁逮今十有年嗣子耀州史君傳蔵護視惟謹升其堂如見其親之存焉間甞諗于溍曰我先君燕休之􅀁曰九思堂呉文正公實為之記别號忍齋則翰林侍講學士掲公記之武昌别業有篛谷則翰林待制栁公記之作樓以儲書曰墨莊則翰林學士承旨歐陽公勒銘其上獨博古堂僅存治書侍御史李公魏􅀦趙文敏公􅀁書扁榜而未有為之記者􅄑􅂌以一言俾我後人永保而勿墜不亦可乎溍生也後不及􅀙先生長者登公之堂而區區陋微扵諸大老無能為役然托雅故於耀州非一日安敢以不敏辭昔者孔子言夏殷之禮而謂􅂎宋之文獻為不足徴當孔子時􅂎用夷宋圗覇已乆典籍散亡而賢人之存者無㡬其不足徴尚何怪乎秦人焚詩書而博士􅀁掌故無恙蕭何􅀙沛公入咸陽第䏻􅀵其丞相府圗籍以知天下阨塞户口多少強弱之䖏至扵先王之舊典儀物則一切委棄弗頋而堕於楚人之手以同歸扵煨燼有識之士􅀁為􅇷恨痛惜而不巳也􅀦兵南伐趙氏納土旣封其府庫以入于有司而一伐之儀章物器皆公為江浙宣閫都司時親受於其主者以上于朝廷武夫俗吏莫敢壊傷㫁簡殘編亦靡亡失其有功扵斯文甚大中原文獻流落東南者固不得比隆夏殷公之賢扵蕭何則巳逺矣而又能以餘力窮搜極訪因山巖丘隴屋壁之遺而窺見昔人制度法象之􅀁寓精義之􅀁存公之有志扵古豈徒以資耳目玩好而已㢤矧以耀州為之子克謹其承乆且弗忘不待當􅀕而齋然後思其居䖏思其􅀁樂思其􅀁􅄝也来者詎可忽諸公諱􅆀逺字大用東平壽良人其歴官行事有永􅀦文康閻公􅀁為碑銘此不著耀州名駉以清方直諒世其家云述古堂記呉郡繆仲素好古博雅之士也平生􅀁􅄝惟古器物卒然遇之􅂺購以重貲並寘一堂之上其目若干􅀁寳用者有宋内府故蔵紹興丁已邵諤􅀁進述古圗圎研因以􅄒古名其堂而求予記之述古圗本李伯時效唐小李將軍用著色冩雲泉花木及一時之人物按鄭天民先覺􅀁為記坐勘書臺捉筆而書者為東坡先生喜觀者為王晉卿凭椅而立視者為張文濳按方几而凝竚者為蔡天啓坐盤石上支頥執卷而觀􅀞者為蘇子由執蕉箑而熟視者為黄魯直凭肩而偶語者為陳無巳㩀横卷而􅀞歸去来圗者為李伯時按􅂰而旁觀者為李端叔跪􅂰俯視者為􅄯無咎坐古檜下孹阮者為陳碧虚袖手側聴者為秦少㳺昻首而題石者為米元章竚立而觀者為王仲至坐蒲團􅀃無生論者為圎通道士偶坐而諦觀者為劉巨濟凡著幅巾者十有一人烏㡌者二人而其一為道㡌僊桃巾琴尾冠者各一人衣深衣􅂵衣􅄄衣者各二人青衣者四人黄衣者三人而其一為道服繭衣􅂵氅黪衣各一人一童執靈夀杖一童捧古研兩女奴雲鬟翠飾則王晉卿家􅁎也石床錦褥玉巵瑶琴以次陳列大谿峭壁怪石淙流曲徑危橋映帶左右松竹蘭􅈍紅蕉􅂵葳蔽翳聮絡天民又謂有羽流名動四夷師表千古伯時偶未之及乘間寓意繪而為圗以資好事之玩莫知其􅀁􅃌為誰記作扵政和甲午後二十又三年諤乃以研進研盖端溪􅂵石其形正圎隆其中以受墨環其外以為水委而旁刻兹圗其物采雖不可辨而服飾位置猶彷彿可覩􅀁謂述古圗圎研也予聞商書記遲任之言曰人惟求舊器非求舊惟新夫􅀁以欲求器扵新者豈忽逺而貴近㢤取其新以適於用而巳三代先秦古器往往流傳至今使兌之戈和之弓垂之竹矢離磬崇鼎一旦歸于士庶之家固無􅀁用惟研也者自王公逹于庻人􅀁通用也矧兹製作之妙􅇱存人物儀刑之舊而其用則日新而不窮冝為仲素之􅀁貴重歟堂以研得名記為堂而作仲素􅀁蓄有出扵兹研之前而非堂之􅀁以名者予不得而盡著也杏溪祠堂記杏溪祠堂者郷先生傅公之祠也先生諱寅字同叔㓜􅄝學經史百家悉能成誦比長益求異書而讀之間􅀙􅀃齋唐公質疑問難皆有援据可反復􅀃齋喜曰吾益友也及聞其升陑分陕之􅀃語門人曰軄方輿地盡在同叔腹中矣先生於天文地理眀堂封建井田律歴兵制之􅀋世儒置而不講者靡不窮究根穴訂其譌謬資取甚博参驗甚精事為一圗累至於百號曰羣書百攷大愚吕公閱其禹貢圗攷曰是書可謂集先儒之大成矣掲其圗請申言之而坐諸生以聴且曰以􅀁􅀎者教人􅀁不能者受教扵人理之􅀁在􅀄無彼此先生亦樂為之盡亹亹不勌先生扵文中子人不里居地不井授終苟道一章屢歎息而言周禮太平之書于時九等授田家給人足泉府之設特以􅇱凶荒未必常用也况是書體有本末用有先後若大綱不舉而獨行􅀁謂􅀦服為息者是猶取名方中百品之一而服之及其害人則曰是藥出扵名方云爾常恨熈寕諸賢未有如此辯之者故百攷之書扵成周之授地賦兵封􅀦制軍増地制域畒歩溝洫稼穡貢賦特詳焉亦足見先生之學可措扵實用而非虚談矣先生又甞徧㳺江淮縦觀六朝故迹南北形勝詢諸故老質諸史諜而得其成敗廢興之故歴歴如指諸掌是豈徒以登臨之適為快也㢤先生之教人每謂下學上逹自有次第不先其近者小者而驟語其逺者大者後生淺薄學益不實故扵小學尤􅀁留意来學者恒以百數必先授以曲禮内則少儀郷黨諸篇使扵日用之間與義理相發眀而知道之與器未始相離也先生論古軍制纎悉備具而不欲人讀兵書曰􅅐中無論語孟子為權衡􅃍聞譎詐之言則先入者為主害心術矣此先生之􅀁學與􅀁以教之大方也先生世居婺之義烏父孝儼篤行君子母樓氏禱扵石姥山而生先生骨秀神􅋍蚤有器識事親孝謹䖏兄弟子姪均一無間郷閭有事􅂺以身任之非公事不至官府縣長吏之賢者必造而問政言無􅀁隠人有隂􅀍其賜而不知者里居之日與馬公師文孫公居敬為同志永嘉戴公少望聞先生名奉贄願交大愚在朝行數稱先生之文學行義彭公子夀章公茂獻葉公正則呉公徳夫汪公季路黄公文叔黄公商伯無不推敬文叔欲與同列奏􅀘以官知先生不可屈乃止惟舘扵商伯最乆賔主之間日以義利相箴切不為無益語它􅀁與㳺亦皆􅂋人至其為䑓諌為執政則絶不與通先生旣不有仕禄又不屑治生業商伯持浙西􅁃節遺以錢五十萬先生悉散扵宗族鄰里一無􅀁留晚益貧郡守孟公聞而歎曰不可使賢者飢餓於我土地乃輟俸貲倡其親友為買田築室於東陽之泉村而先生遂為東陽人於是大愚及一時名公皆在黨籍相繼放逐先生亦杜門不復出矣先生好為詩閑逺右淡有陶靖節邵康節之風焉子七人皆克紹其家學大東尤敦慤克肖其徳大原試􅈇闈為本經第一先生旣遣猶子定受業朱文公之門得其微言奥旨歸與諸弟共講而大原亦從慈湖楊公㳺楊公亟稱之程子謂君子教人有序非先傳以近者小者而後不教以逺者大者先生之􅀁以教皆程子之遺意也先生年六十有八以嘉定八年卒于家後百二十年曽孫師􅀩師佐懼人易而世䟽乃即家建祠􅀊時以享祀燕􅀻合其族􅀕主於先生者始遷之祖也上援其父者明有􅀁本也下及其子者示有􅀁􅀓也堂成於重紀至元之二年師􅀩巳卒因以侑食堂師􅀩作也祠室堂軒爲間者三翼以齋廬爲間者六有田三十畒子孫更掌之以供祠事師􅀩兄子似翁将圖其永乆爰以状来謁記且曰祠之作本以寓子孫追逺之意而邑之士友以爲古者郷先生没則祠於社其禮乆闕弗講乃相率爲文以􅀕冝率聮得書溍序其興作而首著先生學術源流之懿者庻㡬後人知􅀁矜式也来者能聞風而興起焉則是祠也有功扵名教甚大奚止可以合其族而巳乃如其言併書之朱氏祭田記婺義烏赤岸之有朱氏始於漢槐里令雲之七世孫晋臨海太守汎又二世而建威將軍禮遂廟食其郷郡志以建威為金威語之訛耳自是又若干世乃至三府君者有田以􅀕始於府君也府君諱良佑宋紹興間􅀄置旁舎常稔之田三十畒有竒合為一區而儲其􅀁入以給孝祀燕􅀻之事府君殁有子三人曰孟眀曰郷貢進士中曰季龍同􅁇其禰而莫適為宗列屋聚居謂之三宅凡田事三宅􅀊迭掌之􅀕主於府君而三宅之子孫咸以次祔食不以世􅁆毀為親䟽逺邇之别族大以衍位序日繁患夫䙝而弗專且難為􅁇乃稍裁定著其成規每􅀊以日北至與新􅂖之旣升蕆事者二由府君上而祖考本􅀁自出也下而三子則三宅之􅀁祖也正配位緫十有四皆世世不遷府君之孫之曽孫而為掌田事者之祖考乃得從腏食􅀊終合享者一亦惟掌田事之家在祖考行者乃與焉三􅀊則適徧于三宅玄孫亦與合食而㫁以三十年為一世滿一世􅂺止􅃝免而下則絶而弗與墓􅀕之降殺亦以是為差懼逺者之易忘則用先儒家禮以立春日祀臨海而侑以建威慮親盡則情盡則有􅀊時之序拜而三宅之長㓜無不在列此其大略也府君五世孫震亨以書諗于溍曰願有述刻寘先墓之左庻俾後之人無􅈥其成故朝列大夫婺州路緫管府治中􅃱仕叔麒扵府君為曽孫溍之從祖姑歸焉而震復與溍有文字之雅不敢以不敏辤惟府君去二代盛時已乆又不有大夫士之位田禄弗及而能因地之利以報其親仁之至也宗法廟制不得行乎其家而能因人情為之節文以屬其族義之盡也數世之後以文學政事顯融于時者旣巳流光奕葉而其䖏者亦徃徃􅀍服儒術馳英聲扵士林脩其已成之業而承其􅀁欲為之志仁義之澤未艾也楚茨之首章曰自昔何為我藝􅁰稷府君之經始勤矣其卒章曰子子孫孫勿替引之三宅之嗣人尚慎其終以延􅁉扵無窮㢤金華黄先生文集卷第十四
