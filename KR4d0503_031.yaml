front:
  text: 金華黃先生文集卷苐三十一墓志銘臨川危素編次番昜劉耳校正
  hash: sha256:4a444ee655db880db8d5bf3eab5c7b10939a0734aaec747af9026a7c26d81c19
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0503_SBCK_031-1a}
body:
  text: 江浙行中書省左右司都事劉君墓志銘君姓劉氏諱濟字仲源河間肅寧人大父法靜父元皆弗仕至君始以東江場同管勾遷昌國正監管勾入御史臺為宣使肅政廉訪司立選授江南浙兩道管勾承發架閣兼照磨以照磨劾其使貪縱不法事聞使坐斥去君亦以秩滿調婺州路司獄有余甲者以貧自鬻為人奴勢家子慕甲妻美弗能得㑹其主病死金華道上因誣甲殺主而奪其妻吏既傅致成獄君直其冤破械出之蘭溪民王乙為怨家所殺乙親戚兩人將訴其事怨家懼更屬吏捕治兩人謂乙私其妻實共殺乙賴君言徙其獄旁郡兩人得不死他以事株連若煆錬無得而久繫者君悉為剖析所活十有四人所縱遣八十餘人永康大姓以睚眦之怨歐人至死有司弗敢詰反抵告者罪君求得其情乃收案殺人者宣慰使而下以受賕曲法敗者五十餘人用舉者後入江南諸道行御史臺為令史丁父憂服除授湖州路總管府經㦄於是天子方用言者悉徙江浙行中書省郎中以下他官更取材望𥙷其處君以選擢左右司都事且追用平反超升承德郎到官明日而卒延祐元年七月二日也得年五十有五其孤汝圭等將奉柩歸肅寧以某年某月某日葬縣東安仁鄉長城之原泣謂溍子辱游於先人最久宜知先人盍有述溍婺人也幸能道君為獄官時事他宜傳者詎止是邪史稱于公為郡决曹决獄平今所見獨孝婦不殺姑一事而太守莫能聽至令抱具哭而去然則君亦足以不朽矣謹次而為之銘君娶曺氏次林氏子男三人汝圭汝楫汝弼女三人長適同郡韓梓道餘在室孫男若干人女若干人銘曰孰降之材而奪其施孰授之器而易其冝百畸一逢孰終尼之維善無小維官無卑考事列辭式昭厥垂深州知州致仕劉公墓志銘公姓劉氏諱守讓字謙甫其先由大父立而上丗為汴人金末父信避地真定因家焉故今為兾州南官縣人母李氏有五男子公其季也公年甫踰弱冠入祕書監為奏差尋又入御史臺為殿中司知班久之擢浙東海右道肅政廉訪司管勾承發架閣庫兼照磨時方新使名以正憲度將指者皆名卿參佐悉取材望公妙年首膺其選深自砥厲以求報稱間有慮囚攝使事行郡邑懲姦貪省冤滯接引善類所至輒有聲居七年乃代去調婺州路總管府知事俄復入江南諸道行御史臺為令史調霍州靈石縣尹未上丁內艱服闋改慶元路平凖行用庫提領秩滿以奉訓大夫真定路深州知州致仕至順二年十二月十五日以疾卒于鄞之寓舍得壽七十有五公長髯秀眉容止言論間雅不迫有古君子風善屬文尤喜為歌詩以其自號扁所居室曰本齊琴樽圖史羅列左右退食則宴息其中客至與談中原文獻之舊娓娓不倦性廉退不急於進取每詣亰師輒自赴吏部銓俯首常調殊無難色其任管庫也分帥閫乘廉車者皆公故等夷見公必與均禮公執其分守滋益恭仕既久而家愈落殁之日賴故舊致􅉠禭乃克以斂其清約如此娶鄭氏張氏皆先卒子男五人長元以公廕為晉寧路石樓縣尉次貞祐某某女三人長適管軍百户孫毅次未行次適孫某孫男三人女一人𥘉公母氏卒于建鄴葬城西之清凉山元等將以某年某月某日奉公柩葬其左貞來俾溍為之銘始公佐憲府溍因公行部以諸生禮見公未嘗以凡子遇我自是周旋公父子間殆四十年銘非溍其誰為之雖不文不敢辭也公家丗之詳約齊劉公實志之此不著銘曰人孰不仕易失者時嘆老嗟卑百喙一辭猗與劉公蚤有令聞素乎其位無喜無愠澤及後人惟德之苻我銘孔昭以厲鄙夫福州路總管贈嘉議大夫太府卿上輕車都尉追封天水郡侯諡景惠趙公墓志銘公姓趙氏諱執中字景賢丗為趙州晋寧縣人祖謙趙州都目父珣將仕郎亳州萬户府經歷至元𥘉太尉河南武定王為征南都元帥合蒙古漢軍擊襄陽公時年未弱冠以推擇為吏隸河南統軍司從築白河口鹿門新城元帥察公材可用因置之幕府公雖主治文書不専以鈎托趣辨為務日與士卒同冒矢石未嘗辭難凡軍中大計亦往往由公關說用久次升提控案牘歷行中書樞密兩府掾太師淮安忠武王以右丞相行中書省事復署公為屬時襄陽已下丞相總諸軍水陸並進公與在行從諸將轉戰而前既渡江取鄂州丞相提舟師順流而下俾公從平章政事椘國武定公分治省事移書諭降荆湖諸州軍十三年春丞相至臨安以宋版圖來上計功行賞公自行省令史拜中順大夫壽昌府知府行同知真州路總管府事久之用例解所佩金符句容武毅王時在樞密丞相言公於渡江有勞且嘗蒙上恩備官使宜因其舊職序進之武毅以聞于是得不以有司常法限其資級改朝列大夫同知泉州路總管府事用薦者以朝散大夫為南雄路總管除中順大夫福建等路都轉運鹽使秩滿以少中大夫為福州路總管至大二年九月某日􅌰于官享年七十公之在泉州也盜起安溪掠大洋川據石􅌉頭勢張甚守將莫知所為公單騎直抵其處群盜大驚公徐曉以禍福則相與羅拜願貸死公因撫定之後皆為良民蓋公久居兵間聲望巳著故能使之讋伏如此其以省檄閲漳州金穀也得羡錢五千緡米萬石其為轉運也患富商交埸吏受鹽不以法命以竹器如法實鹽而效福之南臺列倉于漳泉興化以貯之持引就受鹽者無容其弊嵗得羡鹽五千九百引其善理財又如此惜夫久在外服其政迹有非談者所能悉知也夫人王氏劉氏皆先公􅌰子男七人長曰鉉以公廕入仕今為承務郎婺州路東陽縣尹孫男七人鉉等既以四年十月某日奉公暨夫人之柩合葬晉寧孫材先塋之次後若干年始得請于朝贈公嘉議大夫太府卿上輕車都尉追封天水郡侯諡景惠仍贈夫人天水郡夫人爰以書來願得銘昭揭墓道溍惟人材之生必于興運匪特將相重臣兩有文武其僚吏亦一時之選也千載之下尚論其丗知有伊吕䔥曺而已其能因事附見于策書者幾何人哉然則公之事固不可無述也乃弗辭而銘之銘曰嗚呼趙公受材孔良斂藏不耀出其豪芒貔貅百萬長鎩鉤㦸公于其間持以文墨豈無悍強畏此蕳書飈騰電擊靡亟靡徐江流湯湯其險莫測投鞭而往歸數爾獲孰發而蹤其功也人公罔敢知國有元臣元臣之賢天子之聖曰汝遺汝𥘉命公材則多無適不宜魚符龍莭未䆒厥施尚其嗣人克圗不朽馳書謁辭式告永久亞中大夫漢陽知府致仕盧公墓志銘公諱克治字仲敬姓盧氏其先由范陽徙河隂徙滑之胙城曽祖諱某祖諱鉉皆不仕考諱璉嘗佐開州軍事因家焉故又為開州人公少負志氣稍長知讀書慨然思自奮拔于功名至元十三年從軍取准旬有勞入淮東都元帥府為令史厥明年國家砥㝎南服論次功賞授承務郎漢陽府判官時郡邑新附人心丐丐上德撫慰綏集之者公之力居多換從仕郎龍興路總𬋩府經歷用察官及部使者薦擢江西行尚書中書兩省左右司都事以材敏見知于參知政事東平徐公亡何以事乘傳入奏亰師遷江浙行中書省左右司都事于是徐公方持部使者莭涖浙右亟剡上乞署公臺職未報而公去為兩浙都轉運鹽副使東南財計莫重于鹽策先是恆以歲賦减耗為憂公規措有法自當算外得羡鹽八萬九百引以最聞除知平江常熟州下車牒訴坌集公談笑立决吏畏服如神有以強盜坐繫者公探其獄以為此愚民無知因客舟漂抵㫄近地而利其菽粟耳非有首事合謀受分之驗不可悉置之死僚佐疑不决後竟如公言獲减免者三十有九人歲饑諭大家使賑其不䏻自食者民用無轉徙既又以為利未復則旱澇之患不可去乃行視許浦福山諸水之故道湮廢不治者十有六募民浚導之如其舊為水門以時其蓄泄之宜而閉縱之凡役工一百一十四萬所食米以石計者三萬四千四百鹽以斤計者一萬九千九百官無毫未之費而民得其利不以為病也田里既以無事乃大治學舍凡廟像器服之不如法者易而新之田租之冒沒者理而復歸之其所以嘉惠是州者閲五載如一日會朝廷以沒入朱張家財物悉歸中宫擇可任出內之寄者或言前簿録朱張家時公嘗𬒳檄與聞其事乃命公綰銀章為江浙等處財賦都總𬋩以涖焉常熟之人皆重惜其法相率為生祠且請于前史官聊城周君作文以記之有司具實以聞除知建康漂水州其治如在常熟引年以知漢陽府致仕纍階亞中大夫公素薄于榮利既謝事居吳中一室翛然曰與賔客以觴詠相誤樂至治三年十二月二十六日以疾卒得壽七十有四夫人李氏與公生同歲先十二年卒以泰㝎某年某月某日合葬開之濮陽縣黃斌原子男四人長曰恉奉議大夫晋寧路路州知州兼𬋩夲州諸軍奧魯勸農事次忱蚤卒次惺次悅女三人長適福建都轉運鹽使司奏差劉徴餘未行孫男二人保僧閏僧女二人俱幼公所為詩曰琴川集者若干卷曰錢唐集者若干卷並藏于家惟盧氏望范陽號稱官族其别於開有任參知政事追封范陽郡公諡文昭者曰克柔公之伯兄也文昭之子景今江隂州尹亘以文章家知名終于翰林待制而公又有潞州以為之子方興而未艾一也是不可無使來者知積纍之自潞州以公行實來徴銘謹序而銘之銘曰奕奕盧宗世有顯人繇公兄弟弗墜益振公之受材孔敏且𥙿載而四馳以往用譽胡既遇矣不究于施曰豫其休退也委蛇勾吳之墟言遊之里遺愛在人匪遠伊邇人孰不仕孰完于公始卒無疵而以豐終公不三事公則有子揚詩墓門垂示無止正奉大夫江浙等處行中書省參知政事王公墓志銘至正元年十有一月日江浙等處行中書省參知政事王公薨于平江里第諸孤以二年正月日襄大事于吳縣長洲鄉陽山金井塢奉知宿州葉大中之狀以授溍曰墓冝有銘君其執筆母讓謹按公諱都中字元俞姓氏其先河東人始居江左者曰融四世至晉丞相等又十二世至隋溫麻令懷鐸唐廢溫麻置長溪其子務琨襲長溪令因家焉遂為其縣人長溪令福寧州也又十三世至宋贈太子太保戬太保生贈太子太傳椿于公為髙祖曽祖諱萬全以進士起未及改官而卒纍贈太師追封魏國公曽祖妣林氏信衛國夫人祖諱方大贈少保今以公貴贈大夫上輕車都尉追封太原郡侯祖妣頴川郡夫人陳氏今追封郡夫人府君魏公第四子其第五子忠文公伯大勉齊黃氏髙第第子以直道事宋理宗至參知政事為時名臣考諱積翕用忠文公奏𥙷官纍遷知南劔州加兵部尚書除寶章閣學士福建制置使知州如故于是宋主巳奉表納土而福建猶未下乃夜抵福州以八郡圖籍上于行省至元十三年十二月也行省承制昜以新官既入覲世祖皇帝于上亰乃降金虎符授中奉大夫刑部尚書福建道宣慰使兼提刑按察使尋真除部尚書拜正奉大夫參知政事行中書省事將之官江西俄為國信使宣諭日夲𥘉抵其境郊迎甚設請遂以詔書未至而遇害于海上事聞賜諡敬愍侯後二十八年仁宗皇帝以公有請贈榮祿大夫平章政事上柱國追封閩國公改諡忠愍妣安人陳氏林氏皆前卒葉氏今封閩國太夫人張氏實公之母痛忠愍殁于國事哀毀如不欲生斷髮為比丘尼公生三歲即以恩授從仕郎南劔路順昌縣尹至是甫七歲從葉大夫跣哭赴訴于闕下世祖皇帝為之震悼給驛劵㑭南還敕行省為窮治其事仍賜以平江田八千畒宅一區因㝎居于平江而著籍焉上念忠愍不置有旨視故所居官下二等録用其子忠愍之子七人惟公獨存乃授公少中大夫平江路總𬋩府治中公時年十有七僚吏見其年少頗昜之公持之以靜遇事剖析洞中肯綮皆􅌓眙不敢欺崑山有詭昜官田事覺而八年不决者公披故櫝而洞見底裏其人乃伏辜吳江有違拒有司築隄護田之令而歸過于衆人者公詢知其故皆置不問其人乃無所逃罪奮稅官酒錢多取于下戶而富家或不與公始建議悉以田之多寡為則人服其公學舍久壞不治而郡守缺公曰聖人之道人所共由何獨守得為乎乃首募大家合錢新其禮殿士論美之秩滿除浙東道宣慰副使婺之金華有歐殺人者吏受賕以為病死公摘屬吏覆按得其情獄具縣長吏而下皆以贓敗張省四者居餘姚海濵恣為不法擅制一方吏無敢涉其地公痛繩以法衆皆大驚且稱快焉昌國在東南巨海中颶風激海水漂人民廬舍公不憚其險親注賑救之先是官府應辦率賦民以錢使以子夲相生謂之規畫所賦錢不過數緍而取其麵至數百斤豬羊至數十頭公命入其息而用市佑償其直以紓民力是時經制未立公患吏昜于舞文彚集條畫斷例為八十帙㑭有所遵守而無以容其姦部者裒公政績列薦于朝未報而遷荆湖北道宣慰副使歲適大侵公躬履山澗以拯其饑靡憚勤苦江陵沔陽荆門之民賴以全活者數十萬江出三峽至江陵勢益舒緩水環城而流自宣慰使劉禋南湖而丹楫不通民去城十里始得粟米薪芻公為濬之使復其故仍鑿新河與之接人以為便武宗皇帝詔更鈔法行銅錢而鼓鑄之法廢已久宰相以公今之通才宜無所不知乃奏除公江淮泉貨監公以銅不足為憂詢知饒之德興有膽水可浸鐵為泥以火錬之悉成美銅如其法行之得銅數十萬斤凡天下為監者六惟江淮所鑄錢號最精未幾而錢復廢不用改郴州路總𬋩郴居楚上流洞蠻徭獠往耒民間人憚其強猾莫敢與相貿昜公煦之以恩懾之以威乃皆悅服而相安焉患夫依阻山林乘時陸梁則芟剃其草樹使無所蔽障出沒民漸染其俗而喜爭一不慊意輒起而相讎公大治學舍作樽爵簠簋笙磬琴瑟之屬俾其人識先生禮樂之器命立鄉校而使受業其間者以月之旦望來㑹延宿儒以義理開曉之俗習為之丕變山郡可耕之土殊少民多艱食時方貯職田米于官倉缺官攴請者數千石公悉糶以濟其乏同列利于賤糴㦯為異議公不為動民賴以生先是受納秋糧石加五斗公始平其概量民皆負餘米謳歌而去征啇之制有住稅而無過稅公命務官耴之必法而行旅皆欲出于其途使客注來食飲所須官有規畫之名嵗所賦錢不過百五十緡公以北湖龍泉塘流杯池俱官産募民藝稻蓄魚且即其下流造水磨屑麥為麵歲所得百倍于官所賦錢厨傳既豐民亦少蘇三川貫郡城中古語云三川塞闔郡菑公覩其壅于客土謀疏導之而作陂于其西障水使勿泄人不勸而自奮橋梁壞則繕葺今一新民不病于役有訴其祖父之墳為豪家所據者吏莫敢問公至乃直其事而歸其墳有訟其繼子為盜者已傅致成獄公愀然曰父于子而論為盜既巳虧恩况未必有其實乎乃親鞠之果得真盜而其父子如初鄰州茶陵富民覃時中死無子惟一小妻及其贅壻妻誣其壻拜尸成㛰藏隱玉杯夜明珠等株連八百餘人奉使宣撫移其獄以諉公窮探而得其情乃正其罪州長吏而下計其贓至十一萬五千餘緍人以神明遷正議大夫饒州路總𬋩年饑米價翔踊公以官倉之米㝎其價為三等言于行省以為須糶以下等價民乃可得食未報又于下等價减十之二使民就糴時宰怒公専擅公曰饒去杭幾二千里比議㝎注還非半月不可人七日不食則死安能忍死以待乎其民亦相與言曰公為我輩而减米價果加罪于公我輩當粥妻子代公償時宰聞而為之釋然郡以土産貢金視人户資産為髙下歲久貧富不常貧者多仍奮額富者一無所增公鉤􅊲得其實而不使人知之獨以已意為文書令德興丞彭庭玉徑逹于行省宰執都司成訝公不用公文庭玉曰總𬋩寧不知此顧其事涉衆議難于齊一故爾乃報如公言而金課以均包銀之法户不過二兩同僚瞰公之出立局籍民數多或徴其十倍少亦倍于元科公既還命一以詔書從事民所輸無過二兩者未幾包銀罷中書責有司奉行太峻而謂公䏻恤其民特以名聞鄱陽官蕩舊聽農家耴草以糞田豪户擅其利必納錢乃得之河泊之課歲為錢五萬餘緍朝廷既捐以豫貧民聽其採捕而豪户亦據為巳有使不得𬒳上賜公痛懲而禁絶之人懷公惠共立石以頌美焉里正主首同役于官第物力有髙下之不同其奮俗事悉耴具于主首而里正坐視其成公始命驗田之多寡而均其役郡所統州縣地大且逺民以所差吏卒為苦公為立印簿令社長書其乞耴之物與凡所為之事月一上之由是鄉落間無復呌囂墮突之患餘干州以經理田糧官吏相與為欺吏懼公燭其姦首賊至十餘萬緡州長吏而下皆以罪免東湖者鄱君將梅鋗故壘所在也學官僧寺爭欲得之公謂此官地俾歸于官而捐俸資買菱芡魚鱉之屬納其中耴孳息以給使客之厨傳公之為郡所至政平訟理而于米鹽碎務靡不周盡類如此父老或以兩𡵨之麥六穗之禾為獻公曰此聖丗之嘉瑞非臣下所敢當遂以聞于朝部使者方交章舉之而公以內憂去郡民生為立祠而以麥禾之瑞鑱于祠記之石服闋除兩浙都轉運鹽使未上擢海北海南道肅政廉訪使中書以國計莫重于鹽策復奏如前除鹽亭竈户三年一比附推排世祖皇帝奮制也任事者恐斂怨久不舉行公曰為臣子者使皆避謫何以集事乃請于行省遍歷三十四場驗其物力之髙以損益之役既平而課亦足公私便之朝廷給降工夲錢遭貪官汙吏掊克之餘人户所獲無幾公始建白擇有司官詣場給散以絶其蠧弊耴草于沙塗以為藽者奮例責以輸租公力言而薄其征常時遣吏卒下場視令丞如奴隸公以信牌代差人而人亦無敢違者私煮盜販之鹽夲出于官場公謂不宜獨加軍民官以透漏之罪乃嚴為之禁督責所屬官吏事至立决不逞之徙攀援以構陷平民者無所用其姦行省左丞相脫歡答刺罕薦公材任閫帥未報而臺臣奏擢公福建閩海道肅廉訪使公方以激濁揚清為巳任俄升中奉大夫就除福建道宣慰使都元帥福州三湖之水溉民田萬五千畒閘壞而豪民擅其利公首修復而還其舊汀漳與溪洞接境故立屯種田死徙既多因廢不理公建言乞如舊制且耕且戍以綏靜一方改浙東道宣慰使都元帥天曆𥘉𬒳省檄整點七路軍馬境內晏然徙廣東道宣慰使都元帥凡三昜鎮皆佩元降金虎符廣海之間民夷雜處反側不常公為文以諭之使勿因事以結仇縱毒以報怨苟能謹租賦以奉公上畏法令以保室家然後與爾輩相安相樂共處此土公恩威素著聞者皆敬畏莫敢犯兩淮鹽法久而益壞今上皇帝即位之某年謀擇人極其弊而無以昜公乃命公以正奉大夫行户部尚書兩淮都轉運鹽使遣中書省掾賫襲衣法酒至吳中諭上旨起公于家公涖事伊始參酌前所于兩浙者次第施行焉創通州狼山閘引海水入楊州漕河以通江淮築句容陳公雷塘三河濬真州硃金沙以行運船請每歲住煎鹽十萬引而以流管羡鹽足其數鹽法既修特旨賜以名酒精縑白金五十兩寵數彌渥尋拜公河南江北等處中書省參知政事行次宿遷以疾作南歸于是天子亦閔公之老詔即其家拜江浙等處行中書省參知政事公感上眷力疾􅈬遒日親藥餌猶覬少蘇以圗𥙷報夫何疾勢日甚還吳下未幾而以訃聞公元配周氏參知政事文英之女先二十三年卒追封太原郡夫人繼室氏子男八人長曰畛以公廕當補官未命次曰㽧巳卒田畦以國學生為江浙等處行中書省宣使曰畇浙東道宣慰使司都元帥府奏差曰㽘曰畋曰畸亦卒曰畹女三人適周殷鄧孫男七人祐祺禎禧禮禋䄎女五人公天性純篤夙負大志每念未及成童巳登仕籍常思自效無負國恩既失所怙羇孤萬里㷀㷀孑立先友燕石丞公楠一見知為令器深加奬掖而策勵之年幾弱冠為郡别駕若老于政事者暨倅大閫典名藩承宣撫字籍甚能稱古之良吏莫能過也若夫理財之事固非所素習而公才諝通敏不局一器悏恢餘刃無迹可窺至于文武二柄風紀一司尤國家所倚重公三佩兵符兩持憲節雖在職日淺未䆒于設施而大綱小紀皆已僃具晚參大政顧遇益隆人方徯公盡攄宿蕰入陪廟論以大庇乎斯人天胡奪之遽耶公居官謙沖退託若無一能于小夫下吏接之恆歉然若不及而處事剛决意之所向子弟至親公卿至貴莫能回也公事親孝忠愍之夫人凡公所逮事者皆為執三年之喪張夫人寢疾躬治粥藥衣不解帶者十旬及其既沒偶以山丹花置几筵間花謝結實如桃而色正白蓋孝感所致祭工魁彥咸為賦白華之萹公清白之操得于家傳揚厯四十餘年故所賜田宅不增一疃不昜一椽廩祿多以周其宗族􅊚黨周夫人所遺奩田悉賣以自給公髫齓時留亰師聞魯齊許公以道學㳤後進即知敬慕故中年尤致力于根夲之學扁其宴息之室曰本齊云所為詩清醇而不事纎麗有小山堂藁三卷藏于家始公卧疾西湖上溍入候安否公顧謂溍曰吾平生無它長惟孝于親忠于君爾度此疾必不起只此為永訣䏻使吾不朽者惟子是溍對曰公年未及謝天子方嚮用公百神所相旦夕且勿藥矣公頷之而不復言公之薨也溍方縻于官守無從匍匐往赴矢哀以辭用存掛劒之誼而公家以銘來屬溍雖庸陋衰落不敢以不文為解銘曰顯允王公展也全人惟忠惟孝萃于厥身其孝斯何世有令德逮乎忠愍捐軀徇國遘兹鞠訩䘖哀籲天赫其龍光賁于重泉其忠斯何幼承世澤夙興夜寐岡敢不力乃佐鄉郡乃居閫垣爰宅乃牧來旬來宣帝念下民觀風遣使山鑄海熬夫亦王事繡衣茸纛弗究厥施靖共正直昭受王知乃隮政路參秉鈞軸坐鎮南邦暫淹外服上方仄席庶遄公歸逺猷未告喪其蓍龜史氏庀文考次功伐系之以銘式彰遺烈奉議大夫御史臺都事李公墓志銘公諱拱辰字廷弼姓李氏世為磁州人其先居邯鄲曽祖儀仕皇朝為滏陽令因家焉祖彀以駙馬都尉忒木台分封磁為其人匠局提領父著世其官剛果敏逹為衆工所嚴憚積勞升某官進秩七品後以公貴贈承德郎母張氏封恭人有子三人公其長也幼聰慧甫成童䏻自力于學既襲父職歎曰是可以行吾所學耶輒弃去遊亰師成宗時以善譯語得僃宿衛大德三年秋授承事郎髙郵府判官髙郵𥘉為路隸淮東宣慰司後改散府隸楊州路而宣慰司役屬之如故吏民咸以為病公白于奉使宣撫謂復宣慰司便因㑭公驛聞中書奏可之揚為會府歲所需藁秸阻于閘埭而經涉重湖遇水涸冰堅尤苦于負荷公言通泰如臯諸州縣水運為昜且所入巳足用請盡免焉㑹福院所設營田提舉司厲民最甚用公言罷去而責成于有民力以紓甓社等三十六湖隄僅如線間有衝决則道路絶而禾稼灾公先事為備修除以時而民不知有役吏胥冗濫則汰斥之暇日則率僚屬入學聽講有餘力則倡衆繕完公宇使一新去之日如始至焉至大元年秋遷紹興路新昌縣尹歲饑道殣相望公稽貧民之數老弱者賑給之少壯者俾富家收而傭之疾疫啫救療之所全活甚衆患經界之不正則核其實而圖其地形書其保甲編次鱗集印分兩劵間官報其左户執其右鬻産則劵隨之隱沒詭併云弊無所容而賦役以均邑夫郡逺而舟楫不通民疲于輸糧公請以土産布代其入餘為邑儲手書訓飭之辭俾人知遷善逺罪土俗惑于隂陽拘忌親死至數十年不葬公下令不葬其親者不孝論不旬日而葬者以千數有所追乎必循奮法遣牌為信民以不擾有鬪爭悉送耆長使質其是非而戒諭焉或諉以鄰境不决之獄凡所平反無不服其明允官府既曰以無事乃大修孔子廟而新其學舍至于縣𪠘驛亭川梁逵路有廢必舉人誦其政以為創縣以來四百年間未之有也皇慶二年春升承直郎湖州路歸安縣尹邑附于郡事多掣肘公守法不阿有爭家財而骨肉相戕者諭以天理感悟而去有以死獄誣平民者折以片言遂服其辜亰師貴近有指邑民之妻為其逃婢者中使督捕甚急公不為遣卒歸其夫每歲二稅先期至者輒勞以羊酒人皆知勸莫敢自後前是圭田多荒責里胥代輸其租公屏吏卒步入阡陌間視地之肥瘠㝎為歲入之數募有力者使墾種之有旨經理田土奉行者率務增加以為功公不苟隨聽民自占主者以所增田僅百五十頃議倍加其賦公曰吾官可棄民不可病也卒從公言仍其奮省臺交章舉公廉䏻延祐四年夏除承德郎中書户部司計六年夏擢監察御史于是仁宗臨御日久天下巳安巳治而不自神聖樂聞讜言時適有結交權貴人假藥術以媒進者躐遷翰林學士承旨公曰承旨任親地密處諸學士上彼何修而得此將何以贊書命待顧問乎同列相視噤不敢出一語公獨奮然奏劾之上𥘉不以為忤會內府市薪炭司出納者侵官尅民私其錢十萬餘緡公彂其奸章再上未報解印綅徑去群憸因得投其隙誣奏以所按不實召致詰問賴近臣力救而止上尋悟是年冬即以公僉福建閩海道肅政廉訪司事仍進三官為奉議大夫以外艱不赴七年冬復拜監察御史英宗在儲邸夙聞公名至治二年春特除公御史臺都事公持文墨議論以正憲度人服其知大體未幾以內憂去遂卒于家泰㝎元年三月二日也享年五十有七其年六月十八日祔葬于北庸鄉之先塋公持身嚴恪而待人謙和處族􅊚里黨各盡其道樂稱人之善苟有過必面折之周人之急一無所靳居清要而不忘丘壑自號平墅以見其志平生嗜社工部詩顔太師書亦意氣之所合不特愛其辭翰之美而巳歷官三十年家無留資治一府二縣興利除􅊣靡有遺力所至咸為樹碑以紀遺愛其立乎臺端抗言無隱真君之遺直哉公葬二十有四年而墓隧之石未有刻文其子益懼愈久且墜逸奉本省煦磨官劉金暨同知磁州事張公術所為狀㑭溍序次而為之銘溍竊觀公在朝廷上下之際相成如此誠千載之一時謹托狀所述序其行治之詳而著其大莭于銘詩用昭示乎方來非徒以見公之賢蓋將以明先帝之聖德于無窮也公娶安氏追封滏陽縣君興國忠敏公之孫人匠局某官𥙿之女以至順二年五月九日卒其年六月十九日合葬焉子男一人即益也用公廕入官由永嘉縣主簿辟江浙行省掾史擢夲省檢校官纍階承事郎女三人長適馮思敬次適監察御史董搏霄次未行卒孫男四人女四人銘曰陽為君子其德必剛惟有其時績用乃揚侃侃李公蚤膺殊遇既疇民庸遂踐朝著來居帝㫄耳目之司摧奸擊疆脫略細微危言正色匪躬之故不可則止奉身而去當寧寤歎式遄其歸公去復來衆正所依百壬斂避豈公之力休休有容繄帝之德上方用心乃不有年拱未清風生氣凛然人亦有言君仁臣直勒銘兹碑敢告凡百前承務郎王公墓志銘公諱昌世字昭甫姓王氏其先汴人宋武經大夫保信軍承宣使安道公髙祖也建炎𥘉扈蹕南渡乾道間始㝎居于鄞曽祖諱睎亮朝散大夫祖諱撝嘉㝎癸未進士任朝請大夫尚書吏部郎中兼國史院編修官實録院檢討官兼崇政殿說書贈正奉大夫考諱應麟淳祐辛丑進士仕至朝請大夫禮部尚書兼絡事中兼直學士院兼同修國史實録院同修撰兼侍讀妣鄭氏李氏以贈舒氏以封並為碩人公幼端粹齠齓時已仡然有巨人之志不屑與群兒狎長益純慤視責遊華靡事漠如也用尚書公恩𥙷承務郎未及祿而宗社巳墟尚書公杜門不出朝夕坐堂上耴經史諸書解論辨公甫十歲帖帖聽受無倦自是于先賢名理之言群公經制之說至世變之推移治道之體統古今禮典之困革殊聞異見靡不究悉尚書公所著述公搜輯考訂贊助為多蓄書萬餘卷燬于火露抄雪纂至忘寢食書以復完為文一發于夲實丗俗風情月狀語皆所不道尤精于易筮占吉凶之驗知前知亦其誠之所致云國朝承平既久故家子弟以攀附致顯融者不可選紀尚書公名重當世諸公謂宜録其嗣人以表盛德薦章交上公力辭曰士之大莭嗣守為難敬身所以敬親肥遁所以無不利矧以介直之資與世寡諧倘得讀文書求已志以畢此生足矣不願乎外也公性孝友舒碩人卧病十年粥藥必親調治不解帶動逾月逮其既殁哀毀過制歲時家祭尤致其謹姊貧無所歸挾其幼稚相依者二十年歲饑米斗十千給疏屬猶數口家素儉薄中分先疇之半以卑族人尚有怨疾不已而為計傾之者公靜以處變訖保其遺緒有伐墓木者禁不可則捐厚資以塞其欲有私粥其田及稱貸而弗償者一無所問有竊其物而捕得者公曰彼迫于飢苦乃尓吾不忍置以法竟舍之公平居不自表襮與人交無鈎距重然諾亦不苟為阿附人𬒳患難救之必力邑有訟連坐者衆巳誣報而莫敢自言公為言之卒直其冤有遇盜而加罪㫄人者公謂曰汝欲得而物耳吾與汝修之巳而果得真盜人服其長者公老益康強俄一夕感微疾將愈值舒碩人諱日力疾行事疾復作遂以泰㝎四年三月九日卒享年六十有一卒之日人咸為之盡傷流涕曰厚德君子亡矣娶楊氏朝議大夫知肇慶府珏之孫女子男二人厚孫寧孫女一人適楊祖厚孫男三人升同孫隲女一人嘗戒二子曰務學以實勿事虛文持身以誠勿循詭道母以貧忘古禮母以卑墜家聲二子奉以周旋訖䏻有立公晚自稱靜學居士有文集二十卷名靜學藁藏於家公之葬以天曆元年十二月九日墓在鄞縣陽堂鄉同􅓝先塋之側其葬也宣閫都司曹公愚以先丗之雅故狀公行甚具而未及著于石章於是厚孫馳書於溍以銘為屬溍竊惟宋季文學侍從之臣言博物洽聞者必曰厚齊先生厚齊尚書公别號也尚書公於書無不讀記誦絶人且練習臺閣故事有不知必問焉暮年深自晦匿不與丗接而東南學者以為宋三百年文獻所存莫不翕然宗之尚書公殁幸公克謹其傳遺文逸事有足徴者上方稽古圖治用言者建白收召諸儒撰㝎三史使命旁午搜羅前聞而公之不起巳久此尤四方士大夫所共歎息痛悼者也銘其可無作乎溍晚陋不足以知公序而詩之姑以慰其嗣人云爾銘曰二代之禮丗逺莫徴嗚呼後王尚有老成文獻所存公實敬承右文稽古際今休明論撰之司史臣是􅈾孰無望公以時飛鳴抱器歸周旅于天廷贊于筆削作為一經公則已逝曰吾其寧有謹其藏有伏必興惟文有冡昭以兹銘信州路總𬋩府判官謝公墓志銘公諱晟孫字唐鄉姓謝氏宋丞相太師魯惠正王四丗孫也其先占籍台之臨海後以魯王孫女作配于穆陵賜第錢塘因家焉曾祖諱渠伯朝奉大夫贈太師追封衛王諡恭簡祖諱奕昌少保保寧軍莭度使祁國公贈太師追封魏王諡莊憲考諱塈兵部侍郎換保寧軍莭度使贈開府儀同三司諡懿敏妣魏氏通義郡夫人公幼聰慧稍長能自檢飭刮摩綺紈之習而自齒於韋布咸淳間用丗澤入官至太社令德祐𥘉差通判安吉州除軍器少監纍階朝散郎入國朝用近臣薦授承務郎信州路總𬋩府判官公拜命即辭不赴閻公復為翰長徐公琰為中執法二公皆中州大老慎許可㦯舉公可直詞林㦯舉公可優憲府其見引重如此而公終不以仕進屑其意扁所居堂曰退樂蓄書數千卷日以教子為務公性素樂昜善與人交尊官大人來江南者若馬公紹董公文用髙公克恭李公衎無不慕而與之游公為商略古今間語及承平故事亹亹不倦遇風日清美輒與勝流韻士酣嬉于水光山色間祈為詩直以寫其胸中之趣不苟事藻飾求媚俗也公既無纍於物益自厚以尊其生百年之耆舊凋落殆盡而公巋然獨存耄期之嵗童顔不衰知之者愛其有老成之典刑不知者疑其神仙中人也家適燬于灾公一不問惟恨弗克保先丗之遺書故物因感微疾以至正二年七月二十四日卒享年八十有六娶趙氏諱由禕宋觀文殿學士太師忠惠公與籌之孫女封恭人先四十入年卒子男六人長菜老用公恩為福州路連江縣名聞鄉巡檢次池武昌路儒學教授未上而有公憂次沆為伯父升孫後次汶蚤卒次泌為季父曇孫後次浩女三人長適奉訓大夫等處海運副千户孟本封烏程縣君已卒次適太中大夫南安路總𬋩管淐祖封平昌郡夫人次適婁壁宋參知政事機之孫也孫男三人栻杓與權女二人適閔惟德陸從龍曽孫男三人玄齡玄寶玄輝女一人𥘉趙恭人葬湖州德清縣永和鄉方山之原至是菜老等以其年十二月某日奉公柩合葬方山遵治命也諸孫中杓尤為公所鐘愛未始頃刻玄左右年甫三十有三公卒後十有七日亦卒即公墓旁祔􅌾焉公與溍之先人生同嵗溍每造公未嘗廢子弟禮而公讓不肯當以溍為忘年友父次子池緣疇昔之雅故致書及狀來徴銘於溍謹備著狀所述而考次公平生出處大略得其時行時止從容去就之際可無愧於古君子者播諸銘詩用昭示于不杇千載之下寧不有尚論其丗而知其人者乎銘曰謝公恂恂昔之王孫際今興運共惟帝臣有命自天公拜稽首禮進義退不居其有樂以忘憂泳遊聖時既夀而康卒全其歸委祉于家燕及嗣續文獻之傳夫豈不足論撰𥘉終有銘幽墟最公平生孰冝特書士之大莭莫先出處發其幽潜式示永古閩清縣主簿張君墓志銘君諱暨字叔器其先隴西秦州人宋太師循忠烈王佐髙宗建中興之業為南渡先將苐一有傳在太史氏於君為七丗祖由忠烈而下皆僑寓于杭因著籍焉曽大父諱沆承直郎大父諱杓忠翊郎父諱炳承莭郎母郭氏君少孤母甚鐘愛之既長事母克盡子道母殁十餘年值諱日猶哭之慟其孝心純至天性然也君生於華閥而未嘗習為豪侈自奉甚簡薄無異韋布之士讀書不徒挹其膏馥以為資身取寵之具務通大義而已國兵取宋唆都右轄公留鎮南土知君才可用力薦于朝授福州路閩清縣主簿以親老固辭不獲乃受而不赴故苐燬于灾結廬耴足芘風雨率子弟及家僮闢地以事種蒔桑竹成隂而𬞞茹果蓏分畦就列竒卉珍木有華無實者悉命去之平生與親朋里黨相往還無問貧冨貴賤處之如一暇日挾客訪前賢遺蹟於湖山間遇勝處輒引滿獻酬咏歌以為樂而忘其老晚益康彊人謂必登上夀屬疾僅浹旬而遂不可為以至正四年十月十八日卒于家享年八十以其年十一月十二日祔葬于仁和縣大雲鄉洛山承直公墓之次娶劉氏太師鄜武僖王五丗孫女先十六年卒至是合葬焉武僖與忠烈並稱四將者也子男一人曰鎰孫男二人映暐女二人曽孫女二人君之葬也鎰既志嵗月納于壙後二年始以狀來謁銘自昔丗代遷革故家子弟席其祖父之舊以耴顯融于時者固有之其奉身而退甘老朽於山林至於名字泯滅無聞者亦多矣君雖遺榮弗居深自韜晦無所見於設施後之人乃䏻汲汲焉圖其不朽如此殁而不亡尚何憾乎銘曰時則可仕乃髙尚其志樂以忘憂如素乎冨貴用䏻保其故家而為全人於聖丗揭于墓門曰公侯之子孫有復其始在尓嗣人鄉貢進士項君墓志銘至元二十年秋九月庚申宋台州鄉貢進士項君良才卒葬以二十六年春三月丙申後二十一年君之子鼎亦卒又二十一年是為至順二年鼎之子炯始以狀徴銘於金華黃溍銘曰台之項氏所祖莫詳丹徒尉斯肇見有唐斯仙居人會昌進士其鳴以詩著稱史氏斯後曰勝實七葉孫勝之子祐當宋寶元復自永嘉徙于臨海卜居章安幾三百載佑後三葉曰處士璣為君曾祖不耀於時負土葬親廬墓三紀啇公飛卿傳于私史祖惠父駰克謹其承惠夲胡氏處士之甥君𥘉名圭昜以今諱曰公望者始冠之字君少學詩事胡公良惠之從子作守莆陽晚所執業時之師表白雲先生金氏安道君善說詩不務苟同曰以二南始乎國凬中少王風錯於鄭衛著周興衰厥有溦意檜曹之末至豳而終否泰剝𣸪循環不窮繼是有作斯為雅頌孔子之衰周公不夢哦彼黍離我心之憂如醉如噎曷能興周小戎駟鐡凮槩雄偉周之為秦噫乎悕矣君性寬厚而無脂韋亦不面斥人之是非握手屏處懇言所以聞者謝服去非求是鄉鄰有訟必質於君忿䦧之銷由君片言郡二千石王公華甫洎揚公棟咸加推許王公在郡政多便宜經界義倉悉君任之郡民新附人或獻計請括莪倉以給餉饋桴鼓甫息瘡痍未瘳家無圭撮積負山丘符移趣辦吏卒旁午君為代輸竭其資聚舍北一里大山崇崇火光如射洪發其中陷者百家死者數百或陷不死身交木石君捐私槖以募壯夫排木抉石活者十餘祭其死者用浮屠法訛言不驚人鬼帖帖君處親舊有施豫恩下逮輿隸莫不欣欣堂有雙桂處士手植王公卿月扁字徑尺君弟英才與君齊名並薦于鄉雙桂之徴君既預薦而不及祿終於布衣壽六十六墓在縣東保樂西鄉安仁鳳山先塋之旁君娶于翟子泰蚤丗繼室以張有子男二其長即鼎以孝友聞對䇿鄉校力詆權臣胡公在朝博士著作教授王宫時君舊學鼎以公故𥙷官迪功凖遣臬臺浙水之東次曰大有幼居侍側從君避兵為遊卒淂卒欲剚君以身蔽焉卒駭而心竟獲兩全其女有三壻曰王牧程萃黃愷率皆士族孫男六人炯以文稱次則道唯道中道成成歸釋氏不列于次又次道心士寧其季女則有五壻亦名門曽孫男十其女七人炯曰六歲吾祖以沒豐貌整容猶記恍怫坐南窗下大樹如山授炯古詩置炯膝間母曰小兒勿勤長者吾祖曰嘻茲吾孫也言巳哽塞炯懵莫知先人以告乃知其悲嗚呼吾祖望炯非淺沒五十年不有論撰杜甫之沒餘四十年賴孫嗣業求銘以傳炯實闒茸不自底厲挈挈道路與嗣業類輒援前比乞為銘章尚俾吾祖沒而不亡銘杜甫者丞相元稹溍何人斯敢告不敏炯拜且泣曰無固辭庸掇其語播兹聲詩為言則俚而近於質刻諸方珉永賁幽室金華黃先生文集卷苐三十一曩在都門從友人許借讀黃文獻公集十卷乃明仙居張儉存禮刪本病其去取失當而附筆記碑狀諡議於第七卷末尤刺不倫兹于吳門黃孝廉蕘圃齊見元槧金華黃先生集不全本紙墨精善始快然莫逆于心也考宋景濂撰公行狀述所著書有日損齊初藁三卷續藁三十卷義烏志七卷筆記一卷此偏排次自卷一至卷三十一初藁三續藁一至草八雖日損齊之名其為一書無疑但闕續藁十一至十八草九至三十耳貢泰序稱和藁臨川危素編次續藁門人王生宋生遍次所云王宋二生即子充景濂也而每卷首但列臨川危素名蓋太朴在元李負重名王宋皆後進不敢與抗行也行狀云續藁三十卷今貢序云草八卷蓋作僞者洗改痕迹宛然草八必三十之訛并和續藁為三十三卷耳癸丑九月十有五日竹汀居士錢大昕識
