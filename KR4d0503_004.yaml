body:
  text: 樂章臨川危素編次番昜劉耳校正三皇廟樂章降神黄鍾宫三成之曲九變於皇三聖神化無方繼天立極垂憲百王聿崇眀祀率由舊章靈兮来下休有烈光降神大吕角二成之曲帝徳在人日用不知神之在天矧可度思辰良日吉蕆事有儀感以至諴尚右享之降神太簇微二成之曲大道之行肇自古先功烈所加何千萬年是尊是奉執事孔䖍神哉沛兮泠風馺然降神應鍾羽二成之曲雅奏告成神斯降格妥安有位清廟奕奕肹蠁潜通豐融烜赫我其承之百世無斁𥘉獻盥洗姑洗宫之曲靈斿戾止式燕以寧吉蠲致享惟寅惟清挹彼注兹沃盥而升有孚顒若交于神眀𥘉獻升殿南吕宫之曲齊眀盛服恪恭命祀洋洋在上匪逺具邇左右周旋陟降庭止式禮莫愆用介多祉奠幣南吕宫之曲駿奔在列品物咸備禮嚴載見式陳量幣惟兹篚實肅将忱意靈兮安留成我熈事捧爼姑洗宫之曲我祀如何有性在滌旣全且潔為爼孔碩以将以享其儀不忒神其迪甞純嘏是錫𥘉獻盥冼與前同𥘉獻升殿與前同太皥宓犧氏位酌獻南吕宫之曲五徳之首巍巍聖神八卦有作誕開我人物無能稱玄酒在罇歆監于兹惟徳是親炎帝神農氏位酌獻南吕宫之曲耒耨之利人頼以生鼔腹含哺帝力難名欲報之德黍稷非馨眷言頋之享于克誠黄帝有熊氏位酌獻南吕宫之曲為衣為裳法乾效坤三辰順序萬國来賔典祀有常多儀具陳純精鬯逹匪藉彌文配位酌獻南吕宫之曲三聖儼臨孰侑其食惟爾有神同功合徳丕擁靈休留娱嘉席歴世昭配永永無極亞獻終獻之曲緩莭安歌載升貳觴禮成三終申薦令芳凡百有職罔敢怠遑神其醉止欣欣樂康徹豆南吕宮之曲籩豆有踐殷薦亶時禮文既洽廢徹不遲慎終如始進退無違神其祚我綏以繁釐送神黄鍾宫之曲夜如何其眀星煌煌靈逰弗留飊舉雲翔瞻望靡及徳音不忘庻囬景况發為禎祥望瘞姑洗宫之曲工祝致吿禮備樂終加牲兼幣訖薶愈恭精誠斯罄惠澤無窮儲休錫羡萬福来崇五言古詩金華北山紀逰靈源偶為山中逰逺過雲關宿蒼燈閃𥘉夜雨氣蒸深屋時聞清梵音窈眇松林曲草堂迢迢上方界水木翳清景山深不可留日暮衣裳冷悽其懐昔逰百歲嗟俄頃三洞仙山髙不極萬古積蒼翠清興薄暮移遺迹洞天秘巖阿春寂寥群仙勿予遲鹿田披榛度空荒突兀崖寺古幽花雜紅白老屋亞雲雨前瞻石徑微咫尺不得取寳峯下山復上山躡屩行沮洳宿雲冒長嶺旭日映髙樹山僧亦何為獨向城闉去潜岳潘公古人陳迹閟丘壑草生春晝長鳥啼巖花落神交千載上未敢付冥漠山橋行行指木末路逐飛雲上時登巨石憇共聴春泉響尋源竟莫窮即事成幽賞寳石暮投招提境眀發首歸路舉頭望山椒遥認經行䖏重重巖壑間蒼然正煙霧中秋㑹宿浦陽江上分韻得仰字甞窺仙華録勝踐心所仰蹉跎二十秋故爾勞夢想名談出邂逅髙㮣餘彿彷莭至月仍圎别来山似長百年空中絮此㑹知難兩欲去吾未能不飲君宜強露蔓多夕滋風竹留晚響岐路方悠悠云何稅塵鞅龍山九日賛邑滄海澨彌年窘将迎屬兹九日至緬愛龍山名欣然得勝踐况乃群彦并碧蘿引幽䇿涼泉度飛觥志適形可忘神舒體愈輕鄙劣竟何取靦顔結華纓登髙謝能賦徇禄慙歸耕幸此農事休萬寳咸吿成庻竭一餉樂持用誇昇平月出衆山静天空夕雲驚先民貴無荒簡書今有程悵焉難乆留振𬒮松風生石臺分韻得下字蒼山面長溪勢若飲奔馬層臺跨其脊萬古浥蕭洒登臨兹維要朋采未云寡迢迢歴榛莾靡靡眺原野白雲與翠霧夐在履屐下窮秋向揺落霜菊故堪把賞心孰無同幽抱欣巳寫千載如可期銘山徯来者四眀送王學正歸里昔者鄭廣文局束老一官今君去冷署春花映紅顔才名世有遇合古所難行矣髙其翔青雲承羽翰下語翩翩子母庸悔儒冠出門送君歸君歸㡬百里揚帆東海頭弭棹䨇溪尾却觀䨇溪流去作東海水沄沄竟日夜萬古無窮巳問胡能爾爲有本固如是相君郷先逹盛業垂千春邈兹異代後世胄方詵詵誰移玉樹枝逺揷滄海濵優哉郡文學鄧禹終咲人公侯乆将復錦衣何時新送楊學正歸餘姚舜江吾舊㳺風物殊不惡江水天際来宛宛帶郊郭雲帆渺沙溆翠嶂森摟閣别離不可念此日忽巳昨想見春水生煙栁仍濯濯君胡乆去此三徑獨盤礴空齋耿燈火月冷潮聲落近聞故人書逺致江上作白駒幸無遐淮陽詎云薄招要忻良㑹緑酒春可酌采芹有遺篇風雩多新樂因君訊同志何用慰離索題松聲樓長松四簷間落落無與伍天清嘯歌發肯作兒女語道人有真聴無迎亦無拒尚不知有耳况覔聲處所起視南山髙眀月在庭户應念朝市人聞雞走風雨雍熈僧舎偶書幽䆫悄無寐落葉不可數風驚葉間露中霄聴成雨起視天正碧萬里若垂宇兹予亦何爲兀兀守環堵奉府帖賜髙年帛晚宿孝義山中賦捧檄去州邑承筐布眀恩詎敢期稅駕惟知懼乗軒時春雨新巳嘉木隂正繁農人有耕作羽蟲亦飛翻感彼物情適念此王事敦悠悠迫長路靡靡窮郊原庶與遺老逢幸聆長者言持以薦芹曝無慙賁丘園低佪白日晚寂寞蒼山根吾行匪游衍此懐誰與論逰西山同項可立宿靈隱西菴薄逰厭人境振䇿窮幽躅理公所開鑿遺迹在巖麓秋抄霜葉丹石面寒泉緑仰窺條上猿攀蘿去相逐物情一何適人事有覊束却過猊峯廻遥望松林曲前山夜来雨濕雲漲崖谷縹緲辨朱甍禪房帶脩竹故人丹丘彦抱𬒳能同宿名篇聊一詠異書欣共讀蹉跎未聞道黽勉尚干禄夙有丘壑期吾居㡬時卜送祝蕃逺北上春風吹九衢卑卑桃李門眀堂待松栢未失山林尊相逢今歲寒是事無深論念子抱逺志此道夙所敦刋條落其葉将使見本根痛恨日月微毅然闢浮雲柰何夸毗子聚訟生紛紜瀛洲冨才彦冠盖如雲屯去去當遇合羙價傾璵璠惟須用卿法力行尊所聞丈夫必有事窹主在一言上以禆聖學下以安元元我如鶴俛啄豈復思乗軒子如摶風鵬本是天池鯤棲棲文學掾平世何足云朂哉保令徳契闊期無諼陳孝子詩南仲抗陳氏斗龍父所家臨百丈溪父書傳考亭夫亦人之子胡獨以孝稱維仲適母盛王實生寧馨盛謂我巳出無殊祝螟蛉仲父諱弗言王卒不自眀睠然舎之去􅈱􅈱聞泣聲年運日巳往頭角稍峥嶸籲天乞殞㓕願以益父齡父殁盛亦亡弔影傷孤煢或乃吿之故曰汝王所生王居清湖上去此無十程時仲新棒檄精廬擬横經悲號棄其官肩輿親奉迎安知世代易人非餘故城隣有鶴髮嫗叩之乆始譍言我與汝毋少小俱娉婷汝母生汝歸去作江東行不知今在無老我猶零丁仲也聞益悲贏粮事晨征六年困逆旅冷雨啼青燈譬彼無母雛投林輙長鳴永豐有施氏大屋深重扃於焉得母䖏一夕相合并母子更抱持淚如九河傾三日負毋還盗賊方搶攘倉黄與之遇白刃紛交横頓首前致辭覼縷陳衷誠能令激髙義相戒勿敢驚仲昔以至行上天降休楨靈鴈既群集嘉瓜復冬榮區區彼蝱蟁豈遂無人情聖門語純孝厥有閔與曽未聞樹竒節謡誦傳轟轟此道古或希此事今可徴我歌雖云俚庻感蚩蚩氓上京道中雜詩發大都辤親獨行邁遥遥抵亰國胡為突不黔驅馬更逺適至尊有時廵樹羽殷阡陌宿衛必近臣顧問須耆徳陋儒亦何知冗從同執㦸草深原野青雨暗關塞黒寥寥盛年意眷眷㳺子色一身萬人中敢不思努力劉蕡祠堂劉君古遺直祠堂在丘園嗟此豪侠窟文雄歘孤騫平生二三䇿匪徼眀主恩瑣瑣談得失無乃市井言慿髙一長望苦厭車馬喧微風過踈雨青山滿前軒隂晴倐異態浮雲實無根悠悠千載心去去勿復言居庸関連山東北趨中㫁忽如鑿萬古争一門天險不可薄聖人大無外善閉非楗鑰車行巳方軌關吏徒擊柝居民動成市廬井互聮絡幽龕白雲聚石磴清泉落地雖臨要衝俗乃近淳朴政須記桃源不必銘劒閣僕夫跽謂我無爲乆淹泊山川豈不好但恐風雨惡榆林崇崇道旁土云是古長城却㝷長城窟飲馬水不腥斯人亦何幸生時屬休眀向来邊陲地見今風塵清禾黍𬒳行路牛羊散郊坰儒臣忝載筆帝力猗難名槍竿嶺憶昔賜第歸吾毋適𥘉度蹉跎歲年晚今辰乃中路居人誇具慶㳺子慙叱馭兹山稱最髙揚鞭入煙霧矗矗多峭峯濛濛饒雜樹﨑嶇共攀援躑躅頻返頋陳情未成表登髙詎能賦獨憐山下水逺向瀘溝去李老谷縁崖一徑微入谷䨇崦窄宻林日易曛况乃雲雨積行人望煙火客舍依山色家僮為張燈野老煩避席未覺風俗殊秪驚關河隔嚴程不可緩子規勿勸客赤城雞鳴秣吾馬晚飯山中行何以慰旅懐赤城有嘉名灘長石齒齒樹細風泠泠時見巖壑間粲若丹砂眀温泉發其陽撝訶勤百靈前峯指金閣真境摽珠庭白道人跡稀青崖雲氣生信羙無少留緬焉起深情龍門竦身望龍門緩轡行兀兀溪廻愁屢度雨横驚暴溢百崖儼相向百水怒争出人言馬上郎快意毎多失自非渥洼種不得矜捷疾飄飄蟣蝨臣􅏮􅏮黿鼉窟皇靈重覆冒利渉用終吉廽睨向所經千嶂隠朝日青林外盤紆黄流中蕩潏後来未渠央君子冝戰慄獨石觧鞍及亭午稍欣煙霧収蒼然衆山出歴歴如雕鎪前瞻一石獨靈宫居上頭頗聞去年夏水激龍騰湫走避登屋山夜半齊呀咻幸兹溪澗中今作清淺流宴安不可懐變化誠難求翠華渺在望行矣母俺留檐子窪自從始出關數日走崖谷迢迢度偏嶺險盡得平陸坡陀皆土山髙下紛起伏連天暗豐草不復見林木行人煙際来牛羊雨中牧颯然衣裳單咫尺異寒燠佇立方有懐相逢仍問俗畏途宜疾驅更傍灤河宿李陵臺日暮官道邊土室容小憇漢将安在哉荒臺猶髣髴低佪為之乆懐古増歔欷長風吹曠野飛雨千里至蕭條蒼山根草木餘爽氣常憐司馬公予奪多深意奏對實至情論録存大義史臣司述作遺則敢失墜上都分院晨興過桓州旭日生蒼涼舉頭見觚􅏢金碧何巍煌洪河貫其前青山環四旁暮投玉堂署鼇峯屹中央升階旅羣彦官燭分餘光琴册森在側談咲来清觴列坐無所為陳詩詠黄唐帝郷豈不樂父母逺莫將起視雲漢低垂星爛寒芒南飛有冥鴻邈哉天際翔題趙涼公瑞瓜圗慶門集嘉况異瑞呈瓜田生五而成十竒偶出自然觀物可知徳發祥匪由天願言植靈苑永奉君王前合形表同休雅詠流綿綿逰寳陀寺十年望滄海臨流不能度蒼茫歲華晚邂逅舟楫具拂衣乗天風掛席随煙霧旦從蛟門發暝投翁洲住前瞻積水深島嶼青無數梅岑特孤絶遥見日出䖏寄身人境外矯首禅関路粲􅙾金砂石離離白花樹髙期惬幽抱歴覽增遐慕俯伏苔磴間庻與真靈遇二邊非可取三觀何時悟嗒然坐忘言目送寒潮去靈竇紀逰移舟泊泉口我行已信宿天寒洲渚生峯廻川途曲煙霞蘭若髙别墅在林麓攬衣待眀發石路何幽阻日出不見人林深但多虎乳峯稍已近恐懼那復數髙人欣相迎山門帶流水風生珠樹間月窺鏡池裏觸景遂成迷應接殊未巳幽㝷指山椒崖傾忽如㵼俯身視木末懸水在足下冥冥巖岫中宴坐奚為者亭亭妙髙臺逈出千峰上怪松多十圍巨石非一狀心賞孰與同昔賢有遺唱蕭然上方境人稀知地僻中峯路莫辨丹山雲仍積徒聞古仙人石上餘足跡詰旦逾西岡草木益深秀梯苔下絶巘坐石看飛溜隂靈多窟宅欲往不敢又興移𥘉出山繫纜長汀樹夜来雪巳深溪風水難度猶疑鐘磬音遥遥白雲處同王章甫待制校文上亰八月十五夜宿龍門驛涼風堕黄榆萬馬皆南馳而我方北首度關及鳴雞石路幽更阻僕夫慘不怡徐驅待明發泱􅐯窮煙霏貂裘者誰子怪我逢掖衣為言霜露多遑遑獨安之我非不自愛簡書今有期憶昔州縣間折腰向小児荏苒二十年白首𥘉登畿同𫀆如燕鴻去住常相違悠然慨平生與世何参差瞑投龍門驛髙舘臨廻溪青崖拱白月水木含餘暉秋色故瀟洒我行殊未遅相從况魁彦炯若珊瑚枝衰暮奚足云一觴聊共持送曽止善孔廟司樂周官重司樂典教專成均如何千載下實去惟名存之子負逺志𬒳褐徂冬春低佪不自衒保此席上珍小試特豪末食禄同庻人幸與駿奔齒位卑號仍尊既殊仕伶官况及逰聖門金石方在耳頌聲未崩淪聞風苟有作薄俗斯還淳嗟予領胄子四術空遺文鏗鏘尚莫辨論說将何云臨分用自愧贈言聊具陳送王君冕同年歸長安昔忝膺薦送𬒳褐趨上亰蒙恩賜清問彚進陪時英束帶仕州縣暫為閭里榮蹉跎二十年来拂舊題名升沈乆巳判存殁復堪驚忽逢王眀府話舊欣合并蕭條逆旅中書帙亂縦横坐閱車馬喧澹焉若無營雖懐帝郷樂不受世網嬰寵辱端可齊去就一何輕空餘綈𫀆戀猶軫故人情予方徇微禄未能返𬗋荆終然無𥙷報白髮日夜生如何同逰䖏餞此千里行度關秋風起落木寒蟬鳴相思阻良覿惻愴何由平題杜左司西巖詩卷吾聞古逹士大隠非山林如何鵷鷺間白駒起遐心遥遥望故山𬗋塞繚以深峯巒勢交集積翠千萬㝷園廬在其下門巷常愔愔軒䆫帶流泉花木乆成隂舂秫足新醸亦有書與琴終然戀魏闕未忍投華簮平眀奉朝退粉署欝沈沈披襟坐髙閣獨對西山岑爽氣幸可致塵慮安能侵勿云須吾土始用窮登臨異方苟同得視古猶視今聊為招隠篇徃和巖中吟題象山環溪圗崇山標地靈萬古聚清淑堂堂故相家髙風在喬木仙翁上天去逸響今誰續優哉四千石接軫飛華轂夫君氷雪姿乃爾抱幽獨翩然来帝旁霞𥚑儼𥘉服侍祠眀廷上厭直齋廬宿睠言懐舊居結構依山麓軒䆫對晴嵐林杪出懸瀑散為百道泉噴薄翻珠玉餘潤之所蒙秔稲豐比屋春事日向深桃源酒方熟往来無俗駕異書仍可讀歸歟定何時專此溪一曲相逢亰洛間紅塵眯人目披圗覿佳致山水増新緑先賢止息䖏杖屨存遺躅愛山錫嘉名恵幸及樵牧于于後来者猶或𬒳膏馥安得從君游青雲兩黄鵠歲晏歲晏木葉落遥見東城隅雉堞欝岧嶤列屋何蕭踈悠悠西南望赫赫金張廬退朝集冠盖鳴珂沸通衢合遝多俊㳺並轡飛華𥚑頋盻有光彩行者為踟蹰俯慙筋力微無從效馳驅日斜坐官舎還拂案上書緬彼川路長感此年運徂遲廽不能去歎息将焉如送陳太祝夫君青雲彦早通金閨籍弁服勞駿奔執事謹朝夕忽乗使者車意氣何輝赫将指固有嚴為務本非劇經營禮文事詎曰期會迫定知多餘暇時復肆游歴向来佳麗地觸目成陳迹西山獨偃蹇不改太古色相逢㡬遺老慷慨語疇昔芙蓉君子花足以娯使客我方守一官兀坐如龜息當歸更淹留臨别增感激長風吹逺塵浩浩千里白欲附南飛鴻安得生羽翼送王鍊師歸四眀飄飄采真侣乃在四眀山霞𥚑朝帝所瓊舘留人間忽聞䨇鳬舄却向東南還望之若流星邈然不可攀海月照堦戺天風飛佩環我何苦覊旅氷雪生朱顔集淵眀詩句題李中甫貟外稼亭東方有一士客養千金軀束帯候雞鳴出則陪文輿代耕本非望暫與園田踈園田日夢想投冠旋舊墟興言在兹春新疇復應畬田父有好懐過門更相呼披草共来往履歴周故居悠悠待秋稼時還讀我書雖未量歲功栖遲固多娱此事真復業此語真不虚餞送傾皇朝念前塗前塗當㡬許直至東海隅古時功名士事事在中都遥遥沮溺心君情定何如集淵眀句題胡生嘉樹軒孟夏草木長霜露憔悴之藹藹堂前林冬夏常如兹嚴霜九月中卓然見髙枝如何捨此去白日掩荆扉深谷乆應蕪此䕃獨不衰黽勉六九年懐此貞秀姿常恐負此懐未足為髙栖及時當勉勵慷慨思南歸親戚共一處日夕歡相持披榛歩荒墟登髙賦新詩坐止髙䕃下一觴聊可揮從今至歲寒縦心復何疑永嘉王君自製挽辭盖安乎死生而未忘情乎死生者也集淵眀句以釋之自古皆有殁我今始知之居常待其盡逝将不復疑人生無根蔕去来何依依旣来孰不去奄去靡歸期復得返自然人間良可辤何事空立言念此懐悲悽日醉或能忘一觴聊可揮且極今朝樂千載非所知送寧上人歸呉中我如雲間鶴乆厭雕籠飬子如海上鷗𥘉不嬰世網胡爲逐吾軰飲啄勞俛仰得無㘴書癡遂爾生技癢欲於一毫端而現諸萬象重雲連夏秋雨點大如掌三州成巨浸百水猶怒長倉忙揖我去風蒲映飛槳有形天地間浮萍依浩蕩向也本非来今焉亦非往臨岐将何贈詩境方渺莾幸子頗聦眀莫作離别想題雲巢圗飄飄學仙侶心與秋雲白獨居非有隣忽去亦無迹峩峩三界上地位風雨隔毋求一枝安而以六月息當憐夢中人螻蟻同窟宅湖上即事垂雲晝濛濛湖面惟一色薄暮風更生際夜雪𥘉積凝隂勢方盛塵境喧暫息坐乆聞拏音忽然破寥閴試院諸公西湖同泛分韻得儀字秋杪景将晏天髙霧仍披漾舟西城曲散䇿南山陲重棘幸巳撤累觴欣共持及兹酒不空未害席更移㑹合非可常簡書各有期念之動予懐朂㦲慎其儀題清華亭名區匯脩渚流望俯平陸飛雨天際来逺峰净如沭生香餘晚華繁隂藹嘉木秀色坐可攬終然不盈掬觸景幽興多接物道機熟誰能與之逰食芳飲山渌南屏叢玉軒分韻得白字偶從采真侣逺過金仙宅名談接勝流傾盖頭未白湖水清見底春風去無迹列坐陪墨君觴詠終日夕昔聞有三咲今喜成六客後来復何人莫使風雨隔贈别呉孟思斯去而氷生千載惟兩人趙公起昭代並世推吴君及公無恙時蚤巳逰其門公書集衆妙變化何其神如食有糓粟間之以八珍君獨務稽古要在同其文探索極根柢辯析窮毫分源深流自逺所出日益新麾以正正旗終焉䇿竒勲徃来自成蹊桃李竟不言我方徇世好有作徒云云借潤翰墨間幸可張吾軍媿我才欲盡感君愛彌敦别離歲方晏躗言聊重陳送陳生歸天台英英陳氏子年未登弱冠受業春秋家不敢問三傳森然出凡例論議仍貫穿耻随䡖薄兒増年竊郷薦小試儒黌中徃往魁衆彦稍休輒臨池㳺戯弄毫翰寫成道徳經有鵝不肯換昔予始西来故國多文獻斑斑南山豹窺管時一見蹉跎垂四紀囬首皆夢幻朋儕諸俊賢存殁亦相半殁者歸山丘存者風雨散惟餘貞居翁共喫殘年飯識子座席間短小甚精悍結為文字交忘年破崖岸我方守一官身貴事則賤操觚待需求矻矻窮夜旦枯膓縦可捜安取五千卷強顔作俚語對客常媿汗况復不善書辛苦愁脫腕誰為助我者幸子筆力徤烏絲纒凍綴増絢爛青春二月時江花滿呉甸遥遥望重闈歸馬忽如失吾左右手坐覺心曲亂子来却何日執𬒮那忍判斯文千載下不絶猶一線小藝雖可名未足盡大觀朂㢤崇眀徳勿使歲年晏贈言非所能聊以示繾綣丙子七月十七日同輝公登𬗋微巖汪生元眀許生存仁来㑹遂宿鹿田眀日乃由山橋囬至芙蓉峯而别追念數十年間並㳺之士往者已不可作在者又莫之與同兩生頋能不惮其勤相從躡屩行風雨中誠一時清事也第未知後游為何日同㳺為何人撫事述情成二十韻邀兩生同賦奉呈審言子長吾年未及謝倦飛巳知還乃復嬰近務無由縦清歡幸與方外士相從巖壑間小憇遂深入詰曲披茅菅昔人有遺躅縹緲青雲端髙居匪結構異状如雕鐫志怪固無取懐賢邈難攀停䇿訪舊㳺欲去仍盤桓迅飈發中夜衆木號驚湍涼秋變袢暑山深氣先寒泉石無改色四時自推遷交朋半新故念之增慨然兩生亦可人環佩来珊珊携手恣幽歩流目窮遐觀時於林缺䖏遥見城南山行行度危磴悠悠睇層巔凝隂閟朝采玄澤釃神淵嘉穟日巳豐藹焉滿中田覧物多所欣賞心殊未䦨後期孰與同良㑹當何年丁亥春二月起自休致入直翰林夏四月抵亰師六月赴上亰述懐夙予抱微尚漫仕遂浮沈决去不復疑甘以投華簮春天動使星空谷發跫音倉忙遣就道載筆歸詞林弱質幸未朽茂恩一何深義當不俟駕事乃違𥘉心揖與親友别長眺故山岑臨觴不能御朗詠巖中吟揚帆越江淮河水来活活吕梁扼其衝石芒殊峭㧞泝河柁忽摧度洪䌫遽絶前途緫安流風勁桅復折兼旬渉險艱脫命毫髮行行薄畿甸值此正陽月皇輿方北狩前旌曉巳發疾驅望清塵我馬不及秣出關度峻阪下視原野闊磵谿多縈廻岡嶺互盈缺舊游如夢寐古道無改轍經時春草變乆旱夏雲熱逺行識苦􅉝儻免蒙霜雪信宿憇虚舘平眀玉堂開微風散靈雨階戺無纎埃良㑹秩𥘉筵芳醪湛罇罍内官出黄封飛鞚天際来承平故多事鄙劣慙非才抃躍向宸廷慶雲欝崔嵬乞身懼再瀆戀闕空徘徊日出旦氣清齋祓趨行宫周阹夹馳道大帳垂穹窿鳴鞘下霄漢别殿臨薫風攝衣升玉除穆穆瞻睟容謁拜未及已廽光赫重瞳詔使侍經幄通籍丹禁中斯榮非所希千載庻一逢怵惕乆復前旅進陪羣公願因奉清燕慷慨輸微忠衰遲力不逮勞心但忡忡圓象無停運日馭轉西陸涼野多歸人翩翩共馳逐念昔居閑曺未老先納禄蒙恩列外監放浪湖一曲薄田皆舊畬敝廬非新卜白首重見招英逰並華轂寒松雖後凋幽蘭豈再馥宣尼譏患失伯陽貴止足時暮復何言終期返初服仙華方先生析蕳齋杏花消息雨聲中之句為韻賦山中社雨七章和者四人先生於第四章見及頋未能屬和今五十餘年諸老皆巳下地先生門人在者惟朱仙仲山年八十矣偶逢春社興懐存殁追次前韻以抒鄙情貞居逺人寰屋老四山静一翁屹靈光二季亦秀整曉聞楓林鼔雨過鄰墻杏翛然發孤詠語盡意方永昔年慟哭地古劒生銅花凄其懐故交中情亂如麻念彼盛壯時緩轡揚䡖檛吁嗟長星墜無復出漢巴淮隂權竒士髀肉老始消長眉巳雪色頩顔尚紅潮朋游三數公於焉共逍遥平生經濟䇿忘言付詩瓢卓哉全歸子離塵返冥極却觀人世間千載猶一息贈言在吾耳風規良可則欲叩封禪書探嚢竟無得憶别青喦翁歸進江上艣書札未相忘歲月遽如許山長春樹深地闊雲濤阻詩筒杳不来令雨非舊雨仙華㡬千仞峻絶臨𬗋清天壇瑶草合石穴隂風生踆踆杖屨末眷眷丘壑情幸有一夔足雅歌續遺聲前脩遂不作良友孰我同兀坐守章句獨學無全功徒操五色筆随人畫虚空悠悠感存殁惆悵百年中七言古詩題陵陽牟公𬗋陽方公詩卷兩翁風流掃地無文章光𦦨埋丘墟紛紛小兒政疾走安用佩玉飛長𥚑憶昔登堂三十載夢想時復瞻眉鬚昆蟲閉關水返壑孰使驪龍遺頷珠願言保此勿䡖出幸免兒軰相睢盱題大瀛海道院丹山之山青崔嵬隠居舊隠山之隈千年土鼎爲誰出深崖古像松聲哀鴻飛上天瓜在雪過者莫睨君能来想當月斧乍揮霍奔走屬役皆仙才卷蔵瀛海歸一粟頋盻瞬息生風雷森然幻有啓神界白日照耀金銀臺昔聞使者兹入海樓船煙霧何時廻君其置此勿復念少須碧水揚黄埃九重蠖濩陛下聖方士未易誇蓬莱琳宫貝闕長望幸天髙海闊心悠哉陽山昱上人訪予吴門寓舎求爲湘竹詩予辤以未見竹上人不逺六十里自山中舁其竹而来好事有如此者欣然爲賦長句道人来自陽山麓手携舊種千竿竹小裁方斛不盈咫中有瀟湘江一曲未信天工能爾竒不知地脉從誰縮睛䆫翛翛散煙霧眼底森然立羣玉豈期我乃累此君蒙犯風埃走塵俗故山方逺重愁絶新句未成慙迫促黄岡之産大中椽政用才羙刳其腹願言保此終天年歲暮山中伴幽獨杭州送兒姪歸里空江月滿潮聲怒二男勇踏潮頭去故園天末渺予懐夢中識汝歸時路起向江樓遥望汝江上青楓正霜露涼風颯颯吹汝急櫓揺背指龍山渡翩然一葉舞中流嗟汝童心得無懼自我西逰歴三紀舉目交朋半新故下車相揖何紛紛白頭朝士猶徒歩玄都觀裏舊桃花見我重来能㡬度緬思疇昔仍念汝倚徙䦨干日將暮前潮将㫁後潮續層波複浪無重數魚龍出没相後先疾雷槌山雨如注隔岸峯巒空復多沙際冥茫但煙霧計程知汝巳登陸息肩弛檐今何䖏眀朝過我三釡山能勿徘徊起哀慕近聞旱魃肆為虐殺吾手植千株樹且須為我語比鄰莫遣牛羊上丘墓次韻蔣啇卿常博述懐齋廬清切嚴扄鎻飛佩胡然能過我䄂中平生五色筆掞翠摛紅無不可我方折腰向小児洗研何由䖏公在九重垂拱四海晏甘泉日夕無烽火太平有象須黼黻文章重任公冝荷陋儒未足張吾軍強識之無豈云頗漂零海角晚相遇如風落山收碩果迷途儻有為指南研足脩程吾敢惰頋慙向来遮日手政爾長江事篙柂玉堂幸喚秃髮翁文塜吾甘翳蓬顆題醉郷圗翰林主人天上来布帆不為鱸魚開江湖渺渺秋一色朝光暮色相徘徊昔賢心賞餘勝䖏秪有水竹無亭臺碑材乆巳没荆棘屐齒不復留莓苔後来視今猶視昔今我不樂胡為哉太官馬湩逺莫致鄰翁緑蟻浮新醅欣然一飲便終夕鼻端氣息如雲雷是間别有一天地不知何䖏為蓬莱廻觀方内海一粟醯雞塵甕何喧豗黄冠秘監太狂態騎鯨供奉非仙才揮毫政要真學士鋒車流水行相催瑶池曲宴多雨露歸歟酌彼黄金罍題張清夫心逺堂吾聞古来賢逹士不擇山林與朝市百年塵甕兩醯雞鵬鷃逍逍俱可爾夫君平生瀟洒意俯睨軒裳猶弊屣翩然一舸鱸魚郷歸来不待秋風起忘言兀兀坐終日天地古今齊一指但見山髙湖水深青螺蕩漾銀杯裏柴桑之人去我乆風味何妨略相似神交冥冥雲海長目送歸鴻渺千里贈談星者山人乆客湖海間水風瀟瀟月滿船相逢問我所生年忽然䄂出天星盤須臾落筆開雲煙坐令衆星紛蟻旋窮通變化生毫端命乃在子非由天一朝别我還故山索我贈詩如索錢我懶讀書醉欲眠子母迫我姑留連人生良㑹古所難囬首日月䨇跳九題松溪圗獨騎瘦馬走赤日忽對畫圗心眼眀想見髙人茅屋底石床卧聴松風聲秋空漸髙霜露白松根茯苓巳堪食欎紆遲暮秪自憐卷圗還客三歎息題錢舜舉畫鳥雀鷹鸇皆羽族強之食乃弱之肉兩雀亦分弱與強一遭搏噬一髙翔畫師描貌勞意匠詩人見畫齊惆悵人間萬事無不然雞蟲得失安足言題何能之畫何君家住西天目平生愛畫尤愛竹時時冩作風露枝下與人間掃塵俗湖州古稱蘇與文趙公後出今絶倫朝来見詩猶見畫品題已盡将何言山空歲寒路脩阻歸歟且共墨君語屋梁月落清夜䦨坐聴東溪響如雨鄱陽周節士歌周君生長鄱君里長身俣俣鬚仍羙師張先生業孔氏夏螢冬雪頻繼晷先生愛君不骫骳君謂先生我知巳遭時戰伐多瘡痏賊衆乗之作姦軌郡檄先生俾一洗先生慷慨為之起曰彼蚩蚩聚蜂蟻兇渠本我家奴爾我将笞之用折箠披其角毛脫距觜奴狭兵来速如鬼反噬其主先生死先生諸子皆㓜稚周君聞之失箸七曰古復讎盖有禮師長之讎視兄弟我今必也書于士走吿郡府伏以俟府公義之弗敢止授以殳斨與弧矢或云彼衆我無㡬盍募援兵為表裏君奮不頋行益駛賈勇直前無與比賊窮擲金計何詭得金失賊墮其餌亟取貪夫尸諸市士氣復振賊乃靡追奔逐北劘賊壘迅雷不及掩其耳一柵既覆衆柵毀生致賊奴洎妻子刌其心肺獻爼几告于先生辭亹亹凱旋公庭旗旖旎散遣部伍歸耘耔天戈耀日方南指郡将效死弗拜跪周君堂堂衆所恃人咸謂古今可仕細書降表僅尺𥿄大㦯公侯小刺史君言我本不獲巳出為吾師刷讎耻罪人已得賊巳弭東村西落無荆𣏌不義冨貴寕飲水公毋多談且休矣閉門髙卧肉生髀白駒空谷餘四紀殁葬金潭有廟祀郷人歲時擊羊豕子暾来與胄子齒踵門泣涕言如此嗟君壮節甚竒偉播兹歌詩侑哀誄題李氏白石山房名山秀出鄱江曲上有立石如立玉尚書履聲忽已逺隠者新居在盤谷花開鳥鳴春晝永白雲重重養喬木夫君亦復稱其家有書能蔵且能讀露鈔雪纂乆愈冨何啻鄴侯三萬軸山靈翕霍謹呵護夜半虹光發深屋引泉天井助芳潤大勝俁儂飲山渌我欲從之不可到細字長書俄滿軸毫分縷析極根柢大義森然見條目鄙人愧莫知所對叩請安得留更僕頗聞石洞閟遺音龍門餘韻須君續臨風傾詠寄綢繆衰朽終期挹膏馥題環翠樓冨州東望山如積山人作樓髙百尺八䆫面面向山開四顧蒼然惟一色樓中幸有書可讀樓外有山繚而曲安得元和博士公為君舉酒歌盤谷次韻題廬陵觧君行卷兒童聚戯如聚沙忽逢至寳争指瑕觧君所以自衒平生不識䖏士牙賢郎亦復事舒闊吐辭歴落正不葩前年上殿見天子衣䄂冉冉猶煙霞薾然退居弟子列馴行醇謹仍可嘉芝蘭玉樹爾為爾吾糓吾粟吾桑麻君今白首官尚冷山苗澗松衆所嗟生兒頭角有如此肯終坐井同群蛙我方僶俛徇微禄席猶未暖已及瓜安得從君共傾倒春燈夜酌歌簷花題周鍊師雲崖圗我本山中牧羊客偶然失脚紅塵陌矯首丹崖不可攀但見層空暮雲碧樓居仙人元不死天長地乆無消息騎麟翳鳯者為誰道上相逢不相識披圗示我舊游䖏流水桃花尚春色為言白石乆已爛茯苓無復成琥珀忽然長揖不肯住飄若流星去無迹若為握手賦歸来永與人間風雨隔贈熊天瑞先軰熊君南州山澤臞弊衣不滿六尺軀年登七十氣尚麤撥棄舟楫違江湖塵埃掠面氷生鬚北走梁宋至皇都舉頭仰瞻天子居姓名無由逹公車何王之門無長𥚑君惟抱瑟王好竽寒風蕭蕭雪塞廬退從諸生詠唐虞詩成篝燈手自書字如凍蠅宻復踈食可無肉出無驢為我蹝履来于于曰予其歸無所須一言用比眀月珠我方守官橛株拘嗒然忘言㩀槁梧童子穣穰環座隅咲我腹笥太空虚感君逺来増歎吁愛莫助之将何如翰林主人掲大夫與君少若同隊魚巖棲穴䖏多其徒君歸而求冝有餘長歌鼔缶聲嗚嗚青天自髙雲自孤贈夏德頌夏君懐抱何磊落卜居不肯依城郭丙舎新開近墓田雪栢霜松翳丘壑一朝興来不可遏萬里黄塵走亰洛叩門遺我尺素書儷玉駢珠相照灼為言家世本臞儒餘力惟知事耕鑿窮年甘與鹿豕逰敢希鴻鵠翔寥廓秪今逺来亦有意求詩元不求官爵華星秋月幸分輝特向山家慰蕭索我聞君言重太息感君望我殊不薄清時雜遝冨才彦笞鳯鞭鸞趨舘閣揮毫成風墨成雨瑞錦披張紛製作一言引重力千鈞青雲驥尾端堪託頋我方為句讀師掇拾殘編味糟粕㘴隅童子日呶呶平生雅意渾銷鑠奚暇清吟發天巧剪紅刻翠供嘲謔君歸卉木尚餘春况值新篂初觧籜傳家有書故可讀有石可眠泉可酌大勝山人来索價低頭欲就微官縛我雖齷齪坐無氊有客如此良不惡戯拈葦管和竈煤為君聊賦山中樂送李憲使赴燕南分題得烏飛曲臺中樹枝上烏無數當年元只為公来今日從公却飛去趙北際燕南垂道旁緑樹多好枝公之所憇烏所依公母亟行烏勿飛問公此去何時歸上林春深樹如織公歸但聴烏消息風樹吟為李生作返照入深林牛羊在丘隴風次白楊樹葉葉各自動如何當此時孤子萬里歸有琴未成聲遽欲絃吾詩吾懶言詩子姑去抱琴聴子風中樹金華黄先生文集卷第四
