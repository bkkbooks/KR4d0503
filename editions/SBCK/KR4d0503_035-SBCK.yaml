body:
  text: 臨川危素編次番易劉耳校正墓誌銘延福太監張公墓誌銘故延福太監張公世業儒而兼善乎道家之言洞逹乎死生之變其無恙時甞自製棺槨題曰繭隱欲效陶元亮自為挽詩杜牧之自作墓誌而弗果公既殁且葬平生􅀁與交皆一時名人其家不敢屬以銘者懼非公􅀄意也後二十四年公之子世華以為不可使公終泯泯而無聞乃奉狀以銘来謁按狀公諱觀字觀道其先家扵淮南宋渡江之􅀄六世祖思道由通州航海抵平江之福山港入居扵横涇遂占籍今之常熟州髙祖彦竒晦迹不耀曽祖朝請郎仲有子九人俱能自植立祖迪功郎孝徳家始大父太學内舎生士元再領監舉未第而國除乃隱不仕母金氏至元丙子又自常熟徙居杭州時公甫五􅀊父母鍾愛甚至延名師教之公天資明銳加以勤敏師逸而功倍既長工為攵􅀹長扵歌詩不肯蹈襲陳言㳺戯翰墨得古人筆意善鼓琴甞親斵琴數十張咸臻其妙性好古而習於世務扵吏事譯語無􅀁不通父母殁事􅁇母如􅀁生綜理家政公私應酬各適其宜貲既曰豊兄弟子姪之貧乏者周之女子不能婚嫁者資之死無以治䘮者給之平居薄滋味戒家人無故勿殺能飲酒而惡沉酗四方賔客之至無虚曰樽罍之設備禮而已大徳乙巳出㳺亰師用薦者入宿衛扵中宫扈􅀙徃来两都靡憚其勞至大戊申中政院奏授承徳郎同知江浙財賦都緫管府事巳酉秋八月就職僅及再朞倦扵繁􅇵移疾辭退延祐乙卯太常禮儀使司徒田公強起之奏除夲院判官不就丁巳宣政院奏為㫁事官命下陞其階奉訓大夫不容復辭戊午入朝集賢大學士陳公引見􅀍旨特授延福太監陞其階太中大夫公深以滿盈為戒乞免進秩執政嘉其廉讓奏􅁢􅀁請俾仍舊階在官垂及三載中政院復奏除内正卿不拜即日扁舟南歸其别業在常熟遇春和景明秋髙氣清與名人勝士徜徉田野間或小憇緇廬焚香看􅀞啜茶賦詩􅀂與世相忘公扵醫藥卜筮風鑒地形皆研䆒其術惟修煉服餌長生乆視之法􅄝􅀂飢渇湖海羽流競進􅀁長得璇璣混合之道每夕露香飛神朝謁彌乆益䖍雷霆諸階秘文隱書悉造玄要嘯命風雲立應如響先是甞􅀉籍三茅山之元符萬寧宫泰㝎甲子上清宗壇四十五代宗師劉公欲舉以自代累致書趣之還山公方厭人間事為佚老計辭不赴丙寅春析田業付諸子丁􅆗秋示㣲疾遺命井井有條戊辰七月二十八日􅀺明終扵某郷祖塋之西菴其年十一月某日葬富陽縣春明村石門天柱山父母墓次遵治命也公自號湖山有湖山小藁二卷横溪唱和集三卷皆刻梓以傳元配閻氏集軍節度使某之女前公十七年卒無子􅁇室陸氏公子男七人世華陸氏出也女六人孫男十人女六人嗟夫市朝之人入而不出山林之士徃而不返之二者皆過也而况賢愚貴賤同寓形扵宇内能無慿生怛化者幾何人哉公於進退存亡之際皆可以無憾是冝銘也巳銘曰柱下之史􅃮園之吏盖不必於不仕而不都于顯位卓哉張公智圎行方􅅮扶揺而直上依日月之未光人方瞻其羽儀歘逺翥而髙翔公之自處不老不莊曰予之先有􅀙㳺赤松之子房委蛻兹丘其封􅀂堂欲知其人眡此石章中大夫延平路緫管韓公墓誌銘公諱國賔字君玉姓韓氏世居蔡之信陽其先以材武仕宋曽祖諱斌忠訓郎祖諱伯榮以武功大夫緫軍襄樊考諱興祖覩國歩日蹙暦數有歸遂隱不仕公身長七尺羙須髯多藝能尢善􅀐射不屑為文字之學而善談論古今事至元十一年丞相伯顔平章政事阿术奉詔南伐師次鄂州都綂制程公鵬飛舉本軍来歸公以将家子􅈻其麾下戰數有功十三年署管軍緫把尋以兵屬黄招討世䧺先是大軍度梅嶺下廣東十四城公皆預在行未幾閩軍耒逼廣州公􅀙世䧺守梅嶺戰屢捷􅀗其隊長遂攻破南䧺韶州率舟師次清逺峡㫁浮梁以遏其衝旣平廣州而兵復起公與之戰扵烏泥沙灣木綿三山屢捷進略循州降其守􅀅十四年還駐隆興世䧺􅀙叅知政事也的迷失􅀵興國蘄黄公以偏師出戰生擒三人軍次黄州公去城十五里而舎兵始交公直前嬰其鋒流矢貫右臂裹創力戰黄黄州平十五年􅀙世䧺入覲賜銀符眞除忠顯校尉管軍緫把仍賜金織文衣以旌其功十六年程公為行省叅知政事公􅀙之討五谿諸蠻馳傳入奏􅁁事還領諸翼㧞突軍四百五十人夜焚息林砦遷索羅砦之民使去巖險而無􅀁慿特進諭桐木砦其砦主􅀒两銅鼓来降朝廷方議旌擢㑹靖州犵狑犵獠􅁑蠻肆其猖獗有旨命程公徃討尋復止之俾擇人諭之使降公請行諸峒果皆嚮化遂罷遣諸軍命程公以平章政事行中書省事調公􅁠岳之臨湘縣公旣視事務農重􅂖興舉學校廬館舟梁葺治以時二十四年遷忠翊校尉處之麗水縣尹鄰邑青田有嘯聚搆亂者郡將署公為都鎮撫緫麗水青田縉雲龍泉松陽五縣民義捕治之公立部伍㩀要害遣别􅀐前進追奔五十里而以􅀁部兵繼之手射二十一人其九人皆斃生擒十三人斬首伍伯級餘衆聚于沙谿公手􅅞其二人以獻遂直徃擣之􅀗其首亂者六人諭其民叁阡伍伯户使皆復業未幾台州妖民反以婺之東陽玉山為巢穴旣就擒伏誅羣盗相挻而起者猶未盡殄處與婺為鄰郡縉雲􅀹􅀍其害公以民義㑹官軍逐捕之手刃五人射五人皆斃斬首一百級又與其黨遇於西巖追斬三十餘人姦􅁤肅清而政平訟理見稱㢘能大徳二年陞武畧將軍知台之黄巖州自州抵郡城運河皆瀕海通潮汐故有牐以時其蓄洩􅀊乆不治公下車㑹大霖雨水閼不行乃命考其故道為牐十有四凡三年而訖功民以為便同知州事朱公叔麒故宋朝士也為立石紀其績人至今傳誦之環州署皆河水堙塞巳乆遂多火灾公命䟽浚之豪右多不樂公弗頋渠成而火害息凡平􅁈獄者三􅀁活數十人公在麗水十年黄巖七年􅀁至咸有去思形於歌謡部使者舉治行為諸州縣最至大七年除懐逺大將軍漳州路緫管延祐亢年遷㝎逺大將軍南劒路緫管南劒改延平換中大夫為延平路緫管年老去官卧病山隂谿上以信陽之滸泉自號示不忘郷土也七年冬十一月二十有七日卒於安寜里之私第享年六十有七以某年某月某日葬某郷某原元配汪氏先三十八年卒􅁇室沈氏後九年卒劉氏丁氏又􅁇之子男三人長衆家奴汪氏出早卒次人傑沈氏出用公􅄻為􅀙仕郎两淛都轉運鹽使司􅀟穗塲鹽司丞次玄劉氏出亦卒女七人長未笄而卒次適知黄巖州劉􅀳亨次適王怡之次適同知東平緫管府事王雲次適海運千户王振鵬次適黄榮祖次適天台縣尹秦徹徹篤孫男二人夢生留生孫女五人公殁三十年其家始奉孫壻江淛行中書省􅁺甘立之狀来謁銘盖甞歴觀前史􅀁記為循吏者非必其有戰伐之勞為良將者非必有撫字之責公獨􅀒其脩能惟上􅀁使孔子􅀁謂君子不器者公殆其人乎是可銘也銘曰天之降材各有其施惟材之多無適不冝公生將家逢時思􅁬􅀍堅執銳出􅂂行陣皇靈􅀁加四方攸同乃授以政疇其民庸拾級而升克有位序由公之材兩有文武公起列校再剖郡符冝有成績登于􅁽書作為銘章姑􅇱闕逸惟石可泐公名不殁眀威將軍管軍上千户􅀁逹魯花赤遜都臺公墓誌銘公諱脫帖穆耳字可與系出蒙古遜都臺氏其先有事太祖皇帝為開國元勲者曰赤老温名在國史公髙祖也曽祖納圗児御位下必闍赤繼領衛兵取遼破金屢䇿携功後攻西夏而殁於王事祖察刺􅀙上親征西域以功為業里城子逹魯花赤又從太宗皇帝於潜邸經略中原立功􅀹多太宗即位錫金符改授隨州軍民逹魯花赤父忽訥襲前軄以隨州􅀌絶涖治南陽府之昆陽愛鄰境郟縣風土淳羙因家焉至元十三年世祖皇帝命相臣緫兵伐宋公以管軍萬户實預在行渡江後加金虎符為湖廣等處行樞宻院判官南土旣平兵寢不用累持憲節終於江西湖東道肅政㢘訪使以長子式列烏臺貴贈江東建康道肅政㢘訪使又以公貴贈通議大夫僉樞宻院事上輕車都尉追封陳留郡侯謚景桓母􅀶羅真封汝寧郡太夫人公以勲舊家子蚤備宿衛大徳十年用臺臣薦佩金符為武徳將軍蘄縣萬户府東平等處管軍上千户􅀁逹魯花赤延祐二年遷宣武將軍泰㝎三年轉明威將軍分城坐鎮自明而越前後三十餘年以老致其事公性至孝陳留府君之為湖南憲長有徳於民其殁也相與繪像而祠焉公不逺數千里求遺像以歸事之如生存搢紳先生皆以詩文羙之公於人有善稱歎不容口有不善則為之不懌終日至㦸手怒罵之其善善惡惡亦天性然也宋南渡􅀄越人蔡㝎父年七十餘以事繫獄法當贖而吏持不可請以身代又不報乃自沉於府河以死郡守為出其父且給槥以葬嗣為郡者立廟卧龍山之麓請勑額號愍孝􅀊乆廟廢而居民侵其地官不之省公攝萬户府事慨然曰孝子不祀人奚以勸㑹使者行部亟以為言使者頋謂守令曰承宣風厲郡縣責也􅀂等寧無恧乎即日使歸其侵地廟以復完國朝取宋之兵至天台民婦王氏為軍士􅀁得自誓不辱至剡之清風嶺齧指出血題詩石上投崖而死公移文有同為立廟迄今不廢剡有隱士吴君與公友善甞謂吾死得附葬於二戴無憾矣逮其旣卒貧不能䘮公輟俸貲倡郷人葬于書院之側其好義又如此公為人㢘介質直不喜紛華講閱之暇日與賢士大夫㳺清言雅論亹亹不倦懸車之後養髙城南闢齋閤懸弓劒著壁間聚古今圖書布列左右延名師教其子每遇風日清羙輙緩轡郊外徜徉竟日或幅巾藜杖命家童抱琴自隨散歩閭巷間稚耋迎􅀏扶擁而娭亦不拒也禮部侍郎泰不花出守越作新學校行郷飲酒禮迎致公居僎輔公升降拜起不愆于儀人皆望而敬之公生於至元二年正月三日卒於至正四年十二月二十八日享年八十有四夫人哈魯氏封陳留郡君髙氏朱氏俱范陽郡君子男五人長大都以武徳將軍襲職東平等處上千户􅀁逹魯花赤次哈刺未仕次月魯不花元綂元年進士累遷承事郎南陽府穰縣逹魯花赤兼本縣諸軍奥魯勸農事次篤列圗至正五年進士授將仕郎衡州路衡陽縣丞次完澤不花方治舉子業女四人長適宣武將軍莘縣翼上千户齊伯顔察児次適朶児伯䚟次蚤卒次適國子學生忽都逹爾孫男七人諸􅀌遵治命奉柩歸郟縣卜以至正六年某月某日葬先塋之次示不忘本也以溍於公父子間有一日之雅奉郷貢進士趙俶􅀁為狀來徴銘溍􅀼惟自昔帝王之興必有命丗之材為之股肱心膂披攘經營光啓鴻業功在社禝澤在生民故天之報施也徃徃使後人保其禄位以承太平君子無為之治其徳厚者其流光豈不然哉而况公以陳留府君為之父武徳及穰縣衡陽為之子公居其間優㳺自適享有上壽其存其殁皆可無憾頋溍之鄙陋衰朽無以賛揚萬一庸悉取狀􅀁述為之序而銘之銘曰國家之興必有世臣由本而支彌乆益振時方承平􅂷衣當宁息馬投戈以文易武靖共爾位弗震弗驚禮義干櫓舒舒扞城賔客在前圗書左右載懸吾車長歌擊缶我弓我治世適是承爾仲爾季人遺一經發藻儒林踵武相接趍而過庭珪重組疊生榮死哀雖殁不亡式克有譽為前人光瞻言故丘返柩而祔念兹厥􅀄祁連之墓武略將軍海道漕運副萬户曹公墓誌銘曹氏之先出於宋名將冀國武恵王彬南渡時由汴徙吴今居平江常熟州之禄莊里者號福山曹氏最為望宗聚族二百餘人仕國朝多顯者而公之曽大父昌大父通俱晦迹弗耀父文富始以公故贈武徳將軍平江等處海運千户驍􅀐尉追封長洲縣子母王氏追封長洲縣君公諱某天資剛直動必由禮事親善色養以孝謹稱服用尚儉素戒子孫以為法治家井井有條積而能散私帑不蓄羡財聞人有善喜形於色不啻出於已里中俊秀貧不能就學者必周給之不喜暴人之惡有小過必委曲化導使知自悔郷人有不能制其儇子者公呼之來前喻以人心天理其子感悟卒為善人公每謂人生於世但當設心坦夷仰不愧俯不怍足矣奚必泥古人之陳迹事事求合乎識者以為名言秊踰弱冠猶未有䆠逹之意㑹朝廷創開海道以通漕運首以材選而服勞其事大徳四年制授金符敦武校尉海道運糧千户秩滿授元降金符遷嘉㝎等處海運副千户公律己以㢘處事有法􅀁部之人咸畏而愛之甞開洋而遇風濤大作舟人震駭公神色自􅀂徐喻之曰委質為臣當心身而徇國進思盡忠天必佑之衆莫不服其量大府或以事咨詢於衆多俟公言而後定至大三年超授金符武略將軍海道漕運都萬户府副萬户公數以漕事徃來南北而深察其利害視事伊始凡􅀁興除公私咸以為便四年夏部海艘八百􅀁漕米以石計者百七十四萬八千六百四十有九晝旗宵折號令肅然舳艫相銜首尾不絶旬日之間已逹海口舊傳海道有神司之人恃以無恐公蠲㓗致禱感應如響有相之道焉玉音㢡諭宴勞錫予視常􅀊有加人以為榮而公雅志恬退旣受代即屏居丘園優㳺自適幾􅀂與世相忘同列有惜其去者言於當路乞挽留之至治二年有旨起公為平江等處海運香糯􅀁千户三年夏督運至亰師賞賚􅀹渥廷議復用公為萬户未命而公􅃍以疾卒泰㝎元年四月某日也享年六十以其年某月某日葬于福山塘之西丘公垂屬纊命割上􅃾之田一百九十有八畒築精舎擇方外之人主之俾以􅀊入供晨香夕燈汛掃百須之費頋語諸子曰吾不以身後事累汝也夫人蘇氏封長州縣君以禮自持克配君子甞發私笈造輿梁以濟行者成公之志也子男八人長文華將仕佐郎平江路崑山州稅課大使贈奉訓大夫徽州路婺源州知州飛􅀐尉追封吴縣男次思聦將仕佐郎两浙都轉運􅐭使司永嘉塲塩司丞次思温徴事郎温州路稅課提領次思㳟不仕次思賢將仕佐郎平江路長洲縣尉次思忠次文英次思問皆未仕女四人孫男二十人文華長子珪襲公職佩金符爲忠翊校尉平江等處海運香糯􅀁副千户次也仙由里哈温必闍赤累仙􅀙仕郎宣政院崇教􅀁知事餘皆未仕曽孫男三十人􅀄武徳府君早世王夫人躬靡他之誓教育其三子訖有成立長郎公次良玉承務郎兾寧等處稻田同提舉無子公命以思賢爲之後次濟滿􅀙仕郎常州路宜興州判官贈集賢脩撰承直郎公殁二十有六年而珪来亰師以銘爲請盖公先三世皆厚施而不食其報故公遭逢聖代克承天寵乆欎必發乃理之常雖􅀁用未䆒而諸子嗣有名位適孫遂世其官餘慶􅀁及未其止推本積累之自而昭示于後人􅀁以使之引而勿替也銘其可無作乎銘曰海於兩間爲物最鉅孰能以力與爲勝􅀒有偉曹公孔敏且武出長萬夫訓齊行伍風檣浪檝若鵬斯舉精忱􅀁格百靈呵扈天吴冈象莫敢予侮千艘並集灌輸天府克有成續徹聞當中傳宣宴勞秩秩樽爼筐篚之將便蕃錫予公不自矜翩其逺翥鋒車召還不留不處爲官擇人諉以印組上方用公還領故部公忽巳仙返于帝􅀁有子承考咸躋官簿惟時聞孫大纂遺諸􅀙事賢勞無忝爾祖如漢世官氏以倉􅁃福山之西匪堂伊斧史官勒銘垂輝千古亞中大夫同知湖州路緫管府事張公墓誌銘公諱光祖字載熈姓張氏􅀳寧路霍州霍邑縣人其先金之䆠族髙祖諱桂管軍萬户曽祖諱儀管軍千户祖諱元義金亡隱居弗仕父諱衍入皇朝任朝列大夫同知福建等處都轉運鹽使司事贈朝散大夫同知􅀳寧路緫管府事􅀐追尉追封清河郡伯母劉氏追封清河郡君金氏封清河郡太君公金夫人􅀁生㓜聦恵稍長刻志於學而扵文法吏事無􅀁不知用父􅄻􅀘將仕郎提領建徳在城稅務幸法遵職綽著能聲遷登仕郎主紹興之上虞縣簿上虞素號難治公以介㓗自持而馭姦胥悍卒以嚴上官甚敬異之除兩浙都運鹽使司清泉塲監運循資轉􅀙仕郎調京畿慶豊倉使用例陞承直郎運舟多覆溺之虞亰倉有折閱之患人皆避不肯為其為之者亦鮮能逭於吏議公材諝甚優而謀慮􅀹深逺處之􅁉如更以此受知當路而見識㧞佩金符為松江嘉定等處海運千户陟階奉議大夫在官五年渉鉅海至京師者四􅀁轉漕米以石計者緫􅀂干萬竣事皆有宴犒錫賚寵數殊渥上甞命公凾香祀天妃于成山公不憚險逺躬詣其處禮成而退祥飈泠然拜朝散大夫杭州路海寧州知州兼勸農事知渠堰事公撫民有恩政不苛嬈而善發擿姦㐲人不能欺有寡婦訴其夫為人􅀁殺罪人旣得而莫知其屍􅀁在公齋戒禱于神而得之官河水中時方莫春經旬猶不至腐敗人以為公精誠􅀁感盖公之䆒心於獄訟􅀋如此即其一事餘可推而知也涖治未幾官府日益無事乃大興學校以淑多士三皇有廟而無田以􅀕則輟俸貲倡衆為置田􅀂干畒部使者舉公六事俱􅇱政績最於諸州擢同知湖州路緫管府事進五官為亞中大夫未上俄感末疾閱數日疾稍間語諸子曰吾去家數千里而䆠㳺於大江之南屢欲展省先世丘隴竟不可得吾百􅀊後汝曹宜即吾僑居之􅀁為卜地以葬庻他日便於􅀕享也無何疾復作遂以至正六年閏十月三日終于平江之寓舎享年六十有二公娶程氏河東山西道都元帥授急戰之孫女前八年卒追封清河郡君繼狄氏平江路緫管致仕某之女封清河郡君子男六人長中用公恩授從仕郎建昌路南城縣丞次肅次㳟次毅皆程氏出次􅄎化次僧家奴女二人長適浙東道宣慰司都元帥府譯史董徳次早卒孫男一人女一人俱㓜公天性孝悌􅀹篤於教子金夫人年踰八袠身愈康強事無巨細皆禀命而行􅀄度之旦必擊鮮擣珎集僚友親朋稱觴為壽盡歡而止異母弟光嗣以鞏昌都緫帥府知事乞休致中書擬授承務郎奉元路同知寧州事未命而卒公哀悼不已視其子震如巳子焉中等遵治命以七年正月三日奉公曁程夫人之柩合葬于吴縣安寧郷萬安山之東而以書來徴銘始公督運清泉予亦備貟石堰休暇輙相過從以相勞苦已而予先受代去及公守海寧予適承乏儒司因得見公道間闊公少八􅀊予以早衰不俟引年預乞謝事而歸公方嚮用不謂􅃍先我而逰其何忍執筆而銘諸雖然不可無以抒吾哀而塞其􅀌之請也銘曰天之降材有萬不齊孰完於公無適不宜碎曹猥局視險􅀂夷從事獨賢退食委蛇晚専一城年未及衰恢恢㳺刃厥問四馳華途方啓遽止於斯公材則多卒不大施垂休委祉嗣人之貽承之匪易朂以銘詩雅州知州錢公墓誌銘公諱文煜字光逺姓錢氏吴越忠獻王之􅀂干世曰進由嘉興徙無錫又三世曰梓乃㝎居新安谿上其子曰宗起於公為髙祖曽祖諱成祖諱志寧父諱􅁉以質直好義􅁛國兵取常州元帥府授以官避不就晚受知于翰林學士承旨覃懐許公其卒也許公為表其墓而銘之母陸氏有子四人公其適長也㓜警悟不習為童児之戯稍長率諸弟佐其父以儉簿致充􅁉父殁分財均不以適庻為别治䘮能求賢有禮者相其事内盡其心而人不以為過於戚外盡其物而人不以為傷於侈送客數郡畢至皆歎息焉公為人精悍有膽略臨事無􅀁囬撓人有急難赴之恐後有餘粟樂以振人之窮貸則减其息糶則損其直病與藥寒與衣以為常􅀊饑則為粥濟餓者為糗餌給流移者其殍死者則出錢募人舁致屏處聚而瘞之平居渉獵書傳善論古今事當否成敗幾㣲曲折如指諸掌或有􅀁詢謀援引裁决言必中的與人語恒依於禮法族姻里黨有忿抑不能平則隨事直之無不厭服而去然不善自表襮恂恂卑讓未始以辭色加人故􅀹為人􅀁愛重公卿大臣咸知其材許公􅀄由中司位丞弼招之至輦下將署以右軄公曰􅀁不逺千里而來者為知已耳仕非吾本志也辭歸未幾許公卒欲用之力薦于朝以為承事郎知雅州雅州扵蜀為極邉而居西南夷之衝號為要地郡符殊不輕􅂌命下人以為榮而公訖辭不赴自是杜門謝􅀁還徃暇日則徜徉山水間優㳺以自適属疾僅一日即夷然而逝公生於宋咸淳八年正月三十日卒於今至元三年八月二十九日享年六十有六以四年十二月某日葬于其州開化郷軍帳山南塢之兊岡距先塋三百歩而近娶李氏先十有九年卒合葬焉子男七人長師顔克承其家者也次師曽蚤卒次師中温州路蒙古字學正次某田州路蒙古字學教授次師正次師義次師禮女三人婿曰吴旻曹大亨華宗亨孫男八人女五人曽孫男一人女一人公葬後三年是為至正元年師中以嘉興縣尹虞君志道之書来曰志道與公同里閈而公之女弟實歸于我知公為最深謹具其世出行事卒葬之􅀊月如石幸序而銘諸溍􅀼觀世􅀁謂砥行立名之士未甞不欲忘貴遺冨至誘以髙位重餌而不失其􅀁守者鮮矣公為善而不近名視尊官厚禄􅀂不足以動其意其賢於人哉雖㣲虞君之言銘固不可辭也銘曰錢故王族世有顯人後隱弗仕逮處士居公􅀄起家真二千石有而不居仍晦其迹泊焉以休匪佚吾私視我停蓄及􅀁設施積善在躬惟家之慶用之郷人是亦為政乗化而終不亡者在有豊其委其承詵詵五品之石􅀛趺螭首薦兹刻辭式示永乆汴梁稻田提舉周公墓誌銘湏􅁷以休致之餘承乏詞林周君伯􅄾適自七閩憲府召還擢居次對緣僚友之契以狀屬予銘其從父提舉公之墓􅁩不得辭按狀公諱應星字辰翁姓周氏上世由鄭徙廬陵又徙饒州鄱陽縣之板橋里仕宋以儒起家曽祖考諱􅀖采迪功郎祖考諱灼郷貢進士考諱墍宣教郎宣教公之弟諱垕入皇朝贈翰林待制奉議大夫驍􅀐尉追封鄱陽縣子公􅀁生父也至元十二年國兵南伐次饒州饒之守臣執節以死民無􅀁依翰林公挈家逾城而出以自保公甫七􅀊倉猝之際為邏兵􅀁得亟出懐中銀桮賂之旣以自免又能跡翰林公􅀁在匍匐就侍舉家畢焉稍長檏茂恬静不妄言􅀏屹如成人讀書務通大義工扵竿櫝而善心計宣教公夫婦殁於鋒鏑而無子公兄弟四人次居第二翰林公命爲之後公承其家而脩其祀事唯謹比弱冠翰林公年已七袠伯兄又多病家事皆身任之翰林公喜賔客好施與當江南新附之􅀄官府征歛繁雜公入奉嚴親不違其志出膺門户無失其節人稱爲能翰林公􅂢館未幾而伯兄亦卒公於䘮葬各盡其禮每謂人生出處自有㝎分兄弟皆父母遺體苟有能顯其親者何必出於巳乎服闕後二弟並㳺亰師公獨留綜家務凡十餘年使二弟無後頋而卒成其官業者公之力也由是公之孝友聞于一時延祐某年用徽政大臣薦授汴梁稻田提舉辭不赴公旣遺榮弗居日􅀙事乎生産作業家益以充自處甚約而宗族郷黨以困乏有請者必使滿其􅀁欲稱貸而不能償者一無􅀁問挾方技數術而來謁者無虚曰平居好治屋室園池樹橘數百株時與士友相羊其間因自號橘中居士閭里少年或恃氣以陵之忍不與較人望而知爲善人長者至正二年九月某日以疾卒于家享年七十有四卜以某年某月某日葬于都昌縣某郷之黄荆山公􅀄娶方氏繼江氏子男三人自誠伯強伯明女三人適張汝揖朱業黄文紀孫男孫男五人女二人公二弟仲曰應奎早􅇱宿衛終於饒州路緫管府治中季曰應極由東宫􅀃書歴翰林集賢两院待制丐外卒官同知池州路緫管府事累贈翰林直學士亞中大夫輕車都尉追封鄱陽郡侯伯􅄾其子也今爲亞中大夫崇文少監同檢校書籍事兼經筵叅賛官云銘曰衆正之路人􅀁同歸苟非其招吾行遅遅前人之遺其積孔有難進易退賈用弗售雨露􅀁濡花蕚聮輝尚慰予懐風木之悲有隕自天下賁幽室榮耀實多奚必我出惟示後人鑒觀于兹克恊乃心勿替引之松江嘉㝎等處海運千户楊君墓誌銘楊氏之先世有􅂋人宋之盛時有自閩而越而吴居澉浦者累世以材武取貴仕入國朝仕益􅂋最號鉅族今以占籍為嘉興人君諱樞字伯機贈中憲大夫松江府知府上􅀐都尉追封弘農郡伯春之曽孫福建道安撫使贈懐逺大將軍池州路緫管輕車都尉追封弘農郡侯發之孫嘉議大夫杭州路緫管致仕梓之第二子母陸氏􅀁生母徐氏陸以封徐以贈並為弘農郡夫人徐夫人温之䆠家女生君甫數􅀊而殁陸夫人撫君不啻如巳出君㓜警敏長而喜學一不以他􅄝好接于心目刮摩豪習謹厚自將未甞有綺紈子弟態其處家雖米鹽細務皆有法㒒􅀠軰無敢以其年少而易之諸公貴人多稱其能大徳五年君年甫十九致用院俾以官本船浮海至西洋遇親王合賛􅀁遣使臣那懐等如京師遂載之以來那懐等朝貢事畢請仍以君護送西還丞相哈刺哈孫荅刺罕如其請奏授君忠􅂋校尉海運副千户佩金符與俱行以八年發亰師十一年乃至其登陸處曰忽魯模思云是􅃥也君徃來長風巨浪中歴五星霜凡舟檝糗糧物器之湏一出於君不以煩有司旣又用私錢市其土物白馬黒犬琥珀蒲萄酒蕃鹽之屬以進平章政事察那等引見宸慶殿而退方議旌擢以酬其勞而君以前在海上感瘴毒疾作而歸至大二年也閱七寒暑疾乃間尋丁陸夫人憂家食者二十載益練逹於世故絶圭角破崖岸因自號黙黙道人泰㝎四年始用薦者起家爲昭信校尉常熟江隂等處海運副千户居官以㢘介􅁛􅀍省檄給慶紹温台漕輓之直力剗宿蠧掊尅之弊絶無􅀁容天暦二年部運抵直沽倉適疾復作在告滿百日歸就醫于杭之私􅇬疾愈􅇵不可爲俄陞松江嘉㝎等處海運千户命下君巳卒至順二年八月十四日其卒之日也享年四十有九娶劉氏南渡名將大師鄜王光世之裔前四年卒贈嘉興縣君􅀄君有三子俱未齒而夭奉父命以弟之子元徳爲之子後乃有子曰元誠君卒時元誠生二年矣元徳卜以元統二年正月某日襄祔事于泊櫓山先塋東百歩與嘉興縣君兆合君􅀙父兄朝列大夫同知集慶路緫管府事清孫實誌其壙而墓道之石未有􅀁刻元徳以狀来謁銘乃序而銘之序􅀁不能悉者誌文可互見也君平生􅀁賦詩有遺藁蔵於家銘曰弗私于佚維時之逢弗疚于用維才之通有伉其門堂􅌟則崇其播其穫乃嗇不豊尚其嗣人勿替益隆􅅣石以竢表兹幽宮上都新軍管軍千户夾谷公墓誌銘公姓夾谷氏諱明安荅而别名思齊字齊卿其先當金之季年􅁬迹行陣靡有㝎居由大同徙南陽之郟縣又徙真㝎而占籍於趙州後復為郟縣人曽大父諱留乞受知太宗皇帝入覲于西京以萬户奉詔僉軍彰徳諸郡得八千人􅈻麾下數立戰功尋出戍隨州以隨州􅀌絶餽餫弗繼移駐郟縣剪荆􅁄立城堡規模粗具俄遷戍潁州出竒禦敵人頼以安􅀙攻安豊壽春無為親冐矢石一無􅀁憚世祖皇帝嗣登大寳召入扈􅀙賜壐書俾持以宣諭有能率衆来歸者當酬以爵禄欽承上旨輸忠效勤績用彌著用丞相史忠武王薦特降金符授盖州三頃合不哥民户逹魯花赤改知懿州換金虎符歴懿州平灤淄莱三路緫管終於淄莱積階昭勇大將軍大父諱唐兀以材自見於憲宗皇帝時􅀙攻鄂州還戍潁州逮世祖皇帝命將出師大舉南伐復預在行旣渡江取鄂又北􅀵司空山野人原天堂諸山寨計功行賞授武略將軍上都等路新軍萬户府管軍千户􅀙其萬户分鎮杭州卒扵官父諱秃滿以忠翊校尉襲管軍千户職􅃿贈武略將軍飛􅀐尉追封范陽縣男母胡氏鄭氏俱追封范陽縣君用覃恩也公鄭氏出㓜有異質姢秀慧朗可愛稍長習尚文雅雖在營壘間容止進退儼如承平閥閱子弟然倜儻尚氣不為崖岸與人無宿諾有過必面折不少貸有徳必報聞其急必勇赴之由是四方豪儁之士多樂與之交平居無事習韜略之書不敢輙廢或獵于近郊射則中禽則􅀗歸而祖割以奉甘旨克盡其歡父殁當嗣襲捧薦櫝京師公卿大臣竒其器識不以武人子遇之􅀍命以忠翊校尉為管軍千户覃恩進忠顯校尉公事主帥以㳟待同僚以和遇卒伍以嚴各適其宜閱武之際扵衆中獨羙風姿光采照人櫜鞬帕首馳驟捷出列校咸指目焉其治家内外截然無嘻嘻之失歸自京師生事稍落以勤儉率先家人樹藝畜牧貨殖皆井井有條致養於偏親惟􅀁須而具闔門食指數百無不充足闢故廬使極髙爽日與賔客徜徉其中愛其弟思齊􅀹篤同居三十年不忍使逺去弟有子巳成人乃處以錢唐西郷别業凡先世故物悉推與之公在官旣乆一日語諸子曰吾荷國家之寵靈保祖父之遺緒未能圖報萬一爾曹有以成吾志而佚吾老使得優㳺卒􅀊不亦可乎即日移文丐退主帥及同僚挽留不可則上其事于行中書省以聞于朝乃俾其長子瑛襲見職浙西部使者交章舉公季未及謝材幹膂力皆有過人宜别加陞擢公悉辭避焉居三􅀊以子早世傷悼不巳因致㣲疾即却藥弗御沐浴更衣而逝公生於至元丙戍九月二十五日卒於至正甲申十一月二日享年五十有九娶史氏忠武王之孫元氏縣尹某之女封范陽縣君子男四人長即瑛今為忠翊校尉管軍千户次􅄾用淄莱府君􅄻當得官未調次即珩先公一月卒次璋女三人長適永新州知州李公之子煥次許適管軍千户趙嗣宗次許適錦州知州王公之子某孫男二人尚㓜公大父之殯乆在郟縣而父母俱殁于杭將扶護而徃以昭穆序葬頋職守有嚴懼展省之弗時乃買地於錢唐之東馬塍遣子􅄾迎大父之䘮與父母同兆域以葬且築室為􅀊時饋祀之􅀁公卒之月二十有三日瑛等遂奉柩祔葬其右遵治命也􅀄范陽府君當四海合一之後田里人安邉鄙不聳得以暇日與先生長者㳺讀書手不釋卷公耳濡目染益自力扵學延師教子各専一經諸子欲稍出􅀁長以售於有司公止之曰爾曹甫向學􅃍與寒畯角其勝􅀒寧不自揆乎於是諸子愈自激勵文采彬彬士林稱焉公旣葬瑛等以狀来謁銘乃摭狀􅀁􅄒序而銘之曰天造草昧必資群䧺四方砥平士無伐功繄公之先生逢興運兩世一時懐材並􅁬再傳及公際兹文明分符列鎮坐嘯名城蹈詠泰和歡騰組練圖書左右嘉賔衎衎教行于家承之有人蔚乎豹變遂振於文賈勇専塲䄡䄡儒服公曰母庸家有世禄印􅀛在綰未老而傳長歌擊缶以終天年兆啓新阡有封􅀂斧公其無憾歸形此土贈奉議大夫名路滑州知州驍􅀐尉追封白馬縣子王府君墓誌銘故贈奉議大夫大名路滑州知州驍􅀐尉追封白馬縣子王府君以至元庚寅八月二十四日卒于宣城之寓􅃕享年六十有八即宣城郭外西南岡下治地以葬而府君元配劉氏前十有四年卒安厝開州已乆繼室張氏後二十有五年卒尚旅殯于揚州至元後丁丑府君之子大有始並遷其柩合葬于府君之墓自為文刻石以誌焉􅀄大有為江南湖北道肅政㢘訪司知事援著令乞推恩其父母贈府君承務郎大名路同知滑州事大有張氏出也故張氏與府君同􅀍命為㳟人及大有遷平江路緫管府推官而劉氏㳟人之命亦下大有旣陞五品乃加府君以今官階勲爵而劉氏張氏並追封白馬縣君大有使来諗于溍曰誌􅀁以昭世系謹􅀊月已納諸幽堂惟是先人劬躬樹徳以承其先以啓其後者冝有辭掲于墓之原以示子孫頋猶闕焉敢以為請按王氏之先實金之宗室完顔氏世居磁州有諱逺者為金統軍使府君之父也自統君而上遭亂失其譜莫得而詳府君諱思孝字移忠㓜警悟年方羇非脫身兵間東至大名居開之濮陽仍易姓王氏子孫至今因之稍長喜讀書能属文自處甚簡簿是時國家新取中原海宇未一殊無仕進意洎天下旣平朝野無事可以出而仕而府君則旣老矣惟資其子使為學庻幾他日能自振㧞而大用首以材見推擇尋入江東按察司為書吏㢘訪司立更留以為奏差府君委蛇就養乆之乃以壽終府君有子男四人長即大用次珪次大有也今為奉議大夫廬州路六安州知州兼勸農事次大慶女一人婿曰㑹稽縣主簿郭郁孫男九人輔輗轍輅黼黻某某某輔福宣慰司元帥府令史轍江東㢘訪司書吏女五人適湖南宣慰司經歴秦􅀙政紹興路司吏馬良中興蒙古字學正李三徳餘未行於是大用珪大慶輔輅俱已卒咸􅀙葬焉盖金之將亡大家貴族違親戚去墳墓散之四方而其後泯􅃿無聞者多矣府君旣有以自全而不墜其宗又能教其子至於成立以􅇱官使晚乃卒食其報豈偶然哉矧今大有歴官􅀁至有聲其在湖北平反辰沅常潤諸死獄人􅀹以為明􅁢臺府屢薦稱之其顯融未艾府君之冝見褒崇者不止􅀂今􅀁書而已雖不克親於其身措諸事業平生之氣尚何憾乎序而銘之俾後世知完顔氏之為王氏王氏之在宣城皆始於府君也銘曰完顔之支别為王氏逺迹于南由府君始惟時府君有韞弗施一其􅀄終靡間險夷保厥嗣人使有禄位貤恩􅀁加草木衣􅀍其升在上神遊故墟降形在下兆兹坤隅中為同穴昭穆左右勒辭紀實式示爾後管軍下百户贈敦武校尉孫君墓誌銘君諱政其先河間人徙徳州之徳平祖斌當國家肇造之􅀄知金將亡挺身来歸于皇太弟􅀙白荅里罕取濵棣等州由徳州軍民鎮撫佩金符克其州防禦使兼管濵棣軍民尋易金虎符陞都元帥乆之例觧􅀁佩虎符用白荅里罕奏􅀍上命換朝列大夫仍任防禦使兼徳州管軍元帥徳既􅀠東平行臺嚴公強以為徳平安徳兩縣令居數􅀊乃謝去父顯始占軍籍署管軍正百户􅀙其萬户軍蘄縣調屬他將􅀙掠泗州擊襄陽破安豊還守楊州復􅀙攻孛羅湖蘆觜寨孟家洲司空山皆有功􅀁􅀗閫艦一㧞其大將旗二其擊襄陽也太尉河南王實爲征南都元帥屢奬異焉後遷戍杭州遂致其事行中書省以便宜俾君襲父軄􅀙其萬户府逹魯花赤討叛賊扵建寧之政和與賊相拒分水嶺擊走之追至石門赤山賊􅀔益張君直前與之鏖戰奪斬馬刀二移鎮慶元有司驗其􅀁管軍㝎爲下百户至元二十六年奉􅃙爲真階進義副尉復􅀙討叛賊於台之寧海至奉化與賊遇俘其七人得鎧仗十有四賊衆夜来刼營君急擊之得鎧仗十乗勝逐北至寧海生擒其偽國師等四人以前在政和感瘴氣成目疾去官大徳五年七月也至治三年八月二十一日卒于家享年六十有一其月二十四日葬基山郷用覃恩贈敦武校尉妻侯氏贈冝人子男三長毅以世襲為管軍下百户次衡次某已卒女五長適管軍百户髙某次適李某次適國子生鎻住次適髙某次適管軍百户張某孫男二文禮文義女四俱未行毅之外舅深州使君劉公溍父執也故深州之子貞為之求銘其墓惟孫氏自防禦公際風雲之㑹以功名自致君父子又皆親冒矢石以著其勞餘澤􅀁􅀍未有止也不可無使後人知木水本源之自輙因銘君推及其先世而併誌之銘曰孫氏之先世有伐功匪由門地而致顯融賞延于君復以材􅁬􅀍堅執銳再履行陣君之􅀁試泰山毫芒鸞鳯在郊鷹隼莫揚爾子爾孫垂紳正笏眡此石章永永無忽金華黄先生文集卷三十五
