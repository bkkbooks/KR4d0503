body:
  text: 塔銘臨川危素編次龍翔集慶寺􅀏􅀮禅師塔銘今天子至元元年太中大夫廣智全悟大禅師住持大龍翔集􅂟寺訢公上謝事之請御史大夫撒迪公以聞上不允遣使特詔加􅇚教宗主兼領五山寺敕䑓臣諭㫖俾安居以終老寵􅃬􅄖渥賚及其徒公不敢違黽勉受命至正四年夏五月巳丑􅃋乃陞堂辞衆退䖏東庵且援著令循本宗資次舉徑山曇芳忠公以自代俄示微疾其月二十有四日壬子委順而化六月四日􅉝未奉全身殯于石頭城塔院臺府暨郡邑諸司咸設祖奠于道左送者數千人八月十有六日壬申􅉎于塔院之後岡分爪􅄠建塔杭之鳳凰山下弟子宻詣以師法嗣穹窿住山廷俊之状走金華山中諗于溍曰先師紹隆祖道師表人天克恊帝心光膺聖眷宜有述以示来葉子甞庀軄太史氏且辱交於先師銘非子誰冝爲敢奉状以請溍載念師之告􅄫也不逺千里以􅀁服玩来識永訣若有所屬於溍者􅁩不得以衰退爲觧謹按公諱大訢自號􅀏􅀮族陳氏唐尚書操之裔丗居江州後徙南昌故今爲龍興之南昌人父載母蕭氏公㓜開爽授以書即成誦七􅀊㳺僧舎見佛像輒作礼瞻戀忘歸父母知不可留九􅀊俾去家依伯父雲上人於本郡之水陸院祝􅄠礼雲之徒彰上人爲師㝷受具戒年十七􅀄至廬山謁開先一山萬公留掌内記既而遣詣百丈山􅄁晦機熈禅師一見深加器重由内記陞居記室一日詰之曰黄龍得旨泐潭領徒㳺山名聞叢林及見慈明氣索汗下過在什麽䖏公抗声曰千年桃核裏覔甚旧時仁師愈竒之又一日以百丈野狐語詰之曰且道不落囙果便堕野狐身不昧因果便脫野狐身利害在什麼䖏公擬荅師􅃍喝之自是平生凝滯渙然氷釋矣公毎謂先徳有云但有纎疑不到無學安䏻七縦八横乃益研教典㫄及儒家道流百氏之􅀃師迁杭之净慈仍㪯公居記室出丗住湖之烏囬遂以瓣香爲師法嗣居􅀊餘去㳺江浙間復歸净慈一時大尊􅀫在父師行者咸与爲忘年友甞訪中峯本公於天目山坐語至夜半風大作势欲裂崖石左右皆辟易公不爲動中峯甚敬異焉鳳凰山大報囯寺以灾毀而法席空虚行宣政院􅀝公起其廢公既至棟宇一新而規制有加於舊土田爲豪民􅀁㩀者悉取而歸之丞相脫歡荅刺罕公領行院事雅知公遷主中天竺而寺亦以灾毀不一年尽復其舊天曆元年有詔以金􅁜潜邸為大龍翔集􅂟寺妙柬名徳俾之開山公首膺其選特􅂌三品文階以冠法號明年驛召赴闕入見奎章閣賜坐良乆咨問法要對􅀭称㫖因及公師傳之自於是侍書學士虞公集承詔為晦機製塔銘既又改中天竺寺額曰天暦永祚以表公興􅂧之功而公之别院曰廣智亦俾虞公為書其扁㮄􅀁賜貂裘金衲衣及它貴珎服用之物悉出異數􅀙行者預賜有差尋命中使􅀓旨館公於泰禧宗禋院留居浃旬勞問狎至􅄪召見遂辞歸餞送之禮弥厚公巳南還復遣使降壐書加䕶香幣之頒無虚月皇上御極待遇益隆用大臣奏命公与百丈住山東陽煇公同挍正􅓜林清規書成四方咸耴法焉公甞於室中問一僧百丈野狐作麽生僧方擬進語公便打復問旁僧你道這僧好打麽僧亦擬進語師亦打云同坑無異􅁟又一僧􅂙次公云青州布衫重七斤即不問你道万法歸一一歸何䖏僧云東廊頭西廊下公云瞎漢来這裏乱􅀃拈拄杖便打又一僧􅂙次公以手指云釋迦弥勒文殊普賢􅀙你脚根下過去了也僧􅃼然公即喝去其機鋒峻峭􅀋如此一住八年不淂謝復住九年脫歡公爲行䑓御史大夫示疾前一日往致别焉既又别一二所知欵語良乆逮唱滅猶力疾趺坐屬其徒以累受賜金帛作萬佛閣上報國㤙餘一無所及遂書偈而逝春秋六十有一夏四十有六所度弟子若干人得法而分居列刹者若干人四㑹語有録外集曰蒲室藁公以母年髙􅊴於覲省毎自謂有媿於睦州編蒲奉親爰以蒲名室囙以名其藁云公質貌魁特襟度豁如其􅀁爲文無山林枯􅄫之態変化開闔竒彩爛然而論議磊落一出於正未甞有所偏蔽虞公称其如洞庭之野衆樂並作鏗鈜軒昻蛟龍起躍物怪屏走沈􅁳發興至於名教莭義則感厲奮激老於文學者不䏻過也人以爲知言􅀄魏國趙公孟頫未識公得其文歎賞不巳即命駕訪之一時賢士大夫咸慕而交焉公歸􅄫之日天大風雨殯之日宻雲四合隂凮肅然􅉎之日城東南皆雨而城西獨無沾􅊜靈異之迹可徴不誣其遭逢盛際始榮終哀有不偶然者矣銘曰昔在先朝龍􅇓下􅁟蠖濩之居化爲宝所人天四衆川奔雲聚度門巍巍公其梁柱扵皇昌辰金輪御宇寵綏故舊使節㫄午函香示信傳宣天語曰以五山悉統於汝凡兹􅇚教汝爲宗主敷求遺範用継汝祖㤙光衣􅀍榮過衮黼匪公宿徳疇克荷􅀒典則􅀁存有墜必㪯木鐸載􅀭重䂓疊矩单提直指表正端緒竪立法幢作大依怙宻禆上化萬物時雨云胡不憗訃聞當宁石頭之岡崇崇􅌥堵史臣勒銘垂休千古崑山薦嚴寺竺元禅師塔銘師諱妙道字竺元台之寕海人俗姓陳父曰某母何氏家故業儒師生而骨氣凝重神資秀朗㓜􅄝斈不煩師訓􅀹喜誦佛書既而曰文字之學人皆可為吾當求之扵文字之外可也善凬鍳者語其父曰此子不凡寘之僧中可作長老人皆呼為長老児偶患右目母携以禱於􅀚音像前仰見像之右目有小蛛窠為掲去之患随愈父以為扵佛有縁年十六俾岀家依杭之六和開化寺正嚴法師十八得度尋受具戒於大昭􅂟寺􅆊祥律師嚴師令學百法論師曰一法不學學百法乎乃辞去徧􅂙禅門知識皆不契最後至阿育王山謁横川珙禅師未㡬延歸侍司一日聞室中㪯乾矢橛話意未觧怏怏不巳忽曰何乃自為疑碍遂入見質所疑川曰汝不㑹􅁘展開两手云那那師豁然大悟即呈偈曰雲門乾夫橛光明照十方鄮峯􅅻彂足五日到錢唐川頷之頋謂衆曰􅄪来人也由是名動􅓜林行軰更相詰難毎出其上㑹中飽􅄁者如竹山圭東石契唯菴貫皆敬畏之至元已丑用㪯者出世于本邑之慈源寺􅀃法嗣横川居六年法席鼎盛俄謝去訪髙沙彌遺踪於湧泉因留止焉仙居之紫籜山廣度禅寺乆廢道俗僉言非師莫能起之郡府以為然元貞丙申請師主寺事居五年棟宇一新仍懇荒􅁾之地為田以􅁕其食學徒坌集師於􅁟木塲中接引無倦仁宗朝有以師名上聞者􅀍旨住黄岩之浮山鴻福禅寺賜􅃅㝎慧玄明禅師皇􅂟癸丑正月也寺㫄民多豪横師至無不輸誠傾嚮衆始􅀗安其居紫籜浮山皆古刹由師而名愈􅂋延祐丙辰忽若有不適扵意者亟引去部使者俾有司迫之還山是夜衆悉夢師􅄪至巳而􅂧潜歸紫籜遂往拜横川塔於育王省嚴師於六和嚴師䖏之於白賁庵浄慈靈􅀮两山争欲致之俱不就㑹平江之東禅薦嚴禅寺虚席郡府及諸山同以䟽請師􅀘其䖏居四年而拂衣歸休于白賁六和雖外宗衲子来􅄁叩無虚日師年逾七十稍厭扵煩瀆懐紫籜之幽絶乃曵杖東還送者徃徃泣别於江滸師責之日衲僧家當以斯道為巳任視聚散如浮雲奈何恋恋效児女軰􅁘自此不岀山者十有四年門人在方外者期以師年九十會􅂟於􅂰下師聞之曰我不過明年正月半明年乙酉正月十有二日􅀄無􅀁疾苦忽修大方諸老及外䕶書嘱以宗門大事且戒其􅄁學比丘永達司聦曰汝䓁􅀙朝至暮行住坐卧起心動念皆是自家珎宝若辦真實工夫作得主宰自然與道相應任􅀙生死変迁直是移換汝絲毫不得方名大丈夫不􅀌􅀒出家斈道之志庻无媿於父母師友亦不虚受佛祖慈蔭吾明日行矣汝䓁冝各努力無䘮光隂十三日黎明沭浴更衣趺坐略叙平生始末以別衆逹聦乞留偈師曰諸方到此作尽􅇊俩我只如常不得巳援筆書偈曰佛夀八十我多九年丗間情尽􅄫㓕現前􅄬笔而逝春秋八十有九臘五十有二龕㽞七日闍維目睛齒牙不壊設利􅀹晶熒所度弟子可田一玄建塔于浮山曰歸源清宇元􅄫建塔于紫籜曰圎明當寺住持門人惟一収設利与諸不壊者分蔵焉師身不滿七尺而質貌魁􅊆性剛直慎許可安貧樂道不為縁飾進退之際䖏之􅁉如日用中惟以向上事開示斈者丗諦語言不以掛口一僧問陸亘大夫見南泉云弟子家中有一片石也曽坐也曽卧欲鎸作佛得麽泉云得亘云莫不淂麽泉云不淂未審意作麽生師云如人向十字街頭開箇飯店只是不許人喫一僧問和尚教看柏樹子話並無入路師云河裏失錢河裏漉一僧夜上方丈請益師問汝毎日看什麽機縁僧云看狗子無佛性話師云試㪯看僧欲啓口師厲声云夜􅀷下去僧不㑹歸堂中怨詈不巳􅂉者以告師云它向後㑹去在僧聞之釋然其方便為人多此􅀋台之郡長官某問如何是佛師云牛背上老鴉問如何是法師云蘸雪喫冬􅀲大􅆻其意即挽師主天寕未行而有浮山之命晚歸紫籜自號東海暮翁淅東大帥某居蕲縣翼萬户府時两入山問道聞師開示􅀷用歎服􅀯䑓御史常公某不逺二千里来訪師發薬之㽞兼旬不忍去其為達官大人所重又如此紫籜有梁昭明太子廟大徳丁未􅀊大旱官吏父老請雨不應師欲徙其廣神見夢於縣長吏曰為我一言明日當雨長吏以白於師雨随至師之道非獨有以信扵人雖􅄦神亦莫之􅀎違也故示㓕之後識与不識无不尽哀師有重枮雪竇㪯古一百則頌古五十三則四㑹􅀃法語錄若干卷識者評其機用峭㧞如鐡橛石片云温之夀昌禅寺住持門人法源既結集而求太常􅀶士栁公貫序其首以行其丗司聦復以􅂟元保福禅寺住持門人一知􅀁状師行業来徴銘溍􅄑及與師接而挹其真凬頋以㳺於方内未䏻受法雨之餘潤懼無以賛􅀭万一而司聦之来重以前育王住山印公諸大尊宿為之􅂆請不敢以鄙陋固辞銘曰禅林之盛宗唱並傳古響復續矯惟横川師之有聞匪听以耳不勞展手巳淂吾髓虚而善應宗通􅀃通末後一着乃其極功佛之夀命非有数量特以八十示世間相師多扵佛奚啻九年靈根不壊身真􅌂然門人所記四㑹有錄我銘其蔵用志􅁜谷筠巖律師塔銘師諱大節􅃅筠岩族趙氏越之㑹稽人㓜不茹葷年二十有六乃辞家入道得度於上虞法果寺中孚禅師尋受具戒動必中度其祖欽律師住台之妙果甚爱重之遣􅀙同郡花涇銛法師為天台性具之學輒䏻通其大義銛見師戒行精嚴謂曰佛之慧命􅀉在毗尼汝大父律中宗匠汝䏻扵􅅩丗光紹其宗吾道不在兹乎師承命即日渡江依石峯印律師扵杭之灵芝寺不数年悉䆒其宗旨明􅂟吉公延致西班乆之㑹虎岩良公嗣主法席推居苐一座演暢融明􅁤範峻整為衆􅀁恱服而敬畏然䏻以慈悲攝誘与物無忤岀世本郡之羅漢院支傾植仆靡惮其勤迁主松江之延㤙报徳寺道譽益盛屡欲謝事而其徒不忍捨居二十有六年一旦不疾而逝臨終称佛名不輟俄黙坐而暝如入􅀷㝎焉重紀至元之元年十月二十五日也丗夀九十僧臘六十五闍維舌根不壊函靈骨歸上虞建塔于法果師長眉􅀷目廣顙豐頥三衣惟布日但一食人施以錢有来索者予之無以故囊無留貲在明􅂟時寺屋以灾尽毀而師􅀁居􅂪堂獨存明日有一卒来前言昨日救火傷吾􅁕言訖忽不見而几上􅅊陀天神像􅁕缺一指聞者莫不大驚師三閱大蔵行中書左丞容齋李公以師事之一日延師誦經神僧為降異光滿室衆所共覩李公語人曰節公佛菩薩地位中人也􅀊大侵淅河東西殍死者縦横溝壑間師岀衣盂之貲建無􅃒大㑹三晝夜施者不慕而集瑞應之迹􅀹夛而師未甞言之盖自雙林唱㓕丗逺教分殊師異旨莫適相通師雖受持律部而兼􅁱念佛三昧効古人作懐净􅁟詩数十萹昔大智和尚甞曰吾生弘毗尼死歸安飬平生􅀁淂惟二法門大智之後善継善述惟師有焉師􅀁度弟子一清今住越之東山禅寺孫若干人其上首明􅂟住持講律宗主志果状師行業請為之銘用刋于兹碑銘曰佛乆㓕度三學殊宗卓然大智合異為同惟師承之克恊其志㑹二法門歸一大事彂祥効瑞人天具依靈根不壊􅌥堵巍巍有大苾蒭為律宗主謁辞樹碑昭示􅀁祖四明乾符寺觀主容公塔銘四明乾符寺觀主大師諱普容字太虚俗姓茅氏丗爲餘姚人年十有四出家於里之屿山又十有三年祝􅄠扵杭之昭􅂟明年受具戒於明之開元依碧溪聞公於明之延􅂟杭之集􅂟者乆之􅀙石林介公歸延􅂟淂止觀法門於桐溪済公既歴四行雪岑海公爲升座􅀃偈囙以主觀事亡何返屿山扵是乾符乆廢新復半岩全公北溪謙公咸諉以興造師爲募施者建寺如其舊買田六百畮有畸与寺别籍作九品觀室居焉法席偶虚江湖道俗皆兾得師補其䖏避不就郡人福清州判官楊某爲構精舎城東三里􅀁白有司以聞于朝有㫖賜寺額曰􅄌濟且加法師號俾之開山師黽勉受命爲買田三百畮有畸贍其衆而仍居乾符俄㪯净業㑹扵􅄌済与衆別眀日遂别士大夫常􅀁住還者又明日示􅄫於􅀁居之觀室春秋七十夏四十四時延祐七年二月一日也某月某日奉全身塔于慈済寺東南若干歩􅀁度弟子惟允法言䓁若干人法言既嗣住慈済始状其行事願刋之兹碑溍謹為之序曰師家故業儒詩礼之斈厥有端緒今不言尊其教也粤自大雄唱㓕殊師異旨莫適統一惟天台之傳為得其宗而學者或梏於章句有教無行師盖病之是故一年修常坐二年修常行餘時則修半行坐非行坐凡然其頂者三􅅡其臂者百閱七年而四三昧以具既又集同行修大悲期一年净􅁟期七年寓公䖏士慕而与之㳺輒為㪯東林故事四衆􅀙之為四十八願㑹者座下恒数十百人􅀁著書惟圎修要義一卷而未甞示有證入故人無得而称焉􅀊大饑且疫為粥活其不䏻自食者用闍維法歛送其死無所歸者今行中書左丞李公時為紹興路緫􅃹師為建普度㑹十晝夜竣事若有􅁔謡聲同知􅂟元路緫􅃹府事張侯以旱告師為合同修六十人詣白衣觀丗音像前肉香祈哀感瑞光如瓔珞雨三日乃止駙馬都尉瀋王謁􅀘怛洛迦山道岀四明膜拜執弟子禮請主如意輪期三七日尋􅀗異夢益申敬亊此皆丗之􅀁共称者也昔安㝎梁氏盖入天台之室矣然扵其行位猶曰不可得而知也矧以溍之蒙陋未始一登師之堂其有以異夫丗之知師者乎譔次其畧賛􅀭万一云尓銘曰八教􅀁詮曰一大事孰昧其依淂語失義有􅊆大師玄珠宻契爰即身心而指㝎慧法網可裂行海無際一雲在空潤澤旁施丗出丗樂平䓁不二侯王順凬天龍効瑞徒闚應迹莫表階位勒文焯实式告来裔眞如觀主夀公塔銘錢唐眞如􅀚主大師示􅄫後五年弟子慧炬始以状求予銘其舎利之塔予退休之餘方掃除筆研然以師道行之尊乃予夙􅀁歆慕而慧炬又遣使馳書踰濤江而来何敢以荒落固辞按状師諱正夀别􅃅松壑族姓徐氏杭之錢唐人父名某家故業儒師自髫齔之年厭䖏塵俗棄家斈浮圖法於南天竺之崇㤙演福寺某年􅀙住山栁塘􅁠公法師得度為沙門誦經禮佛晝夜不輟平居食不過中脅不至席嚴持禁戒彌乆益堅某年玉岡潤公法師来住是山師既聞妙教即立妙行道譽日廣遂陞居苐一座為斈者師座下恒数百人師随機開示縦談極辨未甞少倦江湖道俗争欲得師出丗以主法㑹師之母某氏賢而有識毎戒之曰慎勿以住院累我師亦恪遵母訓諸方以聘幣来者皆峻拒不納而扵自行之功愈加精進行四三昧終而復始雖寸隂弗棄有施以財物者輒均分於衆而以已所得贖禽魚之屬以放生衣鉢之外絶无長物某年肇建真如觀堂於錢唐城北母亦随喜尽岀其匳具以資役費堂成奉安千手千眼觀丗音像於其中􅀊以季秋之月集十方行人修大悲懴三七日又别立普賢道塲􅀊修法華三昧構重閣􅍥置金書大般若經銀書大智度論於其上而闢其下為講堂以待来學師凡造佛像演經文主懴期授戒法往往感天神侍坐天􅀨宝花靈光瑞相變化非一莫可殚紀至正二年春二月俄示微疾語其衆曰佛􅄺槃前一日我當去可為我建净􅁟懴七晝夜以助西歸十三日沭浴更衣端坐達旦廣􅀃觀心觀佛净􅁟法門以䇿勵斈徒安然而逝十四日也丗夀若干僧臈若干十九日闍維啓龕視之顔貌如生手足柔軟既而於火輪中放金色光涌髙数丈衆共覩師坐五色雲端凝然不動遺烬中舌根不壊得舎利無數其徒相与謀而起塔扵觀堂之若干􅇍師􅀁度弟子得其法者曰徳禹嗣主觀堂曰普曜住車溪廣福教院曰慧炬及宗勝英辯慧寕至道居安䓁今同居天竺靈山寺行法華三昧以千日為期云銘曰衡台之教囙言以傳惟真如師匪託空言以净信心由觧起行具四三昧圎修圎証捴持万法安住一乗乃發弘願接物利生天神􅑙靈宝華現瑞感應之交靡容思議化期既畢駕言西歸萬目所瞻眞身在兹昔本非来今亦非去冩以銘詩式􅇺摧慕道行碑大􅂟夀禅寺住持秋亭禅師亨公道行碑有大比丘曰秋亭禅師􅀍今天子命住持大都大􅂟夀禅寺其謝事而去迨今十有四年王公大人莫不髙之學徒欲望其聲光接其辞氣而不可得今住持臣僧顯儀實師法嗣之上首謀立石以頌其徳使覧者有􅀁觀感而興起焉至正十年夏四月九日上御興聖便殿翰林學士承㫖臣哈刺八都児臣拜拜以為言制可其奏事下本院命侍講斈士臣溍撰文學士臣好文書丹别敕集賢侍講學士臣期頥􅂐題其額臣溍謹按師名洪亨順徳之綦陽鎮孔氏子也家本業農而其父􅄝讀書為善士母仁慈而有賢行􅀹崇信􅇚氏之􅀃一夕夢金像滿室翊日而師以生師天禀迥異常児自㓜不茹葷飲酒毎慨然懐出塵之想父母不欲違其志七􅀊即令岀家礼本府開元寺公為師服勤左右朝夕匪􅈈師性醇厚而言簡檏人未甞見其喧譁戯􅀏年二十得度受具徧㳺講肆微言奥旨無所不達謂单提直指乃向上宗乘之捷徑遂至京師謁西雲禅師安公扵大􅂟夀寺一見輒加賞識命入室侍香師勤於咨決雖示以呵責畧無動色西雲大竒之傳衣而付法焉西雲唱㓕師法兄北溪禅師延公嗣領其衆首命師主城西之廣福寺居􅀊餘挈瓶􅃬南㳺㐮漢江淮間凡名山巨刹大善知識無不與之相叩擊而䆒其㫖趣㑹于大同還駐竹林寺未㡬復歸休于􅂟夀尋以北谿命主彭村之觀音院垂及五年四衆傾慕施者坌集大殿丈室門廡咸為之一新北溪退席法兄魯雲禅師興公継之命扵苐一代玄􅄀禅師法座秉拂拈香開堂演法出丗住持奉聖州之保寕寺甫四年信嚮者愈衆魯雲逝而師以公㪯􅀘其䖏亦止四年小大之務靡不尽心䇿厲其徒多成法噐俄一日大書偈曰和南上禮諸髙徳別請他人拯釣舡書畢􅄬偈扵地芒鞋竹杖出門徑去衆皆大驚奔走求之不得或報師􅀮於文明門外一小院两班执事率衆邀迎師不為起􅄪書偈曰䇿杖腰包歸去也􅄪来不直一文錢衆莫知所為乃相率白于宣政院遣客省使詣師挽留之仍詢以逺引之故師曰祖師有云三年不去五年不住此乃􅀙上流傳之遺凬客省使還院白其事皆歎曰去冨而就貧眞所謂高僧也太師右丞相秦王伯顔在中書亦遣官􅄪三勸請度不可强乃聽其所之師遂歸􅀮于順徳之開元寺􅁕不出户者踰十年顯儀既􅀍上旨来􅀘其䖏乃遣迎致師於故􅀁住觀音院以便展省師年埀七十耳聦目明住丗歴刼未昜量也􅀁度弟子勝喜勝寕䓁若干人嗣其法者今􅂟夀􅂋儀及永平開元住持某䓁若干人惟􅂟夀实四方禅宗列刹之首朝廷甞刻玉為印以賜之崇階㫫位之所加後先相望當路知師雅意謙退第奏請降㫖賜􅃅某大禅師其高凬逺致槩可想見而臣溍起自衰退乆􅀼寵榮頋何􅁕以知師受記書辞無任媿懼其銘曰巍巍人師祖道是承兼善三斈实為一乘精求􅀶訪玄機宻􅆻燈皆同明海无異味推其自利用以利他雲奔川湊如客赴家功成身退拂衣逺㪯蟻聚鱗集如児失母四衆攀慕万夫莫逥迹有􅀮􅂋心非玄来動也時行静也時止出以濟物䖏以全已龍象􅀁萃人天具依鴻飛冥冥弋者奚為名之我随上徹當宁詞臣作頌清凬千古金華黄先生文集卷弟四十二
