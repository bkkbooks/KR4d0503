body:
  text: 臨川危素編次神道碑資德大夫陜西諸道行御史臺御史中丞董公神道碑故陜西諸道行御史臺御史中丞董公既殁且葬二十年而墓隧之石未有刻辭至正十年夏四月九日皇帝御興聖殿東便殿治書侍御史臣老老奏請命翰林侍講學士臣溍為之銘資政院使臣朵爾直班書其文治書侍御史臣期頥篆其額以賜焉臣溍謹按公諱士恭字肅卿姓董氏真㝎之藁城人贈光祿大夫大司徒趙國宣懿公諱昕公曽祖考也龍虎衛上將軍監軍右副元帥知中山府事贈推忠翊運效節功臣大傅開府儀同三司上柱國趙國忠烈公諱俊公祖考也資德大夫典瑞卿僉樞密院事贈體仁保德佐運功臣太師開府儀同三司上柱國趙國正獻公諱文忠公考也妣顧氏趙國夫人公生而端重確實人未嘗見其嬉笑狎昵正獻公薨世祖皇帝甚悼惜之召見其諸子公年甫十三從長兄清獻公士珍至上前命往返行于庭中見其氣宇凝粹正色斂容周旋中度大竒之自是出入禁闥無間問曽學射否對曰陛下統一四海功成治㝎無事於武況漢人挾兵有禁故臣於弓矢之事未之學也上顧左右曰其父祖於國家有大勳勞非他漢人比即賜以弓矢仍命董氏之族悉弛其禁公既長入備宿衛為尚奉御從成宗皇帝至三不刺時方俾道流設黃籙大醮以公純誠恭謹命領其事及代祀嶽瀆復命稱旨益𬒳奬眷忠烈公九子正獻次居八世祖恆呼之曰八哥而不名正獻五子公最幼成宗見公如見正獻因以察罕八哥呼之其見親禮如此大德九年特授奉議大夫典瑞少監十一年有位公下者中書奏升為太監上怒曰董少監本居上乃不升何耶特命升太監進階正議大夫公再辭而後就職宫車晏駕親王有覬覦器者亟欲得符璽公橫身堅守至廢寢食仁宗皇帝入平內難公奉御寶以進詢其姓名以父名對仁宗大悅俾司舊職武宗皇帝既正大統賜黃金帶以旌其忠至大元年典瑞升為院即拜公中奉大夫同知典瑞院事二年有勑樹碑先塋賜以鈔十萬緡辭至再三止受其半訖事悉分其餘於親鄰一豪不以他用四年出為江南諸道行御史臺侍御史處事務舉大綱不為苛細人服其知體仁宗嗣位皇慶二年典瑞為監如故圗任舊人無以易公乃拜公資德大夫典瑞卿俾幕僚偑金字圎牌馳驛敦請公既至適有皇族位公下者公辭曰臣以庸陋尸位惶恐未安矧敢居宗室之上乎願處其下上坐寢殿遣中使促之曰朕以卿勳舊之子故兹委注其母多讓待卿署事然後視朝公不得已乃拜命入謝上嘉奬曰老成君子也嘗問民間所疾苦以薄斂省刑對問臣子之道以忠孝對由是愈見信任清獻公薨于開平特給乘傳俾公護喪還葬蓋異數也延祐二年復立陜西諸道行御史臺以公為侍御史上曰董士恭忠勤篤實冝加升擢乃以公為御史中丞太師阿斯罕以丞相行省陜西嘗有旨命之迎接便服不拜俄一日詔下肩輿登堂北面而坐衆皆惡其無禮而畏其勢𦦨無敢以為言者公厲聲曰天子憐公以足疾賜公便服不拜而已今坐于堂上而使衆官具公服羅拜于堂下不敬孰甚焉叱左右去其肩輿明日諸察官踵門謝曰微公一言紀綱墜矣我曹誠可愧既而有以尸位自劾者歲大旱公齋沐潛禱于九龍池而雨歲即大熟俄謝病而歸僚屬追至灞橋遮留之公不為止皆垂泣而還纍擢河北河南江北淮東兩道廉訪使俱不赴優遊田里杜門謝客與世相忘十五年如一日雖家事一無所問嘗語所親曰吾涉歷宦途東馳西鶩不遑寧處今幸獲投間以詩書教子孫而樂餘年平生之願也竟不復出而以考終公生于至元十五年三月三日卒於至順元年三月三日享年五十有三以其月十五日葬于藁城九門先塋之次娶張氏中書左丞贈太師忠宣公文謙之女封某郡夫人前十年卒繼喬氏封某郡夫人子男二人長守讓太中大夫東昌路總管兼本路諸軍奧魯總管管內勸農事次守訓大夫中書工部司程女三人長適劉文鐸次適武衛親軍都指揮使鄭某次適廣東道宣慰使司都元帥府都事蘇樞孫男二人錞鍷女二人公質貌魁竒性度坦夷慎威儀寡言語以謙退自處而臨事善斷識見過人平生不登權貴人之門上眷雖渥未老而休人莫不歎慕之而公𥘉不自以為髙也臣溍忝以非才承乏執筆隸太史氏頃歲𬒳旨纂修功臣傳董氏一門豐功盛烈見于登載者皆幸與聞兹又承詔嗣為公碑考公平生制行詩所謂好是正直書所謂世篤忠貞昜所謂謙謙君子蓋兼之矣冝其光膺眷倚為國親臣勳德之著至于久而人不能忘也顧鄙陋衰朽莫能上副聖天子寵嘉老成之意稽首獻文無任戰栗銘曰董氏之先世著勳庸蟬聮四葉逮于公公生相閥蚤有令聞從容入對弗亟于進陟降左右日侍燕間命以典瑞實惟世官國有危疑保其重器完歸于上靡容窺伺人惟求舊由監而卿溫其天語褒以老成公居外臺肅持風紀昭受主知遂長御史重臣貴倨人莫敢言公顯斥之朝廷乃尊奉身而退時止則止洊頒使莭公不為起深居獨樂十有五年委順而化式歸其全史臣勒銘朂爾後嗣敬承天休世濟其美御史中丞贈推誠濟美功臣榮祿大夫河南江北等處行中書省平章政事柱國追封兾國公諡忠肅董公神道碑至正八年春某月制贈故御史中丞董公守簡推誠佐治濟美功臣榮祿大夫河南江北等處行中書省平章政事柱國追封兾國公諡忠肅中書宰臣既奉制付外施行夏四月丙子復奏請并賜以神道之碑上可其奏勑翰林直學士臣溍為之銘河南江北行中書省左丞臣守誠禮部尚書臣期頥書篆以賜焉臣溍頓首受命而退公兄子太常禮儀院判官鑰以其孤鎧祥事未畢代為奉集賢侍講學士蘇天爵所述行狀授臣溍曰請以備采擇臣溍謹按董氏世居真㝎之藁城公諱守簡字子敬曽祖諱俊龍虎衛上將軍監軍右副元帥知中山府事贈推忠翊運效節功臣太傅開府儀同三司上柱國追封趙國公諡忠烈祖諱文忠資德大夫典瑞卿僉書樞密院事贈體仁保德佐運功臣太師開府儀同三司上柱國追封趙國公諡正獻考諱士珍資政大夫御史中丞贈純誠肅政功臣太傅開府儀同三司上柱國追封趙國公諡清獻三世並有傳在國史曽祖妣李氏祖妣顧氏妣柴氏俱從封趙國夫人公年甫弱冠入備宿衛克遵祖父之訓畨直不踰晷刻步武必中尺度仁宗皇帝察其忠謹特命為集賢侍讀學士公辭曰臣幸以家世之舊給事內廷臣之學行猶不及臣兄守中况國家肇置集賢資其德義以輔翼聖眀臣實不足當其選上曰朕素知卿家法崇謙讓今為卿成之公兄方官于典瑞乃特遷之集賢而授公朝列大夫僉典瑞院事以代其兄官長有善謔者見公舉止端重數為俚語以誚之上曰董僉院儒者勿嫚侮也上嘗賜公以真德秀所著大學衍義時承平多暇近侍問進以酒公因引衍義之説以諌上嘉納焉英宗皇帝嗣位禁衛周密非元勳貴戚不得入見獨公出入無間一日上問卿平居何好何習亦善射乎對曰臣聞諸父師曰為臣當盡忠為子當盡孝竊好其言患未之能習弓矢之事雖常習之非所好也上恱有名駝良馬幣之賜公奉詔禱祠秦蜀山川而還上問來何遲對曰道經陜西見民多飢死移文行省開倉廪以賑之故來也後然不能無專擅之罪上曰卿朕之汲黯也亟加賞賚眷遇彌渥丐外遷嘉議大夫淮安路總管為治務以平易近民而民自不能欺土豪或挾其黨與恣為暴橫公痛繩以法民乃獲安歲大旱條列荒政便宜驛聞未及俟報首以祿廪倡僚屬及冨家捐錢出粟土著之人則給以錢使不失其業旁郡流移而至者則為粥以食之慮衆之所聚昜生疫癘則處以間曠髙爽之地則收瘞焉既而朝廷講救荒之政下令募人入粟輔官公益得盡其心而不憂之不繼職田皆棄弗取曰吾為天子牧民寧忍坐視其飢而獨飽乎𨝍溝水涸運道弗通發官帑僦工疏浚之因使貧民得食其力公私咸以為便既而水旱相仍有禱輒應民以免于捐瘠未幾徙汴梁路總管郡人挽留不得行單騎由他道而去汴梁為大河以南一都會事至叢劇公操約馭詳廷無留訟齊人官于汴而不返者有弟利其家資迫寡嫂破冢出其柩歸葬于鄉嫂弗欲而莫能止也則匿其夫遺骨之一體弟訴之官下嫂于獄鄰有豪家覬以賤價專其田宅乃共賄獄卒殺其嫂而以病死聞公探得其情事乃白弟及豪家獄卒皆論死宛丘有惡少為宗族閭里害其同黨乘衆怒殺之而誘其妻以逃事覺有司逮惡少族人當以殺人之罪公閲其牘詰吏曰惡少既死其妻安在吏不能對乃捕其同黨及所誘妻至則一訊具服遂釋其族人汴人以為神明公治兩郡所至必大興學校以化民不徒善綜理庶務而巳擢海北海南廉訪使廣西徭人竊發不時官軍莫能制徒侵暴居人湖湘間尤困于飛芻挽粟民無寧歲公劾罷其總兵官行省左丞諸軍肅然用命其地悉平仙江淮財賦都總管或疑公有不屑為公恪共其職無少憚人乃知公未昜淺窺也擢江東廉訪使以疾告歸居無何召為大都路都總管兼大興尹辭不赴特遣中使賜以上樽強起之既入見上面諭曰朕深知卿淮安汴梁之政京師雖浩穰以卿之才為之無難也輦轂之下豪右多挾勢以撓法有犯者公一無所貸威聲大震聞者無不震讋期月而政成除樞密院判官擢山東廉訪使未行拜中奉大夫陜西行中書省參知政事以疾辭擢浙西廉訪使召除侍御史拜資善大夫湖廣行中書省左丞俄改拜江南行御史臺御史中丞先是創建龍翔集慶寺雜取土田器物之籍于官者以給之故平章政事張蔡公别業亦隸焉𬒳旨復以歸于張氏有司猶豫觀望弗即奉行公既至立命歸之召還拜御史中丞用人但取其忠實惡以訐為直以察為明不動聲色而保完正氣其識量遠矣居數月拜中書左丞公力辭曰臣以非才忝備官使受任以來夙夜戰兢恆恐墮祖父之遺業而負國家之至恩况中書出治之本丞轄列于執政何敢貪冒寵榮而不自揆乎上曰此朕志所素㝎卿其勉思報效可也公既視事以畿甸之民阻飢白于丞相出京倉粟二十萬石下其直以濟之慮四方之逺耳目有所不及則遣官分道撫問而存恤之時宰執惟公為漢人畫禦災之策至忘寢食形容為之枯稿新進士當授官而銓曹言恐礙入粟輔官者公曰朝廷下詔求賢將以為公卿大夫之儲苟急于彼而緩于此人將以獻榮不如獻粟為口實而貽笑于天下後世矣衆無以對乃授進士官如故事有司患盜欲重其法公曰民貧故為盜不求所以使之不為盜而淫刑以逞豈善政乎或謂頃歲汴人搆亂首惡固已伏誅而連坐者獄猶未竟此盜所以滋也公曰罪人已得州縣奉行文書容有不能辨其真偽者非可盡以首從論且事在赦前豈可使國家失信于人而無以安反側乎當坐者百餘人皆釋不問始盜起時廷議禁漢人母挾弓矢上曰董左丞祖父佐先朝取天下有大功不可例以為漢人而而禁之特命賜之弓二凡其族人皆勿禁著為令以左丞知經筵事仍總裁遼金宋三史及三史成公自中書奏上之未幾復拜御史中丞進階榮祿大夫公援舊比固辭上再三勉諭乃拜受至正六年夏四月大駕時巡上京公扈從至幄殿上解御服以賜命居大都留臺五月庚子以疾薨于位享年五十有五臨終告其子鎧曰我在中書時皇上賜以先清獻公神道之碑而久未及刻我死汝亟為之言訖而逝訃聞上為之震悼􅉠以鈔二萬五千緡仍令有司護視其歸葬遂以六月癸酉葬藁城九門之東髙里先塋公資稟沈毅履行純篤生將相家而未始豢于貴驕清獻公家法素嚴公居侍旁循循雅飾早涉書傳不煩師授而大意已瞭然心目之間蓋其所養與草茅凡下固自不侔也忠烈家庭之訓曰吾少遭多難長遇眀時樹立勳名皆朝廷聖德神功之所及今老矣無能為也汝等當思廉慎不欺以報國家或以貪墨敗官則非吾子孫死亦不得從葬先兆宜謹識之公佩服不敢忘故居官以清白著聞家無留資僅蓄書數萬卷俸祿不侈于自奉惟喪祭則致其豐待宗族羣從以恩吉凶皆有所給教子必延名師里中孤寒之子亦使就學接公卿士庶咸有禮度故殁之日無貴賤少長莫不痛悼焉公娶烏氏國朝名士沖之女于經史無不通動必協于閫範纍封趙國夫人子男二人長鉞內供奉見謂能稱其家不幸前卒次即鎧好學而有立當用廕輔官未命女二人長適祕書監丞鄭鄈次適崇福司丞張歪頭若稽古昔帝王之興必有豪傑起而應之率資其力以成大業至于第功行賞剖苻受封傳子及孫保其世祿重侯纍將未為乏人若夫異材間出繼世象賢秉忠懷誠以承休德書于史䇿號曰名臣求之近世如董氏一門者罕見其比也當金之末造忠烈公灼知天命擁衆來歸與金人戰死濉水上而金亦尋滅其後正獻公與其伯兄忠獻公文炳仲兄忠穆公文用俱以勳臣子從征雲南又從伐宋濟江而還暨再出師忠獻遂與丞相淮王伯顔同取宋而㝎天下于一際時承平忠穆既以耆德元老總臺綱掌帝制正獻復以上所親信入尚符寶由郎而卿逾二十年子孫世嗣其職而公在典瑞歷兩朝不遷他官御史中丞位望尤為尊重自忠穆至公父子兄弟居是官者六人可不謂昭代衣冠盛事乎江漢之詩曰無曰豫小子召公是似肇敏戎公用錫爾祉公正色立朝始終一節增光前烈形于贊書天子之命公與宣王之命召虎殆無以異公雖死猶生也臣溍鉛槧末學固不敢竊自附于大雅之詩人欽承詔旨序次本末抑亦庶幾無愧辭者矣銘曰世其家者雖古或希顯允董氏有之似之天造方新聖作物覩豪傑之興克歸真主篤生後賢卒其伐功皇靈所加四方來同河山帶礪勳在盟府正笏垂紳以文昜武逮公父子遺烈是承翊扶熙運保其盈成公滋益恭委蛇進退陟降左右踐揚中外莬符龍節未究所施乃預樞管乃佐宰司乃長御史整齊憲度峻陟崇階丕昭異數一鑑之亡哀動帝宸拊髀曰嘻兹豫世臣錫之蜜章下賁玄宅申以頌辭樹此貞石集賢大學士榮祿大夫史公神道碑故集賢大學士史公以髙壽終公卿大夫相弔于朝親戚故人聚哭于里曰兹我朝之遺直也故事大臣之葬必著石章載其世系官職行能勞烈於是宰相執政以聞于上命臣溍為之文仍敕河南江北等處行中書省左丞王守誠翰林學士承旨張起巖書篆以賜其嗣子銓俾揭于墓之原臣溍謹按河東山西道宣慰使辛鈞之狀公諱惟良字顯夫姓史氏其先居亳之城父金末避地鄆城因占籍焉曾祖諱深贈中奉大夫司農少卿護軍追封亰兆郡公妣唐氏京兆郡夫人祖諱誠纍贈資德大夫江浙等處行中書省左丞上護軍追封京兆郡公妣王氏京兆郡夫人考諱興纍贈榮祿大夫河南江北等處行中書省平章政事柱國追封秦國公妣陳氏秦國夫人左丞府君仁厚長者遭時多故親戚皆不相保府君獨負蔣氏姊之弱子仁﨑嶇兵間卒免于難李璮之亂羣盜乘時蜂起府君率衆捍衛鄉井人恃以無恐至今德之秦國公有子三人長即公次惟次惟恭𥘉秦國夫人夜夢車馬人從羅列于庭既窹遂以至元十年正月二十八日生公于北四封堡公少受學前進士王仲文結廬城北荒棘中攻苦食淡者五年而卒其業甫踰弱冠出逰京師受知臺府諸公得推擇試吏憲部某年用例輔官授將仕郎河間都轉運鹽使司知事抑絶請託紀綱肅然辟大宗正府掾遂為本府架閣庫管勾預纂集通制有勞延祐某年遷刑部主事升本部貟外郎文移填委剖決如流詳讞大獄時稱明允五年擢監察御史居數月除中書右司都事俄復入御史臺為都事入右司為貟外郎丞相帖木迭兒威福自恣僚佐莫知所為公獨抗以正論丞相面加含容而心實忌之欲挽使出門下公不可遂謀中以隂事巳奏于東朝幸仁宗察其無他猶坐免所居官人莫不危之至治元年乃以江南諸道行御史臺都事起公于家歲餘又以刑部郎中召尋以奉議大夫為本部侍郎剖決詳讞視為主事貟外郎時事任益重謁告歸省不報泰㝎元年中書奏除右司郎中同日御史臺奏除雲南諸路肅政廉訪使中書請留為太子家令丞未上復以為朝列大夫右司郎中同日樞密院又奏除參議院事故事省院參議特設席僚佐之上樞密多武臣或不諳舊典抑使歸僚佐之列公始建白改正焉二年除朝請大夫江南諸道行御史臺治書侍御史賜上尊金假以重其行居數月召人為治書侍御史舉用察官部使者號稱得人三年改僉宣政院事頃之除吏部尚書視事甫兩月復除治書侍御史進中奉大夫侍御史賜所服犀帶一不一月拜中書參知政事賜只孫金假表裏四貂鼠衣一四年以疾辭且薦某官張友諒某官王士熙自代不允左丞相倒刺沙平章政事兀伯都刺奏請回付西域賈人逺年所中寶石鈔五百萬緡公持不豫丞相怒欲加以違制之罪賴右丞相塔失帖木兒敕解而止平章復請以回付貴辨于公公曰寶石出西域市估乃西城牙儈所㝎難以覆實如令某回付當以其物還之遂召賈人付以元中寶石賈人特丞相􅓎謂非故物公曰寶石藏內庫宫禁中誰易之者賈人語乃塞公還自上京移疾徑去天曆元年文宗至自江陵遣使趣召入見于明仁殿復拜侍御史僅旬曰特授資善大夫中書左丞所陳十事大略以為今大事未㝎可憂者陜西據河山之固四川有順流之便江南素多草竊髙麗迫近直沽皆當預為之防至于量材授職録德㝎位乃萬世良法邇者特恩太多旁及無功未盡合於外議况兵革未息財用當量入為出不可濫加賞賜且莭儉必自內始增設怯薛丹宜權住其請給疏奏皆見納用時中書左丞朵朵參知政事王士熙等坐繫樞府罪且不測用公言得從逺貶江浙行省平章政事換住髙昉等以慢易中使命鎖繫問故公言杭為前代故都居民百萬家若鎖繫行省宰臣民必震駭懼生他變悟命給官舸召致之後皆置不問西兵入潼關樞密院議發太行以西民丁禦之公廷詰知院别不花等曰兵法先聲後實但當內固根本以逸待勞急起民丁是示人以弱也可乎往復辨論聲色俱厲又于上前力陳其不可議遂寢國家承平歲久倉卒調兵事機交急公左右應接指畫略如平時事無停者上深倚之事必詢而後行九月宰相率百僚上尊號公攝門下侍郎成賜銀百兩金假表裏各一大軍之後橫尸蔽野公屢請下有司收瘞母俾逺人有以覘吾國從之齊王魯王圍上亰倒刺沙面縳奉璽綬來歸朝廷巳肆顯戮并欲加罪群臣隔絶在圍城中者公不可大臣或與公異議公乘間白上曰彼各為其主耳漢髙帝所以封雍齒也况可加罪乎事遂解十一月某日秦國公薨公聞訃即日就道敕賜鈔萬緡以給其喪二年有詔起復拜御史中丞辭不赴改太子副詹事遣典牧監經歷伯單傳旨賜金假上樽趣使入見于朵羅班忽都魯納鉢哈刺殿乞終制不允特授資政大夫御史中丞知經莚事固辭又不允賜只孫金假表裏各十公進唐太宗帝範及端本求治十事曰畏天曰愛民曰修身曰納諌曰求言曰薄斂曰崇儉曰求治曰御群臣曰上皆嘉納焉命還中道引疾繳納驛劵及所以方預大事不可拘于常制仍令御史臺遍諭所屬而御史有不悅公者謂冝允其請上特命臺臣以上令趣中丞復任公尋應詔言時務十四事大略以為今視至元𥘉年天下輸租納稅之民既已減少土地又不加多而宫女宦寺怯薛丹昔寶赤及法師醫官樂工之流視昔何啻十倍即宜分㨂元貞大德以後創置官府尤當減併賜豫名爵錢物必須稱其功德僧道以不殺不貪清淨為教祝讃禱祠之事冝令自備母耗官物大司農司專尚文具當整治以求實效隨朝官必歷二十月然後改調以息奔競吏貟必申眀取輔試驗程式以防冒濫內侍醫卜樂官不得混授文武散階遇大朝會樂官别為一班於後以别流品不急之役動擾軍民可一切罷之議論剴切皆人所難言𬒳旨付中書議行多著為令時方建龍翔集慶寺命以集慶路錢糧差稅悉豫之公聞遽入請對便殿言今國用匱乏集慶江南大郡財賦淵藪豈冝輕卑上謂不可食言公請姑給以今年所入後勿為例上大悔悟親取佩刀削其公牘而改從公言至順元年二月特授資德大夫中書左丞有詔纂修皇朝經世大典俾公專知其事撒敦以丞相介弟為其庶母請賜鈔五十萬緡公曰聞撒敦巳妻其庶母髙官厚祿不能養一婦人猶欲費公帑乎丞相然其言遂不復以為請從大臣有因兵興扈從荆南者失馬四百匹得旨議公曰從臣失馬而取償于國家如必償償請先償萬人之命事聞竟不豫上知公素貧命賜以沛縣田五千畝見自陳家有薄田可以給饘粥方愧無功竊祿不敢冒受大賜以速譏謗上諭以卿積有勞賜田出自朕意其勿辭公再三乞返恩命上注視默然公不得巳拜謝而退尋移文備述𥘉意訖以田歸于官連乞歸侍親皆不允貽書于丞相燕帖木而及移文中書謂自居政有政務紛錯災沴荐臻豈可待人言而後去既得請復賜以鈔萬緡三年五月起為浙東海右道肅政廉訪使以母老不赴四年與某官許師敬某官張升等十老偕召赴闕議㝎䇿事五月會于上京公抗言曰當今所急惟在早正宸極布告逺邇使之聞知然後修政事睦宗族除宿弊安群情苟或因循久曠神器恐姦人乘此妄生異議非社禝之福也乃陳政要三十四事首言自去年冬迄今半載內外臣民觸法抵禁公然無忌昔世祖踐祚之𥘉不肆赦仁宗不赦貪官汚吏深意存焉冝恪守前規戒飭中外使知非常之恩不可幸覬此㝎民志之先務也次言修律令擇守宰辨人品以清風憲限民田以抑豪強朵朵王士熙還自貶所巳蒙恩復其官職乞以元沒入家産付之六月四日會于闕下申言前所陳十事奉旨依舊中書左丞六日會于栁豫今天子即位于大安閣詔條多採用公言宣讀畢以病謁告賜忽里台銀百兩鈔萬緡金假表裏各一又以母老告辭右丞相伯顔左丞相撒敦傳皇太后旨遣使敦請視事公附使者奏方今之患在二三其德政出多門無以成就庶務甚則有不測之變生於肘腋宜察衆心所願欲而行之使政令歸于一繼移文中書歷敘古今國家之始亂母后之禍福至於師保之職在乎輔導聖躬教育皇子尤人所不敢言又貽書兩丞相諌選髙麗閹竪女子辭愈迫切明日遂行元統元年除山東東西道肅政廉訪使以母老力辭三年召拜樞密副使仍賜上樽綺假趣使入朝以內憂去至元三年五月服除擢燕南河北道肅政廉訪使時年六十有五即乞致仕亡何御史臺復奏賜上樽金假起為江南諸道行御史臺御史中丞以首相多變亂祖宗法令居一月而辭歸更化之後復以老人召拜集賢大學士榮祿大夫中書集議救災衆皆默然公獨上言三十三事及録本朝誅阿合馬清冗職詔草附禮部尚書阿魯灰等以聞遂移疾而歸以論事激切深為權要所憚嗾言者奏奪大學士公殊不以為意他察官及部使者交章辨析至正六年八月御史臺以聞詔給還所納制命俄以七年正月四日薨于所居之正寢享年七十有五是日有白鶴數十集于庭公曰此弔鶴也弟惟善侍疾欷歔流涕公曰死生常事男子蓋棺事乃畢汝不憂身之不修尚奚悲我為召子銓教以忠君孝親之道勿汲汲于求進且戒以母厚葬曰石槨雖堅不如速朽紙衣瓦棺足周吾身或違吾言非吾子也言畢而逝鶴復翔鳴者七日人莫不駭異焉子銓遵遺志斂以時服其年五月十九日葬于甘塸保之原公幼聰敏既長鬚眉踈秀多才而有大志不拘小節器宇凝重性資剛直遇事洞見其情與人不為苟合喜讀書起居坐卧賔客燕談之所皆設几案列簡編或納卷袖中隨所至而觀焉其始致仕也自號逸翁作臨漪亭浩然堂貫道書院藏書不啻萬卷春秋佳日駕青騾小車意行林曲遇園池之勝輒裴􅏆其間與田夫野老忘形爾汝若將終身焉晚年閲理精熟為詩文博敏而純實有奏議雜文歌詩總若干卷自題曰泛藁云娶華氏阿刺王氏並封秦國夫人子男一人銓某階順德路總管府判官有學有文尤工篆隸女二人適承直郎某官李思儀承直郎某官苗頥孫男二人買住端住女一人狀稱公歷事七朝聞召命即行言不用即去平日慕司馬文正公之為人出處略似之浮雲飄忽而白日常新頽波橫潰而砥柱不改其言良信矧當天曆至順間公所建明多國家大計安可使來者無述乎大書深刻以侈上賜不特為泉壤之光而己也銘曰剛毅木訥斯近于仁苟有其德亦必有言有偉史公生逢昭代蹇蹇匪躬難進昜退危言正色不詘不枝忘人之勢藐夫巍巍杜絶幸門鋪張治具為官擇人奉揚憲度言之可徴如龜如蓍惟天子明聽用弗疑公益靖共不懈于位晚登廟廊荐陪大議豈無謀夫發言盈廷畨番黃髮國有老成歸安里閭閔勞以事佇聞告猷乃以訃至顯忠佑賢天子聖神保其𥘉終為時名臣勒文豐碑垂示無極嗚呼休哉古之遺直翰林侍講學士中奉大夫知制誥同修國史同知經筵事追封豫章郡公諡文安揭公神道碑至正七年夏四月辛卯皇帝時巡上京秋七月丙戍御慈仁殿文學侍從之臣咸就列以備顧問當寧憫焉興念舊人以故翰林侍講學士揭傒斯神道之碑未立俾同知樞密院事臣世傑班傳詔于學士承旨臣嶽柱命直學士臣溍為之文仍勑河南江北等處行中書省左丞臣守誠禮部尚書臣期頥書篆以賜焉臣溍蒙恩起自休退懼志慮之凋落無能發揚聖天子敬故尊賢之意承命震惕莫知所為然竊自念忝以詞臣執筆隸大史氏不敢控辭謹按前修撰劉聞所上容臺之狀及前學士承旨歐陽玄所為幽堂之銘公諱傒斯字曼碩揭之得姓出于楚司揭氏者以官出于漢安道侯揭陽㝎者以邑出於漢陽信侯劉揭者以名唐末有為檢校尚書左僕射使持節袁州諸軍事守袁州刺史者曰鎮始家于袁與居旴江者曰瑱居豫章者曰稹同祖司揭而言姓氏者或謂當祖安道汝寧之族則又别祖陽信世逺譜帙莫得而詳公于稹為世孫占籍豫章之豐城豐城今冨州也自曽祖光朝而下三世俱弗仕以公貴故祖惟聰纍贈嘉議大夫禮部尚書上輕車都尉追封豫章郡侯考來成纍贈中奉大夫江西等處行中書省參知政事護軍追封豫章郡公𥘉朝廷罷群臣贈典特賜公號貞文先生至是又奉旨為建書院因所賜號以為額祖妣黃氏何氏妣黃氏並追封豫章郡夫人公生而頴悟年十二三讀書已能窺見古人為學大意家貧不能負笈逺遊父子自為師友刻苦奮厲窮晝夜不少懈涵濡既久經史百氏無不貫通發為文辭咸中矩度同里年相埒者多敬畏而師事焉年二十餘稍出遊湘漢間湖南帥趙文惠公淇素號知人一見輒驚異曰他日翰苑名流也程楚公巨夫涿郡盧公摯前後持湖北使者節程公竒其才妻以從妹仁宗踐祚之𥘉程公在翰林公至京師因館于其門執賔主之禮甚謹人不知為肺腑之親也盧公尤愛其文亟表薦之方是時東南文章巨工若鄧文肅公文原袁文清公桷蜀郡虞公集咸萃于輦下公與臨江范椁浦城楊載繼至以文墨議論與之柏頡頏而公名最為暴著受知中書李韓公孟集賢王文㝎公約翰林趙文敏公孟俯元文敏公明善而全平章嶽柱禮遇尤至相為推挽不遺餘力延祐元年由布衣入翰林為國史院編修官李公以政府兼史館觀公所撰功臣列傳撫卷歎曰此方謂之史筆他人真謄吏牘耳三年升應奉翰林文字同知制誥仍兼編修四年遷國子助教用本院奏留居舊職五年謁告南歸泰㝎元年以元官召俄丁內艱公十年間三應奉于翰林朝廷之事臺閣之儀靡不間習王公每謂與公談治道大起人意授之以政無施不可也天曆二年文宗始聚勳戚大臣之子孫于奎章閣而教之命學士院擇可為之師者得十餘人而無以昜公乃擢公授經郎閣在興聖殿西公蚤作必徒步先諸侍臣而至諸貴遊來受業者謀合錢為貰馬公微聞之輒自置一馬尋復鬻之示不欲以已為人纍而已其後去公座下而入侍帷幄者皆為國之重臣而未嘗假以為聲援視之泊如也上時坐閣中有所咨訪奏對稱旨恆以字呼之而不名中書薦用儒臣必問之曰其才何如揭曼碩間出公所上太平政要四十九章示臺臣曰此朕授經郎揭曼碩所進卿等試觀之其見親重如此豐城地不産金官府惑于姦民之言為慕淘金户三百家而以其人總之散往他郡采金以獻歲課自四兩纍增至四十九兩有竒其人既死而三百者所存無什一又貧不能聊生有司責民之役于官者代輸其金民多以是破産因公所上政要及之遂蠲其征人賴以蘇至順元年預修皇朝經世大典上覽公所撰憲典顧謂近臣曰此非唐律乎超授藝文監丞參檢校書藉事且屢稱公純實欲器使之而竟不果用元統元年今皇帝入正大統召對便殿慰諭良久命賜以諸王所服表裏各一躬自辨識以授焉一日入直奎章閣上適至左右奉法書名畫珍器物以進公厯陳其製作之年世與其人之氏名為之坐閲移時至元元年遷翰林侍制兼國史院編修官四年拜集賢直學士先是儒學官赴吏部銓必移集賢考較其所業院下于國子監監下于博士吏文稽滯動經纍月公請奏更其法以事付本院屬官人以為便五年奉旨函香祠北嶽北海濟瀆南鎮竣事引疾便道西還丞相太師秦王令集賢促公亟回以疾辭六年上親擢公奎章閣供奉學士聞命即日就道未翰林直學士知制誥同修國史至正元年肇開經筵首公兼經筵官二年升侍講學士知制誥同修國史同知經筵事公階自將仕佐郎纍遷至中順大夫其為侍講階當與品封而新格超升不越二等獨公不為例進四等轉九階為中奉大夫實異數也經筵無專官曰領曰知多宰執大臣微辭奧義率屬公訂定然後以進其言往往寓獻替之忱務以禆益治道上嘉其忠懇數出金織紋段以賜之三年以年七十致其事而去詔遣及于漷南上表力辭尋復遣使奉上樽諭旨還撰眀宗皇帝神御殿碑文成賜楮幣萬緡白金五十兩中宫所賜白金數亦如之求去不許命脫脫右丞相及諸執政面諭公母行公曰使揭傒斯有一得之獻諸公用其言而天下蒙其利雖死于此不恨不然何益之有丞相因問方今政治何先公曰儲才為先飬之于位望未隆之時而用之于周密庶務之後則無乏才廢事之患矣他日集議于朝堂公抗言當兼行新舊銅錢以救鈔法之幣執政持不可公言之益力事雖不行丞相以公不阿獨心敬之有詔修遼金宋三史以平章政事而下暨公等六人為總裁官而以右丞相為都總裁丞相問修史以何為本公曰用人為本有學問文章而不知史事者不可與有學問文章知史事而心術不正者不可與用人之道又當以心術為本也公既領史事每與僚屬言𣣔求作史之法須求作史之意古人作史善雖小必録惡雖小必記不然何以示勸戒乎自是毅然以筆削自任凡政事之得失人材之賢否一切律以是非之公至于物論之不齊必力與之辨求歸于至當而止四年遼史成以進有旨奬諭仍俾早成金宋二史公感激知遇惟恐無以稱塞辰入酉出憊不敢休會盛夏雨潦襆𬒳宿館中得寒疾返寓舍甫七日而遽不起公卿大夫士聞者無不馳往哭之盡哀省院臺部寺監而下咸致賵有差時方有使者至自上亰燕勞史局以公故為改燕日使者還以聞上為之嗟悼以楮弊一萬緡賜其家仍給驛劵具官舸送其櫬歸江南公少處窮約事親菽水粗具而能得其歡心暨有祿入服食稍踰于前輒愀然曰吾親未嘗享此也故其平生清儉至老不渝與兄弟有無相通始終無間言子弟有過不加顯責奴僕得罪亦寬容之人問之曰長上遇下稍見卞急後生使習暴戾不得不以身教也公立朝雖居散地而恆急于得士考鄉試者二考會試者一為廷試讀卷官者二考國子公試者七所甄拔後多知名御史建白用會試終埸鄉試次榜舉人為教官廟堂以咨于公力贊成之由是士無遺才之憾公喜汲引後進而不能俯徇流俗郡縣有一廉吏稱之寧過其實聞吏之貪墨病民亦不曲為之掩復達官大人意有不合終身不造其門雖見軋而不悔間寫其心之所不平于文字間人或疑泰甚公曰言當如是不必慮也公為文敘事嚴整而精核持論一主于理語簡而潔詩長于古樂府選體清婉麗密而不失乎性情之正律詩偉然有盛唐風善楷書而尤土于行草國家大典册及元勳茂德當得銘者必以命工人子欲顯其親者莫不假公文以為重仙翁釋子殊邦絶域慕公名而得其片言隻字者皆寶而傳之暮年求文者衆寢食為廢殊不以為憚然亦不苟作有郡守諷其民奉金為壽求紀政績公頗知其人斥而去之末幾其人果以賄敗客有為人謁文而私其金者他客發其事公曰巳受之矣人尤服公雅量有文集若干卷行于世公薨于至正四年秋七月戊戌享年七十有一以六年秋九月甲子葬冨州冨城鄉冨陂之原制贈護軍追封豫章郡公諡文安有勳爵而無官階有司失之也元配李氏繼即程氏太中大夫同知荆湖北道宣慰司事嚴卿之女並追封豫章郡夫人子男二長汯李氏出國學上舍生今用公廕當輔官未命次廣陽生七年矣女一人通楊湘蓋人才之生必于興運其以文事與時而奮恆在乎重熙纍洽之餘惟養之厚而用之不亟故其望實彌久而益著非僥幸于一旦坐致顯融者可同日而語也公以庶士起逺方而徊翔于清途三十年晚乃蔚為儒宗文師荐膺眷遇勤事以死大明在上照臨所及故舊不遺播之聲詩垂于無極公亦生榮死哀矣乎銘曰于穆世皇遐不作人豐芭之澤燕及後昆在仁廟時群獻俁俁出入左右經文緯武公居其玉長𥚑載筆以從其行徐徐歷事四朝乃登延閣乃司論説乃掌述作清問所及字而不名公滋益恭不挾不矜逮今昌辰峻躋邇列翩其逺引萬夫莫遏天子有命式遄公歸重煩以事俾職訓辭明明天子不自神聖廣厦細氊公言是聽稽古圗治監觀後王公能敬承大啓厥藏發潛闡幽驗諸成敗斟酌典謨用存勸戒竒聞異見參錯猥并公所折衷信而有徴藉夫衆功訖于絶筆克成公志公死不沒人孰不仕孰完于公始卒無疪而以豐終敬故尊賢天子之德詞臣奉詔薦此樂石嶺北湖南道肅政廉訪使贈中奉大夫江浙等處行中書省參知政事護軍追封南陽郡公諡文肅鄧公神道碑銘至正九年夏四月二十日知經筵事臣朵爾直班同知經筵事臣野仙護都臣溍等進講于明仁殿臣朵爾直班臣野仙護都奏鄧文原經筵舊臣歷事纍朝備極榮遇兹又顯受聖恩贈封㝎諡墓上之石宜賜刻文上既可其奏命臣溍為之銘别勑翰林學士承旨臣起巖篆其額臣野仙護都請就令臣朵爾直班書丹上復如其請乃退而以前史臣范梈之狀授臣溍臣溍謹按故嶺北湖南道肅政廉訪使鄧公諱文原字善之曽祖從黼妣楊氏祖昭祖纍贈嘉議大夫成都路總管上輕車都尉追封南陽郡侯妣雍氏南陽郡夫人考漳纍贈中奉大夫四川等處行中書省參知政事護軍追封南陽郡公妣孫氏遊氏並南陽郡夫人其先由長安徙資中又徙綿之彰明杭為宋行都南陽郡公避蜀兵來依焉故今為杭州人公六歲入小學九歲從三山楊先生受春秋十五以流寓取漕薦暨科舉事廢遂一意務為聖賢之學行益修業益茂開門授徒户屨常滿中州士大夫多慕而與之交徐文獻公琰髙文簡公克恭知公尤深王參政巨濟素刻深與公語亦嚴憚之巨濟後以事繁獄自悔不用公言𥘉用江浙行中書省辟署杭州儒學正秩滿調崇德州儒學教授用薦者擢應奉翰林文字將仕郎同知制誥兼國史院編修官承旨閻文康公復于寮友少所假借公獨見推重凡大撰著必屬焉由應奉升修撰成宗即位就任轉從仕郎成宗崩預纂修實録姚文公燧王文肅公搆並為承旨持見不同閲公所真稿互有指擲公不與辨第令櫝藏以俟後數日二公取視之皆莫能昜一字以儒林郎出為江浙等處儒學提舉教人先學行而後文藝士習為之丕變召除國子司業建白修眀學政而樂因循憚改作者與之論不合遂移疾去仁宗即位詔以科目取士江浙行中書省檄公考延祐元年鄉舉公以朝廷立法之𥘉多采考亭朱氏貢舉私議慮逺方之士未悉上意大書其文揭示之由是士無復踵異時埸屋之弊尋翰林待制承直郎兼國史院編修官召臺臣交章舉之擢承德郎僉江南浙西道肅政廉訪司事湖州民有抵夜禁者𬒳執而遁追者及之剚刃其左脅其兄問殺汝者誰曰白帽青衣而長身者也語畢而死其兄訴之有司歸罪于直𥘉更張福兒坐繫三歲公閲其牘曰白帽青衣姑勿問福兒身不滿六尺未見其長且福兒用左手傷何以在右命覆勘之真殺人者張彈壓也建德戴汝惟𬒳盜己捕置獄中而夜有火其居者失汝惟所在公曰此有以也責有司推治得汝惟尸于水濵及其妻謀殺夫狀人以為神江隂飢民稱貸于冨家不得則持火往取穀誤焚其屋十三人所分穀皆不滿五升有司悉當以強盜公謂此非其情也時瘦死者已半餘皆杖而遣之平江僧訴總管府判官理熙納其賂既誣服而公適至探得其情杖僧釋熙移僉江東建康道肅政廉訪司事寧國諸郡茶課𥘉止三千餘錠纍增至十八萬錠皆鑿空取之民間民受誣抵法則轉運司得以失覺察擅加罪五品以下官州縣長吏皆重足而立公至而提舉茶事者適以賄敗乃為設法以漸去其弊且建言冝罷茶司而使郡縣領之饒州有告欺隱官糧者事連數百人纍嵗不決公曰此不難知以官租為民田交易而抄户時以之定差徭經理時以之㝎租稅耳命據籍為㝎訟遂息小吏有結為兄弟持官府短長者號五府杖而流之人莫不稱快有甥盜其舅家財者以贓滿罪至死公曰贓五十綻盜惟二人其一人所分止五錠何也録之得其實所盜十三錠而巳遂以減死論徽州民偽造楮幣于僧舍有避雨者適見之其人懼事泄因啖以利而止之使為烘焙獄具當死公曰造偽當死者其等有七烘焙當何等冝比行使加等杖事聞于朝報如公言徽州民謝蘭家貧其從子回貸以錢而倍取其息又利其田宅而欲搆害之蘭家僮死回使告蘭殺之公察其冤釋蘭坐回天方旱而雨士子或為私書以非考亭之學公命毁其書曰吾以息邪説也江浙行中書省復移行御史臺檄公考延祐七年鄉舉得今翰林侍讀學士泰不花以為舉首既上春官果為廷對第一士論翕服拜集賢直學士奉訓大夫以地震應詔論弭災之道謂今天下士師非才惟受成于吏死囚歲上刑曹類延緩不報瘦死者多冝慎選理官死罪應決即決冤即釋之河北流民復業朝廷雖令計口給緡錢而有司奉行不至冝會計海運糧支發之羡餘隨處置倉以備凶年而振之又申言茶法之害民乞併罷轉運司以息人怨感天和時論韙之進奉政大夫兼國子祭酒依前集賢直學士𬒳旨知泰㝎元年貢舉及上親策多士于廷仍俾充讀卷官有詔開經筵特命中書平章政事張蔡公圭翰林學士吳文正公澄及公入侍其見知遇如此大駕時巡公當扈從苦脾疾就醫于京師遂乞謝事南歸歲餘召拜翰林侍講學士中奉大夫知制誥同修國史未行擢嶺北湖南道肅政廉訪使以疾不赴天曆元年五月二十二日薨于杭州私第之正寢享年七十以其年七月十三日葬湖州德清縣千秋鄉百寮山之麓太常𥘉議以莊康易公名今天子始用公門人集賢大學士馮公思溫之請特贈公中奉大夫江浙等處行中書省參知政事護軍追封南陽郡公改諡文肅娶徐氏封南陽郡夫人前公一月卒合葬焉子男一人衍用公蔭為承務郎江浙等處儒學副提舉後公若干年卒女二人適石洞書院山長史公野司徒府掾史戴孟淳孫男一人萊孫公蚤慧稍長能自植立外家遊氏旨清獻公似相宋理宗門户輝赫公未始挾以自矜又嘗客于故后族謝氏家視華靡豪縱事漠如也公丰姿凝粹氣貌純明內嚴而外恕議論若不可犯至于以文相接以恩相加未嘗不使人心恱而誠服平居善處窮約奉巳常薄待人常厚諸生有病而以槖中金託于公者曰萬一死願以歸吾親其死也或竊金以去公買金以付其親而終不言安南入貢以黃金丹砂象齒為私覿之禮公却之其人曰清白物耳公曰爾物雖清白我受之則汚也所至僦屋以居四壁蕭然晚乃積俸資買宅一區將以佚其老而疾亟矣公于經史百氏之書無不究極其根祗為文精深典雅東南遺老凋落既盡文章之柄悉歸焉及在朝廷施于訓誥者溫潤而有體志于簡册者確實而有徴詩尤簡古而麗逸凡所著有讀易類編若干卷內制集若干卷素履齋藁若干卷行于世工于筆札與趙魏公孟俯齊名徽仁𥙿聖皇后命以泥金書大藏經公應聘率門人前集賢待制班惟忠等二十人北上竣事二十人皆賞官而公不預第隨牒調輔教授一州後乃以文學政事昭𬒳主知而至大官前後從遊無慮數百人惟御史中丞王公士熙與馮公思溫位最顯其受業上庠而掇巍科躋膴仕有名于時者尤多不可遽數也始公較藝鄉闈臣溍誤辱薦名及公再主文衡臣溍遂忝預執事兹又獲載筆隸太史氏欽承明詔勒文公碑不敢以菲陋荒踈伏闕控辭謹拜手稽首序而銘之銘曰井絡之靈實鍾俊賢展也鄧公受材孔全公方盛年盤桓山澤翔而後集靡徐靡亟負其所韞時而出之學為儒宗政為吏師其學斯何蜚英文苑鋪張皇猷裁成帝典弘敷教道模範國人談經氊厦堯舜吾君其政斯何肅將使指扶善遏惡以樹風紀鼓之舞之士氣以振軺車所屆獄無冤民聖門四科公兼其二學以從政匪有二致國之老成天子所毗公不為起乘化而歸門生奉詔薦此樂石庶無愧辭過者必失金華黃先生文集卷第二十六
