front:
  text: 金華黃先生文集卷第三十八續藁三十五墓志銘臨川危素編次番昜劉耳校正
  hash: sha256:aff0777f2c021daef64f108edca34c348a54d6b6068aa11646f22c871ce66e08
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0503_SBCK_038-1a}
body:
  text: 嘉議大夫武昌路總管致仕張公墓志銘故嘉議大夫武昌路總管致仕晉寧張公以重紀至元之元年三月九日終于里第壽七十有八某年某月某日葬臨汾縣七里之原公之子九成以公嗣子九思所次行狀來言于溍曰九成之先纍世咸有仕祿而局於時與位弗克大顯逮我先君遭逢盛際乃以材自致踐揚中外餘五十年然不自表襮謹持文法參贊謀議未嘗出以語人布宣德化惠綏黎元有隂𬒳其賜而不知者事之可見僅僅一二而休稱美譽形于薦剡甚具窆石未有刻文無以昭示來葉幸為我序而銘之按狀所述公諱德榮字顯卿姓張氏世為晉寧人祖諱林仕金季積戰多至萬户戍葛壁寨引兵援蔡州軍敗見執伏節而死父諱義入皇朝任汀州路武平縣尹公既貴纍贈其祖亜中大夫同知河東山西道宣慰使司事輕車都尉並追封清河郡侯祖妣楊氏以贈妣李氏以封俱為清河郡夫人公少嗜書能通其大義尤習於國家故事慨然有志以功業自期年踰弱冠入福建平海等處行中書省為令史由福建遷湖廣從其省官征兩江叛蠻有功授承事郎本省檢校官事有未當必鉤托而釐正之丁外艱用御史中丞魏公𥘉薦起復尋升承務郎左右司都事紀綱列曹事無不舉轉承直郎出為寧國路宣城縣尹大江以南宣城素號繁劇户籍田賦視州邑皆數陪人多憚其不易為公盡心按職鋤剔其蠧弊而拊摩其凋瘵民有殺其兄子而託言死於盜者官為索盜數月不得公始至閲其牘曰此必叔殺之而妻與其謀訊之果伏乃叔報其妻且利其財而殺之也人以為神明歲適大侵道殣相望連數百里公振廩勸分境內獨無害父老相傳為口實部使者舉公五事備又舉公治行為諸邑最臺府亦交章論薦之擢朝列大夫陕西等處行中書省左右司貟外郎彌綸庶務多所禆益終南山僧作亂伏誅愚民多以詿誤當坐公驗其辭而探得其情免死者若干人召入除中憲大夫僉殊祥院事將嚮用矣上方勵精圗治思得良二千石俾牧逺入乃輟公以行拜亜中大夫信州路總管公因其俗而理之政尚廉平而遇事無所回撓有勢家子調屬邑令交權要為奸利莫敢孰何公一繩之以法令以罪去吏民恱服聲望翕然部使者言公材任清要不宜久淹外服未報而公遽援禮引年遂有武昌之命公既納祿而歸縱情物外夷猶自適凡若干年而逝娶關氏前卒繼侯氏亦以贈若封俱為清河郡夫人子男五人長九陽早卒次九思用公恩𥙷官今為承務郎袁州路同知萍鄉州事次九逹次即九成浙東海右道肅政廉訪司書吏次九臯女三人長次皆適刀氏幼適某氏孫男若干人女若干人公位三品冝賜諡于奉常立傳于太史其可托以不朽者不専繫乎銘然非是無以表封樹志陵谷孝子仁人之用心不亦逺乎銘曰繄公之先奮于伐功嗣世而興載疇民庸厥施未光寧不有俟公克承之以有顯仕乃選其勞乃升都司乃踐朝著出秉郡麾薦書交馳㳯洋華問鴻漸于陸盤桓不進幡然逺引邈乎髙風既壽而康遂以考終公之所履恩威兼備泰山豪芒存於軼序綿綿厥紹則熾而昌惟德之符久而彌彰矢辭鑽石昭揭墓道後公千年不尚有考奉議大夫餘姚州知州致仕范公墓志銘公諱文忠字煥章姓范氏七世而上皆家于姑蘇宋之中葉避地東徙故今為慶元之㝎海人曽祖公捷迪功郎監清泉鹽場祖仲宏太學生父泰之入皇朝以公貴贈承務郎嘉興路同知崇德州事母俞氏黃氏並贈恭人公黃氏出也幼失所怙兄弟十二人又俱早夭與妹相依以生母氏撫育備至稍長入則􅈬學出則膺門户事天性純篤事母能盡子道妹先于公五年而逝躬治其喪靡所弗周從父禹錫隱居授徒公嘗受業焉其殁也三子相繼而亡為卜善地以葬教其遺孤至於成人而授之以室遣其孤女五人皆歸于名門有挾閫帥之勢謀陻三湖為田瘠人以肥已者衆莫敢言公獨奮然以陳于省臺而湖得不廢人蒙其利大德十一年民飢為盜海瀕遐逺為害尤甚公手縛其渠魁十有四歸于有司餘黨竄伏閭里恬然功狀已上而未報俄有母憂服除中書乃以賞典奏用公為慈溪縣鳴鶴巡檢至大四年也公始至即捐私錢購民地立官署申眀法令而去其煩苛無賴之徒冒鹽禁以陷良民者為之屏息有盜殺一僧而取其衣盂之資以去山蹊幽阻盜無迹可尋公設計捕得之人以為神升主徽之歙縣簿同僚及郡邑官屬多以賄敗公獨無所顧以材取知憲府有疑事輒諉焉遷主吉安之廬陵縣簿廬陵習俗譁健喜爭素號難治縣民蕭甲與其子殺人以誣怨家劉乙公親涖檢視而窮䆒其獄遂置殺人者于法而籍其家受誣者以免豪右無不讋服先是𬒳郡檄市紅藍於江陵者率髙其佑而利其畸嬴公承命而往痛絶前弊平給其直之外得羡錢猶六萬餘緡悉還于官以廉能見稱于時調平江之吳江州判官郡守患賦役之不均專屬以推收事公謂是不可欲速必同輸糧之日吏胥咸在而拘檢之乃謂得其實後訖如其言而賦役以平嘉㝎知州管泉祖詣中書訴郡守踏灾田多虛冒指公為黨省臺𬒳上旨鞠問公先衆人力為辨白得直而泉祖竟以誣罔坐禁錮桐里巡檢獲竊盜十有一并贓仗送州公察其冤而釋之後果得真盜人乃服其眀允婺源靈順神祠遇瞿曇氏降生之日四方之人往往函香致誠富啇大賈因人所聚以為市行省檄公榷其征稅時朝廷方重迎賽之禁以貨至者殊少公既一無所私課入反加於前擢延平之沙縣尹下車未幾造義倉以備凶荒築社壇以謹祈報崇儒學以興禮讓豫章羅先生之裔孫受㕓邑下建書院以奉祠事公欣然如其請而助成之士莫不知勸公在官四載以年登七袠禮當納祿投牒徑去有識之士共歎其賢至家甫一歲忽感微疾戒諸子曰吾仕而未顯幸不墜前人之遺訓汝輩亦冝深體吾意吾所以名吾亭曰存耕者可不念哉既而却藥謝醫夷然瞑目而化至正五年八月十一日也享年七十有一階止承務郎六年夏有制授奉議大夫紹興路餘姚州知州致仕而公不及拜矣娶翁氏封恭人次沈氏髙氏子男九人長一民江浙等處行中書省檢校書吏次惟善元善逹善止善擇善復善師善處善俱未仕女三人適沈德純桑存善楊伯生孫男四人女四人一民等既遵治命以某年某月某日奉柩葬于某鄉桃花谷先塋之側且以公妹壻沈與道之狀來謁銘按狀所述公之治行多今人所難能雖所試者小未足盡展其然進退之際始卒無疪備福考終可以無憾是宜得銘乃序而銘之銘曰范望于吳自文正公支于海邦仕弗顯融積久必發逮于公躬取彼凶渠克有俊功乃著官簿乃疇民庸禮進義退邈焉髙風有隕自天命秩則隆不居其有尚飾乎終蕃蕃子孫餘慶所鍾式敬爾承保兹丘封江浙官醫提舉張公墓志銘故成全郎江浙等處官醫提舉張公諱去非婺之東陽人世祖亮與宋政和中舉八行賜號冲素處士曰志行者實兄弟行殁葬縣南乘驄鄉木掘嶺荷塘西原子孫因家于荆浦父諱潤以修德尚義為鄉善士母顧氏有子五人公其季也少警敏有大志既葬而隱于醫其為術深超徑詣精驗如神然不専于為人巳疾尤善以太素脉言人吉凶貴賤壽夭率皆竒中公自號實堂人罕用為其稱而直以藝配其姓稱之曰張太素云至元二十有六年大盜竊發于鄰郡蹂踐縣境尚書左丞史公弼宣慰浙東督諸軍討捕之一夕氣填膺逆上結塞脹滿寢食併廢公授以匕劑立愈因留置幕下及移屯永康縉雲皆預在行將卒道病與藥輒效事平計功行賞當得官公謝非其本志不就乃署公本郡官醫提領史公入朝或詢以江南名醫必首及公且貽書招致之大德五年公至京師而史公由僉樞拜平章政事行省江西後二年召還樞庭見公歡喜陛對亟薦公于上李叔固丞相時領太醫奏用公為尚醫奉御食五品祿明年扈從上亰阿忽都楚王疾劇有旨命公往視之王既平復入謝上嘉奬焉又明年王𬒳命巡朔漠廽次和寧王孫明安帖木兒有竒疾衆醫莫知所為遣府僚孫司馬者詣闕請輟公以來公以體氣漸衰不任逺役懇辭上再三勉諭出尚方襲衣重裘安車善馬資之以行仍勑有司厚贍其家公既至施之針焫投之湯液閲月而疾良已王為之刲羊刑馬大㑹宗戚餞公南還且遺以交鈔五千緡白金百兩內謁者張哥司徒復言于上及東朝加賜交鈔五千緡文綺四端以旌之由是聲動朝野太醫剡上其名于中書以聞擢江西等處官醫提舉階成全郎某年也公過家上冡即抵官下居三歲職事修舉省臺交譽之以秩滿去官僚屬皆泣拜而别公性溫厚家食之日待鄉鄰有恩意以疾來告者赴其急無難色方將優遊于一丘一壑以怡神引年而江浙之命下矣到官數月俄拂衣而歸遂以天曆元年三月二十有四日卒于家享年八十有三重紀至元某年十二月某日葬荆浦之北原元配何氏繼室馬氏皆前卒至是合祔焉子男二人長安道何氏出終于杭州路醫學教授次至道馬氏出前昌國州醫學教授俱能襲父業以醫名女一人適厲某孫男六人女二人曽孫男五人女二人公之葬已久而墓上之石未刻于是至道以狀來取文為銘且曰先人在亰師時志道與先兄留治家事凡先人所遊從與治療之曲折言人禍福之徴應皆莫能知其詳所可知者僅若是而止先兄因赴銓謁參知政事張公某公言昔若尚少求而父切脉即知吾後當居政路不自意沗竊至此而父可謂精於其術者也今豈可復得哉由公之言而推其所不及知闕軼固多矣獨先人自序太素脉訣出於蜀之青城山王卧仙翁而歙人張子元子發嘗校其書傳至楊上善而豫得之始奏請以行于世其端緒之相承可槩見也昔劉歆序七略醫經之言人血脉經絡隂陽表裏者黃帝扁鵲白氏內外經及旁篇七家而已蓋太素之書猶祕而未出故無得而述焉庸備著公所序于銘文之首庶史官傳方伎者有考云爾銘曰太素之學古有别傳卓哉張公窮幽極玄爰取諸身以知來物活人之功抑其仁術帝謂斯人醫師之良卑以制書歸榮故鄉幡然勇退遂考終命前知孔灼順受其正公則逺矣公書具存潜發明微在爾子孫謁文訂實推述原委薦諸石章用禆信史江浙官醫堤舉葛公墓志銘父諱應雷字震父世為平江人其先仕宋季而未顯宣義郎思恭于公為大父進義校尉從豫于公為父公少從季父某受周禮為舉子業國朝取宋場屋事廢公無仕進意若將終身焉𥘉進義府君業儒而于九流百家靡所不通尤工于醫公既不得以文學自見退而取家庭所聞靈樞素問諸書之說研窮精核見世之言醫者執方拘論而莫䆒其源委多與古法背馳于是推五運六氣之標本察隂陽升降之左右以㝎五藏六府之虛實以合經絡血氣之流注而知疾病之候死生之期其處方劑施砭􅌊率與他醫異以此名動一時浙西提刑按察司判官李公某中州名醫也嘗自診視其父疾復以咨决于公聞公言父子相顧駭愕曰南方何以有此耶則盡出所藏劉守真張潔古之書與公討論所見無不吻合江南言劉張之學自知始公所著書大旨以為醫當視時盛衰劉守真張子和輩值金人強盛民悍氣剛故多用宣泄之法及其衰也兵革之餘飢饉相仍民勞志困故張潔古李明之輩多加𥙷益之功至若宋之季年醫者大抵務守護元氣而不識攻伐之機能飬病而不能治病失在不知通其變也書凡二十卷名之曰醫學㑹同摘古語扁其齊曰恆蓋用術貴于通變立志則不可無恆也四方士大夫聞公名奉幣馬迎致之無虛日延譽益廣大德十年用薦者𥙷平江路醫學教授治廟宇闢土田教育其弟子貟後多為良醫尋用省臺交舉擢江浙等處官醫副提舉遂為其提舉階自醫愈郎升成全郎延祐五年也公前後在官十年其學大行于東南至治二年丁母憂而歸居喪過于哀毁如不欲生竟以三年春正月十八日卒于家享年六十娶盧氏宋某官銊之孫女子男二人長震孫先五年卒次乾孫女一人適胡就矩亦已卒孫男四人公資禀和粹識量明逹外嚴而內寬事親孝而友愛其弟鄉鄰有急拯救之如恐不及人以長者稱焉乾孫既以泰㝎元年春二月二十八日奉柩葬于吳縣志德鄉望野墩先墓之次後十有三年始以故宋進士顔先生堯煥所為公行狀屬豫為之銘豫觀前史傳扁鵲倉公華他皆歷言其已試之效先生狀公行皆略弗著惟論次其所以為術之本可謂善序事者也是用悉取而備陳之公雖寓迹方技而未嘗廢詩禮之傳遭時承平復以經術網羅天下士獨周禮為無所用乃俾乾孫學為詩以應有司之求乾孫篤于學而敏于文庶幾能成公之𥘉志者銘曰猗葛公抱一經訖不試以術鳴帝有命公是膺樂其職不近名尚有子蜚儒英際聖時伏必興貤茂恩耀泉扃發其兆在兹銘朝列大夫杭州路總管府治中致仕范府君墓志銘府君諱景文字煥卿姓范氏其先京兆藍田人髙祖諱昻霄金大安中進士歷官同知靜難軍節度使兼邠州觀察使終于正議大夫吏部郎中入國朝徙居真㝎以儒占籍曽祖諱元泰從仕郎解州判官妣張氏封宜人祖諱天祐汀州路總管府經歷贈奉議大夫真㝎路趙州知州驍騎尉追封元氏縣子妣李氏封元氏縣君考諱忠朝請大夫僉江南浙西道肅政廉訪司事妣白氏樞密院判官某之孫女封髙平郡太君府君生長官家多所見聞而有志于學人知為逺大之器至大戊申集賢以茂材異等薦于中書署真㝎路儒學正未赴皇慶壬子辟廉訪司掌書司官分按嘉興建德鎮靜不苛而風采凛然府君之捭益居多延祐乙卯入江南行御史臺為察院書吏臺官有貴倨不法者衆皆側目而莫敢言府君獨奮不顧白于御史大夫明數其罪劾而去之同列咸敬憚焉從御史分巡湖廣黜憲長之徇私敗政者一人郡縣長吏之貪虐者悉望風解印綬去所至宣布教條更新弊政御史賴其贊助交章舉之已未行宣政院辟充令史錢唐兩大剎因爭地致訟有司莫能直事聞于朝遣宣政院狗兒參議公涖治焉府君為具其始末而辨其是非事遂决用參議公薦入為宣政院掾史至治壬戍授將仕郎杭州路臨安縣主簿行中書省奉詔擇廉幹官分督未絶事府君首膺是選至江東㝎期限之逺近而責其稽違量事情之輕重而求其平允民無不畏服既還復俾監辦杭城稅課甫三閲月𥙷其元虧二十餘萬緡增羡一十餘萬緡丞相脫歡刺罕公嘉其能泰㝎甲子辟充本省掾史尋升提控天曆已巳遷從仕郎松江府知事奉省檄監收秋糧且俾監裝海運積出餘糧若干石用參知政事胡公薦擢承事郎江西行中書省理問所知事未上本省辟充掾史尋升堤控御史刷磨諸曹案牘無可指摘知出于府君與闔院御史交章舉之至元戊寅除承直郎平江路總管府推官平江劇郡多大家素號難治屬州豪民有誣平人為盜厚賂官吏而抵其罪者事覺為物色得其真盜而昭雪焉府君治尚嚴明而本于仁恕平心易氣察辭燭理凡所鞠問悉得其情由是獄無冤滯見謂稱職至正壬午遷承德郎湖州路總管府推官引疾祈間遂以朝列大夫杭州路總管府治中致仕癸未十月二十四日竟以疾卒于平江寓舍享年五十有九真㝎先塋逺在數千里外自曽祖以下俱葬于平江路長洲縣武丘鄉白蓮橋之北原諸孤以是年十二月草八日奉府君柩祔葬焉君持身廉介不妄取豫而撫宗族孤幼助其婚嫁一無所靳有詩文若干卷曰覆部集當代名公序其篇首咸稱許焉娶李氏封某郡君子男二人長公琇從仕郎衢州録事次公琰慶元總管府吏女五人長適曹州曹榮祖次適懷慶録事宣德劉大用次適鹿邑縣尉衛輝田秉仁次早卒次適東廉訪司書吏廣平牛師說孫男七人女三人府君葬巳久公琇以銘來屬謹托狀所述序而銘之銘曰天之降材必于名門用而不匱如水有源府君之先世有仕祿逮兹五葉是似是續直道而行蹇蹇匪躬剛而不折綽有父風邅回外服隨牒平進名曹劇職恢恢遊刃小試之效泰山豪芒未老而傳奄其淪亡家聲不墜由子克肖咨爾來昆是則是效奉議大夫同知諸路金玉人匠總管府事傳公墓志銘故奉議大夫同知諸路金玉人匠總管府事傳公既卒且葬三十有六年而冡上之石未有刻辭公之孫亨貞皆嘗從豫逰及豫承乏居國學又適在苐子列而亨取上京鄉薦苐一豫所與聞也緣斯文之雅故將其父命以隱君嚴威之狀來謁銘按狀諱進字仲與其先燕人祖曰德父曰榮祖當金之季始去燕居雲中晦迹弗耀而獨稍出其藝以自見彼遇憲宗於和林錫金符長其同列六十人以備宿衛世祖建國開平驛致其家屬因占籍焉公生而頴異氣貌甚偉孝友出於天性與人交以信有士君子之風至元二十五年世祖選用世勞以為金銀器盒提舉久次當改調而儕輩中無以易公大德三年官將仕郎八年官承事郎凡再陟其階俾居舊職十一年乃遷奉訓大夫諸路金玉人匠府副總管尋以至大四年升奉議大夫同知府事公服勤三朝每制器以進無不稱旨賞賚優渥不可勝計仍特為降璽書存護其家實異恩也至於裁抑竒巧崇尚質素又未嘗不寓執藝以諌之意識者賢之皇慶元年正月十九日以疾卒于官享年六十有一世祖之㝎都于燕也公慨然曰燕故吾土祖父魂魄能無思乎吾歸其時矣乃卜居今京城積慶里而奉祖父暨母吳氏之柩葬城西十里樊村漆園之原公卒遂葬其墓次夫人陶氏宣德人有懿行善理其家後公二十三年卒元統二年三月二十日也其年四月四日合葬焉子男一人曰賢佐仁宗欲使疇其先業特授承事郎陽山瑪瑙提舉今以纍遷為行諸路金玉人匠總管積階嘉議大夫孫男三人亨以鄉貢擢第為將仕郎太常禮儀院太祝貞以國子釋褐為從仕郎章佩監知事庸國子學生曽孫男二人女二人蓋金之將亡中原雲擾衣冠世族強者戮弱者俘為自全之計者或乘時崛起爭相長雄而使人莫能犯或自混于雜流而取容一時然恃其力而以暴陵人有仁心者所不忍為惟百工之事有以利用而無害於義故君子寧屑為之公後雖藉是有位序而恆若以為歉嘗語人曰吾家再世遭時艱虞而隱於一藝豈往而不返者耶今天下一家死生相保而吾祖父乃不及見承平之盛賫志以殁子孫誠知之必有能自拔以昌吾門者矣于是陶夫人亦力贊公以教子為務嘉議公之官于金玉行府也留錢唐久之故所知位丞相出臨江浙略勢分而與居與遊視疇昔無異從容宴語未嘗輒及其私慎重如此得於家庭者可知矣亨與貞又皆生盛時蒙菁莪豐芭之餘澤而以儒起家公至是復何憾哉序而銘之庶以慰公於治下云爾銘曰九官濟濟疇若子工帝曰咨垂實先䕫龍降及中古為民者四人思擇術貴德賤藝惟公父子靡適弗通出此入彼與時汙隆曰豫之先家有詩禮夫豈世官倉庾為氏亦既有時有子有孫迄用一經守為顓門兆兹幽虛尾箕之野列星之英後有興者奉訓大夫武昌路諸色人匠提舉􅃮君墓志銘君姓􅃮氏諱榮祖字仲華古有􅃮氏而孔子弟子􅃮雕開之後亦或為漆君蓋其裔也曽大父世昌居江之瑞昌大父文興徙興國之永興又徙太平之當塗而占籍黃池父永成宋將仕郎君仕皇朝歷黃池建康杭州三織染局副使稍遷武昌路造作副提舉遂為武昌路諸色人匠提舉𥘉階進義副尉用先賢子孫改將仕佐郎纍升奉訓大夫年踰六袠輒致仕而去君少敏於學敦行孝悌將仕君殁負土成墳松柏皆手植與兄弟分財均兄及弟前卒經紀其家事無遺力若未始異居者尤喜周人之急歲饑則為發粟病則與藥死則與棺里有叢冡積久暴露為聚而化之如浮屠法鄉鄰多賴焉居官所至克修其職業執藝事者咸精其䏻其在建康以貢輸詣京師者再皆蒙恩錫賚甚厚人以為榮惜其所處非要地品級已優而績用未顯也異時將仕君遊青山之保和菴以為兹謝公玄暉舊宅不宜使久廢不治買田二十畒卑其徒至君又益以田四十有五畒而祠將仕君於廡下里人羅君記之將仕君封樹在新埂去家僅一里所君謀於兄弟割田若干畒以給歲時汛掃之須前進士汪君記之瑞蓮生墓前方池中前進士夏君記之興國先隴鄰於雙泉寺君捐錢千二百五十緡為興茶利其徒創置祠宇守視墓域惟謹故集賢直學士貢公記之君嘗延羽流為將仕君藏醮事感八鶴來下述黃籙儀因著其靈應之實今天師張公玄教大宗師吳公序之故翰林學士承旨姚文公之使江東也愛君沈靜寡言進退間雅為製其號曰可心其為一時巨公引重如此君之才雖不大見于世觀其所與而其人可知也同里廣教寺法堂久未建君歸自武昌慨然以營造為已任閲兩寒暑而堂成用錢以緍計者若干一出於巳仍施田百畒以資他日繕葺之費住持僧德逺以瞿曇氏示現之日為登堂說法緇白四衆咸㑹君忽顧謂其子興宗曰吾事已畢將行矣明日竟以疾不起聞者歎異焉君生於前至元辛未二月十一日卒於後至元丙子四月九日得年六十有六明年丁丑八月十日葬新埂將仕君墓之左娶史氏次索氏子男一興宗也廕授寧國路織染局使女一嫁故相吳許公之玄孫鍇孫男一女六其葬也興宗不逺四千里俾以狀來乞銘乃按狀所載序而銘之銘曰繄君之先惟􅃮雕氏受業聖門而不苟仕君于所祖匪襲其迹仕不擇祿由由自得孰遄其歸年未及謝展也逹生委順而化仕而能止沒宜有後刻辭石章式示永久江浙行中書省左右司貟外郎致任陳君墓志銘君諱遘字謹之姓陳氏其先自婺之東陽徙台之臨海曽祖諱夢蕳某官祖諱仍某官父諱孚入國朝以世祖皇帝由翰林國史院編修官授禮部郎中副吏部尚書梁公曽使安南陛辭賜五品服佩金符以行既至詰其世子陳日燇以不廷之罪且却其重贄辭直而壯日燇震讋願遣陪臣入貢使還稱旨拜翰林待制兼國史院編修官上方欲置之要地而公遽請外歷建德衢台三路總管府治中積階奉直大夫政績之詳具如楚國程文憲公巨夫所為碑銘母顧氏封臨海縣君待制公殁時君年甫十四執喪如成人弱冠用廕補台州録事判官台實鄉郡人以其年少頗靳之君延見父老舊故情文備至或干以私輒不復與之接臨事無微不察吏莫敢侮奸民為之斂避乃皆歎服曰勿齊有子矣勿齊待制公自號也秩滿遷將仕郎常州路總管府知事冨家史氏築大墟環小民田其中強委錢貸之覬子本相侔而有其田民不肯受則因治田與之閧毆傷其七人縣吏受賕反欲加以罪民訟其冤君白郡長二召吏責之乃釋𬒳誣者而致史于法民間祖賦許自輸而禁團結舊制也豪民多冒禁而利其贏餘君申眀之則相率行賄賂假權勢沮撓焉君不為動禁之愈厲公私咸以為便居二年以母疾棄官歸養民挽留不能止乃樹碑以頌去思凡為碑者五其遺愛在人多矣君既抵膝下而母竟以疾弗起居哀毀如不欲生服除猶無意於仕家食者十年調集慶路江寧縣主簿不赴改慶元路總管府知事慶元為浙東帥閫治所事至繁夥有自臺端來居帥座者奴視司屬人畏其氣𦦨凡所諭指意多曲法以阿之君檢飭吏櫝使無間隙可入有私託則據法以對度不可屈乃為之霽其威嚴郡長二每事必資君而後决君於民之冤者直之吏當次𥙷而貧無資者循其資序而用之或來謝輒弗納曰我奉法耳非有恩於汝也郡學有沙田在海島石同山中土豪擅魚蟹之利歲輸緡錢八千而恆負其半君奉憲府令徴理之盡取其錢以具祭器諸生立石以紀焉所受圭租平其斗甬而令民自操槩無他官倍取及左右侵牟之弊莫不負其餘糧而去居四年擢江浙等處儒學副提舉進階文林郎杭俗素華靡士子習於浮薄君擇宿儒有學行者為之師以作新之省曹書佐多起於閭閻不解文義俾君試驗君從容對曰此輩若知文義當自為士肯傭書耶業已命試取文意不背可也賴君言而獲并容者甚衆居無何俄病渴引飲動一二升閲數月病作瘍醫不能為遂移疾請納祿授承直郎江浙等處行中書省左右司貟外郎致仕命下而君不及待矣君卒於至正四年八月五日享年四十有九以九年八月十八日葬所居太平鄉後嶺之原娶葉氏尚書右丞南陽郡文簡公李之孫知賀州朝列大夫同之女封恭人子男三人長曰樜某書院山長後君四年卒次曰集衢州路龍遊縣靈山巡檢次曰楧左翼屯田萬户府儒學教授女三人長適處州路石門書院山長四明袁曅翰林侍讀學士郡文清公桷之孫次適將仕郎太常禮儀院太祝藁城董守緝翰林學士承旨趙國忠穆公文用之孫次適建寧録事判官同郡周士潚集賢待制仁榮之子孫男三人女若干人君幼聰敏日誦數百言非歲能屬文中年䆠遊所至晝接賔客夜考經史訖能承其家學君丰神凝整外剛方而內和易每謂居官處事求中于理何至過為深刻耶故其馭吏使不可犯而已涖民則思有以便安之喜周人之急而不自表見鮮有知之者待制公有別業君重加繕葺扁其室曰慎獨而遊息其中歲時集宗人徘徊竟日以示終身之慕焉𥘉奎章諸老交薦君擬奏辟以為屬而君適有內艱浙東部使者或舉君可居館閣或舉君堪任風憲或又以君應守令之選朝廷既處君于儒臺而時宰又雅知君甚禮重之今天子方妙東儒臣纂修三史遂以君名剡上冀國董忠肅公守簡時方總裁史事及為中執法力官君廉慎而明逹宜署臺職旦夕且向用而君逝矣識與不識咸悼惜之曰近世閥閲子弟率以縱逸墜其家聲君少而孤未壯而仕乃能卓然自立如此千百人中一兩人耳而止是乎君葬後五年楧以君甥壻黃池稅課副使楊孝原之狀來謁銘載念君與豫同時筮仕于台之司縣别後音問邈不相遏及豫忝預聞學政去官間一歲而君繼至竟莫能叙契闊詎謂君遽先豫死衰朽餘齡動增感愴何忍執筆而銘諸専價蹐門靡容固拒書辭繁猥不知所裁銘曰台之陳氏故為望宗揚英振華肇自先公在世祖時朝多俊彥頴出其間茂膺上眷鋪張帝業潤色皇猷揉彼蠻方敬承天休功成弗居盤桓外服委祉於君以有世祿劇曹上幕罔憚其勤乃陟儒臺乃柄斯文人皆望君入對召節發舒素藴光昭遺烈胡嗇不年而遏其施尚克有子圖永其垂不以豫耄俾専述作鄙言匪腴聊慰冥漠上海縣主簿吳君墓志銘君諱福孫字子善姓吳氏其先有為宋執政者曰正肅公育自建之浦城徙汴之新鄭南渡𥘉有自汴之新鄭徒武義者曰克立建君世矣父東又自婺徙家于杭故今為杭州人母施氏君生而俊爽稍長強學好修元貞元年用浙西憲使東平徐公察舉補嘉興路儒學録遷寧國路儒學正江東憲司治寧國涿郡盧公臨按之暇略其勢分而與之遊數以詩篇相倡答君既書再考例當序進絶口不自言前代名流及時之雅望若戴先生率𥘉仇先生仁近胡先生汲仲鄧先生善之咸加愛重莫不折行輩與之均禮魏國趙文敏公待之尤親密文敏以善書名天下慕而效之者往往逼真然罕有若君能得其早年楷法之妙者君兼工于篆籕文敏極稱許之皇慶二年詔起文敏入侍講于集賢挽君俱行中朝賢士大夫禮遇甚至君泊然未嘗有所造請至治二年乃以教官借授潮州路潮陽縣青洋山巡檢遐荒之地縣長二久缺君攝縣事獲強盜之捕誅者八人脫平民𬒳誣為盜者若干人而獲其真盜者若干人廣東憲府有疑獄多以諉焉未幾移疾而歸至順二年赴選集于京師某月某日天子坐奎章閣阿榮大學士以其所作小楷書數萬字上進因得召見巙巙學士方侍書于閣中前奏曰臣濫得能書名如吳福孫所書雖臣亦有所弗及上頷之命侍臣引金鍾酌酒以賜將用為閣職有沮之者而止今上皇帝至元元年調常州路儒學教授君氣岸素髙又在師儒之位不肯為諂曲以事上官竟坐是去改調嘉興路澉浦務稅課大使君承命欣然就職殊不以為歉也晚益務恬退足迹不涉逹官貴人之門日與方外大老玄覽王真人及名公之歸休弗仕者湖南帥于公有卿道州守徐公叔清翰林次對劉公時中徜徉湖山間不復以仕祿為意至正六年銓曹考其資厯當升授將仕佐郎松江府上海縣主簿到官之始歲遍大旱有禱立應遂為豐年理民田為豪強所據久而不歸者諭止婚姻之訟積數歲不决者他利害有當興除方次弟舉行俄奉省檄詣溫台兩郡臨給􅐭場工本七年秋執事于鄉闈甫撤棘復俾馳傳督閩中稅賦以疾還上海八年正月十三日卒于所居之𪠘舍享年六十有九以某年某月某日返葬錢唐縣欽賢鄉西漠花塢先墓之西娶唐氏宋朝請大夫天麟之孫女前五年卒合葬焉子男一人肅女一人適冝興嶽枋早卒孫男一人繼善君明敏出於天性豪邁不羈談辨絶人娓娓不倦好客之名聞于四方自儒釋老氏至於岐黃汜勝之書無不讀嗜古彛器法書名畫其書篆施于金石為尤冝奉贄幣求之者無虛日禮部尚書太不花嘗為扁其所居曰清容軒因自號清客野叟所著有清容軒手鈔若干卷樂善齊集若干卷古文韵選若干卷古印史一卷藏於家君入仕時年甫十有六至四十有三始被初命及出佐一縣已六十有七矣間一歲遂不起士患不遇君可謂有所遇否乎後來者居上而君僅止於斯天乎人乎肅以狀來謁銘謹托其所述附以平昔所知者序而銘之銘曰先發而後至進難而退易不汲汲於富貴類依隱以玩世鬱鬱而不衰者浩然之氣俯無怍兮仰無愧不贏於躬兮來者之卑之始就職君謂數之為術至矣而未始外于理舍理而言數非所以為訓乃為諸生發揮先儒性理之說聽者無不恱服棟宇之摧剝及祭器之敝壞者捐俸資而新之學廪則擇人以司其出納而一無所問秩滿當主教列郡既上名中書未調而君屬疾臨終戒其子勿為惡兄弟宜相友愛勿有所爭語不及他家人以藥進君曰母苦我俄問日早暮家人曰日將中矣遂奄然而逝至正八年某月某日也享年五十有八以其年某月某日葬某鄉某原娶張氏有子男一人曰日新播州儒學正女一人適余珽再娶周氏有子男一人曰又新女二人長適大都路雜造局照磨吳顯已卒次適汪簡孫男七人女二人君舉止莊重織量淵深自少嶷然有成人之風同里知黃巖州張君與紹甚器重之故以女歸焉君平居孝友弱冠綜理家務謹守成法父沒無改於其道父所建義孰祠郡王於其中始居貴溪者也君敬承先志益買田以共祠事翰林侍講學士揭公記之弟死其孤甫五歲教育之如已子處宗族鄉黨所施恩愛禮讓各適其當與人交若淡簿而推誠相與雖久不衰不喜言人過失待人無疾聲厲色驕慢之氣而人自敬莫不推其長者徭役之不給者助之紛爭之不决者解之人貧及歲饑則散財發粟以周之有作屋而侵其地者據其山以葬者竊取其林木以為材者皆忍不與較其寬厚如此君之葬也其諸父中為國史院檢閲官適與豫同在史局代為日新等奉常德路總管張公熙祖之狀來謁銘豫不得辭銘曰惟數與理未始相離流而為術昧者𡵨之卓哉倪君不梏于數消長成敗灼知其故物理之微驗諸一身其行其止與時屈信秋江黃君墓志銘君姓黃氏諱一清字清夫徽之休寧人初李韓公以中書平章政事知貢舉某用門生禮拜公里第君在焉别去二十有五年而君之子晉踵門泣且言君巳沒持黃竹巡檢程君之狀以銘為請按狀君曽大父拱大父振逺並能施惠其里中見謂長者父元圭蚤卒母吳氏守節自誓內事舅姑外資諸子使為學君亦痛自飭勵期無愧於古人年逾四十始逰京師久之無所知名洎李公以舊學相仁宗賢才彚進而君以母老不忍去母告之曰汝父夙有志四方而今已矣汝其忘之乎君乃幡然復入京師謁李公君古貌長身鬚髯如㦸寬衣髙冠容止簡率又作吳語左右多目笑之公望見大驚異即下執其手延之上座時公門下皆名人顯士而君以布衣居其間恆與公亢禮坐客莫出其右隱然名動京師君以秋江自號而李公自號秋谷遺君詩有君釣秋江月我耕秋谷雲逃名君笑我伴食我慚君之句朝野傳誦滿口內翰趙文敏公既寫以為圖且謂不宜使清時有遺才力薦之當路諸公以君深於易通隂陽家言欲用為杭州教授君笑曰吾以布衣締交相國榮孰大焉持此足以復吾親矣竟辭歸築山房摘李公詩語為扁名以見志公欣然遣以錢助之宣徽王公奉使江東過君山房因圖其隱居十景以去其為當世所重如此君嘗以母病籲天願減已年益母夀夜夢人語之曰有老嫗來當得藥明日果有老嫗來授以啖蜜法而無從得蜜君往乞諸旁近村民家還遇虎君駭曰我死不足惜如母何虎熟視逡巡而去集賢大學士陳公言是家母為節婦子為孝子冝旌表以風四方事下有司署其家及里門皆曰節孝國朝徽人得旌表者自君母子始其後君有母之喪赱京師乞銘於閣學虞公以葬張蔡公時當國問士於韓公式以君對且要與俱詣公恨相見之晚即欲擢置館閣君以葬母辭公知不可奪則為詩以送之終喪復至京師遍謝前為銘及哀挽者趙魯公在中書素善君卒欲用之集賢亦舉君為儒學提舉君歎曰吾親在且不仕今尚須祿仕耶遂去入玉蓮山中構精舍將老焉故人完顔君守贛奉幣馬迎致郡齊居歲餘俄思歸艤舟未發適值始生之日飲而歡抵暮疾作旦起奄然而逝至元三年八月九日也享年七十有五贛守為具衣衾買棺以斂而二子從行者奉柩以還卜某年某月某日葬藍田山之原娶張氏前十三年卒子男五人曰俊淮安屯田副提舉亦已卒曰晉有家學今為徽州教授曰紹為仲氏一鶚後曰勝曰芳女二人長適行金玉總管府知事汪洪次適俞榮孫男五人女三人君性踈曠好客不厭處鄉鄰有恩不喜言人短而常推禍福成敗之幾開人為善其在京師所主皆朝廷重臣每有所咨訪未嘗出以語人所薦士亦不以為已德纍朝元老臺閣名公至於卑官下僚新進之士無不與之交其死也無不悲之某竊觀昔人去就之際出者或未能無纍於物處者或專務使影響昧昧不聞於人此二者皆過也若夫進不徇人退不絶物如君者蓋鮮矣而某安足以知之姑托狀所述為之銘以紓其嗣人之哀思云爾銘曰士之懷才難得者時逢時之來患莫已知亦既有時又有知已胡有不為而止於此處非吾介出非吾通自信不疑卒蹈厥中發揚在上其藏在下銘以昭之用慰來者養齊蔣君墓志銘杭為東南一都㑹其民率多藝善貨殖市區相屬如鱗次意必有若昔之大隱者寓迹以自混於其間以豫所聞蔣君殆其人乎君既死且葬其子元龍介前進士汴梁段君以狀來謁銘豫雖不及識君而君豫所知也銘固不得辭君名景世為杭人蔣氏故宦族而君之先獨弗仕至君遂學為醫然不專以其技自用恆蓄善藥為丹齊湯餌以售於人取嵇叔夜養生論所引神農氏語以養齊扁其藥室其製藥也自山澤來致其物者必以色味參諸圗經非其地崖及采暴之時弗苟取也銖分之等搗治爁炙合和之宜必本諸方書小失其度輒弃去弗苟用也言醫者兾得善藥輔其術教病家求藥必之養齊自達官顯士閭巷小夫至於旁州比縣之人無不知求藥於養齊者故其室無留藥日役數十人藥猶不給或持錢蹐其門纍日乃得藥不以為愠杭之業於藥者千百不啻莫敢與之齒也凡學於君者多良醫而食於君者皆良工云蓋世之知君如此君之修於家者世未必盡知之也君平生自奉無輕裘肥馬而於親交里黨之乏絶賙恤之無少靳其拊人以恩而於子弟家僮之微過每對尊客斥責之使知愧以自厲元龍為人恂恂有父風家庭之教也天師太玄子嘗為君書養齊兩大字而前太常博士東陽柳君記之以為君養於內者有其本其言良信此豫所以意其必有隱德也君生於宋寶祐三年九月一日卒於今天曆三年四月九日夀七十有六其年六月十六日葬西湖上南山之仙芝塢娶管氏子男一人元龍也孫男二人女一人銘曰漢有韓康唐有宋清猗歟蔣君卑不近清之利髙不近康之名庶幾古之中行者耶松溪縣丞王君墓志銘君諱嚴字敬之姓王氏處之麗水人既殁且葬其女孫之壻葉渭以狀來謁銘豫之鄙陋固無所辱命焉其來也不憚六百里重岡復嶺之逺躡蹻走風雨中浹旬乃抵豫舍下其望豫厚矣誼不得辭按狀王氏系出江左今占籍麗水之雲和鄉者或雄於資或登朝致通顯最為巨族宋迪功郎時中君五世祖也曽大父儀大父圭父克寬俱晦德弗耀君少負俊材善記覽以能賦有聲場屋間咸淳末名賢書上春官未第而德祐失國君與伯兄挺並用福建宣慰使李公玨薦𥙷官挺為福州路閩清縣尹而君為建寧路㳂溪縣丞自以不能隨俗俯仰命下拜而不赴君性孝友平居無疾聲厲色而治家肅然有條不嗜酒而好客務盡其歡乃巳遇後進之士以禮有所問難輒口占答之未嘗以肥田廣宅侈於自奉而樂周族姻里黨之急細人之家無以為養生送死之具者多賴焉歲凶發粟必下其直越中之飢流民相率而至悉以君為依歸所居旁曰梅桞市當甌閩往來之衝行者苦其地險惡君為作石路千餘尺人以為便浮圗老子之宫有廢不治亦卑以錢使一新之其嗇巳𥙿物見於前進士葉君現所為積善堂記部使者分按屬縣聞君風誼咸為賦詩或就見而存問焉君晚中末疾逾年稍間巳而疾復作子若孫以藥進却之曰生寄也死歸也吾年既耄可歸矣夫閲數日夷然而逝君生於宋寶祐六年八月己丑卒于今至正二年七月戊戌享年八十有五葬以四年二月丙午墓在其家北十里天堂之原娶梅氏蚤卒遂不復娶以閩清之仲子邦彥嗣女二人適潘璹梁祖壽孫男三人勳烈炫女一人壻即葉渭為邦彥來謁銘者也曽孫男五人女二人始君冠而以敬為字因以為齊居之名觀君於死生之際瞭然無所惑亂殆有得于先儒所謂常惺惺法乎是可無愧于名其齊者矣銘曰士患無時亦既有逢盤桓弗進卒逸其躬利澤在人所施必豐奚必有位乃為顯融戰兢自持以成其終刻文孔昭表兹堂封金華黃先生文集卷苐三十八
