front:
  text: 金華黃先生文集卷苐二初藁二五言律詩臨川危素編次番昜劉耳校正
  hash: sha256:7d8ad04e089c6d99bf55966c4f323db637d65cf56024ca2f72290cf571e17ec5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0503_SBCK_002-1a}
body:
  text: 寄方韶父先生牢落江南賦知音寄渺茫鹿麋行處有芝草蘿中香遙興滄浪濶悲歌白髮長平生今古淚滴破緑蘿裳雨二首兀坐九十日雨聲殊未休花時翻益睡茅屋不禁愁生事吾何望春寒晚故留江波青滿眼萬里付䨥鷗泥潦今如此出門知路難蓬蒿春自長桃李夢曾看未覺龍公倦誰憐燕子寒青燈耿蕭瑟千載入憂端雪急雪下不止朔風終夜鳴飢蟲應蚤蟄老鴈故南征生理真何計沉吟獨此情山中歲酒熟不飲竟須傾送友人鄉路三百里獨歸衣正單涼風紫洲水斜月白沙灘燈火期方逺關山歲欲闌倚門應望汝莫漫駐征鞍寄友人憐君山水意局促守柴扉故國悲秋草涼風滿褐衣滄洲斜日晚白社幾人歸寂寞分遙念天寒木葉稀秋懷五首天末雲猶玄山中歲欲徂周流吾道在嘆息古人無野鵲疑秋樹新駒怯暝途蒼茫念同志微薄忝為儒對酒髙天豁登樓落日曛亂蟬悲暮葉老雁赴長雲落魄稽中散栖遲鄭廣文身名竟如此碌碌汝何云稍稍秋河落姢姢宿露微天清江不息野迥樹相依回首狂歌數經心昨夢非流螢無思極巧入絳惟飛仰古嗟無及關情極可哀禰生才見忌賈傅直為災丗肯憐樗櫟吾曾悔草萊小詩聊戲爾何乃併生猜風雨仍搖落江山且滯留懶從生事拙間惜壯心休弱􅟵縈欹石空槎卧洑流興懷到微物丗故劇悠悠柴荆赤日薄烏帽柴荆無㝎棲可能詩似錦乍取醉如泥薄業慙漁艇深衣逐馬蹄蕭條江海興芳草故萋萋慿軒信有儒冠誤慿軒意欲迷山深風雨惡天濶羽毛低他日開炎瘴連城送鼓鼙荷鋤吾愧爾未敢歎塗泥風雨風雨忽如此閉門方晝眠故應為計拙可復要人憐燈火羌村路桑麻杜曲田悠悠今視昔把卷一茫然抱琴三尺枯桐樹相隨年嵗深此行端有意何處託知音隱隱青山夜寥寥太古心空携水仙曲更向海中岑山中懷友七首大府趨羣彥修才復壯齡波瀾開白晝羽翼動青冥弱質悲殊調眀時敢獨醒未妨茅屋底寂寞抱遺經望逺空山裏天寒夕夢孤林昏行魍魎江晚變蘼蕪風雨憐同病塵沙感壯圖向來懷古意回首未能無踈放誰容我交逰重得君論文輕咳唾問俗到耕耘一笑能青眼相思有白雲春風動閭巷遂往謾紛紛何事虗齋裏猶分苜蓿盤髙林容偃蹇衆翼避扶摶黑夜文星動青天劍氣寒終南山正好那得悔儒冠自是麒麟種卑栖㝎幾年故廬南雪下短褐北風前歲暮山林瘦天髙雨露偏肯同兒女輩俯仰事春妍卓犖恆山秀相逢幾抱琴五年風雨別四海弟兄心雪外梅花逺山中桂樹深㝎知嵇叔夜髙興滿雲林洛社推年少清􅫉照士林春風何處客芳草獨行深遺墨收秦刻新吟學椘音别離無一字目斷白雲岑悼䨥林栗上人飛錫遍諸方栖身復故鄉年隨䨥樹老人與一琴亡暗草迷春塔凝塵鎖夜堂瀟蕭今日雨誰炷影前香社日重過方子踐東風吹客衣長憶見君時一别驚雲散重來與燕期春深今雨夕花老玄年枝莫待空山裏青燈有所思聞子踐臥病吾子仍多病何人共解顏水聲和藥臼春色閉松關積雨連三月懷人隔萬山同逰况零落浩蕩可追攀和吳贊府齋居十詠焦桐憐爾抱奇質無香亦自焚材髙初偶得音古竟誰聞天海空遺操氷霜見裂紋中厨方煮鶴終得舍夫君蠧簡六籍灰寒久名山餘舊藏漆痕微有字藝草寂無香後死嗟猶及斯文豈遽亡丗方珍貝葉掩卷一淒􅋽破硯巨璞何年鑿磨穿偶至今線紋虗緑潤雨氣失玄隂瓦礫看無異塵埃積轉深眀光幾携入往事復何心殘畫勝境不可得微綃餘舊圖丹青初倣佛塵土半模糊蛺蝶飛疑去波濤拆漸無良工今豈有為爾一長吁舊劍憶啓蛟龍匣提携徑出門紅塵走馬處白日報人恩歲月銅花澀雲煙斗氣昏淒涼中夜舞回首暗銷魂塵鏡古鏡色如墨千年獨此留玉臺蟲網暗珠匣土華浮莫笑塵埃滿曽令鬼魅愁盤龍驚已化雲雨夢悠悠廢檠不解照珠翠早同文字􅉀何言中路牽無復向人眀雨宿髙齋夢秋吟廢館情相看幾今夕及此慨平生敗裘襲爾亦已久霜風兩袖穿甘從稚子笑未受故人憐雅製餘前古深期在暮年素絲今化盡念汝獨依然斷碑零落秋風臥何年廢廟碑圖經愁莫載耆舊説頻移野燒龜趺失荒苔鳥迹疑遙知千載後拂拭轉堪悲臥鐘龍簴久摧折沉埋奈爾何耕民誰睥䁛野衲自摩挲雅奏多年歇銘文幾字訛斜陽荆棘裏長伴舊銅駝吳贊府挽詩三首鶴去愁滄海鴻飛困朔風冥冥方獨往巳已竟長終莫挂還鄉劒真隨厭丗弓向來曽慟哭不是為途窮百代龍川子風流見外孫餘生唯白帽舊業自青門浩蕩期千載蒼茫哭九原仙華雲縹渺愁絶刻舟痕懷古餘哀思憐君尚典刑清談無俗子白髮死遺經客社荒春汐鄉山隕夜星夕陽鄰舍笛淒切可堪聽過謝臯羽墓識子今無日風流可復尋山林餘椘製弟子解閩音滄海它年夢青天後夜心平生匣中劍零落遂如今元日即事回首人頻異興懷誰與同塵埃欺白苧歲月入青銅雨急蒼茫外春生浩蕩中長憐故園樹一一受東風八詠樓懷古荒碑在登樓晚望賖秋隂垂野薄江勢抱城斜天地悲遊子氷霜感嵗華紅塵吹裋褐歸興及清笳眀月樓遺堞何年有飛甍壓上頭鼓鼙分大幕香火望靈湫曲岸舟如失遙沙樹欲浮登臨且吾土未敢恨淹留溪南即事莾莾長川玄行行薄莫時山光連睥睨寒色入旌旗夕鳥歸飛急風帆􅊇上遲丗情關物理俯仰寄長思􅍭香道中殘日亭猶逺輕風帽易斜稻畦低沒鶴草徑曲行蛇經丗知無策謀生會有涯殷勤理黃菊留眼待秋花懷楊仲弘離別驚如雨蹉跎愧後塵秪今才有數多爾術能神玉唾春風濕煙霄碧樹新􅍝慙推吏事吾敢望平津八詠樓遇方子踐風雨三年别登臨一笑同緑莎垂古井碧瓦映踈桐丗故違髙枕吾生劇轉蓬相逢感疇昔出處愧匆匆杭州寄子踐尊酒何人共春光著處同乾坤容野馬歲月失飛鴻俗眼能無白風花故自紅向來常處士早已負諸公次韻答子踐不謂飛霞珮珊然寂寞濱相看今雨夕漸近長年人往事驚如夢何峯擬卜鄰平生千里駕還往得辭頻劉聲之爐亭夜話儒冠寧誤我壯志自多違昭代尊經術先生尚布衣清言今夕共大隱昔人稀預恐蒼山麓無從候少微雨三首湖濶雲如積天空雨正豪風飈兼晝夜井邑帶波濤茅屋垂垂破漁舟故故髙何妨張仲蔚環渚自蓬蒿稚子吾憐汝泥行玄不難憑欄真自笑髙枕敢求安天地三辰遠江湖五月寒好將遮日手却把釣魚竿田父愁何訴龍公怒未休千畦沉翠羽百水散黃流小市猶長閉孤城併欲浮誰誇輔天漏此事恐悠悠金陵客舍漫書不擬夫容佩終然挂寂寥百年多事始千里一身遙巢燕驚華屋韝鷹望赤霄蒼蒼叢桂樹愁絶小山招陪仇仁父先生登石頭城談笑逢諸老登臨失故亭薄逰成汗漫髙步覺竛竮峽水通吳白淮山入椘青平生一杯酒及此慰飄零春日郊行雜興三首忽忽時頻異垂垂花正繁登臨聊極目出處可忘言風急江光亂春濃野色昏舊逰嗟契濶覽物思空存五畝清江曲為農計未踈那無經丗策宜付絶交書野笛吹頻歇漁舟玄若虗卜居能有待天地夲吾廬高興真誰共佳晨秪屢經天清風細細花逺樹冥冥勝事今非昔狂歌醉欲醒終南飛鳥外一髮向來青次韻答友人十載論友地才皆苐一豪江湖嗟契濶風雨夢蕭騷趨走知無力標題敢自髙期君飬翎羽一擊可徒勞九日登石頭城背郭囂塵逺髙秋川嶽清幽懷初曠蕩陳邇故縱橫遙望龍盤舊長憐蟻穴爭紺園隨處關粉堞向來傾彂草窺眢井看碑驗故塋門開蒼耳路亭愛翠微名逺樹淮南出滄江鳥外眀人煙川浩渺風物歲峥嶸吹帽仍佳莭傳觴但老兵愚生雜蛙黽浪走愧璜珩玄玄檣帆盡蕭蕭蘆葦鳴登髙未成賦覽古獨含情政復哀王粲何堪厭禰衡敝廬滄海曲目斷白雲生寄李生有維仙李孤標見碧梧髙門留雨露短褐混泥塗姿悍寧為小機深或類愚洗心須貝葉遊藝及樗蒲政爾難藏頴幡然獨抱竽從容觀近效僶俯事羣趨稍廢琴心曲能操牘背書誰將窮罔象莫使避珊瑚它日逢何暮清談動至晡醉醒勞問我喜怒得令渠契濶江湖迥飄零歲月徂青雲悲捷徑白日仰亨衢秋社枌榆外南包橘柚初飛騰如借順能勿笑蟾蜍七言律詩送孫君文判官丈歸桐廬笑語匆匆似夢中衣裳俄復判西風殘蟬落日那堪别瘦馬長途喜未窮歲事已空南畝稼歸期應老故山桐興來尚有平生棹載酒何時覔釣翁感舊華屋山丘不可期峴山依舊緑參差空懷下榻延徐孺無復乘舟訪戴逵日暮更聞鄰舍笛歲寒賴有角弓詩舊逰寂寞成今古冷石秋花處處悲鳳凰山蒼海桑田事渺茫行逢遺老色淒涼為言故國逰麋鹿漫指空山號鳳凰春盡緑莎迷輦道雨多蒼薺上宫墻遙知汴水東流畔更有平蕪與夕陽開元宮誰使藏舟一夕移紅樓翠幕未全非曾聞帝子乘鸞去疑有仙人跨鶴歸煙徑月眀瑶草歇石壇露冷碧桃稀赤欄橋畔多時立間看楊花作雪飛早起漠漠晴􅉉散薄雲獨搔短髮立清晨春風入樹無行迹曉月窺簾欲近人旋覺新吟隨夢寐不知清霧濕衣巾何人正踏長安陌想見看花拂面塵九日獨立慿髙彂興新霜清露白復佳辰緑尊照眼不解醉黃花滿頭應笑人檮邉老僧幽期失巖南故人新句頻秋天此日併回首鴻鴈寄書愁未因次韻山南先生遣興二首稍覺春風入剪裁更無魂夢到塵埃苔枝自送黃昏影寶篆頻消白晝灰丗態漸應隨日別老懷可復向人開擁爐坐聽蕭蕭雪載酒携琴也莫來蒲團兀坐久忘機何暇重尋是與非老鴈長雲天渺渺晚花寒蝶思依依起看丹竈春無恙欲試青鞋雪未晞鵬鷃逍遙端可耳玉堂何必愧柴扉寄仇仁父先生一官十載尚沉淪門巷蕭蕭白屋貧自有陶公為社友從呼杜老作詩人兒曹故復輕前輩俊步誰當出後塵招隱詩成無處寄莫雲凝碧坐愁神寄十八丈判官金榜淒涼四十年風流文采故依然香山老玄誰同社栗里歸來尚有田懷古坐看西日落得春寧問北枝偏清泉白石多深趣千載心期入近篇寄仲山異縣關心翔鴈飛酒燈棋雨計頻違寄書全覺嵇康懶入夢多疑李白非黃葉閉門方寂寂碧雲回首故依依相從賴有梅花約試踏春風走翠微寄友人繫舟一别雲水鄉暮川葭菼方蒼蒼漳濱臥病它年憶渭北題詩春日長蕪菁作花己爛熳楊栁飛絮苦顛狂聞道茯苓暖堪斸遲子青鞋經澗岡夏日漫書枕上初殘柏子香鳥聲簾外已斜陽碧山過雨晴逾好緑樹無風晚自涼芳歲背人成荏苒好詩和夢落蒼茫求羊何不來三徑門掩殘書滿石牀逢葉伯機水煙沙雨送歸航楓葉蘆花巳十霜瑶曲天風春夢遠墨池秋草故遊荒碧峯又是新回鷹白石依然舊化羊一笑相逢却成别暮雲千里思茫茫宿賈氏山房暝色蒼茫赴逺岑獨追燈火下荒潯寒沙細水通幽徑修竹高楠走翠隂草草悲歡中夜語悠悠醉醒百年心石煙霜月寒無寐坐聽踈鍾出二林送友人之亰偶緣送逺接清逰煙雨東城晚樹幽離别自應多感慨笑談未害各風流百年芳草頻頻合萬事孤雲故故浮太華黃河入回首春風愁絶李膺舟答友人芝掌峯前一杯酒別離歲晚遞相望野梅如雪遙入眼曉鴈連天寒呌霜閉門窮巷燈火冷回首蒼山雲樹長幾時抱被却同宿愧爾詩筒逺送將憶友人無復髙談慰索居壯心零落竟何如人間漫有金臺夢身後誰傳玉枕書半畝蒼苔埋璧地一聲白雪斷絃初芙蓉峯下聞吹笛淚滴春天草木踈哭李無逸青春未受二毛侵談笑俄聞變古今千日却醒徒有望九原莫作竟何心平生欠荷劉伶鍤此夜誰彈子敬琴水樂亭西煙草碧舊遊回首重沾襟過烏傷墓丹青像設始何年翁仲遺墟自古傳時有北人來下馬不知秦樹幾啼鵑牧童晝卧看碑路野衲春耕祭墓田回首長安西日外茂陵松柏正蒼煙雜興三首昔從六客堂前客共買何山渡口船杉松夾道得古寺風雨漫山連杜鵑憶别老僧如昨日待分幽事及它年春江正緑不能玄勝踐蕭條秪自憐幾回擬作送春詩出戶春風玄不知葉底孤花猶入眼竹根稚筍欲過眉又拋書卷都如夢間看香煙偶似癡寄語平生張仲蔚一歡相屬竟何期劉生玄滌相如器朱子新裁賈誼書百代風流今視昔十年懷抱我憐渠故應曽對談諧樂也復能容禮泫踈風雨蕭蕭守環堵秪今可望故人車寄陳君采江淹文采碧雲消潘嶽才華玉樹凋後爾千年開楗鑰森然作者見風標棋花夕日輝相並金匱名山路未遙賸欲傾心數還往髙期無使競蕭條次韻答吳正傳諸老凋零半九原後來英發見蒼然髙標寧復居人下緩步猶須出我前天馬為誰生月窟仙禽有日到芝田論心待取同傾蓋可使空回雪夜船寄葉審言千里相思黃葉初喜傅消息慰離居姓名漫入山公啓懷袖元無賈誼書已分耕耘供賦吹胡令汲引到樵漁臨𡵨躑躅頻回首風雨蕭蕭鴈正踈獨立數盡飛花一愴然壯心迢遞夕雲邉十年人事空流水二月風光已杜鵑過眼青春寧復得汚人黃土絶堪憐故園尚有平生約可使蒼苔到石田即事南陌東阡草色齊愔愔門巷客來稀受風燕子輕相逐著雨楊花濕更飛緑樹無言春又盡紅塵如霧手頻揮浮生莾莾吾何計獨立看雲竟落暉山中夜歸漫山松葉行徑迷獨穿犖確幽步遲驚風低草山乕過寒月挂樹天星垂泉鳴荒處夜牢落露洗青林光陸離茅簷抱膝者誰子歌闋飯牛聲正悲旅夜歷歷飛螢度眼眀獨搘髙枕數殘更薄遊已􅌒新彈鋏舊業猶餘未棄檠一雨送晴初月色百蟲専夜故秋聲情知三卜非年少已覺人間有後生三月三日西湖舟中黃塵烏帽愧平生對客猶稱舊姓名此事正堪三太息秪今忍負四難并放舟乍落空濛境送酒元無窈窕聲金谷蘭亭嗟已矣不妨時暫濯吾纓金陵天津橋五雲零落渺天涯陳迹蒼茫日自斜畫角巳吹邉塞曲紅藍新長內園花可憐遺老埋黃壤曽倚春風望翠華好在北山猿與鶴依然同住舊煙霞送人歸豫章已覺棲遲懶曵裾可能為我強躊躇一帆秋色紅塵外千里江關白鴈初建業水清誰共飲潯陽潮斷㝎無書黃金未盡朱顔在莫種桃華學隱居哭陳茂卿多病文園鬢未霜可人風味故難忘豈期夜壑舟無㝎竟使春天草不芳賣藥幾時來海上遺文須我訪襄陽誰憐後死仍漂泊雲白山青自故鄉宣城客中偶書眼看春霄擁勝流漂零回首愧沙漚黃塵烏帽知誰為白飯青芻復此留未必嵇康能作吏何妨李廣不封侯敬亭雲鳥知無恙欵段惟須逐㑓逰梳頭淂白髮偶逐飛雲別礀岡解纓聊爾濯滄浪襟懷巳久無山水容鬢誰令有雪霜未必冉砂真却老可須白首更為郎前修未逺斯文在努力無愁𡵨路長送韶父先生逰亰口不到南徐三十春好將夢寐弔遺民也知往事如流水秪想重來是後身棹響關河風色莫雲離野服鬢毛新舊遊偶失扶桑路煩向滄江一問津山南先生挽詩仰驚喬嶽失嶙峋千載風流可復聞鼎有丹砂輕縣令囊無薏苡詫將軍苧𫀆歲月孤青簡石室文章閟白雲淚盡侯芭悲獨立短衣髙馬秪紛紛喜方韶父先生至兼懷山南先生夢覺秋宵失薜蘿尚煩青簡慰蹉跎山中舊別期猶在嵗晚相逢感易多華表神仙成寂寞靈光風雨見嵳峩百年珍重斯文寄趼足修程可奈何韶父先生有詩復次韻以和兩翁故復可憐人傾蓋長安四十春華屋山丘如隔日夜床風雨淂彌旬書籖藥褁仍仍在橘刺藤梢一一新漫寫餘哀寄冥漠大荒誰見下麒麟寄張如心謬羡侏儒抱一囊舊遊搔首獨淒涼連天斷鷹初沉日匝地寒花欲有霜聞道為郎須白髮未殊髙枕待黃粱紅顏好在張公子坐聽松風春晝長送王傅朋靜江教授丞相威名震百蠻蕭條異代淂吾賢宦遊忽過三湘去家學應令四海傳北望犬牙連上國夜占鶉尾直中天炎風朔雪皆王土未覺青春雨露偏碧蓮峯下駐飛驂風土遙知久自諳會有新書裨禹貢坐聞舊俗化周南深篁盡日迷山鬼毒草無時起瘴嵐珍重斯文強餐飯謾誇丹荔與黃甘送楊州傅學正全淮控制列城遙尚想青春虎豹驕一日江山走珠玉萬家燈火沸笙簫喜逢才俊登文署好頌升平答聖朝芍藥瓊花兒女事可緣風月逗華鑣余山春雲牢落鴈無聲沙岸參差石有稜䨥屐漫窮芳草徑一龕長愧白頭僧晴濤閃閃翻孤日山木昏昏􅐈翠藤後夜清風滿遙念夢逰空指上方燈龍潭山二月清江照眼眀避風舟楫滿迥汀斷雲抉雨時時黑密葉藏花樹樹青習隱未成陶令賦行歌聊共屈原醒碧潭光景無消息坐看魚兒點翠蓱遣興青雲如夢慨平生白髮驚春忽數莖漸覺交遊隨日別強顔色逐人行百年松檟誰能去五𤱔煙霞故可耕妄念掃除渾欲盡少遊何得尚相輕次韻方子踐觀潮潮生潮落有時休朝暮吳兒幾白頭𬒳髮祗誇迎駭浪側身寧解障奔流江吹碧瓦人聲曉雲閃朱旗海氣秋後夜月明天在水有誰能此試登樓次韻子踐秋社歸巖南久悟清都是夢中未嫌短褐任飄蓬時情冉冉心如醉世議紛紛耳欲聾會種枌榆依漢社共談禾稼續豳風蹉跎偶負平生約已復人間歲一終豫與劉君師魯為文字交十有四年而固未嘗相識也兹過武林偶遂良覿有喜而賦邂逅神交十載餘青楓落月幾愁豫何言此日同傾蓋勝讀平生未見書天上玉堂容可到山中金匱得長虛故多餘事宜啇略可待秋風怨索居杭州寄里中一二同志故山有路去無從燈火關心夢不通浪赱紅塵真自笑舊遊白社竟誰同胸中好貯千巖秀眼底徐觀萬馬空風雨未休鴻鴈斷此懷渺渺故難窮同儒上人謁黃尊師于龍翔上方修撰鄧公適至輒成小詩用紀盛集坐陪三老盡文雄政爾衣冠不苟同談笑流傳成故事畫圖想像見髙風丹崖方與霞標峻碧海誰能鐵網空􅍝託下陳虛自詫飛揚無力思何窮客樓雨中江城飄泊動經年盡日髙樓閲過船睡起小窗𥘉聽雨岸旁垂柳巳生煙坐拋歲月今如此每望雲山欲泫然尚喜遊從得諸彥時將樂事寄新篇次韻答蔣春卿不謂紅塵拂面時軒然談笑一舒眉晴風石鼎浮花乳夜雨春盤冷碧絲握手遽成三宿戀論心那覺十年遲酒船魚綱歸無計未必山前白鷺知送楊山長歸錢塘百里鄉心海鴈飛三年宦况野鷗知兒童早已占歸信弟子應能頌去思茅屋荒田春草草杏花深巷雨絲絲人生適意須行樂駟馬髙車恐未遲章德懋同登車蓋山城南日日望蘇灣碧樹童童蓋一山何意兹辰成邂逅與君携手共躋攀鉤衣亂石通髙步著面和風啓醉顔尚愛碑銘多楷則俗書且勿鬪妖􅈺重逰毗山十載重來思惘然勝逰邂逅一開顏髙林有色煙雲淨曲徑無香草樹間漫遣金樽催白日絶憐紅粉涴青山南朝舊迹今誰記腸斷風流不可攀湖山遇葉士心因寄郭祥卿架閣謝公城下踏春暉最憶東園夜不歸落月清樽波瀲瀲髙花銀燭霧霏霏未愁強醉羅衣濕政恐重來燕麥稀大地風濤竟誰料九霄一鵠看橫飛大卿牟公挽詩靈光一夕失崔嵬多士相逢淚雨摧夾道共看丹旐去遺民猶憶繡衣來蕭蕭悲吹蘋花冷渺渺鄉山杜宇哀哭盡貞元舊朝士臨𡵨無語重徘徊後生無復望儀刑青史徒煩列姓名窮有遺文成巨冢死無新爵上銘旌瓜田方任蓬蒿沒玉樹偏依雨露生舊笏滿床知未墜翰林風月向來清次韻牟主簿南湖客中遙望仙橈度碧湖翩然髙興不枝梧也知白髮行相待無奈青山不受呼過眼光風殊獵獵霑衣多露巳塗塗相逢幸及南枝好一笑聊須引百壷次韻姚子敬教授筠庵别業故園煙樹渺江關長愧求間未得間客路獨愁黃葉下髙人正在白雲間卜鄰儻遂容依止載酒終期共往還未害看山仍拄笏一竿付我釣滄灣次韻别程晉輔教授落拓江湖久不歸相逢還及試春衣忽聞煙際蘭橈動誰共花前玉斚飛青眼故多知己在黑頭未覺壯心違赤霄孔翠吾何望喔喔鄰雞爾自肥花信已覺尋芳去較遲千林紅𬗋想紛披幾經夜雨能無恙試問春風竟不知斜日逰蜂應有夢野亭立馬巳多時殷勤却是江南客曽擘氷霜寄一枝草意淡煙斜照舊離離吐漫芳心欲向誰可是忘憂能自得若教指佞定無私東風江上何人識南國春來有夢知留取青青承雨露未應紅𬗋浪相疑五言絶句山中偶題古苔隱石色寒花眀藥叢有時白澗雨終日青松風夜坐涼風動千里孤坐思滄洲白露洗明月青天此夜秋七言絶句寒食舟中東風溪水碧漣漣溪上青蘿獨繫船正是落花寒食夜水煙沙月又啼鵑哭御史王公有人新自甬東來別後音書第一回欲問布帆無恙否豈知塵世隔蓬萊𬒳髮胡為竟渡河由來魑魅喜人過不須待聽山陽笛一曲箜篌哀思多早歲棲身擬鳯池桑田為海巳多時路人方為乘驄止流水生涯遽可悲玉堂政要謫仙人何意先成采石墳人物渺然時事異漫令平地有青雲金阜原頭草未生兒郎俄巳去騎鯨黃泉會有相逢處轉見人間子毋情掉頭東下苦匆匆徑挾羣仙入貝宫眼底珊瑚髙百尺釣竿吹折一絲風膠液中流事可歎海雲飛雨失青天陸郎地下驚相見應許來遲二十年孤兒思父母憐兒忍見銘旌獨返時畢竟江魚與螻蟻世間何物最堪悲楚客猶疑刻劍痕秋風已到孟嘗門殘潮落月天涯夜剪紙誰招萬里魂天吳罔象政縱橫誰認鼇山頂上行海氣昏昏風雨惡夢中無路弔先生金陵客中送友人歸里青陽河畔杜鵑啼歸路如弦定不迷應到故山叢桂裏笑人騎馬學聽雞有感橘柚青黃照眼垂秋風籬落自紛披頗聞玉食登蠻果不獨涪州有荔支漢空需才拔隱淪鼓刀屠狗正求伸可憐風雪南山下未有它年射虎人葉審言張子良同逰北山智者寺既歸復與子良至赤松由小桃源登煉丹山謁二皇君祠回宿寶積觀天風吹我度峥嶸春著千巒滃滃青𬗋陌紅塵寧有此十年空負比山靈芙蓉峯下南朝寺水秀山眀兩絶竒更向水窮山盡處一菴髙貯碧雲師却問仙山去幾程白雲如簇近相迎直須不脫登山屐行盡松聲與水聲山中今是太平民尚與人間隔幾塵流水桃花三百曲莫教重誤武陵人偶看飛花逐水紅不知身過亂雲東回頭旋覺峯巒别惟有青天面面同雙鶴沖天歲月多至今香火壓嵯峨劉郎不是無兄弟奈此丹雞白犬何坐愛春泉響翠微玉花吹濕薜蘿衣何人為擘氷壷破共看青天白練飛削立城心雙白塔幾疑日月費撑支一朝頓在闌干底始悟從來見處卑遙憶仙華鶴髮翁清泉白石滿竒胸若為此日干峯頂更試平生九節笻一宿山中竟莫留可能長伴赤松逰殷勤好去張公子休愛人間萬户侯避暑圗一丘一壑古遺民十里清風不屬人間對青山揮白扇世間何物是紅塵圍棊圗有客看棋洞口歸天荒地老巳多時人言此客殊癡絶畫裏看棋我更癡陶學士驛舍圗一笑相逢亦偶然浪將恩怨向人傳無端更𬒳丹青汚狼藉春風數百年次韻章兄雨中書懷卧聽風水共喧喧起視青空白雨懸秪謂桑田可無恙不知江勢欲吞天茫茫平陸一尺水瑟瑟涼飈五月秋莫為天公無皂白誤將隂雨怨鳴鳩故山回首杜鵑啼客舍誰憐寄一炊賴有四門章博士不緣風雨廢談詩春盡餘寒去却回江天五月未聞雷南風秪在浮雲外彈折朱弦喚不來草長故山懷獨往苔生今雨歎離居誰能共飲桃源酒一醉千年不願餘偈二首久謂聲聞難作佛今知龍女解成男分眀信有旁人分五十三身第一參息心無想成無記有見還同有相存不盡普賢殊勝行隨方願啓一城門金華黃先生文集卷第二
