  text: 金華黄先生文集卷苐二十三續藁二十
  hash: sha256:7cfecc301a6c313796f2d455b4dd2843dab1594a0a9c637f68230da2417e4280
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0503_SBCK_023-1a}
body:
  text: 祝文謁先聖祝文忝繇諸生􅀩恩錫苐洋洋聖道實佑啓兹覆載生成名言罔旣欽承睿旨展謁告䖍聖神臨之敢􅀒夙學諸曁州謁廟祝文先聖昔者夫子之論政盖曰子欲善而民善矣溍忝繇諸生與聞有政請事斯語以對越夫子在天之灵三皇維三聖人爲郡邑之通祀有著令溍祗事云􅀄肇以禮見遵舊典也城隍溍􅀍命佐州與有民社祗役告䖍式遵故常治人事神敢不夙夜維爾有神尚鍳臨之東岳泰山之雲實雨天下郡邑􅀁在得望祀焉溍祗事云􅀄是用展謁曰雨曰暘維神其嘉惠之諸廟治人事神吏之職也禦災捍患神之力也通幽顯而一貫􅀁以交盡其責也頋兹陋微無能為役也神之相之尚不忒也祗事䖍舊典是式也維爾有神尚昭假也太史院秋􅀕祝文皇帝元辰天剛蒼龍之首􅄤次伊始元辰􅀁舎永綏多祉億萬斯年歆此毖祀皇帝照星羅㬋日月之交是曰天首靈儀旁燭陟降左右祗薦苾芬尚祈黙佑皇帝胎星室􅀫定之方中式營有居儲精上玄寔開丕圗有嚴蕆祀神靈具孚皇后元辰小􅁻鶉首之舎坤維受事肅肅中宫元辰攸次神其降康饗于眀祀皇后照星太陽大眀麗天照臨下土承兹休光隂教是輔昭薦常事用膺多祜皇后胎星参􅀫坤申之間旗伐孔掦清眀在天㳤徳之祥来歆肆祀介福無􅆠太子元辰太衝對時育物青陽在春毓粹震宫肇兹元辰精誠是鑒福禄駢臻太子照星太陽衆陽之宗有赫臨照重光􅀁􅀍前星有耀永錫蕃􅁵無忘昭報太子胎星斗􅀫倬彼雲漢南斗有光降灵錫羡長發其祥精禋匪懈皇圗永昌國學仙設先師配位祝文􅇚奠上丁國之通祀四賢並脩厥有舊章穆􅁲靈辰具嚴廟像奉遷改作伏慮震驚庀事云􅀄敢􅁱䖍告大成殿修造祝文禮殿有嚴妥靈兹􅁢旅楹故惟新是圗飭材庀工諏辰興作廟庭清謐伏懼驚諠菲薦陳誠尚祈昭鑒巍巍聖師廟祀維舊増新崇構有覺其楹旣固旣完式芘爼豆吉蠲薦告兾兹妥安神之格思永世無斁太廟時享祝文青陽届候雨露旣濡永言孝思有懐先烈吉蠲􅃱享来燕来寧錫羡降康益綿寳緒太宫奕奕列聖端臨蕆祀有常夏享以禴禮文告具昭薦孔時茀禄是承永世無斁太史院重修簡儀告成祝文欽天􅀚象肈自古先設置靈儀用嚴測候載新繕治稽合玄文㳙吉告成式陳嘉薦謁胡侍郎墓祝文維神生爲名臣没有廟祀維桑與梓是庇是依巋焉兹丘髙山仰止展謁之禮大懼弗時爰考舊規祗薦爼豆有引弗替神其鑒之八世祖墓􅀕告祝文瞻望先塋􅊬焉異縣族分世易展省弗時大懼因循乆㦯禋廢周視剪刜封植維新侵地畢歸仆碑復立恭陳菲薦伏謁告䖍神其永寧芘及祚㣧先大夫封贈祝文維至正二年􅀊次壬午五月辛未朔二十七日丁酉孝子奉政大夫江淛䓁䖏儒學提舉溍敢昭告于先考祕丞府君溍􅀩頼教有竊有禄位䟽恩分土已表生榮進秩升朝載揚䘏典伏奉至正元年十月制書贈奉政大夫秘書􅁥丞驍􅀐尉追封義烏縣子慶澤􅀁􅀍下逮一門祗念厥由不任感慕而溍繫扵職守不得躬展彛儀謹遣弟􅄎淇詣墓次以告謹告維至正六年􅀊次丙戌正月庚辰朔三日壬午孝子中順大夫秘書少􅁥􅃱仕溍敢昭告于先考太常郡伯府君先妣郡君童氏溍忝有仕籍垂三十年幸免曠官克承委祉陳情歸養而奄罹大故乞身得謝而獲􅀍加㤙伏奉至正五年三月制書先考贈中順大夫同僉太常禮儀院事上􅀐都尉追封江夏郡伯先妣追封江夏郡君今雖無燎黄之法而禮有可以義起莫之敢廢是用祗薦于墓下音容如在命數維新瞻望松楸不勝感咽謹告青詞行中書省禳火醮青詞充位備貟實難勝扵重任遇灾知懼爰載控扵髙真恭啓玄科肅陳丹悃伏念臣䓁忝登台輔出鎮藩維當祝融司候之􅀄遭囘禄降殃之極始自㕓氓之不戒􅃱令府署之靡遺兹盖臣䓁固寵妨賢有􅀒公朝用人之意乖方失政未契天道好生之心徒攄􅈼帝之誠莫遏燎原之􅀔庸上酬扵素欵庻永絶扵非虞伏願圎象垂慈炎官悔禍群􅀺甦息復安闤闠之居同宇乂寧均頼帡幪之力䟽請如公住寳林䟽師子座上要揚逹磨家風龍華㑹中幸逢彌勒伴侣庻紹隆扵先業益振起扵頽綱欲寫渇心無嫌饒舌如公禪師閩南異産濟北真傳雖甞以佛法住持不倦扵諸方接待急流勇退固知髙尚之情大厦將傾必藉扶持之力廼睠雙林之勝境猶存十刹之舊名豈容虚席而莫居是用闥辭以為請得萬間屋何妨儒釋一家拈一辨香共祝皇王萬􅀊請欽公住圎覺䟽大覺圎地實此衆之􅀁依妙法􅂠經必有時而乃􅀃是宜虚左以待司南凡在交㳺舉同慶幸欽公法師􅁳搜教網逺紹祖燈遡流尋源深造四眀法窟韜光匿景獨􅀫蓬莱道山雖有志扵利它􅀄不求扵知我惟兹公選匪伊人謀一超直入以無難三請益䖍而弗懈伏兾如佛出世能盡暢扵本懐申命自天用増崇扵睿筭俚言不佞慧鑒是祈追薦先父䟽意資父事君敢憚服勞扵逺役呌天叩地驚聞遘禍扵􅀻門摧割奚堪奔馳靡及􅂺陳哀悃仰瀆慈尊伏念溍先父從仕郎温州路樂清縣尹黄公渉世多艱承家罔缺早膺祖澤僅擬􅀘扵一官晚荷國恩遂䟽封扵七品方安老境奄迫大期而溍忝預代言􅂙陪扈蹕覺帝郷之天近嗟親舎之雲遥雖未能求忠孝扵兩全何􅃍至判死生扵一别歸程甫畢凶問亟来始知屬纊之辰正在演綸之日病旣無由甞藥歛又弗得慿棺五十年父子之情晨昏永隔四千里􅀜河之阻氷雪兼行迨獲執䘮已踰卒哭不謹逺㳺之戒徒銜罔極之悲罪大難容恩深莫報苟可事亡事死固當從俗從冝匪仗覺乘􅂚徼冥福伏願慧光䓁照慈䕃下垂肹蠁潜通俯鑒不肖􅀌之意爽靈昭徹速歸極樂􅀦之居成無上之正眞作来生之依怙􅀕文􅀕永康胡先生文嗚呼先生古之豪英清風峻標孰可􅃺名弗崇為髙頋以文鳴其文斯何出史入經汲書魯簡武戒湯銘下逮百氏名墨縱横旁行敷落律令章程包羅揆序弗猥弗并維蓄之厚故施之宏紛其百嘉鬯逹滿盈蔵英歛華根柢一貞以歸于極以集于成金舂玉撞發其和平逺彼聵聾勿使震驚獨抱厥器旅于天庭胡不廟郊薦之䪫韺乃弦乃歌乃佐武城人趍易良俗失悍獰稚耋熈熈怙為父兄扵穆昌辰文事聿興乃謝􅎗鞿乃專鑑衡賤華貴實樹之風聲磬欬􅀁及驅飈走霆學徒嚮方俊良用登藐此陋㣲亦累品評賛邑海堧遺則是徴擇士藝闈緒言是承庻終惠我免夫兢兢􅂚使中路奪其依憑嗚呼先生為幽為眀有煒斯文掲若日星重江􅃨山煙慘雲冥瞻言遠而泣涕雨零馳辭侑觴式昭哀誠行狀元故翰林學士承旨中書平章政事贈舊學同徳翊戴輔治功臣太保儀同三司上柱國追封魏􅀦公謚文忠李公行狀曽祖執皇贈濟羙功臣光禄大夫平章政事柱國追封韓國公謚康惠祖昌祚皇任潞州招撫使贈保順守正功臣金􅂵光禄大夫司徒上柱國追封韓國公謚文靖父唐皇任徴事郎略陽縣尹􅃱仕贈推誠保徳佐運功臣太傅開府儀同三司上柱國謚忠獻母王氏追封韓國夫人本貫公諱孟字道復系出後唐李氏丗為潞州著姓康惠公金末舉進士不第以行義見稱扵時文靖公歸皇朝佩銀符使潞州卒扵官忠獻公始去家而仕扵秦蜀四十餘年乃􅃱其事樂漢中風土之勝因家焉公生而頴悟十􅀊能屬文稍長益肆力扵學讀書日記數千言學旣淹貫文愈超卓每考論古今治亂盛衰之故􅁣然有志扵當世然耻扵干進屏居閭巷開門授徒逺近􅀒笈而至者翕如也時之名公鉅卿如商公挺王公博文劉公魏公􅀄至漢中徃徃折行軰與之交郭君彦通扵公為父執名能知人見公魁碩偉岸謂忠獻公曰此郎骨相殊常公輔器也至元十九年侍忠獻公留四川藩閫聞公名將置幕下辤不就改辟主晉康縣簿又辤臺府交章舉之亦不起一日幡然曰大丈夫固不能俛首州縣方今朝廷更化政治聿新招徕衆正材俊林立獨不可與之並逰乎乃束書如亰師行中書右丞楊公吉丁一見􅂺加器重薦之􅁉宗皇帝得召見扵東宫未及登用而􅁉宗賔天楊公遂延􅃱家塾俾諸子師事之翰林諸大老竒其材剡上于中書謂冝置之舘閣而銓曹調公主梓潼縣簿非其志也忠獻公方為䕫府經歴乃徃省焉未㡬從忠獻公出峡泝㐮江還漢中日以奉温凊具甘旨為事忠獻公勉之入仕乃復北上三十一年成宗皇帝臨御首命詢訪先朝聖政以備史臣之紀述公過􅀜中陕西行省因俾公與諸儒討論彚次成編乘傳以進時武宗仁宗俱未出閤徽仁􅁉聖皇后求名儒職輔導公首當其選大徳元年武宗撫軍北邊仁宗時留宫中公日陳善言正道從容啓沃多􅀁禆益受知扵成宗特旨除太常少卿當國者以公不及其門沮格不行改禮部侍郎亦中寢昭獻元聖皇后幸覃懐公以宫僚從戢衛卒無敢侵奪民居在覃懐四年夷險一節信任益專十一年春成宗陟遐神器暫虚宗王大臣宻謀横変國􅀔危疑人情􅍅洶公從兩宫還亰師遂與丞相哈刺哈孫荅刺罕等力賛仁宗削平内難中外晏然定筞迎武宗入正大統仁宗即承制以公為中書参知政事公乆在民間扵閭閻之幽隠靡不究知損益庶務悉中其利病逺近無不恱服然以抑絶僥倖羣小多不樂公不為之少自撓也居亡何言扵仁宗曰執政大臣冝出扵嗣天子親擢今鑾輿在道臣未見顔色誠不敢冒當重􅀉仁宗不許則逃之許昌築室扵陘山潩水間若將終身焉夏五月武宗即皇帝位仁宗為太子物色得公􅀁在白于上遣使徴詣闕下至大三年春正月入覲武宗扵玉徳殿上指公謂宰執大臣曰此先太毋命為朕賔師者冝亟任用之三月特授榮禄大夫平章政事集賢大學士同知徽政院事四年春仁宗皇帝正位宸極真拜中書平章政事進階光禄大夫推恩其先三世且諭之曰卿朕之舊學其悉心以輔朕之不逮公感上知遇毅然以􅀦事為巳任慎賜子重名爵覈太官之濫費汰衛士之冗貟貴戚近臣惡其不利扵巳而莫敢言也前􅀁建新法有未便者奏請革去百司庻政一遵世祖皇帝成憲而行焉仁宗素崇儒且察見吏弊欲痛剗除之公曰吏亦有賢者在乎慎擇而已上曰卿儒者冝與吏軰氣􅀋不合而曲佑之如此真長者之言卿在朕前惟舉人􅀁長而不斥其短尤朕􅀁深嘉也同僚有積與公忤者人意公必衘之及其坐事見黜公乃力言于上俾殿外蕃且優加賜賚以慰其意聞者莫不服其有容方是時朝野乂安民康物阜號稱極治公欿然不自以為功士大夫或譽之􅂺謝曰此聖天子之徳也吾何力之有焉乞解機務上曰朕在位必卿在中書朕與卿君臣當相為終始自今其勿復言尋賜爵秦􅀦公上親授印章仍錫書命以褒寵之上在潜邸甞因公􅀁自號命集賢大學士王顒書秋谷兩大字御署以賜公至是又命繪公像􅃙詞臣為之賛入見必賜坐與語移時而退惟以字呼之曰道復而不名其見尊禮如此皇慶元年春正月特授翰林學士承旨知制誥兼脩國史依前平章政事尋謁告歸塟其父母于潞州之先塋上勞送之曰卿㐮事畢冝亟還母乆留孤朕􅀁望冬十二月入朝上大恱公因請謝事優詔不􅁢然重違其意乃命以平章政事議中書省事依前翰林學士承旨知制誥兼脩國史秦國公大夫令皆公視草史􅁽􅀁記亦公手自刑定辟置官屬多時之聞人二年夏請歸秦􅀦公印綬不􅁢童三上乃如其請先是上與公論用人之道公曰自古人材􅀁出固非一途而科目得人爲盛今欲取天下人材而用之捨科目何以哉然必先徳行經術而後文辭乃可得其真材以爲用上深然其言遂决意行之延祐元年冬十二月復拜公中書平章政事依前翰林學士承旨知制誥兼脩國史二年春遂命公知貢舉及親䇿多士于廷仍命公爲監試官秋七月進階金紫光禄大夫加勲上柱􅀦改封韓􅀦公職任如故公頻年扈從上亰數以衰病不任事乞歸田里六年乃從􅀁乞解其政柄復授翰林學士承旨知制誥兼脩􅀦史散階勳爵如故公旣退居散地日以文史自娯毎入侍燕間禮遇尤至七年春仁宗奄棄羣臣英宗在諒闇中太師帖木迭児再入相以公前共政時不附巳妄構誣言盡収前後􅀁頒封拜制命降授集賢侍講學士嘉議大夫意公必辤因中傷之公受命欣然就職夏五月分治院事扵上都至秋乃還略不以利害得失介其意恒謂人曰吾待罪中書無􅀘扵國聖恩曲宥俾遂閒適今旣老矣何以報之上聞而悟其為譛也恩意稍加焉人望公將復見柄用至治元年春瘡發于股醫莫能療公知不可復起乃區别家事手書付家人使治塟地扵燕遂以夏四月三日薨于大都和寧坊居第之正寢享年六十有七以其月十八日塟宛平縣石井郷原遵遺命也公薨後臺臣累䟽辨其誣乃給還􅀁収制命而復其元官今天子念舊圖功加贈舊學同徳翊戴輔治功臣太保儀同三司上柱國追封魏國公謚文忠配劉氏前公二十一年卒納合氏昭獻元聖皇后􅀁賜前公一月卒並封秦􅀦夫人改韓國夫人俱合塟焉􅁇室何氏封韓國夫人有子一人曰獻今為資善大夫御史中丞知經筵事能世其家者也公宇量閎廓材略過人三入中書事関休戚知無不言援古證今務歸扵至當苟有益扵國家雖違衆而行無􅀁憚四方之士為時􅀁推許者甄㧞無遺汲引後進未始有吝驕之色品題􅀁及後多知名公退一室蕭然留連觴詠言􅀏竟日無異布衣時其為文跌宕有竒氣要其歸一主扵理詩尤清壯麗逸人争傳誦之盖公之歴官行事及平生大略可見者若是而止中朝大謀議旣非外間􅀁得聞它􅀁奏陳亦皆自削其藁莫得而詳也公已定謚扵奉常而􅀦史之傳未立許昌有公祠堂翰林學士歐陽玄為之記公詩文有秋谷集御史中丞許有壬為之序溍幸辱從兩人之後濫厠公門生之列公嗣子獻命溍為之狀以俟太史氏之采擇義不敢辤謹撰次如右謹狀至正八年月日門生黄溍狀元故中奉大夫湖南道宣慰使于公行狀曽祖某金定逺大將軍心水令曽祖母衛氏祖伯儀皇任朝列大夫太常丞兼法物庫使累贈嘉議大夫禮部尚書上輕車都尉追封河南郡侯祖毋晉氏累贈河南郡夫人父䕫皇任中書省􅁺累贈中奉大夫河南江北䓁䖏行中書省参知政事護軍追封河南郡公母張氏累贈河南郡夫人本貫公諱九思字有卿其先家河南而仕扵金汾州節度使知開封府者扵公為五世祖朝請大夫延津令者扵公為四世祖延津府君之子則沁水府君也自沁水府君而上咸葬汴梁金末之亂家譜散落獨存其官稱而軼其諱元光正大中尚書府君甞給事内廷金亡奉衛夫人遷雲中逮我朝括新附之民以經義試中程得􅀠扵儒籍復自雲中奉衛夫人還居薊丘殁遂塟焉故又為薊丘人中統􅀄禡禡丞相行中書省事于燕承制以為禮部貟外郎至元間乃以太保劉文正公薦召見大安閣預定朝儀授尚衣局使乆之進丞太常兼法物庫使積階朝列大夫以年老辭不􅁢卒扵官􅂙政府君受知左丞姚文獻公以為中書省書表官尋遷為􅁺甫逾壯􅀊而卒左丞魏􅀦許文正公率諸生哭而誄之後以公貴追贈二代􅃙詞臣歐陽玄為製碑文凡行治之羙恩寵之盛登載甚具􅂙政府君始封漁陽郡伯張夫人始封漁陽郡君者以家之􅀁在後徙封河南者本其世之􅀁從出也公生四􅀊而失􅀁怙稍長奉尚書府君及張夫人之教深自筞勵博觀經史百氏之書以資其見聞又善為譯語入尚書中書兩省為必闍赤以乆次為其提控至元三十一年授承直郎尚舎監丞數與同列奏請禁絶尅减衛士金帛之弊上嘉納而褒賜焉成宗正位宸極加上世祖􅁉宗兩朝帝后號謚公承上旨預書譯玉􅁽慶賞之優無與為比大徳元年以奉訓大夫知紹興之諸曁州諸曁故為劇俗尚氣而喜争牒訴紏紛為長吏者恒患其不易治公委曲詢訪盡得其情僞擇尤無良者痛繩以法暇日則集州人之子弟扵學示以孝弟忠信之􅀃囂譁之風為之寖衰或言其地産水晶砂金使者旁午調民丁採取之闔境皆為騷動公力陳其妄而止七年以奉直大夫知慶元之奉化州􅀊適大侵􅀍省檄賑台州及昌國之饑比還則州人訴灾傷者限已迫吏白冝勿受公悉受之仍與同僚分檢者約若以荒為熟而民無粮可輸則為代輸由是􅀁按視皆得其實仍為畫拯救之䇿家以四口為率人與米三斗㓜穉則半之尋復􅀍省檄賑象山之饑象山斗入鉅海中以道逺而後至者公謂苟俟申請恐緩而無及則權冝半給之且謂如不得請則已償其費已而報如公請前後􅀁活各數千人州民以強刼捕繫者兩人獄巳具公察其􅁈兩人得不死在官六載治績為諸州最皇慶元年用舉者擢僉江南湖北道肅政㢘訪司事未上除朝散大夫兩浙都轉鹽副使其分治也斥去受財敗法者黄巖州判官嘉興檢校􅀽部鹽司丞各一人由是人知畏憚􅀁部肅然亭户有實受之官本商旅無浮費之事例課日増羡其以􅀻販坐逮者不得它有攀引民頼以安延祐三年以朝請大夫任江浙行中書省理問官白雲宗僧使權貴冒名爵恣横不法擅剃度㳺民四千八百餘人事下公鞠治請謁不行咸伏其􅇳􅀁徴􅂍為錢六萬餘緡冨民以􅁇立訴其家財有三十年不得直者公䆒其實而折以片言其争遂息十年遷亞中大夫杭州路緫管杭為東南一都㑹素號繁劇公剖决如流庭無留訟至扵公上之需一切趍辦未甞缺之􅀁造鹵簿法物事尤重自始作至訖功公皆躬督視之包銀令下人駭扵創見公為程其物力足為等級民不病而事以集推選官酒户必擇大家足以任之者人服其平至治二年除嘉議大夫海道都漕運萬户􅀊􅀁漕粮三百餘萬石舟人受粮之地逺則勞近則逸水程之徃復則春運為易而夏運為難公皆立法以均之至它禁防具為區䖏纎悉備至年規官降錢五千緡命道流蕆醮事而以牲幣祠于水神祈弭風濤之害公言于朝需官錢五萬緡為子本􅀊得息一萬八千緡由是官無甚費而􅀁用給足上下便之㤗定三年遷通議大夫紹興路緫管紹興自洊饑之後二十餘年民力猶未甦公下車即以䡖徭薄賦安集流散墾闢荒閑為先務㑹􅀊復不登俾州縣募冨家出米􅂖一萬三千餘石錢二萬四千餘緡賑其乏食者一萬四千餘口轉運司科郡民􅀊買鹽二萬二千四百餘引公為申眀减其五千六百七十餘引民得以少紓拜中奉大夫廣東道宣慰使都元帥其地内雜蠻獠外接蕃夷最爲鉅鎮廣西徭人􅀼發公給其軍餉十萬石而民不知擾仍以便冝分遣屯戍遏其衝突境内帖然海㓂殺人于貨者名捕弗獲公爲設方略乃悉就擒諸流外之職當選署扵大閫者公令以方寸之帋書其姓名而探之吏不得有􅀁髙下謁選者雖不得其􅀁欲亦莫不心服焉天暦二年移湖南道宣慰使公聞命就道以􅀫染瘴癘成疾還憇于杭遂引年乞􅃱仕旣得請給以半俸疾亦少間日與寓公遺老方外之士徜徉湖山間以觴詠相娯樂未幾疾復作以至正元年五月一日終于杭之􅀻第享年七十有四娶馬氏再娶楊氏並累封河南郡夫人子男三人長溱以公􅄻爲承務郎平江路同知吴江州事次渭次澤女三人長適粘合㤗安次適㳂海上副萬户石抺冝孫次未行孫男二山夀海壽女二皆㓜公為人介潔而中實樂易平日篤扵教子䖏家儉而中禮御衆寛而有制勇扵行義喜周人之急與諸公貴人交未甞干以巳􅀻或詢政事之得失苟有可為禆益者亦不靳也公敭歴中外凡四十五年居官􅀁至去思有碑在奉化則戴先生表元在紹興則韓先生性實記之溱等􅁲以是年六月十五日奉公柩塟仁和縣某郷黄鶴山之原泣謂溍曰先公官三品法當定謚立傳勒銘樂石願有述以備考擇溍􅄑甞獲登公之門而公之守越也又辱效官使於部内知公為詳不敢以不敏辭謹具公世出行事年壽卒塟如右上奉常及太史氏副在􅀻家庸竢立言之君子謹狀至正九年月日奉政大夫江浙等䖏儒學提舉黄溍狀元故正議大夫衛輝路緫管兼本路諸軍奥魯緫管管内勸農事知河防事盧公行狀曽祖鉉贈中順大夫中山府知府上􅀐都尉追封范陽郡伯曽祖母王氏追封范陽郡君祖璉贈亞中大夫東昌路緫管輕車都尉追封范陽郡侯祖母喬氏追封范陽郡夫人父克柔中奉大夫河南江北等䖏行中書省􅂙知政事贈通奉大夫河南江北等䖏行中書省􅂙知政事護軍追封范陽郡公謚文昭母翟氏追封范陽郡夫人李氏封范陽郡太夫人本貫大名路開州濮陽縣公諱景字彦逺其先出扵范陽盧氏五季之亂靡有定居後由鄭之河隂徙滑之胙城自中山府君而上皆葬胙城之班聖固􅀊壬辰東昌府君仕于開州因家焉故今爲大名路開州濮陽縣人文昭公蚤有時名兩府大臣交舉之􅁉宗皇帝時在東宫召見與語大􅀃留寘左右頋遇日隆由樞宻院架閣庫管勾歴典要職出秉憲節入陪台垣事任益重自僉樞宻院事拜􅂙知政事涖治河南江北以疾歸亰師薨于里第訃聞官勲封謚恩數有加尋返塟濮陽之黄斌原有子二人長亘博學而善爲文用姚文公薦入翰林􅀦史院爲編􅁱官五遷至待制皆兼編􅁱以乆次當逓陞奏未上而卒次即公年二十以材選􅇱􅀫衛受知成宗皇帝給事禁闥扈從屬車􅇱殫勞勩丞相興元忠憲王尤器重焉居三􅀊授承直郎都水􅁥丞河决東安州之藍合秀隄盡毀水行地上冐原田敗廬舎事聞于朝以為不亟治將益壊有旨命公緫其役公量事期審功用鳩材庀工不踰月而隄復合民無乆役之苦而獲安其居莫不深徳之改御帶庫副使以恭謹􅀍武宗皇帝眷寵彌厚甞賜以玉帶公叩首力辤不敢受上嘉其㢘譲而有禮累遷奉政大夫資乘庫大使朝散大夫沙糖局提􅀧踐敭旣乆能稱籍甚朝廷欲疇其民庸而圗任焉乃以公爲中順大夫江隂州尹至治二年也建言者謂浙右之民困扵徭役冝令大家割田為之助事下行中書首檄公講行之公稽驗民籍以其田之多寡第為三等取之旣不失其平且勸之毋徒以磽瘠充數凡􅀁得皆上􅃾使役扵官者輪掌其􅀊入儲以待用由是民不吿病公每謂長民者固在扵厚其生然不可以無教用是尤垂意扵庠序之事州學舊有眀倫堂􅀊久傾仆頼公而棟宇復立後生小子始有考徳問業之􅀁人咸稱公可謂得師帥之職矣陞中大夫衢州路緫管公順其土俗􅀁冝以為治摧奸猾扶善良徤訟之風為之衰息盗起常山刼取民家貲財官兵捕之急株連甚衆有平民為􅄷家􅀁搆䧟指為賊首吏莫能察掠治使誣服公疑有􅁈為詳讞而得其情誣服者以不死株連􅀁及亦皆免扵非􅇳人以爲神眀􅀊饑􅂢圭租以活流茡為惠尤大在官五年去之日如始至父老為伐石以紀遺愛焉遷嘉議大夫䖏州路緫管公鈎考學􅅒得羡粮八百石大興土木自禮殿論堂書樓齋室至于門廡煥然畢新學田為青田豪僧􅀁㩀者千百畒已四十餘年前是為郡者皆莫能正公按視舊牘始究其實而悉還其故士之為養益充弦誦之聲洋洋相聞間有自奮扵科級者事見太常博士栁貫􅀁爲記行中書省甞諉公封舶泉南秋毫無取冨商大賈咸戴其徳亦爲立石扵東郊以頌羙之公旣書滿奉李夫人寓居扵江隂􅀄翟夫人生公八年而殁李夫人實撫育公至于成人公事之以孝奉晨昏具甘旨恒恐或缺遇疾病則甞藥以進宦轍􅀁届遇佳山水侍板輿婆娑嬉㳺必盡其歡或逺不可迎􅃱􅂺徘徊思慕不能自巳李夫人夀九十有三而終公方持服俄有正議大夫㐮陽路緫管之命辤不拜服闋改衛輝路緫管未上至正三年九月二十二日以疾卒于寓舎享年六十有一元配劉氏􅁇室邢氏史氏並贈范陽郡夫人子男四人長僧孺用文昭公遺澤􅀘官累陞奉直大夫兾寧路崞州知州以公憂不赴今以遷調爲泉州路緫管府判官次弘志方治進士業次慶孫次添孫俱㓜孫男二人女人僧孺等以至正四年秋某月自江隂奉李夫人及公柩還濮陽其年某月某日祔林公之子鎮􅀦寺善佑庫仲父居中則歴事法當賜謚立傳冝有狀上于奉常及太史氏且以其副乞銘扵當世立言之君子掲諸墓隧以示方来而僧孺出佐􅁁郡縻扵官守俾弘堅蹐門以請吾子其毋譲溍幸甞辱與公有雅故不敢以不敏爲解苐媿與公㳺之日淺莫能􅇱著其詳謹以􅀁知者序次如右以俟采檡金華黄先生文集卷第二十三
