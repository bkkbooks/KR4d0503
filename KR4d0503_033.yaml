body:
  text: 墓志銘江浙儒學副提舉致仕龔先生墓志銘先生諱璛字子敬姓龔氏宋鄉貢進士贈太中大夫諱炳之曾孫祕閣修撰太常少卿贈通議大夫諱基先之孫中奉大夫直寶謨閣司農卿諱潗之子曽祖妣周氏祖妣葛氏並贈碩人妣周氏贈冝人初太中府君以避兵自髙郵徙鎮江卒葬城西五州山子孫因占籍為鎮江人逮先生以宦逰久留平江又家焉先生少聰敏稍長能屬文德祐內附士大夫居班行者例遣北上司農府君以列卿在遣中行至莘縣不食而卒先生悲不自勝暨成人呼其弟理語之曰國亡家破吾兄弟又少孤不能以力振起門户獨不可學為儒無辱先訓乎由是共刻意于學日以微辭奧義自相叩擊其文字交視莫公崙俞公德鄰為丈人行而與戴公表元仇公逺故公長孺盛公彪為忘年友聲譽籍甚人稱其兄弟曰楚兩龔以比漢之兩龔云東平徐公持浙右憲節聞先生名辟置幕下尋舉教官歷平江之和靜學道兩書院山長以纍考當赴吏部銓大名髙公時參預外省先生以書論役法之弊公得書喜曰子有用之材持文書來我為子取教授先生謝曰執政大臣以進賢退不肖為職天下士如某者能一一力致哉誠推是心寒畯之啈公聞其言愈敬異之御史周公馳鄭公雲翼交薦先生冝在館閣皆不報用例調寧國路儒學教授秩滿遷主信之上饒簿以所生母蔣氏憂不赴服除授袁之冝春丞其階再轉俱將仕郎先生笑曰五十年猶故吾耶蓋異時以門䕃𥙷官亦將仕郎也在官歲餘移疾上休致之請遂以從仕郎江浙等處儒學副提舉致仕命下先生巳卒于冝春其卒以至順二年十一月十七日享年六十有六臨終猶強飯正襟危坐命筆作三皇廟記俄投筆謂家人曰汝輩且去吾將少休頃之氣息奄奄而逝先生家事素薄客至不問有無倒壷命飲與之談前代事實娓娓不倦至為諸生論說豪分縷析必使厭所欲乃巳兩持鄉闈文衡號明有司門生弟子彬彬以材自見稱之者不以官而曰先生云其在和靜復侵田若干畝在寧國徴逋租為錢十二萬五千緡刻春秋大學等十九書以惠學者而冝春之政役均訟平部使者以為能數諉以事顧以涖治之日淺其所藴蓄有未悉展也娶周氏知江州德化縣方叔之女子男一曰魯女二適陳方夏景行孫男二曰宣曰冝女二俱幼魯以其年十二月返柩于鎮江明年五月十六日葬五州山先墓東南若干步奉先生子壻陳方狀來謁銘狀稱先生材識足以超軼古人而忠厚不自巳之情未忍斬然遽變其先世承傳之舊故其為言卓偉殊絶自成一家然亦未始不從容乎規矩繩墨中晚年學益醇鋒鍔都盡其進修之實或未易淺言也嗚呼苟非方從先生之久且親孰能知之若是歟先生所著詩文魯既彚次成若干卷因先生自名其齊者目之曰存悔齊槀云銘曰龔𥘉來南以士升太常司農遂世卿今孰嗣者冝春丞既仕弗進用文鳴立言成家樹風聲擺落凡近趨髙明有來侁侁揚其英一鑑亡矣疇依承陳辭相哀垂百齡刻諸方珉告玄扃袁通甫墓志銘吳之隱君子曰袁君諱易字通甫其先當宋有起進士為京朝朝官者曰仲賢始家于汴仲賢之後曰亰西提刑珦於君為五丗祖南渡時卒葬于吳因家焉故今為平江人曽大父曰璡樂其地衍沃買田築室長洲之蛟龍浦躬耕而食以布衣終大父曰祐之承莭郎監廬州都稅務父曰樞國史實録院檢閲文字皆仕而未顯至君復不樂仕進東平徐公持部使者節聞君名延見與語大恱將薦之于朝君力謝不可徐公益賢之巳而行中書省署君石洞山長君乃欣然往就職既歸卒隱弗仕即所居西偏為堂曰靜春壅水成池周于四隅池上纍石如山芰荷蒲葦竹梅松桂蘭菊香草之屬敷舒繚繞而其外則左江右湖禽魚飛泳於烟波莾蒼間堂中有書萬卷悉君手所校㝎客至輒斂卷與縱飲劇談留連竟夕乃巳君丰姿秀朗每雨止凬收挾小舟以茟牀茶竈古玩器自隨逍遙容與扣舷而歌望之者識其為丗外人君少敏於學藴積之素一彂於詩未始髙談性命以師道自任至其在石洞推明雙峯之說上及於考亭多諸生昔所未聞莫不敬服焉君所為詩有靜春堂集八卷龔氏子敬為之序謂近半山而漁陽鮮于公稱其間逺清麗稍加精密少陵不難到其為一時名人推重如此吳興趙公嘗耴汝南先賢傳所記漢司徒袁公卧雪事寫為圖以遺君且曰豫作此圖正以通甫好修之士使之景慕其髙莭爾則君之人品固不問可知君母趙氏濮安懿王八丗孫女妻奚氏子男四人長震次泰次晋皆張出次驄陳出女五人長許適金大聲未行而卒次適顧天麟仲振孫顧正許德明孫男三人孫女二人俱幼君卒以大德十年十一月二十六日得年四十有五其年十二月二十四日葬長洲東吳鄉赭墩先墓之次後二十有八年是為元統二年於是君長子震巳死泰及晋實始伐石以狀來謁銘泰好學而有文稱其家者也銘曰居之熙熙行之施施丗非我遺我有不為寤言歌之其聲也希昭昭其垂表以刻辭楊仲弘墓志銘仲弘既卒之明年溍往哭焉其友壻蔣堂代致八嵗孤選之言曰先人之􅌾非先生莫冝為銘此先人治命也敢奉以請惟先生哀而許之溍不敢不諾也𥘉溍與仲弘不相識輒以書締文字交凡五年始識仲弘後十有一年乃與仲弘同舉進士又八年而仲弘死矣嗚呼其忍執筆而銘諸仲弘諱載姓揚氏其先建州浦城人上距宋翰林學士文公凡十一丗曽祖有雍祖祐之皆有隱德父起潜𥙷京學諸生因家于杭故又為杭州人仲弘少孤事母季氏尽孝而有禮年幾四十不仕田理問用之得其文薦之行中書舉茂材異等不行周御史景逺強之至京師俄以母喪玄賈户部國英數言其材能于朝遂以布衣召入擢翰林國史院編修官與修武宗實録書成褒賜甚厚居亡何調管領係官海船萬户府照磨兼提控案牘於是仁宗在御方以科目耴天下士仲弘首應詔登延祐二年進士乙科用有官恩例視第一人授承務郎饒州路同知浮梁州事秩滿遷儒林郎寧國路總𬋩府推官未上以至治三年八月十五日卒得年五十有三泰㝎某年某月某日葬杭州錢塘縣某鄉某原娶瞿氏子男三人長即選也次遵次迪俱幼仲弘平居性和昜然於論議臧否未嘗有從皆當丗偉人吳興趙公在翰林尤愛重之亟稱其所為文由是仲弘名益聞諸公間蓋仲弘於書無所不讀而其文一以氣為主毫端亹亹從橫巨細無不如其意之所欲出譬如長凬怒䑺一瞬于里至於崎岸之縈折舷欹柁側亦未始有所留礙也凡所撰著未及詮次以行而人多傳誦之溍嘗評其文博而敏直而不肆仲弘亦謂溍曰子之文氣有未充者也然巳密矣溍每歎服其言今巳矣無與共論斯事矣嗚呼而尚忍銘諸姑述其概以慰吾亡友於地下云尓銘曰嗚呼仲弘而止於斯孰昌其氣之死不衰優優其辭不屈不枝有寧一宫文冡在兹過者必式考豫銘詩張弘道墓志銘弘道既沒于杭其子正蒙奉柩還山隂而狀其丗序官閥來求銘以葬豫與道弘同對大廷同校文江西又同校文江淅未卒事而弘道移疾丐休致玄卧翔鵉佛舍竟不起悲夫尚忍銘諸雖然知弘道者莫豫若也銘非豫將誰屬弘道諱士元姓張氏弘道字也弘道生䆠家而自其少時不習貴遊子弟嬉戲事稍長從鄉先生黃君受毛氏詩為舉子業場屋事廢士之志于祿仕者率投牒求察舉𥙷儒學官弘道恬然不以動其意左簞右瓢幾四十年㑹有詔行貢舉法有司乃起弘道使就試遂以延祐二年賜同進士出身歷將仕郎慶元路鄞縣丞從事郎池州路貴池縣尹承事郎太平路總𬋩府經歷用致仕授承直郎同知鉛山州事命下弘道巳卒其卒以天曆二年十月二十日夀六十有四葬以至順某年某月其日墓在承務鄉某山之原弘道為人內秀朗而外䃼踈所學務平實其居官以樂易稱未始求赫赫名眩流俗嘗平反貴池殺人獄亦不自以為功也由是吏弗忍欺而民思之却使者考其績交章以聞事格不下代弘道為鄞貴池者皆弘道𥘉持江浙文衡時進士人尤以為盛事云弘道丗越人髙祖澤宋孝宗龍飛進士由侍御史諌議大夫至兵部尚書後以寶謨閣直學士食柌祿其行事見髙公似孫所為碑文曽祖璧通直郎簽書武安軍節度判官㕔公事祖厚之承直郎溫州樂清縣尉父續古將仕郎入國朝以弘道官七品贈從仕郎處州路慶元縣尹母趙氏知西外宗正事少師不邌之曽孫女妻胡氏太府卿直敷文閣太𥘉之孫女今以贈若封並為冝人子男一人正蒙也當以廕得官未調豫聞弘道垂屬纊猶力疾坐語精爽殊不亂其所存必有過人者然則豫之知弘道抑末矣銘曰樹之既同有穫而弗充不贏于躬獨以嗇終後其豐承德郎中興路石首縣尹曹公墓志銘公諱敏中字子訥姓曹氏衢之龍游人曽祖日新祖克已父心易精於昜學今以公貴贈承直郎衢州路總管府判官母俞氏贈恭人公幼慈祥謹言行以尚書􅌹門用察舉𥙷儒學官歷龍泉永嘉兩縣教諭會有詔行貢舉法首耴江浙行省鄉薦登延祐二年進士第二甲𬒳上㫖賜進士出身授承事郎慶元路同知奉化州事公處事詳練而不為矯激暇日未嘗廢書使者行部甚加敬焉秩滿調本路定海縣尹到官之明年春多雨而夏苦旱麥爛苗槁歲大饑公竭力拯之人賴以生縣民包買食鹽三倍於元㑹計之數行省以公所言下于轉運司减其虛增之額一千七百七十餘引民力以寬丁內艱服除起為承直郎寧國路總管府推官凡所鞠問無不得其平而繫囚免寒暑燥濕疾病之苦歲適大旱民乏食郡守謂公曰寧國一縣饑民九萬六千命懸於旦夕聞子在㝎海救荒有法敢以諉子幸母以職掌拘也公聞命即行還報曰義倉徒為文具而勸賑未必䏻周遍非得官倉之粟不可郡以公言上于行省為發水陽倉米二萬石付公往賑之部使者大喜會宣城縣民亦以乏食告乃彂錢給驛命公亟行母緩所活饑民六萬六千秩滿遷承德郎中興路石首縣尹未上元統二年三月某日以疾卒於家享年七十以至元元年九月二十七日葬于靈山鄉麻溪之原公娶鄭氏贈恭人子男二人長曰康次曰寧女二人適何某黃某孫男四人長宗瑞用公廕入官今為處之龍泉尉女五人曽孫男四人女一人宗瑞不逺數百里以書抵溍曰先大父葬巳久而冡上之石未有刻文敢以為請溍載念疇昔江浙所貢南士同對於大廷者八人公與吳郡干公褎然前列溍亦以非才忝預末綴及筮仕皆在海濵州縣壤地相接而溍玄公治境尤密邇數因事過公獲奉笑言曽嵗月之幾何而星離雲散之八人者惟干公與溍獨存干公以休致進官八座而公終于百里宰其嗣子又不耴丗祿幸其孫䏻自刻厲有遺澤公殁不亡也溍以後死屢嘗銘吾同年之墓雖衰杇荒落何敢于公斳一言乎興懷存殁茅增感創而巳銘曰豫之也厚兮耴之也廉既翔而集兮不飛而潜素乎其位兮飬之以恬䏻謙必豫兮有後之占石刻可徴兮靈山巖巖茶陵州判官許君墓志銘茶陵州判官許君既卒其友危君素曽君堅奉書若狀來徴銘以葬嗚呼溍於君同年生也安敢以不敏辭君諱晋孫字伯昭其先汳人宋南渡後徙建昌曽祖通某州團練使祖開進義校尉父炎仕國朝為欎林州儒學教授母車氏君弱冠遊亰師或介以謁趙文敏公又因文敏遍遊大人先生之門以薦者𬒳㫖𥙷國子學生一時名師儒皆大竒之博士姚公尤器重焉㑹有詔設科耴士君首以諸生擢延祐二年進士苐上方好儒進士當得官者悉命卑便近地以寵榮其𥘉遇君用是得建昌之南城縣丞天燈寺僧甲與乙有私怨欲殺之既操刀入其室值乙將㸑捧所次米而出驚仆于地奴走救得脫甲即以刀自刺連呼殺人且訴于縣獄巳具君閲其牘曰捧米復䏻手殺人耶卒直之太平山中有竊浮圗氏四果之名以為教者文衣髙坐日臨其徒泉南廣東慕而趍之者金帛填委所聚男女恆數百千人不法之狀暴聞于官而吏置弗問君謂是將詿誤吾民為大姦亟列上于郡杖其首百其風遂衰凡君之處事精敏而剛果多此類藍田鄉民訟爭屋新城縣民訟爭山皆久不决郡併以新城事諉君聞君决事平或以屋歸其主或以山交相讓其䏻使民化服又如此郡守𥘉怒君不阿數摧沮之君奉所受命書詣府曰上下相承以禮而巳某不善事上官則有罪乞免玄府僚既諭止君守亦愧悔而加禮焉尋以南城例不淂置丞改贑州録事其治如在南城時包銀令下君鉤校物力之厚薄以應令民用不優紋錦局吏竄毀匠籍而牽聮追呼濫及民伍君白干郡發架閣舊籍證之其弊以絶君之政不便於巳詣部使者誣以他事郡長二素知君率以玄就明之部使者大驚訊之果誣也秩滿調湖州路長興州判官未上丁車夫人憂居喪一用古禮服除殊無仕進意有司以聞乃以茶陵州判官起君於家行及境病暍歸居久之復以病疫而卒至順三年六月六日也得年四十有五階止承事郎葬以某年某月某日墓在南城某鄉某原君性介特而群居踆踆卑讓待儕輩如父兄與人言不苟為容恱然亦不以訐為直其在南城官𪠘去家近日步出視事後雖居它官因不蓄馬市薪菜自烹飪而食略無難色權貴人有遺以美衣數襲者受而弗服也君筮仕後始學于內翰臨川吳公每以及門晚為憾其為文無曼辭詭辨而多骨鯁之言詩尚醖藉未病前一月夢為詩云至道難聞歲年晚聖賢不作後世亂詰旦語人曰吾詩辭意甚悲殆不類平生作及曽君求遺藁其家所夢詩在焉嗚呼其可哀也巳君妻南豐趙氏有子一人曰章𥘉君之季弟鼎孫卒後一歲趙夫人卒又一嵗君遂卒甫四日仲弟益孫亦卒不兩月而欎林府君卒今存者惟一子嗚呼是不又可哀也夫銘曰將聖之門政學殊科兼取其長君材則多殃慶非類報施何以未㝎者天君尚有子將仕佐郎台州路儒學教授致仕程先生墓志銘先生諱端禮字敬叔姓程氏其先逺有丗序而譜牒莫詳所可見者漢有海西令曾唐有太子左衛率府胄曹參軍某其自鄱陽徙家于鄞則由胄曹之大父珍始故今為慶元之鄞縣人㦄五代至宋仕者恆弗絶曽祖振父承務郎平江府百萬倉司門祖在孫通直郎知平江府常熟縣事父立鄉貢進士入皇朝贈從仕郎郊仕署丞母王氏徐氏並封宜人先生徐氏出也𥘉用舉者為廣德之建平池之建德兩縣儒學教諭歷信之稼軒建康之江東兩書院山長用纍考及格上名中書授鉛山州儒學教授秩滿遂以將仕佐郎台州路儒學教授致仕其在建平興舉廢墜諸生之貧者必周給之縣尹王君起宗日率僚友聽其論說且築室赤巖上命其子楚鼇受業焉楚鼇後出入臺閣卒為時之名人繼王君為其縣者復倡好事之家為買書萬卷覆以傑閣永康胡先生長孺記之其在建德增學舍以居其徒盡復民所占田其始至也有田三百畒比受代而去有田一千畒稼軒前賢遺迹多為人所據悉按其籍奪而歸之江東新卑院額有司奉臺府之命選辟先生以闡教事學者翕然知所宗仰文宗在潜邸遣近侍子弟來學賜以金幣牢醲禮遇甚至于鉛山則新其廟學豪家築室侵入仞墻內地久莫能正先生白于部使者命毀其室乃懼而請以腴田二十畒昜之鵝湖書院之旁有道觀先生偶至其處有驢跑堂前隙地驅去復來默卜之曰地下果有物驢當復至巳而驢果來跑益力乃訪觀主求發之得石碣十餘刻群賢像因為作群賢堂先是平章政事趙凉公及王御史理嘗舉先生可教國子趙御史承禧舉先生可提舉儒學俱不報先生歸後郡守王侯元恭踵門禮請先生為學者師帥閫及旁郡講行鄉飲酒禮皆俟先生討論而後㝎郡故有宋丞相史越王所置義廩以助仕族儒家昏喪之不給自先生為之督視貧者始實受其惠先生素所厚一二逹官魁士相繼凋謝先生若有所不樂一日拏舟遊東湖諸生載酒追及之飲于中流酒半酣指所卜葬地曰若豈知我之歸于斯不及也耶學問之道具在聖經賢傳吾嘗述之矣真知實踐則存乎其人尚懋之哉諸生為之黯然各捧觴為夀而歸自是多以病不出久之病加劇客有將上亰師者過而言别相與論宋季事娓娓不倦既正冠送客顔色忽變痰氣作醫者以丹劑進先生却之曰不敢服也目巳暝而頭微偏門人樂良進曰先生頭容稍偏矣復張目端坐而逝至正五年夏六月甲子也享年七十有五以六年某月某甲子葬陽堂鄉之陶奧娶潘氏潘為建平望族先生主教事時慕其賢而以女歸之卒因葬于建平至是奉遷而合祔焉子男一人衍女四人孫男一人循理女三人蓋宋季之士率務以記誦詞章為資身耴寵之具而言道學者亦莫盛於此時四明之學祖陸氏而宗楊袁其言朱子之學者自黃氏震史氏蒙卿始朱子之傳則自㬊氏淵大陽先生某小陽先生某以至于史氏而先生承之黃氏主於躬行而史氏務明體以達用先生素有志於當丗惜其仕不大顯故平生藴蓄未克䆒于設施而私淑諸人者不為無功於名教也故禮部郎中韓公居仁嘗學於小陽先生其仕于先生之鄉與先生論議無不吻合行省屢聘先生較文鄉闈先生以為國朝設科𥘉意専耴朱子貢舉私議今多違之吾往冝不合力辭不往其源流本末可槩見也先生色莊而氣夷善誘學者使之日改月化而仲氏太史公端學克謹師法學者嚴憚之人以比河南程氏兩夫子云先生所著有進學規程若干卷國子監以頒于郡縣學使以為學法有畏齊文集若干卷藏于家先生葬後二年門人徐仁等若干人相與謀俾同門生樂良奉宣文閣授經郎危素之狀來謁銘溍幸嘗辱交於先生徴於狀無不合乃併以平昔所知者論次而銘之銘曰大道孔夷聖賢同趍政厖俗裂師異指殊真儒有作乃發其蔀先生之傳逺有端緒左規右矩蹈夫大中居之以寬休休有容道之將行夫豈弗仕委蛇進退時行時止志局於位厥施未豐惟其教思垂于無窮門人謁辭論撰遺德卑于方來永有矜式南稜先生墓志銘先生姓王氏諱炎澤字威仲學者因其别號尊之曰南稜先生其先系出太原五季時自會稽徙婺之義烏者彥超官至莭度使其逺孫固蚤遊安定胡公之門登皇祐五年進士第宋三百縣人耴科第自固始卒官思陽令右正言知制誥李公清臣銘其墓固諸孫從用生說贈宣奉大夫工部尚書郭公三益表其墓說生永年喬年登紹聖元年進士第嘗仕于京師而僑居于濟南後復居義烏而占籍焉終於中大夫知福州文安縣開國男贈正議大夫子鑄通判嘉興府贈金紫光祿大夫鑄從仕郎嚴州司法𠫭軍娶陳忠肅公子直祕閣正彚之女其沒也正彚志其墓鑄子寧提舉廣東常平茶鹽贈中散大夫寅歷知冝連藤栁峽饒江七州積階朝請大夫喬年子濤承奉郎濤子㝢江東轉運司幹官其丗序官閥見於譜牒知此餘以賞延入官十有一人有通朝籍剖郡符者不可悉舉運幹則先生之高祖也曽祖諱誠祖諱衛道並潜晦弗耀考諱濟以景定二年應薦為國子免解進士妣葉氏軍器監丞䕫路轉運判官蓁之孫女通齊隱君由庚之女先生少嗜書稍長治舉子業頴出儕輩間運去物改而場屋事廢因淂専意探索聖賢之微旨家庭所受既有其素而通齊為外大父又從徐文清公傳考亭朱子之學凬聲氣習之所存感發尤多而操行愈堅窮居約處開門授徒絶口不言仕進久之乃用部使者察舉起為東陽常山兩縣教諭遷石峽書院山長所至以善教飬得士譽在石峽嵗餘即弃官而歸徜徉於家林逾十寒暑至順三年八月十三日以末疾卒享年八十其年十月十日葬縣南崇德鄉湖陽山先墓之次先生氣䫉充偉而襟度踈暢待人一本於誠言論磊落無所隱蔽莫不敬服焉為諸生講說務推明其大義不事支離穿鑿文簡質而生於理詩極渾厚而間出竒語不屑以雕飾求工也有南稜類藁二十卷𥘉考君無子嘗鞠其族子而弗克家𣸪選於族人得先生以為子俾尽有其田廬之不均先業未有不因以墮者也考君賢其言卒成其志而均給焉族黨以是多之娶傅氏前三十年卒先生之葬實同兆域子男二人長良玊常山縣儒學教諭次良珉女三人適傳保許文俊傳復享孫男四人𥙿禕𥙷𥘉曽孫男女三人良玉葬先生殆將兩紀乃來諗於溍曰先人家居教授前後及門數十百人而無顯者不杇之託非子其誰顧以子方效官於中外未遑有請子既淂謝而退失今弗圖懼流凬遺範日就堙沒謹命次男禕疏其行實以俟采托而論撰焉溍竊惟吾里衣冠望族莫先於王氏文獻之相仍亦莫久於王氏先生引而弗替卑付有人見其進未見其止豈必身都髙位而後為䏻丗其家也哉溍自總角忝預弟子列今也髮種種矣唴逝者之如斯愧前聞之荒落言不䏻文而義不敢辭銘曰婺女之墟孝子之里以儒起家肇自王氏丗科丗祿恆不乏人重圭疊組萃于一門是似是續蟬聮十葉𣸪抱遺經修其丗業忠墜益振如木有本如水有源教施于鄉佩襟濟濟道之將行乃止不仕尚克有子而又有孫餘潤所蒙有材彬彬趾美于前垂休於後嗚呼先生是謂不杇葉審言墓志銘至元元貞間部使者振舉學校悉延致前代遺老以主教事一時英俊之士咸立下風惟審言夙負材望以弱冠之年與之並登于師席衆皆羡慕焉審言顧獨恬於進耴筮仕垂四十年猶俯首常調隨牒逺方後耒居上者不知其幾及審言以六品官致其事而竟不得從容享一日之安嗚呼悲夫審言姓葉氏諱謹翁審言字也丗為婺之金華人曽大父大冶縣主簿邽受業吕成公之門以所得于成公者授徐文清公僑文清後為朱文公門人髙第而于大冶君執弟子禮沒身不衰大父榮發深自韜晦罕與物接父霖始復以家學私㳤其里人故端明殿學士王公野知南康軍葉公閶咸敬禮焉仕皇朝卒官將仕佐郎婺州路蘭溪州儒學教授致仕母曹氏有賢行審言性明達而蚤有知於書無不讀由家傳之端緒泝儒先之源委卓然自立諸老無不樂與之逰舉教官歷浦江義烏兩縣教諭升衢之明正書院山長丁外艱服除上名銓部借授處之縉雲縣官政鄉巡檢丁內艱服除遷吉安之吉水州學教授秩滿調泉之晋江縣主簿階將仕郎同僚有與之不合者力搆陷之部使者雖莫䏻察而心竊疑焉不及竟其事而玄後使者得審言受誣狀而不欲自為異同乃貰其罪而解其職頃之仍舊階改調婺州路司獄在官五年以老請謝事授承務郎溫州路同知瑞安州事致仕命下審言巳以疾不起審言事親孝父子自為師友念母老不可一日去左右所至必侍奉以行仲弟無依贍之終身平居寡欲治家有法吉凶慶吊一遵成公家範曰吾有所受之也資産素簿而室廬再厄于災至無一椽以庇風雨僑寓說齊精舍久之乃得老屋數楹僻在東郭外教子之暇日以種蒔為事暮年徙居城西北隅間得微祿不足自給處之晏如時從明舊飲酒賦詩陶然自適昜簀之日有書數卷田數畒而巳審言所居齊室扁曰四勿自號贅翁歸自泉南又自號曲全道人所為詩文和昜平實無纎麗之態有四勿齊槀若干卷曲全集若干卷藏于家審言生于宋咸淳八年四月十六日卒於今至正六年十月十日年七十有五娶蘇氏文㝎公世孫女後三年卒以某年某月某日合葬于金華縣赤松鄉羅家橋之原子男三人長敬之處州路慶元縣榮慶鄉巡檢前卒次復之未任次泰之廕𥙷江浙行中書省廣濟庫子女七人其五適同郡嚴弘道趙嗣滋杜宏喻德順潘繼善其二以疾在室孫男一人囝女二人其一適浦江張㮒其一尚幼審言所交皆四方名士里居之曰最所友善者許文懿公謙翰林待制栁公貫太常博士胡君助禮部郎中吳君師道翰林修撰張君樞而溍亦幸獲陪諸公之末至是諸公多巳凋謝惟胡君與溍獨存故泰之求胡君為之狀而屬溍以銘嗚呼悲夫載念溍之少也從先生長者詠歌先王之道于寬間寂寞之鄉將以是終其身審言力挽之出而䆠遊不遂晚通朝籍以親老請外遂納祿而歸審言適己掛冠往見之雙溪上渥手道舊故殊欵洽别去甫一月而審言逝矣又一月而溍蒙恩錫召欲伸繐帷之一慟而不可得銘固不敢以諉于它人也嗚呼悲夫審言分教兩縣所至以教養為務興壞起廢之功尤多其在明正書院復道流冒占之田二百餘畒吉水號多士教官良不昜為審言處之有道由是士論厭服審言為巡官則能使盜息而民安為獄官則能使囚徒不失其所誠可謂得其職而審言之所以不朽者不􅌹在是也兹不詳述焉銘曰有作而興載揚其英胡不奮飛徐徐吾行黽勉從事靡愛其力執虛若盈戰兢夕惕不疑于人蹈夫危機困而能亨罔間險夷皇仁在上天日照臨朱紱之來于光有耀鼓缶而歌式全吾歸孰昭其昧曰有刻辭黃彥實墓志銘彥實諱叔英明慈溪黃氏年五十有五以泰㝎四年九月某日卒于鄞明年九月庚申葬餘姚之竹山溍異時與彥實遊彥實言今天下文章巨工知我者惟伯長伯長必先我死我死子其銘我伯長故翰林侍講學士袁文清公也溍藐焉晚出于文清無能為役彥實乃欲以之承其乏耶而孰知溍之哭文清僅踰月又哭彥實邪溍雖不敏彥實之言詎可忘耶𥘉朝廷既新貢舉法而場屋事久廢老生宿學多己物故後進之士無所依承則相率之彥實受弟子業凡彥實所指授取科名預薦書者相望否者亦且去而𥙷儒學官人皆為彥實喜而彥實顧不能少自貶以就有司之繩尺訖無所遇合以死人又莫不深悲之其知彥實者若是而已至于彥實之所存知之者未必盡也彥實之先大夫文潔先生宋寶祐丙辰文天祥榜進士負材能尚氣節而甚邃于經術所著書世多有之蓋先生之學一以躬行為本故其在朝著見謂忠鯁而分符握節所主舉其職業凮采凛然先生三子俱克紹其家學而彥實最少介然特立不務為苟同尤酷肖焉文清稱彥實少遊故都見丗所稱知名人率脂韋自保祕惋恨無可與語酒酣氣雄謂海宇方宴安休明冝耴天下事置念慮以入計畫否則搜抉險幽浩然為万里遊遇不遇命也未幾泝采石上漢江而遊荆襄歷觀用武關要荒榛廢壘猶有䏻言昔時得失益慷慨自振而所見公卿大夫與夫布衣之士則皆與昔交遊者無大異於是治其居曰戇庵閉門讀書益不妄交嗟乎彥實之于天下獨以文清為知已而文清之言如此彥實所存固可槩見矣彼以是瑣瑣者為彥實置欣戚焉何哉彥實嘗為晋陵宣城蕪湖三學教諭又為和靖采石兩院山長間以茂異遣詣中書弗果行彥實殊不以小試為辱亦不以不大用為詘也彥實於經史百氏之書過目輒成誦為文雋拔偉麗意氣奔放若不可禦而要其歸弗畔於道有戇庵暇筆三卷詩文雜著總二十卷藏于家彥實之曽大父曰丗堯大父曰奉議郎一鶚父曰朝奉大夫宗正少卿震文潔蓋門人私諡云母趙氏封安人而彥實沈出也娶岑氏先卒再娶王氏子男一曰祖德女二長嫁岺可久而夭次未行銘曰物之不齊雜糅錯出惡妍喜􅑦干古一律德人天遊不物於物尚無有已孰為淂失惟是浩然之死不沒磊落峥嶸軒昻突兀發其遺編猶見髣佛寫以石章用告幽室錢翼之墓志銘翼之姓錢氏諱良右丗為平江人曽大父丗昌大父恪父宗慶俱未仕而大父用其仲子台州路總管府判官宗顯恩贈承事郎鎮江路丹陽縣尹翼而不凡長益闓敏徐文貞公持淅西部使者莭台州君處其幕下翼之因得侍公左右公見其言談舉止謹飭有禮大竒之台州君同幕多名流公語之曰錢生濟濟有儒者意度令親簡編必成令器翼之亦感勵自力於學公所為詩文必出以示翼之其耴重如此翼之既遊文貞之門至於前代遺老若并陽周先生淮隂龔先生當丗宗工若剡源戴先生隆山牟先生永康胡先生翼之無不接其緒論中州雅望若薊丘李公漁陽鮮于公暨一時賢雋之士亦皆折行輩與翼之交故其聞見最為詳博而吳興趙公巴西鄧公遇翼之尤厚數引拔之翼之殊無仕進意至大中行尚書省署翼之吳縣儒學教諭翼之欣然就職巳代去輒不復出間居三十年安貧守約未始有求於人一室蕭然坐客常滿詠歌酣嬉無虛日里中子弟耒就學亦弗拒也御史聊城周公舉翼之冝在館閣未報而中書連𬒳上㫖擇工於書者俾書農桑輯要大學衍義有司悉起翼之以應令竣事薦章交上亦不報浮光王公與翼之生同嵗居同里公由户部尚書參預河南江北行省事念故人之存者獨翼之將力援之於朝而翼之素志丘壑至是亦既老矣翼之性夷曠與人交無町畦䔍於故舊往來尺牘裒輯裝治惟謹時出以示人曰吾非以此衒其識人之多特於其間有情辭諄切關於丗教者不可廢耳然不喜於苟同人有不善㦯面斥之以其行孚於人不以為異也大參金源王公嘗問翼之曰錢氏起五季有吳越子弟多在東南且丗有顯人君豈其裔耶翼之曰此無從稽也蓋某之先有甓壚沽酒者每見故書紙輒手拾聚而焚之曰吾子孫其有興於文學者乎公聞翼之言深服其質直翼之晚自號江村民人因以江村先生稱之至正四年五月八日以疾卒于家享年六十有七疾巳革猶正巾危坐秉筆作弟姪書頃之而逝𥘉室徐氏廣德縣尉逢吉之女無子繼室丘氏宋龍圖閣學士贈特進嶽之曽孫承奉郎稷之女子男一人曰逵女二人長適張元善前卒次適吳某孫男某女三人皆幼逵既以其月十有八日奉柩葬吳縣靈岩鄉黃山徐涇先墓之次而刻石志其嵗月且遵治命以狀來徴銘豫辱遊於翼之父子間甚久别玄十年而翼之遽不可作其以銘見屬望豫厚矣逵又好學有文䏻嗣其丗業而汲汲焉用意於不杇事豫何敢辭翼之有詩文雜著若干卷奎章閣侍書學士虞公巳為之序以故弗論翼之於古篆隸真行小草無不精絶豪家貴人往往傳藏以為珍玩或有所挾而强使為之雖奉以百金弗顧也人多以是敬服之而罕有論其出處之大致者序而銘之庶幾來丗有以知其人也銘曰由學而升不近乎名既仕而止不失乎已藏之若虛以浮湛于里閭優遊卒嵗匪依隱而玩丗惟以求夫志欲知其人視此刻文金華黃先生文集卷三十三
