body:
  text: 神道碑臨川危素編次番昜劉耳校正中書右丞相贈孚道志仁清忠一德㓛臣太師開府儀同三司上柱國追封鄆王諡文忠神道碑至正八年春正月五日皇帝御興聖宫便殿中書省臣以故右丞相鄆文忠王神道之碑未建奏請敕臣溍為之文以賜其家俾刻焉臣溍竊惟王之宏模偉度山髙而海深非末學小臣所能窺測懼無以稱塞明詔顧以待罪太史屬職在記述不敢伏闕控辭則退而考其世次官伐行事之實序而銘之昧死以上謹按王諱拜住系出札刺爾氏六世祖諱孔溫窟哇從太祖皇帝伐乃蠻以巳馬濟太祖步戰而殁贈推忠效莭保大佐運㓛臣太師開府儀同三司上柱國追封魯國王諡忠宣六世祖妣諱闊䕫追封魯國王夫人五世祖諱木華黎從太祖皇帝滅克烈太祖即帝位以為左萬户從破金入燕專征遼東西諸郡授太師國王都行省承制行事建牙于燕以經略中原金主南奔齊魯趙魏晉秦之地次苐悉平臨終以金人未滅為憾贈體仁開國輔世佐命㓛臣太師開府儀同三司上柱國追封魯國王諡忠武五世祖妣諱普合倫追封魯國王夫人髙祖諱孛魯嗣國王奉太祖皇帝命攻西夏㝎河北平山東以㓛食東平郡贈純誠開濟保德輔運㓛臣太師開府儀同三司上柱國追封魯國王諡忠㝎髙祖妣諱合䔍輝追封魯國王夫人曾祖諱霸都魯從世祖皇帝伐宋為先鋒元帥巳渡江與世祖會鄂州而憲宗崩世祖俾總師留屯而還殁于軍贈推誠宣力翊運㓛臣太師開府儀同三司追封東平王諡武靖曾祖妣弘吉烈氏諱鐵木倫昭睿順聖皇后女兄追封東平王夫人祖諱安童事世祖皇帝掌環衛之政令位百僚上拜中書右丞相食四千戶佐皇子北平王出鎮北邉十年而歸復拜中書右丞相替上冊皇后皇太子議規襄陽以取宋所薦史忠武公天澤姚文獻公樞許文正公衡商攴㝎公挺皆時之宿望以阿合馬桑葛尚書省之政誤國害民而力斥之立御史臺以正朝綱立太常寺以崇典禮㝎强竊盜賊論罪輕重法以止濫殺語國朝之賢相必以為稱首贈推忠同德翊運㓛臣太師開府儀同三司追封東平王諡忠憲加贈推忠守正同德翊運㓛臣上柱國進封魯王餘如故祖妣怯烈氏諱普顔匆都纍封魯王夫人考諱兀都台成宗時􅊞掌環衛以大司從領太常寺事贈輸誠保德翊衛㓛臣開府儀同三司太師上柱國追封東平王諡忠簡加贈宣力迪慶保德翊運㓛臣進封兖王餘如故妣篤思刺氏諱吐薛怯溫纍封兖王夫人忠宣忠武兩王故有廟于東平英宗皇帝特賜以碑額曰元勳世德别賜忠憲王開國元勳命世大臣之碑勑翰林侍講學士元明善製為銘辭樹于王所食采地范陽之通逵因臨幸而觀焉號其地曰駐蹕莊云王生五歲而孤兖王夫人撫育備至令知文學者陳聖賢孝弟忠信之說以開導之聞輒領解大德十一年武宗皇帝入正大統王甫十歲迎謁道左上親執其手慰藉久之人見王嶷然公輔之器相與屬目謂有祖風至大二年􅊞掌環衛歷事仁宗皇帝眷注尤深延祐二年擢資政大夫太常禮儀使四年加榮祿大夫大司從仍領太常五年遷金𬗋光祿大夫六年進開府儀同三司七年春三月英宗皇帝嗣位拜中書平章政事𥘉上在儲闈王之令譽日間于左右遣使召見王謝曰以扈從之臣而往來宫邸嫌疑之際不可不謹臣之獲罪固無所避亦豈太子福耶上嘉其有識可屬大事由是首登用焉故事天子即位之日必大㑹諸侯王讀太祖寶訓是日命王啓而讀之王風儀峻整音莭鴻亮聽者肅然夏五月加上柱國録軍國重事進拜中書左丞相先是東朝嬖幸估寵干政首相帖木迭而頗與之相為表裏仁宗不悅解其政柄無何上崩英宗在諒暗中遂復出居相位睚眦之怨必報一時善類邅其誣衊多陷于不測之罪其黨與以權勢相軋而日生釁隙亦莫䏻自全王與之並相獨堅持正論不少回撓遇僚佐闕必公選棆而用之臺臣奏疏謂君子小人不可同處首相以為譏已而深銜之顧未有以發至治元年監察御史言大歲在酉不冝造寺于西山遂指以為謗訕言者既橫加酷罰因盡斥奮臣而援䥫實為御史大夫又以其子八里吉思為宣政中政等九使瑣南為治書侍御史􅊚黨分據要途秋月王至自上亰梘事于中書首相稱疾不出以伺間而謀為中傷巳而言􅍚愈將出上使止之氣乃沮二年秋遂以病死八里吉思與姦人妄獻民田而冒受其直王奏誅之又奏黜瑣南以通言路冬十一月王拜中書右丞相監修國史上為虛左揆之席以示圖任之專仍降詔布告于中外王舉前平章政事張圭與之共政集大臣及故老詢所以弭日食地震之變士大夫邅擯棄者咸以所長收叙文學之臣則待以不次之除格內降待銓者六七百人振舉學校而士知所作興修眀條制而吏有所遵守减江南民租八十餘萬石設宗仁衛贖蒙古子女之奴于民間者以隸焉朝廷政令聳然一新四方之人無不動色胥慶上之始臨御也以察罕腦兒行宫亨麗殿規制褊迫命改作而侈大之王引莭用愛人使民以時之言極諌而止又將以元夕結綵為山張燈禁中參議中書省事張養浩上疏諌王亟以聞即命罷之仍賜美錦以旌其直仁宗當升祔而廟無其室王傳旨集諸儒議僉以為廟之始建前殿而後寢今寢已燬于灾宜更作前殿為間十有五其中三間為太祖室以備祫享列聖神御間為一室東西兩間為祧而以今殿為寢上可其奏廟制乃完上欲躬行享祀之禮王進太常所纂儀注詔頒下有司卜日有事于太廟始備大駕鹵簿建太常十有二斿列黃麾仗五千人上服通天冠絳紗𫀆出自崇天門衆庶聚觀儀衛文物之盛莫不感歎以為三代禮樂復見于今及行事王攝太尉上親𬒳衮冕執圭瓉祼獻禮成還宫王率群臣稱賀于大明殿推恩錫賚有差上嘗坐穆清閣顧謂王曰今亦有如唐魏徴之敢諌者乎王對曰槃圎則水圎盂方則水方有太宗納諌之君則有魏徴敢諌之臣上稱善或勸上純任釋氏之法以治天下上問王何如王曰釋氏之道貴清靜寂滅可以自治而不可以治人帝王之仁義禮樂乃所以為治也上默然有旨俾王提調大司農王曰宰相之職無所不統寧獨大司農耶上以為知大體嘗賜以金脊殿車又嘗閲寶玉于章佩監命惟意所擇皆力辭尋詔􅊚宗室女又辭命國工繪王像勑翰林侍講學士袁桷為之贊御書唐皮日休吾愛房與杜魁然真宰輔黃閣三十年清風億萬古之詩以賜之蓋期望之也至矣王亦感上殊遇自任以天下之重事有當㢮張知無不為既盡發故首相欺悖之迹削其官爵仆其碑籍其家背公死黨者多謀不利于王左右請為之備王曰吾尽吾心上不負吾君吾祖父下不負吾士民而己何備為然深患讒言之興因侍燕間從容奏曰陛下不以臣年少無似使備貟宰相方務彰善疸惡期致隆平苟有沮之者則臣不能有所為矣上曰卿第勉之果有間言朕不聽也三年復上時巡甫至上亰夜寐不寧趣大作佛事王曰財從民出國以民安殫財困民未見其福上矍然曰朕所創惟夀安山餘皆完其舊爾民亦以為病乎自今其輟土木之伇既而負罪懼誅者復隂訹群僧言國當有厄非作佛事而大赦無以禳之王叱曰爾輩不過圗得金帛而巳又欲庇有罪耶姦黨聞之皆失色而八里吉思之罔上為姦利事連䥫寶恐不自保遂與赤因帖木而等潜蓄異謀其年秋乘輿還次南坡帝崩王亦及于難王生于大德二年春三月八薨于至治三年秋八月四日享年二十有六以是年月日葬于大都宛平縣鄉田村之原秋九月晉王入繼廷臣族誅命奉王像祠于海雲寺泰㝎元年贈清忠一德佐運㓛臣太師開府儀同三司上柱國追封東平王諡忠獻今上皇帝至元元年又敕翰林直學士歐陽玄贊王像藏于祕書監年加贈孚道志仁清忠一德㓛臣進封鄆王改諡文忠太帥開府儀同三司上柱國如故祖考皆加贈進封焉夫人諱妥妥徽太府卿土祿不花之女婦道母儀協于閫範王薨省臺各奏賜鈔十五萬緡今上又賜金五十兩鈔王萬緡歲給諸王供膳衣物仍敕奎章閣學士巙巙大書表其所居曰貞節之門夫人生于大德四年夏五月二十日薨於至正三年夏六月八日享年四十有四以是年月日合葬于王墓由東平夫人進封鄆王夫人賜諡貞靜蓋異數也子男二人長答利麻碩理虎符宗仁蒙古衛親軍都指揮使後王年卒次因牙納碩理文宗時賜名䔍麟鐡穆爾襲􅕄環衛虎符宗仁蒙古衛親軍都指揮使時十有一上見其朝服列于班行神采煥發甚愛重之命受經于奎章閣歷崇福司太常太禧兩院使大宗正府也可札魯忽赤宣徽使知樞密院事中間惟兩翰林院皆再入為學士承旨今以特旨遷大司農仍舊階開府儀同三司端粹博碩尚文而下士當承平無事時侍上起居弗懈益虔人以為䏻世其家臣溍歷觀帝王之肇基立極必有元才巨德應期而出以翊扶昌運十亂造周三傑興漢載籍所記埀輝千齡然閎散之後相業無傳蕭張之家侯封莫續有如王之恢張先烈乘時奮庸為國世臣同休共戚委祉于後繼述有人可謂卓冠古今敻絶倫比也巳矧惟昔之名臣或前規後隨以相成或應變守文而共濟未有不同心戮力而能光輔帝室者王以勳賢貴胄夙受主知魚水之親䐇合無間而所與共立者非其人王獨精白一心盡悴事國力摧百壬之鋒訖使朝廷百官四方逺近莫敢不一于正蓋其事視古人為尤難雖邅值變故而平生大莭彌久益著又亘古之所未有播之聲詩以震于無垠夫亦勸忠之道也百世之下尚鍳于兹銘曰大眀麗天赫赫英皇巖石爾瞻侃侃鄆王惟王之先鷹揚朔土手挈中原歸奉真主異才間出騰風躍雲克濟其美為國虎臣聖神撫運統一寰宇轉旋鈞軸篤生碩輔垂紳正笏乾清坤寧經綸之業惟王敬承左右三朝服勤帷幄靖共正直執事有恪乃世其官典領奉常乃授以政乃登廟廊崇儉抑奢諌行言聽乃宅百揆以佐出令仁漸義摩文恬武嬉禮樂之興適惟其時龍承祀肅肅在廟惟時顯相丕揚聖孝德教所加望治有期孰使共兜接武夷䕫緬彼滔天屹乎砥柱不震不竦衆正所怙福善禍淫天道之常魁柄既專化弦乃張曀霾滌蕩天青日白檮杌嵬瑣莫掩其迹蹈于危疑搆兹閔凶萬姓之悲攀髯抱弓金攴翠蓋神遊寥廓英姿爽氣清風延閣增崇位號惟帝念㓛勒辭啚堅于以勸忠尚其嗣人咸有一德與國同休永永無極江浙行中書省平章政事贈太傅安慶武襄王神道碑至正八年春正月二十日丁巳詔贈故江浙等處行中書省平章政事也速䚟兒推忠宣力守正佐理㓛臣太傳開府儀同三司上柱國追封安慶王諡武襄於是王之薨五十年矣皇上纘承鴻業追念舊勳不以存亡久近為間渙頒異數以照臨之甚盛德也臣溍承乏詞林既推述聖意形諸贊書三月丁酉朔上復用中書奏敕臣溍考次㓛業勒兹樂石臣𬒳命而退謹即王之孫今上都留守古納刺訪求王世系官閥行事之實序而銘之王元名帖木兒成宗御極避而易今諱曰也速䚟兒系出兀里養哈䚟氏其先折里麻生合赤溫合赤溫生哈班于王為曾大父有子二人曰忽魯渾曰速不䚟俱以驍勇善射稱忽魯渾則王之大父也以哈必赤百户事太祖皇帝哈班嘗從太祖飲班术納河之水遇盜舉槍欲刺之為忽魯渾反鋒所刺人馬俱踣又嘗從太祖避乃蠻追兵于長城之南忽魯渾射却其渠帥餘衆夜自相驚而潰中原既㝎方論功行封不及祿而卒父曰哈丹大宗正府也可札魯忽赤母曰王生于朔漠資禀雄毅沈重有謀讀書能知大意弱齡入侍世祖皇帝列職于環衛以忠謹深𬒳眷知速不䚟之孫是為丞相河南武㝎王阿术受詔伐宋王于武㝎為從弟武㝎察其材智絶人可為已二言于上挾與俱行從武㝎破樊城下襄陽至元十一年世祖命丞相淮安忠武王伯顔與武㝎大會師于襄陽分軍為三道並進忠武與武㝎由中道將濟江忠武密謀于武㝎為搗虗之計王從武㝎以昏時泝流行二十里夜半絶江徑渡黎明與宋將夏貴大戰陽羅堡拔之遂取鄂州順流而東宋都督賈似道與大軍相拒于丁家洲其前鋒孫虎臣來􅊇戰武㝎俾王乘髙覘之見其陳勢首尾橫决以戰艦衝擊之似道先遁十三萬軍一時俱潰王從武㝎追奔逐北百五十里所至禁部曲不得侵暴敵人委棄資仗悉以與將士莫不畏其威懷其惠而樂于趍事赴㓛十二年有旨行中書省駐建康行樞密院駐鎮江别敕武㝎攻揚州武㝎俾王率䝉古軍鏖戰揚子槗出竒兵斷真州餫道宋將張世傑以巨舟萬餘艘屯揚子江中流王從武㝎領伉健善彀者夾射而急擊之繼以火矢灼其蓬檣大敗世傑于焦山下自是宋人不復能軍凡大軍與宋人接戰王無不在其間十三年宋以國降十四年朝廷第㓛行賞授行中書省斷事官階懷逺大將軍十五年轉昭勇大將軍十六年除淮東道宣慰使遷鎮國上將軍奉省檄馳報邉事王謂機事不可不密入對便殿出奏牘于懷上大竒之召近臣知文墨者使進讀而左右適無其人王拜而言曰臣亦粗知文墨乃誦其文而釋以譯語音吐明暢辭旨精切上恱令縱橫行殿中而默察之知為偉器諭宰臣俾與共政遂以參議中書省事它日奏事殿中問居何職王以實對上詰宰臣曰朕𥘉意以為卿同列置之僚佐何耶二十二年丞相魯國忠武王安童自北邉歸秉政為世祖言帖木兒䝉古人而于漢人語言文字無所不通久淹下位冝升用之其言適契于上意問居其上者為誰對曰參政郭佑參議秃魯花拜降即日命為中奉大夫中書參知政事位郭佑上仍敕之曰自今事皆責成于汝二十三年進資德大夫中書左丞二十四年尚書省立拜榮祿大夫平章政事甫視政而宗王乃顔叛扈蹕親征給餉運籌備殫其勤既平乃顔群臣從屬車奏凱而歸王復與諸將留兵討其餘黨金家奴塔不䚟悉戡㝎之乃還上以王生事素薄賜鈔五千緡王因奏臣前出軍至亦乞列思之地有來供餽鄉導者上命厚賞之二十七年武平地大震姦人乘灾異相扇搖藩王為其言所動者三人民大惶惑上慮乃顔之黨因而為變遣王引兵五百人往撫㝎之王率有司齊沐禱于山川百神以便冝蠲田租弛商稅除酒禁發鈔四萬二千緡運采萬名轉海而至以賑其乏絶教民母惑于訛言捕斬乘時為盜者無少貸收三藩王而鞠之始皆倔強不伏既得其情徐諭以禍福之重輕乃伏其辜事間上甚韙之遼陽行省治懿州驛道自北亰至上都頗回逺王因奏請徙由髙州以北而减去五驛其三以備它驛人户物力之乏絶其二以隸虎賁司給土田牛具俾之立屯公私咸以為便方是時桑哥在相位巳久專恣日甚誣陷忠良賣官鬻獄設計局以求遺利毒及編民王既還居政府乃列上其罪狀會侍從近臣亦有顯斥其姦者􅮏哥及同惡皆誅死王以是益為上所親信年拜江浙等處行中書省平章政事仍舊階榮祿大夫成宗皇帝以王先朝奮弼委任愈專江浙省治錢塘實宋之故都所統列郡民物殷盛國家經費之所從出而又外控島夷最為巨鎮非朝廷重臣莫克任蕃屏之寄王威望素著涖事伊始風采一新屬部帥守重足而立以俟要束權貴無或敢撓其政豪強震懾田里晏然大德二年秋八月十九日以疾薨于位享年四十有五其年月日還葬于大都宛平縣郎山之原王性剛直而善于自持雖異巳者莫能伺其間隙由是始卒無疪然喜汲引人物凡所甄拔後多知名王之配曰忽都追封安慶王夫人子男三人曰忽刺䚟江浙等處行中書省平章省平章政事曰探迪御史中丞曰木八刺沙南陽府逹魯花赤女一人曰卯罕適翰林學士承旨朵䚟孫男九人脫因納陜西諸道行御史臺御史大夫紐兒該同知都護府事古納刺由江浙等處行中書省平章政事擢江南諸道行御史臺御史中丞今以榮祿大夫為上都留守兼本路都總𬋩府逹魯花赤完者不花金保也䔍古八刺臣溍竊觀自昔君臣際㑹之盛或䇿勳于行陳之間或訏謨于廟堂之上未始不各效其所長若王之出入將相豐㓛茂烈彌久益彰蓋亦鮮矣是冝沒而不亡克承天寵慶流後裔與國家相為無窮者也垂于竹帛被于弦歌光在邦家豈徒賁其丘隧而已乎銘曰氣運合一實生偉人惟材之完出武入文聖神御天誕受方國猶有江流限夫南北恭恭元戎上所倚毗仡仡虎臣左之右之潜師宵濟投鞭勇往訖成俊功光膺上賞乃居屏翰乃登廟廊身屬櫜鞬取彼叛王旄頭豹尾凱旋亰闕分兵後拒剪其餘孽將指東藩假以便冝力止訛言俾民不迷榷姦擅國簧鼓聖德朝綱紊弛民不堪命白發其私靡所覆藏揚于大廷解弦易張肅持政柄坐鎮南服枹鼓不鳴家給人足庶遄其歸衮衣繡裳胡不憗遺奄其淪亡時逾四紀綿綿世胄咸濟其美賜履之舊瞻彼郎山有封斯崇生氣凛然拱木清風念舊啚功褒美有詔申敕詞臣薦此碑號宣徽使太保㝎國忠亮公神道碑故榮祿大夫宣徽使答失蠻以延祐四年九月五日薨于位享年六十越三日葬于亰城東杜樹辛莊其眀年制贈推誠㝎力守正功臣太保金𬗋光祿大夫上柱國追封㝎國公諡忠亮又六年史臣禮部尚書曺元用始奉敕撰次公行業以為神道之碑又二十四年是為今天子至正八年夏四月九日上御興聖殿西便殿翰林學士承旨臣嶽柱為奏請命臣溍繼元用為之銘以賜其家俾刻焉謹按公諱答失蠻其先西域人系出哈刺魯氏曽祖馬馬贈集賢學士正奉大夫護軍追封中山郡公祖阿里贈資德大夫司農卿上護軍追封中山郡公父哈只贈榮祿大夫司徒柱國追封㝎國公曾祖妣太帖尼氏祖妣忽委氏並中山郡夫人妣阿兀思吉氏㝎國夫人𥘉集賢公在西域為其國之近臣素倜儻有大志知天命之有歸當太祖皇帝正大位之六年歲在辛未奉其國主阿爾思蘭來覲于龍居河司農公前􅌰乃以司徒公為質子時年尚􅏊上命育于春坊稍長事太宗皇帝為寶兒赤寶兒赤蓋古內饔之職最為親密司徒公以恭謹尤被寵遇扈從西征有㓛妻以河而貴族㝎國夫人也世祖皇帝取南詔伐宋司徒公皆與在行尋以疾􅌰公少襲父職為寶兒赤世祖甚噯重之嘗侍上左右極論阿合馬尚書省之政蠧國病民上怒而斥之曰無預若事公徐對曰犬馬知報其主臣世荷國恩事有關于治亂安敢坐視而不言其後阿合馬死尚書省罷上乃思其直賜以玉環及鈔二千五百緡且諭㫖後有所知其盡言毋諱從討叛王乃顔有㓛妻以名族女脫脫倫氏仍賜良馬白金佩服珍異之物抗海之役督餉餽于雲中晉王軍乏食給以米數千石師還以專擅待罪上善其有識量而知榷變嘉歎不巳賜白金百兩鈔千五百緡公因奏草青畜肥之日尚賖今所給未充恐終不免轉死請增給以半年之食上從之衆賴以安㑹復立尚書省公以前有旨得盡言遂指陳其非便言尤剴切暨桑葛伏誅而其言皆驗詔賜宅一區固辭乃賜王環及燕服以旌其忠禮遇之厚有加于前成宗臨御之𥘉以奉議大夫領供膳司事叛王海都稱兵內向車駕親征倍道兼行晝夜不息士􅌰巳疲而後軍不繼公諌曰獨往恐生它虞宜徐行俟衆大集而後進乃可為萬全之䇿上韙其言後數日戰大捷海都敗走凱旋而歸第㓛行賞賜以田三百畒尋擢司農丞進職為卿與其子買奴侍上􅍚于卧內連數月衣不解帶􅍚少間賜以鈔二萬五千緡成宗賔天公北迓武宗皇帝于野馬川歸正宸極仁宗在儲闈以公先朝舊人奏為中書參知政事仍兼司農卿賜以金帶犀帶七寶笠珠帽珠衣金五十仁宗踐阼首命僉宣徽院事同列以出納不謹陷于私罪公獨不汙其事仍充舊職厯副使同知院事遂為其院使纍階榮祿大夫嘗侍坐侑食問以典故從容奏對委曲詳盡深稱上旨賜玉帶海東白鶻且命國工為之繪像其取重如此俄以􅍚不能朝遣尚醫診視竟不可為臨終告其諸子曰人之隕其世業者必自貪與奢始汝等能兢兢自持不苟取不妄用恆以忠君報國尊祖睦族為念吾死無憾矣語畢而逝公持身介潔寬厚愛人輕財樂施人有忿爭搆怨得一言莫不為之釋然咸稱其長者元配納思馬立氏婦德母儀族黨稱焉生三子一女前公二十九年􅌰封㝎國夫人繼室即世祖所賜脫脫倫氏尤䔍於慈愛視三子如巳出亦封㝎國夫人子男三人長買奴纍官河南江北等處行中書省平章政事今以翰林學士承旨榮祿大夫致仕次欣都資善大夫上都留守兼本路都總管府逹魯花赤後公十八年􅌰次怯來資善大夫同知宣徽院事孫男六人亦老答而䦨遺少監哈八失同知河東都轉運鹽使司事不蘭奚黑驢王家驢木八刺魯孫男八人臣溍奉詔書詞謹悉取前史臣所述公平生大槩備著之而申之以銘于以昭示聖天子之追録舊㓛不以久近為間百世之下何日而忘之哉銘曰惟皇建極立賢無方左右侍從咸懷忠良猗歟㝎公啓家西域肇自髙魯歸于有德奉其所事共惟帝臣荷天之寵傳及子孫逮公而昌懷林自奮出從征伐入陪顧問密勿告猷連柱大姦不以所長守夫一官乃位列卿乃居政路乃贊國徽綴班台輔身後之榮赫其龍光惟帝念功雖逺弗忘屬辭比事儒臣之􅕄是不一書薦以新刻遼陽等處行中書省左丞亦輦真公神道碑故遼陽行省左丞亦輦真以至正七年冬十月二十有二日薨于位年五十有二訃聞天子為之嗟悼不巳知樞密院臣老章亦輦真之弟適宿衛禁中上弔慰之詔有司護送其喪還葬遂以八年春三月二十有四日葬于真㝎欒城先塋之次而神道之碑久未有銘其年冬十月十有三日上御眀仁殿樞密臣僚入對殿中知院事臣阿吉刺臣忽先臣也先帖木兒等皆老章之同列乃代為奏請上既可其奏遂傳旨翰林命侍講學士臣溍為文學士承旨臣起巖書丹别勑禮部尚書臣泰不花篆其額臣溍謹按公諱亦輦真偉吾而人上世為其國之君長國中有兩樹合而生癭剖其癭得五癭兒四兒死而第五兒獨存以為神異而敬事之因妻以女而讓以國約為世㛰而秉其國政其國主即今髙昌王之所自出也公五世祖之官為的斤必里傑忽提譯言智福大相也四丗祖小云失脫忽憐之官為吾魯阿烏只譯言大臣也父子俱從其國主來歸于我太祖皇帝小云失脫忽憐尤見親幸未嘗輒去左右從西征有㓛令侍睿宗皇帝于藩邸莊聖皇后子視之以為斷事官真㝎睿宗分地遂以為逹魯花赤㑭世􅊞其􅕄曾祖諱八丹銀青榮祿大夫大司徒祖諱刺真事世祖皇帝為榮祿大夫中書平章政事考諱察乃事仁宗皇帝為金𬗋光祿大夫陜西行御史臺御史大夫至治中入為通政使用新制捵榮祿大夫泰㝎間終于光祿大夫中書平章政事公幼敏慧不喜與群兒狎長者偶見其飲酒責之曰是兒少嗜飲它日可覬其成立乎公聞之即絶飲而深自飭厲年逾二十為英宗皇帝御位下必闍赤泰㝎𥘉為內八府宰相髙麗嗣王阿難答失里既襲位其從父弟完者䔍訴于上曰我父兄也彼父弟也烏得為王阿難答失里來朝遂留弗遣而收其印章至是有旨命公以阿難答失里復國公具宣德意以告其人闔境之內無不恱服𥘉公弟老章從明宗皇帝北狩間關虎口調護聖躬親幸無與為比大駕還自朔漠公與一二大臣奉皇帝繭綬逺迓于傑堅察罕上大恱奬諭之曰卿祖父克有勳烈兄弟備殫勤勞忠孝萃于一門惟豫一人汝嘉即除翰林學士資善大夫䝉古教官之選壅滯巳久俾幕僚閲其牘而一清之故事藩王入朝從翰林求進止餽遺交錯悉拒弗受遣使諸王必慎擇其人未嘗辱命今天子嗣位之𥘉擢資政大夫河東山西道肅政廉訪使召還除通政院使奉詔巡視驛傳公不憚險逺歷答失八刺哈孫抵晃火兒目連之地事有當更革隨宜處置人咸便之大同東勝州之吳灤永興馬牛三驛牧馬草地為諸人所侵冒訟久弗決公𬒳旨按問得其實十二鄉之人百有餘家冒耕其地巳十六七年一旦同聲辭服願返所侵地公為正其經界而緩其歷年之租賦公家三世領通政院事每以扶殘極弊為務遇灾沴必奏請加恤之後使者或牽于勢而不䏻行其所欲為皆歎服曰非刺真平章子孫世其官不可也感公德者相與樹碑于灤陽驛以頌美焉遷山東東西道宣慰使鈔法之不通鹽法之為民病者悉建白而更張之歲旱有禱輒應形于歌謡事間有詔奬諭俾仍舊職而升其位序于帥座之首未幾淮潁羣盜竊發鄰郡騷然沂莒滕嶧四州當其衝民害尤酷上命公捕治之時同僚悉移疾避去父獨任閫事使至即行不宿命於家若豫備然宣靖王尋遣怯薛丹十人與諸郡郡兵來從至邳州境內遇海寧賊兵二百官軍皆解散公僅與十二人當其首賊且擊且射賊衆披靡追奔逐北十餘里斬首七十餘級其黨皆創殘而潰公亦以矢盡廽沂州收兵復出往來逐捕殺獲不可數計俄拜遼陽等處行中書省左丞公曰代者未至我安可辭其責諜知盜在膠州整兵行至沂水而代者至乃還後人賴公區畫素㝎故不勞餘力而掃除其遺孽遼陽久不雨民間公至曰是在山東䏻致雨者吾屬無憂矣公視事之日果應禱而雨民飢則為之設法以勸分薄關市之征以通商旅米價頓平人無艱食之患公才智出于天性操守得于家傳遇事立决嚴不失于苛寬不失于縱所以至有聲在遼東三年鎮之以靜識者以為得大臣體遽以一􅍚不起人尤痛傷焉夫人卜顔金貴族完顔氏陜西行中書省右丞教化的之女纍封范陽郡夫人柔嘉貞順克盡婦道見稱于􅊚族公兄弟十人兄曰孛孛實中奉大夫河東山西道宣慰使曰老漢弟曰老章光祿大夫知樞密院事曰草地里中奉大夫真㝎路總𬋩府逹魯花赤曰揑烈秃資善大夫宫傳曰答刺海曰羅羅中奉大夫江東建康道肅政廉訪使曰撒馬䔍大夫中書參知政事曰伯顔帖木兒朝散大夫光祿少卿孛孛實老漢答刺海羅羅皆前􅌰夫人以公喪至知院公率諸弟逆于通州而殯于亰城南佛舍摧慕號泣哀動路人其既葬也夫人自真㝎使來告于知院公曰兹幸獲襄大事而公殁無遺㣧恐其行能勞烈久遂湮沒盍思所以圖其不朽于是知院公諗于僚友以聞夫人可謂賢有識矣龍光下賁炳耀泉壤公其庶幾無憾矣乎銘曰聖神受命萬邦來同群木雲合咸在彀中惟公之先夙陪禁近地官之貴疏榮一品積慶所鐘䔍生後賢再世辨章相業是傳公方盛奉峻躋內相升華文苑為時雅望出持使莭風采振揚昭宣皇度肅正官常奉貢修􅕄布德施令傳置所逹國之大政總以專使患夫才難夫孰如公克世其官來旬來宣保兹東土潢池弄兵公奮厥武以寡敵衆莫我敢嬰餘威所加氛祲廓清簡在上衷進位丞弼殿于大藩民用寧一盍遄其歸使秉事樞奄其逝矣當寧欷歔公不有子公多兄弟承詔勒銘垂示無止宣徽使太保㝎國忠亮公神道苐二碑至正八年夏四月九日臣溍承詔撰故宣徽使太保㝎國忠亮公神道碑銘公之嗣人歷官行事法當附見而其詳有不可勝書者冬十二月二十有五日翰林學士承旨臣拜拜臣嶽柱復為奏請而命臣溍勒銘兹碑臣溍謹按㝎國公答失蠻有子三人其二人皆已􅌰惟今翰林學士承百買奴榮祿公謝事而食一品祿公字德卿㝎國長子也年十二入見世祖皇帝命平章政事刺真教以蒙古衛兀兒文字越二年乃命從宣徽使速渾察兒習治御膳為寶兒赤成宗皇帝不豫公從㝎國入侍至康復而退逮成宗賔天從㝎國迎武宗皇帝入正大統至大中以積勞授御藥局逹魯花赤升太醫院經歷舉名醫久次者奏𥙷以官大興醫學以淑後進皇慶𥘉擢監察御史分巡嶺北平反和林冤獄而置真殺人者于法出其誣服者五人念民之受役莫重于站赤奏請官備和林站首思歲增給木連帖干兩站米百石有貧乏而鬻其妻子以應役者贖而歸之沙嶺至上亰十一納鉢所須柴薪宜勿科于民以紓其力斡耳朵户求運載和林官物者冝禁止而以雇募之直十萬餘㝎賦于站户使蒙其利上皆可其奏贖還其妻子者仍户給羊百牛馬各十民瘼既蘇乃撤酒肆以變淫風興儒學以崇德教及為御史臺經歷以宣德奉聖諸郡舊隸河東憲司道路廽逺請改令御史分臨按治𬒳旨至西陵州鞠厭鎮大長公主獄止戮一僧餘詿誤者皆薄其罪延祐中出為山南江北道肅政廉訪使以屬郡歲饑聞于朝下其直糴官糧二十萬石江陵有夜入人家為其所傷以死者有司當以殺人之罪公原其情而出之㝎國寢疾革仁宗皇帝遣中使傳旨俾歸侍疾比至家則㝎國巳沒詔起復還舊任固辭從之服除入中書為右司郎中扈從至龍慶州謂儲御膳于民冡非所以致敬亟覆以屋于納鉢之㫄易都城木槁以甎石者三百五十所有司估計造馬轎及城壕木座彩畫官舍用鈔二千一百餘㝎公為撙莭止用四百餘㝎有旨賜一僧金襴袈裟金玉府言當用絲一百二十斤紅花紫草各六十斤金十八兩公止用紅注絲一縑納瑟瑟五尺而所製未嘗不如其法除同僉宣徽院事始公嘗計點宣徽羊馬增出羊二萬三千牛二百四十馬四百至是理算提調尚食生料尚牧柴場又减省官價為鈔百五十萬貫復入中書為左司郎中至治𥘉擢江北淮東道肅政廉訪使通泰二州鹽竈毀于風濤諭富商捐鈔七千八百三十㝎以救其灾公私咸賴以濟後蒙省降鈔四千五百㝎皆弗果用復以歸于官有毒殺人而誣其祖母自殺之者公究其實釋其祖母而下首惡及合謀者于獄改河北河南道肅政廉訪使河決原武親詣其處督視興築用役夫一萬人稍草六萬束命􅎥夫五百採退灘野生蘆葦得十餘萬束民不擾而河患息又令汴梁屬邑預備稍草連歲所積至六十餘萬束免取具于臨時人甚便之南陽山西有馬頭堰堙廢已久命修復之所溉田千餘頃皆為上腴設米市以抑岡利之徒罷檢鈔行人而籍市户使歲當一日役既輕而弊亦去嚴小倒之禁而鈔法以通建言折收田糧輕賫而民受其惠以舟代車送亞當吉北還而不至于妨農公三持憲莭所至必繕治公宇及三皇孔子廟凡為屋以楹計者數百川梁逵路修除必時什器之須纎悉畢具種蒔桑果花木至數十萬本事雖微而未嘗忽也泰㝎中參議中書省事有旨于撫州北安火車秃之地建殿以觀飛放引古之人君窮奢極侈而取敗者為喻以力諌而止以灾異乞免所居官詔勉諭之曰燮理隂陽事在宰相非汝之過其起就職尋遷司農少卿天曆至順間由司農卿遷同知宣徽院事除燕王宫相又以大都留守兼宫相都總管府逹魯花赤除吏部尚書上疏言聖朝以禮讓為國以孝治天下髙麗王子迫其父退居耽羅而據其位無禮不孝宜令其父還就王位却令其居耽羅宰執大臣咸歎服其言尋復為宫相總管府逹魯花赤吏部尚書又以通政使兼舊職公在通政拯治有法力役均而使客之至如歸無不胥恱今上皇帝臨御特授太禧宗禋使都典制神御殿事拜河南江北等處行中書省平章政事召入為利用卿受納皮貨所以防其欺弊者甚至不以事之煩為憚也遷翰林學士承旨援禮引年遂以本官致仕階自承務郎八轉至榮祿大夫所服犀玉帶皆上所賜先是武宗皇帝命以故宋太后湯沐地悉歸千大崇恩福元寺平章政事伯顔持不可上震怒猶抗論不巳暨仁宗皇帝以鈔法詰責前宰相執政公言伯顔在先朝能犯顔進諌可謂盡忠不宜例加罪譴上乃釋之後二十餘年伯顔事今上皇帝以師臣位上相公未嘗一言及于前事人以為難公歷事纍朝以恭謹見稱所治御膳尤精于烹飪前後𬒳賜珠帽珠衣只孫金玊馬腦車渠七寶諸束帶及它衣幣服用之物以十數鈔無慮數十萬貫上樽珍膳鞍馬之屬不與焉公性孝友㝎國之世賞及田廬資蓄皆以讓其弟至奉襄大事又獨任其役費既告老賜鈔萬五千緡悉用增葺其先塋娶卜蘭奚氏封博陵郡夫人仁宗又妻以宫女陸氏昭獻元聖太后為治奩具賜宴于興聖宫命太傅帖哥司徒伯順送至其私苐後封郡夫人繼娶秃滿倫氏脫脫尼氏弩哈出氏弩罕氏王氏並封薊國夫人子男二人長亦老答兒卜蘭奚氏出也奉政大夫䦨遺少監仁宗妻以朵兒别台氏繼娶阿兒溫的斤氏次不蘭奚孫男人故上都留守欣都資善公㝎國苐二子也由寶兒赤為典膳署令纍遷司農少卿章佩監同知通政院事由僉宣徽院事為其副使天曆間拜雲南行中書省左丞至順𥘉叛王秃堅與伯忽等率衆來攻城平章政事帖木而不花守北門公守東門叛兵乘間由它門入遂劫去省印公亦見執問何以不走公曰奉天子命為行省官安敢棄城去伯忽欲殺之秃堅不可而止乃命其黨忽哥貌兀馬兒以五十人護送入城囚之公與兩人相處既久因說以逆順禍福刺血撓金為誓謀共殺反者未幾豫王引大軍至伯忽遣忽哥兒兀馬兒往拒之行次占兾州兩人如公宿約徑回金馬山殺伯忽兄弟三人得其所劫省印以授公復立行省公遣使以三人首級獻于亰師尋出迎豫王至麻隆縣將還行省次倚隆州豫王所領漢軍復陷沒公欲奉䂊王至烏撒而諸王啜思班巳入雲南豫王乃命公馳報于朝廷上嘉其㓛賞賚甚厚即除上都留守兼本路都總管府逹魯花赤階自奉政大夫六轉至資善大夫前後𬒳賜珠衣玉束帶各一白金千兩鈔六萬貫它衣敝諸物稱是􅌰于元統三年九月十七日享年五十有七娶㝎哥察氏封咸陽郡夫人忙哥氏伯顔哥氏並封范陽夫人子男一人哈八夫大夫同知河東都轉運鹽使司事孫男人故同知宣徽院事怯來資善公㝎國苐三子也𥘉為寶兒赤用伯兄所讓㝎國廕授器備庫提點外除同知建德路總管事入為度攴少監遷利用少監遂為其太卿除大都留守遷同知宣徽院事階自武德將軍再轉改中憲大夫又四轉至資善大夫前後被賜珠帽珠衣各一只孫四白金百兩鈔二萬五千貫它衣幣諸物稱是􅌰于至正七年五月十日享年六十有二娶脫脫尼氏封咸陽郡夫人丑丑氏完者的斤氏並封范陽郡夫人子男三人黑驢王家驢木八刺孫男人由㝎國而上其行能勞烈臣溍既序次而登載于前碑兹不復出銘曰古之名家曰萬石君人臣尊寵舉集其門孰如㝎國類其恭謹父子同時列于貴近職親地要天子所毗惟才之豐靡適弗冝恂恂長公際逢熙運奉宣憲度參陪廟論出居屏翰入侍燕間踐􅏡中外踰四十年行止以時委蛇而退便蕃錫豫流恩未艾萬石之恭二踈之賢公兼有之庶幾夫全偉哉仲氏致位丞轄設竒制變茂著勳烈季亦競爽克友其兄讓行于家遺澤是承天覆日臨罔間存殁錫以石章用焯其實金華黃先生文集卷苐二十四終
