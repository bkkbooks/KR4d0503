body:
  text: 錢氏科名録序溍觀宋中興登科記未嘗不為之掩卷太息也嗟夫彼為舉子業者營營汲汲積其晝夜之勤至於獲自進於有司而升於天子之廷固千萬人所共嘆羡其光榮而以為不可企及者也今去之逺者不二百年數其氏名而泯沒無聞者已什七八幸而以材能致通顯有績用可考見傳子若孫鮮不失其業者若夫大賢君子所以垂世而不朽又非必恃科目以為存也是不亦可深長思乎通川錢氏四世九十年間第進士者二人特奏名一人貢禮部者十有四人待輔太學生者十有二人逮國朝著取士令有名以道字子原者首應詔名賢書何昔之泯滅無聞者衆而錢氏之世彌久益振也意其積纍以致此必有出乎科目之外者矣豈非古所謂君子之澤哉子原之伯祖籍田令與溍之曽大父户部府君俱淳祐庚戍進士故子原以錢氏科名録示溍使為之序而溍顧謂科目有不足獨恃者其有望也夫其亦以自警也夫徐氏詠史詩後序孟子曰王者之迹熄而詩亡詩亡然後春秋作蓋古昔盛時之為詩薦於郊廟則有以見其盛德陳於朝廷則有以知其政之廢興施於邦國鄉人則出於上而𬒳于下者又有以為教及其衰也先王之政教號令雖不行而流風遺俗有未盡泯是以風雅之變往往陳古以刺今至於王澤竭盡而無餘其詩始不足以使人創艾而興起故曰詩亡聖人不得巳因魯史作春秋褒善貶惡以示勸戒是則詩巳亡而其可使人創艾興起者賴春秋而猶存也後之君子有作其文則史其義則於春秋無取焉仁人志士覽其事而有槩于心莫不為之發憤一鬱嗟歎而詠歌之然或因一人或因一事以為言若王仲宣曹子建之於三良張景陽之于二踈謝宣逺之於張子房虞子陽之于霍將軍是巳惟左太沖所賦頗及戰國秦漢事未有窮搜極討上下古今備究其得失而無遺者唐之詩人間有興懷陳迹章聮句續至於纍百而止顧其言多卑近徒以資兒童之口耳於名教何預乎蘭溪徐公夙有聞家庭所傳儒先道德性命之説而尤精於史學凡司馬氏資治通鑑所紀君臣事實可以寓褒貶而存勸戒者人為一詩揔若干首大義炳然一本乎聖經之旨誠有功於名教者也春秋作於詩之既亡而詩之能使人創艾興起者乃復見于春秋絶筆千百年之後豈非先民性情之正有不亡者存詩與春秋固可迭相為用乎公殁巳久仲子津始出其詩求許先生謙張君樞為序以傳不鄙謂溍盍為後序溍竊觀先師朱子感興之作挈提前史之要領為言至約而有關於名教甚大朱子嘗謂學不可徒博亦不可徑約今之學者不由公之博何以入朱子之約乎是用志諸末簡以諗于同志其亦以為然否公諱銞字秉國其父兄師友源流之懿見於前序者此不具六藝類要後序先王之教內施於國子外被於萬民其教之者有三德三行六德六行之别而均教以六藝為法至詳且密為事至煩且勞而人生其時無弗學焉後世經殘教弛專門之士有不能知其名物而通其意者矣况夫貴遊子弟與凡民哉幸其遺法散見于經傳而雜出于他書後生小子雖以殊時異制不得身習其事猶可誦其言而粗窺其倣佛先儒朱子懼寖逺且益墜爰纂輯而彚次之以詔于方來其凡目存於小學之書而其宏綱大義微文小節悉著于儀禮經傳通解朱子自序禮之通行者及鄉射大射已略見諸篇樂經亡逸遺聲久絶而書數日用所須不可不講取周禮鄭注太史公淮南子前後漢志杜氏通典為鐘律篇取唐開元十二詩譜為詩樂篇取許氏説文解字序説及九章算經為書數篇廢不可考者惟御法而巳然其書作于朱子之晚年喪祭二禮既以屬之門人嘗欲請于朝以鐘律别為一書而奏不果上大射而下俱未脫藁書數則闕而弗具朱子之有志而未遂者能無望後之君子起而成之乎此六藝類要之書所為作也溍竊觀其所述五禮之義六樂之歌舞五射之法五御之莭六書之品九數之計一本諸經而參稽乎傳注史氏百家之説推尋其端緒以廣先儒之未備折衷其抵牾以啓先儒之未發有功於新學固多矣豈徒足為好古博雅之一助哉顧今之為士者類皆慕逺大而忽細微穿穴性命窮髙極深而不察夫制度文為無非聖人精神心術之所寓道之與器未始相離也眀先王之所以教而成朱子所欲為之志不在是書乎書凡六卷臨江周氏剛善父述有翰林揭公曼碩顧與溍之同年王君師魯所為序溍獨遡其源流之自以為是書實繼先儒而作庶幾同志之士共謹其傳焉陸氏藏書目録序吳郡陸君居闤闠中四壁之外輒與賈區直君殊不以為溷一榻簫然環以古今書凡若干卷自經史傳記下至權謀數術汜勝虞𥘉旁行敷落百家衆技之文櫛比而鱗次入其室如登群玉之府而探蓬萊道家之名山焉忘其為居之隘也君既苐其篇帙部分類别為之目録以便覽者且屬豫使序之夫稻粱稷黍魚肉果𬞞人所資以為飬生之具不可一日缺者也得之足以飽而不足以極天下之味言珍異之味至豹胎猩脣封熊之蹯可以為美矣而非可常致以給朝夕之須彼水草小蟲蜩范蚳蝸野果之實人所易致而未必皆知好其味也世蓋有嗜書若嗜飲食者顧所嗜之不同而有不可得兼耳君其兼而取之者耶倚相之所讀今也夫人而讀之韓宣子之所見今也夫人而見之延陵季子之所觀今也夫人而觀之世之不可缺者君固不敢專而有也蘭臺之所不掌金匱之所不藏世莫之致與夫可致而莫之好焉者君亦未始以為我之得私也然則君之志曷嘗不欲與世同其嗜乎此目録之所由作也抑豫聞之老子曰五味令人口爽好竒之士苟遊于君而獲其所嗜焉染指而出足矣尚無以秦人之炙易吾之炙也哉鄭氏義門詩序浦陽鄭氏聚族而居者八世有司為請于中書而旌表之號曰義門且復其家力役之征俾無有所與今集賢直學士揭公實為之記一時聞人往往賦詩以美之謂子與鄭氏居同郡知鄭氏者冝莫豫若因屬豫以序豫家距鄭氏不兩舍而近納交鄭氏父兄子弟間歲行已再周其知之固深矣集賢公之所稱述豈有愧辭乎抑豫聞之古有合族之道非士庶人所得行而親親之仁無貴賤一也合族莫重於立宗立宗之法或五世而遷或百丗而不遷五丗而遷聖人不以為失於薄百丗而不遷聖人不以為過於厚遷以辨其異不遷以統其同二者蓋並行而不相悖也若夫數百千指聚居而食雖古公侯之家皆所無有而後丗士庶人之家乃或有之可不謂難矣哉是宜史不絶書而上之人所以褒嘉之者遂著於令逮至我朝史臣序禮典為目三十有二而旌表居其一然則凡可以勸親親者又聖人之所不廢也兹非所謂禮以義起者耶鄭氏於古人合族之道夫亦有取其義云爾褒嘉所及有司既奉著令從事而未克上其狀于太史氏豫輒弗辭而次苐其詩本諸作者之意系於末簡庸俟夫陳詩以觀民風者焉送吳良貴詩序異時浦陽方先生館同里吳氏栝吳先生善父粵謝先生臯父咸在焉三先生隱者以風莭行誼為人所尊師後進之士爭親炙之而良貴有聞於私淑為多方是時學者未有場屋之纍得以古道相切磋論文析理窮極根柢間出其緒餘更唱迭和於風月寂寥之鄉亦足以陶寫其性靈三先生杖屨所臨一言一笑無非教也元貞丙申豫幸獲執弟子禮見方先生仙華山之下退又辱與良貴遊俯仰之間垂四十年先生已不可作一時之人物星離雲散或隨牒逺方與時浮湛或以名字著聞入通朝籍或浩然獨往於重山密林不復與世接而豫亦老於州縣聲迹邈焉不相及久矣今年秋乃聞良貴將主教於稽山朋舊皆為詩以送之嗟夫良貴宦家也祖父俱仕而未大顯不能母望良貴以其所就之實少自見於丗良貴顧獨逡巡逺引恬處下列瞪若諸公之後年踰五十猶為所謂山長者焉名不上於三銓秩不滿於百石豈其祖父之所望哉雖然良貴之得於三先生者非干祿之學也惟不必於仕故崇臺邃館不以為慕惟不必於不仕故寒齋冷廡不以為厭其出處之際慮之審矣吾黨無所復進其愛助之言姑為之詩以志其離合不亦可乎自方先生之子壽甫而下詩凡若干篇道其故舊以為之序庶幾作者之意也送應教諭詩序古之為師友者非徒有所嚴憚切磋其相與之際至親且樂也蓋夫人之少也既遊于黨庠術序而其以賢能興於鄉也必還使長而治之逮夫老而不仕則又朝夕坐於閭孰而為之師以教其子弟歲時射飲讀法之事莫不相與從容揖讓升降酬酢奔走出入乎其間士生斯時自少而至壯且老固未有久去乎學者雖以公侯之貴任君師之重為士者不敢以其尊而弗親之也故其詩曰無小無大從公于邁又曰載色載笑匪怒伊教由是言之則其師友之親且樂何如哉是以及其衰也詩人猶歌之曰縱我不往子寧不來蓋師廢民散而流風遺俗有未泯也古者學校之盛非後丗所及者豈獨其道之隆法之密乎蓋亦相接以粲然之文相愛以歡然之恩薰陶鼓舞優遊而厭飫之有以興起其良心而成就其德性焉尓今之士既不必群居於學主教事者又皆以資格序遷而不能久於其職不幸有如荀卿所謂子遊氏之賤儒且將盻盻焉疾視其長上尚安望其親且樂耶黃岩應君署吾邑教官以秩滿當受代邑之人士咸惜其去相率賦詩以道其離合之思大萹短章亹亹而不巳非其親且樂至於久而不厭何以得此歟豫故諸生也忝𬒳官使不得從先生長者之後日與應君相周旋以寓其親且樂之情竊喜應君之得于其人者為不易又以見夫土風士俗視它邑為猶近于古也乃為本諸詩人之旨以序作者之意且志豫愧云送鄭生序今之官于學校者自職教一縣等而至于胄監之長二咸有師道焉胄監位尊而秩厚非鴻德駿望莫能居之若夫縣教官率選署于閫外纍其月至九十始得上名銓曺輔郡文學而與醫卜執技者齒滿六歲乃得預流內銓其閲歷之勤且久如此老生宿學既無所事乎其間有志之士苟資以自進固不得俟乎強而仕矣蓋古之為師必取之仕焉而巳者而今也一以諉之未及強仕之人不亦任之輕而責之重乎餘姚鄭生妙年好修再試于有司輒不合方退而職教于剡是特資以為進而非的然以師道自處也雖然吾懼夫人之以師求子也抑子聞之古者學官不必自為師國學之政總於大司樂而論説于東序者有大司成焉司樂弗專也鄉學之政總于大司徒而朝夕坐于閭孰者有父師焉有少師焉司徒弗親也説者曰父師少師皆仕焉而巳者又曰父師司成司成豈亦仕焉而已者耶是故官有職而師無職官以法師以道也吾子誠不以今之法廢古之道剡之鄉先生仕焉而巳者冝為子起矣它日剡父老舉以相告曰吾剡之得師自鄭君始顧不韙歟生之行有日凡朋從咸以詩送之而屬豫以序故豫為道其職分之冝為者以告焉送汪生序始豫既知學頗思自拔于流俗而患夫窮鄉下邑塊焉獨處無從考質以祛所惑聞錢唐古會府號稱衣冠之聚宿儒遺老猶有存者則糧笥書踰濤江而西幸而有所接識然以違親越鄉不能久與居與遊間獲聆緒言之一二終未至盡大觀而無憾也每誦昌黎韓氏所志歐陽詹何蕃事未嘗不有槩于豫心嗟乎詹以求道而去其親蕃以其親故不得安居以卒其業此兩人者雖若各行其志夫亦有所不得已焉爾為士而生於師廢民散之後何其不幸歟四眀汪生少從其父宦遊西州而及諸公之門揚秋濤於學海攬夕秀于詞林有日矣今方奉晨昏于信之玉山信固名郡異時東南文獻多在焉其學者又往往先經術而後文藝屬兹昌辰崇雅而黜浮三歲大比褎然前列必信之士也入則有色養之歡出則有師資之益斂其華而就其實在此行矣是蓋詹與蕃所欲而不可得者矧如豫之孤陋能無所歆羡乎惟生知自慶幸而期無愧于詹與蕃則豫所望也輒抒鄙懷以為臨别贈言之首云送王雲卿教授詩序昔朱文公與張宣公吕成公生同時且同以聖人之道為已任而傳洛學者獨推朱氏為大宗文憲王公則朱學之世嫡也吕氏王氏皆以故宰相家為吾邦之望王氏之族尤大以衍其不奪於冨貴卓然有所樹立以表見于世者固不乏人而文憲訖能自任以斯道之重不亦豪傑之士哉溍生也後不得及其門而事之間嘗獲升玉齋之堂而接其聲光辭氣未始不爽然自失山川搖落而百年之喬木鬱乎蒼蒼過而息焉猶為之低佪而不忍去魯多君子流澤未艾也玉齋之子是為雲卿與其群從俱以材見用于時而雲卿得睦之文學掾睦學蓋吕公過化之地乃今朝廷右文興治朱氏之書方盛行雲卿又以文憲諸孫輔吕公故處睦之人士得不有求異聞於雲卿者乎抑吕公之居睦學張公實領郡寄吕公自謂莫逆而無間也皇上盛德眀䛇有司慎擇守令以嘉惠黎庶安知今之二千石非張公其人歟以家庭淑艾之私為賢師帥承流宣化之助雲卿所冝盡心也雲卿行凡朋遊咸以詩送之溍不佞輒本其父兄師友源流之懿而道其不可不以古人自任者為之序若夫土風之美雲山江水觀遊之樂厥有篇什兹不復云送冨州陳教授詩序浦陽陳彥正教授冨州里友方夀甫合同志之士為歌詩以餞之徴豫言序其首蓋君子之仕也將以行其志焉爾法守之所拘吏議之所迫位彌下則事彌多靜牽動違鰓鰓然左右顧望能求其志之必行者幾何人哉獨官于學校者責任雖重而得以優遊事外無所拘迫若可以行其志矣夫何今之所謂稱其職者率以崇土木謹簿書為上務其次則妄自菲薄指所居之地為間曺冷局計其歲月而去之曰吾姑藉以求一資半級而已是冝有志之士所不屑為也彥正可謂有志之士非乎彥正之先大夫當宋季年隱于五泄山之旁徜徉自適於穹巖邃壑間初未有仕進意會天兵南伐遣偏師徇浙東遂以布衣杖䇿軍門得官而老佐一州竟不克大展其志彥正敬承家學且與故內翰栁道傳居同里數從之遊善為右詩文試藝鄉闈一不中輒束書而歸若將終身焉有司強以儒學官起彥正於家彥正乃欣然為之出用纍考序遷冨州彥正不逺千里沿湖泝江而去豈非以是庶幾可行其志耶方今承乎寖久主上持守盈成日與宰執侍從近臣講行稽古禮文之事聲教所暨罔間朔南而况豫章之地靈人傑夙見稱于前賢冨為支郡俊秀林立彥正因其材而封殖之使上焉者可以為國家之用下焉者不失為鄉之善人顧不偉歟彥正其毋以間曺冷局為不堪而自墮其志可也若夫完舊益新量入為出特餘事尓庸因序詩而併道其所願于彥正者如此云送慈溪沈教諭詩序斳沈君久逰金華部使者薦其材于宣閫署慈溪縣學教諭其行也金華之鄉先生士友咸為賦詩而屬豫序之昔者河南二程子歿門人各尊其所聞各行其所知人自為學至考亭朱子出而集其大成程子之道賴以復眀然學術之散未有甚于此時者永嘉之經制永康之事功姑置勿論臨川陸氏與朱子並以性理為學而其為説莫適相通雖鵝湖之會終不能挈而合之也言陸氏之學者以慈溪楊文元公鄞袁正獻公父子為巨擘士生其鄉知有陸氏而巳宗正少卿黃公亦慈溪人始以朱子之學倡於其間而務以躬行為本其大意謂陸氏以蕳易自髙而以支離病朱子是徒見其窮探極討為説之詳似乎支離而不知真修實踐所守之約固未嘗不蕳易也使宗卿與文元生同時寧不足發鵝湖所未決之餘論乎國朝承平日久治教休眀建學立師設科取士悉主于朱子之説至是而鄞慈溪之士於朱子之書莫不家傳人誦之沈君在金華嘗許先生益之之門而卒業於吳君正傳其所受實朱子之學今去而涖教事又適在文元宗卿之鄉邑夫學術之分合重事也為師儒者所冝盡心焉故豫于其行舉以告之乃若山水遊觀之樂交朋離别之思巳具于篇什作者之意不待序而可見也送徐彥禮赴冀州尹序上即帝位之十有五年並相勳賢更新庶政念民者國之本長吏實民命所繫而承宣撫字或未克悉舉其職由其選輕也乃妙柬廷臣之清方詳敏練逹於民事者卑以郡寄仍召對于便殿親臨諭遣之群臣苟預在行莫不俯伏就列頓首受命懼無以稱塞上意則相率詣政事堂聽所以教宰執大臣既為敷繹聖訓且告以利害有須興除冝亟以聞而見于施行不至徒為虛文臺司尋導旨于部使者俾奬勵之以俟其成效言事之官又建白勿諉以煩碎之務使得專心于職分之所當為責任之重前所無有也以天下之廣郡邑之衆未盡得人以充其選故所臨遣十有人皆首及於要地而兵部郎中徐君彥禮得河北之兾州古者郎官出宰百里兾領五縣最為名郡而尹為尊官視百里之宰不愈重哉彥禮奮自儒科待詔詞林編摩史館博涉於古今而究觀其治亂盛衰之故矧嘗蕳在眷知擢居六察于民生之休戚吏治之得失靡不周知授之以政固無施而不可黃霸漢丞相也史家以其材長於治民特置之循吏之列而為立傳彥禮其勿為汲黯之于淮陽而為黃霸之于頴川它日秉史筆者誠能以彥禮之氏名列于循吏則黃霸詎得而專美乎彥禮行有日僚友及士之工於文者咸賦詩以送之夫詩之有雅以言王政之所由廢興政有小大之殊故雅有小大之别仲山甫徂齊而尹吉甫送以蒸民之詩序詩者不曰送仲山甫而曰美宣王且以其詩入于大雅蓋宣王之任賢使能致周室中興乃王者之大政尹吉甫之詩非獨以慰仲山甫之永懷而巳今天子臨御日久無幽不燭鑒內重外輕之弊而為官擇人甚盛舉也播為詠歌鋪張聖德以配蒸民有不容已者矣豈直私于彥禮而慰其永懷之心耶庸本昔人序詩之義而題諸篇端如此送王仲楚序王生仲楚以名父之子被服儒術受知當路而從事于省闥用例出為閩閫列曺掾將行朋舊咸贈以詩屬豫序之閩在周為七聚漢嘗徙其民于江淮吳亦以處遷謫之人隋蕭銑唐王潮又皆割據其地宋平諸國陳洪進最後服自昔號稱難治我國家定鼎于燕閩之去朝廷益以逺故常選用文武材智之臣授以八郡兵民之枋俾建牙分閫以涖焉所以輯衆庶弭姦強也比歲大盜竊發荐為東南之憂山區海聚愚民無知其觸法抵禁固勢使之然向令任承流宣化之寄者能聽於無聲視於無形而逆折其萌芽豈遽至是哉賴天子聖眀將士用命鼠輩就戮氛祲肅清誕降德音與之更始然欲為久安長治之䇿則險驅默化俾之日遷善逺罪而同躋于仁夀之域冝有其術矣賢主帥方開誠布公集思廣益非識時務之俊傑孰能陳其一得之慮乎掾曺秩雖卑列郡以政交于大府悉由之關白得以文墨議論持而不可而贊其可為責至重而不輕也書所謂警戒必于無虞之時易所謂思患豫防亦在既濟之後仲楚服膺過庭之訓講此熟矣夫儒術者豈徒可為文法吏事之緣飾而巳哉諸公既寫其離索之懷道其愛助之意庸述豫所望於仲楚者于篇端如此云送趙堯臣序仍紀至元之二年豫方備貟國學上舍生真定趙凱堯臣私試合格循舊比待年以就公試眀年以其名列上于集賢轉逹中書既終場而未及釋褐臺府用御史建言計奏被旨命監學官雜舉公試終場之士材任諸道憲吏者凡所舉三十有三人而堯臣得淮西堯臣之父時宦遊于浙右以便道來覲省俄有母憂今年冬服徐浙右部使者起堯臣于家俾赴淮西幕會豫承乏儒司寓舍與堯臣相距數百步而近堯臣行有日過豫言所以别且曰儒家者流之説固嘗從先生長者聞其一二矣文法吏事未之習也矧兹風憲之司大體所係甚重幸有以教之豫東南鄙人風憲之體非所敢知所能知者事上必忠待下必恕而已忠非悻直之謂也發於心而無自欺則上之信任益專矣恕非寬縱之謂也求于心而得其同則下之情偽可盡矣信任專則志易行情偽盡則政易治是道也自朝廷至于有司百執事之人無不冝然居風憲者其何獨不然忠恕之義豫與堯臣所夙講也昔之所學今之所行安有二道哉輒因堯臣之請重以是告之遂書于諸公贈言之篇端以為序堯臣毋苟謂此老生之常談而忽之也送索御史詩序至順紀元之冬今監察御史索公以史館掌固久次進職編摩而溍忝繇常調供奉詞林簉屬史氏與公為同僚命同日下眀年夏又同扈蹕上亰公自處清約介焉特立若不可犯中實樂易色溫而氣夷然亦未嘗見其苟于言笑深切敬畏之無何而公用辟舉入臺後十有年遂持部使者節分按浙河之東溍方倦遊不俟引年預請納祿而歸實受㕓于屬郡辱公臨况者再握手道舊故殊欵洽今年春公以御史召赴闕士之見知於公者相率賦詩以道其繾綣之意俾溍序于篇端蓋古者臺諌異官御史主分察六司百僚巡按郡縣而糾其過失凡刑獄功賞選輔出納朝儀祭祀燕會之事咸涖焉若夫侍從贊相規諌諷諭則諌官之職也我朝不設諌官而臺諌之任悉歸于御史今之視昔其責不巳重乎以陽公城之行誼范公仲淹之材且賢而為諌官韓退之歐陽永叔猶疑其失職或著論以譏之或貽書以誚之逮其上疏伏閣力爭國家大事皆人所難言乃卒以諌顯然後知其始所以不言者不欲徒為細碎姑以塞責也於是退之永叔又從而推述稱揚之豈非要其終而服其識大體乎方今治化休明羣臣遵法澤及黎庶海宇乂安固非有闕政之可議主上不自神聖每懷兢業虛心采納片善弗遺念公久于馳驅而熟於當世之務擢置左右寄以耳目竊計公之從容獻替苟涉于國家大事必能極陳人之所難言至於本正而末治綱舉而目張振風紀飭憲度以舉其職業直易易耳使退之永叔復生何以致其愛助乎它日聞朝廷有骨鯁之臣天子有從諌如流之美溍雖衰退無從載筆立公下風而頌歌眀良相逢之盛猶可與田夫野老蹈詠太平於甽畝之中也庸因序詩而并及其屬望之私焉送揚知州序諸暨古望縣也國朝以其户口殷大易縣為州仕焉者往往憚其俗險而不易治務出聲威以臨之恩意日益衰薄愚民無知苦吏急而不自安始有懷疑飾詐投隙而起者本其所以致此由御之乖其方非人性然異時之賢守有為之樹碑者有為之立祠者好德之心曷嘗一日亡况是州之人或出而以材顯或處而以尚義稱其學者又能讀書為文辭取進士俗豈盡不美治之豈誠不易哉特患夫為政者莫知以平易近民耳楊侯其知以平易近民者歟侯仕于亰師最久輔外得汝州政成又徙諸暨其治汝如在亰師治諸暨如在汝不以地之逺近俗之厚薄變其志居之三歲未始鄙夷其民一切除去苛嬈而與之相安於無事不致疑于形迹之間而人自不欺向所謂愚而無知者亦靡然從其化蓋平易近民之效也孔子曰子欲善而民善矣詎不信夫侯以秩滿將還亰師僚吏士民咸惜其不可留凡工文者共為詩送之而屬豫以序豫嘗忝佐是州侯至而豫已去不得與侯從容周旋以挹其餘風姑以所知序之如此它可稱述而豫不及知者此不具送八元凱序班固為漢儒林傳紀經術之士登載甚悉序稱公卿大夫士吏彬彬多文學之士西亰人材衆盛蓋可想見至所傳循吏不過六人文翁通春秋而以郡縣吏見察舉朱邑起嗇夫黃霸入錢穀得官皆其後乃舉賢良始以眀經進而終列於循吏者龔遂召信臣而巳何文學之士衆盛如彼而其為循吏止若是耶粵自先朝著貢舉令廣延茂士充于列位其以材猷陪廟論以節槩持風紀以雄文碩學藻飾皇度而模範國人者漢之公卿大夫不得專美也偏州下邑居官可紀無愧古循吏者吾元凱浦江之政殆庶幾焉元凱由胄監生擢進士第二人為郎祕省再轉而長是邑清白之德形于造次不自表以為名其治務蕳易遇人有恩而人莫敢褻用法不至峻急刻深而姦豪讋伏或自愧悔歸于善良暇日則修庠序之事化其民以文雅是可謂有古循吏風否歟夫以西亰人材之衆盛由眀經進而列于循吏者僅兩人此兩人者皆二千石得專制郡事千數百年之下文法滋密民俗寖偷而元凱能以一邑行其志又難矣元凱為浦江滿三歲而去浦江之隱君子曰方樗夀甫者豫友也善為詩而不苟出獨于元凱之行率士人賦詩以送之且以書俾豫序其首豫觀元凱固不止百里材矧今眀良相逢一旦疇其民庸而圗任之則元凱之所施當有大於兹邑者雖然黃霸三公也班固以其材長於治民特置之循吏之列輒因序詩併著元凱之為人以俟它日傳循吏者采擇焉送李子貞序始豫忝繇進士起而署督運吏數檥舟鄞江上李君子貞時為儒學官方從容揖諸生升降酬酢于爼豆間顧豫冒不測之險躬執賤事日夜與持籌小吏較其錙銖暇日過豫輒為之太息不巳後豫以秩滿受代去而子貞隨牒逺方為巡官括蒼山中進則降氣卑色以偵同其上官退則與邏卒同其甘苦于重山密林煙火寂寥之境豫聞之又未嘗不為子貞太息也今年秋相見亰師則子貞已改調婺郡文學豫亦承乏教國子于上庠既與之握手道舊故以相慰藉子貞行有日謂豫盍以一言志其别未任人之道必其才與事稱是以習而安焉然人之十品有萬不齊非有司所能周知也為士而不得守其職業豈獨豫與子貞然哉今天子眀聖慎簡輔弼侍從之臣以秉鉤持衡俾吾徒獲返其𥘉服甚幸若夫指道德性命之言為吏議所不急而惟以簿書出納為問此則儒者自失其職業而非有司之過也子貞閲歷之久識量絶人必能舉其職業而不以是瑣瑣者自纍矣豫故婺之諸生也它日歸而從先生長者遊于鄉校觀人才之秀出而樂夫教之成其為慰幸又奚止向之所云而已耶是用弗讓而志其歲月以俟送饒安道序天子之學以教國之貴遊子弟而田里之秀民亦得用舉者受業其間餐餞固不以煩縣官而滿百人輒止後至而久次者必貟有闕乃得輔其處此今之定制也豫以非才忝預教事饒君安道自臨川携其子而來既俾奉贄堂上以弟子禮見顧以限于常貟未及執經就列與諸生齒安道告豫將與俱歸家食以需次願得一言為别嗟夫古之秀士升于司徒升于學者皆近在王畿六鄉六遂之中今也乃使之挈挈然亟往亟返五千里不啻何以能無銷沮其志氣乎大學之法當其可之謂時是故人生十三而學樂誦詩舞勺十五而舞象學射御二十而學禮舞大夏今也乃使之曠日以俟逺者或十年近者猶四三年何以開發其聰眀而能蚤有知乎國家施教導民之𥘉意冝不若是豫所為太息而末如之何也豫聞安道通古醫經而精其術其在亰師未始少出以自售徒為其子來耳計其復來豫必已代去而不得與其子卒成師弟子之禮安可無以識其别乎魯人之詩曰無小無大從公于邁鄭人之詩曰一日不見如三月兮蓋未有拒人於五千里外而持以十年之久者雖然此諸侯之學也况天子之學乎幸而有能陳詩以諷于上用古之道變今之法則安道父子之來豫猶及旦夕待也庸識其所望者於群公贈言之篇端以俟焉送吳生歸黃巖詩序豫觀今之有逺行者無不俯伏伺候以求贈言於先生長者之門得之必動色以喜不得必悵然自失觖望而去古亦有是哉老子云冨貴者贈人以財仁人者贈人以言則夫贈言者古有之矣其為言也豈苟焉而巳乎施之于身則可以成其材而就其實措之于事則可以酬酢萬變而不窮述之于書則可以惠幸乎來者傳曰仁人之言其利溥哉故惟仁者為能贈人以言若夫借齒牙之餘論為之道地使一介疏賤有所引重以取名譽于當時而用瑣材薄技躋攀分寸者亦得侈為榮遇以夸示乎庸人孺子此皆古所無有而今有之非古之人不能為是言也有德必有言顧其所言者在彼而不在此耳今也求而得之則喜求之不得則觖望而去果何為者耶惟吳生則不然其為人好修且有文言若不能出諸口與人交乃煦煦有恩意而未嘗欲人之譽巳也其來亰師受知于侍從近臣而以名聞于天子遂獲齒于國之貴遊子弟及較其藝又數出衆人之右解褐將有日矣未嘗欲以為閭里之榮也今方去而省其親于東南五千里巨海之上懼夫離群索居無所恃以為善也故欲聞一言于先生長者以自壯其求之也亦異乎人之求之者矣庸以其意題辭篇端庶幾有樂告以仁人之言者焉至於感時物之變遷念川塗之修阻苟可託以慰其永懷者亦君子之所不廢也送徐生歸吳中序始豫留錢唐辱與豫遊者厪十數人欲相率推矛為之師豫謝不可則皆曰諾而徐生本中以豫與其父有雅故猶執契家子之禮不廢其後十數人者往往取鄉薦或連中甲科或遂魁天下士獨徐生試有司輒不合抱其所著書三十卷來亰師宰相有知其人者為言于上乃得與國子齒豫方以非才叨長學官徐生用故事執贄升堂與豫為師弟子之禮豫不容卒辭也亡何徐生謁告歸吳中省其母求豫言以識别豫將何言哉豫聞古之為師者言行而身化之道在我矣視夫不與道合者約之使歸于道焉爾是以善學者必就正於有道善教者不徒勦取前人之成説而瀆告之也苟惟勦取前人之成説而瀆告之則粗通於句讀者無不可以為師而豫向也與徐生為師弟子之禮久矣奚俟今日乎蓋今之為師者曰我之資歷當為是官彼固不得以道責于我也為弟子者曰彼之品秩冝為是官我固不敢以道望于彼也夫如是則徐生雖與豫為師弟子之禮非果以豫為能言行而身化之也而豫亦安能言之哉然豫觀徐生所著書類多出于前人之成説無待豫勦取而瀆告之也徐生能不專以資口耳而務躬行焉固非外是而它有所謂道在夫勉之而已尚何言之求哉于其行也姑書此以塞其意昔之同遊者今或仕于亰師或官于吳中徐生試以是訊之其以為然乎否乎送髙承之詩序古之丗其家業而不隕者非傳圭􅊞組之謂也氣澤之僅存風聲之未泯是有賴焉時万承平衣冠鼎盛孰不知自振飭以久有其光榮逮夫運去物改故家喬木幾何不與海桑俱化而晚生後出如芝蘭之在階庭不以雨露之弗及而輟其萌芽求之于今固不多得也臨卭髙氏兄弟當宋之季大參以文學顯沔州以忠節著其歸後魏氏者是為文靖公道德議論世所師尊而沔州之子又起世科躋政路百年之門户嘗烜赫矣有名繼忠字承之者於沔州為曾孫生乎異代之後懷其材不苟自售而與時浮沉于韋布之間顧獨惓惓焉家世源流之舊凡遺文故實片辭隻字藏護惟謹蓋承之之欲世其家業者有不在彼而在此也頃豫與承之相見鄞江上聞承之將出而逰于亰師王公貴人誠為之知已則髙氏之衣冠蟬聮奕葉當復自承之始豈直保其氣澤續其風聲而巳承之行有日朋從皆為賦詩而徴豫言為之序愛莫助之詩人之旨也勿替引之承之勉乎哉金華黃先生文集卷苐十七
