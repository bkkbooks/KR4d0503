body:
  text: 臨川危素編次墓誌銘江隂吴君墓誌銘君諱方字季仁姓吴氏世為江隂人七丗祖範大觀政和間累舉八行皆不起後以慈寕􅂟壽恩封承務郎人不􅁛其官而􅁛之必曰八行先生云甞出􅀻錢治郡學而授弟子業没囙祠之至今不廢六世祖仲基宣和甲辰進士五丗祖閱之紹興壬子進士髙祖諱某曽祖諱庠祖諱珏考諱世英並晦弗耀母曹氏有子三人君其季也少受經于郷先生陸子方而扵諸子百氏毉薬卜筮数術之書靡􅀁不知作詩尚理致不事雕飾然未始自以為髙教其子率􅀎有􅀁成立其奬飾後進雖小善弗遺有過輒面斥之亦無少恕里中子有􅀗罪於其父將違而去之者詣君别君諭之曰生育之㤙昊天同極天可逃乎其人大悔􅃍下拜請歸侍飬扵是父子如􅀄郷民有兄弟三人生五子而析居者已三十年君覩其墟落整比長㓜有序語之曰吾觀汝家雍睦如此􅂚不萃而爲一乎其人感悟曰仁人之言倍之不祥遂復同居君之啓迪人多此􅀋有盗屡彂君􅀁蔵一日卒然遇之隣家子也左右欲聞于官君曰吾不能薫之爲善良暴其事則辱在我耳彼豈樂爲盗哉迫於貧耳竟縦遣之後果自媿而改行其䏻使人化服又如此􅀂家非甚豊扵財而樂振人之窮居者行者咸有以資之病與薬餌死與棺槥􅂖貴則下其直貸錢而弗能償則折其劵􅀊饑有司勸分君自度力不足周一郡乃罄餘粟以食其郷之人蔡港務官􅀁􅃜稅錢一千三百緡計無􅀁出携其女粥於市君聞之悉為代輸因請以女俻給使君拒弗納州官有受代貧莫䏻歸者死無地以塟君方自治壽藏輟其地以􅂌之此􅀹為人所称道者也君自奉食無兼味而凉天佳月朋簮雜集觴豆甚設雅􅁔􅄬壷尽歡而止延祐中故人有知君者薦為䖏州儒學録辞不就自􅃅孏菴居士以示絶意於仕進晚築室于家東南􅀅徙居之俄得風痺疾稍愈而復作臨終頋其子曰人孰無死古人重於得正而斃吾殆庻㡬乎其毋以侈靡之物歛且毋以緇黄溷吾家泫汝䓁􅀎守其身而不墜詩禮之􅀓則吾􅀁望也言訖而逝君生於前至元二十五年正月二十三日卒扵後至元五年正月二十五日享年五十有二其年三月二十六日塟順化郷黄山先墓之側娶朱氏子男八人長惟誠次惟諒為伯父後次惟訓惟􅁩惟謹惟謨惟詵惟評女三人長適常州􅃽􅃏餘在室孫男二人女二人君塟後三年惟誠介趙君季文賈君彦髙納謁而言曰先人不􅄑至於大故惟誠䓁遵治命速塟未及跣赱於先生長者之門以啚不杇懼乆且墜逸益重不孝之罪願矝而賜之銘按事状􅀁述君平生大槩多可書而惟誠之請又勤懇若是不敢以不文為觧銘日緊君之先以八行徴􅄪丗文科茂㤙是承君主盛時不榮以禄惟行與文是似是續動人者義澤物者仁詠􅁔道徳為時逸民有子詵詵幹父用譽載其休聲永表封􅀣溧陽孔君墓誌銘溧陽孔君既􅃿之明年其􅀌汝舟汝楫􅀅奉匶以塟前期汝舟俾其子惟中走錢唐以銘來屬按狀君諱學詩字文卿六丗祖按自魯徙吴曽大父潜又自吴徙溧陽而占籍焉大父應祥始務治生産以殖其家父庭秀以謹厚克承先業有子二人君其次也至元乙亥國朝取宋之師至金􅁜寓公趙待制淮起兵溧陽􅀍執不屈而死君年甫十有六􅀼自念曰彼大臣子且有位序死固其􅀁􅃖􅃖之氓安知天命􅀁歸徒耴死無益也乃賛其父率衆詣軍門郷井頼之以完主帥竒之因挟以北上欲薦于大府俾效官使君之父適遣人以物色訪得君􅀁在君慨然曰吾􅀗爲太平民終飬其父母幸矣奚以官爲懇辞得􅀯還君持身以正家法甚嚴而濟之以㤙伯兄蚤世撫其遺􅀌如巳子中分田廬擇其羙者授之族􅊚里黨之窮乏必加周䘏而不以爲徳它可便於郷鄰者無不致其力大徳丁未之饑食其餓者瘞其殍死者天暦巳巳荐饑亦如之且傾廪粟以􅂇官府之弗給法當淂官有司􅀅上其名于銓曹君謝曰吾以有餘􅀘不足尓豈藉是榮吾身哉况以入粟而賞官何榮之有識者􅀹用敬服君素剛介人有過輒面斥責即貴􅀔無􅀁避故与世多忤有誣䧟以不法者平昔􅀁怨忌又旁咻而力㨈之長吏覬君有􅀁請託抑弗為理君曰吾心無媿於天人惡䏻勝天㢤巳而卒淂直擠之者乃自悔而君無㡬微見於辞色苐戒其子曰汝軰毋懲􅀁遭而怠於為善亦毋以家之豊而不由於禮惟勤生可以継其先惟知學可以㳤其後至其子䏻自植立遂悉付以家事日與賓客􅀙容於琹册觴豆壷矢間二子列屋而居􅃅南北宅君往来惟意所適而安焉不以乆近為計也君甞大書性字於座右謂人曰䏻循性之自然則無入而不自淂矣人因称之曰性齋云君卒以至正元年二月十四日享年八十有二塟以二年某月某日墓在􅀁居里陸上原先塋之次娶教氏前三十有一年卒子男二人汝舟汝楫也孫男五人惟徳惟和惟中惟良惟懋女四人壻曰蔡翼張濵宗應槐湯某曽孫男八人女五人玄孫男一人女一人盖君平生大槩内有􅀁飬而不撓於物外無􅀁慕而不累於名近乎古􅀁謂郷之善士者可銘也巳銘曰君家于南由魯友分歸而求諸逺有異聞見㡬者知利物者仁為而不匪以資身惟是浩然弥乆獨存安常委順訖為全人亦既有年有子有孫有銘昭之刻在墓門樂平朱君墓誌銘至正元年秋予與建徳推官李君粲同較文郷闈􅀯士預薦者二十有八朱公仙其一也於是公遷之父殁已十有一年塟亦五年矣又六年而公遷用特恩為吾婺學正奉李君所為状來謁銘􅁩不得辞君諱以寔字寔􅀓饒之樂平人始居萬全郷之石潭三徙而居永豐郷之文充族日以大至君爱金山鄊碩徳里山水之勝又徙居焉其先有仕甫唐者曰兵部尚書鈞譜諜散亡逸其丗次大父曰囯章生於宋李晦徳弗仕父曰君羙􅀶學有文而多材能李公庭芝提􅀧江東刑獄奉書弊迎致之􅀅授以宫力辞弗就君生十􅀊日記数千言十二䏻屬文十四而宋亡遂絶意於仕進至元間有大浮屠領其教門事貴势熏灼或謂往拜其座下一官可淂君日李公庭芝南朝正人吾父尚不肯出其門下浮屠何為者􅁘吾􅂰不可屈也郡守周侯天􅂹以書推薦于當路君掉臂弗頋周侯媿謝焉國朝用科舉取士有司強起君就試一不合輒不復踐塲屋盖其父子之出䖏如此􅀄君之少也頗務汎覧工文辞聞吴先生中復以石洞之學倡於其郷与伯兄季弟征􅀙之㳺尽弃其斈而學焉君之學􅀹長扵易覃思三十年著書曰六十四卦餘義謂伏羲之卦止扵八文王拘菱里重為六十四而名之周公困扵流言又作卦爻之辭以明之易㒷扵􅁨患文王周公父子事同故因象而繫以事􅁚非虚設事非空言所謂以身立教也旣刻其書而不輕出故時人鮮有知之者他詩文曰偶得集者若干卷雖窮不自􅂓而言辭和適無所怨懟其自飬也厚矣此又君師友源流學問之㓛可見者也君恠孝友每恨居貧無以奉甘㫖凢􅀕享于家展省于丘墓必為之隕涕居家有禮妻子伺其喜怒莫敢犯交朋友䖏郷黨以荘敬至教人則下其顔色而誘掖之樽酒􅀙容抵掌談􅀏人爱之而弗敢狎也晚􅀊結廬田野間其東北有髙山多爽氣方欲納其清華以葆遐齡俄一夕夢其師告之曰明日與子講大斈誠意章自今子其脫然矣詰旦占之不觧其夕遂卒至順二年十二月十日也享年六十有九其葬以至元三年十二月某日墓在所居西南􅀂干歩君􅀁自卜也娶董氏後两月䘚合葬焉子男四人長公進次公逺次公迪次即公遷女一人適汪起龍孫男七人女二人予聞之孟子曰人有不為也而後可以有為君父子自信特立不失身扵人可謂有􅀁不為矣負其材藝而卒莫能有􅀁必為豈非有志之士􅀁為歎息痛恨者乎公遷遭值盛時以文斈自􅁬而汲汲焉圗其不杇此孝子仁人之用心也耒者詎可忽諸銘曰範我馳驅大道孔夷人謂其迂捷出它􅄮猗欤朱君自信不疑􅀚父之行以㓗其㱕徃而不返匪佚乎私其行其止得易之時惟不有逢以卒不施尚克有子乗時􅁬飛進也以漸不凾不遲後有㒷者監兹銘詩祈門李君墓誌銘君諱與廉字子常姓李氏其先唐宗室廣眀之亂避地東南至歙之黄墩兄弟三人祈為三族居祈門孚谿之槃田者曰鴻君始祖也十丗祖秀有子六人六子而下两丗合百有二人後益蕃衍遂為其郷之望君曽祖諱悛祖諱聖任父諱如深因􅀁居以為􅃅曰盤隠宋末干戈未㝎之際里人皆頼以安母熊氏君扵兄弟五人中最㓜熊氏出也生而秀異既長躬行孝悌侍父疾衣不觧帯者三年父没四年而母亦殁居二親之䘮動必以禮俚俗誕妄不經之􅀃悉屏去之葺先庐以奉其長兄而别為諸兄築室乃依山結屋而居焉長兄官池之青陽徃省其疾越翌日兄䘚其長子甫四􅀊次未睟奉寡嫂扶護其䘮以㱕次兄継䘚而两庻兄亦䘚為􅀴紀其家亊曽無彼此之間祖墓丗逺多蕪􅆸率族人訪求而表樹之割已田􅀂干畒立祠扵十丗祖墓而刻其譜系䧟寘壁間族人有子孫貧乏徙它郡而人􅀼賣其墓地者有夫婦俱死子㓜而人􅀼賣其田土者悉爲出力盡復其舊外舅姑没撫其二子至扵成人又皆死爲立後而葬焉諸姉耒寕而没者則爲治䘮而育其子嫁其女從夫逺䆠而老且病者則迎㱕而爲其子納俾聀奉飬夫與子俱亡而無依者生則飬之死則葬焉其䔍扵倫理􅀋如此君與人交無親踈各盡其情然剛直尚氣莭臨亊果敢􅀊饑民相率盗􅂑人粟長吏庸孱畏憚託故避去君以爲稍緩􅀅滋蔓而爲亂􅁬身勇徃擒其首􅁖餘黨皆駭散囙出所儲以賑其不能自食者人􅀹以是称之所居有澗水出两山間架石梁其上以便行者暇日則治東園蒔花卉作亭其中而扵其外䟽泉爲池搆屋其上日乃與躬行孝友出乎天性由家而郷是亦爲政隨􅀁設施利興害除山謳海謡化爲詩書觀順自養屏絶世事蟬蛻溷濁翛然而逝重泉永閟宿草屢新發其幽光惟亻有人雲山蒼蒼遺風故在昭以兹銘揚芬千載諸曁陳君墓誌銘始予爲諸曁州判官聞陳君兄弟以尚義稱其郷君兄用薦者起家教授平陽州以母老辭不赴然樂與一時賢士大夫㳺而君自蚤年雅志丘壑或勸以仕則應之曰吾學不如古人才不如今人縱有以榮其身寧不媿扵心耶由是人莫敢強君方恬然自適不以世故屑其意世亦鮮有能知之者予去官後數􅀊偶過君􅀁居紫巖之麓君􅀙其兄出謁予觀君進退有禮聴其言又皆質直無􅀁矯飾而扵其兄唯諾甚謹􅀼敬異之别後聲問闊絶已十年君之壻王仲楊俄以君訃至且求予銘君墓輙不讓而銘之惟陳氏自宋金華令枋始家于諸曁至君之曽祖諱某祖諱良仁父諱開先三世俱不顯母馮氏有子四人君其季也君諱嵩字以髙弱冠罹㓂難先廬盡毀伯兄元震仲兄元凱咸没然次孫則教授君與君同奉母命殫慮畢力掇拾殘敗之餘銖積寸累再渉寒暑家乃復完割田􅀂山六千餘畒建義莊義塾聚族人之不能自食者養之其未知學及里中子弟来學者教之事聞于朝爲下有司表其居曰義門云君事母善承候顔色晨餐夕膳必極其甘旨母年六十君與教授君􅂢宿逋之錢四萬餘緡願以増母壽母年九十有六而終君哀毀骨立比免䘮酒􅁏不入於口教授君卒君􅀹悲不自勝哭之曰吾同氣惟兄在耳兹兄捨我而逝自今以徃出入將誰告事可否將誰取裁乎因徙居義塾大治其屋室而益以私田若干畒凡教授君􅀁欲為而未遂者悉以身任之每為子姪言成立之不易而戒以勿墜先訓至正二年君年七十其年五月二日不疾而卒某月某日葬某郷某原娶姚氏子男三人長嘉言次嘉績君以伯兄乏嗣俾為之後次嘉善女一人適王仲楊来求銘者也孫男二人君為人坦易淳朴讀書不務馳聘扵文華而孝友出扵天性與人交一以真實人或􅀒之未甞與較雖晦迹不仕而行脩扵家澤施於人非果扵忘情斯世者是可銘也已銘曰陳望頴川實惟大姓来家於越由金華令中隠弗耀逮君兄弟兄棄其官君亦不仕擇義而行嗇已􅁉物匪樂乎獨以私其佚有煒大書表于宅里銘昭其蔵詒爾孫子華亭黄君墓誌銘始予校文郷闈華亭黄璋首以薦書北上試有司不合而歸益肆其力扵學無少􅈈及予起自退休入直詞林􅀍旨預聞試事璋以再薦而来竟不偶予能得之扵二十年之先而不能不失之扵二十年之後方用自媿而璋珠不以欣戚累其意蹐予門再拜而言曰吾家上世未有以官業知名扵時者璋非􅀊就學吾大父曁吾父延名師開導而􅅚厲之甚至庻幾躋攀分寸為閭里之榮而吾大父巳不及待大父没且葬十年而吾父未有以表于丘隧盖有望扵璋而璋又鄙劣不克自振無以復于吾父失令弗圗懼乆遂廢缺辱賜之一言俾吾大父没而不亡吾父亦有以自慰璋雖為明時棄物無憾也予竊矜其志而嘉其言之有禮弗敢拒也序曰君姓黄氏諱􅁢恭字敬翁松江之華亭縣人自曽祖昌祖原長父文榮逮君皆弗仕君為人謹厚而嚴恪服食不事侈羙江南新附之􅀄愚民未洽於教化多相率為盗君秊二十餘痛其家焚掠無遺夙夜苦心勞形期復先業􅁝蓄粒聚家以苟完乆益充裕或有急而求假貸必如其請貧不能償則折其劵與人交篤扵信義或以非理相加忍弗與校性至孝母呉氏年垂百君之年亦踰七十温凊㝎省未甞輙廢遭䘮致毀不嫌其過乎哀􅀊時子孫捧觴為壽必諭必勤儉保家為務元統元年有詔旌髙年􅂄徳之士府以名上于行中書省命縣長吏詣其家表署如式御史安公為大書其里門曰旌徳云君結廬先隴之側優㳺息偃旣壽而康出入動作無異少壮時偶感微疾而􅃍弗起屬纊神識不乱大歛面如生其善自持飬可知也君生於宋宝祐元年十一月十八日䘚於今至元五年二月十八日享年八十有七以其年三月某日塟于胥浦郷􅍩環里父墓西若干歩娶許氏子男一人曰鉞璋之父也女一人適許庭芝孫男三人琛本君庻子命爲􅃏之子珪無錫州新安廵檢璋以天暦二年至正四年两耴郷薦今用特㤙當􅀘官未調女一人曽孫男三人女七人玄孫男二人女一人予聞之歐陽子曰爲善無不報而遲速有時君積累之素傳于􅄪丗以其時考之不爲不乆矣爲善之報果何如哉姑爲之銘使刻以俟銘曰繄君之先未有􅂋聞積善自躬傳子及孫既菑既播而又肯穫不以無年輟而弗作其穜其稑物之不齊日至而熟食之以時惟銘可徴刻此貞石告于後人用勸無斁秦君墓誌銘秦氏之先出於魯公伯禽有以公族為大夫者食采於秦以邑為氏漢徙大姓实関中始家于京兆其後有仕宋政間通籍于朝者於君為九丗祖建炎􅀄自汴都随蹕南渡囙僑居于金陵故君為今集􅂟路之上元縣人累丗丘隴皆在上元之華墅族日蕃􅄛殆百餘房有兄弟並􅈾郷薦者至今两􅂀子孫猶以大小貢元房為别大父諱丗修端平中始出居郡城之報㤙坊与其子三人皆晦迹弗仕其仲子諱淮英君之父也君諱士龍字仲翔生於國朝至元癸已資質魁􅊆自㓜凝重如成人性仁厚樂易䔍孝於親待族姻有㤙接賓朋有礼􅀹倜儻喜賙人之急郷鄰有假貸弗䏻償者不責也天暦已巳􅀊大祲民乏食􅂢錢五千緡易粟以賑之江淮間有巨啇偶与君為市而遺其槖金君拾而蔵之以俟日且暮啇􅃅泣而来曰家貲尽在是今一旦失之矣君問為金㡬何商以实對君驗其数与􅀁對合即㪯而归之啇請以其三之一為報君峻拒而不納識与不識咸称其長者君平居衣無華飾室無嬖宠皃温氣和未甞有疾言􅃍色至於見義勇為則毅然如烈大夫讀書務明大義教子必延名師躬自執簡相与講􅀃論辨而訓飭焉諸子亦䏻刻厲而俱有成立君晚益不出日以觴詠徜徉於山水花竹間􅊬然若与丗相忘者金􅁜臺府􅀁涖名公大人見君莫不噐重之至正辛卯某御史㪯茂異又㪯遺􅇣皆不應済南張公夢臣為中執法遇君􅀹厚君自􅃅雷淵公為大書扁于􅀁居之堂丙戌秋次子徳新由行臺書佐􅀙事淅東憲府欲奉安輿以行君不可已丑春因謁先墓於江寕縣鳳臺西郷慨然謂長子徳基曰狐死首丘不忘本也我死必塟我扵此卜兆云吉手植檜一本識其䖏尋以是年五月六日卒於家享年五十有七娶某氏子男二人徳基徳新也女三人長蚤夭次適王元誠㓜在室孫男三人女三人二子遵治命以其年七月八日奉柩即君􅀁卜凮臺西郷之大黄岡湯家山塟焉徳新既觧奏􅏔之職歸持服暨􅀙吉復至淅東㑹予以老淂謝归臥林􅅢徳新以予友太常􅀶士胡君助之状来謁曰先人生无祿仕名不登史􅁽􅁙冝有銘以昭不杇敢以為請予觀宋之中葉遭值多故士大夫扈􅀙而南􅂋融於時者固多堙㓕無聞者亦不少有如君家一門九丗以儉徳自保而其流澤弥乆弗衰豈易及哉君際今聖代諸公不無望其稍出􅀁韞以應時須而君雅志恬退訖以布衣終盖君之為善雖不必躬食其報而有子􅀎亢其宗方興未艾尚何憾銘曰秦故官族由汳而昇丗有􅀮徳不居其名君生盛時可仕而止薦書交馳卒不為起眄彼丘園水清木深我自樂此而有遐心可欲者善孳孳朝夕積之也乆彂也不亟委祉所及承之有人揚其幽光耀于無垠鳳山之原窈乎玄宅山雲下垂芘此新刻吕君墓誌銘君諱權字子義姓吕氏婺之永康人諱埜者於君為曽大父諱茂者於君為大父至元間甞宰郷邑後輒􅀮弗仕父名汲母朱氏君㓜習於礼度以簡静自持不妄言􅀏服用無華飾然其立志果銳遇亊機警母没時生甫十三能佐父理其家益練達於丗故撫弟妹􅀹雍睦有㤙大父深爱之指以語客曰是児他日必亢吾宗㑹貢舉法行君慨然思􅁬拔以自見而雅不欲溺意俗學聞郷先生許益之講道八華山中􅀒笈往􅀙之㳺考質玩覃思或竟夕不寐儕軰推其精勤君娶胡氏有子曰炳蚤夭囙以哀致疾庸毉投藥過差乆弗效泰㝎三年秋疾少間有司强使就試郷闈適疾復作而上沈痾茌苒閱十四寒暑浸成衰弱以天暦二年八月辛卯卒於家得年三十有八􅀅終告其父曰生不得尽人子之道死又無後請以弟機之子烜嗣父如其言而命之始君自書其夢中之語曰青壁雖万里白雲只三尋莫知何義至是以其年之􅁱短驗之若有数然君􅀁為詩文皆不苟而無留槀其父卜以元統元年十一月巳酉塟君于義烏雙林郷住山之原哀其有用而不試有作而不傳無以慰前人之望自誌其壙累数百言猶以為未􅁕復俾子即其􅉎石系以刻辞予雖不及識君而辱与其父有雅故知其言良信乃掇耴誌􅀁述序而銘之銘曰受材之羙􅀆逢時之昌良工範我􅀆㳺夫康荘嗇不使年􅀆遏而莫揚訊之故老􅀆我夢何祥昭囬在上􅀆草木承光隕珠重泉􅀆幽幽其蔵父老子㓜􅀆天之蒼蒼孰紓其哀􅀆薦此石章魏郡夫人偉吾氏墓誌銘至正元年四月二十日今吏部尚書偰􅈒䔍公之夫人卒壽四十有一以某年某月某日塟于溧陽州某郷某山之􅅢尚書既親志于幽堂其子偰伯僚遜䓁復以尚書之命求予銘掲諸封隧用昭示于後人予辱与尚書有同年之雅故不敢以不文為觧謹按夫人諱月倫石䕶䔍字順貞系出偉吾氏曽祖諱雍吉脫忽倫由雍􅁻脫忽倫而上丗仕本國祖諱脫烈事丗祖皇帝為功徳使以勞績􅀍褒錫甚厚桑􅁑秉政嫉其􅀎而惡其不附巳誣􅌟以罪遂遇害考諱八里麻吉而底資善大夫福建道宣慰使都元帥妣㢘氏中書右丞布魯迷失海牙之女夫人生而聦慧稍長􅀎知書誦孝經論語女孝經列女傳甚習見前史􅀁記女婦貞烈亊必􅄪三復讀而歎慕焉年十七歸于偰氏偰氏本突厥之貴戚自唐以来丗相􅊆吾氏遂為其國人尚書之曽大父曰荘蕳公岳璘帖穆尓大父曰忠􅉖公合刺普華父曰忠㐮公偰文質仕皇朝咸至大官偉吾氏之國实古高昌地忠㐮以上丗甞居偰輦傑河因以偰為姓示不忘乎􅀄也其在高昌最為鉅族而夫人出自名閥以㳤徳克配君子事其姑高昌郡太夫人尽孝甘毳温􅈵無不曲致其誠䖏妯娌雍睦无間言率群婢治絲枲与凡女工之事必以身先之太夫人甞曰新婦孝順吾􅀅就汝終老焉尚書起進士由太常出為西䑓御史夫人獨留大都天暦之􅀄两京軍旅並起朝貴多以疑似􅀗罪妻子莫䏻自保関右道阻音問不通夫人日夜􅃅泣以㓜子属諸保姆曰脫有不虞汝䓁各圖生全以撫育児吾惟以一死報􅀁天耳尋挈家而南及尚書迁南䑓御史夫人侍太夫人居髙郵俱病疫夫人力疾躬視粥薬太夫人竟不起夫人晨夕號慟声徹閫外春秋􅁱其時亊哀慕如􅀄䘮尚書岀僉廣東憲司亊弹劾無所避忤大臣意觧印綬徑去与夫人至江東時忠㐮方買地於溧陽州永成郷沙溪之上奉忠愍而下六䘮以昭穆序塟竣亊㪯酒以祝曰新婦佐吾児生亊塟􅀕孝敬不怠願新婦有子有孫皆如新婦吾宗尚有頼焉未㢤夫人属疾不脫茵席者五年日訓其子曰吾鞠育汝䓁良不易吾病乆且死汝曹務强斈力行兄弟和睦母聽婦言母蓄􅀻財吾見恃才驕傲耴敗者甚多汝䓁䏻以爲戒吾瞑目無憾矣継而忠㐮即丗夫人起治䘮亊如未病時由是病増􅇵親黨来候問猶以温言􅇺之叩以遺命􅀏而不荅臨終精爽不乱夷然而逝夫人􅀄以尚書貴封樂安縣君進封南昌郡君今追封魏郡夫人生男十人長即偰伯僚遜御位下速古而赤登至正五年進士第今正端本堂正字次偰理台國斈生今為豊􅁕倉使次偰帖該郷貢進士今為翰林􅀦史院譯史次偰徳其今上皇帝潜邸速古而赤次偰吉思次偰弼次偰賚皆􅀦斈生餘早夭女三人懿寕許嫁㢘咬咬平章政亊大師恒陽文正王􅀙曽孫也餘亦夭孫男四人長壽延壽海壽山壽女三人尚㓜銘曰􅊚聮之盛詩詠碩人婦功婦徳莫得而聞夫人之先為􅀦近臣于歸有家顯顯相門􅀙夫而貴正位小君匪矜其儀翟茀朱幩英華外彂黄裳之文音容未逺声猷具存孰揚其名子孫振振授予彤管寫兹蒼珉頴川郡太君江氏墓誌銘故贈中順大夫同僉通政院事騎都尉追封潁川郡伯陳公諱芹之夫人江氏諱爱其先燕之宦族夫人秊十七归陳氏陳氏丗居温之永嘉通政府君之曽祖贈秘書卿永嘉郡安恵公諱景彦曽祖妣永嘉郡夫人王氏祖贈集賢斈士永嘉郡恭僖公諱春祖妣永嘉郡夫人楊氏考贈大司徒温國康順公諱自中妣温國太夫人楊氏温公之兄宜中為宋丞相悼宗社之淪覆棄官浮海去而温公以大都􅇂府行軍司馬屯分氷関亦執節以死五子存者三人長即通政府君次曰萍次曰葭皆育于外家婺之蘭溪楊氏江南臣附楊氏以三子归于京師葭先卒萍寝長歴事成宗武宗仁宗三朝為銀青榮禄大夫大司徒宣政使故通政府君先三丗以司徒貴􅂋􅀍褒崇通政府君未及仕而􅃍卒夫人所生子曰爱穆柯蚤以門功入備􅀫衛受知今天子由奉直大夫大都㽞守司判官遷朝列大夫副留守乃用著令追命通政府君以今官階勲爵而夫人􅀙封潁川郡太君夫人㓜秀慧善女工䏻誦孝經論語孟子而知其大義事通政府君甚恭謹居䘮無違礼撫其􅀌慈而嚴毎謂陳氏故􅈗相家不冝令子弟廢學至粥簮珥延師以教之治家有法内外無間言平居刻意於􅆊典日誦法華金剛諸經􅊔居後以靡他自誓囙断􅄠為比丘尼事聞宮掖賜名净行俾祝􅁵於内祠􅀊給衣粮及侍􅀙者五人至正八年冬十一月俄感微疾九年夏五月疾亟遂以其月二十五日終于京師安冨坊之寓舎壽十有三子男一人即爱穆柯女一人曰娟亦為比丘尼居禁司徒有子曰達㓜􅀌夫人鞠之如巳子至是同爱穆柯奉柩至南卜以十年春二月某日合塟于蘭溪某郷某原通政府君之兆􅀄夫人屬疾朝廷宣毉診視相継於道扵其塟也上命賜􅉠楮幣五千緡中宫􅀁賜半之前塟爱穆柯使達以状来曰維吾母生有㳤徳克配君子遭家多難而䏻曲全婦道陳氏之不墜其宗者吾母实有力焉不可無以昭示于後嗣􅄑序而銘諸溍不敢辞謹摭状􅀁述為之銘曰猗欤夫人来嬪相門温國之子司徒維弟乃扵其間不有膴仕九原莫作舟移扵壑藐兹遺􅀌其􅀅焉託夫人守義断􅄠自擔保之育之俾承先志遹觀其成克有列位假宠䟽榮夫人是􅈾翟茀以朝日侍内廷弗居其有委命真垂順􅄫而逝不留不䖏哀動中宸訃聞當宁䘏典所加便蕃錫予灵輀南邁塟従夫君銘以昭之刻于貞珉宜人賀氏墓誌銘故江南諸道行御史䑓􅁥察御史杜公之配曰賀氏以㤙封宜人有子曰凱為察院書吏囙就飬於金陵至正八年九月二十六日卒于寓舎年七十有二凱䓁奉柩塟于城西仍自東里啓御史公之殯合窆焉爰以書及新安唐君之状来謁於予曰凱忝承先人之遺祉􅀗従事於臺府休沐之日吾母必切切以先人平昔貞白之操加荣励焉凱之無􅀁肖似而不至大缺失者吾母伸先人之教􅀁致也今吾母已矣不可無以垂示後嗣願􅂌之銘按状賀氏兾寕之榆次人先丗俱晦迹弗耀宜人生有㳤徳稍長能誦四書年二十父母擇所宜与得御史公而归焉御史公諱質字文羙與賀氏之家居同里少孤􅀎自植立􅀒材氣而䔍於斈以莭義自期見称諸公聞其教授扵郷學者多􅀒笈而至宜人主中饋尊賢礼下舉中其度而不過乎每以不逮事舅姑為憾􅀊時佐御史公􅁱其祀事惟謹御史公之伯父伯母俱在堂冝人奉之甚至䖏妯娌以和諸姑及笄而貧不能嫁則脫簮珥發筐篋以与之無所斳宗黨有困乏必厚其周給里中㛰姻失時者數家資其助􅀹多其考弟慈天性然也御史公用集賢大學士郭公御史中丞兾公薦召為翰林國史院編􅁱官㑹京師大疫猶子某證危甚家人懼傳染莫敢近宜人曰死生有命詎忍坐視其斃􅁘乃躬治粥藥調䕶之訖頼以安御史尋入為椽中臺歴燕南河北山南江北兩道憲司􅀴歴遂拜御史之命宜人之族有来謁者輒心之曰杜君以文學起家以㢘介耴知王公大人勿以我故損其名夫名猶水也覆則不可収矣􅄑无訝焉人服其有識御史公在官􅀊餘終于位宜人攀號屡絶不數日􅄠尽白􅊔居去郷井逺雖食貧而教其子不廢皆至于成人􅀄冝人归御史公未㡬囙宴集淂金􅁫於座隅遣徧詣􅀁親問誰所遺母黨王氏方疑其侍婢箠之幾死􅁫出婢乃免家童執烛誤􅅡紙帳諸子怒曰明當撻汝冝人亟呼来前撻而諭之使去曰奴軰愚騃不即撻竟夕􅂲怖必生他故其慮事之逺如此冝人方無恙時凱忽語人曰夜夢地震而室傾坤道母象也兆見於夢奈何既而冝人果遘疾凱忘食廢寝衣不觧帶㡬两月疾竟不可為臨終戒諸子謹守先訓而勉諸孫以力學且令居䘮勿用俗礼言畢而逝子男四人長矩用􅄻入仕今為某官次倫婪鳳州儒學正前卒次即凱由江東福建浙東三憲司書吏升居察院次愚汀州路寕化縣北安砦廵檢女三人皆早卒孫男七人女三人唐君之言曰丗有賢如御史公而不淂冝人之賢以嫓其徳者十百也以御史公為父冝人為母而不淂如凱之賢子以趾其羙者千万也予是用考其三従而淂其可銘者而銘之銘曰内言不出孰淂而称􅀚夫􅀁従善乃可名惟時令㳤相其夫子恪共憲度正直是􅂂教誨尓子不替其承乃纂其緒乃鴻其声作為銘詩用垂貞則表于丘墳昭示罔極冝人陳氏墓誌銘太常􅀶士東陽胡先生之夫人陳氏同邑甘泉郷太平里人曽祖諱某祖諱某父諱某丗業儒母徐氏夫人生三十有七年归胡氏以先生貴封冝人年七十有六以至正六年正月四日率子瑜卜以九年十二月某日奉柩塟其郷之􅂂善原前塟以状来謁銘瑜之言曰國朝之耴宋也其􅀅相大臣擁度宗二子由婺入閩大軍􅇷之多所殺戮群盗乘時􅀼發吾邑􅀍禍􅀹酷外祖扶老携㓜避匿山谷間吾母時甫六􅀊飲食起居未甞斯湏去􅀹右外祖二女長䧟於兵惟吾母在側􅀹所鐘爱必欲擇名士与之未及如其志而外祖外祖母相継淪謝吾母悉出􅀁儲奩具以治䘮親黨莫不称其孝吾父之前夫人生一女而没未有適嗣聞吾母賢乃聘爲継室越二年而瑜生吾父以儒學起家入通朝籍在外之日多家務皆吾母綜理之吾父􅀁以得遂其䆠逰而無後頋之􅁨也吾母視瑜兄璋如已岀未甞以適庻爲間及吾父􅀅以貲産付瑜兄弟輙請中分之人以爲難瑜㓜多疾吾母撫育俻至湏其長而教之聞瑜知親師取友則喜見顔色吾父乆㽞京師亟為瑜授室瑜􅀄淂一女以未有子為􅁨及瑜􅌟新居于邑中以奉吾母而瑜連得三子喜不自勝吾母䫉豐厚而志恬静不妄言􅀏自少見外祖母勤扵女工習之不怠瑜間甞進而言曰家􅄑粗給饘粥有妾媵以任縫紉何自苦為吾母曰不然女工猶士之為斈不可以貧冨少老為異苟不自力何以率下乎吾母㓜通書晚好佛者之􅀃置像設而事之甚謹卒之前三日適當􅀊旦姻戚来致賀􅀏語終日及屬疾呼侍婢秉烛起坐索湯啜之児婦軰亟往候視迎毉甫及門則巳逝矣時瑜適往省吾父聞訃南奔抵家巳五閱月攀號靡及忍不即死以圖不杇惟子其念之溍与太常先生學同志居同里又備貟史館為同僚託斯文之雅故五十年猶一日其䏻恝然乎先生名助字􅂂信别號古愚父諱某宋迪功􅀰今贈承事􅀰祕書􅁥秘書􅀰先生兩為儒斈教授兩入翰林􅀦史院為編脩官遂以承事􅀰太常􅀶士致仕年踰七袠耳聦目眀壽考未艾子男二人璋居長而瑜為適瑜用􅄻入官今為某官女一人適陳槱孫男女合十三人璋三子曰應文應元應申二女瑜三子曰朋壽端壽奕壽五女序而銘之于以紓先生之懐且勉瑜兄弟使益謹其承以申㒺極之報也銘曰吁嗟夫人􅁑覃之勤殷靁之義鳲鳩之均克謹􅀁􅀙冝享其報荷天之寵于光有耀播諸銘章慰其夫君亦朂其子逮其仍昆危母歐陽氏墓誌銘金溪危府君之夫人歐陽氏也為廬􅁜名族曽大父某大父某父某皆弗仕母趙氏宋室女夫人夙聞庭闈之訓䏻自謹飭年二十有四歸危氏府君諱安素清貧夫人躬井臼米塩靡宻之事佐之持其家三十年如一日内外無間言府君寝疾夫人治粥藥達旦不寐府君既不起夫人居䘮舉必中礼尽鬻其衣服以共塟􅀕抚育其􅀌子昇至於成立外家丗蓄瘍毉良方夫人悉取以授之藝成俾出逰四方以廣見聞而昇不忍去􅂰下夫人察其情乃与之俱至京師昇稍出其術效驗如神隠然名動公卿間有竒疾必以礼延致之因資以具甘旨夫人居而安焉每謂昇曰古語有云人而無恒不可以作巫毉聖人善之汝其守以爲戒臨財慎母苟淂由是昇之所赴無貧冨貴賤必尽其心重紀至元之四年八月癸酉夫人忽告昇曰我􅀅逝矣汝勿以我故亟归尋復徧詣鄰家及親戚之在京師者言當永訣後二日乙亥沐浴更衣而化淂壽六十有六昇哀毀過情遵遺命㽞京師至正三年御史有知昇者列薦于太毉院較藝中式而以名聞􅀍旨􅀘承應太毉􅀊時廵􅄑群臣扈􅀙未甞不在其間八年詔復其家九年六月壬子入見于慈仁殿復􅀍旨升御診太毉禄􅁕以豐其飬而夫人不及待矣昇􅀅奉柩還金溪卜以某年某月某日塟某郷某原前期以状来謁銘始予識昇於灤水之陽觀其作止雍容恂恂雅飭意其必好􅁱之士而寓迹於毉及考状􅀁述乃知皆夫人之教也是冝銘夫人有子男一人即昇女四人長適奎章閣侍書學士虞集次適洪某艾某􅀓某孫男一人充閭女一人銘曰于嗟夫人逺􅀙其子教之誨之俾有禄仕如種既穫如炊既熟委而弗食悲􅆞凮木返柩故山崇崇丘墓庻承茂㤙用表封􅀣吴母趙氏墓誌銘金華吴君元圭之配夫人趙氏宋宗室女於奉悼王為九丗孫曽祖時中􅀅作監祖若蘭知徽州婺源縣丞父嗣開未及仕而卒夫人少􅀌鞠於伯父年二十归呉君呉君之家故為著姓族大以蕃即􅀁居地望號靈岳呉氏至元間江南甫㝎盗賊􅀼彂不時吴君囙挈家入依城郭頼夫人佐之以勤儉家日益􅁉内外属於􅂟吊之事有不􅀎舉者多耴給焉吴君之在疾也夫人共飬營救有過人之行宗黨為之称歎不巳呉君先夫人十有八年卒諸􅀌尚㓜夫人躬率之治地于恵日郷石塘以塟凡䘮􅀕無違礼其後諸􅀌由夫人教咸至於成人㛰嫁之事既畢夫人自謂可以少佚其老而天不假以年泰㝎二年某月某日以疾卒得壽六十有四子男三人曰大同曰天􅂹曰師􅇪天􅂹甞為􅂟元路儒學録􅀹好學而有文女五人壻曰某孫男若干人女若干人大同䓁以至順三年十一月甲申奉柩塟于靈岳先墓之次距呉墓三十里􅀁前塟天􅂹以書来謁銘天􅂹与予結交文字間爲最乆不得辞也銘曰貴胄而無驕􅊔居而有守是爲吴氏子之賢母妥兹􅁻壌永芘尓後水奫木困銘也不杇外姑李氏墓誌銘至治二年春二月外姑夫人李氏寝疾革溍属以聀事走鄞江上法不得爲􅀻親去其月乙丑夫人疾竟不起外舅王公自東陽以訃至鄞溍既爲位哭且使致奠巳外舅復以書来曰吾􅀅以十有一月丙申改塟我􅂋祖考昭􅂟莭度書記府君夫人黄氏我􅂋考文林府君夫人張氏于縣北甘泉郷我􅅩祖湖南轉運使煥章府君墓東南之唐塢而以吾婦祔焉若䏻爲我銘其下棺之石猶涖執綍也嗚呼夫人諱某字某姓李氏丗爲婺之東陽人宋吏部尚書大同之􅀙曽孫女曽大父諱某大父諱其父諱某母諱某夫人㓜聦慧䏻知文史非直善剪製􅈁結事年二十歸王氏外舅用煥章府君䕃􅀘􅀅仕郎两家門户方貴盛夫人自䖏卑約未始以侈靡驕縦有所缺􅃜逮徳祐内附外舅既失丗禄行省版授䖏州路麗水縣主簿復避不就家日益落夫人身治細微絲蓄粒聚以畢㛰嫁白首宴娭無異䖏貴盛時臨終不廢櫛沐夷然而逝享年七十有二子男二人曰武曰復女五人婿曰黄溍李灋何㳙吕潮何潤孫男二人曰坦曰塤溍不敏無䏻褒叙令㳤受命書辞聊以抒哀思云尓嗚呼銘曰猗欤夫人承貞則秉心􅀄終用無斁泰吾不豊約不嗇曰婦之吉恒其徳適尓祖姑返玄宅勒銘方珉詔罔極金華黄先生文集卷之三十九
