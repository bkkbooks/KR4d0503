body:
  text: 臨川危素編次墓碣董秉􅃔墓碣嗚呼是惟秉􅃔之墓始予識秉􅃔鄞江上秉􅃔方妙年論議亹亹庻幾能以古人自任者由是数與之㳺別去僅三􅀊而復求秉􅃔扵鄞則秉􅃔死矣嗚呼悲夫秉􅃔名復禮姓董氏世為奉化州人自曽祖庭堅祖成巳至其父潤無仕者秉􅃔少嗜書不以貧輟其學故衣敗絮無以禦寒擁紙􅀍挟􅁽㘴竟日人莫見其有不堪之色甞􅀙郷先生魯月郷為舉子業試有司不中遂不復踐塲屋益􅂑􅀴史百氏之言鉤㣲擿􅀮而求極其根柢間出以為歌詩雅文皆清麗古雅可喜故翰林侍講學士􅀽公甚噐重之其父晚得末疾老母弱弟姊妹之未有家者居䖏服食㛰嫁之湏一資於秉􅃔而後具秉􅃔未甞少戚戚以動其父母之意其父母亦􅌚然以忘其憂人以爲難鄞胡氏父子素善秉􅃔爲治舎舘俾子弟師事之秉􅃔深自刻苦與之相摩厲激切夜参半隔墻燈火明㓕猶􅀮􅀮聞讀書聲惟憊不自休因以成疾度不可起則歸與其父母訣竟以泰㝎三年九月五日卒於家年三十有三未娶無子以弟􅂹爲之後父命也頼胡氏爲買棺乃克以歛􅀽公爲彂粟它朋㳺及方外交又相與合錢爲助始克以其年十一月五日返􅁙于奉化某郷西圃先墓之次其友汪君敏德以書來曰秉􅃔死且􅁙子知秉􅃔者宜爲銘胡氏既買石以俟矣嗚呼悲夫千里駒不出皁􅇫人知其國馬而未始見其千里也故予扵秉􅃔不敢􅃍以􅀁可見者爲已足獨哀其年之嗇志之未䆒而死及之序而銘諸有不得苟譲者矣嗚呼悲夫銘曰生不予前死不予後夫孰碑其父母不得以為子而予不得以為友也嗚呼陳子中墓碣子中􅃰州陳氏名中因以為字年三十有六至順四年六月丙寅終于杭州之寓舎卜以某年月日祔􅁙于湖州烏城縣菁山下先墓之側其友哲理野䑓筮仕為丹徒􅆘以事如杭買石属予以銘嗚呼予固不可無一言以慰子中於地下抑豈忍言之哉初子中合其同志五六人􅀙予南屏山中丹徒亦在焉欲相率推予為之師予謝不可則皆曰諾然猶有以父兄之雅故執子弟禮者予視子中則畏友也子中毎篝燈挟􅁽而㘴恒至四皷蚤作殊無憊色其析理㩀事毫髪不苟間出以為文皆精深縝可喜而子中莫敢自謂已足不肯急扵求售向之五六人者或擢奉常第或以賢書上春官子中獨未甞一踐埸屋去年始赱京師就試於郷闈考官得其文􅀅寘之前列尋復以其􅀃為疑竟棄弗録子中退自有司嶇﨑四千里􅀒笈南還扺家一月而有母憂又两月俄以􅁀病一夕不起嗚呼子中而止扵斯耶天者之難必而殃慶不以其􅁼乃􅀂是耶子中之大父德用晦跡弗仕父譲故任連江縣尹以奉直大夫杭州路捴􅃹府判冑致仕盖其先乆占籍于􅃰由奉直公仕江南遂家焉母李氏張氏妻亦張氏外家之女也子男一人女一人皆尚㓜異時翰林侍講學士巴西鄧公甞為子中扁所居室曰庸齋子中請予為之銘予未及為而􅃍銘其家上之石嗚呼悲夫銘曰原田􅀆沃沃匪重􅀆斯穋樹之同􅀆或以弗熟天之忍予􅀆胡彼培而此覆子無憂􅀆不復神之聽之􅀆後其式􅂖蒋君墓碣蒋君敬之名宗簡生三十有一年而死其友王厚孫以状述遺言來属扵予曰宗簡生不及􅀙子㳺死而得一言為不杇之託猶不死也嗚呼予之固陋何􅁕以知敬之敬之之望予則至矣敢不諾敬之上世居潤之金壇宋南渡時七世祖兵部尚書少帥荘簡公猷始遷四明其後多至顯官而敬之曾大父應鼇大父與可父復祖皆弗仕母方氏敬之㓜爽敏有雋聲程先生端禮歸自江東敬之以弟子禮見􅅏居旁舎数􅀊凡天人性命之本古今治􅅍得失之迹靡不􅂙䆒郡庠延敬之為小學師諸生多貴㳺以其年少頗易之敬之於疑義数語而决以文來就正随所治為加􅃳色頃刻数十篇乃大恱服尋挈其徒寓湖心僧寺聚易詩春秋諸家之􅀃而折衷焉試有司不遇􅂺散棄其舊作或謂敬之不以盛壮時挟􅀁長􅂑禄仕獨用古文自詭奚益敬之哎曰使吾理明氣充其為文於決科何有得不得命也文有古今之異邪既而稍岀逰江湖間遇臨川危素於金陵與語意合欲偕至京師以母老不能去買未見書数百卷以歸翰林桞先生貫得敬之所為文擊莭不巳方為具薦櫝而敬之已屬疾遂不起至正元年十月十二日也貧無以治䘮天台陳廷言甞主郡教為言於太守及寓公率朋㳺之士合錢為助乃克以其年十一月某日􅁙鄞縣陽堂郷桃奥先墓之次敬之娶趙氏有子男一人曰僖女二人􅀁著有易集義詩答問春秋三傳要義捴􅀂干卷文集十卷蔵於家敬之為人介㓗篤於自信重然諾恥為小㢘曲謹人多稱其經學詞藝而其卓然欲有所樹立以自附於古人者未必盡知之也昔之豊於材而嗇於年如王逢源邢惇夫輩盖有之矣此两人得臨川豫章而其名益彰敬之有程先生以為依歸視昔人可無憾尚奚以區區之言為予不譲而銘之者姑以慰其來意云爾銘曰進而未見其正􅀂有以為而今已矣昭明在上其蔵在此吕君墓碣君諱機字審言姓吕氏在婺之永康為大家而君之父水西翁為其郷之善士翁两子長曰􅁠次即君􅁠早卒翁既為之報服後十年而君亦卒翁年垂八袠矣􅂘之􅀹過乎哀又三年而翁遂卒􅁠之墓予實銘之翁之􅁙也其家復以銘属而君之墓猶未銘因并以為請君曽大父諱埜大父諱􅅷父諱汲水西翁也其出䖏之大畧具如翁墓誌母朱氏生君十年而卒君既失􅀁恃稍長刻意於學通春秋左氏大㫖好讀司馬公資治通鑑而窺其理􅅍得失之故水西翁居家庭䖏族婣里黨各盡其道君孝於女而敬於兄事必咨而後行撫育二妹逮于有家服食噐用僅無缺而已有餘貲􅂺以買書教子待賔客朋友有禮樂振郷鄰之急人或懐嶮􅇖以相傾忍弗與較皆綽有父風娶何氏宋直蕐文閤樞宻副都承㫖子舉之曽孫女前卒􅁙義烏縣明義郷之蜀山後十四年而君卒扵至正三年十一月十日得夀五十卜以五年十二月二十三日合􅁙焉子男四人長燧次烱次烜以水西翁命為􅁠後次煥女一人􅆘胡必慶孫男二人舉掆女六人昔韓退之誌殿中少􅁥馬君墓謂吾年未耄老自始至今未四十年而􅂘其祖子孫三世其言反覆感愴讀者莫不深悲之予乃以二十年之間銘君父子兄弟三人而予亦既老矣過君之墓而讀予銘者孰知予言之􅀹有足悲也夫銘曰太古之世父不􅂘子嗚呼悲夫君之兄弟忍去而翁相踵以死君則有子子又有孫翁􅃿不亡昭以刻文方君墓碣予爲諸暨州判官之二年州人方君卒後一年予受代去又後十二年而其子始来謁銘予雖不及識君而聞君之死有足悲者乃爲之銘曰方雷之興􅷙自西陵彌周渉漢有叔有紘炎精中否紘初南徙子孫蔓延歙睦莆田其在於睦有䖏士干干生唐末由睦而越宋興國初教復徙居家于諸暨綿綿十世是􅁇是承維君髙曽曽祖天與祖曰垚卿咸淳之季太學諸生其父曰鎰䖏而不出義以爲尚嗇巳􅁉物母氏曰張來歸于方生君兄弟而年弗長澤君之諱玉泉其字能竭其力成父之志惠于族姻爰及郷鄰大治講舎􅀻淑乎人父病未瘥衣不觧帶侍醫四澣心勦形瘵逮父之亡􅂘踊過傷以毁致􅍚莫能勝䘮故患疽背伏毒于内旅且一紀乆以疾癈及兹復作瘢湧其外􅂭然􅀛穹欎血不潰創鉅痛深弓臥苫􅤓仰天而呼曰死矣夫猶有窀穸幸緩須􅁷夙興力疾筮兆􅁲日穿土爲竁信宿而畢需旦告遷啓塗飾棺填池引發跣􅀗弗前掖以家僮行凭其肩柩至于壙禮􅀙報􅁙既贈而行歸視虞牲甫及􅄪虞遂以瞑君妻某氏哀君之死曰我何􅀹酷罰至此子男櫰樗未壮而􅀌悲啼摧慕絶而復􅂫童孫燁燁其泣􅈱􅈱忍未殞㓕披誠􅄋血圖堅山石以謹􅀊月致和戊辰五月庚寅君卒之日後父九旬三十有九維君之夀度地起墳栖碧之原郷曰花山里曰白門十有二月葬日丙申距君封樹左二百歩曰鳯凰山方氏大墓天道之甞孰尸元化貿乎否蔵俟天之㝎子孫其昌銘以識之掲諸幽堂東陽李君墓碣君諱謙亨字伯讓姓李氏婺州東陽縣人李氏宋之䆠家族最蕃衍以􅀁居縣東南為别居縣之東者以吏部尚書寳謨閣直學士大同􅂋尚書之父贈太中大夫侃則君之六世祖也曽祖鑑弗仕祖逢子登仕郎父世衡仕皇朝終於平江路儒學教授君㓜頴悟教授君授以書强記不忘而知其大意稍長能為詩文年十有七教授君殁事母陳氏盡孝家事皆身親之友愛其弟巽亨頥亨􅀹篤巽亨蚤世鞠其􅀌如已子有妹􅆘外舅月泉書院山長胡公得之子道生胡氏同縣大姓乆而家益落君資給其妹甚至誡其家無俾姑知之乃妹卒姑臨其䘮覩室中䔥然輟􅂘謂知而妹之貧􅀂是而妺亦不以告我豈非恃汝兄賙耶吾復何憾既而胡君與道生相継殁無嗣君曰立後族人責也吾為子婿亦安忍使其父子之匶􅂆吾􅁲地以􅁙或􅂆以仕君應之曰子殯於空堂家自太中府君而下尚書父子起世科致顯位賞延弗絶際今聖時吾先人及尚書之裔又咸有官簿為吾宗之榮不巳多乎吾誦先人遺書課子姪使不墜其緒業躬耕畎畒出租稅以奉公上可也奚以仕為因自號臥雲道人以見其志至正五年十二月四日以疾卒於家享年五十有一六年十二月二十四日􅁙縣南西部郷之黄塢妻胡氏子男四人長思齊由郷試􅀘儒學官歴建徳之遂安集慶之句容两縣教諭當遷而未調次思義次思忠前三年卒今祔于君墓側次思誠女二人􅆘徐祐朱福孫男二人􅀁為詩文有臥雲小藁􅀂干卷蔵于家君葬後九年思齊始以君内弟陳士元之状来謁銘􅀵􅁛君孝友出扵天性見義必為待人有恩而不苟阿其意皆可勵薄俗而惜其不少出􅀁藴以自見於世夫能以施其家者逹於親黨以及乎郷人豈非孔子􅀁謂是亦為政者􅁘雖不有穹官峻爵豊功􅊆績亦足以不杇矣銘曰有開其先發而不舒有承其後靡亟靡徐乃扵其間遺榮弗居細行必矜終始不渝孰昭其潜序而銘諸玄和明素葆真法師陳君竭君諱彦儉字鵬舉姓陳氏世為鄱陽望势父某􅀮居弗仕君其仲子也大宗師開府張公用清静寕一之􅀃宻賛世祖皇帝無為之治歴仕四朝為國元老其門人髙弟冲粹玄素貞静貞人何公恩榮獻粛文貞元範先生薛公羲並以材猷學術克􅀹右之故家子弟思自㧞於流俗者多楽􅀙之逰君年十五至龍虎山何公見其音吐洪暢風神秀朗深加噐重遂使受業薛公所薛公精於玄學􅀹善為儒家者流之言君朝夕咨叩務䆒極其旨趣然於酬酢世故亦未始憚煩何公得李氏􅃇居於貴谿之英林令君躬涖土木剏置祠宇成宗皇帝賜號曰萬夀德元之􅀚凡屋室物噐在其法所宜有者靡不畢具何公以君為能為君曰吾遭值盛時蒙􅀍君師之力常􅂲弗克負荷将以是為逆􅁵儲祉之地庻幾􅀘報萬一非直是􅀚羙而巳汝其擇人以啚永乆既而得詹䖏敬于有興王景平䓁命以次相授受且延名儒淑其􅀙俟成人而簮褐之䖏敬等亦能與君同其甘苦銖積寸累買田􅀂干畒以益其食􅀊饑貧民多頼以活植巨杉数萬株俟它日有所興葺於此乎􅂑材焉泰㝎三年集賢以君名聞特授玄和明素葆真法師提􅀧􅀚事今上皇帝至元元年荐􅀍璽書遷提􅀧龍興玉􅂭萬夀宫辭不赴其丈室四旁多古梅扁曰梅雪􅀚之東有䖏敬所作天􅀮堂而其西有景平所作茂脩舘空山野水蕭爽靚幽名花珍木交映森列君日與髙人勝士酣嬉其間不知老之将至也至正二年七月二十九日俄示㣲恙化去春秋五十有四君􅀁禀承自正德弘仁静一貞人毛公頴逹元成文正中和真人夏公文泳而下九人継君者䖏敬有興景平䓁七十有五人薛公冐炎暑歴嶮􅇖卜善地於蘭谿将以某月某日蔵君遺蛻乃爲書俾弟子趙冝􅁉請勒銘以昭玄蹤方今􅀉跡老子法中而受知朝廷者無不􅂑貴􅂋君獨深自韜晦休休焉青雲白石之間盖其所存有非世俗􅀁得而窺者是不宜無銘也銘曰用其勤道之園安其邊德之宅以返于冥極廣莫子周君碣呉興計籌山老子祠真人杜公主之其二弟子曰姚季安先生曰廣莫子周君真人僊去姚先生嗣掌祀事周君始來延祐六年也君諱德方㓜失身干戈中不知父母所在僅僅如為杭之海昌人流落野馬氊裘之郷踰沙漠不啻萬里其地宜􅀲宜蒲桃間以進果至京師見道家衣冠心甚慕焉且聞杜公有道之士决意求師之時已五十餘矣玄教大宗師呉公善其精於譯語任以庚桑楚之􅃥将使因􅀙師而訪郷里為奏請璽書住越之龍瑞宫凡六載而謝事君自恨少不學至是一意讀書山中所居室設老子像而列道學六君子其旁朝夕敬禮之題其室曰不自恕齋別􅃅廣莫子㘴臥一榻積書数千卷皆貞人故蔵繙閱偶有得則䟽以別紙􅀊乆成巨帙義理淹貫心識融㑹時出以析疑問有儒先所未發性不飲酒日唯升堂一飯影不出山餘二十年君於姚先生為後進而先生雅愛重之常兄事焉毎夕必過君茗飲論􅀃至夜分乃罷未甞􅂺廢一夕寒甚感疾手書形離知去同乎大通八字而以書道其平生大略與先生别俄側身而逝年八十有一某年某月某日也室内􅀂有異香云先生奉君遺蛻窆于山之麓且謂旦暮􅀙子􅁲鄰後数月先生果不起兆域相距十歩而近真若相依為命然集賢直學士掲公勒文于姚先生碑附見周君而弗能詳句曲外史張天雨序其事俾其弟子凌某立石姚先生碑側為廣莫子周君碣而屬金華山人黄溍系之以銘使百世之下知斯山有斯人也斯世有斯人也銘曰行也茫乎其􅀂浮止也泊乎其􅀂休孰知夫德人之夭㳺初無去而無留伊廣莫之境又孰為華屋而孰為山丘也耶墓記八世祖墓重建石表記宋黄府君諱景珪字叔寳婺之浦江人溍八世祖也府君父諱昉字明仲母于氏墓在縣西花橋之南而府君墓在縣北之後店夫人朱氏子一人諱琳娶宗忠簡公澤之女弟始家于義烏是為溍之七世祖孫三人伯曰璣仲曰益其季諱中輔則溍之六世祖也自是族日以大舊譜􅀁載間有脫略其可見者曽孫萬頃昭祖紹祖公顯公煥無咎少亮潜之􅀭祖九人諱紹祖者於溍為五丗祖玄孫伯謹簡天夀慕韓某伯昌必大伯信夢符伯恭三畏伯紀桂發維介子唐英綱縝十八人諱伯信者於溍為四世祖累贈朝散郎朝散公有子三人長諱夢炎朝散大夫行太常丞兼樞宻院編脩官兼􅁠左曹郎官以朝請大夫致仕次忠翊郎􅁠安慶府望江縣令焱次太學生熒朝請公未第時甞刻石表府君墓年世殊􅊬或􅀼􅂑其石而去或㩀其墓垣外餘地而有之太學生之孫可乆望江令之孫可􅀓等始按其籍悉復故地遂伐石重建此表俾溍志于下方溍朝請公之曽孫承節郎諱堮之孫皇贈中順大夫同僉太常禮儀院事江夏郡伯諱鑄之子其生也後無􅀙備聞上世事府君之年夀卒􅁙與凡行事雖􅇣其傳而子孫衆多有以彰積善之餘慶是用叙次世系訖于功緦譜所弗具莫能詳也􅃝免而下令又六世譜之􅀁及百五十人亦不得而盡著焉至正七年春二月甲子八世孫溍謹記先祖墓銘石表記嗚呼是為吾祖考黄公祖妣徐夫人之墓自我先人奉柩合葬于兹十年而溍誤玷科名叨塵官使又二十有八年乃得請而致其亊德薄位卑所以榮其先者寵数有限後四年欽氶上㫖起自退休入直翰林備員侍講始用著令得推㤙二代比年两膺錫命公初贈中順大夫禮部侍郎上􅀐都尉追封江夏郡伯􅄪贈嘉議大夫禮部尚書上􅁿車都尉追封江夏郡侯夫人亦自江夏郡君進封江夏郡夫人惟黄氏婺大姓由金華散䖏它郡者仕宋多致顯官而公七世祖諱昉六世祖諱景珪仍居婺之浦江五世祖諱琳娶忠簡公女弟又徙義烏而為其縣人未有出而仕者髙祖諱中輔以文學行義知名轉運使薦于朝将授以官命埀下而卒曾祖諱紹祖復􅀮弗仕祖諱伯信迪功郎累贈朝散郎妣宗氏忠簡四世諸孫女累封安人考諱夢炎淳祐十年進士仕至朝散大夫行太常丞兼樞宻院編脩官兼􅁠左曹郎官以朝請大夫致仕妣陳氏方氏陳氏贈宜人有子曰垓方氏實生公諱堮朝請公第二子也朝請公遇明禋當任子􅂺推以與其姪故公兄弟無用􅄻入官者公僅以進納􅀘氶莭郎而不及禄生於嘉熈四年六月二十四日卒於今大德八年五月二十四日享年六十有五夫人東陽徐氏曽祖諱楠祖諱炘考諱彬淳祐七年進士甞以奉議郎行􅀦子正與朝請公並入淮西淮東制幕為主管機宜文字㑹改建两淮宣閫又同辟幹辦公事故以夫人來歸而公以􅍚廢夫人安於命分育我先人為子以保其世業三􅀙之義靡所缺􅃜生於淳祐四年八月一日卒於今大德七年八月二十四日享年六十墓在縣東北崇德郷東埜之原與先塋相望􅁙以十年八月贈封之制下則至正七年十月八年十二月也一子即我先人諱鑄用朝請公遺澤􅀘将仕􅀰宋亡遂絶意仕進後五十年乃以㤙受封終於􅀙仕郎温州路樂清縣尹今累贈中奉大夫江浙䓁䖏行中書省􅂙知政事護軍􅇷封江夏郡公孫男五長即溍次漙次浩為朝請公長女之子劉應黽後更名鼎次次滋為朝請公長男垓之子頥後女三􅆘賈師䕫劉咸生劉拱辰曾孫男六檮橒梓樞􅂎楨女二􅆘陳克譲劉道泰玄孫男八璨瓊璋瑞瑄琛瑭珹女三嗚呼昔歐陽文忠公作龍岡阡表於􅁲􅁻六十年之後自以為非敢緩也盖有待也溍衰謝之餘継罹憂患茍存視息以終天年寜復有所待乎詔使在門義不俟駕龍光赫奕有隕自天褒大顯榮賁及泉壌則文忠􅀁謂遲速有時不克有於躬而足以表見於後世庇頼其子孫者也䖍奉命書展告玄宅感慕涕泣不知所云姑序其梗槩子兹石表嗚呼來者尚有以知其所自而永永不忘哉至正十年八月一日孫男溍謹記先考墓誌銘後記二首先君既葬且免䘮溍起自草土復􅀙薦紳之後因得乞誌銘書􅂐於同年三鉅工頋以縻身下列乆未克歸入石暨蒙㤙外􅀘以先夫人春秋髙不俟引年納禄而歸将礱石以刻而奄罹大故惟先君荐膺崇贈祠版已屡改題誌銘書􅂐不宜尚仍其舊先夫人之􅁙僅序􅀊月納諸壙而未有以昭示于後人溍憂患餘生退休田里無繇奔赱俯伏大人君子之門以請懼因循廢缺愈重不孝之罪謹以其文摹勒上石而以其所不書與未及書者悉系于石隂初朝請府君之姊􅆘􅀙事郎昭慶軍節度掌書記王公囦金嘉熈戊戌進士有女作配于儒林郎两浙西路提舉常平茶塩司幹辦公事丁公應復實生我先君年十有二朝請府君見而竒之氶節府君以疾廢遂俾育先君為子儒林公世居呉興朝奉郎伯虎嘉㝎癸未進士於公為考中大夫直寳謨閣太府少卿曄慶元丙辰進士於公為祖公方以考舉及格待班而德祐失國公亦失世禄家日益落先君迎致侍飬終身􅀊時為位以􅀕惟謹此誌之不書者也童氏金華大姓先夫人之曽大父恮迪功郎臨安府錢唐縣尉大父必遇迪功郎紹興府嵊縣主簿父氶信公娶俞氏以寳祐四年六月十九日生先夫人年二十歸于先君後先君十二年卒至正三年六月二十三日也享年八十有八其年八月二十七日奉柩祔于先君之右先君受封五年卒官七品溍自國子􅀶士出為江浙等䖏儒學提舉始贈先君奉政大夫祕書􅁥丞驍􅀐尉追封義烏縣子先夫人進封義烏縣太君溍之婦王氏昭慶書記公曽孫女亦自宜人加封義烏縣君溍既得謝而廷議妙東文臣付以史事旁招䟽賤俾預討論使者及門先夫人之殯在堂已九日矣服除乃拜祕書少􅁥致仕之命累贈先君中順大夫同僉太常禮儀院事上􅀐都尉追封江夏郡伯先夫人追封江夏郡君孫男檮已卒􅎚國子學生今用􅄻赴吏部銓女嫁惠州學正陳克譲者亦巳卒次嫁劉道泰曽孫男又三璋瑞瑄女一此誌之未及書者也然所謂考其所自出者盖有不容盡泯所謂贈典日􅂭者固逆知其可必溍是用推述而􅇱著之先君之嘉言懿行先夫人之淑德令儀雖非不肖􅀌􅀁能􅁛道祖父姻亞官封卒􅁙之詳来者或有稽焉至正五年十二月十五日男溍謹記溍立石未幾而􅀍上㫖落􅃱仕入直翰林俻員侍講比􅀊累蒙推恩褒及於二代氶節府君初贈中順大夫禮部尚書上輕車都尉追封江夏郡侯徐夫人初追封江夏郡君􅄪追封江夏郡夫人先君加贈集賢直學士亞中大夫輕車都尉追封江夏郡侯􅄪加贈中奉大夫江浙等䖏行中書省叅知政事護軍追封江夏郡公先夫人两追封皆江夏郡夫人溍之婦王氏亦两封江夏郡夫人間者溍以衰杇乞身而退始克親奉帝制展告以禮俄復拜召還之命未遑有所登載兹幸得請歸守先隴乃序次其略附見于石隂之下方曽孫男又三琛瑭珹女二玄孫男一道永至正十年七月七日男溍謹記外舅王公墓記外舅王公之殁遺命屬溍誌于幽堂溍方竊食輦下既蒙恩外補乞身而退俄彼㫖落致仕復玷朝行及得謝而歸則奉㐮大事已乆溍亦老而耄及之矣念它日不可無以藉手見公扵地下謹追書其所可知者俾掲于墓之原公諱桂字仲芳姓王氏月谿其自號也其先汳人宋渡江初五世祖琳避地南來家于婺之東陽暨四世祖徽咸弗仕曾祖諱師伋以子貴累贈中奉大夫妣宗氏亰城留守兼開封尹贈觀文殿學士忠簡公澤四世諸孫女通判衢州䕫之曾孫女累贈令人寳章閣學士劉公克荘銘其墓祖諱囦金嘉熈戊戌甲科進士授􅀙事郎昭慶軍莭度掌書記未上而􅁀卒妣黄氏我髙祖贈朝散郎諱伯信之女曽祖太常丞樞宻院編脩官左曹郎官朝請大夫致仕諱夢炎之姊朝散與中奉爲友婿故以長女爲其冡婦考諱沂文林郎􅁥沿江制置副使司造船塲妣張氏初昭慶入奉大對臚唱之日太師魯國喬文惠公行簡爲首相立殿上退遣吏賀曰當以衣鉢相傳盖謂其居同里同以四十餘爲殿試第五人也而不料其竟不及禄母弟曰鎔前十年巳擢龍飛第踐􅆒所至内則郎曹寺􅁥外則􅁥司帥守終於中奉大夫直煥童閣荆湖南路計度轉運副使撫兄子如已子由是文林以恩􅀘官公本宗氏子令人之􅀙孫也煥章遵母命俾爲文林後亦以恩􅀘将仕郎公生長宦家自少親炙諸老痛洗綺紈子弟侈靡之習而刻意於學為文操筆力就若不經思而藹然有前軰典刑􅀹工於歌詩樂府駢四儷六之語善楷書端勁方嚴得顔桞遺法南嶽有鎮南之殿四大字乃煥章将漕時令公代作迄今猶存人莫知為公之筆也随侍窅㳺歴七閩三湘且乆􅅏江上多所見聞遭時艱虞頗慨然欲以事功自奮際今聖代四海合一分命重臣㘴鎮南服號曰行省承制署公處州麗水縣主簿公不敢辭受而不赴自是絶意於仕進徙居别室開門授徒生計日衰簞瓢自􅆘安常䖏順既夀而康重紀至元之五年某月某日不􅍚而卒享年八十有八有四書訓詁十卷詩文雜藁十卷随筆一卷娶李氏寳謨閣直學士吏部尚書大同􅀙曽孫女前公十有七年卒子男二人長武次復並為外家李氏婿武後公某年卒復今獨氶其家女五人長即溍妻累封江夏郡夫人溍之曽祖姑歸于昭慶而公以女歸于溍篤世姻也次􅆘李灋尚書四世嫡孫次􅆘何德光次􅆘呂潮某州司法参軍友德四世孫次􅆘何德澗孫男二人坦塤坦亦巳卒女一人凡子孫􅀂婿􅀂外孫男女合三十有二人先是煥章葬縣北甘泉郷廣陵寺之後山搆祠字割田四十畮有畸俾寺僧守之而僧悉以田質錢於富民公銖積寸累贖而還之晨香夕燈之須頼以無闕公又以昭慶墓在縣南之東姜族子或􅀼其地劵售於豪家有司弗能直文林墓在縣南之桐川又数毀於盗遂卜地於煥章墓東南之唐塢遷两世四䘮及内子之柩以昭穆序􅁙仍虚其左以為夀蔵旁置家舎名之曰􅁇庵示子孫使勿替其氶也公既殁二子以至正某年某月其日奉柩即公所自為甎槨安厝焉始公命溍銘外姑之􅁙而自銘其夀蔵曰生吾順􅀆殁吾寜魂氣超騰􅀆風露青冥佳山佳水􅀆佳城欎欎吁嗟􅀆吾其寓形此室銘成而不及自誌其平生本末爰以屬於溍惟公之盛年有官而無位晚復抗志事外故其素藴不少槩見於設施溍􅀁書􅀂甚簡畧而皆有可徴不敢效世俗巧􅎖誣言以為欺也至於系序官伐姻亞之詳雖細弗遺不暇一一裁以古書法而去其繁冗誠懼夫後之人日逺日忘也過而覽者幸無誚焉至正十三年冬十有二月二十七日庚申婿翰林侍講學士中奉大夫知制誥同脩國史同知經筵事黄溍謹記金蕐黄先生文集卷四十
