body:
  text: 臨川危素編次墓志銘江隂吳君墓志銘君諱方字季仁姓吳氏世為江隂人七丗祖範大觀政和間纍舉八行皆不起後以慈寧慶壽恩封承務郎人不稱其官而稱之必曰八行先生云嘗出私錢治郡學而授弟子業沒因祠之至今不廢六世祖仲基宣和甲辰進士五丗祖閲之紹興壬子進士髙祖諱某曽祖諱庠祖諱珏考諱世英並晦弗耀母曹氏有子三人君其季也少受經于鄉先生陸子方而于諸子百氏醫藥卜筮數術之書靡所不知作詩尚理致不事雕飾然未始自以為髙教其子率能有所成立其奬飾後進雖小善弗遺有過輒面斥之亦無少恕里中子有獲罪於其父將違而去之者詣君别君諭之曰生育之恩昊天同極天可逃乎其人大悔遽下拜請歸侍飬于是父子如𥘉鄉民有兄弟三人生五子而析居者已三十年君覩其墟落整比長幼有序語之曰吾觀汝家雍睦如此曷不萃而為一乎其人感悟曰仁人之言倍之不祥遂復同居君之啓迪人多此類有盜屢彂君所藏一日卒然遇之鄰家子也左右欲聞于官君曰吾不能薰之為善良暴其事則辱在我耳彼豈樂為盜哉迫於貧耳竟縱遣之後果自愧而改行其䏻使人化服又如此若家非甚豐于財而樂振人之窮居者行者咸有以資之病與藥餌死與棺槥穀貴則下其直貸錢而弗能償則折其劵歲饑有司勸分君自度力不足周一郡乃罄餘粟以食其鄉之人蔡港務官所虧稅錢一千三百緡計無所出携其女粥於市君聞之悉為代輸因請以女備給使君拒弗納州官有受代貧莫䏻歸者死無地以葬君方自治壽藏輟其地以卑之此尤為人所稱道者也君自奉食無兼味而凉天佳月朋簮雜集觴豆甚設雅歌投壷尽歡而止延祐中故人有知君者薦為處州儒學録辭不就自號孏菴居士以示絶意於仕進晚築室于家東南將徙居之俄得風痺疾稍愈而復作臨終顧其子曰人孰無死古人重於得正而斃吾殆庶幾乎其毋以侈靡之物斂且毋以緇黃溷吾家泫汝等能守其身而不墜詩禮之傳則吾所望也言訖而逝君生於前至元二十五年正月二十三日卒于後至元五年正月二十五日享年五十有二其年三月二十六日葬順化鄉黃山先墓之側娶朱氏子男八人長惟誠次惟諒為伯父後次惟訓惟誼惟謹惟謨惟詵惟評女三人長適常州蔣鉞餘在室孫男二人女二人君葬後三年惟誠介趙君季文賈君彥髙納謁而言曰先人不幸至於大故惟誠等遵治命速葬未及跣赱於先生長者之門以啚不杇懼久且墜逸益重不孝之罪願矝而賜之銘按事狀所述君平生大槩多可書而惟誠之請又勤懇若是不敢以不文為解銘日緊君之先以八行徴再丗文科茂恩是承君主盛時不榮以祿惟行與文是似是續動人者義澤物者仁詠歌道德為時逸民有子詵詵幹父用譽載其休聲永表封樹溧陽孔君墓志銘溧陽孔君既沒之明年其孤汝舟汝楫將奉匶以葬前期汝舟俾其子惟中走錢唐以銘來屬按狀君諱學詩字文卿六丗祖按自魯徙吳曽大父潜又自吳徙溧陽而占籍焉大父應祥始務治生産以殖其家父庭秀以謹厚克承先業有子二人君其次也至元乙亥國朝取宋之師至金陵寓公趙待制淮起兵溧陽𬒳執不屈而死君年甫十有六竊自念曰彼大臣子且有位序死固其所蚩蚩之氓安知天命所歸徒耴死無益也乃贊其父率衆詣軍門鄉井賴之以完主帥竒之因挾以北上欲薦于大府俾效官使君之父適遣人以物色訪得君所在君慨然曰吾獲為太平民終飬其父母幸矣奚以官為懇辭得南還君持身以正家法甚嚴而濟之以恩伯兄蚤世撫其遺孤如巳子中分田廬擇其美者授之族􅊚里黨之窮乏必加周恤而不以為德它可便於鄉鄰者無不致其力大德丁未之饑食其餓者瘞其殍死者天曆巳巳荐饑亦如之且傾廪粟以助官府之弗給法當淂官有司將上其名于銓曹君謝曰吾以有餘𥙷不足尓豈藉是榮吾身哉况以入粟而賞官何榮之有識者尤用敬服君素剛介人有過輒面斥責即貴勢無所避故與世多忤有誣陷以不法者平昔所怨忌又旁咻而力㨈之長吏覬君有所請託抑弗為理君曰吾心無愧於天人惡䏻勝天哉巳而卒淂直擠之者乃自悔而君無幾微見於辭色苐戒其子曰汝輩毋懲所遭而怠於為善亦毋以家之豐而不由於禮惟勤生可以繼其先惟知學可以㳤其後至其子䏻自植立遂悉付以家事日與賓客從容於琴册觴豆壷矢間二子列屋而居號南北宅君往來惟意所適而安焉不以久近為計也君嘗大書性字於座右謂人曰䏻循性之自然則無入而不自淂矣人因稱之曰性齊云君卒以至正元年二月十四日享年八十有二葬以二年某月某日墓在所居里陸上原先塋之次娶教氏前三十有一年卒子男二人汝舟汝楫也孫男五人惟德惟和惟中惟良惟懋女四人壻曰蔡翼張濵宗應槐湯某曽孫男八人女五人玄孫男一人女一人蓋君平生大槩內有所飬而不撓於物外無所慕而不纍於名近乎古所謂鄉之善士者可銘也巳銘曰君家于南由魯友分歸而求諸逺有異聞見幾者知利物者仁為而不匪以資身惟是浩然弥久獨存安常委順訖為全人亦既有年有子有孫有銘昭之刻在墓門樂平朱君墓志銘至正元年秋豫與建德推官李君粲同較文鄉闈南士預薦者二十有八朱公仙其一也於是公遷之父殁已十有一年葬亦五年矣又六年而公遷用特恩為吾婺學正奉李君所為狀來謁銘誼不得辭君諱以實字實傳饒之樂平人始居萬全鄉之石潭三徙而居永豐鄉之文充族日以大至君愛金山鄊碩德里山水之勝又徙居焉其先有仕甫唐者曰兵部尚書鈞譜諜散亡逸其丗次大父曰國章生於宋李晦德弗仕父曰君美博學有文而多材能李公庭芝提點江東刑獄奉書弊迎致之將授以宫力辭弗就君生十歲日記數千言十二䏻屬文十四而宋亡遂絶意於仕進至元間有大浮屠領其教門事貴勢熏灼或謂往拜其座下一官可淂君日李公庭芝南朝正人吾父尚不肯出其門下浮屠何為者耶吾膝不可屈也郡守周侯天驥以書推薦于當路君掉臂弗顧周侯愧謝焉國朝用科舉取士有司強起君就試一不合輒不復踐場屋蓋其父子之出處如此𥘉君之少也頗務泛覽工文辭聞吳先生中復以石洞之學倡於其鄉與伯兄季弟征從之遊尽弃其學而學焉君之學尤長于易覃思三十年著書曰六十四卦餘義謂伏羲之卦止于八文王拘菱里重為六十四而名之周公困于流言又作卦爻之辭以明之易興于憂患文王周公父子事同故因象而繫以事象非虛設事非空言所謂以身立教也既刻其書而不輕出故時人鮮有知之者他詩文曰偶得集者若干卷雖窮不自聊而言辭和適無所怨懟其自飬也厚矣此又君師友源流學問之㓛可見者也君怪孝友每恨居貧無以奉甘㫖凡祭享于家展省于丘墓必為之隕涕居家有禮妻子伺其喜怒莫敢犯交朋友處鄉黨以莊敬至教人則下其顔色而誘掖之樽酒從容抵掌談笑人愛之而弗敢狎也晚歲結廬田野間其東北有髙山多爽氣方欲納其清華以葆遐齡俄一夕夢其師告之曰明日與子講大學誠意章自今子其脫然矣詰旦占之不解其夕遂卒至順二年十二月十日也享年六十有九其葬以至元三年十二月某日墓在所居西南若干步君所自卜也娶董氏後兩月卒合葬焉子男四人長公進次公逺次公迪次即公遷女一人適汪起龍孫男七人女二人豫聞之孟子曰人有不為也而後可以有為君父子自信特立不失身于人可謂有所不為矣負其材藝而卒莫能有所必為豈非有志之士所為歎息痛恨者乎公遷遭值盛時以文學自奮而汲汲焉圗其不杇此孝子仁人之用心也耒者詎可忽諸銘曰範我馳驅大道孔夷人謂其迂捷出它𡵨猗歟朱君自信不疑觀父之行以潔其㱕往而不返匪佚乎私其行其止得易之時惟不有逢以卒不施尚克有子乘時奮飛進也以漸不函不遲後有興者監兹銘詩祈門李君墓志銘君諱與廉字子常姓李氏其先唐宗室廣眀之亂避地東南至歙之黃墩兄弟三人祈為三族居祈門孚溪之槃田者曰鴻君始祖也十丗祖秀有子六人六子而下兩丗合百有二人後益蕃衍遂為其鄉之望君曽祖諱悛祖諱聖任父諱如深因所居以為號曰盤隱宋末干戈未㝎之際里人皆賴以安母熊氏君于兄弟五人中最幼熊氏出也生而秀異既長躬行孝悌侍父疾衣不解帶者三年父沒四年而母亦殁居二親之喪動必以禮俚俗誕妄不經之說悉屏去之葺先廬以奉其長兄而别為諸兄築室乃依山結屋而居焉長兄官池之青陽往省其疾越翌日兄卒其長子甫四歲次未睟奉寡嫂扶護其喪以㱕次兄繼卒而兩庶兄亦卒為經紀其家事曽無彼此之間祖墓丗逺多蕪廢率族人訪求而表樹之割已田若干畒立祠于十丗祖墓而刻其譜系陷置壁間族人有子孫貧乏徙它郡而人竊賣其墓地者有夫婦俱死子幼而人竊賣其田土者悉為出力盡復其舊外舅姑沒撫其二子至于成人又皆死為立後而葬焉諸姊耒寧而沒者則為治喪而育其子嫁其女從夫逺䆠而老且病者則迎㱕而為其子納俾聀奉飬夫與子俱亡而無依者生則飬之死則葬焉其䔍于倫理類如此君與人交無親踈各盡其情然剛直尚氣莭臨事果敢歲饑民相率盜取人粟長吏庸孱畏憚託故避去君以為稍緩將滋蔓而為亂奮身勇往擒其首惡餘黨皆駭散因出所儲以賑其不能自食者人尤以是稱之所居有澗水出兩山間架石梁其上以便行者暇日則治東園蒔花卉作亭其中而于其外疏泉為池搆屋其上日乃與躬行孝友出乎天性由家而鄉是亦為政隨所設施利興害除山謳海謡化為詩書觀順自養屏絶世事蟬蛻溷濁翛然而逝重泉永閟宿草屢新發其幽光惟人有人雲山蒼蒼遺風故在昭以兹銘揚芬千載諸暨陳君墓志銘始豫為諸暨州判官聞陳君兄弟以尚義稱其鄉君兄用薦者起家教授平陽州以母老辭不赴然樂與一時賢士大夫遊而君自蚤年雅志丘壑或勸以仕則應之曰吾學不如古人才不如今人縱有以榮其身寧不愧于心耶由是人莫敢強君方恬然自適不以世故屑其意世亦鮮有能知之者豫去官後數歲偶過君所居紫巖之麓君從其兄出謁豫觀君進退有禮聽其言又皆質直無所矯飾而于其兄唯諾甚謹竊敬異之别後聲問闊絶已十年君之壻王仲楊俄以君訃至且求豫銘君墓輒不讓而銘之惟陳氏自宋金華令枋始家于諸暨至君之曽祖諱某祖諱良仁父諱開先三世俱不顯母馮氏有子四人君其季也君諱嵩字以髙弱冠罹寇難先廬盡毀伯兄元震仲兄元凱咸沒然次孫則教授君與君同奉母命殫慮畢力掇拾殘敗之餘銖積寸纍再涉寒暑家乃復完割田若山六千餘畒建義莊義孰聚族人之不能自食者養之其未知學及里中子弟來學者教之事聞于朝為下有司表其居曰義門云君事母善承候顔色晨餐夕膳必極其甘旨母年六十君與教授君捐宿逋之錢四萬餘緡願以增母壽母年九十有六而終君哀毀骨立比免喪酒肉不入於口教授君卒君尤悲不自勝哭之曰吾同氣惟兄在耳兹兄捨我而逝自今以往出入將誰告事可否將誰取裁乎因徙居義孰大治其屋室而益以私田若干畒凡教授君所欲為而未遂者悉以身任之每為子姪言成立之不易而戒以勿墜先訓至正二年君年七十其年五月二日不疾而卒某月某日葬某鄉某原娶姚氏子男三人長嘉言次嘉績君以伯兄乏嗣俾為之後次嘉善女一人適王仲楊來求銘者也孫男二人君為人坦易淳朴讀書不務馳聘于文華而孝友出于天性與人交一以真實人或負之未嘗與較雖晦迹不仕而行修于家澤施於人非果于忘情斯世者是可銘也已銘曰陳望頴川實惟大姓來家於越由金華令中隱弗耀逮君兄弟兄棄其官君亦不仕擇義而行嗇已𥙿物匪樂乎獨以私其佚有煒大書表于宅里銘昭其藏詒爾孫子華亭黃君墓志銘始豫校文鄉闈華亭黃璋首以薦書北上試有司不合而歸益肆其力于學無少懈及豫起自退休入直詞林𬒳旨預聞試事璋以再薦而來竟不偶豫能得之于二十年之先而不能不失之于二十年之後方用自愧而璋珠不以欣戚纍其意蹐豫門再拜而言曰吾家上世未有以官業知名于時者璋非歲就學吾大父暨吾父延名師開導而飾厲之甚至庶幾躋攀分寸為閭里之榮而吾大父巳不及待大父沒且葬十年而吾父未有以表于丘隧蓋有望于璋而璋又鄙劣不克自振無以復于吾父失令弗圗懼久遂廢缺辱賜之一言俾吾大父沒而不亡吾父亦有以自慰璋雖為明時棄物無憾也豫竊矜其志而嘉其言之有禮弗敢拒也序曰君姓黃氏諱允恭字敬翁松江之華亭縣人自曽祖昌祖原長父文榮逮君皆弗仕君為人謹厚而嚴恪服食不事侈美江南新附之𥘉愚民未洽於教化多相率為盜君年二十餘痛其家焚掠無遺夙夜苦心勞形期復先業絲蓄粒聚家以苟完久益充裕或有急而求假貸必如其請貧不能償則折其劵與人交篤于信義或以非理相加忍弗與校性至孝母吳氏年垂百君之年亦踰七十溫凊㝎省未嘗輒廢遭喪致毀不嫌其過乎哀歲時子孫捧觴為壽必諭必勤儉保家為務元統元年有詔旌髙年耆德之士府以名上于行中書省命縣長吏詣其家表署如式御史安公為大書其里門曰旌德云君結廬先隴之側優遊息偃既壽而康出入動作無異少壯時偶感微疾而遽弗起屬纊神識不亂大斂面如生其善自持飬可知也君生於宋寶祐元年十一月十八日卒於今至元五年二月十八日享年八十有七以其年三月某日葬于胥浦鄉􅍩環里父墓西若干步娶許氏子男一人曰鉞璋之父也女一人適許庭芝孫男三人琛本君庶子命為鉞之子圭無錫州新安巡檢璋以天曆二年至正四年兩耴鄉薦今用特恩當𥙷官未調女一人曽孫男三人女七人玄孫男二人女一人豫聞之歐陽子曰為善無不報而遲速有時君積纍之素傳于再丗以其時考之不為不久矣為善之報果何如哉姑為之銘使刻以俟銘曰繄君之先未有顯聞積善自躬傳子及孫既菑既播而又肯穫不以無年輟而弗作其穜其稑物之不齊日至而熟食之以時惟銘可徴刻此貞石告于後人用勸無斁秦君墓志銘秦氏之先出於魯公伯禽有以公族為大夫者食采於秦以邑為氏漢徙大姓實關中始家于京兆其後有仕宋政間通籍于朝者於君為九丗祖建炎𥘉自汴都隨蹕南渡因僑居于金陵故君為今集慶路之上元縣人纍丗丘隴皆在上元之華墅族日蕃衍殆百餘房有兄弟並􅈾鄉薦者至今兩派子孫猶以大小貢元房為别大父諱丗修端平中始出居郡城之報恩坊與其子三人皆晦迹弗仕其仲子諱淮英君之父也君諱士龍字仲翔生於國朝至元癸已資質魁偉自幼凝重如成人性仁厚樂易䔍孝於親待族姻有恩接賓朋有禮尤倜儻喜賙人之急鄉鄰有假貸弗䏻償者不責也天曆已巳歲大祲民乏食捐錢五千緡易粟以賑之江淮間有巨啇偶與君為市而遺其槖金君拾而藏之以俟日且暮啇號泣而來曰家資尽在是今一旦失之矣君問為金幾何商以實對君驗其數與所對合即舉而歸之啇請以其三之一為報君峻拒而不納識與不識咸稱其長者君平居衣無華飾室無嬖寵貌溫氣和未嘗有疾言遽色至於見義勇為則毅然如烈大夫讀書務明大義教子必延名師躬自執簡相與講說論辨而訓飭焉諸子亦䏻刻厲而俱有成立君晚益不出日以觴詠徜徉於山水花竹間邈然若與丗相忘者金陵臺府所涖名公大人見君莫不器重之至正辛卯某御史舉茂異又舉遺逸皆不應濟南張公夢臣為中執法遇君尤厚君自號雷淵公為大書扁于所居之堂丙戌秋次子德新由行臺書佐從事淅東憲府欲奉安輿以行君不可已丑春因謁先墓於江寧縣鳳臺西鄉慨然謂長子德基曰狐死首丘不忘本也我死必葬我于此卜兆云吉手植檜一本識其處尋以是年五月六日卒於家享年五十有七娶某氏子男二人德基德新也女三人長蚤夭次適王元誠幼在室孫男三人女三人二子遵治命以其年七月八日奉柩即君所卜凮臺西鄉之大黃岡湯家山葬焉德新既解奏差之職歸持服暨從吉復至淅東㑹豫以老淂謝歸臥林麓德新以豫友太常博士胡君助之狀來謁曰先人生無祿仕名不登史冊葬冝有銘以昭不杇敢以為請豫觀宋之中葉遭值多故士大夫扈從而南顯融於時者固多堙滅無聞者亦不少有如君家一門九丗以儉德自保而其流澤弥久弗衰豈易及哉君際今聖代諸公不無望其稍出所韞以應時須而君雅志恬退訖以布衣終蓋君之為善雖不必躬食其報而有子能亢其宗方興未艾尚何憾銘曰秦故官族由汳而升丗有隱德不居其名君生盛時可仕而止薦書交馳卒不為起眄彼丘園水清木深我自樂此而有遐心可欲者善孳孳朝夕積之也久彂也不亟委祉所及承之有人揚其幽光耀于無垠鳳山之原窈乎玄宅山雲下垂芘此新刻吕君墓志銘君諱權字子義姓吕氏婺之永康人諱野者於君為曽大父諱茂者於君為大父至元間嘗宰鄉邑後輒隱弗仕父名汲母朱氏君幼習於禮度以簡靜自持不妄言笑服用無華飾然其立志果鋭遇事機警母沒時生甫十三能佐父理其家益練達於丗故撫弟妹尤雍睦有恩大父深愛之指以語客曰是兒他日必亢吾宗㑹貢舉法行君慨然思奮拔以自見而雅不欲溺意俗學聞鄉先生許益之講道八華山中負笈往從之遊考質玩覃思或竟夕不寐儕輩推其精勤君娶胡氏有子曰炳蚤夭因以哀致疾庸醫投藥過差久弗效泰㝎三年秋疾少間有司强使就試鄉闈適疾復作而上沈痾茌苒閲十四寒暑浸成衰弱以天曆二年八月辛卯卒於家得年三十有八將終告其父曰生不得尽人子之道死又無後請以弟機之子烜嗣父如其言而命之始君自書其夢中之語曰青壁雖万里白雲只三尋莫知何義至是以其年之修短驗之若有數然君所為詩文皆不苟而無留槀其父卜以元統元年十一月巳酉葬君于義烏雙林鄉住山之原哀其有用而不試有作而不傳無以慰前人之望自志其壙纍數百言猶以為未足復俾子即其窆石系以刻辭豫雖不及識君而辱與其父有雅故知其言良信乃掇耴志所述序而銘之銘曰受材之美兮逢時之昌良工範我兮遊夫康莊嗇不使年兮遏而莫揚訊之故老兮我夢何祥昭回在上兮草木承光隕珠重泉兮幽幽其藏父老子幼兮天之蒼蒼孰紓其哀兮薦此石章魏郡夫人偉吾氏墓志銘至正元年四月二十日今吏部尚書偰哲䔍公之夫人卒壽四十有一以某年某月某日葬于溧陽州某鄉某山之麓尚書既親志于幽堂其子偰伯僚遜等復以尚書之命求豫銘揭諸封隧用昭示于後人豫辱與尚書有同年之雅故不敢以不文為解謹按夫人諱月倫石護䔍字順貞系出偉吾氏曽祖諱雍吉脫忽倫由雍吉脫忽倫而上丗仕本國祖諱脫烈事丗祖皇帝為功德使以勞績𬒳褒錫甚厚桑葛秉政嫉其能而惡其不附巳誣􅌟以罪遂遇害考諱八里麻吉而底資善大夫福建道宣慰使都元帥妣廉氏中書右丞布魯迷失海牙之女夫人生而聰慧稍長能知書誦孝經論語女孝經列女傳甚習見前史所記女婦貞烈事必再三復讀而歎慕焉年十七歸于偰氏偰氏本突厥之貴戚自唐以來丗相偉吾氏遂為其國人尚書之曽大父曰莊蕳公嶽璘帖穆尓大父曰忠愍公合刺普華父曰忠襄公偰文質仕皇朝咸至大官偉吾氏之國實古高昌地忠襄以上丗嘗居偰輦傑河因以偰為姓示不忘乎𥘉也其在高昌最為巨族而夫人出自名閥以㳤德克配君子事其姑高昌郡太夫人尽孝甘毳溫涼無不曲致其誠處妯娌雍睦無間言率群婢治絲枲與凡女工之事必以身先之太夫人嘗曰新婦孝順吾將就汝終老焉尚書起進士由太常出為西臺御史夫人獨留大都天曆之𥘉兩京軍旅並起朝貴多以疑似獲罪妻子莫䏻自保關右道阻音問不通夫人日夜號泣以幼子屬諸保姆曰脫有不虞汝等各圖生全以撫育兒吾惟以一死報所天耳尋挈家而南及尚書遷南臺御史夫人侍太夫人居髙郵俱病疫夫人力疾躬視粥藥太夫人竟不起夫人晨夕號慟聲徹閫外春秋修其時事哀慕如𥘉喪尚書出僉廣東憲司事彈劾無所避忤大臣意解印綬徑去與夫人至江東時忠襄方買地於溧陽州永成鄉沙溪之上奉忠愍而下六喪以昭穆序葬竣事舉酒以祝曰新婦佐吾兒生事葬祭孝敬不怠願新婦有子有孫皆如新婦吾宗尚有賴焉未哉夫人屬疾不脫茵席者五年日訓其子曰吾鞠育汝等良不易吾病久且死汝曹務强學力行兄弟和睦母聽婦言母蓄私財吾見恃才驕傲耴敗者甚多汝等䏻以為戒吾瞑目無憾矣繼而忠襄即丗夫人起治喪事如未病時由是病增劇親黨來候問猶以溫言慰之叩以遺命笑而不答臨終精爽不亂夷然而逝夫人𥘉以尚書貴封樂安縣君進封南昌郡君今追封魏郡夫人生男十人長即偰伯僚遜御位下速古而赤登至正五年進士第今正端本堂正字次偰理台國學生今為豐足倉使次偰帖該鄉貢進士今為翰林國史院譯史次偰德其今上皇帝潜邸速古而赤次偰吉思次偰弼次偰賚皆國學生餘早夭女三人懿寧許嫁廉咬咬平章政事大師恆陽文正王從曽孫也餘亦夭孫男四人長壽延壽海壽山壽女三人尚幼銘曰􅊚聮之盛詩詠碩人婦功婦德莫得而聞夫人之先為國近臣于歸有家顯顯相門從夫而貴正位小君匪矜其儀翟茀朱幩英華外彂黃裳之文音容未逺聲猷具存孰揚其名子孫振振授豫彤管寫兹蒼珉頴川郡太君江氏墓志銘故贈中順大夫同僉通政院事騎都尉追封潁川郡伯陳公諱芹之夫人江氏諱愛其先燕之宦族夫人年十七歸陳氏陳氏丗居溫之永嘉通政府君之曽祖贈祕書卿永嘉郡安惠公諱景彥曽祖妣永嘉郡夫人王氏祖贈集賢學士永嘉郡恭僖公諱春祖妣永嘉郡夫人楊氏考贈大司徒溫國康順公諱自中妣溫國太夫人楊氏溫公之兄宜中為宋丞相悼宗社之淪覆棄官浮海去而溫公以大都督府行軍司馬屯分氷關亦執節以死五子存者三人長即通政府君次曰萍次曰葭皆育于外家婺之蘭溪楊氏江南臣附楊氏以三子歸于京師葭先卒萍寢長歷事成宗武宗仁宗三朝為銀青榮祿大夫大司徒宣政使故通政府君先三丗以司徒貴顯𬒳褒崇通政府君未及仕而遽卒夫人所生子曰愛穆柯蚤以門功入備宿衛受知今天子由奉直大夫大都留守司判官遷朝列大夫副留守乃用著令追命通政府君以今官階勳爵而夫人從封潁川郡太君夫人幼秀慧善女工䏻誦孝經論語孟子而知其大義事通政府君甚恭謹居喪無違禮撫其孤慈而嚴每謂陳氏故宰相家不冝令子弟廢學至粥簮珥延師以教之治家有法內外無間言平居刻意於𣑽典日誦法華金剛諸經婺矛牙居後以靡他自誓因斷髮為比丘尼事聞宮掖賜名净行俾祝釐於內祠歲給衣糧及侍從者五人至正八年冬十一月俄感微疾九年夏五月疾亟遂以其月二十五日終于京師安冨坊之寓舍壽十有三子男一人即愛穆柯女一人曰娟亦為比丘尼居禁司徒有子曰達幼孤夫人鞠之如巳子至是同愛穆柯奉柩至南卜以十年春二月某日合葬于蘭溪某鄉某原通政府君之兆𥘉夫人屬疾朝廷宣醫診視相繼於道于其葬也上命賜􅉠楮幣五千緡中宫所賜半之前葬愛穆柯使達以狀來曰維吾母生有㳤德克配君子遭家多難而䏻曲全婦道陳氏之不墜其宗者吾母實有力焉不可無以昭示于後嗣幸序而銘諸溍不敢辭謹托狀所述為之銘曰猗歟夫人來嬪相門溫國之子司徒維弟乃于其間不有膴仕九原莫作舟移于壑藐兹遺孤其將焉託夫人守義斷髮自擔保之育之俾承先志遹觀其成克有列位假寵疏榮夫人是􅈾翟茀以朝日侍內廷弗居其有委命真垂順寂而逝不留不處哀動中宸訃聞當寧恤典所加便蕃錫豫靈輀南邁葬從夫君銘以昭之刻于貞珉宜人賀氏墓志銘故江南諸道行御史臺監察御史杜公之配曰賀氏以恩封宜人有子曰凱為察院書吏因就飬於金陵至正八年九月二十六日卒于寓舍年七十有二凱等奉柩葬于城西仍自東里啓御史公之殯合窆焉爰以書及新安唐君之狀來謁於豫曰凱忝承先人之遺祉獲從事於臺府休沐之日吾母必切切以先人平昔貞白之操加榮勵焉凱之無所肖似而不至大缺失者吾母伸先人之教所致也今吾母已矣不可無以垂示後嗣願卑之銘按狀賀氏兾寧之榆次人先丗俱晦迹弗耀宜人生有㳤德稍長能誦四書年二十父母擇所宜與得御史公而歸焉御史公諱質字文美與賀氏之家居同里少孤能自植立負材氣而䔍於學以莭義自期見稱諸公聞其教授于鄉學者多負笈而至宜人主中饋尊賢禮下舉中其度而不過乎每以不逮事舅姑為憾歲時佐御史公修其祀事惟謹御史公之伯父伯母俱在堂冝人奉之甚至處妯娌以和諸姑及笄而貧不能嫁則脫簮珥發筐篋以與之無所斳宗黨有困乏必厚其周給里中㛰姻失時者數家資其助尤多其考弟慈天性然也御史公用集賢大學士郭公御史中丞兾公薦召為翰林國史院編修官㑹京師大疫猶子某證危甚家人懼傳染莫敢近宜人曰死生有命詎忍坐視其斃耶乃躬治粥藥調護之訖賴以安御史尋入為椽中臺歷燕南河北山南江北兩道憲司經歷遂拜御史之命宜人之族有來謁者輒心之曰杜君以文學起家以廉介耴知王公大人勿以我故損其名夫名猶水也覆則不可收矣幸無訝焉人服其有識御史公在官歲餘終于位宜人攀號屢絶不數日髮尽白婺矛牙居去鄉井逺雖食貧而教其子不廢皆至于成人𥘉冝人歸御史公未幾因宴集淂金叉於座隅遣遍詣所親問誰所遺母黨王氏方疑其侍婢箠之幾死叉出婢乃免家童執燭誤爇紙帳諸子怒曰明當撻汝冝人亟呼來前撻而諭之使去曰奴輩愚騃不即撻竟夕恐怖必生他故其慮事之逺如此冝人方無恙時凱忽語人曰夜夢地震而室傾坤道母象也兆見於夢奈何既而冝人果遘疾凱忘食廢寢衣不解帶幾兩月疾竟不可為臨終戒諸子謹守先訓而勉諸孫以力學且令居喪勿用俗禮言畢而逝子男四人長矩用廕入仕今為某官次倫婪鳳州儒學正前卒次即凱由江東福建浙東三憲司書吏升居察院次愚汀州路寧化縣北安寨巡檢女三人皆早卒孫男七人女三人唐君之言曰丗有賢如御史公而不淂冝人之賢以嫓其德者十百也以御史公為父冝人為母而不淂如凱之賢子以趾其美者千万也豫是用考其三從而淂其可銘者而銘之銘曰內言不出孰淂而稱觀夫所從善乃可名惟時令㳤相其夫子恪共憲度正直是履教誨尓子不替其承乃纂其緒乃鴻其聲作為銘詩用垂貞則表于丘墳昭示罔極冝人陳氏墓志銘太常博士東陽胡先生之夫人陳氏同邑甘泉鄉太平里人曽祖諱某祖諱某父諱某丗業儒母徐氏夫人生三十有七年歸胡氏以先生貴封冝人年七十有六以至正六年正月四日率子瑜卜以九年十二月某日奉柩葬其鄉之履善原前葬以狀來謁銘瑜之言曰國朝之耴宋也其將相大臣擁度宗二子由婺入閩大軍追之多所殺戮群盜乘時竊發吾邑𬒳禍尤酷外祖扶老携幼避匿山谷間吾母時甫六歲飲食起居未嘗斯須去尤右外祖二女長陷於兵惟吾母在側尤所鐘愛必欲擇名士與之未及如其志而外祖外祖母相繼淪謝吾母悉出所儲奩具以治喪親黨莫不稱其孝吾父之前夫人生一女而沒未有適嗣聞吾母賢乃聘為繼室越二年而瑜生吾父以儒學起家入通朝籍在外之日多家務皆吾母綜理之吾父所以得遂其䆠逰而無後顧之憂也吾母視瑜兄璋如已出未嘗以適庶為間及吾父將以資産付瑜兄弟輒請中分之人以為難瑜幼多疾吾母撫育備至須其長而教之聞瑜知親師取友則喜見顔色吾父久留京師亟為瑜授室瑜𥘉淂一女以未有子為憂及瑜􅌟新居于邑中以奉吾母而瑜連得三子喜不自勝吾母䫉豐厚而志恬靜不妄言笑自少見外祖母勤于女工習之不怠瑜間嘗進而言曰家幸粗給饘粥有妾媵以任縫紉何自苦為吾母曰不然女工猶士之為學不可以貧冨少老為異苟不自力何以率下乎吾母幼通書晚好佛者之說置像設而事之甚謹卒之前三日適當歲旦姻戚來致賀笑語終日及屬疾呼侍婢秉燭起坐索湯啜之兒婦輩亟往候視迎醫甫及門則巳逝矣時瑜適往省吾父聞訃南奔抵家巳五閲月攀號靡及忍不即死以圖不杇惟子其念之溍與太常先生學同志居同里又備貟史館為同僚託斯文之雅故五十年猶一日其䏻恝然乎先生名助字履信别號古愚父諱某宋迪功郎今贈承事郎祕書監祕書郎先生兩為儒學教授兩入翰林國史院為編修官遂以承事郎太常博士致仕年踰七袠耳聰目眀壽考未艾子男二人璋居長而瑜為適瑜用廕入官今為某官女一人適陳槱孫男女合十三人璋三子曰應文應元應申二女瑜三子曰朋壽端壽奕壽五女序而銘之于以紓先生之懷且勉瑜兄弟使益謹其承以申罔極之報也銘曰吁嗟夫人葛覃之勤殷靁之義鳲鳩之均克謹所從冝享其報荷天之寵于光有耀播諸銘章慰其夫君亦朂其子逮其仍昆危母歐陽氏墓志銘金溪危府君之夫人歐陽氏也為廬陵名族曽大父某大父某父某皆弗仕母趙氏宋室女夫人夙聞庭闈之訓䏻自謹飭年二十有四歸危氏府君諱安素清貧夫人躬井臼米鹽靡密之事佐之持其家三十年如一日內外無間言府君寢疾夫人治粥藥達旦不寐府君既不起夫人居喪舉必中禮尽鬻其衣服以共葬祭撫育其孤子升至於成立外家丗蓄瘍醫良方夫人悉取以授之藝成俾出逰四方以廣見聞而升不忍去膝下夫人察其情乃與之俱至京師升稍出其術效驗如神隱然名動公卿間有竒疾必以禮延致之因資以具甘旨夫人居而安焉每謂升曰古語有云人而無恆不可以作巫醫聖人善之汝其守以為戒臨財慎母苟淂由是升之所赴無貧冨貴賤必尽其心重紀至元之四年八月癸酉夫人忽告升曰我將逝矣汝勿以我故亟歸尋復遍詣鄰家及親戚之在京師者言當永訣後二日乙亥沐浴更衣而化淂壽六十有六升哀毀過情遵遺命留京師至正三年御史有知升者列薦于太醫院較藝中式而以名聞𬒳旨𥙷承應太醫歲時巡幸群臣扈從未嘗不在其間八年詔復其家九年六月壬子入見于慈仁殿復𬒳旨升御診太醫祿足以豐其飬而夫人不及待矣升將奉柩還金溪卜以某年某月某日葬某鄉某原前期以狀來謁銘始豫識升於灤水之陽觀其作止雍容恂恂雅飭意其必好修之士而寓迹於醫及考狀所述乃知皆夫人之教也是冝銘夫人有子男一人即升女四人長適奎章閣侍書學士虞集次適洪某艾某傳某孫男一人充閭女一人銘曰于嗟夫人逺從其子教之誨之俾有祿仕如種既穫如炊既熟委而弗食悲纏凮木返柩故山崇崇丘墓庶承茂恩用表封樹吳母趙氏墓志銘金華吳君元圭之配夫人趙氏宋宗室女於奉悼王為九丗孫曽祖時中將作監祖若蘭知徽州婺源縣丞父嗣開未及仕而卒夫人少孤鞠於伯父年二十歸吳君吳君之家故為著姓族大以蕃即所居地望號靈嶽吳氏至元間江南甫㝎盜賊竊彂不時吳君因挈家入依城郭賴夫人佐之以勤儉家日益𥙿內外屬於慶吊之事有不能舉者多耴給焉吳君之在疾也夫人共飬營救有過人之行宗黨為之稱歎不巳吳君先夫人十有八年卒諸孤尚幼夫人躬率之治地于惠日鄉石塘以葬凡喪祭無違禮其後諸孤由夫人教咸至於成人㛰嫁之事既畢夫人自謂可以少佚其老而天不假以年泰㝎二年某月某日以疾卒得壽六十有四子男三人曰大同曰天驥曰師䕫天驥嘗為慶元路儒學録尤好學而有文女五人壻曰某孫男若干人女若干人大同等以至順三年十一月甲申奉柩葬于靈嶽先墓之次距吳墓三十里所前葬天驥以書來謁銘天驥與豫結交文字間為最久不得辭也銘曰貴胄而無驕婺矛牙居而有守是為吳氏子之賢母妥兹吉壤永芘尓後水奫木困銘也不杇外姑李氏墓志銘至治二年春二月外姑夫人李氏寢疾革溍屬以聀事走鄞江上法不得為私親去其月乙丑夫人疾竟不起外舅王公自東陽以訃至鄞溍既為位哭且使致奠巳外舅復以書來曰吾將以十有一月丙申改葬我顯祖考昭慶莭度書記府君夫人黃氏我顯考文林府君夫人張氏于縣北甘泉鄉我叔祖湖南轉運使煥章府君墓東南之唐塢而以吾婦祔焉若䏻為我銘其下棺之石猶涖執綍也嗚呼夫人諱某字某姓李氏丗為婺之東陽人宋吏部尚書大同之從曽孫女曽大父諱某大父諱其父諱某母諱某夫人幼聰慧䏻知文史非直善剪製縷結事年二十歸王氏外舅用煥章府君䕃𥙷將仕郎兩家門户方貴盛夫人自處卑約未始以侈靡驕縱有所缺虧逮德祐內附外舅既失丗祿行省版授處州路麗水縣主簿復避不就家日益落夫人身治細微絲蓄粒聚以畢㛰嫁白首宴娭無異處貴盛時臨終不廢櫛沐夷然而逝享年七十有二子男二人曰武曰復女五人壻曰黃溍李法何㳙吕潮何潤孫男二人曰坦曰塤溍不敏無䏻褒叙令㳤受命書辭聊以抒哀思云尓嗚呼銘曰猗歟夫人承貞則秉心𥘉終用無斁泰吾不豐約不嗇曰婦之吉恆其德適尓祖姑返玄宅勒銘方珉詔罔極金華黃先生文集卷之三十九
