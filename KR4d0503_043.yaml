body:
  text: 臨川危素編次番昜劉耳校正丗譜馬氏丗譜馬氏之先出西域聶思脫里貴族始來中國者和祿罙思生而英邁有識量慨然以功業自期嘗縱觀山川形勢而樂臨洮土壤之豐厚遼主道宗咸雍間奉大珠九以進道宗欲官之辭不就但請臨洮之地以畜牧許之遂家臨洮之狄道和祿罙思生帖穆爾越歌以軍功纍官馬步軍指揮使為政廉平而有威望人不敢斥其名惟稱之曰馬元帥因以為氏帖穆爾越歌生伯索麻也里束年十四而遼亡失母所在為金兵所掠遷之遼東久乃放還居靜州之天山瀝血求父母不得遂隱居不出業耕稼畜牧資纍巨万好施與結交賢士大夫金主熙宗聞其名數遣使徴之辭曰古者求忠臣必於孝子之門吾不逮事親何顔事君乎終不起伯索麻也里束生習禮吉思一名慶祥字瑞寧性純慤兒時侍親側如成人飲食必後長者既壯姿貌魁傑以志氣自負善騎射而知書凡諸國語言文字靡所不通豪傑之士多樂從之遊食客常數十人或勸之仕輒應之曰幸有以具甘旨夫𣸪何求况昆弟皆蚤丗我出孰與為飬乎父有疾粥藥必親嘗衣不解帶疾不可為而殁哀慟幾絶廬於墓側三年母亡執喪亦如之聞者皆曰篤孝君子也金主章宗時衛紹王在藩邸召見禮賔之所陳備邊理民十餘事皆軍國之要務悉奏行焉泰和中以六科中選試尚書省譯史衛紹王嗣位始通問于我太祖皇帝信使之副難其人衛紹王曰習禮吉思忠信而多智且善於辭令往必無辱及入見上愛其談辨而觀其器宇不凡稱歎久之因賜名曰也而添圖古揑漢言能士也暨再使因留不遣使人風之曰爾國危在旦夕若屬將為虜留此則可以長保冨貴答曰國之興亡係政善惡不係勢之強弱我國無亂政爾何以知之貪利則不仁避害則不義背君則不忠出使而不報則不信誠拘留不返當以死自誓反道失身雖生何益留之三旬知不可奪乃厚禮而歸之太祖思其賢遣內臣乙里只持國書徴歲幣且招之使來衛紹王欲遣之力辭貞祐末挈家從金主宣宗南遷汴上再遣乙里只諭旨曰寧無歲幣必得斯人宣宗幸和議之成強遣之涕泣而言曰臣身猶草芥不足惜也苟利於國雖死不恨但以人資敵豈謀國之道哉遂輟不行尋擢開封府判官內城之役加昭勇大將軍充應辦使不優而事集以勞遷鳳翔府兵馬都總管判官至則舉賢才修軍政興利除害境內稱治而嘉禾秀麥瓜蓮同蒂之瑞並見民既蘇息乃立學以教之四方流寓之士多歸焉元光二年秋諜報大軍將攻鳯翔行臺命清野以俟主帥素與之不協乃減其從騎行三舍而與大軍前鋒遇於澮水戰不利且戰且却將及城伏兵遮其歸路矢盡援絶人殊死戰大軍圍之數重誘之曰我國聞公賢屢召不至今亟􅑙是轉禍為福之機也不聽乃射其馬使不能行覬卒降之又不聼而下馬持短兵接戰將突圍而出圍益密遂見執令軍士彀弓持滿環向而脅之曰不降死矣又不聽彀者畢發夫集其身如蝟罵不絶口而死是歲冬十一月二十二日也麾下士不降而死者數十人事聞宣宗命詞臣王鶚草制贈輔國上將軍恆州刺史諡忠愍敕􅌾鳯翔普門寺之東立廟賜額曰褒忠事見金史宣宗本紀新史本紀雖不載而詳見於忠義傳金亡時其公族近臣之家皆羈于汴之青城太宗皇帝聞其忠義遣內臣撒吉思不花持黃旗撫問其家得其三子俾入覲於和林憲宗皇帝嘉之使備宿衛中統元年丞相線真內侍蒙速速引見丗祖皇帝於白馬甸上諭旨曰此也而添圖古揑之子乃父忠於主朕今官其子安有不盡力如其父乎三子曰三達曰天民曰月忽難一名貞字正臣三達性倜儻多謀略纍有戰功終於中書左司郎中三子天下閭滅都失刺約實謀並居天山天民山東諸路榷鹽使從伐宋以功佩金苻為太平江州等路達魯花赤二子奧刺罕楊子縣達魯花赤保祿賜魁偉沈毅語言辨給嘗為湘隂州達魯花赤單騎往説左江反者悉降遷同知南安路捴𬋩府事其文學政事有傳存焉奧刺罕子闕里奚斯昜縣達魯花赤保祿賜子丗德以國子生擢進士第今由監察御史遷中書省撿校官闕里奚斯子祖仁國子生靈壁縣主簿月忽難歷事太宗憲宗丗祖三朝終於禮部尚書有傳在國史兹故弗序月忽難十一子丗忠常平倉轉運使丗昌行尚書省左右司郎中贈吏部尚書丗敬通州達魯花赤斡沙納丗靖皆不仕丗祿中山府織染提舉失吉絳州判官丗榮瑞州路捴管丗臣大都平凖庫提領餘三人皆早卒丗昌四子潤同知漳州路總管府事贈河南行中書省參知政事莭入道於王屋山禮下沙場鹽司令贈淅東道宣慰司都事淵贈江浙行中書省左右司都事丗敬子開在京倉某官丗靖子嶽難蘭溪州達魯花赤丗祿三子失里哈河南行中書省左右司都事繼祖大都宣課提舉也里哈不仕失吉子雅古丗榮子必胡南同知興國路總𬋩府事祝饒富池茶監潤七子祖常進士苐一人卒官御史中丞仕最顯其行能勞烈後之秉史筆者當為立傳兹亦弗序祖義翰林國史院編修官祖烈汝寧府知事天祖孝祖常同年進士今為某官祖信某場某官祖謙國子進士昭功萬户府知事祖恭國子生禮四子祖中某副使祖周鄉貢進士廣西廉訪司知事祖善進士河東宣慰司經歷祖良淵三子祖元鄉貢進士市舶某提舉祖某某路儒學教授叔清開子某失里哈二子某祖憲國子進士吳縣達魯花赤也里哈子蘇刺哈棗陽縣主簿雅古四子某某某某祝饒子某祖仁子伯嘉訥祖常二子武子奎章閣學士院典籖文子祕書監著作郎祖義子獻子國子進士含山縣達魯花赤祖烈子惠子髙郵府知事祖中子帖木爾鄉貢進士祖周子明安沓爾某稅使開孫猶子鄉貢進士史官黃溍曰古之淂姓者或以國或以官或以王父字所取非一馬氏自狄道而天山則以官為氏者也昔􅎔川王安石為許氏丗譜起唐虞歷兩漢至三國而其傳緒始顯馬氏之有姓逮今僅二百餘年故豫為其丗譜可得而詳焉然豫觀許氏有唐睢陽守逺伏莭死難與恆州府君事正相類而臨川論盛德必百世祀獨上推于伯夷而歎其後世忠孝之良不得與夔皋羆虎之徒俱出而馳焉嗚呼逺之不得與夔皋羆虎並馳所遭之時異也恆州府君名聞上國數見羅致誠使知曆數之有歸而審於去􅈬翊扶興運紀功太常視夔皋羆虎尚何歉乎庸備論之以著于篇家傳太傅文安忠憲王家傳王諱柏鐡木爾其先出於西域哈兒魯氏世居海牙里髙祖諱塔不台當太祖皇帝龍興之𥘉首率其族屬從本部主阿爾思蘭可汗來覲于斡艱怯魯憐之地上撫慰之甚至命統本族軍從卓赤察合䚟兩太子掠漢地下桓昌諸州及豐勝雲內大同等城既班師而陳其勞績賞賚彌渥遂從太祖親征大敗金兵於野狐嶺取宣德等城追掩金兵直抵居庸關功最諸將𬒳旨以本族軍由河西隴右入關䧒所過布宣威德禁止殺掠衆皆恱服還師河南復𬒳旨西征至延安殁于軍曽祖諱阿逹台從憲宗伐宗攻釣魚山而殁祖諱質理華台備宿衛于太祖第二斡耳朵忽蘭皇后位下世祖皇帝建都城立宮闕以勳臣子孫俾掌門衛克稱其職有子二人長曰秃忽赤次即王之考諱曲樞幼失怙恃既長性沈靜悃愊而無華事𥙿宗未及用遂為徽仁𥙿聖皇后宮臣以謹厚稱仁宗生七日選入侍于宫中而左右擁翼之其後從仁宗侍母后之懷孟之雲中備殫其勞武宗知其忠降手書奬諭賜以宫人王氏尋佐仁宗平內難迎武宗即皇帝位尊母后為皇太后立仁宗為皇太子論功拜平章政事行大司農領詹事院事未幾除太子詹事平章軍國重事進太子太保領典醫監事仁宗嗣位拜太保録軍國重事集賢大學士大司農領大醫院崇祥院翰林國史院典瑞監提調回回漢人司天臺事階自榮祿大夫再遷開府儀同三司勳上柱國爵應國公任太保者十有八年小心慎密諰諰然以愛君憂國為心仁宗特命推恩于其三代於是王之髙祖贈崇仁迪慶功臣太保儀同三司柱國追封祁連王諡莊穆曾祖諱純誠懋德功臣太傅開府儀同三司上柱國追封祁連王諡康懿祖贈推誠保德輔國功臣太師開府儀同三司上柱國追封祁連王諡忠靖髙祖妣伯顔忽都曽祖妣伯牙真祖妣穆忽理並追封祁連王夫人仍勑集賢大學士郭松年翰林學士承旨程巨夫勒銘于碑仁宗嘗駐蹕和義門外指故大司徒阿失帖木兒之墓顧左右曰朕嘗學蒙古文字於司徒於心不忘曲樞之功朕所嘉尚其為治壽藏鄰于司徒之兆以表朕志辭不獲命即日相地發官帑為仞竁穴植華表列翁仲如式薨遂窆焉妣曰順國夫人撒法里有子二人長伯都次即王母夫人方娠夢羽衣神人授以大珠煜煜走掌中亟納于懷悸而遂悟王生有異質警敏絶人至元二十二年王甫四歲從太保事仁宗每侍宴未嘗有童心日進膳羞必先主而後巳尊卑之分肅如也比長寡言笑威重不撓為同列所敬憚仁宗春秋日冨倚為腹心大德九年從之懷孟尋之雲中負羈紲屬櫜鞬冒雨雪凌險阻衣不解帶脅不霑席自夜逹旦未嘗輒去左右太保持大體以總綱維王則奮智略以應機變兩宫恃以為安十一年仁宗在懷孟聞國恤而內難將作夜幸王寓舍密與之謀王對曰此事間不容髮正名舉義實在今日必先人有奪人之心可也遂決䇿北行質眀王從太保簡車徒環甲胄整部伍扈兩宫倍道疾驅既至京師直入禁中都人以為自天而下王父子與一二大臣佐仁宗掃除姦凶廓清宫闕武宗之入正大統王之功居多六月授王正議大夫懷孟路總管府逹魯花赤兼管諸軍奧魯管內勸農事重潛邸也尋賜以黃金為兩二百五十白金為兩五百中統鈔三萬貫留為太子府正仁宗諭之曰凡東宫騎從兵器環衛庶政汝悉統之有請有賜可否惟汝乃以上聞違有常憲王職宫禁正已以律人同僚微有所徇即面折之不少貸胥吏懾服內外凛然仁宗念其公忠聞陕西廉訪使郭公某有賢女實順宗皇帝妃郭氏之兄子幼從姑氏長于宫中克有淑德遣近侍傳旨于妃之子皇兄魏王以為王夫人至大二年王侍仁宗至五臺山還京師十月拜中奉大夫陜西等處行尚書省參知政事以陜西重鎮且東宫湯沐邑也詔諭行省凡川陜工民二總管府官屬工技牧圉等事柏鐵木爾悉總之仍賜璽書五給六乘傳凡事得以便宜施行有所奏啓則馳上之王視事未期而境內大治三年十二月召除正奉大夫太子家今凡周御帑藏委積工藝隸籍東宫其出納進退惟王是決母賜璽書如前王率職惟謹王之還自陕西也言致治之道人為先臣在陕西見老儒郭松年有文章議論任風憲有能聲今家居三十年矣其次若同寬甫賈文器侯伯正輩學問政事皆有可采謹具姓名以聞上嘉納即遣使驛召至闕拜松年為太子諭德尋升集賢大學士以寬甫為太子贊善文器伯正並國子博士後皆有名于時詹事院臣請立左右衛王諌曰兄為天子弟居東宫令中書受樞密軍民之政莫大於是今復立衛自岐而二必啓嫌隙惟熟慮之仁宗默然稱善者再事遂寢聞者歎服焉仁宗嘗命宫臣理龍舟逰太液池供張巳具王諌曰主上方勵精為治奈何以此為樂乎萬一蕩漾踈虞如社禝何仁宗嘉其言而止皇太后聞之大喜厚賚以旌其直至大四年二月仁宗即皇帝位拜王資德大夫大都留守兼少府監尋擢侍御史固辭上不允諭之曰振紀綱逹耳目惟卿是賴其勿辭王乃拜命即日以臺評劾右丞相鐵木迭兒素乏人望貪墨敗官上可其奏而皇太后不直之王扣頭陳世祖舊訓所以彰善疸惡之意卒罷之王偶盥手有執帨在側者王問汝何官曰殿中侍御史王笑曰殿中與侍御執帨可乎其人愧恧不敢復出於是紀綱大提百司悚然先是議罷僧道官王力贊之僧道來謁者皆拒不納上將以暮春之月幸香山寺王諌曰麥秀方滋千乘萬騎徒御雜遝不無蹂踐農民何望願陛下端拱穆清進大臣論治道以康四海不猶愈徼福于浮屠乎上遂不往有伶人奏樂忤旨命誅之王諌曰法者天下之平也奏樂有忤而置重典罪大於是者將何以處之乎乃命杖遣之八月拜翰林學士承旨知制誥兼修國史十一月羣臣列侍于嘉禧殿上謂王曰汝未齓事朕至今餘三十年朕躬之安皆汝之力朕事之集皆汝之謀弼朕無隱汝忠莫並汝勞莫多汝心汝績惟朕知之其以睿宗皇帝孫鎮逺王也不之女名失烈門者配汝以稱朕意王再拜辭不允又命有司賜以甲第珠冠寶帶黃金千兩白金萬兩中統鈔十萬貫尋降金虎符加大都留守兼少府監武衛親軍都指揮使有指掌環衛官及禁廷庶政凡有所敷奏者必先關白於王然後以聞王旦暮上側服食既御即以賜之眷遇雖隆王兢兢自持不矜不肆正色立朝未嘗阿諛以為容恱蒙蔽以遂其私由是出入禁闥者無敢不慎上嘗宴文德殿甚歡近侍乘醉請尚方衣帶王奏曰聖主一日萬幾宴樂宜有節今暬御之臣不能諌止復乘間僥幸錫豫不忠甚矣乞追還已賜之物以待有功上改容謝之一日上坐便殿問王曰求賢取士何法為上王對曰今以季勞用人何由得才右有科舉之法先朝嘗欲舉行而未果今宜以時述祖訓以開賢路上以為然即命中書議行之皇慶元年十一月進階榮祿大夫二年二月兼大都屯田事十二月拜陕西等處行中書省平章政事尋復留為大都留守兼職如故延祐三年五月拜中書乎章政事仍領前所兼職王首言帝王大德睦族為先親屬諸王逺戍邊境為國屏翰廩餼匪頒雖有彛典願陛下間遣使賜之對衣法酒以勞問焉上嘉歎久之即遣使分持衣酒以賜有旨令中書賜近侍以中統鈔為貫五百餘萬王奏曰有功固不可不賞然自陛下登大寶以來嘗頒賚矣况府庫之實皆出於民以有限之物供無窮之用民將奚堪惟陛下仰思祖宗創業之艱難以保民為務上從之而止王奏回回不速兒麻氏僻在西陬未霑聖化其俗兄弟自為婚姻敗常亂倫莫此為甚乞嚴禁以正人倫厚風俗制可其奏下有司著為令某年正且會朝上命盡以內外進獻之物賜王辭曰臣以微才叨居政府大懼無以稱塞兹又加以重賚何以克堪願以所賜之物悉與四怯薛畨直司門者以旌其勞上嘉其廉而衆懷其惠留守歲往還上京例張盛宴為費不訾王一切奏罷之集賢大學士大慈都以其弟入見獻水獺氊一上命賜中統鈔伍伯綻王諌曰一氊之微酬以重賜四方來貢何以繼乎上笑而却之某年時巡上京欲以𥘉秋廽鑾王諌曰世祖往還歲有㝎制矧今禾稼在野乘輿所經民將廢業願陛下法舊制以惠斯民幸甚上然之遂改以八月有旨以王長子完者篤為翰林直學士知制誥同修國史王辭曰臣父子無分寸勞沗竊非據况翰林地親職重當用名儒宿望臣男完者篤年僅弱冠臣在中書未能佐陛下任賢使能而先録用其子何以訓百官乎上曰朕業已命之矣差長當别加任使卿勿多辭完者篤雖拜命王終不敢令其視事王嘗侍立於便殿有弄臣用言戲之上微哂王正容而進曰臣身居廓廟豈嬖幸之所敢戲臣受侮非所恤第恐貽笑天下耳上亟命左右拉其人出之四年八月上諭王曰昔我太祖皇帝肇造區夏大建宗室以為蕃屏剖符裂土錫以王爵所以培養元氣敦敘彛倫也近聞其子孫嗣襲多不以序得非翰林臣僚職其事者以私亂法乎朕念之久矣今命汝掌翰林以釐正之遂拜學士承旨進階銀青榮祿大夫兼職如故王稽圖列别本支序㝎如舊制國族大服上聞之喜曰朕固知非此人不能辦也中書左丞相哈散與王同侍上於寶慈殿哈散奏乃者財用空虛並由賞賚之槖請自今一切母與王曰賞有功罰有罪國之大柄若皆不與功何以勸但辨之當審不可濫耳上然之六年八月加領章佩監事十一月加提調崇祥院事冬至日上坐文德殿太史進授時曆王執曆指至元紀年曰丗祖混一區宇開太平無疆之基在位三十餘年政治之盛真後世福次指大德紀年曰成宗𥘉政清明中遘末疾遂不復振次指至大紀元曰武宗鋭意中興惜乎天不假年次指皇慶紀元至是年曰今八年矣上曰延祐之治如何王懷曆對曰治否在後人議耳上曰卿意深矣君臣當共勉之七年正月仁宗崩王哀慟幾絶伏倚廬晝夜臨閲四十餘日未嘗少間英宗遣近侍慰之曰卿悲痛極矣縱不顧身獨不念朕乎朕之倚卿尤甚於先帝也命送歸于里第日遣問焉英宗踐祚之明日御大明殿大臣貴戚皆列侍詔王而諭之曰先帝嘗囑卿于朕曰柏鐵木爾自幼事我終始于一捐軀盡瘁無有能先之者我非斯人則食不甘味寢不安席汝其母忘吾志言猶在耳朕不忍道兹用揚于大廷俾衆知之遂以所服珍珠七寶頂帽及御衣賜之曰先帝以卿付朕卿不負先帝肯負朕耶凡朝政之得失其直言母隱王受命感泣對曰臣不朕事先帝幸無六譴今陛下上繼先志曲垂眷注臣敢不竭犬馬之力臣竊以為聖君之𥘉政左右前後宜去邪任賢使聰明四逹天下之幸也上曰然四月復除銀青榮祿大夫大都留守兼職如故王自是奮發盡言無所廽撓而羣小有不堪者矣因搆誣言浸潤日甚英宗始不之信後乃惑之待遇益踈王不為變上亦尋悔曰久不見柏鐵穆爾矣在廷忠厚老成之士未嘗有言其非者殆羣小之言蠱我耶朕不逮先帝之明逺矣復召見厚禮之命仍掌環衛王見言既不用而妬寵者尚衆遂退隱于雲山之北英宗崩晉王入踐大位泰㝎元年召王復為留守王以疾辭三年六月二十九日薨于上都西門里第年四十有五有旨賻以中統鈔二千錠給驛護送還大都以某年某月某日葬于城西宛平縣先塋之次王偉貌美髯自結髮至強仕終始于一不為利誘不為威湯不好貨殖不貪祿位公不避怨私售恩聖眷雖隆未嘗自溢知無不言言必以正𥘉明宗之西行也興聖諸臣㝎謀禁中王默言於仁宗曰兄弟揖讓古所罕見既盡美於前矣今議傳次倘先兄而後巳庶全聖德于以正前人之緒絶他日之虞惟陛下察之時雖不用其言而朝野服其鯁直暨明宗入辭王復奏留燕餞而後行道塗委積百爾所須皆為之豫備明宗問諸左右知王所為大駕南還中道詢其子孫追念不置有宗王久鎮北邉以疑以召至京師王奏皇屬至親且有功何可以無稽之言而廢之上悟尋遣還鎮又有以異姓王行樞密院事者或告其桔克軍餉上怒將置諸法王奏國𥘉其人父子數立大功今在邉陲馭軍有法逺人畏之奈何自撤藩屏上即命釋之後遣其子齎重寶為謝王斥去不與語初作西宫卒徒服役者數千人廩食不繼有一卒至宫闈丐食以闌入為衛士所執上命王訊之王奏曰卒雖可罪而實以飢故情有可矜乃貰其罪并餘卒悉放還營仍著令役者以歲更而給其衣糧宿衛閽人按籍輪直而官無廩給王為奏增冬衣日餼自是免于飢寒之舌相率繪王像而祠焉故平章政事趙公世延為中執法時嘗與劾右丞相鐵木迭兒會英宗在諒暗中復出據相位遂起大獄以事報復趙公以王力救而免王未嘗與人言及王薨趙公致莫甚哀人始知之其知國體識時務陳善閉邪為世所稱道者如此至于謀猷之大籌䇿之良左右密勿則有非衆人所得而聞矣觀夫皇慶延祐之治則君臣一體明良際會王平昔所以格君之心者可知也太保之屬疾也王治湯藥時寢興不少懈及疾不可為治喪尤謹族人欲守本俗王不可曰罔極之恩既以無報今居乎中國獨不可行先王之禮乎不然是不以禮待吾親也躬衰絰居倚廬哭桶以莭薦奠以時後居內憂亦如之遂丗守為家範則王所以盡為人子之道者可知也不亦忠孝兩全矣乎蓋王天性超邁德量恢弘故其所守所行有不待強學而自與古人暗合者宜乎光輔纍朝有世祿克著令名于當時也且我朝大統幾傾而復正者皆仁宗之力一二肇謀事之臣與王之功豈在攻城野戰建事立功者之下乎王次男蠻子以才行歷官華要綽有能聲徹聞朝著今上皇帝追念其先烈始詔中書議王父子恤典同日五制並下王之考太保應國公贈推忠翊運保寧一德功臣太師開府儀同三司上柱國追封廣陽王諡忠惠妣順國夫人追封廣陽王夫人王贈宣忠濟美協誠正德功臣太傅開府儀同三司上柱國追封文安王諡忠憲王妻魯國夫人追封文安王夫人齊國太夫人封文安王夫人太皇太后亦命翰林學士歐陽玄贊王畫像至正元年上復特敕玄制為王神道碑銘俾翰林學士承旨巙巙中書左丞許有壬書篆以賜其家於是距王之薨已十有六年矣君子是以知王父子積纍也厚有以昌其祚胤至於事久論㝎而天道之昭昭有不可掩遏者矣忠惠王之兄秃忽赤未任而卒後以子貴贈純誠保德濟美功臣太傅開府儀同三司上柱國追封安成王諡忠簡先是莊穆王從太祖攻居庸關有功遂以所統哈兒魯軍世守居庸之北口仁宗特命升其萬户府為隆鎮衛降銀章金虎符以忠惠王為都指揮使忠惠王以身居保傅力辭乃以忠簡王之子衆家為指揮而世襲其職王之兄伯都由翰林學士三遷遙授中書平章政事擢侍御史尋拜中書參知政事進右丞沒贈克勤智義佐運功臣金紫光祿大夫行中書省左丞相上柱國追封趙國公諡安肅王𥘉娶唐兀氏奴倫某逹魯花赤伯家奴之女由魯國夫人追封父安王夫人者也再娶郭氏仁宗命以為配由齊國太夫人特封父安王夫人者也守節教子人稱其賢三娶鎮逺王之女失烈門亦仁宗所命前卒子男三人長完者篤唐兀氏夫人出由翰林直學士亞中大夫遷祕書卿次道童王故所娶髙麗氏子今右藏庫提點次蠻子郭太夫人出今為資德大夫江浙等處行中書省右丞溫恭明敏好學篤行事母以孝聞居官以廉稱娶乃蠻氏奴罕卒繼髙昌氏答兒麻失里並封范陽郡夫人女三人長哈秃納適鎮逺王之子斡失帖木兒卒次金剛奴適崇福司少卿答兒麻失禮次寶適衛王寬徹班孫男四人惟王有傳在太史氏然所書皆關於國家之大事而微言細行有不勝書者且藏于祕宇閲者有禁今倣昔人家傳之法采輯行狀神道碑撰次如右庶幾百世之下有所鑒觀而思濟其美焉梅孝子傳梅孝子者名應發居吳郡閶門市中不由學問而知人之行莫大於孝行之必盡其誠蓋天性然也母有疾醫不能療則剔股肉以食之疾良已它日母又有疾危甚更求良醫投以藥皆弗效莫知所為乃露立北面稽首以名香然頂灼臂叩天乞減已年以益母壽是夕天將雨隂雲四合俄剨焉而開若啓半扉盡見北斗之六星惟一星及輔星不見頃之雲復合而天深黑及還至母所則母已擁衾坐床上言有衣白衣者六人以水來灌灑遂霍然而蘇不覺疾之去體也詰旦母平復如常時今年已八十餘身愈康強四方士大夫多為詩美其事蜀郡虞公為之序云金華黃溍曰曽子固氏有言古今豪傑士傳論人行義不列于史者往往務托竒以動俗亦或事髙而不可為繼或伸一人之善而誣天下以不及雖歸之輔教警世然考之中庸或過矣以豫所聞梅氏子事談者誠近于過夫欲使中人以下觀過知仁耻躬不逮則載而傳之曷可已哉黃節婦傳節婦蔡氏者鄞黃君天驥妻也黃君之先閩人六世祖龜年宋髙宗時為殿中侍御史論罷右僕射秦檜纍遷給事中及檜再相遂以貶去隱于鄞其後子孫多為美官至黃君乃弗仕節婦年十八歸黃君明年有子曰傳孫甫晬黃君死又明年其舅亦死節婦屏華采服艱勤以奉其姑以保其孤豫三十餘年猶一日家既𥙿而姑已老子亦能自樹立所與為師友多顯者由是知名得察舉輔儒學官節婦之名亦因以著聞有司上其事于中書用例旌表所居及其里門曰孝節云金華黃溍曰豫讀詩至柏舟未嘗不歎古女婦之賢傳於今者少也共薑之名由詩以顯得孔子而詩益傳女婦之以義自守獨共薑邪世無孔子若蔡氏者非尊官要人為之引重惡能彰彰如此閭巷之人砥行立名堙滅而不稱者可勝道哉可勝道哉金華黃先生文集卷第四十三尾金華黃先生行狀先生諱溍字晉卿姓黃氏黃為婺名族至宋太史公庭堅族望尤著太史之從父昉生景圭俱來浦江景圭生琳娶忠簡宗公澤之女弟始遷于義烏琳生中輔力學尚氣節當秦檜柄國士有議已者輒捕殺猶奮然題樂府太平樓上有磨劔欲斬佞臣頭之語人至今誦之晚以轉運使薦當得官命垂下而卒中輔生紹祖紹祖生伯信于先生為髙祖迪功郎纍贈朝散大夫妣宗氏忠簡公四世諸孫女纍封安人曽祖夢炎淳祐十年進士仕至朝散大夫行太常丞兼樞密院編修官兼權左曹郎官以朝請大夫致仕妣陳氏纍贈冝人繼方氏祖堮方出也以進納恩補承節郎入國朝弗仕今纍贈嘉議大夫禮部尚書上輕車都尉追封江夏郡侯妣徐氏淳祐七年進士奉議郎兩淮宣撫大使司幹辦公事彬之女今追封江夏郡夫人父鑄以朝請府君遺澤補將仕郎今纍贈中奉大夫江浙等處行中書省參知政事護軍追封江夏郡公妣童氏承信郎監嘉興府鮑郎鹽場伯永女今追封江夏郡夫人夫人妊先生時夢大星煜煜然墜于懷歷二十四月以至元十四年冬十月一日始生甫晬即自免乳徐夫人抱而育之比成童不妄踰户閾授之以詩書不一月皆成誦逮學為文下筆頃刻數百言常著弔諸葛武侯辭前大學內舍劉君應龜朝請府君之外孫也見而嘆曰吾鄉以文辭鳴者喻叔竒兄弟爾是子稍加工不其與之抗衡乎因留受業弱冠西逰錢塘前代遺老與巨公宿學先生咸得見之于是益聞近世文獻之澤暨還故居從仙華山隱者方君鳳遊為歌詩相唱和絶無仕進意其友葉君謹翁力挽之出大德五年舉教官七年舉憲吏就試皆中其選已而復退隱于家延祐元年貢舉之法行縣大夫又強起先生充貢鄉闈時古賦以太極命題場中作者往往不脫陳言獨先生詞致淵永綽然有古風特置前列二年上春官復在選中及奉大對惓惓以用真儒行仁義為言辭甚剴切讀卷者以其頗涉于激綴之末第奉上旨賜同進士出身主選吏以為白身補官散階當下二等上命特與對品階授將仕郎台州路寧海縣丞僅踰再期會有詔改鹽法江浙行中書承制遷兩浙都轉運鹽鐵使司石堰西場監運事聞命仍舊階居其職閲四載以功超一資升從事郎紹興路諸暨州判官至順二年用故御史中丞馬公祖常之薦入為應奉翰林文字同知制誥兼國史院編修進階儒林郎丁外憂去官服闋轉承直郎國子博士經六年之久請補外換奉政大夫江浙等處儒學提舉至正三年春先生始六十有七不俟引年亟上納祿侍親之請絶江徑歸俄有旨命預修遼金宋三史丁內憂不赴除服以中順大夫祕書少監致仕居四歲故湖廣行省平章公朵爾直班今中書左丞相太平開府公力交薦之被上旨著致仕仍舊階除翰林直學士知制誥同修國史同知經筵事進階中奉大夫九年夏四月洊上章求歸田里不俟報而行上聞之遣使者追及武林驛敦迫還京復供前職十年夏四月始得謝南還行中書為言于朝給以半俸終身公牘已具而未及上十七年秋七月今江浙左丞相金紫公達世貼睦邇方承制司黜陟之柄移書起先生咨議省事以疾力辭閏九月五日薨于繡湖之私第享年八十有一學士大夫聞之俱流涕曰黃公亡矣一代文章盡矣門弟子劉涓王褘宋濂傅藻等咸來相治兵捕鹽販者急遂沈鹽于河帥衆以拒巡兵怒乃取他私販事以實之民有在盜籍者謀為劫未行邑大姓執之以圗中賞格初無獲財之左驗事皆久不決先生為之疏剔以其獄上各論如本條免死者三十餘人部使者董君士恆行縣廉知先生有治狀事悉諉焉先生為黜其以賄敗者上百户一人縣吏二人在官無祿者四十餘人愚民以婚田鬬競往訴咸下其狀多至數十百先生録其當問者即不當問者遣之先生明習律令世以法家自專者有弗如也凡經其論定翕然畏服不敢重有辭歲大旱禱于靈湫有白龍蜿蜒見湫中巳而黑雲四興大雨如注縣以有年在石堰視亭場為尤囏居是官者常以稱盤折閲及不能檢防私鬻被譴先生規措有法無毫分入于吏議在諸暨其俗素號難治先生不加鄙棄一導以善政民多從化捕盜司屋壞撤而改作無敢後期巡海官舸例以三載一新費出于官而責足于民有餘則總其事者私焉先生適蒞是役撙莭浮蠧以餘錢還之爭歡呼而去姦民以偽鈔鈎結黨與脅攘民財官若吏聽其詐挾之以往新昌􅌘縣天台寧海東陽諸縣株連所及百餘家民受禍至慘郡府俾先生鞫治一問皆引伏獄具官吏除名同謀者各杖之百捕盜卒隂置偽鈔板于良民家乃白于官往索之惡少年持梃從者近百人先生遇于野詰從吏曰弓卒額止三十安得此曹耶可縛送于州聞者遁走有盜繫錢塘縣獄遊民賂獄吏私縱之假署文牒發兵來為向導逮捕餘二十餘家先生疑而訊焉悉得其情以正盜冝從重議持偽文書來者又非州民俱械還錢塘誣者自明奉省檄監稅杭州先生御之以寬商旅四集僅閲三月增錢十二萬緡有竒在成均視弟子如朋友未始以師道自居輕納人拜而人來受學者滋益恭業成而仕皆有聞于世時人欲增設禮殿配位四配位合東坐而西向學官或議分置于左右同列不敢爭先生獨面折之其人恚甚日坐堂上以危語相加御史惡其無禮逐去之乃克如先生言在禁林會修本朝后妃功臣傳先生為條陳義例多所建明士類服其精允進講經筵者三十有二經筵無專官曰領曰知咸宰執近臣講文之述率屬先生訂定非有關于治道之大者不敢上陳其啓沃之功為多上嘉其忠數出金織紋段賜之始先生嘗預考江浙江西上都鄉試江浙則三往而一主其文衡至是被上旨考試禮部尋又為廷試讀卷官前後所甄拔者盡知名之士先生天資介直絶不事造請逢覃官者一減資者五銓曹或失于收敘亦不自言在州縣間唯以清白為治一錢不受于民所至無圭田月俸弗給每鬻産以佐其費及升朝行挺立無所附足不妄登巨公勢家之門君子稱其清風髙節如氷壺玉鑑纎塵不汚先生性篤孝于親親殁營冢于三釜山有乳虎馴狎之異山去所廬十里月旦望必展省大暑寒不易先世遺文歲久或有殘缺極力搜訪補綴成編家居不談米鹽細務與公府短長邑長吏來謁鄉鄰有急覬得片言為援輒峻却之尤不輕于薦引或譏其絶物先生諭曰公朝爵祿將以待賢者豈為吾私親設哉先生貴而能貧雖位至法從蕭然不異布衣時又寡嗜欲甫臨強仕之年即獨榻于外給侍于左右者二蒼頭而已遇佳山水則觴詠其間終日忘去其沖曠簡逺之情使人挹之鄙吝頓消與人交任真無鈎距不事矯飾以為容恱而誠意獨懇至然剛中少容觸物或弦急霆震若未易涯涘不旋踵間煦如陽春曽不少留礙焉先生之學博極天下之書而歸于至精有問經史疑難古今因革與夫制度名物之屬旁引曲證語蟬聮不能休至于剖析異同讞決是非多先儒之所未發見諸論著一本乎六藝而以羽翼聖道為先務然其為體布置謹嚴援據精切俯仰雍容不大聲色譬之澄湖不波一碧萬頃魚鱉蛟龍潛伏而不動淵然之色自不可犯中統至元以來如先生者二三人而已故凡國家典册詔令及勳賢當得銘者必命先生為之海內之士與浮屠老子之流以文為請者日集于庭力麾之而弗去一篇之出家傳人誦雖絶域殊邦亦皆知所寶愛雅善真草書人有得其片幅者必藏弆之以為榮世之評議者謂先生為人髙介類陳履常文辭溫醇類歐陽永叔筆札峻逸類薛嗣通識與不識僉無間言嗚呼先生生當六合混一之時鍾河嶽英靈之氣積之既厚所用亦弘仁皇肇開科舉之初即以儒學自奮厯仕五朝晚乃入侍今天子掌述帝制勸講經帷嶷然獨任斯文之重天下學士咸所師法遂使有元之文章炳耀鏗鍧直與漢唐侔盛先生之功固不細矣至于出處大節尤人所難能者年未七帙而謝事暨群公力薦起之俄復控辭上方眷待之深再召還朝未幾又辭其難進易退之風真足以廉頑而立懦揆之古聖賢之道蓋無愧也若先生之所自立者豈不綽綽可傳于後哉先生之薨在法當賜諡立傳某從先生遊垂二十年知先生為最深因輯任官行事為書一通上于太常國史然巨細詳記不敢效古書法為簡嚴者欲其事之白以俟芟托也謹狀至正十七年十月一日門人金華宋濂狀
