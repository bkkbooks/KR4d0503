body:
  text: 題跋恭跋御書眀良二大字皇上在宥天下端拱無為清閒之燕時遊心于藝事雲章奎畫敻出前古帝王之上而臣下罕有獲拜賜者惟翰林學士承旨開府儀同三司扎刺爾公以開國元勳之胄世長宿衛清忠粹德蕳在帝心親御翰墨書眀良二大字以賜焉仍命公因以為字臣溍忝以非才載筆從公之後公出以示臣俾志于下方臣竊惟君尊臣卑者分之殊休戚同之其體則一是故舜之作歌臯陶之賡載皆取諸人之一身而以元首股肱為喻元首之眀君德也股肱之良臣道也合眀良之二言以為賜而因以字之于以表君臣之一體也非世家重臣與國同休戚者何以堪此乎雖然舜臯陶之賡歌所謂元首眀哉股肱良哉者臣之良由君之眀也武丁之命說所謂股肱惟人良臣惟聖者君之聖由臣之良也然則公之圗為𥙷報者冝何如哉臣不佞不敢徒以公衣被昭回之光侈為一時之榮遇而獨以大人之事君者有望于公罔俾昔賢專美于前也恭跋御書慶夀二大字今上皇帝改元至正之眀年翰林學士臣朵爾直班嘗一日侍燕閒于宣文閣上親御翰墨作慶夀兩大字以賜焉後七年臣溍以非才待罪翰林臣朵爾直班由遼陽行中書省平章政事入為中政使出以示臣溍俾謹志之臣溍欽惟皇帝陛下以天縱之多能聖學之餘事形于心畫如雲漢之昭回在上非下土愚臣所得而窺測然竊聞之皇極五福以夀為先兆民所賴一人之慶夫以勳賢貴胄為國世臣錫之眉夀以保其家冝也乃若推廣上恩均慶于下使八荒之人同躋夀域豈非所謂彰君之賜乎臣溍于名言之所不及者既不敢強贊一辭而屬望之私有不容自已者謹以志于下方恭跋賜名哈刺拔都兒御書翰林學士承旨哈刺拔都兒家藏文皇所賜御書墨本二卷親筆二卷此賜筆之一蓋先朝嘗賜以今名而上復出御筆申命之也恭跋命哈刺拔都兒充捧案官御筆天曆二年夏五月日皇帝坐奎章閣特降御筆以禮部尚書哈刺拔都兒充捧案官臣溍竊惟國朝任官作命皆出外廷具有品式捧案官蓋中朝侍從近臣且不常設非可律以定制故天子親御翰墨以命之實盛典也史臣冝謹志之以備館閣故事焉恭跋御賜永懷二字文皇以萬機之暇遊心藝事神文聖筆冠絶古今間嘗以佩刀刻蘆蔔根作永懷二字亦妙具乎八法因模為墨本以賜近臣今翰林學士承旨哈刺拔都兒時方以禮部尚書入侍燕閒與被是賜襲藏已久恐人無知者出以示臣溍俾志于下方臣竊惟永懷之義猶大雅之詩所謂永言孝思也昔周成王剪桐葉為圭徒以實其戲言而上之孝思造次不忘乎聖念度越三代之人主逺矣後之史臣冝有述焉恭跋御書奎章閣記石刻天曆二年春三月上肇開奎章閣延登儒流入侍燕閒冬十月臣鐸尓直作頌以獻至順二年春正月御製閣記成秋某月某甲子大學士泰禧宗禋使臣阿榮傳旨以刻本賜焉臣鐸爾直抃蹈而退襲藏惟謹以臣溍待罪太史屬俾紀其歲月于下方臣竊聞前侍書學士臣集為臣言皇上以萬機之暇親灑宸翰書奎章閣記刻置禁中凡墨本悉識以天曆之寶㦯加用奎章閣寶應賜者必閣學士畫旨具成案持詣榻前覆奏然後子之非文學侍從近臣為上所知遇者未嘗輕卑臣鐸爾直當上踐阼之𥘉以保寧等處萬户召對眀仁殿持詔發兵河東陕西尋以前鋒迎敵遂巡鎮拊安河南山東又被旨督諸將平雲南陛辭之日既賜之弓矢及他服用貴珍之物以重其行逮凱旋而復命也顧以辭藝進而特預是賜殊常之恩敻絶前比兹蓋時清主聖弛武而隆文示之意嚮以風厲于四方將使中林兔罝之士莫不鼓舞變化于雲漢昭回之下甚盛德也一嚬一笑豈虛乎哉臣鐸爾直以周通之才出入文武動協上意抑可謂不辱君賜矣臣是用備著之若夫天縱聖能心畫超詣有非疏賤下愚所得而窺測者不敢贊一辭也跋平雲南頌右平雲南頌亞中大夫保寧等處萬户述律公鐸爾直作𥘉文宗皇帝以南詔弗靖師久無功特命公往督諸將深入叛境殄其凶渠餘黨悉平公既凱旋入奏因作頌以進仍録其副而傳焉今上皇帝謀元帥俾坐鎮西南夷而廷臣無以易公于是距公之作頌蓋已十年朝廷清明逺人嚮化兵寢不用四方無虞久矣公下車之日冝用昔人銘燕然故事勒諸堅珉以宣皇威于遐方萬里之外然則此卷豈直可傳于學士大夫而已哉跋袁翰林鹵簿詩昔我世祖皇帝肇建太室武宗皇帝始親祼獻逮英宗皇帝乃行時享之禮而備鹵簿之儀蓋太平極盛之際也翰林直學士致仕袁公時為祕書監著作郎寫以為詩使窮鄉下士一覽觀焉如身在輦轂之下而覩熙朝之彌文何其幸歟漢應劭唐王象皆有鹵簿圗宋王欽若有鹵簿記三卷宋綬增為十卷後纍增為三十三卷公乃括以六百言曲盡其鋪張之妙亦竒矣詩曰雖無老成人尚有典刑安可忽諸書先聖先賢圗贊後右孔子并七十二弟子像上有宋髙宗贊附以尚書左僕射同中書門下平章事秦檜記不知何人書檜所謂搢紳之習或未純乎儒術顧馳騁狙詐權譎之說以徼幸于功利蓋指當時言恢復者昔齊襄公復九世之讎春秋大之則夫言恢復者未必與孔子異意也詎可一切以功利目之乎檜作此記時距其卒僅七十六日其罔上誣民之心至死而不巳也今其說猶與圗贊並存庸表而出之以俟覽者詳焉跋宋兩朝遺墨二首理宗與賈似道書右宋理宗付賈似道親筆按續通鑑長編景定三年二月丁亥朔李松夀來納欵上諭宰執曰情僞難慿又曰切須審處似道奏當與之要約如能歸漣海之地方可取信十二日戊戍都省言漣海巳遂收復而新史歸地在二十四日庚戍乃因李璮是日有建節封王之命而連書之耳璮即松壽也此親筆以𥘉十日午時下曰來意真確又曰不可失信必在已要約之後未歸地之前蓋是月之𥘉十日丙申也故事禁中處分事付外謂之內㧗又謂之御筆皆內夫人代書而所謂御寶㧗者或上㧗或內夫人㧗皆用御寶惟親筆則上親書押字不必用寶璮之去就事繫機密上不㧗示外廷而獨以親筆付似道故正史及它傳記皆無所登載庸考次其月日以備闕文度宗與賈似道書右宋度宗答賈似道手書命之曰師相而不名體貌之至矣其稱謂之過雖見譏于史氏若夫實藉鈞庇伏丐鈞照等語如士庶之施于敵已者君臣之分幾于盡廢此𥿄流落人間乃搜訪之所不及是以史氏無譏焉孰知夫禮先亡而國隨之非細故也庸表而出之以俟後之秉筆者焉跋泰山碑泰山碑字多磨滅唯二世詔粗完嶧山碑亦有此詔蓋當時欲使來者知石刻是始皇帝所為故皆刻此詔于其後也跋嶧山碑歐陽公謂嶧山無此碑觀杜子美贈李潮詩則歐陽公之前無此碑已久新齊李公嘗以模本刻于金陵郡學其石今亦弗存此是徐鼎臣模刻舊本可寶也跋館本十七帖唐貞觀元年詔亰官職事五品以上子嗜書者二十四人隸弘文館習書出禁中法書以授之尋又置榻書三人此館本之始也開元六年命整理御府古今工書鍾王等蹟得一千五百一十卷視貞觀時無所增减龍朔三年裝進館內法書至九百四十九卷然則當時館本必不止十七帖此十七帖特以世所共傳而其後有敕勒充館本故名之曰館本十七帖耳卷尾有僧權二字不完是梁之徐僧權云記石經漢石經自北齊徙鄴隋復徙長安至唐𥘉巳不啻亡其什九而拓本猶藏開元御府由開元迄今六百年石之僅存者不可知拓本之可見者若是而已未知後六年其存幾何好古博雅之士所冝珍護以謹其傳也書石曼卿館直詩後曼卿仕凡再入館康定二年二月四日以祕閣校理卒于官距作此卷時僅四浹旬耳安知非曼卿絶筆耶嗚呼曼卿之卓然不可朽固不必在是歐陽子所謂軒昻磊落突兀峥嶸者覽卷猶可槩見也書唐誥後右唐誥逸其首尾姓名以石刻完本考之則顔公真卿也始比公山濤叔孫通者公嘗為吏部尚書大曆十四年代宗崩而公為禮儀使也其後公以直不見容于楊炎換太子少師猶領禮儀使者德宗嗣位之眀年改元建中其年八月遙尊母沈氏為皇太后時也故事置使必因事乃置事巳輒罷公之為使不以一事者若韋縚之在開元以禮儀使而掌五禮也凡制敕冊命皆出于中書是時郭子儀官中書令而不預省事楊炎同中書門下平章事而官門下侍郎唯舍人于邵獨在中書起草署行者邵也新史邵本傳稱邵以諌議大夫知制誥進禮部侍郎而不言其為中書舍人者意必以舍人秩卑于諌議而略之也其用尚書吏部告身印者尚書實承而行之官尚書省者之氏名石刻猶可見也就其可知者疏之如此其殘脫而不可知者不敢以臆說參焉亦闕疑之義也跋南豐曽公諡文定覆議宋制文臣光祿大夫武臣節度使以上法當定諡者皆太常博士議之考功郎中覆之乃以上于朝而降敕紹興𥘉欲旌死莭之臣始有賜諡徑令中書舍人行詞給告太常考功咸不與焉由是應得諡者亦援以為比乾道末臣寮言其非故事而申眀之淳熙中遂詔特命諡者並經有司議定取皆出敕曽公官止四品因鄉郡之請而賜諡其議于太常覆于考功者用近制也然其發揚褒美雖書贊之詞殆不是過豈以降敕給告為輕重哉劉公自嘉熙戊戍訖淳祐壬寅凡兩兼考功又真除貟外郎不知此議作于何時今言者方建白重修宋史考其歲月上之有司以𥙷曽公刋傳之闕文可也題黃給事山居圗豫讀紹興正論小傳未嘗不三復而悲之方秦檜起勢立威小不附者輒欲置之死地而忠鯁之風不為少衰嗚呼何其盛也然皆僅足以掇禍固莫有得行其言者嗚呼又何不幸耶獨故給事中黃公居殿院時嘗疏檜姦狀檜由是去相位使當時聽言類如此正論可無作矣它日檜卒用公卒斥我瞻四方蹙蹙靡所騁嗚呼悲夫公之去也屏居海外馬秦﨩上蒼崖崛起長風怒濤中覽是圗猶可想見其孤標峻節當與之並存于天壤間也跋李西臺書涪翁稱西臺書出羣拔萃肥不剩肉如美女豐肌而神氣清秀但恨摹手失其筆意耳今獲觀此真迹而窺見其筆意寧復有涪翁之遺恨乎跋晝錦堂詩祁國杜公草書晝錦堂詩紹興間嘗歸之內府詩中適有御名故刋去之然此字本韓氏家諱而祁公用之不疑古人臨文不諱之意尚可見也跋韓令公真贊居士集此贊末句作丞相魏公按公以嘉祐八年封衛國公治平二年乃進封魏贊作于元年之八月曰魏公者蓋後人追改之幸真跡尚存可考也跋范文正公書伯夷頌范文正公為蘇才翁書伯夷頌後有秦㑹之太師賈師憲太傅兩人圗記宋南渡後此卷必流落江左而嘗入其家至李侯戡得之于燕則宋亡之眀年也范氏所居近在吳中兩人不能舉而歸之卒有待于李侯而公之子孫乃獲敬受寶藏焉豈偶然哉蓋自西方兵寢不用公歸而均逸外藩因得以暇日遊心于藝事才翁善書而深服公楷法之妙求公寫乾卦而公以字數多眼力不逮故為寫此頌卷末苐云書法亦要切磋未是處無惜賜教而巳後來一二大老乃推廣其說謂公書此實為天下萬世綱常計至哉言乎末學之士毋庸贅述也跋范文正公與尹舍人帖尹公自謂與范公義兼師友而其言談罕及于性命至尹公處死生之變尤人所難能非知道者不足以與于此蓋是時風俗醇厚士大夫多不言而躬行未至立名字以相髙此宋三百年極盛之際也伏觀范公遺帖安得不為之撫卷而三嘆乎跋唐御史臺精舍記漢史列傳具載包咸劉㳤檀敷李充所立精舍而唐御史臺精舍史缺弗録蓋彼四人者皆以講授諸生此則以奉浮屠氏故略之耳幸有此碑可存當時故事也跋溫公通鑑草溫公通鑑書晉永昌元年事視此尤為詳備此特其𥘉藁耳而作字方整未嘗為縱逸之態其敬慎無所苟如此冝其十有九年始克成書歟今之文人類以敏捷相髙貴輕揚而賤持重使溫公復生未必能與之追逐也三復之餘唯有掩卷太息而已跋尋僧圗荆公以元豐四年十月二十四日與道原過西莊遂遊寶乘有兩詩此圗止書其一于卷首者但取末後二句以寫一時之髙致云爾故于詩中之南埭北山皆不以勞意匠何暇及其平生事業乎嘉定諸大老題識真足發其深趣毋庸吹毛洗垢以合閙也後公遊寶乘二百六十年為今至正元年十月一十四日金華黃溍書跋閻立本畫宣和內府所藏閻相畫三十有二豫嘗于故祕書少監吕公家觀其房宿蓋大德中先朝所賜宣和舊物也今乃獲覩此三星東海徐公謂所見三本皆不逮此則其所畫冝非一本此卷雖無內府印章而徐公在宣和間已鍳定為真跡誠可寶矣跋李北海永康帖宣和內府所藏李公十帖此其一也今人往往喜效李書而罕得見其真跡豫幸獲見之而又不能學安得相求而適相值哉跋荆公帖廣漢張子言公書如大忙中寫新安朱子以為切中其病而又謂先君喜學公書今觀此帖風神間逸韻度清美臨學之家冝有取焉評書者未可以彼而廢此也跋徐州鹿鳴燕詩序此序視東坡先生集所載少六字不同者十三字按先生以嘉祐元年舉進士此卷云嘉祐之𥘉而集中作嘉祐之末幸真蹟尚存可正傳刻之誤也記水樂亭詩東陽婺大縣為長吏者恆憚其不易治若唐于君興宗宋王君槩鮑君極率以暇日寓情山水間苟非能使政平訟理而田里安于無事雖窮觀遊之美誰與樂此然則地固未必難治獨患夫吏之知以簡易為治者少也王君為縣在熙寧時嘗從賔寮登西峴山作亭泉上名水樂眉山二蘇公咸為賦詩亭既廢好事者或以其詩刻置杭之南山水樂洞猶存其舊題曰東陽云天曆二年秋某月今縣尹趙侯某始即其故處作新亭且買石復刻詩亭中侯之為治不煩而餘力之所及亦可見矣視前人何歉乎輒為志其歲月于下方庶後之從政者有取焉爾跋東坡書秦少遊龍井題名元豐元年東坡先生謫黃州少遊以二年秋至龍井三年秋先生乃為書此題名而記其後言與兒子邁棹小舟至赤壁西望武昌山谷喬木蒼然雲濤際天而先生作赤壁賦則五年之秋冬也溍兒時即能誦少遊題名不意垂老獲見先生真蹟因考其歲月而謹志之跋東坡贈巢三詩右蘇文忠公墨跡上有秦熺私印蓋其家藏舊物也章蔡秦氏父子人品無大相逺㦯與公同時而不相容或異世而相慕愛之如此談者類以為公論須久而後定豈不然哉跋蘇公父子墨跡右文安黃門二帖所言皆私家細事至煩碎而靡密無足深論學士大夫相與存而傳之者豈不以其人哉夫不能以古人自任千載自期而欲恃區區之文墨以為不朽者可以慨然于此矣跋山谷贈元大師詩元符二年公在戎州有寄題祖元大師此君軒詩眀年公自戎州放還以十二月抵江安又眀年是為建中靖國元年公以正月發江安元師自榮州來送之故有是作其詩今載别集中而蜀刻小本以為祖無大師蓋傳録者以元為無故又訛而為無幸真迹尚在可證其誤也跋東坡先生帖先生有答李之儀端叔書是未相識時此帖則相見之後也跋李贊華獵騎圗贊華契丹國主之子東丹王突欲也後唐眀宗時越海歸中國以為懷化軍節度使瑞慎等州觀察使𥘉因其舊封姓之曰東丹尋又賜以國姓而名以贊華宋宣和內府藏其畫凡十有五畫譜稱其多寫貴人酋長䄂戈挾彈牽黃臂蒼服縵胡之纓不作中國衣冠亦安于所習者然馬尚豐肥筆乏壯氣今以其言驗之此圗為贊華作無疑也跋禇河南書兒寬傳贊子固以此贊與三龕孟法師碑用筆不同定為河南晚年書碑有歲月誠可信不疑然石刻視真迹自不無少異蓋其轉摺精神處有非摹勒之巧所能盡也跋綦毋潜詩唐綦毋譛詩見于殷璠所編河嶽英靈集者六篇而璠獨稱其題鶴林松覆山殿冷不可多得題靈隱塔影掛清漢鍾聲和白雲歷代未有龍興在吳中與兩山相望此詩必一時之作豈璠偶遺之耶抑其去取㦯自有意也因觀間上人所刻墨本輒識其末以俟覽者詳焉跋蘭亭五字損本宋景定咸淳間賈氏枋國定武舊刻流落人間者鮮不以資其清玩嘗俾其客廖寺丞𠫭較諸本異同擇其字之尤精善者輯成一帖命婺之良工王用和刻之經年乃就尋補用和勇爵以酬其勞其石後歸亰師今在故執政吳公家此本有恱生印必嘗備選擇者可寶也跋米元章書蘭亭序臨稧帖者得其貌似優孟之效孫叔敖也得其意似魯男子之學栁下惠也世所傳三米蘭亭乃是以右軍書模勒上石此則元章臨右軍書貌不必同意無少異可寶也書肯齊李公遺墨後賈傅以喪師去國朝士中與之不合者或從而追數其罪以為可殺及得一郡而去則賣降恐後君子耻之李公本以忤賈一斥十年其復官進職起帥長沙賈巳在謫籍雖力詆之孰曰不然而公此帖顧謂入謝表啓只須引咎不可怨尤至其盡瘁事國視死如歸英風偉烈乃如此孔子曰君子欲訥于言而敏于行又曰有言者不必有德豈非然哉題唐臨蘭亭舊見馮承素米禮部及趙魏公所臨稧帖未嘗為苟同今觀此本筆勢翩翩風神秀發又絶異欲取而參較之不能不以四者之難并為恨也跋衛公夜㘴圗伯玉夜乘車過闕而止其敬慎如此所謂欲寡其過豈專對之飾辭哉夫人即南子也女婦而有知人之眀固未易及非但知伯玉又知孔子而願見焉孔子亦不拒而往見之抑可謂難能也巳司馬遷以子路之不說遂謂孔子因夫人而去且附以未見好德之言其果然耶按論語所記孔子非因夫人而去未見好德自别為一章不知何所為而發遷之說恐猶有當考者因觀衛公夜坐圗輒試評之翰墨之妙未暇論也題鵪鶉圗畫有御府印章蓋與龜書馬圗嘗為一時之物矣之二蟲何知其蒙𬒳光耀乃爾哉將有如昌黎公感白烏鸜鵒而為之賦者粉墨之工無以議為也題脫鞾返棹二圗嗚呼古之所以取亡者非一而漢唐之亡獨與䆠者之禍為終始豈不悲哉當理宗時宋祚微矣盧董之憸謀狡智非不能為甫節士良也衣冠之禍所以未至如建寧太和之烈者夫亦一時之清言徑論有以殺其勢而遏其衝乎故資政殿學士牟公之守姑孰也嘗畫脫鞾返棹二圗而為之贊宋臣怒其譏已風臺臣論罷公公去未幾而宋臣輒斥它日公既召還宋臣亦輒進然竟以公疏卒不復用君子小人勝敗之機實繫于此是雖若無救于趙氏之亡其不遂亡于二三竪之手者天歟人歟覽是圗者未可苐以為一時之清玩也二圗作于寶祐丙辰後六十年為今延祐丙辰公之孫溧水教授君更購善工縮圗為小卷以便觀者且俾其門生黃溍識焉實是歲之九月九日也跋象山祠堂記象山在貴溪縣之西境雲山章公所為祠堂記稱臨川彭世昌始開山結廬延致陸先生講道其間然世昌極貧里人張南仲侍郎實助其役先生以山形如象故名之曰象山學者亦因用為先生之號先生殁遂即其地為祠堂云今象山書院僑置于貴溪之徐巖蓋蒙齊袁公持節江東時所作也此記石刻久不存非侍郎家傳藏其文人固莫知山之所以名且將指徐巖為象山矣先生之學與考亭朱子同出于孔氏後之人往往各尊其所聞交攘互斥若不能相容者何哉侍郎諸孫元杰今方列于仙班而侍祠于眀庭其為教不與孔氏合顧能不以彼我為間出此記而表章之度越于吾輩逺矣觀者可無自警乎跋米南宫帖元章負其才氣傲睨一世而推服道祖如此道祖之為人可知也世徒以其善書並稱之曰米薛而此帖無一語及之則其可推服者非直翰墨之工而已跋晦庵先生帖右朱文公先生與侍郎馬公十一帖先生以淳熙八年冬為浙東常平使者九年秋纍疏劾知台州唐公仲友而唐公亦自訴于朝丞相王魯公與唐公居同里且有連頗隂右之亟卑以江西憲節而去先生抗章不已乃罷唐公新任而以先生填其闕先生以為蹊田奪牛三尺童子知其不可力辭不赴改江東又不赴乞祠而歸十四年秋復命先生代馬公持江西憲節未赴而魯公以十五年夏五月去相位六月先生入對除兵部郎官以林侍郎栗論奏有旨仍赴江西竟辭避不赴帖中雖謂馬公為交代而實未嘗交承也先生既用磨勘轉官除職豫祠尋召入主管西太一宫兼崇政殿說書未及上俄俾以祕閣修撰奉外祠前兩帖結銜稱朝奉郎主管嵩山崇福宫者方辭論撰而未允也逮得旨依所乞仍舊職且降詔褒諭次兩帖乃以直寶文閣入銜帖中云所請亦幸開允更𬒳褒詔是也又其次兩帖止稱階官貼職者時已有旨起先生將漕江東即帖中云不知除授所由者先生方控辭故祠官使職悉不以繫銜也婺相蓋指魯公所謂邪說姦心隂自慿結廟社之靈實紏殛之者言若有激恐未必專以前事為憾也此六帖皆在十六年夏秋之間最後兩帖一稱權發遣漳州事在紹熙元年春一稱祕閣修撰主管鴻慶宫在其二年秋餘三帖則問眷請委之副楮也先生文集所載尺櫝分出處問答兩門凡四十卷而此諸帖皆不見集中謹備著其歲月以俟采録而𥙷其闕逸云爾跋米元暉帖翟耆年伯夀好古博雅君子也元暉因伯夀識桂勛而傳其術則勛之為術精矣不知今亦有傳其術者乎跋朱張二先生帖慶元學禁方厲為士者至更名它師其問遺尺牘之偶存者未必非毀棄之餘也乃今遂如壁書冡簡復啓其祕是孰使之然耶俗好之向背固足占氣運之盛衰士君子政不當隨世為歆艷蕳薄也林生出示所藏朱張二先生墨迹因書以諗焉跋晦庵先生帖國朝善書者稱秋澗王公考亭朱子之書曰道義精華之氣渾渾灝灝自理窟中流出又曰道義之氣葱葱鬱欎散于文字間其評書如此則其善書豈直點畫之工而已蓋自許魏公推眀朱學而立其說于學官且用以取士朔南聲教所暨咸知尊信之罔有異辭至其翰墨之妙類以為儒者細事置而弗論秋澗公可謂目擊道存者矣道傳赴玉堂之召携考亭手帖北上玉堂諸老善書如秋澗公者為不少幸求其試評之跋六君子小像六君子從祀先聖廟庭已久至順二年始𬒳旨追卑二程先生以公爵詞頭之下溍所預聞也先是周子巳封道國而司馬氏在異時身居相位爵為國公無以復加獨張邵二子猶襲故封伏觀六君子小像庸志之如右庶有能舉揚以上聞者跋王江州誥右王江州誥詞中書舍人樓鑰行宋三百年吾烏傷苐進士者實始于王氏皇佑癸巳則恩陽令固紹聖甲戌則知福州贈正議大夫永年福州之孫寅乃弗取世科而用䕃入官歷守七郡其以朝請大夫知江州則慶元元年正月也凡州郡守臣差則出敕除則給誥而誥必有褒詞故尤以為榮江州之七世從孫禕從豫遊亰師子因閲官書于史局得此誥詞録而歸之以備其家乘之闕文跋曽大父除武學諭誥宋理宗開慶元年七月故敷文閣學士朱公由史館校勘授武學博士我曽大父户部府君由通判慶元軍府事授武學諭實與公並命後九十年是為今至正九年乃獲觀公曽孫業所述公年譜誤以武學為太學謹録當時所𬒳誥詞歸之以𥙷其闕而訂其訛跋宋諸公遺墨淳化閣帖張華桓溫王導王敦四丞相並居晉人之首而揔題曰名臣法帖蓋特取其翰墨之工而于人品之邪正有不暇計也此帖自范歐陽司馬氏下至章蔡凡十人皆宋宰執人品不同而同為一卷者豈亦閣帖舊法乎卷中一帖不書名而標其旁曰宋宣公恐是宋宣獻耳跋林和靖詩豫嘗見先生手書詩一多集中所不載此三詩則皆有之而亦不盡同竊意集中是後來所改定也跋清涼國師所書栖霞碑唐攝山棲霞寺律大師碑華嚴疏主清涼國師所書也國師越之會稽人飛來山寶林寺實其得度故處今住山同公舊讀裴相國所撰妙覺塔銘而知國師得二王之筆法又聞趙魏公稱國師字畫之妙而知相國之言為可徴每歎其書罕傳于世今年春出遊吳中始從報恩萬歲寺住上人得此墨本歸而刻諸石屬豫志于下方謹按國師以大曆三年受詔入內譯經為潤文大德是年三月二日律師示寂而碑之建在眀年三月十二日今去之已五百八十年覩其遺刻法度森嚴神采奮發而國師之德容猶可藉是想見也國師世夀百有二書此時甫三十有一或者妄計其晚歲安住毗盧華藏必不復作如是遊戲事豫竊不敢謂然法身大士應化人間于一毫端現諸萬象卷舒無礙寂用常如塵心交入無非法界覽者母徒弊弊焉索之于形迹之間庶幾目擊而道存者也跋白蓮社圗逺公結社以修淨業邀靖莭入社而不赴康樂欲入社而逺公難之陸修靜雖與逺公善而慕為神仙𥘉非同社世所稱十八賢自十二僧之外劉雷周宗二張六人而已史傳及它書所載可考也諸公跋語因此卷并畫靖莭康樂修靜而誤以為二十一人耳跋蘇黃二公帖蘇帖稱元鈞殿院者吕陶元鈞也陶起追士纍遷司門郎中哲宗即位拜殿中侍御史朱光庭時為左司諌奏翰林學士蘇軾撰館職䇿題譏議先烈乞正其罪陶亦奏軾素疾程頥光庭為頥報怨此洛蜀二黨所由分也蓋蘇與吕俱眉州人云黃帖不著稱謂莫知以灾去職者為誰當别考也跋靜修先生遺墨溍弱冠時嘗手鈔靜修先生丁亥集悉能成誦後五十餘年始從汝南張君獲覩先生遺墨蓋君之先大夫受業先生之門故先生書此以授之其言小學書不取鄧伯道朱夀昌事善發明朱子言外之意溍既得以快覩前修之真蹟又有以竊窺先儒之微旨抑何幸歟跋金縢圗尚書正義分金縢一篇為四節吳郡顔直之用龍眼遺法書其本文而畫其所書以為此圗其所書蓋苐二節之冊祝苐三節之卜吉祝與卜同在一時萹終所記乃後來事故略而弗及也經文可見者植璧秉圭唘籥納冊而已此圗于鼎爼樽爵豆籩筐篚之屬靡所不備亦畫家以意為之而曲盡其形容耳跋韓魏公帖右韓魏公與歐陽文忠公帖淳熙丞相王公家藏三十𥿄之一也文忠得蔡復留在致仕前十有六年魏公方勉之以冝盤桓跋語云多見二公請退之舉又云其言諄諄以必退為請蓋不專指此一帖而言也跋山谷帖求人作文字而煎迫之至使倉猝失其事實亦待去不暇顧蓋自昔己然矣吾儕去古人不啻相千萬而動遭煎迫欲無失得乎偶閲此帖為之三歎跋誠齊墨蹟右誠齊楊公與某僉判書凡七紙蓋弔其父喪且答其求墓銘也所謂扼其喉把其䄂而牛羊迫促之者此今人求文于吾儕之常態公曽不免此耶撫卷為之永慨跋崇國公墓志銘宋宗室崇國公墓志銘翰林學士鄭居中撰知淮陽軍米芾書今題曰元章真蹟者世知寶愛其書而已夫以公胄系之貴爵秩之尊子孫又衆多且光顯若是而今無稱焉獨賴此書為好事者所存傳而不廢故其官伐世序猶可考見嗚呼士君子所恃以不朽者書云乎哉跋放翁詩草豫往來山隂道中此詩所謂橫林野水紅草緑荷皆故無恙而翁之家衰落久矣叩其人亦無能道先世事者偶閲此卷大息而已題墨蘭月溪畫蘭傳者絶少政如深林孤芳人不可即廽睨夫託根于階庭玉樹間者殆與薺麥俱茂矣跋趙魏公書歐陽氏八法近世錢唐金氏一之以善為歐書得名暨趙魏公出學者爭慕效焉歐學遂廢而不知公之教子實用其八法賴此帖故存本末源流尚可考也雖然梓匠輪輿能與人以規矩不能使人巧父子不傳之妙必有出于此帖之外者矣臨學之家冝深造而自得焉跋金字心經右金字心經一卷趙魏公作按唐孫氏書譜論書之乖合各有五𥿄墨相發為一合𥿄墨不稱為一乖蓋墨之調適固難用泥金視行墨為尤難此卷神融筆暢殊無澀滯之態非公無以及此可寶也跋翠巗畫先生盛年客于信國趙公頗欲以竒偉非常之功自見遭值聖時海宇為一老無所用浮湛俗間其胸中之磊落軒昻峥嶸突兀者時時發見于筆墨之所及後生小子乃一切律以尋常書畫之品式冝其傳于世者少也溍以大德戊戍春見先生于錢唐今已五十年因觀先生所為孟浩然諸意圗聊識其後云跋錢翼之千文吳興趙公早年學書用工至精密逮其得于心而應于手縱橫曲折無不如意之所欲出以公之學名其家者務于速成往往摹倣公暮年所書而求其形似如不由其户而欲升其堂入其室也得公之用功精密又參以古人而别出新意自為一家如吾翼之者殊不多見此卷千文四體皆其得意書尤不易得今翼之巳不可作而有子能傳其業亦以子言為然否乎題雲山圗豫不解畫凡古今名筆皆莫識其所以為工近留南屏積雨彌月遙望群峰隱見于煙雲杳靄間倐忽之頃變幻百出宛然它日畫中所見乃知良工之意匠真有能窺造化之妙者昔人誦杜子美夜深殿突兀以為親涉其境始悟為佳句豈虛言哉天錫作此卷時蓋與豫俱寓南屏亦因其可見者移入縑素耳跋張監丞代祀虞帝廟詩有虞氏距今三十餘年廟而祀之蓋非一日張侯將上旨以香幣走祠下遽能致其昭受而顯答此皆聖神在御德協古先故其感孚有同符契張侯固若無所容其力矣雖然君猶天也其德有不可名言者是以昔之詩人歌祭祀之盛唯美夫駿奔顯相而巳張侯駿奔顯相之功不既多乎播之頌聲亦清廟詩人之意也覽者盍以是觀焉跋景傳新店彎詩新店彎在諸暨東北三十里景傳十八年間凡三題詩頃豫忝佐是州以故事謁郡府道過其處覽最後所題歲月蓋豫以督運吏居鄞時景傳携其子克讓來為豫壻嘗寓宿于此也追計之已六年而㬌傳與豫永訣者亦四年因次其韻以志存殁之感今相距又五年矣偶閲舊槀不勝愴然輒録為二通一以授克讓藏于家一以授新店主人俾附後題之末跋景傳遺墨嗚呼此景傳絶筆也豫尚忍言之哉景傳長豫十五歲與豫為忘年交而其子克讓豫壻也景傳始屬疾隂陽家爭來言所穿新井不利景傳曰死生有命井非所獲罪也皆謝遣之時克讓方從豫鄞江上于是有待汝不歸我行有程之語克讓既歸則又有忍死待兒而兒歸之語嗚呼豫尚忍言之哉景傳之先有為邵州新化縣主簿者仕稍不顯主簿君之父䔍厚長者宗忠蕳公父事之其殁也公實銘其墓逮景傳之考君希聲先生遂以文學為後進師而景傳負其不羈之才浮遊物表人見其寓談笑于文字間類若依隱玩世至于死生之際處之𥙿如合乎聖賢之學而出乎性命之正者人固未或能知之也其季景宗朝出耕夜歸讀古人書薄巳而厚物近乎昔之卓行君子者豫尤畏慕焉景傳謂克讓汝非季父不立汝非外舅不成嗚呼景宗視克讓蓋猶子也而景傳望豫之厚如此豫亦安能有以慰景傳于地下而尚忍言之哉景傳之死豫既無隻字以為之銘又無片辭以為之誄姑輯其遺言録而藏諸以示無忘或者克讓因是尚有警也跋進學工程易曰君子進德修業欲及時也記誦辭章云乎哉記誦辭章末矣後生小子猶有廢而弗事者程君敬叔排年工程之書所為作也敬叔以文學行誼髙一時其傳蓋本于考亭門人㬊氏進修之功不必盡出是書夫亦度中人以下所可企及姑為是以誘掖之云爾古者大學之道比年入學中年考校一年視離經辨志三年視敬業樂群五年視博習親師七年視論學取友謂之小成九年知類通逹強立而不反謂之大成即其排年之工程也學者苟能因今人之所可及而求古人之所必至敬叔將于是書之外有私淑艾焉行逺自邇登髙自卑在乎勉之而巳金華黃先生文集卷苐二十一
