body:
  text: 贈黃資深臨川危素編次番昜劉耳校正涼風蕭蕭吹敝裘三年小作周南留相逢傾蓋盡青眼肯抱遺經空白頭捧檄定知毛義喜著書非有虞卿愁春秋決事待公等莫戀寒氊成久逰題張武定公死事詩卷後古稱馬革褁尸還秪有空言世共傳一死如公良偉甚百年遺廟獨巍然要從身後觀餘烈試聽軍前奏凱還文武衣冠方迭起後先奕葉更綿綿題王君冕同年芳潤亭花縣歸來晝寂寥終南山翠湧亭臯林深未覺蘭蓀變天逺何妨雨露髙此去溉根須食實誰分賸馥與殘膏行看小試揮毫手香霧霏霏滴鳯毛題丁文苑同年哀詞後自别瓊林雨露邊江湖目斷繡衣前禹門尚想龍𥘉化遼海驚聞鶴已仙烈日秋霜空耿耿重山宿草正芊芊不才後死知何用坐對諸郎獨泫然送尉彥誠道州經歷一别垂垂四十年朔風吹鬢雨蒼然寒氊久坐歸何日上幕𥘉登望若仙莫使催科書下考盛談名理繼前賢春生馬首逢廽鴈併寫相思入近篇送畢縣尹歸途環佩曉珊珊白日青天映羽翰疑是省親辭太學驚聞出宰用郎官花迎墨綬春光暮風引仙舟海色寒想見捧觴仍戲綵鄉人爭作錦衣看送陳季和髙齋燈火正蕭條忽遡天風上沈寥共喜彈冠如貢禹豈期投筆學班超時清桴鼓元無用歲晚弓旌倘見招雪後江南春水活重來莫厭驛程遙送陳君歸江西咫尺清光近玉除姓名何不逹公車也知賈傅今無䇿猶幸虞卿舊有書江上歸帆隨去鴈年來旅食厭騎驢諸公正索山人價能勿相招學隱居送張良卿學士之淮南坐厭流塵拂面紅行携涼月下青空三千里外楊州鶴四十年前御史驄先廟鐡衣猶卧壁兒郎玉帳已生風貞元朝士今無幾歸及花時一笑同次韻蘇侍郎平村晚歸中臺多暇獨儀曺退食歸來路不遙扶老未須蒼玉杖行春聊過赤闌橋揮毫風雨傾三峽聽履星辰接九霄愧我白頭方倚席敢將巴曲和仙韶夀吳宗師非煙瑞氣鬱嵯峨帝遣仙官下大羅坐看層雲三界小行周花甲十年多詞臣灑翰題真贊詔使傳觴薦雅歌少駐壷中間日月長安銅狄要摩挲嗣天師禱雪有應諸公咸為作詩邀豫同賦萬人舉首望蓬萊詔使函香出上台祕殿緑章方夜奏層城銀闕巳天開新晴更覺西山好和氣應先北斗回下土儒臣驚偉觀仍聞鳯沼有詩來送王法師祠武當山二月春光畫不如緑楊隂裏度雲車獨持使節辭金闕逺上天壇禮玉虛候吏傳呼開洞府羽人點指望霞𥚑仙家近在蓬萊境歸及皇輿北狩𥘉送尚子正理問上相臨分控列州理官髙選用儒流風生使節聲華舊地近台垣寵數優南土政平多睱日西山氣爽入新秋公餘若過滕王閣煩為題詩在上頭送蘇伯修憲使久參法從侍凝旒忽擁幨軺按列州太史山川皆熟路淮南草木自生秋遙瞻龍節辭中禁尚想鼇峰接雋遊樗散鄭虔無所用幸搜巖穴副旁求送王止善檢校官無失政吏無私鉤校寧煩事細微遙想名曺多暇日不妨髙詠發清暉潮生江上仙舟逈春到湖邉驛使稀送盡北來南去客石田茅屋幾時歸送髙唐李知州來登延閣預時髦出守名州領教條巳羡漢儒知吏事要觀齊俗變風謡雙旌前路方迢遞八座家聲未寂寥此去行須歸報政鳴珂幾日造昕朝送傳汝礪廣州教授耻學山人赴辟書勇隨使者駕軺車橫經久合居髙座上冡應須過舊廬黑夜文星南斗外青冥鵬路北風𥘉來期莫落梅花後待詔先生席正虛送劉遂𥘉修撰近聞退直自承明忽報揚鑣出鳯城未老巳嫌金帶重暫歸不著繡衣行故人尚作瀛洲客歲晚無忘魏闕情臨别贈言聊復爾誰能持酒勸公榮送于指揮歸密州故山東望路何長逺奉靈輀返夀藏豫告公朝存舊典疏封泉壤發幽光總戎行復開油幕儤直仍須赴玉堂它日過家如上冡歲寒松柏正蒼蒼題春暉堂一别慈顔隔歲時故山遙望白雲飛近聞巳拔仙山宅不用更逢遊子衣九轉還丹堪却老千年華表未容歸寸心猶恐恩難報擬託斯文重發揮書巢張君挽章歲晚巢君寄一枝上林無樹可相依不隨葉縣飛鳬去竟作遼東化鶴歸架上牙籖書在否門前珠履客來稀春江如箭船如馬忍見丹旌揚落暉府判謝公挽章換得朝衣不稱身勇辭新爵號遺民錬成偃月爐中藥閲遍銅駝陌上人魯國靈光俄委地謝家玉樹正傷春匆聞舊唱貞元曲衰涕能無灑石麟豫與江隂何鼎叔鉉别三十六年乃相見于錢唐感舊述情謾成四韻月寒霜樹久相依春去風花各自飛逺信巳隨潮水斷故交渾若曉星稀綈𫀆可戀知誰在青鏡頻看歎昨非正欲從君共傾倒莫言興盡便須歸庚戌正月二十一日豫與儒公禪師謁松瀑真人于龍翔上方翰林鄧先生適至豫為賦詩四韻諸老皆屬和焉後三十一年歲􅉝巳正月二十三日過伯雨尊師之貞居無外式公劉君衍卿不期而集輒追用前韻以紀一時之髙會云廬山舊事誰能繼三十年前此會同偶爾共來今日雨蕭然猶有古人風坐深遙對花如霧興盡徐歸月滿空仰止前修那可作聊追餘響託無窮送式公歸髙麗一錫凌空海上飛星河蕩漾宿雲波頗驚遼鶴歸來晚正值驪龍睡覺時百尺珊瑚無地種六花薝蔔任風吹髙秋蘭若煙波外此樂應須久自知送史景福十年相望各天涯上幕新開鬢未華日出公庭來鴈鶩風生老筆動龍蛇蜀鄉路逺春多雨江國雲深樹有花若見君家彭澤令為言且莫問桑麻次韻答薛玄卿真人都門一别向天台二十餘年獨此來衰朽尚慙沾祿食凡庸安得借仙才幸逢休運臨奎璧宜有英髦出草萊容我脫身巖壑裏籠鵝時復泛舟回送夢堂噩公住開夀寺天低海闊路微范此去頭頭是故鄉但覺英遊空兾北肯隨世好薄淮陽至人無夢心華現夀域重開化日長藏叟有知應笑道吾孫也識老馮唐送繼公住東掖山西陵江上渡船廽東掖山中聘使催飛錫凌風天路永寶華如雨法筵開髙談應有龍能聽佳句須令鴈帶來老矣江淹才欲盡暮雲凝碧思悠哉贈龍山詗上人舜江東下艤官船幾聽潮聲往復還老去未知重到日夢中誰識舊逰山秋風飛錫來天外滄海遺珠出世間為問而翁強健否龍門髙絶許誰攀題莫氏山莊圗旋移小隱近南峯逺有咸平處士風山態近人猶偃蹇湖光無雨亦空濛行春杖屨時時到臨水軒窗面面通别作小亭供戲劇青簾搖曳杏花中丁亥六月十三日上亰翰林開院喜雨院長開府公俾為詩以志之雨浥鼇峯長緑苔佳辰良會玉堂開涼生薰殿宸居近恩豫官壷詔使來盡醉不愁騎馬滑新詩可待片雲催作霖政尓須公等行見文星入上台安南遣使入朝用故事奉贄納謁于翰林其歸也次介黎括以贈言為請賦詩四韻以遺之上聖敷文格逺人外藩修職用儒臣並馳使介踰丹徼特設朝班覲𬗋宸炎海計程歸塔永都亭宴餞寵光新祗承德意勤宣布鼓舞鳶魚詠至仁送徐志尹赴安鄉縣尹自為從史直鑾坡幾見鄉山爛斧柯能事正宜參筆削借才聊復試絃歌屈原故國蘭都長陶令公田秫最多應笑衰翁苦留滯汗青無日欲如何送陳元逹代祠輔怛落迦山天下名山小白花鯨波帖帖度仙槎函香祕宇祈靈貺出節宸廷振使華殿榜舊誇韋誕筆錦衣重過買臣家相門喬木殊無恙萬古清風碧海涯逰夀山五峯寺鑿開混沌自何年廣石垂空一髮懸飛瀑散為花雨落老僧長抱白雲眠舊逰不改桃源路化境寧同𣏌國天回視人問成壞相無邊劫海正茫然送李師曽蔣仲善赴春官憶隨飛鶚上秋天夢斷慈恩四十年及此鬢毛俱秃盡見君頭角共嶄然計偕巳趣軺車動臚句行聽衛士傳𬗋陌紅塵衣易化看花得意莫留連送徐教諭苔生茅屋鄭公歸杜宇從今不用啼小雨輕風寒食後殘山剩水浙江西夜闌深巷猶燈火春暮髙城自鼓鼙好向清時窮勝事花前莫惜醉如泥次韻答胡古愚博士麻衣草座老仙翁曽及清時侈際逢行殿曉趨開豹尾禁林秋宴出駝峯休官尚想英遊並愛客何嫌異味重况乃東陽山水窟主張風月有詩宗豫與子長以庚戍之春癸酉之夏兩至赤松今年秋復來則子長巳倦遊而豫亦老矣同遊者汪生元眀許生存仁既又得龍丘余子方與俱行由小桃源登煉丹山謁二皇君祠回宿寶積觀感歲時之代謝念交朋之離合輒成短句奉蕳子長來往仙家數十秋未能長共赤松逰暮年幸巳成𥘉志吾土何妨為少留歷覽舊山如夢境喜逢新士總名流桃源近在人間世誰解相從老一丘丙戌中秋宿徐道濟書房即事兼懷永之郎中天開屏嶂列竒峯水滿方塘碧鑑空十里平原無曠土百年喬木有清風髙齋偶爾成三宿美酒欣然為一中坐對良辰并樂事興懷存殁思何窮題畫卷渡口歸舟取次橫歸人相逐望柴荆藏村古木株株暗背雨間雲片片輕巨石孤撑如欲墮遙峯寸碧不知名披圗省識曾逰處日暮山隂道士行送髙生歸淮南山林早巳遂吾𥘉湖海交逰日漸踈枉過謾勞千里駕清言難敵十年書要知俗學元無用且復歸求自有餘投我木桃何以報邉韶腹笥久空虛送馬縣尉炯炯半標玉樹枝神仙隱吏最堪為况逢繡水重清日正是金沙欲現時宿雨漲溪飛去棹微風拂地颭歸旗雲霄直上無多步摻别空慙兩鬢絲送覺上人逰金華山憶同夜上妙髙臺坐聽泉聲響怒雷久别煙霞如夢寐舊題巖石長莓苔挂冠方厭人間事飛錫俄從天上來何處新春可娛客金華山色𬗋崔嵬次韻伯雨臘月八日雪中同登來鶴亭興來欲泛山隂雪不奈舟膠野水凝朝士白頭愁獨步仙人赤腳傲層氷招徠盡是雞群鶴趍附空慙驥尾蠅夜久松龕同擁毳絶勝儤直有青綾題張真人玄靜菴一峯屹起碧嶙峋隱隱金雞五夜聞安用佳城開白日正須拔宅上青雲天垂龍井丹光接地拆龜潭水勢分閣老新題今寡和往來仙子幸能文五言絶句題趙公畫蘭竹猗蘭幽人操緑竹君子德夭夭彼棘心胡為久吾側題錢舜舉作東坡畫竹圗執筆不見人毫端赱風雨至今身外身獨與墨君語題馬虛中畫人歸白雲處舟在清溪曲不聞欵乃聲但見山水緑題郭天錫畫漠漠踈林晚蕭蕭寒鴈鳴窮秋萬里客開卷若為情題眀公畫蘭猗蘭如幽人不受塵俗拘墨卿亦何為挽之來座隅題木石畫卷山木則有枝白石何時爛長歌木石間冉冉歲年晏七言絶句青山白雲圗十年失腳走紅塵忘却山中有白雲忽見畫圗疑是夢冷花涼葉思紛紛松江舟中偶書山房偶為故人留又領飛雲過別州白浪千花帆一葉茫茫天地此生浮移舟夜泊華亭縣却聽吳歌思渺然最憶澱山湖北寺白雲堆裏看青天追和景傳新店客舍壁間韻我夢方酣子遽醒絶絃可復要人聽梨花寒食東風惡淚盡重山宿草青題蘇黃二先生像五祖禪師出世人婆娑久已斷生因莫將描畫虛空手更覔當年身外身笑殺黃龍老晦堂相逢剛道木犀香披圗面目渾依舊鼻孔何曽有短長題諸公跋子昂詩晚生猶幸及諸公展卷還疑是夢中日暮况聞鄰舍笛鬢毛衰颯正秋風題宣和御畫青城塵土晝濛濛百二山河一夕空收斂神功歸化筆野花啼鳥尚春風宣和畫木石石邊古木尚青枝地老天荒石不知故國小臣誰在者蒼梧落照不成悲堂和畫牛淺水平沙落鴈時長牟顧犢過前溪睿思東閣圗中看寧見北風吹草低宣和盡鼠睿藻徒煩飾細微撫時觀物重歔欷更無麟鳯遊郊棷池籞秋風野鼠肥武王扇暍圗一夫偶爾獲清涼四海仁風孰奉揚有道曽孫不忘逺幸均此施遍羣方洪涯出逰圗靈仙飛化事難言驢背春風度市門不到人間今巳久多應醉卧古藤根題子固畫蘭天人眉宇帝王孫憔悴寧同楚屈原何意清風眀月夜盡將心事託蘭蓀題子固墨梅南渡倉忙彼一時孤臣曽賦墨梅詩安知亰洛風塵外有此青春玉樹枝題李早畫馬平沙如雪草如煙想見春風士馬間玉勒錦韉塵土化畫圗流落向人間山水圗老樹無隂石有稜亂山髙下白雲層夢中猶識江南路惟恨舟人喚不譍海月圗憶曽夜叩潮音洞海闊天髙月正中坐對畫圗如夢寐六街塵土晝濛濛水仙圗翛翛翠羽映眀璫誰遣乘風過我傍歲晏髙堂空四壁一簾煙雨夢瀟湘桃竹畫眉圗説盡春愁貌不成翠深紅逺若為情江南有客頭空白腸斷東風百囀聲灤陽邢君隱於藥市製芍藥芽代茗飲號曰瓊芽先朝嘗以進御云君家藥籠有新儲苦口時供茗飲須一味醍醐充佐使從今合喚酪為奴芳苗簇簇遍山阿珠蕾金芽未足多千載茶經有遺恨吳儂元不過灤河春風北苑鬪時新萬里函封效貢珍羡爾託根天尺五不勞飛騎走紅塵次韻虞閣學上亰道中欲去仍為一日留玉堂中夜有詞頭歸鞍曉逐南飛鴈猶及西山一半秋送許參政歸武昌别業九衢蕩蕩緑槐風旌斾搖搖馬首東惆悵鳯凰池上客青天萬里一冥鴻待漏東華霜滿靴挂冠神武意如何也知久歷中書考若比汾陽恐未多氊筆書題墨尚新杏花零落故園春一從今日公歸後身到黃扉復幾人曉日都門祖帳開路人嘖嘖歎賢哉東風無限新桃李不敢煩公手自栽片雲為雨出山時羣物欣欣各自私收斂神功去無迹尋常草木竟何知住近韓家晝錦堂不將牙纛詫同鄉翻嫌相國歸來日腰下猶懸太守章白袍鵠立漫紛紛遙聽車音共候門相見惟須飲醇酒看山看水坐忘言南逰聊食武昌魚莫學騷人賦卜居天子若思真漢相可云吾亦愛吾廬五十人間冨貴年山中道士早求仙石田茅屋歸無計愁絶燈前老鄭虔龍門尚想舊同逰藥籠深慙晚見收新築沙堤却何日欲歸且復為公留石節婦詩伯也南征去不歸舅姑長慟小兒悲元戎奏徹鐃歌曲來聽完州節婦詩四皓圍棊圗當局沉吟秪謾勞區區勝負直秋毫顛嬴蹶項非君事賴有安劉一著髙屈原行吟圗大夫生不遇眀時故爾行吟楚水湄今喜太平歌既醉不須多和獨醒辭瑶池春宴圗西飛青雀幾時還貝闕琳宮縹眇間筆底春風殊未老蟠桃積核巳如山韓幹衮沙馬圗韓生妙畫本無師正值沙場馬壯時虎卧龍跳未渠巳朔風駿尾亂如絲桃源圗山容慘慘將為雨雲氣垂垂欲傍花莫問前村何處覔垂蘿盤石即吾家題髙公畫竹木木葉蕭蕭半欲空竹竿裊裊不成叢絶憐意匠經營處都在風煙慘淡中版築圗千載巖阿迹巳陳披圗風采儼如新兒曺秪羡麒麟畫誰記前朝夢裏人牧羝圗屬國歸馳舊使車披圗仍是牧羝奴不知它日麒麟畫如此風埃滿面無甘美人家藏李翰林醉歸圗可是良工筆有神寫成醉貌出天真雲窗霧閣時開卷笑殺當年捧硯人大年小景叢叢古木煙雲晚葉葉秋荷浦溆風開卷無聲元有句安排旋巳落空濛題平章康里公春日杏園西即事詩後鏘金戞玉音聲古抉石奔泉氣勢雄目斷雲車天路永小樓春雨杏花風逺塵齋寄言佛子善思惟莫厭塵勞事出離法界本來無逺近須知煩惱即菩提怡雲亭道人無物可怡恱偷眼看雲山石中為問風吹雲散後將何遊戲太虛空先照樓𥘉日團團出海東凌晨先照最髙峰不知今日華嚴界樓閣新開第幾重鳯山鷺雪軒千山杳杳一僧歸鳯去山空僧不知忽見鷺鷥飛似雪逢人開卷覔題詩月庭夜久庭空萬籟沉寥寥一月在天心莫教見指先忘月更向申到處尋次韻答濟公舊逰零落如星散坐對孤山似守株聽徹貞元供奉曲羞將短髮照西湖病須藥餌親丹竈老厭書帷徹絳紗幸有文殊來見問更無天女散天花白頭朝士方徒步欲過六橋愁路賖目斷紅雲花島上樓居縹眇梵王家題清鏡閣投老歸來賀監船何時結屋鏡湖邉羡公髙坐毗盧閣萬水同波一月團題趙伯容鶴巢平原公子去翩翩獨遡剛風直上天家近孤山春樹好歸期莫落後千年老牛磨癢圗感時懷古彼何人叩角啇歌涕滿巾溪畔牧兒方自適癢疴都不切渠身題文泉石眼元無一尺深中涵千古聖賢心潘江陸海毋多詫好向源頭活處尋飲後示陳生歲終博士不超遷便腹先生醉欲眠匡鼎若來猶自可後堂無處著彭宣野航亭新亭下瞰碧溪流楓葉蘆花兩岸秋應念兒郎風雨外半區學舍小如舟牧溪圗何人貌此多牛翁世間之樂將無同我亦金華牧羊客可容添著畫圗中鼠粟圗四顧茫茫復畏誰終朝竊食可無飢是間大勝倉中樂丞相當年特未知𬗋菊圗九陌青春拂面塵故園秋蘂為誰新披圖風露生顔色萬里天涯有似人倚梅圗遮莫南枝與北枝得春多處即堪依故園夢斷頭空白千里關山雪正飛題扇頭翛篁老栁各成叢兩岸樓臺夕照中逺水如天舟似葉釣竿長裊一絲風峭壁攢峯上入雲珍樓寶閣四無鄰小橋流水春風外時見揚鞭舉棹人次韻題墨梅一自携家湖水東放舟時度玉花叢因君貌得橫斜影間却孤山月一蓬題澧水雪消圗嫋嫋幽花野水湄暖風晴日雪消時竹君石友何為者春去春來總不知題獨山詩卷後一錫一瓶兼一單懸氷跨雪度雲端悄然獨宿孤峰頂不與叢林共歲寒贈月江術士坐閲人間六十年始知我命不由天千江一月無分照枝北枝南影自偏題陸山長栁洲簇簇春山𬗋翠圍瀰瀰煙水白鷗飛東坡正作西湖長一曲空慙賀監歸題明公畫蘭吳僧戲筆點生綃嫋嫋幽花欲動搖夢斷楚江煙雨外秋風灤水暮瀟瀟題朱氏春雨樓粟里孤山二圗柴桑處士晉風流苔徑茅廬竹樹幽睡起小樓春雨足披圗還喜見西疇小樓春雨暗窗紗坐對咸平處士家盡日看山仍看畫方知梅有隔年花東陽縣西道中柿葉成隂緑滿村桐花覆地草連雲百年舊事無人記猶指前朝御史墳壬辰三月逰左溪癸已三月逰天宫有感而賦頻年謁拜祖師庭柢有山光與水聲尚想玄珠密相付免令我慢肆譏評金華黃先生文集卷第六
