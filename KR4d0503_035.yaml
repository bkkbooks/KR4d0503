body:
  text: 臨川危素編次番易劉耳校正墓志銘延福太監張公墓志銘故延福太監張公世業儒而兼善乎道家之言洞逹乎死生之變其無恙時嘗自製棺槨題曰繭隱欲效陶元亮自為挽詩杜牧之自作墓志而弗果公既殁且葬平生所與交皆一時名人其家不敢屬以銘者懼非公𥘉意也後二十四年公之子世華以為不可使公終泯泯而無聞乃奉狀以銘來謁按狀公諱觀字觀道其先家于淮南宋渡江之𥘉六世祖思道由通州航海抵平江之福山港入居于橫涇遂占籍今之常熟州髙祖彥竒晦迹不耀曽祖朝請郎仲有子九人俱能自植立祖迪功郎孝德家始大父太學內舍生士元再領監舉未第而國除乃隱不仕母金氏至元丙子又自常熟徙居杭州時公甫五歲父母鍾愛甚至延名師教之公天資明鋭加以勤敏師逸而功倍既長工為攴尤長于歌詩不肯蹈襲陳言遊戲翰墨得古人筆意善鼓琴嘗親斫琴數十張咸臻其妙性好古而習於世務于吏事譯語無所不通父母殁事繼母如所生綜理家政公私應酬各適其宜資既曰豐兄弟子姪之貧乏者周之女子不能婚嫁者資之死無以治喪者給之平居薄滋味戒家人無故勿殺能飲酒而惡沉酗四方賔客之至無虛曰樽罍之設備禮而已大德乙巳出遊亰師用薦者入宿衛于中宫扈從往來兩都靡憚其勞至大戊申中政院奏授承德郎同知江浙財賦都總管府事巳酉秋八月就職僅及再朞倦于繁劇移疾辭退延祐乙卯太常禮儀使司徒田公強起之奏除夲院判官不就丁巳宣政院奏為斷事官命下升其階奉訓大夫不容復辭戊午入朝集賢大學士陳公引見𬒳旨特授延福太監升其階太中大夫公深以滿盈為戒乞免進秩執政嘉其廉讓奏允所請俾仍舊階在官垂及三載中政院復奏除內正卿不拜即日扁舟南歸其别業在常熟遇春和景明秋髙氣清與名人勝士徜徉田野間或小憩緇廬焚香看畫啜茶賦詩若與世相忘公于醫藥卜筮風鑒地形皆研䆒其術惟修煉服餌長生久視之法嗜若飢渴湖海羽流競進所長得璇璣混合之道每夕露香飛神朝謁彌久益䖍雷霆諸階祕文隱書悉造玄要嘯命風雲立應如響先是嘗寄籍三茅山之元符萬寧宫泰㝎甲子上清宗壇四十五代宗師劉公欲舉以自代纍致書趣之還山公方厭人間事為佚老計辭不赴丙寅春析田業付諸子丁卯秋示微疾遺命井井有條戊辰七月二十八日黎明終于某鄉祖塋之西菴其年十一月某日葬富陽縣春明村石門天柱山父母墓次遵治命也公自號湖山有湖山小藁二卷橫溪唱和集三卷皆刻梓以傳元配閻氏集軍節度使某之女前公十七年卒無子繼室陸氏公子男七人世華陸氏出也女六人孫男十人女六人嗟夫市朝之人入而不出山林之士往而不返之二者皆過也而况賢愚貴賤同寓形于宇內能無慿生怛化者幾何人哉公於進退存亡之際皆可以無憾是冝銘也巳銘曰柱下之史􅃮園之吏蓋不必於不仕而不都于顯位卓哉張公智圎行方搏扶搖而直上依日月之未光人方瞻其羽儀歘逺翥而髙翔公之自處不老不莊曰豫之先有從遊赤松之子房委蛻兹丘其封若堂欲知其人視此石章中大夫延平路總管韓公墓志銘公諱國賔字君玉姓韓氏世居蔡之信陽其先以材武仕宋曽祖諱斌忠訓郎祖諱伯榮以武功大夫總軍襄樊考諱興祖覩國步日蹙曆數有歸遂隱不仕公身長七尺美須髯多藝能尢善騎射不屑為文字之學而善談論古今事至元十一年丞相伯顔平章政事阿术奉詔南伐師次鄂州都統制程公鵬飛舉本軍來歸公以將家子隸其麾下戰數有功十三年署管軍總把尋以兵屬黃招討世雄先是大軍度梅嶺下廣東十四城公皆預在行未幾閩軍耒逼廣州公從世雄守梅嶺戰屢捷獲其隊長遂攻破南雄韶州率舟師次清逺峽斷浮梁以遏其衝既平廣州而兵復起公與之戰于烏泥沙灣木綿三山屢捷進略循州降其守將十四年還駐隆興世雄從參知政事也的迷失收興國蘄黃公以偏師出戰生擒三人軍次黃州公去城十五里而舍兵始交公直前嬰其鋒流矢貫右臂裹創力戰黃黃州平十五年從世雄入覲賜銀符真除忠顯校尉管軍總把仍賜金織文衣以旌其功十六年程公為行省參知政事公從之討五溪諸蠻馳傳入奏邊事還領諸翼拔突軍四百五十人夜焚息林寨遷索羅寨之民使去巖險而無所慿特進諭桐木寨其寨主負兩銅鼓來降朝廷方議旌擢㑹靖州犵狑犵獠葛蠻肆其猖獗有旨命程公往討尋復止之俾擇人諭之使降公請行諸峒果皆嚮化遂罷遣諸軍命程公以平章政事行中書省事調公權嶽之臨湘縣公既視事務農重穀興舉學校廬館舟梁葺治以時二十四年遷忠翊校尉處之麗水縣尹鄰邑青田有嘯聚搆亂者郡將署公為都鎮撫總麗水青田縉雲龍泉松陽五縣民義捕治之公立部伍據要害遣别騎前進追奔五十里而以所部兵繼之手射二十一人其九人皆斃生擒十三人斬首伍伯級餘衆聚于沙溪公手縛其二人以獻遂直往搗之獲其首亂者六人諭其民叁阡伍伯户使皆復業未幾台州妖民反以婺之東陽玉山為巢穴既就擒伏誅羣盜相挻而起者猶未盡殄處與婺為鄰郡縉雲尤𬒳其害公以民義㑹官軍逐捕之手刃五人射五人皆斃斬首一百級又與其黨遇於西巖追斬三十餘人姦軌肅清而政平訟理見稱廉能大德二年升武略將軍知台之黃巖州自州抵郡城運河皆瀕海通潮汐故有閘以時其蓄泄歲久不治公下車㑹大霖雨水閼不行乃命考其故道為閘十有四凡三年而訖功民以為便同知州事朱公叔麒故宋朝士也為立石紀其績人至今傳誦之環州署皆河水堙塞巳久遂多火灾公命疏浚之豪右多不樂公弗顧渠成而火害息凡平冤獄者三所活數十人公在麗水十年黃巖七年所至咸有去思形於歌謡部使者舉治行為諸州縣最至大七年除懷逺大將軍漳州路總管延祐亢年遷㝎逺大將軍南劒路總管南劒改延平換中大夫為延平路總管年老去官卧病山隂溪上以信陽之滸泉自號示不忘鄉土也七年冬十一月二十有七日卒於安寧里之私第享年六十有七以某年某月某日葬某鄉某原元配汪氏先三十八年卒繼室沈氏後九年卒劉氏丁氏又繼之子男三人長衆家奴汪氏出早卒次人傑沈氏出用公廕為從仕郎兩浙都轉運鹽使司雙穗場鹽司丞次玄劉氏出亦卒女七人長未笄而卒次適知黃巖州劉晉亨次適王怡之次適同知東平總管府事王雲次適海運千户王振鵬次適黃榮祖次適天台縣尹秦徹徹篤孫男二人夢生留生孫女五人公殁三十年其家始奉孫壻江浙行中書省掾甘立之狀來謁銘蓋嘗歷觀前史所記為循吏者非必其有戰伐之勞為良將者非必有撫字之責公獨負其修能惟上所使孔子所謂君子不器者公殆其人乎是可銘也銘曰天之降材各有其施惟材之多無適不冝公生將家逢時思奮𬒳堅執鋭出履行陳皇靈所加四方攸同乃授以政疇其民庸拾級而升克有位序由公之材兩有文武公起列校再剖郡符冝有成績登于冊書作為銘章姑備闕逸惟石可泐公名不殁眀威將軍管軍上千户所逹魯花赤遜都臺公墓志銘公諱脫帖穆耳字可與系出蒙古遜都臺氏其先有事太祖皇帝為開國元勳者曰赤老溫名在國史公髙祖也曽祖納圗兒御位下必闍赤繼領衛兵取遼破金屢䇿携功後攻西夏而殁於王事祖察刺從上親征西域以功為業里城子逹魯花赤又從太宗皇帝於潜邸經略中原立功尤多太宗即位錫金符改授隨州軍民逹魯花赤父忽訥襲前職以隨州孤絶涖治南陽府之昆陽愛鄰境郟縣風土淳美因家焉至元十三年世祖皇帝命相臣總兵伐宋公以管軍萬户實預在行渡江後加金虎符為湖廣等處行樞密院判官南土既平兵寢不用纍持憲節終於江西湖東道肅政廉訪使以長子式列烏臺貴贈江東建康道肅政廉訪使又以公貴贈通議大夫僉樞密院事上輕車都尉追封陳留郡侯諡景桓母博羅真封汝寧郡太夫人公以勳舊家子蚤備宿衛大德十年用臺臣薦佩金符為武德將軍蘄縣萬户府東平等處管軍上千户所逹魯花赤延祐二年遷宣武將軍泰㝎三年轉明威將軍分城坐鎮自明而越前後三十餘年以老致其事公性至孝陳留府君之為湖南憲長有德於民其殁也相與繪像而祠焉公不逺數千里求遺像以歸事之如生存搢紳先生皆以詩文美之公於人有善稱歎不容口有不善則為之不懌終日至㦸手怒罵之其善善惡惡亦天性然也宋南渡𥘉越人蔡㝎父年七十餘以事繫獄法當贖而吏持不可請以身代又不報乃自沉於府河以死郡守為出其父且給槥以葬嗣為郡者立廟卧龍山之麓請勑額號愍孝歲久廟廢而居民侵其地官不之省公攝萬户府事慨然曰孝子不祀人奚以勸㑹使者行部亟以為言使者顧謂守令曰承宣風厲郡縣責也若等寧無恧乎即日使歸其侵地廟以復完國朝取宋之兵至天台民婦王氏為軍士所得自誓不辱至剡之清風嶺齧指出血題詩石上投崖而死公移文有同為立廟迄今不廢剡有隱士吳君與公友善嘗謂吾死得附葬於二戴無憾矣逮其既卒貧不能喪公輟俸資倡鄉人葬于書院之側其好義又如此公為人廉介質直不喜紛華講閲之暇日與賢士大夫遊清言雅論亹亹不倦懸車之後養髙城南闢齊閣懸弓劒著壁間聚古今圖書布列左右延名師教其子每遇風日清美輒緩轡郊外徜徉竟日或幅巾藜杖命家童抱琴自隨散步閭巷間稚耋迎笑扶擁而娭亦不拒也禮部侍郎泰不花出守越作新學校行鄉飲酒禮迎致公居僎輔公升降拜起不愆于儀人皆望而敬之公生於至元二年正月三日卒於至正四年十二月二十八日享年八十有四夫人哈魯氏封陳留郡君髙氏朱氏俱范陽郡君子男五人長大都以武德將軍襲職東平等處上千户所逹魯花赤次哈刺未仕次月魯不花元統元年進士纍遷承事郎南陽府穰縣逹魯花赤兼本縣諸軍奧魯勸農事次篤列圗至正五年進士授將仕郎衡州路衡陽縣丞次完澤不花方治舉子業女四人長適宣武將軍莘縣翼上千户齊伯顔察兒次適朵兒伯䚟次蚤卒次適國子學生忽都逹爾孫男七人諸孤遵治命奉柩歸郟縣卜以至正六年某月某日葬先塋之次示不忘本也以溍於公父子間有一日之雅奉鄉貢進士趙俶所為狀來徴銘溍竊惟自昔帝王之興必有命丗之材為之股肱心膂披攘經營光啓鴻業功在社禝澤在生民故天之報施也往往使後人保其祿位以承太平君子無為之治其德厚者其流光豈不然哉而况公以陳留府君為之父武德及穰縣衡陽為之子公居其間優遊自適享有上壽其存其殁皆可無憾顧溍之鄙陋衰朽無以贊揚萬一庸悉取狀所述為之序而銘之銘曰國家之興必有世臣由本而支彌久益振時方承平垂衣當寧息馬投戈以文易武靖共爾位弗震弗驚禮義干櫓舒舒扞城賔客在前圗書左右載懸吾車長歌擊缶我弓我治世適是承爾仲爾季人遺一經發藻儒林踵武相接趍而過庭圭重組疊生榮死哀雖殁不亡式克有譽為前人光瞻言故丘返柩而祔念兹厥𥘉祁連之墓武略將軍海道漕運副萬户曹公墓志銘曹氏之先出於宋名將冀國武惠王彬南渡時由汴徙吳今居平江常熟州之祿莊里者號福山曹氏最為望宗聚族二百餘人仕國朝多顯者而公之曽大父昌大父通俱晦迹弗耀父文富始以公故贈武德將軍平江等處海運千户驍騎尉追封長洲縣子母王氏追封長洲縣君公諱某天資剛直動必由禮事親善色養以孝謹稱服用尚儉素戒子孫以為法治家井井有條積而能散私帑不蓄羡財聞人有善喜形於色不啻出於已里中俊秀貧不能就學者必周給之不喜暴人之惡有小過必委曲化導使知自悔鄉人有不能制其儇子者公呼之來前喻以人心天理其子感悟卒為善人公每謂人生於世但當設心坦夷仰不愧俯不怍足矣奚必泥古人之陳迹事事求合乎識者以為名言年踰弱冠猶未有䆠逹之意㑹朝廷創開海道以通漕運首以材選而服勞其事大德四年制授金符敦武校尉海道運糧千户秩滿授元降金符遷嘉㝎等處海運副千户公律己以廉處事有法所部之人咸畏而愛之嘗開洋而遇風濤大作舟人震駭公神色自若徐喻之曰委質為臣當心身而徇國進思盡忠天必佑之衆莫不服其量大府或以事咨詢於衆多俟公言而後定至大三年超授金符武略將軍海道漕運都萬户府副萬户公數以漕事往來南北而深察其利害視事伊始凡所興除公私咸以為便四年夏部海艘八百所漕米以石計者百七十四萬八千六百四十有九晝旗宵折號令肅然舳艫相銜首尾不絶旬日之間已逹海口舊傳海道有神司之人恃以無恐公蠲潔致禱感應如響有相之道焉玉音㢡諭宴勞錫豫視常歲有加人以為榮而公雅志恬退既受代即屏居丘園優遊自適幾若與世相忘同列有惜其去者言於當路乞挽留之至治二年有旨起公為平江等處海運香糯所千户三年夏督運至亰師賞賚尤渥廷議復用公為萬户未命而公遽以疾卒泰㝎元年四月某日也享年六十以其年某月某日葬于福山塘之西丘公垂屬纊命割上腴之田一百九十有八畒築精舍擇方外之人主之俾以歲入供晨香夕燈汛掃百須之費顧語諸子曰吾不以身後事纍汝也夫人蘇氏封長州縣君以禮自持克配君子嘗發私笈造輿梁以濟行者成公之志也子男八人長文華將仕佐郎平江路崑山州稅課大使贈奉訓大夫徽州路婺源州知州飛騎尉追封吳縣男次思聰將仕佐郎兩浙都轉運􅐭使司永嘉場鹽司丞次思溫徴事郎溫州路稅課提領次思恭不仕次思賢將仕佐郎平江路長洲縣尉次思忠次文英次思問皆未仕女四人孫男二十人文華長子圭襲公職佩金符為忠翊校尉平江等處海運香糯所副千户次也仙由里哈溫必闍赤纍仙從仕郎宣政院崇教所知事餘皆未仕曽孫男三十人𥘉武德府君早世王夫人躬靡他之誓教育其三子訖有成立長郎公次良玉承務郎兾寧等處稻田同提舉無子公命以思賢為之後次濟滿從仕郎常州路宜興州判官贈集賢修撰承直郎公殁二十有六年而圭來亰師以銘為請蓋公先三世皆厚施而不食其報故公遭逢聖代克承天寵久欎必發乃理之常雖所用未䆒而諸子嗣有名位適孫遂世其官餘慶所及未其止推本積纍之自而昭示于後人所以使之引而勿替也銘其可無作乎銘曰海於兩間為物最巨孰能以力與為勝負有偉曹公孔敏且武出長萬夫訓齊行伍風檣浪楫若鵬斯舉精忱所格百靈呵扈天吳岡象莫敢豫侮千艘並集灌輸天府克有成續徹聞當中傳宣宴勞秩秩樽爼筐篚之將便蕃錫豫公不自矜翩其逺翥鋒車召還不留不處為官擇人諉以印組上方用公還領故部公忽巳仙返于帝所有子承考咸躋官簿惟時聞孫大纂遺諸從事賢勞無忝爾祖如漢世官氏以倉庾福山之西匪堂伊斧史官勒銘垂輝千古亞中大夫同知湖州路總管府事張公墓志銘公諱光祖字載熙姓張氏晉寧路霍州霍邑縣人其先金之䆠族髙祖諱桂管軍萬户曽祖諱儀管軍千户祖諱元義金亡隱居弗仕父諱衍入皇朝任朝列大夫同知福建等處都轉運鹽使司事贈朝散大夫同知晉寧路總管府事騎追尉追封清河郡伯母劉氏追封清河郡君金氏封清河郡太君公金夫人所生幼聰惠稍長刻志於學而于文法吏事無所不知用父廕𥙷將仕郎提領建德在城稅務幸法遵職綽著能聲遷登仕郎主紹興之上虞縣簿上虞素號難治公以介潔自持而馭姦胥悍卒以嚴上官甚敬異之除兩浙都運鹽使司清泉場監運循資轉從仕郎調京畿慶豐倉使用例升承直郎運舟多覆溺之虞亰倉有折閲之患人皆避不肯為其為之者亦鮮能逭於吏議公材諝甚優而謀慮尤深逺處之𥙿如更以此受知當路而見識拔佩金符為松江嘉定等處海運千户陟階奉議大夫在官五年涉巨海至京師者四所轉漕米以石計者總若干萬竣事皆有宴犒錫賚寵數殊渥上嘗命公函香祀天妃于成山公不憚險逺躬詣其處禮成而退祥飈泠然拜朝散大夫杭州路海寧州知州兼勸農事知渠堰事公撫民有恩政不苛嬈而善發擲姦伏人不能欺有寡婦訴其夫為人所殺罪人既得而莫知其尸所在公齊戒禱于神而得之官河水中時方莫春經旬猶不至腐敗人以為公精誠所感蓋公之䆒心於獄訟類如此即其一事餘可推而知也涖治未幾官府日益無事乃大興學校以淑多士三皇有廟而無田以祭則輟俸資倡衆為置田若干畒部使者舉公六事俱備政績最於諸州擢同知湖州路總管府事進五官為亞中大夫未上俄感末疾閲數日疾稍間語諸子曰吾去家數千里而䆠遊於大江之南屢欲展省先世丘隴竟不可得吾百歲後汝曹宜即吾僑居之所為卜地以葬庶他日便於祭享也無何疾復作遂以至正六年閏十月三日終于平江之寓舍享年六十有二公娶程氏河東山西道都元帥授急戰之孫女前八年卒追封清河郡君繼狄氏平江路總管致仕某之女封清河郡君子男六人長中用公恩授從仕郎建昌路南城縣丞次肅次恭次毅皆程氏出次溥化次僧家奴女二人長適浙東道宣慰司都元帥府譯史董德次早卒孫男一人女一人俱幼公天性孝悌尤篤於教子金夫人年踰八袠身愈康強事無巨細皆禀命而行𥘉度之旦必擊鮮搗珍集僚友親朋稱觴為壽盡歡而止異母弟光嗣以鞏昌都總帥府知事乞休致中書擬授承務郎奉元路同知寧州事未命而卒公哀悼不已視其子震如巳子焉中等遵治命以七年正月三日奉公暨程夫人之柩合葬于吳縣安寧鄉萬安山之東而以書來徴銘始公督運清泉豫亦備貟石堰休暇輒相過從以相勞苦已而豫先受代去及公守海寧豫適承乏儒司因得見公道間闊公少八歲豫以早衰不俟引年預乞謝事而歸公方嚮用不謂遽先我而逰其何忍執筆而銘諸雖然不可無以抒吾哀而塞其孤之請也銘曰天之降材有萬不齊孰完於公無適不宜碎曹猥局視險若夷從事獨賢退食委蛇晚専一城年未及衰恢恢遊刃厥問四馳華途方啓遽止於斯公材則多卒不大施垂休委祉嗣人之貽承之匪易朂以銘詩雅州知州錢公墓志銘公諱文煜字光逺姓錢氏吳越忠獻王之若干世曰進由嘉興徙無錫又三世曰梓乃㝎居新安溪上其子曰宗起於公為髙祖曽祖諱成祖諱志寧父諱𥙿以質直好義稱國兵取常州元帥府授以官避不就晚受知于翰林學士承旨覃懷許公其卒也許公為表其墓而銘之母陸氏有子四人公其適長也幼警悟不習為童兒之戲稍長率諸弟佐其父以儉簿致充𥙿父殁分財均不以適庶為别治喪能求賢有禮者相其事內盡其心而人不以為過於戚外盡其物而人不以為傷於侈送客數郡畢至皆歎息焉公為人精悍有膽略臨事無所回撓人有急難赴之恐後有餘粟樂以振人之窮貸則减其息糶則損其直病與藥寒與衣以為常歲饑則為粥濟餓者為糗餌給流移者其殍死者則出錢募人舁致屏處聚而瘞之平居涉獵書傳善論古今事當否成敗幾微曲折如指諸掌或有所詢謀援引裁决言必中的與人語恆依於禮法族姻里黨有忿抑不能平則隨事直之無不厭服而去然不善自表襮恂恂卑讓未始以辭色加人故尤為人所愛重公卿大臣咸知其材許公𥘉由中司位丞弼招之至輦下將署以右職公曰所不逺千里而來者為知已耳仕非吾本志也辭歸未幾許公卒欲用之力薦于朝以為承事郎知雅州雅州于蜀為極邉而居西南夷之衝號為要地郡符殊不輕卑命下人以為榮而公訖辭不赴自是杜門謝所還往暇日則徜徉山水間優遊以自適屬疾僅一日即夷然而逝公生於宋咸淳八年正月三十日卒於今至元三年八月二十九日享年六十有六以四年十二月某日葬于其州開化鄉軍帳山南塢之兊岡距先塋三百步而近娶李氏先十有九年卒合葬焉子男七人長師顔克承其家者也次師曽蚤卒次師中溫州路蒙古字學正次某田州路蒙古字學教授次師正次師義次師禮女三人壻曰吳旻曹大亨華宗亨孫男八人女五人曽孫男一人女一人公葬後三年是為至正元年師中以嘉興縣尹虞君志道之書來曰志道與公同里閈而公之女弟實歸于我知公為最深謹具其世出行事卒葬之歲月如石幸序而銘諸溍竊觀世所謂砥行立名之士未嘗不欲忘貴遺冨至誘以髙位重餌而不失其所守者鮮矣公為善而不近名視尊官厚祿若不足以動其意其賢於人哉雖微虞君之言銘固不可辭也銘曰錢故王族世有顯人後隱弗仕逮處士居公𥘉起家真二千石有而不居仍晦其迹泊焉以休匪佚吾私視我停蓄及所設施積善在躬惟家之慶用之鄉人是亦為政乘化而終不亡者在有豐其委其承詵詵五品之石龜趺螭首薦兹刻辭式示永久汴梁稻田提舉周公墓志銘須臾以休致之餘承乏詞林周君伯琦適自七閩憲府召還擢居次對緣僚友之契以狀屬豫銘其從父提舉公之墓誼不得辭按狀公諱應星字辰翁姓周氏上世由鄭徙廬陵又徙饒州鄱陽縣之板橋里仕宋以儒起家曽祖考諱邦采迪功郎祖考諱灼鄉貢進士考諱墍宣教郎宣教公之弟諱垕入皇朝贈翰林待制奉議大夫驍騎尉追封鄱陽縣子公所生父也至元十二年國兵南伐次饒州饒之守臣執節以死民無所依翰林公挈家逾城而出以自保公甫七歲倉猝之際為邏兵所得亟出懷中銀杯賂之既以自免又能跡翰林公所在匍匐就侍舉家畢焉稍長檏茂恬靜不妄言笑屹如成人讀書務通大義工于竿櫝而善心計宣教公夫婦殁於鋒鏑而無子公兄弟四人次居第二翰林公命為之後公承其家而修其祀事唯謹比弱冠翰林公年已七袠伯兄又多病家事皆身任之翰林公喜賔客好施與當江南新附之𥘉官府征斂繁雜公入奉嚴親不違其志出膺門户無失其節人稱為能翰林公捐館未幾而伯兄亦卒公於喪葬各盡其禮每謂人生出處自有㝎分兄弟皆父母遺體苟有能顯其親者何必出於巳乎服闕後二弟並遊亰師公獨留綜家務凡十餘年使二弟無後顧而卒成其官業者公之力也由是公之孝友聞于一時延祐某年用徽政大臣薦授汴梁稻田提舉辭不赴公既遺榮弗居日從事乎生産作業家益以充自處甚約而宗族鄉黨以困乏有請者必使滿其所欲稱貸而不能償者一無所問挾方技數術而來謁者無虛曰平居好治屋室園池樹橘數百株時與士友相羊其間因自號橘中居士閭里少年或恃氣以陵之忍不與較人望而知為善人長者至正二年九月某日以疾卒于家享年七十有四卜以某年某月某日葬于都昌縣某鄉之黃荆山公𥘉娶方氏繼江氏子男三人自誠伯強伯明女三人適張汝揖朱業黃文紀孫男孫男五人女二人公二弟仲曰應奎早備宿衛終於饒州路總管府治中季曰應極由東宫說書歷翰林集賢兩院待制丐外卒官同知池州路總管府事纍贈翰林直學士亞中大夫輕車都尉追封鄱陽郡侯伯琦其子也今為亞中大夫崇文少監同檢校書籍事兼經筵參贊官云銘曰衆正之路人所同歸苟非其招吾行遲遲前人之遺其積孔有難進易退賈用弗售雨露所濡花蕚聮輝尚慰豫懷風木之悲有隕自天下賁幽室榮耀實多奚必我出惟示後人鑒觀于兹克協乃心勿替引之松江嘉㝎等處海運千户楊君墓志銘楊氏之先世有顯人宋之盛時有自閩而越而吳居澉浦者纍世以材武取貴仕入國朝仕益顯最號巨族今以占籍為嘉興人君諱樞字伯機贈中憲大夫松江府知府上騎都尉追封弘農郡伯春之曽孫福建道安撫使贈懷逺大將軍池州路總管輕車都尉追封弘農郡侯發之孫嘉議大夫杭州路總管致仕梓之第二子母陸氏所生母徐氏陸以封徐以贈並為弘農郡夫人徐夫人溫之䆠家女生君甫數歲而殁陸夫人撫君不啻如巳出君幼警敏長而喜學一不以他嗜好接于心目刮摩豪習謹厚自將未嘗有綺紈子弟態其處家雖米鹽細務皆有法㒒隸輩無敢以其年少而易之諸公貴人多稱其能大德五年君年甫十九致用院俾以官本船浮海至西洋遇親王合贊所遣使臣那懷等如京師遂載之以來那懷等朝貢事畢請仍以君護送西還丞相哈刺哈孫答刺罕如其請奏授君忠顯校尉海運副千户佩金符與俱行以八年發亰師十一年乃至其登陸處曰忽魯模思云是役也君往來長風巨浪中歷五星霜凡舟楫糗糧物器之須一出於君不以煩有司既又用私錢市其土物白馬黑犬琥珀蒲萄酒蕃鹽之屬以進平章政事察那等引見宸慶殿而退方議旌擢以酬其勞而君以前在海上感瘴毒疾作而歸至大二年也閲七寒暑疾乃間尋丁陸夫人憂家食者二十載益練逹於世故絶圭角破崖岸因自號默默道人泰㝎四年始用薦者起家為昭信校尉常熟江隂等處海運副千户居官以廉介稱𬒳省檄給慶紹溫台漕挽之直力剗宿蠧掊尅之弊絶無所容天曆二年部運抵直沽倉適疾復作在告滿百日歸就醫于杭之私𪠘疾愈劇不可為俄升松江嘉㝎等處海運千户命下君巳卒至順二年八月十四日其卒之日也享年四十有九娶劉氏南渡名將大師鄜王光世之裔前四年卒贈嘉興縣君𥘉君有三子俱未齒而夭奉父命以弟之子元德為之子後乃有子曰元誠君卒時元誠生二年矣元德卜以元統二年正月某日襄祔事于泊櫓山先塋東百步與嘉興縣君兆合君從父兄朝列大夫同知集慶路總管府事清孫實志其壙而墓道之石未有所刻元德以狀來謁銘乃序而銘之序所不能悉者志文可互見也君平生所賦詩有遺藁藏於家銘曰弗私于佚維時之逢弗疚于用維才之通有伉其門堂􅌟則崇其播其穫乃嗇不豐尚其嗣人勿替益隆琢石以俟表兹幽宮上都新軍管軍千户夾谷公墓志銘公姓夾谷氏諱明安答而别名思齊字齊卿其先當金之季年奮迹行陳靡有㝎居由大同徙南陽之郟縣又徙真㝎而占籍於趙州後復為郟縣人曽大父諱留乞受知太宗皇帝入覲于西京以萬户奉詔僉軍彰德諸郡得八千人隸麾下數立戰功尋出戍隨州以隨州孤絶餽餫弗繼移駐郟縣剪荆棘立城堡規模粗具俄遷戍潁州出竒禦敵人賴以安從攻安豐壽春無為親冒矢石一無所憚世祖皇帝嗣登大寶召入扈從賜璽書俾持以宣諭有能率衆來歸者當酬以爵祿欽承上旨輸忠效勤績用彌著用丞相史忠武王薦特降金符授蓋州三頃合不哥民户逹魯花赤改知懿州換金虎符歷懿州平灤淄萊三路總管終於淄萊積階昭勇大將軍大父諱唐兀以材自見於憲宗皇帝時從攻鄂州還戍潁州逮世祖皇帝命將出師大舉南伐復預在行既渡江取鄂又北收司空山野人原天堂諸山寨計功行賞授武略將軍上都等路新軍萬户府管軍千户從其萬户分鎮杭州卒于官父諱秃滿以忠翊校尉襲管軍千户職沒贈武略將軍飛騎尉追封范陽縣男母胡氏鄭氏俱追封范陽縣君用覃恩也公鄭氏出幼有異質姢秀慧朗可愛稍長習尚文雅雖在營壘間容止進退儼如承平閥閲子弟然倜儻尚氣不為崖岸與人無宿諾有過必面折不少貸有德必報聞其急必勇赴之由是四方豪俊之士多樂與之交平居無事習韜略之書不敢輒廢或獵于近郊射則中禽則獲歸而祖割以奉甘旨克盡其歡父殁當嗣襲捧薦櫝京師公卿大臣竒其器識不以武人子遇之𬒳命以忠翊校尉為管軍千户覃恩進忠顯校尉公事主帥以恭待同僚以和遇卒伍以嚴各適其宜閲武之際于衆中獨美風姿光采照人櫜鞬帕首馳驟捷出列校咸指目焉其治家內外截然無嘻嘻之失歸自京師生事稍落以勤儉率先家人樹藝畜牧貨殖皆井井有條致養於偏親惟所須而具闔門食指數百無不充足闢故廬使極髙爽日與賔客徜徉其中愛其弟思齊尤篤同居三十年不忍使逺去弟有子巳成人乃處以錢唐西鄉别業凡先世故物悉推與之公在官既久一日語諸子曰吾荷國家之寵靈保祖父之遺緒未能圖報萬一爾曹有以成吾志而佚吾老使得優遊卒歲不亦可乎即日移文丐退主帥及同僚挽留不可則上其事于行中書省以聞于朝乃俾其長子瑛襲見職浙西部使者交章舉公季未及謝材幹膂力皆有過人宜别加升擢公悉辭避焉居三歲以子早世傷悼不巳因致微疾即却藥弗御沐浴更衣而逝公生於至元丙戍九月二十五日卒於至正甲申十一月二日享年五十有九娶史氏忠武王之孫元氏縣尹某之女封范陽縣君子男四人長即瑛今為忠翊校尉管軍千户次琦用淄萊府君廕當得官未調次即珩先公一月卒次璋女三人長適永新州知州李公之子煥次許適管軍千户趙嗣宗次許適錦州知州王公之子某孫男二人尚幼公大父之殯久在郟縣而父母俱殁于杭將扶護而往以昭穆序葬顧職守有嚴懼展省之弗時乃買地於錢唐之東馬塍遣子琦迎大父之喪與父母同兆域以葬且築室為歲時饋祀之所公卒之月二十有三日瑛等遂奉柩祔葬其右遵治命也𥘉范陽府君當四海合一之後田里人安邉鄙不聳得以暇日與先生長者遊讀書手不釋卷公耳濡目染益自力于學延師教子各専一經諸子欲稍出所長以售於有司公止之曰爾曹甫向學遽與寒畯角其勝負寧不自揆乎於是諸子愈自激勵文采彬彬士林稱焉公既葬瑛等以狀來謁銘乃托狀所𫐠序而銘之曰天造草昧必資群雄四方砥平士無伐功繄公之先生逢興運兩世一時懷材並奮再傳及公際兹文明分符列鎮坐嘯名城蹈詠泰和歡騰組練圖書左右嘉賔衎衎教行于家承之有人蔚乎豹變遂振於文賈勇専場䄡䄡儒服公曰母庸家有世祿印龜在綰未老而傳長歌擊缶以終天年兆啓新阡有封若斧公其無憾歸形此土贈奉議大夫名路滑州知州驍騎尉追封白馬縣子王府君墓志銘故贈奉議大夫大名路滑州知州驍騎尉追封白馬縣子王府君以至元庚寅八月二十四日卒于宣城之寓舍享年六十有八即宣城郭外西南岡下治地以葬而府君元配劉氏前十有四年卒安厝開州已久繼室張氏後二十有五年卒尚旅殯于揚州至元後丁丑府君之子大有始並遷其柩合葬于府君之墓自為文刻石以志焉𥘉大有為江南湖北道肅政廉訪司知事援著令乞推恩其父母贈府君承務郎大名路同知滑州事大有張氏出也故張氏與府君同𬒳命為恭人及大有遷平江路總管府推官而劉氏恭人之命亦下大有既升五品乃加府君以今官階勳爵而劉氏張氏並追封白馬縣君大有使來諗于溍曰志所以昭世系謹歲月已納諸幽堂惟是先人劬躬樹德以承其先以啓其後者冝有辭揭于墓之原以示子孫顧猶闕焉敢以為請按王氏之先實金之宗室完顔氏世居磁州有諱逺者為金統軍使府君之父也自統君而上遭亂失其譜莫得而詳府君諱思孝字移忠幼警悟年方羇非脫身兵間東至大名居開之濮陽仍易姓王氏子孫至今因之稍長喜讀書能屬文自處甚簡簿是時國家新取中原海宇未一殊無仕進意洎天下既平朝野無事可以出而仕而府君則既老矣惟資其子使為學庶幾他日能自振拔而大用首以材見推擇尋入江東按察司為書吏廉訪司立更留以為奏差府君委蛇就養久之乃以壽終府君有子男四人長即大用次圭次大有也今為奉議大夫廬州路六安州知州兼勸農事次大慶女一人壻曰㑹稽縣主簿郭郁孫男九人輔輗轍輅黼黻某某某輔福宣慰司元帥府令史轍江東廉訪司書吏女五人適湖南宣慰司經歷秦從政紹興路司吏馬良中興蒙古字學正李三德餘未行於是大用圭大慶輔輅俱已卒咸從葬焉蓋金之將亡大家貴族違親戚去墳墓散之四方而其後泯沒無聞者多矣府君既有以自全而不墜其宗又能教其子至於成立以備官使晚乃卒食其報豈偶然哉矧今大有歷官所至有聲其在湖北平反辰沅常潤諸死獄人尤以為明允臺府屢薦稱之其顯融未艾府君之冝見褒崇者不止若今所書而已雖不克親於其身措諸事業平生之氣尚何憾乎序而銘之俾後世知完顔氏之為王氏王氏之在宣城皆始於府君也銘曰完顔之支别為王氏逺迹于南由府君始惟時府君有韞弗施一其𥘉終靡間險夷保厥嗣人使有祿位貤恩所加草木衣𬒳其升在上神遊故墟降形在下兆兹坤隅中為同穴昭穆左右勒辭紀實式示爾後管軍下百户贈敦武校尉孫君墓志銘君諱政其先河間人徙德州之德平祖斌當國家肇造之𥘉知金將亡挺身來歸于皇太弟從白答里罕取濵棣等州由德州軍民鎮撫佩金符克其州防禦使兼管濵棣軍民尋易金虎符升都元帥久之例解所佩虎符用白答里罕奏𬒳上命換朝列大夫仍任防禦使兼德州管軍元帥德既隸東平行臺嚴公強以為德平安德兩縣令居數歲乃謝去父顯始占軍籍署管軍正百户從其萬户軍蘄縣調屬他將從掠泗州擊襄陽破安豐還守楊州復從攻孛羅湖蘆觜寨孟家洲司空山皆有功所獲閫艦一拔其大將旗二其擊襄陽也太尉河南王實為征南都元帥屢奬異焉後遷戍杭州遂致其事行中書省以便宜俾君襲父職從其萬户府逹魯花赤討叛賊于建寧之政和與賊相拒分水嶺擊走之追至石門赤山賊勢益張君直前與之鏖戰奪斬馬刀二移鎮慶元有司驗其所管軍㝎為下百户至元二十六年奉敕為真階進義副尉復從討叛賊於台之寧海至奉化與賊遇俘其七人得鎧仗十有四賊衆夜來劫營君急擊之得鎧仗十乘勝逐北至寧海生擒其僞國師等四人以前在政和感瘴氣成目疾去官大德五年七月也至治三年八月二十一日卒于家享年六十有一其月二十四日葬基山鄉用覃恩贈敦武校尉妻侯氏贈冝人子男三長毅以世襲為管軍下百户次衡次某已卒女五長適管軍百户髙某次適李某次適國子生鎖住次適髙某次適管軍百户張某孫男二文禮文義女四俱未行毅之外舅深州使君劉公溍父執也故深州之子貞為之求銘其墓惟孫氏自防禦公際風雲之㑹以功名自致君父子又皆親冒矢石以著其勞餘澤所𬒳未有止也不可無使後人知木水本源之自輒因銘君推及其先世而併志之銘曰孫氏之先世有伐功匪由門地而致顯融賞延于君復以材奮𬒳堅執鋭再履行陳君之所試泰山毫芒鸞鳯在郊鷹隼莫揚爾子爾孫垂紳正笏視此石章永永無忽金華黃先生文集卷三十五
