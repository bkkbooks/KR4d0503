front:
  text: 金華黄先生文集卷苐二初藁二五言律詩臨川危素編次番昜劉耳校正
  hash: sha256:374847dbb8de59ded489bb38c81e20275a6e9f290494848692d66b15a25df3e6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0503_SBCK_002-1a}
body:
  text: 寄方韶父先生牢落江南賦知音寄渺茫鹿麋行䖏有芝草萝中香遥興滄浪濶悲歌白髮長平生今古淚滴破緑蘿裳雨二首兀坐九十日雨聲殊未休花時翻益睡茅屋不禁愁生事吾何望春寒晚故㽞江波青滿眼萬里付䨥鷗泥潦今如此出門知路難蓬蒿春自長桃李夢曾看未覺龍公倦誰憐燕子寒青燈耿䔥瑟千載入憂端雪急雪下不止朔風終夜鳴飢蟲應蚤蟄老鴈故南征生理真何計沉吟獨此情山中歲酒熟不飲竟湏傾送友人郷路三百里獨歸衣正單涼風紫洲水斜月白沙灘燈火期方逺關山歲欲闌倚門應望汝莫澷駐征鞍寄友人憐君山水意局促守柴扉故國悲秋草涼風滿褐衣滄洲斜日晚白社㡬人歸寂寞分遥念天寒木葉稀秋懐五首天末雲猶玄山中歲欲徂周流吾道在嘆息古人無野鵲疑秋樹新駒怯暝途蒼茫念同志微薄忝為儒對酒髙天豁豋樓落日曛亂蟬悲暮葉老雁赴長雲落魄稽中散栖遅鄭廣文身名竟如此碌碌汝何云稍稍秋河落姢姢宿露微天清江不息野迥樹相依回首狂歌數經心昨夣非流螢無思極巧入絳惟飛仰古嗟無及關情極可哀禰生才見忌賈傅直為災丗肯憐樗櫟吾曾悔草莱小詩聊戲爾何乃併生猜風雨仍揺落江山且滯㽞懶從生事拙閒惜壮心休弱􅟵縈欹石空槎卧洑流興懐到微物丗故劇悠悠柴荆赤日薄烏帽柴荆無㝎棲可䏻詩似錦乍取醉如泥薄業慙漁艇深衣逐馬蹄蕭條江海興芳草故萋萋慿軒信有儒冠誤慿軒意欲迷山深風雨惡天濶羽毛低他日開炎瘴連城送鼓鼙荷鋤吾媿爾未敢歎塗泥風雨風雨忽如此閉門方晝眠故應為計拙可復要人憐燈火羌村路桒麻杜曲田悠悠今視昔把卷一茫然抱琴三尺枯桐樹相随年嵗深此行端有意何䖏託知音隐隐青山夜寥寥太古心空携水仙曲更向海中岑山中懐友七首大府趨羣彦脩才復壮齡波瀾開白晝羽翼動青冥弱質悲殊調眀時敢獨醒未妨茅屋底寂寞抱遺經望逺空山裏天寒夕夢孤林昬行魍魉江晚變蘼蕪風雨憐同病塵沙感壮圖向来懐古意逥首未䏻無踈放誰容我交逰重得君論文輕咳唾問俗到耕耘一咲䏻青眼相思有白雲春風動閭巷遂徃謾紛紛何事虗齋裏猶分苜蓿盤髙林容偃蹇衆翼避扶摶黑夜文星動青天劍氣寒終南山正好那得悔儒冠自是麒麟種卑栖㝎㡬年故廬南雪下短褐北風前歲暮山林瘦天髙雨露偏肯同兒女輩俛仰事春妍卓犖恒山秀相逢㡬抱琴五年風雨別四海弟兄心雪外梅花逺山中桂樹深㝎知嵇叔夜髙興滿雲林洛社推年少清􅫉照士林春風何䖏客芳草獨行深遺墨收秦刻新吟學椘音别離無一字目斷白雲岑悼䨥林栗上人飛錫徧諸方栖身復故郷年随䨥樹老人與一琴亡暗草迷春塔凝塵鎻夜堂瀟䔥今日雨誰炷影前香社日重過方子踐東風吹客衣長憶見君時一别驚雲散重来與燕期春深今雨夕花老玄年枝莫待空山裏青燈有所思聞子踐臥病吾子仍多病何人共觧顏水聲和藥臼春色閉松関積雨連三月懐人隔萬山同逰况零落浩蕩可追攀和吴賛府齋居十詠焦桐憐爾抱奇質無香亦自焚材髙初偶得音古竟誰聞天海空遺操氷霜見裂紋中㕑方煮鶴終得舎夫君蠧簡六籍灰寒乆名山餘舊藏漆痕微有字芸草寂無香後死嗟猶及斯文豈遽亾丗方珎貝葉掩卷一淒􅋽破硯巨璞何年鑿磨穿偶至今線紋虗緑潤雨氣失玄隂瓦礫看無異塵埃積轉深眀光㡬携入往事復何心殘畫勝境不可得微綃餘舊圖丹青初彷彿塵土半模糊蛺蝶飛疑去波濤拆漸無良工今豈有為爾一長吁舊劍憶啓蛟龍匣提携徑岀門紅塵走馬䖏白日報人恩歲月銅花澁雲烟斗氣昬淒涼中夜舞囬首暗銷魂塵鏡古鏡色如墨千年獨此畱玉臺蟲網暗珠匣土華浮莫咲塵埃滿曽令鬼魅愁盤龍驚已化雲雨夣悠悠癈檠不觧照珠翠早同文字􅉀何言中路牽無復向人眀雨宿髙齋夣秋吟癈館情相看㡬今夕及此慨平生敗裘襲爾亦已乆霜風兩䄂穿甘從稚子咲未受故人憐雅製餘前古深期在暮年素絲今化盡念汝獨依然斷碑零落秋風臥何年癈廟碑圖經愁莫載耆舊說頻移野燒龜趺失荒苔鳥跡疑遥知千載後拂拭轉堪悲臥鐘龍簴乆摧折沉埋柰爾何畊民誰睥䁛野衲自摩挲雅奏多年歇銘文㡬字訛斜陽荆棘裏長伴舊銅駝呉賛府挽詩三首鶴去愁滄海鴻飛困朔風冥冥方獨徃巳已竟長終莫挂還郷劒真随厭丗弓向来曽慟哭不是為途竆百代龍川子風流見外孫餘生唯白㡌舊業自青門浩蕩期千載蒼茫哭九原仙華雲縹渺愁絶刻舟痕懐古餘哀思憐君尚典刑清談無俗子白髪死遺經客社荒春汐郷山隕夜星夕陽隣舍笛淒切可堪聴過謝臯羽墓識子今無日風流可復㝷山林餘椘製弟子觧閩音滄海它年夣青天後夜心平生匣中劍零落遂如今元日即事回首人頻異興懐誰與同塵埃欺白苧歲月入青銅雨急蒼茫外春生浩蕩中長憐故園樹一一受東風八詠樓懐古荒碑在豋樓晚望賖秋隂垂野薄江勢抱城斜天地悲㳺子氷霜感嵗華紅塵吹裋褐歸興及清笳眀月樓遺堞何年有飛甍壓上頭鼓鼙分大幕香火望靈湫曲岸舟如失遥沙樹欲浮豋臨且吾土未敢恨淹畱溪南即事莾莾長川玄行行薄莫時山光連睥睨寒色入旌旗夕鳥歸飛急風㠶􅊇上遲丗情關物理俛仰寄長思􅍭香道中殘日亭猶逺䡖風帽易斜稻畦低沒鶴草徑曲行蛇經丗知無筞謀生㑹有涯殷勤理黄菊畱眼待秋花懐楊仲弘離別驚如雨蹉跎媿後塵秪今才有數多爾術䏻神玉涶春風濕烟霄碧樹新􅍝慙推吏事吾敢望平津八詠樓遇方子踐風雨三年别豋臨一咲同緑莎垂古井碧瓦暎踈桐丗故違髙枕吾生劇轉蓬相逢感疇昔出䖏愧匆匆杭州寄子踐尊酒何人共春光著䖏同乾坤容野馬歲月失飛鴻俗眼䏻無白風花故自紅向来常䖏士早已負諸公次韻荅子踐不謂飛霞珮珊然寂寞濱相看今雨夕漸近長年人往事驚如夢何峯擬卜隣平生千里駕還往得辭頻劉聲之爐亭夜話儒冠寜誤我壮志自多違昭代尊經術先生尚布衣清言今夕共大隐昔人稀預恐蒼山麓無從候少微雨三首湖濶雲如積天空雨正豪風飈兼晝夜井邑帶波濤茅屋垂垂破漁舟故故髙何妨張仲蔚環陼自蓬蒿穉子吾憐汝泥行玄不難凭欄真自咲髙枕敢求安天地三辰遠江湖五月寒好将遮日手却把釣魚竿田父愁何訴龍公怒未休千畦沉翠羽百水散黄流小市猶長閉孤城併欲浮誰誇𥙷天漏此事恐悠悠金陵客舎澷書不擬夫容佩終然挂寂寥百年多事始千里一身遥巢燕驚華屋韝鷹望赤霄蒼蒼叢桂樹愁絶小山招陪仇仁父先生豋石頭城談咲逢諸老豋臨失故亭薄逰成汗澷髙歩覺竛竮峽水通吴白淮山入椘青平生一杯酒及此慰飄零春日郊行襍興三首忽忽時頻異垂垂花正繁豋臨聊極目出䖏可忘言風急江光亂春濃野色昬舊逰嗟契濶覧物思空存五畝清江曲為農計未踈那無經丗筞宜付絶交書野笛吹頻歇漁舟玄若虗卜居䏻有待天地夲吾廬高興真誰共佳晨秪屢經天清風細細花逺樹冥冥勝事今非昔狂歌醉欲醒終南飛鳥外一髮向来青次韻荅友人十載論友地才皆苐一豪江湖嗟契濶風雨夣䔥騷趨走知無力標題敢自髙期君飬翎羽一撃可徒勞九日豋石頭城背郭囂塵逺髙秋川嶽清幽懐初曠蕩陳迩故縦横遥望龍盤舊長憐蟻穴争紺園随䖏關粉堞向来傾彂草窺眢井看碑驗故塋門𨳩蒼耳路亭愛翠微名逺樹淮南出滄江鳥外眀人烟川浩渺風物歲峥嶸吹㡌仍佳莭傳觴但老兵愚生襍蛙黽浪走媿璜珩玄玄檣帆盡䔥蕭蘆葦鳴豋髙未成賦覧古獨含情政復哀王粲何堪厭禰衡敝廬滄海曲目斷白雲生寄李生有維仙李孤標見碧梧髙門畱雨露短褐混泥塗姿悍寜為小機深㦯類愚洗心湏貝葉㳺藝及樗蒲政爾難蔵頴幡然獨抱竽從容觀近效僶俛事羣趨稍癈琴心曲䏻操牘背書誰将窮罔象莫使避珊瑚它日逢何暮清談動至晡酔醒勞問我喜怒得令渠契濶江湖迥飄零歲月徂青雲悲捷徑白日仰亨衢秋社枌榆外南包橘柚初飛騰如借順䏻勿咲蟾蜍七言律詩送孫君文判官丈歸桐廬咲語匆匆似夢中衣裳俄復判西風殘蟬落日那堪别瘦馬長途喜未窮歲事已空南畝稼歸期應老故山桐興来尚有平生棹載酒何時覔釣翁感舊華屋山丘不可期峴山依舊緑叅差空懐下榻延徐孺無復乗舟訪戴逵日暮更聞隣舎笛歲寒頼有角弓詩舊逰寂寞成今古冷石秋花䖏䖏悲鳳凰山蒼海桒田事渺茫行逢遺老色淒涼為言故國逰麋鹿澷指空山號鳳凰春盡緑莎迷輦道雨多蒼薺上宫墻遥知汴水東流畔更有平蕪與夕陽𨳩元宮誰使蔵舟一夕移紅樓翠幙未全非曾聞帝子乗鸞去疑有仙人跨鶴歸烟徑月眀瑶草歇石壇露冷碧桃稀赤欄橋畔多時立閑看楊花作雪飛早起漠漠晴􅉉散薄雲獨搔短髮立清晨春風入樹無行迹暁月窺簾欲近人旋覺新吟随夢寐不知清霧濕衣巾何人正踏長安陌想見看花拂面塵九日獨立慿髙彂興新霜清露白復佳辰緑尊照眼不觧醉黄花滿頭應咲人檮邉老僧幽期失巖南故人新句頻秋天此日併囬首鴻鴈寄書愁未囙次韻山南先生遣興二首稍覺春風入剪裁更無魂夢到塵埃苔枝自送黄昬影寳篆頻消白晝灰丗態漸應随日別老懷可復向人𨳩擁爐坐聴蕭蕭雪載酒携琴也莫来蒲團兀坐乆忘機何暇重尋是與非老鴈長雲天渺渺晚花寒蝶思依依起看丹竈春無恙欲試青鞋雪未晞鵬鷃逍遥端可耳玉堂何必媿柴扉寄仇仁父先生一官十載尚沉淪門巷蕭蕭白屋貧自有陶公為社友從呼杜老作詩人兒曹故復䡖前輩儁歩誰當出後塵招隐詩成無䖏寄莫雲凝碧坐愁神寄十八丈判官金牓淒涼四十年風流文采故依然香山老玄誰同社栗里歸来尚有田懐古坐看西日落得春寜問北枝偏清泉白石多深趣千載心期入近篇寄仲山異縣關心翔鴈飛酒燈棋雨計頻違寄書全覺嵇康懶入夢多疑李白非黄葉閉門方寂寂碧雲逥首故依依相從賴有梅花約試蹋春風走翠微寄友人繫舟一别雲水鄉暮川葭菼方蒼蒼漳濱臥病它年憶渭北題詩春日長蕪菁作花己爛熳楊栁飛絮苦顛狂聞道茯苓暖堪斸遅子青鞋經澗崗夏日澷書枕上初殘栢子香鳥聲簾外已斜陽碧山過雨晴逾好緑樹無風晚自涼芳歲背人成荏苒好詩和夣落蒼茫求羊何不来三徑門掩残書滿石牀逢葉伯機水烟沙雨送歸航楓葉蘆花巳十霜瑶曲天風春夢遠墨池秋草故㳺荒碧峯又是新逥䧹白石依然舊化羊一咲相逢却成别暮雲千里思茫茫宿賈氏山房暝色蒼茫赴逺岑獨追燈火下荒潯寒沙細水通幽徑脩竹高楠走翠隂草草悲歡中夜語悠悠醉醒百年心石烟霜月寒無寐坐聴踈鍾出二林送友人之亰偶縁送逺接清逰烟雨東城晚樹幽離别自應多感慨咲談未害各風流百年芳草頻頻合萬事孤雲故故浮太華黄河入囬首春風愁絶李膺舟荅友人芝掌峯前一杯酒別離歳晚逓相望野梅如雪遥入眼曉鴈連天寒呌霜閉門窮巷燈火冷囬首蒼山雲樹長㡬時抱被却同宿愧爾詩筒逺送将憶友人無復髙談慰索居壮心零落竟何如人間澷有金臺夢身後誰傳玉枕書半畝蒼苔埋璧地一聲白雪斷絃初芙蓉峯下聞吹笛淚滴春天草木踈哭李無逸青春未受二毛侵談咲俄聞變古今千日却醒徒有望九原莫作竟何心平生欠荷劉伶鍤此夜誰彈子敬琴水樂亭西烟草碧舊㳺囬首重沾襟過烏傷墓丹青像設始何年翁仲遺墟自古傳時有北人来下馬不知秦樹㡬啼䳌牧童晝卧看碑路野衲春耕祭墓田囬首長安西日外茂陵松栢正蒼烟襍興三首昔從六客堂前客共買何山渡口船杉松夹道得古寺風雨澷山連杜䳌憶别老僧如昨日待分幽事及它年春江正緑不能玄勝踐䔥條秪自憐㡬囬擬作送春詩出戸春風玄不知葉底孤花猶入眼竹根稚筍欲過眉又抛書卷都如夣間看香烟偶似癡寄語平生張仲蔚一歡相屬竟何期劉生玄滌相如器朱子新裁賈誼書百代風流今視昔十年懐抱我憐渠故應曽對談諧樂也復䏻容禮泫踈風雨蕭蕭守環堵秪今可望故人車寄陳君采江淹文采碧雲消潘岳才華玉樹凋後爾千年開楗鑰森然作者見風標棋花夕日輝相並金櫃名山路未遥䞉欲傾心數還往髙期無使竞蕭條次韻荅吴正傳諸老凋零半九原後来英發見蒼然髙標寜復居人下緩歩猶湏出我前天馬爲誰生月窟仙禽有日到芝田論心待取同傾盖可使空逥雪夜船寄葉審言千里相思黄葉初喜傅消息慰離居姓名澷入山公啓懐袖元無賈誼書已分耕耘供賦龡胡令汲引到樵漁臨𡵨躑躅頻回首風雨蕭蕭鴈正踈獨立數盡飛花一愴然壮心迢逓夕雲邉十年人事空流水二月風光已杜䳌過眼青春寧復得汚人黄土絶堪憐故園尚有平生約可使蒼苔到石田即事南陌東阡草色齊愔愔門巷客来稀受風燕子輕相逐著雨楊花濕更飛緑樹無言春又盡紅塵如霧手頻揮浮生莾莾吾何計獨立看雲竟落暉山中夜歸澷山松葉行徑迷獨穿犖确幽歩遲驚風低艸山乕過寒月挂樹天星垂泉鳴荒䖏夜牢落露洗青林光陸離茅簷抱膝者誰子歌闋飯牛聲正悲旅夜歷歷飛螢度眼眀獨搘髙枕數殘更薄㳺已􅌒新彈鋏舊業猶餘未棄檠一雨送晴初月色百蟲専夜故秋聲情知三卜非年少已覺人間有後生三月三日西湖舟中黄塵烏帽媿平生對客猶稱舊姓名此事正堪三太息秪今忍負四難并放舟乍落空濛境送酒元無窈窕聲金谷蘭亭嗟已矣不妨時暫濯吾纓金陵天津橋五雲零落渺天涯陳跡蒼茫日自斜畫角巳吹邉塞曲紅藍新長内園花可憐遺老埋黄壌曽倚春風望翠華好在北山猨与鶴依然同住舊烟霞送人歸豫章已覺棲遅懶曵裾可能為我強躊躇一帆秋色紅塵外千里江関白鴈初建業水清誰共飲潯陽潮断㝎無書黄金未盡朱顔在莫種桃華學隱居哭陳茂卿多病文園鬢未霜可人風味故難忘豈期夜壑舟無㝎竟使春天草不芳賣薬㡬時来海上遺文湏我訪㐮陽誰憐後死仍漂泊雲白山青自故郷宣城客中偶書眼看春霄擁勝流漂零回首媿沙漚黄塵烏帽知誰為白飯青芻復此㽞未必嵇康䏻作吏何妨李廣不封侯敬亭雲鳥知無恙欵段惟湏逐㑓逰梳頭淂白髮偶逐飛雲別礀岡觧纓聊爾濯滄浪襟懷巳久無山水容鬢誰令有雪霜未必冄砂真却老可湏白首更爲郎前脩未逺斯文在努力無愁𡵨路長送韶父先生逰亰口不到南徐三十春好将夣寐弔遺民也知往事如流水秪想重来是後身棹響關河風色莫雲離野服髩毛新舊㳺偶失扶桒路煩向滄江一問津山南先生挽詩仰驚喬嶽失嶙峋千載風流可復聞鼎有丹砂䡖縣令嚢無薏苡詫将軍苧𫀆歲月孤青簡石室文章閟白雲淚盡侯芭悲獨立短衣髙馬秪紛紛喜方韶父先生至兼懐山南先生夢覺秋宵失薜蘿尚煩青簡慰蹉跎山中舊別期猶在嵗晚相逢感易多華表神僊成寂寞靈光風雨見嵳峩百年珎重斯文寄趼足脩程可柰何韶父先生有詩復次韻以和兩翁故復可憐人傾盖長安四十春華屋山丘如隔日夜床風雨淂彌旬書籖藥褁仍仍在橘刺藤梢一一新澷寫餘哀寄冥漠大荒誰見下麒麟寄張如心謬羡侏儒抱一囊舊㳺搔首獨淒涼連天㫁䧹初沉日匝地寒花欲有霜聞道為郎湏白髮未殊髙枕待黄粱紅顏好在張公子坐聴松風春晝長送王傅朋静江教授丞相威名震百蠻蕭條異代淂吾賢䆠㳺忽過三湘去家學應令四海傳北望犬牙連上國夜占鶉尾直中天炎風朔雪皆王土未覺青春雨露偏碧蓮峯下駐飛驂風土遙知久自諳㑹有新書裨禹貢坐聞舊俗化周南深篁盡日迷山鬼毒草無時起瘴嵐珎重斯文強飡飯謾誇丹荔与黄甘送楊州傅學正全淮控制列城遥尚想青春虎豹驕一日江山走珠玉萬家燈火沸笙簫喜逢才俊豋文署好頌升平荅聖朝芍薬瓊花児女事可縁風月逗華鑣余山春雲牢落鴈無聲沙岸叅差石有稜䨥屐澷窮芳艸徑一龕長愧白頭僧晴濤閃閃翻孤日山木昏昏􅐈翠藤後夜清風滿遥念夢逰空指上方燈龍潭山二月清江照眼眀避風舟楫滿迥汀斷雲抉雨時時黒宻葉蔵花樹樹青習隱未成陶令賦行謌聊共屈原醒碧潭光景無消息坐看魚児點翠蓱遣興青雲如夢慨平生白髮驚春忽數莖漸覺交㳺随日別強顔色逐人行百年松檟誰䏻去五𤱔煙霞故可耕妄念掃除渾欲盡少㳺何得尚相䡖次韻方子踐觀潮潮生潮落有時休朝暮呉児㡬白頭𬒳髮祗誇迎駭浪側身寜觧障奔流江吹碧瓦人聲暁雲閃朱旗海氣秋後夜月明天在水有誰䏻此試登樓次韻子踐秋社歸巖南乆悟清都是夢中未嫌短褐任飄蓬時情冉冉心如醉世議紛紛耳欲聾㑹種枌榆依漢社共談禾稼續豳風蹉跎偶負平生約已復人間歲一終予與劉君師魯為文字交十有四年而固未甞相識也兹過武林偶遂良覿有喜而賦邂逅神交十載餘青楓落月幾愁予何言此日同傾盖勝讀平生未見書天上玉堂容可到山中金匱得長虚故多餘事宜啇略可待秋風怨索居杭州寄里中一二同志故山有路去無從燈火関心夢不通浪赱紅塵真自咲舊㳺白社竟誰同胸中好貯千巖秀眼底徐觀萬馬空風雨未休鴻鴈㫁此懐渺渺故難窮同儒上人謁黄尊師于龍翔上方脩撰鄧公適至輒成小詩用紀盛集坐陪三老盡文雄政爾衣冠不苟同談咲流傳成故事畫圖想像見髙風丹崖方與霞標峻碧海誰能鐵䋄空􅍝託下陳虛自詫飛揚無力思何窮客樓雨中江城飄泊動經年盡日髙樓閱過船睡起小窓𥘉聴雨岸旁垂柳巳生煙㘴抛歲月今如此毎望雲山欲泫然尚喜㳺從得諸彦時將樂事寄新篇次韻荅蔣春卿不謂紅塵拂面時軒然談咲一舒眉晴風石鼎浮花乳夜雨春盤冷碧絲握手遽成三宿戀論心那覺十年遅酒船魚綱歸無計未必山前白鷺知送楊山長歸錢塘百里郷心海鴈飛三年宦况野鷗知兒童早已占歸信弟子應䏻頌去思茅屋荒田春草草杏花深巷雨絲絲人生適意須行樂駟馬髙車恐未遅章徳懋同登車蓋山城南日日望蘇灣碧樹童童蓋一山何意兹辰成邂逅與君携手共躋攀鉤衣亂石通髙歩着面和風啓醉顔尚愛碑銘多楷則俗書且勿闘妖􅈺重逰毗山十載重来思惘然勝逰邂逅一開顏髙林有色煙雲净曲徑無香草樹閑漫遣金樽催白日絶憐紅粉涴青山南朝舊迹今誰記膓㫁風流不可攀湖山遇葉士心囙寄郭祥卿架閣謝公城下蹋春暉最憶東園夜不歸落月清樽波㶑㶑髙花銀燭霧霏霏未愁強醉羅衣濕政恐重来燕麥稀大地風濤竟誰料九霄一鵠看橫飛大卿牟公挽詩靈光一夕失崔嵬多士相逢淚雨摧夹道共看丹旐去遺民猶憶繡衣来䔥蕭悲吹蘋花冷渺渺郷山杜宇哀哭盡貞元舊朝士臨𡵨無語重徘徊後生無復望儀刑青史徒煩列姓名窮有遺文成鉅冢死無新爵上銘旌瓜田方任蓬蒿没玉樹偏依雨露生舊笏滿床知未墜翰林風月向来清次韻牟主簿南湖客中遥望仙橈度碧湖翩然髙興不枝梧也知白髮行相待無柰青山不受呼過眼光風殊獵獵霑衣多露巳塗塗相逢幸及南枝好一笑聊須引百壷次韻姚子敬教授筠庵别業故園煙樹渺江關長愧求閑未得閑客路獨愁黄葉下髙人正在白雲間卜隣儻遂容依止載酒終期共往還未害看山仍拄笏一竿付我釣滄灣次韻别程晋輔教授落拓江湖乆不歸相逢還及試春衣忽聞煙際蘭橈動誰共花前玉斚飛青眼故多知己在黒頭未覺壮心違赤霄孔翠吾何望喔喔隣雞爾自肥花信已覺㝷芳去較遅千林紅𬗋想紛披幾經夜雨䏻無恙試問春風竟不知斜日逰蜂應有夢野亭立馬巳多時殷勤却是江南客曽擘氷霜寄一枝草意澹煙斜照舊離離吐漫芳心欲向誰可是忘憂䏻自得若教指佞定無私東風江上何人識南國春来有夢知㽞取青青承雨露未應紅𬗋浪相疑五言絶句山中偶題古苔隠石色寒花眀藥叢有時白磵雨終日青松風夜坐涼風動千里孤坐思滄洲白露洗明月青天此夜秋七言絶句寒食舟中東風溪水碧漣漣溪上青蘿獨繫舡正是落花寒食夜水煙沙月又啼䳌哭御史王公有人新自甬東来別後音書第一囬欲問布帆無恙否豈知塵世隔蓬莱𬒳髪胡為竟渡河由来魑魅喜人過不須待聴山陽笛一曲箜篌哀思多早歲棲身擬鳯池桑田為海巳多時路人方為乗騘止流水生涯遽可悲玉堂政要謫仙人何意先成采石墳人物渺然時事異漫令平地有青雲金阜原頭草未生兒郎俄巳去騎鯨黄泉㑹有相逢䖏轉見人間子毋情掉頭東下苦匆匆徑挟羣仙入貝宫眼底珊瑚髙百尺釣竿吹折一絲風膠液中流事可歎海雲飛雨失青天陸郎地下驚相見應許来遅二十年孤児思父母憐兒忍見銘旌獨返時畢竟江魚與螻蟻世間何物最堪悲楚客猶疑刻劍痕秋風已到孟甞門殘潮落月天涯夜剪紙誰招萬里魂天呉罔象政縦横誰認鼇山頂上行海氣昏昏風雨惡夢中無路弔先生金陵客中送友人歸里青陽河畔杜䳌啼歸路如弦定不迷應到故山叢桂裏咲人騎馬學聴雞有感橘柚青黄照眼垂秋風籬落自紛披頗聞玉食登蠻果不獨涪州有荔支漢空需才㧞隠淪鼔刀屠狗正求伸可憐風雪南山下未有它年射虎人葉審言張子良同逰北山智者寺旣歸復與子良至赤松由小桃源登煉丹山謁二皇君祠囬宿寳積觀天風吹我度峥嶸春著千巒滃滃青𬗋陌紅塵寕有此十年空負比山靈芙蓉峯下南朝寺水秀山眀兩絶竒更向水窮山盡䖏一菴髙貯碧雲師却問仙山去幾程白雲如簇近相迎直湏不脫登山屐行盡松聲與水聲山中今是太平民尚與人間隔幾塵流水桃花三百曲莫教重誤武陵人偶看飛花逐水紅不知身過亂雲東囬頭旋覺峯巒别惟有青天面面同䨇鶴冲天歲月多至今香火壓嵯峨劉郎不是無兄弟柰此丹雞白犬何㘴愛春泉響翠微玉花吹濕薜蘿衣何人為擘氷壷破共看青天白練飛削立城心䨇白塔㡬疑日月費撑支一朝頓在闌干底始悟從来見䖏卑遥憶仙華鶴髮翁清泉白石滿竒胸若為此日干峯頂更試平生九節笻一宿山中竟莫㽞可䏻長伴赤松逰殷勤好去張公子休愛人間萬户侯避暑圗一丘一壑古遺民十里清風不属人閑對青山揮白扇世間何物是紅塵圍棊圗有客看棋洞口歸天荒地老巳多時人言此客殊癡絶畫裏看棋我更癡陶學士驛舎圗一咲相逢亦偶然浪将㤙怨向人傳無端更𬒳丹青汚狼藉春風數百年次韻章兄雨中書懐卧聴風水共喧喧起視青空白雨懸秪謂桒田可無恙不知江勢欲吞天茫茫平陸一尺水瑟瑟涼飈五月秋莫為天公無皂白誤将隂雨怨鳴鳩故山囬首杜䳌啼客舎誰憐寄一炊頼有四門章愽士不縁風雨廢談詩春盡餘寒去却囬江天五月未聞雷南風秪在浮雲外弹折朱弦喚不来草長故山懐獨往苔生今雨歎離居誰䏻共飲桃源酒一醉千年不願餘偈二首乆謂聲聞難作佛今知龍女觧成男分眀信有旁人分五十三身第一叅息心無想成無記有見還同有相存不盡普賢殊勝行随方願唘一城門金華黄先生文集卷第二
