body:
  text: 樂章臨川危素編次番昜劉耳校正三皇廟樂章降神黄鍾宫三成之曲九變於皇三聖神化無方􅁇天立極垂憲百王聿崇眀祀率由􅃇章靈􅀆来下休有烈光降神大吕角二成之曲帝徳在人日用不知神之在天矧可度思辰良日吉蕆事有儀感以至諴尚右享之降神太簇微二成之曲大道之行肇自古先功烈􅀁加何千萬年是尊是奉執事孔䖍神哉沛􅀆泠風馺然降神應鍾羽二成之曲雅奏告成神斯降格妥安有位清廟奕奕肹蠁潜通豐融烜赫我其承之百世無斁􅀄獻盥洗姑洗宫之曲靈斿戾止式燕以寧吉蠲􅆀享惟寅惟清挹彼注兹沃盥而􅂛有孚顒若交于神眀􅀄獻􅂛殿南吕宫之曲齊眀盛服恪恭命祀洋洋在上匪逺具邇左右周旋陟降庭止式禮莫愆用介多祉奠幣南吕宫之曲駿奔在列品物咸備禮嚴載見式陳量幣惟兹篚實肅􅀅忱意靈兮安留成我熈事捧爼姑洗宫之曲我祀如何有性在滌旣全且潔為爼孔碩以􅀅以享其儀不忒神其迪甞純嘏是錫􅀄獻盥冼與前同􅀄獻􅂛殿與前同太皥宓犧氏位酌獻南吕宫之曲五徳之首巍巍聖神八卦有作誕開我人物無能稱玄酒在罇歆監于兹惟徳是親炎帝神農氏位酌獻南吕宫之曲耒耨之利人頼以生鼔腹含哺帝力難名欲報之德􅁰稷非馨眷言頋之享于克誠黄帝有熊氏位酌獻南吕宫之曲為衣為裳法乾效坤三辰順序萬􅀦来賔典祀有常多儀具陳純精鬯逹匪藉彌文配位酌獻南吕宫之曲三聖儼臨孰侑其食惟爾有神同功合徳丕擁靈休留娱嘉席歴世昭配永永無極亞獻終獻之曲緩莭安歌載􅂛貳觴禮成三終申薦令芳凡百有職罔敢怠遑神其醉止欣欣樂康徹豆南吕宮之曲􅇼豆有踐殷薦亶時禮文既洽廢􅜂不遲慎終如始進退無違神其祚我綏以繁釐送神黄鍾宫之曲夜如何其眀星煌煌靈逰弗留飊舉雲翔瞻望靡及徳音不忘庻囬景况發為禎祥望瘞姑洗宫之曲工祝􅃱吿禮􅇱樂終加牲兼幣訖薶愈恭精誠斯罄惠澤無窮儲休錫羡萬福来崇五言古詩金華北山紀逰靈源偶為山中逰逺過雲􅀜􅀫蒼燈閃􅀄夜雨氣蒸深屋時聞清梵音窈眇松林曲草堂迢迢上方界水木翳清景山深不可留日暮衣裳冷悽其懐昔逰百􅀊嗟俄頃三洞仙山髙不極萬古積蒼翠清興薄暮移遺迹洞天秘巖阿春寂寥群仙勿予遲鹿田披榛度空荒突兀崖寺古幽花雜紅白老屋亞雲雨前瞻石徑微咫尺不得取寳峯下山復上山躡屩行沮洳􅀫雲冒長嶺旭日映髙樹山僧亦何為獨向城闉去潜岳潘公古人陳迹閟丘壑草生春晝長鳥啼巖花落神交千載上未敢付􅁳漠山橋行行指木末路逐飛雲上時登巨石憇共聴春泉響尋源竟莫窮即事成幽賞寳石暮投招提境眀發首歸路舉頭望山椒遥認經行䖏重重巖壑間蒼然正煙霧中秋㑹􅀫浦陽江上分韻得仰字甞窺仙華録勝踐心􅀁仰蹉跎二十秋故爾勞夢想名談出邂逅髙㮣餘彿彷莭至月仍圎别来山似長百年空中絮此㑹知難兩欲去吾未能不飲君宜強露蔓多夕滋風竹留晚響岐路方悠悠云何稅塵鞅龍山九日賛邑滄海澨彌年窘􅀅迎屬兹九日至緬愛龍山名欣然得勝踐况乃群彦并碧蘿引幽䇿涼泉度飛觥志適形可忘神舒體愈輕鄙劣竟何取靦顔結華纓登髙謝能賦徇禄慙歸耕􅄑此農事休萬寳咸吿成庻竭一餉樂持用誇昇平月出衆山静天空夕雲驚先民貴無􅂽簡書今有程悵焉難乆留振􅃑松風生石臺分韻得下字蒼山面長溪􅀔若飲奔馬層臺跨其脊萬古浥蕭洒登臨兹維要朋采未云寡迢迢歴榛莾靡靡眺原野白雲與翠霧夐在履屐下窮秋向揺落霜菊故堪把賞心孰無同幽抱欣巳寫千載如可期銘山徯来者四眀送王學正歸里昔者鄭廣文局束老一官今君去冷署春花映紅顔才名世有遇合古􅀁難行矣髙其翔青雲承羽翰下語翩翩子母庸悔儒冠出門送君歸君歸㡬百里􅀭帆東海頭弭棹䨇溪尾却觀䨇溪流去作東海水沄沄竟日夜萬古無窮巳問胡能爾爲有本固如是相君郷先逹盛業垂千春􅊬兹異代後世胄方詵詵誰移玉樹枝逺揷滄海濵優哉郡文學鄧禹終咲人公侯乆􅀅復錦衣何時新送楊學正歸餘姚舜江吾􅃇㳺風物殊不惡江水天際来宛宛帶郊郭雲帆渺沙溆翠嶂森摟閣别離不可念此日忽巳昨想見春水生煙栁仍濯濯君胡乆去此三徑獨盤礴空齋耿燈火月冷潮聲落近聞故人書逺􅃱江上作白駒􅄑無遐淮陽詎云薄招要忻良㑹緑酒春可酌采芹有遺篇風雩多新樂因君訊同志何用慰離索題松聲樓長松四簷間落落無與伍天清嘯歌發肯作兒女語道人有真聴無迎亦無拒尚不知有耳况覔聲處􅀁起視南山髙眀月在庭户應念朝市人聞雞走風雨雍熈僧舎偶書幽䆫悄無􅄰落葉不可數風驚葉間露中霄聴成雨起視天正碧萬里若垂宇兹予亦何爲兀兀守環堵奉府帖賜髙年帛晚􅀫孝義山中賦捧檄去州邑承筐布眀恩詎敢期稅駕惟知懼乗軒時春雨新巳嘉木隂正繁農人有耕作羽蟲亦飛翻感彼物情適念此王事敦悠悠迫長路靡靡窮郊原庶與遺老逢􅄑聆長者言持以薦芹曝無慙賁丘園低佪白日晚寂寞蒼山根吾行匪游衍此懐誰與論逰西山同項可立􅀫靈􅀮西菴薄逰厭人境振䇿窮幽躅理公􅀁開鑿遺迹在巖麓秋抄霜葉丹石面寒泉緑仰窺條上猿攀蘿去相逐物情一何適人事有覊束却過猊峯廻遥望松林曲前山夜来雨濕雲漲崖谷縹緲辨朱甍禪房帶脩竹故人丹丘彦抱􅀍能同􅀫名篇聊一詠異書欣共讀蹉跎未聞道黽勉尚干禄夙有丘壑期吾居㡬時􅁲送祝蕃逺北上春風吹九衢卑卑桃李門眀堂待松栢未失山林尊相逢今􅀊寒是事無深論念子抱逺志此道夙􅀁敦刋條落其葉􅀅使見本根痛恨日月微毅然闢浮雲柰何夸毗子聚訟生紛紜瀛洲冨才彦冠盖如雲屯去去當遇合羙價傾璵璠惟須用卿法力行尊􅀁聞丈夫必有事窹主在一言上以禆聖學下以安元元我如鶴俛啄豈復思乗軒子如摶風鵬本是天池鯤棲棲文學􅁺平世何足云朂哉保令徳契闊期無諼陳孝子詩南仲􅎨陳氏斗龍父􅀁家臨百丈溪父書傳考亭夫亦人之子胡獨以孝稱維仲適母盛王實生寧馨盛謂我巳出無殊祝螟蛉仲父諱弗言王卒不自眀睠然舎之去􅈱􅈱聞泣聲年運日巳往頭角稍峥嶸􅈼天乞殞㓕願以益父齡父殁盛亦亡弔影傷􅀌煢或乃吿之故曰汝王􅀁生王居清湖上去此無十程時仲新棒檄精廬擬横經悲號棄其官肩輿親奉迎安知世代易人非餘故城隣有鶴髮嫗叩之乆始譍言我與汝毋少小俱娉婷汝母生汝歸去作江東行不知今在無老我猶零丁仲也聞益悲贏粮事晨征六年困逆旅冷雨啼青燈譬彼無母雛投林輙長鳴永豐有施氏大屋深重扃於焉得母䖏一夕相合并母子更抱持淚如九河傾三日負毋還盗賊方搶攘倉黄與之遇白刃紛交横頓首前􅆀辭覼縷陳􅂨誠能令激髙義相戒勿敢驚仲昔以至行上天降休楨靈鴈既群集嘉􅀲復冬榮區區彼蝱蟁豈遂無人情聖門語純孝厥有閔與曽未聞樹竒節謡誦傳轟轟此道古或希此事今可徴我歌雖云俚庻感蚩蚩氓上京道中雜詩發大都辤親獨行邁遥遥抵亰國胡為突不黔驅馬更逺適至尊有時廵樹羽殷阡陌􅀫衛必近臣顧問須􅂄徳陋儒亦何知冗􅀙同執㦸草深原野青雨暗􅀜塞黒寥寥盛年意眷眷㳺子色一身萬人中敢不思努力劉蕡祠堂劉君古遺直祠堂在丘園嗟此豪侠窟文雄歘􅀌騫平生二三䇿匪徼眀主恩􅃈􅃈談得失無乃市井言慿髙一長望苦厭車馬喧微風過踈雨青山滿前軒隂晴倐異態浮雲實無根悠悠千載心去去勿復言居庸関連山東北趨中㫁忽如鑿萬古争一門天險不可薄聖人大無外善閉非楗鑰車行巳方􅁤􅀜吏徒擊柝居民動成市廬井互聮絡幽龕白雲聚石磴清泉落地雖臨要衝俗乃近淳朴政須記桃源不必銘劒閣僕夫跽謂我無爲乆淹泊山川豈不好但恐風雨惡榆林崇崇道旁土云是古長城却㝷長城窟飲馬水不腥斯人亦何􅄑生時屬休眀向来􅁁陲地見今風塵清禾􅁰􅀍行路牛羊散郊坰儒臣忝載筆帝力猗難名槍竿嶺憶昔賜第歸吾毋適􅀄度蹉跎􅀊年晚今辰乃中路居人誇具慶㳺子慙叱馭兹山稱最髙􅀭鞭入煙霧矗矗多峭峯濛濛饒雜樹﨑嶇共攀援躑躅頻返頋陳情未成表登髙詎能賦獨憐山下水逺向瀘溝去李老谷縁崖一徑微入谷䨇崦窄宻林日易曛况乃雲雨積行人望煙火客􅃕依山色家僮為張燈野老煩避席未覺風俗殊秪驚􅀜河隔嚴程不可緩子規勿勸客赤城雞鳴秣吾馬晚飯山中行何以慰旅懐赤城有嘉名灘長石齒齒樹細風泠泠時見巖壑間粲若丹砂眀温泉發其陽撝訶勤百靈前峯􅃌金閣真境摽珠庭白道人跡稀青崖雲氣生信羙無少留緬焉起深情龍門竦身望龍門緩轡行兀兀溪廻愁屢度雨横驚􅁀溢百崖儼相向百水怒争出人言馬上郎快意毎多失自非渥洼種不得矜捷疾飄飄蟣蝨臣􅏮􅏮黿鼉窟皇靈重覆冒利渉用終􅁻廽睨向􅀁經千嶂隠朝日青林外盤紆黄流中蕩潏後来未渠央君子冝戰慄獨石觧鞍及亭午稍欣煙霧収蒼然衆山出歴歴如雕鎪前瞻一石獨靈宫居上頭頗聞去年夏水激龍騰湫走避登屋山夜半齊呀咻􅄑兹溪澗中今作清淺流宴安不可懐變化誠難求翠華渺在望行矣母俺留檐子窪自􅀙始出􅀜􅁆日走崖谷迢迢度偏嶺險盡得平陸坡陀皆土山髙下紛起伏連天暗豐草不復見林木行人煙際来牛羊雨中牧颯然衣裳單咫尺異寒燠佇立方有懐相逢仍問俗畏途宜疾驅更傍灤河􅀫李􅁜臺日暮官道􅁁土室容小憇漢􅀅安在哉荒臺猶髣髴低佪為之乆懐古増歔欷長風吹曠野飛雨千里至蕭條蒼山根草木餘爽氣常憐司馬公予奪多深意奏對實至情論録存大義史臣司述作遺則敢失墜上都分院晨興過桓州旭日生蒼􅈵舉頭見觚􅏢金碧何巍煌洪河貫其前青山環四旁暮投玉堂署鼇峯屹中央􅂛階旅羣彦官燭分餘光琴册森在側談咲来清觴列坐無􅀁為陳詩詠黄唐帝郷豈不樂父母逺莫將起視雲漢低垂星爛寒芒南飛有冥鴻􅊬哉天際翔題趙􅈵公瑞􅀲圗慶門集嘉况異瑞呈􅀲田生五而成十竒偶出自然觀物可知徳發祥匪由天願言植靈苑永奉君王前合形表同休雅詠流綿綿逰寳陀寺十年望滄海臨流不能度蒼茫􅀊華晚邂逅舟楫具拂衣乗天風掛席随煙霧旦􅀙蛟門發暝投翁洲住前瞻積水深島嶼青無數梅岑特􅀌絶遥見日出䖏􅀉身人境外矯首禅関路粲􅙾金砂石離離白花樹髙期惬幽抱歴覽增遐慕俯伏苔磴間庻與真靈遇二􅁁非可取三觀何時悟嗒然坐忘言目送寒潮去靈竇紀逰移舟泊泉口我行已信􅀫天寒洲渚生峯廻川途曲煙霞蘭􅀂髙别墅在林麓􅄃衣待眀發石路何幽阻日出不見人林深但多虎乳峯稍已近恐懼那復數髙人欣相迎山門帶流水風生珠樹間月窺鏡池裏觸景遂成迷應接殊未巳幽㝷􅃌山椒崖傾忽如㵼俯身視木末懸水在􅁕下冥冥巖岫中宴坐奚為者亭亭妙髙臺逈出千峰上怪松多十圍巨石非一狀心賞孰與同昔賢有遺唱蕭然上方境人稀知地僻中峯路莫辨丹山雲仍積徒聞古仙人石上餘足跡詰旦逾西岡草木益深秀梯苔下絶巘坐石看飛溜隂靈多窟宅欲往不敢又興移􅀄出山繫纜長汀樹夜来雪巳深溪風水難度猶疑鐘磬音遥遥白雲處同王章甫待制校文上亰八月十五夜􅀫龍門驛􅈵風堕黄榆萬馬皆南馳而我方北首度􅀜及鳴雞石路幽更阻僕夫慘不怡徐驅待明發泱􅐯窮煙霏貂裘者誰子怪我逢掖衣為言霜露多遑遑獨安之我非不自愛簡書今有期憶昔州縣間折腰向小児荏苒二十年白首􅀄登畿同􅂁如燕鴻去住常相違悠然慨平生與世何参差􅉂投龍門驛髙舘臨廻溪青崖拱白月水木含餘暉秋色故瀟洒我行殊未遅相􅀙况魁彦炯􅀂􅃢瑚枝衰暮奚足云一觴聊共持送曽止善孔廟司樂周官重司樂典教專成均如何千載下實去惟名存之子􅀒逺志􅀍􅄄徂冬春低佪不自衒保此席上珍小試特豪末食禄同庻人􅄑與駿奔齒位卑號仍尊既殊仕伶官况及逰聖門金石方在耳頌聲未崩淪聞風苟有作薄俗斯還淳嗟予領胄子四術空遺文鏗鏘尚莫辨論􅀃􅀅何云臨分用自愧贈言聊具陳送王君冕同年歸長安昔忝膺薦送􅀍􅄄趨上亰􅀩恩賜清問彚進陪時英束帶仕州縣暫為閭里榮蹉跎二十年来拂舊題名升沈乆巳判存殁復堪驚忽逢王眀府話􅃇欣合并蕭條逆旅中書帙亂縦横坐閱車馬喧澹焉􅀂無營雖懐帝郷樂不受世網嬰寵辱端可齊去就一何輕空餘綈􅂁戀猶軫故人情予方徇微禄未能返􅂵荆終然無􅀘報白髮日夜生如何同逰䖏餞此千里行度􅀜秋風起落木寒蟬鳴相思阻良覿惻愴何由平題杜左司西巖詩卷吾聞古逹士大隠非山林如何鵷鷺間白駒起遐心遥遥望故山􅂵塞繚以深峯巒􅀔交集積翠千萬㝷園廬在其下門巷常愔愔軒䆫帶流泉花木乆成隂舂秫足新醸亦有書與琴終然戀魏闕未忍投華簮平眀奉朝退粉署欝沈沈披􅁭坐髙閣獨對西山岑爽氣幸可􅃱塵慮安能侵勿云須吾土始用窮登臨異方苟同得視古猶視今聊為招隠篇徃和巖中吟題象山環溪圗崇山標地靈萬古聚清淑堂堂故相家髙風在喬木仙翁上天去逸響今誰續優哉四千石接軫飛華轂夫君氷雪姿乃爾抱幽獨翩然来帝旁霞􅅂儼􅀄服侍祠眀廷上厭直齋廬􅀫睠言懐􅃇居結構依山麓軒䆫對晴嵐林杪出懸瀑散為百道泉噴薄翻珠玉餘潤之􅀁􅀩秔稲豐比屋春事日向深桃源酒方熟往来無俗駕異書仍可讀歸歟定何時專此溪一曲相逢亰洛間紅塵眯人目披圗覿佳􅃱山水増新緑先賢止息䖏杖屨存遺躅愛山錫嘉名恵􅄑及樵牧于于後来者猶或􅀍膏馥安得􅀙君游青雲兩黄鵠􅀊晏􅀊晏木葉落遥見東城隅雉堞欝岧嶤列屋何蕭踈悠悠西南望赫赫金張廬退朝集冠盖鳴珂沸通衢合遝多俊㳺並轡飛華􅅂頋盻有光彩行者為踟蹰俯慙筋力微無􅀙效馳驅日斜坐官舎還拂案上書緬彼川路長感此年運徂遲廽不能去歎息􅀅焉如送陳太祝夫君青雲彦早通金閨籍弁服勞駿奔執事謹朝夕忽乗使者車意氣何輝赫􅀅􅃌固有嚴為務本非􅇵經營禮文事詎曰期會迫定知多餘暇時復肆游歴向来佳麗地觸目成陳迹西山獨偃蹇不改太古色相逢㡬遺老慷慨語疇昔芙蓉君子花足以娯使客我方守一官兀坐如􅀛息當歸更淹留臨别增感激長風吹逺塵浩浩千里白欲附南飛鴻安得生羽翼送王鍊師歸四眀飄飄采真侣乃在四眀山霞􅅂朝帝􅀁瓊舘留人間忽聞䨇鳬舄却向東南還望之􅀂流星􅊬然不可攀海月照堦戺天風飛佩環我何苦覊旅氷雪生朱顔集淵眀詩句題李中甫貟外稼亭東方有一士客養千金軀束帯􅀱雞鳴出則陪文輿代耕本非望暫與園田踈園田日夢想投冠旋􅃇墟興言在兹春新疇復應畬田父有好懐過門更相呼披草共来往履歴周故居悠悠待秋稼時還讀我書雖未量􅀊功栖遲固多娱此事真復業此語真不虚餞送傾皇朝念前塗前塗當㡬許直至東海隅古時功名士事事在中都遥遥沮溺心君情定何如集淵眀句題胡生嘉樹軒孟夏草木長霜露憔悴之藹藹堂前林冬夏常如兹嚴霜九月中卓然見髙枝如何捨此去白日掩荆扉深谷乆應蕪此䕃獨不衰黽勉六九年懐此貞秀姿常恐􅀒此懐未足為髙栖及時當勉勵慷慨思南歸親戚共一處日夕􅂬相持披榛歩荒墟登髙賦新詩坐止髙䕃下一觴聊可揮􅀙今至􅀊寒縦心復何疑永嘉王君自製挽辭盖安乎死生而未忘情乎死生者也集淵眀句以釋之自古皆有殁我今始知之居常待其盡逝􅀅不復疑人生無根蔕去来何依依旣来孰不去奄去靡歸期復得返自然人間良可辤何事空立言念此懐悲悽日醉或能忘一觴聊可揮且極今朝樂千載非􅀁知送寧上人歸呉中我如雲間鶴乆厭雕籠飬子如海上鷗􅀄不嬰世網胡爲逐吾軰飲啄勞俛仰得無㘴書癡遂爾生技癢欲於一毫端而現諸萬象重雲連夏秋雨􅀧大如掌三州成巨浸百水猶怒長倉忙揖我去風蒲映飛槳有形天地間浮萍依浩蕩向也本非来今焉亦非往臨岐􅀅何贈詩境方渺莾􅄑子頗聦眀莫作離别想題雲巢圗飄飄學仙侶心與秋雲白獨居非有隣忽去亦無迹峩峩三界上地位風雨隔毋求一枝安而以六月息當憐夢中人螻蟻同窟宅湖上即事垂雲晝濛濛湖面惟一色薄暮風更生際夜雪􅀄積凝隂􅀔方盛塵境喧暫息坐乆聞拏音忽然破寥閴試院諸公西湖同泛分韻得儀字秋杪景􅀅晏天髙霧仍披􅃞舟西城曲散䇿南山陲重􅁄幸巳撤累觴欣共持及兹酒不空未害席更移㑹合非可常簡書各有期念之動予懐朂㦲慎其儀題清華亭名區匯脩渚流望俯平陸飛雨天際来逺峰净如沭生香餘晚華繁隂藹嘉木秀色坐可􅄃終然不盈掬觸景幽興多接物道機熟誰能與之逰食芳飲山渌南屏叢玉軒分韻得白字偶􅀙采真侣逺過金仙宅名談接勝流傾盖頭未白湖水清見底春風去無迹列坐陪墨君觴詠終日夕昔聞有三咲今喜成六客後来復何人莫使風雨隔贈别呉孟思斯去而氷生千載惟兩人趙公起昭代並世推吴君及公無恙時蚤巳逰其門公書集衆妙變化何其神如食有􅂖粟間之以八珍君獨務稽古要在同其文􅊥索極根柢辯析窮毫分源深流自逺􅀁出日益新麾以正正旗終焉䇿竒勲徃来自成蹊桃李竟不言我方徇世好有作徒云云借潤翰墨間􅄑可張吾軍媿我才欲盡感君愛彌敦别離􅀊方晏躗言聊重陳送陳生歸天台英英陳氏子年未登弱冠受業春秋家不敢問三傳森然出凡例論議仍貫穿耻随䡖薄兒増年􅀼郷薦小試儒黌中徃往魁衆彦稍休􅂺臨池㳺戯弄毫翰寫成道徳經有鵝不肯換昔予始西来故國多文獻斑斑南山豹窺管時一見蹉跎垂四紀囬首皆夢幻朋儕諸俊賢存殁亦相半殁者歸山丘存者風雨散惟餘貞居翁共喫殘年飯識子座席間短小甚精悍結為文字交忘年破崖岸我方守一官身貴事則賤操觚待需求矻矻窮夜旦枯膓縦可捜安取五千卷強顔作俚語對客常媿汗况復不善書辛苦愁脫腕誰為助我者􅄑子筆力徤烏􅁝纒凍綴増絢爛青春二月時江花滿呉甸遥遥望重闈歸馬忽如失吾左右手坐覺心曲亂子来却何日執􅃑那忍判斯文千載下不絶猶一線小藝雖可名未足盡大觀朂㢤崇眀徳勿使􅀊年晏贈言非􅀁能聊以示繾綣丙子七月十七日同輝公登􅂵微巖汪生元眀許生存仁来㑹遂􅀫鹿田眀日乃由山橋囬至芙蓉峯而别追念􅁆十年間並㳺之士往者已不可作在者又莫之與同兩生頋能不惮其勤相􅀙躡屩行風雨中誠一時清事也第未知後游為何日同㳺為何人撫事述情成二十韻邀兩生同賦奉呈審言子長吾年未及謝倦飛巳知還乃復嬰近務無由縦清歡幸與方外士相從巖壑間小憇遂深入詰曲披茅菅昔人有遺躅縹緲青雲端髙居匪結構異状如雕鐫志怪固無取懐賢􅊬難攀停䇿訪􅃇㳺欲去仍盤桓迅飈發中夜衆木號驚湍􅈵秋變袢暑山深氣先寒泉石無改色四時自推遷交朋半新故念之增慨然兩生亦可人環佩来􅃢􅃢携手恣幽歩流目窮遐觀時於林缺䖏遥見城南山行行度危磴悠悠睇層巔凝隂閟朝采玄澤釃神淵嘉穟日巳豐藹焉滿中田覧物多􅀁欣賞心殊未䦨後期孰與同良㑹當何年丁亥春二月起自休􅃱入直翰林夏四月抵亰師六月赴上亰述懐夙予抱微尚漫仕遂浮沈决去不復疑甘以投華簮春天動使星空谷發跫音倉忙遣就道載筆歸詞林弱質􅄑未朽茂恩一何深義當不俟駕事乃違􅀄心揖與親友别長眺故山岑臨觴不能御朗詠巖中吟􅀭帆越江淮河水来活活吕梁扼其衝石芒殊峭㧞泝河柁忽摧度洪䌫􅃍絶前途緫安流風勁桅復折兼旬渉險艱脫命毫髮行行薄畿甸值此正陽月皇輿方北狩前旌曉巳發疾驅望清塵我馬不及秣出􅀜度峻阪下視原野闊磵谿多縈廻岡嶺互盈缺舊游如夢􅄰古道無改轍經時春草變乆旱夏雲􅀬逺行識苦􅉝儻免􅀩霜雪信􅀫憇虚舘平眀玉堂開微風散靈雨階戺無纎埃良㑹秩􅀄筵芳醪湛罇罍内官出黄封飛鞚天際来承平故多事鄙劣慙非才抃躍向宸廷慶雲欝崔嵬乞身懼再瀆戀闕空徘徊日出旦氣清齋祓趨行宫周阹夹馳道大帳垂穹窿鳴鞘下霄漢别殿臨薫風攝衣􅂛玉除穆穆瞻睟容謁拜未及已廽光赫重瞳詔使侍經幄通籍丹禁中斯榮非􅀁希千載庻一逢怵惕乆復前旅進陪羣公願因奉清燕慷慨輸微忠衰遲力不逮勞心但忡忡圓象無停運日馭轉西陸􅈵野多歸人翩翩共馳逐念昔居閑曺未老先納禄􅀩恩列外監放浪湖一曲薄田皆舊畬敝廬非新􅁲白首重見招英逰並華轂寒松雖後凋幽蘭豈再馥宣尼譏患失伯陽貴止足時暮復何言終期返初服仙華方先生析蕳齋杏花消息雨聲中之句為韻賦山中社雨七章和者四人先生於第四章見及頋未能屬和今五十餘年諸老皆巳下地先生門人在者惟朱仙仲山年八十矣偶逢春社興懐存殁􅇷次前韻以抒鄙情貞居逺人寰屋老四山静一翁屹靈光二季亦秀整曉聞楓林鼔雨過鄰墻杏翛然發􅀌詠語盡意方永昔年慟哭地古劒生銅花凄其懐故交中情亂如麻念彼盛壯時緩轡􅀭䡖檛吁嗟長星墜無復出漢巴淮隂權竒士髀􅁏老始消長眉巳雪色頩顔尚紅潮朋游三􅁆公於焉共逍遥平生經濟䇿忘言付詩瓢卓哉全歸子離塵返􅁳極却觀人世間千載猶一息贈言在吾耳風規良可則欲叩封禪書探嚢竟無得憶别青喦翁歸進江上艣書札未相忘􅀊月􅃍如許山長春樹深地闊雲濤阻詩筒杳不来令雨非舊雨仙華㡬千仞峻絶臨􅂵清天壇瑶草合石穴隂風生踆踆杖屨末眷眷丘壑情􅄑有一夔足雅歌續遺聲前脩遂不作良友孰我同兀坐守章句獨學無全功徒操五色筆随人畫虚空悠悠感存殁惆悵百年中七言古詩題􅁜陽牟公􅂵陽方公詩卷兩翁風流掃地無文章光􅆋埋丘墟紛紛小兒政疾走安用佩玉飛長􅅂憶昔登堂三十載夢想時復瞻眉􅂡昆蟲閉􅀜水返壑孰使驪龍遺頷珠願言保此勿䡖出􅄑免兒軰相睢盱題大瀛海道院丹山之山青崔嵬隠居舊隠山之隈千年土鼎爲誰出深崖古像松聲哀鴻飛上天􅀲在雪過者莫睨君能来想當月斧乍揮霍奔走屬役皆仙才卷蔵瀛海歸一粟頋盻瞬息生風雷森然幻有啓神界白日照耀金銀臺昔聞使者兹入海樓船煙霧何時􅅆君其置此勿復念少須碧水􅀭黄埃九重蠖􅇴陛下聖方士未易誇蓬莱琳宫貝闕長望􅄑天髙海闊心悠哉陽山昱上人訪予吴門寓舎求爲湘竹詩予辤以未見竹上人不逺六十里自山中􅞿其竹而来好事有如此者欣然爲賦長句道人来自陽山麓手携舊種千竿竹小裁方斛不盈咫中有瀟湘江一曲未信天工能爾竒不知地脉從誰縮睛䆫翛翛散煙霧眼底森然立羣玉豈期我乃累此君􅀩犯風埃走塵俗故山方逺重愁絶新句未成慙迫促黄岡之産大中椽政用才羙刳其腹願言保此終天年􅀊暮山中伴幽獨杭州送兒姪歸里空江月滿潮聲怒二男勇􅂿潮頭去故園天末渺予懐夢中識汝歸時路起向江樓遥望汝江上青楓正霜露􅈵風颯颯吹汝急櫓揺背􅃌龍山渡翩然一葉舞中流嗟汝童心得無懼自我西逰歴三紀舉目交朋半新故下車相揖何紛紛白頭朝士猶徒歩玄都􅀚裏舊桃花見我重来能㡬度緬思疇昔仍念汝􅀝徙䦨干日將暮前潮􅀅㫁後潮續層波􅃨浪無重數魚龍出没相後先疾雷槌山雨如注隔岸峯巒空復多沙際冥茫但煙霧計程知汝巳登陸息肩弛檐今何䖏眀朝過我三釡山能勿徘徊起哀慕近聞旱魃肆為虐殺吾手植千株樹且須為我語比鄰莫遣牛羊上丘墓次韻􅃽啇卿常博述懐齋廬清切嚴扄鎻飛佩胡然能過我䄂中平生五色筆掞翠摛紅無不可我方折腰向小児洗研何由䖏公在九重垂拱四海晏甘泉日夕無烽火太平有象須黼黻文章重任公冝荷陋儒未足張吾軍強識之無豈云頗漂零海角晚相遇如風落山􅀵碩果迷途儻有為􅃌南研足脩程吾敢惰頋慙向来􅃒日手政爾長江事篙柂玉堂􅄑喚秃髮翁文塜吾甘翳蓬顆題醉郷圗翰林主人天上来布帆不為鱸魚開江湖渺渺秋一色朝光暮色相徘􅆦昔賢心賞餘勝䖏秪有水竹無亭臺碑材乆巳没荆􅁄屐齒不復留莓苔後来視今猶視昔今我不樂胡為哉太官馬湩逺莫􅃱鄰翁緑蟻浮新醅欣然一飲便終夕鼻端氣息如雲雷是間别有一天地不知何䖏為蓬莱廻觀方内海一粟醯雞塵甕何喧豗黄冠秘􅁥太狂態􅀐鯨供奉非仙才揮毫政要真學士鋒車流水行相催瑶池曲宴多雨露歸歟酌彼黄金罍題張清夫心逺堂吾聞古来賢逹士不擇山林與朝市百年塵甕兩醯雞鵬鷃逍逍俱可爾夫君平生瀟洒意俯睨軒裳猶弊屣翩然一舸鱸魚郷歸来不待秋風起忘言兀兀坐終日天地古今齊一􅃌但見山髙湖水深青螺蕩􅃞銀杯裏柴桑之人去我乆風味何妨略相似神交􅁳冥雲海長目送歸鴻渺千里贈談星者山人乆客湖海間水風瀟瀟月滿船相逢問我􅀁生年忽然䄂出天星盤須􅁷落筆開雲煙坐令衆星紛蟻旋窮通變化生毫端命乃在子非由天一朝别我還故山索我贈詩如索錢我􅂴讀書醉欲眠子母迫我姑留連人生良㑹古􅀁難囬首日月䨇跳九題松溪圗獨􅀐瘦馬走赤日忽對􅀞圗心眼眀想見髙人茅屋底石床卧聴松風聲秋空漸髙霜露白松根茯苓巳堪食欎紆遲暮秪自憐卷圗還客三歎息題錢舜舉􅀞鳥雀鷹鸇皆羽族強之食乃弱之􅁏兩雀亦分弱與強一遭􅅮噬一髙翔􅀞師描貌勞意匠詩人見􅀞齊惆悵人間萬事無不然雞蟲得失安足言題何能之􅀞何君家住西天目平生愛􅀞尤愛竹時時冩作風露枝下與人間掃塵俗湖州古稱蘇與文趙公後出今絶倫朝来見詩猶見􅀞品題已盡􅀅何言山空􅀊寒路脩阻歸歟且共墨君語屋梁月落清夜䦨坐聴東溪響如雨鄱陽周節士歌周君生長鄱君里長身俣俣􅂡仍羙師張先生業孔氏夏螢冬雪頻繼晷先生愛君不骫骳君謂先生我知巳遭時戰伐多瘡痏賊衆乗之作姦􅁤郡檄先生俾一洗先生慷慨為之起曰彼蚩蚩聚蜂蟻兇渠本我家奴爾我􅀅笞之用折箠披其角毛脫距觜奴狭兵来速如􅀑反噬其主先生死先生諸子皆㓜稚周君聞之失箸七曰古復讎盖有禮師長之讎視兄弟我今必也書于士走吿郡府伏以俟府公義之弗敢止授以殳斨與弧矢或云彼衆我無㡬盍募援兵為表裏君奮不頋行益駛賈勇直前無與比賊窮擲金計何詭得金失賊墮其餌亟取貪夫尸諸市士氣復振賊乃靡􅇷奔逐北劘賊壘迅雷不及掩其耳一柵既覆衆柵毀生􅃱賊奴洎妻子刌其心肺獻爼几告于先生辭亹亹凱旋公庭旗旖旎散遣部伍歸耘耔天戈耀日方南􅃌郡􅀅效死弗拜跪周君堂堂衆􅀁恃人咸謂古今可仕細書降表僅尺􅁓大㦯公侯小刺史君言我本不獲巳出為吾師刷讎耻罪人已得賊巳弭東村西落無荆􅂎不義冨貴寕飲水公毋多談且休矣閉門髙卧􅁏生髀白駒空谷餘四紀殁葬金潭有廟祀郷人􅀊時擊羊豕子暾来與胄子齒踵門泣涕言如此嗟君壮節甚竒偉播兹歌詩侑哀誄題李氏白石山房名山秀出鄱江曲上有立石如立玉尚書履聲忽已逺隠者新居在盤谷花開鳥鳴春晝永白雲重重養喬木夫君亦復稱其家有書能蔵且能讀露鈔雪纂乆愈冨何啻鄴侯三萬軸山靈翕霍謹呵護夜半虹光發深屋引泉天井助芳潤大勝俁儂飲山渌我欲􅀙之不可到細字長書俄滿軸毫分縷析極根柢大義森然見條目鄙人愧莫知􅀁對叩請安得留更僕頗聞石洞閟遺音龍門餘韻須君續臨風傾詠􅀉綢繆衰朽終期挹膏馥題環翠樓冨州東望山如積山人作樓髙百尺八䆫面面向山開四顧蒼然惟一色樓中􅄑有書可讀樓外有山繚而曲安得元和博士公為君舉酒歌盤谷次韻題廬􅁜觧君行卷兒童聚戯如聚沙忽逢至寳争􅃌瑕觧君􅀁以自􅃷平生不識䖏士牙賢郎亦復事舒闊􅄍辭歴落正不葩前年上殿見天子衣䄂冉冉猶煙霞薾然退居弟子列馴行醇謹仍可嘉芝蘭玉樹爾為爾吾􅂖吾粟吾桑麻君今白首官尚冷山苗澗松衆􅀁嗟生兒頭角有如此肯終坐井同群蛙我方僶俛徇微禄席猶未暖已及􅀲安得􅀙君共傾倒春燈夜酌歌簷花題周鍊師雲崖圗我本山中牧羊客偶然失脚紅塵陌矯首丹崖不可攀但見層空暮雲碧樓居仙人元不死天長地乆無消息􅀐麟翳鳯者為誰道上相逢不相識披圗示我􅃇游䖏流水桃花尚春色為言白石乆已爛茯苓無復成琥珀忽然長揖不肯住飄若流星去無迹􅀂為握手賦歸来永與人間風雨隔贈熊天瑞先軰熊君南州山澤臞弊衣不滿六尺軀年登七十氣尚麤撥棄舟楫違江湖塵埃掠面氷生􅂡北走梁宋至皇都舉頭仰瞻天子居姓名無由逹公車何王之門無長􅅂君惟抱瑟王好竽寒風蕭蕭雪塞廬退􅀙諸生詠唐虞詩成篝燈手自書字如凍蠅宻復踈食可無􅁏出無驢為我蹝履来于于曰予其歸無􅀁須一言用比眀月珠我方守官橛株拘嗒然忘言㩀槁梧童子穣穰環座隅咲我腹笥太空虚感君逺来増歎吁愛莫助之􅀅何如翰林主人掲大夫與君少􅀂同隊魚巖棲穴䖏多其徒君歸而求冝有餘長歌鼔􅇲聲嗚嗚青天自髙雲自􅀌贈夏德頌夏君懐抱何磊落卜居不肯依城郭丙舎新開近墓田雪栢霜松翳丘壑一朝興来不可遏萬里黄塵走亰洛叩門遺我尺素書儷玉駢珠相照灼為言家世本臞儒餘力惟知事耕鑿窮年甘與鹿豕逰敢希鴻鵠翔寥廓秪今逺来亦有意求詩元不求官爵華星秋月􅄑分輝特向山家慰蕭索我聞君言重太息感君望我殊不薄清時雜遝冨才彦笞鳯鞭鸞趨舘閣揮毫成風墨成雨瑞錦披張紛製作一言引重力千鈞青雲􅂹尾端堪託頋我方為句讀師掇拾殘編味糟粕㘴隅童子日呶呶平生雅意渾銷鑠奚暇清吟發天巧剪紅刻翠供嘲謔君歸卉木尚餘春况值新篂初觧籜傳家有書故可讀有石可眠泉可酌大勝山人来索價低頭欲就微官􅅞我雖齷齪坐無氊有客如此良不惡戯拈葦管和竈煤為君聊賦山中樂送李憲使赴燕南分題得烏飛曲臺中樹枝上烏無數當年元只為公来今日􅀙公却飛去趙北際燕南垂道旁緑樹多好枝公之􅀁憇烏􅀁依公母亟行烏勿飛問公此去何時歸上林春深樹如織公歸但聴烏消息風樹吟為李生作返照入深林牛羊在丘隴風次白楊樹葉葉各自動如何當此時􅀌子萬里歸有琴未成聲􅃍欲絃吾詩吾􅂴言詩子姑去抱琴聴子風中樹金華黄先生文集卷第四
